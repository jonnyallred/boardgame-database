description: |
  Kolowis Awithlaknannai, meaning "Stone That Kills," is a traditional two-player strategy game of the Zuni people of New Mexico, first documented by ethnographer Stewart Culin in his 1907 book Games of the North American Indians. Played on a board of interlocking triangles with 23 tokens per player, pieces may move one space along board lines or jump to capture opponents, with the goal of eliminating all opposing pieces or trapping them. The game is believed to be a Zuni adaptation of the Spanish Alquerque brought by Conquistadors, demonstrating cultural exchange across the Americas. It remains a significant artifact of Native American game tradition.

