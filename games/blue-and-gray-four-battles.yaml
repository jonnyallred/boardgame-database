description: |
  Blue & Gray: Four American Civil War Battles is the original 1975 SPI quadrigame
  containing Shiloh, Antietam, Cemetery Hill (Gettysburg), and Chickamauga, using a
  shared rule set accessible to wargame newcomers with 100 or fewer counters per battle.
  This entry covers the same games as the "Blue & Gray" entry but represents the
  full-title variant listing in the master catalog. Each battle can be completed in
  a few hours, making this the definitive accessible entry point to SPI's Civil War
  wargame library.

