description: |
  Game of Thrones: The Card Game (HBO Edition) is a simplified two-player card game published by Fantasy Flight Games in 2012, based on HBO's television adaptation of A Song of Ice and Fire. Unlike the full Living Card Game system, this edition was designed as a standalone two-player experience accessible to fans of the show rather than dedicated card game enthusiasts. Players represent rival houses competing for dominance through hand management and card play, with artwork drawn from the HBO series. It serves as an accessible entry point into the Game of Thrones card game universe.

