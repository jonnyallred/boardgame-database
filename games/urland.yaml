description: |
  Urland is a strategic board game designed by Doris Matthäus and Frank Nestel (of Doris & Frank fame) in which players guide early vertebrate creatures as they make the evolutionary transition from water to land. One player each round selects which land area will be scored, while others use their actions to move creatures and compete for territorial control. At key intervals on the scoring track, gene modification cards are auctioned off, granting players additional actions and evolutionary advantages. The game blends area control with auction mechanics in a unique prehistoric setting.

