description: |
  Black Forest is a 2024 worker placement game designed by Uwe Rosenberg and Tido Lorenz,
  published by Feuerland Spiele (Capstone Games in English), widely acclaimed as a top
  game of 2024. Players spend five rounds travelling from village to village, placing a
  meeple between two tradespeople to activate both, managing resources through signature
  Rosenberg resource wheels. A spiritual successor to Glass Road (2013), Black Forest
  upgrades the earlier game's simultaneous action selection with a more interactive
  worker placement system set in medieval Germany.

