# Description
description: |
  A Trip To Mars is a classic roll-and-move children's board game published in
  the late 1950s/early 1960s during the space race era. Players race their pieces
  through the solar system from Earth to Mars, moving in and out of orbital paths
  as directed by dice rolls and space cards.

  The first player to successfully navigate to Mars wins the game. As a product
  of its era, the game reflects Cold War-era fascination with space exploration
  and is primarily aimed at young children. Limited strategic depth makes it
  purely a family game for the youngest players.

