description: |
  Hide the Kids! is a children's board game designed by Frederic Moyersoen and published by Asmodee around 2009. Players hide children from a seeking player using bluffing and deduction, creating a playful take on classic hide-and-seek dynamics. The game won the 2009 Golden Ace and French Children's Game of the Year awards, and is designed to be quick and accessible for young players while offering enough light strategy to engage adults playing alongside children.

