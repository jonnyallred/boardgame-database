description: |
  Talisman: The Adventure is an expansion for the second edition of Talisman
  published by Games Workshop in 1986. It introduced the Adventure deck
  mechanic, significantly expanding the events and encounters players experience
  while traversing the Talisman board. New alignment cards affect how characters
  interact with each other depending on their moral alignment (Good, Neutral, or
  Evil). The expansion deepens the storytelling element of Talisman sessions and
  adds more variety and replayability to the base game's adventure card system.

