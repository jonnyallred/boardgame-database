description: |
  Ultimate Werewolf: Ultimate Edition is Ted Alspach's expanded take on the classic Werewolf social deduction party game, published by Bezier Games in 2008. Players are secretly assigned roles as either Villagers or Werewolves; each night the Werewolves silently eliminate a villager, and each day the village debates and votes to eliminate a suspect. With dozens of special roles — Seers, Masons, Witch, Drunk, and many more — the Ultimate Edition supports large groups and creates wildly varied experiences from game to game. It is one of the defining titles in modern social deduction gaming.

