description: |
  Samurai Spirit is a cooperative card game designed by Antoine Bauza, lovingly inspired by Akira Kurosawa's classic film Seven Samurai, in which 1-7 players take on the roles of brave samurai defending a village of farmers against relentless waves of bandits. Each of the seven samurai is named after a character from the film and has a unique power that transforms when they are pushed to the brink of defeat. Over three rounds, players manage their hands of enemy cards, deciding which attacks to absorb individually and which to pass on to protect the village, in an escalating test of cooperative resource management. Its compact design and strong thematic resonance make it a standout cooperative filler.

