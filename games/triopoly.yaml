description: |
  Triopoly is a three-dimensional Monopoly-style property trading game published by Reveal Entertainment in 1997. Instead of a single flat board, the game features three stacked boards of decreasing size, representing increasingly valuable tiers of real estate — from streets to shopping centers to skyscrapers. Players can choose to play on one, two, or three levels depending on how long they want the game to last. The three-level structure creates a vertical property empire-building experience within the classic roll-and-move trading game formula.

