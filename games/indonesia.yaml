description: |
  Indonesia is a sprawling economic game designed by Jeroen Doumen and Joris Wiersinga of Splotter Spellen, first published in 2005. Players build production companies that generate rice, spices, rubber, or oil, and shipping companies to transport those goods to cities across the Indonesian archipelago. Companies earn income for each good delivered but must pay shipping costs, creating complex profit calculations. Mergers allow players to absorb rivals' operations, and the evolving city-growth system ensures that the most lucrative trade routes shift throughout the game. Notorious for its brutal economic competition and minimal luck.

