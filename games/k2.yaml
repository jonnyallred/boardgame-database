description: |
  K2 is a hand management game where players control two mountaineers racing to summit the world's second-highest and most deadly peak. Each player has an identical deck of movement and acclimatization cards; the captain each round picks a weather tile affecting conditions for all climbers. Players must balance climbing speed against acclimatization — move too fast without adjusting and your climbers risk dying. The double-sided board and variable weather create four combinations of difficulty. Notable as the first Polish game ever nominated for the Spiel des Jahres, K2 offers a gripping survival tension rarely matched in its weight class.

