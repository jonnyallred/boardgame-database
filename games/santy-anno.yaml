description: |
  Santy Anno is a hilarious real-time pirate party game by Repos Production in which players are notorious pirates of the Santy Anno ship who, after a night of heavy drinking, have forgotten where their ship is or who their captain is. Each round, movement cards are revealed and all pirates simultaneously race to sit in front of their target ship — a frenetic competition of observation and speed. The game plays over 5 rounds, with the pirate earning the most gold at the end winning the title of captain. Its chaotic simultaneous action and pirate theme make it a lively and accessible party game for groups of 3-8 players.

