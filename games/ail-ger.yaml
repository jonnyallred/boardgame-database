description: |
  A traditional Mongolian folk game played with stones, representing a nomadic family settlement in miniature. Players arrange small circles of stones to depict a yurt, with interior stones representing furniture and stones of varying colors and shapes outside representing livestock animals. Reflecting the nomadic herding lifestyle central to Mongolian culture, the game carries symbolic significance—travelers who come across such a stone arrangement traditionally add a stone to symbolize a new animal, bringing good luck to the household. Some arrangements are said to have been renewed by passersby for centuries, blending play with ritual.

