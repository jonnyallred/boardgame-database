description: |
  The Lord of the Rings: The Fellowship of the Ring Trick-Taking Game is a 2024 cooperative trick-taking game published by Office Dog and distributed by Asmodee. Inspired by The Crew, players each take on the role of a Fellowship member with a unique objective—winning a set number of tricks, winning cards from specific suits, or avoiding certain tricks entirely. The game unfolds across 18 chapters that gradually introduce new mechanics, characters, and cards as the Fellowship's journey progresses. Its blend of cooperative trick-taking with a beloved theme and accessible rules makes it an outstanding filler game for fans of both The Crew and Tolkien's works.

