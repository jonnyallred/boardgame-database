description: |
  YVIO is a hybrid electronic-board game system that combines a physical game board with a
  dedicated electronic console featuring an LED display, SD card slot, and speaker. The launch
  game, Freibeuter der Karibik (Pirates of the Caribbean), casts players as merchant captains
  trading goods across the Caribbean to earn victory points. The YVIO console simulates real-time
  trade economics and voyage durations based on distance and ship equipment, bridging the gap
  between classic tabletop gameplay and video game complexity.

