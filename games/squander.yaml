description: |
  Squander (officially $QUANDER) is a reverse-Monopoly game published by Avalon Hill in 1965. Each player
  begins with a million "Squanderbucks" and the goal is to lose all your money first by making deliberately
  bad financial decisions. Players roll dice to move around a board loaded with ways to waste money — hotels,
  gold mines, stock market speculation, roulette, Monte Carlo, blackjack ("21"), and horse races. The satirical
  premise of racing to go broke first makes it a charming, comedic counterpoint to traditional wealth-building
  board games of the era.

