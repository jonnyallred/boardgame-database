description: |
  The American Revolution: 1775–1783 is a two-player strategic wargame designed by James F. Dunnigan
  and published by SPI in 1972. Notable for breaking with the hex-grid convention common to wargames
  of its era, the game uses an abstract area-and-region map of North America with territory-based
  movement and victory point values assigned to regions. One player commands British forces and the
  other the Continental Army under George Washington, managing strength-point counters across the
  entirety of the Revolutionary War. The game was published in a white box with a red stripe, with
  later editions featuring artwork by Alonzo Chappel.

