description: |
  Fantasy Realms is a fast hand-optimization card game for 3-6 players, designed by Bruce Glassco and published by WizKids, nominated for the Kennerspiel des Jahres 2021. Each player starts with seven cards from a 53-card deck of fantasy creatures, armies, artifacts, and wizards, and on each turn draws a card and discards one, always trying to maximize the combos between cards in hand at game end. Every card scores based on the other cards it is paired with — a dragon may be worth more with flame cards, a wizard may boost certain factions — creating a rich web of synergies to discover and exploit. The genius of Fantasy Realms is that its elegant two-action turn conceals enormous depth in evaluating which card combinations to pursue.

