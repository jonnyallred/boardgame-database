description: |
  Bul (also known as Buul, Puluc, or Boolik) is a traditional Mayan running-fight board game played particularly among the Maya peoples of Belize and the Guatemalan highlands. Players roll four kernels of corn — each marked black on one side — as dice, moving their pieces toward the opponent's base; when a piece lands on an enemy stone, the enemy is captured and placed beneath the capturer's stone. The game blends racing and capturing mechanics and represents one of the few surviving indigenous Mesoamerican board game traditions, documented by Stewart Culin in 1907.

