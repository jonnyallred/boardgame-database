description: |
  Formula 1 Grand Prix (also known as Grand Prix) is the American market equivalent of Waddingtons' 1962 Formula 1 board game, published by Parker Brothers. Nearly identical to the Waddingtons version, players race cars around a Formula One track but choose their own speed each turn rather than rolling for movement — dice are used only to determine penalties. Personal dashboards track speed, lap count, and wear. The game was a parallel release for the US market with essentially the same design by John Howarth and Trevor Jones.

