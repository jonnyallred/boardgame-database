description: |
  Inside Job mashes up trick-taking with social deduction by hiding a traitor among the
  cooperative players. Teams work together to complete mission-based trick-taking objectives,
  but one player secretly works to sabotage the group's efforts. Unlike standard social
  deduction games, the traitor's actions are constrained by the hand they're dealt, so
  suspicion builds through careful analysis of plays rather than simple accusations.
  The combination of cooperative card play and hidden betrayal creates a uniquely tense
  and replayable light game from Thames & Kosmos.

