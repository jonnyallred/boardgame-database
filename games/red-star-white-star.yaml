description: |
  Red Star/White Star: Tactical Combat in Europe in the 1970s is a Cold War tactical wargame published by SPI simulating hypothetical conventional warfare between NATO and Warsaw Pact forces in Central Europe. The game features detailed combat between infantry, armor, and supporting arms on hex maps representing Central European terrain, capturing the military technology and doctrine of both superpowers as it existed in the early 1970s. A serious simulation for wargamers interested in the potential Third World War scenario that dominated strategic thinking during the Cold War.

