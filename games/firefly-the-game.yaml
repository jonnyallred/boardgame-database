description: |
  Firefly: The Game is a licensed board game based on Joss Whedon's beloved TV series, published by Gale Force Nine in 2013. Players captain their own Firefly-class transport ship across a map of the 'Verse, hiring crew members, loading cargo, and taking on jobs — legal or otherwise — to earn enough to keep flying. The game faithfully captures the show's "space western" atmosphere with card drafting, open trading, and a rich narrative mission structure. Fans of the series will recognize iconic characters and locations, while the open-ended sandbox gameplay rewards creative route-planning and risk management.

