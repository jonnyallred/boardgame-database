description: |
  Utopia Engine is a free print-and-play solitaire dice game designed by Nick Hayes in 2010. Players take the role of Isodoros, an aged artificer on a desperate quest to reassemble the Utopia Engine — a legendary device that may be the only thing capable of preventing the world's imminent destruction. The game sends the lone player across six dangerous regions to recover the machine's six parts, using simple dice mechanics to simulate wilderness exploration, activating powerful artifacts, and combat encounters. Requiring only two six-sided dice, a pencil, an eraser, and a printed adventure sheet, it is a compact and tense survival puzzle.

