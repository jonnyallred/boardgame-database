description: |
  Monte Rolla is a light family dice game played on a raised board with hollowed sections to guide marble pieces. Players roll dice to move marbles representing climbers ascending from a lake at the bottom toward the mountain peak. Landing on an occupied space sends the occupant rolling back down to the lake, forcing them to start the climb again. The combination of dice luck and satisfying physical marble movement makes it an accessible and entertaining game for young children.

