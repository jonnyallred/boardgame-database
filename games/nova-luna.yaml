description: |
  Nova Luna is a serene yet deeply tactical tile-placement game co-designed by Uwe Rosenberg (inspired by Corné van Moorsel's Habitats), published by Edition Spielwiese in 2019. Players select lunar tiles from a circular moon wheel using a time-track turn order mechanism — the player furthest behind always goes next, and each tile shows how far it advances your marker. Tiles must be placed adjacently and each carries color-coded tasks requiring neighboring tiles of specific colors to complete; finishing a task lets you place one of your scoring discs. The first player to place all their discs wins, making it a race game wrapped in a meditative tile puzzle.

