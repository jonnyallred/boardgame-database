description: |
  Heroica: Fortaan is a LEGO Games dungeon crawler released in 2011 as part of the expandable LEGO Heroica line. Set in a castle environment with a throne room and gated corridors, players move through rooms on a grey LEGO brick grid, collecting treasure and fighting enemies through simple dice rolls, with results triggering either movement or special weapon abilities. Instead of character sheets, players manage equipment in physical "backpacks" — a charming physical representation that matches the LEGO building theme and makes the game appealing to young children.

