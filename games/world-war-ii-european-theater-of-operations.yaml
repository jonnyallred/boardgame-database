description: |
  World War II: European Theater of Operations 1939-1945 is a strategic-level hex wargame originally designed by Jim Dunnigan and revised by Jeff Ealy in 1985, covering the entirety of the European theater from the invasion of Poland to Germany's defeat. Each game turn represents three months, with phases for movement, combat, mechanized movement, rail and naval logistics, reinforcements, partisan activity, and production. The game incorporates air and naval operations, strategic bombing, economic production, and army group command rules, making it one of the more comprehensive strategic-level treatments of the conflict in a manageable format.

