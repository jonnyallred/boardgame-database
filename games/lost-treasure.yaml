description: |
  Lost Treasure is a family board game published by MB Games in which players compete as treasure hunters navigating a map to find and collect hidden treasure before their opponents. Players roll dice and move their pieces around the board, flipping tiles or cards to discover whether a location holds treasure or a trap. The simple race-and-collect format and light randomness make it accessible to young players, while the theme of adventure and discovery gives it appealing flavor. A product of the MB Games golden era of family gaming in the early 1980s.

