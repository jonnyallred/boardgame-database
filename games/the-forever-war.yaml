description: |
  The Forever War is a 1983 Mayfair Games board game based on Joe Haldeman's acclaimed science
  fiction novel of the same name about humanity's millennia-spanning war against the alien Taurans.
  The two-player tactical game simulates squad-level infantry combat in space, with soldiers fighting
  across vast distances while relativistic time dilation means warriors return from battle to find
  centuries have passed at home. Ten scenarios cover key engagements from the novel, and a point-
  value chart allows players to design custom scenarios. The hex-and-counter system captures the
  novel's theme of impersonal, technologically overwhelming warfare.

