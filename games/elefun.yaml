description: |
  Elefun is a preschool dexterity game published by Milton Bradley in which a motorized elephant figure blows nylon butterflies up through its four-foot trunk and into the air. Players 3 and older scurry around with nets to catch butterflies as they drift and fall. The player who catches the special blue butterfly earns a token, as does whoever collects the most butterflies after the elephant finishes blowing; the first player to accumulate three tokens wins. The delightful spectacle of butterflies flying through the air makes it an ideal first game and a perennial favorite for young children.

