description: |
  Escape from New York is a 1981 adventure board game published by TSR, Inc. and based on John Carpenter's dystopian thriller film of the same year. Players take on the role of Snake Plissken and his allies, navigating the prison island of Manhattan to rescue the kidnapped President of the United States or recover the critical cassette tape he carries. Players collect clue cards revealing the locations of these objectives while avoiding dangerous hazards throughout the board. Designed by Harold Johnson and David Cook with iconic illustrations by Erol Otus and Bill Willingham, the game was created using only the film's advance press kit as source material.

