description: |
  Bears vs Babies is a monster-building card game created by Elan Lee and Matthew Inman
  (of The Oatmeal) — the same team behind Exploding Kittens — and funded through a
  Kickstarter campaign that raised over $3.2 million. Players build increasingly bizarre
  creatures by attaching body parts, weapons, and accessories, then send them into battle
  against a horde of terrible babies. The game lasts about 20 minutes and rewards
  creative combinations and timely aggression with hilarious illustrated cards.

