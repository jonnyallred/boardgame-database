description: |
  Firenze is a 2-4 player strategic card and resource management game designed by Andreas Steding, set in Florence during the 12th to 14th centuries when rival noble families competed to build the tallest towers as symbols of prestige and power. Players use colored brick cards as currency to construct towers of different heights, earning favor from the city's leading families and the church. Cards serve double duty — they can aid tower construction or be used to sabotage opponents' works — creating constant decisions about when to build versus when to disrupt. A second edition was released in 2018, bringing the game to a wider audience, and the theme of architectural rivalry gives it a distinct historical flavor among Euro games.

