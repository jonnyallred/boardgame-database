description: |
  Ogre is an asymmetric two-player sci-fi wargame designed by Steve Jackson and first published in 1977 as one of the earliest "microgames," pitting a single enormous cybernetic tank called the "Ogre" against a conventional defensive force including tanks, infantry, and artillery protecting a command post. One player commands the unstoppable Ogre — a giant robot bristling with nuclear weapons — while the other commands a larger but individually weaker defensive army trying to stop it. Set in the late 21st century when hovercraft and tactical nukes define battlefield warfare, the game's elegant asymmetry and fast play time made it enormously influential. More than 200,000 copies have been printed across multiple editions, and Ogre remains one of Steve Jackson's defining designs.

