description: |
  Castle Panic is a cooperative fantasy tower defense game for one to six players designed by Justin De Witt and published by Fireside Games in 2009. Players share a hand of colored attack cards and must trade strategically to ensure someone can strike the waves of goblins, orcs, and trolls charging from the forest toward the castle towers in the center. All players win or lose together, but the player who slays the most monsters earns the title of Master Slayer. Its accessible rules, tense escalating pressure, and multiple difficulty modes make it an excellent gateway cooperative game.

