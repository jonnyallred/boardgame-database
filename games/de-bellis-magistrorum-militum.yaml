description: |
  De Bellis Magistrorum Militum (DBMM) is a miniature wargame ruleset authored by Phil Barker of Wargames Research Group, serving as the successor to the popular DBM (De Bellis Multitudinis) system. Covering the period from 3000 BC to 1525 AD, DBMM can simulate historical battles or generate custom scenarios from small skirmishes to massive engagements using miniature figures in any scale from 2mm to 30mm. With over 300 army lists available and an emphasis on generalship over rules manipulation, DBMM is one of the most comprehensive and demanding ancient-to-medieval wargame systems in existence, with roots in decades of playtesting through DBA, DBM, and its current iteration.

