description: |
  Dust is a 2007 area control strategy board game from Fantasy Flight Games with artwork by Paolo Parente, set in an alternate science fiction history where unending world war and new technologies have drastically altered global geopolitics. Players seize power sources and capitals, develop infrastructure, and build vast high-tech armies in a global conflict for domination. Praised for its creative alternate history setting and streamlined but strategically deep approach to the "Risk-style" conflict model, the game represents an early entry in the Dust universe that later expanded into miniatures wargame territory.

