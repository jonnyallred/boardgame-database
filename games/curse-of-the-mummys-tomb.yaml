description: |
  Curse of the Mummy's Tomb is a board game published by Games Workshop in 1988 in which 1-4 players explore a three-dimensional Egyptian pyramid in search of the mythical Elixir of Life. The game's three-tiered board represents the Pyramid of Khonsu, with players racing through progressively smaller levels to reach the Chamber of Osiris at the top. Along the way, explorers face traps, curses, and other hazards from the restless undead. A visually distinctive product of the late 1980s Games Workshop era, it blended Egyptological adventure with light horror in a family-friendly format.

