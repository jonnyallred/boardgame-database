description: |
  Speed Circuit is a Formula 1 racing game originally published by 3M in 1971 and later republished by Avalon
  Hill. Players secretly record their speed each turn — maintaining, accelerating, or braking within the car's
  limits — and cars move across the track in proportion to their chosen speed, with the leader moving first.
  This programmed movement mechanic rewards precise speed management through corners and tactical blocking on
  circuits like Monaco, Monza, and Watkins Glen, making it a skill-heavy racing simulation well ahead of its time.

