description: |
  If Wishes Were Fishes! is a light set collection and trading game designed by Peter Sarrett and Michael Adams, published by Rio Grande Games in 2007. Players are fishermen competing to catch and trade fish in a harbor market, negotiating with other players to complete sets and score the most points. The trading element is central to the game, and players must balance their own needs with what they are willing to give away to the harbor or other players. The game plays quickly and rewards both deal-making and card management.

