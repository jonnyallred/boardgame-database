description: |
  Dune is a 1979 strategy board game by Bill Eberle, Jack Kittredge, and Peter Olotka, published by Avalon Hill, set in Frank Herbert's Dune universe. Up to six players each control an asymmetric faction — including House Atreides, the Harkonnen, the Bene Gesserit, the Fremen, the Spacing Guild, and the Emperor — each with unique powers and alternative victory conditions. Players move forces across a map of Arrakis to control key strongholds, while a recurring sandstorm sweeps the board and spice blow refreshes resources each turn. A hidden traitor mechanic allows players to secretly recruit enemy leaders onto their payroll, enabling automatic victory in certain combats. Widely regarded as a masterpiece of asymmetric design and negotiation-heavy multiplayer gaming, the game was reprinted by Gale Force Nine in 2019.

