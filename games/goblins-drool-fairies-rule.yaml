description: |
  Goblins Drool, Fairies Rule! is a rhyming card game for 1–4 players designed by David Luis Sanhueza and illustrated by Mike Maihack, published by Game Salute in 2013. Players collect matching sets of eight fantastical creatures while trying to avoid the Goblin, using colorful illustrated cards and simple hand-management rules accessible to young children. The game's unique feature is that every card name rhymes with another—balancing the Goblin against Fairy cards through whimsical verse. Its charming art and lightweight rules make it equally appealing to preschoolers and adults seeking a breezy filler.

