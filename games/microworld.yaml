description: |
  Microworld is a two-player abstract strategy game designed by Mario Chiacchiera and published by Cranio Creations in 2016, in which one player controls invading germs and the other commands the immune system's antibodies. Players alternate placing tiles on the board, scoring points for neighboring tiles they control and competing for area majority at the end of the game. Special tokens with unique abilities add tactical variety to each session. Modular rules allow additional complexity through thematic scenarios, making the game scalable for both newcomers and experienced players.

