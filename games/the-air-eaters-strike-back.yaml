description: |
  The Air-Eaters Strike Back! is a microgame (MetaGame #1) published by Metagaming Concepts in 1981,
  serving as a sequel to Invasion of the Air-Eaters. The game is a compact hex-and-counter strategic
  simulation of an alien invasion that has expanded beyond Earth to encompass the inner solar system
  in the 21st century, with turns representing three-month intervals. Planets move in their orbits
  and spaceships travel between planetary bodies, giving the game a realistic spatial quality unusual
  for games of its era. The small format made it part of Metagaming's influential microgame line,
  which pioneered affordable, fast-playing wargames.

