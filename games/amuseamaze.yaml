description: |
  AmuseAmaze is a 2007 word-race game set on a letter maze board, recognized as a Top 10 New Game
  at Toy Fair 2007. Players move pawns through an 18-part modular board — providing over 6 billion
  possible configurations — spelling words by tracing paths through adjacent letters printed on the
  board and on letter tiles.

  The race element adds urgency: players compete to navigate the hedge maze while forming valid
  words, combining spatial pathfinding with vocabulary skills. The massive number of board
  combinations ensures high replayability in a compact, family-friendly package.

