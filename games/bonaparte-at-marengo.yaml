description: |
  Bonaparte at Marengo is a two-player wargame designed by Bowen Simmons and published
  by Simmons Games in 2005, simulating the 1800 Battle of Marengo during the War of the
  Second Coalition. Rather than a conventional hexagonal grid, the game uses a unique
  polygon-based map to regulate movement and combat, achieving the look and feel of
  19th century linear warfare. The game's wooden block pieces and clean design depart
  from almost all standard wargaming conventions, and it won the Charles S. Roberts
  Award for Best Pre-World War II Boardgame of 2005.

