description: |
  Bầu Cua Cá Cọp (Gourd, Crab, Fish, Tiger) is a Vietnamese gambling dice game traditionally played during Tết (Lunar New Year) celebrations. Three custom dice each bear six symbols — a gourd, crab, fish, tiger, rooster, and shrimp. Players bet on which symbols will appear, then the banker rolls the dice; bets on matching symbols pay 1:1 for each matching die face, up to 3:1 if all three dice show the same symbol. Simple, fast, and social, it is one of the most popular festive games across Vietnam, with beautifully illustrated versions often used as decorative objects.

