description: |
  Belter: Mining the Asteroids, 2076 is a science fiction economic game designed by
  Frank Chadwick and Marc Miller and published by GDW in 1979, set in the asteroid belt
  in the late 21st century. Players control mining companies competing to extract ore,
  natural gas, and dangerous contra-terrene matter from asteroids, then trade commodities
  for credits at three major planetoid stations. The game blends economics, power politics,
  and combat in a hard science fiction setting.

