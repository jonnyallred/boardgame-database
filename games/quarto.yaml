description: |
  Quarto is a two-player abstract strategy game invented by Swiss mathematician Blaise Muller and published by Gigamic since 1991. The 16 pieces differ in four binary attributes — height, color, shape, and solidity — and a player wins by completing a row, column, or diagonal of four pieces sharing any common attribute. The defining twist: your opponent chooses which piece you must place each turn, making every move both an offensive placement and a gift to your rival. An award winner in over 17 countries including MENSA Select in 1993, Quarto is considered one of the finest abstract games ever designed.

