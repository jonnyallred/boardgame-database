description: |
  Eson xorgol (Mongolian/Kazakh for "nine balls") is a traditional mancala game played by the Kazakh minority in the Bayan-Ölgii province of northwestern Mongolia. The game is played on a board with two rows of five holes, each starting with nine dung balls (giving the game its name), making it one of the largest mancala variants in terms of starting pieces. As a folk game first formally described in 1963, it has no credited designer or commercial publisher. Players alternate sowing balls around the board, capturing opponents' pieces according to traditional mancala rules, in a deeply strategic two-player abstract contest.

