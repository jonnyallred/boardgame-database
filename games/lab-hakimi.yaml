description: |
  La'b Hakimi ("Rational Game") is a Syrian mancala game documented in Damascus cafes in the 19th century by ethnographer Stewart Culin, closely related to Al-manqala, the Palestinian mancala tradition. Played on a wooden board with two rows of pits, players begin with seven seeds per pit and sow counter-clockwise, capturing when the last seed creates a group of two or four. A chain capture rule extends captures to consecutive pits with 2 or 4 seeds before the point of capture, creating deep reading opportunities. The wooden boards were traditionally made of olive oil-soaked oak covered with tar, with white beads as playing pieces.

