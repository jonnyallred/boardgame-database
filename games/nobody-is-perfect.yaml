description: |
  Nobody is Perfect is a bluffing party game by Bertram Kaes, published by Ravensburger in 1992. Each round the active player draws a card with an obscure term or unusual event, reading the true definition only to themselves, while all other players write convincing fake definitions. All answers — real and invented — are read aloud, and players bet chips on which one they believe is correct; convincing others with your fabrication scores additional points. The game rewards creative writing, deadpan delivery, and a good sense of what sounds plausible, making it an excellent social game for adults who enjoy wordplay and light deception.

