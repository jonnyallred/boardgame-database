description: |
  Egizia is a worker placement and resource management game designed by the Italian collective Acchittocca (Flaminia Brasini, Virginio Gigli, Stefano Luperto, and Antonio Tinto), originally published by Hans im Glück in 2009 with Rio Grande Games handling English distribution. Players pilot boats down the Nile River to claim spaces and gather resources, using them to construct Egypt's famous monuments including the Sphinx, pyramids, obelisks, and temples. A key constraint is that boats can only move downstream, meaning early placement decisions limit which spaces remain available — creating fascinating tension between short-term resource gains and long-term strategic positioning. The game was reimplemented as Egizia: Shifting Sands in 2020.

