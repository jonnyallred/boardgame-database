description: |
  Masters of Crime: Vendetta is a cooperative deductive murder mystery game by Thames & Kosmos set in New York's criminal underworld. Players are mafia insiders tasked with uncovering the mole who caused the godfather's eldest son's death, navigating a branching choose-your-own-adventure narrative driven by a deck of cards, hidden clue documents, and real online resources including voice messages, maps, and websites. Players make decisions that alter the story's course and must solve escape-room style puzzles to progress. Part of the Masters of Crime series alongside Shadows, Vendetta delivers 120–240 minutes of atmospheric crime-thriller play.

