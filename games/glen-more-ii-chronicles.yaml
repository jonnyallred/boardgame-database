description: |
  Glen More II: Chronicles is a 2-5 player tile-placement game by Matthias Cramer, published in 2019 as a sequel and significant expansion of the original Glen More. Players build Scottish clan territories by claiming tiles from a time-track rondel — the last player in line takes a tile and advances as many spaces as desired, with each placed tile activating itself and all neighboring tiles to produce resources, points, and other effects. The "Chronicles" subtitle refers to eight modular expansion sets that can be mixed into the base game, introducing famous Scottish figures as person tiles with unique ongoing abilities, dramatically expanding strategic options and replayability. The core tile-activation engine is deeply satisfying, rewarding players who build densely interconnected territories.

