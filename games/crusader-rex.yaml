description: |
  Crusader Rex is a two-player block wargame published by Columbia Games, simulating the Third Crusade in the Holy Land with one player commanding the Christian Franks and the other the Muslim Saracens. Using Columbia's signature wooden block system, each player's forces are hidden from their opponent until contact, creating realistic fog of war as armies maneuver across a map stretching from Antioch to Egypt. Key cities like Jerusalem, Acre, and Damascus serve as victory objectives, and the game includes historical features such as siege warfare, knight charges, and harrying tactics. Its brief rulebook and built-in hidden information make it one of the most accessible entry points into Columbia's acclaimed block wargame system.

