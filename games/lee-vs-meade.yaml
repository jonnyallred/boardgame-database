description: |
  Lee vs. Meade is a strategic wargame covering the period of the American Civil War between Gettysburg (1863) and the Overland Campaign (1864), focusing on the campaigns of the Army of Northern Virginia under Lee against the Army of the Potomac under Meade. The game covers the Mine Run Campaign and other operations during this relatively quieter operational period, examining the strategic choices available to both commanders as they maneuvered for position. Published by Victory Games as part of their Civil War simulation series, it offers an operational look at a less frequently simulated phase of the Eastern Theater.

