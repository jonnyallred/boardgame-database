description: |
  Pirate and Traveler is a classic world-travel board game by Milton Bradley, originally published in 1911 with editions through 1970. Players draw Travel Cards dictating journeys and spin a wheel to determine movement along routes based on real railroad and steamship lines connecting major global cities. The game plays in two phases: first as Travelers completing ten journeys around the world map, then all players become Pirates racing to deposit cards at the Pirate's Goal in Greenland — and stealing cards from opponents along the way. The player with the highest point value in deposited cards wins. A charming early educational game that introduced children to world geography through playful adventure.

