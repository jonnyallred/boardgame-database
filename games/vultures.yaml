description: |
  Vultures is a 1987 card game published by Henry Games in which two to four players take on the roles of vultures competing to claim carcasses scattered across the table. Players are dealt a hand of cards that can be Flight, Fight, Carcass, and Waddle types, using them to outmanoeuvre rivals and secure the most valuable carrion. The game's simple mechanics and darkly humorous animal theme make it an approachable filler for casual game nights. As a small-press game from the late 1980s, it occupies a niche in the history of American card game design.

