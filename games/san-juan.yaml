description: |
  San Juan is a streamlined card game adaptation of the critically acclaimed Puerto Rico, designed by Andreas Seyfarth and published by Alea in 2004. Players build a colonial city by constructing buildings from a 110-card deck that serves triple duty as the card supply, building cost (discarded to pay), and victory point tracker. The role-selection mechanic from Puerto Rico is preserved: each round one player chooses from roles like Builder, Producer, and Trader, with all players taking part but the selecting player gaining a bonus. San Juan distills Puerto Rico's economic engine-building into a fast, elegant card game that plays in under an hour.

