description: |
  Rubik's Puzzle Match (also known as Rubik's Match) is a fast-paced competitive card game licensed from the Rubik's Cube brand. Players each hold a set of Cubie Cards representing colored cube faces, and must race to arrange their cards to match a pattern shown on a revealed Challenge Card. The first player to collect three Challenge Cards wins. The game scales in difficulty with separate Level 1 cards recommended for younger children and first-time players. True to the Rubik's brand, it distills the spatial color-matching challenge of the famous cube into a quick competitive card format.

