description: |
  Australia is a card-driven area-control game set in 1920s Australia where players act as politicians directing Rangers to establish national parks and develop industrial projects. Each player holds a hand of cards and uses them to move Rangers to different regions of the continent, claiming majorities and earning points from conservation and industry objectives. The tension between advancing industrial interests and protecting wilderness gives the game a thematic flavor. Designed by Michael Schacht and published by Ravensburger in 2005, it rewards careful hand management and area positioning.

