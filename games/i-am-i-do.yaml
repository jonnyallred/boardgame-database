description: |
  I Am, I Do is a social party game in which players make statements about themselves and their habits, and other players try to guess or match the answers. The game encourages players to learn new things about their friends and family while competing to be the best predictor of others' behaviors and self-descriptions. It is designed as a quick icebreaker suitable for casual game nights and family gatherings.

