description: |
  The King's Dilemma is a legacy narrative game designed by Lorenzo Silva and Hjalmar Hach in which
  players are noble houses on the King's Council, voting on dilemmas that shape the kingdom's fate.
  Each session, one player reads a dilemma card that presents a historical-flavored moral or political
  choice, and all players secretly bid power tokens for or against each option before revealing.
  Houses have secret victory conditions tied to different kingdom metrics, creating natural conflicts
  of interest. Stickers applied to the board after each session permanently alter the kingdom, and
  new dilemma cards are added based on prior outcomes. No two campaigns will play out the same,
  as the branching storyline leads to many possible endings.

