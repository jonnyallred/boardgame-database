description: |
  Cosmail is a trading and logistics board game playable by 3 to 6 players plus a game master, with each player operating two planes and one ship. Movement is determined by spending fuel resources — gas for planes or coal for ships — along travel routes marked with costs, with players able to travel between neighboring locations or bridge non-adjacent ones within resource limits. Goods are acquired by filing purchase options at harbors and then physically collecting merchandise with ships before rival players can intercept. The competitive trading system and dual-mode transport create a rich economic puzzle.

