description: |
  Nanuk is a fast-playing social bluffing game for 5–8 players published by Steve Jackson Games, themed around Inuit hunters in the Arctic. Each round players engage in a bidding escalation, each boast about what they will bring home from the hunt required to exceed the previous; when one hunter refuses to raise the bid, they become the Lead Hunter and the others secretly choose to help or sabotage the expedition. Success or failure is then revealed, with the great polar bear Nanuk ever-threatening to end any hunt in disaster. The game rewards reading your fellow players and judging when to call a bluff.

