description: |
  Strange Synergy is a 2003 Steve Jackson Games combat game of "bizarre battles" in which teams of warriors with randomly assigned superpowers, mutations, skills, and gadgets clash in arena-style combat. Each warrior starts with three different Power Cards from a 100-card deck, creating wildly varied combinations each game. Players secretly choose which enemy flag to capture, then take turns moving warriors and resolving combat using dice and card abilities. The game's appeal lies in the unpredictable synergies between randomly combined powers, creating a unique experience each session.

