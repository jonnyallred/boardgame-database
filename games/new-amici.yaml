description: |
  ¡New Amici! is a language-learning board game designed to help players practice foreign languages
  through gameplay. Players who speak different languages can play together — for example, native
  German speakers learning English can play alongside native English speakers learning German,
  with both benefiting simultaneously. Developed in Norway in 2002 by musician Lakki Patey, it
  was nominated for Game of the Year in the Netherlands in 2006 and released commercially in 2004.

