description: |
  La-Trel is a 1994 abstract strategy game by Richard Morgan played on a standard chessboard that combines elements of chess and draughts. The game features four piece types — Defenders, Sabers, Tridents, and Warriors — each with distinct movement and combat capabilities. Attacker pieces defeat opponents by jumping over them, introducing a checkers-style capture mechanism into a chess-like positional game. La-Trel was nominated for the 1996 Spiel des Jahres award, recognizing it as a notable addition to the abstract strategy genre of the mid-1990s. Published by ASS Altenburger and later by Millennium 2 Games.

