description: |
  Gears of War: The Board Game is a 1-4 player fully cooperative dungeon-crawler-style board game designed by Corey Konieczka and based on the popular Xbox franchise. Players take on the roles of COG soldiers fighting their way through modular tile missions against the AI-driven Locust horde, using clever deck-based enemy AI cards to create dynamic and challenging opposition without a dedicated game master. The game features over 30 plastic miniatures, custom dice for attacks and defense, and mission-based campaign structure. It is particularly noted for its elegant solo-play implementation and its faithful translation of the video game's squad-level tactical feel.

