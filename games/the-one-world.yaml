description: |
  The One World is a 1984 Aztec Empire wargame published by Simulations Canada in a limited run of 1000 copies, designed by Peter Hollinger and Stephen Newberg. Four to six players command the competing nations of the Mexican Basin—Tepanscapan, Acolhuacan, Tlahuican, Chalco, Tlateputzco, and Mexica—across the period 1426-1501, vying for dominance through military conquest, religion, and political maneuvering. The game captures the complex multipower dynamics of pre-Columbian Mesoamerica leading up to the rise of the Aztec Triple Alliance. Its rarity and the uniqueness of its historical setting make it prized among collectors of vintage wargames.

