description: |
  Kings of War is a fantasy mass-battle miniature wargame published by Mantic Games, designed by Alessio Cavatore who previously worked on Games Workshop's Warhammer and Lord of the Rings systems. Set in the expansive world of Pannithor, players command armies of Elves, Dwarves, Undead, Orcs, and many other factions in large-scale tactical battles using ranked unit formations. The game is notable for streamlined rules compared to Warhammer, focusing on decisive tactical play and army-building depth. Now in its 4th edition, it receives annual updates through the "Clash of Kings" supplement series.

