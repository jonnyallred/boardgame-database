description: |
  Lentokilpailu-peli ("The Air Race Game") is a Finnish board game from the early 20th century in which players race aircraft around a course using dice rolls to determine movement. Published during an era of great public enthusiasm for aviation following pioneering flights and air races, the game likely features a simple track-racing format themed around early aviation competitions. Finnish-language board games from this period reflected the country's growing board game industry and popular cultural interests of the time. Limited documentation is available outside Finnish-language sources about this specific title.

