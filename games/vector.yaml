description: |
  Vector is a minimalist abstract strategy game published around 1969 by Plan B Corp and later by FX Schmid. The entire game revolves around a single movable piece on a board: players use cards to direct the piece to land on squares of varying point values or score by guiding it through a goal. The game's tension comes from bluffing opponents into sending the piece to less valuable positions while manoeuvring it toward high-scoring squares yourself. Its extreme simplicity makes it an accessible two-player filler for all ages.

