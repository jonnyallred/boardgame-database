description: |
  Ticket to Ride: London is a compact, fast-playing entry in the Ticket to Ride Cities line set on a 1970s map of London. Players race to claim bus routes and connect districts of the British capital, scoring bonus points for fully connecting districts. The streamlined rules deliver the core Ticket to Ride experience — collect cards, claim routes, complete Destination Tickets — in under 15 minutes, making it an ideal filler or introduction to the series.

