description: |
  Caesar & Cleopatra is a two-player card game designed by Reiner Knizia and first published in 1997, with over 350,000 copies sold. Players represent Caesar and Cleopatra competing to influence five groups of Roman officials — Aedils, Quaestors, Senators, Pretorians, and Censors — by playing numbered influence cards either face-up or face-down, with action cards like Assassins and Scouts adding tactical disruption. After voting cards trigger scoring for each group, the player who has won the most official factions claims victory. The interplay of hidden and revealed information gives this compact game lasting depth.

