description: |
  Catch Phrase is an electronic word-guessing party game designed by Craig Clark Williamson and first published by Parker Brothers/Hasbro in 1994. Teams alternate having one member try to get teammates to guess a word or phrase displayed on a disc, providing any clues except rhymes, initials, syllable counts, or partial words; the disc is passed between teams after each successful guess, and the team caught holding it when the buzzer sounds scores a point for the opposing team. The frantic passing of the hot-potato disc as the timer ticks down creates edge-of-your-seat excitement and works brilliantly at large parties.

