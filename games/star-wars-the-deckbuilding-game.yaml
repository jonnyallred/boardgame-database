description: |
  Star Wars: The Deckbuilding Game is a 2023 two-player head-to-head deckbuilder from Fantasy Flight Games designed by Caleb Grace. Players choose sides as the Empire or the Rebels, starting with basic decks and strengthening them over the course of the game to destroy each other's bases. A Balance of the Force track rewards the player who gains more Force with bonus resources each turn. The first player to destroy three of their opponent's bases wins. The streamlined design makes it fast and accessible while maintaining meaningful tactical decisions.

