description: |
  Safari Jack is a tile-laying card and board game designed by James Ernest and published by Cheapass Games in 1998. Players build a safari landscape from square cardboard tiles representing different terrain types — Cave, River, Jungle, and Savannah — with each terrain type supporting different animals available for hunting. Movement is limited to adjacent tiles of the same terrain, forcing players to carefully plan their routes across the ever-expanding landscape to reach the most valuable prey. The classic Cheapass Games format provides a low-cost, high-gameplay experience built from minimal components.

