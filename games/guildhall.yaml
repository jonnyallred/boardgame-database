description: |
  Guildhall is a 2-4 player set collection card game designed by Hope S. Hwang, published by AEG in 2012, in which players build chapters of six professions — dancer, historian, assassin, trader, weaver, and farmer — across five color groups. The key innovation is that each profession card grants an ability when played, and the power of that ability scales with how many cards of that profession are already in your Guildhall chapter. Complete chapters of all five colors can be traded in for victory points, but cashing in resets the ability, creating a tension between using powers and capitalizing on them. Players also use their abilities to disrupt opponents' chapters, making Guildhall a competitive, interactive affair.

