description: |
  China's War: 1937-1941 is Volume XIII in GMT Games' COIN series, designed by Brian Train and published in 2025, covering the opening phase of the Second Sino-Japanese War. Up to four players take the roles of Japan, the Nationalist Guomindang government, the Chinese Communist Party, and the Warlords, each pursuing different military, political, and economic objectives through the insurgency-focused COIN system. Each faction uses a distinctive mix of actions to control populations, extract resources, and achieve their unique victory conditions. The game supports solitaire, two-player, three-player, and full four-player modes, offering extensive replay value through its asymmetric factions.

