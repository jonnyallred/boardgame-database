description: |
  Nuclear Destruction is a satirical card game in the Nuclear War series published by Mr. B Games, described as the fourth entry in the long-running Nuclear War card game family originally created by Douglas Malewicki. Compatible with the classic Nuclear War game, it extends the apocalyptic card game experience with new weapons, delivery systems, and catastrophic events for players to unleash upon each other's populations. Like its predecessors, the game revels in dark humor about mutually assured destruction, with players racing to eliminate each other's millions of citizens while facing the possibility that even the last survivor perishes in the retaliatory fallout. It maintains the same chaotic and social gameplay that has made the Nuclear War series a cult classic for over five decades.

