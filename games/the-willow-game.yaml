description: |
  The Willow Game is a 1988 asymmetric board game designed by Greg Costikyan and published by Tor Books, based on the Ron Howard fantasy film Willow. Players divide into two teams: Good characters (led by Willow) must protect the baby Elora Danan by searching the board for Places of Power, collecting treasures, and finding allies to keep her from harm; Evil players (serving the sorceress Bavmorda) patrol the board fighting Good characters and trying to capture the baby and bring her to Nockmaar Castle. The game captures the movie's adventure-quest atmosphere in a simple dice-and-card driven format that served as a tie-in to the film's theatrical release.

