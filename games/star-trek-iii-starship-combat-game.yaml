description: |
  Star Trek III Starship Combat Game is a 1984 board wargame published by FASA as a companion to the release
  of Star Trek III: The Search for Spock. The game includes four mini-games simulating starship battles featuring
  vessels from the original Star Trek TV series and films, including the Klingon Bird of Prey. Combat is resolved
  with ten-sided dice and silhouette counters, covering phaser duels and photon torpedo exchanges. It is
  essentially a cleaned-up and expanded version of the Star Trek II combat rules in booklet form.

