description: |
  Voyages is a roll-and-write seafaring adventure game designed by Matthew Dunstan and Rory Muldoon, published by Postmark Games in 2022. Players roll three dice each turn and allocate them to determine direction, distance, and ship duties as they chart their solo route across a single-sheet ocean map. The goal is to explore islands, trade cargo, and defeat the Dread sea creature before exhausting your cards. Funded successfully on Kickstarter as a print-and-play game, Voyages offers a surprising depth of tactical routing decisions within its compact, elegant roll-and-write framework.

