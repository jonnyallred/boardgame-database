description: |
  The Mansion of Happiness is a 1800 British moral racing game designed by George Fox and first published by Laurie and Whittle, making it one of the first known board games with a credited designer. Players race around a 66-space spiral track depicting virtues such as piety and honesty that advance players, and vices such as ingratitude and immodesty that set them back, all aiming to reach the Mansion of Happiness at the track's end. The game was the first mass-produced board game in America when Q. & S. B. Ives published it in 1843, and it remained in continuous publication for over 126 years, profoundly influencing the development of the American board game industry.

