description: |
  Intent to Kill is a 2024 asymmetric deduction game pitting one player as a secretive murderer against another playing a detective in a noir-tinged crime thriller. The murderer commits five murders following a hidden motive, intimidating civilians to prevent questioning and masking their identity. After the fifth murder, the detective must correctly identify both the murderer and the motive to win — one wrong guess and the killer walks free. The murderer's phase of intimidating and selecting victims creates a tense information game, while the detective must balance logic, probability, and social observation to unravel the pattern.

