description: |
  Bisca is a traditional Portuguese trick-taking card game closely related to the Italian
  Briscola and Spanish Brisca, played with a shortened 40-card deck (standard 52-card
  deck with 8s, 9s, and 10s removed). Aces count 11 points and the 7 (the bisca or
  manilha) counts 10 points, with all 120 points distributed among captured tricks.
  The first player or team to accumulate 61 points wins a hand; matches are typically
  played to the best of seven games. The game remains popular throughout Portugal and
  Brazil as a social card game.

