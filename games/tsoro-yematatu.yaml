description: |
  Tsoro Yematatu is a traditional two-player abstract strategy game from Zimbabwe. Players first place their three pieces alternately on a star-shaped board, then move them along lines to achieve three-in-a-row — the winning condition. Pieces may jump over opponents without capture, adding a layer of tactical depth beyond standard tic-tac-toe variants. It is closely related to games such as Shisima, Achi, and Tapatan found across Africa and the world, and represents a living tradition of Indigenous abstract gameplay from southern Africa.

