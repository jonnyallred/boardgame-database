description: |
  Chopstick Dexterity MegaChallenge 3000 is a frantic real-time dexterity game published by Mayday Games, themed as a Japanese TV game show promoting chopstick use among youth. Each round, a disk token is revealed indicating a specific shape (shrimp, tentacle, nigiri, onigiri, or sushi roll) in a specific color, and all players simultaneously race to grab the matching wooden piece from a shared bowl using only chopsticks. The fastest player wins the disk. With 25 shape pieces, 35 disk tokens, and included chopsticks, CDMC 3000 delivers hilarious, fast-playing competition for groups of all ages.

