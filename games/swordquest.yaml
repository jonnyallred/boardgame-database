description: |
  Swordquest is a fantasy board game for two or three players published by Task
  Force Games in 1979. Good and evil forces — led by a white wizard and a
  sorcerer respectively — search the land of Tiirane for the lost Sword of
  Lumina. The good team seeks to destroy the sword in fires near the evil
  citadel, while the evil team wants to possess it; an optional third player
  controls druids who seek to restore balance. Drawing heavily on Tolkien's
  influence (featuring dwarves, elves, a dragon, and Wrog creatures resembling
  balrogs), the game is played across a hexagonal map of towns and guarded
  treasures.

