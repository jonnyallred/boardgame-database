description: |
  Quacks & Co.: Quedlinburg Dash is a children's racing game designed by Wolfgang Warsch set in the world of The Quacks of Quedlinburg, published by Schmidt Spiele in 2022. Players race their potion-making characters across a winding path using dice and ingredient cards, navigating special spaces and shortcuts toward the finish line. The game introduces young players to the Quedlinburg setting through simple, accessible mechanics designed for families with children as young as six.

