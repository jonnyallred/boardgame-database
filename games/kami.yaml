description: |
  Kami is a card game for 1-4 players that updates mechanics from the ancient Japanese game of Goita Shogi, casting players as feudal Japanese forces in cerebral strategic combat. Each player is dealt eight cards forming their army from eight distinct force types of varying numbers and strength in the deck. Strategic passing — forgoing your turn even when you can counter — is a key tool, as it manipulates the cards others must play in subsequent turns. Published by Oka Luda with beautiful art by Pauline Berdal, Kami packs significant strategic depth into a small, elegantly themed package.

