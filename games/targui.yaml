description: |
  Targui is an area control strategy game published by Jumbo in 1988, inspired
  by the nomadic Tuareg tribes of North Africa. Players control different Tuareg
  tribes competing to acquire economically valuable territories by moving and
  buying camels to expand influence across the game board. The simple mechanisms
  create a straightforward roll-and-fight contest for territorial dominance with
  clear tactical decisions each turn. Targui was recommended for the 1988 Spiel
  des Jahres and offers an accessible entry point to area control gaming for
  families and casual players.

