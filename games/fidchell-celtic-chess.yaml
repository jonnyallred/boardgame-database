description: |
  Fidchell: Celtic Chess is a modern recreation of the ancient Irish board game Fidchell (meaning "wood-wisdom"), published in 1990 by Quintessential Games. The original game dates to Celtic antiquity and was reserved for nobility, warriors, and druids. This version is played on a polar grid (concentric rings) and uses a single piece type (stones), with each player starting with 27 stones — 8 placed and 19 off-board — in a two-phase game of placement then movement. By the 15th century, the word "fidchell" had come to mean chess in Irish, and the original rules were forgotten; this 1990 publication represents a scholarly reconstruction of how the game may have been played.

