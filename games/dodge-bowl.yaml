description: |
  Dodge Bowl is a two-player dexterity game in which each player sets up five bowling-pin targets on their side of the board and places three blocking cubes in the center. Players take turns rolling a marble through a curved tube, attempting to knock down their opponent's pins while the blocking cubes can deflect shots. The first player to knock down all of the opponent's pins wins. The game's simple construction and quick play time make it an accessible activity for children.

