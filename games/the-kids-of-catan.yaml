description: |
  The Kids of Catan is a simplified children's adaptation of Catan designed by Klaus Teuber and
  published by Kosmos in 2003. Set on the island of Catan where children are helping their parents
  build the first settlement, players spin a turntable mounted in the center of the box tray to
  earn resources from 15 surrounding spaces, then use those resources to construct buildings. A
  "bully" space creates mild tension by blocking certain resources. The game strips Catan's trading
  and conflict down to a pure resource-gathering and building experience accessible to very young
  children, making it an ideal introduction to the Catan universe for families.

