description: |
  Star Probe is a science fiction exploration game designed by John M. Snider and published by TSR in 1975,
  the first of a planned trilogy. Players equip starships with personnel, weapons, fuel, and rations — funded
  by an initial grant — then explore a three-dimensional star map where systems lie above and below the primary
  plane. The winning explorer accumulates the most cash and materials within 60 game turns (representing months)
  by discovering worlds suitable for colonization, trading with alien inhabitants, and occasionally battling
  rivals. Its procedural planet generation system (using percentile tables for alien types) later influenced
  the Traveller RPG.

