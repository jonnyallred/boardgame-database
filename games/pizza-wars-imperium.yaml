description: |
  Pizza Wars Imperium is a novelty game of conquest from 1988 designed to be played on an actual pizza. Players choose groups of toppings to attack opponents' toppings — success is determined by counting attacking topping pieces and adding a six-sided die roll. Winners eat the defeated toppings, and the last player with toppings remaining on the pizza wins the game. Part of a 2-in-1 package with Pizza Wars, it is a curiosity of gaming history that combines dinner and entertainment in an absurdist take on wargame mechanics.

