description: |
  The Oracle of Delphi is a race game for 2–4 players set in ancient Greek mythology, representing Stefan Feld's distinctive departure from his signature point-salad euro designs. Players receive a quest from Zeus and must sail the Aegean Sea, fulfilling 12 tasks before their opponents do — collecting offerings, defeating monsters, building temples, and making divine sacrifices. Colorful dice determine which island colors you can visit each turn, while an array of divine boons and magical items provide powerful one-off abilities. The game rewards flexible route planning and clever use of special powers in a fast-paced race across a randomized modular board.

