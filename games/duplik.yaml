description: |
  Duplik (also known as Identik) is a fast-paced party drawing game from Asmodee where one player acts as the Art Director, describing a bizarre and detailed image while other players — the Artists — race to draw it from the spoken description alone. When time is up, players trade drawings and evaluate each other's work against ten hidden criteria for the image, awarding points based on accuracy. The gap between what was said, what was imagined, and what was actually drawn is the source of all the comedy. The game requires no drawing skill and is designed to be funny regardless of artistic talent.

