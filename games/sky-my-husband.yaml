description: |
  Sky My Husband is a French party card game designed by Guillaume Blossier and Jean-Loup Chiflet, published by Interlude in 2004, inspired by the bestselling book of the same name that presented English expressions through their absurdly literal French translations. Players are given two clues hinting at an English idiom as rendered literally in French — such as clues pointing to "sky my husband!" for "Je t'aime mon mari!" — and race to guess the expression. With 460 expressions and two clues each, the game offers hours of linguistic wordplay and cross-cultural humor.

