description: |
  Panzer is a detailed tactical-level hex-and-counter wargame published by GMT Games in 2012, simulating small unit combined-arms combat on the Eastern Front of World War II in 1943-45 at the vehicle and squad level. Designed by James M. Day, the game is notable for its rich system modeling individual weapons, vehicles, crews, and tactical conditions with high-quality components and thoroughly researched orders of battle for both German and Soviet forces. Nominated for a Charles S. Roberts Award in 2013, Panzer is considered one of the finest modern tactical wargames available, offering extensive scenario coverage from Kursk through the final battles of the war. The system expanded through companion sets covering additional theatres and periods.

