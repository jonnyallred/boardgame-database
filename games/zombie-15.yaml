description: |
  Zombie 15' is a frantic cooperative survival game where a group of teenagers must survive a
  zombie apocalypse — and each game plays out to a 15-minute soundtrack that sets the relentless
  tempo. Players must move quickly through 15 progressive scenarios, always outnumbered and
  always running. The real-time constraint, teen protagonist theme, and compact design create a
  uniquely tense and cinematic experience entirely contained within a quarter hour.

