description: |
  Dragonlord is a 1976 wargame from Wee Warriors simulating aerial combat between flying dragons, designed and illustrated by Bradley W. Schenck under the pseudonym "Morno." The map uses an unusual 2.5D perspective with a square grid rather than hexes, depicting terrain that the dragon lords fly over as they fight. Each dragon can attack with claw or fire, and combat is resolved with percentile dice compared against the defending dragon's previous aerial maneuver. The game earned praise for its striking artwork depicting the swirling chaos of dragon combat, though reviewers noted the complex combat resolution and the nonstandard grid as points of friction.

