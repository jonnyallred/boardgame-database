description: |
  Paths of Glory is a landmark card-driven wargame (CDG) covering the entirety of World War I from 1914 to the American entry in 1918, played on a map spanning all of Europe and the Middle East. Players take on the roles of the Allied and Central Powers, using a deck of event cards that can be played for their historical events or converted to operations points for movement and combat. Each turn players draw seven cards and take six actions, including a mandatory "Mandated Offensive" representing political pressure, capturing the strategic constraints both sides faced. Winner of the 1999 Charles S. Roberts Award for Best Pre-World War II Boardgame and the 2000 International Gamers Award, it is widely considered one of the finest CDGs ever designed.

