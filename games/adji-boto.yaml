# Description
description: |
  Adji-boto is a traditional mancala game played by the Saramaccan people who
  live on the banks of the Saramacca River in Suriname. The game was first
  documented by American ethnologist Melville J. Herskovits in 1928, though it
  is certainly far older.

  Like other mancala variants, players sow seeds or stones around a board of
  cups or pits, capturing opponent pieces through specific configurations. Beyond
  its strategic nature, adji-boto holds significant cultural importance for the
  Saramaccans, traditionally played during the ten days before burial following
  a community member's death, with the intent of attracting spirits to accompany
  the deceased into the afterlife.

