description: |
  Verdun: The Game of Attrition is a 1972 board wargame designed by John Hill and published by Conflict Games, simulating the brutal Battle of Verdun during World War I — one of the longest and bloodiest confrontations in military history. The game reflects the asymmetric conditions of the actual battle: the French player always receives reinforcements each turn, while the German player must roll a six to receive any. This faithful historical modelling places enormous pressure on both sides and captures the grinding attritional nature of the conflict. Verdun was one of John Hill's first published wargames.

