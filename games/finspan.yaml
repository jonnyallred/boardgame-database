description: |
  Finspan is a standalone engine-building game in Stonemaier Games' World of Wingspan family, themed around ocean fish and aquatic life. Designed by David Gordon and Michael O'Connell (with creative input from Wingspan designer Elizabeth Hargrave), it uses familiar Wingspan mechanisms — card drafting, bird-like fish powers, and tableau building — adapted for a lighter, more accessible experience. Players collect fish cards representing real aquatic species, diving between ocean zones to trigger cascading card powers and score objectives. Released in early 2025 as the third game in the Wingspan family alongside Wyrmspan, it is a standalone entry that can also be combined with Wingspan.

