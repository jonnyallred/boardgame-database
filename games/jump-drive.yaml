description: |
  Jump Drive is a fast-playing standalone card game that distills the engine-building concepts of Race for the Galaxy into a 15-20 minute experience for 2-4 players. Players simultaneously select cards to play from their hands, paying for them by discarding other cards, and race to accumulate 50 victory points through developed worlds and technological advances. The discard-to-play mechanic creates constant hand management tension, as every card played means another card sacrificed. Designed as an accessible introduction to the Race for the Galaxy universe, Jump Drive rewards efficient planning and swift engine construction.

