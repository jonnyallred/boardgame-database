description: |
  Inkan aarre (Inca Treasure) is a Finnish board game designed by Kari Mannerla in 2005 as a direct sequel to his 1951 classic Afrikan tähti (Star of Africa). Rather than Africa, players travel around South America seeking the treasure of the Inca. Once the treasure is found, the first player to return it to Machu Picchu wins. The game uses the same simple movement and discovery mechanics as Afrikan tähti, making it accessible to young children while providing the thrill of exploration and treasure hunting.

