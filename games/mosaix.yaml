description: |
  Mosaix is a 2009 abstract dice game published by Schmidt Spiele in which players roll symbol dice and arrange them in a sequence that all other players then transcribe into their personal 7x7 grid. The goal is to create the largest cohesive areas of matching symbols by the end of the game, rewarding spatial planning and opportunistic placement. The simultaneous nature of transcription keeps all players engaged throughout each round, making it a fast-playing and accessible family filler with a light competitive edge.

