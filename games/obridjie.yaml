description: |
  Obridjie is a traditional board game from West Africa belonging to the mancala family of sowing games. Like other mancala variants, it is played by two players on a board with multiple pits, with players distributing seeds or stones around the board according to specific sowing rules and capturing opponent's pieces through strategic moves. Traditional mancala games like Obridjie have been passed down through oral tradition and community play rather than formal publishing, and specific details about regional rules and board configurations vary by community. It represents the rich tradition of mancala game variants found across West Africa.

