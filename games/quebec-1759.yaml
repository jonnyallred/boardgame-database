description: |
  Quebec 1759 is a two-player block wargame originally published by Gamma Two Games (now Columbia Games) in 1972, simulating the decisive Battle of the Plains of Abraham during the Seven Years' War. The game was pioneering in its use of wooden blocks standing on end to represent military units, with the block system hiding unit strengths from opponents and simulating the fog of war elegantly. One of the founding titles of the Columbia Games block wargame system, Quebec 1759 has been continuously in print for over 50 years and remains a landmark of wargame design.

