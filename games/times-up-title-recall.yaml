description: |
  Time's Up! Title Recall! is the pop-culture variant of R&R Games' award-winning party game series, focusing on famous TV shows, movies, songs, and books rather than celebrity names. Like the original, teams race through three rounds in 30-second bursts, starting with full clues and progressively restricting to a single word, then silent charades only. The familiar three-round escalation ensures that even outrageous titles become guessable through creative miming and sound effects by the final round.

