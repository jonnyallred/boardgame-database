description: |
  Catan Histories: Rise of the Inka is a standalone 2018 Catan game designed by Klaus and Benjamin Teuber, set among the coastal and mountain civilizations of ancient Peru across three historical eras. Players use classic Catan mechanics — roads, settlements, development cards, and the robber — but must twice deliberately "decline" their civilization, removing roads from the board and covering settlements with thickets as a new tribe rises. The game is won by the first player to bring their third tribe to its apex, making intentional decline a core strategic consideration in this richly themed variant.

