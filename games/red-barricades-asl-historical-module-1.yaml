description: |
  Red Barricades: ASL Historical Module 1 is a groundbreaking expansion for Advanced Squad Leader designed by Charlie Kibler and published by Avalon Hill in 1990, covering the brutal urban fighting around the Krasny Barrikady ordnance factory during the Battle of Stalingrad in 1942. The module introduced Campaign Games (CGs) to ASL — multi-scenario battles spread over several game sessions simulating days of continuous fighting — alongside standalone scenarios. Two historically accurate maps and three Campaign Games make it the most celebrated and complex expansion in the ASL system, later incorporated into the Red Factories module by Multi-Man Publishing.

