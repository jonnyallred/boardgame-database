description: |
  Unlock! Mystery Adventures is an entry in the popular Unlock! cooperative escape-room card game series, featuring three standalone one-hour scenarios. Players investigate a cursed manor on a hill, escape from a Jules Verne-inspired submarine, and hunt for hidden treasure on a remote island. Using a deck of illustrated cards and the free Unlock! companion app, teams search scenes, combine objects, and crack codes against a countdown timer. Each scenario varies in difficulty and can be replayed with different group compositions.

