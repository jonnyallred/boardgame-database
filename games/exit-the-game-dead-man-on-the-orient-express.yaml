description: |
  Exit: The Game – Dead Man on the Orient Express is a 2017 entry in the award-winning EXIT: The Game escape room series designed by Inka and Markus Brand and published by KOSMOS. Players find themselves aboard the legendary Orient Express where a passenger has been murdered, and must solve a series of interconnected puzzles and riddles to uncover the killer before the train reaches its destination. Like other entries in the series, the game uses a deck of cards, a code dial, and a booklet, with some components requiring cutting or folding as part of solving puzzles. The mystery setting and murder investigation theme distinguish this entry within the series.

