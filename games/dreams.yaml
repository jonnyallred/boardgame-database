description: |
  Dreams is a 2016 social deduction game published by Zoch Verlag featuring 72 large illustration cards by eight different artists. Each round four pictures are revealed and the players, acting as gods, secretly select one to transfer onto the night sky as a new constellation — all players but one know which image was chosen. The uninformed player tries to blend in and avoid detection while the others lay star tokens on the central mat interpreting the chosen constellation. After placement, the gods vote on who they think was ignorant, while the ignorant player tries to name the chosen picture. The game rewards perceptive bluffing and pattern reading.

