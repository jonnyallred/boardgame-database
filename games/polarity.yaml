description: |
  Polarity is a uniquely tactile abstract strategy game invented by Douglas Seaton in which players compete to place and score magnetic discs using the physical forces of magnetism. Players take turns carefully lowering a magnetic disc into the playing area, leaning it against the magnetic fields of previously placed pieces in carefully balanced "leaners." If a placed piece causes others to topple or two pieces snap together (a "fault"), the active player's turn ends. Players score leaning pieces of their color at the end of the game. The combination of dexterity, spatial reasoning, and magnetic physics creates a uniquely memorable play experience that has seen multiple publishers since its 1986 debut.

