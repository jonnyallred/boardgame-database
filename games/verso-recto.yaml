description: |
  Verso Recto (also known as Recto Verso) is a cooperative pattern-building game designed by Inka Brand and Markus Brand and published by Super Meeple in 2021. Players sit in shifting pairs across from each other and try to recreate skyline images shown on challenge cards using coloured blocks — but each player can only see the picture from their own side, so constant communication is essential to ensure every block lands in the right location. The game is a re-edition of the earlier title La Boca, updated with new art and an additional two-player cooperative mode. Fast, social, and spatially challenging, it works well for mixed groups.

