description: |
  Doctor Who – Battles in Time is a collectible trading card game published by GE Fabbri under BBC licence, originally released fortnightly in magazine format starting in 2006. Players build decks of character cards drawn from Doctor Who television series and battle by comparing attribute scores across five categories. The main variants—Bunch of Fives and Bonus Buster—each require a 20-card deck, with players alternately calling attributes to compete for cards. The game proved enormously popular with younger Doctor Who fans, and a revival was announced in 2025 to coincide with the game's 20th anniversary.

