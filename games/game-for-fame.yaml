description: |
  Game For Fame is a hilarious team-based party board game for 4-16 players, developed in 2010. Teams compete in a variety of physical and social challenges, earning in-game money for successful performances. Players work both with and against teammates across several rounds of outrageous stunts and activities, with the player holding the most money at the end declared the winner. The game is well suited to large groups seeking a lively, active party experience.

