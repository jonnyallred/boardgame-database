description: |
  Onitama is an elegant two-player abstract strategy game inspired by Japanese martial arts, in which each player controls a Master and four Monks on a 5x5 grid. The game's defining mechanic is a shared hand of five movement cards — two per player plus one card that rotates between them — meaning every card you play becomes available to your opponent. Victory comes either by capturing the opponent's Master pawn or by moving your Master onto your opponent's starting temple square. Praised as a paragon of abstract design, Onitama achieves remarkable depth and replayability with minimal rules through its constantly shifting card system.

