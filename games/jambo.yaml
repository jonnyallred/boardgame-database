description: |
  Jambo is a two-player card game set in an East African marketplace where players are competing traders buying and selling six types of goods — tea, hide, fruits, salt, silk, and trinkets — to reach 60 gold first. Each turn players have five actions to draw cards, buy and sell wares, or play market stalls and helper cards from their hand. The rich card variety and hand management decisions give Jambo surprising strategic depth for a game of its size. Nominated for the 2005 Spiel des Jahres, Jambo is a tightly designed and engaging two-player market game from Rüdiger Dorn.

