description: |
  Wilmot's Warehouse is a 2024 cooperative memory game by Ricky Haggett, Richard Hogg, and David King, published by CMYK, in which a team of players must organize a warehouse full of strange product tiles and then retrieve them on demand. During the setup phase, the team draws tiles, collaboratively invents stories and associations for what each one "is," places them face-down in the warehouse, and then during a frantic five-minute finale must match all 35 face-down tiles to customer cards. The game rewards creative shared storytelling and collective memory rather than individual skill, making it a uniquely sociable experience that thrives at larger player counts.

