description: |
  Stratego is a classic two-player strategy board game of incomplete information, originally designed by Hermance Edan in the early 20th century as a variant of the French game L'Attaque and commercially popularized in the Netherlands by Jumbo before Milton Bradley brought it to the United States in 1961. Each player arranges 40 pieces of varying rank on a 10×10 grid, keeping their identities hidden from the opponent. Players move pieces to reveal and capture enemy pieces — higher ranks defeat lower ones — with the ultimate goal of capturing the opponent's Flag. The game's tension comes from deduction, bluffing, and concealment as both armies probe each other's defenses.

