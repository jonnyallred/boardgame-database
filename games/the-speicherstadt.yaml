description: |
  The Speicherstadt is an elegant auction and card-drafting game for 2–5 players set in the historic Hamburg warehouse district. Each round, cards representing ships, contracts, firefighters, and buildings are laid out; players simultaneously place meeples in queues behind desired cards, then pay their position in the queue — the first bidder pays one coin, the second pays two, and so on. This creates intense mind games: block a competitor by bidding high, or wait patiently and hope the card survives the queue. The firefighter mechanism punishes players who ignore disasters, adding a constant undercurrent of risk management to this beautifully tense bidding game.

