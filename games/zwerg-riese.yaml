description: |
  Zwerg Riese (Giant Dwarf) is a children's board game from HABA in which dwarf figures need to
  collect gold from cities around a large game board, but can only travel by riding a giant figure.
  Players spend landscape cards to direct the giant in compass-step movements, estimating
  distances to reach desired destinations. A press-your-luck element arrives with a robber mechanic,
  and the winner is the dwarf who collected the most gold coins when all are claimed.

