description: |
  Terrain Vague is a French territory control game published by Ludodelire in
  1994 with artwork by cartoonist Tardi, also known as Junkyard. Players control
  rival gangs fighting for turf in a hexagonal junkyard, rumbling with enemy
  gangs over twelve turns to own the most territory by game's end. The game
  combines area control with direct conflict mechanics in a gritty urban setting
  illustrated with Tardi's distinctive graphic art style. Its combination of
  tactical gang warfare and colorful French underground aesthetic makes it a
  distinctive entry in the territory control genre.

