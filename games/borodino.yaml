description: |
  Borodino is a board wargame designed by John Young and published by SPI in 1972,
  first as a pull-out game in Strategy & Tactics No. 32, then as a standalone boxed set.
  Simulating the 1812 Battle of Borodino during Napoleon's invasion of Russia, the game
  uses a simplified ruleset based on Napoleon at Waterloo — fast-moving and accessible
  while remaining durably popular. It placed 23rd out of 202 games in SPI's 1976
  wargamer poll, still ranking high four years after release due to its speed and
  accessibility for the hard-core wargaming community.

