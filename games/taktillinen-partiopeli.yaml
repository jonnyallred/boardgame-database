description: |
  Taktillinen partiopeli (Finnish: "Tactical Scouting Game") is a Finnish board
  wargame published in 1934 related to the Boy Scout movement. The game simulates
  tactical scouting scenarios, likely reflecting the military preparedness culture
  of Finland in the interwar period. As a historical artifact of Finnish gaming
  culture from the 1930s, it is a rare example of scout-themed tactical wargaming
  from this era. Detailed publisher and rule information are scarce, as the game
  had very limited commercial distribution outside Finland.

