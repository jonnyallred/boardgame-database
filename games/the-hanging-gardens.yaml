description: |
  The Hanging Gardens is a fast tile-placement and set-collection game for 1–5 players in which players compete to build the most magnificent hanging garden for King Nebuchadnezzar II. Over four rounds, players use workers to claim Garden cards from a shared display, then arrange those cards in their personal garden to score victory points based on the types and arrangements of flora. The game rewards thinking ahead about which sets to complete and how to position workers to both block opponents and secure the most valuable cards. Its quick 30-minute play time and accessible rules make it a polished and replayable filler.

