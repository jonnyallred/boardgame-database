description: |
  Skymines is a deep strategic card game for 1–4 players set in a sci-fi future where players are rival investment firms exploiting the mineral wealth of alien planets and the Moon. Built on a unique card-programming and hand-management system, players invest in one of four space-mining companies, directing their development through carefully sequenced card plays. The game rewards careful planning as actions must be lined up in advance, while the area-majority investment system creates high player interaction as everyone vies to control the most profitable operations. Designed by Alexander Pfister and Viktor Kobilke, Skymines is a reimplementation of the classic Mombasa with a fresh sci-fi skin and refined mechanics.

