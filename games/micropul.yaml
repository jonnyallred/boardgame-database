description: |
  Micropul is a strategic tile-laying game self-published by Jean-François Lassonde in 2004, in which players act as scientists extracting precious micropul matter from an energy core. Players take turns placing tiles and stones, with each new tile placed so that a micropul of one tile is adjacent to a matching color micropul on an existing tile. Groups of the same-colored micropuls form across the table and can be claimed; closed groups at game end score significant points. The game also offers a solitaire puzzle mode in which the player tries to beat their previous optimal score.

