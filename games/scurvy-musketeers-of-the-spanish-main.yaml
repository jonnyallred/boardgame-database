description: |
  Scurvy Musketeers of the Spanish Main is the seventh installment in Z-Man Games' B-Movie Series of swashbuckling cinema card games, designed by Stephen Tassie. Players build their pirate movie by playing Character, Prop, and Location cards while sending Creatures to attack opponents' productions and eliminate their characters. SFX cards add wild modifications, and when "Roll the Credits" is played, the player with the most points wins. The game can be played standalone or combined with other B-Movie Series games for expanded variety.

