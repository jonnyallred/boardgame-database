description: |
  Battlecars is a post-apocalyptic vehicular combat game published by Games Workshop in 1983, in which players outfit armored automobiles with weapons and race-battle across a hex grid. Drawing inspiration from the Car Wars and Death Race cultural moment, players design their vehicles before the game and then manage movement and fire arcs in tactical combat. Weapons, armor, and special equipment are selected from a catalog of options, allowing personalized vehicle builds. The game captures the Mad Max-era fascination with road warrior chaos in an accessible tactical format.

