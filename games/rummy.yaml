description: |
  Rummy is a foundational card-matching game played with a standard 52-card deck, dating to the early 1900s with likely origins in Mexico or Asia. Players draw and discard cards aiming to build melds — sets of matching rank or runs of sequential suit — and score points when an opponent goes out. The simple stockpile-and-discard rhythm of Rummy underlies dozens of popular variants including Gin Rummy, Canasta, and Rummikub, making it one of the most widely played card game families in the world. Its combination of luck and hand management remains accessible to all ages.
