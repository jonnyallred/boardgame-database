description: |
  Harbour is a compact worker-placement game set in a fantasy port town where players are
  entrepreneurs collecting and trading four resources—fish, livestock, wood, and stone—to
  purchase buildings. Each time a player buys a building, the market values of the resources
  used drop while others rise, creating a dynamic economy that constantly shifts the
  optimal strategy. Buildings double as worker-placement spots, so a growing shared town
  expands everyone's options. The small footprint, quick turns, and evolving market make
  Harbour a satisfying filler for fans of heavier games.

