description: |
  Engine, Engine No. 9 is a children's board game published by AMIGO where players race to get all three of their toy trains into the depot first. Players roll dice and place train tiles on the board to advance their engines, making it an accessible and colorful entry point for young players. The game won the 2011 Graf Ludo Best Children's Game Graphics award and was nominated for the Kinderspielexperten award for 5-to-9-year-olds.

