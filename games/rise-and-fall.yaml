description: |
  Rise & Fall is a deterministic civilization game designed by Christophe Boelinger in which players grow a tribe into a full civilization across a fantasy landscape of glaciers, islands, and cliffs. Starting with a village, a citizen, and a ship, players expand their civilization through temples, merchants, and mountaineers using a simultaneous card reveal mechanism — all players secretly choose a Civilization card, then the active player activates units matching the card played. A powerful decline mechanic means that when a player places their last unit of any type, everyone must discard a card permanently, representing civilizational decay. This luck-free design creates an intense strategic puzzle of timing, positioning, and resource management.

