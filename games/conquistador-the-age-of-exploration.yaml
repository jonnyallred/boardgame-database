description: |
  Conquistador: The Age of Exploration is a board game published by SPI (Simulations Publications Inc.) in 1976, designed by Richard Berg with assistance from Greg Costikyan. Set during the Age of Exploration from 1495 to 1600, players take the roles of European colonial powers dispatching expeditions to the New World to discover gold, establish colonies, and build empires. Despite using wargame trappings like a hex map, the design emphasis is on exploration, trade, and economic development rather than combat. Originally published as a pull-out game in Strategy & Tactics Issue 58 before receiving a boxed edition, it remains one of the classic SPI designs of the era for its nuanced portrayal of colonialism and competition.

