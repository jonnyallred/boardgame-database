description: |
  Lords of the Middle Sea is a post-apocalyptic strategy game published by Chaosium in 1978 set in a far-future version of North America where rising oceans have flooded the interior, creating an archipelago of islands. Players command city-states competing for dominance through trade, diplomacy, and naval warfare across this flooded landscape, building fleets of wooden ships using medieval technology in a world that has forgotten advanced science. The game blends wargame mechanics with trading and diplomacy in a large multi-player format. One of Chaosium's earliest board game publications, it anticipated many later multi-player conquest games in its scope and complexity.

