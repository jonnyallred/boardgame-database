description: |
  Thin Ice is a 1989 dexterity party game by Pressman Toy Corporation in which players take turns using tweezers to place wet marbles on a tissue paper suspended over the gameboard, simulating the dangerous act of walking on thin ice. The player whose marble causes the tissue to break receives a letter; spell out three letters and you are eliminated. The tension of each trembling marble placement and the anticipation of the tissue's imminent failure creates an experience of escalating suspense that made Thin Ice an iconic game of 1990s childhood. Simple, tactile, and genuinely nerve-wracking, it remains a classic dexterity filler.

