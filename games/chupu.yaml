description: |
  Chupu (樗蒲) is an ancient Chinese board game popular from the Eastern Han Dynasty through the Tang Dynasty (roughly 2nd-10th centuries CE), and a variant of the even older game Liubo. Players cast five wooden dice-like pieces (wumu), with valuable combinations earning extra moves or special advantages on a marked board. The Han dynasty writer Ma Rong composed a rhapsody about the game, and it was described in detail by Tang-period author Li Ao in the Wumujing. Over time, chupu was simplified from a full board game into a pure dice-rolling comparison game, foreshadowing many later Asian dice games.

