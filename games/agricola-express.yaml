description: |
  A fast, dice-driven spin-off of Uwe Rosenberg's farming classic Agricola, condensing the core appeal into a shorter format. The game plays over three harvests (3, 2, and 1 round each) where each round players roll all the dice and pick one set to use for their actions, gaining extra actions for babies in their household. By replacing worker placement with dice selection, Agricola Express captures the resource tension of its parent game in a much quicker package suitable as a filler or introductory experience.

