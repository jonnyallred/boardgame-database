description: |
  Court of the Medici is a two-player card game set in the Italian Renaissance court of Cosimo I de' Medici, where House Gonzaga and House Della Rovere vie for the Grand Duke of Tuscany's friendship. Players deploy nobles to gain influence, form alliances, and execute conspiracies to build their standing while eliminating rival nobles at court. The game uses a cleverly simple card mechanism that can also be played with a standard deck of cards. Rich with historical flavor and subtle bluffing, it delivers a satisfying two-player rivalry in a compact, quick-playing format.

