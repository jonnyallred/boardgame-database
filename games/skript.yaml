description: |
  Skript is a German word-guessing game from 1982 that won the Spiel des Jahres Special Prize "Schönes Spiel" (Beautiful Game) for its distinctive typographic design. One player secretly selects a word and the others try to guess it; players who don't know the word can purchase hint cards — revealing specific letters, the word's definition, or other clues. The game is notable for its elegant, minimalist visual design using only red, black, and varied font sizes as its sole design elements, applied consistently across all game materials.

