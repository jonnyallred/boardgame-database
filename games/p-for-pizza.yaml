description: |
  P for Pizza is a speedy word-based party card game from Big Potato Games in which players race to shout the first word matching both a category card and a letter card simultaneously. Players earn triangular pizza-slice tokens for winning rounds, and these are placed into a pizza-pyramid to score points, with color-coded difficulty tiers (green, amber, red) determining where earned slices can go. Simple enough for a family game night yet genuinely exciting for adults, P for Pizza distills the competitive word-shouting genre to its most fun and compact form. Big Potato is known for making accessible modern party games, and P for Pizza exemplifies their approachable, high-energy design philosophy.

