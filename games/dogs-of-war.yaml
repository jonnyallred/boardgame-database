description: |
  Dogs of War is a 2014 area-majority game by Paolo Mori set in a steampunk-influenced Renaissance universe, where noble houses wage fierce battles and players control mercenary captains deploying private armies to tip the balance in their favor. Each round, players simultaneously assign their Dog of War to a battlefield by playing cards from their hand, shifting influence through clockwork knights and war machines, with the ultimate aim of earning rewards from whichever house they've backed most effectively. Deception and betrayal are core tools — a captain's special ability can flip allegiances at a critical moment — making it a game of bluffing and politics as much as military placement. CMON's production gives the game impressive miniature figures and table presence.

