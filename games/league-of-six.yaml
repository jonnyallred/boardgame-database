description: |
  League of Six is a strategy game set in 1430 during a period of unrest in Central Europe, where players become tax collectors visiting six wealthy Lusatian cities that banded together to defend their commercial interests. Each round, players visit cities to collect goods and gain influence in the court of King Sigismund, balancing placement decisions against what rivals might do. Vladimír Suchý's debut design, first published by Czech Games Edition, offers a tightly constructed Euro experience with meaningful auctions and area influence mechanics. A complete edition combining the base game with its expansion has since been released by Czech publisher Dino Toys.

