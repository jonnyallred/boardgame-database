description: |
  Bausack is a dexterity stacking game published by Zoch Verlag in 1987 — the publisher's
  very first game — in which players take turns choosing awkward wooden blocks and giving
  them to others to add to their personal towers. A player may spend beans to refuse a
  block, passing it to the next player instead. When your tower falls, you are eliminated;
  the last player standing wins. The game received a Spiel des Jahres recommendation in 1988
  and was later published as Bandu by Milton Bradley in 1992.

