description: |
  Armageddon: Tactical Combat, 3000-500 BC is a board wargame designed by John Young
  and first published by Simulations Publications, Inc. (SPI) in 1972, originally
  appearing as a pull-out game in Strategy & Tactics magazine (#34) before being
  released as a standalone title. The game simulates ancient tactical combat spanning
  the Near Eastern and Mediterranean world from 3000 to 500 BC, covering the battles
  and armies of the early civilizations. Using a hex-grid map and counter-based system,
  players maneuver historically-inspired armies in a recreation of ancient warfare.

