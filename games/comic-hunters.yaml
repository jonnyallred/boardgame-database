description: |
  Comic Hunters is a set-collection card game in which players compete to build the most impressive comic book collection featuring classic Marvel characters and covers. Over three rounds, players visit store locations to purchase comic book cards, then add them to their growing collections organized by hero. Cards advance markers on five spotlight tracks — first appearances, special editions, memorable clashes, and more — generating points for progress on each. Each collection also scores based on size. Originally designed in Brazil by Robert Coelho and featuring authentic Marvel comic cover art, it is an accessible game for comics fans of all ages with an optional cooperative mode.

