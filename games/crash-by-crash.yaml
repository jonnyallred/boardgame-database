description: |
  Crash by Crash is a 2008 bumper car racing and positioning game in which players drive cars for their respective teams, pushing opponents out of the way to achieve a better scoring position at the right moment. The game's core mechanic rewards strategic jostling and timing — players must judge when they are in a winning position to score rather than simply staying out in front. Limited documentation is available in English-language sources for this title beyond its core concept.

