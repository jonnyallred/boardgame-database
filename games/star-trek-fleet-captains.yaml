description: |
  Star Trek: Fleet Captains is a 2-4 player tactical space combat and exploration game set in the Star Trek universe, published by WizKids in 2011. Each player commands a fleet of 12 highly detailed pre-painted miniature starships — Federation or Klingon — and explores an unexplored sector of space represented by hexagonal location tiles placed face-down. Players reveal tiles as their ships traverse the galaxy, encountering missions and engaging in ship-to-ship combat using the Clix system. Victory points are earned through completing missions, and the first fleet to reach the target score wins.

