description: |
  Aliens is a 1989 wargame published by Leading Edge Games, based directly on the events of
  James Cameron's 1986 film. Players command a squad of Colonial Marines across five scenarios
  recreating key scenes: The Reactor, Operations, Rescue Newt, The Dropship, and Ripley vs.
  the Alien Queen. The game uses a hex-grid tactical map with counters representing individual
  marines and xenomorphs.

  The design pioneered a scenario-driven approach where alien movement and reactions are governed
  by tables and charts rather than a second player, making it playable solitaire or cooperatively.
  An expansion released in 1991 added further scenarios including ammunition restrictions and
  tournament rules. It remains one of the most faithful licensed wargame adaptations of its era.

