description: |
  Tric Trac is a classical French two-player board game played on a board nearly identical to a backgammon board, dating to at least the 16th century with the first written treatise recorded in 1634. Unlike backgammon, Tric Trac is not a racing game — instead players score points by creating specific piece formations (called jans) and by bearing off pieces, with a complex scoring system that rewards careful positional play. It was the prestige game of French upper-class society before the Revolution and remained popular for centuries with remarkably stable rules.

