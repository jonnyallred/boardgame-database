description: |
  Don Pepe is a Mafia-themed area control game for 3–6 players published under various names across different countries (Maffiosi, El Padrino, Mafiosos, O Grande Chefão, Règlement de Comptes). Players seat their mobsters around an oblong table where each position provides a specific ability: some spaces generate income, others allow shooting across the table or stabbing an adjacent opponent. Eliminated mobsters leave the table, and the game ends when all available money has been claimed. The player who has accumulated the most cash wins, making the game a darkly comic race for profit through criminal violence.

