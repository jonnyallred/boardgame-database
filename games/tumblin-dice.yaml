description: |
  Tumblin' Dice is a dexterity game in which players take turns flicking, rolling, or sliding their dice down a stepped wooden ramp. After all dice are launched, scores are calculated by multiplying the face value shown on each die by its landing zone multiplier (1x to 4x, increasing with distance). The largest dice score the most but are hardest to control precisely. Designed by Rick Soued, Randy Nash, and Carey Grayson and published in 2004, the game rewards physical skill and reading the board, and has been published in multiple formats by Eagle-Gryphon Games and others.

