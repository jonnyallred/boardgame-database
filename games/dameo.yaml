description: |
  Dameo is a two-player abstract strategy game invented by Christian Freeling in 2000 as an advanced variant of draughts (checkers), played on an 8x8 board with 18 pieces per player. The game introduces linear movement of a line of men, rookwise captures for kings, and diagonal movement for pieces, creating a distinct and strategically rich variant. Notably, Dameo has an exceptionally low draw rate — even a small advantage can typically be converted to a win — making it a sharp and decisive game. Author Aleh Tapalnitski called Dameo Freeling's "attempt to perfect checkers," and it maintains active online tournament communities.

