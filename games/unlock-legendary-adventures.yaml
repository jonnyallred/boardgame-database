description: |
  Unlock! Legendary Adventures is the ninth installment in the Unlock! cooperative escape-room card game series by Space Cowboys. Players work as a team, searching scenes, combining objects, and solving puzzles across three standalone 60-minute scenarios: a jewel heist adventure featuring the thief Stella, a rescue mission to free Robin Hood from the Sheriff of Nottingham, and a Sherlock Holmes murder mystery. Using only a deck of cards and the free companion app for hints and timekeeping, players race against the clock to complete each adventure before time expires.

