description: |
  Minuteman: The Second American Revolution is a 1976 wargame by Jim Dunnigan, published by SPI as a counter-cultural commentary during America's Bicentennial. The game hypothesizes a second American revolution fueled by widespread social unrest, with one player controlling rebel forces trying to spread dissent and ultimately declare revolution, while the opposing player controls government forces attempting to suppress the movement. Combining political game mechanics with traditional wargame elements, the game features optional rules for foreign intervention by Canada and Mexico and multi-rebel faction variants. Dunnigan designed it as a deliberate counterpoint to the patriotic celebrations of 1976.

