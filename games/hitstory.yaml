description: |
  Hitstory is a music trivia board game published by BD2 Games in which players answer questions about hit songs and music history. Players compete to identify songs, artists, and chart-toppers across different eras, making it a test of musical knowledge and pop culture familiarity. The Hitstory Platinium edition extended the game's content with additional cards and categories.

