description: |
  Bauernhof-Bande (Barnyard Bunch) is a cooperative children's dice game set on
  Fridolin's farm, where all the young animals have escaped and must be herded back
  to the barn before the game ends. Players work together, rolling dice and moving
  animals across the board in this simple, luck-driven game designed for young children.
  The cooperative nature encourages teamwork and shared goals among young players.

