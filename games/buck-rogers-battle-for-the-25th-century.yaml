description: |
  Buck Rogers - Battle for the 25th Century is a strategy wargame published by TSR in 1988, designed by Jeff Grubb and based on TSR's Buck Rogers XXVC science-fiction setting. Inspired by Axis & Allies, players command factions competing for control of the solar system, maneuvering armies and fleets across a board where the planets themselves move over time, changing strategic distances. Advanced rules give faction leaders unique abilities drawn from the Buck Rogers lore, adding asymmetric depth to the planetary conquest gameplay.

