description: |
  Ratrace is a social climbing board game published by Waddingtons in 1967 in which players race up the social ladder from rags to riches and back down again, simulating the frantic up-and-down nature of social ambition. Players move around the board accumulating status symbols — houses, cars, boats — while trying to maintain their position at the top against the inevitable reversals of fortune. A satirical take on materialism and social ambition, Ratrace was a popular UK family game of its era.

