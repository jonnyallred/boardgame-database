description: |
  Battle-Sphere is an abstract strategy game with a science-fiction theme involving spherical or orbital combat. Players position and maneuver forces in a three-dimensional or spherical spatial framework, competing to control key positions. The game's unusual geometric premise — fighting over a spherical rather than flat board — creates distinctive tactical situations and movement calculations. Documentation on this title is limited given its relatively obscure publication history.

