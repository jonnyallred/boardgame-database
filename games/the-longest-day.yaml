description: |
  The Longest Day is a massive 1979 wargame by Avalon Hill simulating the Allied D-Day invasion of June 1944 and the subsequent Normandy campaign through August 31, 1944. Featuring over 1,500 counters representing battalion-sized units across seven map boards depicting the invasion beaches and surrounding French countryside, it is one of Avalon Hill's most ambitious "monster" wargames. Two players command Allied and German forces respectively across dozens of historical scenarios or the full campaign, with scenarios ranging from 3-12 hours and the full campaign requiring 30+ hours. The game is noted for its immense scope and demanding operational complexity.

