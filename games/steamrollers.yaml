description: |
  SteamRollers is a roll-and-write train game designed by Mark Gerrits and published by Flatlined Games, debuting at Essen 2015. Each turn players roll and draft dice, then use those dice to extend their rail network across a shared map, connecting cities to earn income and pick up goods for delivery. The simultaneous drafting and writing keeps all players engaged throughout, while route-building decisions create mounting tension as players compete for the same lucrative connections. SteamRollers distills classic train game appeal into a compact, accessible package.

