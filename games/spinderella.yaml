description: |
  Spinderella is a dexterity and racing game designed by Roberto Fraga and published by Zoch Verlag, in which
  players race ants across the forest floor while two magnetic spiders dangle from the trees above. On each turn,
  players roll three dice to move their ants, shift the tree trunk, or manipulate the Peter and Parker spiders —
  moving the spiders together or apart raises and lowers Spinderella, who can swoop down and carry ants back to
  the start. The charming physical mechanism makes the game a delight for young children.

