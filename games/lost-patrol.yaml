description: |
  Lost Patrol is an asymmetric two-player game published by Games Workshop in 1987 set in the science fiction universe of Warhammer 40,000, in which a small squad of Space Marine Scouts attempts to fight through a hostile jungle crawling with Tyranid Genestealers. One player controls the desperate Marines trying to reach an extraction point, while the other commands ever-replenishing waves of Genestealers emerging from the dense jungle tiles. The modular jungle tile system creates a different board each game, and the Marines' attrition mechanic — they cannot be reinforced — creates relentless tension. A revised edition was published in 2016.

