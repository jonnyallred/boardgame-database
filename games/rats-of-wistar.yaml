description: |
  Rats of Wistar is a competitive worker placement game designed by Simone Luciani and Danilo Sabia, published by Cranio Creations (Italy) and Capstone Games (English). Players take the roles of rats who have escaped from the famous Wistar Institute laboratory, leading their families to prove their clan is most deserving to lead the entire colony. The game features asymmetric rat abilities, card-driven actions, and evolving board states that reward long-term planning. An homage to the beloved children's novel Mrs. Frisby and the Rats of NIMH, it blends rich thematic flavor with deep Euro-style mechanics.

