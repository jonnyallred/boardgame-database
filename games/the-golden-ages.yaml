description: |
  The Golden Ages is a euro-style civilization game by Luigi Ferrini in which players guide multiple
  civilizations across four historical eras, developing technologies, constructing buildings, erecting
  wonders, and sending explorers to discover and colonize new continents. Each era begins with map
  exploration, and players must adapt their civilization's focus to the era's available options.
  The game features a modular map, a technology system reminiscent of Endeavor, and an action-point
  selection mechanic. Players score through area majority, cultural achievements, and wonders built
  across civilizations, rewarding both military expansion and cultural development.

