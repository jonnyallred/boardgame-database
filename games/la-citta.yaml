description: |
  La Città is a 2000 city-building strategy game by Gerd Fenchel in which 2-5 players develop competing Italian city-states by managing food production, finances, health, culture, and education to attract and maintain population. Each turn players must feed their citizens, manage growth through new buildings like farms, quarries, marketplaces, and bathhouses, and try to attract citizens from rivals' cities by offering better services. The game's win condition rewards the most successful population management rather than direct military conquest, creating an elegant economic competition. Published by Kosmos and honored with a 2000 Spiel des Jahres recommendation.

