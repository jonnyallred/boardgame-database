description: |
  Legend of the Five Rings: The Card Game is a two-player Living Card Game (LCG) published by Fantasy Flight Games, set in the feudal Japanese-inspired land of Rokugan. Players choose one of seven Great Clans and compete across two distinct conflicts — military and political — simultaneously, requiring careful resource management between both provinces. The game's innovative dual-deck system separates dynasty cards (characters and holdings) from conflict cards (events and attachments), creating a rich strategic experience. Originally produced by AEG as a CCG from 1995-2015, this LCG reboot ran from 2017 to 2021 before Fantasy Flight discontinued the line.

