description: |
  The Flying Dutchman (1992) is a maritime economic game in which players own shares in three ships
  and compete for resources collected along the ghost ship's route. Players use Smith cards to
  collect horseshoes from the board's center, sharing them with others who played the same card.
  A Dutchman navigation mechanic lets players lay horseshoes face-down to influence which ship or
  island the legendary vessel visits next — players try to match or come closest to a lucky number
  by combining silver and golden horseshoe values, giving the navigator control of the ship's
  direction. The blending of hidden information, shared ownership, and route control creates an
  unusual economic design.

