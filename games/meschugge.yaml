description: |
  Meschugge is a quick-fire card and dice game first published by Amigo in 1988, with a revised 2009 edition. Players must rapidly match cards to a command card based on either the color of the word or the word itself, depending on what the die shows — creating the Stroop-effect style cognitive challenge where "reading the word" and "seeing the color" interfere with each other. When the command card shows a color-matched word (called "meschugge" — Yiddish for "crazy"), no one may play. The game's neurological trick of forcing players to switch between word and color processing makes it simultaneously simple and surprisingly difficult.

