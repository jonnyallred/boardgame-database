description: |
  Pig is a classic press-your-luck dice game of traditional origin, first described in print by John Scarne in 1945. On each turn, players roll a single die repeatedly, accumulating a running total — but rolling a 1 ends the turn and wipes out all points gained that round. Players must decide when to "bank" their accumulated points and pass the die, with the first to reach 100 points winning. Pig is celebrated for elegantly demonstrating probability concepts and the gambler's fallacy — the temptation to roll "just once more" because the odds seem fine each time. It remains widely used in mathematics education and serves as the progenitor of many commercial press-your-luck dice games.

