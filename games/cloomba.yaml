description: |
  Cloomba (Russian for "flowerbed") is a colorful tile-placement family game published by Economicus in 2018, in which players expand their garden areas by placing double-hex tiles depicting flowers of various colors and adding butterfly tokens to completed meadows. Players score by multiplying flowers by butterflies in each contiguous same-color meadow, but butterflies cannot share a meadow — requiring clever separation and eventual reunification of areas. The game includes option cards for bonus scoring and abilities, providing strategic variety across plays.

