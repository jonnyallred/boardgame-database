description: |
  Ironclads and Ether Flyers is a set of miniatures-based aeronaval combat rules for the Space: 1889 Victorian science-fiction universe, where 19th-century ironclad warships share the seas with aerial gunboats lifted by mysterious Martian lift-wood. The rulebook provides combat mechanics, scenarios, ship design rules, and fleet directories for 34 nations. Battles combine traditional naval ironclad tactics with the unpredictable element of aerial gunboats, creating a distinctive steampunk maritime wargame. Designed by Space:1889 creator Frank Chadwick, it is a standalone supplement requiring players to supply their own miniatures.

