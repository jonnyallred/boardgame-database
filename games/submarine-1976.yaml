description: |
  Submarine is a 1976 asymmetric wargame designed by Steve Peek and published by Battleline Publications in which one player commands a submarine attempting to sink a high-value target — a freighter or aircraft carrier — while the other player controls the target vessel and its anti-submarine defenses, including destroyer escorts. The two sides play entirely differently, capturing the predator-prey dynamic of undersea warfare. Avalon Hill later revised the rules and published a second edition in 1981, extending the game's life and reach in the wargaming community.

