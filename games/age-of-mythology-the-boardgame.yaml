description: |
  A board game adaptation of the popular real-time strategy video game published by Eagle Games in 2003, for 2-4 players. Players lead civilizations from Greek, Norse, or Egyptian mythology through three ages using permanent and random action cards to manage resources, construct buildings, recruit units, and invoke god powers—represented by hundreds of miniatures. Players expand their territory through area control, build up their production engine, and call upon divine intervention to overcome rivals. The game captures the epic scale of the video game while translating it into a turn-based tabletop experience.

