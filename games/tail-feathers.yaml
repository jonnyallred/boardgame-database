description: |
  Tail Feathers is a miniature skirmish game set in the beloved world of Mice
  and Mystics, published by Plaid Hat Games in 2015. Players command teams of
  mice and rats mounted on bird miniatures that tilt on flight stands to indicate
  movement direction, creating a unique physical flight mechanic requiring player
  skill in maneuvering. Ground troops, pilots, and birds each have their own
  action cards representing special tricks and maneuvers. Players can enjoy
  standalone scenarios or link them into a full campaign, with units gaining
  skills from battle to battle. Miniatures from Mice and Mystics: Sorrow and
  Remembrance are compatible with this game.

