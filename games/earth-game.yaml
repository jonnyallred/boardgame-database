description: |
  Earth Game is a cooperative board game in which players manage fictional nations on Spaceship Earth, balancing resources and resolving emerging global problems. Players must engage in consultation, trade agreements, economic communities, and peacekeeping efforts to collectively solve worldwide challenges. The game is won when Earth's problems are solved cooperatively, and lost if a World War breaks out. Published with eco-friendly materials including recycled boards, soy-based inks, and water-based glues, the game has a strong environmental and peace-oriented ethos.

