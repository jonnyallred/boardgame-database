description: |
  Kanban: Driver's Edition is the original version of Vital Lacerda's automotive factory management game, published by Stronghold Games in 2014, in which 2-4 players compete as factory employees seeking to impress the demanding floor manager Sandra. Players take actions in a car manufacturing facility — managing supplies, designing new car parts, completing assembly, and training — while Sandra circulates through the factory issuing reviews that score player performance. The game offers a choice between "nice" and "mean" Sandra for adjustable difficulty, and its variable phase order creates a constantly shifting action environment. Kanban EV (2020) was a redesigned successor that streamlined this original experience.

