description: |
  Star Fighter is a 1978 science fiction board game of tactical space combat published by Heritage Models under
  the Gametime Games imprint. Two to four players command starfighters in a simple tactical engagement format
  suitable as an introduction to space wargaming. The game emphasizes accessible rules over simulation depth,
  making it an entry point for younger players interested in science fiction combat games during the late 1970s
  space opera golden age.

