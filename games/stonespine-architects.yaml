description: |
  Stonespine Architects is a card-drafting dungeon-design game designed by Jordy Adan (creator of Cartographers) and published by Thunderworks Games in 2024. Players act as rival dungeon architects competing to build the most impressive labyrinth for 1–5 players by drafting room cards and placing them into their dungeon layout. Each room scores based on adjacency and set-collection patterns, encouraging thoughtful spatial planning. The competitive drafting ensures opponents' choices are as important as your own, creating a satisfying back-and-forth tension as architects race to complete the most fearsome dungeon.

