description: |
  The Beastlord is a 1979 Yaquinto Publications fantasy wargame and one of that publisher's eight
  inaugural titles. Set in the valley of Cym Bel Eanon, two to four players command one of four
  warring factions — elves, goblins, humans, and beasts — each with distinct strengths and
  capabilities. The game uses a hex-and-counter movement system with hidden movement and variable
  victory conditions, making each faction's path to victory different and preventing simple
  rush-and-conquer strategies. It captures the flavor of classic fantasy warfare at the tactical
  level in a relatively accessible format.

