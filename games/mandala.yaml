description: |
  Mandala is an elegant two-player card game of indirect conflict and hidden value. Players
  compete for cards across two shared mandala zones, but the twist is that card values are
  not revealed until well into the game—the colors you play to the mountain become points
  only after the first player claims the stream. Managing what you put into the mandala
  versus what you collect, while deducing which colors will be most valuable, creates a
  rich and tense duel in a compact 20-minute package.

