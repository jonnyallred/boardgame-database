description: |
  Nuclear War is a satirical multiplayer card game simulating an apocalyptic conflict fought with nuclear weapons, originally published in 1965. Each player starts with population cards representing millions of citizens and must assemble warheads onto delivery systems — missiles, bombers, and ICBMs — before launching devastating attacks on opponents. The game famously forces a "last player standing" logic where even the winner may perish in retaliatory strikes, giving it a darkly comedic tone about mutually assured destruction. A classic of American gaming, it inspired numerous expansions and remains a cult favorite for its gleefully chaotic eliminate-everyone gameplay.

