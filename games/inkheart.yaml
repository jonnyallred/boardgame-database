description: |
  Inkheart is a board game published by Ravensburger in 2009 as a tie-in to the fantasy film adaptation of Cornelia Funke's beloved novel. Players navigate the world of the Inkworld, encountering characters and situations from the story as they race to complete story-driven objectives. The game targets families and fans of the book and film, using the rich Inkheart setting to provide a narrative context for its accessible adventure mechanics.

