description: |
  Three-dimensional chess refers to a family of chess variants played across multiple stacked boards, with the earliest documented form being Raumschach (Space Chess), invented in 1907 by German inventor Ferdinand Maack. Various three-dimensional variants have been developed over the decades, most famously the Tri-Dimensional Chess seen in the TV series Star Trek, played by Mr. Spock and other crew members. Three-dimensional chess dramatically expands the tactical and strategic possibilities of standard chess by adding vertical movement to diagonal, horizontal, and vertical attacks, requiring players to visualize threats across multiple planes simultaneously.

