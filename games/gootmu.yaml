description: |
  G.O.O.T.M.U. (Get Out of the Maze Unit) is an abstract tile-laying game for 2-6 players designed by Tom Jolly, creator of the beloved Wiz-War. Players navigate through a maze constructed from randomly placed tiles, competing to be the first to reach the exit. Like Wiz-War, the board is assembled from random tile placement, ensuring a different maze configuration in every game. The game offers a lighter, more accessible experience than Wiz-War while retaining the emergent puzzle quality of Jolly's design style.

