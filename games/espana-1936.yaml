description: |
  España 1936 is a two-player historical wargame designed by Antonio Catalán and published by Devir that simulates the Spanish Civil War (1936-1939) at the operational level. Each player commands either the Nationalist or Republican forces across a map of Spain divided into connected zones, spending ten turns moving troops, fighting battles, and controlling key objective areas. The game innovatively eliminates the traditional Combat Results Table — combat is resolved with dice modified by unit strength and card plays, keeping the pace brisk. Players receive event cards each turn that can be played either for their historical event effect or as combat modifiers, creating meaningful decisions throughout. A critically acclaimed and long-running title, it was nominated for multiple awards and received a revised 2024 edition.

