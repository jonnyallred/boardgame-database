description: |
  Star Trek: Ascendancy is a 4X game of exploration, expansion, and conflict designed by Aaron Dill, John
  Kovaleski, and Sean Sweigart, published by Gale Force Nine in 2016. Three asymmetric factions — the United
  Federation of Planets, the Klingon Empire, and the Romulan Star Empire — race to build space lanes connecting
  star systems on a modular, ever-expanding galaxy board. Players gather resources, develop technology, and field
  fleets in order to achieve Ascendancy — dominance over the known galaxy — while thematically playing up each
  faction's unique traits through variable player powers and encounter events.

