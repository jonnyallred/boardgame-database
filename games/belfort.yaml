description: |
  Belfort is a worker placement and area majority game designed by Sen-Foong Lim and
  Jay Cormier, published in 2011. Players build fantasy buildings in the five districts
  of the pentagonal city, hiring gnomes and elves as workers to run them and gain
  special abilities. At the end of each of the seven game rounds, players score for
  majority in each district and for each worker type, creating multiple layers of
  competition. The game blends tight worker placement with area control scoring in
  an accessible fantasy Euro package.

