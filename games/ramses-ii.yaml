description: |
  Ramses II is an abstract strategy game published by Ravensburger set in ancient Egypt where players compete to excavate and collect colored scarab beetles hidden in sand tiles arranged on the board. Players strategically dig through the sand, claiming scarabs of their color and blocking opponents, in a competitive treasure hunt across the desert. The game combines simple tile-pushing mechanics with a thematic Egyptian presentation, making it an accessible and visually appealing game for families.

