description: |
  Detective Charlie is a cooperative family deduction game designed by Théo Rivière and published by IELLO/LOKI, in which 1-5 players work together to solve mysteries in the city of Mysterville. Players roll a die to move Detective Charlie around the board, interviewing witnesses who each know one detail that helps eliminate suspects. The game includes 6 cases of increasing difficulty, making it a good introductory mystery game for children aged 7 and up. Its approachable deduction mechanics, short playtime, and cooperative nature make it an excellent gateway to more complex mystery games.

