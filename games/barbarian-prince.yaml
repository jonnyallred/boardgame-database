description: |
  Barbarian Prince is a landmark 1981 solitaire adventure game published by the Dwarfstar Games line of Heritage Models, in which the player directs exiled prince Cal Arath on a 70-day quest to raise 500 gold pieces to reclaim his stolen throne. A modular adventure booklet with 343 interlinked event nodes generates varied encounters each play, while dice and tables resolve combat and random events on a hex map of barbarian lands. Awarded the Charles S. Roberts Award for Best Fantasy Boardgame of 1981, it was hailed as "the most satisfactory solo game" of its era and remains an important forerunner of modern solo board gaming. The rules are now freely available online.

