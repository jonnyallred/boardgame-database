description: |
  Last Night on Earth: The Zombie Game is an asymmetric survival horror board game in which one or two players control a shambling horde of undead while the remaining players work cooperatively as small-town Heroes trying to survive. Played over a series of scenario-driven objectives — such as finding gas for a truck or holding out until dawn — the game unfolds on a modular board that recreates the buildings and streets of a zombie-infested town. Each scenario changes win conditions dramatically, and the game includes a CD soundtrack to heighten atmosphere. With over 22 plastic miniatures, cinematic scenarios, and narrative tension, it delivers the feel of a classic zombie horror film.

