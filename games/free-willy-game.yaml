description: |
  The Free Willy Game is a children's board game published by Milton Bradley in 1995, based on the popular Free Willy movie franchise about a killer whale. Players must help Willy and his whale friends escape from the villainous Rockland Stone, who pursues them with a high-tech vessel equipped with sonar. Designed for 2-4 players ages 6-10, the game captures the adventurous rescue theme of the films in a simple, accessible format aimed at young fans of the movie series.

