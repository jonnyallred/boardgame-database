description: |
  Schaska is a vintage 2-player abstract racing game published by Ravensburger in 1973 as part of their Traveler's Series of compact games. The game board is composed of five interchangeable tiles that can be oriented in different ways, creating a large number of possible track configurations. Players move their pawns in opposite directions along the modular track, aiming to be the first to reach the other end. The variable board setup ensures each game presents a fresh challenge.

