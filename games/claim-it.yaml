description: |
  Claim It! is a press-your-luck territory game published by Wattsalpoag Games for 2-5 players. Players roll three dice on their turn to stake claims on spaces of a shared board, accumulating territory but risking a "bust" if they roll a combination they cannot use — losing everything claimed that turn. Players can also steal rivals' claims or permanently lock down territory with a doubled claim. The winner is the player with the single largest connected group of territories. Fast-playing and light, Claim It! combines push-your-luck tension with simple spatial competition.

