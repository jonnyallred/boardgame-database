description: |
  Dingbats is a rebus puzzle franchise devised by Paul Sellers in 1980 and first published as a board game in 1987. Players solve rebuses — cryptic arrangements of symbols, letters, and pictures that hide a common word or phrase — competing to be first to crack each puzzle. Published under different names in different markets (Whatzit? in the USA by Parker Brothers, Katch-Its in Australia, and Dingbats everywhere else), the game became a long-running family staple particularly popular in the UK, where publisher Gibsons revived it for new editions decades later.

