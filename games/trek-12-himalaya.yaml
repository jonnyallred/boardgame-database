description: |
  Trek 12: Himalaya is a roll-and-write mountaineering game designed by Bruno Cathala and Corentin Lebrat, published by Lumberjacks Studio in 2020 and Pandasaurus Games internationally in 2021. Each turn, players roll two dice and choose one of five mathematical operations to combine them, writing the resulting number in a hex on their personal mountain map. Numbers must connect in valid ascending chains, and players score for the longest chain, the most isolated peaks, and completing camp circles. Playable by enormous groups simultaneously, Trek 12 combines light campaign elements with satisfying number-placement puzzle decisions.

