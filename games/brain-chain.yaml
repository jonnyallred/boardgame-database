description: |
  Brain Chain is a strategy-and-trivia board game for two or three players or teams,
  played on a 10x10 category grid with an exterior track. Players answer trivia questions
  to place colored "links" on corresponding grid spaces, racing to form an unbroken
  horizontal, vertical, or diagonal chain of six links to win — a blend of Trivial
  Pursuit knowledge and Go-Moku spatial strategy. Games Magazine named Brain Chain a
  Top 100 Game, and playing time scales with the winning chain length chosen.

