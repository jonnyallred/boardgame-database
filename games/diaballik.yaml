description: |
  Diaballik is a two-player abstract strategy game designed by Philippe Lefrançois, simulating a sport in which each team attempts to advance their ball to the opponent's goal line on a 7x7 grid. Each player controls seven pieces arranged along their home edge with the ball held by the center piece; on each turn a player may move an empty piece, pass the ball between adjacent pieces, and optionally rotate pieces — aiming to reach the opponent's baseline while forming strategic walls to block the opponent's passing lanes. Crucially, a player who creates an impenetrable barrier loses automatically, adding a self-defeating risk to defensive play. The game has attracted theoretical computer science study for its combinatorial depth.

