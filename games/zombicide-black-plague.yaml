description: |
  Zombicide: Black Plague transplants the cooperative zombie survival gameplay of the original
  Zombicide into a fantastical medieval setting. Players control paladins, dwarves, knights, and
  magicians wielding swords, crossbows, and magic spells against zombie hordes commanded by
  Necromancer overlords. The addition of magic-wielding characters and Necromancer mechanics
  that spawn reinforcements give Black Plague a distinct flavor while preserving the survivor
  experience system and action-point structure of its predecessor.

