description: |
  Mercado de Lisboa is a fast-paced tile-placement game co-designed by Vital Lacerda set in the famous Lisbon market. Players pay to open market stands and restaurants on a shared board, trying to attract customers and earn money from their neighbors' matching stalls. With straightforward rules but deep tactical choices — about where to place tiles, which restaurants to open, and how to maximize income from other players' actions — it plays in under an hour and rewards careful timing. The game offers surprising depth for a compact euro experience.
