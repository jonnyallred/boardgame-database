description: |
  Toc Toc Toc! is a Halloween-themed bluffing card game designed by Bruno Faidutti and Gwénaël Bouquin and published by Asmodee in 2004. On each turn a player offers a face-down card to an opponent who must decide to accept it or return it to the sender — without ever seeing what it is — creating escalating tension as desirable guests (musicians) and undesirable monsters (vampires, ghosts, Frankenstein) circulate around the table. The elegant bluffing mechanic and spooky theme make it accessible fun for families and casual players.

