description: |
  Three-player chess encompasses a wide family of chess variants adapted for exactly three players, typically played on a hexagonal board or a modified board combining three standard chessboards arranged around a central hub. Documented as far back as the early 18th century, three-player chess introduces entirely new strategic dimensions: alliances of convenience, kingmaking dynamics, and asymmetric threats from multiple directions simultaneously. The fundamental challenge of three-player chess—preventing any single player from winning while not inadvertently helping a third—creates a uniquely political dimension absent from the two-player game.

