description: |
  Bosworth is a multi-player chess variant manufactured by Out of the Box Publishing
  since 1998, played on a 6x6 board using four sets of standard chess pieces. It
  accommodates two to four players with pieces moving according to standard chess rules
  (with minor modifications), but unlike chess there is no checkmate — kings can be
  captured, and the last player with a surviving king wins. The four-player free-for-all
  chess format creates multi-player diplomacy and shifting alliances absent from
  the two-player original.

