description: |
  Delve: The Dice Game is a solo print-and-play dice game designed by Drew Chamberlain in 2009, in which a player leads a party of four classic fantasy adventurers — Fighter, Rogue, Wizard, and Cleric — through six groups of monsters culminating in a dragon battle. Players roll six dice up to three times per turn, allocating results to their heroes to defeat enemies using a Yahtzee-style mechanic. The game requires only six standard dice and a way to track health, making it one of the most accessible solo dungeon crawl experiences available. A digital iOS adaptation was published by Code Bunny Games in 2012.

