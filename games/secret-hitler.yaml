description: |
  Secret Hitler is a social deduction game for 5–10 players set in the turbulent Weimar Republic of 1932. Players are secretly assigned roles as Liberals or Fascists, with one player secretly playing as Hitler. Liberals must enact five liberal policies or assassinate Hitler before the Fascists enact six fascist policies or elect Hitler as Chancellor. Each round, a President and Chancellor are elected, and they secretly pass or kill policies from a randomly drawn hand — creating tension, suspicion, and often spectacular accusations. The game distills the paranoia and political theatre of hidden-role games into a fast, highly replayable experience that scales expertly from 5 to 10 players.

