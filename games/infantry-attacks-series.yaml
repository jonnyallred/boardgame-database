description: |
  Infantry Attacks is a series of hex-and-counter wargames published by Avalanche Press, designed to simulate World War I infantry combat at the company and battalion level. The series draws on Erwin Rommel's classic military memoir Infantry Attacks as a conceptual source, focusing on the aggressive infiltration tactics that defined the war's later phases. Multiple titles in the series cover different campaigns and theaters, with consistent rules allowing players to mix and match scenarios across the product line.

