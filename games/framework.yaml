description: |
  Framework is a fast abstract tile-placement game by Uwe Rosenberg in which players
  draft tiles depicting frames and tasks in four colors. Each turn the lead player draws
  one more tile than there are players, and each player selects one to place adjacent
  to their existing display, checking whether tasks on tiles are completed. The first
  player to place all of their tokens on completed tasks wins. A solo mode challenges
  players to fill a 5x5 grid as efficiently as possible.

