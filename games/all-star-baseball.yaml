description: |
  All Star Baseball is a 1941 baseball simulation board game designed by major league outfielder
  Ethan Allen and published by Cadaco-Ellis, considered the best-selling baseball board game of all
  time. Players place circular player cards on a spinner mechanism mounted over a baseball diamond;
  spinning determines at-bat outcomes based on historical statistics encoded in each card's
  proportionally sized sections.

  A second spinner handles baserunner advancement, creating a two-spinner system that models
  batter performance well while keeping rules accessible for young players (target age 9-12).
  Unlike simulation-focused competitors such as Strat-O-Matic, All Star Baseball prioritizes
  fun over accuracy. It has been honored as one of the fifty most influential American board games
  of all time and remained in production across many decades and editions.

