description: |
  Octoverso is a French-language word game in which eight double-sided letter tiles are arranged on a rotating rail in the center of the table. Each player holds a hand of letter tiles and must form a word that begins with the last two letters — or ends with the first two letters — of the current word on the rail, effectively linking new words to the communal chain. Because the rail rotates, four valid connection points are theoretically available each turn, giving players multiple ways to build on the shared sequence. The first player to play all their tiles wins. Octoverso blends the chain-building pleasure of word games with a physical rotating component that keeps the valid plays changing each round.

