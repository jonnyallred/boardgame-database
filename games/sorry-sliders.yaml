description: |
  Sorry! Sliders is a dexterity variant of the classic Sorry! franchise published by Hasbro. Players slide
  roller pawns down a track onto a shared target board, aiming for the bullseye center for the highest score.
  Bumping opponents' pawns away from valuable scoring circles adds a satisfying interactive element. Points
  scored from landing on circles move scoring pawns toward Home, and the first player to get all four scoring
  pawns home wins in this compact, tactile family game.

