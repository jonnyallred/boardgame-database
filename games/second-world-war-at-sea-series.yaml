description: |
  The Second World War at Sea series is a comprehensive operational and tactical naval wargame series published by Avalanche Press, founded by Mike Bennighof and Brian Knipple, covering WWII naval campaigns across multiple theaters. Each entry in the series focuses on a specific campaign — such as Java Sea, Arctic Convoy, or Coral Sea — using a consistent rule system that models ship-to-ship engagements, fleet movements, and strategic decisions. Based on Avalanche Press' Great War at Sea system, the series is known for its deep historical research, extensive order-of-battle detail, and attractive map and counter presentation.

