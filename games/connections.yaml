description: |
  Connections is a daily category-matching word puzzle published by The New York Times, created by puzzle editor Wyna Liu and launched in beta on June 12, 2023. Players are presented with 16 words and must group them into four categories of four, with each category sharing a hidden common theme — categories range from straightforward to fiendishly tricky. The puzzle is color-coded by difficulty (yellow, green, blue, purple), and players get four chances before failing. It became one of the most viral word games of the 2020s, spawning licensed physical editions and a sports spin-off.

