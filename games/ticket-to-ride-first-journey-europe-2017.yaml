description: |
  Ticket to Ride: First Journey (Europe) is a 2017 children's standalone entry in the Ticket to Ride series by Alan R. Moon and Days of Wonder, featuring a simplified European map designed for ages 6 and up. Players collect colored train cards to claim routes connecting cities shown on their tickets, with bigger playing pieces, shorter connections, and a quicker playtime of 15-30 minutes that makes it ideal for introducing young players to the Ticket to Ride experience. The game includes a special "Golden Ticket" bonus card for an added layer of excitement. It is the European counterpart to the simultaneously released US First Journey version.

