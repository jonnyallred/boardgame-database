description: |
  Egghead is a solo logic puzzle game from Gamewright. Players select one of 40 challenge cards that provide number and color clues, then use logic to determine the correct placement of 16 egg-shaped pieces on a grid. Difficulty ramps through the included challenge levels, providing a satisfying solo brain-teaser for players who enjoy deductive reasoning in a compact, portable format. The game includes a carrying case with lid, making it ideal for travel.

