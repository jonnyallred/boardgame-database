description: |
  The Battle of Raphia, 217 B.C. is a two-player hex-and-counter wargame published by Game Designers'
  Workshop in 1977 as the first entry in their "Series 120" line — games intentionally limited to 120
  counters and designed to be completed in roughly 120 minutes. It simulates the climactic clash between
  the Ptolemaic Egyptian and Seleucid Syrian empires, one of the largest ancient battles involving war
  elephants. One player commands the Egyptians under Ptolemy IV, the other the Seleucids under Antiochus
  III, maneuvering infantry, cavalry, and elephant units across an 18"x24" hex grid scaled at 100 yards
  per hex. The compact format makes this an accessible entry point into ancient warfare simulation.

