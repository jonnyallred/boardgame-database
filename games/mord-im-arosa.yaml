description: |
  Mord im Arosa (Murder at the Arosa) is a deduction and bluffing game designed by Alessandro Zucchini and published by Zoch Verlag in 2011, named after the famous Essen hotel that hosts Spiel. Two murders have occurred at the hotel, and players are all suspects — the winner is whoever accumulates the least suspicion by the game's end. The core mechanic is auditory: wooden clue cubes are dropped down a shaft in a miniature hotel tower, and players must listen carefully to determine which floor the cubes land on, using that information to place blame on opponents. Despite its murder theme, the game involves no deduction of a culprit — only the deflection of suspicion.

