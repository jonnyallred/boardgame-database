description: |
  Spellmaker is a fantasy board game published by Heritage Models (Gametime Games) in which rival wizards
  compete to rescue a princess from a dragon and bring her safely to their castle. Players cast spells from
  enchanted towers that can transform Giants into Toads, Frogs into Knights, and various other magical
  transformations to impede opponents or clear a path for the princess. The first wizard to successfully
  escort the princess to their castle wins this whimsical competition of magical strategy.

