description: |
  Grave Robbers from Outer Space is an open-format collectible card game designed by Stephen Tassie and originally published by Z-Man Games in 1996. Players take on the role of rival B-movie directors, building up their films with Characters, Props, Locations, and Special Effects cards while siccing Creature cards on opponents' productions. The game lovingly parodies science fiction and horror movie clichés, with each card referencing beloved schlock cinema archetypes. Its open-source design allowed community expansion packs and eventually a Director's Cut crowdfunding revival.

