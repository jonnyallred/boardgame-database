description: |
  Morris the Dodo is a cooperative children's dexterity game designed by Jérôme Soleil and Emilie Soleil, published by Blue Orange. Players work together to help Morris the dodo hide his eggs from an explorer by sliding Morris down a waterfall and carefully placing eggs in hidden spots around the board. The simple cooperative premise and tactile sliding mechanic make it an ideal introductory game for very young children, encouraging teamwork and fine motor coordination through lighthearted play.

