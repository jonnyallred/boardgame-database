description: |
  Congkak is a traditional mancala game played throughout Southeast Asia, known as Congklak or Dakon in Indonesia, Sungka in the Philippines, and by other regional names. Played on carved wooden boat-shaped boards with two rows of seven holes and a store at each end, players sow seeds — traditionally cowrie shells, pebbles, or tamarind seeds — around the board, capturing them in their store hole. Believed to have been introduced to the Malay world by Indian or Arab traders in the 15th century, it has been played at courts and villages across Malaysia, Indonesia, Brunei, and the Philippines for centuries. The name derives from the old Malay word for mental calculation, reflecting the game's emphasis on planning several moves ahead.

