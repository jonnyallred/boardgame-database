description: |
  A collection of two board wargames published by SPI in 1972 simulating Napoleon's disastrous invasion of Russia. One game uses a traditional hex grid map at corps/division level across nineteen turns from late June to December, while the other uses an innovative area movement system with large zones. The hex game includes three scenarios covering Borodino, the October retreat, and the full campaign. Highly regarded for its scope and ambition, Nick Palmer called it "one of the most ambitious projects from SPI."

