description: |
  Fallout: The Board Game is a 2017 narrative adventure game designed by Andrew Fischer and Nathan I. Hajek and published by Fantasy Flight Games, set in the iconic post-apocalyptic universe of Bethesda's Fallout video game series. Players take on the roles of survivors exploring the irradiated wastes, completing quests, building their characters, scavenging supplies, and navigating a dynamic faction conflict that determines the fate of the wasteland. Each scenario is driven by a scenario-specific agenda deck that creates a branching story reflecting players' choices and deeds. The game supports both cooperative and competitive modes, and features extensive thematic integration of locations, characters, and factions from the Fallout franchise.

