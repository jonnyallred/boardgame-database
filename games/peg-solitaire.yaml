description: |
  Peg Solitaire is a classic solo puzzle game with origins traced to the French court of Louis XIV around 1697. The standard game begins with all 32 pegs filling a cross-shaped 33-hole board except for the center, and the player must eliminate pegs by jumping one peg orthogonally over an adjacent peg into an empty hole — removing the jumped peg. The goal is to reduce the board to a single peg, ideally landing it in the center hole. Despite its simple rules, the puzzle presents deep combinatorial challenges; arriving at the perfect single-peg solution requires careful planning of jump sequences. Its elegant difficulty made it a beloved mathematical puzzle for centuries.

