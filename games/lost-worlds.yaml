description: |
  Lost Worlds is a simultaneous-movement combat system published in 1983 in which each player holds a booklet representing a fantasy combatant — warrior, mage, or creature — and chooses movement and action codes each round that are looked up to reveal illustrated outcomes. Players simultaneously reveal their choices and cross-reference results in their books to see who struck whom and for how much damage. The booklet format is central to the design: each booklet depicts fights from that character's perspective, so different combinations of booklets create different combat scenarios. Published in a long series of individual booklets, Lost Worlds pioneered the "gamebook combat" genre.

