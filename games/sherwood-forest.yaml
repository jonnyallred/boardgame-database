description: |
  Sherwood Forest is a negotiation and bluffing game designed by Nils Finkemeyer and published by eggertspiele/Rio Grande Games in 2009, in which players compete to be the most successful outlaw leader by robbing nobles and donating the most valuable spoils to the poor. Players use fighting, negotiation, and bluffing to outwit rivals when waylaying noble carriages, forming temporary alliances and betraying them as needed. The Robin Hood theme and quick negotiation mechanics make it an engaging social game for groups who enjoy light conflict and deal-making.

