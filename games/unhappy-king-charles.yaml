description: |
  Unhappy King Charles! is a card-driven two-player wargame covering the English Civil War of 1642-1645, designed by Charles Vasey and originally published by GMT Games in 2008 (republished by PHALANX). Players command either Royalist or Parliamentarian forces, competing for control of England's regions and economic centers. Based on Mark Herman's "We the People" card-driven design, the game expertly captures the English Civil War's unique characteristics: the high desertions rate, difficulty controlling regional troops, and the gradually growing strength of Parliament. It is highly regarded for thematic historical accuracy combined with accessible card-driven mechanics.

