description: |
  The Red Cathedral is a 2020 Euro game by Devir designed by Israel Cendrero and Sheila Santos (Llama Dice), in which 1-4 players compete as construction teams racing to complete sections of St. Basil's Cathedral in Moscow under the orders of Ivan the Terrible. The central mechanism is a dice-drafting rondel: players choose a die from a circular track, advance it forward by as many spaces as its face value, and collect the resources at the destination space. Players then assign sections of the cathedral to build, spend resources, or visit the market for additional options. The interplay between dice values, rondel positioning, and section competition creates a tightly elegant engine that belies its accessible rules.

