description: |
  Red November is a cooperative survival game designed by Bruno Faidutti and Jef Gontier in which players control gnomes aboard a sinking Soviet submarine trying to keep it functional long enough to be rescued. Each turn, gnomes spend precious minutes moving and performing actions — fixing fires, floods, malfunctioning systems, and kraken attacks — while managing a sobriety track as terrified gnomes drink grog for courage and risk passing out at critical moments. Published by Fantasy Flight Games in 2008, the game combines dark comedy with genuine tension as cascading disasters pile up aboard the doomed vessel.

