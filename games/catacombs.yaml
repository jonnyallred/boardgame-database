description: |
  Catacombs is a pioneering dexterity dungeon-crawl game designed by Ryan Amos, Marc Kelsey, and Aron Murch, first published by Elzra Games in 2010 and winner of the BoardGameGeek Most Innovative Game of 2010. One player takes the role of the Catacomb Lord, controlling dozens of monster discs, while the other players cooperate as heroes, with all combat resolved by physically flicking wooden discs across the board — missiles, fireballs, and melee hits all played out on the table surface. Each hero and monster has unique abilities, critical hits, and status effects, making this the first fantasy dungeon crawler to fuse tabletop physics with RPG-inspired depth.

