description: |
  Class Struggle is a Marxist-themed board game designed by New York University political science professor Bertell Ollman and published by Avalon Hill in 1978. Players represent socioeconomic classes — particularly Workers and Capitalists, symbolized by hammers and top hats — competing for political power in a loosely Monopoly-inspired framework. Intended to teach Marxist political theory through play, the game was commercially successful, selling around 230,000 copies and being translated into Italian, German, French, and Spanish. It remains a culturally significant novelty as the only mass-produced socialist board game in American history.

