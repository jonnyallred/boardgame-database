description: |
  Solar Conquest is a vintage space conquest board game published by A-Tech Enterprises in 1966. Players compete
  to conquer planets and territories across the solar system in a classic area-control format, representing the
  early wave of science fiction board games that followed the Space Age. Specific rules details are scarce for
  this rare game, but it reflects the era's fascination with space exploration translated into competitive
  tabletop play.

