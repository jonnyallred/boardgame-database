description: |
  Schoko & Co. is an economic board game published by Schmidt Spiele in 1987 that simulates running a chocolate factory. Players buy raw cocoa, process it into various chocolate products, and sell them at market meetings to distributors, all while managing staff and production costs. The game won the 1986 Concours International de Créateurs de Jeux de Société and was an early example of the economic Euro-style game that would become more prevalent in subsequent decades.

