description: |
  A Finnish trivia board game published by Tactic Games in cooperation with the Finnish Donald Duck (Aku Ankka) magazine. Players travel through six decades representing the magazine's publishing history from the 1950s through the 2000s, answering trivia questions about Donald Duck comic stories to earn a magazine from each decade. The board centers on a "Time Machine" through which players must travel between decades. With a heavy focus on Carl Barks and Don Rosa stories, the game celebrates Finland's beloved Donald Duck comic tradition—the Finnish Aku Ankka is one of the most-read comics in the country.

