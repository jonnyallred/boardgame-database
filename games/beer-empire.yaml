description: |
  Beer Empire is a competitive board game published by Board&Dice in 2016 in which
  players manage their own brewery, composing beer recipes from ingredient tiles — malts,
  hops, fermentation types, and container types — then bidding for market share and
  submitting beers to festivals for judging. The game runs over six turns with biennial
  beer festivals where players' submissions are evaluated by critics. Balancing market
  trends against festival preferences is the key strategic tension, rewarding players
  who can read what consumers and critics desire each season.

