description: |
  Deal Me In is a tile-laying board game published by Noraut in 1988 in which players place tiles representing playing cards on an 11x11 matrix board, forming poker hands for points — effectively "Scrabble with poker hands." Players strategically place cards to create horizontal, vertical, or diagonal poker hands while also positioning tiles to deny good placements to opponents. The familiar poker hand hierarchy (pairs, straights, flushes, full houses) gives the game an approachable scoring system for anyone who knows card games.

