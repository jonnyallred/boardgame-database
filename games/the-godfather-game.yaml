description: |
  The Godfather Game is a 1971 economic board game by Jody Porter and Family Games Inc., in which
  players are mob bosses competing to control criminal rackets across eight neighborhoods of a city
  and accumulate the most money to become the Godfather. Five types of rackets — bookmaking,
  extortion, bootlegging, loan sharking, and hijacking — each have different cash values in each
  neighborhood. Control of a neighborhood works similarly to Go: occupy or surround more than half
  the neighborhood to dominate it. The game captures the territorial nature of organized crime
  economics in an accessible board game format released the same year as the Coppola film.

