# Description
description: |
  A unique two-player World War I aerial combat game that uses illustrated picture books
  instead of a board or miniatures. Each player holds a booklet showing the cockpit view
  and maneuver options; both players simultaneously choose a maneuver number, then flip
  to the referenced page in both books to see the new positions. The books update to show
  whether you've gained or lost position, enabling gunfire. The book-based system
  elegantly simulates three-dimensional dogfighting without any physical components
  beyond the two booklets. Multiple series exist including the Handy Rotary Series
  and the Powerhouse Series for WWI and WWII aircraft respectively.

