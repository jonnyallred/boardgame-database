description: |
  Sun Tzu is a 2005 Matagot two-player area control and hand management game set during the ancient Chinese struggle between the states of Wu and Chu. Each player holds cards numbered 1-6 (which cycle back to hand after use), simultaneously assigning one card face-down to each of five provinces on the central map. Cards are then revealed and compared — higher values claim the province, pushing a scoring marker toward the victor's side of the track. Over nine rounds, players probe each other's tendencies, bluff, and adjust strategy in what plays like psychological warfare inspired by the Art of War.

