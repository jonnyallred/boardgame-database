description: |
  Empires of the Middle Ages is a grand strategy board game designed by Anthony F. Buccini, Jim Dunnigan, and Redmond A. Simonsen, published by Simulations Publications Inc. (SPI) in 1980. Subtitled "A Dynamic Simulation of Medieval Europe, 771–1467," the game simulates nearly seven centuries of medieval history including diplomacy, warfare, religion, and economic development across Europe. Players control major medieval powers competing for territorial dominance and cultural influence across an expansive map. The game won the 1980 Charles S. Roberts Award for Best Pre-20th Century Boardgame and was included in the 2007 book Hobby Games: The 100 Best.

