description: |
  Villagers is a card-drafting and tableau-building game designed and illustrated by Haakon Hoel Gaarder, published by Sinister Fish Games in 2019. Players build a medieval village by drafting villager cards from a central market — each new recruit unlocking the ability to hire further specialists in a cascading chain of dependencies. The art is entirely hand-drawn by the designer and gives the game a warm, storybook quality. Funded through Kickstarter as one of the most-backed UK campaigns of its time, Villagers is praised for its clean rules, satisfying engine-building arc, and strong solo mode.

