description: |
  Kangaroo: The Jumping Game is a two-player abstract strategy game played on an 8x8 grid, designed by John Flagg and published by The Flaggs, Inc. in 1977. Each player starts with two rows of pieces and takes turns jumping over pieces — their own or their opponent's — in any direction, with jumped opponent pieces removed. Multi-jump chains are allowed as in checkers, but pieces move in all directions (not just forward). Pieces that reach the opponent's end of the board are worth double points. Victory goes to the player with the most points at game end, rewarding calculated aggressive jumping and defensive positioning.

