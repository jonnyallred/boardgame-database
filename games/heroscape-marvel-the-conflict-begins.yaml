description: |
  Heroscape Marvel: The Conflict Begins is a 2007 Marvel-themed master set for the Heroscape system, published by Milton Bradley under Hasbro. Players build modular 3D hex terrain incorporating new warehouse, asphalt, and concrete sections, then command iconic Marvel heroes and villains — including Spider-Man, Iron Man, Hulk, Captain America, Venom, Thanos, and Doctor Doom — each with unique stat cards. Like the original Heroscape, it includes both a streamlined basic game and a full master game with special powers and engagement rules.

