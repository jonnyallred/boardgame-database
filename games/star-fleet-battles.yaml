description: |
  Star Fleet Battles is a ship-to-ship tactical wargame set in the Star Fleet Universe — an alternate Star Trek
  setting — originally designed by Stephen V. Cole and published in 1979 by Task Force Games, now maintained by
  Amarillo Design Bureau. Using hexagonal map counters and a distinctive 32-impulse turn system, players simulate
  detailed starship combat where each ship's weapons, shields, engines, and crew are individually tracked and
  managed. The game is celebrated for its extraordinary depth: boarding parties, shuttlecraft, electronic
  countermeasures, and dozens of ship types across multiple races create an almost infinite tactical space.

