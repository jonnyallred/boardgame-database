description: |
  Phoenix: New Horizon is a Euro-style worker placement game from Perro Loko Games in which 1–4 players control teams of commandos tasked with recolonizing Earth across four rounds. Players accumulate victory points by constructing regenerators and buildings, growing the planet's population, and completing diverse objectives that change between playthroughs. The game features different worker types with unique abilities, connection-based network building, and contract fulfillment for additional scoring. Variable setup ensures high replayability, and the cooperative rebuilding-of-civilization theme creates a satisfying sense of progress across the game's arc.

