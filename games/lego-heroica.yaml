description: |
  Lego Heroica is a line of buildable dungeon-crawling board games released by Lego in 2011 as part of their Heroica system. Players assemble the dungeon from actual Lego bricks before playing, then control miniature Lego hero figures navigating through rooms and fighting monsters using a custom die. The game is designed for children ages 7 and up, with modular dungeons from multiple sets (Fortaan, Nathuz, Draida Bay, Waldurk Forest, and others) that can be combined for larger adventures. The tactile satisfaction of building your game board and the approachable dungeon-crawl mechanics make it an excellent entry point for younger players.

