description: |
  War of 1812 is a two-player block wargame published by Gamma Two Games (later Columbia Games) in 1973, simulating the conflict between the United States and British/Canadian/indigenous forces in British North America. One player controls the American forces while the other commands the British, Canadian, and Tecumseh's confederacy. The game uses the distinctive wooden block system that provides fog of war through rotating unit strength values. It was later republished as part of Columbia Games' growing catalog of block wargames.

