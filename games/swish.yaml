description: |
  Swish is a real-time spatial pattern recognition game published by ThinkFun
  in 2011. Players race to find "Swishes" — valid combinations of two or more
  transparent cards that, when layered and possibly rotated or flipped, perfectly
  match every colored ball to a hoop of the same color. Sixteen cards are laid
  out at a time, and players compete to spot valid stacking combinations faster
  than their opponents. The game was a Toy of the Year nominee and challenges
  players' spatial intelligence in a fast and satisfying way.

