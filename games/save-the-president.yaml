description: |
  Save the President is a hidden-role board game published by Games for Pleasure Ltd. in 1980, set on American Inauguration Day during the President-elect's motorcade travelling from the White House. Players take on the roles of agents surrounding the president — but are they loyal bodyguards or have some secretly partnered with an assassin? The game blends movement, positioning, and deception as players try to determine who among their fellow agents can be trusted, making for a tense social deduction experience with a political thriller theme. Its hidden roles and motorcade setting create an atmospheric party game experience that anticipates many features of modern social deduction games.

