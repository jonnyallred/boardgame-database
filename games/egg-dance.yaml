description: |
  egg dance (also known as Dancing Eggs or Eiertanz) is a boisterous 2003 dexterity game from HABA designed by Roberto Fraga. Players roll two dice each turn: the red die indicates where on the body an egg must be held (under the chin, between the knees, in the crook of the arm, etc.), while the white die determines a speed action such as running around the table or making chicken sounds. Players collect egg cards by successfully completing challenges with eggs balanced on their bodies; the wooden yellow egg is worth double points. The game comes packaged in a real egg carton and is designed for riotous fun from age 5.

