description: |
  Mastermind is the iconic code-breaking game invented by Mordecai Meirowitz in 1970 and first published by Invicta Plastics in 1971–72. One player sets a secret sequence of colored pegs, and the other attempts to deduce it in a series of guesses, receiving black and white peg feedback to indicate exact and near matches. The game sold over 50 million copies across 80 countries, making it the most successful new game of the 1970s, and it remains a household staple used in mathematics education to illustrate logical deduction and information theory. Donald Knuth famously proved in 1977 that the code can always be broken in five moves or fewer.

