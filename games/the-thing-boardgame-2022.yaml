description: |
  The Thing: The Boardgame is a 2022 hidden-role horror game designed by Andrea Crespi and Giuseppe Cicero, published by Pendragon Game Studio and distributed by Ares Games, based on John Carpenter's 1982 cult film. One player begins secretly as the Thing while the others are human survivors at Outpost 31; the Thing seeks to infect the humans and prevent escape, while humans try to survive and escape the base through one of three possible exits. Players must manage food, power, and heat while investigating their companions, creating an atmosphere of escalating paranoia faithful to the film. The 1-8 player count and modular board make for a replayable and thoroughly thematic experience.

