description: |
  That Time You Killed Me is a two-player abstract strategy game with narrative
  depth, published by Pandasaurus Games in 2022. Three boards represent the
  past, present, and future, and each player controls copies of themselves
  scattered across timelines. On a turn, a player chooses a single copy on the
  board matching their focus token's timeline, then takes two actions —
  movement, time travel forward, or time travel back (leaving a copy behind).
  Copies are eliminated by being pushed into walls. Four chapters of escalating
  scenarios introduce new wild time-travel mechanics, building a structured
  narrative campaign of puzzle-like confrontations with rising complexity.

