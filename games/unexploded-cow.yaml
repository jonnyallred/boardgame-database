description: |
  Unexploded Cow is a darkly comic card game designed by James Ernest and Paul Peterson, published by Cheapass Games (later republished by Greater Than Games). Players are entrepreneurs who have hit upon a brilliant scheme: use European unexploded bombs to dispose of mad cows. Buy cows, march them through French mine fields, collect money when bombs go off. The "bomb die" mechanic determines which cow explodes, rewarding lucky players with cash from the communal pot. The game is deliberately absurd, quick, and accessible — a signature Cheapass Games title celebrated for its dark humor.

