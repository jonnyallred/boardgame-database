description: |
  Darkover is a 1979 licensed board game by Eon Products based on Marion Zimmer Bradley's science-fantasy Darkover novels, designed by Bill Eberle, Jack Kittredge, and Peter Olotka (the team that later created Cosmic Encounter). Players compete to seize and hold the Elhalyn Tower using a combination of armies and psychic powers drawn from Bradley's fictional world of telepathic "Comyn" aristocrats. Reviewers noted the game contains many party game elements alongside its wargame core. John Olsen gave it a rare 9/10 rating in White Dwarf #18.

