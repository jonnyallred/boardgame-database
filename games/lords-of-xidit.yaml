description: |
  Lords of Xidit is a programming and pick-up-and-deliver game set in the Seasons universe
  where players secretly assign their hero's actions for five turns before anyone moves.
  Each round players recruit soldiers and bards in cities, then use them to defeat monsters
  and claim influence in regions. The simultaneous programming means players race to beat
  each other to the most desirable locations without knowing exactly where rivals will go.
  Unique elimination-based scoring—where the player last in each category is removed
  before tallying—adds distinctive end-game tension.

