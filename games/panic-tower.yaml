description: |
  Panic Tower is a chaotic dexterity stacking game for 2-8 players designed by Andrew and Jack Lawson and published by Gigamic, in which players must stack wooden blocks of three different heights onto specific positions on a 3x3 grid as dictated by drawn cards. The 60 wooden blocks come in three sizes (small, medium, and tall) and the 114 playing cards determine precisely what size block must go where on the growing tower, creating ever-more-precarious balancing challenges. The game ends when someone topples the tower, making each placement feel increasingly tense. Fast, family-friendly, and filled with nervous laughter, Panic Tower is a reliable crowd-pleaser for players of all ages.

