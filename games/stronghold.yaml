description: |
  Stronghold is a 2009 asymmetric siege game by Ignacy Trzewiczek published by Portal Games. One player defends a castle against the other player's relentless horde of orcs, trolls, and goblins in a deeply asymmetric experience — invader and defender have entirely different rules and win conditions. The game's central innovation uses time as a resource: every action the invader takes generates "hourglass" tokens that the defender spends to prepare countermeasures. If the invader breaches any castle wall within 7 turns, they win; otherwise the defender survives. Winner of the 2010 International Gamers Award for Two-Player.

