description: |
  File 13 is a 1983 humor-themed board game designed by Tom Wham and published by TSR (originally appearing in Dragon Magazine #72). Players take on the roles of competing game publishers, each attempting to develop and market "hot item" games before their rivals can. "File 13" is a humorous euphemism for the trash can, which figures into the game's theme. The roll-and-move mechanics keep the game accessible and quick, making it a lighthearted novelty within TSR's catalog. It was later reprinted in the "Best of the Dragon Magazine Games" boxed set.

