description: |
  Le Grand Empire is a strategic Napoleonic wargame published by French publisher Shakos covering Napoleon's campaigns across Europe during the height of the French Empire. Players control the major European powers — France and its allies on one side, the various coalitions on the other — competing for territory and dominance across a map of Europe. The game models the political and diplomatic dimensions of the Napoleonic Wars alongside military operations, with players managing armies, economics, and alliances to achieve victory. A detailed simulation aimed at enthusiasts of the Napoleonic period with strong emphasis on period-accurate detail.

