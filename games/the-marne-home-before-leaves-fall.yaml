description: |
  The Marne: Home Before the Leaves Fall is a historical wargame simulating the First Battle of the Marne in September 1914, the pivotal engagement that halted the German advance through France and ended the war of movement on the Western Front, beginning the years of trench warfare. The title references the German Kaiser's promise that his troops would be home before the autumn leaves fell—a promise famously broken at the Marne. Two players command the German forces pursuing their Schlieffen Plan objectives and the Allied forces of France and Britain counterattacking in a desperate bid to halt the invasion of France.

