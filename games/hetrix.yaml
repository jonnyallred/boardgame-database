description: |
  Hetrix is a 2010 abstract tile-laying game published by AURUM in which players build a matrix over four rounds using tiles bearing six colors of gems, scoring by forming the longest color link on the board or by creating the most links possible. The game was reviewed positively by Tom Vasel of The Dice Tower as an accessible and visually appealing abstract. Simple rules and colorful components make it approachable for families while offering enough strategic depth to interest dedicated abstract game fans.

