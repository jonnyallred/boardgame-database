description: |
  Schotten-Totten is a 2-player card game by Reiner Knizia in which players compete to claim boundary stones arranged in a row by playing sets of three cards in poker-like combinations. Each of the nine stones represents a tug-of-war, and a player who claims five stones or any three adjacent stones wins. The elegant tension comes from limited hand information and the need to prove your claim before the opponent can improve theirs. Originally published in 1999, the game remains one of Knizia's most celebrated 2-player designs and was later adapted as Battle Line with tactical cards added.

