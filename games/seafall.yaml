description: |
  SeaFall is a legacy game by Rob Daviau set in an age-of-sail world emerging from a long dark age, where 3–5 players take on the roles of seafaring provinces competing to explore islands, exploit resources, and dominate trade routes over approximately 15 campaign sessions. Using a 4X structure (explore, expand, exploit, exterminate), each game permanently alters the board and components through stickers, sealed packet reveals, and a 430-entry Captain's Booke of narrative entries. Unlike Daviau's earlier Risk Legacy and Pandemic Legacy, SeaFall is a wholly original setting with no established ruleset to build from, offering a complete narrative arc with a defined ending.

