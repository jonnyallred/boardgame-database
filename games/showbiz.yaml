description: |
  Showbiz is an entertainment industry board game published by Prestige Games in 1984 in which 2–8 players take the roles of theatre managers competing to hire performers and make the most money from the public. Players bid at auction to sign contracts with performers across six entertainment styles, while public preference cards shift audience tastes over time — providing both a current known preference and a partial forecast of future trends. The game rewards reading market trends and outbidding rivals for the right performers at the right time.

