description: |
  Popkult is a Swedish pop culture trivia game in which players answer questions across multiple categories to race to Hollywood. Players draw question cards from their hand and assign questions to any other player, adding a strategic targeting element to the trivia gameplay. The categories cover broad areas of popular culture including film, music, television, and more. The game's unique hand-management mechanic for question assignment distinguishes it from traditional trivia games, allowing players to direct harder questions at leading opponents.

