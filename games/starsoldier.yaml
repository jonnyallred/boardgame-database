description: |
  StarSoldier: Tactical Warfare in the 25th Century is a 1977 SPI hex-and-counter wargame designed by Tom Walczyk, the man-to-man combat companion to StarForce (galactic conflict) and Outreach (interstellar conflict). One player controls invading aliens, the other controls StarSoldiers defending the planet — powerful future warriors with diverse capabilities including infantry, robots, and xenophobes. The game draws from the StarForce future history setting and uses detailed tactical rules to simulate skirmish-level 25th century combat. An important entry in SPI's science fiction trilogy.

