description: |
  Free Parking is a children's card game published by Parker Brothers in 1988, designed by Charles Phillips and branded using imagery from the Monopoly board game. Each player manages a personal parking meter and is dealt five cards per round, attempting to score points (represented as parking minutes) before their meter expires. The first player to score 200 points wins. Despite using Monopoly's Free Parking visual branding, the game has no mechanical connection to Monopoly, and was later distributed by Winning Moves under Hasbro's trademark.

