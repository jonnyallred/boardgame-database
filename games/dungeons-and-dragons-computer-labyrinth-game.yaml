description: |
  The Dungeons & Dragons Computer Labyrinth Game is a 1980 electronic board game published by Mattel under license from TSR. Players move warrior figurines across a plastic castle grid, guided by audio cues from the game's electronic brain (a TMS1100 microprocessor) that reveal what lies in each square. One or two players search for treasure while a waking dragon hunts them down using a simple pathfinding algorithm. The game can be played at basic or advanced difficulty. Though simple, it was a notable early example of electronics enhancing a D&D-branded experience and earned TSR an exclusive Mattel electronics licensing deal.

