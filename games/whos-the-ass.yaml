description: |
  Who's the Ass? is a fast-playing card game by Wolfgang Kramer for 3-12 players in which the goal is to shed all your cards as quickly as possible. Players are dealt a hand of cards and must play them in tricks; the last player left holding cards scores negative points. The large player count range makes it a flexible party option, and its quick play time keeps things moving. The title is part of its charm as a cheeky party staple.

