description: |
  Serenissima (Second Edition) is the revised Ystari Games reprint of Dominique Ehrhard's classic 1996 Mediterranean trading and combat game, published in partnership with Asmodee. Players represent merchant families of Renaissance city-states, building fleets, trading commodities between ports across the Mediterranean, and using naval force to raid competitors or defend trade routes. The second edition features updated components and refined rules while preserving the original's blend of economic strategy and opportunistic piracy that made it a Euro classic.

