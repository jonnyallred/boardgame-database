description: |
  Streets is a tile-laying city-building game designed by Haakon Hoel Gaarder and published by Sinister Fish Games in 2021. Players collaborate to build a shared city while individually investing in buildings to earn the most money as streets are scored. Buildings have simple valuation formulas based on neighboring tile types, and meeples representing hipsters, families, shoppers, and tourists move through the city as streets complete, affecting scores. Easy to learn and visually appealing, Streets rewards clever placement and reading opponents' investment patterns, with optional advanced modules adding greater depth.

