description: |
  Cheeky Monkey is a light press-your-luck game by Reiner Knizia for 2-6 players, published by Gryphon Games in 2007. Players draw animal-themed chips from a bag on their turn, accumulating them in front of them — but if they draw a chip matching one they have already pulled, they must discard all their current chips back into the bag. The key decision each turn is whether to keep drawing for more points or to bank what you have. One charming edition of the game comes packaged inside a plush toy monkey with a zipper compartment. Quick, light, and accessible for all ages.

