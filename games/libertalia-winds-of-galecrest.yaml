description: |
  Libertalia: Winds of Galecrest is a simultaneous-action selection and hand management game in which rival sky-pirate admirals deploy crew members to the same island each day, hoping to claim the best loot. Each player has an identical starting crew of 40 fantastical animal characters with unique powers, but since everyone plays from the same character pool, knowing what your opponents might play — and how characters interact — is the key to victory. The 2022 edition by Stonemaier Games reimagines the 2012 original with new art, an expanded character roster, a solo mode, and a reputation track to break ties elegantly. Its blend of reading opponents and adapting strategy to shared characters creates sharp, social tension in each round.

