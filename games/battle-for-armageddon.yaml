description: |
  Battle for Armageddon is a strategic wargame published by Avalon Hill simulating a near-future conflict in the Middle East. Players command military forces of major powers competing for control of the region during a hypothetical large-scale conventional war. The game covers air power, armor, infantry, and naval forces across the volatile Middle East theater, capturing the geopolitical complexities of great power competition in the region. It represents the kind of contemporary conflict simulation that was popular in the 1980s alongside Cold War tension.

