description: |
  Àgueda: City of Umbrellas is a tile-placement game inspired by the annual Umbrella Sky Project
  festival in Águeda, Portugal, where the streets are decorated with colorful hanging umbrellas.
  Players take on the roles of festival artists, placing umbrella tiles to create vibrant streetscapes
  and attract the most tourists to their streets. Its accessible design and visually striking theme
  earned it a Mensa Select Award, making it a standout family gateway game of 2024.

