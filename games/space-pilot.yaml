description: |
  Space Pilot is a race game published by Cadaco-Ellis in 1951, one of the earliest commercial space-themed
  board games produced as public fascination with science fiction and space exploration grew in the early Cold
  War era. Players spin a large rocket-shaped spinner to determine movement, racing across a board illustrated
  with vivid space ships and planets. A charming artifact of the pre-Space Age imagination, it features bold
  futuristic graphics on both the box and built-in playing board.

