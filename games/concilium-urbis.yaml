description: |
  Concilium Urbis is a sci-fi city-building game in which 1-6 players colonize an alien planet rich in the precious mineral Crystalon Celestia. Over seven rounds, players place tiles to construct their mining city and manage mineral-to-energy conversion, but the game's defining mechanism is its voting system — Law cards that determine how tiles score at game end can be influenced and changed through a democratic voting procedure during play. This creates a shifting scoring landscape where alliances form and dissolve as players jockey to advantage their own city's layout. The game blends tile placement with political negotiation in an accessible science fiction package.

