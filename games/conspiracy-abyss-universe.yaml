description: |
  Conspiracy: Abyss Universe is a standalone card game set in Bruno Cathala and Charles Chevallier's undersea Abyss world, in which players draft cards and assemble them into a reverse pyramid—five cards wide at the top, tapering to one at the bottom. On your turn you may draw 1–3 cards and choose one to add to your current row, placing any extras face-up near the deck by color; alternatively, you scoop up all cards of one color and add them. The tension between drawing deep for options and letting rivals claim your discards makes every decision charged, while the pyramid structure creates a satisfying construction narrative.

