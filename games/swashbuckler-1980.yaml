description: |
  Swashbuckler is a tactical combat game set in the swashbuckling era of
  The Three Musketeers, published by Yaquinto in 1980. Players secretly plan
  six simultaneous orders for their character each turn — choosing from
  movement, fencing maneuvers, throwing objects, swinging from chandeliers, and
  more — then all actions are revealed and resolved together. Two double-sided
  maps provide the settings (a tavern and a pirate ship), and players either
  choose the role of musketeers with rapiers or pirates with sabres. The last
  character standing wins in what often becomes a chaotic brawl of
  simultaneous swordplay and comic mishaps.

