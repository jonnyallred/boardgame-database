description: |
  Caper: Europe is a competitive two-player card-drafting game in which rival criminal masterminds plan daring heists across iconic European cities—from Paris to Rome. Players simultaneously draft thieves and gear from a shared display, deploying operatives to contest three shared location cards while equipping them with tools that generate points and special abilities. The tug-of-war scoring across multiple locations, combined with the shifting card draft, creates a fast and deeply tactical battle of wits, making it one of the best two-player card games for strategic couples or friends.

