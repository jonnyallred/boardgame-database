description: |
  Katarenga is a two-player abstract strategy game with a remarkable modular board system: four double-sided quarter-boards can be arranged in any orientation, yielding over 24,000 distinct 8x8 boards. The central mechanic ties piece movement to board color — red squares move like rooks, yellow like bishops, green like knights, blue like kings — so each move changes what your own piece can do next turn. The objective is to advance two figures past the opponent's baseline. This elegant fusion of chess movement with territory-dependent rules creates a uniquely dynamic abstract game that rewards tactical foresight and spatial pattern recognition.

