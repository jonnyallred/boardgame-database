description: |
  Star Empires is a 1977 board wargame designed by John M. Snider and published by TSR, the second installment
  in the Star Probe trilogy. Players control civilizations that have just discovered interstellar travel, exploring
  a star cluster with randomly generated systems while managing economics, research, and fleet battles. Compared
  to Star Probe, Star Empires expands the scope significantly with added trade-off decisions, fleet-scale combat,
  and technological development. The planned third game in the series was never published, leaving Star Empires as
  the finale of TSR's early science-fiction wargame line.

