description: |
  Jul-gonu (줄 고누) is a traditional Korean two-player abstract strategy game from the gonu family, played on a 4x4 grid. Each player places four pieces on the four nearest intersections and takes turns moving one piece horizontally or vertically to an adjacent empty space. A piece is captured when sandwiched on two opposite sides by opponent pieces. The goal is to capture all of the opponent's pieces. "Jul" means "lines," referring to the grid lines traditionally drawn on the ground with sticks. A simple and historically significant Korean folk game representative of the broader gonu tradition.

