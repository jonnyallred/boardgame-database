description: |
  Get Bit! is a frantic simultaneous-action card game for 4-7 players designed by Dave Chalker. Robot swimmers race to stay ahead of a shark by simultaneously playing numbered cards — the highest unique card moves to the front of the line, while players who tie cards don't move. The last swimmer in line at the end of each round is bitten, losing a limb; lose four limbs and you're out. The last swimmer still intact wins. Quick, tense, and hilarious, Get Bit! is a beloved gateway filler that delivers outsized fun per minute of play.

