description: |
  Outfoxed! is a cooperative whodunit deduction game for 2-4 players in which young detectives work together to identify which of 16 fox suspects stole Mrs. Plumpert's prize pot pie before the guilty fox escapes. Players roll dice to gather clues or move around the board, then use the game's clever evidence scanner — a physical device that reveals hidden information about suspects — to systematically eliminate innocent foxes. A winner of the As d'Or Jeu de l'Année Enfant award and a Kinderspiel des Jahres recommendation, Outfoxed! is notable for making logic-based deduction approachable and exciting for children as young as four without any reading required.

