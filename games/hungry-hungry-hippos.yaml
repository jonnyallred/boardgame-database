description: |
  Hungry Hungry Hippos is a frenzied children's dexterity game first introduced in 1978 by Milton Bradley (now Hasbro). Each of four players controls a plastic hippo with a lever that snaps the animal's mouth open and shut, attempting to gobble up as many marbles released into the center as possible. The player whose hippo eats the most marbles wins. The game is beloved for its chaotic, simultaneous play and the satisfying sound of clicking hippos competing for marbles, and it has remained a staple children's toy for over four decades.

