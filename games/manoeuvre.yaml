description: |
  Manoeuvre is a fast-playing two-player card-driven wargame published by GMT Games in 2008, set on early 19th-century Napoleonic battlefields. Each of the eight playable nations — France, Britain, Russia, Spain, Austria, Turkey, Prussia, and the USA — has its own unique 60-card national deck reflecting its historical strengths and tactics. Players maneuver units across geomorphic chessboard-sized maps, winning either by eliminating five enemy units or by controlling more of the opponent's territory when both decks are exhausted. Praised as an accessible gateway wargame, Manoeuvre delivers genuine tactical depth without overwhelming rules complexity.

