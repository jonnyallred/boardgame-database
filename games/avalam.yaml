description: |
  Avalam is a two-player abstract stacking game where players take turns moving a ball-shaped piece onto an adjacent stack, with the restriction that stacks may never exceed five balls high. The player who controls the top ball of the most stacks when no more moves are possible wins. Published by Gigamic, the game features a distinctive spherical playing piece aesthetic and demands spatial planning as the board fills up and options narrow. Its compact rules and short play time make it an approachable yet tactically rich abstract.

