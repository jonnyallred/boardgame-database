description: |
  Avalanche is a classic dexterity marble game published by Parker Brothers in which players drop marbles into a cascading series of plastic trays, watching them tumble from level to level in unpredictable paths. Players score based on which holes their marbles land in at the bottom, with the cascading tray structure creating satisfying random bouncing effects. Primarily a children's toy-game requiring no strategy, Avalanche's appeal lies in the visual spectacle and sensory delight of the marble cascade. It has been republished in various forms across many decades.

