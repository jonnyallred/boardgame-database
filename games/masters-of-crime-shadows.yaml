description: |
  Masters of Crime: Shadows is a cooperative immersive crime game published by Thames & Kosmos, set in Amsterdam where players must plan and execute a heist at the famous Bachmann Gallery to steal a mysterious painting. The game integrates real-world resources — Google Maps, websites, phone numbers — into an interactive narrative that changes based on players' choices, blending escape-room puzzle solving with detective investigation. Players scout the gallery, hack security systems, and recruit underworld contacts across 120–240 minutes of branching narrative play. Part of the Masters of Crime series, Shadows emphasizes atmospheric storytelling alongside physical and digital puzzle challenges.

