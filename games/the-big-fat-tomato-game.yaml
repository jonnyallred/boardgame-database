description: |
  The Big Fat Tomato Game is a lightweight take-that card game by Casey Grove, published by
  Gamewright in 2012. Players try to harvest the most tomatoes while defending their garden patch
  from weeds, varmints, and the dastardly tomato zombie. Green Thumb cards defend your patch,
  Fence cards protect your stockpile from varmint attacks, and Thumbs Down cards are used to
  attack opponents' patches. The game ends when a "Market Time" card appears, and the player with
  the most stockpiled tomatoes wins. Its silly theme, fast play, and chaotic take-that mechanics
  make it a hit with families looking for light competitive fun.

