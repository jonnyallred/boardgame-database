description: |
  Kings & Castles is a 1980 fantasy board game published by Athena Games for 2-8 players in which individual kings wage war against each other for territorial dominance. Players command armies to conquer rivals, defending their castles while pressing offensives across the game map. The game captures the medieval fantasy war game spirit popular in the early 1980s, with straightforward conquest mechanics suited for larger groups. Limited documentation exists beyond its publisher and basic gameplay framework.

