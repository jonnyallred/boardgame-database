description: |
  Enkeshui (also known as Engesho) is a traditional mancala game of the Maasai people of Kenya and Tanzania, one of the more complex games in the Mancala II family of two-row sowing games. Played on a board of two rows with 8, 10, or 12 pits per row and 48 seeds (a number considered auspicious in Maasai culture), the game features simultaneous opening sowing, relay-sow mechanics, and special "bull pit" rules that shape the endgame. Seeds are called cows and pits are enclosures, with the game's terminology deeply rooted in Maasai cattle-farming metaphors.

