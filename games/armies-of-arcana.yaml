description: |
  Armies of Arcana is a fantasy miniature wargame ruleset designed by Thane Morgan,
  originally published in 2002 with multiple subsequent editions. The game supports
  16 core armies including elves, dwarves, orcs, and various human factions, each
  with distinct tactical profiles. A distinctive feature is the ability for all units
  to adopt either skirmish or rank-and-file formations and switch between them during
  play. Turn structure is divided into movement, shooting, magic, combat, and morale
  phases, and the system accommodates both 28mm and 15mm miniatures scales.

