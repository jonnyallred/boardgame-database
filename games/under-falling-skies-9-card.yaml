description: |
  Under Falling Skies: A 9-Card Solo Game is the original print-and-play prototype by Tomáš Uhlíř that won the 2019 9-Card Nanogame Print-and-Play Design Contest. Players defend Earth from an alien invasion using just nine cards — tracking alien ship positions and firing base defenses — in a tense solo puzzle. The success of this minimal game led to Czech Games Edition publishing the full commercial version (Under Falling Skies, 2020) with full production components and expanded content.

