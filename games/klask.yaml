description: |
  KLASK is a 2-player dexterity game created by Danish carpenter Mikkel Bertelsen in 2014, often described as a combination of air hockey and foosball. Players use large magnets beneath the playing board to control their striker pieces, steering a small ball into the opponent's goal hole to score points. Scoring also occurs when two or more of the three white magnetic biscuits stick to an opponent's piece, or when a player accidentally pulls their piece into their own goal. Simple to learn but intensely competitive, KLASK rewards quick reflexes and spatial awareness, and has become a staple at gaming cafes and conventions worldwide.

