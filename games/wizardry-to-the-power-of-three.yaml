description: |
  Wizardry to the Power of Three is a cooperative memory-based racing game for 2-6 players from Pegasus Spiele in which young wizards race through an enchanted forest to reach their school before a ghost catches them. Players must remember the paths revealed earlier to navigate safely, and cooperation is essential to keep the whole group moving forward together. With simple mechanics, cooperative play, and a magical fantasy theme, the game is well-suited as an introduction to cooperative board gaming for young children.

