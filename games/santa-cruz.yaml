description: |
  Santa Cruz is a light tile-placement game designed by Marcel-André Casasola Merkle in which 2-4 players settle the island of Santa Cruz across two independent rounds. Players build houses, churches, and lighthouses while tapping available resources and collecting victory points through placement decisions. The two-round structure offers a satisfying arc within a modest 45-minute playtime, and the Euro sensibility of resource-efficient building decisions keeps the game accessible without feeling trivial. Santa Cruz won the 2012 Spiel der Spiele Game of the Year award in Austria, cementing its reputation as an excellent family gateway game.

