description: |
  Mosby's Raiders is a solitaire board wargame designed by Eric Lee Smith and published by Victory Games (an Avalon Hill subsidiary) in 1985, based on the Confederate partisan operations of Colonel John S. Mosby during the American Civil War. The solo player assumes the role of Mosby, selecting targets for raids against Federal supply depots, rail lines, and bridges in Northern Virginia's "Mosby's Confederacy" between 1862 and 1864. The game captures the asymmetric nature of guerrilla warfare, with the player using small, mobile forces to maximize disruption against a larger conventional enemy.

