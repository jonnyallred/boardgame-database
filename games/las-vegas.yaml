description: |
  Las Vegas is a fast-paced dice game in which 2-5 players compete as high-rolling gamblers betting on six casino boards. Each turn, players roll all their dice and must place all dice showing the same number onto the matching casino, with the player who has placed the most dice at each casino when the round ends claiming its highest-value bill. The clever twist is that ties cancel out, meaning a well-timed blitz of dice can wipe out an opponent's lead — making every roll a gamble. Nominated for the Spiel des Jahres in 2012, it delivers pure push-your-luck excitement in a compact 30-minute package.

