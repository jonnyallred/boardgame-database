description: |
  Carcassonne: Wheel of Fortune is a standalone variant of Klaus-Jürgen Wrede's classic tile-placement game, published by Hans im Glück/Rio Grande Games in 2009. The central addition is a large 4x4 "Wheel of Fortune" start tile that triggers different random events each round — awarding scoring bonuses to all players, scoring for only the active player, or forcing all players to return a meeple from the board. The Wheel introduces an element of shared fate and variability that distinguishes it from the base game while keeping the familiar city-and-road tile-laying experience intact.

