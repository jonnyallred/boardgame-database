description: |
  Maharaja: The Game of Palace Building in India is a medium-heavy Euro game by Wolfgang Kramer and Michael Kiesling set in ancient India. Players are maharajas competing to build seven palaces across cities that the traveling Mogul Emperor will visit, earning the most points from palace ownership. Each turn players secretly and simultaneously choose one of seven unique roles — architect, tax collector, spy, and others — which determine their actions and turn order, creating a rich mind-game around predicting opponents' choices. The game is celebrated for its elegant variable-role selection system that rewards both long-term strategy and psychological reads.

