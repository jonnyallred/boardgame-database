description: |
  Sticks & Stones is a 1978 Metagaming Concepts microgame designed by David Ray — the first board game featuring a Neolithic setting. Two rival Stone Age tribes clash in a quick, approachable wargame with simple rules accessible even to beginners. While games themselves were fast and enjoyable, reviewers noted that setup could take longer than actual play. Artwork was provided by Pat Hidy. As a Metagaming microgame, the entire game fits in a small envelope with a brief ruleset.

