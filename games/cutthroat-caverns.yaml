description: |
  Cutthroat Caverns is a semi-cooperative dungeon crawl card game for 3-6 players designed by Curt Covert and published by Smirk & Dagger in 2007. Players must work together to survive nine monster encounters — if the party dies, everyone loses — but only the player who lands the killing blow earns prestige points needed to win. The result is a deliciously tense blend of cooperation and sabotage, where players subtly (or not so subtly) undercut each other to steal the killing blow while keeping the party barely alive. Cutthroat Caverns was one of the earliest and most successful games to codify the semi-cooperative genre.

