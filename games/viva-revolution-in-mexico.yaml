description: |
  Viva!: Revolution in Mexico is a 1975 board wargame designed by Russ Beland and published by Flying Buffalo, with cover art by Norm Caddo. The game simulates the tumultuous revolutionary period of 19th-century Mexico, placing players in command of competing factions during this era of political upheaval and military conflict. As a Flying Buffalo production, it reflects the small-press wargaming tradition of the mid-1970s and is primarily of interest to historians and collectors of vintage American wargames.

