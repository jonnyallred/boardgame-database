description: |
  Havok & Hijinks is a card game published by Epic Slant Press in 2014 in which players become baby dragons competing to amass the mightiest hoard of treasure. Players collect cards representing treasures and abilities, playing offense and defense as they race to accumulate 15 points worth of treasure before their rivals. The game's charming dragon art, light rules, and quick play time make it a family-friendly gateway game with enough take-that interaction to keep the competition lively.

