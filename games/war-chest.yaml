description: |
  War Chest is a bag-building area-control game for 2 or 4 players that combines the tactical depth of abstract strategy with the variability of randomized unit selection. Players draw unit coins from their bags, spending them either to deploy units to the board or to recruit new units to the bag. Each unit type — archers, cavalry, light infantry, and others — has a unique special ability, and each game uses a random subset, ensuring no two battles play the same. Players maneuver units across a hexagonal board to claim and hold objective spaces. Despite minimal rules overhead, War Chest rewards deep positional thinking and earns comparison to chess.

