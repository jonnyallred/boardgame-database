description: |
  Starship Troopers: Prepare for Battle! is a 1997 Avalon Hill game released to coincide with Paul Verhoeven's film adaptation. Players control Starship Troopers with unique special abilities facing off against alien bugs across a barren planet. The map is customizable via terrain overlays, allowing for multiple arena configurations, and the game supports player-created scenarios with increasing difficulty. Each Trooper and each bug type has distinct abilities, and the scenario-based design rewards tactical adaptation to different battlefield conditions.

