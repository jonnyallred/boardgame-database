description: |
  The Settlers of Catan Mini (Compact/Travel Edition) is a portable version of Klaus Teuber's landmark strategy game, featuring a reduced-size board with interlocking tiles and pegged roads and settlements for travel-friendly play. The game retains the full Catan rules and experience—resource production via dice, trading, building roads, settlements, and cities, and racing to ten victory points—in a smaller, more durable package suitable for play on the go. Multiple compact editions have been published by Kosmos and other distributors over the years to serve players who want the full Catan experience in a travel-ready format.

