description: |
  Wreck Raiders is a dice-drafting and set collection game in which players lead squads of divers
  raiding shipwrecks for sunken treasure and combing beaches for valuable seashells. Players roll
  dice inside the box lid, then draft them to take actions, collecting finds to build museum exhibits
  and aquariums or store them in personal vaults. The game blends accessible rules with meaningful
  choices and is equally enjoyable for families and adult gamers alike.

