description: |
  Darkest Crusade is a free print-and-play hex-and-counter wargame covering the Axis invasion of Russia that began June 22, 1941 (Operation Barbarossa). Using a fast-moving firing point combat system at corps-army level with monthly turns, it includes the Finnish front, air and naval fleet units, and Blitzkrieg/breakthrough rules for dynamic early-war German offensives. The game's unpredictable combat results make it well-suited to solitaire play. It is listed in BoardGameGeek's recommended free print-and-play historical wargame collections.

