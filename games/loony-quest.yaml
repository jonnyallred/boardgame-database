description: |
  Loony Quest is a simultaneous drawing party game for 2-5 players, inspired by the aesthetics of video games, in which players study a level card depicting obstacles and targets, then race to trace paths and hit targets on their individual transparent overlay sheets — without looking at the level card. Once everyone has finished drawing, sheets are placed on the level card to reveal who hit which targets and who crashed into walls. The game's simple concept produces wildly different (and often hilarious) results as players try to replicate their mental image, and the video game art style creates a distinctive, colorful experience. Nominated for the Spiel des Jahres in 2015.

