description: |
  Foxbat & Phantom: Tactical Aerial Combat in the 1970s is a two-player wargame designed by Jim Dunnigan and published by SPI in 1973. Each player commands a flight of three jet aircraft chosen from a list of 14 different aircraft types, simulating dogfights between the Soviet MiG-25 Foxbat and the American F-4 Phantom during the Cold War era. The streamlined rules prioritize accessibility while still conveying authentic air combat tactics, making it one of SPI's more accessible tactical wargames. It placed 80th out of 202 games in a 1977 SPI poll of popular wargames in North America.

