description: |
  Legend of the Burning Sands is a collectible card game published by Alderac Entertainment Group (AEG) set in a desert fantasy world, featuring warring factions inspired by Middle Eastern mythology and history. Players build decks representing one of several desert clans — including the Senpet (Egyptian-inspired), the Scion of the Burning Sands, and others — and compete in two-player card battles across military, political, and mystical conflicts. The game ran from 1998 to 2000 before being discontinued and was eventually folded into AEG's Legend of the Five Rings universe. It attracted a dedicated following for its distinctive setting that broke from the then-dominant European fantasy aesthetic.

