description: |
  Mint Works is a micro worker placement game for 1-4 players by Justin Blaske, designed to fit entirely within a mint tin, published by Five24 Labs following a successful Kickstarter campaign in 2017. Players use physical mint-shaped tokens as workers, placing them on location cards to earn more mints, acquire plan cards, or convert mints into stars — the victory point currency. The first player to accumulate 7 stars triggers the end game, and the winner with the most stars takes the win. Despite its tiny form factor and 15-minute play time, Mint Works delivers a complete and satisfying worker placement experience, making it one of the most lauded micro games for introducing the genre to new players.

