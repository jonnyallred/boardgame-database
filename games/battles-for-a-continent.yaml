description: |
  Battles for a Continent is an Avalon Hill wargame simulating the French and Indian War, the North American theater of the Seven Years' War fought primarily between Britain and France for control of the continent. Players command British regulars, colonial militias, French forces, and Native American allies as they contest control of fortresses, wilderness territory, and key river corridors from 1754 to 1763. The game captures the distinctive character of wilderness warfare in colonial North America, with supply lines and Native alliances playing important strategic roles.

