description: |
  Zeus on the Loose is a fast card game with a Greek mythology theme in which players take turns
  playing numbered cards to Mount Olympus, building a running total. Whoever plays a card that
  makes the total hit a multiple of 10 grabs the Zeus figurine, and winning rounds by holding Zeus
  when the total reaches or exceeds 100 earns letters spelling "Zeus." Special god cards with
  powers — like Aphrodite rounding to the nearest ten — add unpredictability to an otherwise
  accessible math-friendly card game.

