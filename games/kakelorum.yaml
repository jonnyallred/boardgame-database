description: |
  Kakelorum is a traditional game of chance originating in Upper Austria in the mid-19th century that spread throughout the Alpine region and became a common fixture in Viennese lottery shops. A wooden hollow figure (20-30 cm tall) stands at the edge of a circular game board (25-35 cm in diameter); players drop a marble through a spiral run inside the figure, which then rolls onto the board below. The board contains 58 shallow numbered depressions, and players score based on the numbered depression the marble settles into. Landing the marble in the center depression (number 58) wins the game immediately. A purely chance-based parlor game representative of 19th-century European carnival and lottery gaming culture.

