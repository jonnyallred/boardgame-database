description: |
  Blue Stones is a fantasy wargame set in the world of Zargo where the magical Blue
  Stones are a source of great power. Players controlling different races — including
  the Wizard-Monks who defend the stones — compete in a tactical conflict over these
  coveted artifacts. The game combines area control with fantasy-themed combat mechanics
  in a classic wargame format. Limited information is available about this title's
  designer and publisher history.

