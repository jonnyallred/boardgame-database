description: |
  Sid Meier's Civilization: The Board Game translates the legendary 4X video game series to the tabletop, letting players guide one of six historical civilizations (Americans, Chinese, Egyptians, Germans, Romans, or Russians) to victory through exploration, military conquest, cultural advancement, economic dominance, or technological supremacy. Each turn flows through five structured phases — start of turn, trade, city management, movement, and research — mirroring the rhythm of the video game. Players expand across a modular map, build cities and wonders, recruit armies, and race up a technology tree that unlocks powerful abilities. With four distinct victory paths and asymmetric civilizations, each game unfolds differently, capturing the addictive "one more turn" quality of its digital inspiration.

