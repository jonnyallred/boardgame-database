description: |
  Boggle is a classic timed word game invented by Allan Turoff and published by Parker
  Brothers in 1972 (originally pitched as "Find-A-Word" in 1970). Players shake 16
  lettered dice into a 4x4 grid, then race to find as many words as possible within
  a set time limit by connecting adjacent letters. Longer words score more points, and
  words found by multiple players cancel each other out, rewarding those who find the
  most obscure words. Boggle's combination of luck in the dice roll and skill in
  vocabulary has made it an enduring family classic.

