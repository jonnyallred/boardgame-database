description: |
  Bitin' Off Hedz is a silly dinosaur racing game designed by James Ernest, Toivo Rovainen,
  and Jeff Vogel, published by Cheapass Games in 1997. Players race their dinosaurs across
  the board toward an active volcano, seeking the dubious honor of being the first to
  throw themselves in and go extinct. Akin to Ludo in structure but packed with absurdist
  dinosaur humor, the game supports up to 8 players and plays quickly. A fully remastered
  25th anniversary edition was subsequently released through Crab Fragment Labs.

