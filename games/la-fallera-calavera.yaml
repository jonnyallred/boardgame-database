description: |
  La Fallera Calavera is a 2014 Spanish card game published by Zombi Paella set in the Valencian folklore tradition, where a young Fallera killed in a fireworks accident rises as a furious zombie and awakens other traditional Valencian figures as zombies. Players compete to collect five ingredient cards to cook a paella that will calm the zombie Fallera's rage, using battle cards to steal ingredients from opponents by comparing attack and defense values. Deeply rooted in Valencian culture and humor, the game has sold over 130,000 copies in Spain and spawned multiple sequels. An irreverent celebration of regional identity through a zombie lens.

