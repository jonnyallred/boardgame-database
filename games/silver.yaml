description: |
  Silver (Silver Amulet) is a hand-management card game for 2-4 players with a werewolf theme, designed by Ted Alspach. Each player starts with five face-down cards representing their village; they know only two of them. Cards are numbered 0-13 (the werewolves they attract) and each number has a unique special power. Players draw cards, use powers, and try to swap out high-value cards from their hand — then call "Werewolf" when they believe they have the lowest total. The first in a series of Silver games, each standalone entry introduces new card powers while maintaining the same elegant core.
