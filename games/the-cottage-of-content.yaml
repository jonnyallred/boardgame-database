description: |
  The Cottage of Content or the Blessings of Cheerfulness & Good Temper is an 1848 Victorian moral board
  game published by William Spooner of London, played with a teetotum (a spinning top marked F, R, L, B
  for forward, right, left, and back). Players navigate a hand-coloured lithograph landscape of roads,
  rivers, and a railway, trying to reach the idyllic Cottage of Content. The game's moral message about
  cheerfulness and good temper was characteristic of Victorian children's games, though its whimsical
  illustrated board and humorous scenarios give it lightness. It is preserved in the Victoria and Albert
  Museum collection and represents a charming artifact of 19th-century game design.

