description: |
  Avatar: The Last Airbender Trading Card Game is a collectible card game based on the Nickelodeon animated television series, published in 2006 to coincide with the show's peak popularity. Players build decks around characters from the four nations — Water, Earth, Fire, and Air — and compete in card-based combat recreating the elemental bending battles of the series. Cards represent characters like Aang, Katara, Zuko, and Toph, along with elemental attack and defense abilities. The game was produced for younger fans of the franchise and had a limited run before being discontinued.

