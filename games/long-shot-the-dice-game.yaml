description: |
  Long Shot: The Dice Game is a roll-and-write horse racing game for 1-8 players in which dice rolls each round determine which horses move and what special actions players can take. Players mark their personal sheets to buy horses, place bets, and apply special abilities, with the game ending once three horses cross the finish line and the player with the most money wins. The simultaneous play means little downtime even at high player counts, and the push-your-luck decisions around when to commit to specific horses create genuine tension. Part of Chris Handy's Roland Wright design series, it successfully translates the excitement of the original Long Shot into a streamlined dice game format.

