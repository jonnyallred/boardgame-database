description: |
  The Night Cage is a fully cooperative horror tile-placement game published by Smirk & Dagger in 2021, where 1–5 players are trapped in a pitch-black labyrinth with only candlelight to guide them. Each player can only see the tiles immediately adjacent to their position; when they move away, those tiles vanish back into darkness, making the maze constantly shift and reform. To escape, every player must collect a key and reach the shared gate simultaneously, all while evading Wax Eaters that hunt in the dark. It won five design awards including the ION Award, praised for its immersive atmosphere and elegant tension-building mechanics.

