description: |
  My First Stone Age is a children's gateway game designed by Marco Teubner, published by 999 Games and Z-Man Games, designed to introduce young players to basic resource collection and memory mechanics. Players flip forest tokens to move their meeples around the board, gathering berries, bones, and stones to build their Stone Age settlements. A helper dog token named Guff assists players who need any resource when it's time to construct a hut. The game gently introduces concepts from its parent game Stone Age in an accessible 15-minute format perfectly suited for ages 5 and up.

