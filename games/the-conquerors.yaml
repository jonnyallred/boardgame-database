description: |
  The Conquerors is a 1977 SPI package of two board wargames designed by Richard Berg. The first,
  The Macedonians, simulates Alexander the Great's invasion of the Persian Achaemenid Empire from
  334–331 BCE, with one player commanding Alexander's armies and the other Darius III. The second,
  The Romans, covers Rome's eastward expansion following the Second Punic War. Each game uses an
  eight-turn-per-year structure with a Winter Planning Turn, earning victory points through
  controlling regions, cities, and winning battles. A redesigned card-driven version, The Conquerors:
  Alexander the Great, was published by GMT Games in 2006.

