description: |
  The Viking Game is a 1981 revival of the ancient Norse tafl game family, primarily based on the Sámi game tablut and the 12th-century board format found at Trondheim. Played on an 11×11 board with 37 pieces — a king, twelve defenders, and twenty-four attackers — it is an asymmetric abstract strategy game in which the defender must escort the king to a corner square while the attacker attempts to capture him before he escapes. The modern publication reintroduced this ancient form of Viking strategic play to a wide audience, and the game has been commercially produced by numerous makers ever since.

