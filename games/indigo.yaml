description: |
  Indigo is an abstract tile-placement game designed by Reiner Knizia and published by Ravensburger in 2012, receiving a Spiel des Jahres recommendation that year. Players place hexagonal path tiles on a honeycomb grid, guiding colored gemstones from the center toward the edges where players own goal spaces. When a tile placement moves a gem to a goal, the owner (or both owners if shared) claims it. Collision between gems eliminates both, and players in the three- and four-player variants share ownership of some goal spaces, creating opportunities for shifting alliances and betrayals.

