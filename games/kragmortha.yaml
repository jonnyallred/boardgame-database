description: |
  Kragmortha is a 2007 Mayfair Games party game based on Aye, Dark Overlord! in which 2-8 players take on the roles of clumsy goblin underlings trying to avoid the wrath of their evil master Rigor Mortis. Players move about Rigor Mortis's library attempting to steal magical tomes, while the Dark Overlord can punish them with dreadful spells manifested as physical tasks — such as balancing cards on your head or speaking with your mouth closed. The game won the 2007 Lucca Games Best of Show award and delivers its comedy through the escalating physical challenges imposed on increasingly desperate goblins.

