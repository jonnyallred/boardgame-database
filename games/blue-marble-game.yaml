description: |
  Blue Marble Game is a South Korean board game published by Si-Yat-Sa in 1982,
  inspired by Monopoly but featuring global cities rather than a single city. Its name
  references the famous Apollo 17 "Blue Marble" photograph of Earth. Players travel
  around the world buying properties in major cities, constructing buildings, collecting
  rent, and earning salaries. The game became immensely popular in South Korea as the
  dominant family property game, serving both as entertainment and an accessible
  introduction to basic economic concepts and world geography.

