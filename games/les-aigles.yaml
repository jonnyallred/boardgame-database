description: |
  Les Aigles is a French-published series of wargames covering Napoleonic battles, designed by Frédéric Bey and published by Vae Victis magazine. The series uses a consistent hex-and-counter system to model battles from the Napoleonic Wars at the battalion and regimental scale, with particular attention to period-accurate command limitations, corps structure, and the fog of war. Each volume covers a specific engagement, and the consistent rules system allows players to move between battles easily. Highly regarded among Napoleonic wargame enthusiasts for its historical accuracy and the tactical depth it achieves within an accessible system.

