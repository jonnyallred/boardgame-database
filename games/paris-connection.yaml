description: |
  Paris Connection (originally SNCF) is a fast-playing network- and portfolio-building train game for 2-6 players. Players place colored wooden train pieces representing tracks and shares in six French railway companies — but crucially, the pieces placed on the board also represent shares held, so each piece placed doubles as a stock investment. On your turn you either lay track to build a network or take shares, but growing a company means you own fewer pieces of it. The elegantly tense scoring — the most valuable stock portfolio wins — emerges from these two competing motivations.
