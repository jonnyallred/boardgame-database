description: |
  Hexagony is an abstract strategy game for two to six players, published by Avalon Hill in 1980 as a redesign of Ken Hodkinson's Bin'Fa. Players place and maneuver stacks of tokens across a large hexagonal board divided into six colored triangular territories, paying supply chits and rolling dice to move pieces. The game involves creating stacks of two or three tokens that can both attack and defend, with singletons having no offensive or defensive capability. Developed with input from Alan Moon during his early days at Avalon Hill, the game blends supply management with tactical positioning.

