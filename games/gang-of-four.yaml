description: |
  Gang of Four is a competitive card game inspired by the Asian climbing game tradition, designed by Lee Yih and brought to Western audiences by Days of Wonder. Players race to empty their hands by playing increasingly powerful combinations of cards — pairs, triples, runs, and special combinations — before their opponents. The 64-card deck includes suits numbered 1-10 plus powerful special cards like the Phoenix and the Red Dragon, which can override standard play. Simple to learn but rewarding to master, it works well as a fast, interactive filler for groups who enjoy trick-taking or climbing card games.

