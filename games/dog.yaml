description: |
  DOG (also known as Brändi Dog) is a Swiss cult classic team racing game in which players move their marbles around a circular track using playing cards rather than dice. Pairs of players sit opposite each other and share a cooperative goal: a team wins only when all eight marbles of both partners reach the finish zone. Before each round, partners secretly exchange one card, enabling coordinated strategy. Cards offer varied movement options—a Four can move backward, a Seven can be split among multiple pieces, a Jack allows swapping pieces—and opponents' marbles can be sent back to the kennel by landing on them. One of the most beloved games in Switzerland.

