description: |
  The City of Heroes Collectible Card Game is a licensed CCG produced by Alderac Entertainment Group (AEG) and released in January 2006, based on the NCSoft MMORPG City of Heroes. Players build decks around superhero archetypes — Blasters, Controllers, Defenders, and Scrappers — and battle rivals in the arena of Paragon City until only one hero remains standing. A notable feature allowed players to create custom hero cards using an online tool. The game was discontinued in February 2007 after just two sets, having failed to achieve widespread commercial success.

