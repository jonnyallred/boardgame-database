description: |
  Allegiance: War of Factions is a 2004 out-of-print social and political collectible card game
  published by Lucid Raven Productions, set in a medieval city-state thrown into turmoil by the
  death of its king. Players act as lords or ladies vying to control the city's major political,
  religious, and economic powers — extending influence or mounting armies to eliminate rivals.

  Victory requires reaching a target amount of Victory Influence at the start of a round, or
  eliminating all opponents militarily. Rounds consist of five phases, with players taking turns
  playing cards or triggering card abilities. Each player maintains a Personality deck and a
  Structure deck of at least 15 cards each, plus Wanderer cards, creating a lightweight CCG with
  strong political negotiation elements. It is largely out of print and obscure today.

