description: |
  Mega-Mania is a 1987 expansion for Block Mania published by Games Workshop, designed by Richard Halliwell. Set in the dystopian world of Judge Dredd's Mega-City One, the expansion adds two additional city block boards to the base game, enabling play for up to four players simultaneously. Residents of each city block vie to cause maximum chaos and devastation to neighboring blocks before the Judges arrive to restore order. The expansion amplifies Block Mania's anarchic four-way conflict with additional factions and new opportunities for multi-front warfare.

