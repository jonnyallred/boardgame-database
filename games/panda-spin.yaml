description: |
  Panda Spin is a trick-taking climbing game by Carl Chudyk featuring a special deck of "double-headed" cards — each card can be flipped during play, changing its value and effects. Players build their palette of cards and use the flip mechanic to control the current winning condition, creating an evolving game state where the rules of victory shift with each play. The innovative dual-sided card design brings Chudyk's signature rule-bending creativity to a streamlined trick-taking format playable in under 40 minutes.
