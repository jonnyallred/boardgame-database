description: |
  Ants is a board game in which players control rival ant colonies competing for dominance
  in a garden. Players expand their ant trails using area movement and network building
  mechanics, battling rival insects and harvesting food to strengthen their colony.
  The game blends simple dice-rolling with territory control, making it accessible
  for family audiences while offering enough strategic choice to engage older players.

