description: |
  The Blitzkrieg Module System is a series of 18 expansion modules published by SPI
  in 1969 designed to augment Avalon Hill's original Blitzkrieg (1965) game. A unique
  publishing arrangement — one company expanding another's game — the modules added
  systems for navies, railways, production, weather, guerillas, artillery, minor country
  armies, and more, each optional so players could choose their desired complexity level.
  Players still needed the base Blitzkrieg game to use SPI's components, creating an
  unprecedented cross-publisher collaborative expansion.

