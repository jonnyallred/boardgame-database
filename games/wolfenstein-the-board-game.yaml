description: |
  Wolfenstein: The Board Game is a cooperative dungeon-crawler for 1-4 players based on the Wolfenstein video game series, set in the legendary Castle Wolfenstein in an alternate early 1960s where the Nazis won World War II. Players take on the roles of BJ Blazkowicz, Anya Oliwa, Set Roth, Max Hass, and Bombate as they sneak through the castle using Action Points or go loud with Glory Points in heroic combat. An AI system controls Nazi guards, zombies, and mechanized soldiers depending on the chosen scenario, across a full campaign of interconnected missions funded via Kickstarter by Archon Studio.

