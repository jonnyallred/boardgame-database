description: |
  Mystic Vale is a 2-4 player card crafting game from AEG that introduces an innovative Card Crafting System using transparent card sleeves. Instead of merely building a deck from pre-made cards, players physically layer transparent advancement cards inside their card sleeves, combining abilities and creating increasingly powerful custom cards unique to their deck. The push-your-luck element emerges from the "spoil" mechanic — players keep revealing cards from their deck until they choose to stop or spoil, but revealing too many decay symbols ends their turn early. This tactile card customization system creates a satisfying sense of progression as players transform humble starters into potent magical engines.

