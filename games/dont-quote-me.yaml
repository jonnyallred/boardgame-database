description: |
  Don't Quote Me is a trivia board game in which players race pawns around a pentagon-shaped board by correctly identifying the speakers of famous quotations. Players score differently based on how much help they take: three spaces for guessing unassisted, two for using one biographical clue, or one for selecting from three given names. The game includes 150 pentagon cards with 750 quotes drawn from historical figures and contemporary celebrities, as well as 120 themed question cards. Winner of GAMES Magazine's GAMES 100 award in 2004, it has appeared in multiple themed editions including sports and TV versions.

