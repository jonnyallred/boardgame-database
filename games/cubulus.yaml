description: |
  Cubulus is a 3D abstract strategy game played on a 3x3x3 cubic grid using colored balls. On each turn, a player adds a colored ball to the playing area by pushing it into place — which may displace other balls — or rearranges the balls in a completed row. The goal is to be the first to form a square of your color on any face of the cube, while watching all six sides to block opponents from doing the same. Its three-dimensional spatial challenge and push-sliding mechanics make it a uniquely tactile and visually engaging abstract game.

