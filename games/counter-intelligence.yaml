description: |
  Counter Intelligence is a two-player bluffing and deduction game of espionage published in 1989 by Zzota Games. Each player acts as a spymaster controlling three agents navigating a network of safe houses toward a control center. Movement involves bluffing and double-bluffing, as you attempt to eliminate the enemy's agents while keeping your own safe. The game captures the classic cat-and-mouse tension of Cold War spy fiction in a compact, accessible format. Designed by British game inventor Jeremy Secker, it is an entertaining specimen of the late 1980s wave of espionage-themed board games.

