description: |
  Pack & Stack is a fast and funny dexterity and spatial reasoning game in which players race to load cargo tiles of various sizes onto oddly shaped trucks as efficiently as possible. Designed by Bernd Eisenstein and published by 999 Games, the game challenges players to think quickly about how to fit irregular pieces into limited space — a puzzle-like challenge that becomes chaotic and hilarious as the timer ticks down. Its combination of speed, spatial thinking, and slapstick logistics makes it a crowd-pleasing family game that works well as a warm-up or filler activity.

