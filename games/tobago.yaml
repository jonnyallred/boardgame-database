description: |
  Tobago is a treasure-hunting deduction game played on a beautifully modular three-dimensional island board where players hold fragments of treasure maps. On each turn, players add clue cards to partially revealed treasure locations, progressively narrowing down where each treasure is buried until someone finds and claims it. The inverse deduction mechanic — where players contribute information to locate treasures they then race to claim — creates a tense balance between sharing knowledge and protecting your position, earning the game widespread critical acclaim on its release.

