description: |
  Mertwig's Maze is a lighthearted Advanced Dungeons & Dragons board game designed by Tom Wham and published by TSR in 1988. Players venture into a wilderness of eight small boards connected to a large central map, collecting two items that prove their royal heritage while battling monsters drawn from encounter cards and competing to claim the most valuable treasures. The game contains hundreds of cards for hirelings, magical items, armor, weapons, and random events, capturing the whimsical tone of Wham's other TSR designs. Its Gamefolio format — a cardboard cover with stapled rulebook and card/counter components — makes it one of the more unusual physical products in TSR's catalog.

