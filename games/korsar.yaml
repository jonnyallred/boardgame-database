description: |
  Korsar (originally titled "Pirat") is a 1991 pirate card game by Reiner Knizia for 2-6 or 8 players, in which players send trading ships on voyages while launching pirate attacks against opponents. Players defend their merchant vessels using pirate and captain cards, while trying to plunder enemy shipping with their own fleet. The single shared deck contains 25 merchant ships, 48 pirate ships, and 5 personality cards. The game won the 1992 Fairplay À la carte Winner award and the 2005 Mensa Select award, demonstrating its enduring appeal as a quick, thematic card game.

