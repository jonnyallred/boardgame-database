description: |
  Glass Road is a card-drafting and tile-placement game by Uwe Rosenberg set in the
  18th-century Bavarian glassmaking region. Each round players secretly choose five of
  fifteen specialist cards; if no opponent also chose a card, you get its full action—
  but shared choices grant only partial benefits, creating a mind-reading element unique
  among Rosenberg's designs. Resources are managed on an innovative two-wheel dial that
  automatically converts materials, adding a satisfying mechanical puzzle layer. Glass Road
  packs tremendous strategic depth into a surprisingly short playing time.

