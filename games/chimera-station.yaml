description: |
  Chimera Station is a worker placement game for 2–4 players set aboard a space station where the twist is that workers are fully customizable—players can splice claws, tentacles, leaves, or additional brains onto their workers mid-game to permanently enhance their capabilities. Each modification changes what a worker can do at various action spaces, turning the standard worker placement framework into an evolving engine of spliced abilities. The science fiction theme, the tactile excitement of upgrading workers, and the deep strategic planning required to optimize your chimeric workforce make this one of the most inventive worker placement games available.

