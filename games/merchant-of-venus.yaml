description: |
  Merchant of Venus is a classic space trading game designed by Richard Hamblen and published by Avalon Hill in 1988. Players pilot ships through an unexplored galaxy, discovering alien civilizations and trading goods between them for profit — each culture wants what others produce and pays a premium for it, creating rich trading route puzzles. The game was originally designed for McCormick Spices as a spice trading game before being rethemed to science fiction. Rereleased by Fantasy Flight Games in 2012 with updated components and an alternative modern ruleset, it remains a beloved deep-cut classic of space exploration gaming.

