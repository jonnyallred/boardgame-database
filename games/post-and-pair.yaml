description: |
  Post and Pair (also called Post and Pare or Pink) is a historical English gambling card game popular in the 16th and 17th centuries, noted by Charles Cotton in his 1674 Compleat Gamester as especially popular in the west of England. The game revolves around vying (betting) mechanics derived from the earlier game of Primero — players may vie or pass, with those who stay in repeatedly raising or matching bets until a showdown. The game is mentioned in Thomas Heywood's A Woman Killed with Kindness and is considered an ancestor of modern Brag. David Parlett and John McLeod identify Post and Pair as a direct precursor to the modern game of Brag.

