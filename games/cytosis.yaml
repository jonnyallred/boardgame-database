description: |
  Cytosis is a worker placement game set inside a human cell, designed by John Coveyou and published by Genius Games in 2017 following a successful Kickstarter campaign. Players place workers on organelles — the nucleus, mitochondria, ribosomes, and more — to gather resources and convert them into enzymes, hormones, and cell receptors that score points. The game is scientifically accurate enough to be used as an educational tool, yet engaging enough to appeal to general gamers. It stands out as one of the most successful science-themed board games, making cellular biology tactile and interactive through clever worker placement mechanics.

