description: |
  Raid on Iran is a historical wargame published by Avalon Hill in 1980, simulating the failed Operation Eagle Claw rescue mission during the Iran hostage crisis. Players plan and execute the special operations raid to extract American hostages from Tehran, managing the complex logistics of the actual mission. The game recreated the dramatic real-world events of April 1980 as a strategic and operational puzzle, capturing public interest in a politically charged topic immediately after the events occurred.

