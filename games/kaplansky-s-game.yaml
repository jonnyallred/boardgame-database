description: |
  Kaplansky's game (or Kaplansky's n-in-a-line) is a combinatorial abstract strategy game named after mathematician Irving Kaplansky, played on an infinite lattice board. Two players alternate placing stones of their color; the winner is the first to form a line of k stones of their own color containing no opponent stones on that line. For k of 8 or more, the game is always a draw via pairing strategies. The game is studied in combinatorial game theory as an example where the winning strategy is intuitively plausible but mathematically unproven — a significant puzzle in the field.

