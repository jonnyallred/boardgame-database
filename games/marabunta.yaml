description: |
  Marabunta is a 2024 roll-and-write game by Reiner Knizia, published by Space Cowboys, in which two players take on the roles of competing ant queens battling for territorial supremacy. The central mechanic uses an "I Divide, You Choose" system: the active player rolls six dice and splits them into two groups, the opponent chooses one group to use, and the active player takes the other — then both use their dice to expand on their individual roll-and-write sheets. Combining strategic territory control on paper with the tension of knowing your opponent will pick the best half of your roll, it joins Space Cowboys' acclaimed line of two-player games alongside Jaipur and Splendor Duel.

