description: |
  Mister Zero is an abstract strategy game published by Zoch Verlag in which a central figure, Mr. Zero, navigates a network of roads according to a strict rule: at every intersection, he always follows the road marked with the lowest-numbered chip. Players take turns placing numbered chips from 0 to 9 on the road network, attempting to guide Mr. Zero toward their own goal spaces by the time all chips have been placed. The game elegantly separates the decision phase from the resolution phase, creating a unique blend of strategic planning and deductive anticipation of how other players will influence the route.

