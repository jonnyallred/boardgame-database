description: |
  Zapp Zerapp is a family game in which two dice are rolled and players simultaneously shake
  small wooden containers — each holding one to thirteen lead pellets — trying to select the one
  with the highest number that does not exceed the dice total. Players move pawns around the
  board, with the goal of reaching safety, while jumped pawns return to start. The tactile guessing
  mechanic of estimating pellet counts creates lively, tactile fun. The game won the Deutscher
  Kinderspielepreis in 2001.

