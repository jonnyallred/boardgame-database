description: |
  Speculation is a self-published stock market game from 1969 produced in San Diego, California. Players buy and
  sell shares in companies, drawing movement and action tokens to shift stock prices and execute trades
  simultaneously. Rounds continue until a company marker reaches the end of the movement track, at which point
  all players cash in their holdings to determine the winner by total wealth. A rare, privately-issued title
  from the early era of American economic board games.

