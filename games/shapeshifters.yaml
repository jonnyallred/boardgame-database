description: |
  Shapeshifters is a fantasy combat board game published by Fat Messiah Games in 1991 in which two to four transforming wizards battle in a wilderness setting across six different scenarios. Each player can change their wizard into different creature forms, each with unique combat and movement abilities, and must outmaneuver and defeat their opponents. The game's combination of scenario variety and shapeshifting mechanics creates tactical duels that are quick to learn but offer meaningful mastery over repeated plays.

