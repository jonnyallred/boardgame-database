description: |
  Battle Masters is a fantasy miniature wargame jointly developed by Milton Bradley and Games Workshop in 1992, pitting the Empire's forces of knights, halberdiers, and archers against Chaos armies of marauders, beastmen, and warriors. Combat is resolved via a deck of battle cards dictating unit activations and dice rolls, played on an enormous vinyl battle mat nearly 25 square feet in area with over 100 plastic miniatures. Designed by Stephen Baker — who later created Heroscape — it shares thematic DNA with Warhammer Fantasy Battle but targets a family audience. The impressive components and accessible rules made it a memorable gateway into miniature wargaming.

