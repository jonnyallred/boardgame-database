description: |
  Hue is a tile-laying strategy card game from the Pack O Game series designed by Chris Handy and published by Perplext. Players secretly choose three colors at the start and then build the largest color sections on a shared abstract board over ten minutes of play. The Pack O Game series is notable for packaging complete games in gum-pack-sized boxes, making Hue extremely portable. Players compete to maximize the area covered by their secretly chosen colors while constraining opponents.

