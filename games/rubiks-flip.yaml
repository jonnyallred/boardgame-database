description: |
  Rubik's Flip is a compact two-player abstract strategy game in the Rubik's brand game line. Players compete on a 4×4 board using 16 double-sided tiles — each tile showing two different colors on its faces. On each turn a player flips an opponent's tile to reveal the other color, then places one of their own tiles; the first player to align three tiles of the same color in a row wins. With only eight possible turns per player, the game is extremely quick and portable, fitting naturally alongside the Rubik's brand's identity of mind-bending spatial challenges in compact form.

