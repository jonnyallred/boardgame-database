description: |
  Guatemala Café is a Euro strategy game designed by Inka Brand and Markus Brand and published by Eggertspiele in 2006, placing 2nd in the Hippodice Spieleautorenwettbewerb competition. Players develop coffee plantations and road networks in Guatemala, producing different varieties of coffee to ship to European markets. A clever market overseer mechanism drives the pacing: players bid actions such as buying roads, huts, workers, or ships, while a scoring track marker constantly advances, ending the game when any player catches it. Its tight action economy and brisk playtime make it a satisfying medium-light Euro.

