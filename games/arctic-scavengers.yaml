description: |
  Arctic Scavengers is a deck-building game for 2–5 players set in a post-apocalyptic frozen world where tribes of survivors compete for scarce resources. Unlike most deck builders, the game features high direct player interaction: each round ends with a skirmish in which players bid cards from their hand to claim a central resource pile, creating tense bluffing dynamics. Originally released by Driftwood Games in 2009 and re-published by Rio Grande Games in 2013 with the HQ and Recon expansions included, the game stands out for its confrontational, hand-management-driven take on the genre.

