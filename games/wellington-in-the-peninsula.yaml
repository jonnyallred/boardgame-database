description: |
  Wellington in the Peninsula is a two-player Napoleonic board wargame designed by Vincent Cumbo, Albert Nofi, and John Prados and published by Rand Game Associates in 1975, simulating the Peninsular War of the early 19th century. One player controls Napoleon's French forces while the other commands the Anglo-Spanish alliance under the Duke of Wellington. Rather than the then-standard hex grid, the game uses an area-movement system that better captures the terrain and regional dynamics of the Iberian Peninsula. The design offers a strategic-level view of the grueling campaign that tied down hundreds of thousands of French troops and contributed to Napoleon's eventual downfall.

