description: |
  Pete the Pirate (Piraten-Pitt) is a charming children's memory and deduction game designed by Wolfgang Kramer and published by HABA in 2000. Players roll a die, move around the board, and collect treasures that are hidden in a two-compartment treasure chest. The twist: opponents can flip and rotate your chest, so you must remember which half holds your jewels. When Pete the Pirate appears, you want to open the empty compartment — if you guess wrong, you lose treasures. The simple memory mechanic and pirate theme make it an ideal introduction to deduction for young players.

