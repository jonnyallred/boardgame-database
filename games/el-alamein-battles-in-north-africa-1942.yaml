description: |
  El Alamein: Battles in North Africa, 1942 is a hex-and-counter wargame published by Simulations Publications Inc. (SPI) in 1973 that simulates the pivotal four-month North African campaign from July through October 1942. One player commands Rommel's Axis forces while the other leads Montgomery's British Eighth Army across the Egyptian desert toward the decisive Second Battle of El Alamein. The game covers the operational and tactical dimensions of desert warfare, including supply lines, armor, and the critical role of air power in the North African theater.

