description: |
  Free Trader is a solitaire board game of interstellar commerce published by GDW (Game Designers' Workshop) in 1982. Players open trade routes across a tile-based galaxy while fighting off pirates and evading police patrols, drawing event cards that determine trade prices and hazards encountered along the routes. The game evokes the flavor of GDW's Traveller science fiction RPG setting, centering on a lone free trader ship navigating a dangerous galaxy for profit. Information on full mechanics and designer credits is limited in English-language sources.

