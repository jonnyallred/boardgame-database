description: |
  Happy Little Dinosaurs is a cheerful card game from the makers of Unstable Unicorns in which adorable dinosaur characters must dodge an escalating series of disasters — natural, predatory, and emotional — to be the last dino standing. Each round, a Disaster card is flipped and players simultaneously play Point cards hoping to avoid the calamity; those who fail lose life points, and the first to be eliminated or the last survivor wins. The game's irreverent humor, simple rules, and bright art make it a hit as a gateway party game, and a successful line of expansions has followed the base game.

