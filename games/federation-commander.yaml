description: |
  Federation Commander is a tactical starship combat board game set in the Star Fleet Universe, a Star Trek-derived licensed setting. Players captain one or more starships on a hex grid, allocating energy between movement, weapons, shields, and special systems on each of eight impulse sub-steps per turn. Ship information is tracked on laminated cards showing weapons and systems for each vessel, and the game supports both Squadron and Fleet scale variants. It was designed as a more accessible streamlining of the older Star Fleet Battles system, with the same strategic depth but cleaner rules, and is supported by dozens of expansion modules covering different factions and scenarios.

