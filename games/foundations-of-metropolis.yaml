description: |
  Foundations of Metropolis is a city-building game designed by Emerson Matsuuchi and published by Arcane Wonders in 2024. Players compete to become the city's Grand Architect by purchasing deeds to empty lots and constructing buildings over three rounds — more complex buildings require multiple lots but award greater prestige. The game is a streamlined, more accessible version of the award-winning Foundations of Rome, using polyomino building pieces on a grid-based city map with an updated theme. Whoever accumulates the most prestige is appointed Grand Architect and wins the game.

