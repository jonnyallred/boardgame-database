description: |
  Gigamons is a 2014 memory and matching game published by Blue Orange Games for 2-4 players. Players flip tiles to find matching pairs of Elemons — cute elemental magical creatures based on air, water, and fire — and combine them to summon larger, more powerful Gigamons. The game adds an engaging layer of strategy to the classic memory format through the special abilities granted by different Gigamon types, making it more than a simple memory test for young players.

