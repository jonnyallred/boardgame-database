description: |
  Tickle Bee is a vintage magnetic maze game from the 1950s by Schaper, designed for young children. Players use a magnetic pen to guide a bee piece through a maze-like track on the game board, navigating without touching the sides. The simple dexterity challenge makes it suitable as a first game for very young children, and vintage editions are now collectible items prized by nostalgia enthusiasts.

