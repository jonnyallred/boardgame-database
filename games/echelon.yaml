description: |
  Echelon is a literary quiz board game published by The Great Games Company in 1989. Players answer questions based on classic literature to advance through the game, testing their knowledge of novels, authors, and literary themes. Designed for 2 to 6 players, Echelon offers a family-friendly approach to literature appreciation through competitive trivia gameplay.

