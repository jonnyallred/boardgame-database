description: |
  All The King's Men (also known as Smess: The Ninny's Chess) is a chess-variant abstract strategy
  game published by Parker Brothers, set on a grid where each square displays arrows indicating
  permitted movement directions. Players control a King/Brain, Knights/Ninnies, and Archers/Numskulls,
  each moving only to squares whose arrows allow that direction of travel.

  The game plays faster than standard chess and has more predictable movement options — both players
  can easily see which squares are accessible from any position — yet this transparency creates its
  own strategic depth as plans must account for what opponents can also see. It is a classic American
  abstract that successfully simplified chess for family audiences while retaining genuine tactical
  decision-making.

