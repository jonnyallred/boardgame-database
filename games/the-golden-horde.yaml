description: |
  The Golden Horde is a 1978 Excalibre Games two-player wargame simulating the Mongol conquests
  of Asia and Europe from 1205 to 1241 AD. One player commands the Mongol Hordes with a leader
  counter and four war machine counters to boost attack odds, while the other controls twelve
  major nations collectively known as the Allies. Victory for the Mongols comes from conquering
  homelands until conquered territories outnumber remaining Mongol units; the Allies win by
  destroying all Mongol forces before that threshold is reached. The asymmetric win conditions
  capture the historical dilemma facing both sides: Mongol expansion versus Allied attrition.

