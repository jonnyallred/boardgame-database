description: |
  Wasabi! is a 2008 sushi-themed tile-laying game for 2–4 players published by Z-Man Games in which competing chefs complete sushi recipes on a shared board to earn victory points. On each turn, a player places an ingredient tile anywhere on the board and may then play an action card; when ingredient tiles are arranged to match a recipe card's pattern, the recipe scores points. Completing a recipe in the exact order listed on the card earns bonus Wasabi cubes for extra scoring. Special action cards add variety and opportunities for clever interference, making each game a blend of planning, opportunism, and mischief.

