description: |
  FITS (Fill In The Spaces) is a Tetris-inspired polyomino puzzle game designed by Reiner Knizia and published by Ravensburger in 2009. Players use an inclined player board to receive polyomino shapes one at a time, placing each at the top and letting it slide straight down — once committed, there is no rotating or shifting, only the choice of column. Scoring rewards covering blank spaces and penalizes uncovered gaps, with multiple board configurations adding variety across the game's four rounds.

