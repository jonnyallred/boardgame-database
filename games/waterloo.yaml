description: |
  Waterloo is a Napoleonic board wargame published by Avalon Hill in 1962, designed by Thomas Shaw, one of Avalon Hill's earliest designers. Simulating the famous 1815 battle between Napoleon's French forces and the combined Allied army, the game uses a straightforward alternating "I Go, You Go" format where each game turn represents two hours of the battle. Despite its acknowledged lack of strict historicity, the game was praised for more than two decades as fun and playable, remaining in Avalon Hill's catalog until 1990. It stands as one of the foundational titles of the board wargaming hobby and helped establish hex-and-counter wargaming as a genre.

