description: |
  Hexagonal Chess refers primarily to the variant invented in 1936 by Polish designer Wladyslaw Glinski, played on a symmetric 91-cell hexagonal board with three colors of hexagons. The game uses standard chess pieces but adapts their movement to the six-direction hexagonal grid, requiring three bishops per player (one for each hex color), and is played by over half a million people mostly in Eastern Europe. Since each non-edge hex cell has six neighbors, most pieces have greater mobility than on a standard chessboard, opening up new tactical and strategic possibilities.

