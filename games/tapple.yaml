description: |
  Tapple is a fast-paced word party game published by The Op in 2012, combining
  the pressure of hot potato with a word association challenge. Players draw a
  category card and then race around a circular wheel, pressing letter buttons
  to claim them while calling out a word matching the category that starts with
  that letter — all within ten seconds. Once a letter is pressed it cannot be
  reused, building pressure as fewer letters remain. Any player who can't name
  a valid word in time is eliminated. The game's distinctive electronic wheel
  provides both the timer and a tactile element to track claimed letters.

