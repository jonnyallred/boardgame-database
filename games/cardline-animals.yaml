description: |
  Cardline: Animals is a trivia-meets-timeline card game designed by Bruno Cathala and Sébastien Pauchon and published in 2012. Players receive animal cards face-down and take turns placing a card from their hand face-up into an expanding line, correctly ordering it by one chosen attribute — size, weight, or lifespan. If a card is placed incorrectly, the player draws a penalty card; the first to empty their hand wins. The game is educational and competitive in equal measure, rewarding players who know their zoological facts.

