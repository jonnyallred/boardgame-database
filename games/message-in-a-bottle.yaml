description: |
  Message in a Bottle is a party word game designed by Urtis Šulinskas and published by Alley Cat Games in 2024. Players shake a bottle containing four letter dice to produce a random jumble of letters, then race to be the first to call out a word that uses all those letters. The winner of each round claims a diamond token, and the first player to collect 8 diamonds wins. An optional effect die can add extra constraints to individual rounds for additional challenge. The game plays in 10–15 minutes, making it an ideal party filler or warm-up activity.

