description: |
  A two-player hex-and-counter wargame published by Avalon Hill in 1977 simulating the German paratroop attack on Crete on May 20, 1941. One player defends with Allied forces while the other commands the invading Germans in a company/battalion-level simulation across ten days of the campaign. The 3-part mapboard covers the island at 1.6 km per hex and includes over 500 counters. Published as a boxed set with a companion game, Invasion of Malta: 1942, it is highly regarded for its detailed airborne assault mechanics, including separate Airborne and Air Landing phases.

