description: |
  Oktaeder (German for "Octahedron") is a two-player abstract strategy game in which players take turns stacking marbles into a shared playing area, gradually building up an octahedron-shaped three-dimensional structure. The objective is to form lines of four marbles in one's own color within this growing three-dimensional arrangement. The game transforms the classic four-in-a-row concept into an elegant spatial challenge: players must think not just in two dimensions but plan for the shape's evolving geometry as layers are added. Simple to explain but demanding in spatial visualization, Oktaeder belongs to the tradition of German abstract games that use physical construction as a strategic canvas.

