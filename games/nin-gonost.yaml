description: |
  Nîn-Gonost (meaning "Fortress of Tears" in the game's elvish language) is a fantasy miniatures-based dungeon crawler published by Canadian company Fantastic Forges. Players assemble warbands of miniatures within a point limit (typically 150 points each) and maneuver them through a modular magnetic board assembled from interlocking tiles, complete with doors that physically open and close. Each miniature has a character card with statistics, and colored dice enable quick action resolution, including movement, combat, and special abilities. Often compared to a magnetic Advanced Heroquest, it is praised by fans for its tactile board and elegant action point system, though it remained a niche product with cult following among miniatures gaming enthusiasts.

