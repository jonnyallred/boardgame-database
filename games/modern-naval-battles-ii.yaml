description: |
  Modern Naval Battles II: The Campaign Game is the second volume in the Modern Naval Battles series designed by Dan Verssen and Alan Emrich and published by 3W in the early 1990s. It is a wargame expansion that builds on the base rules, extending the original card-based fleet combat system into a larger campaign format in which players command national fleets across a series of linked battles. The rules progress from the base game's Rule 15 through Rule 30, adding operational depth and strategic campaign elements to the underlying tactical naval combat framework.

