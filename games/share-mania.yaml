description: |
  Share Mania is a stock market simulation board game designed by Julian Musgrave and published by Perfect Games in 1988, in which 2–8 players begin with a 100,000 stake and trade shares in four fictional companies by rolling special dice. Company Dice select which stock to trade and Share Dice determine the volume, with each transaction moving prices up or down on the board tracker. The first player to reach one million in total assets wins, with an advanced variant adding loans, put options, and random market events for greater realism.

