description: |
  Dungeon Twister is a 2004 two-player strategy game by Christophe Boelinger and Asmodee, winner of the 2005 International Gamers Award for General Strategy: 2-Player. Each player commands a team of eight adventurers with different special powers, trapped in a dungeon of eight rooms that can be rotated and repositioned during play. Points are scored for successfully escaping characters off the board and for eliminating opponents' characters. The ability to twist the dungeon's rooms creates a constantly shifting tactical landscape demanding deep long-range planning. The game spawned numerous expansions adding new character types and room configurations.

