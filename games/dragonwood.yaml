description: |
  Dragonwood is a fast-playing 2015 fantasy card-and-dice game from Gamewright in which players venture into a mythical forest to battle ogres, goblins, and fearsome dragons. Players collect sets of adventurer cards — straights, matches, or flushes — to earn dice, which they then roll against creature difficulty numbers to capture them. Each captured creature scores points and may grant special abilities. Simple rules make it accessible to young players while the push-your-luck decisions around when to attack give it genuine strategic bite.

