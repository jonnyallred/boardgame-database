description: |
  StarForce: Alpha Centauri is a 1974 SPI science fiction wargame designed and illustrated by Redmond A. Simonsen — the first mass-market science fiction board wargame, and a bestseller that appeared on SPI's Top 10 list 14 times. Players maneuver fleets of Telesthetically-operated ships across a hex grid spanning 74 star systems within 40 light years of Earth. All movement is pre-plotted and resolved simultaneously, with ship vertical positions and fleet sizes kept secret until combat is triggered. The game's scenarios range from basic to advanced and solo play, and it directly inspired the spin-offs Outreach (1976) and StarSoldier (1977).

