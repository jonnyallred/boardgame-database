description: |
  Mmm! is a cooperative press-your-luck dice game designed by Reiner Knizia for one to six players, in which the players take the roles of mice sneaking into the Smith family's pantry to eat their food before being caught by the family cat. Players cooperate to collect food tokens by rolling dice while managing the risk that each additional roll might awaken the cat and end the raid. The simple mechanics and low age requirement make it an ideal first cooperative game for young children, combining playful suspense with easy-to-learn rules.

