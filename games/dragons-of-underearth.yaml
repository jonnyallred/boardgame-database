description: |
  Dragons of Underearth is a 1981 simplified solo and two-player role-playing game published by Metagaming Concepts, designed as an accessible introduction to The Fantasy Trip roleplaying system with which it is fully compatible. The game includes character creation, magic, monsters, and combat presented across introductory, intermediate, and advanced versions for a graduated learning experience, and notably requires no game master or special dice. Players explore underground fantasy settings, confronting dragons and other denizens of the underearth. Its streamlined rule set made it one of the more beginner-friendly entries in the early RPG-adjacent wargame tradition.

