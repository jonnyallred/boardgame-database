description: |
  That's Pretty Clever! (Ganz Schön Clever) is a dice-drafting roll-and-write game for 1–4 players in which players roll six dice and select one to score in a color-coded section of their personal score sheet, with unused smaller dice becoming available to other players. Each scoring area has its own unique rules and bonus triggers, and activating these bonuses can chain into spectacular scoring combos. The game rewards both optimization and opportunism as players try to trigger high-value chains while reacting to dice variance. Nominated for the Kennerspiel des Jahres 2018, it remains one of the most replayable and satisfying roll-and-write designs.

