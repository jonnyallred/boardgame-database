description: |
  Oppression is a strategy board game published by Midson Holdings in 1986 in which players compete for territorial control through military and political influence. Little information is publicly available about the specifics of this relatively obscure title, but it belongs to the tradition of wargame-influenced strategy games of the 1980s that combined area control mechanics with political and military conflict simulation. As with many games of its era and publisher, it remains primarily of interest to vintage board game collectors.

