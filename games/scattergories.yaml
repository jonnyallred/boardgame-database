description: |
  Scattergories is a timed word game published by Milton Bradley in 1988 in which players try to fill in 12 categories with words starting with a randomly rolled letter — and score only for unique answers that no one else has written. Each round, a 20-sided die is rolled to determine the starting letter, and players race against a 3-minute sand timer to complete their category lists. Duplicate answers are eliminated, rewarding creativity and lateral thinking. The game's simple rules and competitive scoring have made it a perennial party game staple.

