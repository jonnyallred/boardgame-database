description: |
  Raids is a Viking-themed competitive game designed by Matthew Dunstan and Brett J. Gilbert, published by IELLO. Players recruit viking warriors to raid islands, defeat monsters, and compete for glory across a shifting landscape of opportunities. The game blends hand management and area control as players sail between locations, using their crew to fight rivals for prime spaces and vanquish monsters for victory points. The fast-moving action and accessible mechanics make it a solid choice for fans of light-to-medium competitive games with a Viking theme.

