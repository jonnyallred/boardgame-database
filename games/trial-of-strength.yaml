description: |
  Trial of Strength is a strategic-level wargame simulating the titanic conflict on the Eastern Front of World War II from 1941 to 1945. Designed by Dave O'Connor and originally published by Panther Games in Australia in 1985, the game uses a novel integrated movement and combat system called CLIMACS that emphasizes initiative, momentum, and sound operational planning. Players simulate the full scope of the German-Soviet struggle, including air power, command and control, morale, terrain, supply, and logistics. A second edition was later published by Lock 'n Load Publishing.

