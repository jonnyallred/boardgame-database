description: |
  Wits & Wagers Family is a streamlined version of the original Wits & Wagers designed for younger players and family play, featuring family-friendly trivia questions and a simplified betting system. Instead of chips and odds boards, players use colored Meeples to vote on which answer they think is closest to correct — either their own or another player's guess. The first edition contains 125 question cards, dry-erase boards, and 10 Meeples per player, keeping the game accessible for ages 6 and up while retaining the core appeal of the original.

