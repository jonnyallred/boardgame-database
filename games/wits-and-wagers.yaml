description: |
  Wits & Wagers is an award-winning party trivia game for 3-7 players (or teams) in which players write numerical answers to trivia questions and then bet chips on the answer they believe is closest to correct without going over. Unlike traditional trivia games, you don't need to know the exact answer — you just need to know who at the table is most likely to be right and wager accordingly. The betting mechanic allows knowledgeable and lucky players alike to succeed, making it accessible and engaging for mixed groups. It has won over 20 awards including the Mensa Select.

