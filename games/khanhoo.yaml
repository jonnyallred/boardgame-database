description: |
  Khanhoo is a Chinese draw-and-discard card game adapted for Western audiences by British diplomat Sir William Henry Wilkinson, who had the card maker Charles Goodall issue a special edition in 1891. Rooted in the late Ming dynasty game 看虎 ("watching the tiger"), it is widely considered a likely ancestor of all rummy games, sharing structural DNA with Mahjong. Players draw and discard from a shared deck aiming to meld all their cards into valid sets, with the dealer beginning the game already holding a complete winning hand — a unique asymmetry that sets the starting tension.

