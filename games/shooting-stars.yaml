description: |
  Shooting Stars is a 1980 tactical space combat board game published by Yaquinto Publications, simulating combat between space fighters on a hex grid. Players manage energy allocation across up to 15 distinct ship functions — including weapons, shields, thrust, and sensors — making each turn a careful balancing act between offensive and defensive priorities. Supporting 1 to 4 players in solitaire, cooperative, or competitive modes, the game rewards players who master its detailed energy management system and tactical maneuvering in three-dimensional space combat.

