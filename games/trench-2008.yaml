description: |
  Trench is a two-player abstract strategy game inspired by the trench warfare of World War I. Players command opposing armies on a diamond-shaped grid board separated by a central trench, maneuvering pieces to outflank and overwhelm the enemy. The game captures the attritional tension of WWI combat in a compact, accessible format. Its clean rules and deep positional play make it a solid entry in the abstract wargame genre.

