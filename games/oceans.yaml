description: |
  Oceans is a standalone game in the Evolution series from North Star Games in which 2-4 players evolve marine species within an interconnected ocean ecosystem. Each turn, players deploy trait cards to create new species or evolve existing ones with abilities drawn from a rich set of surface traits — and optionally from "The Deep," a deck of nearly 100 unique and powerful traits representing the unknown wonders of the ocean floor. Species must stay well-fed to survive, converting accumulated food into victory points in a constantly shifting ecosystem where predators, symbionts, and scavengers interact. Created in consultation with marine biologist Brian O'Neill, Oceans is celebrated for its striking watercolor art by Catherine Hamilton and for capturing genuine ecological dynamics in an accessible engine-building format.

