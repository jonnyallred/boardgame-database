description: |
  Arkham Horror (First Edition) is the original cooperative Lovecraftian adventure game
  designed by Richard Launius and published by Chaosium in 1987, winning the Origins Award
  for Best Fantasy or Science Fiction Boardgame of 1987. Set in H.P. Lovecraft's fictional
  Massachusetts town of Arkham in 1926, investigators travel through the city fighting
  monsters, closing interdimensional gates, and gathering equipment to prevent an Ancient
  One from entering the world. The first edition features a board map, 99 event cards,
  50 monster counters, and 8 investigator characters, laying the foundation for the
  beloved Arkham Horror franchise that would later be expanded by Fantasy Flight Games.

