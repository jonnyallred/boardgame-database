description: |
  Johari is a gem market game set in Jaipur's world-famous jewelry market, where players buy and sell precious stones, hire nobles, and compete for the most valuable market position over ten market days. Each player selects actions simultaneously from an identical hand of seven cards, with timing being crucial — later-played actions cost less gold. Players sell to jewelers requiring four different gem types or to collectors demanding majority holdings. The tension between timing, gem acquisition, and managing sales to maximize points gives Johari elegant depth in a compact package.

