description: |
  Globbo! is an eccentric two-player game designed and illustrated by Allen Varney, published by Steve Jackson Games in 1983. Set on the alien planet Ticketa-Koo, one player controls Globbo—a giant amoeba-like babysitter armed with blue zap guns and red slapping hands, programmed to destroy the blob children—while the other player controls the blob children (biters, blips, and yeasts) trying to survive. Its absurdist premise and asymmetric play make it a uniquely odd curiosity in the Steve Jackson Games catalog, beloved by fans of unconventional wargame themes.

