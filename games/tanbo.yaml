description: |
  Tanbo is a two-player abstract strategy game designed by Mark Steere, playable
  on a Go board (19x19). Players take turns adding stones to form growing
  "roots" — branching connected groups that cannot form clumps or enclosed areas.
  When a root runs out of space to grow, it dies and is removed from the board.
  The objective is to eliminate all of your opponent's roots by cutting off their
  growth. Originally called Rootbound, Tanbo offers a Go-adjacent experience with
  its own elegant ruleset, and draws are impossible. It is played in competitive
  settings internationally.

