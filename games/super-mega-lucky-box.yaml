description: |
  Super Mega Lucky Box is a flip-and-write bingo-style game designed by Phil Walker-Harding and published by Gamewright in 2021. Players reveal numbers one by one and cross off matching boxes on their cards, and completing three-in-a-row unlocks bonuses that let players cross off additional boxes and trigger chain reactions of escalating rewards. The shared card-flip creates a satisfying simultaneous play experience where everyone cheers (or groans) together, while individual bonus choices add light strategic decisions. Accessible enough for the whole family yet surprisingly engaging through its cascading bonus system.

