description: |
  Kingdoms is a 2002 tile-placement game by Reiner Knizia in which players build medieval kingdoms by placing tiles on a 5x8 grid, each tile bearing resource values from +6 to -6. Players score at the end of rounds by multiplying each row and column's total tile value by the number of their castle towers in that row or column, rewarding clever positioning of both neutral tiles and personal castles. Originally published as the bazaar-themed "Auf Heller und Pfennig," the medieval retheme suits Knizia's signature style of deceptively simple rules with deep strategic implications. Over three rounds, fortunes shift dramatically as the board fills and scoring opportunities crystallize.

