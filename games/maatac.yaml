description: |
  MAATAC (Multi-functional Armed & Armored Tactical Attack Computer) is a 1979 sci-fi wargame published by Superior Models, set in the Starfleet Wars universe. The game covers ground combat between robots and tanks from five asymmetric races — Terrans, Entomolians, Avarians, Carnivorans, and Aquarians — each with distinct units and capabilities. Relatively simple and fast-playing for a wargame of its era, MAATAC was originally published alongside the Starfleet Wars naval miniatures system and has been republished through several successor publishers including Monday Knight Productions.

