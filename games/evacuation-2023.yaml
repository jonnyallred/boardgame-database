description: |
  Evacuation is a 2023 sci-fi Euro game designed by Vladimír Suchý and published by Delicious Games in which players race to move their entire civilization from a dying planet to a new one in just four rounds. Each player manages a growing population of workers, factories, and resources, optimizing the logistics of shuttling people and production across the stars while expanding their engine on the new world. The game presents a unique puzzle of dismantling everything you build on the old planet while simultaneously constructing infrastructure on the new one, creating an inventive "reverse engine building" arc. It received widespread critical acclaim after its debut at Essen Spiel 2023, briefly reaching the top of the BGG Hotness.

