description: |
  Mexican Train is a popular domino game played with a standard Double Twelve set of 91 dominoes, first commercially published by Puremco and Cardinal in 1994. Players take turns extending lines of dominoes called "trains" connected to a central hub, with the unique twist of a communal Mexican Train that anyone can add to. The objective is to be the first player to play all your dominoes, scoring zero points while opponents score the pip total of their remaining tiles. The game is extremely accessible and widely popular at family gatherings, casinos, and senior centers.

