description: |
  Flashback: Zombie Kidz is a cooperative investigation game set in the Zombie Kidz universe, designed for younger players. Unlike Zombie Kidz: Evolution, which features legacy-style tower defense gameplay, Flashback uses a memory-mystery format where players look for clues and reveal cards together to solve mysteries. There are no turns or rounds — everyone collaborates simultaneously to examine cards and deduce solutions. The game is accessible enough that players can jump in with minimal rules explanation, making it an ideal entry point for introducing children to cooperative deduction games.

