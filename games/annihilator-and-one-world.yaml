description: |
  Annihilator & One World is a 1979 dual-game package released by Metagaming Concepts as entry 14
  in their MicroGame line, designed by Robert Phillips. The box contains two distinct games sharing
  components: Annihilator is a sci-fi wargame inspired by Star Trek's Doomsday Machine, in which
  one player sends a small military unit into a planet-killing machine to destroy its two computer
  brains while the other controls the machine's robotic defenses.

  One World, the second game, is a lighter fantasy affair in which players control opposing gods
  (Chez and Borg) who send elemental children — Fog, Blade, and Stone — to attack each other using
  a diceless rock-paper-scissors combat system. Together, the pair showcases the MicroGame format's
  ability to pack two genre-spanning experiences into a small, affordable package.

