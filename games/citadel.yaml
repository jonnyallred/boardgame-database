description: |
  Citadels is a card game designed by Bruno Faidutti and first published in French as Citadelles in 2000, in which players secretly draft character roles each round — Assassin, Thief, Magician, King, Bishop, Merchant, Architect, or Warlord — then use those roles' special powers to collect gold and construct district cards. The player who first builds eight districts triggers the endgame, and the player with the most district points wins. Its combination of secret role selection, bluffing, and city-building in a small box made Citadels a Spiel des Jahres finalist and one of the most celebrated gateway games of its era. It has been reprinted in multiple editions with expanded character rosters.

