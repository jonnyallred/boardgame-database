description: |
  Thunder on South Mountain is a tactical wargame simulating the American Civil War Battle of South Mountain in Maryland, fought on September 14, 1862—a prelude to the Battle of Antietam. Two players command Union and Confederate forces at the brigade level, fighting for control of the mountain gaps along the National Road. The game won the 2003 Charles S. Roberts Award for Best Desktop Publishing Produced Board Game, recognizing it as an outstanding example of independently produced wargame design. It offers a detailed recreation of this often-overlooked but strategically significant engagement of the Maryland Campaign.

