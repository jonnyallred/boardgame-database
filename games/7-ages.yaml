description: |
  7 Ages is a grand civilization wargame from Australian Design Group covering 6,000 years of human history across seven archaeological ages. Players manage civilizations that rise and fall through military conquest, cultural influence, and economic development, guided by a card-driven hand management system. Up to six players can each control multiple civilizations simultaneously, creating a dynamic, sprawling contest for dominance across the ages. The game is renowned for its epic scope and deep strategic interplay between growing, defending, and ultimately passing the torch from one great civilization to the next.

