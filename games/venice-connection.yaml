description: |
  Venice Connection is a two-player abstract tile-placement game designed by Alex Randolph and first published in 1988. The game consists of just 16 identical tiles, each bearing a straight canal segment on one face and a curved segment on the other. Players take turns placing one to three connected tiles, attempting to complete the canal as a closed loop. Despite its simplicity — just one type of tile and a single rule — the game rewards spatial reasoning and careful planning, making it a beloved abstract filler. Its pocket-sized format and quick 5–10 minute play time make it ideal for travel.

