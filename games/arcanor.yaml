description: |
  Arcanor is a two-player abstract strategy game played on an 8x7 board. Players use
  12 cylinders of varying sizes that can be stacked inside one another like Russian dolls,
  creating a stacking capture mechanic unique to this game. The objective involves strategic
  placement and stacking of pieces to outmaneuver the opponent. Limited publisher and
  designer information is available in English-language sources.

