description: |
  Wacht am Rhein is a 1977 monster wargame designed by Jim Dunnigan and published by SPI, simulating the Battle of the Bulge — Germany's last major offensive in the West during World War II. Using a 1-mile-per-hex map scale and battalion/battery-level units, the game covers the entire December 1944 campaign in exhaustive detail across multiple maps. Developed by Joseph Balkoski and Jay Nelson with cartography by Redmond Simonsen, it is considered one of the top five monster wargames ever published. A second edition was later released by Decision Games. Its staggering scope and historical fidelity make it a landmark of the hobby.

