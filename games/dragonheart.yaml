description: |
  Dragonheart is an elegant two-player card game where players compete to score points
  by placing cards on the board and collecting those already there. The game features nine
  distinct card types, each with its own rules for collection, creating a web of tactical
  decisions. Players must read their opponent's intentions, bait them into unfavorable
  moves, and bluff to protect their own plans. Its simple rules mask a surprising depth
  of psychological play.

