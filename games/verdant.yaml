description: |
  Verdant is a set-collection tile-placement game designed by Molly Johnson, Robert Melvin, Aaron Mesburne, Kevin Russ, and Shawn Stankewich (the team behind Cascadia), published by Flatout Games and AEG in 2022. Players act as houseplant collectors arranging plant cards and pot tokens in their living spaces to maximize points through spatial adjacency, matching light requirements, and building healthy plant groupings. The beautiful artwork by Beth Sobel and the satisfying puzzle of optimizing your indoor garden gives Verdant a cozy, meditative feel while still offering genuine strategic decisions about which plants to acquire and where to place them.

