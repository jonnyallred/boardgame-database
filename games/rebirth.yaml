description: |
  Rebirth is a tile-laying game designed by Reiner Knizia and published by Mighty Boards. Players place tiles to build patterns and claim areas of the board, combining the deceptive simplicity of classic Knizia design with elegant scoring mechanisms that reward long-term strategic thinking. The game debuted at Essen 2024 and received positive attention for its accessible rules concealing genuine strategic depth.

