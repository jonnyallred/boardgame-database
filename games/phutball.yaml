description: |
  Phutball (Philosopher's Football) is a two-player abstract strategy game designed by John Horton Conway and described in Berlekamp, Conway, and Guy's Winning Ways for Your Mathematical Plays (1982). Played on a 19x15 grid (or a standard Go board), one white stone represents the ball and black stones represent players. Each turn, a player places a black stone anywhere on the board, or moves the white ball by jumping it over sequences of black stones in straight lines — removing each jumped stone. The goal is to move the ball onto or over the opponent's goal line. Despite simple rules, determining whether an immediate winning move exists is mathematically NP-complete.

