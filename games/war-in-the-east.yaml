description: |
  War in the East is a corps/division-level simulation of the Russo-German War from Operation Barbarossa in 1941 through Germany's surrender in 1945, designed by Jim Dunnigan and published by SPI in 1974. The original edition included 3 maps and 2,000 counters, making it one of the first "monster wargames," while a 1976 second edition trimmed this to 1,000 counters for greater manageability. The Soviet player must carefully allocate production resources to build new units while special rules reflect weather conditions that proved critical in the actual campaign. In addition to the full campaign game, four shorter scenarios depict key phases of the war on the Eastern Front.

