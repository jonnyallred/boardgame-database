description: |
  I'm the Boss! is a negotiation and deal-making game designed by Sid Sackson, originally published in German as Kohle, Kies & Knete in 1994 and receiving a Spiel des Jahres recommendation that year. Players control Investor pawns on a deal track, and whoever controls the Boss piece at deal time gets to organize a business deal among players who have the required investors present—splitting the money however they choose among participants. The game is celebrated for its chaotic social dynamics, the joy of suddenly seizing the Boss role, and the delightfully direct negotiations it generates.

