description: |
  Tower Up is a city-building game with a dexterity twist designed by Frank Crittin, Grégoire Largey, and Sébastien Pauchon, published by Monolith Board Games at Essen SPIEL 2024. Players manage resources and construct buildings in a growing cityscape, but with a unique constraint: after each action affecting a building, the active player must physically drop one of their rooftop pieces onto that building's column, creating a dexterity mini-game embedded in the euro engine. This physical element adds unpredictable excitement to what would otherwise be a conventional resource management experience.

