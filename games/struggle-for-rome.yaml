description: |
  Struggle for Rome is a 2006 Klaus Teuber board game (part of the Catan Histories series) set during the fall of the Western Roman Empire. Players lead Germanic tribes marching on Rome, moving armies across a map to pillage cities and gather resources. Like Settlers of Catan, resource production is triggered by dice rolls matching adjacent number tokens. Players progress through a nomadic phase of gathering wealth and then a settlement phase of anchoring dominance over conquered territories. The familiar Catan resource engine is recast in a rich historical setting of migration, conquest, and civilization's collapse.

