description: |
  Hearts is a classic trick-avoidance card game first recorded in the United States in
  the 1880s, typically played by four players with a standard 52-card deck. The aim is
  to avoid capturing hearts and the Queen of Spades, each worth penalty points, while
  the "Shooting the Moon" gamble—capturing all penalty cards to give points to everyone
  else—creates moments of high drama. Card passing between players at the start of each
  round adds a layer of deduction and strategy to this perennially popular game.

