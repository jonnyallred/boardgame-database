description: |
  Central America is an operational-level board wargame published by Victory Games in 1987, simulating historical and hypothetical armed conflicts in Central America during the 1970s and 1980s. Designed by James H. McQuaid, the game covers the turbulent guerrilla conflicts and Cold War proxy wars that defined the region in those decades. Players command opposing forces across multiple scenarios reflecting the asymmetric nature of these conflicts. It is a detailed study of counterinsurgency warfare in a politically charged theater.

