description: |
  Mehen is one of the oldest known board games in human history, dating from ancient Egypt's Predynastic period around 3000 BCE and played until the end of the Old Kingdom circa 2300 BCE. The board depicts a coiled serpent deity whose body is divided into spaces forming a spiral track from the tail at the edge to the head at the center; players race lion and lioness figurines and marble balls along this track. The game is thought to have held religious significance, representing the dead king's journey into the afterlife protected by the serpent god Mehen who encircles the sun god Ra. Modern replicas reconstructed by researchers are available today, making this ancient game playable once more.

