description: |
  Sword Lords (also known as Sword Lords of the Eastern Regions) is a 1981 fantasy
  miniature wargame published by Archive Miniatures & Game Systems, a company now
  defunct. Players can run any of several provided fantasy battles or design their
  own scenarios, commanding armies in a medieval fantasy setting. The game was noted
  for its elegant production values and interesting concept, though contemporary
  reviewers criticized the rulebook editing. It is now a collectible out-of-print
  title available through secondary markets like Noble Knight Games.

