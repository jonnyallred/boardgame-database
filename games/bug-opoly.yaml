description: |
  Bug-opoly is a themed variant of Monopoly published by Late for the Sky, replacing the standard properties and tokens with insect-themed equivalents. Players buy, sell, and trade bug-themed properties across the board while collecting rent from other players, following standard Monopoly rules adapted for the entomological theme. It is one of many novelty Monopoly variants targeting niche audiences and collectors.

