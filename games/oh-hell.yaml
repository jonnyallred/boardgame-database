description: |
  Oh Hell! is a classic British trick-taking card game dating to around 1930 in which players must bid the exact number of tricks they will take — no more, no less. Players score points only when their bid is exactly correct, adding a bonus for precision. Each successive hand is played with one card fewer (or more) than the last, creating a shrinking-hand structure that escalates the challenge of accurate bidding. The combination of exact bidding and variable hand sizes produces delightful swings of smugness and frustration that make it a perennial favorite for groups of 3-7.
