description: |
  Wiz-War is a chaotic fantasy combat board game originally designed by Tom Jolly in 1985 in which players control wizards navigating a modular labyrinthine dungeon, attempting to steal each other's treasures or eliminate opponents with spells. Players draw from decks of spell cards representing magical attacks, defenses, and movement tricks, and can alter the dungeon layout during play. Often described as a "beer and pretzels" game, it revels in mayhem and direct conflict rather than elegant strategy. The 2012 Fantasy Flight Games edition revived the classic with updated components and refined rules.

