description: |
  CoraQuest is a family-friendly cooperative dungeon crawler created by Dan Hughes and his daughter Cora as a lockdown homeschooling project that grew into a successful Kickstarter campaign. Players choose adventurers and explore modular dungeon tiles, fighting monsters, avoiding traps, finding treasure, and occasionally rescuing gnomes named Kevin. The rulebook is written to be accessible to young children, with clear iconography and straightforward combat, but the game also includes optional rules for more experienced players wanting greater depth. Its heartwarming origin story, approachable design, and high customizability made it a beloved family game upon release.

