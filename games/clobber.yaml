description: |
  Clobber is a two-player abstract strategy game invented in 2001 at a combinatorial game theory workshop in Halifax by Michael Albert, J.P. Grossman, and Richard Nowakowski. Played on a checkerboard with alternating black and white pieces, players take turns moving one of their pieces onto an adjacent orthogonally neighboring opponent's piece, capturing it. The player who makes the last legal move wins. Extraordinarily simple to learn but mathematically rich, Clobber has been extensively studied by combinatorial game theorists and has been a regular event at the Computer Olympiad since 2005. It can be played on any grid size from 5x6 to 10x10.

