description: |
  Sleuth is a classic deduction game by Sid Sackson, first published in 1971 as part of 3M's Gamette Series.
  One of 36 Gem Cards (depicting diamonds, pearls, or opals in various types and colors) is secretly removed at the
  start; players must deduce which gem is missing by questioning opponents about the gem cards in their hands using
  Search Cards. Players track information on a notepad, and the first to correctly identify the hidden gem wins.
  Its elegant design rewards careful logical inference and memory without requiring dice or a board.

