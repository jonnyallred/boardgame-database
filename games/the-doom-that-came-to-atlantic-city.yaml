description: |
  The Doom That Came to Atlantic City is a darkly humorous Lovecraftian take on Monopoly in which
  players are Great Old Ones competing to destroy the world first. Rather than building hotels,
  players tear down houses to open mystical gates in the streets of Atlantic City. Each Great Old
  One has a unique Doom card listing win conditions for instantly ending the game, requiring both
  the right gate locations and meeting specific preconditions. Combat uses dice rolls, with winners
  stealing cultists and collecting Chants cards. The game became notable for a troubled Kickstarter
  history before Cryptozoic Entertainment published it in 2014. It features beautifully sculpted
  miniatures by Paul Komoda.

