description: |
  Triplanetary is a science fiction spaceship combat and travel game originally published by Game Designers' Workshop in 1973. Set in the Solar System of the early 21st century, the game uses a highly influential vector movement system where players draw and erase spacecraft trajectories on a plastic overlay atop the hex map, accurately simulating Newtonian physics in space. Designed by Marc W. Miller and John Harshman, the game's movement system proved so elegant it was later incorporated into the Traveller RPG and influenced decades of space wargame design. Steve Jackson Games published a modern edition.

