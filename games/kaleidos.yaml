description: |
  Kaleidos is a fast-paced party game where all players simultaneously study the same richly detailed illustration on their easels and race to write down as many objects as possible whose names begin with the randomly drawn letter of the round. Players score one point for each word others also found, but three points for unique observations — rewarding both careful observation and creative lateral thinking. Originally published in 1994 and republished by CMON, Kaleidos is a delightful shared-observation game that works well for mixed-age groups.

