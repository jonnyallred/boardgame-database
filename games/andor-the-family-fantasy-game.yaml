description: |
  Andor: The Family Fantasy Game is a 2020 cooperative family adventure by Inka and Markus Brand,
  illustrated by Michael Menzel and published by Kosmos, designed as an accessible entry point into
  the Legends of Andor universe for younger players. Players choose from four heroes — magician,
  warrior, archer, and dwarf — and work together to complete missions in the land of Andor, starting
  with rescuing wolf cubs lost in a dangerous mine.

  The game deliberately simplifies the Legends of Andor ruleset: heroes have no health points,
  enemies do not fight back when attacked, and complexity is kept minimal to suit ages 7 and up.
  It won the Deutscher Spiele Prize as Children's Game of the Year and serves as an ideal bridge
  game for families looking to graduate toward heavier cooperative adventures.

