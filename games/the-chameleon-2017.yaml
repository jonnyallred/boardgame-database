description: |
  The Chameleon is a social deduction party game by Rikki Tahta in which all players but one are
  given a secret topic via a code-card mechanic using two dice. Everyone must say a single word
  related to the topic — including the Chameleon, who doesn't know what the topic is and must bluff
  convincingly. Players then debate and vote on who they believe the Chameleon to be. The tension
  comes from saying something specific enough to prove you know the topic without giving it away
  to the Chameleon. Winner of the 2017 UK Games Expo Best Party Game award, it is beloved for its
  simplicity and near-instant accessibility.

