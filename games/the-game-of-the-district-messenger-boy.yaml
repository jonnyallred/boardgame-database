description: |
  The Game of the District Messenger Boy; or, Merit Rewarded is an 1886 McLoughlin Brothers
  race game historically significant as one of the earliest American board games to celebrate
  the accumulation of wealth as the path to social advancement. Players race tokens around a
  track as humble messenger boys, with the first to reach the "Head of the Firm" position
  winning. This was a notable departure from the moralistic Christian-virtue framework of prior
  American board games like The Mansion of Happiness, reflecting the Gilded Age ideology that
  hard work and merit — rather than piety alone — could elevate one's station in life. It
  represents a cultural turning point in American game design.

