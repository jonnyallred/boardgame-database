description: |
  Drive on Stalingrad: Battle for Southern Russia Game is a 1977 two-player hex-and-counter wargame from Simulations Publications, Inc. (SPI) that simulates Germany's 1942 summer campaign on the Eastern Front, including the push toward Stalingrad. Rules are built upon the foundation established in SPI's Panzergruppe Guderian, with additional mechanics for rail movement, Soviet strategic movement, supply trucks, untried units, air supply, and tactical air units. A standout feature is the "Hitler Directive" mechanic — at the start of every turn, the German player draws a random directive that may radically alter their entire operational strategy. The game was later re-released by TSR in a box edition with updated artwork.

