description: |
  Schnapp die Nuss! (Grab the Nut!) is a children's board game published by Schmidt Spiele in 2017 in which little squirrels race to collect as many hazelnuts as possible without being caught by the mother squirrel. Players roll dice and move their squirrel to a matching colored space, and may also move the mother squirrel to chase others. The simple dice-movement mechanics and cute squirrel theme make it an accessible and charming game for young children learning turn-based play.

