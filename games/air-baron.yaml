description: |
  An economic strategy game published by Avalon Hill in 1996 in which players build airline empires across the North American aviation market. Starting with a single airport, players pay and roll dice to take over individual spokes connecting hubs, generating income from randomly selected purchased routes. Victory requires controlling a certain percentage of the market and accumulating a target amount of money. Despite its family-friendly marketing, Air Baron plays more like a wargame than Monopoly, with meaningful competitive decisions about which hubs and routes to contest.

