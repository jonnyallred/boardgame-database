description: |
  Star Fleet Battle Manual is a 1977 miniatures game designed by Lou Zocchi and Michael Scott Kurtick and
  published by Gamescience, based on elements from Franz Joseph's Star Fleet Technical Manual. Players control
  Star Trek starships on any flat surface, using a uniquely physical aiming mechanic: stretching a string from
  the center of a ship's card and estimating the correct angle to intersect an opponent's silhouette before
  firing. Ships are tracked on reusable starship log cards (filled in with grease pencils), and eight ship
  classes are available. Gamescience also produced plastic and metal miniatures for the game.

