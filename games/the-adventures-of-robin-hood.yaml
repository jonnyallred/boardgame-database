description: |
  The Adventures of Robin Hood is a cooperative storytelling family game designed and illustrated
  by Michael Menzel, creator of the Legends of Andor series. Players take on the roles of Robin
  Hood, Little John, Maid Marian, and Will Scarlett as they battle wicked rulers across Sherwood
  Forest, guided by a 216-page hardcover storybook. An innovative free-movement mechanic lets
  characters move anywhere on the beautifully illustrated gameboard, which features interactive
  flip panels that reveal hidden characters and game elements over the course of each scenario.
  The game was nominated for the Spiel des Jahres 2021 and is celebrated for its stunning art
  and immersive, evolving narrative.

