description: |
  War is a 1972 two-player strategy board game self-published by Donald Benge, considered one of the best two-player board games of the early 1970s. The game presents a chess-like abstract challenge around military confrontation, with Benge later creating a variant called Quest Chess. Multiple editions have appeared since its introduction. Specific details about the rules and components are not widely documented in modern English-language sources, and the game is primarily of interest to collectors and historians of American independent game design.

