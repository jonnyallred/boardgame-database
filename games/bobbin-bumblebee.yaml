description: |
  Bobbin' Bumblebee is a motorized dexterity game published by Mega Brands, a thematic
  reworking of the classic Loopin' Louie format with a bee-and-honey theme. Bobbin the
  bumblebee flies around a central motor on a spinning arm, and players use paddles to
  deflect the bee away from their honeycomb discs. The first player to lose all their
  discs to the bee is eliminated; the last player with discs remaining wins. Quick,
  noisy, and exciting, the game requires batteries and is ideal for young children
  developing hand-eye coordination.

