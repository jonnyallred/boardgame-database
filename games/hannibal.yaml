description: |
  Hannibal is the original 1996 Avalon Hill release of Hannibal: Rome vs. Carthage, a landmark card-driven wargame simulating the Second Punic War (218–201 BC). Players take command of Hannibal's Carthaginian forces or the Roman Republic, using strategy cards to move armies, control provinces, and trigger historical events across the Mediterranean theater. Designed by Mark Simonitch, the game introduced the card-driven system to historical wargaming and set a standard for strategic depth and asymmetric play. A reimplementation titled Hannibal & Hamilcar: Rome vs. Carthage was published by Phalanx in 2018.

