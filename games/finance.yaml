description: |
  Finance is a 1932 economic board game designed by Dan Layman, directly derived from Elizabeth Magie's The Landlord's Game — placing it as a key precursor to Monopoly. Players buy properties, collect rent, and attempt to accumulate wealth through roll-and-move gameplay with Chance and Community Chest-style cards. Layman sold the game to Knapp Electric for $200, and Knapp sold it to Parker Brothers in 1936. The existence of Finance on the market concurrent with Monopoly's development was historically significant, as it complicated Parker Brothers' patent position on Monopoly.

