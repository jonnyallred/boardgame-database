description: |
  Peek-a-Mouse is a cooperative observation game from Gigamic in which players use a flashlight to peer through the windows of a miniature mouse house for 30 seconds, spotting which objects are present before the light goes out. After the viewing window closes, the group must answer questions about what they saw. Correct answers advance the group's basket token forward, and the goal is to answer correctly over four rounds. The combination of the physical mouse-house prop, flashlight exploration, and cooperative memory testing makes it an engaging and charming children's game perfect for ages 5 and up.

