description: |
  The Palaces of Carrara is a 2012 Euro game designed by Wolfgang Kramer and Michael Kiesling in which players compete as Renaissance master builders purchasing marble from the famous Italian quarries. Each turn a player may buy marble (reducing its price for all players), use marble to construct buildings in six Italian cities, or score buildings for points—a tense three-action economy requiring constant trade-off decisions. Players must balance cheap marble purchasing (which helps opponents) against timely scoring, and the game rewards those who best read the tempo of the table. A second edition later added statues and an advanced mode for additional strategic depth.

