description: |
  Blue & Gray II is the direct sequel quadrigame to Blue & Gray, published by SPI in
  1975 with four more American Civil War battles: Fredericksburg, Hooker and Lee
  (Chancellorsville, designed by Richard Berg), Chattanooga, and the Battle of the
  Wilderness. Using the same shared rule system as its predecessor, each scenario uses
  100 or fewer counters and can be played in a few hours. The game rose to #6 on SPI's
  Bestseller list and remained there for six months, confirming the quadrigame format
  as a successful publishing model.

