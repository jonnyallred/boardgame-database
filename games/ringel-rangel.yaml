description: |
  Ringel-Rangel is an award-winning HABA children's dexterity game designed by Swiss author Geni Wyss that won the Special Prize for Children's Games at the 1993 Spiel des Jahres awards. Players select wooden turtle pieces and use a finger to push them across a wooden garden-themed board, aiming to land them in colored ring zones while avoiding pushing obstacles off the board. The chunky wooden components and simple spatial skill challenge make it ideal for young children developing fine motor skills. Its whimsical turtle-in-a-garden aesthetic and tactile wooden construction exemplify HABA's hallmark approach to quality children's game design.

