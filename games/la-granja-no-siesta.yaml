description: |
  La Granja: No Siesta is a standalone dice game spin-off of the full La Granja board game, designed by Andreas Odendahl and published by Stronghold Games in 2016. Each round players roll a set of dice and draft them in turn order until everyone has at least three dice to score with, then assign their dice to gain resources, hire helpers, build barns, or advance on the siesta track. Players can invoke helper abilities for special effects and store goods in barns for later use. The game ends when someone completes the siesta track, offering a compact 30-45 minute experience that captures the flavor of the original's agricultural theme in an accessible, quick-playing format.

