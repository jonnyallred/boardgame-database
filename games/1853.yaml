# Description
description: |
  1853 is an 18XX railway game designed by Francis Tresham and set in colonial
  India. Players invest in and operate Indian railway companies amid the unique
  challenges of the subcontinent: the terrain of hills, mountains, and the
  Himalayas creates complex routing decisions, while the standard 18XX financial
  mechanics of share buying, track-laying, and train purchasing remain intact.

  Like other 18XX games, 1853 alternates between stock rounds (where players buy
  and sell company shares) and operating rounds (where company presidents build
  the network and run trains for income). The Indian setting provides a distinct
  map configuration and historical flavor. Republished by Mayfair Games and
  Lookout Games in 2009.

