description: |
  Battle for Germany is a two-to-four player wargame designed by James F. Dunnigan and published by SPI in 1975, simulating the final Allied and Soviet campaigns to defeat Nazi Germany in 1944-1945. In the two-player version, one player handles the Western Allied armies and the other controls both the Soviet forces and Germany — forcing a single player to manage the desperate German defense on two fronts. In four-player mode, each major power gets a dedicated commander. The game captures the race to Berlin and the division of post-war Germany that would follow, with victory conditions reflecting territorial control at war's end.

