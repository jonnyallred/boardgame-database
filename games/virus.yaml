description: |
  Virus! is a fast-playing card game designed by Domingo Cabrero, Carlos López, and Santi Santisteban, published by Tranjis Games in 2015. Players race to assemble a complete healthy human body by collecting four different organ cards, while attacking opponents with virus cards that infect their organs and using medicine cards to inoculate or cure. The game's straightforward mechanics and chaotic take-that dynamic make it an ideal filler for groups who enjoy card-slapping chaos. Published by Goliath internationally, it has become one of Spain's most commercially successful card game exports.

