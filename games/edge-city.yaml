description: |
  Edge City is a 1994 cyberpunk board game published by Imagineering Design and one of the earliest attempts at a cyberpunk-themed board game. Players "jack into the 21st century" as data rippers, battling body rippers in the Sprawl and neutralizing ICE Ninjas in dataspace. Competitors build reputation and a high-tech arsenal while racing rivals across both real and virtual reality environments in search of "iT," described as the final word in lethal ICE. Now long out of print, it occasionally surfaces on the aftermarket as a curiosity of early genre gaming.

