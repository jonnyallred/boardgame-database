description: |
  Dark Stars is a hard science fiction simulation board game of interstellar and interplanetary starship operations, set in a globular cluster where humanity (the Terrans) intrudes into a three-way rivalry among native alien races. Players explore and colonize star systems while managing spacecraft and competing for territorial control through strategic maneuvering and combat. The game was reviewed in The Space Gamer magazine and is considered a niche entry in the hard sci-fi wargame genre of the early 1980s. As an obscure title from this era, detailed publisher and designer information is limited in modern sources.

