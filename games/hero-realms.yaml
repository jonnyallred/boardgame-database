description: |
  Hero Realms is a fantasy-themed deck building game for 2-4 players designed by Rob Dougherty and Darwin Kastle, the creators of Star Realms. Players start with identical small decks and take turns playing cards to gain gold — used to buy more powerful champions and actions from a shared central market row — and combat, used to deal damage to opponents. The game is a direct combat affair: the goal is simply to reduce opponents' health to zero, and the base set supports up to four players with included scorecards. Optional character packs add asymmetric starting abilities for wizard, cleric, thief, ranger, and fighter classes, and cooperative boss packs allow full campaign-style play, making Hero Realms notably versatile.

