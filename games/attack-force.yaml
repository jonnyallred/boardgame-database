description: |
  Attack Force is a space-themed mini-game published by TSR in the early 1980s.
  One player commands a force of small star fighters attempting to find and exploit
  the weakness in the other player's monstrous space station to destroy it. The game
  features simple rules spanning just a few pages, typical of TSR's compact mini-game
  format, offering quick asymmetric space combat accessible to a broad audience.

