description: |
  Foto Fish is a children's reaction and memory game designed by Michael Kallauch and published by LOGIS, with a German edition from Pegasus Spiele. Players dive into an underwater world of interchangeable aquarium tiles, using miniature cameras to "photograph" matching fish details on their game boards. The game features two aquarium boards with 24 interchangeable detail pieces, four camera components, and dice to determine difficulty, making it highly adaptable for different skill levels and player counts. Nominated for the 2020 Kinderspiel des Jahres (Children's Game of the Year), Foto Fish blends memory training with quick-reaction gameplay in a charming fish-themed package.

