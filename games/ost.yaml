description: |
  Ost is a miniature medieval wargame in which players first generate the battlefield using a die-roll terrain system, then deploy their armies and write detailed written orders for each unit before play begins. Once the game is underway, those orders can only be modified through leader pieces, enforcing the fog of war and the friction of command that characterizes pre-modern battles. The emphasis on pre-game planning and the limitations on in-game order changes make Ost a demanding simulation that rewards careful preparation and anticipation of the opponent's strategy. The written-orders mechanic gives the game a distinctive flavor of authentic command simulation among medieval miniature wargames.

