description: |
  Island War: Four Pacific Battles is a quad-game from SPI (1975) containing four thematically linked wargames simulating American-Japanese island battles of World War II: Bloody Ridge (Guadalcanal), Saipan, Leyte, and Okinawa. All four games share a common rules system, allowing players to learn one set of mechanics and apply it across the four scenarios. Each battle represents a distinct strategic challenge and escalating scale of the Pacific campaign, from 1942 through to the final Japanese defense in 1945. A significant historical design that contributed to the development of the quadrigame format in wargaming.

