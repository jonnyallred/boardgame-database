description: |
  Empire of the Rising Sun is a two-player World War II Pacific theater wargame published by Avalon Hill in 1995, winner of the Origins Award. Designed by Bruce Harper with significant naval warfare input from Dave Casper, the game covers the entire Pacific conflict from Pearl Harbor to 1945. Players command either the Allied forces or Japan across a detailed hex map, managing air, sea, and land operations in a grand-scale operational simulation.

