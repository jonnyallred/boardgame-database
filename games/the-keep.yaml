description: |
  The Keep is a 1983 Mayfair Games board game designed by James D. Griffin, based on the Michael
  Mann horror film of the same year. One player controls the evil demon Molasar who has been
  accidentally released from his ancient prison, while two to five other players are adventurers
  with twelve turns to find the Hilt — the only weapon capable of destroying him. The 1 vs Many
  structure and time pressure of the twelve-turn limit creates tense asymmetric gameplay where
  the adventurers must coordinate their search while Molasar hunts them through the keep.

