description: |
  Friends Trivia Game is a licensed trivia board game published by Cardinal in 2002, based on the massively popular NBC sitcom Friends. Players roll a die, move around a board themed around the show's locations, and answer questions about the lives and adventures of Joey, Chandler, Monica, Rachel, Phoebe, and Ross from the show's 10 seasons. The game includes 200 trivia cards with 1,000 questions. Players must correctly answer questions on apartment spaces a set number of times before racing to Central Perk for a final winning question. Several editions and tin versions of the game have been released over the years.

