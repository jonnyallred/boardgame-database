description: |
  Battlestar Galactica is a 1979 board game based on the original Glen A. Larson television series, produced to capitalize on the show's popularity following Star Wars fever. Players race their Colonial Vipers across the board, battling Cylon Raiders and pursuing the search for Earth while managing fuel and supplies. The game captures the episodic adventure feel of the original series in a straightforward family racing-and-combat format. It is now primarily a collector's item and piece of late-1970s science fiction pop culture memorabilia, distinct from the more sophisticated 2008 Fantasy Flight board game based on the reimagined series.

