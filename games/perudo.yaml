description: |
  Perudo is a Peruvian dice-bluffing game for 2-6 players, also known as Liar's Dice, in which players start with five dice each and make escalating bids on how many of a given face value exist across all players' hidden dice. Any player can challenge the current bid by calling "Dudo" — if the bid was too high, the bidder loses a die; if the bid was valid, the challenger loses one. The last player with dice remaining wins. Simple to teach yet rich with psychological tension, Perudo distills bluffing and probability into a party staple.
