# Description
description: |
  12 Thieves (originally published as The Thief of Baghdad) is a light strategy
  board game for 2-4 players set in the palaces of Baghdad. Each player leads a
  group of thieves attempting to claim the best booty from well-guarded palace
  vaults.

  Players place their thief tokens strategically on the board, trying to control
  valuable treasure locations while blocking opponents. The game blends area
  control and set collection mechanics as players compete to gather the richest
  haul. A simple ruleset makes 12 Thieves accessible for families while offering
  enough tactical decisions to satisfy casual strategy gamers.

