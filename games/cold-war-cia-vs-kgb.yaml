description: |
  Cold War: CIA vs KGB is a tense two-player card game set during the height of the Cold War, pitting the American CIA against the Soviet KGB in a contest for global influence. Players draft and play cards representing agents, directives, and crisis events while competing for control of countries in a push-your-luck bidding mechanism reminiscent of blackjack — going over a certain threshold loses the country. The game captures the paranoia and brinkmanship of superpower rivalry in a compact, fast format. Originally published as Guerre Froide, it was later distributed by Fantasy Flight Games.

