description: |
  Balconia is a 2024 tile-placement game themed around decorating a balcony garden with plants and flowers. Players draft and place botanical tiles to create attractive arrangements on their personal balcony boards, scoring points for completing plant groupings and fulfilling objective cards. The game's peaceful gardening theme, attractive artwork, and gentle puzzle-solving make it well-suited for family play and those who enjoy lighter strategic fare. Documentation on this recent title is limited given its 2024 release date.

