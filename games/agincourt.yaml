description: |
  A two-player hex-and-counter wargame published by SPI in 1978 as part of their "120 Series" (120 counters, 120 minutes) simulating the Battle of Agincourt on October 25, 1415. Designed by Jim Dunnigan, the game pits the English army led by Henry V against a vastly numerically superior French force, recreating the famous triumph of English longbowmen over French armored knights. The compact format makes it accessible as an introductory wargame while still delivering a historically grounded simulation of one of the most famous medieval battles.

