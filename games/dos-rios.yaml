description: |
  Dos Rios (Valley of Two Rivers) is a Euro strategy game for 2–4 players designed by Franz-Benno Delonge, in which players move workers across a hex-based modular board building houses along the banks of two rivers. Players earn money from river-adjacent hexes and spend lumber (built from dams) to redirect the flow of the rivers, changing which hexes pay out. The first player to construct all five of their buildings—four houses and one hacienda—or a hacienda plus three river-adjacent houses wins. Published by Mayfair Games in English, the game rewards spatial planning and river manipulation.

