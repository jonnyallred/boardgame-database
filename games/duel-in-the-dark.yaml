description: |
  Duel in the Dark is a 2007 asymmetric two-player wargame from Z-Man Games depicting the nighttime air war over Germany in 1943. One player commands the British Bomber Command, secretly plotting the course of a Halifax bomber toward German cities to erode civilian morale, while the other controls the Luftwaffe, deploying night fighters and organizing civil defenses. The British player uses a Mosquito as escort or decoy, while the German player must deduce the bomber's route before fuel runs out. Rules cover weather, moon phases, clouds, flak, searchlights, balloon barriers, and more. A second edition with nine expansions was later released.

