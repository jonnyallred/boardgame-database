description: |
  Combat Commander: Europe is a card-driven tactical wargame covering infantry combat in the European Theater of World War II. Players take command of opposing squads across twelve varied maps at roughly 100 feet per hex, with one player as the Axis and the other as the Allies. Instead of traditional movement points, players spend cards from their hand to issue orders — move, fire, assault, recover — creating a fog-of-war experience where randomness and tactical decisions intertwine. Fog-of-war events trigger automatically during play, and the built-in Random Scenario Generator provides near-unlimited replayability. Winner of multiple Origins and Charles S. Roberts award nominations, it is widely considered a landmark in card-driven wargame design.

