description: |
  River Dragons is a delightful simultaneous action programming game in which players race to cross the Mekong Delta by building bridges of planks and foundations. Each turn, all players secretly and simultaneously select five actions in order — placing stones, placing planks, moving their pawn, canceling another player's action, or removing planks — then reveal and execute them in sequence. The catch is that all planned moves must be committed before knowing what opponents chose, leading to gleefully disrupted plans as players' carefully laid bridges get removed by rivals. This reprint of the 2000 game Dragon Delta from Roberto Fraga maintains its charm as a light programming game full of chaotic surprises.

