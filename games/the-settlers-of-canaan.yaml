description: |
  The Settlers of Canaan is a 2002 Catan variant designed by Klaus Teuber and published by Cactus Game Design, set in the ancient land of Canaan with a biblical theme. The game uses Catan's familiar resource production and settlement-building mechanics, but replaces the robber with a "plague" tile that can be moved by contributing a priest card, and adds a cooperative city-wall building mechanic for Jerusalem. The player who contributes the most bricks to Jerusalem's wall earns victory points and a unique rule-breaking power. The biblical theme and minor rule variations make it a distinctive alternative for Catan fans interested in ancient history.

