description: |
  Korea: The Mobile War is a 1969 hex-and-counter wargame by Jim Dunnigan and SPI simulating the Korean War from 1950 to 1951. One player commands United Nations forces while the other controls North Korean and Chinese forces across three historical scenarios — Invasion, Intervention, and Stalemate — plus twelve "what if" hypotheticals that can be combined into a full campaign game. The game uses NATO unit symbols and simple terrain and combat rules, making it accessible for newcomers to wargaming while maintaining historical fidelity. Positive reviews led SPI to re-release it multiple times across updated editions.

