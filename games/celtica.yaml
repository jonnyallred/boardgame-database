description: |
  Celtica is a family board game by Wolfgang Kramer and Michael Kiesling, published by Ravensburger in 2006, set in 11th-century Ireland where players seek to gather magical amulets with the help of five shared druids. Players play colored cards to move the five druid figures across the board, collecting amulets along the way, with each player secretly trying to gather the most amulets of their own type. The game blends card management with a shared board, creating lively interaction as players try to guide druids toward their own goals. A lighthearted family game from a renowned designer duo.

