description: |
  Battles of Westeros is a two-player miniature-based wargame published by Fantasy Flight Games in 2010, set in George R. R. Martin's world of Westeros. Built on a modified Commands and Colors system, players command House Stark and House Lannister armies across scenarios drawn from A Song of Ice and Fire lore. Unique mechanics include a once-per-round activation limit per unit and a morale system that rewards flanking attacks. The game ships with detailed plastic miniatures of bannermen and commanders, with multiple expansions adding additional houses and scenarios.

