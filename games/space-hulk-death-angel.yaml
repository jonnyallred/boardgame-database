description: |
  Space Hulk: Death Angel is a cooperative card game designed by Corey Konieczka and published by Fantasy Flight
  Games in 2010, set in the Warhammer 40,000 universe. Players control teams of Space Marine Terminators fighting
  through the claustrophobic corridors of a derelict space hulk infested with Genestealers. Each combat team uses
  action cards — Attack, Support, or Move — with the critical restriction that the same action cannot be taken on
  consecutive turns. With an estimated win rate of only 25–33%, Death Angel is notoriously brutal, demanding tight
  coordination and careful sacrifice to survive.

