description: |
  Sushi Go Party! is the expanded edition of the popular drafting card game
  Sushi Go!, supporting up to 8 players and featuring a customizable menu
  system with over 20 sushi dish types to choose from each game. Players
  simultaneously pick a card from their hand and pass the rest, racing to
  collect the most valuable combinations of rolls, nigiri, puddings, and
  special dishes over three rounds. The modular setup ensures high replayability
  as each game presents different card synergies to explore. Designed by Phil
  Walker-Harding and published by Gamewright, it is a premier gateway game for
  families and new players.

