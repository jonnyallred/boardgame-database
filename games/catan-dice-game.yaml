description: |
  Catan Dice Game is a compact dice adaptation of Settlers of Catan designed by Klaus Teuber and published in 2007. Players roll six resource dice up to three times per turn — Yahtzee-style — and use the results to "build" roads, settlements, cities, and knights on a miniature Catan score sheet. The familiar Catan resources appear on the dice faces, and gold serves as a wild. Players accumulate victory points over multiple rounds, with the highest score winning. The game strips Catan to its most elemental push-your-luck core in a portable, fast-playing format.

