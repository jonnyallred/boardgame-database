description: |
  Stockpile is an economic board game of stock market trading and insider information, designed by Seth Van Orden and Brett Sobol and published by Nauvoo Games in 2015. Each round, players secretly possess insider knowledge about which stocks will rise or fall and must decide how to use it while bluffing opponents by adding face-down cards to stockpiles that all players then bid on. The buy-low-sell-high core is enriched by this bidding mechanic and the risk that opponents may have even better information about the same stock. Accessible yet strategically layered, Stockpile captures the chaos and thrill of market speculation.

