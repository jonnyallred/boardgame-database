description: |
  Space Hop is an educational astronomy board game designed by Helmut Wimmer — resident artist at New York's
  Hayden Planetarium — and published by Teaching Concepts in 1973. Players receive secret Mission Cards hinting
  at their destination in the Solar System, then choose between accumulating Hop cards to teleport through
  portals or rolling dice to navigate, dodging asteroids, comets, and rival ships. A decoder wheel helps
  uncertain players decipher destination names at the cost of their turn. The game teaches facts about the
  Solar System while delivering an exciting space travel experience.

