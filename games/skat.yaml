description: |
  Skat is a three-player trick-taking card game devised around 1810 in Altenburg, Germany, and recognized as the national card game of Germany. Played with a 32-card deck, each hand begins with an auction where the winner becomes the declarer and earns the right to pick up two hidden "skat" cards and set discards before choosing a game type (suit, grand, or null). The declarer then plays alone against the other two players working as a team, aiming to capture at least 61 of 120 available trick-points. Skat's auction system and variable game types create one of the deepest bidding games in the trick-taking canon.
