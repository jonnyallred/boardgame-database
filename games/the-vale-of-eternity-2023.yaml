description: |
  The Vale of Eternity is a 2023 card drafting and set collection game designed by Eric Hong for Mandoo Games, distributed by Renegade Game Studios. Players take the role of monster tamers who draft creatures from five fantastical card families, managing a tight currency system of Magic Stones (valued 1, 3, and 6) that players can hold at most four of at a time. Cards drafted must later be summoned by paying stones, creating difficult decisions about when to sell cards for income versus committing to summon them for their powers and end-game scoring. The elegant economy and quick play time make it an excellent filler with genuine strategic texture.

