description: |
  The Big Time! is a vaudeville-era theater management game set in Chicago during the Golden Age
  of vaudeville (approximately 1905-1915). Players take the roles of theater owners competing to
  book the greatest and most diverse roster of acts — comedians, acrobats, singers, and novelty
  performers — to make their venue the most spectacular in the city. Each of four turns, players
  bid on the right to select acts first, then place those acts in their theaters and tally scores.
  The auction mechanic and set collection scoring (diversity of act types rewards players who book
  varied performers) create interesting bidding decisions as players balance budget constraints
  against building a well-rounded bill.

