description: |
  Genestealer is a 1990 expansion for Space Hulk, the acclaimed 1 vs many science fiction board game by Games Workshop set in the Warhammer 40,000 universe. The expansion adds psychic combat rules, Genestealer Hybrid units armed with ranged weapons (autocannon, conversion beamer, missile launcher), and five Marine Librarians in Terminator Aegis armour with force weapons. It introduces new tactical possibilities for both sides and significantly deepens the strategic options available in the base game. Genestealer won the 1991 Origins Award for Best Fantasy or Science Fiction Boardgame of 1990.

