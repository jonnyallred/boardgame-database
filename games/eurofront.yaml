description: |
  EuroFront is a grand strategic block wargame published by Columbia Games in 1995 that allows the companion games EastFront, WestFront, and MedFront to be combined into a single massive campaign simulating the entire European Theatre of World War II from 1939 to 1945. Using Columbia's distinctive wooden block system for unit counters, the game spans six annual scenarios and requires approximately 4 x 6 feet of table space to accommodate the combined maps. In addition to military operations, EuroFront incorporates diplomatic mechanics governing potential entry of neutral nations and a supply-production system requiring players to manage reinforcements across multiple theatres simultaneously. Designer Besinque revised all four games in 2006 for a comprehensive Second Edition release.

