description: |
  Cluedo: Discover the Secrets is a 2008 Hasbro redesign of the classic Cluedo formula, intended to modernize the game with contemporary characters, settings, and mechanics. Designed by Rob Daviau, the game introduces individual character powers usable once per game, a new Intrigue card deck with Keeper and Clock cards, updated suspect identities with first names and modern lifestyles, and a new rule requiring players to move to a central swimming pool to make accusations. Though divisive among fans of the original, it represents an ambitious attempt to evolve the classic deduction formula.

