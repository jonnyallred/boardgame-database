description: |
  Mr. Trucker is a board game designed by husband-and-wife interstate trucking team Myrna and Larry Hunter, published circa 1987 in Ontario, Canada. The game is designed to teach players the basics of long-haul trucking — covering regulations, tariffs, borrowing money, and picking up and delivering loads between cities. Players roll dice to move their trucks across routes, collect cargo and payment, and navigate the economic challenges of the trucking industry. The game reflects the authentic experiences of professional truckers with an educational intent for players of all ages.

