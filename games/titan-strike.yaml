description: |
  Titan Strike! is a science fiction wargame published by SPI in 1979, set on Titan — one of Saturn's moons — where the European Economic Community and the Hegemony of Eastern Asia battle for control of valuable solar fissionables. Designed as a compact "Space Capsule" game, it simulates near-future military conflict in a realistically extrapolated geopolitical context. The game appeared on SPI's Top Ten Bestsellers list for over a year following its 1979 release.

