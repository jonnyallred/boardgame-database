description: |
  Minos: Dawn of the Bronze Age is a 1-4 player dice drafting and area control game designed by Stan Kordonskiy and published by Board&Dice. Players lead Minoan clans as leaders of the first great European civilization on the island of Crete, building cities and monuments, opening trade routes, expanding territory, and repelling outsiders. The clan council mechanic allows players to plan actions ahead, with research and decree systems enabling powerful combos. The game combines the rich history of Bronze Age Minoan civilization with deep strategic decision-making.

