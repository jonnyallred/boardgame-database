description: |
  Jantaris is a Euro strategy board game published by Czech Board Games in 2007, originally conceived under the title The Guild of Merchants. Each player leads a minor guild seeking to rise in regional importance by controlling provinces, bidding at an auction hall for valuable goods, and selling wares at the town market square. The game combines area control with bidding and economic competition, offering accessible but engaging guild management gameplay for three to four players.

