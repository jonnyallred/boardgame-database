description: |
  Lucky Numbers is a quick and cheerful drafting game in which players take turns drawing numbered clovers and placing them in a 4x4 grid where each row and column must be in ascending order from left to right and top to bottom. If a newly drawn number doesn't fit any valid position in your grid, you must swap it with another player's clover. The first player to fill their entire grid wins. Simple enough for children from age 6, the game's light drafting tension and race to complete the grid make it a satisfying quick filler. Published by Tactic, it has become a popular family game in Europe for its accessibility and speedy play.

