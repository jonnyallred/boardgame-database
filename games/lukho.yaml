description: |
  Lukho is a traditional African mancala-family game, related to other sowing games played across the African continent. Players distribute seeds or stones around a board of rows and holes using the characteristic mancala mechanic of sowing and capturing, aiming to accumulate the most seeds. Like many traditional African board games, Lukho exists in multiple regional variants with slightly differing rules, and can be played without manufactured equipment using holes dug in earth and pebbles or seeds as pieces. Mancala games are among humanity's oldest recorded board games, with evidence dating back thousands of years.

