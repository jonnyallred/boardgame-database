description: |
  Power Projection: Fleet is a Traveller science fiction space combat wargame published by British Isles Traveller Support (BITS) and distributed in the US by Ad Astra Games. Based on the Full Thrust miniatures engine and adapted for the Traveller RPG universe, it covers large-scale fleet engagements featuring Imperial Navy and Zhodani Consulate capital ships with Ship Status Diagrams for 11 vessel classes. The game uses vector movement and includes strategic warfare rules, scenario generation, and full Traveller flavor for the Fifth Frontier War period. It is designed to be fully compatible with the Traveller role-playing game ecosystem.

