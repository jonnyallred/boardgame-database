# Description
description: |
  A two-player strategic wargame of the American Civil War, designed by Frank Chadwick
  and originally published by Game Designers' Workshop in 1981. One player commands
  the Union, the other the Confederacy, as armies maneuver across the map of the
  Eastern and Western theaters. The game uses a point-to-point movement system and
  is notable for being one of the more accessible Civil War wargames while still
  offering genuine strategic depth. Multiple editions have been published including
  releases by Phalanx Games (2001) and Mayfair Games (2012).

