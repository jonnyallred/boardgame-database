description: |
  Indus is an abstract strategy game designed by Wolfgang Panning and published by Queen Games in 2004, themed around the Indus Valley Civilization. Players compete to control areas of the ancient Indus Valley by placing and maneuvering pieces on a shared board, with scoring based on territorial dominance. The game combines area control with a clean abstract aesthetic inspired by one of the ancient world's most sophisticated early civilizations.

