description: |
  Kriegsspiel (War Game) is the 1824 Prussian military training system designed by Lieutenant Georg Heinrich von Reisswitz Jr. that became the first wargame officially adopted by a professional army. Played on accurate 1:8,000 scale topographical maps, units could suffer partial losses and retain combat effectiveness, introducing the concept of hit points to wargaming. After impressing King Frederick William III and senior generals at Berlin Castle, every Prussian regiment was ordered to receive a set. Many historians credit widespread Kriegsspiel use among Prussian officers as a significant factor in Prussia's decisive victory over France in 1870, and it became the direct ancestor of all modern military and hobbyist wargaming.

