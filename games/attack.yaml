description: |
  Attack! is a light wargame designed by Glenn Drover and published by Eagle Games in
  2003, winning the Origins Award for Best Historical Board Game. Set loosely in the
  1930s, the game occupies a complexity sweet spot between Risk and Axis and Allies,
  featuring plastic tanks, planes, infantry, and artillery. Players expand their empires
  through either diplomacy or military conquest, starting with a few regions and growing
  their sphere of influence. The simple, accessible rules and emphasis on flavor over
  historical simulation make it an inviting introduction to the WWII-era wargame genre.

