description: |
  Comanauts is a cooperative adventure game for 2-4 players and the second game in Jerry Hawthorne's Adventure Book series, following Stuffed Fables. Players enter the subconscious mind of a comatose scientist, Dr. Strobal, and must navigate through surreal dreamscapes to find the psychological trauma keeping him unconscious. On each turn players pull dice from a bag and use their results to move, attack, search, and interact in the ever-shifting dream worlds. The Adventure Book itself serves as the game board, flipping pages as the story unfolds through fully illustrated scenarios. Comanauts is aimed at a more mature audience than its predecessor, delivering psychological horror themes alongside its imaginative storytelling.

