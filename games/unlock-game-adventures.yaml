description: |
  Unlock! Game Adventures is a box set in Space Cowboys' cooperative escape room card game series featuring three scenarios with themes drawn from classic gaming and video game culture. Using the card-based Unlock! system and companion app, players explore puzzle scenarios inspired by game genres and settings. Like all entries in the series, it requires no physical setup and uses card combinations and app-based interactions to create the escape room experience.

