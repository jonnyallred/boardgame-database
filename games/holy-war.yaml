description: |
  Holy War is a two-player microgame designed by Lynn Willis and published by Metagaming Concepts in 1979. One player commands the Sunthrowers and the other controls the Holy Band in a compact tactical conflict, with combat conducted across three-dimensional space using a dual horizontal and vertical movement system. As part of Metagaming's pioneering microgame format, it was designed to be a fast and portable wargame that could be learned in minutes.

