description: |
  Sho is a traditional Tibetan race game still commonly played today, in which players shake two six-sided dice in a wooden cup, slam it down onto a dice pad, then advance coins around a circular track made of shells. Supporting 2 to 3 players, the game is a straightforward race with the goal of moving all one's pieces around the board before opponents can do the same. As a traditional folk game passed down through generations in Tibet, Sho has no single known designer or publisher and is typically played with handcrafted equipment.

