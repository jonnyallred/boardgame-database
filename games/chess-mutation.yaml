description: |
  Chess Mutation is an abstract strategy chess variant in which all pieces except kings move and attack according to the color-coded rules of the square they currently occupy rather than fixed piece-type rules. The board is marked with colors corresponding to normal chess piece types, so a piece's capabilities constantly shift as it moves around the board. This dynamic mechanic transforms the familiar chess framework into a uniquely fluid strategic puzzle, demanding that players continually reassess their positions. It is an inventive variant that rewards adaptability over memorized opening theory.

