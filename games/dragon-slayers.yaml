description: |
  Dragon-Slayers is a 1981 fantasy wargame published by SPI (Simulations Publications, Inc.) in which players take the roles of competing hero-kings in a land threatened by a great dragon. Information on this title is limited in available English-language sources; the game is documented in board game databases as a 1981 SPI fantasy release. Players likely compete to slay the dragon or accumulate glory in a scenario-driven fantasy setting typical of SPI's fantasy wargame output of the era.

