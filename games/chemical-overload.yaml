description: |
  Chemical Overload is a deck-building and tableau-building game for 1–4 players set in an alchemical laboratory where players compete to brew the most potent and valuable potions before toxic fumes fill the lab. Unlike traditional deck builders, newly gained cards go directly on top of the draw pile, and flasks and table potions can be placed immediately into the player's tableau, creating a faster feedback loop of cause and effect. The layered chemistry of combining chemicals, applying upgrades, and managing the growing tableau gives the game the feel of a true engine-builder wrapped in a deck-builder shell.

