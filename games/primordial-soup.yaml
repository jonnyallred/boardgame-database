description: |
  Primordial Soup (originally Ursuppe in German) is an evolution-themed strategy game in which players guide single-celled amoeba organisms through the primordial sea, competing for limited food resources while evolving new genes that grant special abilities. Organisms must eat, excrete, multiply, and occasionally devour rivals in a tightly contested ecosystem where clever gene selection can shift the balance of power. Originally published in 1997 by Doris & Frank and winner of 2nd prize at the 1998 Deutscher Spiele Preis, the game was later republished by Z-Man Games.

