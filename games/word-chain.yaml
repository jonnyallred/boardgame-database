description: |
  Word Chain is a small card game in which players must say a word that links to the previously spoken word according to rules shown on two drawn cards. Linking rules vary — players might connect words by sharing a first letter, last letter, theme, or other associations — and the chain continues until someone cannot find a valid word or repeats a previous one. Originally a winner of the BoardGameGeek 2019 9-Card Game Print and Play Design Contest (voted best game for 3 or more players), it was subsequently published in an expanded 36-card edition through The Game Crafter with additional categories.

