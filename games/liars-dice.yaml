description: |
  Liar's Dice is a classic bluffing game dating back to 15th-century South America (known as Dudo), in which players roll hidden dice and bid on how many dice of a given face value lie hidden across all cups on the table. Each player can raise the bid or challenge the previous player's claim as a lie; when challenged, all dice are revealed and the loser forfeits a die. The last player with dice remaining wins. The Milton Bradley edition won the Spiel des Jahres in 1993 as "Call My Bluff," cementing its status as one of the great social bluffing games. Its elegant simplicity and pure bluffing tension have made it a perennial classic across cultures.

