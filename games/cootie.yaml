description: |
  Cootie is one of the earliest children's roll-and-collect games, invented by Minneapolis mailman Herbert Schaper in 1949 after he was inspired while carving a wooden fishing lure. On each turn a child rolls a die and collects the corresponding colorful plastic body part of a bug — a body, head, eyes, antennae, or legs — with the goal of completing their bug first. The game is entirely luck-based and designed for very young children who cannot yet read, making it one of the first successful plastic games for preschoolers. Named one of the 100 most memorable toys of the 20th century by the Toy Industry Association, Cootie has remained a staple children's game for over 75 years.

