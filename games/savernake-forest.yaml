description: |
  Savernake Forest is a serene 2023 tile-drafting game in which 2-4 players help woodland animals prepare for winter by building a personal 4x4 forest card arrangement. Each turn, a player selects one of the visible path cards and adds it to their forest, following three placement rules: no two animals can share the same path, cards must be placed adjacently, and the arrangement cannot exceed a 4x4 grid. The game ends when all players have completed their forests, with scoring based on completed animal paths and connected patterns. Published by Devir with charming artwork by Núria Aparicio, it delivers a gentle but engaging puzzle of spatial planning.

