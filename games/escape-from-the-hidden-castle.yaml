description: |
  Escape from the Hidden Castle, also known as Midnight Party, is a 1989 children's and family board game designed by Wolfgang Kramer and published by Ravensburger. Players move their pawns around the castle corridors trying to enter the ballroom and party safely before the ghost Hugo catches them. Each turn, players decide whether to keep moving or stop, but Hugo also moves each round and anyone he catches is eliminated. The tension between pressing forward into the fun and escaping the ghost makes for nail-biting decisions that work equally well for kids and adults. A reprint by Amigo Games brought the game to wider international audiences.

