description: |
  Hounds and Jackals is a reconstruction of an ancient Egyptian race game that dates to approximately 2000 BC and was widely popular during the Middle Kingdom period. The original game is known from several preserved boards featuring 29 holes per side, with ten pegs topped by either hound or jackal heads. Players move their pegs by rolling dice or throwing sticks, with certain holes connected by shortcuts or penalties similar to Snakes and Ladders. The original rules are lost, but several reconstructions exist; modern reproductions are available as historical curiosities and family games.

