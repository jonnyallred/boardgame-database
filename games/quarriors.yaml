description: |
  Quarriors! is a pioneer of the dice-building genre, in which players draw custom dice from cloth bags and roll them to generate quiddity (currency), summon creature dice, and cast spell dice to attack opponents. Players compete to earn Glory by keeping summoned creatures alive for a full round, while using spells and creatures to destroy rivals. Designed by Eric Lang and Mike Elliott and published by WizKids in 2011, the game translates deck-building mechanics into physical dice, creating a fast and tactile experience with a fantasy theme.

