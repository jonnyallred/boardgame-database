description: |
  Winter War: The Russo-Finnish Conflict is a two-player hex-and-counter wargame published by SPI in 1972, simulating the Soviet Union's 1939-40 invasion of Finland. One player commands the Soviet invasion forces while the other controls the Finnish defenders. Originally published as a pull-out game in Strategy & Tactics magazine issue 33, the game features only 120 counters and four pages of rules, placing it at the simpler end of the wargame complexity spectrum while still capturing the essential dynamics of the brutal Winter War.

