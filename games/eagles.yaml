description: |
  Eagles is a board wargame set in ancient history, published by Game Designers' Workshop in 1974. The game simulates military conflicts of the ancient world using hex-grid maps and counter-based units. Players command ancient armies in tactical or operational scenarios, managing unit movement, combat resolution, and terrain effects. As a GDW title, Eagles represents the mid-1970s wargame tradition of accessible yet historically grounded simulation.

