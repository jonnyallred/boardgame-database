description: |
  Dynasty League Baseball Powered by Pursue the Pennant is a tabletop baseball simulation game published by Design Depot in 1994, designed by Michael Cieslinski. A direct translation of the original Pursue the Pennant board game, it simulates realistic baseball through player rating cards, dice, and a rich set of ballpark effects, clutch hitting and pitching modifiers, pitcher fatigue rules, and fielding stumbles. Season player card sets for historical years allow players to replay famous seasons with accurate rosters. The system has since expanded to digital formats for Mac, Windows, iOS, and Android, but the board game remains the foundational product.

