description: |
  Deckscape: Behind the Curtain is a pocket escape room card game in the Deckscape series by Martino Chiacchiera and Silvano Sorrentino, published by dV Giochi. Players work cooperatively through a deck of cards representing puzzles, clues, and story events to solve mysteries and escape before making too many mistakes. The game takes place behind the scenes of a theater, with players exploring backstage secrets. As with all Deckscape titles, it plays in about an hour and requires no setup, making it an accessible and portable one-session escape room experience.

