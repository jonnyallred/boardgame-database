description: |
  Novem is a two-player abstract strategy game played with numbered wooden tiles arranged in a three-by-three grid, where one player controls the rows and the other controls the columns. Players score points based on the numbered tiles in their respective rows or columns, aiming to outmaneuver their opponent through clever tile placement and board control. The game's name — Latin for "nine" — reflects both the nine-position grid and the interplay of the nine tiles that fill it. Simple enough to learn in minutes yet offering genuine tactical depth, Novem belongs to the compact tradition of abstract games designed for direct two-player confrontation.

