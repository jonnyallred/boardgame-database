description: |
  Uncle Wiggily is one of America's oldest licensed children's board games, first published in 1916 by Milton Bradley and based on Howard R. Garis's beloved newspaper story character Uncle Wiggily Longears — a rheumatic elderly rabbit. Players draw cards with rhyming instructions and move their pieces along a winding path toward the finish. The game is entirely luck-based, aimed at very young children, and teaches counting and card recognition. It has been continuously published for over a century in various editions, now owned by Hasbro, with revisions in 1929, 1947, 1955, and beyond.

