description: |
  Tomorrow the World is a 1989 alternate history wargame published by 3W and designed by Ty Bomba, set in a world where the Axis powers won World War II. Germany and Japan now control the planet and inevitably turn on each other, competing for total global domination. The global strategic scale and counterfactual premise attracted interest from wargame enthusiasts, though the game received mixed critical reception.

