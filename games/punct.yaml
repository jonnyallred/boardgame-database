description: |
  PÜNCT is the fifth entry in Kris Burm's acclaimed GIPF Project series of two-player abstract games, released in 2005. Players take turns placing or moving pieces — triangles, straight lines, and bent pieces — on a hexagonal board, attempting to create an unbroken chain connecting any two opposite sides. Unlike other GIPF Project games, PÜNCT uses a board with holes that hold pieces in place and visually clarify legal moves. Winner of the Games Magazine Best Abstract Strategy Game award for 2007, it is widely regarded as one of the most elegant connection games ever designed.

