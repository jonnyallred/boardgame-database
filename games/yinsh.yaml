description: |
  YINSH is the fifth entry in Kris Burm's acclaimed GIPF Project series of two-player abstract games, published in 2003. Each player begins with five rings on a star-shaped hexagonal grid; moving a ring across the board leaves a marker behind and flips all markers it jumps over, creating a constantly shifting landscape of black and white discs. The goal is to form a row of five same-coloured markers, at which point a ring is removed — and the first player to remove three of their own rings wins. This creates a fascinating paradox where the path to victory requires weakening your own forces, giving YINSH a depth and elegance that earned it a Mensa Select award.

