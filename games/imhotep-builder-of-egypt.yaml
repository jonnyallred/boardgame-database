description: |
  Imhotep: Builder of Egypt is a gateway strategy game designed by Phil Walker-Harding and published by Thames & Kosmos in 2016. Players quarry stone blocks, load them onto boats, and sail those boats to one of five Egyptian monument sites (obelisk, pyramid, burial chamber, temple, and market) to score points. The key tension arises because anyone can sail any boat already loaded with stones, meaning opponents can redirect your carefully placed blocks to sites you did not intend. Quick to teach yet deeply interactive, Imhotep received a Kennerspiel des Jahres nomination and rewards players who anticipate opponent intentions.

