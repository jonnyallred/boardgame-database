description: |
  Lewis & Clark: The Expedition is a competitive racing game for 1-5 players in which each player leads their own expedition to be the first to cross the North American continent and reach the Pacific Ocean. The game features a unique card-management system where cards can be played either for their action or spent to power up another card, requiring players to carefully pace their hand and constantly rebuild their expedition crew. Scouting ahead, hiring Native American guides, and managing resources like food, horses, and canoes creates a rich puzzle as the terrain changes. Illustrated in the style of N.C. Wyeth by Vincent Dutrait, this 2013 Euro was Cédrick Chaboussit's debut design and remains highly regarded for its clever hand-use mechanics.

