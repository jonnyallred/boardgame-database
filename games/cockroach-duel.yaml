description: |
  Cockroach Duel (Kakerlaken-Duell) is a quick two-player abstract strategy game in which players sit opposite each other with four cockroach pieces arranged across the board between them. Players alternately choose and execute moves in a race to achieve their objective with the cockroaches. A spin-off of the popular bluffing game Cockroach Poker, it focuses on direct head-to-head competition in a faster, simpler format perfectly suited to pairs. Publisher and specific mechanics details are limited for this edition; the game appears to be a Schmidt Spiele publication.

