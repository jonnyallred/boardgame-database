description: |
  Hūsker Dū? (meaning "Do you remember?" in Danish) is a children's memory game first published in America in 1970 by Regina Products Inc. Players take turns removing two of 36 playing pieces from openings on the gameboard to reveal and match pictures hidden beneath. The clever design rotates a wheel under the board so that pictures appear in different locations in each game, ensuring the game cannot be memorized from session to session. Later editions were published by Lakeside and Parker Brothers, and the game remains a classic childhood memory-training toy.

