description: |
  Breakaway Rider (known in German as Der Ausreißer) is a cycling card game published by
  F.X. Schmid in which players use cards to vie for the lead position in a bicycle race,
  playing the highest-valued card to break away from the peloton and take control. Originally
  released in 1963 as Das Favorit, the game was revised and rereleased in 1989 as Der
  Ausreißer, earning a Spiel des Jahres nomination that year. The hand management mechanic
  captures the push-and-pull of competitive cycling, where timing a breakaway card correctly
  decides the race.

