description: |
  Crossfire is a classic dexterity action game originally created by Ideal Toy Company in 1971 and later published by Milton Bradley and Hasbro. Players use spring-loaded guns mounted at either end of the board to shoot small metal ball bearings at two pucks, trying to knock an opponent's puck into their own goal. The game requires no reading, no dice, and no cards — just reflexes, aim, and speed. Remembered fondly for its memorable TV commercials, Crossfire became an iconic piece of 1970s-1990s toy culture and remains a beloved childhood classic.

