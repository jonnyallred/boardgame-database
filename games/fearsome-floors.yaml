description: |
  Fearsome Floors is a race game for 2-7 players in which adventurers must escape a dungeon while being hunted by a terrifying monster named Furunkulus. Each round, players move their characters using action points, but Furunkulus follows strict, deterministic movement rules that players must learn to predict and exploit. The game's brilliance lies in Furunkulus's AI: his behavior is logical enough to anticipate but chaotic enough to constantly surprise, forcing players to use rivals as decoys while planning their own escape route. Friedemann Friese's characteristic humor and alliterative naming runs throughout, making this an accessible yet engaging semi-cooperative race.

