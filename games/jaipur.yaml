description: |
  Jaipur is a 2-player card game designed by Sébastien Pauchon in which rival merchants compete for the Maharaja's seal of excellence by buying, trading, and selling goods at the marketplace. Each turn a player either takes goods cards from the market — paying with equal numbers of cards from their hand when taking multiple — or sells a set of identical goods for token bonuses that diminish as more are sold. Camel cards serve as wild market pieces and enable large trades, while bonus tokens reward larger batches. With its tight hand-limit, dwindling bonus tokens, and the race to win two rounds, Jaipur delivers a fast, tense experience that earned the 2010 Spiel des Jahres recommendation and multiple Best Two-Player Game awards.

