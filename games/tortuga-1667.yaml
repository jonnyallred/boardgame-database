description: |
  Tortuga 1667 is a pirate-themed social deduction and light strategy game designed by Travis Hancock and published by Facade Games in 2017. Players are secretly assigned to French or Dutch pirate factions aboard two ships competing for treasure, with mutinous pirates who want to seize power for themselves. On their turns, players take cards that manipulate the balance of treasure and trust between ships, while using event cards to scheme, form temporary alliances, and backstab. Part of Facade Games' Dark Cities series, Tortuga 1667 is beloved for its thematic flavor and ability to create dramatic moments with its traitor mechanics.

