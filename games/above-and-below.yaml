# Description
description: |
  A mashup of village-building and cave-exploration storytelling set in the Arzium
  world. Players compete to build the most prosperous village above ground while
  also sending explorers into the underground caverns below. Cave exploration
  triggers illustrated story paragraphs from a companion booklet, with choices
  leading to different outcomes, encounters, and rewards. Village buildings provide
  workers, resources, and special abilities for future actions. Ryan Laukat both
  designed and illustrated the game, creating a visually distinctive and whimsical
  experience. First in the Arzium Storybook Series, followed by Near and Far.

