description: |
  Where's Mr. Wolf? is a fully cooperative memory game for 1–4 players designed by Marie Fort and Wilfried Fort and published by Blue Orange Games, in which players work together to help all the farm animals get back to their barns before the wolf arrives. Players take turns flipping over animal tokens on the board; when a farm animal is revealed, it is placed in its matching barn, but when Mr. Wolf appears, he moves one step closer to the barns. If Mr. Wolf reaches the barns, everyone loses. Designed for ages 4 and up, the game builds memory, matching, and communication skills through a gentle but genuinely tense shared experience.

