description: |
  Hallo Dachs! is a children's memory and dice game designed by Klaus Teuber, where players help a badger gather meals hidden beneath tiles in a forest. On each turn, players roll a die a number of times equal to the meals depicted and must flip over matching tiles to feed the badger — combining gentle memory challenges with the thrill of dice luck. Published by Gold Sieber Spiele in 1996 and later reprinted by Mayfair Games as "Badger Badger," the game won the Deutscher Kinderspiele Preis (German Children's Game Prize) in 1996.

