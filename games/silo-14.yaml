description: |
  Silo 14 is a tense tactical game designed by Neil A. Rosenberg and published by Jersey Devil/Centurion Games in 1983 in which special forces commandos must infiltrate a US nuclear missile silo and stop a rogue base commander from launching a first-strike nuclear attack. Players have 100 in-game seconds from the moment of initial breach to disable the launch computer in the command center. The game can be played solitaire or cooperatively, combining intense time pressure with tactical man-to-man combat in a thriller scenario that captured Cold War-era anxieties.

