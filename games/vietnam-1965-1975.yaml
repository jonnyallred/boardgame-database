description: |
  Vietnam: 1965-1975 is a landmark two-player strategic wargame designed by Nick Karp, published by Victory Games in 1984 when Karp was just 21 years old. The game covers the entire American involvement in the Vietnam War at both the operational and political levels, requiring players to manage not only military campaigns but also the political pressures of the era — including domestic opposition, pacification efforts, and the Ho Chi Minh Trail. Considered one of the finest wargames ever designed on the Vietnam War, it was republished by GMT Games in 2022 with updated components and clarified rules. The game's depth and scope make it a true marathon simulation.

