description: |
  Dungeoneer is a 2003 non-collectible card game series from Atlas Games designed by Thomas Denmark, originally launched as "Tomb of the Lich Lord." Players each control one of six heroes with asymmetric abilities, building a dungeon map from white-backed map cards while drawing adventure, quest, and hero cards to drive a dungeon-crawl narrative. Each player must complete their own quests while also managing threats that emerge for other players. The game was followed by multiple standalone expansions — including Vault of the Fiends, Haunted Woods of Malthorin, Den of the Wererats, Dragons of the Forsaken Desert, and others — each compatible with the others.

