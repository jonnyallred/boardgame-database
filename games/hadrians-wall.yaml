description: |
  Hadrian's Wall is an immersive flip-and-fill roll-and-write game set during the Roman
  occupation of Britain. Players fill personal sheets representing their section of the
  famous wall, managing legionaries, resources, and civilian settlers across interlocking
  tracks. The layered engine-building on paper is remarkably deep for the format, with
  tech-tree paths, worker allocation decisions, and dozens of scoring opportunities that
  create a unique set of priorities each game. Despite its complexity on paper, turns
  are quick and simultaneous, making it one of the most satisfying solo or competitive
  roll-and-write experiences available.

