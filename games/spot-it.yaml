description: |
  Spot it! (known as Dobble in Europe) is a lightning-fast visual perception game for 2–8 players published by Asmodee, originally released in France in 2009. The game's 55 round cards each bear 8 symbols, and by clever mathematical construction, any two cards share exactly one matching symbol. Players race to find the matching symbol between two cards before their opponents, using five different mini-games with the same deck. Simple enough for young children yet genuinely challenging at speed, Spot it! has become one of the best-selling card games in the world.

