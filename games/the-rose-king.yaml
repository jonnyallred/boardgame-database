description: |
  The Rose King is a 1992 two-player abstract area control game designed by Dirk Henn, originally published as "Texas" before being republished by Kosmos in 1999 with a Wars of the Roses theme. Players use a hand of directional/distance cards to move a shared pawn across a grid, placing colored discs to claim territory; claimed territories can be flipped to the opponent's color in Reversi-like fashion. The winner is determined by who controls the most contiguous regions of their color at game end. The combination of card management and spatial reasoning gives this compact game a satisfying strategic depth well beyond its apparent simplicity.

