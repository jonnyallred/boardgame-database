description: |
  Nexus Ops is a light wargame of alien mining and combat by Charlie Catino, originally published by Avalon Hill in 2005 and reprinted by Fantasy Flight Games in 2012. Players race to mine rubium — a fictional metal — on a distant moon, using it to recruit diverse alien units including fungoids, rock striders, and powerful rubium dragons, each with unique combat abilities. The hex-based board is randomly generated, and victory requires accumulating 12 victory points through battles and secret mission cards. Its streamlined rules and aggressive player interaction make it a gateway wargame with a satisfying escalation of power.

