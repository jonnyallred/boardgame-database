description: |
  Insider is a social deduction party game from Oink Games in which one player is the Master who holds the secret word, one player is the hidden Insider who already knows the word, and the rest are Commons trying to guess it through yes/no questions. The Insider secretly steers the group toward the correct answer while hiding their identity. After the word is guessed (or time runs out), players discuss and vote to unmask the Insider — if they succeed, the Commons win; if the Insider escapes detection, the Insider wins. The genius of the game is its dual-layer tension: solving the word puzzle while simultaneously tracking who is guiding the conversation.

