description: |
  Goblin is a fantasy battle game in which the Goblin King's raiders face off against the Baron's defending forces in fantastic medieval fantasy combat. Players command forces across a game board, managing unit movement and tactical skirmishes as goblins attempt to overwhelm the human defenders. The game's theme of goblin-versus-human conflict captures the classic fantasy warfare dynamic, with dice-driven combat and area control objectives. Information on this game is limited; details about the designer and publisher remain unclear from available sources.

