description: |
  GridIron Master is a wooden board game published by Canadian company PHI Sports Games in 2007, designed by Brett Proud, Craig Proud, Paul Morin, and Jordan Sampson. The game fuses the strategic elements of gridiron football (American and Canadian) with chess-like positional play on a wooden exact-to-scale football field. Players call plays, move pieces, and attempt to advance the ball into the end zone, capturing the essential tension of football within a tabletop strategy format. Its premium wooden components and hybrid football-chess concept give it appeal as both a game and a keepsake.

