description: |
  Welcome to New Las Vegas is a city-builder flip-and-write game designed by Alexis Allard and Benoit Turpin, published by Blue Cocker Games in 2020, set in a glamorous Las Vegas theme. Players use the same dice-without-dice card flip mechanism from Welcome To..., combining a number with an action and writing it into their Las Vegas street plan. Players build casinos on streets, hotels in avenues, create golf courses, give performances, and move limousines for VIPs to score points. Playable simultaneously by 1 to 50 players, Welcome to New Las Vegas offers the satisfying puzzle of optimizing a shared card set into a unique personal layout.

