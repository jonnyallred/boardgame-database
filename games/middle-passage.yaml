description: |
  Middle Passage is a board game of trade, piracy, and naval warfare set during the Age of Sail, focusing on the Atlantic Ocean and surrounding regions. Players compete to dominate the sea lanes through a combination of commerce and armed force, and the game can be combined with companion titles Pacific Passage and Passage to Cathay to cover the Pacific and Indian Oceans respectively. The 1993 revised edition features an enlarged 17x33 inch map with all charts printed on it, stand-up counters for six players, and expanded advanced rules covering plunder, raiding, and crew training. Specific designer and publisher information is not well documented in available sources.

