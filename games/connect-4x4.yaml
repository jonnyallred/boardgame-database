description: |
  Connect 4x4 is a three-dimensional strategy game published by Milton Bradley in 2009, expanding on the classic Connect Four formula with a double grid system and two different types of game pieces that support up to four players simultaneously. Players take turns dropping pieces onto the board and attempt to connect four of their pieces in a row horizontally, vertically, or diagonally across the three-dimensional structure. The four-player format and dual-grid board add complexity and interaction compared to the original two-player Connect Four.

