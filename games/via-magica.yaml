description: |
  Via Magica is a fantasy-themed pattern completion game designed by Paolo Mori and published by Hurrican in 2020. Players draw cards and place magical tokens on their personal spell boards to complete patterns of three or more connected symbols, scoring points based on the size and complexity of completed formations. Adapted from Rise of Augustus with a new magical aesthetic and more family-friendly rules, Via Magica retains the bingo-like core of drawing and placing while adding more strategic choice in token placement and pattern selection. A light but engaging family game with beautiful production.

