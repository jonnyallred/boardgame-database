description: |
  Treasure Island is a one-versus-many bluffing and deduction game published by Matagot in 2018, inspired by Robert Louis Stevenson's classic novel. One player takes the role of Long John Silver, who secretly marks the treasure's location on a hidden map and must mislead the other players as they scour the island with dry-erase markers. Long John must provide truthful clues most of the time but possesses tokens allowing lies, so hunters must decide how much to trust each clue while narrowing down the location before Silver escapes and recovers the treasure himself.

