description: |
  The British Way: Counterinsurgency at the End of Empire is a COIN Series multi-pack published by
  GMT Games in 2023, containing four separate games covering British counterinsurgency campaigns
  during the end of empire: Kenya, Malaya, Cyprus, and Palestine (1945-1960). Designed by Stephen
  Rangazas, each game is a two-sided asymmetric conflict between the British colonial administration
  and local insurgency movements, using the COIN system's familiar action selection but tailored to
  each unique theater. The multi-pack format allows players to explore thematically related but
  mechanically distinct conflicts in a single box, examining how Britain managed its retreat from
  empire across four very different political and geographic contexts.

