description: |
  Dungeon Fighter is a 2011 cooperative dexterity game from IELLO in which players delve into a three-tier dungeon, defeating monsters by throwing dice at a target board — each die must bounce once before landing, and closer to the bullseye means more damage. Cards, monsters, and room conditions force players to roll in increasingly ridiculous ways: behind the back, under the table, with eyes closed, or spinning in place. Players must manage their hero resources and defeat the final boss to win. The game's blend of physical comedy and genuine tactical cooperation makes it a beloved party-friendly dungeon crawler.

