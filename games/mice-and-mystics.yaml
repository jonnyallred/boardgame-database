description: |
  Mice and Mystics is a cooperative dungeon-crawling adventure game designed by Jerry Hawthorne and published by Plaid Hat Games in 2012. Players take on the roles of royal heroes magically transformed into mice, fighting their way through a corrupted castle on a quest to save their king from the evil sorceress Vanessa. The game weaves together storybook narration with tactical dice-based combat, character progression, and modular tile-based boards, with six unique mouse heroes possessing distinct abilities. It is especially beloved for its imaginative theme, accessibility for family play, and chapter-by-chapter story that unfolds across multiple sessions.

