description: |
  The Bleach Trading Card Game is a collectible card game based on the popular manga
  and anime series Bleach by Tite Kubo, released in the mid-2000s. Players build decks
  featuring characters from the Bleach universe — Soul Reapers, Hollows, and others —
  and compete in duels. Like many anime-based TCGs of the era, the game tied closely
  to the ongoing anime and manga releases, allowing fans to play as their favorite
  characters in strategic card combat. The game is now out of print.

