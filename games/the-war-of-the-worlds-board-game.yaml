description: |
  The War of the Worlds is a 1980 wargame designed by Allen D. Eldridge and published by Task Force Games, based on H.G. Wells' classic 1898 science fiction novel. Two players take opposing sides—one commanding the invading Martians with their devastating tripod war machines, the other defending Victorian London and England with human military forces. The asymmetric nature of the conflict mirrors the novel, with humans starting at a severe technological disadvantage and relying on attrition and terrain. A 16K computer adaptation was developed in 1983, and the property has continued to inspire new board game adaptations into the modern era.

