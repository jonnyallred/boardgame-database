description: |
  Hurtgen Forest is a board wargame designed by Kip Allen, Howard Barasch, and Redmond A. Simonsen, published by Simulations Publications Inc. (SPI) in 1976 as part of the Westwall: Four Battles to Germany quadrigame collection. The game simulates the brutal and costly Allied campaign in the Hurtgen Forest on the German border in late 1944, one of the longest battles fought by the U.S. Army in World War II. The folio-format microgame was also sold individually and is known for capturing the attritional nature of fighting through dense forested terrain.

