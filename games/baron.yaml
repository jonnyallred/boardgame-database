description: |
  Baron is a worker-placement and hand-management game published by Gorilla Games in 2009, in which players act as medieval barons competing to develop their estates and accumulate the most victory points. Players deploy workers to gather resources, construct buildings, and fulfill contracts, with card play adding tactical options for sabotaging rivals or boosting one's own production. The medieval estate-building theme, clean mechanics, and moderate play time make it a solid mid-weight euro experience for gamers looking for accessible worker placement.

