description: |
  Transatlantic is a deck-building and route-building game for 2–4 players by Mac Gerdts, following the golden age of ocean steamship travel from the opening of the Suez Canal in 1869 to the start of WWI. Players lead shipping companies, buying historically accurate steamships from an open market and building their individual card decks to unlock new routes and abilities. Each turn, players play a card and execute its action, gradually constructing more efficient engines. The game spans multiple generations of steamship technology, rewarding players who time their investments to ride waves of innovation across the Atlantic and Pacific.

