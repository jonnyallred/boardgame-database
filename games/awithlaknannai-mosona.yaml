description: |
  Awithlaknannai Mosona ("Fighting Serpents") is another traditional Zuñi board game documented by Stewart Culin in his 1907 study "Games of the North American Indians." Two players move serpent-shaped pieces along a grid, attempting to capture opposing pieces through movement and position. The serpentine piece design and the cultural context of the game — likely linked to Zuñi cosmology involving serpent imagery — give it distinctive character among indigenous North American board games. Like Awithlaknakwe, it is known primarily through Culin's 19th-century ethnographic records.

