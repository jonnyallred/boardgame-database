description: |
  G.E.V. is a two-player tactical ground combat wargame set in the late 21st century and a direct sequel to Ogre, designed by Steve Jackson. The game expands the Ogre universe by introducing Ground Effect Vehicles (fast-moving hovercraft), Mark IV Ogres, and new stacking and terrain rules, alongside updated scenarios including Raid, Breakthrough, and The Train. Wholly compatible with Ogre, the two games were later combined into the Ogre/G.E.V. boxed edition. G.E.V. occupies an important place in wargame history as a polished expansion of one of the genre's landmark titles.

