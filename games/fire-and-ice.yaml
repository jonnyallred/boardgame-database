description: |
  Fire and Ice is a two-player abstract strategy game played on a board composed of seven small triangles arranged in one large triangle, each with seven peg holes. Players take turns moving one of their pegs: either one space along a line in its current small triangle, or to the same position on any other small triangle. After moving, the opponent places a peg in the vacated space. The game creates unusual spatial puzzles as both players compete for control of the three connecting triangles. It earned a Mensa Select recognition for its elegant simplicity and strategic depth.

