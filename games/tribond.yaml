description: |
  TriBond is a party trivia game built around the concept of the "Threezer" — players are presented with three seemingly unrelated items and must identify the common bond between them. For example, "Earth, Mars, Snickers" all share the bond of being candy bars. Created by Tim Walsh, Dave Yearick, and Ed Muccini while students at Colgate University in 1987 and published in 1990, the game rewards lateral thinking and pop culture knowledge. It has been published in multiple editions by Mattel, Winning Moves, and other companies.

