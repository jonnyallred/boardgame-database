description: |
  Lorenzo il Magnifico is an acclaimed worker-placement Euro game set in Renaissance Florence
  during the reign of the Medici family. Players send family members—dice of different values
  rolled each round—to acquire development cards, gather resources, and gain favor with the
  Church. Cards from four decks (Territory, Character, Building, Venture) form interlocking
  engines that grow throughout the game. The combination of dice-as-workers, multi-path
  development, and period-perfect theming makes it one of the standout heavy Euros of its era.

