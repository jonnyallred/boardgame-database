description: |
  Match of the Penguins is a fast-paced pattern-matching card game published by Gamewright in 2006. Each card shows a penguin with six colored attributes — umbrella, sunglasses, lei, fish, blanket, and shirt — in one of six colors, and players race to spot matching pairs among the face-up cards and grab the white penguin pawn to claim their find. Four types of matches have different rankings, so players must identify not just any match but the highest-ranked one visible, adding a layer of challenge to the reflex-based play. Quick rounds and colorful art make it a popular children's and family game.

