description: |
  Heart of Oak is a set of naval miniature wargaming rules covering the Age of Sail from 1755 to 1815, published by Fantasy Games Unlimited in 1978 with a second edition in 1983. The rules govern ship-to-ship and fleet combat during the era of Nelson and Hornblower, covering gunnery, boarding, sailing mechanics, and morale, and include paper ship counters for those without miniature collections. The rules are noted for their historical accuracy and comprehensive coverage of the period's naval warfare.

