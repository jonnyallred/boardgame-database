description: |
  Diadem is a 1981 science fiction board game published by Fantasy Games Unlimited, depicting galactic conquest played on a mapboard divided into 12 hexagon-shaped sub-maps. Players vie for interstellar dominance through strategic fleet deployment and territorial control across a richly detailed galaxy. As a product of the early 1980s American wargame era, it features the complexity and strategic depth characteristic of Fantasy Games Unlimited's design philosophy, appealing to hardcore science-fiction strategy gamers.

