description: |
  Tales & Games: The Hare & the Tortoise is a card-based betting and bluffing
  game loosely based on Aesop's famous fable, published by IELLO. Each player
  secretly bets on two of four racing animals (turtle, rabbit, sheep, and duck)
  at the start, then plays hand cards to advance their chosen animals. A hidden
  card acts as an additional secret bet, adding a layer of deduction. Players
  take turns placing one to four cards showing the same animal, pushing their
  bets toward victory while trying to divine opponents' hidden allegiances.
  The game offers a light, charming betting experience for the whole family.

