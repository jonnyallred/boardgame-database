description: |
  Hippos & Crocodiles is a two-to-four player abstract game designed by Néstor Romeral Andrés and published by nestorgames in 2009. Players place animal tokens on a lake board, competing to be the last player able to place a piece. The game is notable for its extremely short playtime and simple rules, making it accessible even for young children while offering enough positional decisions for a light strategic experience.

