description: |
  Mijnlieff is a two-player abstract strategy game designed by Andy Hopwood and published by Hopwood Games, winner of the Best Abstract Game at the UK Games Expo 2010. Players take turns placing tiles on a 4x4 grid, with each tile type constraining where the opponent must play next — Pullers force adjacent placement, Pushers require placement further away, Straights restrict movement to orthogonal spaces, and Diagonals to diagonal ones. The goal is to form a line of three of your own pieces, but mastering the constraint mechanic adds a remarkable depth to what appear to be very simple rules.

