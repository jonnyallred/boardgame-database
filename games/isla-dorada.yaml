description: |
  Isla Dorada is a bidding and exploration game where a single expedition figure moves through a mysterious island map and players compete to control where it goes. Each turn, players bid cards to direct the expedition along mountain, jungle, desert, river, or sea routes — different card types unlock different terrain. Players hold secret treasure and destiny cards that reward visiting specific locations, plus curse cards they want to avoid, creating rich hidden-information tension. Designed by a quartet including Bruno Faidutti and Alan R. Moon, Isla Dorada blends competitive bidding with deductive play about what destinations opponents secretly prize.

