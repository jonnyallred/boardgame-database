description: |
  The King's Guild is a strategy board game designed by Matthew Austin and published by Mirror Box Games in 2018, themed around players competing to establish the most renowned guild in a fantasy kingdom. Players use hand management and set collection mechanics to hire craftsmen, complete commissions, and earn prestige. Variable player powers from guild specializations give each player a unique path to victory and ensure replayability. The game was funded through Kickstarter and offers a moderate weight euro experience with accessible rules and meaningful strategic choices.

