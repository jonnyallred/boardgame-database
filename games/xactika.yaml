description: |
  Xactika is a trick-taking card game played with a dedicated deck of 81 cards, each bearing one
  to three of four different suits — balls, cubes, cones, and stars — with face values from 4 to 12
  equal to the sum of shapes present. Players bid the exact number of tricks they expect to win,
  and points are awarded only for perfect predictions. The shifting card strengths across a round
  mean a card that looks weak early may become dominant as the hand evolves.

