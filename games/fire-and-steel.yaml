description: |
  Fire & Steel is GDW's 1978 set of miniatures wargame rules for 15mm Napoleonic battles, covering European conflicts between approximately 1808 and 1858. The rules are designed to simulate brigade-level engagements during the Napoleonic era and the subsequent decades, providing army lists, weapon data, and tactical guidelines for recreating historical battles from the period. As a GDW publication, it stands among the foundational texts of the miniatures wargaming hobby for the Napoleonic period.

