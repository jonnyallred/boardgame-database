description: |
  The Duke is a two-player abstract strategy game played on a 6x6 grid with a feudal theme, often
  compared to chess while offering a fundamentally different experience. Each tile (piece) shows two
  different movement patterns — one on each face — and flips after every move, changing what it can
  do on the next turn. Players must capture the opponent's Duke tile to win. Because each piece's
  future capabilities are always visible, the game rewards reading ahead and anticipating how the
  board will evolve after each flip. New tiles can be drawn randomly from a bag and placed adjacent
  to the Duke, injecting variance and preventing static openings.

