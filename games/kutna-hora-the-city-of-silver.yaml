description: |
  Kutná Hora: The City of Silver is a 2023 historical economic euro game for 2-4 players from Czech Games Edition set in 14th-century Bohemia during the rapid growth of the famous silver mining city. Players lead ambitious guild leaders mining silver and developing the city across a dynamic supply-and-demand economic system where every action genuinely affects prices and market conditions. Gameplay involves mining, land acquisition, building for affiliated guilds, and contributing to the construction of Saint Barbara's Cathedral. The game shines brightest at higher player counts where the push-and-pull of competing guild interests creates authentic historical economic tension.

