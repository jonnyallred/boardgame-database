description: |
  Habana Taxi is a light bluffing and negotiation game set against the backdrop of Cuban tourism, where players take on the roles of tourists competing to visit as many representative sites of Cuba as possible. The game centers on clever card play and reading opponents rather than deep strategy, capturing a breezy atmosphere of Havana's colorful taxi culture. Designed by Dominique Ehrhard and published by Erudia in 2004, it offers a quick and social gaming experience suited for casual groups.

