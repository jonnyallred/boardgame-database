description: |
  Game of the Generals (Salpakan) is a Filipino two-player war strategy game invented by Sofronio H. Pasola Jr. in 1970 and publicly released in 1973. Each player commands an army of 21 ranked pieces whose identities are hidden from the opponent; a neutral arbiter resolves all confrontations between opposing pieces. Higher-ranked pieces generally defeat lower-ranked ones, with exceptions for special pieces like the Spy. Players win by capturing the enemy Flag or escorting their own Flag to the opponent's back row. The "fog of war" mechanic — where neither player can see the opponent's piece identities — creates deep psychological gameplay involving bluffing, memory, and deduction.

