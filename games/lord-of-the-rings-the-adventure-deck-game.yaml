description: |
  The Lord of the Rings: The Adventure Deck Game is a cooperative card game designed by Reiner Knizia in which players take the roles of the Fellowship of the Ring, working together to guide Frodo and Sam to Mordor while managing the threat of Sauron. Players play adventure cards representing the Fellowship's journey through key events from the books, trying to complete each stage before Sauron's corruption overwhelms the hobbits. The game uses a deck that gradually reveals the narrative of the story, making each play through the story feel like a race against time. Knizia's distinctive mathematical elegance is applied here to create genuine cooperative tension in a beloved setting.

