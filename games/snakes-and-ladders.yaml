description: |
  Snakes and Ladders is an ancient Indian board game known as Moksha Patam, brought to Britain in the 19th century
  as a moral teaching tool illustrating virtue (ladders) and vice (snakes). Players race pawns from start to finish
  on a numbered grid, advancing by die roll but subject to sudden rises via ladders and falls via snake chutes.
  The modern American edition "Chutes and Ladders" was published by Milton Bradley in 1943 with a playground theme.
  Entirely luck-based, it remains a universal gateway for introducing young children to board games.

