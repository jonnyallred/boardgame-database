# Description
description: |
  Accasta is a two-player abstract strategy game played on a hexagonal board,
  designed by Dieter Stein. Players place and move stacks of pieces, with the
  goal of connecting their pieces in specific configurations. The game was first
  published in 1998 on the web and in the German game design magazine Spiel &
  Autor.

  The stacking mechanics create interesting tactical decisions as players build
  and move towers of pieces across the hexagonal grid. Accasta is part of Dieter
  Stein's catalog of original abstract games and is notable as one of his earliest
  designs to gain recognition.

