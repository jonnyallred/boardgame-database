description: |
  Winner's Circle (also known as Royal Turf) is a 2001 horse racing game by Reiner Knizia in which 2–6 players bet on a field of seven horses and then take turns moving them forward by rolling dice and choosing which horse to advance. Each player secretly backs multiple horses, and the tension comes from deciding when to move a horse you need to win versus helping opponents by moving one they also hold. The Spiel des Jahres Recommended game rewards reading the table and timing bets cleverly, with enough luck and chaos to make each race feel unpredictable. It has been published under several names and editions, most recently by DiceTree Games.

