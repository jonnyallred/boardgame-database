description: |
  La Bataille d'Albuera: Espagnol is a 1987 battalion and regimental-level wargame published by Clash of Arms Games simulating the 1811 Battle of Albuera in the Peninsular War, one of the bloodiest engagements of the Napoleonic campaigns in Spain. Part of the long-running La Bataille series that began in the 1970s, the game uses the detailed and refined system developed over multiple editions for representing Napoleonic tactics at the unit level. Clash of Arms acquired the series in 1984 and polished it through successive rule revisions. Reviewed favorably as an ideal entry point into the La Bataille system, earning 4 out of 5 stars in Games International.

