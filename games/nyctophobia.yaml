description: |
  Nyctophobia (meaning "fear of the dark") is a unique tactile horror game where 2-4 cooperative players are blindfolded and must navigate a pitch-black forest maze by touch alone, while one sighted player controls a murderous hunter pursuing them. Created by Catherine Stippell as a game accessible to her blind uncle, players feel the board with their fingers, identifying their position by the unique shape of their pawn, and carefully exploring adjacent spaces to find their car and escape. The hunter manipulates the board and physically places blindfolded players' fingers each turn, creating a profoundly tense and immersive experience that levels the playing field for visually impaired players in a way no other game does.

