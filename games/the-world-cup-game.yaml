description: |
  The World Cup Game is a soccer (football) themed board game designed around the FIFA World Cup tournament format. Players manage national teams through group stages and knockout rounds, rolling dice or playing cards to determine match results as they compete for the championship. Games of this type have been published in many editions to coincide with various World Cup tournaments, with publishers releasing themed editions tied to specific tournament years. Specific publisher and designer details are limited due to the game's obscurity.

