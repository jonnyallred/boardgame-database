description: |
  Fireball Island is Milton Bradley's 1986 three-dimensional adventure board game, described as "The dimensional adventure game of pitfalls and perils!" Players navigate a molded plastic tropical island, racing to steal the glowing red jewel from the ancient idol Vul-Kar and escape to the boat before rivals can. Both the idol and volcanic vents periodically launch fireball marbles that physically roll down the mountain, crashing through player pawns and toppling bridges in spectacular fashion. The game's wildly chaotic physical action made it a beloved 1980s classic and led to a crowdfunded Restoration Games revival in 2017 as Fireball Island: The Curse of Vul-Kar.

