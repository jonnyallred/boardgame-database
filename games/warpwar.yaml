description: |
  WarpWar is the fourth entry in Metagaming Concepts' MicroGame series, designed by company president Howard M. Thompson and published in 1977. Players design their own starships from a list of standard components by allocating a pool of Build Points, creating a personalized fleet before the actual combat begins. During battle, players write simultaneous orders for each ship, allocating power to weapons, engines, and shields while choosing basic tactics (Attack, Dodge, or Retreat). Reviewed enthusiastically in Dragon magazine in 1978 as "full of fascinating ideas," the game's design-your-own mechanic ensures that no two games play the same way.

