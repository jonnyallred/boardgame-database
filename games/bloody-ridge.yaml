description: |
  Bloody Ridge is a WWII board wargame originally published by SPI in 1975 as part of
  the "Island War" quadrigame — a game box containing four Pacific Theater battles using
  shared rules. The game simulates the September 1942 fighting around "Bloody Ridge"
  on Guadalcanal between U.S. Marines and Imperial Japanese forces. The Gamers later
  published a separate tactical Bloody Ridge game as part of their Tactical Combat Series,
  designed by Guadalcanal historian Michael S. Smith, at lower counter density.

