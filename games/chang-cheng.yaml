description: |
  Chang Cheng is a board game published by Z-Man Games in 2007 set during the Qin Dynasty, where players compete to build sections of the Great Wall of China and earn the most prestige. Players construct wall segments across provinces, scoring reputation points for having the majority of walls in completed provinces, while also guarding against Mongol incursions that penalize the majority builder on the exposed side. Action cards allow players to enhance their own construction or hinder rivals. The game uses modular double-sided boards and plays with tense area-majority competition within a historical setting.

