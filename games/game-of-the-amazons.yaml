description: |
  Game of the Amazons is a two-player abstract strategy game invented in 1988 by Argentine designer Walter Zamkauskas. Played on a 10x10 grid, each player commands four amazons that move like chess queens, but after each move the amazon fires a flaming arrow that permanently blocks a square. The game ends when one player can no longer move, making territorial control and movement restriction the central strategic concerns. Widely regarded as one of the great modern abstract games, it combines deep positional strategy with the elegant simplicity of a single rule set and has attracted serious computer science research.

