description: |
  New Frontiers is a standalone board game in the Race for the Galaxy family, designed by Thomas Lehmann for 2-5 players. Each round a player selects one of several actions — colonizing worlds, developing technologies, producing goods — and every player may perform that action, but only the selector receives a bonus. Players build a galactic empire by placing world and development tiles into their tableau, constructing powerful economic engines and scoring combos. Variable development cards and drawn worlds ensure high replayability across its 45-90 minute playtime.
