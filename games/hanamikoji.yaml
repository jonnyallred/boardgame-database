description: |
  Hanamikoji is a tense two-player card game set in the geisha districts of Kyoto, where players compete to earn the favor of seven geisha masters by collecting the performance items each excels in. Each player has only four actions available — secretly set aside cards, discard cards face-down, offer the opponent a choice, and split cards for the opponent to choose — creating a puzzle of constrained decisions where every move gifts information or opportunity to the rival. The elegance lies in using four simple action types to generate profound tactical depth, making it a celebrated example of minimalist Euro design that rewards repeated play.

