description: |
  Starship Duel is a 1984 FASA Star Trek combat game in which the USS Enterprise duels a Klingon Bird of Prey scout. Unlike most wargames, there is no hex mapboard — instead, gameplay uses two Navigation Wheels that track each ship's relative position and heading based on maneuvers selected by players. After plotting movements on the wheels, players check which view-port reveals the enemy. The game supports solitaire play in addition to the standard two-player mode, and was followed by Starship Duel II.

