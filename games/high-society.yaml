description: |
  High Society is a quick auction card game by Reiner Knizia, first published in 1995, in which 3–5 players compete to accumulate the most prestigious collection of luxury items while carefully managing their bidding cards. Players bid with numbered cheque cards on ten valuable items rated 1–10, plus three "Promotion to Peerage" cards that double collection value; for the three penalty cards (debt, theft, and scandal), the mechanic reverses and the first player to pass avoids the harm. The critical twist: the player with the fewest cards remaining at the end is eliminated before tallying scores, forcing agonizing trade-offs between winning bids and preserving enough wealth to stay in contention. Finished in about 15–30 minutes, it remains one of Knizia's most elegant and widely reprinted designs.

