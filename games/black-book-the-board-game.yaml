description: |
  Black Book: The Board Game is a 2025 cooperative adventure board game for 1 to 4 players
  adapted from the video game of the same name by Morteshka, which is rooted in Slavic
  mythology. Players navigate six narrative stories in a dark folkloric world where humans
  live alongside mythological creatures, progressing through campaign mode as a sorceress
  fighting demonic forces using deck-building card mechanics. The game translates the
  video game's distinctive combination of Slavic folklore atmosphere and card-based
  combat into a tabletop cooperative experience.

