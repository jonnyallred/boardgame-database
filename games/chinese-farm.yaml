description: |
  Chinese Farm is an operational-level hex wargame published by SPI in 1975, simulating Israeli and Egyptian ground combat at the Battle of The Chinese Farm during the 1973 Yom Kippur War. The battle's name derives from an Egyptian experimental farm whose Japanese Kanji machinery markings were mistaken for Chinese Hanzi by Israeli observers. Originally part of the Modern Battles quadrigame, the game depicts Israel's dangerous bridgehead crossing of the Suez Canal and the fierce fighting that followed. Designed by Howard Barasch with cartography by Redmond Simonsen, it is a compact but historically significant wargame.

