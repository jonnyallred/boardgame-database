description: |
  The Boss is a compact card game of crime syndicate territory control designed by Alain Ollier and published by Blackrock Editions in 2015. Players simultaneously send their gangsters to control city districts, but if too many gangsters from different factions show up at the same location, a fight breaks out and the winner claims the territory. Bluffing, reading opponents' intentions, and deciding when to contest key locations versus when to take easy wins creates surprising depth in a small, quick package. The Boss plays in under 30 minutes and works well as a filler or warm-up game.

