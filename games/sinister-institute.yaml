description: |
  Sinister Institute is a cooperative family game designed by Phil Walker-Harding in which 2–4 players are students at a wizardry college built in a cursed swamp, tasked with defeating an Evil Sorcerer by exploring the school and surrounding swamp to collect and destroy fragments of his cursed soul. Players must work together and manage their time carefully before the sorcerer's power overwhelms the school. Part of the Mojito Trio collection by Mojito Studios, the game offers accessible co-op gameplay with a lighthearted fantasy theme.

