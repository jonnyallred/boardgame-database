description: |
  Ingenious is an abstract tile-placement game designed by Reiner Knizia and published by Kosmos in 2004, later widely distributed by Ravensburger. Players take turns placing domino-like tiles bearing two colored symbols on a hexagonal board, scoring for each continuous line of matching symbols created by the placement. The critical scoring mechanism is that a player's final score equals their lowest-scoring color, not their highest, forcing balanced play across all six colors rather than specialization in one. This anti-specialization rule creates deep tactical tension and was nominated for the 2004 Spiel des Jahres.

