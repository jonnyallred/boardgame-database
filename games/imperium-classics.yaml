description: |
  Imperium: Classics is an asymmetric deck-building civilization game designed by Nigel Buckle and Dávid Turczi, published by Osprey Games in 2021. Each of eight historical civilizations (Carthaginian, Celt, Greek, Macedonian, Persian, Roman, Scythian, and Viking) has its own unique starter deck and development path, progressing from barbarian origins to a fully developed civilization through card acquisitions and conquests. The game supports solo play with an included automaton opponent and is fully compatible with its companion game Imperium: Legends for expanded civilization options. Play time scales with player count at approximately 40 minutes per player.

