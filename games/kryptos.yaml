description: |
  Kryptos is a spy-themed deduction game for 3-6 players by Piotr Silka published by Ginger Fox, where players attempt to deduce the hidden numerical values of each other's hand of colored cards. Each player holds numbered cards from 1-48 in four colors, and all players know the colors — but not the numbers — held by opponents. Through targeted questioning and logical elimination, players try to crack each other's "codes" while protecting their own. Fast, tense, and uncomplicated, the game rewards sharp deductive reasoning and careful information management.

