description: |
  Ex*Pion is an abstract strategy game that won the prestigious As d'Or award at the 1990 Cannes game festival. The game centers on a unique neutral piece called the Ex*Pion, which players use as a tool to capture opponents' units by surrounding them, while the Ex*Pion itself cannot be captured. Players maneuver their pieces on the board to enclose enemy units, creating a layered strategic puzzle of offense and defense. Its elegant central mechanic — a shared, weaponizable but invincible piece — distinguishes it from conventional abstract enclosure games.

