description: |
  Cavaliers and Roundheads is a set of miniature wargaming rules covering the English Civil War, written by Gary Gygax and Jeff Perren and published by Tactical Studies Rules (TSR) in 1973 as the company's very first product. The rules cover troop types including pikemen, musketeers, cavalry, and lobsters, with resolution using six-sided dice in a manner similar to the earlier Chainmail ruleset. No components are included; players supply their own 20mm or 30mm metal miniatures. Historically significant as TSR's debut publication, it preceded the company's landmark release of Dungeons & Dragons.

