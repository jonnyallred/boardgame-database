description: |
  Quoridor is a two- or four-player abstract strategy game designed by Mirko Marchesi and published by Gigamic in 1997. Each player moves their pawn across a 9×9 grid toward the opposite side while spending their turn budget to place walls that block opponents' paths — but walls must always leave at least one route open for every pawn. The result is an elegant spatial puzzle of path planning and obstruction. Quoridor won the MENSA Mind Game award in 1997 and Game of the Year in the US, France, Canada, and Belgium.

