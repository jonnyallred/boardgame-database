description: |
  Brian Clough's Football Fortunes is a football management board game published by CDS Software in 1987, endorsed by legendary English football manager Brian Clough. Players take on the roles of club managers competing through a ten-team league season and the FA Cup, using player cards to strengthen their squads and money cards to make transfers. From the second season onward, European competitions are added, creating a longer campaign experience. The game blends card management with dice-based match resolution in a sports simulation that was also adapted as a computer game across multiple platforms.

