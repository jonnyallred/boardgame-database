description: |
  Knarr is a 2023 medium-light engine-building card game by Thomas Dupont in which players lead Viking clans on expeditions, recruiting crew members and sending them to explore destinations for trade and glory. On each turn, players either add a new Viking to their crew (activating all crew members sharing that Viking's icon and drafting another from the matching color column) or explore new destinations to gain rewards and reputation. The game triggers its finale when a player reaches 40 points, with elegant card chaining creating a satisfying engine that grows noticeably more powerful across the 30-minute play session.

