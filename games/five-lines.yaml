description: |
  Five Lines (Pente Grammai) is one of the oldest known board games, documented in ancient Greece around 650 BCE and referenced by the poet Alkaios around 600 BC. The game is played on five parallel lines where players maneuver pieces in a race-like contest, with archaeological examples found on gaming tables in terracotta from the same era. Modern reproductions of this ancient Greek game are sold by retailers such as NewVenture Games, Mainly Medieval, and Creative Crafthouse, making this millennia-old game accessible to contemporary players.

