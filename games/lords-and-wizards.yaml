description: |
  Lords & Wizards is a fantasy conquest game in which players command medieval armies supplemented by powerful magical units — wizards, dragons, and other fantastic creatures — competing for territorial control across a fantasy map. Military strength is augmented by spells and magical items that can dramatically swing battles, requiring players to balance conventional military expansion with magical development. Variable player powers through unique faction abilities or starting positions add asymmetry to the competition. Published by Italian publisher Nexus Editrice, it fits in the tradition of fantasy wargames that blend medieval strategy with fantasy elements.

