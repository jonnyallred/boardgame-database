description: |
  Topple is a classic balancing board game originally published by Kenner in which players take turns placing colored pieces onto a tiered platform balanced on a spindle, trying to score points without sending the whole structure crashing down. The five-level grid creates increasing instability as more pieces are added, and players must weigh the risk of adding high-scoring pieces to crowded sections against the danger of causing a topple. Continuously reprinted since the early 1970s, it remains a popular family dexterity game encouraging spatial reasoning in young players.

