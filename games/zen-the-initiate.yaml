description: |
  Zen the Initiate (Zen l'initié) is a French abstract strategy game for two or four players played
  on a 121-square board. Each player places and moves colored pieces plus a shared special red
  piece called "Z." Pieces slide in straight lines, and the distance each piece travels equals the
  number of pieces along its line of movement. The goal is to be the first player to form a
  continuous chain with all remaining pieces on the board. Simple to learn but tactically deep,
  it rewards positional thinking and spatial awareness.

