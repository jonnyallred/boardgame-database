description: |
  Image is a trivia and personality profile game published by 3M as part of their acclaimed Bookshelf Games series in 1972. Players recreate famous persons of history and the present by placing them in their correct time period, country of origin, and major field of endeavor using a combination of profile and letter cards. Players score when a played letter card matches the last initial of the profiled person, rewarding broad historical and cultural knowledge. The game was packaged in the distinctive book-spine format that made 3M's games a mid-century design classic.

