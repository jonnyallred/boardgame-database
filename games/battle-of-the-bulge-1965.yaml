description: |
  Battle of the Bulge (1965) is a classic Avalon Hill wargame simulating the German Ardennes Offensive of December 1944, one of the last major German counteroffensives of World War II. Players command either the Wehrmacht attempting to break through Allied lines and reach Antwerp, or the Allied forces struggling to hold and ultimately repel the German advance. The game offered both a basic introductory game and an advanced tournament version with additional historical realism. Selling over 120,000 copies and consulting with General Anthony McAuliffe, it was one of Avalon Hill's most commercially successful titles despite some historical criticism of its accuracy.

