description: |
  Gatsby is a two-player area control game set in the glittering world of 1920s New York
  high society. Players take on asymmetric roles—Dorothy Williams or James Miller—competing
  at three locations: a cabaret, a finance center, and a racetrack. Through clever card
  play and tactical positioning, each player pursues different victory conditions while
  blocking their opponent's ambitions. The modular board and variable setup ensure fresh
  confrontations in a brisk, tense contest of social climbing.

