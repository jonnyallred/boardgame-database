description: |
  Simply Catan is an introductory edition of the award-winning Settlers of Catan, published by SimplyFun in 2006, designed to take less than 5 minutes to set up and approximately 30 minutes to play. It retains the core Catan mechanics of resource collection, trading, and building, but in a streamlined format accessible to beginners and younger players. The game serves as a gentle on-ramp to the full Catan experience for families new to modern board games.

