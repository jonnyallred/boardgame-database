description: |
  Legion: Tactical Warfare in the Roman Age is a block wargame covering land battles from the late Roman Republic through the fall of the Western Empire, spanning 100 BC to 700 AD. Players command armies of Romans, barbarians, Greeks, Persians, Sassanids, and other powers using a common system that models the diverse tactical doctrines of the ancient world — from the Roman legion's manipular flexibility to the cataphract charges of eastern kingdoms. The block system provides natural fog of war as stacked blocks are placed facing the controlling player, concealing strength from the opponent until contact. Scenarios cover dozens of historical battles across the long arc of Roman military history.

