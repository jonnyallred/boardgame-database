description: |
  Tiger game refers to a family of traditional two-player asymmetric abstract strategy games found throughout South and Southeast Asia, most notably Bagh-Chal from Nepal. One player controls a small number of tigers (usually 4) trying to capture prey by jumping over them, while the other player manages a much larger group of goats (20 in Bagh-Chal) trying to surround and immobilize all the tigers. The predator-versus-prey asymmetry creates distinctly different playing experiences for each side, and the game has been played for centuries across Nepal, India, Thailand, and Malaysia.

