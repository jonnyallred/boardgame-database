description: |
  Robots is a cooperative card game for 2-6 players designed by Reinhard Staupe and published by Pandasaurus Games in 2020, nominated for the Kinderspiel des Jahres (Children's Game of the Year). In the game, one player acts as a robot navigating a line of objects on a card at a declared speed (slow, medium, or fast), making a "beep" when they start and another when they mentally arrive at the target object. Other players must guess which object the robot reached based on the timing of the beeps alone. The game's charming robot premise and simple beeping mechanic make it delightfully accessible for young children and families.

