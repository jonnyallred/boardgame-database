description: |
  Medici vs Strozzi is a two-player adaptation of Reiner Knizia's classic auction game Medici, first published by Amigo in 2004. Players re-enact the fierce rivalry of the two great Florentine merchant dynasties by bidding on lots of commodity cards to load their ships. Unlike the multiplayer original's open auction, one player sets the price for a lot and the opponent must either buy at that price or let the setter purchase it instead — a clever inversion that forces both players into uncomfortable decisions. The game plays in under 30 minutes and condenses Medici's commercial tension into a sharp, direct head-to-head duel.

