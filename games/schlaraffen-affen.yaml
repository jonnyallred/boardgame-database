description: |
  Schlaraffen Affen is a children's dice game by Schmidt Spiele in which monkey players roll dice to advance toward a 3D palm tree, trying to roll palm symbols to climb up and grab a coconut. Once a player reaches the tree they secretly peek inside a coconut — if it matches their color, they win; if not, they must try again next turn. The game won the 2018 Austrian Kids Game of the Year for its simple, visually engaging design with a 3D tree centerpiece that delights young players.

