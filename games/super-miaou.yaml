description: |
  Super Miaou (Super Meow in English) is a 2024 family deckbuilding game published by Space Cow, the children's game imprint of Space Cowboys, designed by Guillaume Desportes. Players build cat-themed decks and recruit cards from a static central market, acquiring increasingly powerful feline heroes to outpace their opponents. The game was nominated for the 2024 As d'Or Jeu de l'Année Enfant award in France, recognizing it as one of the year's top children's games. Its accessible rules and cat theme make it an appealing introduction to deckbuilding for younger players.

