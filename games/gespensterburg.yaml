description: |
  Gespensterburg is a children's haunted castle board game in which players answer trivia questions, complete rhymes, and recite tongue twisters based on classic horror stories and films as they race through a ghostly castle. The first player to reach the Black Raven wins the game. With its lighthearted horror theme and activity-based challenges, it offers a fun and educational experience for young players interested in spooky stories and games.

