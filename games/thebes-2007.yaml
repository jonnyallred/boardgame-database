description: |
  Thebes is a 2007 archaeology board game designed by Peter Prinz (originally self-published in Germany as Jenseits von Theben in 2004) in which 2-4 players race as early-20th-century archaeologists to uncover the most spectacular ancient relics. Players spend "weeks" on a time track to travel across Europe, North Africa, and the Middle East collecting knowledge about five ancient civilizations, then excavate sites by drawing tiles from bags that mix genuine artifacts with worthless dirt—returned dirt makes future draws at that site less rewarding. The press-your-luck excavation mechanic and time-track turn order create engaging decisions about when and where to dig, rewarding players who invest deeply in specific civilizations.

