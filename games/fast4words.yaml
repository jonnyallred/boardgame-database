description: |
  Fast4Words is a two-player real-time word game that combines elements of Boggle and Connect 4. Players race against a timer to place letter cubes into a two-sided grid, forming words while strategically altering the board to challenge their opponent. After the placement phase, each player searches for as many valid words as possible on their side of the grid, scoring points for each word found. The simultaneous real-time pressure and spatial word-building make it a quick but engaging duel for word game fans.

