description: |
  Taco Kitten Pizza is a children's version of Taco Cat Goat Cheese Pizza,
  designed by Dave Campbell and Thierry Denoual and published by Blue Orange
  Games in 2023. Players announce "Taco," "Kitten," or "Pizza" as they flip
  cards, and when the spoken word matches the card image, players race to grab
  the candy piece at the center. Designed for ages 4 and up with 2–6 players
  and sessions as short as five minutes, the game brings the reflex-slapping
  fun of its parent game to a younger audience with a cuter, more accessible
  presentation.

