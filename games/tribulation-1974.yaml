description: |
  Tribulation (1974) is a mathematical puzzle and speed game for 1-6 players. Players compete in real-time on a grid, racing to identify and claim combinations that satisfy the game's numerical conditions. Published by Whitman and other companies, it is a simple, fast-paced game that rewards quick mental arithmetic and pattern recognition. Sources on this game are limited; minimal entry.

