description: |
  Lotus is a hand management and area control card game for 2-4 players in which players compete to control a garden of five types of flowers — irises, primroses, cherry blossoms, lilies, and lotuses — by playing petal cards and placing guardian tokens. Each flower is completed by a specific number of petals, and when a flower is completed the player who has the dominant presence (via guardians and petals) claims it. The exquisitely illustrated petals create real blooming flowers on the table as the game progresses, making it as beautiful to display as it is to play. Published by Renegade Game Studios, its straightforward rules mask real tactical depth around guardian placement and hand management.

