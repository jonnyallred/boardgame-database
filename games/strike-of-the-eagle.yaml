description: |
  Strike of the Eagle is a 2011 Academy Games wargame — the first in the Fog of War series — simulating the 1920 Polish-Soviet War. Players place secret orders on the map to bluff and outmaneuver opponents, then reveal and execute them simultaneously. Armies are represented by wooden blocks whose composition remains hidden until battle. Combat is diceless, resolved through a quick card-based system, while action cards modify orders, reinforcements, and battle outcomes. The hidden orders and block system create genuine tension and mind games; the game offers scenarios ranging from an hour-long introduction to a full multi-day campaign.

