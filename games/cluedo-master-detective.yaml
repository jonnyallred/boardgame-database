description: |
  Clue Master Detective (also known as Super Cluedo in Europe) is an expanded 1988 Parker Brothers edition of the classic Cluedo formula, scaling the game up to support up to 10 players with a significantly enriched component set. The game adds four new suspects (Miss Peach, Monsieur Brunette, Madame Rose, and Sergeant Gray), two new weapons (poison and horseshoe), and four new rooms (fountain, gazebo, courtyard, and carriage house), requiring more complex deduction across a larger suspect pool. A 30th anniversary edition was published in 2018 by Hasbro and Winning Moves Games.

