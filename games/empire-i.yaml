description: |
  Empire I is an interstellar wargame published by SPI in which four empires battle for ultimate control of the galaxy. Players command fleets and planetary forces across a hex-grid star map, using area control and strategic maneuvering to outmaneuver rivals. The game represents SPI's foray into science fiction wargaming with the depth of mechanics typical of their hex-and-counter design approach.

