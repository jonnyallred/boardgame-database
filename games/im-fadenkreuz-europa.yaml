description: |
  Im Fadenkreuz: Europa (In the Crosshairs: Europe) is a German wargame simulating military conflict across the European theater. Players command opposing Cold War-era forces in a strategic simulation of territorial control and military operations in Europe. As a German-language wargame, it was part of a small but dedicated European tradition of hex-and-counter conflict simulation games during the 1980s.

