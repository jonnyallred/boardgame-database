description: |
  Patterns (subtitled "A Mandala Game") is a 2023 two-player abstract area-control game by Trevor Benjamin and Brett J. Gilbert, published by Lookout Games, played on a large printed tea towel with 54 colorful mandala tiles. Players take turns swapping tiles from the spread on the table, trying to mark contiguous colored areas as their territory; the player who claims the largest connected regions of the most colors scores best. A reimagination of the duo's earlier card game Mandala translated into a physical tile medium, it is simple to explain in under five minutes but rewards careful positional thinking over its short 15-minute playtime.

