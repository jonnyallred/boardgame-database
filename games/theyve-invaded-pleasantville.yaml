description: |
  They've Invaded Pleasantville is a two-player asymmetric game in which one player defends a small town by alerting its citizens to an alien invasion, while the other player secretly maneuvers to take over townspeople's minds. The town player races to warn residents before they fall under alien control, while the alien player works covertly to dominate the town. Published in 1968, it represents an early example of asymmetric hidden-movement gameplay with a science-fiction theme that would later become popular in the modern board game era. Details on this rare vintage title are limited due to its obscurity.

