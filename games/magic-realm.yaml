description: |
  Magic Realm is a legendary fantasy adventure game designed by Richard Hamblen and published by Avalon Hill in 1979, notable for its extraordinary complexity and depth. Players choose from 16 highly asymmetric characters — from the White Knight to the Witch — each with unique abilities, and explore a modular hex-tile wilderness filled with monsters, treasures, and ancient ruins. The game blends wargame precision with role-playing elements across a rules tome approaching 100 pages, earning it Avalon Hill's highest difficulty rating of 9 out of 10. Despite going out of print in 1998, it retains a devoted cult following and inspired digital implementations decades later.

