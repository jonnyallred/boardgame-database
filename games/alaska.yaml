description: |
  A tile placement game published by Ravensburger in 1979, designed by Eric Solomon, in which 2-4 players race to recover supply containers from a central island before the spring thaw. The game unfolds in two phases: winter, where players lay ice blocks on a hex grid to create pathways, and spring, where the melting ice is removed to allow movement and retrieval. Players must brave polar bears, frostbite, and the changing seasons to return their containers to their depots first. A clever seasonal dual-phase structure distinguishes this family abstract game.

