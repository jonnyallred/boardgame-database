description: |
  Get on Board: New York & London is a simultaneous route-drawing game where 2-5 players
  build bus routes through iconic city maps. Each round a shared die determines the road
  segments available, and players simultaneously draw routes to pick up passengers and
  avoid traffic jams. Two double-sided maps—New York and London—provide four distinct
  scoring environments, and the shared decision space means everyone's choices affect
  each other. Winner of the 2022 UK Games Expo People's Choice Award.

