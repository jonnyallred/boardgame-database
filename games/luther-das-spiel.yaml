description: |
  Luther: Das Spiel is a historical strategy game designed by Michael Palm and Lukas Zach, published by Spielworxx to commemorate the 500th anniversary of the Protestant Reformation. Players compete for influence across the religious and political landscape of early 16th-century Germany and Europe, spreading the influence of either the Reformation or the Catholic Counter-Reformation through a combination of area control and resource management. The game captures the complex political geography of the Holy Roman Empire and the radical transformation that Martin Luther's 95 Theses set in motion. It received attention as a thematically distinctive Euro that approached the Reformation from a strategic simulation angle.

