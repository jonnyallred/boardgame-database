description: |
  Arnhem is a board wargame published by Simulations Publications, Inc. (SPI) in 1976
  simulating Operation Market Garden in September 1944, the Allied attempt to seize
  strategic bridges across the Netherlands including the famous Rhine crossing at Arnhem.
  The game features 120 half-inch counters on a hex-grid map with half-day turns from
  September 17 to September 29, 1944, including rules for airborne units, air bombardment,
  artillery, and engineers. It is praised for delivering a solid simulation of Market Garden
  without overwhelming complexity, making it accessible to both casual and dedicated wargamers.

