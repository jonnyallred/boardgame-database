description: |
  Yeoman is a tactical board wargame simulating Late Medieval and Renaissance battles from 1250
  to 1550, part of SPI's PRESTAGS (Pre-Seventeenth Century Tactical Game System) series. One
  player controls historical forces such as the English at Agincourt or the Scots at Falkirk, while
  the opponent commands the force that met them. The simple alternating "I Go, You Go" turn
  structure — missile fire, movement, and melee — belies the tactical depth of recreating these
  famous engagements. It entered SPI's bestseller list at number nine upon release.

