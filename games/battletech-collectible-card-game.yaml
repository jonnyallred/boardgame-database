description: |
  BattleTech Collectible Card Game is a collectible card game set in the BattleTech universe, published by Wizards of the Coast and FASA Corporation in 1996. Players construct decks representing BattleMech forces from the major Houses of the Inner Sphere and clash in tactical combat. Cards represent individual mechs, pilots, equipment, and tactical maneuvers, with players managing heat buildup and ammunition as in the tabletop original. The game was part of the early CCG boom following Magic: The Gathering's success, bringing the BattleTech universe to a new card-game format before it was discontinued in 2001.

