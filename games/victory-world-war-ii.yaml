description: |
  Victory: World War II (also titled Victory: The Blocks of War) is a block wargame designed by Tom Dalgliesh and Grant Dalgliesh and published by Columbia Games in 1998. It is a strategic-level simulation of the entire Second World War, with players commanding the major powers across both the European and Pacific theatres. Columbia Games' signature wooden block system provides a natural fog of war mechanic, as block faces are hidden from opponents until combat occurs. The game supports two to four players in a sandbox-style conflict, making it one of the most comprehensive of Columbia Games' World War II block wargame offerings.

