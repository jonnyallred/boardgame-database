description: |
  Shabadabada is a French party card game designed by Sylvie Barc and published by La Haute Roche in 2002, in which two teams compete to recall and sing songs containing a given word. A card is drawn showing a word in French and one in English, and teams alternately come up with different songs featuring that word, singing a brief excerpt, until one team can no longer respond. The game's noisy, musical format — requiring no board or counters, just cards and voices — makes it a beloved French social game for large gatherings.

