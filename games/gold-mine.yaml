description: |
  Gold Mine is a family dice and set-collection game designed by Chris James and published by Stratus Games. Players compete to collect gold nuggets while navigating the hazards of underground mining, using press-your-luck dice mechanics to push for more gold or risk losing their haul. Its accessible rules, short playtime, and gold-rush theme make it suitable for young families and casual game nights. The game prioritizes fun and quick decisions over complex strategy.

