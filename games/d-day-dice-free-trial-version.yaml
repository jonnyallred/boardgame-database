description: |
  D-Day Dice: Free Trial Version is a free print-and-play preview of the full D-Day Dice cooperative dice game, published in 2009. It includes two battle maps — "Exercise Tiger" and "Omaha Beach" — and gives players a taste of the full game's cooperative dice resource management and beach-storming gameplay. Players act simultaneously as Allied soldiers, rolling custom dice to organize improvised units and advance against machine gun nests. The free version requires almost no printing and no crafting, making it an immediately accessible entry point to the D-Day Dice system.

