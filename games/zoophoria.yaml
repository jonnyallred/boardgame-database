description: |
  Zoophoria is a family strategy game in which players build and manage their own zoo habitat over
  seven rounds representing one week. Each day a fresh selection of animals, employees, buildings,
  food supplies, and secret targets becomes available, and players draft three items from the
  nineteen on offer. Managing the habitat's food production, virus risks, and waste while keeping
  animals healthy and attracting visitors requires careful planning. The player who draws the most
  visitors by the end of the week wins the title of Director of Zoophoria.

