description: |
  The Market of Alturien is a 2007 economy board game designed by Wolfgang Kramer and published by Mayfair Games, a reworking of his 1988 design City. Players own shops in a fantasy marketplace and after rolling dice may move any pawn on the board—not just their own—attempting to land customer pawns (worth copper, silver, or gold) on their shops while directing the thief toward rivals. This clever twist on familiar movement mechanics creates a deceptively strategic game of misdirection and opportunity, with players constantly debating which pawn to move to maximize income while minimizing opponents' gains.

