description: |
  Germany: Find Minden (Deutschland: Finden Sie Minden?) is a topography trivia game published by Kosmos in which players draw cards describing German towns, landmarks, and popular sights and must then pinpoint them on a map of Germany as accurately as possible. The player who correctly locates cities and sites closest to their actual positions earns the most points. It is an educational family game suitable for geography enthusiasts and those looking to test their knowledge of German cities and regions, available in both standard and pocket editions.

