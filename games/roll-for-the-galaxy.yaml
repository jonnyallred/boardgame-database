description: |
  Roll for the Galaxy is a dice-driven space empire building game adapted from the acclaimed card game Race for the Galaxy, designed by Wei-Hwa Huang and Tom Lehmann. Each player's custom pool of dice represents their civilization's populace, assigned to actions — developing new technologies, settling worlds, producing goods, and shipping — in a hidden simultaneous allocation phase. Players reveal their choices together and all benefit from phases that any player has initiated, creating a tense metagame of predicting opponents' actions. The ability to purchase new specialized dice that grow your empire gives the game a satisfying engine-building arc over its efficient playtime.

