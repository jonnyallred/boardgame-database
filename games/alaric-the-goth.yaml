description: |
  A grand strategic wargame published by Strategic Studies Games in 1980 covering the Barbarian invasions of the Western Roman Empire during the Fourth and Fifth centuries A.D. Players command either the invading Germanic tribes under Alaric the Goth or the declining Roman imperial forces attempting to defend their crumbling empire. The game operates at an abstract strategic level rather than as a direct battle simulation, capturing the sweeping historical forces that brought down Rome. An often-paired companion piece to SSG's Attila the Hun game.

