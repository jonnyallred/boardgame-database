description: |
  Baston is a light 1985 abstract dice game published by Jumbo. Players roll dice to advance pieces around a track or board, competing to reach or claim positions first. The game combines luck-driven movement with minor tactical choices about positioning, keeping it accessible for family play. As a product of its era, Baston is a straightforward family filler with limited strategic depth but solid entertainment value for casual players. Detailed documentation on its specific rules is limited.

