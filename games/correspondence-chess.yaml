description: |
  Correspondence chess is a form of chess played by long-distance communication — traditionally by postal mail, later by email, and now via dedicated online servers. Each move is recorded in standard notation and transmitted to the opponent, who may take days or weeks to reply, making a single game last months or years. The practice dates to at least the early 19th century, with the first authenticated games between Dutch players in 1804; national and international competitions followed, with the International Correspondence Chess Federation (ICCF) founded in 1951. Correspondence play allows for deep opening preparation and engine-assisted analysis, producing some of the most theoretically refined chess ever played.

