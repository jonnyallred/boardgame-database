description: |
  Can't Stop is a beloved push-your-luck dice game designed by Sid Sackson and first published by Parker Brothers in 1980. Players roll four dice and pair them to advance neutral markers up three numbered columns simultaneously, then must decide whether to press their luck for more progress or stop and score before they bust. The mountain-shaped board is a perfectly tuned probability engine — with narrow columns at the extremes (2 and 12) and a wide central column (7) — making every decision a tense risk-reward calculation. Few games so elegantly combine mathematics, psychology, and the simple thrill of one more roll.

