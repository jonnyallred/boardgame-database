description: |
  Armada is a colonization game designed by Philippe des Pallieres and Patrice Pillet,
  originally published in 1986 by Jeux Descartes. Players command four nations or pirate
  bands competing for control of an island group, balancing exploration, resource management,
  and naval conquest. The game features strategic planning and tactical execution across
  a nicely realized archipelago. Multiple editions were published, including a pirate-themed
  third edition by Eurogames in 2001, demonstrating the game's enduring appeal.

