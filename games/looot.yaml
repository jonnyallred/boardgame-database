description: |
  Looot is a tile-laying abstract game published by Ravensburger in which players draw and place treasure chest tiles onto a grid, scoring points by completing rows, columns, or connected groups matching specific treasure types. Each turn players draw tiles and must place them adjacently, with careful positioning unlocking bonus scoring opportunities while blocking opponents. The pirate-treasure theme adds color to what is fundamentally a tight abstract placement puzzle. With quick setup and short play time, Looot works well as a filler or family game for players who enjoy spatial thinking and set completion challenges.

