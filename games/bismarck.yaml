description: |
  Bismarck is a two-player naval wargame published by Avalon Hill in 1962 that simulates
  the historic 1941 hunt for the German battleship Bismarck. One player controls the
  Bismarck (and the Prinz Eugen in later editions), while the other commands the British
  fleet searching the Atlantic. The game uses a double-blind system where British forces
  search the map's zones until they locate the Bismarck, then combat shifts to a
  tactical battle board. Its accessible rules and dramatic premise made it an excellent
  introductory wargame; a revised edition appeared in 1978.

