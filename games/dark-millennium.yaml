description: |
  Dark Millennium is a 1994 supplement for the Warhammer 40,000 2nd Edition tabletop miniatures wargame, published by Games Workshop. The expansion introduces detailed vehicle rules with over twenty full-color vehicle datafax cards covering everything from bikes to battle tanks and Dreadnoughts, plus a custom vehicle card system for player customization. Part of the sprawling Warhammer 40,000 universe, Dark Millennium expanded the scope of tabletop battles to include heavy mechanized warfare, giving players new strategic options for their armies of the far future. A separate 2005 product shares the Dark Millennium name as a Warhammer 40,000 collectible card game.

