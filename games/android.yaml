description: |
  Android is a 2008 narrative mystery board game by Fantasy Flight Games, set in a near-future
  dystopia where androids and clones coexist with humanity. Three to five players each take the
  role of a detective investigating a murder across the twin cities of New Angeles and Heinlein,
  a Moon colony, accumulating evidence, following leads, and managing their investigator's personal
  subplot simultaneously.

  Victory points are earned through solving the murder, unraveling a conspiracy, and resolving
  each character's deeply personal story arc — creating a layered, cinematic experience. Characters
  have unique abilities and psychological traits that affect gameplay, and each session builds a
  different narrative. Android established the lore that later spawned Android: Netrunner and
  the entire Android universe of games.

