description: |
  Scholars of the South Tigris is a standalone Euro game set during the Abbasid Caliphate around 830 AD, where players compete to increase their influence in the House of Wisdom and translate foreign scrolls into Arabic. The game uses worker placement with dice-workers, requiring players to match die values or colors to action spaces, while building card engines that generate powerful combos. As the third entry in the South Tigris series by Shem Phillips and S J Macdonald, it emphasizes engine-building and careful resource management through its interconnected action tracks and tech-tree progression.

