description: |
  Letters from Whitechapel is an asymmetric hidden movement game set in the fog-shrouded streets of 1888 London, where one player secretly assumes the role of Jack the Ripper while up to five other players cooperate as detectives trying to track him down. Jack moves in secret across a board of 199 numbered locations, recording movements privately while the police use clues and deduction to reconstruct his path over four terrifying nights. Each night Jack must commit a murder and return to his hideout before dawn, and the detectives can ask Jack if he has visited specific locations to narrow down the trail. The game perfectly captures the cat-and-mouse tension of one of history's most notorious manhunts.

