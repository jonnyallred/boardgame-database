description: |
  Chandragupta is the 13th volume in GMT Games' Great Battles of History (GBoH) series, simulating the rapid rise of the Mauryan Dynasty in ancient India from 319 to 261 BC. Players command the unique Indian "four-fold army" of foot soldiers, chariots, war elephants, and cavalry across eight historical scenarios ranging from set-piece battles to mountain assaults, night ambushes, and even urban street fighting. The game captures the distinctive military culture of the Mauryan Empire, including Chandragupta's defeat of Seleucus and his grandson Ashoka's conquest of Kalinga. It uses the detailed GBoH hex-and-counter system adapted for the exceptional challenges of ancient Indian warfare.

