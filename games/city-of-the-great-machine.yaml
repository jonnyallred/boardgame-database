description: |
  City of the Great Machine is a Victorian steampunk one-vs-many and cooperative strategy game published by CrowD Games in 2023, in which a coalition of human Heroes secretly moves through the city to spark a revolution against the all-controlling Great Machine AI. The heroes simultaneously choose districts to visit in secret each round, creating hidden movement and deduction as the Great Machine player anticipates their plans and works to complete its sinister Master Plan. The game offers multiple modes including one-vs-many, fully cooperative, and solo campaign. Praised as one of 2023's best releases, it combines atmospheric steampunk aesthetics with deeply asymmetric gameplay.

