description: |
  Mare Nostrum is an empire-building game for three to five players set around the ancient Mediterranean, published by Eurogames in 2003. Players take the roles of Rome, Greece, Babylon, Egypt, or Carthage, expanding their empires through trade, military conquest, and the construction of wonders. Each turn involves producing resources, trading with opponents (often through negotiation and deal-making), and recruiting armies and fleets to control the sea and land. The game blends Eurogame trading mechanics with Ameritrash conflict, rewarding both diplomatic finesse and tactical military planning.

