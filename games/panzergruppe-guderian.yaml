description: |
  Panzergruppe Guderian is a classic 1976 hex-and-counter wargame simulating the 1941 Battle of Smolensk during Operation Barbarossa, as German forces under General Guderian raced to cross the Dnepr River and seize vital communication junctions before driving on Moscow. The game features regimental and divisional level units with innovative "untried" units whose combat values are hidden until combat, combined with a CRT that emphasizes step losses and retreats. Originally published in Strategy & Tactics magazine and widely considered a landmark in the SPI catalog, it later received an Avalon Hill edition in 1984. The game earned Charles S. Roberts Award nominations and helped define mid-complexity operational wargaming.

