description: |
  Lützen (also published as Thunder at Luetzen) is a hex-and-counter wargame published by SPI in 1984 as part of Strategy & Tactics Magazine. The game simulates the Battle of Lützen of May 2, 1813, the opening clash of Napoleon's German campaign in which his newly raised army met the Russian and Prussian coalition forces in a bloody encounter battle. As an army-level simulation, it covers the strategic situation of troops committing to battle piecemeal as they arrived on the field from various directions. It represents SPI's characteristic approach of bringing significant Napoleonic battles to the wargame table.

