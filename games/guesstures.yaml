description: |
  Guesstures is a split-second team charades game where players must act out words while racing against a mechanical timer device called the Mimer-Timer. The active player loads four cards into the timer, selects one word per card to act out, and must have teammates guess it before the timer ejects the card — unguessed cards are lost forever. Designed as charades on speed, the time pressure transforms standard mime into frantic, laugh-filled performances and rewards quick thinking over polished acting.

