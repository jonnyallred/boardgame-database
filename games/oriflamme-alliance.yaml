description: |
  Oriflamme: Alliance is the third standalone episode in the Oriflamme saga, concluding the trilogy of medieval political card games from Studio H. The arrival of a neighboring kingdom destabilizes the great families of the realm and forces them to consider political alliances over open feuding, introducing 10 new action cards with subtle tactical options and rich political decisions. The expansion can be played on its own or mixed with the original Oriflamme and/or Oriflamme: Ablaze for a larger and more complex card pool. Like its predecessors, players compete over six rounds to accumulate the most Influence Points by cleverly placing and resolving face-down cards in the Influence Queue.

