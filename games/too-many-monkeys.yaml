description: |
  Too Many Monkeys is a silly card game published by Gamewright in which players help Primo the elephant chase away mischievous primates by flipping and swapping number cards in ascending order. Wild monkey cards can clear the room in one sweep, while elephant and giraffe special cards add chaos and fun. The first player to get all their cards in order and send Primo back to bed wins, making it an easy and entertaining game for young children and families.

