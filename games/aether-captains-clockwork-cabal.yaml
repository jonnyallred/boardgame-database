description: |
  Aether Captains: Clockwork Cabal is a solo card game set in a steampunk world where the player must locate six parts of the Antikytheria before time runs out. Players build the city map from a deck of City Sector cards, resolving Location events and managing health, knowledge, strength, and items as they hunt for the scattered components. Self-published by designer Todd Sanders, the game packs a tight narrative puzzle into a compact 54-card deck, offering a quick but atmospheric single-player challenge.

