description: |
  Donkey Racing is a modern reproduction of a Victorian-era family game inspired by the tradition of children riding donkeys on British beaches. Players spin a spinner and race their donkey pieces around the board, avoiding hazards and striving to be first around the track. The game requires players to obtain a "donkey boy" before they can begin moving, adding a small initial hurdle. Simple rules and cheerful donkey-themed pieces make this suitable for very young children and nostalgic family play.

