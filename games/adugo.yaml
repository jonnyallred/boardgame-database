# Description
description: |
  Adugo is a traditional two-player asymmetric abstract strategy game from the
  Bororo people of the Pantanal region of Brazil. It belongs to the hunting game
  family — similar games are found across Southeast Asia and the Indian
  subcontinent — where one player controls a single powerful jaguar while the
  other controls a pack of dogs.

  The jaguar wins by capturing a certain number of dogs; the dogs win by
  surrounding and immobilizing the jaguar. This asymmetry creates a fundamentally
  different experience for each player, as the jaguar must be aggressive while
  the dogs must coordinate to contain it. Adugo is played on a triangular grid
  drawn in the sand or on a board.

