description: |
  Tipsy Tower is an adult party game that combines the classic block-stacking tension of Jenga with drinking game mechanics. Each of the 54 wooden blocks has a drinking rule printed on it, so every successfully extracted block triggers a unique challenge — make a rule, rhyme a word, give a drink, or perform a dare. The game requires no rulebook since all instructions are printed on the blocks and packaging, making it an instant icebreaker for adult parties and game nights.

