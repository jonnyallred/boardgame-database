description: |
  1846: The Race for the Midwest is an 18xx railroad investment game set in the Great Lakes and Midwest region of the United States from 1846 to 1935. Designed by Tom Lehmann and published by GMT Games, it is renowned for being one of the most accessible and well-balanced 18xx games, featuring an opening draft that reduces variance and a shorter play time compared to other entries in the series. Players act as railroad investors, buying and selling stock in rail corporations while those corporations lay track, build stations, and run trains across the hexagonal map to generate revenue. The interplay of stock market manipulation with careful operational planning makes this a standout title for serious strategic gamers.

