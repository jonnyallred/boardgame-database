description: |
  Adaptoid is a two-player abstract strategy game designed by Nestor Romeral Andres in 2008, played on a hexagonal board with four cells per side. Players control creatures called adaptoids, which begin the game without legs or pincers, and must strategically attach legs (for movement) and pincers (for combat power) to their adaptoids as the game progresses. The goal is to capture at least five enemy adaptoids by landing on them with a creature bearing more pincers, creating an evolving tactical puzzle where every piece you build and every move shifts the board's balance.

