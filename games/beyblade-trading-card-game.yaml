description: |
  The Beyblade Trading Card Game is an out-of-print collectible card game released in
  2003 by Decipher, Inc., based on the Beyblade anime and spinning-top toy franchise.
  Players build decks and duel by placing their Beyblade card alongside a stack of
  Spin cards, then alternate playing cards and matching Battle Edges to deal damage
  by removing cards from the opponent's spin stack. The Collision set of 130 cards
  was the main release; the game had a Basic mode for beginners and an Advanced mode
  with expanded card powers before going out of print.

