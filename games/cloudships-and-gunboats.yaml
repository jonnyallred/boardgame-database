description: |
  Cloudships & Gunboats is a standalone expansion for GDW's Sky Galleons of Mars, bridging the Space 1889 tabletop RPG and its aerial combat boardgame in the Victorian sci-fi setting of Mars. While Sky Galleons abstracted boarding actions, this supplement fleshes them out into full man-to-man (or man-to-Martian) deck-level combat using miniature-scale deckplans and cardstock miniatures. The game also adds new weapons, rules for designing custom aerial vessels, and a comprehensive ship-building system. It can be played standalone without any RPG background.

