description: |
  Moeraki: Kemu is a two-player abstract strategy game designed by Stefan Kiehl and published in 2011 by Kiehly, inspired by the rivalry between two Maori tribes at the sacred Moeraki rocks of New Zealand's South Island. Players take turns placing pieces on a diagonal grid, aiming to enclose areas and claim squares by achieving a majority of surrounding pieces; completed squares are claimed by placing a tribe marker. The Matau (hooks) and the Manala (birds) tribes are the two competing factions, adding a light thematic layer to a game of deep spatial reasoning and tactical area control.

