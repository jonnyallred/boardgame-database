description: |
  Blood Bowl is a fantasy sports board game created by Jervis Johnson and published by
  Games Workshop in 1987 (originally 1986 as the first edition), set in an alternate
  Warhammer Fantasy world where races like humans, orcs, dwarves, elves, skaven, and
  trolls compete in a brutal parody of American football. Two players command teams of
  28mm miniatures, scoring touchdowns while attempting to injure opponents to reduce
  their numbers on the pitch. The game blends tactical sports strategy with miniature
  wargame elements and dark humor, inspiring a beloved franchise of games and expansions.

