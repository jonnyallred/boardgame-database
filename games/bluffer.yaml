description: |
  Bluffer is a question-and-answer party game in which a game leader reads out a question,
  each player secretly writes a plausible answer, and the leader shuffles all responses
  together with the correct one from the question card. Players then vote on which answer
  they believe is correct, scoring points both for fooling others with wrong answers and
  for identifying the correct one. The game is a crowd-pleaser similar to Balderdash,
  rewarding creativity, bluffing skill, and knowledge in equal measure.

