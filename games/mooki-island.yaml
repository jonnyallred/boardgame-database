description: |
  Mooki Island is a quick two-player set collection card game designed by Florian Sirieix and published by Scorpion Masqué, illustrated by Seppyo. Players take turns drawing and placing cards, collecting as many Mookies (whimsical island creatures) from each family as possible to win trophies. The extremely simple rules — each player draws a card and places it in front of themselves — make it ideal for very young children as an introduction to majority collection mechanics. The game plays in about ten minutes and is aimed at ages four and up.

