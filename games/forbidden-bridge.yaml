description: |
  Forbidden Bridge is a motorized children's adventure game published by Milton Bradley in 1992, designed by John Wallis. Players take on the roles of explorers racing to retrieve ancient jewels from a lost civilization, guarded by an angry idol. The game features a three-dimensional board with a physical rope bridge spanning two cliffs, and a motorized idol that — when triggered — shakes the bridge and tries to knock crossing explorers into the river below. Players cross the static river first, then traverse the treacherous bridge, balancing luck and timing in a fun, interactive format appealing to younger players.

