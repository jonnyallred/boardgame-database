description: |
  Kraken Attack! is a 2020 cooperative tower-defense board game by Antoine Bauza, published under IELLO's Loki children's imprint, in which 1-4 pirate players coordinate to defend their ship against a tentacled monster's relentless assault. The ship is divided into four quarters connected to eight horizontal sea lanes, each containing one of the Kraken's tentacles, and players must move their pirate pawns between quarters to combat the tentacles threatening their vessel. Intended as a child-friendly introduction to cooperative and tower-defense mechanics, it features a gorgeous Kraken figurine, eight tentacle miniatures, and card-driven player actions.

