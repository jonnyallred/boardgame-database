description: |
  Klondike is the most well-known solitaire card game in the world, so ubiquitous that "solitaire" in North America typically refers to this game specifically. Using a standard 52-card deck, the single player arranges seven tableau piles in descending alternating-color sequences while simultaneously building four foundation piles sorted by suit from Ace to King. Cards are cycled from a draw pile in groups of one or three, with the goal of moving all 52 cards onto the foundations. The game's near-universal digital popularity through Microsoft's bundled version introduced an entire generation of computer users to patience games.

