description: |
  The War of the Worlds II is a 1974 science fiction board wargame designed by Phil Orbanes Sr. and published by Rand Game Associates for 2-3 players, simulating a scenario of planetary conquest inspired by H.G. Wells' classic novel. Players command alien or human forces in a struggle for dominance that extends the War of the Worlds scenario into a full interplanetary conflict. The game was not commercially successful, placing 198th out of 202 games in a 1976 Simulations Publications poll of the most popular North American wargames.

