description: |
  Ellery Queen's Mystery Magazine Game is a mystery deduction game published by Mayfair Games, broadly similar in structure to Sherlock Holmes Consulting Detective. Players select one of five included mysteries set in Manhattan or Bromlee Station, then move detectives across the board gathering clues. In the Basic game, clues are read aloud for all players; in the Advanced game, clues are read silently and kept secret, requiring players to independently deduce the solution. When a player believes they have solved the mystery, they announce their conclusion and privately verify it against the solution. Five unique mysteries offer substantial replay value.

