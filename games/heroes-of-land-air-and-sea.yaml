description: |
  Heroes of Land, Air & Sea is an RTS-inspired 4X miniatures board game designed by Michael Coe and published by Gamelyn Games in 2018, set in the fantasy world of Aughmoore. Players control distinct kingdoms and compete to conquer through two intertwined economic systems: traditional resource acquisition (food, ore, mana) and a twist on worker placement deploying serfs to construct buildings. Combat is resolved through secretly selected tactics cards, with outcomes shaped by the units committed — rewarding both planning and bluffing.

