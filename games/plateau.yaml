description: |
  Plateau is an abstract strategy game invented by Jim Albea in 1986, played on a deceptively simple 4x4 grid. Each piece has colored rings on its top and bottom faces, and the visible color determines how the piece moves — but players can flip pieces to change their movement mode. Stacking pieces captures opponents' pieces, and hidden information (opponents cannot see the underside of stacked pieces) creates a strong bluffing and deduction element unusual in abstract games. Players win by either capturing six opponent pieces or assembling a tower of six of their own. The combination of hidden information, transforming movement modes, and dual win conditions creates a uniquely rich game from minimal components.

