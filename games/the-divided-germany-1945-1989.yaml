description: |
  Wir sind das Volk! (The divided Germany, 1945-1989) is a two-player card-driven game published by
  Histogame in 2014 that recreates the Cold War competition between East and West Germany from the Berlin
  Airlift through the fall of the Wall. Players build their economies, raise citizens' living standards,
  and manage political unrest across four decades of history guided by 84 event and operations cards.
  Each turn, a card may be played for its printed event or spent as operations points — a classic
  card-driven tension. The West must prevent socialism from dominating while the East must maintain
  stability; both pursue international prestige in a tightly contested asymmetric duel that earned
  significant praise from the historical gaming community.

