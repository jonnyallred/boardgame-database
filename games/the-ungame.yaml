description: |
  The Ungame is a 1973 non-competitive conversation game created by Rhea Zakich, inspired by a period of forced silence during her recovery from vocal cord surgery that made her reflect on how little her family really communicated. Players move around an endless loop board with no finish line, drawing cards that pose open-ended questions about themselves which must be answered while other players listen without judgment. There are no winners or losers—the game's sole purpose is to foster listening, self-expression, and authentic conversation. It is widely used in therapy and educational settings and represents a unique genre of social-emotional board games.

