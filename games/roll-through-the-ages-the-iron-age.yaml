description: |
  Roll Through the Ages: The Iron Age is a sequel to Matt Leacock's Bronze Age, designed by Thomas Lehmann for 1-4 players. Players roll a set of dice up to three times, setting aside results to generate workers, food, and resources for building monuments and provinces across the civilizations of Greece, Phoenicia, and Rome. New mechanics include a yellow Fate Die that can trigger natural disasters or military conquests, and armies that allow players to raid opponents' stores. The combination of push-your-luck dice rolling with civilization-building scoring makes it a satisfying medium-weight dice game.
