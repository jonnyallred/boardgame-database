description: |
  The Rivals for Catan is a 2010 two-player card game by Klaus Teuber, a complete redesign of the original Catan Card Game on the 15th anniversary of that game. Each player develops a province of Catan by building settlements, roads, cities, and expansion buildings, using resources generated by dice rolls. The game features an Introductory Game for new players and three Theme Games that can be combined into the "Duel of the Princes" variant, scaling in complexity and card variety. Klaus Teuber streamlined the original's aggressive card interactions to make the game more newcomer-friendly while retaining the strategic depth and resource-management feel of the Catan universe.

