description: |
  Khronos is a 2-5 player tile-placement and area control game set across three simultaneous time periods — the Age of Might, the Age of Faith, and the Age of Reason — all representing the same medieval region. Players build military, religious, and civil structures across three boards, and crucially, larger buildings built in earlier eras "ripple" forward in time to subsequent boards, allowing actions in the past to reshape the future. The game lasts seven turns with scoring at turns four and seven, rewarding players who master the cascading consequences of their time-spanning construction. Winner of the 2006 Concours International de Créateurs de Jeux de Société.

