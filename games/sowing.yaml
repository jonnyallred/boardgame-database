description: |
  Sowing is a traditional two-player abstract strategy game based on the mancala family of "sowing" games,
  in which players take seeds from one pit and distribute them one by one into consecutive pits around the
  board. The sowing mechanic — capturing seeds that land in specific configurations — creates deep combinatorial
  play from deceptively simple rules. Mancala-family sowing games are among the oldest and most widespread
  games in the world, played across Africa, Asia, and the Middle East for thousands of years.

