description: |
  Monster Hunter World: The Board Game is a cooperative arena combat game developed by Steamforged Games under license from Capcom and published in 2022. Players take on the roles of hunters tracking and battling iconic monsters from the video game, with each monster possessing a unique behavior deck that dictates its movements and attacks, creating an adaptive and unpredictable hunt. The game launched as two separate core sets (Ancient Forest and Wildspire Waste) each featuring different monsters, with hunters upgrading their equipment between hunts. It successfully crowdfunded on Kickstarter, raising over $1 million in 90 minutes.

