description: |
  Hacienda is a strategic area control game designed by Wolfgang Kramer, set in early 19th century Argentina where players compete to build the most prosperous hacienda. Players acquire land and livestock, establish market connections, manage water supplies, and construct haciendas to score the most points across two scoring phases. The game features two different boards requiring distinct strategic approaches, and rewards careful hand management and long-term planning over reactive play. It was recognized as Games Magazine's Best New Family Strategy Game in 2007.

