description: |
  Okinawa: The Last Battle, April 1945 is a two-player hex-and-counter wargame published by SPI in 1975 simulating one of the bloodiest battles of the Pacific War. One player commands the American invasion force and the other the Japanese defenders across a 17"x22" hex map with 100 counters, capturing the grinding attritional nature of the 82-day battle. Originally published as part of the "Island War: Four Pacific Battles" collection before release as a standalone title, the game's basic rules make it accessible but its 80-turn structure provides an unusually lengthy play experience for its size. It is regarded as a compact and historically accurate treatment of a pivotal late-war Pacific engagement.

