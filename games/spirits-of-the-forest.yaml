description: |
  Spirits of the Forest is a quick abstract set-collection game by Michael Schacht, published by Thundergryph Games, for 1–4 players. Players represent the four elements of nature competing to acquire the most spirit symbols from a shared pool of 48 spirit tiles arranged in a forest row. On each turn, a player drafts up to two spirit tiles or uses favor tokens to access tiles flanked by gemstones. Points are scored by holding the majority of each of the eight spirit types at game end. Elegant in its simplicity, the game teaches in minutes yet offers meaningful tactical decisions about when to claim tiles versus save favor tokens.

