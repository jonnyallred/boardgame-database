description: |
  International Cricket is a two-player simulation board game published by Lambourne Games in 1985, recreating the experience of one-day international cricket using 120 cards representing top international players of the mid-1980s. The bowler rolls red dice matched against the bowler's card, and the batter rolls blue dice matched against the batter's card, with an additional white die for pitch, weather, and fielding modifiers. Designed by Terry Goodchild by merging his earlier "One-Day International" and "Test Match Replay" games, it is a faithful statistical simulation of cricket for fans of the sport.

