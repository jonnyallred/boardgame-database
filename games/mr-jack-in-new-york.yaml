description: |
  Mr. Jack in New York is a standalone sequel to the acclaimed two-player deduction game Mr. Jack, designed by Bruno Cathala and Ludovic Maublanc and published by Hurrican in 2012. One player controls Jack the Ripper hiding among suspects in Manhattan, trying to escape while the other player controls the detective and their assistants hunting him down. The Manhattan setting introduces gaslights and manholes as moveable pawns, and the board is constructed dynamically from decor tiles placed by players, meaning a blocked route can suddenly open or close during play. Though more complex than the original and recommended for players familiar with Mr. Jack, it offers greater strategic depth.

