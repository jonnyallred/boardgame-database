description: |
  Aether is an abstract tile placement game in which players battle for control of the mystical fifth element by placing tiles representing the four primary elements — earth, air, water, and fire — on a hexagonal board. Each elemental piece gains power from same-element tiles surrounding it but is weakened by counter-element tiles, creating a dynamic web of competing influences. Players must carefully position their tiles to boost their own elementals while undermining opponents', making each placement a tactical decision with board-wide consequences. Released at Spiel 2010, the game offers simple rules with genuine strategic depth.

