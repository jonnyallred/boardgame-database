description: |
  Cockroach Poker is a reverse set-collection bluffing card game where players try to force opponents to collect four of the same critter. On each turn, a player passes a face-down card to another player and declares (truthfully or not) what critter it shows — cockroach, rat, stink bug, fly, toad, scorpion, bat, or spider. The receiver must either call the bluff, accept the card, or peek and pass it on. The loser is the first player stuck with four matching critters or who runs out of cards in hand. Simple enough to teach in minutes yet full of psychological tension, it was nominated for the 2004 Spiel des Jahres and remains a beloved filler.

