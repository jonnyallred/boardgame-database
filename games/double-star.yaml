description: |
  Double Star is a 1979 two-player science fiction wargame from Game Designers' Workshop set in a binary solar system where two rival human colonies — one of Chinese descent, one of Arab descent — wage an interplanetary war for resources. Each player builds task forces of spaceships, organizes them into tactical formations (cone, wedge, cylinder, globe), and launches expensive offensives across the vast distance between the two stars. Players must budget carefully, purchasing ships, defense units, power plants, and training; launching kinetic asteroid strikes at enemy planets adds another dangerous strategic layer. Praised by reviewers as one of the most solid science-fiction wargames of its era, Double Star rewards meticulous long-range planning because offensive fleets take many turns to reach their targets.

