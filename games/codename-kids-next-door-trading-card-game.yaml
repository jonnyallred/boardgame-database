description: |
  Codename: Kids Next Door Trading Card Game is a licensed collectible card game based on the Cartoon Network animated series, published by Wizards of the Coast in 2005. Players build decks around the five KND agents, each on differently colored cards, and on their turn choose to either flip a card from their deck in a face-off (comparing battle numbers) or place it in their KND treehouse headquarters. The player who first accumulates five cards in their WINS area is victorious. Designed as a gentle entry point for young children into the TCG format, it features simplified mechanics suitable for ages six and up.

