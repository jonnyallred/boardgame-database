description: |
  Flizz & Miez is a hectic real-time kids game for 2-4 players published by Carrera in 2014. Players race to assemble jigsaw puzzle cars as quickly as possible while the cat player simultaneously rolls dice hoping to land cat symbols and catch the car drivers before they escape. The game combines speed-puzzle assembly with luck-based dice rolling in a cat-and-mouse format that is frantic and fun for young children. It won recognition from Spiel des Jahres as a recommended children's game.

