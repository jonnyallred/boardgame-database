description: |
  Santorini is a beautifully presented abstract strategy game designed by Gordon Hamilton in which 2-4 players control builders racing to be the first to reach the third level of a growing 3D city inspired by the iconic cliffside architecture of Santorini, Greece. Each turn, a player moves one builder and then adds a building block — domes block movement and cap towers, creating an ever-shifting three-dimensional puzzle. What elevates Santorini above pure abstracts is its library of over 40 asymmetric god and hero powers, each fundamentally altering how the game's simple rules apply, making every combination feel fresh. Its 2016 Roxley Kickstarter became one of the most successful Canadian tabletop campaigns ever.

