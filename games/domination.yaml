description: |
  Domination (also known as Focus) is an abstract strategy game designed by Sid Sackson, published by Milton Bradley in 1982. Players move stacks of pieces based on the number of pieces in the stack (a stack of three moves three spaces), and when a stack grows beyond five pieces, the excess are removed from the bottom. Your own color pieces removed this way are reserved to re-enter the game; opponent pieces are captured. The goal is to leave your opponent without any legal moves. Sid Sackson considered Focus one of his finest designs, and it has been republished under several names.

