description: |
  Wooly Wars is a tile placement game for 2-4 players in which players strategically place fence tiles to create enclosed pens for their sheep. Each player secretly controls one type of animal at the start of the game, adding a bluffing element as opponents try to deduce whose sheep are whose while building the largest enclosures. The goal is to form the biggest pens containing your own animals while blocking rivals from doing the same. The combination of secret identities and territorial tile-placement gives the game surprising depth for its simple ruleset.

