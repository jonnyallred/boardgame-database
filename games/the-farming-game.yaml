description: |
  The Farming Game is a 1979 economic board game designed by Washington rancher George Rohrbacher,
  reportedly created in a single night on a scrap of drywall from his basement. Players each inherit
  twenty acres of land — not enough to live on — so they supplement income by working in town while
  investing in crops (hay, fruit, grain, cattle) and expanding their holdings. Operating Expense
  cards create the constant financial pressure of real farming life: irrigation bills, seed costs,
  equipment failures. Farmer's Fate cards add random fortune and misfortune. The winner is the first
  to reach $250,000 in net farm assets — enough to finally quit the day job. The game is celebrated
  for its authentic portrayal of agricultural economics and has sold steadily for decades.

