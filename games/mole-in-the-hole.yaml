description: |
  Mole in the Hole (also known as The Mole in the Hole) is a children's board game designed by Virginia Charves and Bertram Kaes, published by Ravensburger in 1995. The multi-layered board features four stacked boards, each with holes leading down to the next level, growing fewer with each descent. Players use numbered cards to move their moles toward holes, with each mole that fails to reach a hole before a board is removed being eliminated. The winner is the mole that burrows all the way down to discover the Golden Shovel at the deepest level. The game won Children's Game of the Year in both Finland and Sweden in 1995.

