description: |
  Napoleon at Bay is an operational-level two-player board wargame by Kevin Zucker, published by Tactical Studies Group (later Operational Studies Group) in 1978, simulating the 1814 Campaign in France — Napoleon's desperate defensive campaign as Allied armies converged on Paris. The game uses Zucker's own rule system developed after his tenure at SPI, covering operational movement, supply, and combat across a hex-based map. It was a finalist for the 1979 Origins Awards Charles S. Roberts Award for Best Pre-Twentieth Century Game, and became a foundational title in the Operational Studies Group Napoleonic wargame catalog.

