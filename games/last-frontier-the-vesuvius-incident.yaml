description: |
  Last Frontier: The Vesuvius Incident is a cooperative survival horror game set aboard a space station that has been overrun by an alien threat. Players must work together to complete objectives and escape before the station is lost, facing random events and escalating danger as they explore the modular map. The tension between completing mission goals and managing survival resources under threat drives the cooperative experience. Published by White Dog Games, it offers a compact narrative horror experience in a science fiction setting.

