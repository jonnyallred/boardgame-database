description: |
  War of the Worlds: The New Wave is a two-player asymmetric deck-building game published by Grey Fox Games in 2019, inspired by H.G. Wells' classic novel. One player commands the invading Martian war machines while the other leads Earth's defenders in a desperate struggle for survival. Each side builds their deck from different card pools, reflecting their radically different strengths—the Martians bring overwhelming firepower while the humans rely on ingenuity and attrition. The game captures the tension of the original story through tightly balanced asymmetric gameplay on a shared game board.

