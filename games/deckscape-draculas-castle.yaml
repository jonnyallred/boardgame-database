description: |
  Deckscape: Dracula's Castle is a horror-themed pocket escape room card game in the Deckscape series designed by Martino Chiacchiera and Silvano Sorrentino, published by dV Giochi. Players are trapped in Dracula's ominous castle and must work together through card-based puzzles to escape before dawn — or before making too many fatal mistakes. The vampire theme adds atmospheric tension to the familiar Deckscape format of sequential card puzzles, logic challenges, and hidden story elements. Like all games in the series, it requires no setup and delivers a one-shot escape room experience in about an hour.

