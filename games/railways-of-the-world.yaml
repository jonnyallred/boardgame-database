description: |
  Railways of the World (originally Railroad Tycoon) is a rail empire-building game designed by Martin Wallace and Glenn Drover set in the eastern United States circa 1830. Players lay hexagonal track tiles to connect cities, deliver colored goods cubes, and upgrade their locomotive technology while managing loans (bond cards) that cost victory points at game end. Originally a simplified version of Wallace's Age of Steam, the game was first published in 2005 as Railroad Tycoon before the video game license expired, with the Railways of the World title adopted for a 2009 edition and a 10th Anniversary Edition in 2018.

