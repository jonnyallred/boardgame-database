description: |
  Co-opoly: The Game of Co-operatives is a cooperative board game published by The TESA Collective in 2011, in which all players collaborate to found and successfully run a democratic cooperative business. Players take on characters with different incomes and family sizes, working together to navigate tough challenges — all winning or losing collectively based on the co-op's success. The game is designed to educate about cooperative economics, solidarity, and collective decision-making, and is produced entirely by worker co-ops in the USA on recycled materials. It has become a standard resource for cooperative movement education worldwide.

