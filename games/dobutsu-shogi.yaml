description: |
  Dōbutsu shōgi (Animal Shogi) is a compact shogi variant for two players invented in 2008 by women's professional shogi player Madoka Kitao, designed partly to introduce young girls to the game of shogi. Played on a tiny 3x4 board with charming animal-themed pieces (Lion, Elephant, Giraffe, and Chick/Hen), players win by either capturing the opponent's Lion or advancing their own Lion into the promotion zone without entering check. Captured pieces can be re-dropped onto the board as in standard shogi. Despite its simplicity, the game has been strongly solved — revealing that the second player holds a theoretical advantage requiring up to 78 plies to realize — making it a fascinating subject for both children and computer scientists.

