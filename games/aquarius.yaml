description: |
  Aquarius is a 1998 card game by Andy Looney, published by Looney Labs, in which players
  connect element cards (Earth, Air, Fire, Water, Space) in a domino-like grid, secretly working
  toward a hidden goal of connecting seven panels of their assigned element. Action cards allow
  players to rotate sections, swap goals, or otherwise disrupt the table.

  The hidden goal mechanic creates natural bluffing opportunities — players must guess opponents'
  objectives to block them while advancing their own. Designed with hippie-influenced art
  reminiscent of Peter Max, the game has a laid-back, colorful aesthetic and plays in under
  30 minutes. It is a perennial entry-level title in the Looney Labs lineup.

