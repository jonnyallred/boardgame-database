description: |
  Eiertanz, Das Kartenspiel is a physical card game published by HABA that combines card play with absurd dexterity challenges. Players try to snatch the most egg-shaped cards, but whoever receives an egg card must then clasp it under their chin, between their knees, or in other unlikely positions on their body. The game rewards quick reflexes and nimble body management; holding multiple eggs in improbable positions while continuing to play cards is as funny for observers as it is challenging for participants. Though nominally a children's game, it is equally entertaining for adults.

