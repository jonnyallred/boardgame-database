description: |
  Malefiz (known as Barricade in many markets) is a classic abstract race game invented by Werner Schöppner and published by Ravensburger since 1960. Each player races five pawns from the base to the goal at the top of the board using die rolls, but the board is filled with barricade pieces that block movement — whenever a pawn lands on a barricade, it picks it up and the player must place it anywhere on the board to impede opponents. Derived from the ancient Indian game Pachisi, Malefiz adds strategic obstacle placement to its dice luck, creating a blend of mean-spirited blocking and race tactics beloved across generations.

