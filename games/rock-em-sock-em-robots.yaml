description: |
  Rock 'Em Sock 'Em Robots is a classic two-player dexterity toy-game first released by Marx Toys in 1966, designed by Marvin Glass and Burt Meyer of the famous design firm Marvin Glass and Associates. Players each control a plastic boxing robot — the Blue Bomber or the Red Rocker — using handles to make their robot punch, block, and maneuver, with the goal of landing an uppercut to pop their opponent's head off (knocking their block off). The game's enduring appeal led to its acquisition by Mattel and continued production into the 21st century. A genuine pop culture icon, Rock 'Em Sock 'Em Robots represents the quintessential two-player head-to-head dexterity contest.

