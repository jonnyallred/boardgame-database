description: |
  Melee is a tactical arena combat game designed by Steve Jackson and published by Metagaming Concepts in 1977, part of The Fantasy Trip system. Players create characters by distributing points between Strength (hit points and weapon size) and Dexterity (attack accuracy), then maneuver them on a hex grid using precise facing and movement rules while resolving combat through opposed die rolls. Designed as a reaction to Dungeons & Dragons' complex combat, Melee strips arena fighting to its tactical essentials — it is simple to learn yet rewards deep tactical thinking. Re-released by Steve Jackson Games in 2019, it remains a gateway to tactical wargaming.

