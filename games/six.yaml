description: |
  Six is a 2-player abstract strategy game by Erni Modersheim, published by FoxMind, in which players take turns placing hexagonal tiles of their color and try to form one of three winning configurations: a line of six, a triangle of three hexagons at the corners of a larger triangle, or a hexagon ring. Once all tiles are placed without a winner, players shift to a movement phase where they must reposition their own pieces to create a winning shape. The game's portable tile format and evolving board make it a clever, portable abstract with surprising depth.

