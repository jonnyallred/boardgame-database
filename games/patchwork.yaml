description: |
  Patchwork is a beloved two-player tile-placement game by Uwe Rosenberg in which players compete to build the most complete and visually satisfying quilt on their personal 9x9 grid board. Players take turns selecting irregularly shaped polyomino tiles from a revolving market, paying a cost in buttons (the currency) and time — advancing a shared time track to determine turn order. Special patches grant bonus buttons when passed, and a bonus is awarded to the first player to fill a 7x7 area. Final scoring subtracts two points for every empty square on the quilt and adds current button holdings. Received an official recommendation at the 2015 Spiel des Jahres and remains one of the definitive two-player games.

