description: |
  Exit: The Game – The Forbidden Castle is a 2017 entry in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players find themselves transported to a magical, forbidden castle from which they must escape by solving a series of fantasy-themed riddles and puzzles using the series' signature card-and-dial system. The medieval castle setting adds a fantastical dimension to the familiar escape room formula, with puzzles themed around castle architecture, secret passages, and mysterious artifacts. Components may require folding or cutting as part of the solution, making each copy a single-use experience.

