description: |
  The Fox in the Forest is a two-player trick-taking card game designed by Joshua Buergel and published by Foxtrot Games and Renegade Game Studios in 2017. Using a 33-card deck across three suits, players compete over rounds of 13 tricks, but scoring is asymmetric: winning too many tricks is penalized, rewarding the player who wins a middling 4–6 tricks per round. The odd-ranked cards each bear special abilities — changing trump, swapping hands, or letting a loser lead — that add tactical wrinkles to a fundamentally elegant system. Recommended for the 2020 Spiel des Jahres, The Fox in the Forest elegantly adapts traditional trick-taking for two.

