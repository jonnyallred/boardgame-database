description: |
  Jeson Mor ("Nine Horses") is a traditional Mongolian abstract strategy game played on a 9x9 checkered board, considered a chess variant. Each player commands nine chess knights lined up on their back rank; knights move and capture exactly as in chess. The primary objective is to be the first player to occupy the central square with a knight and then leave it — a deceptively simple goal that creates intricate tactical play. A player also wins by capturing all opponent knights. Considered part of Mongolia's cultural heritage, Jeson Mor is a distinctive and historically significant chess variant.

