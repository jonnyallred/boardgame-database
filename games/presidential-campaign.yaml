description: |
  Presidential Campaign (originally released as Mr. President) is a 3M Bookshelf game simulating the race for the United States presidency. Players must decide which states to campaign in and how to invest their time and resources to maximize electoral votes, drawing on political data from the 1960s. Originally published in 1967 and revised in 1971 and 1972, the game captures the strategic geography of American presidential politics.

