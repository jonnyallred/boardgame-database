description: |
  Gheos is an original 2006 tile-laying game designed by René Wiersma and published by Z-Man Games in which players take the roles of gods shaping the world itself. Triangular tiles are placed to form continents, coastlines, and civilizations adorned with resources such as wheat, swords, temples, and pyramids. Players invest their "followers" in emerging civilizations and score points for the resources those civilizations control — but civilizations can be altered or destroyed by other players repositioning tiles. The interplay between building up and tearing down creates a tense, strategic experience with a distinctive mythological atmosphere.

