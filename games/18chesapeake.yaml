description: |
  18Chesapeake is an 18xx railroad investment game designed by Scott Petersen and set in the Chesapeake Bay region of the United States, published in 2020 by All-Aboard Games. Deliberately designed as a more accessible entry point into the 18xx series, it features a smaller map, a train export mechanic that keeps the game moving, and a structure similar to the acclaimed 1830. Players invest in and manage railroad companies operating across the mid-Atlantic states and Appalachian coalfields, taking turns in alternating stock and operating rounds. Its shorter play time of approximately 2.5 to 3.5 hours makes it particularly welcoming to new 18xx players.

