description: |
  Yucatan is a competitive strategy game set in ancient Mesoamerica, where players lead Mayan
  city-states competing for divine favor. Over four rounds divided into Action, Sacrifice, and
  Revolution phases, players build advances, upgrade troops, summon creatures, and capture
  prisoners for sacrifice to earn victory points. The strict four-round structure forces aggressive
  play, as there is never enough time to execute every strategy, and the sacrificial scoring system
  rewards daring aggression over passive development.

