description: |
  Mamma Mia! is a light pizza-themed memory card game designed by Uwe Rosenberg and published by Abacus Spiele in 1999. Players layer ingredient cards into a common pile and strategically place their pizza order cards among them, trying to time their placement so the right ingredients appear in the stack when their pizza card is resolved. After three rounds of play, the player who has fulfilled the most pizza orders wins. The game's memory challenge — keeping track of which ingredients have been buried and in what order — gives it surprising depth for such a compact design.

