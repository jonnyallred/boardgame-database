description: |
  Space Empires 4X is a science fiction board wargame designed by Jim Krohn and published by GMT Games in 2011,
  following the 4X tradition of eXplore, eXpand, eXploit, and eXterminate. Players build space empires on a
  randomly revealed modular map featuring 12 terrain types including asteroids, nebulae, and planets that affect
  both movement and combat. Colony ships, merchant fleets, mining operations, and technology upgrades drive
  economic development while fog-of-war keeps enemy fleet positions hidden. Nearly 20 years in development,
  the game balances strategic depth with streamlined combat resolution.

