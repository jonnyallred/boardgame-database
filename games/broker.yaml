description: |
  Broker is a stock market card game originally published in 1961 by Spencer-Murray Corporation and later republished by Ravensburger and others. Players are dealt market action cards and given starting capital to buy shares in four fictional companies, using their hand of cards to manipulate stock prices upward for their holdings and downward for opponents. The game ends when the last card is played, with the player holding the greatest combined value of cash and stocks declared the winner. It is a straightforward economic game that captures the push-and-pull of stock market speculation in a compact card-driven format.

