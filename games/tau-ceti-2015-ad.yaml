description: |
  Tau Ceti 2015 AD is a 1980 science fiction board wargame published by Swedish
  Game Production. The game depicts near-future tactical combat between the Kraa
  and H'ren, two alien races inhabiting a planet in the Tau Ceti star system.
  Players command their respective alien forces in battles that determine
  dominance over the contested world. The game reflects the era's interest in
  scientific plausibility, setting the conflict within a real nearby star system
  at a then-plausible future date.

