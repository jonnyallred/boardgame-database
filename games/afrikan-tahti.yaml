# Description
description: |
  A classic Finnish board game designed by Kari Mannerla and first published in 1951,
  making it one of the most historically significant board games in Nordic culture.
  Players travel across a map of Africa searching for the Star of Africa, a legendary
  gemstone. Movement is governed by dice rolls, and players can acquire gems at various
  locations, hoping to find the valuable Star before returning home. The game has sold
  over 3.5 million copies and has been a beloved staple in Finnish and Scandinavian
  homes for over 70 years, with many regional and anniversary editions published.

