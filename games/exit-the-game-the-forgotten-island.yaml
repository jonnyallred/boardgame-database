description: |
  Exit: The Game – The Forgotten Island is a 2018 entry in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players find themselves stranded on a mysterious deserted island and must solve a chain of outdoor-themed puzzles to signal for rescue. The tropical setting provides vivid puzzle backdrops involving map navigation, natural landmarks, and island mysteries. Like all EXIT titles, it uses a code dial for puzzle verification, requires no app, and some components may be modified as part of the solving process, making it a one-time experience.

