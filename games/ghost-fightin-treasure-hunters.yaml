description: |
  Ghost Fightin' Treasure Hunters (originally published as Geister, Geister, Schatzsuchmeister!) is a cooperative family board game designed by Brian Yu and published by Mattel. Players work together as a team to collect eight treasure jewels hidden throughout a haunted house and escape before it becomes fully overrun by ghosts. The game features dice-driven movement and ghost spawning mechanics that steadily raise tension over the course of play, and includes a Head Haunter mode where one player controls the ghosts against the others. The original German edition won the prestigious Kinderspiel des Jahres 2014 (Children's Game of the Year).

