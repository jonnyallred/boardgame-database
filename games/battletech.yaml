description: |
  BattleTech is a hex-and-counter tactical wargame set in a far-future feudalistic universe where massive humanoid war machines called BattleMechs clash across a variety of terrains. Originally published as BattleDroids by FASA in 1984 and renamed BattleTech in 1985, players pilot detailed mechs tracked on individual record sheets noting armor, weapons, ammunition, heat buildup, and pilot skills. Dice determine hit locations and damage in granular detail, while terrain and range modifiers add tactical complexity. The franchise expanded to include dozens of supplements, novels, video games, and the collectible card game, establishing BattleTech as a foundational property in science-fiction wargaming.

