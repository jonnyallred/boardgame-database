description: |
  Snowdonia is a worker-placement game for 1–5 players themed around the construction of the Snowdon Mountain Railway in Wales. Players lead work gangs excavating rubble, laying track, and building stations along a modular mountain route, racing to complete sections before weather and resource conditions deteriorate. A clever weather mechanism influences available actions each turn, creating dynamic variance and forcing adaptation. Contract cards provide personal objectives that reward specialization, while the shared construction board means every player's progress is intertwined. Snowdonia is a tightly designed eurogame that rewards planning and offers exceptional replayability through multiple scenario maps.

