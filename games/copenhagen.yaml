description: |
  Copenhagen is a tile-placement game for 2–4 players inspired by the colorful building facades of the Nyhavn harbor district in Denmark. Players take turns either collecting pairs of adjacent cards from a shared display, or spending sets of matching cards to purchase polyomino-shaped facade tiles and place them on their personal building board. Completing full rows or columns of your facade earns bonus abilities, and the first player to reach 12 or more points wins. The intuitive rules, attractive Tetris-like tile fitting, and brisk play time make Copenhagen an excellent family and gateway game.

