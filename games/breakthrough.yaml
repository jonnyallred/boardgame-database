description: |
  Breakthrough is a two-player abstract strategy game designed by Dan Troyka that won the 2001 8x8 Game Design Competition. Each player controls 16 pawns placed in their first two rows; pieces move or capture diagonally forward, with no backward movement allowed. The objective is simple: be the first player to move any piece to the opponent's back rank. Despite its minimal ruleset, Breakthrough rewards deep positional thinking and has attracted a strong following in the abstract games community.

