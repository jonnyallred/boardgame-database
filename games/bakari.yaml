description: |
  Bakari is a traditional mancala game from East Africa, played across a board with two rows of holes. Players sow seeds in the standard mancala fashion, capturing opponent seeds when a sow ends in a pit with specific counts. As with many traditional games, regional variations in rules exist and the game is embedded in local cultural practice. Bakari is a representative of the wider mancala game family prevalent across sub-Saharan Africa, with limited published documentation of its specific regional ruleset.

