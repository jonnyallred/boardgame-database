description: |
  Railroad Ink: Blazing Red Edition is a roll-and-write network-building game for 1-6 players (combinable up to 12). Each round a set of route dice are rolled and all players must draw those routes on their personal whiteboards, trying to connect exits on each side of the board and build the longest continuous networks. The Blazing Red Edition includes the Meteors and Lava expansion dice modules that add fiery chaos to the standard route-drawing puzzle. Simple to learn but endlessly variable, Railroad Ink works perfectly as a simultaneous-play experience at any table size.
