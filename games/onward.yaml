description: |
  Onward is a competitive card-driven board game published by Skytear Games inspired by MOBA (Multiplayer Online Battle Arena) video games such as League of Legends and DOTA 2. Two teams of players each control a roster of champions with unique asymmetric abilities, battling to destroy the enemy team's nexus — a portal in their base. Players split into teams, each controlling two or more champions and spending action points to activate abilities, maneuver across the map, and coordinate assaults on objectives. The game translates the fast tactical decision-making, team coordination, and escalating power dynamics of the digital MOBA genre into a tabletop format with deep strategic potential.

