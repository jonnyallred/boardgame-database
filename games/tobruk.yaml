description: |
  Tobruk: Tank Battles in North Africa 1942 is a detailed two-player hex-and-counter wargame published by Avalon Hill in 1975, simulating armored combat in North Africa during World War II. Each turn represents 30 seconds of real time and each counter a single vehicle or infantry platoon, with nine scenarios providing varied engagements across three mapboards. Designed by Harold Hock, the game was a finalist for the 1975 Charles S. Roberts Award and is recognized as one of the most granular tank combat simulations of its era.

