description: |
  Regicide is a cooperative fantasy card game for 1-4 players played with a beautifully illustrated standard deck of cards. Players work together to defeat 12 powerful enemies — the Jacks, Queens, and Kings — by playing cards to deal damage before each enemy strikes back and forces discards. Each suit grants a different ability, and the key restriction is that players cannot directly tell each other what cards they hold, requiring clever play and table communication. Elegantly simple rules hide a surprisingly deep cooperative puzzle that scales well from solo to multiplayer.
