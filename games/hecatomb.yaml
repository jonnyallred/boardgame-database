description: |
  Hecatomb is an out-of-print collectible card game released by Wizards of the Coast in August 2005, distinguished by its use of five-sided, stackable plastic cards rather than conventional paperboard. Players build abominations by layering pentagonal cards, with each card's edges connecting to adjacent ones to form increasingly powerful creatures. The game's dark Lovecraftian horror theme and innovative card format generated significant interest at its Gen Con debut, though the product line was ultimately discontinued. Hecatomb represents a bold if short-lived experiment in rethinking the physical medium of CCG cards.

