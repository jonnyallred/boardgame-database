description: |
  Pizza Theory is a precisely three-player abstract game from Eagle-Gryphon Games in which players race to be the first to place all 16 of their toppings on a shared pizza board. On each turn, players place a topping that cannot be adjacent to their own other toppings. Then all players simultaneously select a number 1–6 on their personal die and reveal it — each player's pizza cutter is placed at the matching board position. There is no randomness, but the simultaneous secret selection creates genuine unpredictability in where the cutters land each round. Winner of the 2011 Ion Award for Best Strategy Game and noted for elegant tension in a 15-minute package.

