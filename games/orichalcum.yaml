description: |
  Orichalcum is an adventure strategy game co-designed by Bruno Cathala and Corentin Lebrat in which the mythical civilization of Atlantis is doomed and players have been dispatched to clear an island of monstrous creatures to prepare it as a new home for their people. Players roll custom dice to activate heroes and combat the various monsters threatening the island, managing resources and area control across the tile-based island landscape. Originally published by Catch Up Games and later by Pandasaurus Games for North America, Orichalcum offers a fast-paced and accessible competitive adventure experience set against the backdrop of Atlantean mythology.

