description: |
  The Lord of the Rings: The Two Towers Board Game is a 2002 games adaptation published by Games Workshop tied to the Peter Jackson film. Players engage in combat and adventure scenarios drawn from the second film in the trilogy, featuring iconic locations and characters such as Helm's Deep and the Battle of Isengard. The game won the 2002 Origins Award for Best Science Fiction or Fantasy Miniature Rules. It features miniatures that can be assembled straight from the box and uses a cardboard ruler to facilitate play without the need for a separate tape measure.

