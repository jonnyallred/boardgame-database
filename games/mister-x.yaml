description: |
  Mister X is a 2009 hidden movement board game published by Ravensburger and a modernized successor to the classic Scotland Yard, shifting the fugitive's chase from the streets of London to the whole continent of Europe. One player takes on the role of the elusive criminal Mister X while the remaining players control detectives attempting to track him down. New gameplay mechanics give both Mister X additional tricks for evasion and the detectives new tools for pursuit, including knowledge of Mr. X's intended destination. The game retains the asymmetric tension that made Scotland Yard a Spiel des Jahres winner, refreshed with a continental scale.

