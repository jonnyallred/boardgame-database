description: |
  German Solo is a traditional four-player plain-trick card game played with a 32-card German- or French-suited Skat pack, descended from the 18th-century game of Quadrille. Players bid for the right to declare trumps and decide whether to play alone as a soloist or with a partner; the declaring side must take at least five of the eight tricks to succeed. The game influenced the development of Skat, the most popular German card game, and represents an important link in the evolution of central European trick-taking traditions.

