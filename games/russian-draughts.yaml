description: |
  Russian draughts (Shashki) is a checkers variant that developed in Russia from the 16th-17th centuries after checkers arrived from Europe, with official rules first printed in 1884. Played on an 8x8 board with 12 pieces per player, the game differs from standard checkers through its powerful king movement — Russian kings can move any distance diagonally in any direction, enabling spectacular multi-jump combinations — and the ability to jump forward and backward during captures. Players may choose which sequence of multiple captures to make, adding strategic depth. The first Russian championship was held in 1894, and the first World Championship of Russian draughts took place in 1993, demonstrating its enduring competitive stature.

