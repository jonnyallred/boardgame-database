description: |
  Scarabeo is an Italian word-formation tile game similar to Scrabble, designed by Aldo Pasetti and first commercially published by Editrice Giochi in 1963 after a successful legal defense against a Scrabble lawsuit. Played on a larger 17x17 grid with 130 tiles (including 2 scarab jokers), it differs by rewarding 50 points for using all 8 tiles and 30 points for using 7, encouraging longer words. The game has been a fixture of Italian family game nights for decades and remains the dominant word game in Italy.

