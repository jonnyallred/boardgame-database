description: |
  Martian Dice is a quick press-your-luck dice game designed by Scott Almes and published by Tasty Minstrel Games in 2011. Players roll 13 custom dice and try to abduct humans, chickens, and cows for their alien masters — but must set aside any tank dice rolled, which represent humanity's military resistance, and must have at least as many death rays as tanks to score. After each roll players choose one type of earthling to bank, re-rolling the rest and pressing their luck to collect one of each type for a bonus. Games take about 15 minutes and the game's humor and simplicity make it an ideal filler.

