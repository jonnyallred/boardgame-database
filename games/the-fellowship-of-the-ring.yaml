description: |
  The Fellowship of the Ring is a 1983 two-player strategy board game published by Iron Crown
  Enterprises, the then-holders of the Middle-earth tabletop licensing rights. Using special cards
  and plastic markers, the game allows for hidden movement and deployment, with certain combats
  resolving without revealing the identities of the combatants. One player controls Sauron's forces
  pursuing the Fellowship across Middle-earth while the other commands the heroes trying to reach
  Mordor. The hidden movement and deduction mechanics create an asymmetric cat-and-mouse experience
  thematically appropriate to Tolkien's story of the Fellowship trying to travel undetected through
  a hostile land.

