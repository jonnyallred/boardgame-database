description: |
  The Lonely Mountain: Lair of Smaug the Dragon is a 1984 adventure board game by Iron Crown Enterprises based on J.R.R. Tolkien's The Hobbit. Players control groups of adventurers—dwarves, elves, men, orcs, or freebooters—who sneak into the Lonely Mountain (Erebor) to steal as much of Smaug's treasure as possible. The dungeon is filled with traps, Fell Beasts, Trolls, Giant Spiders, and ultimately the great dragon Smaug himself, who players must escape before he awakens. Supporting 1-6 players, the game blends exploration and press-your-luck tension as players decide how deep to venture before retreating with their loot.

