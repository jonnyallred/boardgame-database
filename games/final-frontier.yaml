description: |
  Final Frontier is a 1980 miniatures game published by Ral Partha in which Terran infantry forces oppose the alien Krudz in tactical sci-fi combat. It is an early entry in the sci-fi miniatures wargame genre, offering players small-unit tactical scenarios in a future conflict setting. Detailed information about mechanics, player count, and full rules is limited in available sources, but the game represents Ral Partha's foray into science fiction gaming alongside their better-known fantasy miniature lines.

