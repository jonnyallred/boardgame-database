description: |
  Tang Garden is a meditative tile-placement and set-collection game for 1–4 players in which players construct a serene Tang Dynasty Chinese garden, balancing elements of water, rock, and greenery. Players take turns placing landscape tiles and optionally placing 3D miniature figures — decorative pagodas, bamboo groves, and stone bridges — to score points based on adjacency, panoramas, and personal character goals. The game's stunning production with detailed 3D miniatures creates a gorgeous table presence, while the underlying mechanics reward careful spatial planning and opportunistic set collection. Tang Garden is equal parts aesthetic experience and tactical puzzle.

