description: |
  Factory Funner is a simultaneous tile-placement puzzle game designed by Corné van Moorsel, originally published by Cwali and refreshed by Allplay in 2021. Players are factory managers competing to install machines and connect their input and output pipes to reservoirs and other machines in the most profitable configuration possible. Each round, all players simultaneously select one machine tile from a shared pool, racing to identify optimal pipe connections before other players grab the tile they want. After eight rounds, the player who has built the most efficient and lucrative factory wins. It is a refresh of the cult classic Factory Fun with updated artwork and components.

