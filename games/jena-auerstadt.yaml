description: |
  Jena-Auerstadt: The Battle for Prussia, 14 October 1806 is an SPI folio wargame simulating the twin Napoleonic battles that crushed Prussia in a single day. Part of the Napoleon at War quadrigame series, it can also be played as a standalone game with only 100 counters, two rules sheets, and a 17x22 inch hex map at 400 meters per hex. One player commands Napoleon's forces, the other the Prussians, in a compact and accessible recreation of one of history's most decisive single-day military engagements. Its simplicity and small footprint make it a strong entry point into Napoleonic hex wargaming.

