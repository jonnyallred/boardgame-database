description: |
  The Isle of Cats Duel is a competitive standalone two-player game designed by Frank West and published by The City of Games in 2023. Players compete to rescue cats from the Isle, drafting lesson and cat cards before placing polyomino-shaped cat tiles onto their boats in order to score points through completed lessons and filled areas. The game was Frank West's first straight-to-retail release and adapts the core appeal of the original Isle of Cats into a tight head-to-head format. The strategic drafting and spatial puzzle creates a satisfying competitive experience in under an hour.

