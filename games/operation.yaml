description: |
  Operation is a classic battery-operated dexterity game originally published by Milton Bradley in 1965 in which players take turns acting as surgeons to remove plastic ailments from the body of the prone patient "Cavity Sam" using metal tweezers. Each opening in Cavity Sam's body contains a named comedic ailment — from "Funny Bone" to "Spare Ribs" — and if a player touches the metal edge of a cavity, the patient's red nose lights up and a buzzer sounds, ending their turn. The game was invented by John Spinello while a student at the University of Illinois and sold to Milton Bradley for just $500. A beloved family classic, Operation remains iconic as an introduction to steady-hand dexterity games and has inspired dozens of licensed editions.

