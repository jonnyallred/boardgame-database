description: |
  Unlock!: Star Wars Escape Game brings the cooperative escape-room card game format to a galaxy far, far away. Three standalone 60-minute scenarios place players as rebels, smugglers, or Imperial agents: breaking out of an Imperial cell and recovering a starship, investigating disturbances in the frozen Rebel base on Hoth, and infiltrating the Holy City of Jedha as a spy to recover kyber crystals. The game uses the standard Unlock! card-search-and-combine system alongside a dedicated Star Wars companion app featuring authentic music and audio ambiance from the films.

