description: |
  Insecta is a board game designed by Phil Eklund and published by Sierra Madre Games in 1992, in which players design mutant insects by selecting a head, front legs, rear legs, appendages, and a tail from a range of body part options. Teams of player-designed insects must then work cooperatively to escape from a Hive by defeating guardian creatures including black widow spiders, praying mantises, and honey bees. The game blends cooperative combat with the creative joy of building customized arthropod creatures, reflecting Eklund's interest in biology and natural systems.

