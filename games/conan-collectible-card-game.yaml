description: |
  The Conan Collectible Card Game is a CCG published by Comic Images in 2006, designed by Jason Robinette, based on Robert E. Howard's sword-and-sorcery character. Players build decks featuring Conan and his allies, battling opponents using combat mechanics that evoke the brutal, fast-paced action of the source material. The game was a later entry in the CCG market and had a limited print run, making it a niche collectible among fans of the Conan license. It is distinct from the earlier Conan trading card sets produced by Comic Images in the early 1990s.

