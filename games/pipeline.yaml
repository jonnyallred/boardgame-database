description: |
  Pipeline is an economic strategy game in which 2–4 players build and operate their own oil refinery networks as governments move toward privatization. Players purchase crude oil, construct networks of pipes (each type refining oil differently), install machines and robots, and fulfill contracts over three increasingly constrained years — starting with 8 actions in year one, down to just 4 in year three. The spatial puzzle of connecting pipe networks to efficiently refine crude oil into valuable products, combined with competitive bidding for machines and upgrades, creates a deeply satisfying economic engine. Lauded for Ian O'Toole's iconic visual design and its rewarding complexity.

