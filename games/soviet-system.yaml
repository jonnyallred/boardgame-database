description: |
  Soviet System is a French board game published by Milton Bradley France in 1988. Players compete to rise
  through the ranks of the USSR Communist Party by rolling dice and answering trivia questions, with the
  ultimate goal of becoming the new Secretary General of the Soviet Union. The game was released exclusively
  in France and blends roll-and-move mechanics with trivia, offering an irreverent satirical look at Soviet
  political structure during the late Cold War era.

