description: |
  Equate is an educational board game published by Conceptual Math Media in which players score points by forming valid mathematical equations on a 19x19 grid in the style of Scrabble, using tiles bearing digits and arithmetic operators instead of letters. Equations must be mathematically correct and appear across or down in crossword fashion, with premium board positions rewarding the use of fractions and division. The game scales from elementary arithmetic to advanced play using optional tile sets with integers, exponents, and negative numbers.

