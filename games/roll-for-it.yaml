description: |
  Roll For It! is a light dice-and-card game by Chris Leder in which players compete to claim target cards by matching the required dice combinations shown on each card. On each turn, players roll their personal set of colored dice, place any matches on target cards, and reroll the remainder — committed dice stay on cards until the target is completed. Three target cards are available simultaneously, creating tactical decisions about which targets to pursue and which opponents to race against. Its minimal rules and 20-minute playtime make it an ideal family filler and introduction to dice games for all ages.

