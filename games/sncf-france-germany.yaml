description: |
  SNCF: France & Germany is a train investment game designed by John Bohrer and published by Rio Grande Games,
  expanding the earlier Paris Connection with a map of Germany alongside France. Players invest in early railroad
  companies, seeking to hold the most stock in the most valuable lines as the network expands across the map.
  Very simple rules conceal deep bluffing and misdirection as players race to build connections without revealing
  their actual investment priorities to opponents.

