description: |
  Burg der 1000 Spiegel (Castle of 1000 Mirrors) is a clever physical puzzle game published by Ravensburger in 2009, featuring a friendly vampire named Victor and his castle. The game box itself forms the castle, with three windows on each side — one open, others showing hidden items. Players use four mirrors inserted at 45-degree angles to reflect images of objects out of the single open window, racing to correctly position mirrors to help Victor locate misplaced items. The physical mirror-manipulation mechanic is uniquely hands-on and delightful for young players.

