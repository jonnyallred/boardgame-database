description: |
  Magic Maze is a real-time cooperative game for one to eight players in which four fantasy heroes must rob a mall and escape before the sand timer runs out. Each player controls a specific directional action for all heroes — one player moves everyone north, another south, and so on — but players are normally forbidden from speaking, communicating only through a large "Do Something!" pawn they can shove at a teammate. The game's 17 escalating scenarios introduce new rules gradually, making it both a great gateway game and a deceptively tense puzzle. It was a Spiel des Jahres nominee in 2017.

