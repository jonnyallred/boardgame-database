description: |
  Sergeant Preston is a children's board game published by Milton Bradley in 1956, based on the television series Sergeant Preston of the Yukon (1955-1958). Players take on the role of Canadian Mounties helping Sergeant Preston track and capture criminals like Weasel Willie and Klondike Pete across Yukon wilderness locations. The game involves finding "Wanted" cards and matching "Contact" cards to make captures, reflecting the simple deduction-and-movement mechanics common in TV tie-in games of the era.

