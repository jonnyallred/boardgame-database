description: |
  Piepmatz (Little Songbirds) is a charming card game in the "big game in a small box" tradition from Lookout Games, designed by Matt Riddle and Ben Pinchback. Players compete to fill the bird feeder by placing birds from their hand into queues; when the combined strength of birds in a queue exceeds the lead bird's value, that bird is pushed out and takes a seed card with it. Players score points for collected seeds, pairs of male-and-female birds of the same species, and having the most birds of a single species. Squirrel and crow cards introduce take-that disruption. The game rewards thoughtful hand management in a compact, visually appealing package.

