description: |
  Hitler's Last Gamble is a two-player operational-level board wargame published by 3W in 1989, simulating the Battle of the Bulge—Germany's final major offensive in the West during World War II in December 1944. Players command either Allied or German forces across two paper maps, contesting critical Belgian and Luxembourg terrain. The game focuses on the desperate German attempt to split Allied lines and capture the port of Antwerp, while the Allied player scrambles to stem the breakthrough and counterattack.

