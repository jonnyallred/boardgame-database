description: |
  American Megafauna is a 1997 science-based evolution game by Phil Eklund, published by Sierra
  Madre Games, in which players guide species through millions of years of evolution following the
  extinction of the dinosaurs. Players begin as one of four broad archetypes and branch into new
  species by bidding on genotype and DNA cards with gene coins from a shared gene pool.

  The game incorporates genuine evolutionary biology: Milankovich climate cycles, dentition types,
  and ecological niches all affect which species thrive. DNA cards allow players to create bizarre
  chimeric creatures — cud-chewing crocodiles, saber-toothed camels — as nature's arms race unfolds.
  Notoriously complex and scientifically dense, it was later succeeded by Bios: Megafauna (2011), a
  more accessible redesign that retained the core evolutionary concepts.

