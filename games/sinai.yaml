description: |
  Sinai: The Arab-Israeli Wars is a hex-and-counter wargame published by SPI in 1973, designed by James F. Dunnigan and his SPI team under extraordinary circumstances — the game was rushed to publication within weeks of the 1973 Yom Kippur War ceasefire, updating their planned hypothetical Middle East conflict game with actual battlefield data from newspaper and television reports. The game covers three Arab-Israeli conflicts: the 1956 Suez Crisis, the 1967 Six-Day War, and the 1973 Yom Kippur War, and became one of SPI's best-selling titles of the decade.

