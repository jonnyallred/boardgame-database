description: |
  Rumble Nation (originally Tenka Meidou) is a 2-4 player area control dice game from Japan that won the 2018 Tokyo Game Market Awards Grand Prize. Players roll dice to deploy forces across a feudal-Japan-inspired map, competing for territory control using once-per-game special abilities that add memorable swingy moments. The impulse-area system means control can shift dramatically in a single turn, producing intense short games packed with tactical decisions. Its accessible ruleset and high energy make it a standout filler from the Japanese board game scene.
