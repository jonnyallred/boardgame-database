description: |
  Andantino is a two-player abstract strategy game invented by David Smith, the creator of Trax.
  Players take turns placing hexagonal tiles in two colors on an empty surface, building the board
  as they play. Victory is achieved either by surrounding at least one opponent tile with tiles of
  your own color, or by forming a chain of five hexagons in your color.

  The emergent-board mechanic means neither player controls the shape of the playing field, creating
  a dynamic spatial puzzle that changes with every placement. The game can also be played on
  hexagonal paper using two colored pens, requiring no components at all. It is published by
  Nestorgames as a compact, elegant abstract.

