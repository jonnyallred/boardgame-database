description: |
  Ka-Bala is a glow-in-the-dark divination board game published by Transogram in 1967, combining elements of the Ouija board, Tarot, and astrology into a single occult-themed experience. Unlike traditional talking boards, Ka-Bala uses a large black marble that rolls around a circular track lined with letters, numbers, and Yes/No indicators. Players rest their fingers on "solary projector" handles at either side of the board. Listed by the Museum of Talking Boards as the "weirdest talking board," Ka-Bala is a fascinating curiosity of 1960s pop occultism and novelty game design.

