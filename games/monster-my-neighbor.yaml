description: |
  Monster My Neighbor is a bluffing and deduction card game published by Z-Man Games in 2015, designed by Pesu Nabeno. Players secretly hold identity cards identifying them as either a human or a hidden monster, and use voting and deduction mechanics to figure out which neighbors are actually monsters in disguise. The game combines lighthearted social deduction with short, snappy rounds, making it an accessible filler for mixed groups of adults and older children. Multiple international publishers including dV Giochi and Filosofia Editions distributed regional editions of the game.

