description: |
  The Succession Wars is a 1987 grand strategy board game published by FASA and designed by L. Ross Babcock III, set in the BattleTech universe's 3025 era during the conflict between the Great Houses of the Inner Sphere. Two to five players take the roles of the five Successor Lords—Katrina Steiner, Hanse Davion, Theodore Kurita, Maximilian Liao, and Janos Marik—competing for dominance of the Inner Sphere through military conquest, political maneuvering, and industrial production. The game serves as the grand strategic layer above BattleTech's tactical mech combat and is prized by BattleTech fans as one of the few games to let players experience the full scope of the 31st century's endless wars.

