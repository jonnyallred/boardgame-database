description: |
  Exit: The Game – The Polar Station is a 2017 entry in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players are stranded in an Arctic research station after an accident, with dwindling resources and a spreading danger forcing them to solve a series of puzzles to save themselves. The icy polar setting creates a sense of isolation and urgency that enhances the escape room atmosphere. Like all EXIT titles, no app is required — puzzles are solved using the series' distinctive code dial, and some components may be permanently modified as part of the challenge.

