description: |
  The Napoleonic Wars (1805-1815) is a 2002 card-driven wargame by GMT Games designed by Mark McLaughlin, using a point-to-point movement system rooted in Mark Herman's We the People system. Two to five players command the great powers of Napoleonic Europe—France, Britain, Austria, Russia, and Prussia—managing armies, fleets, and diplomacy through strategy cards that serve dual functions as events or command points. When armies collide, battle cards are played and dice are rolled to resolve engagements and inflict casualties. The Diplomatic Track creates constant tension as alliances shift, and the game is praised for packing exceptional strategic depth into a relatively accessible ruleset.

