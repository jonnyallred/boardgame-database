description: |
  PanzerBlitz is a landmark tactical hex-and-counter wargame published by Avalon Hill in 1970, simulating armored combat on the Eastern Front of World War II at the company and platoon level. Designed by James Dunnigan, it was the best-selling board wargame in North America throughout the 1970s and pioneered geomorphic mapboards that can be combined in various configurations to create different battlefields across twelve included scenarios. The game board hexes represent 250 meters and each turn six minutes of combat time, providing an authentic simulation of combined arms tactics with tanks, infantry, artillery, and anti-tank guns. PanzerBlitz is widely credited with popularizing the entire genre of tactical-level hex wargames and spawned companion titles Panzer Leader and The Arab-Israeli Wars.

