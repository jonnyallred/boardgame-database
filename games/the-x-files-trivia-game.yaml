description: |
  The X-Files Trivia Game is a 1997 trivia party game published by 20th Century Fox Home Entertainment at the peak of the television series' popularity, covering Seasons 1 through 3 of the show. Players answer questions about the paranormal investigations of FBI agents Mulder and Scully, testing their knowledge of episodes, characters, and the show's complex mythology. Released as a VHS video trivia game format that was popular in the 1990s, the game served as an interactive companion piece for die-hard fans of the sci-fi phenomenon. Like most licensed trivia games of its era, it is primarily of interest to collectors and fans of the original series.

