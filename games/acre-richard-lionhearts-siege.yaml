# Description
description: |
  A two-player wargame published by SPI in 1978 simulating the Siege of Acre in 1191
  during the Third Crusade. Richard I of England (the Lionheart) led the Crusaders
  to capture the fortified port city of Acre from Saladin's forces. The game models
  the siege operations, supply lines, and counterattack attempts in the traditional
  SPI hex-and-counter format. A historical wargame covering one of the pivotal
  engagements of the Crusades.

