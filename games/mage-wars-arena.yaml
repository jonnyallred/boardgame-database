description: |
  Mage Wars Arena is a customizable strategy dueling game that merges the depth of collectible card games with miniature-style tactical arena combat. Each player is a powerful mage — Wizard, Warlock, Beastmaster, or Priestess — who builds a custom spellbook from over 300 available spells before the game. Unlike deck builders, the game is not collectible and there is no random card draw; players choose exactly which spells to cast from their open spellbook, enabling highly strategic play. The game won numerous awards on release and is celebrated for its unparalleled strategic depth among two-player games.

