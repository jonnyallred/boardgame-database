description: |
  Zoowaboo is a spatial estimation game in which players secretly vote each round on whether
  all ten animal cards arranged around a raft can physically fit on it. Those who voted yes flip a
  sand timer and work as a team to prove it; those who voted no observe. The team that guessed
  correctly wins points for that round. The push-your-luck tension of the yes/no vote and the
  frantic physical puzzle of fitting oversized animals onto an undersized raft creates delightful
  family chaos. It won the 2009 Årets Spill Best Children's Game award.

