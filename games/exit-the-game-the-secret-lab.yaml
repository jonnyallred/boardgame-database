description: |
  Exit: The Game – The Secret Lab is one of the three original 2016 entries in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players find themselves trapped in a secret research facility where sinister experiments have been underway, and must crack codes, disable mechanisms, and solve interconnected scientific puzzles to escape. With a difficulty rating of 3 out of 5, The Secret Lab is a mid-range challenge that helped establish the series' reputation for clever, thematically coherent puzzle design. It remains one of the most popular and widely played titles in the EXIT series.

