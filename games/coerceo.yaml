description: |
  Coerceo is a two-player abstract strategy game with a uniquely shrinking board. The playing field consists of 19 hexagonal tiles arranged in a honeycomb; whenever a tile has three open edges and no pieces on it, it is removed, constantly reshaping the battlefield and keeping players close. Movement is diagonal by one space to a vacant tile, and a piece is captured when it is completely surrounded by the opponent's pieces or the board edge. With only one type of piece and one type of move, rules can be taught in minutes, yet the emergent strategic depth from the dissolving board gives the game a distinctive feel unlike Chess or Go. It won the MENSA Mind Games award in 2012.

