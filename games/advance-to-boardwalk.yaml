description: |
  Advance to Boardwalk is a 1985 Parker Brothers game set in the world of Atlantic City's famous Boardwalk, using a hotel-building mechanic inspired by Monopoly. Players roll three dice — two numeric and one color die — to determine how many hotel floors they can place on which color group of properties each turn. Players race up the Boardwalk track as their property values rise, and can "take over" rivals' hotels by building even higher, with the first player to reach $35 million in property value winning. Fortune Cards add chaos and variability through construction bonuses and random events like natural disasters.

