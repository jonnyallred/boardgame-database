description: |
  Das Kleine Gespenst (The Little Ghost) is a children's board game designed by Kai Haferkamp in 2005, published by Kosmos Verlag, based on Otfried Preussler's beloved children's book of the same name. Players accompany the little ghost through Castle Eulenstein, using a magical magnetic key to open doors and find the matching pictures revealed by a clock mechanism — earning cannonball tokens for correct discoveries. The game won the Kinderspiel des Jahres (German Children's Game of the Year) award in 2005, recognized for its charming magnetic door-opening mechanism, atmospheric castle box, and accessible play for young children.

