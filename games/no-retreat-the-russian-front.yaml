description: |
  No Retreat! The Russian Front is a card-driven hex wargame designed by Carl Paradis, originally published by Victory Point Games in 2008 and republished in a deluxe edition by GMT Games in 2011. The game covers the German-Soviet war on the Eastern Front from 1941 to 1945 at the operational level, blending classic hex-and-counter movement with a card system where each major power's 55-card deck drives events, special actions, and operational decisions. German units have two steps while Soviet units are rebuilt from scratch, modeling historical attrition asymmetry. Its accessible rules and story-driven design made it a landmark entry in card-driven wargaming.

