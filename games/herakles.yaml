description: |
  Herakles is a microgame in which players receive two cards each round handed to them by their neighbors and must play one of them. Players try to place heroic deed cards in their play area, but if a player places a third heroic deed, the gods deem them too heroic and they are eliminated from the game. The tension lies in managing what you take and what you pass, navigating the constraint of exactly two deeds allowed in your area. Specific publisher and release year details could not be confirmed from available sources.

