# Description
description: |
  Ace of Aces: Wingleader is a World War II aerial combat game published by Nova
  Game Designs in 1988, adapting the innovative picture-book game system of the
  original Ace of Aces to the WWII era. Two players each hold illustrated
  booklets depicting the view from their cockpit; simultaneous selection of
  maneuver numbers determines the next page each player turns to, showing the
  result of the dogfight.

  Wingleader introduces formation flying and tactical coordination elements that
  distinguish it from the original WWI Ace of Aces series. The no-dice, no-board
  system creates a unique experience where the booklets themselves are the game
  components. Players can also combine sets with the original Ace of Aces for
  cross-era play.

