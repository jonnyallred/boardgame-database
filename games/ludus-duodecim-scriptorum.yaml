description: |
  Ludus duodecim scriptorum ("game of twelve lines") was a popular Roman board game and a forerunner to backgammon, played on a board of three rows of twelve points each. Two players raced fifteen pieces each around the track, using three cubic dice (later astragali) to determine movement, with the goal of bearing all pieces off the board first. Archaeological evidence of boards has been found across the Roman Empire — carved into stone floors in the Forum and Colosseum — and the game is frequently mentioned in Roman literature. It was eventually superseded by tabula (which used a two-row track), the direct ancestor of modern backgammon.

