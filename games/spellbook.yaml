description: |
  SpellBook is a 1–4 player fantasy game by Phil Walker-Harding published by Space Cowboys in 2023, set in the world of the Annual Grand Rite where players compete to become the greatest wizard. Each player, accompanied by a familiar, possesses a grimoire and collects Materia to master spells. With over 2,100 possible spell combinations across various grimoire configurations, every game offers a vastly different strategic experience. The clever combination of set collection and resource management rewards players who build efficient spell chains and adapt their strategy to the available Materia.

