description: |
  Animouv is a 2016 abstract strategy game published by Djeco, designed by Martin Nedergaard
  Andersen and illustrated by Philip Giordano. Players share a single board populated with
  colorful animal tokens and secretly hold an objective card showing three animals that must
  be aligned horizontally, vertically, or diagonally to win.

  On each turn, a player moves any animal one space, advancing their own secret alignment while
  trying to disrupt what they suspect opponents are building. The shared board and hidden goals
  create a puzzle of deduction and misdirection: every move must be evaluated for how it helps
  your objective without revealing it. The game's colorful animal artwork and accessible rules
  make it an elegant family abstract.

