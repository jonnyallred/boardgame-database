description: |
  Throw Throw Burrito is a 2019 dodgeball card game from the creators of Exploding Kittens, billed as the world's first dodgeball card game. Players simultaneously collect matching sets of cards to earn points, but certain card combos trigger Burrito Battles or Duels that force players to grab and hurl squishy foam burritos at each other—getting hit costs points. The frenetic real-time set collection combined with actual physical burrito-throwing creates chaotic, hilarious chaos that plays in about 15 minutes. Its physical energy and simplicity make it a standout party and family game for ages 7 and up.

