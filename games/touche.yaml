description: |
  Touché is a two-player abstract strategy game designed by Howard Wexler in 1977 in which players attempt to get four pieces of their color in a row horizontally, vertically, or diagonally. The game's standout feature is its magnetic board with repositionable strips, which creates 245,760 possible board configurations and allows players to flip pieces by touching the color — adding a spatial puzzle element to the connection game format. The game was nominated for the 1979 Spiel des Jahres when republished by Parker Brothers, and won the Mensa Select Prize.

