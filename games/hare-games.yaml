description: |
  Hare Games refers to a family of ancient Celtic board games featuring hare imagery, related to the broader tradition of hunt games where one side defends while the other pursues. Like the similar Welsh and Irish folk games, hare games appear in medieval archaeological and literary contexts across Britain and Ireland, though the specific rules of each variant differ. The exact game mechanics and original rules are not fully documented, making them primarily of historical and anthropological interest; modern reconstructions exist but vary by source.

