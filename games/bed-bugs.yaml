description: |
  Bed Bugs is a motorized dexterity game published by Milton Bradley in 1985 in which
  players use oversized tweezers to pluck plastic bugs off a vibrating bed before their
  opponents. The motorized bed shakes continuously, making the bugs bounce and scatter,
  requiring quick reflexes and steady hands. The first player to collect all their colored
  bugs wins. The game was re-released multiple times due to its enduring popularity
  with young children who enjoy its tactile, competitive format.

