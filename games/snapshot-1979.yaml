description: |
  Snapshot is a 1979 miniatures wargame published by Game Designers' Workshop, designed by Marc W. Miller as
  an adaptation of the Traveller RPG combat rules for starship boarding actions. Players simulate close personal
  combat aboard spacecraft in the far future, using deck plans of a Type-S scout vessel and Type-A free trader
  scaled for 15mm miniatures or cardboard counters. The game's tight corridors and tactical positioning make for
  tense, lethal engagements in the classic science fiction tradition.

