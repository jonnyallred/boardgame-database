description: |
  Assyria is a strategy game set in ancient Mesopotamia where players lead tribes competing to develop the fertile crescent between two great rivers. Players build ziggurats as permanent outposts of power, construct wells to expand into desert regions, make offerings at temples, and curry favor with the nobles of Assur to score points. The clever interplay between the fertile and desert areas, combined with tight resource management and contested control of sacred sites, creates a rewarding Euro experience with strong historical flavor. Originally published by Ystari in 2009, a redesigned second edition was later Kickstarted by Garphill Games.

