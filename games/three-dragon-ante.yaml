description: |
  Three-Dragon Ante is a 2005 card game designed by Rob Heinsoo and published by Wizards of the Coast, presented as a real-world version of a gambling game played in the Dungeons & Dragons universe. Using a 70-card deck of dragons and mortals (each with a strength from 1-13 and a special ability), 2-6 players compete in gambits that mix poker-style pot mechanics with strategic card play. The game appears as an in-world game in official D&D campaigns and can double as a prop for tabletop RPG sessions where player characters might gamble at a tavern. A sequel, Emperor's Gambit, was published in 2010.

