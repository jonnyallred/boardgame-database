description: |
  Attila is a two-player abstract strategy game in which players take turns placing tiles on a grid, leaving behind impassable "scorched earth" as Attila's armies advance. On each turn a player moves their piece like a king in chess and places a barrier tile on the space just vacated. The player who cannot move loses. Simple to learn but rich in tactical depth, Attila distills territorial denial and movement planning into a quick, tense duel.

