description: |
  Nuns on the Run is a hidden movement game for 2-8 players set in a convent where one player controls the Abbess and Prioress as guards, while all others secretly play novices trying to fulfill secret wishes and return to their rooms undetected. Novice players secretly track their own movement on log sheets, choosing to stand still, sneak, walk, or run, while the guards move openly on the board searching for rule-breakers they can hear or see. The tension mounts as novices must grab keys, collect their secret item, and sneak back to their cell before the guards catch a set number of intruders. It is a clever cat-and-mouse game that rewards careful planning and lucky timing in equal measure.

