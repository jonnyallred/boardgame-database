description: |
  Taboo is a classic team-based party word game designed by Brian Hersch and
  published by Parker Brothers in 1989, now produced by Hasbro. One player
  tries to get teammates to guess a secret word on a card, but is forbidden
  from saying that word or five additional "taboo" words listed beneath it.
  An opposing team member monitors with a buzzer and penalizes any violations.
  The game is purely verbal — no gestures or drawings allowed — creating hilarious
  moments as players contort their descriptions. With its simple premise and
  broad appeal, Taboo remains one of the most popular party games for groups
  of four or more.

