description: |
  Blood Royale is a board game designed by Derek Carver and published by Games Workshop
  in 1987, set in a slightly rearranged 14th century Europe where up to five players
  guide royal dynasties through the ages. Players tax provinces, conquer territory,
  arrange marriages to forge alliances, and trade resources — cloth, metal, food, wine,
  and gold — to accumulate the most money by game's end. The game was quickly withdrawn
  and is now out of print, becoming a collector's item; Fantasy Flight Games later
  acquired rights to it along with other vintage Games Workshop titles.

