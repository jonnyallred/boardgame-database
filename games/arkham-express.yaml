description: |
  Arkham Express is a cooperative dice-based game set in the Arkham Horror universe,
  designed by David Willems. Players work together to combat the Lovecraftian horrors
  threatening Arkham, using dice mechanics to determine outcomes. The game serves as
  a lighter, faster entry into the Arkham Horror setting, stripping away complexity
  while retaining the atmospheric tension of the franchise. Specific publisher details
  and release year are not well-documented in English-language sources.

