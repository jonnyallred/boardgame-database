description: |
  Shadow Hunters is a hidden role game designed by Yasutaka Ikeda in which players are secretly assigned to one of three factions: Shadows (supernatural monsters), Hunters (humans who must eliminate them), or Neutrals (with individual objectives). Players explore a board of six locations using card and movement effects to deduce each other's identities while trying to eliminate enemies and fulfill their secret win conditions. The game's balance of aggressive deduction and paranoid social play made it a popular choice in the hidden role genre before falling out of print.

