description: |
  You Robot is a real-time team party game in which each team has one Scientist and one Robot.
  The Scientist must silently direct their Robot partner to adopt a specific physical pose by
  showing them movement cards — without saying a word. The first team whose Robot correctly
  strikes the required position earns a point, and the first team to five points wins. The
  non-verbal communication challenge makes it a hilarious and energetic party experience.

