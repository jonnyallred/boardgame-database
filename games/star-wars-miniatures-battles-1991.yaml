description: |
  Star Wars Miniatures Battles is a 1991 skirmish miniatures wargame published by West End Games, winner of the Origins Award for Best New Miniatures Rules of 1991. Designed by Stephen Crane and Paul Murphy, the rules use a d6 system with straight skill rolls and opposed rolls to resolve combat, with stats compatible with the West End Games Star Wars roleplaying game. At a scale of one miniature per soldier, the game emphasizes tactical positioning and squad-level combat in the Star Wars universe. A second edition followed in 1993.

