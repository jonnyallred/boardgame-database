description: |
  Dirtside II is a comprehensive science fiction miniatures wargame designed by Jon Tuffley and published by Ground Zero Games in 1993, designed for use with 1:300/1:285 scale miniatures. The rules simulate combined-arms science fiction battles from platoon up to battalion level, covering infantry, armored fighting vehicles, artillery, aerospace support, landing operations, and combat walkers. The system is deliberately generic, allowing it to be applied to virtually any science fiction setting or "future history," making it a flexible toolkit for miniature enthusiasts who want to stage large-scale ground combat.

