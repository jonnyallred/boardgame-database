description: |
  1849: The Game of Sicilian Railways is an 18xx railroad investment game set in Sicily from 1849 to 1922, designed by Chris Lawson and Federico Vellani. Players take on the roles of railroad investors, promoters, and company presidents with the general objective of accumulating personal wealth through savvy stock market moves and efficient route building across the distinctive Sicilian map. Like all 18xx titles, the game alternates between stock rounds — where players buy and sell shares — and operating rounds, where companies lay track, build stations, and run trains. The island setting creates unique geographic constraints that distinguish it from other entries in the series.

