description: |
  Epic Spell Wars of the Battle Wizards: Duel at Mt. Skullzfyre is a chaotic card game designed by Rob Heinsoo, Cory Jones, and Nick Edwards, published by Cryptozoic Entertainment in 2012. Players are outlandish battle wizards competing to be the last one standing by constructing three-part spells from Source, Quality, and Delivery cards — each combination producing wildly different effects at varying power levels. The game embraces absurdist humor and over-the-top artwork, with a fast and lethal combat system where dead wizards respawn with bonus cards. Epic Spell Wars is beloved for its irreverent tone, take-that mechanics, and the gleeful chaos that erupts when complex spells collide.

