description: |
  Abacus Checkers is an abstract strategy game played on an abacus-like board where one player controls the up-beam pieces and the other controls the down-beam pieces. The rules draw from three distinct traditions — Halma-type movement, Checkers-type captures, and Go-type territory concepts — creating a hybrid that rewards players familiar with multiple classic abstract games. The unusual board structure and blended ruleset give it a novel feel distinct from any of its parent games.

