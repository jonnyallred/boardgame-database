description: |
  Tulip Bubble is an economic card game published by Moaideas Game Design in 2015, set during the famous Dutch Tulipmania of 1636-1637 — history's first recorded economic bubble. Players speculate and trade on the tulip market, attempting to buy low and sell high while the bubble inflates, then bail out before it bursts. The game captures the frenzy and comedy of speculative fever in a quick, accessible format suitable for family play.

