description: |
  Triominoes is a triangular variant of dominoes invented by Allan Cowan and first published in 1965 by Pressman Toy Corporation. Each of the 56 tiles is an equilateral triangle with a number (0-5) on each corner, and players take turns matching corners to extend the layout on the table. Points are scored for successful placements, with bonus points for completing triangular "bridges." The game is a family-friendly classic that adds spatial challenge to the familiar domino-matching formula.

