description: |
  Koenigspiel (King's Game) is a 1780 wargame designed by Dr. Helwig for the Duke of Brunswick, played on a modified chessboard of nearly 2,000 color-coded squares representing terrain features such as open ground, marshes, rivers, and built-up areas. It was a significant advancement over chess in terrain representation and is considered a direct precursor to the Prussian Kriegsspiel and modern military simulation. While still abstract by later standards, Helwig's game introduced the fundamental concept of terrain-differentiated movement that would define the military wargaming tradition for the next two centuries.

