description: |
  Virgin Queen: Wars of Religion 1559-1598 is a grand strategy game for two to six players designed by Ed Beach and published by GMT Games in 2012. Set during the turbulent late 16th century, it covers the military, political, and religious conflicts across Europe during the reigns of Elizabeth I of England and Philip II of Spain — an era of proxy wars, Protestant Reformation, colonial expansion, and dynastic rivalry. Players control the major European powers and must manage military campaigns, religious influence, diplomatic manoeuvring, and event cards, making it one of the most comprehensive and acclaimed games of the GMT catalogue.

