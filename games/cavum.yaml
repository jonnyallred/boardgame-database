description: |
  Cavum is a Euro strategy game by Stefan Feld, published by Queen Games in 2008, in which players dig tunnels through a mountain, establish mining stations, discover gem veins, and transport precious stones to surrounding cities for sale. Players build interconnected tunnel networks to access valuable gem deposits, then construct stations at key junctions to control the flow of goods from mine to market. The game rewards careful network planning and forward-thinking route construction. Cavum is a mid-weight economic network-building game that showcases Feld's talent for elegant resource optimization.

