description: |
  Zendo is an inductive logic game in which one player (the Master) creates a secret rule governing
  arrangements of Icehouse pyramid pieces, called koans. The other players (Students) take turns
  building structures and learning whether they follow or break the rule, trying to deduce its
  nature through scientific reasoning. The first Student to correctly identify the rule wins.
  The 2003 boxed set won Best Abstract Board Game at the Origins Awards and the 2005 Mensa
  Select award.

