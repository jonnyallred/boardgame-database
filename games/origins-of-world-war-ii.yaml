description: |
  Origins of World War II is a diplomatic strategy game published by Avalon Hill in 1971 in which 2-5 players each represent a major world power — the USA, France, UK, Russia, or Germany — during the critical years 1933 to 1939. Each player pursues their country's diplomatic objectives while preventing others from achieving theirs, with each turn representing a year and the game ending in 1939 at the outbreak of actual war. Designed by Peter Dunnigan (based on his Origins of World War I game), the game was recognized as an excellent classroom tool for teaching the diplomatic dynamics that produced the Second World War, and Avalon Hill kept it in their catalog primarily for the educational market despite its modest commercial performance.

