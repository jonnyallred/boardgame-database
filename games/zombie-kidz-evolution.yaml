description: |
  Zombie Kidz Evolution is a cooperative legacy game designed for young children in which players
  defend a school from zombie invasion by moving between classrooms, eliminating zombies, and
  locking the school's gates to win. The legacy system, delivered through thirteen sealed envelopes
  opened as milestones are achieved, gradually adds new rules and powers that grow with the
  players' skill. The progressive campaign and accessible zombie theme make it one of the most
  successful children's board games ever designed.

