description: |
  MechWar '77 is a two-player tactical wargame published by SPI in 1975, designed by James Dunnigan as an update of the Panzer '44 rules system to a Cold War modern setting. The game simulates hypothetical armored combat in the 1970s across eight scenarios depicting a Soviet-American clash in West Germany, plus scenarios drawn from the Yom Kippur War and a Sino-Soviet conflict. Its Simultaneous-Sequential Play System (SSPS) was a significant innovation that allowed greater realism while maintaining playability, and the game placed 44th in SPI's 1976 popularity poll of 202 wargames.

