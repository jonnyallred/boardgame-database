description: |
  Dragon Hordes is a large-scale fantasy wargame set on the world of Eorthe, where six asymmetric factions — the Theofas (continental humans), Alefs (elves), Dhurgoths (dwarves), the Forgotten (humans with dinosaurs), Selicum (island mixed-race with sea creatures), and Swaerthan (Chaos/undead) — fight over drying magical Eorthewells. The game is designed for miniature figures but ships with cardstock counters covering dragons, catapults, giant insects, wizards, flying machines, cannons, naval ships, and more across land, air, and sea combat. Players wage large battles on multiple fronts in a system reminiscent of Warhammer, capturing the epic scale of a planet-girdling war.

