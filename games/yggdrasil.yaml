description: |
  Yggdrasil is a cooperative Norse mythology game in which one to six players take the roles of
  gods — Odin, Thor, Tyr, Frey, Freyja, and Heimdall — defending the world tree from the forces
  of Ragnarök. Players must fend off iconic enemies including Loki and his minions across a
  three-dimensional board representing the nine worlds. Each deity has unique powers that must be
  coordinated strategically to hold back the inevitable end of the world.

