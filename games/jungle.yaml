description: |
  Jungle (also known as Dou Shou Qi in its Chinese original or Jungle King in the British Waddingtons edition) is a two-player abstract strategy game in which each player commands eight animal pieces of different ranks — from elephant down to mouse — attempting to capture the opponent's den. Higher-ranked animals capture lower-ranked ones, but the mouse can capture the elephant, and special terrain (rivers and traps) create unique tactical rules. First published in the West by Waddingtons in the 1950s, Jungle is a deeply thematic abstract that introduces children to layered strategic thinking through its animal hierarchy.

