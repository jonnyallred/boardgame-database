description: |
  Wicketz is a cricket simulation board game designed by Alf Compton and first published in 1988-1989, simulating the sport with impressive depth using 246 playing cards that provide twelve batting strokes and nine bowling deliveries. The bowler selects pace or spin, draws a card to deliver, and the batsman responds based on cards drawn, with dice determining outcomes. The game supports various match formats from 40-over games to full two-innings Test matches, making it a detailed recreation of cricket for enthusiasts of the sport.

