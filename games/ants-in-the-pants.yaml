description: |
  Ants in the Pants is a 1969 children's dexterity game originally published by Schaper (now Hasbro),
  in which players press on the backs of plastic ant pieces to launch them through the air and into
  a pair of plastic pants at the center of the table. The speed and angle of the finger release
  determines how far and high the ant flies.

  The first player to successfully land all four of their ants in the pants wins. Simple enough for
  toddlers yet chaotic enough to entertain family groups, the game has been a perennial classic in
  children's game collections for over 50 years, with Hasbro continuing to publish updated editions.

