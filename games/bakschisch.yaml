description: |
  Bakschisch is a 1995 bluffing and bidding card game designed by Alex Randolph and published by Amigo Spiele, set in a Middle Eastern marketplace where players bribe their way to fortune. Players play cards representing bribes to influence the outcome of auctions, trying to win valuable goods while spending as little as possible. The word "bakschisch" (baksheesh) refers to the practice of tipping or bribery in the Middle East and South Asia, and the game's theme of paying off rivals captures that spirit. Randolph's signature blend of social interaction and light strategy makes it an entertaining filler.

