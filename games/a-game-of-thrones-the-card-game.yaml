# Description
description: |
  A Living Card Game (LCG) set in George R.R. Martin's Westeros, originally released
  as a collectible card game in 2002 and later transitioned to the LCG model. Players
  build decks around one of the Great Houses — Stark, Lannister, Baratheon, Targaryen,
  and others — and compete to earn 15 power points by winning challenges (military,
  intrigue, power) against opponents. A unique plot card system creates a hidden
  planning phase each round. A second edition with revised rules was published in 2015.
  Designed by Eric Lang, the game is notable for its deep faction asymmetry and
  political intrigue mechanics.

