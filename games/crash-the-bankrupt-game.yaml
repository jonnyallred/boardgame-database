description: |
  Crash! The Bankrupt Game is a card game in which players compete to force all opponents into bankruptcy by depleting their cards both in hand and in play. Published in a bilingual Italian/English edition, the game uses card play to attack opponents' financial positions while protecting one's own. The bankruptcy theme and simple rules make it an accessible economic card game suitable for family play. Limited information is publicly available about the game's original publisher and designer.

