description: |
  Batik is a two-player abstract stacking game published by Gigamic in 1988, designed by Thierry Denoual. Players take turns choosing one of 28 uniquely shaped transparent plastic pieces and placing it into a vertical frame, watching as pieces stack up and create colorful patterns. The player who causes a piece to fall out the bottom of the frame loses. Strategy involves choosing pieces that will stack stably for yourself while creating precarious arrangements for your opponent. The transparent, colorful pieces create visually striking abstract patterns — evoking the Indonesian batik textile art form — making it as much a visual spectacle as a game.

