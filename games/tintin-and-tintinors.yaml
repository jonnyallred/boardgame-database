description: |
  Tintin & Tintinors is a vintage set collection board game from 1962 themed around Hergé's beloved Belgian cartoon character Tintin. Players collect themed items associated with Tintin's adventures, such as rum, an umbrella, a music score, and walking sticks. As an early officially licensed Tintin game, it is primarily of interest to collectors of Tintin memorabilia and vintage board games.

