description: |
  Bataille de la Marne 1914 is a French hex-and-counter wargame simulating the First Battle of the Marne, the pivotal September 1914 engagement that halted the German advance into France and ended the war of movement on the Western Front. Players command French and British forces attempting to exploit the gap that appeared between the German First and Second Armies, while the German player must hold or withdraw. The game is part of a tradition of francophone wargame publishing and represents a simulation of one of World War I's most decisive early battles.

