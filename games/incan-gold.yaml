description: |
  Incan Gold is a quick and thrilling push-your-luck game where players simultaneously
  decide each turn whether to press deeper into a ruined temple or retreat to safety with
  their accumulated treasure. Each round a card is flipped from the deck—it either reveals
  more riches shared among remaining explorers, or a hazard that causes everyone still inside
  to lose their unbanked loot. The tension of watching others leave (and taking their share
  of the gold) or stay (risking the same hazard twice) makes every decision agonizing and
  hilarious for 3-8 players.

