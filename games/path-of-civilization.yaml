description: |
  Path of Civilization is a simultaneous-action civilization game for 1-5 players that condenses the grand sweep of human history into a single session. Each phase plays out simultaneously as players research technologies, fight challenges, wage epic battles, recruit leaders, and construct wonders. The game captures all the core pillars of a civilization game — tech trees, leaders, wonders, combat — while maintaining a brisk pace through its simultaneous-play structure. Variable setup ensures different civilizations emerge each game, offering high replayability.
