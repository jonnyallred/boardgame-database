description: |
  Greyhawk Wars is a strategic fantasy wargame designed by David Cook and published by TSR in 1991 as part of the Advanced Dungeons & Dragons product line. Set on the fictional world of Oerth, players command the armies of rival nations during the cataclysmic Greyhawk Wars, using cardboard chits, two detailed fold-out color maps, and a deck of event and mercenary cards. Scenarios support 2–6 players fighting to control territory through massed battles. Dragon magazine praised its sensible, fluid rules, and it remains a prized artifact of the World of Greyhawk campaign setting.

