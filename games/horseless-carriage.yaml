description: |
  Horseless Carriage is an economic tile-placement game designed by Jeroen Doumen and Joris Wiersinga of Splotter Spellen, set during the dawn of the automobile industry. Players are industrialists racing to divine what features consumers will value in the new horseless carriage, producing vehicles and selling them to an evolving market. The game features an intricate tile-laying factory-building system where players must plan production chains and optimize their manufacturing processes across multiple rounds. Published in 2022, it is celebrated as a demanding, highly replayable puzzle for experienced gamers.

