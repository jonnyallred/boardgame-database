description: |
  Leningrad: The Advance of Army Group North, Summer 1941 is an operational hex-and-counter wargame covering the German invasion from East Prussia to the gates of Leningrad during the opening months of Operation Barbarossa. One player commands the Wehrmacht's Army Group North attempting to reach and besiege Leningrad as rapidly as possible, while the Soviet player manages a desperate defensive retreat with limited forces before reinforcements can arrive. The game models the dramatic speed of the German advance and the Soviet struggle to form coherent defensive lines. Published by Victory Games, it belongs to the classic era of operational Eastern Front wargames.

