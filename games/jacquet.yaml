description: |
  Jacquet is a French tables game closely related to backgammon that was the dominant backgammon variant in France and much of Europe from roughly 1800 until the 1960s, when it was displaced by the Anglo-American game. Its defining feature is the "postilion" — one man that must reach the final quarter of the board before any others can move forward, creating a distinctive opening strategy. Players form six-adjacent-point blockades (bouchons) to bottleneck opponents, and the goal is to bear all 15 men off the board first. A historically important race game that bridged the French trictrac tradition and modern backgammon.

