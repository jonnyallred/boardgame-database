description: |
  The Game of France, 1940 is a board wargame by James F. Dunnigan simulating the German blitzkrieg
  that overwhelmed Allied defenses in May-June 1940, originally designed for SPI's Strategy &
  Tactics #27 and republished by Avalon Hill in 1972. The game captures the interplay of German
  infantry, armored Panzer divisions, Luftwaffe support, and airborne units that enabled one of
  history's most dramatic military victories. A notable feature is fifteen alternate "What If"
  orders of battle alongside the historical scenario — allowing players to explore what might
  have happened had France rearmed earlier, invested differently in airpower, or not built
  the Maginot Line.

