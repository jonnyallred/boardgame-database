description: |
  Sekigahara: The Unification of Japan is a 2-player block wargame by Matthew Calkins covering Tokugawa Ieyasu's 1600 campaign to unify Japan against Ishida Mitsunari. Unusually for a wargame, combat is resolved not with dice but with cards representing clan loyalty — armies only fight when a matching loyalty card is played, creating moments of betrayal and uncertainty that mirror the historical reality. The game's hidden block information on a strategic map of Japan creates an elegant fog-of-war that plays in about three hours while remaining accessible compared to traditional wargames.

