description: |
  The Grape Escape is a 1992 Parker Brothers children's board game in which players model their
  game pieces from included Play-Doh compound into grape shapes, then race them through a series
  of plastic obstacle devices — a stomper, roller, and cutter — that physically mash, squash, and
  slice the clay grapes as pieces land on corresponding spaces. Landing on an obstacle space forces
  the player to operate the hand-cranked mechanism, deforming their piece in entertaining ways.
  The combination of tactile molding, physical comedy, and roll-and-move gameplay made it a popular
  toy-game hybrid in the early 1990s and it has been fondly remembered for its absurd premise.

