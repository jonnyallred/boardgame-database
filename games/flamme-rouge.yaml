description: |
  Flamme Rouge is a fast-paced tactical bicycle racing game for 2-4 players where each player controls a team of two riders: a Rouleur (all-around cyclist) and a Sprinteur (sprinter). Players draw cards from each rider's separate deck and simultaneously select one to play, determining how far each rider advances along a modular track. Riders in the pack benefit from slipstreaming, recovering exhaustion cards that clog their hand, while leaders who push too hard tire out faster. With variable track layouts and simple rules, Flamme Rouge captures the drama of professional cycling through clever card management and positional tension, and won the Gioco dell'Anno award in 2018.

