description: |
  Kilpa-ajo-peli 1887 is a Finnish racing board game from 1887, one of the earliest known Finnish board games. The game is a simple track-based racing game with period-appropriate components including a printed game board in Finnish. It represents an important artifact in the history of Finnish board gaming culture, with board and game piece images preserved in Wikimedia Commons. Little is known about specific rules beyond its racing format and origins.

