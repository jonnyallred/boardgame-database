description: |
  Thai checkers (Mak-hot or Makhos) is the traditional Thai variant of
  checkers, played on an 8x8 board with each player starting with eight pieces
  at opposite ends. Like international draughts, pieces move diagonally and
  capture by jumping over opponents, but Thai checkers features its own distinct
  rules for kings — which can move diagonally in any direction for any distance
  and continue capturing in any direction from behind a captured piece. The game
  is part of a broader family of regional checkers variants played across
  Southeast Asia and is a common recreational pastime in Thailand.

