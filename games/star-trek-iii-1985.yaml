description: |
  Star Trek III (1985) is the second edition of FASA's Star Trek III: Starship Combat Game, published in 1985.
  This revised edition was released as part of the deluxe second edition of the FASA Star Trek RPG line and
  contains cleaned-up rules and counters for simulating tactical starship combat in the Star Trek universe,
  including ships from The Search for Spock such as the Klingon Bird of Prey. The game uses ten-sided dice and
  hex-based counters, and is compatible with FASA's broader Star Trek role-playing game system.

