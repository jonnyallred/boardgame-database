description: |
  Survival / The Barbarian is a double-feature game from Task Force Games
  containing two related solitaire-focused titles. In Survival, a crashed scout
  named Jardine must fight through dangerous wildlife to reach safety, with
  optional multiplayer scenarios for up to six players. In The Barbarian,
  one or two players control Vaarn the Barbarian on a quest to recover his
  grandfather's lost sword and shield, while the second player (or the game
  system) controls the random monsters encountered along the way. Both games
  use simple dice-driven combat and are notable for their solitaire design.

