description: |
  Das Amulett is a German board game from 1989 in which players race to collect jewels and complete an amulet. Players need to gather seven different colored jewels or eight jewels of any kind to win, navigating the board and claiming gems before opponents can complete their own amulets. The game's accessible mechanics and gem-collecting theme make it a light family racing experience typical of its era of German family games.

