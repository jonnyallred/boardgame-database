description: |
  The Scepter of Zavandor is a 2004 fantasy economic board game designed by Jens Drögemüller (later co-designer of Terra Mystica and Gaia Project) and published by Lookout Games. Players portray young magicians competing to become archmage by enchanting gemstones to generate income, then using that income in auctions to acquire artifacts, sentinels, and magical knowledge. Victory points accumulate from active gems, artifacts, sentinels, and knowledge cards, requiring players to balance short-term income engine construction against long-term scoring. The game is openly inspired by Outpost's economy mechanics and placed ninth at the 2005 Deutscher Spiele Preis.

