description: |
  Wyrmspan is a card-driven engine-building game inspired by Wingspan, replacing birds with 183
  uniquely illustrated dragons. Players excavate labyrinths and entice dragons into their cave
  sanctuaries, using an adventurer to explore for resources and victory points. The game introduces
  hatchlings that activate in three stages for large payoffs, and a Guild Track for resource management.
  Wyrmspan achieved the largest single-day sales in Stonemaier Games history upon release in 2024.

