description: |
  Hitler's War is a strategic-level World War II board wargame first published by Metagaming Concepts in 1981, with a later edition by Avalon Hill in 1984. Players control the Axis and Allied powers through the entire European theater of World War II, making strategic decisions about production, theater priority, and military operations. The game covers the conflict from the early stages of German expansion through to the eventual Allied victory, offering a sweeping view of the war's strategic dynamics.

