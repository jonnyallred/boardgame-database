description: |
  Electric Football is a novelty sports game invented by Norman Sas and introduced by Tudor Games around 1948-1949. Players position miniature plastic football players on a vibrating metal field; when the electric vibrator is switched on, the figures move in unpredictable directions (generally toward the opponent's end zone) due to the vibrations and the shape of their bases. The game captivated millions of American children throughout the 1950s-1970s and sold over 40 million units, becoming a nostalgic icon of mid-century American toy culture. Tudor Games continues to produce modern electric football sets today.

