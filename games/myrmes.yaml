description: |
  Myrmes is a deeply strategic worker-placement game by Yoann Levet, published by Ystari/Rio Grande Games in 2012, in which players manage competing ant colonies. The game takes place over three years divided into seasons, with dice rolled at the start of each year determining seasonal events that shape the strategic landscape. Players develop their colony on individual boards — breeding nurses, soldiers, and workers — then send foragers into a shared outdoor board to gather resources, lay pheromones, fight insects, and claim tiles. The tension between colony development and external competition makes Myrmes a demanding but rewarding puzzle for experienced gamers, winner of the 2012 Tric Trac Gold Award.

