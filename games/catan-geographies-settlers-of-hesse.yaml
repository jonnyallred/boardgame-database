description: |
  Catan Geographies: Settlers of Hesse is the first in the Catan Geographies series, mapping the medieval German state of Hesse — home to Wiesbaden and Frankfurt — onto a fixed Catan board. Standard Catan rules apply with regional modifications: players may only build cities at historically accurate city intersections (waiving the usual two-road spacing rule), roads follow designated construction rectangles, and red-marked road spaces grant special trading privileges with the bank. Requires the base Catan game to play.

