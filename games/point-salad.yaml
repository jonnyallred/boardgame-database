description: |
  Point Salad is a fast and fresh card drafting game for 2-6 players where every card is a vegetable on one side and a scoring condition on the other. On each turn players draft either one scoring card or two vegetable cards from a market, building a hand that scores based on whichever combination of conditions and produce they can assemble. With over 100 possible scoring conditions and six vegetable types, every game offers a wildly different puzzle as players compete to grow the tastiest salad. Its simplicity and quick play time — around 15-30 minutes — make it an ideal warm-up or filler, and it won multiple awards in 2019 including Origins Best Card Game.

