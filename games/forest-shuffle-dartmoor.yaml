description: |
  Forest Shuffle: Dartmoor is a standalone game in the Forest Shuffle family set among
  the unique wildlife of the British moors. Players plant trees and shrubs to create
  habitats, then attract the distinctive flora and fauna of Dartmoor to build a thriving,
  ecologically balanced ecosystem. The card-placement system rewards synergies between
  species, and the British setting brings entirely new mechanics alongside familiar
  Forest Shuffle rhythms. The game functions as both a standalone experience and a
  companion to the original Forest Shuffle.

