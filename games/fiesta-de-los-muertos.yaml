description: |
  Fiesta de los Muertos is a cooperative word-transformation party game for 4-8 players themed around the Mexican Day of the Dead celebration. Players must guess the identity of deceased characters in order to honor their memory, but the clue word describing each character passes from hand to hand and changes slightly each time, creating a telephone-game effect. Players must deduce the original character from the transformed word chain — a quick, creative challenge blending imagination and deduction. The game was nominated for the 2020 Tric Trac Award and the As d'Or (Jeu de l'Année).

