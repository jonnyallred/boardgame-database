description: |
  Labyrinthine is a 1977 fantasy board game by Pete and Judy Kerestan, published by Wee Warriors, that holds the distinction of being the first dungeon crawler to use a totally modular board reconfigured uniquely for each game. Drawing on themes from the then-newly published Dungeons & Dragons, this two-player game has players exploring a procedurally assembled dungeon map. Its modular design was a significant innovation that predated the genre's later maturation and influenced subsequent dungeon exploration games. As an early example of dungeon crawling in board game form, it represents a pivotal moment in adventure gaming history.

