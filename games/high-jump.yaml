description: |
  High jump is a traditional two-player abstract strategy game from Somalia, related to draughts and alquerque but played with orthogonal rather than diagonal movement. Played on a 5x5 square board, each player controls twelve pieces that move one space orthogonally per turn onto vacant squares, or may capture opponent pieces by leaping over them to a vacant square beyond. The central square serves as a sanctuary, protecting any piece occupying it from capture. The game is documented in historical studies of African traditional games.

