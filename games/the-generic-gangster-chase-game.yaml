description: |
  The Generic Gangster Chase Game is a 1981 board game published by Generic Games in which mob
  hitman Big Jim pursues top reporter Ace Wilson across a game board in a classic cat-and-mouse
  chase scenario. The game captures the era's fascination with Prohibition-era gangster aesthetics
  in a straightforward two-player asymmetric pursuit format. The self-consciously "generic" branding
  was a tongue-in-cheek choice by the publisher, poking fun at the era's proliferation of chase
  game formats.

