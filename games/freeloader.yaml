description: |
  Freeloader is a social game by James Ernest from Cheapass Games in which players try to mooch as much free stuff as possible from friends and neighbors. The board is assembled from six cardboard house pieces arranged in a circle representing a neighborhood, and players navigate social dynamics to extract favors, meals, and resources from one another without contributing much in return. A hard-to-find Cheapass release that was printed only once, Freeloader rewards players skilled at social manipulation and shameless freeloading in a humorous neighborhood setting.

