description: |
  A to Z is a word-based family board game where players move a pawn around a board featuring spaces labeled A through Z, with X and Y sharing a space. Players must name words or categories matching the letter their pawn lands on, rewarding vocabulary and quick thinking. The simple rules make it accessible for family play, while the alphabet-spanning format ensures variety across sessions.

