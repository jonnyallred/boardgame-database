description: |
  AeroTech is a tabletop wargame set in the BattleTech universe that simulates aerial and space combat between aerospace fighters, DropShips, and WarShips. Published by FASA Corporation in 1986, it uses a hex-grid system and detailed movement and weapon rules to model high-speed fighter combat across atmospheric and space environments. The game is fully compatible with the ground-based BattleTech rules, allowing players to integrate aerial assets into larger combined-arms engagements. Multiple revised editions were released over the years, including AeroTech 2 and AeroTech 2 Revised, refining the ruleset and expanding the available units.

