description: |
  Bonkers! is a Parker Brothers board game designed by Paul Gruen and published in 1978,
  with the tagline "It's Never the Same Game Twice!" Players race to score 12 points by
  reaching scoring stations on a linear track, placing "track cards" on empty spaces that
  send players forward, backward, to Start, or to Score areas. As the board fills with
  cards, the path becomes increasingly chaotic and unpredictable. Milton Bradley revived
  it in the early 1990s, and Winning Moves reissued it in 2016.

