description: |
  Ticket to Ride: The Card Game distills the beloved train-route building experience into a card-only format with no board or train pieces. Players collect sets of train cards to complete destination tickets and build routes to Big Cities, with a memory element replacing the geographical map of the original game. Each card features distinctive steam-era artwork by Julien Delval, and the compact format makes it an accessible filler that retains the risk-taking and set-collection spirit of the original.

