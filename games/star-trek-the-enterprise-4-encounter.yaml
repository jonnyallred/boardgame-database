description: |
  Star Trek: The Enterprise 4 Encounter is a 1985 board game by West End Games in which 2-4 players, each commanding their own copy of the USS Enterprise, must travel the galaxy to rescue marooned crew members. The trickster Trelane has scattered the crew across planets and disguised the other Enterprises as Klingon warbirds, creating confusion and competition. Players race to collect one crew member from each of the six ship Divisions, using die rolls for movement and exploration. It was one of three Star Trek board games released simultaneously by West End Games in 1985.

