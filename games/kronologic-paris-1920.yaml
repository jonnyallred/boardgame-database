description: |
  Kronologic: Paris 1920 is a 2024 deduction mystery game for 1-4 players from the creators of Turing Machine, set at the Paris Opera amid unexplained hauntings and chilling affairs. Players align perforated suspect cards over tiles to reveal critical clues, deducing the whereabouts of key figures through logical elimination in a system reminiscent of grid-based deduction puzzles. The game offers 15 unique investigations across 3 scenarios and can be played competitively, cooperatively, or solo. Published by Super Meeple in France and Hachette Boardgames in the US, it builds on the elegant logic-puzzle mechanics that made Turing Machine a critical favorite.

