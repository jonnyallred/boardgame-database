description: |
  Origin is a strategic prehistoric civilization game designed by Andrea Mainini and published by Matagot in 2013, in which players take on the role of tribal leaders guiding their populations to become the dominant species on Earth. Players expand their tribes across the terrain, claim territories, and develop through the prehistoric era. Available on Board Game Arena for digital play, Origin offers a streamlined approach to civilization-building with card-driven actions governing expansion, conflict, migration, and maritime exploration across the ancient world. It is praised for combining accessible rules with meaningful strategic decisions about when to migrate, when to fight, and when to develop.

