description: |
  U.S.N.: The Game of War in the Pacific, 1941-43 is a massive strategic wargame designed by Jim Dunnigan with graphic design by Redmond A. Simonsen, first published in 1971 by SPI (originally as a pull-out game in Strategy & Tactics magazine). The hex map covers nearly the entire Pacific Ocean and Southeast Asia, and the full 81-turn campaign game simulates the first two years of the Pacific War with an estimated 150 hours of play — earning it designation as a "small monster" game. Players command all naval, air, and land forces of the US/Allied or Japanese sides. Decision Games released a greatly expanded U.S.N. Deluxe edition in 2004.

