description: |
  Risk Legacy is the groundbreaking board game that pioneered the legacy game format, permanently altering its board and rules across a campaign of 15 games. Designed by Rob Daviau and Chris Dupuis, players place stickers on the board, tear up cards, write on territories in permanent marker, and open sealed envelopes that introduce new rules as the campaign progresses — each decision made in one game carries consequences into all future games. Asymmetric starting factions, evolving special powers, and a board that records the scars of past conflicts create a deeply personalized experience unique to each group. It won the 2012 Golden Geek Best Innovative Board Game award and inspired a generation of legacy game designs.

