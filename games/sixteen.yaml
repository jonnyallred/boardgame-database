description: |
  Sixteen is a fast-playing 2-player card game in which players alternate playing cards onto a shared face-up pile, racing to form "sets" when the running total of cards reaches exactly 16 — the player who completes a set to exactly 16 wins it. Players must use strategic card play and press-your-luck counting to force opponents into busting beyond 16 while creating their own winning opportunities. The cribbage-like counting and compact rules make it a quick but engaging duel.

