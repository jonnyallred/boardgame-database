description: |
  The First Galaxy G1 is a 1985 science fiction board game published by Hungry Owl Publications for
  two to five players. Players pilot rockets around a distinctive galaxy-shaped gameboard — a spiral
  with ten arms — trying to reassemble their space stations, which have been broken into pieces and
  scattered across the galaxy. Combat via laser attacks, fuel management as a limiting resource, and
  the peril of a black hole on the board add tactical depth to the race for station pieces. Round
  supply cards and the original galaxy board design make it a distinctive artifact of 1980s
  independent game publishing.

