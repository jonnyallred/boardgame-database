description: |
  Blitzkrieg is a strategic-level wargame published by Avalon Hill in 1965, designed by
  Larry Pinksy and Thomas Shaw. Notably, it was the first commercial wargame that did
  not simulate a specific historical battle — instead depicting a non-historical conflict
  between two major powers using blitzkrieg strategy. With nearly 400 counters, it was
  also a precursor to the "monster" wargames of the 1970s. It pioneered partial
  elimination as a combat result and became a bestseller that influenced an entire
  generation of wargame design.

