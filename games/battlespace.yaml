description: |
  BattleSpace is a 1993 FASA Corporation expansion and standalone game that extends the BattleTech universe into three-dimensional space combat, covering the void between planetary surfaces and the jump points used by WarShips and DropShips. Players command aerospace fighters, DropShips, WarShips, and space stations in tactical engagements using a three-dimensional hex grid system. The game provides detailed rules for orbital mechanics, planetary assault, and naval space engagements, filling in the aerospace dimension of the BattleTech universe that the original ground-based game only touched on.

