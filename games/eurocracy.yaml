description: |
  Eurocracy is a board game about the European Union, invented in 1992 by a democracy campaigner and human rights lawyer at the time of the EU's founding to promote the idea of European democratic governance. Each player leads a real pan-European political party movement and competes across the EU member states to become President of the European Union. The board depicts all member states and players use political influence, negotiation, and strategy to gain control. The game reflects the political idealism of its creator, who believed the new Union would only be viable as a genuine democracy.

