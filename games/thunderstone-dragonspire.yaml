description: |
  Thunderstone: Dragonspire is a 2011 standalone expansion for the Thunderstone deck-building game by AEG, introducing 18 new village cards, 11 new heroes, and 8 new monster types including undead, elementals, dragons, and giants. The set adds campaign rules, dungeon settings, and a new Setting mechanic, plus plastic counters for tracking experience rather than cards. Dragonspire is fully compatible with all prior Thunderstone sets and can be played entirely on its own, making it an accessible entry point for new players while providing meaningful additions for veterans.

