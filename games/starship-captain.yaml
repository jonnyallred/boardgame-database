description: |
  Starship Captain is a 1982 Standard Games and Publications tactical space combat wargame of ship-to-ship combat between small fleets of multi-hex ships, described as a sci-fi take on the wooden ship combat tradition. Players command fleets in turn-sequence order with faster ships moving first, and score victory points for destroying or damaging enemy vessels according to each scenario's victory conditions. The colorful, elaborate components and scenario-driven design make it an approachable but detailed tactical simulation.

