description: |
  København is a 2019 polyomino tile-placement game by Asger Harding Granerud and Daniel Skjold Pedersen, published by Queen Games, in which 2-4 players compete to construct the most beautiful façades for the colorful gabled townhouses along Copenhagen's iconic Nyhavn harbor. Players draft polyomino building tiles using cards representing the five harbor colors, placing them on individual player boards to complete rows and columns for points — with bonuses for all-window completions. The first player to reach 12 points wins immediately, or the player with the most points when the end card appears. Clean rules and appealing Scandinavian aesthetics make it an excellent gateway game.

