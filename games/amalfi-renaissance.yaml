description: |
  Amalfi: Renaissance is an economic Euro game set in the thriving Italian port town of Amalfi during the Renaissance, where players take on the role of merchants competing to build the most profitable trade empire. Ships serve a dual function as both workers—placed at destinations to perform actions—and as valuable resources that can be retrieved, creating a constant tension between using them and preserving them. Players manage contracts, route their ships, and optimize hand cards to generate resources and points in a deeply satisfying puzzle of interlocking decisions.

