description: |
  Barragoon is an abstract racing game published by Milton Bradley in the early 20th century in which players race pieces across a board while placing blocking tiles (barragoons) to impede the opponent's progress. Players take turns either moving a piece or placing a block, trying to be the first to move all their pieces to the opposite side of the board while creating obstacles for the opponent. The interplay between movement and blocking gives the game surprising depth for its simple premise, and it was an early example of abstract racing with environmental manipulation.

