description: |
  Trekking the World is an award-winning globetrotting board game published by Underdog Games in 2022. Players compete to be the ultimate world traveler by visiting 48 beautifully illustrated real-world destinations across all continents, collecting rare souvenir cards and completing trek objectives along the way. Each destination features educational text, and players race to claim key locations before opponents while building the most impressive travel collection. Accessible to families yet with genuine strategic depth, Trekking the World combines geography education with satisfying competitive route-building gameplay.

