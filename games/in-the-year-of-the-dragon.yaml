description: |
  In the Year of the Dragon is a hand management and action selection game designed by Stefan Feld and published by Alea in 2007, set in ancient China circa 1000 AD. Players take on the roles of Chinese rulers navigating a year that grows progressively worse, as disease, drought, and Mongol raids threaten their population. Each month players must choose which specialist to recruit (monks, farmers, doctors, fireworks makers, or warriors) to mitigate the incoming disaster, while simultaneously managing their palace population and scoring ritual fireworks points for the Emperor. The game's distinctive downward spiral of mounting catastrophes rewards careful planning and ruthless prioritization.

