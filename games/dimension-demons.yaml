description: |
  Dimension Demons is a science fiction board wargame published by Metagaming Concepts in 1981 as entry #17 in their popular MicroGame line of small-format wargames. Designed by Fred Askew, the two-player game involves a battle for control involving a strategic mineral called Delium, which players mine to build missiles and fund military operations. The MicroGame format — compact rules, inexpensive production — made the game accessible to new wargamers while still delivering meaningful strategic choices. It is part of the same tradition as Metagaming's other science fiction MicroGames such as Ogre and Melee.

