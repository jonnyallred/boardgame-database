description: |
  Burn Rate: The Dot-Com Card Game is a satirical card game set during the dot-com bubble era, published around 2000. Players act as rival dot-com CEOs trying to keep their startup afloat the longest while sabotaging competitors with money-wasting projects, overhiring, and incompetent vice presidents. Each turn your "burn rate" debits your bank account; the last startup standing wins. Employee cards have skill ratings that determine which action cards can be played, adding a light hand-management layer to the comedy of late-1990s internet startup culture.

