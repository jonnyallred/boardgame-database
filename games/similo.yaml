description: |
  Similo is a cooperative deduction card game for 2-8 players where one player gives clues and the rest must narrow a grid of 12 character cards down to one secret target. Clues are given by playing a card face-up vertically (similar to the secret) or horizontally (different) — then the group eliminates characters they believe don't match. After five clues, only two characters remain and the group makes their final guess. Multiple theme sets (Fables, History, Animals, Myths) each work standalone and can be mixed to create harder puzzles, making Similo an instantly replayable party staple.
