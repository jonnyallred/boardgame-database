description: |
  Imperial is a strategy board game designed by Mac Gerdts and published by Rio Grande Games in 2006, set in pre-World War I Europe. Rather than controlling a nation directly, players act as international investors who hold bonds in the six great powers (Austria, Italy, France, Great Britain, Germany, and Russia) and take actions on behalf of whichever nation they currently control. Nations activate actions via Mac Gerdts's signature rondel mechanism, choosing from building factories, armies, and fleets, recruiting, moving forces, taxing, or paying dividends. The game's central tension lies in accumulating wealth while ensuring the nations you invest in remain competitive.

