description: |
  ZÈRTZ is a two-player abstract strategy game and part of Kris Burm's acclaimed GIPF Project
  series. Players place and jump marbles — five white, seven grey, and nine black — on an
  ever-shrinking board of rings, aiming to capture either three white, four grey, or five black
  marbles, or two of each color. The board itself shrinks as isolated rings are removed, creating
  a dynamic and constantly changing landscape that requires players to think several moves ahead.
  ZÈRTZ won the Mensa Select award and ranked among the top abstract games.

