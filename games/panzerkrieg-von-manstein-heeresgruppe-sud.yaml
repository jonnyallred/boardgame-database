description: |
  Panzerkrieg: von Manstein & HeeresGruppe Süd is an operational-level hex-and-counter wargame covering the German military operations in southern Russia during World War II, from the initial invasion through the campaigns in the Caucasus. First published by Operational Studies Group in 1978 and later acquired by Avalon Hill in 1983, the game features eight historical scenarios and 520 counters on a map spanning from Romania and Poland westward to the Caucasus Mountains. Players maneuver armored and infantry formations, balancing supply lines and operational tempo in a moderately complex simulation of the Eastern Front's southern theater.

