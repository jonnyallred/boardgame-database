description: |
  Zombiepox is an educational cooperative game from Tiltfactor Laboratory at Dartmouth College,
  designed to promote positive attitudes toward vaccination. Players work together to vaccinate and
  cure the citizens of a zombie-pox-infected town represented as an 81-person grid, strategically
  prioritizing who to protect while managing limited resources. The game evolved from Pox: Save
  the People and research demonstrated that players' sentiments about vaccination improved after
  playing. It blends genuine public health education with engaging cooperative puzzle-solving.

