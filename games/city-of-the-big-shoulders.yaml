description: |
  City of the Big Shoulders is a heavy economic game set in 1875 Chicago that merges 18xx-style stock manipulation with Euro-style worker placement in a historically evocative package. Players start companies, buy and sell shares, place workers to hire employees and equip factories, produce goods, and ship them across the midwest to maximize company value and personal wealth over five decades. Unlike most 18xx games, City of the Big Shoulders plays in roughly two and a half hours by streamlining the operational phases while keeping the deep strategic tension of managing companies whose fortunes directly affect your stock portfolio.

