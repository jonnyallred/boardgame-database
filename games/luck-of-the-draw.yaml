description: |
  Luck of the Draw is a party game in which players compete in quick drawing challenges against the clock, with others guessing or judging the results. Players draw words or phrases under time pressure, combining elements of Pictionary-style drawing games with a light competitive or social format. The game emphasizes humor over artistic skill, with the funniest or most creative attempts often winning points regardless of drawing ability. Published by University Games, it fits in the tradition of accessible creative party games designed for mixed groups seeking lighthearted social entertainment.

