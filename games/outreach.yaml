description: |
  Outreach: The Conquest of the Galaxy, 3000 AD is a science fiction wargame published by SPI in 1976 in which 1-4 players compete to dominate the galaxy through construction of stargates, resource harvesting, fleet building, and technology advancement. Set on a massive 23"x35" map spanning 28,000 by 50,000 light years with each hex representing 1,200 light years, the game follows SPI's earlier Starforce: Alpha Centauri and uses the same galactic setting. Designed by Irad Hardy, it rose to number four on SPI's bestseller list upon release and remained a top-ten seller for six months — an early example of the empire-building genre that would later be codified as the 4X category.

