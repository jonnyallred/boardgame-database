description: |
  Crazy Circus is a rapid-fire simultaneous puzzle game in which three circus animals stand on two platforms and players race to figure out the correct sequence of commands to rearrange them into a target configuration. When a target card is revealed, all players simultaneously shout out multi-syllable command strings — like "MaNiKi" or "LoNiMaSo" — that specify the sequence of movements needed. The first player to correctly announce the right sequence wins the card, and the player who collects the most cards wins. The game demands quick spatial reasoning and verbal dexterity, creating chaotic, funny moments as players blurt out increasingly complex command strings.

