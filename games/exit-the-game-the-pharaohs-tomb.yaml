description: |
  Exit: The Game – The Pharaoh's Tomb is one of the three original 2016 entries in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players find themselves trapped inside an ancient Egyptian tomb after a cave-in during an archaeological dig, and must decipher hieroglyphs, decode ancient mechanisms, and solve interconnected puzzles to escape before their air runs out. With a difficulty rating of 4 out of 5, it is one of the more challenging entries from the first season of the series, featuring elaborate layered puzzle chains that demand creative lateral thinking.

