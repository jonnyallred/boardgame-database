description: |
  Doctor Who: The Game of Time & Space is a 1980 board game published by Games Workshop, set in the universe of the long-running British television series. Players explore a board divided into 60 zones, searching planets for scientific items, Key Mission counters, and Key Part counters while defeating alien opponents. Movement is two squares in any direction, and players can teleport across the board using color-coded space/time warp squares. Aliens revealed during searches must be destroyed before their items can be collected, making the game a mix of adventure and resource gathering for 2–6 players.

