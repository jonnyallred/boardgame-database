description: |
  Citadel of Blood: Fantastic Adventure in the Fortress of Evil is a cooperative dungeon-crawl board game published by SPI, originally appearing as a pullout in Ares Magazine #5 (November 1980) before release as a boxed set. One to six players venture into the dungeon of the evil wizard "X the Unknown," drawing tiles to randomly construct rooms and corridors as they explore, killing monsters and collecting treasure. Built on SPI's earlier Deathmaze system, it adds character races, multiple dungeon levels, and moon-phase-dependent colored magic systems. It is an early and innovative example of the modular dungeon-crawl genre.

