description: |
  Ascension: Deckbuilding Game is a fantasy deck-building game designed by Justin Gary,
  Brian Kibler, Rob Dougherty, and John Fiorillo, published by Stone Blade Entertainment
  in 2010. Players spend Runes to acquire more powerful cards from a shared center row,
  building their deck to generate Honor points while battling monsters. Unlike some deck
  builders, Ascension uses a central market that changes each turn as cards are purchased
  or defeated, creating a dynamic and reactive experience. The game launched a long-running
  franchise with dozens of expansions and standalone sets.

