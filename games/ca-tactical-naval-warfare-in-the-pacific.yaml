description: |
  A two-player hex-and-counter naval wargame simulating surface combat in the Pacific Theater during World War II, published by SPI in 1973 as a pull-out game in Strategy & Tactics magazine #38. Players command individual ships—battleships, battlecruisers, heavy and light cruisers, and destroyers—across seven historical scenarios including Savo Island, Guadalcanal, Cape Esperance, Tassafaronga, Kolombangara, and Augusta Bay, plus three hypothetical scenarios. Combat mechanics cover gunnery, torpedoes, varying damage types, night sighting, and momentum, offering a compact but detailed simulation of these famous Pacific naval engagements.

