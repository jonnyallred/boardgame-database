description: |
  Tapestry is a two-hour civilization-building board game designed by Jamey
  Stegmaier and published by Stonemaier Games in 2019. Players lead one of
  many asymmetric fictional civilizations through four advancement tracks —
  Technology, Science, Exploration, and Military — earning unique bonuses at
  each tier. Income turns provide resources and tapestry cards that define
  cultural identity, while capital city tile placement creates a distinctive
  visual empire. The game is celebrated for delivering a streamlined civilization
  experience that avoids historical constraints, giving every civilization unique
  powers and a fantasy-inspired feel.

