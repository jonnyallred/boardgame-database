description: |
  World Without End is a resource management board game based on Ken Follett's sequel to The Pillars of the Earth, set in the medieval city of Kingsbridge. Players act as citizens managing five areas of civic life — Building, Trading, Religion, Feeding the poor, and Medical Knowledge — using a hand of twelve action cards shared by all players. Each turn an event card determines which actions are available, while players compete to earn victory points through construction, charitable works, and developing their knowledge. The literary setting and event-driven structure give the game a narrative quality unusual in Euro games of the era.

