description: |
  Hundred Kingdoms is a fantasy faction in the Conquest tabletop miniatures game system published by Para Bellum Wargames. It represents a feudal human civilization struggling to maintain order through mercenary companies, knightly orders, and city militia forces. The Conquest system uses 38mm scale miniatures in ranked regiment-style play, with the Hundred Kingdoms starter sets and warband boxes providing entry points into the faction's diverse range of infantry, cavalry, and specialist units.

