description: |
  Blockade is a two-player abstract strategy game created by Philip Slater in 1975 and
  published in the United States by Lakeside. Each player controls two pawns and a set
  of wall pieces on an 11x14 grid, placing barriers to impede opponents while navigating
  pawns to the other player's starting positions. The first to move both pawns to the
  opponent's starting squares wins. Published in Europe as Cul-de-sac, the game was
  discontinued when Lakeside went bankrupt in 1983 but remains a respected abstract
  design for its simple yet deep tactical play.

