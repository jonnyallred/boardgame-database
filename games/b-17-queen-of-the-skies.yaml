description: |
  B-17, Queen of the Skies is a solitaire wargame simulating bombing missions over Nazi-occupied Europe in a Boeing B-17F Flying Fortress during World War II. The player manages their crew and aircraft through a series of dice rolls and event tables that determine enemy fighter encounters, flak damage, hit locations, and mechanical failures across 25 missions. The goal is to complete all 25 missions and earn a ticket home, though attrition makes survival far from guaranteed. Originally published by On Target Games in 1981 and republished by Avalon Hill in 1983, it remains a landmark in solo wargaming design.

