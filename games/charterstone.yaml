description: |
  Charterstone is a competitive legacy worker placement game from Stonemaier Games, designed by Jamey Stegmaier, in which 1-6 players build a shared village over a 12-game campaign. Each player is granted a charter — a section of the village board — where they permanently sticker new buildings that become action spaces available to all players. Opening supply crates during the campaign progressively unlocks new rules, special abilities, and narrative revelations, so each campaign develops into a unique board state. Upon completing the campaign, players retain their personalized board for replayable post-campaign games, providing lasting value. The game blends legacy permanence with approachable Euro mechanics, though it is slow to reveal its full depth early in the campaign.

