description: |
  Vineta is a 2008 board game designed by Mauricio Gibrin, Mauricio Miyaji, and Fabiano Onça, published by Winning Moves Games USA. Players take on the roles of angry Norse Gods competing to sink the legendary city of Vineta beneath ocean waves — but each player is secretly assigned one of the nine city districts to protect. Players must publicly contribute to the city's flooding while covertly shielding their own sector, creating a delicious tension between cooperation-in-appearance and individual self-interest. The hidden objectives and bluffing make each session feel like a different puzzle of social deduction.

