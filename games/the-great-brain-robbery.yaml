description: |
  The Great Brain Robbery is a 2000 Cheapass Games design by James Ernest, the wild west-themed
  sequel to Give Me the Brain and fourth entry in the "Friedey's" zombie series. Players are
  zombies working fast food who must rob a speeding train full of brains. The game combines racing
  elements (moving along the train cars) with competitive action management as zombie players
  jostle to collect the most brains. True to Cheapass Games' signature design philosophy, rules
  are kept light and absurd humor drives the experience throughout.

