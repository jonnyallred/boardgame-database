description: |
  Ponte del Diavolo (Devil's Bridge) is an elegant two-player abstract strategy game set thematically in Venice, published by Hans im Glück in 2007. Players alternately place wooden square tiles to build islands on a 10x10 grid, or place bridges to connect their islands — earning points for each bridge placed. Islands must meet size requirements to be bridgeable, and the spatial tension of blocking your opponent while developing your own network creates deceptively deep tactical play from very short rules. The game uses the pie rule to balance first-move advantage. Winner of the 2009 Games Magazine Best New Abstract Strategy Game, it is considered an homage to Alex Randolph's classic Twixt.

