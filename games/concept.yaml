description: |
  Concept is a team-based guessing game in which players communicate words or phrases without speaking, drawing, or writing. Instead, one team places pawns and cubes on a board full of universal icons — color, size, shape, category — to hint at the concept other players must name. Is it an animal? Big? Black and white? Concepts range from simple objects to famous people and movie titles. The game won widespread acclaim for its accessibility across language barriers and ages, earning multiple international awards. It plays best as a party game with large groups where the guessing chaos is at its most entertaining.

