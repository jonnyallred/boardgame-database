description: |
  Runewars is a sweeping fantasy epic board game set in the Terrinoth realm where 2-4 players control asymmetric factions — humans, undead, elves, and waiqar — competing for control of the land and its powerful runestones. Players gather resources, raise armies, and besiege fortified cities using an innovative order-wheel system: each turn players select four actions from eight available, and the sequence in which those orders resolve creates complex, interconnected strategic decisions. Faction asymmetry runs deep, with each race featuring unique units and development paths that mirror its fantasy archetype. It earned multiple award nominations in 2010 for its grand-scale campaign feel and strategic depth.

