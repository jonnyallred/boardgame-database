description: |
  The Wilderness Campaign is a 1972 hex-and-counter wargame published by SPI simulating Ulysses Grant's Overland Campaign against Robert E. Lee in Virginia from May-June 1864. One player commands Union forces under Grant, the other Confederate forces under Lee, across a complex turn sequence covering land, river, and rail movement, reconnaissance, cavalry operations, and leadership factors. Crucially, all units are placed face-down and remain hidden until combat or cavalry probe reveals them, adding a genuine fog-of-war element rare in wargames of that era. The hidden unit placement mechanic makes it a particularly tense and strategically demanding simulation.

