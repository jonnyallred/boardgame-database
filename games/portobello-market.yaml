description: |
  Portobello Market is a light area control and route-building game set in London's famous Portobello Road market in 1901. Players compete to place market stalls along lanes of the board, trying to claim the most lucrative rows while blocking opponents from completing their own runs. The key mechanic involves a Bobby (police constable) figure — you can only build adjacent to where the Bobby stands, but a small payment moves him where you need him. Players score points for completed rows of stalls and bonus points for connecting to customers. The game's elegant simplicity and tactical maneuvering of the Bobby make it a satisfying family-weight strategy experience.

