description: |
  Kontor (meaning "Trading House") is a 1999 tile-laying area control game for 2-4 players set in late 17th-century Amsterdam, where merchants compete for dominance over three major commodities — Spices, Tea, and Wine — by building trading houses along the city's canals. Players claim harbor areas by establishing a majority presence in each commodity sector, with strategic tile placement driving the competition. Published by Goldsieber and 999 Games, it can also be played as a two-team partnership game. The game elegantly captures mercantile rivalry in Amsterdam's golden age of trade.

