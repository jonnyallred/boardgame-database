description: |
  Mottainai is a 2-3 player card game by Carl Chudyk, published by Asmadi Games in 2015 as a spiritual successor to his acclaimed Glory to Rome. Set in a Buddhist temple, each player is a monk performing tasks, collecting materials, and completing works for visitors — and every card in the game can serve as each of these three roles. Players announce tasks that allow them to take actions, but opponents also benefit by following up on your chosen task on their next turn, creating a delicate interplay of cooperation and competition. Cleverly combining your completed works' special abilities while managing which materials to sell is the heart of Mottainai's remarkable depth, packed into a compact 30-card-per-player game.

