description: |
  The Pursuit of Happiness is a worker placement game in which each player lives out a simulated lifetime, spending limited time tokens — the most precious resource — to take jobs, pursue projects, acquire possessions, and build relationships in search of lasting happiness. Players develop their character through three life stages, balancing short-term happiness gains against long-term investments like education and relationships. Time itself is the core constraint; every action costs time, and players who overextend burn out and age faster, shortening their life. The game's relatable theme of life choices and its light worker-placement engine make it an accessible Euro with unexpected emotional resonance. Expansions add content around community, experiences, and nostalgia.

