description: |
  Solenia is a hand management and resource delivery game designed by Sébastien Dujardin and published by Pearl
  Games in 2018. Players are Airship Captains navigating the planet Solenia — a world divided between eternal
  day and eternal night — collecting and delivering precious goods to cities on a modular, scrolling board.
  On each turn, players play cards to gain resources or fulfill delivery contracts, earning stars and resources
  as rewards; the strategic challenge lies in timing deliveries before the board scrolls and opportunities vanish.

