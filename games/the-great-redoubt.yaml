description: |
  The Great Redoubt is a 1979 Yaquinto Publications board wargame by S. Craig Taylor, simulating
  the Battle of Borodino in 1812 — Napoleon's pyrrhic tactical victory that opened the road to
  Moscow but weakened his Grande Armée beyond recovery. One of two Napoleonic wargames released
  simultaneously by Yaquinto using the same game system, The Great Redoubt focuses on the
  massive frontal assault against the Russian fortified position (the Great Redoubt or Raevsky
  Battery) that defined the battle. The game captures the brutal attritional nature of Borodino,
  one of the bloodiest single-day battles of the Napoleonic Wars.

