description: |
  Master of Orion: The Board Game is a tableau-building strategy game by Cryptozoic Entertainment based on the classic 4X video game franchise. Players choose one of six alien civilizations — each with unique starting attributes across food, fleet, production, and loyalty tracks — and build up to four planetary systems using cards that represent structures, ships, and planets. Victory can be pursued through military dominance by attacking opponents' planets, or through peaceful economic and ecological development, mirroring the video game's flexible victory conditions. The game triggers an endgame when a player reaches zero loyalty, completes their systems, or eight rounds elapse.

