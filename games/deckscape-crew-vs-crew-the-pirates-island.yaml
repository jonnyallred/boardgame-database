description: |
  Deckscape: Crew vs Crew – The Pirates' Island is a competitive-cooperative entry in the Deckscape escape room card game series designed by Martino Chiacchiera and Silvano Sorrentino, published by dV Giochi. Unlike standard Deckscape titles, this version splits players into competing pirate crews racing to solve the same puzzle sequence and escape the island first, adding a competitive dimension to the otherwise cooperative format. Like all Deckscape games, it consists primarily of a deck of cards that guide players through an escape room experience in roughly one hour. The pirate theme and crew-vs-crew mechanic make it a standout entry in the popular series that has sold over a million copies worldwide.

