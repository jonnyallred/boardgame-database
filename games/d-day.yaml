description: |
  D-Day is a landmark 1961 board wargame designed by Charles S. Roberts and published by Avalon Hill, simulating six months of the Western Front from the Normandy Invasion to the crossing of the Rhine. It holds a special place in game history as one of the first wargames to use the now-standard hex grid map and cardboard counters, establishing conventions that have defined the genre ever since. The German player sets up first without knowing where the Allies will land, creating asymmetric tension from the opening move. D-Day was revised multiple times through 1991, including a Smithsonian Museum partnership edition, cementing its legacy as one of the foundational texts of modern wargaming.

