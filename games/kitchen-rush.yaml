description: |
  Kitchen Rush is a real-time cooperative worker placement game that plunges players into the chaos of running a busy restaurant kitchen under time pressure. Each player controls two sand timers that serve as workers — when placed on a kitchen station to take an order, gather ingredients, cook a dish, or wash plates, the timer must run out before the worker can be moved again. Players simultaneously scramble around the board, communicating and coordinating to fulfill customer orders before time runs out. The game includes scenario-based progression with increasing complexity and different kitchen layouts, making it accessible yet escalatingly challenging. A revised edition was later published by Pegasus Spiele.

