description: |
  Eurobusiness (known in Poland as Eurobiznes) is a Polish variant of Monopoly published in 1983 by Labo Market that localizes the classic real estate trading game with Polish cities and culturally relevant surprise card scenarios. Players buy properties, build cottages and hotels, collect rent from opponents, and aim to bankrupt all rivals. Debuting on the Polish market in 1983, it became one of the most iconic board games in Poland, achieving cult status over four decades of continuous popularity. The game is nearly identical in rules to Monopoly but features Polish place names and economic scenarios that resonate with local players.

