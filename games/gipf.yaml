description: |
  GIPF is the foundational game of the GIPF Project, a series of nine abstract strategy games by designer Kris Burm, Spiel des Jahres recommended in 1998. Two players take turns pushing pieces into a hexagonal board, attempting to form a line of four of their own pieces; when a row of four is achieved, those pieces and any opponent pieces extending the row are captured. Special "potential" pieces from other games in the GIPF Project can be introduced for added depth. With its elegant push mechanic and deep positional play, GIPF is considered one of the finest modern abstract strategy games.

