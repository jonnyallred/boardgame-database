description: |
  Man O' War is a naval warfare miniatures game set in the Warhammer Fantasy universe, designed by Nigel Stillman with Andy Jones and Bill King, and published by Games Workshop in 1993. Players command fleets of richly detailed model ships representing Human, Elf, Dwarf, Orc, Chaos, and other factions in battles across the fantastical seas of the Old World. Each fleet has unique ships with asymmetric abilities, and tactical play revolves around positioning, wind management, and ramming or broadside fire. The game garnered a devoted following before being discontinued, and it remains a beloved specialist game in Games Workshop history.

