description: |
  Null & Nichtig (English: "Null & Void") is a trick-taking card game by Reiner Stockhausen published by Amigo in 2006. Players bid on how many tricks they expect to take each round — including the option to bid zero (null) — and must fulfill their exact bid to score points, penalized if they take too many or too few. The game adds a neat twist with special "nichtig" cards that can cancel other cards. Light and quick to play, it rewards careful hand reading and bold bidding decisions, making it a solid addition to the German-style filler card game tradition.

