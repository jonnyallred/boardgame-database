description: |
  Formula D (originally Formula Dé) is a Formula 1 racing board game designed by Eric Randall and Laurent Lavaur, originally published by Ludodélire in 1991 and now published by Asmodee. Players manage a race car's gear selection each turn, rolling the corresponding specialized die to determine movement — a higher gear means more speed but a wider movement range, making exact positioning through corners critical. Overshooting a corner causes damage to car systems tracked on personal dashboards, and any system damaged too far eliminates that car from the race. The game accommodates up to 10 players on its large dual-sided track board and captures the tension of gear management and positional racing in an accessible package.

