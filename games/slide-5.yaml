description: |
  Slide 5 is a skiing-themed edition of the classic Wolfgang Kramer card game better known as 6 Nimmt!, published
  by Endless Games in 2007. Each round, players simultaneously choose and reveal cards which are placed in rows in
  ascending order; when a row reaches five cards, the sixth triggers an "Avalanche" and its player must take the
  entire row as penalty points. Card placement follows strict ascending rules with ties broken by closest match,
  creating a wonderful balance of prediction and chaos. Fast, tense, and brilliant for large groups.

