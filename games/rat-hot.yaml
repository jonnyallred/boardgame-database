description: |
  Rat Hot is a fast-playing dice and bluffing game in which players roll dice representing hungry rats competing for cheese. Players push their luck to collect as many cheese points as possible before the rats get too greedy and spoil the haul. The game uses simple dice mechanics with a charming rat theme to create a lighthearted press-your-luck experience for families. Limited commercial documentation is available for this title.

