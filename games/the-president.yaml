description: |
  The President is a 1983 political board game published by Merad Design Games in which players compete to win their party's presidential nomination and then the general election for President of the United States. Players must navigate the primary process, build coalitions, and manage resources to secure delegates before facing the general election campaign. The game reflects the interest in simulation-style political games that was popular in the early 1980s, offering an accessible model of the American presidential election process.

