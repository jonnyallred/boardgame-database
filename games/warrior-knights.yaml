description: |
  Warrior Knights is a medieval conquest game for 2–6 players originally published by Games Workshop in 1985 and redesigned by Corey Konieczka and Bruno Faidutti for Fantasy Flight Games in 2006. Each player takes the role of a Baron vying to claim the throne of an unnamed kingdom by raising armies, accumulating wealth, and gaining influence. On each turn, players secretly select two tasks from a menu of six per phase—move and attack, gain political strength, hire mercenaries, increase religious faith, and more—with special phases like taxation, Parliament, and a mercenary auction triggered by popular choices. Victory goes to the player who seizes the most cities or accrues the most influence when the Influence pool runs dry.

