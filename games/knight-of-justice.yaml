description: |
  Knight of Justice (also known as Knights of Justice: The Siege of Malta, 1565) is a 1986 hex-and-counter wargame by Colin Bruce published in Wargamer magazine issue #50 by 3W (Three-W Publications). The game covers the grand tactical level Ottoman siege of Malta against the Knights of St. John and their Maltese allies, operating at a scale of one week per turn and 50 yards per hex, with counters representing 30 to 525 men. Players contest control of the key defenses of Grand Harbor in this historically significant confrontation often called the last battle of the Crusades. As a magazine-format wargame, it is a compact but detailed simulation of one of the Renaissance era's most dramatic military encounters.

