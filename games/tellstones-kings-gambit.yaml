description: |
  Tellstones: King's Gambit is a 2020 competitive memory and bluffing game
  created by Riot Games, set in the League of Legends universe. Players take
  turns placing, swapping, and hiding polished stone tokens in a shared row,
  then challenging opponents to name hidden tokens they cannot identify.
  Correctly naming all face-down stones in the row wins the round via the "Boast"
  mechanic, but failing loses instead. The game rewards sharp memory and a
  stone-cold bluffing face, offering a quick and portable experience. Praised
  for its premium build quality and distinctive fantasy stone components, it plays
  in under 15 minutes for two players or two teams.

