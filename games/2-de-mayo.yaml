# Description
description: |
  2 de Mayo is a short asymmetric two-player wargame based on the historic uprising
  of the Spanish people against Napoleon's forces in Madrid on May 2nd, 1808. One
  player commands the French Imperial Army — the finest military force of its era —
  while the other controls the ragtag Spanish civilian rebels determined to resist
  at all costs.

  The game uses a unique card-driven cat-and-mouse mechanism where the Spanish
  player hides their guerrilla fighters in various locations across the city while
  the French player hunts them down. The stark asymmetry — professional soldiers
  versus desperate civilians — creates a tense, quick-playing experience that
  captures the desperate nature of urban insurgency.

