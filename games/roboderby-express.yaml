description: |
  RoboDerby: Express is a streamlined dice-based racing game designed by Clinton Herron that began as a print-and-play RoboRally tribute, later published commercially by Gryphon Games under the pirate-themed name "Pirate Dice: Voyage on the Rolling Seas." Players program their robots using sticker dice rather than cards, racing through a course in a slimmed-down take on RoboRally's programming mechanic playable in under 45 minutes with just two players. Its origins as an accessible, small-footprint PnP title earned it a Golden Geek nomination in 2011 for Best Print & Play game, and its subsequent commercial publication validated the design's appeal beyond the hobbyist community.

