description: |
  Orchard is a tiny 9-card solitaire tile-laying game designed by Mark Tuck in which a single player aims to harvest as much fruit as possible by overlapping fruit tree cards. Cards are played onto the growing "orchard" so that a card's fruit symbols overlap as many identical-fruit symbols on already-placed cards as possible, with each overlap scoring a die that tracks the harvest. Two "rotten fruit" cubes allow placing a card in an otherwise illegal position at the cost of penalty points. Winner of the 2018 BoardGameGeek Golden Geek Award for Best Print-and-Play Game, Orchard is a masterpiece of minimalist design — a genuinely tense and engaging puzzle in just nine cards and under ten minutes.

