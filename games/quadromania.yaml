description: |
  Quadromania is a two-player abstract strategy game in which players alternate placing or claiming pieces on a board, with 16 pieces spanning all combinations of four colors and four shapes. One player seeks to align matching colors while the other seeks to align matching shapes, creating a tense spatial duel with asymmetric winning conditions. The game rewards careful observation and forward planning in a compact, quick-playing format.

