description: |
  Dice Hospital is a worker placement game for 1–4 players in which each player manages a hospital, treating patients represented by dice—the lower the die value, the sicker the patient. Each round new patients are admitted (rolled dice assigned to hospital wards), then players deploy specialist staff workers to various departments to increase patient die values through treatment, aiming to discharge as many fully healed patients as possible. The game's unique use of dice as patients, combined with the deep hospital-building engine of upgradeable departments and hired staff, creates a satisfying puzzle with genuine strategic depth.

