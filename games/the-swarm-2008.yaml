description: |
  The Swarm is a 2008 area control and ocean exploration board game designed by Wolfgang Kramer and Michael Kiesling, published by Z-Man Games and based on Frank Schatzing's science fiction novel of the same name. Players represent nations investigating mysterious oceanic events, establishing research stations and sending out ships to gather water sample tiles from the ocean. Researchers analyze tiles to score research points, then return tiles to the sea, all while trying to establish contact with a vast oceanic intelligence called the Swarm by placing buoys strategically. The maritime sci-fi theme and area-majority scoring create a distinctive Euro experience from two of the genre's most celebrated designers.

