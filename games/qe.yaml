description: |
  QE (Quantitative Easing) is a unique auction game in which players take on the roles of central banks bidding unlimited amounts of money to bail out companies during an economic crisis. After the lead player makes an open initial bid, all other players submit secret sealed bids — and the player who prints the most money overall loses the game entirely. This elegant anti-greed mechanic creates delicious tension between aggressive bidding and restraint, rewarding players who collect the most valuable sets of companies without becoming the biggest spendthrift.

