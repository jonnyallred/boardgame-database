description: |
  Colonial Twilight is the first two-player entry in GMT's acclaimed COIN (COunterINsurgency) series, covering the brutal French-Algerian War of 1954-1962. One player commands the FLN insurgents seeking independence through popular support and guerrilla operations, while the other plays the French colonial government using military sweeps and political maneuvering. Like other COIN games, cards drive the action — each presenting two factions with competing event options — but the two-player format streamlines turns significantly. The asymmetric design captures the war's political and military complexities, rewarding players who understand both conventional and unconventional strategy.

