description: |
  Caldera Park is a tile-laying and pattern-building game designed by the celebrated duo Wolfgang Kramer and Michael Kiesling, published by Pegasus Spiele in 2022. Players design a national park by placing animal family tiles on a personal board, earning points for large contiguous groups of the same species with access to watering holes while avoiding harsh weather terrain. Each round, one player selects a species and terrain requirement from a shared display and all players must place a token following that rule, creating a simultaneous-draft feel. Its short playtime, accessible rules, and satisfying spatial puzzle make it an excellent family euro.

