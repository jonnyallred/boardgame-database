description: |
  Cuba Libre is the second volume in GMT Games' acclaimed COIN (Counterinsurgency) series, putting 1-4 players into the Cuban Revolution of 1956-1959. Each player controls one of four asymmetric factions — the 26th of July Movement, the Batista Government, the Directorio, or the Syndicate — each with distinct capabilities and victory conditions that create overlapping alliances and shifting diplomacy. The game is considered the most accessible entry point to the COIN system due to its streamlined rules and shorter play time. Its brilliant solo and multiplayer bot system allows it to be played by any player count, making it as rewarding for the lone revolutionist as for a full table of scheming factions.

