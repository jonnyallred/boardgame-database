description: |
  Successors is a 1997 Avalon Hill game co-designed by Richard Berg and Mark Herman that puts 2-5 players in the roles of Alexander the Great's generals — the Diadochi — as they scramble to inherit his empire after his death in 323 BCE. Players wage military campaigns, forge and break alliances, and court legitimacy by controlling Alexander's heirs and supporting the royal line. The interplay of military force, political maneuvering, and shifting allegiances creates a rich multi-player experience that captures the turbulent chaos of the Hellenistic succession wars. The game has since been republished in multiple editions, most recently the fourth edition by Phalanx Games in 2022.

