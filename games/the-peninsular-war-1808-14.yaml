description: |
  The Peninsular War 1808-14 is a 1973 historical wargame published by Rostherne Games, simulating Napoleon's bloody campaign in the Iberian Peninsula during the Wars of the Seventh Coalition. One player commands the combined allied armies of Britain, Spain, and Portugal led by Wellington, while the other commands the invading French Imperial forces. The game covers the full sweep of the Peninsular campaign, from the initial French invasion through Wellington's eventual liberation of Spain, capturing the guerrilla warfare, supply difficulties, and shifting territorial control that defined this grueling theater of war.

