description: |
  Divine Wind is a two-player strategic board wargame simulating the Pacific War from the attack on Pearl Harbor onward, with one player controlling Japanese forces and the other commanding the Allies. Published by Simulations Canada in 1981, the game covers naval, air, and ground operations across the Pacific theater using hex-based maps and detailed counter sets. The title references the kamikazes (divine wind) employed by Japan, and the game is noted for its depth in recreating the operational challenges and strategic dilemmas faced by both sides throughout the conflict.

