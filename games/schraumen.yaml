description: |
  Schraumen is a card game whose name is a portmanteau of the German words Schriftrollen (scrolls) and Pflaumen (plums), reflecting its whimsical mechanic of enacting nonsensical laws written on scrolls paid for with plums. Players each hold three scroll cards and seven plum tokens (which serve both as currency and victory points), bidding plums to play scrolls that change the game's rules. If a player cannot follow a currently active rule, their scroll is "burned" and removed from play. The emergent chaos of stacking and conflicting laws gives the game a delightfully absurdist character.

