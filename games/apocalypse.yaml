description: |
  Apocalypse: The Game of Nuclear Devastation is a 1980 board game published by Games Workshop,
  based on Mike Hayes's 1974 self-published design The Warlord. Set on a map of Western Europe,
  two to four players vie for total continental domination using conventional armies and nuclear
  missiles. The turn sequence — fire missiles, build armies, move, attack — resembles Risk but adds
  the terrifying element of irradiating territory with nuclear strikes.

  Games Workshop acquired the rights in 1980 and revised the design: simplifying rules, reducing the
  player count to four, removing hydrogen bombs, and allowing irradiated zones to eventually recover.
  The nuclear weapon dimension gives the game a distinctive Cold War tension, as players weigh the
  strategic devastation of atomic strikes against the cost of poisoning territory they intend to hold.

