description: |
  Anti-Monopoly is a 1974 board game created by San Francisco State University economics professor
  Ralph Anspach as a pointed critique of Monopoly's glorification of monopolistic capitalism.
  Players are divided into "Competitors" and "Monopolists," each with different rules: competitors
  can build anywhere but earn modest rents, while monopolists earn higher rents but are constrained
  by antitrust-style rules. The board begins saturated with monopolies, and competitors work to
  dismantle them in favor of free markets.

  The game sparked a decade-long legal battle with Parker Brothers/Hasbro over use of the word
  "Monopoly" in the title — a lawsuit that unearthed the true origins of the original Monopoly
  game, crediting Lizzie Magie rather than Charles Darrow. Anti-Monopoly remains both a playable
  game and a provocative piece of board game history.

