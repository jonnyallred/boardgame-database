description: |
  Struggle for the Throne is a 1984 FASA Star Trek game set during the Klingon succession crisis. Players lead powerful Klingon families competing to replace the dying Emperor using bribery, assassination, spies, threats, battles, and deal-making. The game proceeds in two phases: a diplomatic negotiation phase while the Emperor still lives, followed by open warfare once he dies, in which each Thought Admiral deploys Commanders and squadron forces to eliminate all rivals. The fusion of political intrigue and tactical combat makes it an engaging multi-player experience in the Star Trek universe.

