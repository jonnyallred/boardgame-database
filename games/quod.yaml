description: |
  Quod is an abstract strategy board game invented by G. Keith Still in 1979, played on an 11×11 grid. Players place colored pieces and blocking stones to complete a square (Quod) with their four corners while preventing opponents from doing the same. The game was popularized internationally when featured in Scientific American in March 1996, and it has since been produced in wooden versions by ROMBOL. Simple enough to learn in minutes yet offering genuine strategic depth, Quod is a classic of the abstract game design tradition.

