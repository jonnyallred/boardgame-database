description: |
  Wizards of the Grimoire is a two-player strategic card game designed by Cole Banning and Joe Banning, published by Grimoire Games in 2022. Players draft spells from a shared grimoire, cast them, and manage cooldowns as they deal damage to defeat their opponent. Each spell has unique effects that interact with others, creating a deep system of combos and counter-play despite a simple card structure. With an expansion (Shifting Sands) already available, the game has developed a dedicated following for its accessible yet tactically rich spell-slinging duels.

