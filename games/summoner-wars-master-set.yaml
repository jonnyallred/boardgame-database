description: |
  Summoner Wars: Master Set (First Edition) is a 2011 tactical dueling card game by Colby Dauch published by Plaid Hat Games. Players take command of one of six asymmetric factions — including The Vanguards, Savannah Elves, Polar Dwarves, Cave Goblins, Breakers, and Fallen Kingdom — summoning units from their faction deck to battle on a gridded battlefield. Dice determine combat outcomes, while hand management and careful summoning economy create deep strategic decisions. The Master Set includes all six factions, a battlefield board, and dice for a complete experience. A second edition was released in 2021.

