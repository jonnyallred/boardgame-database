description: |
  The Squirrel Game is a 1987 children's dice game published by Ravensburger for 2-4 players ages 5-10. Players race to collect 15 pine cones into their squirrel's hoard before opponents do, rolling dice and gathering the wooden or plastic pine cone pieces each turn. The game's simple mechanics and adorable squirrel theme make it an excellent first board game for young children, teaching counting and turn-taking in a brief 15-minute play session. Ravensburger published the game alongside Discovery Toys as a gentle introduction to competitive family gaming.

