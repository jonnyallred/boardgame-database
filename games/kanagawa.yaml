description: |
  Kanagawa is a drafting and set collection game themed around painting school students of the master Hokusai in 19th-century Japan. Each round players draft lesson cards that extend either their studio (gaining abilities) or their painting scroll (scoring sets of subjects — trees, animals, buildings, characters). The press-your-luck element comes from choosing when to finalize your scroll: waiting longer allows a more harmonious and higher-scoring painting, but risks rivals securing the cards you need. Beautiful ukiyo-e-style artwork and elegant multi-use card mechanics make Kanagawa a visually and mechanically satisfying light Euro.

