description: |
  Shax is a traditional Somali abstract strategy game, a variation of the Morris family of games (similar to Nine Men's Morris), played on a board of three concentric squares with connecting lines forming 24 intersection points. Each player places 12 pieces alternately, aiming to form a "jare" (three in a row) — unlike Nine Men's Morris, in Shax forming a row during placement does not immediately allow removal of an opponent's piece; the two-phase game has unique capture rules. Deeply embedded in Somali culture and oral tradition, it is often played socially with observers actively participating in strategy discussion.

