# Description
description: |
  A dexterity cooking game in which players prepare dishes by carefully adding
  spices from miniature spice shakers to small cooking pots. The challenge is
  dispensing just the right amount of each spice — too little and your dish is
  bland, too much and it's ruined. Players race to complete recipes while avoiding
  spice disasters. The tactile spice-shaker mechanic and colorful food-themed
  components made the game a Spiel des Jahres nominee. Published by Zoch Verlag,
  the German publisher known for innovative family games.

