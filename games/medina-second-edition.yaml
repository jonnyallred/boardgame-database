description: |
  Medina (Second Edition) is a strategic city-building game for 2-4 players set in the construction of an ancient Arabian city. Players take turns placing wooden buildings, towers, and walls onto a shared board, and must carefully claim buildings — each player can own only one of each color. Claiming a building scores points based on the number of pieces attached to it, plus bonuses for size and wall connections. This updated edition adds a double-sided board (enabling a better two-player experience), nearly 200 detailed wooden pieces, and new gameplay tweaks that deepen the tension of knowing when to claim vs. when to keep expanding.
