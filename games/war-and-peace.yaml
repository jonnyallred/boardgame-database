description: |
  War and Peace: Game of the Napoleonic Wars 1805-1815 is a grand strategic board wargame designed by Mark McLaughlin and published by Avalon Hill in 1980, simulating ten years of Napoleonic conflict across Europe. A Charles S. Roberts Award finalist for Best Pre-Twentieth Century Game of 1980, the game covers the full sweep of Napoleon's empire at its height through its eventual collapse. After Avalon Hill's closure, One Small Step Games acquired the rights and reprinted it in 2020 with a redrawn map, new counters, and added scenarios covering Napoleon's earlier Italian and Egyptian campaigns. It remains a landmark of strategic-level Napoleonic simulation.

