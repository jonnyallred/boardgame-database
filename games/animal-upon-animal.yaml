description: |
  Animal Upon Animal is a beloved 2005 wooden stacking game by HABA, designed by Klaus Miltenberger
  and targeted at families with young children. Players take turns rolling a die that dictates
  how many of their wooden animals they must stack atop the growing pile of creatures — if the stack
  collapses, the player collects extra animals to place later.

  The game features 29 charmingly crafted wooden pieces including crocodiles, monkeys, toucans,
  snakes, and hedgehogs, all made from PEFC-certified beech wood in Germany. The physical challenge
  escalates with each placement as the precarious animal tower grows taller and more unstable.
  It has sold over a million copies worldwide and remains one of HABA's most iconic titles,
  praised for its universal appeal and beautiful craftsmanship.

