description: |
  Shiloh: The Battle for Tennessee is a two-player hex-and-counter wargame designed by Kip Allen, Irad B. Hardy, and Redmond A. Simonsen, and published by SPI in 1975 as part of the Blue & Gray: Four American Civil War Battles collection. One player commands Union forces, the other Confederate, across 13 turns covering two days of the April 1862 battle. With only 100 counters and a compact map, the game was praised for its accessibility while introducing the innovative "Attack Effectiveness" mechanic that limits exhausted attackers. It was one of SPI's most popular releases in the year of its publication.

