description: |
  Almirante is a Portuguese naval strategy game designed by João Cavaco and published by Jogos
  Almirante Lda., a company founded in 2014. Two to six players take the role of admirals
  (almirantes) building and navigating fleets to dominate the geostrategic center of a shared
  ocean board.

  The game revolves around fleet building and positioning to control the center of the seas,
  combining tactical naval movement with territorial dominance. It is a relatively obscure
  Portuguese-origin title with limited international distribution, notable as an example of
  the growing independent board game design scene in Portugal.

