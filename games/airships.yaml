description: |
  A light strategy game designed by Andreas Seyfarth and published by Queen Games in 2007, set in a steampunk world of competing airship entrepreneurs. Players roll dice to acquire resources and airships, then manage money, engineers, and components to build and upgrade their fleets. Engine-building mechanics allow upgrades to workshops and mechanics that improve dice results and resource acquisition. Airships scores points by launching completed airships, rewarding players who efficiently build up their production engine over the course of the game.

