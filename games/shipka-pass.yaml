description: |
  Shipka Pass is a board game catalogued in Wikidata (Q1704181), likely themed around the famous Battles of Shipka Pass during the Russo-Turkish War of 1877–1878, in which a small Russian and Bulgarian volunteer force successfully defended the strategically vital mountain pass against a much larger Ottoman army. The historical engagement at Shipka Pass is a celebrated moment in Bulgarian national history. Specific details about the game's publisher, designer, year of publication, and mechanics could not be verified from publicly available sources; it may be a Bulgarian-market or Eastern European regional publication.

