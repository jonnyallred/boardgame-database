description: |
  Menara is a cooperative dexterity game designed by Oliver Richtberg and published by Zoch Verlag in 2018. Players work together to reconstruct an ancient temple by stacking column pieces on progressively narrower floor tiles, building upward without toppling the structure. Unlike pure dexterity games, Menara incorporates meaningful strategic decisions about which columns to place and where, adding planning to the physical challenge. The game's campaign system introduces increasingly demanding building requirements across multiple sessions, making it distinctive among dexterity games for its blend of cooperative puzzle-solving and physical tension.

