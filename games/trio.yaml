description: |
  Trio is a speedy memory and deduction card game designed by Kaya Miyano and published by Cocktail Games in 2023. The 36-card deck contains three copies each of cards numbered 1–12, and players take turns asking opponents for a specific card value to collect matching trios. The goal is to be the first to collect the trio of 7s (the central value) or complete three trios before anyone else. Blending the simplicity of a children's game with surprising tension and memory challenges, Trio is an addictive filler that plays in under 10 minutes.

