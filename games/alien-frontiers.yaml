description: |
  A retro sci-fi dice worker placement game first published by Clever Mojo Games in 2010, in which players colonize an alien planet using their fleet of spaceships—represented by dice. Each turn, players roll their fleet and assign dice to orbital facilities based on matching combinations, earning resources, expanding the fleet, and placing colonies on the planet to establish area control. Alien technology cards acquired during play allow rerolls and dice modification, adding a layer of engine building. The distinctive integration of dice-as-workers and area majority made Alien Frontiers a breakout indie success.

