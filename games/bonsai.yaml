description: |
  Bonsai is a serene tile-placement game for 1–4 players in which each player cultivates a living bonsai tree, carefully placing wood, leaf, flower, and fruit tiles to maximize beauty and points. On each turn players either meditate—selecting a face-up card and taking associated tiles—or cultivate, placing tiles from their personal supply according to the symbols on their Seishi tile and Growth cards. Three public objective cards with tiered thresholds create a clever racing tension: when you achieve an objective level, you must immediately decide whether to claim it or renounce it in hopes of reaching a higher tier.

