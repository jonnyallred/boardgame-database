description: |
  Grosz Jakosa is a board game published in 1989 that simulates greyhound racing across a series of six races at a race meeting. The game features a clever system for simulating dog racing, earning a rating of 9 out of 10 from Games International magazine reviewer Stan Bowles, who praised the accuracy of its racing simulation. Players manage their bets and experience the highs and lows of a day at the greyhound track across multiple heats. Designer information for this title is not widely documented.

