description: |
  Superfight is a party argument card game in which players build absurd
  superhero combinations by pairing character cards with attribute cards, then
  debate whose fighter would win in a battle. Each player draws a character and
  two attributes to create their unique champion, then the group votes on the
  winner based on the most compelling argument. With over 19 expansion packs
  available, Superfight encourages creative storytelling and lively debate in a
  lighthearted format. Originally funded on Kickstarter in 2013, the game was
  later picked up by Skybound Entertainment.

