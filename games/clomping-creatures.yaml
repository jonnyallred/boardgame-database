description: |
  Clomping Creatures is a tactile guessing game published by HABA in which players use their fingers and hands to mimic the walking movements of different animals on the backs of fellow players, who must then guess which creature is being imitated. Players compete to correctly identify the most animals, rewarded for both correct guesses and clever imitations. The game includes a cooperative two-player variant and comes with a game board, path cards, guessing cards, and a snake piece. It is a playful sensory game ideal for families with young children.

