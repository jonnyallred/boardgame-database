description: |
  Playing Gods is a satirical area-control board game released in 2008 in which 2–5 players each embody a different deity — from Jesus to Buddha, Zeus to Cthulhu, the Cult of Oprah to the Almighty Dollar — and compete to achieve world domination by spreading believers across a global map. Like Risk, players vie for control of continents containing Holy Cities, winning followers by conversion or slaying opponents with Acts of God. The game's irreverent satire blends social commentary with accessible gameplay, provoking discussion about religion and popular culture. Its tongue-in-cheek framing earned it attention at the 2009 New York Toy Fair.

