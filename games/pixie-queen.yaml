description: |
  Pixie Queen is a worker placement game in which 2–5 players serve a tyrannical pixie queen across up to seven rounds. Players use four action disks to steal food from the nearby human village, perform one of 21 different actions, and simultaneously offer gold, silver, or food to satisfy the Queen's ever-changing cravings. Uniquely, players accumulate only penalty points during play, with end-game rewards (from charming the Queen with golden rings, offerings, or promoting pixies to faithful servants) reducing totals — the player with the fewest points wins. The combination of competitive worker placement, simultaneous bidding, and unusual reversed scoring creates a distinctive strategic experience.

