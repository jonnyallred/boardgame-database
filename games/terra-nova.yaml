description: |
  Terra Nova is a streamlined fantasy territory-building game published by
  KOSMOS and Capstone Games in 2022, designed as an accessible version of
  Terra Mystica. Up to four players each control one of ten factions — each with
  unique asymmetric abilities — competing to explore territories, build structures,
  and fulfill round goals on a hexagonal map. The game simplifies Terra Mystica's
  complexity while retaining its satisfying faction asymmetry and area control
  depth, delivering a focused 60–90 minute experience that serves as an excellent
  gateway to the heavier original. Designed by Andreas Faul, it attracted strong
  praise for making its predecessor's design more broadly accessible.

