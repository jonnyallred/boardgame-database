description: |
  Trench Crusade is a grimdark skirmish miniatures wargame set in an alternate World War I timeline where the Crusades succeeded but opened a gate to Hell, plunging the world into a never-ending war between humanity and demonic forces. Designed by Tuomas Pirinen (lead designer of Mordheim) with horror artwork by Mike Franchina, the game pits asymmetric warbands — from the fanatical Trench Pilgrims to the New Antioch forces — against each other in brutal 32mm scale skirmish battles. Its living rulebook is free in perpetuity, and the game rapidly gained a passionate following for its unique lore, stunning visuals, and deep tactical gameplay. Published by Factory Fortress Inc via Kickstarter.

