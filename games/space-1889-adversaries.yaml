description: |
  Space 1889 Adversaries is a miniatures-related product in the Space: 1889 game line published by Game
  Designers' Workshop in 1989. Space: 1889, designed by Frank Chadwick, depicts an alternate Victorian era
  where scientific theories such as ether flight and a breathable Martian atmosphere proved true, enabling space
  travel. The Adversaries range provides miniatures and scenario rules for conflict between British Empire forces,
  Martian warriors, High Martians, and Victorian adventurers across a Steampunk science-fiction setting.

