description: |
  Tief im Riff (Deep in the Reef) is a cooperative children's game by Alex Randolph in which players control fish swimming through a coral reef to reveal hidden sea creature tiles. Players roll a die and move one of four shared fish along reef paths, and can reveal tiles matching the number of fish sharing a space — encouraging cooperative positioning to uncover the most creatures. The game won the 2018 Austrian "Spiel der Spiele" award as a Game Hit for Children and was recognized for its beautiful graphic design.

