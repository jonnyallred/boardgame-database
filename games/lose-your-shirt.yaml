description: |
  Lose Your Shirt is a light economic and auction game published by Avalon Hill in which players speculate on stocks, commodities, or similar financial instruments, trying to profit while rivals attempt to crash the market. Players buy and sell assets whose values fluctuate based on cards and dice events, with the winner being the player who accumulates the most wealth — or at least avoids being completely wiped out. The humorous title and theme of financial ruin give it a self-aware comedic tone that works well as a casual party game. A product of Avalon Hill's lighter game line, distinct from their wargame catalog.

