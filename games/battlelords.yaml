description: |
  Battlelords is a medieval fantasy wargame published by Mayfair Games in 1991, in which players command rival lords competing for control of a kingdom. Players recruit armies of infantry, cavalry, and siege weapons, then maneuver and battle across a territory map to expand their domain and eliminate rivals. The game captures the feudal competition for power through territory control and military might. As a product of Mayfair Games' catalog of the early 1990s, it offered accessible wargame mechanics with a fantasy-medieval aesthetic.

