description: |
  Set in a post-apocalyptic North America, 51st State puts players in charge of rival factions competing to found the new 51st state of the former United States. Players build their state by playing cards in three different ways: invading a location for a one-time resource gain, signing a contract for recurring income, or annexing a site to use its special ability. Each of the four asymmetric factions — Mutants, New York, Appalachian Federation, and Traders — has unique starting abilities that shape strategy. First released in 2010 by Portal Games, the game was later reimagined as the 51st State Master Set (2016), which serves as the definitive edition.

