description: |
  Battle Sheep is a light abstract area control game designed by Francesco Rotta and published by Blue Orange Games in which players try to dominate the most pasture hexes with their herds of 16 sheep tokens. The board is assembled from modular pasture tiles at the start, creating a different layout each game. Each turn a player splits one of their stacks and slides it in a straight line as far as it can go, leaving at least one sheep behind. As space dwindles, movement options shrink and blocking becomes crucial. Quick to teach and play, Battle Sheep is a family-friendly introduction to area control strategy.

