description: |
  Escalation! is a fast-playing card game designed by Charles Pierce and published by Z-Man Games in which players race to empty their hands by playing cards of escalating value. Each player is dealt six cards, and on their turn must either play a card or set of cards totaling more than the previous play, or take the entire pile as penalty cards. Special "2" and "3" cards can reverse direction or reset the pile. The player who empties their hand first wins, while all others count their remaining cards as penalty points. Its simple rules and quick play time make it a go-to filler for groups of all ages.

