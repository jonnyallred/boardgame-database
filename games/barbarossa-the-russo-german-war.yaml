description: |
  Barbarossa: The Russo-German War 1941-45 is a landmark hex-and-counter wargame designed by James F. Dunnigan and published by SPI in 1969, simulating the entire Eastern Front from Operation Barbarossa through the fall of Berlin. As the second major SPI release in the "Test Series," it became the most popular game in that series and established templates for modern wargame design. Players manage the enormous operational sweep of the Eastern Front across multiple turns representing weeks of combat, with hundreds of counters representing German Army Groups and Soviet Fronts. It is a seminal title in the history of conflict simulation gaming.

