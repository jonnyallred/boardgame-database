description: |
  Test Match is a British cricket simulation board game published by John
  Waddington Limited in 1955. Two players alternate as batting and bowling sides,
  with outcomes determined entirely by rotating dial randomizers — one dial for
  the bowler (revealing ball types like bouncer or leg break) and one for the
  batsman (indicating the response). A scoreboard with three rotating wheels
  tracks runs and wickets. The game captures the variability of real cricket
  matches through pure chance mechanics, making it a beloved nostalgic item for
  cricket fans in Britain and Australia (where it was published by John Sands
  Pty. Ltd.).

