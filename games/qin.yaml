description: |
  Qin is a tile-laying area control game designed by Reiner Knizia and published by Eggertspiele in 2012. Set during the Warring States period of ancient China, players place domino-like province tiles to surround and conquer villages, converting them to their color to score points. The player who first conquers all villages of one color — or holds the most villages when the tiles run out — wins. Deceptively simple in its rules yet offering genuine strategic tension, Qin is widely praised as one of Knizia's most elegant recent designs.

