description: |
  Strike is a 2012 dice-throwing game by Dieter Nüssle published by Ravensburger, played inside the box which serves as the arena. Each turn a player rolls one die into the arena, trying to match numbers with dice already present; matching pairs are removed and the player who loses all their dice is out. The press-your-luck decision of whether to throw another die or end your turn adds surprising tension to an otherwise pure-luck game. Fast, raucous, and easy to learn, Strike bridges the gap between party game and dexterity filler.

