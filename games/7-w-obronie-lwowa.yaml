description: |
  A Polish historical educational board game published by the Institute of National Remembrance (IPN) in 2015, set during the Polish-Soviet War of 1920. Players recreate the 7th Fighter Squadron's mission to stop the 1st Red Cavalry Army from reaching Lviv. The game offers two variants: a simplified version for children aged 8 and up and an advanced version for adults, covering the cavalry's advance across the Bug River and three Polish aircraft attempting to intercept. Designed to commemorate a little-known episode of Polish military history during the Battle of Lwów.

