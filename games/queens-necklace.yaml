description: |
  Queen's Necklace is an intrigue-filled card game designed by Bruno Cathala and Bruno Faidutti, set in pre-revolutionary Paris where players compete as royal jewelers vying to sell rare gems to the Queen and her court. Players secretly draft and play jewel cards, using bluffing and deduction to outmaneuver rivals before an auction-style selling phase determines who profits most. Originally published by Days of Wonder in 2003 and later reprinted by CMON, the game elegantly blends memory, bluffing, and hand management in a compact historical theme.

