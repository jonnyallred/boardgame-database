description: |
  Kamakura is a 1981 West End Games wargame and diplomacy game set during Japan's Kamakura Shogunate (1192-1333), the era when Japanese feudalism and the samurai class reached their height. Two to six players represent competing clans and power factions, maneuvering forces, fighting land and sea battles, and conducting intricate negotiations in a race to become Shogun. The blend of military conflict with Machiavellian political diplomacy among multiple players creates a dynamic multiplayer wargame with high social interaction and shifting alliances.

