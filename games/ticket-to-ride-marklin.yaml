description: |
  Ticket to Ride: Märklin is the third major standalone entry in the Ticket to Ride series, set on a map of 1902 Germany produced in collaboration with the famous German model railway company Märklin. The game introduces Passengers and Merchandise mechanics, where players move passengers between cities to collect merchandise cards for bonus points. Each train card features a unique image of a Märklin model locomotive or car, adding collector appeal to an already robust rail-building game.

