description: |
  City States of Arklyrell is a compact fantasy wargame published by Task Force Games in 1983 for 2-4 players, designed by Mike Joslyn. Set on the fantasy world of Arklyrell with six continents, players compete for control of eight Citadels across 25 turns, recruiting neutral combatants and maneuvering forces through varied terrain using boats and giant rocs for intercontinental movement. As a microgame in the Task Force tradition, it offers accessible rules in a ziplock format. The game's evocative hex-crawl world map has attracted interest from RPG enthusiasts as a potential campaign setting.

