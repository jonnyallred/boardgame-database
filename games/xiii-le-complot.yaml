description: |
  XIII: Le Complot is a board game adaptation of the Belgian comic book series XIII, designed for
  two to four players. Each player controls a team of agents drawn from the cast of 27 characters,
  each with their own profiles, skills, and abilities as written by Vance and Van Hamme. Players
  move across the terrain of XIII's adventures, recruiting operatives and completing missions to
  accumulate investigation points. After five or eight rounds, the player with the most points wins.

