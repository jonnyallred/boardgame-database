description: |
  Tavli is Greece's national board game, a compendium of three backgammon
  variants — Portes, Plakoto, and Fevga — typically played in sequence, with
  the first player to accumulate a set number of points winning the match. In
  Portes (closest to standard backgammon), pieces can be hit and sent to the
  bar; in Plakoto, pieces are pinned by stacking rather than removed; and in
  Fevga, a single piece can secure a point. Played with a shared pair of dice
  (no doubling cube), Tavli is ubiquitous in Greek cafes and social life, with
  a deeply ingrained cultural tradition of fast, passionate play.

