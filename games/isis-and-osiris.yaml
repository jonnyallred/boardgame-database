description: |
  Isis & Osiris is an abstract strategy and hidden information game set in ancient Egypt. Players place their wooden disks on a shared board and take turns placing face-down tiles with positive and negative values around their disks. When the board is fully covered, all tiles are revealed and each disk is scored by summing the values of orthogonally adjacent tiles. The tension lies in reading opponents' tile placements and timing your own disk positioning to maximize adjacency to secretly high-value tiles while avoiding negative ones. A compact and clever deduction-tinged abstract from designer Michael Schacht.

