description: |
  Terrorscape is an asymmetric hidden movement horror board game published by
  Ice Makes in 2023. Survivors cooperate to find five keys and escape a 3D
  mansion or radio for help, while one player controls a killer who hunts them
  using noise generated by survivor actions. Players use separate maps — the
  mansion layout and a screen divide — preventing direct observation of each
  other's positions. Each character has unique asymmetric skills. The game's
  centerpiece is a large 3D mansion that functions as both a dice tower and
  a physical divider, creating immersive tension through sound cues and
  deduction in a claustrophobic horror setting with atmospheric music.

