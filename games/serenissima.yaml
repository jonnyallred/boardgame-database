description: |
  Serenissima (published as Méditerranée in France) is a trading and naval combat game set during the Renaissance Mediterranean, designed by Dominique Ehrhard and first published by Eurogames in 1996. Players build fleets of merchant ships, purchase commodities from ports across the Mediterranean, sail to sell them at distant markets, and engage in piracy against rivals. Control of key ports drives income and resource access, creating a tense balance between commerce and military dominance across a historically evocative map.

