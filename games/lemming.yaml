description: |
  Lemming is a children's dexterity and memory game published by Ravensburger in which players flip and stack colored lemmings in a frantic race against each other. Players must arrange their lemmings in the correct color order as quickly as possible, often knocking over and restarting their tower in the process. The bright colors and appealing lemming figures make it attractive to young players, while the speed and dexterity elements keep adults entertained. A simple, quick, and energetic filler game that requires no reading and works well for families with children of mixed ages.

