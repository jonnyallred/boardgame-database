description: |
  Catan: Event Cards is a 2006 expansion for Settlers of Catan that replaces the standard two dice with a deck of 37 event cards. Each card produces a numbered resource result like the dice would, but also triggers special events such as Plentiful Year (each player takes a free resource), Conflict (the Largest Army holder steals from all players), Robber Flees, or Earthquake (roads are damaged). The expansion reduces the pure randomness of dice rolling and adds memorable narrative moments to the standard Catan game. Compatible with Cities and Knights for additional event effects.

