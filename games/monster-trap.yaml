description: |
  Monster Trap is a cooperative dexterity children's game designed by Markus Brand and Inka Brand, published by 999 Games in 2011 and also distributed through Thames & Kosmos. Players work together, each controlling a set of sliders — one player handles vertical movement, another horizontal — to push a monster piece along the corridors of a mansion toward the central trap. The cooperative split of controls makes communication and coordination essential, creating a fun challenge for young players while promoting teamwork and fine motor skills.

