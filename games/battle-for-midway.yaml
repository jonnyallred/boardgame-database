description: |
  Battle for Midway: Decision in the Pacific, 1942 is an Avalon Hill wargame simulating the pivotal naval air battle of Midway in June 1942, where the United States Navy inflicted a devastating defeat on the Imperial Japanese Navy. Players command the opposing carrier fleets, managing search operations, air strikes, fighter cover, and the critical unknown of enemy carrier locations. The game captures the fog-of-war element central to the actual battle, where intelligence and luck of search patterns determined who struck first. The Battle of Midway turned the tide of the Pacific War and is one of the most studied naval engagements in history.

