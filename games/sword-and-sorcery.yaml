description: |
  Sword & Sorcery is a cooperative epic-fantasy dungeon crawl for 1–5 players in which immortal heroes fight through a campaign of quests to save a kingdom from darkness. Each hero has a unique power deck and ability set, and when a hero falls in combat they are reborn between scenarios — retaining memories and items but potentially with altered abilities. The game features an innovative AI system that controls enemy behavior with variable tactics, making encounters feel dynamic and threatening. Designed by Simone Romano and Nunzio Surace, the Immortal Souls core set provides a full cinematic campaign with escalating narrative stakes.

