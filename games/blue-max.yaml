description: |
  Blue Max is a multi-player WWI aerial combat game published by Game Designer's Workshop
  (GDW) in 1983, named after the prestigious German order Pour le Mérite (the "Blue Max").
  Each player is a fighter pilot from the British, French, American, or German air service
  over the Western Front in 1917-18, using a hexagonal board and secret maneuver planning
  sheets for simultaneous movement. Planes can be flown in campaign mode with surviving
  pilots gaining skill over time. The game's 18 double-sided aircraft maneuver sheets
  and 60-aircraft counter mix made it one of the definitive WWI air wargames.

