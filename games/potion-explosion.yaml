description: |
  Potion Explosion is a puzzle game in which 2–4 aspiring wizards draw ingredient marbles from a large physical dispenser, triggering chain reactions when marbles of the same color collide. Players collect these ingredient marbles and use them to fill potion tiles on their workbench — completing potions grants their magical effects and advances end-game scoring. Completing three potions of the same type or five different types earns a valuable Skill Token. The combination of a tactile marble dispenser, the visual satisfaction of chain explosions, and strategic planning of which marble to pull makes it a uniquely compelling puzzle experience. Published by Horrible Guild and available in multiple editions.

