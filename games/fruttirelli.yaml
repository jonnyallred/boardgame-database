description: |
  Fruttirelli is a children's board game published by Selecta Spielzeug in which players help little woodland animals — a hedgehog, hare, squirrel, and badger — forage for apples, mushrooms, and berries to bring back to their families. Players race to return home first while collecting sufficient provisions, with simple mechanics that require no reading or language. The game's charming animal theme and accessible rules make it an ideal introduction to board gaming for very young children.

