description: |
  Friedrich is a card-driven wargame designed by Richard Sivél, first published in 2004, simulating the Seven Years' War in Europe. One player controls Prussia under Frederick the Great, fighting outnumbered against coalitions of Russia, Austria, and France played by the other 2-3 players. Generals maneuver across a map of Europe, and battles are resolved using a card-based system tied to suit values, making hand management and timing critical. Prussia must survive long enough for its enemies to be weakened by historical events while the coalition players coordinate to capture key Prussian cities. Widely praised for its depth, historical flavor, and tense asymmetry, Friedrich won Games magazine's Best Historical Simulation award in 2006.

