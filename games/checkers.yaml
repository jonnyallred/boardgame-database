description: |
  Checkers (known as Draughts outside North America) is one of the world's oldest and most widely played board games, with roots tracing back to the Alquerque games of ancient Egypt and Mesopotamia. The modern form — played on a standard 8x8 checkered board with 12 pieces per side moving diagonally — emerged in Europe around the 12th century, likely in southern France. Players must jump over and capture enemy pieces while advancing their own, with pieces reaching the far side promoted to "kings" that can move backward. Simple to learn but capable of deep strategic play, checkers remains a beloved game of pure two-player abstract competition.

