description: |
  Take Off! is a 1988 aviation-themed racing board game in which players race
  fleets of jet aircraft from city to city across a large laminated world map,
  following colored route lines. The first player to complete a round-the-world
  flight route wins the game. The game combines strategy with luck as players
  navigate the global map, selecting routes and managing their fleet across
  intercontinental legs. The laminated map board is a distinctive feature that
  suggests durable family use across many play sessions.

