description: |
  Unlock! Epic Adventures is a collection of three cooperative escape room card game scenarios from Space Cowboys' Unlock! series. Players use a card-based system paired with a free companion app to solve puzzles, find hidden codes, and unravel mysteries across three distinct adventure settings. Like all Unlock! games, there is no board setup, the app tracks time and hints, and the scenarios are entirely replayable by new groups. The series draws inspiration from classic adventure fiction to create immersive card puzzle experiences.

