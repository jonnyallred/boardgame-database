description: |
  Whoowasit? is a cooperative electronic mystery game for 2-4 players in which players work together to solve the theft of a magical ring from a castle. Players move their pieces through rooms on the board to gather clues, with a talking treasure chest electronic device randomly dispensing hints and ensuring no two games play out the same way. Designed by Reiner Knizia and published by Ravensburger, the game blends light deduction with cooperative play in an accessible format suitable for younger players.

