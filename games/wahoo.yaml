description: |
  Wahoo is a traditional American cross-and-circle marble racing game nearly identical to the German game Mensch ärgere Dich nicht (1907) and closely related to Parcheesi and Aggravation. Players race coloured glass marbles around an asterisk-shaped track, drilling shortcuts into the board to speed progress. To enter play, a marble requires a roll of 1 or 6. If a marble lands on an opponent's space, the opponent's marble is sent back to start — providing the "aggravation" of the commercial edition. Parker Brothers commercialised this folk game as Aggravation for decades; the handcrafted wooden Wahoo boards remain popular in Appalachian and rural American traditions.

