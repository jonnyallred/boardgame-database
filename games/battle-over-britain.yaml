description: |
  Battle Over Britain is a 1983 Avalon Hill wargame simulating the aerial campaign of the Battle of Britain in the summer and autumn of 1940. One player commands the German Luftwaffe attempting to destroy RAF Fighter Command and gain air superiority over England; the other commands the Royal Air Force defending British airspace and radar installations. Players manage fighter squadrons, fuel, and aircraft production while engaging in dogfights and strategic bombing. The game captures the pivotal three-month air battle that determined whether Germany could invade Britain.

