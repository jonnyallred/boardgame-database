description: |
  The Mad Magazine Game is a 1979 satirical board game by Parker Brothers that parodies classic games like Monopoly by inverting their objectives—here, the first player to lose all their money wins. Each player starts with $10,000 and moves counterclockwise around the board, rolling dice with their left hand. Spaces and card draws cause players to trade chairs or money, perform comic stunts, or otherwise lose cash. The game reportedly outsold Monopoly briefly upon its release and embodies the absurdist, anti-establishment humor of Mad Magazine with Alfred E. Neuman's face grinning throughout.

