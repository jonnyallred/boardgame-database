description: |
  Tavreli (also called Russian Chess) is a modern stacking chess variant inspired
  by a lost ancient Russian game. Recreated in the late 1990s by combining
  standard chess with Bashni (Russian stacking draughts), the game introduces
  a distinctive mechanic: when a piece captures an enemy piece, the captured
  piece is placed under the capturing piece, forming a stack. Stacks belong to
  the player controlling the topmost piece and move as that piece type. Friendly
  pieces can also stack on each other. Pawns promote when opposite their
  starting opponent's piece, gaining unique compound abilities. The resulting
  game is a deeply complex and dynamic variant of chess.

