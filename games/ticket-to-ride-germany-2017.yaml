description: |
  Ticket to Ride: Germany is a 2017 standalone entry in the Ticket to Ride series by Alan R. Moon and Days of Wonder, featuring a map of Germany and a unique passenger mechanic. When players claim a route, they collect a passenger meeple of their choice from either end city; at game end, the player with the most of each passenger color scores 20 points, and second place scores 10. As passengers are limited per city, popular areas run dry quickly, adding a competitive race to claim passengers alongside routes. Players also choose between short and long destination tickets from separate decks, adding further variety to this standout entry in the Ticket to Ride family.

