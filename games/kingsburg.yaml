description: |
  Kingsburg is a 2007 dice placement game by Andrea Chiarvesio and Luca Iennaco where 2-5 players govern frontier territories by rolling dice and assigning their results to influence King Tritus's advisors. Over five in-game years (20 turns), players collect resources to construct buildings and field armies, as every fourth turn brings an invading army all must defend against simultaneously. The allocation of dice to numbered advisors creates elegant push-and-pull tension as players compete for the same influential figures with limited dice pools. First published by Stratelibri in Italy, Fantasy Flight Games brought it to global audiences in 2008.

