description: |
  Star Wars: X-Wing Second Edition is the 2018 redesign of Fantasy Flight Games' popular starship combat game, streamlining and rebalancing the mechanics of the first edition. The simultaneous-reveal movement system is retained, but faction identities are more strongly differentiated, and the Force is introduced as an important mechanical element affecting flight and pilot abilities. The First Order and Resistance become distinct factions separate from Imperials and Rebels. Extensive errata and point adjustments from the first edition were baked into the fresh rule framework.

