description: |
  Cards Against Humanity is an adult party game designed by a group of friends from Highland Park, Illinois and self-published in 2011. Each round, one player draws and reads a black "question" or fill-in-the-blank prompt card, and all others secretly play their best white "answer" cards; the Card Czar picks the funniest combination and the winner keeps the black card as a point. The game became a cultural phenomenon with its unapologetically offensive humor and free Creative Commons release, spawning dozens of expansion packs and inspiring an entire genre of similarly themed party games.

