description: |
  The Lord of the Rings: The Two Towers is a 2002 expansion to Reiner Knizia's cooperative Lord of the Rings board game. As one of several expansions to the base game, it adds new scenario boards, encounter cards, and challenges tied to the events of the second volume of Tolkien's trilogy. Players continue to work together as hobbits navigating the peril of Sauron's corruption while managing their resources across increasingly difficult encounters. The expansion deepens the base game's narrative arc and is required for the full cooperative experience across all three books of the trilogy.

