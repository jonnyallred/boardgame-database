description: |
  Von Manstein: Battles for the Ukraine is a two-player hex-and-counter wargame simulating Axis and Soviet operations in southern Russia and Ukraine during World War II, originally published by Rand Game Associates in 1975. One player commands Axis forces, the other Soviet, across multiple campaigns covering 1941–1944. The game was later revised and expanded as Panzerkrieg by Operational Studies Group in 1978, and subsequently published by Avalon Hill in 1984. Covering some of the largest armoured engagements in history, the game is a comprehensive and demanding operational-level simulation of the Eastern Front.

