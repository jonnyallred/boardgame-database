description: |
  A game of seafaring and smuggling for 2-4 players published by Leder Games in 2022, in which swashbucklers and soldiers compete on the high seas using dice-driven asymmetric factions. Each round, players roll and place dice to execute the unique actions of their faction: the Bluefin Squadron uses brute force, the Mollusk Union employs strategic card play, and the Smugglers focus on cargo delivery and speculation. The mix of area majority, tile placement, and modular board mechanics creates a deeply asymmetric experience where each faction pursues a different victory path. Illustrated by Kyle Ferrin in his distinctive style, Ahoy brings Root's design sensibility to a nautical setting.

