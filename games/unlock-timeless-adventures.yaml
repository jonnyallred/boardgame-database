description: |
  Unlock! Timeless Adventures is the sixth volume in the Unlock! cooperative escape-room card game series by Space Cowboys. Three standalone one-hour scenarios challenge players across time: foiling Professor Noside's sabotage of the Diosen Circus, racing the legendary thief Arsène Lupin to recover the Great White Diamond in Belle Époque Paris, and repairing Professor Tempus' malfunctioning time machine. As with all Unlock! titles, players use a deck of illustrated cards alongside the free companion app to search scenes, combine objects, and solve puzzles before time expires.

