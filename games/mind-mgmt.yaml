description: |
  Mind MGMT: The Psychic Espionage Game is a one-versus-many hidden movement game by Jay Cormier, published by Off the Page Games in 2022 and based on Matt Kindt's graphic novel series. One player acts as the Recruiter, moving secretly behind a screen trying to visit locations matching their feature cards while deploying Immortals to protect key sites; the other players work cooperatively as rogue agents, using dry-erase mental notes to deduce the Recruiter's whereabouts by asking questions and interpreting cryptic answers. The game won multiple awards for innovation and delivers a tense cat-and-mouse experience that feels unlike other hidden movement games.

