description: |
  Turm & Wächter (Tower & Guard) is a German abstract positional strategy game created in 1997 by Christoph Endres and Robert Wirth. Praised for its elegant rules and deep tactical play, it has been described as easy to learn but difficult to master, rewarding experienced players who develop positional understanding. The game has been praised by abstract strategy enthusiasts in Germany, though it has not been commercially published by a major publisher.

