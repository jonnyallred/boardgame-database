description: |
  Quiddler is a short word card game designed by Marsha J. Falco and published by Set Enterprises in 1998. Players are dealt increasing hand sizes each round (starting at three cards, ending at ten) and must arrange all cards into one or more valid English words, scoring the point values printed on each card. Bonus points are awarded for the most words in a round and the longest word, adding extra incentive. Featuring beautifully illustrated Celtic illuminated letter art, Quiddler has won over 20 Best Game Awards and blends Scrabble's vocabulary challenge with the hand management of gin rummy.

