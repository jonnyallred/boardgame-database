description: |
  Unfair is a competitive theme park building card game designed by Joel Finch and published by Good Games Publishing and CMON in 2017. Players combine modular theme decks (Pirate, Robot, Vampire, Gangster, Ninja, Jungle) to build their park, hiring staff, constructing rides, and playing event cards — including sabotaging opponents' parks with disasters and dirty tricks. Over eight rounds, players develop attractions by upgrading cards in a tableau while managing hand, resources, and opponent interference. The game's "Take That" interactions give it a chaotic, high-energy feel despite its Euro-style construction mechanics.

