description: |
  StegegetS is a 2024 roll-and-write game set in our solar system, published by Ion Game Design and CardBoard Pirates. Players roll seven dice each turn to get combinations that let them land on planets, moons, and other objects in the solar system, drawing directly on a shared beautiful map sheet to track their journey. Once a player claims a location, no one else can score that combination. Players collect water resources to roll more times and invest in technologies for ongoing bonuses, balancing push-your-luck decisions with long-term efficiency. The palindromic name reflects the game's back-and-forth puzzle nature.

