description: |
  Java is an action-point tile-placement game set on the Indonesian island of Java, the second game in Kramer and Kiesling's mask trilogy following Tikal. Players take turns spending action points to place hexagonal terrain tiles and build up the island, then score points by hosting palace festivals at elevated vantage points. Timing the festival celebrations for maximum advantage while denying opponents scoring opportunities creates sharp tactical tension. Winning the Deutscher Spiele Preis and Games Magazine's Best Advanced Strategy award in 2001-2002, Java is regarded as a refined and elegant mid-weight Euro.

