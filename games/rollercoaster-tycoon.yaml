description: |
  RollerCoaster Tycoon is a licensed board game adaptation of the popular 1999 video game franchise, published by Parker Brothers in 2002. Players compete to build the most successful theme park by constructing rides, managing resources, and attracting visitors, translating the beloved park-building simulation experience into tabletop form. Like many licensed games of its era, it prioritizes accessibility and thematic immersion for fans of the video game over deep strategic gameplay, making it a family-friendly gateway experience. The game captures the colorful spirit of park management with simple mechanics designed to appeal to the game's broad video game fanbase.

