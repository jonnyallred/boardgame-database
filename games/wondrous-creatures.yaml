description: |
  Wondrous Creatures is a worker placement and tableau building game designed by Yeom C.W. and published by Bad Comet in 2024. Players lead naturalist expeditions to discover and document fantastical creatures, combining an innovative worker placement system with tableau-building mechanics. Each creature collected has unique attributes that interact with those already in your collection, creating evolving synergies over the course of the game. With stunning artwork by Sophia Kang and a solo mode, Wondrous Creatures captures the sense of scientific wonder and discovery that drives collectors and naturalists.

