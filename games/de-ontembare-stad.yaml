description: |
  De Ontembare Stad (The Indomitable Citadel) is a Dutch city-building board game designed by Hans van Tol that won the Dutch Game Prize in 2004. Up to five players take the roles of Grand Masters of knightly orders, cooperating and competing to grow a medieval town into a magnificent citadel through construction and territorial influence. Players use Influence Cards to take new territories, seize opponents' districts, or sabotage rivals by burning down buildings — with the goal of becoming the dominant power and ultimately king of the citadel. An expansion, Het Verraad (Treason), adds further intrigue to the base game.

