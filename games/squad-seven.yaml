description: |
  Squad Seven is a real-time adventure card game published by Foxmind in 2002 with an Indiana Jones-inspired
  jungle treasure hunt theme. Players manage a squad of seven characters racing to recover Inca treasure from
  the jungle, guided by an audio CD that sets the game's frantic tempo. A dart gun component adds physical
  dexterity: shooting the wrong card or encountering a snake card eliminates a squad member, and losing the
  entire squad means losing the game. The atmospheric soundtrack creates a uniquely immersive real-time pressure.

