description: |
  Settlers of America: Trails to Rails is a Catan Histories game designed by Klaus Teuber in which 3–4 players build cities across the expanding United States, trading resources and laying railroads to deliver goods from their east-coast starting cities westward. The first player to deliver 8 goods to their opponents' cities wins, blending the familiar Catan resource-trading and hex-tile mechanics with a historical American westward expansion theme and train delivery objectives. It was the first Catan-series game released exclusively in English and won the Origins Award for 2010.

