description: |
  Fanorona is a traditional two-player abstract strategy game indigenous to Madagascar, dating to approximately 1680, where it holds cultural significance as a royal pastime and even played a role in divination. The most common version (Fanoron-Sivy) is played on a 9x5 grid with 22 pieces per player. The game's defining feature is its capture mechanic: unlike checkers where pieces jump over opponents, Fanorona captures by moving toward (approach) or away from (withdrawal) enemy pieces, potentially removing entire lines at once. Players must capture when possible, though they can choose which capture to make when multiple are available. According to legend, the last queen of Madagascar, Ranavalona III, placed faith in a ritual game of Fanorona rather than her armed forces when French forces invaded in 1895.

