description: |
  Doorways to Horror is a VCR board game published by Pressman Toy Corporation in 1986 as the horror-themed companion to Doorways to Adventure. Designed by Sid Sackson, it incorporates classic public-domain horror film footage on a VHS tape as an interactive game element, with players following along on a board while events on screen influence gameplay. The game is an artifact of the mid-1980s VCR board game era and has since become a cult curiosity among horror and vintage game collectors for its unusual blend of cinema and tabletop gameplay.

