description: |
  King's Breakfast is a light 2003 card game designed by Alan R. Moon and Aaron Weissblum, published by Rio Grande Games, in which players are guests at the king's breakfast table competing to eat the most of the dishes the king prefers. Players draw and pass cards representing courses, but there is a strict rule: no guest may eat more of any dish than the king does. The king's gluttonous pet dragon Emerald steals food periodically, adding unpredictability to the meal. Beloved by Moon himself for its elegant simplicity and surprising balance in just a small card set.

