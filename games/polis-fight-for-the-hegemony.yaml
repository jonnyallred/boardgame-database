description: |
  Polis: Fight for the Hegemony is a challenging two-player civilization-lite wargame set during the Peloponnesian War, with one player controlling Athens and the Delian League and the other commanding Sparta and the Peloponnesian League. Players alternate taking pairs of actions — expanding city-states, managing populations, securing trade routes, and waging war — while balancing the critical need for wheat, which was scarce in ancient Greece and must be secured through trade. Victory goes to whoever has the most population cubes plus prestige points at game end. Lauded worldwide as an "instant classic" upon its 2012 release, Polis is celebrated for its depth, historical authenticity, and elegant civ-lite design.

