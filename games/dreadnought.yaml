description: |
  Dreadnought, subtitled "Surface Combat in the Battleship Era, 1906-45," is a 1975 naval wargame from Simulations Publications, Inc. (SPI) that simulates battleship combat across nearly four decades of naval history. Counters are provided for every battleship that sailed from 1906 to 1945, and each game turn represents 15 minutes of battle. Mechanics include pre-radar ship-to-ship combat with elements of rangefinding, torpedoes, gunnery, and damage control, recreating the brutal tactical calculus of battleship engagements from Jutland through World War II.

