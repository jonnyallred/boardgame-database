description: |
  Pank-a-Squith is a 1909 suffragette political board game produced by the British Women's Social and Political Union (WSPU) and manufactured in Germany, sold in WSPU shops to raise funds for the women's suffrage movement. Its name is a portmanteau of two antagonists: suffragette leader Emmeline Pankhurst ("Pank-") and Prime Minister H.H. Asquith ("-squith"), who opposed women's voting rights. Players navigate the political obstacles between women's struggle for suffrage and the vote's denial, making it one of the earliest purpose-made political advocacy board games in history. Extremely rare today, surviving examples are museum pieces and have sold at auction for significant sums, prized both as games and as historical artifacts of the suffragette movement.

