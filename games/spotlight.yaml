description: |
  Spotlight is a cooperative hidden-object game published by Horrible Guild, designed by Hjalmar Hach and Lorenzo
  Silva. Each player searches a transparent-layered board with a "magic flashlight" that illuminates dark scenes
  crowded with absurd characters and items. Under a sand timer, players hunt for as many hidden pictures as
  possible before time expires, then simultaneously dial in their count and compare it to the true answer. Progress
  on the scoring track advances with each correct find, but the chasing Moon pawn means falling behind is
  dangerous. Communication limits and real-time pressure make every round frantic fun.

