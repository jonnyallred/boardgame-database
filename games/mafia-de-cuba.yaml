description: |
  Mafia de Cuba is a hidden-role bluffing party game for six to twelve players set in 1950s Havana. The Godfather passes a cigar box around the table and each player secretly takes diamonds, a character token, or nothing at all; roles include loyal henchmen who want to help the Godfather and thieves who want to keep the diamonds. The Godfather then interrogates each player and must deduce who stole what, with thieves trying to convincingly lie while loyal players try to prove their innocence. Its small footprint and explosive social play made it a festival hit and a staple of large-group game nights.

