description: |
  Risk 2210 A.D. is a futuristic variant of classic Risk set in a near-future world where mechanized MODs replace infantry and battles are fought across land, sea, and even the Moon. Designed by Rob Daviau and Craig Van Ness, the game introduces human commanders with special abilities, Command card decks for each domain, and an energy economy that funds commander deployment and card plays. An expanded board adds underwater and lunar territories accessible only to commanders of the appropriate specialization. A strict five-turn limit ensures games conclude in around three hours, making it far more structured than the classic Risk experience — it won the Origins Award for Best Science Fiction or Fantasy Board Game of 2001.

