description: |
  Chamelequin is an abstract strategy game described as "a game of skill and ever changing colours." Played on a striking 8x8 grid of large alternating colored squares, players take turns placing pieces on the board and dropping colored polo-ring tokens onto them such that the topmost ring always matches the color of the square occupied. The goal is to be the last player remaining. The game creates a constantly shifting board state as pieces interact with the grid's color pattern.

