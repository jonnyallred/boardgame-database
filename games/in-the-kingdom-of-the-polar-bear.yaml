description: |
  In the Kingdom of the Polar Bear (Im Reich des weißen Bären) is a family board game designed by Charles Larue and published by Schmidt Spiele in 1991. Set in the Arctic environment of polar bears, the game uses a nature theme to engage young players in exploration and movement across an icy landscape. Its accessible design and arctic wildlife theme make it suitable for family play with younger children.

