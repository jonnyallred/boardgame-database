description: |
  BANG! is a spaghetti Western-themed social deduction card game for 4–7 players in which everyone receives a secret role—Sheriff, Deputy, Outlaw, or Renegade—with different win conditions. Only the Sheriff's identity is revealed, while all other players must deduce who is friend and who is foe through their actions. Players shoot each other using BANG! cards (subject to weapon range), use Beer to heal, and deploy special one-time effects, while the Sheriff tries to eliminate all Outlaws and the Renegade seeks to be the last one standing. Winner of the 2004 Origins Award for Best Traditional Card Game.

