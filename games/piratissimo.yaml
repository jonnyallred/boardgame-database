description: |
  Piratissimo is a light family pirate racing game published by Rio Grande Games in which 2–4 players race their pirate ships to be the first to deliver ten pieces of treasure to their safe harbor. Along the way, pirates steal, plunder, and sink each other's ships — but too much greed can put a player's own treasure at risk. The game uses a wind wheel and tornado piece to add random elements to movement, and offers two game variations for different levels of play. Designed by Manfred Ludwig for ages 6 and up, it provides a quick and colorful pirate adventure experience in under 30 minutes.

