description: |
  Discat is a quick card game in which every card features hidden cats among its artwork. Players race to discard as many cards as possible to their personal discard pile, scoring points for each card collected. Groups of cards with matching numbers can be played for combos, and a group of five cards triggers an immediate victory condition. Players may also hinder opponents' discarding efforts, making the game a lively and energetic battle to discat as fast as possible.

