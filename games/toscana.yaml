description: |
  Toscana is a two-player abstract tile-laying game in which each player has 16 tiles showing either red roofs or gray plazas. Players take turns placing tiles to build connected areas, with the goal of forming the largest contiguous region of their color by game end. The simple ruleset belies a tense spatial competition as both players simultaneously try to expand their own territory while fragmenting their opponent's.

