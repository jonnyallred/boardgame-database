description: |
  Spacefarers is a 1981 science fiction miniatures skirmish game published by Games Workshop, designed by Nick
  Henfrey and Andy Murdin for use with Citadel Miniatures' Spacefarers figure range. Units move via ruler
  measurement (or optionally a hex map), may fire ranged weapons, and engage in close combat in a standard
  tabletop skirmish framework. Optional rules cover ammunition limits, visibility, and fighting inside starships
  or buildings, making it one of Games Workshop's earliest forays into sci-fi miniature gaming before the
  development of Warhammer 40,000.

