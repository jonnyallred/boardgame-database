description: |
  Solomons Campaign is a board wargame designed by Jim Dunnigan and published by SPI in 1973, subtitled "Air,
  Land, and Sea Warfare, Pacific 1942." The game simulates the struggle between US and Japanese forces for
  control of Guadalcanal Island during the pivotal Pacific campaign of World War II. Covering all three service
  arms simultaneously — air, naval, and ground combat — the game was notable for its scope but placed only 128th
  out of 202 games in a 1976 SPI player poll. A second edition was later published by Decision Games in 2008
  via World at War magazine.

