description: |
  Parade is a whimsical card game set in the world of Alice in Wonderland, where 2–6 players take turns adding colorful characters to an ever-growing parade line. The catch is that you want as few cards as possible — when you play a card, you must take any cards in the parade that match your card's color or have a value equal to or less than your played card. At the end of the game, the player who holds the most cards of a given color flips them face-down (worth only 1 point each), while remaining cards score their face value — lowest score wins. The game combines elegant push-and-pull mechanics with charming Wonderland theming, earning it a following as a classic filler with surprising strategic depth.

