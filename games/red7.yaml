description: |
  Red7 is a tiny, lightning-fast card game for 2-4 players by Carl Chudyk and Chris Cieslik in which the winning condition changes constantly. The 49-card rainbow deck has seven colors each numbered 1-7; each color also defines a different winning rule. On your turn you must play a card to your palette (personal display) and/or change the active canvas (winning rule) — but if you're not winning at the end of your turn, you're out. The elimination game runs just minutes per round, with the tension of knowing you might have one move to swing the game completely in your favor.
