description: |
  Quest is a fantasy-themed card game in which players collect sets of items and allies to complete adventuring quests. Players draw cards and build their collections, racing to fulfill quest requirements before opponents do. Multiple games carry the name Quest, so this entry covers the general concept of the quest-themed card collecting game listed in board game databases as a family set collection title.

