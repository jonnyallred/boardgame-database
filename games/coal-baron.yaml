description: |
  Coal Baron is a worker placement game for 2–4 players designed by Wolfgang Kramer and Michael Kiesling in which players send miners underground to dig tunnels, extract coal of four quality levels, and fulfill lucrative contracts. Workers can be stacked on already-occupied spaces (each extra worker costs an additional action), creating a dynamic bidding-like tension for scarce action spots. The spatial puzzle of tunnel digging combined with the contract fulfillment race delivers a satisfying medium-weight Euro with strong thematic immersion in the coal mining industry.

