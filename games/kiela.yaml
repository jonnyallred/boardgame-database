description: |
  Kiela is a traditional mancala game played by the Kimbundu people of northern Angola, described as "a game of peace." Played on a four-row board of ten holes per row, it is similar to the Ugandan Omweso and its eastern African variants, making it one of the more complex mancala forms. A national tournament has been held annually in Angola since 1999, and the first Kiela software was developed in 1991 by Bernardo Francisco Campos, who later published a trilingual rulebook in 1998. The game tests deep sowing strategy and capture planning across its expansive board.

