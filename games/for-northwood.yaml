description: |
  For Northwood! is an innovative solo trick-taking game in which you play eight rounds
  of tricks to win the alliance of eight rulers for your kingdom. Each ruler requires you
  to win an exact number of tricks to join your cause, creating a precise puzzle rather
  than a simple "win as many as possible" challenge. Four ally abilities that can be used
  once per visit help manipulate your hand, but options dwindle as allies are won over.
  The game won multiple awards in the 2021 BGG 54-card contest, including Best Overall
  and Best Solo Game.

