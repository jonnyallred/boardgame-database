description: |
  Pacific Victory: War in the Pacific 1941-45 is a Columbia Block System wargame simulating the entire Pacific theater of World War II, from Pearl Harbor to Japan's surrender. Using the iconic Columbia Games wooden block system, units — carriers, submarines, cruisers, battleships, airforces, marines, and infantry representing Japan, the US, Britain, India, Australia, and China — stand upright hiding their type and strength from the opponent, providing a natural fog-of-war effect without additional rules. A step-reduction system is built in: as units take damage they rotate to show reduced combat values. The game covers all major campaigns including the island-hopping campaign, China, and the naval war, available in both scenario and grand campaign formats.

