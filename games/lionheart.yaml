description: |
  Lionheart is a hex-and-counter wargame published by GMT Games covering the Third Crusade (1191-1192), focusing on King Richard I of England's campaign against Saladin in the Holy Land. Players command the Crusader and Saracen forces across a series of scenarios depicting the campaign from Acre to Jerusalem, with detailed rules for medieval combat, sieges, and the logistical challenges of crusading warfare. Richard Berg's design captures the period's unique dynamics — the Crusaders' heavy cavalry versus Saladin's mobile mounted archers — through differentiated unit capabilities and terrain effects. A detailed and immersive entry in the medieval wargame genre.

