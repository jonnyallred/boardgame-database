description: |
  Shazamm! is a 2-player fantasy-themed blind-bidding card game designed by François Bruel and Philippe des Pallières, published by Z-Man Games. Two wizards face off on a crumbling bridge, simultaneously selecting cards from their hands to determine whose spell is more powerful and pushes the other back. The first wizard pushed off the end of the bridge loses. The game's combination of hand management and psychological bluffing in its simultaneous reveal mechanic creates tense, fast duels with a satisfying push-and-pull dynamic.

