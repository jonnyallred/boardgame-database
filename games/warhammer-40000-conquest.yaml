description: |
  Warhammer 40,000: Conquest is a Living Card Game published by Fantasy Flight Games in 2014, designed by Eric Lang and Nate French, set in Games Workshop's grim far-future universe. Two players battle for control of planets in the Traxis sector using one of seven distinct factions—Space Marines, Astra Militarum, Orks, Chaos, Dark Eldar, Eldar, or Tau—each with their own unique card pool. Players deploy warlords, units, and attachments to simultaneously contest multiple worlds each round. The game was discontinued in February 2017 following Games Workshop's decision not to renew Fantasy Flight's licensing agreement.

