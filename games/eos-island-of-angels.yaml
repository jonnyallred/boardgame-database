description: |
  EOS: Island of Angels is an asymmetric engine-building game designed by Till Bröstl and Felix Mertikat, published by King Racoon Games and funded through Kickstarter. Players take on the roles of captains leading crews of heroes across a mythical island, awakening angels, battling demons, and accumulating glory. The game features asymmetric faction abilities and an engine-building progression system where players develop their crew's powers over the course of the game. Featuring thematic art and diverse hero abilities, EOS offers both competitive depth and a rich fantasy narrative experience.

