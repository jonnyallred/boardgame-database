description: |
  Go Nuts for Donuts is a fast simultaneous card-selection game with a delightful donut
  theme. Each round, players simultaneously select a numbered card indicating which donut
  they want—but if two or more players pick the same donut, nobody gets it! The clever
  collision mechanic forces players to outguess their opponents, creating a fun blend of
  deduction and press-your-luck. Accessible to all ages and playable in under twenty
  minutes, it is an ideal filler or family game.

