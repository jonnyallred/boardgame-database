description: |
  Awkward Guests: The Walton Case is a deduction murder-mystery game powered by the Brilliant Deck System, offering over 3,600 different case solutions across millions of possible card combinations. Players hold a hand of six clue cards—suspect statements, alibis, police reports, and forensic findings—and take turns interrogating witnesses, examining evidence, and strategically trading information with other players to piece together the identity of the murderer, weapon, and motive. The clever information economy ensures that sharing clues is as important as hoarding them, creating a social deduction experience that rewards careful deduction and negotiation.

