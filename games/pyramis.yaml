description: |
  Pyramis is a two-player abstract strategy game in which players compete to build or claim a pyramidal arrangement of pieces on the board. Players alternate placing tiles or tokens that form pyramid-like structures, with scoring based on the completed layers and configurations achieved. A lesser-known abstract game, Pyramis challenges players with spatial reasoning and forward planning in compact play sessions.

