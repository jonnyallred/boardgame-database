description: |
  Fortuna is a strategy board game set during the reign of Caesar in the Roman Empire, published by The Game Master in 2011. Players take on the roles of ambitious Romans striving for influence, wealth, and happiness as they travel toward the City of Rome. The game features resource management mechanics centered on farming grain and wine, irrigating land to improve harvests, and trading goods to climb the Roman social hierarchy. Multiple paths to victory reward different playstyles, blending agricultural management with trade and political influence in a Roman Empire setting.

