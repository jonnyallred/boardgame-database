description: |
  Salton Sea is an intense 2024 economic Eurogame designed by David Bernal in which 1-4 players take on the roles of entrepreneurs exploiting brine deposits in California's Salton Sea region to extract lithium for the modern battery economy. Players manage geothermal companies by drilling for brine, processing it into lithium, and selling resources through a sophisticated dual-use card system where cards serve both as currency and as improved actions. The hand management and worker placement mechanics create a tight economy of decisions, with each investment decision carrying significant weight. Published by Devir, it delivers a topical environmental economic theme with deep strategic gameplay.

