description: |
  Völuspá is a Norse mythology-themed tile-placement game for 2–5 players in which players draw tiles depicting gods and monsters — Thor, Odin, Troll, Loki, Dragon, and others — and place them into a shared grid to score points. Each tile has a numerical strength, and a tile scores points equal to the length of the row or column it is placed in, but only if its strength is the highest in that line. Loki uniquely blocks any row from being extended, while the Dragon ignores adjacency rules. The interplay of tile powers creates delightful blocking and opportunistic play in a fast, accessible package with exceptional thematic flavor.

