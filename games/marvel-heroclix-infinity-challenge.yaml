description: |
  Marvel HeroClix: Infinity Challenge is the first Marvel HeroClix set, published by WizKids in May 2002. Using the Clix combat dial system developed for Mage Knight, players build teams from 150 pre-painted collectible Marvel Comics miniatures — including X-Men, Avengers, Brotherhood of Evil Mutants, and more — and battle on grid maps. Each figure's rotating base dial tracks damage and shifts stats as it takes hits, eliminating the need for record sheets. The set introduced 50 distinct Marvel characters with variant rarity levels, combining collectible strategy with accessible superhero combat rules.

