description: |
  Leros: The Island Prize is a hex-and-counter wargame covering the Battle of Leros in November 1943, a largely forgotten but strategically significant engagement in the Dodecanese campaign of World War II. After Italy's surrender, British forces occupied the Italian-held Aegean islands, but Germany launched a rapid assault to retake them before Allied reinforcements could arrive. Players command the desperate British and Italian garrison attempting to hold the mountainous island against an overwhelming German airborne and amphibious assault. The battle's compact scale, dramatic terrain, and its portrayal as a rare Axis strategic success in late 1943 make it an unusual and compelling wargame subject.

