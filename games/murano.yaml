description: |
  Murano is a 2-4 player tile placement and resource management game designed by the husband-and-wife team Inka and Markus Brand, published by Lookout Games in 2014. Set on the famous glassmaking islands near Venice, players develop the island group by building shops, palaces, and glassworks while competing for influence in each neighborhood. The game's signature mechanic is a rondel-like action ring surrounding the board, with eight gondolas spread around a circular track — players choose an action by moving their gondola to the corresponding space, but the gondolas serve as blockers for one another, making action selection a tense spatial puzzle. Building glassworks and supplying tourists with different glass types provides the primary scoring engine.

