description: |
  Stop Thief is a 1979 Parker Brothers deduction game featuring a battery-powered electronic Crime Scanner that tracks an invisible computer-controlled thief. Players roll dice to move their detective pawns across a board of buildings and streets, using sound clues from the scanner to determine which building or street the thief just robbed. Sleuth cards allow players to take money from opponents, skip turns, or get tips on the thief's location. The first detective to collect $2,500 in reward money wins. The game was faithfully reimagined by Restoration Games in 2017.

