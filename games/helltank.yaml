description: |
  Helltank is a science fiction microgame published by Metagaming Concepts in 1981 featuring combat between futuristic supertanks and other advanced weapons systems, based on the Ogre game concept. Published as part of Metagaming's MicroGame line and packaged in a ziplock bag, it presents fast-playing sci-fi armor combat at a small price point and physical footprint. A sequel, Helltank Destroyer, followed in 1982 as the 22nd and final game in the MicroGame series.

