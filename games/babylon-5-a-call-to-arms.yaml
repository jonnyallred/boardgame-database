description: |
  Babylon 5: A Call to Arms is a miniatures-based spaceship combat game set in the universe of the Babylon 5 television series, published by Mongoose Publishing in 2004. Players command fleets from the various races of the Babylon 5 universe — including Earth Alliance, Minbari, Centauri, Narn, and Shadows — in tactical space battles using streamlined rules designed for faster play than its predecessors. The game won the Gamer's Choice award at Origins 2004. A second edition was released in 2007 before Mongoose Publishing discontinued the miniatures line in 2008.

