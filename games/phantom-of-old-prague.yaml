description: |
  Phantom of Old Prague (Fantom Staré Prahy) is a Czechoslovak hidden movement game made in the late 1980s, thematically similar to Scotland Yard but set among the historic streets, trams, taxis, boats, and horse-drawn carriages of old Prague. One player secretly controls the Phantom who moves through the city using various transportation modes, while up to five detectives work together to track and catch them. The Phantom wins by evading capture for the required number of turns; the detectives win if any of them occupies the same square as the Phantom. The game offers a charming piece of Czech gaming history with its unique historical setting.

