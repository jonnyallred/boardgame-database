description: |
  5 Seconds Rule is a fast-paced party game where the player in the "hot seat" has just five seconds to name three things that fit the given category before the timer runs out. The ticking ball-drop timer creates genuine pressure and hilarity as players scramble to blurt out answers. Originally published by Patch Products in 2010, the game is a straightforward crowd-pleaser ideal for groups of all sizes looking for quick, silly fun.

