description: |
  4th Dimension is a two-to-four player abstract game played on a circular board that incorporates unusual moves including a "time travel" mechanic, letting players move pieces through conceptual temporal as well as spatial dimensions. Designed by John A. Ball and first published in Games & Puzzles magazine before being licensed to TSR, the game blends science fiction flavor with strategic abstract gameplay. Its distinctive circular board and time travel rules give it a genuinely novel feel that sets it apart from conventional abstract strategy games.

