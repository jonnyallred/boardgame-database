description: |
  The Teenage Mutant Ninja Turtles: Pizza Power Game is a licensed children's
  board game published by Random House in 1987. Players choose one of the four
  Turtles and move around a board navigating streets and sewers, battling enemies
  along the way. Combat is resolved using a special "flipper" launcher that
  shoots dice into numbered compartments to determine outcomes. Players must
  defeat three enemies, reach the Technodrome, and recover the secret Mutagen
  to win. The game captures the action-adventure spirit of the original cartoon
  series in a simple roll-and-move format designed for young fans.

