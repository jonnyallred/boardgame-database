description: |
  Thiruthamizh is a 1990 Tamil-language word game invented by G. Rajakumar of Chennai, designed as a Tamil-script adaptation of Scrabble. The game uses a 21x21 grid board and 272 tiles: 186 tiles bearing individual Tamil letters and 86 transparent tiles with diacritic marks that combine with letter tiles to form new characters. Players form words in Tamil script to score points, making it both a strategy game and a tool for vocabulary building. In 2002, the Directorate of Tamil Development recommended Thiruthamizh for use in Tamil Nadu schools, recognizing its educational value for preserving and enriching Tamil language skills among students.

