description: |
  Cowgirls: Ride the Trail of Truth is a 1998 western-themed trivia and roll-and-move game aimed at women and girls. Players move plastic horse markers around a trail board, drawing cards from six category decks covering topics like Sex and Body, Experience and History, Family and Friends, Spirit, Shadow, and Taste. Collectible metal charms — boots, spurs, saddles, long-horn steer, and guns — serve as special tokens. The game is more a conversation-starter and social experience than a strategic competition, designed to generate discussion and laughter around the table.

