description: |
  Coyote is a fast bluffing game with a twist: each player draws a feather card and must wear it on their headband facing outward, so everyone can see your value — except you. Players must then bid on what they believe the total sum of all visible feathers is, raising bids in turn or challenging the previous bidder. Anyone caught bluffing or challenging incorrectly earns a coyote coin, and three coins means elimination. The brilliance lies in the special cards — zeros, negatives, doublers, and blanks — that can completely distort the sum. Recommended for the Spiel des Jahres in 2004, Coyote is a sharp social deduction filler with genuine laugh-out-loud moments.

