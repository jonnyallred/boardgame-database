description: |
  Super Skills is a party dexterity challenge game that packs 120 unique
  competitive mini-games into one box. Players complete physical challenges
  using included props such as chopsticks, dice, cups, ping-pong balls,
  blindfolds, and ropes. Each challenge card presents a new wacky task, and
  the first player to complete their challenge wins the round. The game
  emphasizes fun, laughter, and lighthearted rivalry rather than deep strategy.

