description: |
  The Manhattan Project: Energy Empire is a standalone worker placement and engine-building game in which each player guides a nation through the second half of the 20th century, racing to build the most powerful energy infrastructure while managing global environmental consequences. Each turn, players choose between a "work" action — placing a worker on the main board then activating tableau cards — or a "generate" action that rolls energy dice representing nuclear, coal, oil, solar, and other power sources to fuel their buildings. Acquiring new government, industry, and commerce buildings expands an ever-growing engine, while a shared global impact track reflects industrial pollution and creates collective consequences. The game captures the tension between economic growth and environmental responsibility in a deeply strategic package.

