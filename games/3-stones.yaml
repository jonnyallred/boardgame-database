# Description
description: |
  3-stones is a two-player abstract strategy game in which players place black
  and white stones on a cross-shaped board to form scoring groups. On each turn,
  a player places two stones — one of their own color and one of the opponent's
  color — creating a push-pull dynamic where placing your opponent's stones is
  unavoidable.

  Points are scored for groups of three or more connected same-colored stones at
  the end of the game. The forced placement of opponent's stones creates a unique
  strategic tension, as every move simultaneously advances both players' positions.
  The game is quick to learn but offers meaningful depth through its unusual
  dual-placement mechanism.

