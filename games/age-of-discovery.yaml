description: |
  Age of Discovery is a Euro-style strategy game in which players supply famous expeditions
  of explorers such as Columbus and Magellan with ships, purchasing vessels and directing
  them toward the most successful voyages. The game uses worker placement and set collection
  mechanics as players compete to fund and equip the greatest expeditions. Players must
  balance acquiring ships with sending them to profitable routes, creating a tense
  competition for the best opportunities across the age of exploration.

