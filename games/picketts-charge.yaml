description: |
  Pickett's Charge is a tactical board wargame published by Yaquinto Publications in 1980, simulating the entire three-day Battle of Gettysburg from July 1–3, 1863 — one of the Civil War's most decisive engagements. Players command Union and Confederate forces at the regimental level, maneuvering across the rolling Pennsylvania terrain in a hex-and-counter system. The game's climax is the eponymous assault on July 3rd, with its famous final Confederate charge across open fields toward Cemetery Ridge. Artwork is adapted from the famous Gettysburg Cyclorama panorama painting by Paul Philippoteaux. Multiple scenarios allow players to refight any of the battle's three days independently.

