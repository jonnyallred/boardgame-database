description: |
  The Fall of Tobruk is a 1975 two-player board wargame by Frank Chadwick (early in his career
  before founding Game Designers' Workshop), published by Conflict Games. It simulates the Second
  Battle of Tobruk during the North Africa campaign of World War II, with one player commanding
  Rommel's Axis attackers and the other controlling British defenders. The large mounted hex map
  (19" x 25") and over 350 die-cut counters provide a moderately complex game notable for its
  fluid combat system and emphasis on minefields and engineering operations. Wargame critic Richard
  Berg called it "Possibly the best of the new Tobruk games" upon release. Compass Games later
  published a deluxe third edition.

