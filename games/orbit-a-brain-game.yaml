description: |
  Orbit, a Brain Game is a trivia and puzzle-style board game in which players answer questions on cards to advance around the board, with correct answers propelling players forward while wrong answers may move them back. The game emphasizes general knowledge and quick thinking across a variety of categories. Like many family trivia games of its era, it serves as a competitive knowledge test with a simple track-based movement structure, designed to appeal to families looking for accessible quiz-based game nights.

