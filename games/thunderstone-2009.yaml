description: |
  Thunderstone is a 2009 fantasy deck-building game designed by Mike Elliott and published by Alderac Entertainment Group (AEG), blending dungeon-crawling theme with deck-building mechanics pioneered by Dominion. Players purchase hero, weapon, and item cards from a village market to build their decks, then use those decks to battle monsters lurking in a dungeon—fighting monsters in the back rank costs light penalties, making lanterns and torches tactically important. The combination of monsters that may be resistant to certain hero types and the light-management mechanic gave Thunderstone a distinctive identity in the early deck-building era, spawning numerous expansions and a later redesign as Thunderstone Quest.

