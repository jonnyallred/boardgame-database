description: |
  Go Gecko Go! is a family racing game designed by Jürgen Adams and published by Zoch Verlag in 2019, nominated for the Kinderspiel des Jahres award. Players roll colored dice to move their crocodile, turtle, frog, and gecko from one end of a river to the other—animals can hitch rides on each other's backs, with larger animals able to carry smaller ones. The stacking and hitching mechanic creates amusing situations as animals piggyback their way toward the finish line while ducking under bridges. Its accessible rules, charming wooden components, and fun animal-stacking interactions make it ideal for young families.

