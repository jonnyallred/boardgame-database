description: |
  Wagram: The Peace of Vienna, 5-6 July 1809 is a board wargame designed by Irad B. Hardy and published by SPI in 1975, simulating one of Napoleon's greatest battles against Austrian Archduke Charles. The game was part of the Napoleon at War quadrigame (four games sharing a single ruleset), but was also sold individually with metal miniatures. Of the four games in the quadrigame, Wagram was rated the best in a 1976 survey of favourite wargames. It covers the two-day engagement near Vienna that ended with a decisive French victory and led to the Treaty of Schönbrunn.

