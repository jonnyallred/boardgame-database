description: |
  Attack of the Mutants! is a campy 1950s B-movie horror board game published by
  Yaquinto Publications in 1981. In a tongue-in-cheek scenario, heroes face campus
  membership newly mutated by a horrible nuclear accident at the nearby power station
  dubbed "the Big Melt-Down of 1993." The game embraces the schlocky fun of classic
  atomic-age horror cinema, pitting players against waves of radioactive mutants with
  humor and over-the-top premise. It captures the irreverent spirit of B-movie horror
  in tabletop form.

