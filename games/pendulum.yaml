description: |
  Pendulum is a real-time, simultaneous worker placement game published by Stonemaier Games in which 1–5 players compete to become the ruler of the kingdom of Dunya. Rather than taking turns, all players act simultaneously while three sand timers govern different areas of the board — workers can only be placed or retrieved when the corresponding timer runs out. Players advance along four victory tracks (power, prestige, popularity, and legendary achievement) while also executing stratagems and expanding their domains. Each player commands an asymmetric noble with unique abilities, creating very different playstyles. The result is a tense, chaotic race where time management and efficient planning are just as important as strategic choices.

