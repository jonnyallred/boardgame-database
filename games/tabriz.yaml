description: |
  Tabriz is a carpet-weaving strategy game set in the historic Persian city of
  Tabrīz, published by Crafty Games in 2024. Players move three assistant
  meeples through the Grand Bazaar, collecting dye, wool, silk, and camel hair
  to weave contracts for fame and fortune. The modular market and variable setup
  ensure a different puzzle each game, while a robust solo mode with five AI
  opponents of varying difficulty makes it accessible for solo players. From the
  designer of Cascadia, Tabriz offers a rich engine-building experience with
  beautiful Persian theming in a compact playtime.

