description: |
  First Rat is a family racing game for 1-5 players in which rival rat families scrounge parts from a junkyard to build rockets and race to be the first rats on the moon. Players choose each turn whether to move one rat up to five spaces or multiple rats up to three spaces each (each landing on a different space of the same color), then collect resources like cheese, apple cores, and bottle caps based on landing zones. Resources are converted into rocket components, Rattronaut training, and shop purchases in a tight resource management race. The game's reversible board and modular tiles offer variable setup, and a solo mode is included.

