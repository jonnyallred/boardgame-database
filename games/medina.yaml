description: |
  Medina is a deceptively strategic city-building game by Stefan Dorra, published in 2001, in which players collaboratively build the sprawling desert city of Medina but ruthlessly compete to claim its buildings for points. Players take turns placing building pieces onto partially built structures, but a building can only be claimed once it has pieces of all required types — meaning players must balance contributing to buildings they intend to claim while preventing opponents from claiming valuable ones first. The game creates intense psychological tension around the timing of building claims, making every placement a calculated risk. A second edition with additional variants was published by Stronghold Games in 2017.

