description: |
  Simply Cosmic is an introductory edition of the cult classic Cosmic Encounter published by Mayfair Games in 1995, featuring 8 alien races and new hex-tile galaxy components. In the tradition of Cosmic Encounter, players each take a unique alien species with a power to bend or break one of the game's rules, competing to establish control over the universe through diplomacy, negotiation, and combat. The simplified ruleset and smaller alien roster make it an accessible entry point to one of the most influential and variable negotiation games ever designed.

