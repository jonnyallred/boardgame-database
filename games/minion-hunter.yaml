description: |
  Minion Hunter: The Dark Conspiracy Boardgame is a 1992 cooperative board game designed by Lester W. Smith and published by Game Designers' Workshop as a companion product to their Dark Conspiracy role-playing game. Players work cooperatively to stall or defeat the plans of four Dark Minion races as the primary goal, while also pursuing individual character advancement as a secondary objective. The game blends horror and conspiracy themes with a cooperative structure, rewarding teamwork and strategic planning to overcome the alien menace threatening humanity.

