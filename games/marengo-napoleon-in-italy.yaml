description: |
  Marengo: Napoleon in Italy, 14 June 1800 is a hex-and-counter board wargame published by Simulations Publications Inc. (SPI) in 1975 as part of the Napoleon at War quadrigame. Designed by David Isby with graphic design by Redmond A. Simonsen, it simulates the famous Battle of Marengo between Napoleon's French forces and the Austrian army under General Melas at the operational level. One of four related games packaged together, it represents a key moment in the Italian campaign of the French Revolutionary Wars and was a foundational wargame title in SPI's prolific catalog.

