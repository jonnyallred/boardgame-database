description: |
  Borderlands is a 1982 strategy game published by Eon Productions, set on an abstract
  continent where players represent barbaric tribes conquering territories, trading
  gathered resources, and constructing cities, boats, and weapons. The first player or
  alliance to control or build three cities wins. Reviewer Allen Varney noted in 1982
  that if you like Diplomacy but struggle to get enough players, Borderlands is a must-play
  — games finish in about two hours. The game was later adapted into a 1986 Electronic
  Arts video game called Conquest.

