description: |
  Tumbling Down is a two-player abstract strategy game designed by Michael Shuck in 2000, played on a chess board with stacks of red and white checkers. When a stack is "tumbled," its pieces cascade onto successive squares, changing ownership as friendly pieces cover opponents' pieces. Each player has a "King" — the tallest single-color stack — and the objective is to capture the opponent's King without inadvertently creating a taller one. The game is a relative of Mancala in its sowing mechanics, with a distant kinship to Chess in its strategic depth.

