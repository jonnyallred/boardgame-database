description: |
  Roller Coaster Hippo (originally published in German as "Das Nilpferd in der Achterbahn," meaning "The Hippo on the Roller Coaster") is a party game published by Ravensburger in 1988. Players advance around the board by rolling dice and completing entertaining party tasks, including answering questions, miming actions, and modeling objects in clay. The hippopotamus theme provides a quirky comic backdrop as players race to be the first hippo to reach the finish line while completing the various silly challenges along the way. The game's mix of luck and performance tasks makes it a lively choice for family gatherings.

