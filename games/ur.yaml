description: |
  The Royal Game of Ur is one of the oldest known board games in history, dating to approximately 2600–2400 BC and discovered by British archaeologist Sir Leonard Woolley during excavations of the Royal Cemetery at Ur. It is a two-player race game in which each player moves pieces along a shared path of twenty squares, using tetrahedral dice to determine movement. Players can capture opponent pieces and send them back to the start, while landing on rosette squares grants safety and an extra turn. Rules were reconstructed by British Museum curator Irving Finkel from a Babylonian clay tablet. The game was popular across the ancient Middle East and carries cultural and divinatory significance.

