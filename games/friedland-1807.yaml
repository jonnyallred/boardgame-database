description: |
  Friedland 1807 is a beginner-level board wargame designed by Jon Baxley and published by Imperial Games in 1974, simulating Napoleon's pivotal victory over the Russian army at the Battle of Friedland. Based on the introductory Napoleonic wargame system established by SPI's Napoleon at Waterloo, the game features only 120 counters and a small hex grid map, making it accessible to new wargamers. One player commands the French forces, the other the Russians. Despite its simplicity, the game placed 80th out of 202 games in a 1976 SPI poll of popular North American wargames.

