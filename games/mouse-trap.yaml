description: |
  Mouse Trap is one of the first mass-produced three-dimensional board games, designed by Marvin Glass and Associates and published by Ideal in 1963. Players move mouse tokens around the board while cooperatively and then competitively building an elaborate Rube Goldberg-inspired trap mechanism of over 20 interlocking parts. Once completed, players attempt to use the trap to eliminate opponent mice from the game, with the last surviving mouse winning. The game is famously known more for the spectacle of its contraption than for strategic depth, and has remained a children's classic for over six decades.

