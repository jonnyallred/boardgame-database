description: |
  Yavalath is an abstract strategy game for two or three players created by the Ludi computer
  program designed by Cameron Browne — making it one of the first successful games designed by
  machine. Players take turns placing pieces on a hexagonal board, striving to form a line of four
  pieces before their opponent, but immediately losing if they accidentally make a line of three
  first. This elegant paradox of forced caution creates remarkable tension in a deceptively simple
  ruleset that ranked among the top 100 abstract games.

