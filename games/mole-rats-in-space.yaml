description: |
  Mole Rats in Space is a cooperative children's game designed by Pandemic creator Matt Leacock and published by Peaceable Kingdom in 2017. Players work together to help a team of mole rat astronauts collect four essential items (duct tape, toothbrush, radishes, and a map) from their space station before snakes escaping from air vents overwhelm them. Each turn, a card is played to move mole rats and manage the snake threat, requiring careful team coordination to balance item retrieval with snake containment. The game successfully adapts the classic Snakes and Ladders concept with modern cooperative design principles, making it an excellent introduction to cooperative gaming for young children.

