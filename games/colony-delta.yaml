description: |
  Colony Delta is a science fiction board wargame published by Fantasy Games Unlimited in 1979, subtitled "Earth vs. Sigma Draconis." Two players — one human, one alien — compete for control of a wealthy colony world in the 23rd century through mining, agriculture, and territorial expansion. War is not inevitable: diplomatic and other non-military options are available, making economic strategy as important as military positioning. Reviewer S. J. Hackett praised the way the game's "initial economic basis of colonisation leads to tension between the two sides," giving it a rare combination of economic depth and wargame tension.

