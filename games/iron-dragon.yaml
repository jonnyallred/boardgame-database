description: |
  Iron Dragon is a fantasy rail-building game using Mayfair's famous crayon rail system, set in a world of dragons, dwarves, elves, and magic. Players draw their own rail networks directly on the laminated board with crayons, picking up and delivering goods between cities to earn income and build toward a winning network. Fantasy foremen of different races offer terrain-specific building discounts, and ships can connect distant rail networks. Part of the Empire Builder family of games, Iron Dragon brings the classic pick-up-and-deliver railroad formula to a richly imagined fantasy continent.

