description: |
  Boarding Party is a solitaire science fiction microgame published by Task Force Games
  in 1982 in which the player controls a boarding party of humans who must infiltrate a
  temporarily disabled automated killer spaceship and destroy its central computer before
  the ship reboots and resumes its killing rampage. The player has only 14 turns to
  navigate through the ship's corridors and complete the mission. As one of the compact
  microgames of the era, it provides a complete tactical solitaire experience in a small
  format.

