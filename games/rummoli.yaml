description: |
  Rummoli is a beloved Canadian card game first marketed in 1940 by the Copp Clark Publishing Company of Toronto, blending elements of Poker and Rummy into a unique hybrid experience. The game is played in two phases on a distinctive octagonal Rummoli board: first a Poker Play phase using standard poker hands, then a Rummy Play phase in which players race to empty their hands by sequentially playing cards. Players collect chips from the board for achieving specific card combinations and must pay chips when they cannot play. As a member of the Stops family of matching card games related to the French game Poch and the American game Tripoley, Rummoli has become a quintessential Canadian family game night classic.

