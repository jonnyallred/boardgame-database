description: |
  Lamlameta is a traditional mancala game of the Konso people in the Olanta area of central Ethiopia, first described in 1971 by scholar Richard Pankhurst. The name means "grouped in pairs" in the Gallinya language, referencing the game's opening configuration of two seeds (tagéga) per pit on a 2×12 board called a toma tagéga. Players sow seeds counter-clockwise on their turns, capturing according to the game's pairing rules. Traditionally played outdoors by men on wooden boards, it is a close relative of Gebeta and represents the distinctive mancala tradition of the Ethiopian Konso people.

