description: |
  Shatar is the traditional Mongolian form of chess, introduced to Mongolia during the era of Genghis Khan's western campaigns and codified by the late 14th century. It shares most rules with standard chess but has notable differences: the queen (berse) is weaker, moving like a rook or one square diagonally; there is no castling; the game always opens with d4/d5; and crucially, a knight (mori) cannot deliver checkmate — such a position is only a draw. A larger 10x10 variant called hiashatar also exists. Shatar remains a significant part of Mongolian cultural heritage.

