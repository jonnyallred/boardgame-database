# Description
description: |
  One of the classic early Avalon Hill wargames designed by company founder Charles S.
  Roberts, simulating the North African campaign of World War II. Players command
  either the Allied forces or the Axis Afrika Korps as Rommel's forces battle British
  and Commonwealth troops across the deserts of Libya and Egypt. The game uses the
  classic Avalon Hill hex-and-counter format and is considered a foundational title
  in the wargaming hobby, influencing generations of subsequent war games.

