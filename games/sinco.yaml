description: |
  Sinco is a traditional Italian-style bingo/lotto card game published by Ravensburger in which players use a standard 40-card Neapolitan deck in the four suits of clubs, coins, cups, and swords. Each player has a mat showing 25 cards with five different possible winning combinations, combining the structure of Italian bingo with an accessible family game format. The five winning combinations increase strategic excitement beyond a simple bingo pattern, making it a popular choice for family game nights in Italy and beyond.

