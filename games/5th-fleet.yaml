# Description
description: |
  5th Fleet: Modern Naval Combat in the Indian Ocean is an operational-level naval
  wargame published by Victory Games in 1989. Designed by Joseph M. Balkoski, the
  game simulates hypothetical Cold War naval conflict in the Indian Ocean and
  Persian Gulf, pitting US naval forces against Soviet intervention.

  Players manage carrier battle groups, submarines, aircraft, and surface vessels
  across the vast theater of the Indian Ocean. The operational scale captures the
  challenges of long-range logistics, anti-submarine warfare, and air power
  projection. As part of Victory Games' acclaimed naval series, 5th Fleet is
  highly regarded by grognard wargamers for its detailed simulation of modern
  naval combat.

