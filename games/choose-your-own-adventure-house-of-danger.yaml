description: |
  Choose Your Own Adventure: House of Danger is a cooperative narrative board game published by Z-Man Games in 2018, adapting the beloved Choose Your Own Adventure book series into tabletop form. Based on R.A. Montgomery's House of Danger (#15 in the series), players take on the role of a psychic detective investigating a mysterious mansion, making branching choices and rolling dice to overcome challenges. The game is structured into five chapters and features genuine replayability through multiple branching paths and different endings. It captures the spirit of the CYOA books while adding cooperative mechanics that make it accessible to a wide range of players.

