description: |
  Déconnaissance is a 1993 French quiz board game created by entertainer Patrick Sébastien and published by Mattel and TF1 Games. The game is built around puns and wordplay: from a given theme and definition, players must identify a word or phrase where one or more words have been distorted through a play on sounds. The active player draws a card, rolls the die, and reads the clue aloud; the player to their left tries to give the exact answer, advancing on the board if correct. The game includes 1000 cards across two boxes, supporting 2-6 players for about 45 minutes.

