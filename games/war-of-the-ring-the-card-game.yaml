description: |
  War of the Ring: The Card Game, released by Ares Games in 2022 and designed by Ian Brody with Roberto Di Meglio and Karin Weston-Brody, distills the epic struggle of Middle-earth into a fast-paced card game. Each player controls one or more factions—Free Peoples or Shadow Armies—using a unique deck reflecting their faction's strengths and weaknesses across 14 oversized battlegrounds like Helm's Deep. The innovative card-cycling mechanism creates meaningful decisions: cycled cards can return to your deck, while eliminated cards are permanently lost. Players activate battlegrounds strategically using a reserve area, enabling careful long-term planning within a streamlined ruleset.

