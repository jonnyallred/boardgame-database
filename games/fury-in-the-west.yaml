description: |
  Fury in the West is a two-player hex-and-counter wargame simulating the Battle of Shiloh during the American Civil War. Originally published by Battleline in 1977 and later revised and republished by Avalon Hill, the game introduced several rules innovations that were considered novel at the time. Players command Union and Confederate forces across a hex grid, managing unit positioning and supply lines to achieve historical or alternate-history outcomes at this pivotal 1862 engagement.

