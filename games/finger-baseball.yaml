description: |
  Finger Baseball is a dexterity-based baseball simulation game in which players flick a marker across a game board to simulate an at-bat. Depending on where the marker lands, the result is a ball, a strike, or a pending hit — if a pending hit, the batter must flick again to the corresponding hit zone or be called out. The game requires no equipment beyond the board and marker, making it one of the simplest sports simulations. Specific publication details, designer, and precise year of origin are not well documented in available sources.

