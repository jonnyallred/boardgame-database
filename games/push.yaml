description: |
  Push is a simple and energetic press-your-luck card game published by Ravensburger in which players alternate drawing colored number cards and placing them into stacks on the table, aiming to build unique stacks with no repeated colors or numbers. The tension comes from deciding when to stop and claim the stacks, versus pushing your luck by drawing more cards with increasingly risky odds. Quick to learn and filled with agonizing near-bust moments, Push excels as a lively filler for mixed-age groups.

