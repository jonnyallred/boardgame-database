description: |
  Food Chain Magnate is a punishing and deeply strategic economic game from Dutch publisher Splotter Spellen in which 2-5 players compete to build the most profitable fast food restaurant chain. Players hire staff using a card-driven human resource system, training employees up skill trees to unlock marketing, sales, and management capabilities, all while vying for position on a variable city-tile map. Advertising campaigns determine what customers demand, and the first company to fulfill those demands earns the most revenue — but smart competitors can muscle in and steal customers. Famous for its brutal cutthroat competition, permanent milestone cards, and nearly unlimited strategic depth, Food Chain Magnate is a modern cult classic of heavy euro design.

