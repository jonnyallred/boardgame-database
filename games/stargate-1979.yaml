description: |
  StarGate is a 1979 SPI science fiction microgame designed by John H. Butterfield in which one player controls the alien Virunians and the other the Coalition (an alliance of multiple races) in a climactic spaceship battle. Ships have unusual movement options including dimension-shifting (switching hex columns), gate-skimming (orbiting stargates), teleportation, and "wobbling" to any hex on the map. The Virunians must destroy eight Coalition ships while the Coalition must destroy six Virunian ships. The game remained on SPI's bestseller list for a year after release.

