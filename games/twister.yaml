description: |
  Twister is the iconic physical party game created by Charles Foley and Neil Rabens and published by Milton Bradley in 1966. Players place hands and feet on colored dots on a vinyl mat as directed by a spinner — right hand red, left foot blue — while trying not to fall as positions become increasingly contorted. The game became a cultural phenomenon after actress Eva Gabor played it with Johnny Carson on The Tonight Show on May 3, 1966, selling 3 million units by year's end. Now published by Hasbro, it remains one of the best-selling games of all time.

