description: |
  Bauernschlau (Crooked Shepherds) is a German area-control game published by F.X. Schmid
  in which players fence off sections of a farm board to enclose sheep-filled pastures.
  Face-down white sheep tiles score positive points while black sheep tiles are penalties,
  creating a bluffing element as players rush to claim the most valuable flocks while
  stuffing opponents with black sheep. Players use tactics and guile to fence in the
  most valuable areas, making each game a spirited battle of wits and positioning.

