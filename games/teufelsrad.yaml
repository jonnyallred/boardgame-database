description: |
  Teufelsrad (Devil's Wheel) is a German family board game published by
  Spiele-Schmidt with artwork by Susa Schlieper. Descended from Pachisi with
  elements of Malefiz, it features a multi-level circular board with four rings
  of safe zones and downward trap arrows. Players race pieces through increasingly
  dangerous levels toward the outer ring, with two same-colored pieces forming
  impassable barriers and pieces thrown from the highest level being eliminated.
  The winner is the player with the last piece remaining on the wheel, creating
  a tense elimination race with tactical blocking opportunities.

