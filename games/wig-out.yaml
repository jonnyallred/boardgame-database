description: |
  Wig Out! is a fast-paced simultaneous card game for 2-6 players in which everyone plays at once, trying to discard all their cards before anyone else. Players start new piles, lay matching cards on existing piles, or draw when they can't play — and the first person to empty their hand shouts "Wig Out!" to end the round. The speedy real-time play and humorous hair-themed art make it a hit with young players and families looking for a quick, energetic game.

