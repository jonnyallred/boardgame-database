description: |
  War Between the States 1861–1865 is a comprehensive two-player grand strategic wargame from SPI simulating the entire American Civil War. Designed by Irad Hardy, the game covers all theaters of operation from 1861 to 1865, requiring players to manage armies, resources, and politics at a strategic level. The scale and scope of the simulation demand long-term planning and historical knowledge to successfully conduct campaigns. It stands as one of the most ambitious Civil War simulations of the 1970s wargaming era.

