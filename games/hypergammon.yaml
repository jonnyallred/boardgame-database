description: |
  Hypergammon is a fast-paced backgammon variant invented by Nack Ballard in which each player uses only three checkers rather than the standard fifteen, with all three pieces starting on the 22nd, 23rd, and 24th points. The reduced piece count makes the game dramatically faster while preserving the core mechanics of dice rolling, bearing off, and the doubling cube. Because both players nearly always have exposed blots due to the difficulty of making points with so few pieces, there is near-constant hitting and tactical decision-making despite the abbreviated format.

