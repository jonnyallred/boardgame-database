description: |
  Glen More is a tile-placement and rondel game designed by Matthias Cramer and published in 2010, set in 17th-century Scotland where players lead clans expanding their territory and wealth. Tiles are selected from a circular track where picking a tile determines both the actions you gain from adjacent tiles in your territory and the timing of your next turn—players with fewer tiles get more turns, creating a natural catch-up mechanism. Players develop pastures for cattle, grow grain for whisky production, trade at markets, and invest in lochs and castles. The elegant turn-order mechanic and tight resource decisions make it a beloved medium-weight Euro.

