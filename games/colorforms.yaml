description: |
  Colorforms is a creative activity toy/game first introduced in 1951 featuring reusable vinyl sticker-like pieces that adhere to a coated board. Players arrange brightly colored geometric shapes or character-themed pieces freely on a backdrop, fostering imaginative play and storytelling. Over the decades the brand has produced hundreds of themed sets featuring licensed characters such as Barbie, Mickey Mouse, and the Smurfs. Its open-ended, no-rules format has made it a perennial children's toy marketed primarily as an activity set rather than a competitive game.

