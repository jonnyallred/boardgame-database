description: |
  HeroQuest is a landmark adventure board game designed by Stephen Baker, created jointly by Milton Bradley and Games Workshop in 1989. One player serves as the game master Zargon, controlling monsters and revealing a modular dungeon, while up to four players command the Barbarian, Dwarf, Elf, and Wizard on scripted quests filled with combat, traps, and treasure. The game bridged board games and tabletop RPGs for a generation of players and has remained influential, inspiring modern dungeon crawlers like Gloomhaven; Hasbro republished it through Avalon Hill in 2021.

