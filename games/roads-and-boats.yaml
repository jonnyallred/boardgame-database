description: |
  Roads & Boats is a landmark Splotter Spellen logistics game in which players build complex transport networks and industrial supply chains rather than fighting wars or claiming territory. Starting with three donkeys, some wood, stone, and two geese, players develop woodcutters, roads, boats, mines, and eventually a stock exchange across a modular hex map. Uniquely, players cannot own land or buildings — everything is shared, creating deep emergent conflicts as supply chains interweave and players race to industrialize first. Its profound depth, distinctive economic design, and lack of direct conflict set it apart as one of the most revered and challenging economic games ever designed.

