description: |
  River Valley Glassworks is a cozy 2024 tile-drafting and pattern-building game in which 1-5 players compete to collect pieces of colored glass and arrange them strategically in their glassworks shop. Players draft glass tiles from a shared river, placing them in their personal grid to create matching sets and patterns that score end-game bonuses. The game's modular board and open drafting create interesting competition for valuable glass pieces, while its quick 30-minute playtime and gentle theme make it an accessible family gateway. Designed by Adam Hill, Ben Pinchback, and Matt Riddle, River Valley Glassworks delivers a satisfying puzzle with just enough rivalry.

