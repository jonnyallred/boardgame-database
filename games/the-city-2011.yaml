description: |
  The City is a quick tableau-building card game by Donald X. Vaccarino in which players race to
  construct a city worth 50 victory points. Cards serve both as buildings and as currency — each
  turn players play some cards as buildings and discard others to pay costs. Some buildings have
  symbols (cars, fountains, shopping carts) that synergize with other cards, so that each icon
  in play multiplies the income and VP value of matching buildings. The first player to reach
  50 victory points wins immediately, creating a race tension where timing your builds and watching
  opponents' tableau is critical. The game's elegant simplicity made it a hit for casual and
  family gaming.

