description: |
  Railroad Ink: Deep Blue Edition is a roll-and-write network-building game for 1-6 players sharing the same base game as the Blazing Red Edition. Each round route dice are rolled and all players simultaneously draw those routes on their personal whiteboards, striving to connect exits and maximize network length. The Deep Blue Edition includes the Rivers and Lakes expansion dice modules that introduce water routes alongside the standard rail-and-road puzzle. Up to 12 players can participate by combining both editions, making it one of the most scalable roll-and-write games available.
