description: |
  Imagine is a visual charades party game designed by a Japanese team and published by Gamewright in 2016, originally from Japan via French publishing partners Cocktail Games. Players use 61 transparent icon cards depicting simple shapes and symbols to communicate a hidden word or phrase through visual layering and combination, without speaking. The transparent overlapping cards allow for creative compositions that can hint at nearly any concept. The game is notable for its elegant simplicity—anyone can play immediately—and the surprising expressiveness of its minimal visual vocabulary.

