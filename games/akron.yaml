description: |
  Akron is a two-player abstract connection game played with cascading balls on a specially designed board. Players take turns placing or moving balls, with the distinctive mechanic of pieces stacking in three dimensions—balls can cascade and roll into new positions when others are placed above them. The goal is to create a connected path of your color from one side of the board to the other. The three-dimensional stacking and cascade mechanics create surprising emergent complexity from simple rules, making Akron a novel entry in the connection game genre.

