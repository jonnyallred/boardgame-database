description: |
  Water Lily is a short bluffing racing game designed by Dominique Ehrhard in which frog princes compete in a Royal Race to win the hand of a princess—but the scoring is counterintuitive, as arriving too early earns only a few points while arriving too late earns none. The game uses the box bottom as the board, with a built-in plastic inset containing five chutes for frog tokens, making setup instant. Players must balance the temptation to race ahead against the risk of overshooting, creating a tense, quick-playing blend of bluffing and tactical movement.

