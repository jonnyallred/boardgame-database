description: |
  Chaos in the Old World is an asymmetric area control game published by Fantasy Flight Games in 2009, designed by Eric Lang and set in the Warhammer Fantasy universe. Three to four players each embody one of the four Chaos gods — Khorne, Nurgle, Tzeentch, or Slaanesh — each with unique abilities, units, and victory conditions as they vie to corrupt and ruin the Old World. Players can win by accumulating victory points, fully advancing their god's threat dial, or ruining enough regions — but if seven world event cards are exhausted and no god has won, the world itself wins and everyone loses. Praised as a landmark of asymmetric design, Chaos in the Old World became a beloved cult classic before going out of print.

