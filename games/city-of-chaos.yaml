description: |
  City of Chaos is a landmark narrative adventure board game published by Monocle Games in 1996, combining tile-laying, encounter cards, and an extensive paragraph book called the Tome of Chaos to create a highly immersive fantasy role-playing experience. Set in the fictional Byronitar — the City of Chaos — players must save the metropolis from entropic destruction by exploring its randomly generated streets, solving puzzles, and choosing outcomes from scripted encounters. Only about 1,000 copies were reportedly produced, making it a rare cult classic. Drawing inspiration from Tales of the Arabian Nights, Talisman, and Fighting Fantasy, it is recognized as a pioneering work of story-driven tabletop game design.

