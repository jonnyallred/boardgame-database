description: |
  Catan Scenarios: Frenemies is a small 2012 expansion for Settlers of Catan designed by Benjamin Teuber. The module introduces "favor tokens" — players earn these redeemable tokens by performing cooperative acts such as moving the robber harmlessly to the desert, giving away resources, or connecting roads to an opponent's network. Favor tokens can later be spent on significant advantages, creating a system where helping opponents is actually a calculated investment. The expansion adds a witty "frenemies" dynamic to standard Catan and works with 3-6 players.

