description: |
  La Isla is a 2-4 player card-driven exploration game by Stefan Feld, published by Ravensburger's alea imprint in 2014. Players are explorers on a mysterious island populated with rare extinct animals — dodo birds, giant fossas, and Sardinian pikas — competing to capture the most specimens. The board is constructed from a central 10-sided island piece and interlocking spoke-like segments offering over 100,000 possible layouts. Each turn, players play cards to simultaneously serve three functions: gaining resources, modifying ongoing powers, or placing workers, with the three-card hand forcing difficult choices about which function to activate each round. La Isla was Feld's 20th game design and stands as an accessible entry into his work.

