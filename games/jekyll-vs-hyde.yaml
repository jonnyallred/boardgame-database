description: |
  Jekyll vs. Hyde is an asymmetric two-player trick-taking game based on the classic
  Robert Louis Stevenson novel. Dr. Jekyll seeks balance—winning and losing tricks in
  roughly equal measure—while Mr. Hyde strives for dominance. Variable suit rankings
  and special potion cards with unique effects twist the traditional trick-taking formula,
  creating a game that feels nothing like its inspirations. The stark asymmetry means
  each side of the table demands completely different strategies and mental models.

