description: |
  Dracula vs Van Helsing is an asymmetric two-player card game inspired by Bram Stoker's
  classic novel. One player controls Dracula seeking to dominate, while the other plays
  Van Helsing fighting for balance across a series of lanes. Players alternately draw and
  play cards from a shared rack, triggering unique effects from eight card types. The
  asymmetric goals and hand-management tension create a quick but deeply interactive duel
  that plays differently from each side.

