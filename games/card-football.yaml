description: |
  Card football is a card-based simulation of American football in which players call plays by selecting cards from their hand, resolving outcomes through card comparison or dice. The game abstracts gridiron football into a compact card game format allowing head-to-head play without the complexity of miniatures-based football simulations. Limited specific publisher and designer information is available.

