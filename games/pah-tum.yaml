description: |
  Pah Tum is a two-player abstract strategy game presented as a reconstruction of an ancient Assyrian game from Mesopotamia, played on a 7x7 grid with 22 pieces per player plus five neutral "Boulder" pieces. Players place pieces on the board to control territory, with points scored based on the number of opponent pieces and boulders orthogonally adjacent to each of a player's placed pieces. While the game is often promoted as being 3,800 years old based on ivory game boards found in Egyptian tombs, scholars note that the specific rule set appears to date only to around 2005 as a reconstruction. Regardless of its true antiquity, Pah Tum offers an engaging and elegant area-influence abstract that plays in about half an hour.

