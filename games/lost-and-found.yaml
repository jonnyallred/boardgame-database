description: |
  Lost & Found is a cooperative children's game designed by the Brand duo (creators of Exit: The Game) in which players work together to help a lost child find their way back through a simple labyrinth or puzzle environment. The cooperative format encourages communication and shared problem-solving between children, making it suitable for family play with young children. Published by Zoch, it sits at the lighter end of cooperative game design, prioritizing accessibility and the sense of shared accomplishment over strategic challenge. A gentle introduction to cooperative board game concepts for young players.

