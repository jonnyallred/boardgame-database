description: |
  Stomp! is a 1978 asymmetric wargame published by Chaosium in which a single colossal giant called Thunderpumper battles an army of eighteen elves across a hex map. The two sides play entirely differently: the giant player moves a powerful but slow behemoth, while the elves player maneuvers a swarm of individually weak but collectively dangerous units. Designed by Tadashi Ehara, the game captures the tactical tension of small forces trying to bring down an overwhelming enemy and is notable as an early example of highly asymmetric design in hobbyist wargaming.

