description: |
  Bandido is a cooperative tile-laying game for 1–4 players in which players work together to block all the tunnels in a prison so the Bandido cannot escape. On each turn, players play cards from their hand onto open tunnel ends, trying to close off every exit before the deck runs out. The game is quick, pocket-sized, and accessible to young players, yet provides genuine cooperative tension as the tunnels branch and multiply unpredictably. Published by Helvetiq, it is one of the most approachable cooperative games available.

