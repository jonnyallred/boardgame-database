description: |
  Wissens-Spektrum is a German trivia board game published in 1984 that is comparable to Trivial Pursuit. Players move through a circular board, selecting knowledge categories and answering questions from corresponding cards to collect evidence toward winning the "Stone of the Wise." The game spawned numerous expansion packs covering topics such as German history, travel, motorsport, the Olympics, and pop music, allowing the question pool to be extended or refreshed over time.

