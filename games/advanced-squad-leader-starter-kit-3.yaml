description: |
  Advanced Squad Leader: Starter Kit #3 is the third entry in Multi-Man Publishing's introductory series to the legendary ASL tactical WWII wargame system. Building on the infantry and artillery rules of the first two kits, ASLSK #3 introduces armored vehicles — tanks and armored cars — allowing players to field Shermans, Tigers, and other iconic AFVs of the war. The 28-page illustrated rulebook adds approximately six pages of new rules to the foundation established in the earlier kits, covering German, American, British, and Russian forces. It remains the recommended pathway into full ASL for players who want to master combined-arms tactical combat at squad level.

