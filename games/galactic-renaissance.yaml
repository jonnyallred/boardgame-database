description: |
  Galactic Renaissance is a 2023 sci-fi area-control and deck-building game by Christian Martinez, published by Matagot, and the second installment in the "Political Trilogy." Players build their team by adding unique specialists to their deck, then use those specialists to discover new planets and systems, reconnect with lost civilizations, expand influence, build embassies, and sow discord in opposing factions. Sending emissaries to new planets triggers a race for diplomatic control, as rivals may counter with their own representatives. With its modular board, variable player powers, and politically charged decision space, Galactic Renaissance rewards strategic long-term thinking across a sprawling interstellar stage.

