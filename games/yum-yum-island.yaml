description: |
  Yum Yum Island is a cooperative dexterity game for young children in which players work together
  to rescue animals by feeding them before a giant's throat fills up. On each turn, a player rolls a
  die to set the difficulty, dons a blindfold, scoops up mixed food tokens, and attempts to drop
  them into the correct animal's mouth by touch alone. The cooperative arc, blindfolded feeding
  mechanic, and whimsical theme make it an ideal first board game experience for families.

