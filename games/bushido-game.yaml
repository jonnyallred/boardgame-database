description: |
  Bushido is a two-player dueling board game published by Grey Fox Games in which players take on the roles of samurai warriors competing through a system of card drafting and dice mechanics. During the training phase, players draft technique cards from five schools — Earth, Fire, Wind, Water, and Shadow — before arming for combat and then engaging in a simultaneous duel. Players attack and defend using dice and special tokens, playing technique cards or changing guard to gain advantage, with victory going to the fighter who reduces their opponent to zero health first. The game captures the tension of martial arts philosophy and the disciplined craft of the samurai duel.

