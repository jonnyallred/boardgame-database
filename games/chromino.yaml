description: |
  Chromino is a color-based domino game published by Zygomatic (distributed by Asmodee) in which players race to empty their hand of chrominoes — three-colored tile strips — by matching colors with tiles already on the table. Each chromino tile displays three colored squares in a row, and when placed must share at least two identical color-square matches with adjacent tiles. The game uses five colors across 75 unique tile combinations, begins with a special "Chameleon" tile, and supports up to eight players including solitaire. Chromino is an accessible, colorful gateway game for all ages.

