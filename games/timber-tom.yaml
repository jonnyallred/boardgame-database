description: |
  Timber Tom is a strategy and adventure board game for 2–4 players themed around an eccentric mountaineer nicknamed Timber Tom who has buried gold coins on mountain peaks. Players navigate the outdoor-themed board working to recover the hidden gold through a combination of strategy and exploration. The game offers light-to-moderate strategic depth suited to family game nights with an outdoor adventure flavor.

