description: |
  Encore is a music-themed party game published by Parker Brothers in 1989 in which players compete to sing songs containing a given word. When a word card is revealed, players must recall and sing at least eight words of any song containing that word — then the opposing team must come up with a different song using the same word, and so on until one team cannot continue. The game rewards a broad musical knowledge and quick memory recall, making it a lively and entertaining activity for groups of music lovers.

