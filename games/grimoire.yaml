description: |
  Grimoire is a card game of rival wizards designed by Hayato Kisaragi and originally published by Japon Brand at Spiel 2010, with an English edition from Z-Man Games in 2012. Each turn, players simultaneously and secretly choose a spell from their spellbook, then reveal all selections at once; spells resolve from weakest to strongest, but some weak spells negate stronger ones, creating a mind-game of prediction and bluffing. Players claim quest cards—companions and treasures—building toward a victory condition of ten treasure cards or ten companions. Its blend of simultaneous selection and set collection rewards reading opponents as much as optimizing your own hand.

