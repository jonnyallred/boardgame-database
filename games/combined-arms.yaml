description: |
  Combined Arms is a strategic WWII campaign board game published by Warlord Games that functions both as a standalone game and as a campaign layer linking multiple miniature wargames including Bolt Action, Blood Red Skies, Cruel Seas, and Victory at Sea. Players command armies across a continent-spanning theater, making high-level strategic decisions that feed into individual tabletop battles. The game captures combined-arms doctrine — coordinating infantry, armor, naval, and air assets — at the grand strategic level, rewarding players who allocate resources across multiple fronts.

