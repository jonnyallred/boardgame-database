description: |
  Ô ăn quan (Vietnamese for "mandarin capturing game") is a traditional Vietnamese two-player
  mancala game played on a rectangular board of ten square "rice field" cells plus two semicircular
  "mandarin" squares at each end. Players distribute pebbles around the board, capturing the
  contents of squares they land past, with mandarin squares worth ten points each. The game is
  part of the broader Mancala family believed to have roots in antiquity, and has been a beloved
  Vietnamese children's pastime for generations.

