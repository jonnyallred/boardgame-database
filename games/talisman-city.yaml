description: |
  Talisman City is an expansion for the Talisman board game, published by Games
  Workshop in 1989. It replaces the City space on the Outer Region board with an
  entirely new board section depicting the City, complete with new districts to
  visit, shops, and locations. The expansion adds 72 Encounter cards, 7 Adventure
  cards, 3 Dungeon cards, 20 Purchase cards, 10 Spells, and 6 new character
  classes including the Minotaur, Valkyrie, and special title characters like the
  Sheriff and Archmage. Characters visiting the City must maintain at least one
  gold or risk arrest warrants, adding economic pressure to the adventure.

