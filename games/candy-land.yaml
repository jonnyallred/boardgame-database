description: |
  Candy Land is a classic American children's racing game designed by Eleanor Abbott, a polio patient who created it for hospitalized children, and published by Milton Bradley in 1949. Players draw color-coded cards to advance their pawns along a winding path through a whimsical candy-themed kingdom toward the Candy Castle, with no decisions required — the drawn card always dictates the move. Despite its complete absence of strategy, Candy Land became one of the best-selling board games of all time, introducing generations of young children to the concept of turn-taking and board game play.

