description: |
  Carolus Magnus is an area control game designed by Leo Colovini and published by Winning Moves/Rio Grande Games in 2000, set during the reign of Charlemagne. Players place colored paladins on hexagonal territories, and whoever controls a majority of a paladin color absorbs all pawns of that color — creating sudden, dramatic swings in territorial dominance. When two territories under the same player's control merge, the land grows and becomes harder for opponents to contest. The goal is to be the first to build ten castles by achieving majority control in territories where the Emperor token arrives.

