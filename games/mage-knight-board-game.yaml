description: |
  Mage Knight Board Game is a massive solo-and-cooperative adventure designed by Vlaada Chvátil, set in the Mage Knight miniatures universe. Players control powerful Mage Knight heroes exploring a randomly generated hex-tile landscape, conquering cities, raiding dungeons, and recruiting armies using an innovative deck-building action system where cards fuel movement, combat, and magic. The game blends RPG progression, deckbuilding, and tactical hex combat into a deeply rewarding experience that rewards mastery across many sessions. Widely regarded as one of the best solo board games ever made, it sold out within weeks of its 2011 release and won multiple awards.

