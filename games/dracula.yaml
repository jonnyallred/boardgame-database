description: |
  Dracula (also known as Game of Dracula) is a 1977 children's board game published by Waddingtons in which players attempt to escape Castle Dracula before the Count and his vampires find them. Players plot their escape through the castle's rooms, moving stealthily toward the exit. The first player to be caught by Dracula becomes a "green vampire" and dons a face mask, then flits from room to room seeking another victim; further victims return to the vault and must attempt their escape from the start. A light horror game designed for family play, emphasizing tension and the thrill of pursuit.

