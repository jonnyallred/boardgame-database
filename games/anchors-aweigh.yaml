description: |
  Anchors Aweigh! is a 2018 real-time nautical adventure game by Carlo A. Rossi, published by
  Z-Man Games, for 2-4 players. Players race to equip their ships with tiles using only one hand,
  then sail out to discover new lands, trade cargo, and fend off pirates across two rounds of play.

  The single-hand restriction on tile-grabbing creates a frantic, tactile challenge that drives
  the game's humor and tension. With a 30-minute playtime and accessible rules, it targets families
  and casual gamers looking for a quick, energetic experience with a colorful seafaring theme.

