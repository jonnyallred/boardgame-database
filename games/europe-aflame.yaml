description: |
  Europe Aflame is a grand strategic wargame published by TSR in 1989, designed by David "Zeb" Cook and Edward G. Sollers, simulating the European and Middle East theatres of World War II. The two-player game places opposing commanders in charge of the Axis and Allied forces across a theater-level map, managing armies, supply lines, and strategic resources over the course of the war. As a product from TSR's wargame line, it features the detailed hex-and-counter systems common to that era of wargame design. The game provides a comprehensive simulation of the European conflict at the operational and strategic levels.

