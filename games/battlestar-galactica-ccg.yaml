description: |
  Battlestar Galactica Collectable Card Game is a collectible card game set in the reimagined Battlestar Galactica television universe, produced by Wizards of the Coast. Players construct decks representing either the human Colonial Fleet or the Cylon forces, competing in card-based combat that recreates the battles of the television series. Cards represent Vipers, Raiders, Basestars, Raptors, and the characters and events of the show. The game was released to coincide with the peak popularity of the reimagined BSG series and was discontinued after a limited number of sets.

