description: |
  The Parker Brothers Dune board game, published in 1984, is a separate game from the classic 1979 Avalon Hill title, released as a tie-in to David Lynch's Dune film adaptation of the same year. Players take on the roles of the Great Houses fighting for control of the planet Dune and its precious spice melange. Unlike the landmark Avalon Hill/GF9 design, this simpler mass-market version was aimed at a broader audience and lacks the deep faction asymmetry of its predecessor. It is a notable collector's piece as a product of the 1984 film cycle and marketed under Parker Brothers' product number 0451.

