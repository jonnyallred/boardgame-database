description: |
  Star Wars: The Card Game is a Living Card Game (LCG) published by Fantasy Flight Games from 2012 to 2018, designed by Eric Lang. One player commands the Light Side (Jedi, Rebel Alliance, Smugglers and Spies) against the Dark Side (Sith, Imperial Navy, Scum and Villainy) in asymmetric card-driven combat. Players assemble decks from objective sets, each containing one objective card and five supporting cards. Resources are generated by exhausting cards (adding focus tokens), and gameplay revolves around edge battles, force struggle, and objective destruction. As an LCG, all cards were available in fixed packs without random booster distribution.

