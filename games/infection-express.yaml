description: |
  Infection Express is a board game themed around the spread of disease, in which players attempt to infect rivals while avoiding illness themselves. The game uses take-that card or action mechanics to spread disease tokens across a shared board, rewarding aggressive play and timing. As a light, quick filler, it occupies the niche of games that are easy to explain and set up while providing entertaining player interaction.

