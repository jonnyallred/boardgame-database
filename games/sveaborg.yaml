description: |
  Sveaborg is a historical board wargame published by SPI covering the famous
  Finnish sea fortress of Sveaborg (Suomenlinna) and its role in 18th-century
  Nordic naval warfare. The game simulates the strategic and tactical challenges
  of defending or attacking the fortified island complex near Helsinki. As a
  folio-format wargame from SPI's era of prolific historical simulation design,
  it features hex-and-counter mechanics typical of the publisher's catalog
  during the 1970s.

