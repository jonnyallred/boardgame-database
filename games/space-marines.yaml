description: |
  Space Marines (1989) is an epic-scale tabletop wargame by Games Workshop set in the Warhammer 40,000 universe,
  simulating large-scale battles between Space Marine legions and alien factions including Orks and Eldar.
  Players move and engage unit formations on a battlefield, resolving combat through dice, with the option to
  integrate Adeptus Titanicus rules to field giant Titans. The game introduced many players to Warhammer 40,000
  at an accessible entry point before the full complexity of the core miniatures game.

