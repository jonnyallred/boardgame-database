description: |
  Tide of Iron is a squad-level World War II tactical wargame set in the American and German campaigns of 1944–1945 in Northern Europe. Players command detailed plastic figures including infantry, tanks, and other combat vehicles across scenario-based missions on a modular board that represents the varied terrain of the European theater. The game balances realistic combat simulation with streamlined rules approachable by non-wargamers, and spawned several expansions covering North Africa, Normandy, and the Eastern Front.

