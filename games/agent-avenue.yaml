description: |
  Agent Avenue is a fast-paced set collection and bluffing game for 2–4 players in which undercover spies race through a quirky anthropomorphic suburb to uncover each other's identity. Each turn, players use a clever "I split, you choose" mechanic—playing one card face-up and one face-down, letting their opponent pick one while both cards influence each player's movement and strategy. Most cards trigger bonuses based on collected sets, rewarding players who manage their growing collections while keeping opponents guessing.

