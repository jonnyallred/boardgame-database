description: |
  Whistle Stop is a 2017 pick-up-and-deliver route-building train game by Scott Caputo, published by Bezier Games, in which 2–5 players race their trains westward across the country during the golden age of American railroads. Players lay track tiles from their hand to connect routes, spend coal to move their train along the growing network, pick up goods at whistle stops, and deliver them to growing towns for shares and fame points. Acquiring shares in rival railroads adds a stock-collecting layer, while gold tokens and West Coast deliveries provide big late-game payoffs. Light to medium in weight, it teaches route-building, resource allocation, and light stock collection in an accessible package.

