description: |
  Merchants of Amsterdam is a Dutch auction game designed by Reiner Knizia and published by Jumbo in 2000. The game includes a physical spring-driven auction clock that counts down prices — when a player likes the current price, they slam the clock to claim an item at that amount. Players are 17th-century merchant families trading spices, precious stones, sugar, and silk while establishing storehouses in Amsterdam and trading posts in overseas colonies. The tactile clock mechanic and the tension of watching prices tick down create a uniquely physical auction experience that distinguishes it from purely card-based bidding games.

