description: |
  Election is a political board game published by Intellect Games in 1972 in which players campaign across ten regions of a board to win votes and secure electoral victory. Players move around the board campaigning in key regions, spending resources to gain support and outmaneuver opponents. The game simulates the strategic decisions of a political campaign — where to concentrate effort, how to respond to opponents, and how to build a winning coalition of regional support. It is an early example of the political simulation genre that predates more elaborate modern electoral games.

