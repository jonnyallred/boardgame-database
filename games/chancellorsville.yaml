description: |
  Chancellorsville is a board wargame published by Avalon Hill in 1961, designed by Charles S. Roberts, simulating the 1863 American Civil War battle. Published alongside its sister game Gettysburg to mark the centennial of the Civil War, Chancellorsville was among the first wargames to use a hexagonal grid. The original edition was criticized for its bland terrain-less map and was dropped from Avalon Hill's catalog after two years; it was substantially revised and republished in 1974 with proper terrain markings. Despite its rocky initial reception, it holds historical significance as an early pioneering hex wargame.

