description: |
  Teenage Mutant Ninja Turtles: Tower of Doom is a 1990 dexterity children's
  game similar in concept to Kerplunk. Players load the tower with 16 swords,
  drop the six ball-bearing game pieces (the four Turtles, Splinter, and
  Shredder) into the top, and take turns drawing swords while waiting for
  pieces to fall. Each player stands in front of the tower with a pizza-shaped
  scooper, trying to catch falling Turtles as the swords are removed one by one.
  Collecting specific Turtle pieces earns pizza slices toward winning the game.
  The game features a uniquely tactile tension as each sword removal risks
  triggering a cascade of falling pieces.

