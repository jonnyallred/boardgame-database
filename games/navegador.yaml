description: |
  Navegador is an economic strategy game by Mac Gerdts set during the Golden Age of Portuguese Exploration, published by PD-Verlag and Rio Grande Games in 2010. Players take on the role of Portuguese merchant families, sailing to new colonies, building factories, acquiring privileges, and trading goods across an expanding map. The game's signature mechanism is the rondel — a circular action wheel shared by all players — where each player moves their token up to three spaces for free, paying ships for additional movement. The tension between action efficiency and keeping pace with rivals makes Navegador one of the most refined entries in Gerdts' acclaimed rondel series.

