description: |
  Giro Galoppo is a family horse-racing game designed by Jürgen P. Grunau and published by Rio Grande Games in 2006, winner of the Japan Boardgame Prize for Best Children's Game and nominated for the Kinderspiel des Jahres. All players receive identical sets of cards numbered 1–6 and simultaneously choose one each round; the player with the lowest card (breaking ties by position) moves first, and landing on another's horse pushes it backward. Players also place jump obstacles before the race, adding blocking strategy to the card-selection bluffing. Its simultaneous play and short runtime make it a fast, exciting family game.

