description: |
  Power Projection: Escort is the introductory entry in BITS's Traveller space combat wargame line, published in 2002. Focused on Imperial and Zhodani ships under 10,000 tons, it provides streamlined quick-play rules accessible to players new to the Full Thrust-derived system. The game uses vector movement, simultaneous movement, and initiative-based fire, featuring classic Traveller weapons including meson guns, particle accelerators, missiles, and beam weapons. Escort is fully standalone and pairs naturally with its companion volume Power Projection: Fleet for larger capital ship engagements. Together, the two books cover the full range of Traveller's Fifth Frontier War naval scenarios.

