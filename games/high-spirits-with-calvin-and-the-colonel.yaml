description: |
  High Spirits with Calvin and the Colonel is a children's board game published by Milton Bradley in 1962, based on the animated TV series Calvin and the Colonel which ran from 1961 to 1962. The series was an animated adaptation of the Amos 'n' Andy radio and television programs, following a Southern bear and fox living in a northern city. The game reflects the lighthearted comedic tone of the cartoon and is primarily a collector's item today given its connection to early 1960s television history.

