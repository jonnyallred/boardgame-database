description: |
  The Hunt for Red October is a two-player naval wargame published by TSR in 1988, based on Tom
  Clancy's Cold War thriller novel. The American player tries to guide the rogue Soviet submarine
  Red October safely to defection, while the Soviet player marshals aircraft, surface ships, and
  submarines to hunt it down and destroy it. The game features a map of the North Atlantic broken
  into irregular spaces, with unit information kept partially hidden from opponents. Eight scenarios
  provide varying forces and objectives. It won the 1989 Origins Award for Best Boardgame covering
  the modern era, and TSR claimed it was one of the bestselling wargames of its time.

