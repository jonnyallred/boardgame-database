description: |
  Unlock! Escape Adventures is the inaugural box set in Space Cowboys' Unlock! cooperative escape room card game series, published in 2017. The box contains three adventures including "The Island of Doctor Goorse," "Squeek & Sausage," and "The Formula." Players work together using a card-based system and a free companion app to solve puzzles, combine objects, and find hidden codes within a one-hour time limit. No setup is required, the app tracks time and provides hints, and the system was a breakthrough in bringing escape room experiences to the tabletop home game format.

