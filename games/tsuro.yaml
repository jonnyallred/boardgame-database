description: |
  Tsuro: The Game of the Path is an elegant tile-placement game in which players guide their tokens along paths built turn-by-turn on a shared board. Each turn, a player places a tile from their hand and moves their piece along the new path — if a path leads off the board or collides with another player, that player is eliminated. The last piece remaining on the board wins. Designed by Tom McMurchie and originally published by WizKids in 2004, Tsuro was relaunched by Calliope Games in 2011 and became a beloved gateway game celebrated for its minimalist rules and beautiful board presence.

