description: |
  Storytailors is a 2020 cooperative storytelling game by Marie and Wilfried Fort for 2-6 players in which participants collaboratively build a storybook. Each page of the book reveals a new character description — a brave knight, a lonely musician, a clumsy ninja — and players vote on which animal card best fits, adding the winner to the book. The resulting story is unique to each play session, driven by group consensus and imagination. Winner of the 2020 Children's Game of the Year by the Groupement des Boutiques Ludiques.

