description: |
  Investopoly is a property investment board game in the tradition of Monopoly, themed around buying and selling investment properties and securities rather than real estate. Players accumulate wealth through strategic property acquisition, rental income, and market trading. Like its contemporaries in the economic simulation genre, Investopoly aims to teach investment concepts through competitive gameplay. An obscure entry in the economic board game genre that reflects the proliferation of Monopoly-adjacent investment games during the 1970s.

