description: |
  Facts in Five: The Game of Knowledge is a categories-based word game designed by Rick Onanian and published by 3M in 1967 as part of their popular bookshelf game series. Based on the parlor game Scattergories, players draw cards to select five categories and five letter tiles, then race against a five-minute sand timer to fill in a grid by naming something in each category that begins with each letter — potentially generating up to 25 answers. Players score points for unique answers not matched by any opponent. The game has been reprinted multiple times by Avalon Hill and other publishers, remaining a perennially popular party and family game.

