description: |
  Felicity: The Cat in the Sack is a fast and light bidding and bluffing game for 3-6 players lasting 9 rounds. Each round, players take turns adding cat cards (with values ranging from -8 to +15) and other pet cards (dogs and rabbits) to a communal sack, then the player willing to spend the most mice tokens wins the bag. The twist is that players can manipulate the bag's contents to include valuable or worthless animals, and possessing the worst cats at game end counts against you. Designed by Bruno Cathala and Ludovic Maublanc, it delivers tense bluffing decisions in an accessible family-friendly package.

