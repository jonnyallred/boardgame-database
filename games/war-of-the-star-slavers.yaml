description: |
  War of the Star Slavers is a science fiction wargame designed by Dave Casciano in which players take on the roles of competing interstellar empires or become Star Slavers raiding across the galaxy. Reviewed in White Dwarf magazine in 1977, it is a relatively obscure title from the early era of science fiction board wargames. Players navigate asymmetric factions with distinct capabilities as they battle for control of star systems, reflecting the pulpy space opera themes popular in gaming of that period.

