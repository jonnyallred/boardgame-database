description: |
  Mykerinos is an area-control game by Nicolas Oury, published by Ystari Games and Rio Grande Games in 2006. Players take on the roles of archaeologists in ancient Egypt competing to excavate relics and secure the patronage of powerful benefactors for a final museum exhibition. Each round players place workers on a 5×5 excavation grid of cards representing different artifacts, with the player holding the majority in each row or column claiming that site's cards at round end. Patrons provide special scoring bonuses or action powers, rewarding thoughtful alignment of excavation strategy with the right sponsor, across a tight and engaging four-round game.

