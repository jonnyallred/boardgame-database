description: |
  Undaunted: Stalingrad is a 2022 standalone campaign deck-builder and wargame by David Thompson and Trevor Benjamin, published by Osprey Games, depicting the brutal urban fighting for Stalingrad during World War II. Players build and evolve platoon decks of soldier cards while maneuvering units across hex-based map tiles in up to fifteen branching scenarios whose outcomes carry forward through the campaign. While the consequences of each battle persist — affecting the city itself and the soldiers you command — the game can be fully reset and replayed for entirely different stories. Named Best Board Game of 2022 by multiple outlets, it features over 300 unique illustrations by Roland MacDonald and narrative mission briefings by Robbie MacNiven.

