description: |
  Nauticus is a shipbuilding and trading game designed by Wolfgang Kramer and Michael Kiesling, published by KOSMOS in 2013. Players take on the roles of wealthy shipbuilders, constructing sailing vessels by adding masts and sails across five rounds, then loading those ships with goods to score points. Each round comprises seven action phases during which players select from a shared set of actions, competing to take the most valuable options first. The familiar Kramer/Kiesling pedigree shows in its clean action-drafting structure and accessible mid-weight play suited to hobby gamers and families alike.

