description: |
  Blox is an abstract strategy game in which players construct a 3D chain of blocks
  on a base plate, racing to be the first to build a connected chain of their own
  blocks linking all four edges of the board. Deceptively simple rules lead to
  surprisingly complex spatial play as players must simultaneously build their own
  connections while blocking opponents. The three-dimensional nature of the block
  placement adds a spatial reasoning element absent from flat abstract games.

