description: |
  Wizards is a 1982 Avalon Hill game of high fantasy set in the "Enchanted Isles" for 2-6 players, blending board game and RPG elements. Each player takes the role of a druid, wizard, or sorcerer who must complete quests — called "Tasks" — across 18 randomly placed hexagonal islands while advancing through four levels of power and collecting Sacred Gems. The game is simultaneously cooperative and competitive: if players collectively fail to defeat the Evil Spirit, everyone loses, but the first individual to gather enough gems and complete enough tasks wins alone. The hybrid design creates tense decisions about when to cooperate and when to pursue personal victory.

