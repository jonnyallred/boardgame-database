description: |
  Bauernroulette (literally "peasant's roulette") is a traditional German spinning-top
  game played on a wooden circular board containing six numbered balls. A top is spun
  into the center, scattering the balls into different numbered compartments; one red ball
  doubles points scored, while a green ball deducts points. Players race to accumulate
  an agreed total — typically 1000 points — to win. Its simple mechanics and tactile
  wooden components have made it a perennial favorite with children across Germany.

