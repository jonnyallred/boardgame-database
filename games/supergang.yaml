description: |
  SuperGang is a territory control game set in a city divided into five colored
  districts, each composed of shops and properties. Players control rival gangs
  competing to become the owner of a full district or the last gang standing.
  On each turn, gang members move via dice rolls to claim shops, manage
  resources, and confront rival gangs and police forces. The game combines
  economic management with direct conflict in a gritty urban setting, designed
  for 3–4 players with sessions lasting 2–3 hours.

