description: |
  Buccaneer is a classic British pirate board game published by Waddingtons from 1938 through the 1980s, designed by Geoffrey Bull. Players sail their pirate ships around a sea board, collecting treasures from the central Treasure Island via chance cards and by capturing rival ships, aiming to accumulate treasure worth 20 points at their home port. The game features physical treasures including diamonds, rubies, pearls, gold bars, and rum barrels, giving it a tactile charm that made it a beloved family staple for generations of British households.

