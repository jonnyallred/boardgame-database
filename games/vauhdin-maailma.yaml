description: |
  Vauhdin Maailma is a Finnish motorsport-themed board game published by Tactic Games in 2010, aimed at players aged 15 and above. The game draws on the world of motor racing, bringing the excitement of the circuit to the tabletop. As a product of Finland's Tactic Games — a major Nordic game publisher — it reflects the region's strong interest in motorsport, particularly Formula 1. Specific designer information is not widely documented in English-language sources.

