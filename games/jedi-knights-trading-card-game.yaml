description: |
  The Jedi Knights Trading Card Game is a collectible card game released by Decipher in April 2001 set in the Star Wars universe. Players compete to control a majority of four double-sided location cards (Tatooine, Bespin, Hoth, and Endor) by deploying characters and starships whose power ratings determine site control. Unlike the earlier Star Wars CCG, Jedi Knights blurs the line between light and dark side decks. Two expansions (Scum and Villainy; Masters of the Force) were released before Decipher lost the Star Wars license and was forced to discontinue the game, making complete sets a collector's item.

