description: |
  6 nimmt! is a card game for 2–10 players in which everyone simultaneously selects and reveals a card, then places it onto one of four rows on the table. Cards must be placed on the row whose highest card is closest in value to (but lower than) the card being played. If your card becomes the sixth card in a row, you collect those five cards as penalty points. The winner is whoever accumulates the fewest bull's head penalty symbols when any player reaches 66. Winner of the 1994 Deutscher Spiele Preis, it remains a celebrated filler and party game for large groups.

