description: |
  Nations is an intense card-driven civilization game for 1–5 players designed by Rustan Håkansson and published by Lautapelit.fi in 2013. Players guide their nations from prehistoric times through the dawn of World War I across eight rounds, purchasing cards representing leaders, military forces, technological advances, wonders, and buildings to grow their power. Unlike typical civilization games, Nations uses a card-drafting market mechanism where a limited row of cards refreshes each round, forcing players to compete for the most impactful advances. Victory points are earned primarily through a Heritage track and end-game bonuses from buildings and wonders.

