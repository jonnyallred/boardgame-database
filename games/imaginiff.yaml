description: |
  Imaginiff is a party game published by Buffalo Games in 1998 in which players answer whimsical "what if" questions about people they know. A token moves around a ring of names written on the board at the start of play, and when it lands on a name, all players answer a multiple-choice question about that person, such as "Imaginiff Steve were a type of weather." Players score points when their answers match the majority, rewarding those who best know the group. The game works best when played with a mix of close friends and acquaintances, and it has been praised for sparking genuine conversation and laughter.

