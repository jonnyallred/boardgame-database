description: |
  XCOM: The Board Game is a cooperative sci-fi game in which four players each take on a distinct
  role — Commander, Chief Scientist, Central Officer, or Squad Leader — to defend Earth from an
  alien invasion. A required companion app acts as the alien AI, coordinating attacks in real time
  and creating dynamic, unpredictable turn structures that would be impossible without it. The
  game's push-your-luck dice mechanics combine with tight budget management and time pressure to
  generate relentless tension throughout each session.

