description: |
  The Siege of Jerusalem is a 1976 historical wargame simulating the Roman siege of Jerusalem in 70 A.D., originally published by Historical Perspectives and later revised and republished by Avalon Hill in 1989 as the Third Edition. One player commands the besieging Roman forces under Titus, while the other commands the Jewish defenders; the Romans must capture the Temple within five phases. The game features 800 die-cut counters representing infantry, archers, cavalry, siege equipment, and wall conditions, across five detailed scenarios. Avalon Hill's Third Edition was described as "one of the most beautiful, detailed, challenging wargames ever made" and won the Charles S. Roberts Award for Best Pre-World War II Game of 1989, though full campaigns can take 40-80 hours.

