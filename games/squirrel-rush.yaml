description: |
  Squirrel Rush is a tile-laying and collection game published by Tailor Games in which players help forgetful
  squirrels gather nuts, acorns, and chestnuts from an autumn forest glade before winter arrives. Players build
  the glade from tiles and navigate the hidden bounty beneath autumn leaves, using special actions to maximize
  the food they collect with logical efficiency. Designed for 2 to 6 players ages 6 and up, it combines simple
  set-collection goals with light tactical planning in a charming seasonal woodland theme.

