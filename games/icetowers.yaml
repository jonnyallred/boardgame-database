description: |
  IceTowers is a fast-paced, simultaneous real-time game designed by Andrew Looney and published by Looney Labs using the Icehouse pyramid pieces system. Players compete without turns, each stacking their colored pyramids on towers across any flat surface, with the goal of controlling the most pieces at the game's end. The three basic actions—Capping (taking control of a tower), Mining (retrieving your pieces), and Splitting (dividing a tower)—create a chaotic, competitive experience where good spatial awareness and quick decision-making win out. Everyone plays at the same time, making it one of the most energetic games in the Icehouse family.

