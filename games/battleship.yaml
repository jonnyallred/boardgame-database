description: |
  Battleship is a classic two-player naval strategy guessing game with roots as a pencil-and-paper game from World War I, first published by Milton Bradley in its plastic peg-and-board form in 1967. Each player secretly positions their fleet of five ships on a 10×10 grid, then players alternate calling out grid coordinates to hunt and sink the opponent's fleet. The game combines deduction, probability estimation, and memory as players systematically eliminate possibilities. With over 100 million copies sold and induction into the National Toy Hall of Fame in 2025, Battleship is one of the most recognized board games in history.

