description: |
  That's Life! (originally published in Germany as Verflixxt!) is a modern
  roll-and-move game designed by Wolfgang Kramer and Michael Kiesling,
  published by Ravensburger. Players move tokens down a shared path of face-up
  tiles — some positive, some negative — and collect tiles when the last piece
  leaves them. The twist is that multiple tokens share the same path, giving
  players genuine choices about which piece to move and when to grab desirable
  tiles versus avoid bad ones. Nominated for the 2005 Spiel des Jahres, the
  game modernizes the roll-and-move formula with real strategic decisions.

