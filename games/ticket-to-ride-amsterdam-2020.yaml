description: |
  Ticket to Ride: Amsterdam is a 2020 small-box standalone entry in the Ticket to Ride series designed by Alan R. Moon and published by Days of Wonder, set in 17th-century Amsterdam. Players race to claim commercial routes across the historic city using carts rather than trains, completing trade contracts for points. A unique merchandise bonus mechanic awards end-game points to the player who collected the most merchandise cards from claimed routes. As part of the Cities sub-line targeting 10-15 minute sessions, Amsterdam distills the Ticket to Ride formula into a fast, accessible filler for 2-4 players.

