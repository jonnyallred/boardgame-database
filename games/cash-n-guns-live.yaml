description: |
  Ca$h 'n Gun$: Live is a live-action party adaptation of the popular gangster bluffing game Cash 'n Guns by Ludovic Maublanc and Repos Production. Rather than foam guns, players use hand gestures or printed gun cards to simultaneously "aim" at other players during a gangster loot-sharing standoff, then reveal whether they are bluffing or actually shooting. Players who are shot suffer wounds and may drop out of sharing the loot; after multiple rounds the gangster who survives with the most cash wins. It preserves all the tension and comedy of the original in a no-components format.

