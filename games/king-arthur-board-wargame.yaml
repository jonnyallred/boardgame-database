description: |
  King Arthur is a 1979 board wargame published by SPI as part of the Great Medieval Battles "quadrigame," simulating the legendary Battle of Camlann between King Arthur and his treacherous son Mordred. Designed by Rob and Linda Mosca, the game uses a morale-based combat system where units accumulate Rout levels rather than being eliminated outright, creating a dynamic ebb and flow of battle. Combat incorporates both ranged and melee elements, reflecting the mixed forces of Dark Ages warfare. The game melds Arthurian mythology with realistic tactical wargaming mechanics.

