description: |
  Ticket to Ride: New York is a fast-paced entry in the Cities line, set amid the bustling streets of New York City where players use taxi pieces instead of trains. Players race to visit iconic Tourist Attractions and complete Destination Tickets, scoring bonus points for each tourist attraction connected to their claimed routes. With most routes being just one or two spaces and a playtime of 10–15 minutes, it distills the Ticket to Ride experience into an accessible, quick-play format.

