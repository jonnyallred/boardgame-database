description: |
  Gwyddbwyll is an ancient Celtic board game whose name translates as "wood-wisdom" or "wood-sense," played between two players with equal numbers of pieces using custodial capture — a mechanism shared with the Roman game ludus latrunculorum. Appearing frequently in medieval Welsh literature, most famously in The Dream of Rhonabwy where King Arthur plays it on a golden board with silver pieces, the game held profound cultural and even mystical significance among the Celts. The exact rules are lost to history; modern Welsh uses "gwyddbwyll" as the word for chess, though the ancient game is distinct. It is closely related to the Irish fidchell and represents one of the oldest known board game traditions in the British Isles.

