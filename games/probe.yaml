description: |
  Probe is a classic word deduction game published by Parker Brothers in 1964 in which each player secretly selects a word of 12 letters or fewer and arranges letter cards face-down on their display rack. Players take turns asking any opponent if they hold a specific letter; if yes, the corresponding card is flipped face-up. An activity deck adds surprises by altering scores or revealing letters. The first player to guess all opponents' words wins, blending the hidden-information tension of Battleship with vocabulary skills.

