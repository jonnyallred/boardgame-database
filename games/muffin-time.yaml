description: |
  Muffin Time is a chaotic hand-management card game based on the TomSka/asdfmovie internet series, published by Big Potato Games following a successful 2019 Kickstarter. The goal is to be the first player to have exactly 10 cards in hand at the start of their turn. Players draw, play action cards to attack opponents or gain advantages, place hidden trap cards that trigger on opponents' turns, and counter-play with response cards at any time. The game captures the anarchic absurdist humor of its source material, making it a lighthearted party filler with high chaos and minimal strategy.

