description: |
  King Oil is a 1974 Milton Bradley game where 2-4 players compete to acquire land and drill for oil, financially ruining opponents to become the crowned King Oil. The game's standout feature is a physical oil rig that players lower onto the board, which contains three randomized rotating discs beneath the surface that create 1,728 possible hidden configurations — determining whether players strike oil and at what depth. Players build derricks, pipelines, and sheds on their claimed land, managing the economics of the oil patch. The last player standing after all others have declared bankruptcy wins.

