description: |
  Gumshoe is a detective investigation game set in 1930s San Francisco, where players are operatives of the Continental Detective Agency working to solve a series of interlocking cases over nine in-game days. Rather than a traditional board, the game presents numbered clues, fingerprint reports, newspaper clippings, autopsy results, and phone directories that players consult to trace branching leads through car chases, stakeouts, and interrogations. Time spent traveling across the city is tracked on a daily pad, demanding careful planning of movements. The game appeared on Games magazine's prestigious Games 100 list in both 1985 and 1986.

