description: |
  Fire in the Sky: The Great Pacific War 1941-1945 is a strategic two-player wargame designed by Tetsuya Nakamura, covering the full scope of the Pacific theater from Pearl Harbor to the Japanese surrender. Using just one map and 180 counters, the game distills years of Pacific War design experience into a highly accessible but deep simulation. One player controls the United States and Allies, the other Japan, each managing naval, air, and ground forces across the vast Pacific. The game is praised for its elegant economy of components that nonetheless captures the strategic essence of the entire conflict.

