description: |
  Life as a BlackMan is an educational board game designed by Charles Shell and published by Cultural Connections in 1999, intended to illustrate the social and systemic challenges faced by African Americans in the United States. Players navigate life events as a Black man in America, encountering barriers, opportunities, and outcomes shaped by institutional racism, economic inequality, and community support systems. The game sparked significant attention and debate, and was used in educational contexts to facilitate conversations about race and privilege. Despite controversy, it has been cited as a pioneering attempt to create board games addressing social justice themes.

