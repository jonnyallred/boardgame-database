description: |
  Colour Whist (French: "whist à la couleur"; Dutch: "Kleurenwiezen") is a Belgian variation of the card game Whist in which the trump suit is determined by a bidding process rather than a randomly revealed card. Suits have a hierarchy — hearts outrank diamonds, clubs, and spades — and players must bid one trick higher for a less-valued suit. A variety of contract types exist, including piccolo, abondance, misery, and soloist variants. Enormously popular throughout Belgium, the game has spawned countless local rule variations; it is a core social card game in Belgian culture, played with a standard 32 or 52-card deck.

