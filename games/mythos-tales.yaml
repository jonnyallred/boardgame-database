description: |
  Mythos Tales is a narrative deduction game by 8th Summit/Grey Fox Games (2016) set in H.P. Lovecraft's Arkham, Massachusetts. Players take on the roles of investigators solving eight chilling mysteries drawn from the Cthulhu Mythos, consulting location entries in an included booklet to gather clues, follow leads, and piece together the truth about what happened. Rather than a fixed solution path, the game scores investigators on the quality of their answers at the end, rewarding thorough exploration and lateral thinking. The cooperative format allows groups to discuss theories together, making it an atmospheric and engaging alternative to escape-room-style narrative games.

