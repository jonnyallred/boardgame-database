description: |
  The Battle for Hill 218 is a two-player card game in which both players fight to capture the
  opponent's home base by occupying Hill 218 in the center of the battlefield. Players build
  supply lines by playing unit cards into connected positions, and must maintain those supply
  lines or see their units lost. Air strikes offer tactical flexibility but are limited in number.
  The game packs meaningful strategic decisions into a compact card game that plays in under half
  an hour, earning Golden Geek nominations for Best Card Game and Best 2-Player Game in 2008.

