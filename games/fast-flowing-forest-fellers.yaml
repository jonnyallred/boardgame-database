description: |
  Fast Flowing Forest Fellers is a log-riding lumberjack racing game designed by Friedemann Friese and published by Rio Grande Games in 2009. Each player controls two or three lumberjack pawns and manages a shared hand of cards for all of them, requiring clever timing as you decide when to rush ahead and when to hold back on a modular river course with obstacles and blocked passages. The 6 double-sided game boards provide dozens of different races, while the racing elements introduce entertaining blocking and bumping as teams jostle for the lead.

