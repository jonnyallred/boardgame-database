description: |
  Dixit: Journey is the third expansion for the award-winning storytelling game Dixit, illustrated by Xavier Collette with an otherworldly voyage theme. It adds 84 new large-format dreamlike illustrated cards compatible with the Dixit base game and all other Dixit expansions. Players use the standard Dixit rules: the storyteller gives a clue inspired by their chosen card, others play matching cards from their hands, and everyone votes to identify the original. The expansion can also be combined freely with other Dixit sets for a richer experience each session.

