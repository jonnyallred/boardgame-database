description: |
  Quebec Libre is a game exploring the political tensions around Quebec separatism and Canadian federalism. Players take sides in negotiations and political maneuvering to determine the future of the province, reflecting the real-world debates of the 1970s when Quebec sovereignty movements were at their peak. A niche political simulation with limited commercial documentation available.

