description: |
  Backgammon is one of the oldest board games still widely played, with roots tracing back approximately 5,000 years to ancient Mesopotamia. Two players race their 15 checkers around a board divided into 24 narrow triangles (points), moving according to dice rolls while blocking, hitting, and bearing off pieces. The interplay between probability management and positional strategy creates extraordinary depth: skilled players can calculate optimal moves using pip counts and probability tables. The doubling cube adds a gambling dimension that intensifies decision-making. The modern rules and name were established in 17th-century England.

