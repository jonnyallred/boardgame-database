description: |
  Stock Ticker is a 1937 Copp Clark stock market simulation game for 2-6 players. Players invest $5,000 in six commodity-based stocks (gold, silver, bonds, oil, industrials, grain), buying shares in blocks. Each turn three dice are rolled: one identifies which stock is affected, one determines direction (up, down, or dividend), and one sets the amount of change (5, 10, or 20). The player with the most wealth when the agreed time limit expires — having sold all stocks back to the Broker at final market value — wins. The enduring simplicity of the design has kept it in print through multiple publishers for nearly a century.

