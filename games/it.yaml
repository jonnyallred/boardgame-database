description: |
  IT: Evil Below is a 2019 USAopoly cooperative push-your-luck game based on the Stephen King IT property, in which players work together as members of the Losers' Club to defeat Pennywise the Dancing Clown. Players roll multiple dice and move around a board depicting Derry locations — the Barrens, the Neibolt House, the Standpipe — gathering items needed to confront Pennywise. The clown lurks as a constant AI threat and if any one member of the Losers' Club dies, everyone loses. A light, accessible horror cooperative licensed game designed to evoke the atmosphere of the films.

