description: |
  Aton is a two-player abstract area control game designed by Thorsten Gimmler and
  published by UberPlay and Queen Games, set in ancient Egypt where each player serves
  as high priest of rival deities — Aton and Amon. Players simultaneously manage hands
  of cards to place priests and control temples across the board, with scoring triggered
  by special scoring cards. The combination of hand management, simultaneous play, and
  spatial control creates a tense and intellectually demanding duel game. With 72 cards,
  a game board, and 58 priest counters, it delivers substantial strategic depth in a
  lean, accessible package.

