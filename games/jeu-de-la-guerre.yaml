description: |
  Le Jeu de la guerre (A Game of War) is a strategic abstract war game designed by Situationist philosopher Guy Debord and his wife Alice Becker-Ho in 1977, inspired by Clausewitz's military theory and Napoleonic campaigns. Played on a 500-square grid (20x25), two players command armies of cavalry, infantry, and cannon, maintaining communication supply lines to keep their forces operative — victory comes from severing the opponent's supply network rather than capturing pieces. First produced in a limited 1977 edition and republished in 1987, the game is as much a philosophical treatise on conflict and strategy as it is a playable wargame.

