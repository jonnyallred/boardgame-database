description: |
  Lucky 13 is a simple press-your-luck dice game in which players roll dice attempting to reach exactly 13 points (or some target number) without going over, choosing when to stop and bank their score versus risking another roll. The number 13 plays on superstition for thematic flavor, and the tension between greed and caution is the game's entire appeal. Several versions and publishers have released games with this title and similar mechanics, making its exact origin difficult to pin down. As a pure press-your-luck filler with minimal components and rules, it works as a quick warm-up or break game.

