description: |
  Laborigines is a board game for 2-6 players designed by Jakub and Tomas Uhlir featuring dice-driven gameplay with memory elements. The game incorporates a disease system, Moa and bacteria dice distribution, and an energy cube resource system, creating layered decisions within a relatively accessible framework. Limited documentation exists beyond the game's Czech and European origin, its player count and age range, and its distinctive combination of dice mechanics with memory and resource management elements.

