description: |
  Downforce is a card-driven racing and betting game for 2-6 players based on Wolfgang
  Kramer's classic Top Race design. Players first bid in an auction to own one of six
  racing cars, then play cards from their hand that move multiple cars around the track.
  A clever betting system allows players to wager on the race's outcome, giving everyone
  a stake in every car's performance. Variable player powers, beautiful components, and
  the tension between moving your car and inadvertently helping opponents make Downforce
  an accessible yet strategically rich racing experience.

