description: |
  Doomtown (originally Deadlands: Doomtown) is an expandable collectible card game set in the Weird West of Pinnacle Entertainment's Deadlands roleplaying game universe. Players construct decks representing factions competing for control of the cursed boomtown of Gomorra, using card abilities representing shootouts, hexes, and political machinations. Originally published by Wizards of the Coast in 1998, the license transferred to Alderac Entertainment Group in 2000. The game won the 1998 Origins Awards for Best Trading Card Game and Best Graphic Presentation, and was relaunched as Doomtown: Reloaded in 2014 by AEG before Pine Box Entertainment assumed stewardship in 2017.

