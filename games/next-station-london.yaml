description: |
  Next Station: London is a flip-and-write route-building game by Matthew Dunstan, published by Blue Orange Games in 2022. Players redesign London's Underground network across four colored lines, flipping cards to determine which station symbol they must connect to next on their personal map. Tracks cannot cross except through stations, creating satisfying spatial puzzles as players try to serve the most boroughs, connect tourist sites, and share stations across multiple lines. With a 25-minute play time, colorful pencil-drawing gameplay, and intuitive rules, it became a hit family game praised for its balance of accessibility and replayability.

