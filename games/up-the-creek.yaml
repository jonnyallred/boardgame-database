description: |
  Up the Creek (originally published as Ogallala) is a card game in which players try to assemble complete canoes from card parts. Players compete to finish the most valuable canoes using various card types representing canoe sections, prey, booty, and special actions. The game includes aggressive mechanics that allow players to use special characters — hunters with bows and lassos — to interfere with opponents' canoes, and completed canoes can themselves be used to attack other players. Scoring rewards longer canoes and combination bonuses, creating a lively and competitive card game atmosphere.

