description: |
  Bananagrams is a fast-paced real-time word tile game invented by Abraham and Rena Nathanson and first presented at the 2006 London Toy Fair. Players race simultaneously to arrange their 21 letter tiles into a connected crossword grid, with no turns or waiting. When a player uses all their tiles, they shout "Peel!" and everyone takes another tile from the bunch. The player who finishes with no tiles remaining when the bunch runs out wins. Its compact banana-pouch packaging and zero-downtime gameplay have made it a worldwide bestseller and a beloved party staple.

