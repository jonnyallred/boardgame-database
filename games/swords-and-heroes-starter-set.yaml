description: |
  Swords and Heroes: Starter Set is a tactical board game in which players choose
  a civilization, build their army, and lead it to victory on the battlefield.
  The game was funded through Indiegogo crowdfunding and published by ZAMA Game
  Design, allowing players to field historical and fantasy armies against one another.
  The starter set provides an entry point into the Swords and Heroes system with
  core rules and components for learning the game's tactical mechanics. Detailed
  publisher information and wide distribution remain limited given its crowdfunded
  origins.

