description: |
  The Awful Green Things From Outer Space is an asymmetric two-player wargame originally published
  as an insert in Dragon magazine in 1979 and later produced as a boxed game by TSR and then Steve
  Jackson Games. One player controls the crew of the spaceship Znutar attempting to kill or escape
  the alien infestation, while the other controls the rapidly multiplying Awful Green Things. What
  makes the game notable is that weapon effectiveness is discovered during play — players don't know
  whether a given weapon will kill, stun, or accidentally help the creatures until they try it.
  This uncertainty creates a darkly humorous, unpredictable experience that has made it a cult
  classic of science fiction gaming.

