description: |
  Talon is a tactical space fleet combat game designed by Jim Krohn and published by GMT Games in 2015, pitting the Terran Confederation against the invading Talonthincanthanadu (Talon) Empire. Players command squadrons of starships across hex maps, managing power allocation to weapons, shields, and engines while maneuvering for firing arcs and optimal engagement ranges. The game features a streamlined damage system using Target Intelligence Cards that track individual ship status without complex bookkeeping. With its accessible rules and multiple scenario sizes, Talon delivers satisfying fleet combat that scales from quick skirmishes to epic battles.

