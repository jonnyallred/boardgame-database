description: |
  Karuba is a simultaneous tile-laying puzzle race game in which all players race to connect their four explorers to their matching temples across a private jungle grid. One player draws numbered tiles and all players place the same tile on their own board, deciding whether to lay the tile (extending pathways) or discard it (moving an explorer along an existing path). Each player thus builds a unique jungle from the same tile sequence, with faster routes yielding more treasure but fewer points per temple. Nominated for the 2016 Spiel des Jahres, Karuba is a smart, accessible family game that feels like a puzzle race where everyone is competing on their own board simultaneously.

