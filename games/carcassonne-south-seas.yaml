description: |
  Carcassonne: South Seas is the first entry in the Carcassonne: Around the World series, reimagining the classic tile-laying game in a tropical Pacific island setting. Instead of cities, roads, and farms, players now place tiles depicting islands, bridges, and sea regions, where meeples gather bananas, shellfish, and fish respectively. A key new element is a shipping delivery system — players score points not from completing features alone but by delivering their harvested goods to visiting merchant ships, matching wares to the ship tokens revealed each round. This added economy layer makes South Seas a distinctly different experience from base Carcassonne while remaining accessible and quick to play.

