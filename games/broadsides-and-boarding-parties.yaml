description: |
  Broadsides and Boarding Parties is a two-player naval combat game published by Milton Bradley in 1984 as the third entry in the Gamemaster Series, designed by Larry Harris. Players command a Spanish galleon and a pirate ship, first maneuvering with hidden movement cards to position for cannon broadsides, then fighting hand-to-hand if the ships collide in a boarding action. The game features chunky plastic ships and cannon pieces and offers accessible tactical gameplay with a swashbuckling pirate theme.

