description: |
  Luzhanqi (陸戰棋, "Army Chess") is a Chinese two-player strategy board game originating in the early 20th century, in which each player commands a hidden army of ranked military pieces — from Field Marshals and Generals down to Engineers and Landmines — on a divided board representing two armies' territories. Pieces move openly but their identities are concealed from the opponent until combat occurs; the higher-ranked piece wins, except that Landmines destroy everything (and can only be defused by Engineers), and the Bomb destroys any piece it strikes. The hidden-identity mechanic combined with territorial objectives creates a distinctive blend of deduction and strategy. Widely popular across China and Chinese communities worldwide, it is available in numerous inexpensive sets.

