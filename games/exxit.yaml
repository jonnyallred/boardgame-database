description: |
  Exxit is a 2006 abstract strategy game designed by Vincent Everaert and published by Jactalea, featuring area majority mechanics on a modular hexagonal grid. Players place and move pieces on a shared board, competing for control of zones through tile placement and tactical positioning, with the grid itself shifting and evolving as tiles are added. The game features mechanics including area majority/influence, grid movement, hex grid, and modular board design that create a constantly changing tactical puzzle. A later edition was produced by nestorgames, bringing the game to wider audiences.

