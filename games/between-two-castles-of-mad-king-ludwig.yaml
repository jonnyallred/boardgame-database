description: |
  Between Two Castles of Mad King Ludwig is a competitive tile-drafting game for 1-7 players that combines the simultaneous drafting of Between Two Cities with the ornate castle-building theme of Castles of Mad King Ludwig. Each player works cooperatively with the player on their left and right, simultaneously building two castles, but can only win with the lower-scoring of their two castles — creating a tense balance between helping both neighbors. With over 140 unique room tiles of different types and sizes, players must craft interconnected castles that satisfy the mad king's whims for point-scoring combinations. The game's clever scoring system rewards players who find the sweet spot between helping both their partners while not overinvesting in any single castle.

