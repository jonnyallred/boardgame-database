description: |
  Ayoayo (also known as Ayo or Oware) is a traditional mancala game widely played among the Yoruba people of Nigeria and throughout West Africa. Played on a board with two rows of six pits and 48 seeds, players take turns sowing seeds around the board, capturing opponent seeds when a sow ends in a pit with two or three seeds on the opponent's side. The game demands multi-step look-ahead thinking and an understanding of cyclical sowing patterns. Oware, its most internationally recognized variant, is played competitively worldwide and is governed by international rules.

