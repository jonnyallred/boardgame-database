description: |
  Lancaster is a 2011 worker placement and area control game by Matthias Cramer and Queen Games set in 1413 England, where 2-5 players lead aristocratic families vying to become King Henry V's most powerful ally. Players deploy knights across English counties to gather resources, upgrade their castles, and battle the French — with the unique twist that knights in overlapping zones can displace each other through strength, adding a combative edge to the classic placement formula. The game was nominated for the 2011 Kennerspiel des Jahres and rewards players who master the timing of deployment and the political landscape of the English nobility.

