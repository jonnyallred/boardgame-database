description: |
  Louis XIV is a strategic influence game set in the court of the Sun King, where 2-4 players compete to complete missions by placing influence tokens on high-ranking courtiers at Versailles. Each round, players simultaneously assign their limited influence tokens to various attendants, with the majority holder gaining the attendant's special ability and mission rewards. The game requires careful balance between gathering resources, completing missions, and blocking opponents from achieving their goals. Winner of the 2005 Deutscher Spiele Preis, it offers a distinctive tactical puzzle within the thematic backdrop of 17th-century French court intrigue.

