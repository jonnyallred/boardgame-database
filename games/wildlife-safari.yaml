description: |
  Wildlife Safari (originally published as Flinke Pinke in 1994, later as Botswana) is a card and chip collecting game by Reiner Knizia for 2-5 players. The game features five animal species, each with a set of six cards numbered zero through five; players take turns playing a card and collecting a chip of the corresponding animal, but the catch is that the last card played in each color determines that color's final scoring value. Players must balance grabbing chips early against the risk of driving up or down the value through card play. The compact rules and quick play time make it an ideal filler.

