description: |
  Neuroshima Hex! is a fast-paced tactical tile-placement game set in a post-apocalyptic world, designed by Michal Oracz and published by Portal Games. Each of the four asymmetric factions — Borgo, Hegemony, Moloch, and Outpost — is represented by a unique deck of 34 hex tiles. Players place army tiles on a shared hexagonal board, positioning soldiers, support units, and special actions to surround and destroy the enemy HQ, which starts with 20 hit points. The game rewards careful spatial reasoning and faction mastery, and its tight play time and fierce head-to-head battles made it the first Polish board game to achieve major international acclaim.

