description: |
  Dragonhunt is a 1982 fantasy board game published by Avalon Hill for 2-6 players, designed by Willis Carpenter, Garrett Donner, and Michael Steer. Set in the land of Arawan, periodically devastated by the dragon Brimstone, each player portrays one of Arawan's valiant hero-kings racing to claim the Kingdom's magical Magesword and use it to slay Brimstone. The game blends exploration and competition as players maneuver across the board, gathering items and power, before confronting the dragon in a decisive showdown. The player who successfully defeats Brimstone with the Magesword wins.

