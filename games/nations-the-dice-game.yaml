description: |
  Nations: The Dice Game is a 1-4 player dice-rolling civilization game by Rustan Hakansson, published by Lautapelit.fi in 2014 as a lighter companion to the full Nations board game. Each player strives to build the mightiest civilization, working with a personal game board that tracks military, civilian buildings, advisors, colonies, and wonders — all the familiar elements of the parent game. Players roll dice and assign them to various slots, gaining resources and advancing their civilization, with push-your-luck re-rolls allowing risk-taking for better outcomes. Random event cards introduce historical surprises each round, keeping players on their toes. At 20-40 minutes, it distills the Nations experience into a fast-playing and accessible format.

