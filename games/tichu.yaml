description: |
  Tichu is a beloved partnership card game designed by Urs Hostettler and published in the West by Fata Morgana Spiele and Rio Grande Games. Originally inspired by Chinese shedding card games like Zheng Fen and incorporating elements of Bridge and Poker, Tichu is played by two teams of two. Players bid "Tichu" or "Grand Tichu" to announce they will go out first, with high-risk high-reward scoring at stake. The multi-function special cards (Dragon, Phoenix, Dog, and Mahjong), flexible hand combinations, and deep partnership communication strategies make Tichu one of the most strategically rich and enduringly popular card games in the hobby.

