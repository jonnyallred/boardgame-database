description: |
  The Landlord's Game is the 1903 board game designed by Elizabeth Magie as a practical demonstration
  of Georgist economic principles, intended to show how landlords enrich themselves while tenants are
  impoverished. Players move around a circuit board buying and renting properties, paying taxes, and
  dealing with a real estate market. Magie designed two rule sets: an anti-monopolist set where wealth
  creation benefits everyone, and a monopolist set where domination is the goal. The game is the direct
  predecessor of Monopoly, which was derived from folk variants of Magie's design; it stands as one
  of the most historically significant board games ever created and a rare early example of a game
  designed to critique economic systems.

