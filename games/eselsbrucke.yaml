description: |
  Eselsbrücke (German for "mnemonic" or literally "donkey's bridge") is a 2011 party game designed by Stefan Dorra and Ralf zur Linde, published by Schmidt Spiele, and nominated for the 2012 Spiel des Jahres. Players draw random symbol and object cards and must construct memorable stories or mnemonics linking those symbols in a specific order so that other players can recall the sequence afterward. The sillier and more creative the story, the better the other players remember it. A second edition simplified the rules for shorter play. The game rewards storytelling creativity and lateral thinking in a light, social format that works well for large groups.

