description: |
  The Conquest of Oil is a 1973 economic board game in which players compete to discover, extract, and
  sell petroleum resources in a market simulation. Players manage exploration, drilling, and sale of oil
  across a competitive map, balancing investment risk against the uncertainty of resource discovery.
  The game reflects the early 1970s energy crisis era and was an early example of resource-extraction
  economic gameplay. Specific publisher and designer details are not well-documented in available sources.

