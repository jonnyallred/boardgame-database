description: |
  Skara Brae is a resource management and worker placement game by Shem Phillips set in the ancient Scottish island settlement. Players draft Village Cards and assign workers to Furnish, Cook, Craft, Clean, and Trade — but must carefully manage resources to avoid generating "Midden," a negative resource that takes up inventory space without providing benefits. The distinctive design philosophy of wanting to keep resources as low as possible — minimizing waste as a strategic goal rather than maximizing surplus — gives Skara Brae a unique feel among euro games. Distributed by Renegade Game Studios.
