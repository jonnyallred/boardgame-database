description: |
  The Dungeon of D is a dungeon crawl card game by Jack Darwid designed in 2008. Players explore
  a modular dungeon built from cards, encountering monsters and collecting treasure in a competitive
  race to accumulate the most loot. Simple dice rolling determines combat outcomes, and hand
  management adds tactical choices about when to use special cards. The game distills classic
  dungeon delving into a compact card game format accessible to casual players while retaining the
  essential feel of risk-versus-reward dungeon exploration.

