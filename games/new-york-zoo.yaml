description: |
  New York Zoo is a competitive polyomino tile-placement game by Uwe Rosenberg for 1-5 players. On each turn players may either place a new enclosure tile — fitting the polyomino shape into their zoo grid — or acquire animals to populate those enclosures. When an enclosure fills up completely with animals, it scores points and opens up space for expansion. The race mechanic drives tension: the first player to finish their zoo triggers the end of the game, blending Rosenberg's beloved animal-breeding and puzzle mechanics into a fast, accessible package.
