description: |
  Délir'phone is a 2002 French party game published by Dujardin that uses a plastic toy phone as its central prop. Each turn, the active player draws a "situation" card describing an absurd telephone scenario (surgeon, disgruntled boss, etc.) and reads it aloud. Then they draw a "secret words" card and roll special dice to determine which three words they must secretly weave into their improvised phone call. Opponents score a point for each secret word they correctly identify; the active player scores for each word that goes undetected. The first player to reach 25 points wins. The 80-second phone call structure creates frantic and often hilarious improvised conversations.

