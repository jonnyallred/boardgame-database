description: |
  Capitol is an area-control game designed by Manfred Ludwig and Stefan Dorra, published by Queen Games. Players compete to build the most prestigious city quarter in ancient Rome, placing building tiles to claim and score residential, commercial, and civic districts. Clever placement and timing determine who controls each neighborhood when scoring occurs, creating tight tactical decisions in a compact urban-planning framework.

