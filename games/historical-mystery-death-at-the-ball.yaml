description: |
  Historical Mystery: Death at the Ball is a deduction game in which a French nobleman has been poisoned during a lavish ball, and players must uncover the killer. Published by Hobby World International in 2023, players visit wealthy households and interrogate aristocrats and commoners over 24 moves before being quizzed on the details of the case. Each game in the Historical Mystery series is based on real historical events and presents a single self-contained investigation.

