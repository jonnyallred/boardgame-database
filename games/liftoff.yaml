description: |
  Liftoff! is a card drafting and set collection game from Queen Games in which players compete to build the best rocket ship by drafting component cards across multiple rounds. Each player assembles a rocket from nose cone, fuel tank, body, and engine sections — scoring points based on how well the parts match in color and how complete the rocket is. The simultaneous drafting creates light tension as players compete for the same limited components, while the colorful space theme and accessible rules make it suitable for families. A quick filler game that delivers a satisfying drafting puzzle in under 30 minutes.

