description: |
  Black Death is a 1993 board game published by Blacksburg Tactical Research Center for
  2 to 6 players in which each player takes the role of a historical or custom-designed
  disease sweeping across medieval Europe in 1347. Each disease has a Virulence and
  Mortality rating that together sum to 6, creating asymmetric starting conditions.
  Players spread across a map of Europe attempting to infect as many population centers
  as possible, assisted or hindered by random event cards. The first player to reach
  an agreed victim total wins this grim, tongue-in-cheek race game.

