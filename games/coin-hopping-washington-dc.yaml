description: |
  Coin Hopping—Washington D.C. is an educational strategy game in which each player assumes the role of an interest group touring Washington, D.C. to gain influence over the three branches of government. Players move their pawns by "coin hopping" — moving to any adjacent space that has a coin on it, and can pick up coins to carry them along, creating stacks. The goal is to assemble a stack containing one penny, nickel, dime, and quarter; each player also places citizens into the White House, Capitol, or Supreme Court when landing on the appropriate landmarks. The game won the iParenting Media Award and Dr. Toy's 100 Best Children's Products for 2008.

