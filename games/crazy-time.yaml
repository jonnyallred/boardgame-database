description: |
  Crazy Time is a fast-paced party card game blending deduction, concentration, speed, and laughter. Players reveal cards from their personal decks while counting the passing hours aloud, racing to shed all their cards before opponents. The real-time count element combined with the need to pay attention to the cards being played creates a chaotic, funny atmosphere that generates natural hilarity around the table. Quick to play and easy to teach, it is a good warm-up or filler game for groups who enjoy reactive, high-energy play.

