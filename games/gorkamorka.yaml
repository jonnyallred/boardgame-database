description: |
  Gorkamorka is a tabletop skirmish wargame set in the Warhammer 40,000 universe, released by Games Workshop in 1997. Set on the desert world of Angelis, players assemble small mobs of Orks—6 to 15 fighters—equipped with customizable vehicles such as trukks and bikes, battling rival gangs for scrap and dominance in the settlement of Mektown. A rich campaign system tracks experience, injuries, upgrades, and earnings, making each mob feel unique over a season of play. The game became a cult classic for its combination of vehicular mayhem, narrative progression, and vivid Ork setting.

