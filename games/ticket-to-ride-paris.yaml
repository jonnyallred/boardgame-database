description: |
  Ticket to Ride: Paris is a fast-playing entry in the Cities line that whisks players to 1920s Paris to visit iconic landmarks and complete Destination Tickets. The game adds a French flag bonus mechanic: when claiming a blue, white, or red route, players keep a transportation card of that color; collecting one of each color to form a French flag scores bonus points. At just 15 minutes of play, this compact game offers a fresh twist on the classic Ticket to Ride formula at an accessible price point.

