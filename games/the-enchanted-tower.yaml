description: |
  The Enchanted Tower (Der verzauberte Turm) is a cooperative children's game by Inka and Markus
  Brand, published by Drei Magier Spiele in 2012 and winner of the 2013 Kinderspiel des Jahres.
  Players work together to find a magic key and rescue the princess locked in the tower before
  the evil wizard catches them. The game uses a unique hidden memory mechanic — the tower hides
  the key somewhere beneath it and players must remember where they've searched before. A spinner
  governs movement and an elfin helper can speed the children along. The cooperative design and
  age-appropriate challenge made it an instant family classic.

