description: |
  Rallyman: GT is a 1-6 player road racing game by Jean-Christophe Bouvier in which players push their luck with a unique dice-selection mechanic across modular GT racing circuits. Before moving, players choose which gear dice to commit and roll them simultaneously — each die can only be rolled once per turn, so committing to a high gear is exciting but risky. Lapping a circuit cleanly requires balancing ambition against the danger of skidding. The modular board creates varied tracks while the press-your-luck dice selection keeps every turn in the game tense and thematic.
