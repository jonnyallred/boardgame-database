description: |
  Power Grid: Factory Manager is a standalone game in Friedemann Friese's Power Grid universe in which 2–5 players compete to run the most efficient and profitable factory over five rounds. Each player manages workers, bids on machines and robots in a competitive auction, and must carefully balance production output against ever-rising energy costs. Factories start with identical layouts, but players differentiate through acquired machines that improve production, storage, or efficiency. The game ends after five rounds and the player with the most money wins, rewarding careful planning and opportunistic bidding in a tightly designed economic puzzle that stands fully independent of the original Power Grid.

