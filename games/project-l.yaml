description: |
  Project L is a fast, satisfying engine-building puzzle game in which players compete to complete puzzle cards by placing tetromino-style acrylic pieces onto recessed boards. Each turn players take three actions — placing a piece, mastering a puzzle to claim it, or recruiting a new piece — gradually building an engine that lets them tackle larger and more rewarding puzzles. Completed puzzles award points and new pieces, fueling further engine growth. Its elegant simultaneous play elements and tactile acrylic components make it a visually striking and accessible game that scales well from new players to experienced hobbyists.

