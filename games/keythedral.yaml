description: |
  Keythedral is a Euro strategy game from Richard Breese's Key series in which players build a medieval village and compete to contribute stained glass windows to a great cathedral. Workers collect resources from fields adjacent to their cottages, with an adjacency placement restriction creating spatial tension, and players compete to fulfill building contracts and cathedral window sets. Incorporating tile laying, worker placement, resource management, and bidding mechanics, Keythedral reached the top 100 on release and remains a fondly regarded gateway to heavier Euro games.

