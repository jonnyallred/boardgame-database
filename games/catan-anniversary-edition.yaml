description: |
  Catan Anniversary Edition is a premium collector's edition of Settlers of Catan published to celebrate a milestone anniversary of the game's original 1995 release. The edition features upgraded components — high-quality tiles, metal tokens, and premium packaging — while preserving the classic rules entirely. It serves as a gift-worthy prestige version of the game for long-time fans and collectors seeking a definitive edition of one of the best-selling board games of all time.

