description: |
  Ascending Empires is a 4X space exploration game with a distinctive dexterity mechanic
  for starship movement — players physically flick their ships across the modular tile
  board to move and engage in combat. Designed by Ian Cooper and published by Z-Man Games
  in 2011, players colonize planets, build cities and research facilities, develop new
  technologies, and construct fleets. The combination of strategic empire-building with
  the kinetic, skill-based movement system creates a unique experience that blends classic
  4X depth with a tactile, playful element not found in other civilization games.

