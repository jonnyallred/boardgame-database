description: |
  Who Can Beat Nixon? is a political board game published during the 1972 presidential campaign in which up to six challengers compete to become the last candidate standing to face the incumbent president Richard Nixon in the general election. Players spend money and media points to accumulate electoral votes from state electoral colleges, needing 270 to win. Nixon has certain built-in advantages as the incumbent, while challengers must first eliminate each other before facing him in a final showdown. The game is a colorful artifact of early 1970s American political satire.

