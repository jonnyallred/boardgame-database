description: |
  Wir füttern die kleinen Nilpferde ("We Feed the Little Hippos") is a children's and family game by Reinhold Wittig published in 1983 by Fagus and Edition Perlhuhn. Players roll dice on each turn and freely distribute the rolled pips between their two game pieces to move toward hippo feeding stations around the swamp; landing at a feeding place allows placement of a food stick. Each hippo can hold up to five food sticks before going to sleep, and the first player to distribute all their food sticks wins. The game won a Special Prize for Beautiful Game from the 1983 Spiel des Jahres jury.

