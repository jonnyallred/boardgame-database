description: |
  Earth Reborn is a tactical miniatures board game designed by Christophe Boelinger and published by Z-Man Games in 2010. Set 500 years after a global cataclysm, two factions — NORAD (undead) and Salemites (living humans) — compete across nine escalating scenarios of rescue, retrieval, and escort missions through ruined labs, mansions, and towns. The game features a unique tutorial-style campaign where each scenario introduces new rules, and a customizable Order Programming System that allows unprecedented tactical depth. Earth Reborn is praised for its innovative mechanics and high production quality, though its complexity and lengthy playtime make it a dedicated gamer's title.

