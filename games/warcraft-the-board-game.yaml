description: |
  Warcraft: The Board Game is a 2003 Fantasy Flight Games adaptation of Blizzard's real-time strategy video game series, designed by Kevin Wilson. Players command armies of Night Elves, Humans, Orcs, or Undead across a modular board, harvesting gold and lumber to upgrade units and control strategic points worth victory points. The Command/Movement system aims to capture the feel of the real-time action from the video games within a turn-based format, with units gaining special abilities as they reach higher upgrade levels. An expansion released in 2004 added further mechanics familiar to Warcraft III players.

