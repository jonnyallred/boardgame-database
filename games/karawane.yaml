description: |
  Karawane is a 1990 Ravensburger family race game in which players navigate camel caravans across a desert landscape. Players move their camels in a racing format, competing to be first to reach their destination. A light and accessible family game designed for younger players, Karawane uses simple mechanics and engaging desert-camel theming to create an enjoyable racing experience suitable for mixed-age groups.

