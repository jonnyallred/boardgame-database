description: |
  Zombicide is a fully cooperative miniature board game for one to six players in which survivors
  battle through scenario-based missions against ever-growing zombie hordes. Each survivor has
  unique abilities and three action points per turn for moving, searching, and fighting, while
  zombie movement and attacks are programmed entirely by the game's rules — predictable but
  relentless. As survivors eliminate zombies they gain experience and grow more powerful, but this
  also escalates the zombie threat, creating the series' defining tension of growing stronger while
  the danger intensifies.

