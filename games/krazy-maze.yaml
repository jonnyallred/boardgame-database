description: |
  Krazy Maze is a 1943 Australian board game manufactured by Allen & Howell under licence from G. N. Raymond, in which two players race counters along separate winding paths through a densely illustrated picturesque landscape. Players spin a "spino" (a spinning top numbered 1 to 8) to determine movement, and landing on lettered squares triggers special instructions listed inside the game's lid. The game represents a charming snapshot of mid-20th-century Australian tabletop entertainment, with its illustrated landscape and spinner mechanism typical of the era's family games.

