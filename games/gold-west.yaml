description: |
  Gold West is a resource-management and area-control game set in the American frontier,
  featuring a unique mancala-based action selection system. Players move resources along
  supply tracks using the mancala mechanism to collect different mining commodities, then
  spend those resources to build mining camps and outposts across the frontier map. Claiming
  territories connects networks for points while competing with opponents for rich veins and
  trade posts. The mancala mechanic creates a satisfying puzzle that distinguishes Gold West
  from other area-control games.

