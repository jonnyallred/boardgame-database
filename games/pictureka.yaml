description: |
  Pictureka! is a frantic visual-search party game by Hasbro in which players compete to spot hidden images across nine illustrated game tiles arranged in a 3x3 grid. Mission cards drive the action in three different ways: blue cards have all players race to spot a single specific object; red cards involve players bidding on how many of a specified object they can find; and green cards challenge a single player to find as many items as possible against a sand timer. The first to collect six mission cards wins. The modular tiles can be rearranged for variety, keeping the visual field fresh across multiple plays.

