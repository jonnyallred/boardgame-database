description: |
  Grav-Ball is a science fiction sports simulation game designed by Fred Bentley and L. Ross Babcock III and published by FASA in 1982. Set in an anti-gravity arena of the future, armored players compete to move a steel ball into the opposing goal while battering each other with regulated violence. The game uses an action point allowance system and dice rolling to resolve movement and combat, creating a tactical sports simulation in a futuristic setting. Its combination of combat and sports mechanics within a sci-fi framework anticipates later genre-blending sports wargames.

