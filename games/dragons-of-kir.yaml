description: |
  Dragons of Kir is a 2005 abstract tile-placement strategy game in which two players strategically place nature and civilization tiles to deflect four constantly moving dragons — one for each player — into the opponent's war tent while defending their own. The opposite edges of the board connect, creating a toroidal playing field where tile plays have rippling consequences across the entire landscape. The game is a themed version of Darter, which won the 2006 Origins Vanguard Innovative Game Award, and a wood expansion adds rules for up to four players.

