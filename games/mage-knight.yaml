description: |
  Mage Knight is the original collectible miniatures game from WizKids, created by Jordan Weisman in 2000. It pioneered the "Clix" system: each pre-painted figure features a built-in rotating dial that tracks damage and adjusts combat statistics without consulting charts, blending collectible card game elements with miniature wargaming. Players assemble warbands from blind-purchase packs and compete in skirmish battles across fantasy settings. The game sold millions of sets and spawned numerous expansions, establishing the collectible miniatures genre.

