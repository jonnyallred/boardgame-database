description: |
  Medici is a classic German auction game by Reiner Knizia, first published by Amigo in 1995. Players are Renaissance merchants competing to acquire the most valuable cargo from a shared deck of commodity cards, with each round featuring a Dutch-style bidding process for lots of one to three cards. Victory points come from the value of goods loaded onto your ship and from having a majority in each commodity type at game end. The tension between paying too much for a great lot and letting opponents grab it cheaply is the game's elegant core, and its short play time and simple rules made it a Spiel des Jahres recommended game.

