description: |
  Flibbix is a customizable family board game by Merillian Games that lets players build their own game board using 45 magnetic tiles before each play session. Players select from dozens of rule combinations using a "Make Your Own Rules" sheet, then race across the assembled board by rolling a die and playing cards that allow special moves such as swapping places with opponents, flipping tiles to change their effects, or swapping the start and finish positions entirely. This modular design gives each session a different feel, and the ability to alter the board mid-game adds a chaotic, playful unpredictability that appeals to younger family audiences.

