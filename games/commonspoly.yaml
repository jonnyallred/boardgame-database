description: |
  Commonspoly is an anti-Monopoly cooperative board game born from a hackathon at the 2015 ZEMOS98 Festival. Where Monopoly rewards accumulation and competition, Commonspoly challenges players to work together against a Speculator faction that seeks to privatize all public goods — environmental, urban, health, and knowledge resources. Players use Welfare and Legitimacy Points over 20 rounds to liberate goods and convert them to public or commons status. The free-licensed game (openly downloadable and printable) is explicitly designed as a political education tool, exploring commons-based economic models as a sustainable alternative to privatization. It has been used in academic, activist, and community settings across Europe.

