description: |
  Catan Junior Madagascar is a licensed themed edition of Catan Junior published in 2012 in partnership with DreamWorks' Madagascar 3. The core mechanics of the standard Catan Junior game — collecting resources, building circus tents and wagons along the Madagascar island board, and trading with the Penguins — are preserved, while the pirate theme is replaced with beloved characters from the animated film including Alex, Gloria, Marty, and Melman. It serves as an accessible introduction to the Settlers of Catan family of games for young children.

