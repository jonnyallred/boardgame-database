description: |
  A Cold War-era simulation published by SPI in 1976 depicting the economic, military, and political struggle for control of a post-nuclear United States. Players represent factions competing for dominance over the shattered remnants of American civilization, managing resources, military forces, and political influence across a devastated landscape. A hypothetical and sobering wargame that reflects Cold War anxieties, it tasks players with reconstructing and reunifying America from the ashes of nuclear war.

