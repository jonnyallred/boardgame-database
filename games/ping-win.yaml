description: |
  Ping Win is a simple children's game played on an iceberg-shaped board in which players take turns rolling a die and moving their penguin figures 1, 2, or 3 spaces left or right, pushing other penguins toward the edge. Any penguin pushed off the iceberg into the water is eliminated. The last player to still have penguins standing on the iceberg wins. The straightforward push-and-shove elimination mechanic, combined with cute penguin components and a small ice floe board, makes it an accessible and entertaining dexterity-adjacent game for young children.

