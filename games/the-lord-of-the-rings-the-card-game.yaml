description: |
  The Lord of the Rings: The Card Game is a 2011 Living Card Game (LCG) published by Fantasy Flight Games in which 1-4 players cooperatively battle through adventure scenarios set in Middle-earth. Players construct decks from three spheres of influence—Leadership, Spirit, Tactics, and Lore—and combine hero cards with ally, event, and attachment cards to overcome encounter decks filled with enemies, treacheries, and locations. The game features an expandable card pool with dozens of scenario packs, deluxe expansions, and saga expansions adapting the novels. It is celebrated as one of the finest solo and cooperative card games ever designed, with exceptional thematic depth and endless replayability.

