description: |
  Cranium bills itself as "The Game for Your Whole Brain," combining four categories of activities — creative clay sculpting, data head trivia, word play, and star performer acting — to appeal to players with different strengths. Teams race around a board, succeeding at challenges in each category to advance toward the Cranium Central space. Created by former Microsoft employees Whit Alexander and Richard Tait in 1998 and first sold through Amazon and Starbucks, it sold 44 million copies before being acquired by Hasbro in 2008. It remains a popular party game precisely because it mixes skill types so that every player has a chance to shine.

