description: |
  DinoGenics is a worker placement game for 1–4 players in which players compete to build the most profitable dinosaur park by cloning and housing prehistoric creatures across a player board of expanding enclosures. Players send workers to gather DNA, construct facilities, hire staff, and acquire dinosaurs—but events can trigger escapes and chaos if parks are poorly managed, creating thrilling moments of near-disaster. Designed and self-published by Richard Keene through a successful Kickstarter campaign, the game combines the satisfying park-building puzzle of tile placement with set collection scoring and a rich Jurassic theme.

