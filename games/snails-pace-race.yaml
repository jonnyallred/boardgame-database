description: |
  Snail's Pace Race, designed by Alex Randolph and published by Ravensburger in 1985, is a non-competitive
  children's racing game where six colorful wooden snails inch their way across the board. Players bet which
  two snails will finish first and last, then take turns rolling two colored dice to advance the matching snails.
  Because everyone cheers for all the snails rather than competing against each other, the game is perfectly
  suited for young children learning turn-taking, color recognition, and counting.

