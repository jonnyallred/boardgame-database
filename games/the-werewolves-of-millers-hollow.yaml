description: |
  The Werewolves of Miller's Hollow is a classic social deduction party game designed by Philippe des Pallières and Hervé Marly, originally published in France in 2001. Players are secretly assigned roles as either villagers or werewolves; each night the werewolves secretly eliminate a villager, and each day the village debates and votes to eliminate a suspected werewolf. The game hinges entirely on deduction, accusation, and persuasion as villagers try to identify and eliminate all werewolves before being wiped out. One of the earliest and most influential social deduction games, it established conventions that countless successors have built upon.

