description: |
  Beachhead is a squad-level Pacific theater wargame published by Yaquinto Publications
  in 1980, packaged in an LP-style folder, that simulates amphibious landings across
  the South Pacific from 1942 to 1944. Each hex represents 25 yards, each counter one
  squad or weapons team, and each turn 20 minutes of action. The Japanese player plans
  defenses and tries to contain the beachhead, while the American player must anticipate
  island defenses and break out. The game was designed by Michael Matheny with cover
  art by Rodger B. MacGowan.

