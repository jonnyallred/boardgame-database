description: |
  Bloodbath at the Sakarya is a DTP wargame simulating the pivotal August 1921 Battle
  of Sakarya during the Turkish War of Independence, when a Greek offensive toward Ankara
  was finally halted by Turkish nationalist forces defending the hills across the Sakarya
  River. Published by Firefight Games as a desktop-printed wargame with cut-and-mount
  counters, the game covers a critical turning point often overlooked in Western histories.
  Players command Greek or Turkish forces in this operational-level simulation of one of
  the decisive battles of the early 20th century.

