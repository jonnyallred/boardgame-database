description: |
  Plague! is a darkly humorous board game published by B&B Productions in which players transport wagonloads of plague-infected victims to their final resting place. The 22"x28" mounted mapboard, 136 circular counters, 55 Black Death Cards, and a "Rat Bag" create an absurdist take on medieval epidemic catastrophe. Players accumulate points by delivering the most victims while dealing with the random horrors dealt by the Black Death Cards. The game's gallows humor and irreverent treatment of the Black Death make it a novelty item in gaming history, appealing to fans of dark comedy.

