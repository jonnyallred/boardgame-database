description: |
  Rome: Imperium, Circus Maximus, Hannibal vs Rome is a three-in-one collection of ancient Roman games designed by Reiner Knizia and published by GMT Games in 2001. The set includes three distinct quick-playing games: Hannibal vs Rome, a two-player card game depicting the initial Punic War struggle for Mediterranean supremacy; Circus Maximus, in which up to five players use cards to race chariot teams around a track while cleverly blocking opponents; and Imperium, in which up to five players compete for pro-consulships across eight Roman provinces using influence and political maneuvering. All three games are designed for fast play and offer a compact but flavorful window into three very different aspects of ancient Roman civilization.

