description: |
  Dao is a minimalist two-player abstract strategy game designed by Jeff Pickering and Ben VanBuskirk, winning the Mensa Select award in 2001. Played on a 4x4 board with four pieces per player, the game offers three possible win conditions: arrange your pieces in a straight line (horizontal or vertical), occupy all four corners, or form a 2x2 square anywhere on the board. This elegant multiplicity of victory paths creates surprising depth and requires players to simultaneously pursue goals while blocking their opponent from achieving them. The simple rules and short play time make it accessible to all ages while concealing strategic richness.

