description: |
  The Golf Game: Par Excellence is a 1985 golf simulation board game published by Challenge sprl,
  available in multilingual editions covering English, Dutch, French, German, and Italian. Players
  simulate an 18-hole round of golf using nine large double-sided laminated maps representing golf
  holes, and 13 specialized "club" dice — one for each type of club — along with a directional die
  and a hazard die. Players select their club, declare shot shape (straight, draw, or fade), and
  roll to determine outcomes. The system captures the tactical decision-making of real golf club
  selection in an accessible tabletop format.

