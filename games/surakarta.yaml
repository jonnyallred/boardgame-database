description: |
  Surakarta is an ancient Indonesian two-player abstract strategy game named
  after the city of Surakarta in central Java. Played on a 6x6 grid with eight
  corner loops, each player begins with 12 pieces and can either move one step
  in any direction or make a capturing move by traversing a corner loop and
  landing on an enemy piece. Pieces gain power toward the center of the board
  where they connect to more loops. The game is regularly featured at the
  Computer Olympiad and is considered a classic alongside Go, Checkers, and
  Mancala. It was first commercially published in France in 1970.

