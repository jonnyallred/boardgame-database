description: |
  Spy Code: Safe Breaker is an electronic deduction game by Yulu published in 2017. Players take turns guessing
  a secret number between 1 and 18 while pressing an ear to a stethoscope; an electronic safe emits a high tone
  if the number is too low, a low tone if too high, and occasionally a null tone that provides no feedback at all.
  Landing on the correct number causes the safe to pop open, releasing 1 to 3 loot tokens of varying value. The
  first player to collect enough loot wins, blending number-deduction logic with a satisfying physical payoff.

