description: |
  Chapayev is a traditional dexterity board game popular throughout the former Soviet Union, named after the Russian Civil War hero Vasily Chapayev. A hybrid of checkers and carrom, players flick their checkers pieces with a finger across the board to knock the opponent's pieces off the edge, combining elements of billiards, table shuffleboard, and checker strategy. The game requires only a standard checkerboard and draughts pieces. After each round is won, the winner's pieces advance a row closer to the opponent, eventually forcing them off the board. Its simple rules and fast play made it a beloved informal game across the USSR.

