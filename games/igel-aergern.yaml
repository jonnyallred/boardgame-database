description: |
  Igel Ärgern (Hedgehogs in a Hurry) is a racing game designed by Doris Matthäus and Frank Nestel, published by Doris & Frank in 1990. Players race wooden hedgehog discs along six parallel tracks toward the finish, rolling a die to determine which row to move. The game's clever wrinkle is that any hedgehog can be moved in that row, not just your own, so players can advance rivals or create blocking stacks to frustrate opponents. Stacks of hedgehogs move together as a unit, adding a spatial puzzle element to what could otherwise be a simple race game.

