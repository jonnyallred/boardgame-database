description: |
  Lift Off is a 2-4 player space race card drafting game by Jeroen Vandersteen, published by Hans im Glück and Z-Man Games in 2018. Players compete to be the most successful space agency over eight rounds by circle-drafting specialist cards, using those cards to take actions, and launching rockets to score points and complete missions. Each turn requires tight cost-benefit analysis as players must balance acquiring the right specialists, taking actions with those specialists, and timing their rocket launches to maximize points. The game rewards players who can efficiently convert their drafted workforce into successful launches, making it a satisfying card management puzzle with a satisfying space exploration theme.

