description: |
  Overlord is a two-player hex-and-counter wargame published by Conflict Games in 1973, simulating the Normandy invasion and Allied breakout from D-Day through 28 August 1944. One player commands the Allied invaders and the other the German defenders across 28 turns, each representing several days of combat in Normandy. Designed by John Hill, one of the early pioneers of wargame design, the game was published by Hill's own company Conflict Games with a second edition following in 1977. It represents an early and influential example of operational-level wargaming of the Western Front campaign that spawned countless later designs on the same subject.

