description: |
  Container is a deeply economic game of production, shipping, and trade built around the global container shipping industry. Players run factories that produce colored containers, load them onto ships, transport them to a central island, and sell them at auction to rivals. The twist is that each player's factories produce only certain colors and can only sell to opponents — you cannot profit directly from your own production. This creates an elegant closed economy where every player's decisions ripple through the supply chain, and the final auction at the island determines who ultimately wins. The game is celebrated for its realistic market simulation and the emergent negotiation it generates.

