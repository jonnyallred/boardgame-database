description: |
  Score Four is a three-dimensional abstract strategy game first sold by Funtastic in 1968, in which two players take turns placing beads on a 4x4 upright grid of vertical rods, aiming to create a straight line of four beads of their color in any horizontal, vertical, or diagonal direction across three dimensions. It is the first commercially produced 3D four-in-a-row game and predates Connect Four by several years. The game rewards spatial reasoning and the ability to recognize and block three-dimensional threats simultaneously.

