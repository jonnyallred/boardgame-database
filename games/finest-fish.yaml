description: |
  The Finest Fish is a tile drafting and tile placement game for 2-4 players inspired by the competitive hobby of goldfish keeping. Players draft and place wooden scale tiles painted in six unique colors and patterns onto individual die-cut goldfish game boards, completing design objectives to score points and earn the Best in Show award. The beautiful wooden components and tactile scale-arranging puzzle make it a visually distinctive gateway game that balances accessibility with meaningful strategic decisions. It was a Barnes & Noble Game of the Month pick and received a Mensa recommendation.

