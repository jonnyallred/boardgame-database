description: |
  Judge Dredd is a 1982 Games Workshop board game set in the dystopian Mega-City One from the iconic British comic strip. Players take the roles of Judges racing to arrest the most criminals as perp and crime cards randomly spawn across the sprawling city map. Judges move and play action cards to win combat rolls against criminals, with each card usable in two different ways, adding decision-making to what is otherwise a light competitive race. Designed by Ian Livingstone with striking art by Brian Bolland, it is an accessible thematic game that captures the anarchic energy of the source material.

