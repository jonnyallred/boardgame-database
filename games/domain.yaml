description: |
  Domain is a tile-placement abstract strategy game first published across Europe in 1982 under various names—Boomerang (France), Chameleon (UK), Kiss (Italy)—before Parker Brothers released it in North America in 1983 under the name Domain. Players alternate placing multicolored polyomino tiles (labeled 2–5 for their square counts) on a 9×9 grid, flipping any adjacent opponent tiles to their own color upon placement, similar in spirit to Othello. The player whose color covers the most squares at game end wins. It is a straightforward yet strategically rich territory-capture game for 2–4 players.

