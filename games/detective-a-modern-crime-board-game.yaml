description: |
  Detective: A Modern Crime Board Game is a cooperative investigation game for 1-5 players where players act as detectives working at the Antares Agency, solving five interconnected cases. Unlike traditional mystery games, Detective integrates a real online database — the Antares system — allowing players to search for suspects, cross-reference evidence, and uncover information beyond the physical cards. Players manage limited in-game time across multiple workdays, with overtime costing stress tokens, creating a tense resource management layer beneath the deduction. The game rewards careful reading and logical deduction, with a final scoring phase that measures how thoroughly the case was solved.

