description: |
  Rent a Hero is a fantasy auction game in which players bid for the services of various heroes — each with different skills and power levels — to complete quests and earn gold. Players manage their treasury carefully across multiple rounds of competitive bidding, balancing the need for powerful heroes against the cost of hiring them. The lighthearted theme of heroism-as-a-service adds humor to the auction mechanics.

