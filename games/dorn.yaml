description: |
  Dorn is a cooperative fantasy adventure game published by Altar in 2006 for 2–6 players, in which a team of heroes must collect three artifact tokens and bring them to the Ritual Chamber to defeat the necromancer Zorkal. Unlike many dungeon-crawl games, Dorn uses no dice for combat—each hero and monster deals a fixed amount of damage per attack, making strategy and teamwork central. Heroes choose from nine unique characters across three experience levels, leveling up by defeating enemies, which grants higher hit points, additional attacks, and special skills.

