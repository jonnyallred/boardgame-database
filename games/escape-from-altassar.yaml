description: |
  Escape from Altassar is a 1982 science fiction wargame published by Task Force Games as part of their Pocket Games series. Set in a distant future, the game simulates an attempted escape by human prisoners from an alien penal colony on the planet Altassar, with one player controlling the escaping prisoners and the other managing the alien Spikus pursuers. It uses a compact hex-based system typical of Task Force Games' small-format wargames. The title was part of a short-lived product line that was discontinued in 1983 when the Pocket Games series proved unprofitable.

