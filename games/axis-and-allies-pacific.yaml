description: |
  Axis & Allies: Pacific is a 2001 standalone game that transposes the Axis & Allies system to the Pacific theater of World War II, covering the conflict between Japan and the Allied powers — the United States, United Kingdom, Australia, and China — from 1942 onward. Naval dominance is central, as island-hopping campaigns and control of sea lanes shape the strategic contest. Japan starts with significant territorial advantages while the Allies must marshal industrial output to reclaim the Pacific. A companion to Axis & Allies: Europe, it can also be combined with that game for a global conflict experience.

