description: |
  Santa Maria is a streamlined Euro strategy game in which players establish and develop colonies in the New World by placing Tetris-like colony tiles on their individual boards. Each player drafts dice representing migrant workers, then uses each die to activate an entire row or column of buildings in their colony — a clever constraint that forces careful spatial planning. Buildings generate resources, ships, colonists, and special powers that form growing engines of production. The game rewards tight optimization and spatial puzzle-solving while keeping turns brisk and interaction light, making it an accessible but satisfying mid-weight Euro.

