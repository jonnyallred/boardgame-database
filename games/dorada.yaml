description: |
  Dorada is a 1988 Ravensburger strategy game for 2–4 players in which each player races four tokens toward a finish line using dice rolls. The twist is that some board spaces are "holes"—the first piece to land on a hole is lost from play, but it also fills the hole and flips it into a safe space for future pieces. Crucially, a piece that finishes later scores more points, so players must weigh the risk of going fast (and losing pieces to holes) against the reward of being last to finish. Pieces that fail to reach the finish score nothing.

