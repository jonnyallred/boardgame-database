description: |
  Ubongo Extreme is a harder variant of the Ubongo puzzle series by Grzegorz Rejchtman, published by Z-Man Games. Instead of standard square polyomino tiles, the game uses hexagonal tiles — creating more complex spatial challenges for players racing to fill their puzzle boards. Players compete simultaneously against a sand timer, solving increasingly tricky hexagonal tile configurations. Featuring two difficulty levels, Ubongo Extreme is aimed at players who have mastered the original and want a stiffer puzzle-solving challenge.

