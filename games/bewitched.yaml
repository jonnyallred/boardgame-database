description: |
  Bewitched is a 1964 board game published by Game Gems (manufactured by T. Cohn, Inc.),
  based on the popular ABC television series starring Elizabeth Montgomery as Samantha,
  a witch married to a mortal. Players spin a numbered spinner to move around the board
  or draw witch cards to send opponents to matching Bewitched spaces. A licensed
  collectible, the game captured the charm of the beloved TV show in a simple racing
  format suitable for families.

