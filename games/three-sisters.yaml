description: |
  Three Sisters is a 2021 backyard farming roll-and-write game by Ben Pinchback and Matt Riddle, published by 25th Century Games, named after the companion planting technique of growing corn, beans, and squash together. Each round players roll a shared pool of dice and use them across a richly interconnected scoresheet covering crops, animals, preservation, and an orchard — with each area feeding bonuses into the others, creating a satisfying engine-building experience on paper. The game rewards long-term planning and synergy hunting while remaining accessible enough for family game nights, and was praised for being one of the deepest and most replayable roll-and-writes released in its year.

