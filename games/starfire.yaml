description: |
  Starfire is a 1979 Task Force Games space combat wargame designed by Stephen V. Cole that emphasizes fast-playing large fleet battles. Players design every component of their starships — a distinctive feature for its era — and command fleets in scenarios ranging from basic two-ship engagements to sweeping multi-fleet conflicts. The original game featured 10 sequential two-player combat scenarios, with one player commanding humans and the other the alien Khanate. The streamlined movement system keeps both players engaged throughout, achieving high excitement per Dragon magazine's 1979 review. The game spawned multiple expansions and a rich science fiction universe of novels and supplements.

