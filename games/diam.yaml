description: |
  Diam is a two-player abstract strategy game in which each player attempts to position two of their pieces in a configuration where they are directly across from each other on the board, while simultaneously blocking the opponent from achieving the same. The game's core challenge lies in managing the dual demands of advancing your own formation while remaining vigilant about the opponent's developing threats. As a compact abstract, it offers fast play and accessible rules combined with genuine strategic depth.

