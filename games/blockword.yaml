description: |
  Blockword is a word game in which players place letter blocks over locating octagons
  in the center of a tray, with different letters facing each player depending on their
  position at the table. The asymmetric letter visibility creates a unique word-building
  challenge as players must consider both what letters they can see and what their
  opponents can see. The spatial element distinguishes it from conventional word games
  and rewards players who can form words under these positional constraints.

