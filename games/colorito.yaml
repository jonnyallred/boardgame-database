description: |
  Colorito is a Victorian-era abstract strategy game first published in London in 1892, played on a 10×10 grid of octagons. Each player has 20 numbered pieces in two colors arranged on the first two rows of their side; pieces may step one space or jump over another piece, landing on a same-colored space, or perform a step-then-jump in a single turn. The goal is to maneuver all pieces to the opposite side, placing each on its corresponding numbered octagon. The game's key innovation — numbered pieces combined with a two-color-per-player system — makes it a historically significant entry in the race/abstract genre, and it has been revived in modern print-and-play and boutique editions.

