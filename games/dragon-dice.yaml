description: |
  Dragon Dice is a 1995 collectible dice game published by TSR and designed by Lester Smith, simulating combat between fantasy armies battling for control of the elemental world of Esfah. Players assemble armies of custom dice representing different races — each composed of two elemental affinities (air, earth, fire, water, or death) — and roll them to generate combat results. The game won the 1996 Origins Award for Best Fantasy or Science-Fiction Board Game, but aggressive production led to an unexpected glut of returned units that contributed to TSR's financial collapse and eventual sale to Wizards of the Coast. Today SFR, Inc. continues to produce and support the game.

