description: |
  Go Nuts! is a press-your-luck dice game published by Gamewright in 2008. Players take the role of squirrels gathering acorns while avoiding cars, rolling dice and pressing their luck for additional nuts—but rolling all squirrels lets you attempt an extra scoring run before opponents' dogs chase you away. The game is fast-playing and designed for families with young children, emphasizing the push-your-luck thrill of deciding when to bank your acorns versus going for one more roll. Its short playtime and accessible theme make it a popular filler for younger players.

