description: |
  Revolver is an asymmetric two-player card game set in the Wild West, pitting the infamous Colty gang against Colonel McReady and his posse across multiple battlefields. One player controls Jack "The Crow" Colty and his 15 gang members trying to reach the 3:15 train to escape, while the other controls the law enforcement trying to bring the outlaws to justice before they flee. Each player manages a distinct deck with unique cards featuring power and cost values, fighting simultaneously through different battlefield zones. The game delivers a tense cat-and-mouse experience with a satisfying thematic integration of Wild West tropes.

