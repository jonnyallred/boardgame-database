description: |
  Moruba (also spelled Maruba) is a traditional mancala game played by the Pedi people in the South African provinces of Limpopo and Mpumalanga. The game is played on a four-row board with 12 holes per side and was historically a social activity for men, used to strategize about community affairs and wartime planning. Like other mancala variants, players capture stones from the opponent's rows, with the player who still has stones when the opponent is depleted winning the game. Moruba remains an important piece of South African cultural heritage and is recognized in the country's national Indigenous Games program.

