description: |
  Dragonslayer is a 1981 board game published by Simulations Publications, Inc. (SPI), based on the dark fantasy film of the same name co-produced by Paramount Pictures and Walt Disney Productions. Players take the roles of magicians competing in the fictional land of Urland as they attempt to free the realm from its last dragon, Vermithrax Pejorative. Designed by Brad Hessel and Redmond A. Simonsen, the game captures the lore and tension of the movie in a competitive wargame format. It was produced as a licensed tie-in to the 1981 film and is considered a notable artifact of the movie tie-in board game tradition.

