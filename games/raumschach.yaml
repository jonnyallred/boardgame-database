description: |
  Raumschach (German for "Space Chess") is a three-dimensional chess variant invented by Ferdinand Maack in 1907, played on five stacked 5×5 boards. Maack designed the game to simulate aerial and underwater dimensions of warfare missing from conventional two-dimensional chess, with all standard chess pieces adapted to move through three spatial axes. Unicorns (a new piece) were also introduced to handle the extra movement possibilities. The game achieved limited popularity in early 20th-century England and Germany and is considered the classic form of 3D chess, still played by chess variant enthusiasts today.

