description: |
  Gulf Strike is an operational-level wargame simulating potential superpower confrontation in the Persian Gulf region using 1980s equipment and doctrine, published by Victory Games in 1983 as their inaugural release. The game covers air, naval, and land combat across two large tactical maps and two strategic maps, with 910 counters in the first edition and a 60-page rulebook reflecting the complexity of multi-domain operations. Its five full scenarios range from limited engagements to full-scale superpower conflict, and the game famously anticipated the type and character of US forces that would later deploy during Desert Shield. Three editions were published, with later printings adding additional scenarios and counters.

