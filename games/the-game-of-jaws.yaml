description: |
  The Game of Jaws is a 1975 dexterity game by Ideal Toy Company, inspired by the blockbuster
  Steven Spielberg film. Players load 13 plastic junk pieces into a toy shark's open mouth, then
  take turns naming a piece and attempting to extract it using a plastic gaff hook. The first
  player to successfully remove four pieces (or five in a two-player game) wins. The tension of
  carefully maneuvering the gaff hook around other objects without triggering the shark's spring-
  loaded jaw — and the inevitable chomping when something goes wrong — made it a beloved childhood
  classic. The original 1975 edition is now a sought-after collector's item.

