description: |
  Middle-Earth Quest is a 1-versus-many board game designed by Corey Konieczka and published by Fantasy Flight Games in 2009. Set during the seventeen years between Bilbo's birthday party and the Ring's departure from the Shire, one player controls Sauron who deploys minions and plots across Middle-earth, while up to three other players take on hero characters who must thwart Sauron's plans through dangerous quests and consultations with iconic Tolkien characters. The game features card-based movement and combat that blend luck and strategy, with heroes gaining experience and equipment as they race to prevent Sauron from completing his nefarious schemes before Gandalf's plans mature.

