description: |
  Titan is a fantasy wargame for 2–6 players, first published in 1980 by Gorgonstar and later licensed to Avalon Hill, in which players command legions of mythological creatures that roam a strategic Masterboard recruiting increasingly powerful monsters. When two legions meet, combat is resolved on separate tactical Battlelands, with eleven different terrain types each favoring different creature types. The last-player-standing victory condition and dual-level strategic/tactical play make Titan one of the most demanding and rewarding classic fantasy wargames, though games can last many hours.

