description: |
  Loopin' Louie is an electronic dexterity game for 2-4 players in which a motorized biplane (Louie) rotates around a central tower, and each player must flick their lever at the right moment to deflect the plane away from their chicken tokens. The player who keeps at least one chicken token on their side when opponents have lost all theirs wins. Designed for young children but beloved by adults for its frantic, reflexive excitement, it won the Kinderspiel des Jahres in 1994. The simple tactile mechanics and escalating tension as chicken tokens are lost have made it an enduring classic that plays in minutes.

