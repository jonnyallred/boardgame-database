description: |
  Cobra: Game of the Normandy Breakout is a hex wargame published by SPI in 1977, designed by Brad Hessel, covering the entire Allied Normandy breakout from the summer of 1944 — including both the American Operation Cobra and the British/Canadian Operation Goodwood. One player controls the Germans while the other commands the Allies; a three-player variant divides the American and British/Canadian forces between two players. It was later expanded by TSR after acquiring SPI in 1982, and subsequent editions have been published by Decision Games. The game captures the fluid, rapidly shifting nature of the post-D-Day breakout campaign.

