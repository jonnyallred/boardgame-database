description: |
  Saipan: Conquest of the Marianas, June 1944 is a compact two-player board wargame published by Simulations Publications Inc. (SPI) in 1975, simulating the pivotal American amphibious assault on the Japanese-held island of Saipan during World War II. Originally published as one of four games in the "Island War: Four Pacific Battles" collection, it was also released as a standalone game. The compact 17x22-inch hex grid map with only 100 counters and basic rules makes it a relatively accessible entry point into Pacific theater wargaming. One player commands the American invasion forces while the other defends with Japanese forces, recreating a crucial 1944 battle that shaped the war's outcome in the Pacific.

