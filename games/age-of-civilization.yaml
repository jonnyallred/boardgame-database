description: |
  Age of Civilization is a compact pocket-sized civilization card game for 1–4 players in which each player leads up to three historical civilizations simultaneously, combining their unique abilities to build Wonders, research technology, develop culture, and conquer for glory. Each game plays in roughly 30 minutes by blending action points with a lightweight tech tree, letting players mix and match civilizations for wildly different strategies. Despite its small footprint, the game achieves surprising depth through the combinatorial synergies between civilizations.

