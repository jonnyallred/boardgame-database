description: |
  À vos marques! is a speed-based party game by Goliath in which players race to collect cards
  matching specific criteria related to consumer brand logos, using special suction-cup components
  to grab matching tiles. The game includes 72 brand representations and 120 mission cards
  defining collection goals. Its fast-paced real-time play and brand recognition theme make it a
  lively, competitive party game suitable for families and groups.

