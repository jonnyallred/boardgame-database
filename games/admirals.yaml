# Description
description: |
  Admirals is a naval strategy board game published by Parker Brothers in 1972.
  Players command naval fleets competing for control of the seas, deploying
  warships across a maritime map to dominate shipping lanes and defeat opposing
  forces.

  The game combines area control mechanics with naval combat, allowing players to
  build up their fleets and challenge opponents for naval supremacy. As a classic
  Parker Brothers title from the early 1970s, Admirals features accessible rules
  designed for family play while delivering the satisfying theme of commanding
  powerful warships.

