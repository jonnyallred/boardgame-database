description: |
  Indian Ocean Adventure: The Japanese Raids on Ceylon is a two-player naval wargame published by Game Designers' Workshop (GDW) in 1978, simulating the April 1942 Japanese carrier fleet raids into the Indian Ocean. Admiral Nagumo's powerful strike force — including five fleet carriers — raids British ports and shipping around Sri Lanka (Ceylon) in an attempt to lure Admiral Somerville's inferior Eastern Fleet into a decisive engagement. The game shares its core carrier fleet rule system with GDW's companion wargames Coral Sea and Battle for Midway, adding special rules for night operations specific to the Indian Ocean campaign. One player commands the Japanese carrier force seeking to destroy the British fleet, while the other must preserve British naval power in the face of overwhelming Japanese air superiority.

