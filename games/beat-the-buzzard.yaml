description: |
  Beat the Buzzard (Hol's der Geier) is a simultaneous-bidding card game designed by
  Alex Randolph and published by Ravensburger in 1988. Each player holds an identical
  hand of 15 numbered cards; each round, a prize tile with positive or negative points
  is revealed and players secretly choose a card to bid, revealing simultaneously.
  The highest bid wins positive prizes while the lowest bid wins negative ones.
  The game is simple to learn yet surprisingly strategic, rewarding players who can
  anticipate opponents' bids, and has been reprinted under many names worldwide.

