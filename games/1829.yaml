# Description
description: |
  1829 is the original 18XX game, designed by Francis Tresham and published in
  1974 by Hartland Trefoil. Set in Victorian England, players invest in and
  operate railway companies, buying shares, building track, running trains, and
  generating revenue for shareholders. The game pioneered the 18XX genre that
  would spawn over 250 licensed titles.

  The game alternates between stock dealing rounds, where players buy and sell
  shares in railway companies, and operating rounds, where company presidents
  build track, purchase trains, and distribute income. Players win by accumulating
  the most personal wealth. Strategic depth is immense: decisions about share
  ownership, company management, train obsolescence, and deliberate manipulation
  of other players' companies create an endlessly complex financial and logistical
  puzzle.

