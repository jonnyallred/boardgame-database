description: |
  The original 1997 first edition of Twilight Imperium is the founding entry in Christian T. Petersen's sweeping space opera 4X board game series. Players control asymmetric alien civilizations competing for control of the galactic throne on a modular hex-tile map, managing fleets, diplomacy, trade, and political intrigue across multiple sessions. Petersen designed, published, and assembled the first edition single-handedly, debuting it at Origins 1997 where it sold out entirely. It established the template for epic, multi-hour political space games that would dominate the hobby for decades, with three subsequent editions refining and expanding the core design.

