description: |
  Ocean Trader is a family board game published by Clipper Games Ltd in 1988 in which 2-6 players captain clipper ships out of Liverpool, racing across the globe to buy and deliver commodities in the 19th-century age of sail. Players roll dice to move their ships to ports where they purchase needed goods, then race to deliver them to the ports offering the highest prices — with only the first two arrivals at each destination turning a profit, rewarding speed and route planning. Designed by John Rudford and published by the British company Clipper Games, Ocean Trader was the sole game released by that publisher despite plans for a series, and it offers a light and accessible introduction to trading and route optimization mechanics.

