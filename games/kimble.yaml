description: |
  Kimble is the beloved Finnish licensed version of the board game Trouble, introduced in Finland in 1967 by Tactic Games, where it became one of the country's most consistently popular board games. Players race four pieces around the board based on a die rolled with the Pop-O-Matic bubble, sending opponents' pieces back to start upon landing on them. The game is simple enough for young children yet has sustained multi-generational appeal in Finland, where it remains a household staple. Its distinctive Finnish identity despite being a licensed Ludo derivative has made it a cultural touchstone.

