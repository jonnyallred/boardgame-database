description: |
  Star Trek: Starship Tactical Combat Simulator is a 1983 hex-based wargame published by FASA that originated as the space combat component of the Star Trek: The Role Playing Game. Players use ten-sided dice and counters to simulate tactical starship combat in the Star Trek universe, managing power distribution, weapon arcs, phasers, and torpedoes. The game offers Basic and Advanced rules to accommodate players of varying experience levels. Multiple editions were released between 1983 and 1986, and the system gained a dedicated following for its detailed and realistic portrayal of Star Trek space combat.

