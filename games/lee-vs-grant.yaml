description: |
  Lee vs. Grant: The Wilderness Campaign of 1864 is an operational wargame covering Ulysses S. Grant's relentless Overland Campaign against Robert E. Lee from the Wilderness through Cold Harbor. Unlike earlier Union commanders who retreated after tactical defeats, Grant continuously pressed south and southeast, and the game captures this dynamic with Grant unable to disengage and Lee forced into costly defensive battles. Players command the Army of the Potomac and the Army of Northern Virginia through some of the Civil War's bloodiest fighting, with attrition and supply lines playing key roles alongside maneuver. A detailed simulation of the grinding attritional style that defined Grant's 1864 strategy.

