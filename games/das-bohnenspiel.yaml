description: |
  Das Bohnenspiel (known internationally as Bohnanza) is a beloved German card game designed by Uwe Rosenberg and published by Amigo Spiele in 1997. Players farm up to three types of beans from a hand of cards they cannot reorder, trading and negotiating to plant profitable crops and sell them for gold coins. The fixed hand order creates a constant need to deal and barter, making every hand dynamic and social. Its quirky bean illustrations and engaging trading mechanics have made Bohnanza one of the most enduringly popular filler games in the hobby, spawning dozens of expansions and variants over the decades.

