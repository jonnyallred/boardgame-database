description: |
  Panzer Armee Afrika, subtitled "Rommel in the Desert, April 1941 - November 1942," is a hex-and-counter wargame designed by Jim Dunnigan and originally published by Simulations Publications Inc. (SPI) in 1973, simulating the World War II North African Campaign in which Axis forces under Field Marshal Erwin Rommel clashed with the British Eighth Army. The game covers the full sweep of the desert war — from the initial Axis advance into Egypt through the British counteroffensives — at an operational level of command. It was revised and republished by Avalon Hill in 1984 with updated components. As one of SPI's key operational wargame designs, it remains a classic study in mobile desert warfare logistics and maneuver.

