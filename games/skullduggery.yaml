description: |
  Skullduggery is a pirate-themed strategy and memory board game designed and illustrated by Allegra Vernon, published by Outset Media, and winner of the 2007 Mensa Select award. Players use a tiled board with tokens, combining card play and bait-and-switch tactics to build the highest number sequence and claim treasure. The game teaches basic logic and strategy in a family-accessible pirate adventure format, and its visual design and educational angle have made it a popular choice for children and family game nights.

