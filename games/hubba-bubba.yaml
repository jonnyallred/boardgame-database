description: |
  Hubba + Bubba is a children's board game tied to the Hubba Bubba bubble gum brand, offered as a promotional item or collectible for gum fans. Players navigate a simple game board using the colorful candy-themed components, competing in a lighthearted race or matching challenge. As a branded promotional game, it is primarily of interest to collectors of 1980s pop culture memorabilia.

