description: |
  Lingua is a word game in which players form words from a set of letter tiles or cards, competing to create the longest or most valuable word within time pressure. The game emphasizes vocabulary and speed over complex strategy, making it a light party game suitable for language enthusiasts. Published by Winning Moves, it fits within the tradition of family word games that reward broad vocabulary while remaining accessible enough for mixed-age groups. Limited information is available in English-language sources about this specific title's mechanics and publication history.

