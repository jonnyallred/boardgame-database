description: |
  Wabbit Wampage is a 1985 adventure board game designed by Mark Acres and published by Pacesetter Ltd. Players control cartoon Wabbits (warrior rabbits) waging war against a farmer and each other for control of the carrot crop and farm buildings in a whimsical farmyard conflict. The game won the Charles S. Roberts Award for Best Fantasy or Science Fiction Game of 1985, a notable achievement for a light-hearted, humorous design in a field dominated by serious wargames. Its blend of slapstick animal chaos and tactical competition gave it a cult following.

