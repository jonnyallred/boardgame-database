description: |
  The Great Split is a simultaneous card-drafting game designed by Hjalmar Hach and Lorenzo Silva and published by Horrible Guild in 2022. Each round, players split their hand of collection cards into two piles — one they keep and one they pass — while trying to guess what their neighbor will keep. Players score from sets and collections of gems, coins, artifacts, and other treasures, but scoring is boosted significantly when they match what others chose. The elegant "split what you want, keep what you're given" tension turns each round into a clever mind-reading puzzle about how others value different card combinations.

