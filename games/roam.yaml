description: |
  Roam is a competitive area-control and pattern-matching game for 2–4 players from Ryan Laukat, featuring characters from the Near and Far universe. Players play adventurer cards to place search tokens on the board in the exact shape depicted on each card, competing to find lost adventurers hidden across a beautiful illustrated landscape. Over 50 unique tarot-sized adventurer cards provide variety, while the spatial puzzle of fitting token patterns onto the shared board creates tension and clever blocking. Roam is a light, visually stunning game that rewards spatial thinking in a short play session.

