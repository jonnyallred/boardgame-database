description: |
  Tri-Ba-Lance is a physics-based dexterity game played on a triangular board balanced on a central point. Players take turns placing differently weighted pieces into marked recesses on the board, with the key rule being that the board must remain balanced after each placement without touching the table. Spots near the tips of the triangle score higher, but risk destabilizing the board. The game involves no luck — it is purely about reading the board's balance and making smart placements. Originally published by Theta Games in 1995, it was later republished as Triominos Tribalance by Goliath in 2013.

