description: |
  Hula Hippos is a dexterity game published by Gamewright in which players spin a plastic hula-hoop and then quickly flick their wooden hippos so they come to rest inside the ring when it stops spinning. The first player to get four hippos inside the hoop wins. The game is fast, physical, and designed for young children, requiring no reading and minimal rules explanation.

