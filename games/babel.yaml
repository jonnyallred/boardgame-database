description: |
  Babel is a two-player card game designed by Uwe Rosenberg and Hagen Dorgathen in which players compete to build the tallest temples using workers from five ancient civilizations. Each turn, players place worker cards at their own or their opponent's temples and may activate the special power of any nationality where they hold a majority of three or more cards — powers include demolishing, stealing, or sabotaging enemy temples. Published by KOSMOS as part of their acclaimed two-player line, Babel rewards hand management and timing as players try to outmaneuver each other in a tense race to construct the mightiest ziggurat.

