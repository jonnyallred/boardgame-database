description: |
  Gambit Royale, originally published as Ruse and Bruise, is a fast-paced medieval card game in the tradition of Citadels. Players deploy magicians, dragons, kings, and princesses in a contest for fame, playing cards face-down until a column is completed, at which point cards are revealed simultaneously. The hidden-placement mechanic creates rich bluffing opportunities as players try to anticipate opponents' moves while manipulating their own royal household to score points. The game packs meaningful decisions and player interaction into a short play time.

