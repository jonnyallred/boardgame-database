description: |
  Just 4 Fun is an abstract card game published by KOSMOS in which players hold cards numbered 1 through 19 and play one to four cards per turn to place stones on a 36-square numbered grid. The goal is to form a line of four stones horizontally, vertically, or diagonally. Strategic card play and blocking opponents while building your own lines creates genuine tension in a compact format. Winner of the 2006 Japan Boardgame Prize Best Foreign Game for Beginners and nominated for multiple family game awards, Just 4 Fun successfully bridges the gap between abstract strategy and accessible family gaming.

