description: |
  Rhino Hero: Super Battle is the exciting sequel to Rhino Hero, expanding the stacking tower formula with superhero battles and dice-driven combat. Four superhero characters — Rhino Hero, Giraffe Boy, Big E., and Batguin — compete to climb a wobbly 3D tower built from floor tiles and walls. After adding to the tower, players roll a movement die to advance their hero; if they land on the same level as another hero, dice-based "battles" determine who gets knocked down a tier. Spider monkey figures hang from special floor tiles, adding even more precarious chaos to the balancing act. This sequel adds competitive depth while retaining the charming tension and humor of the original.

