description: |
  Stratego: Legends (The Shattered Lands) is a 1999 Avalon Hill reimagining of classic Stratego, set in a mythical world where good and evil forces clash across a randomly configured modular board. Like Stratego, pieces are placed secretly and revealed only in combat, but every unit here has a special power — Innate powers, Abilities, Actions, or Death Curses — adding layers of variable interaction beyond the original's rank-based system. The goal is to destroy the opponent's castle rather than capture a flag, and randomized terrain setup ensures each game is unique. Published until 2004, the game earned recognition for being a surprisingly entertaining evolution of the Stratego formula despite mixed reviews.

