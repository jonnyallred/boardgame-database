description: |
  Monopoly: Here and Now is a modernized edition of Monopoly published by Hasbro in 2006, featuring 22 updated properties representing famous American landmarks chosen by online fan vote — including Times Square, Las Vegas, and the White House. All monetary values are multiplied by 10,000, with players starting with $15 million, reflecting modern economic scales. Gameplay otherwise follows classic Monopoly rules with the familiar mechanics of buying properties, collecting rent, and driving opponents to bankruptcy. The edition was part of Hasbro's 70th anniversary celebration of the game.

