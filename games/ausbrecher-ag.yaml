description: |
  Ausbrecher AG is a light Ravensburger dice game from 1985 in which players secretly predict the order that colored prisoners will escape a prison island by reaching their boats. Each turn, a player rolls three colored dice, and corresponding prisoners advance that many spaces — but a player may also block a prisoner by stacking another prisoner on top of them, preventing them from using their roll. Players score points for correctly forecasting which escapees finish in which order. The combination of dice luck and tactical blocking creates a lively and unpredictable race.

