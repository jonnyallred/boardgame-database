description: |
  War in the Pacific is SPI's colossal simulation of the entire Pacific theater of World War II, designed by Edward Curran, Jim Dunnigan, Irad B. Hardy, and Tom Walczyk. The game ships with seven maps totaling 88 by 102 inches, 3,200 die-cut counters, and a 56-page rulebook, earning a complexity rating of 100 out of 100. Critics praised the game's treatment of logistics and "fog of war" as well as its uncommonly well-written rules. It stands alongside War in Europe and War in the East as one of the defining monster wargames of the SPI catalog.

