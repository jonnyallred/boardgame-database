description: |
  The Castle of the Devil (Die Kutschfahrt zur Teufelsburg) is a hidden-role social deduction game
  by Michael Palm and Lukas Zach, published by daVinci Editrice in 2010. Players are divided into
  secret factions and must cooperate with allies they haven't yet identified to collect three defined
  artifacts before the opposing faction does. On each turn players can spy on others, trade objects,
  or duel. Many objects have powers that activate when traded, making the trading mechanic central
  to both deduction and deception. The game builds on hidden-role mechanics popularized by Werewolf
  while adding an item collection and trading layer.

