description: |
  Petteia is an ancient Greek abstract strategy game known since at least the 5th century BCE, referenced by Homer, Plato, and Aristotle — who famously wrote that "a citizen without a state may be compared to an isolated piece in a game of Petteia." Played on gridded boards of varying sizes (7x8 to 9x10) with black and white stones arrayed on opposite sides, players move pieces around the board and capture opponents by custodial capture — surrounding an enemy piece on two opposite sides removes it from play. The winner takes all of the opponent's pieces. Since no complete rule set survives, modern reconstructions vary, but the game is considered an ancestor of both chess and draughts.

