description: |
  Vai Lung Thlan is a traditional mancala variant played by the Mizo people of eastern India, documented in written sources as early as J. Shakespear's 1912 ethnographic work "The Lushei Kuki Clans." The game is played on a board with twelve holes arranged in two rows, each initially holding five beads. Players sow beads around the board following mancala rules, capturing stones according to the game's specific conventions. It is a folk game without a modern commercial publisher and is primarily known through academic records and online abstract game platforms.

