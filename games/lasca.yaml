description: |
  Lasca is an abstract strategy game invented by Emanuel Lasker, the legendary world chess champion, around 1911. Played on a 7x7 board with a subset of checkers-style pieces, it introduces a distinctive stacking mechanic: when a piece is captured, it goes beneath the capturing piece, forming a column commanded by the topmost piece. A captured stack's top piece is removed, revealing the piece below (which may be the opponent's), so captured forces can be "liberated." Players win by reducing all opponent columns to a single top piece under their own command. This elegant variation on draughts rewards deep positional thinking and remains a curiosity of abstract game design.

