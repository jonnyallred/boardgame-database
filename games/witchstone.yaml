description: |
  Witchstone is a fantasy efficiency game for 2–4 players designed by Reiner Knizia and Martino Chiacchiera, winner of the 2022 Kennerspiel des Jahres. Players are wizards and witches seeking to restore the legendary Witchstone's energy field by placing pentagram tiles on a shared board to build magical networks, drafting spell cards to extend their abilities, and competing to complete scoring objectives. The key tension lies in the interconnected action system: expanding your network unlocks more powerful spell options, creating a deeply satisfying engine that grows in strength as the game progresses. Every decision has consequences across multiple scoring tracks, rewarding holistic strategic thinking.

