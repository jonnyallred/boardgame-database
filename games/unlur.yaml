description: |
  Unlur is a two-player abstract connection game invented by Jorge Gómez Arrausi in 2002, played on a hexagonal board. It belongs to the connection game family alongside Hex and Havannah, with the goal of linking opposite sides of the board. Unlur's notable contribution to abstract game design is the popularization of a pre-game contract phase — a negotiation mechanism in which players bid on role assignments before play begins. The game is primarily played online through platforms such as igGameCenter and has attracted a dedicated following among abstract strategy enthusiasts.

