description: |
  Space Station Phoenix is a worker-placement and engine-building game for 2-4 players designed by Gabriel J. Cohn. Players begin with the best production engine they will ever have — a full complement of nine ships — then systematically break it down to build a space station piece by piece. As ships are converted, actions become more efficient but fewer options remain, creating an elegant tension between maximizing the present and building for the future. A shared Diplomacy board means every player's actions generate small benefits for opponents based on track positions, encouraging tight tactical awareness throughout.
