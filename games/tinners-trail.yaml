description: |
  Tinners' Trail is an economic strategy game by Martin Wallace set in nineteenth-century Cornwall, where players are mining venturers bidding for parcels of land and extracting tin and copper for profit. Each player has ten Work Points per round to spend on actions — surveying, mining, building ports, constructing railways, and creating drainage adits — with water depth determining mining costs and the global market price fluctuating with each sale. The tight action-point economy and cascading infrastructure decisions make it a rewarding mid-weight economic game, later remastered by Alley Cat Games in 2021 with expanded player count and improved setup.

