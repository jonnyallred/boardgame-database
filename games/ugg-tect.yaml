description: |
  Ugg-Tect (also sold as Aargh!Tect) is a hilarious team party game published by Fantasy Flight Games in which players are prehistoric cave people attempting to construct buildings. The "architect" caveman sees a building blueprint but can only communicate using primitive caveman gestures and grunts — no words allowed. Their "builder" teammates must interpret these caveman signals to place the correct blocks in the correct positions. The comedy comes from the communication breakdown between architect and builders, and from a foam club the architect may use to "bonk" confused builders. Nominated for Golden Geek Best Party Game in 2010.

