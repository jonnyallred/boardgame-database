description: |
  Blue & Gray: Four American Civil War Battles is a "quadrigame" published by SPI in
  1975, containing four separate battles — Shiloh, Antietam, Cemetery Hill, and
  Chickamauga — using a shared rule set with 100 or fewer counters each. Unlike monster
  wargames of the era, each scenario could be completed in a few hours, making it
  accessible to newcomers. It immediately reached #1 on SPI's bestseller list and placed
  7th in SPI's 1976 wargamer poll out of 202 games. Decision Games reissued a revised
  edition in 1995 replacing Antietam with the two Bull Run battles.

