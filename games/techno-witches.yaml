description: |
  Techno Witches is a racing game published by KOSMOS and Rio Grande Games in
  which modern witches and wizards pilot jet-powered brooms across a modular
  table-top course with no fixed board. Players program their flight paths 1 to
  5 stages at a time using magic books, requiring spatial planning and
  visualization of movement without physically placing pieces first. Advanced
  scenarios challenge players to capture and carry a cat or chase a rogue
  technophobe on a traditional broom. The game teaches valuable planning skills
  while offering a fun, whimsical racing experience with escalating complexity.

