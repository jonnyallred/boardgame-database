description: |
  Momentum is a two-player abstract strategy game in which players take turns dropping glass marbles onto a square 7x7 game board. The marble mechanics simulate the physical dynamics of the classic marble game scaled up to a board game format, with players competing to achieve positional dominance and area control. The game rewards spatial awareness and forward planning while delivering a satisfyingly tactile experience through its marble components.

