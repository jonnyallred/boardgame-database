description: |
  Sid Meier's Civilization: The Card Game is a 2006 card game designed by Soren Johnson and available exclusively as a bonus inclusion with the Civilization Chronicles boxed set, never sold separately. Based on Civilization IV, players collect resource cards to settle plots of land, build structures and wonders, research technologies, and engage in military combat as they race to build the most prosperous empire. The game distills the key pillars of the video game — expansion, exploitation, extermination, and exploration — into an accessible card game format suitable for 2-4 players.

