description: |
  Sea Hawks is a family board game published by Orca Games in 1981 in which 2–4 players take the roles of 18th-century pirate captains sailing the Spanish Main in search of buried treasure. Players navigate the seas to find hidden treasure chests, while competing with and attacking rival pirates in ship-to-ship combat to steal their findings. The game captures the adventure and conflict of the golden age of piracy in an accessible family format.

