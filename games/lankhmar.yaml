description: |
  Lankhmar is a 1976 TSR fantasy board wargame based on Fritz Leiber's acclaimed Swords and Sorcery short stories set in the fictional city of Lankhmar. Originally designed by Leiber and Harry Otto Fischer during their college years, it was revised by Gary Gygax, Robert J. Kuntz, and Brad Stock, who converted the original square grid to a hex map. Two to four players each take on a hero role — Fafhrd, the Gray Mouser, Pulgh, or Movarl — and compete for dominance with warriors, weapons, and vehicles across the city. Despite Lankhmar's cultural significance in fantasy fiction, the game sold poorly compared to TSR's contemporaneous Dungeon! and critics noted its loose connection to Leiber's source material.

