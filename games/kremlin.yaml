description: |
  Kremlin is a 1986 satirical political game by Swiss designer Urs Hostettler in which players secretly control multiple Soviet politicians arranged in a pyramid of power, maneuvering aging apparatchiks toward the General Secretary position. Players influence, bribe, and assassinate rivals while keeping their own controlled politicians alive long enough to reign from the top — all while Soviet officials age and die with darkly comic regularity. The original Fata Morgana edition required funeral speeches and vodka shots for deceased chairmen; the 1988 Avalon Hill English edition stripped the satire but broadened the audience. Won the 1988 Origins Award for Best Boardgame Covering the Period 1900-1946.

