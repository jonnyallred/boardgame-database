description: |
  Zombie Teenz Evolution is a standalone cooperative legacy game for 2–4 players and the successor to Zombie Kidz Evolution, designed by Annick Lobet. Players work together to defend their town from a zombie invasion by rolling dice and moving their teenage heroes to bash zombies and complete special missions. Like the original, the game includes sealed envelopes that unlock new rules, characters, and story content as players win or lose games, creating a persistent campaign with escalating complexity. The evolution system gives the game genuine long-term appeal, with the gradual narrative revelations rewarding continued play across a full campaign arc.

