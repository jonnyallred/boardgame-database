description: |
  Space Lines is an abstract strategy game published by Invicta Games in 1969, similar in concept to Qubic
  (3D Tic-Tac-Toe). The game features a tower structure of four plastic shelves, each with 16 knobs, onto which
  players place colored counters. The space-age aesthetic of the tower structure fit the era's enthusiasm for
  the Space Race, while the underlying game is a classic spatial pattern-recognition challenge: form a winning
  line in three dimensions before your opponent does.

