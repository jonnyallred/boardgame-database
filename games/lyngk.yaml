description: |
  LYNGK is the seventh and final game in the acclaimed GIPF Project series of abstract two-player games. Players claim ownership of colored pieces and try to stack pieces of five different colors with their own color on top — the eponymous LYNGK stacks. The game synthesizes mechanics from all six earlier GIPF Project games into one elegant design, rewarding positional thinking and careful sequencing. Beloved by abstract game enthusiasts, LYNGK earned the Mensa Select award and Spiel des Jahres recommendation.

