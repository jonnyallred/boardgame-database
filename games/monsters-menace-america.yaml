description: |
  Monsters Menace America is a light-strategy B-Movie monster game designed by J.C. Connors and Ben Knight, published by Avalon Hill (Hasbro) in 2005 as a redesigned version of Monsters Ravage America. Players control giant movie monsters rampaging across the United States — destroying cities, gaining mutations at radioactive sites, and battling military forces and famous landmarks. Each player also commands a branch of the U.S. armed forces to attack rival monsters. The game culminates in a final Monster Challenge, where all surviving monsters fight each other to crown the ultimate King of the Monsters.

