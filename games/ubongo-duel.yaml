description: |
  Ubongo: Duel is a two-player head-to-head version of the Ubongo puzzle series by Grzegorz Rejchtman, published by KOSMOS. Both players receive the same set of tiles and the same puzzle each round, determined by rolling a 20-sided die, then race to fill their puzzle board first. The first to shout "Ubongo!" scores a point. The first player to win 5 rounds (or the leader after 9 rounds) wins. Ubongo: Duel distills the original's real-time puzzle competition into a pure direct rivalry format.

