description: |
  Darwin's Dice is a simple fast-paced dice game designed by Fabian Engeler with an evolutionary theme, in which players roll dice under competitive conditions determined by each round's current rules. Two dice set the conditions of each turn, and players compete to meet or exceed those conditions to survive and thrive. The evolutionary framing gives a playful spin to the standard dice-rolling mechanics, with players' creatures competing in a lighthearted survival of the fittest. The game plays quickly and suits casual gaming groups.

