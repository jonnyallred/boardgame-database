description: |
  Cheyenne is a 1958 Milton Bradley children's board game based on the popular ABC Western television series starring Clint Walker. Players race across a track from Cheyenne's Corral to the Pony Express Station using a spinner, and must also shoot plastic "bullets" with a toy revolver tiddlywinks-style to defeat six cardboard obstacles including a rattlesnake and a bandit. The game combines a simple racing mechanic with a dexterity element, capturing the spirit of the Wild West TV show for young fans of the era. A second edition replaced Walker's image with Bronco star Ty Hardin during a contract dispute.

