description: |
  Aquaretto is a 2008 family Euro game by Michael Schacht, published by Rio Grande Games, in which
  players build and manage their own water zoo. The core mechanism involves drawing animal tiles
  from a bag onto shared transport trucks, then deciding when to take a truck and place those
  animals into your aquarium enclosures. Different species cannot be placed adjacent to each other,
  requiring careful spatial planning.

  Animals can breed when a male and female of the same species are collected, producing baby tokens
  worth points. A spiritual companion to Schacht's earlier Zooloretto (Spiel des Jahres 2007),
  Aquaretto can be played standalone or combined with Zooloretto for a mega-zoo experience. The
  game rewards patient optimization of animal placement while managing the unpredictability of the
  shared bag draw.

