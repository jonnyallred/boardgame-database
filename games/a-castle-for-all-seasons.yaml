# Description
description: |
  Players build a castle together but compete for points by choosing character roles
  each round. Each role grants a unique special action and access to different
  resources. The twist is that all players simultaneously choose their role for the
  round in secret, and roles that are selected by multiple players lose some of their
  effectiveness. Balancing which role to play, predicting opponents' choices, and
  optimizing your building and resource gathering over four seasons of gameplay
  makes for a tightly competitive Euro-style experience.

