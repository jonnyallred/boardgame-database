description: |
  Circus Maximus is a chariot racing board game originally published by Battleline Publications in 1979 under the name Chariot Racing and republished by Avalon Hill in 1980. Players select horse teams and drivers, then race customized chariots around an oval track representing ancient Rome's famous hippodrome, using whips to attack opponents, forcing rivals into walls, and deploying wheel blades to hamstring enemy horses. The game became a beloved convention staple, often played in oversized form with 10-foot boards and baseball-sized chariot pieces. A video game adaptation was released by Avalon Hill in 1984.

