description: |
  Bizingo is a two-player abstract strategy game originating in the United States in the
  mid-1850s, played on a semi-triangular grid of 157 triangular cells. Each player
  commands 18 pieces — 16 soldiers and 2 captains — with the objective of capturing
  opponents by surrounding them. Its exact origins are mysterious; the first documented
  print appearance of the rules was in R.C. Bell's The Boardgame Book in 1979, which
  described it as an American invention. The game bears some resemblance to the
  traditional Zuni game Awithlaknakwe and remains a curiosity for abstract game enthusiasts.

