description: |
  Felli is a traditional two-player abstract strategy board game from Morocco, played on an hourglass-shaped board with each player controlling six pieces. Players move one piece per turn to an adjacent vacant point, capturing opponent pieces by jumping over them in a straight line to a vacant point behind (similar to draughts). A player wins by capturing all opposing pieces or immobilizing them completely. An advanced variant promotes pieces to "Mullahs" (similar to kings in draughts) upon reaching the opponent's starting rank, which can then move and capture over any distance.

