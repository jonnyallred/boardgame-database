description: |
  Ecopolicy (originally published in German as Ökolopoly) is a cybernetic simulation game designed by systems theorist Frederic Vester and published by Ravensburger in 1984. Players choose between managing an industrialized nation or a developing country, adjusting nine interconnected dials each round to balance ecological, economic, and social conditions. The game was designed to illustrate systems thinking, showing how decisions ripple through complex feedback loops — often with catastrophic unintended consequences. It was selected as Game of the Year by German magazine Stern and later adapted into a computer game as Ecopolicy.

