description: |
  Spies! is a board game of international espionage designed by John Prados and Lenny Glynn, published by SPI
  in 1981. Set in 1930s Europe in the years before World War II, two to five players each represent a Great Power
  (France, Germany, Britain, Italy, or Russia), running spy networks to steal rivals' secrets while protecting
  their own. Standard rules fit into 30 minutes of learning; a longer rules variant adds Action Points and Spy
  Havens for a more complex campaign. After TSR acquired SPI in 1982, they republished several popular SPI titles
  including Spies!

