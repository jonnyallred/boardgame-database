description: |
  Layli Goobalay is a traditional Somali mancala-family game played across the Horn of Africa. Played on a board with two rows of holes, players distribute seeds or stones around the board using the sow-and-capture mechanics common to the mancala family, with the objective of capturing more seeds than the opponent. Mancala games have been played across Africa for thousands of years, and regional variants like Layli Goobalay represent the living tradition of indigenous African abstract strategy gaming. The game requires no manufactured components and can be played by drawing holes in the earth or sand, making it an accessible part of daily community life.

