description: |
  Detective: A Modern Crime Board Game is a cooperative mystery game for 1-4 players published by Portal Games in 2018, designed by Ignacy Trzewiczek and co-designers. Players take on the roles of investigators at the Antares National Investigation Agency, working together across a five-case campaign with a connected narrative. Uniquely, the game integrates with an online database that players must query to research suspects and evidence, blurring the line between board game and alternate reality experience. Its emphasis on realistic deduction, online research, and branching consequences earned it widespread critical acclaim as one of the most innovative mystery games of its era.

