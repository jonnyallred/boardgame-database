description: |
  Mistborn: The Deckbuilding Game is designed by John D. Clair and published by Brotherwise Games in 2024, bringing Brandon Sanderson's blockbuster Mistborn fantasy series to the tabletop. Players control iconic Mistborn characters who "burn" metals to activate powerful allomantic abilities — each metal providing different strengths such as damaging opponents, earning mission points, or manipulating allies. The game supports competitive, cooperative, and solo play modes, with head-to-head battles between Mistborn as well as a campaign mode fighting the Lord Ruler. As a deck builder, players purchase cards during play to progressively improve their decks toward victory through combat or completing missions.

