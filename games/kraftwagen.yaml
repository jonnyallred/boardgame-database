description: |
  Kraftwagen is a 2-4 player rondel action-selection game designed by Matthias Cramer, set in the early days of the automobile industry. Players take on the roles of fledgling car companies, building and selling cars from a shared market while also racing their vehicles in Grand Prix events. The central rondel mechanism governs action selection, with players advancing their pawns around a circular track of actions, choosing how far to move and paying costs accordingly. Players construct cars by combining workers, car bodies, and engines, then either race them for prestige or sell them for profit, balancing technological development against commercial and competitive success.

