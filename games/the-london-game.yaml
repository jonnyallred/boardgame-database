description: |
  The London Game is a 1972 British family board game in which 2-6 players race through the central London Underground network. Each player starts at a mainline terminus (such as Waterloo or Paddington) and must visit six secret tourist locations shown on their Souvenir Cards before returning to their starting station. Movement is determined by a die roll, but players must draw Hazard Cards each time they change tube lines, potentially sending them on detours or forcing them to join other players. The game captures the feel of navigating the London Underground map and is known as a classic piece of British board game nostalgia, with editions published across several decades.

