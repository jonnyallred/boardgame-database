description: |
  Dodo – Rettet das Wackel-Ei is a cooperative children's game by Kosmos in which players work together to safely guide a wobbling egg down a mountain and into a rescue boat before it crashes. Each turn the youngest player pushes the Dodo, sending the egg tumbling unpredictably, while a dice roll reveals which building materials players must quickly find and place to guide the egg safely. Three game variations add replayability. Winner of the German Game Award for Best Children's Game 2021, the game's highlight is its physics-driven wobbling egg that rolls in completely unpredictable ways.

