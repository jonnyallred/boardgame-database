description: |
  The Great Patriotic War: Nazi Germany vs. the Soviet Union is a 1988 GDW board wargame designed
  by Frank Chadwick, simulating the entire German-Soviet conflict of World War II at corps and army
  level. Expanded from Chadwick's earlier Battle for Moscow, the game covers the complete Eastern
  Front from Barbarossa to Berlin as either a series of scenarios or a single campaign game.
  Advanced options allow players to increase the simulation's fidelity. The Eastern Front's scale —
  the largest land conflict in history — makes this a demanding but deeply rewarding operational
  wargame for players who want to grapple with the strategic and logistical challenges faced by
  both Wehrmacht and Red Army commanders.

