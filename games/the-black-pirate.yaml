description: |
  The Black Pirate (Der Schwarze Pirat) is a HABA dexterity game for children designed by Guido
  Hoffman in 2006, in which players blow pirate ships across a beautifully illustrated island-
  strewn sea using a rubber bulb (like a turkey baster). A die determines how many puffs of air
  each player may use on their turn to propel their ship toward treasure-laden islands. Treasure
  tokens are placed on islands at the start of each turn, enticing pirates to navigate their ships
  to collect them. The tactile air-blowing mechanic makes it delightful for young children while
  the unpredictable movement keeps adults entertained.

