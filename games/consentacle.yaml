description: |
  Consentacle is a two-player cooperative card game by NYU Game Center professor Naomi Clark that explores themes of consent, trust, and mutual satisfaction through the metaphor of an intimate encounter between a human and a tentacled alien. Players simultaneously reveal cards attempting to build matching combinations that generate Trust and Satisfaction — the game's currency and victory points — without verbal communication about their hands. The design deliberately subverts typical alien-tentacle media tropes by centering enthusiastic consent and coordination. First shown at the NYU Game Center's No Quarter exhibition in 2014, it won IndiecCade's Best Impact of the Year award in 2015 and was commercially published in 2018 after a successful Kickstarter campaign.

