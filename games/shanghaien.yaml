description: |
  Shanghaien is a dice-and-card game designed by Roman Pelek and Michael Schacht, published by Abacus Spiele in 2008, in which players take turns rolling dice and assigning them to face-up sailor cards to claim a crew of diverse nationalities. Players decide when to stop rolling and "shanghai" their claimed cards, but the scoring is unusual: only the stronger nationality among a pair scores, based on the weaker nationality's value. This inverted scoring mechanism creates clever bluffing decisions and dramatic reversals in what appears to be a simple dice game.

