description: |
  Tigris and Euphrates is widely considered Reiner Knizia's masterpiece, a tile-placement civilization game set at the dawn of Mesopotamian history where players build kingdoms along the rivers Tigris and Euphrates. Each dynasty fields four leader types — king, priest, farmer, and trader — and players earn victory points in all four categories, but the winner is determined by their lowest-scoring category, forcing balanced development and punishing overspecialization. The conflict system, which triggers internal and external wars when leaders collide, creates intense interactive drama that sets it apart from other Euro games of its era.

