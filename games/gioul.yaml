description: |
  Gioul is a traditional tables game of Middle Eastern origin, most common in the Levant, played similarly to Greek Plakoto but with a distinctive doublet mechanic. On rolling a doublet, the player plays the number rolled four times, then the next higher number four times, cascading up until four sixes are played—potentially keeping an opponent off the board for an entire turn. Players move in opposite directions and may not hit or pin opposing pieces, only pass them; the goal is to bear off all fifteen pieces first. Its extreme doublet power creates dramatic swings of momentum absent in standard backgammon variants.

