description: |
  Wall Street Spin is a family-friendly stock market board game published by Funspin around 2004, describing itself as a "fun and educational" introduction to the stock exchange. The game features a unique patented spinner mechanic that drives stock price fluctuations, with players buying and selling shares and trying to profit from market movements. Aimed at ages 10 and up, it is intended to teach basic investment concepts in an accessible, game-show style format. The game was awarded a patent for its distinctive spinner-based stock market simulation.

