description: |
  Button Men is a two-player dice combat game designed by James Ernest and published by Cheapass Games in 1999, winner of the Origins Award for Best Abstract Board Game. Each player chooses a pin-back button (or character card) depicting their fighter's dice loadout — a set of polyhedral dice with unique abilities — and the goal is to capture the opponent's dice through power attacks and skill attacks over the course of three rounds. The game's elegance lies in how different character dice combinations create wildly asymmetric matchups in a game that takes under ten minutes to play.

