description: |
  Critter Commandos is a slapstick sci-fi miniatures wargame published in 1989 by Crunchy Frog Enterprises in which cartoon animal characters battle using comically lethal weapons — glue guns, rubber mallets, pies, jet packs, giant banana peels, and tricycles. Players command squads of funny animal soldiers across tabletop battlefields in scenarios that embrace the absurdity of their premise. The game blends traditional wargame mechanics with humor and cartoon physics, making it a lighthearted entry in the miniatures genre. Designer and publisher Paul Arden Lidberg's company, eventually renamed Team Frog Studios, continued to support the game with supplements and deluxe editions.

