description: |
  Shell Shock! is a 2-player tactical WWII wargame published by Victory Games in 1990, designed as a two-player adaptation of the solitaire game Ambush!. Set in the European theater, players command either Axis (German) or Allied (American, British, or Soviet) squads across six missions with varying objectives, troop compositions, and weather conditions. Players select their squad's men, weapons, and equipment before each mission, and the hex grid tactical combat system emphasizes real-world squad tactics and variable replayability through changing mission parameters.

