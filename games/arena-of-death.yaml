description: |
  Arena of Death is a fantasy combat board game published by Simulations Publications, Inc.
  (SPI) in 1980, originally appearing in Ares Magazine issue #4. Set in the fantasy world
  of DragonQuest, players pit heroic combatants against each other in gladiatorial arena
  combat. The game features tactical individual-scale combat with character abilities
  and equipment choices, capturing the brutality of arena combat in a tight, manageable
  ruleset suitable for quick head-to-head play.

