description: |
  Tito and his Partisan Army: Yugoslavia, 1941–45 is a two-player wargame published by SPI in 1980, originally appearing in issue 81 of the magazine Strategy & Tactics. One player controls Axis occupation forces, the other Tito's Yugoslav Partisans, across 12 Occupation Zones rated by civilian alignment and city control. The asymmetric guerrilla warfare design rewards the Partisan player for spreading pressure across neglected zones, effectively illustrating the dynamics of a resistance war against a conventionally superior enemy.

