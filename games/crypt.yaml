description: |
  Crypt is a light set-collection game for 1–4 players in which the king has died and his children are dispatching servants to the royal crypt to claim his promised heirlooms before burial. Players commit servant dice to desired treasure cards by choosing an effort value, but then must roll—if you roll below your chosen effort, the die (servant) is lost. After everyone places, all dice are rolled simultaneously, creating tense press-your-luck moments as servants succeed or fail at their tasks. The player who collects the most valuable sets of heirlooms wins.

