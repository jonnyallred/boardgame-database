description: |
  Web of Power is a card-driven area control game designed by Michael Schacht and published by Rio Grande Games in 2000, set in 12th century Europe as competing clerical orders place monasteries and advisors to influence kings and cardinals. Players hold three cards each turn, with most offering placement in one of two countries, and must choose carefully between building their network of cloisters and installing advisors in royal courts. The game scores only twice—when the draw pile is exhausted for the first and second time—creating a tight, efficient experience over 55 cards. Its elegant simplicity and meaningful decisions made it a well-regarded filler in the early Euro era.

