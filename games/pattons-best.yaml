description: |
  Patton's Best is a solitaire wargame published by Avalon Hill in 1987 in which the player commands an M4 Sherman tank and crew belonging to George S. Patton's 4th Armored Division in Northern Europe during World War II. Played on an abstract map representing hypothetical territory in Normandy, players manage crew actions and engage in strictly ordered encounter sequences driven by the game's built-in artificial intelligence system. Random encounters, vehicle damage tracking, and crew management combine to create a tense single-player tank simulation. Designed by Bruce Shelley, it stands alongside Ambush! as a classic of the solitaire wargame genre.

