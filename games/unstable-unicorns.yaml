description: |
  Unstable Unicorns is a take-that card game designed and illustrated by Ramy Badie, funded on Kickstarter in 2017 where it became the most-funded card game in crowdfunding history at the time. Players race to be the first to assemble seven unicorns in their stable, using magic cards to protect their own herd and sabotage rivals. The whimsical artwork and frequent player-versus-player interaction give the game a chaotic party atmosphere that belies its deceptively strategic card management. A wide range of themed expansion packs and editions has kept the game popular since its retail release.

