description: |
  Ta-Ke is a two-player abstract strategy game set in feudal Japan, published
  by HUCH! in 2017 and distributed by Rio Grande Games. Players act as rival
  shoguns appointing advisors to the emperor's court, selecting courtiers whose
  skills and influence best suit their strategy. The game revolves around clever
  tile selection and placement, requiring careful observation of your opponent
  and tactical planning ahead. With sessions of around 30 minutes, Ta-Ke
  delivers a focused and elegant two-player contest of wits in a beautifully
  themed package.

