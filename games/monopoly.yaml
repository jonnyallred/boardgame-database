description: |
  Monopoly is one of the world's most famous and commercially successful board games, published by Parker Brothers (now Hasbro) since 1935, derived from Lizzie Magie's The Landlord's Game of 1903. Players move around the board buying properties, building houses and hotels, and collecting rent from opponents who land on their holdings, with the goal of driving all other players to bankruptcy. Chance and Community Chest cards introduce random events, while trading and negotiation between players create dynamic deals. Though widely criticized by game designers for its luck-heavy mechanics and elimination, Monopoly remains a global cultural institution with hundreds of licensed editions.

