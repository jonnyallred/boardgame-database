description: |
  Colosseum puts players in the sandals of Roman impresarios competing to stage the most spectacular events in their arena. Each round players bid in auctions to acquire performers, props, and improvements, then trade assets with rivals to complete the exact lineup their event requires. Running a successful show earns gold and glory while attracting the Emperor and his nobles — each noble present multiplies the spectator count for that session. The game builds to an exciting finale as arenas expand and events grow grander, rewarding both long-term planning and nimble deal-making.

