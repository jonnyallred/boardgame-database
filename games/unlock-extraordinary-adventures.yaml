description: |
  Unlock! Extraordinary Adventures is a box set in Space Cowboys' cooperative escape room card game series, published in 2022. The collection contains three new escape room scenarios played using the card-based Unlock! system combined with the free companion app. Players work together to solve increasingly elaborate card-puzzle combinations within the one-hour time limit, with the app tracking progress and offering hints when needed.

