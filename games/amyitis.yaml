description: |
  Amyitis is a strategy game set in ancient Babylon where players assume the roles of nobles competing to create the most spectacular gardens for Queen Amyitis, the wife of Nebuchadnezzar II. Players recruit priests, engineers, merchants, and farmers—each enabling different actions—to construct garden and irrigation tiles, control temples through area majority, and accumulate victory points. The layered resource management and intricate worker recruitment system earned the game high praise as one of the most thematic and mechanically rich releases from publisher Ystari.

