description: |
  Warriors of God covers the wars between England and France from 1135 to 1453, including both the Lion in Winter scenario and the Hundred Years' War, designed by Makoto Nakajima and developed by Adam Starkweather for Multi-Man Publishing. Players command colorful historical leaders—from Henry V to Charles VI of France to the Welsh rebel Owain Glyn Dwr—through an impulse-based game system that captures both the strategic and tactical elements of medieval warfare. The game won the 2009 Charles S. Roberts Award for Best Pre-WWII Era Board Game. Its accessible rules and evocative period characters make it one of the most celebrated two-player medieval wargames.

