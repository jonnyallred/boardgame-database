description: |
  Simplified Mahjong refers to streamlined rulesets derived from traditional Chinese Mahjong that strip away the most complex scoring categories and special hands, making the game more accessible to new players while retaining the core tile-drawing, set-building, and discarding mechanics. Joseph Park Babcock's 1920 American rules publication was an early formalization of a simplified approach, and numerous simplified variants have since been developed by U3A groups, teaching associations, and game publishers for introductory play. The simplified format retains the satisfying pattern-completion and hand-reading elements that have made Mahjong one of the world's most popular tile games.

