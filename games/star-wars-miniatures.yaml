description: |
  Star Wars Miniatures is a collectible miniatures game published by Wizards of the Coast from 2004 to 2010, based on a simplified d20 system. Players build point-based squads from one of ten factions — including Rebel, Imperial, Republic, Separatist, Mandalorian, and others — then battle across grid maps. Combat uses a d20 roll plus attack bonus versus the defender's defense score, making resolution fast and intuitive. The 34mm pre-painted plastic figures spanning hundreds of characters across the Star Wars saga made the game visually striking and collectible.

