description: |
  Bounty Hunter: Shootout at the Saloon is a 1982 tactical Western gunfight game published by Nova Game Designs, using the same innovative picture-book system as the air combat game Ace of Aces — players resolve combat by simultaneously turning to pages in opposing illustrated books, with each page depicting a scene from the opponent's point of view. Designed by Alfred Leonardi, Joe Angiolillo, and Mike Vitale, the game simulates man-to-man gunfights in an Old West setting without the need for a board or counters. The picture-book mechanic creates an immersive, simultaneous action experience that minimizes downtime and maximizes tension.

