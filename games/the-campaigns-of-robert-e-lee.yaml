description: |
  The Campaigns of Robert E. Lee is a 1988 Clash of Arms Games operational-level wargame designed
  by John Prados, covering ten scenarios across the Eastern theater of the American Civil War from
  Manassas in 1861 through Appomattox in 1865. A distinctive bidding mechanic determines initiative:
  both players secretly bid operation effort points, with the higher bidder taking the first turn
  but spending those points on movement and attacks. Supply management through railroad and wagon
  train tokens adds logistical complexity, and terrain plus die-rolled weather affects movement.
  Each turn represents five days of campaigning. A second edition was published in 1990.

