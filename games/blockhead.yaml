description: |
  Blockhead! is a classic stacking game invented by G.W. "Jerry" D'Arcey in 1952 and
  first published by Saalfield Publishing Company in 1954 with 25 brightly colored
  wooden blocks of various shapes. Players take turns adding a single block to a
  communal tower without toppling it; the player who causes the tower to fall on their
  turn loses. Currently produced by Pressman Toy, the game was voted into Games Magazine's
  Hall of Fame and has remained a staple children's party game for over 70 years.

