description: |
  The Networks is a light-to-medium economic strategy game in which players compete to build the most successful television network by drafting shows, signing stars, and acquiring ad deals. Each season, players draft new shows from a market of sitcoms, dramas, and news programs, then attach stars and advertisements to boost ratings — the primary scoring currency. Shows age and get cancelled over time, forcing players to constantly refresh their lineup while managing a tight budget. The game's witty TV-industry theme, with deliberately cheesy show names and mock advertisements, gives it a humorous personality that balances the strategic optimization. A solo mode and expansion content add replayability for fans of light economic games.

