description: |
  Antler Island is a 2007 family strategy game by Gordon and Fraser Lamont, published by Fragor
  Games, themed around the stag rut on a Scottish island. Three to four players each control a
  stag competing for food, fighting opportunities, and mates across the island's territories.

  The game balances medium-light strategy with accessible rules, offering a quick-start guide for
  easy first plays while providing meaningful decisions for experienced gamers. The unusual theme
  — stags competing in the annual rut — lends the game its distinctive humor and charm, and it
  rewards both tactical fighting and resource management. It was well-received as a unique
  mid-weight family game from a small Scottish publisher.

