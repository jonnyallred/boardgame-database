description: |
  Ulm is a medium-weight euro game for 2–4 players set during the medieval construction of Ulm's famous Gothic cathedral. The core mechanism features a 3×3 action grid where the active player draws an action tile from a bag and pushes it into any row, causing the entire row to shift and one tile to fall off the other end. Players execute the three actions showing in the row after the push, then move their boats along the Danube, control city districts, and compete on the famous Ulm Sparrow track. The push mechanism creates a satisfying puzzle as players try to set up their ideal action sequence while anticipating opponents' moves.

