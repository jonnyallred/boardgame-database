description: |
  Sexy Slang is an adult party game by Icebreaker Entertainment in which two teams race simultaneously to draw the same risqué clue word in line drawing format — no speaking or mime allowed. Both teams' clue-givers receive the same card at the same time, making it a race rather than a sequential game, so there is never any downtime waiting for your turn. The first team to correctly guess their clue-giver's drawing earns a point; the first team to 10 points wins. The all-play structure and adult-themed vocabulary make it a lively icebreaker for adult game nights.

