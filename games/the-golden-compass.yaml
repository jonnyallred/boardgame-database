description: |
  The Golden Compass board game was designed by Francesco Nepitello and Marco Maggi, published
  by Sophisticated Games in 2007 to coincide with the film adaptation of Philip Pullman's novel
  Northern Lights. Players take the role of Lyra Silvertongue as she escapes the Magisterium,
  using an alethiometer with moving hands as the game's centerpiece alongside cards and tokens
  that influence her progress. The mechanics reflect the novel's themes of uncertainty and hidden
  meaning — appropriate to a device that reveals truth to those who know how to read it. The game
  was developed under license from New Line Cinema and designed by the creators of acclaimed Lord
  of the Rings tabletop adaptations.

