description: |
  Pocket Pro Golf is a compact card-based golf simulation game in which 1–4 players play through holes constructed from modular cards representing fairways, rough, hazards, and greens. Players select clubs, account for wind conditions, and choose swing tempo to determine shot outcomes across holes that can represent any real-world golf course layout or be configured randomly. The game's portability — small enough to fit in a golf bag — and its simulation of authentic golf decision-making (club selection, aim, swing tempo) make it a appealing travel game for golf enthusiasts who want a strategic alternative to luck-heavy miniature golf games.

