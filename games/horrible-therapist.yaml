description: |
  Horrible Therapist is an adult party card game designed by Matthew Inman (The Oatmeal) and published by Exploding Kittens in 2024. Players take turns acting as the Therapist, flipping a Question card and selecting an Answer card for the second panel of a therapy comic strip. All other players then secretly choose a Treatment card for the third panel, competing to create the funniest or most unhinged conclusion. The Therapist judges the submissions and awards points, with the first player to three points winning the game.

