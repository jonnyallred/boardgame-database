description: |
  Super Scrabble is an expanded version of the classic Scrabble crossword game, featuring a 21x21 board (versus the standard 15x15) and 200 letter tiles rather than the usual 100, with a modified distribution that creates additional word-forming opportunities. All core Scrabble gameplay rules remain the same — players take turns placing tiles on the board to form words, scoring based on letter values and premium squares — but the larger board makes it better suited for three- and four-player games and rewards broader vocabulary. Published in North America by Winning Moves Games under license from Hasbro.

