description: |
  Mighty Warriors is an adventure board game published by Games Workshop in 1991, set in the Warhammer Fantasy universe. Players explore randomly generated dungeons and battle randomly generated monsters in a dungeon-crawl format. The game allows heroes to level up and acquire equipment as they delve deeper, providing a narrative adventure experience in the classic Warhammer aesthetic of grimdark fantasy. Though less well-known than Games Workshop's more prominent releases, it represents an accessible entry point to the Warhammer Fantasy world.

