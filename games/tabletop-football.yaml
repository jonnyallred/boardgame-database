description: |
  Tabletop football is a family of dexterity games simulating association
  football (soccer) using miniature player figures on a bounded playing surface
  resembling a football pitch. Players flick their weighted or magnetic figure
  bases to strike a small disc or ball toward the opponent's goal, while an
  independently movable goalkeeper piece defends. The best-known commercial brand
  is Subbuteo, created by Peter Adolph in 1947, which became a beloved hobby
  game worldwide. Tabletop football games vary widely in their exact mechanics,
  figure materials, and field dimensions, but share the core challenge of
  skillful flicking and tactical positioning.

