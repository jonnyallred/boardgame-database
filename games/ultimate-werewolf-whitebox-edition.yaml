description: |
  Ultimate Werewolf: Whitebox Edition is a streamlined compact edition of Ted Alspach's popular social deduction game, published by Bezier Games. The Whitebox Edition offers the core Werewolf experience in a smaller, more portable package with a curated set of roles for groups that prefer a cleaner, more focused game compared to the sprawling Ultimate Edition. It maintains the core day/night cycle of elimination, deduction, and deception that defines the series.

