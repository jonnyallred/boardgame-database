description: |
  Vikings Gone Wild is a 2017 deck-building and resource management game designed by Julien Vergonjeanne and published by Lucky Duck Games — their first Kickstarter project. Players build and improve their Viking clan's deck by purchasing permanent buildings, military units, defensive towers, and special cards that enhance their offensive and economic capabilities. The game blends deck-building with tableau construction, rewarding players who chain their card synergies efficiently while competing against rivals for the most prosperous and war-ready clan. Multiple expansion packs and editions have expanded the game since its original release.

