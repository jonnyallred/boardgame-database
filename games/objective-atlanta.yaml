description: |
  Objective: Atlanta is a two-player hex-and-counter wargame published by Battleline Publications in 1977, simulating General William Tecumseh Sherman's Union invasion of Georgia and the campaign to capture Atlanta in May-September 1864. One player commands Sherman's Union forces advancing from Chattanooga, the other the Confederate Army of Tennessee under General Joseph Johnston (and later John Bell Hood). The game uses 400 counters and emphasizes logistics and supply over individual tactical engagements, capturing the slow, grinding nature of the campaign. Critics noted it leaned heavily toward simulation accuracy at the expense of game flow, making it most appealing to historians and dedicated Civil War wargame enthusiasts.

