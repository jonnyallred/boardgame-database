description: |
  De l'Orc pour les Braves (For a Few Orcs More) is a fast-paced fantasy card game for 4-7 players designed by Alan R. Moon and Bruno Faidutti, published by Asmodee in 2003. In the chaotic recruitment phase, players simultaneously scramble to draft army cards featuring orcs, brigands, skeletons, and goblins; in the more measured war phase, players deploy their drafted armies across four rounds of battle, earning victory points for each won engagement. The game blends real-time drafting mayhem with classic hand management, illustrated with humor by French cartoonist Thierry Ségur.

