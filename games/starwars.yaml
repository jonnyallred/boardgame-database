description: |
  Starwars (one word, no license) is a 1977 abstract wargame published by Gamma Two Games, entirely unrelated to the Star Wars franchise. Players command the inhabitants of the Sol and Vega star systems, maneuvering starships to take control of each other's home star system. Despite sharing a nearly identical name with the famous science fiction film released the same year, this is an independent abstract conflict game with its own mechanics.

