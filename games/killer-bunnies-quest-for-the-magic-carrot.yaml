description: |
  Killer Bunnies and the Quest for the Magic Carrot is a non-collectible card game where 2-8 players battle to keep their bunnies alive while eliminating opponents' bunnies with an arsenal of absurd weaponry, magic spells, and dirty tricks. Players acquire Carrot cards throughout the game, and at the end one is revealed as the winning "Magic Carrot" — so even a player battered throughout the game can win if they hold the right carrot. The game is expansive by design, with numerous booster decks adding more chaos, weapons, and bunnies, rewarding players who embrace the anarchic humor over strategic optimization.

