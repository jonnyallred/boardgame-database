description: |
  Thunderstone Advance: Towers of Ruin is the 2012 revised and repackaged edition of AEG's Thunderstone deck-building series, set in a new game world with completely rewritten rules, new art, and over 500 new cards including 11 new heroes, nine monster groups, and 19 village cards. Compatible with all previous Thunderstone sets, the Advance edition streamlines the original game's rules while adding two dungeons simultaneously, familiars that aid players during dungeon delving, and powerful new Thunderstone Bearers guarding each dungeon. Players compete to accumulate the most victory points through defeated monsters, balancing village purchases against dungeon expeditions each turn.

