description: |
  The Decktet is a unique card game system designed by P.D. Magnus in 2008, consisting of a 36-card deck structurally unlike standard poker or tarot decks. Each numbered card belongs to two of the six suits (Moons, Leaves, Suns, Waves, Wyrms, and Knots), and special rank cards have unique properties, enabling a wide variety of games that cannot be played with ordinary decks. Dozens of original games have been published for the Decktet, from trick-taking and set collection to solitaire. It won Card Game of the Year in Games Magazine's 2013 Buyer's Guide and is available as a free print-and-play or low-cost printed deck.

