description: |
  Alquerque is an ancient two-player abstract strategy game thought to have originated in the
  Middle East, with evidence of a board carved into stone at the Egyptian temple of Kurna around
  1400 BC. It is widely considered the parent game of Draughts (Checkers) and Fanorona, played
  on a 5×5 grid of points connected by lines indicating legal movement paths.

  Each player controls 12 pieces and alternates moving to adjacent empty points or capturing
  opponent pieces by jumping over them — mandatory capturing applies, as in modern checkers.
  Rules were recorded in the 13th-century Spanish manuscript Libro de los juegos, commissioned
  by Alfonso X of Castile after the Moors brought the game to Spain. Alquerque stands as one
  of the oldest documented board games still playable today.

