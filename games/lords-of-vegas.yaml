description: |
  Lords of Vegas is a 2010 city-building economic game for 2–6 players by James Ernest and Mike Selinker, set in the era when Las Vegas was being built from the desert floor up. Players develop casino lots on a modular board, using dice rolls to determine which casinos they own and to resolve conflicts when rival casinos expand into adjacent spaces. Owners of the boss die in a casino control it and earn income based on its size and value; players can also gamble against each other to gain chips. Highly interactive and luck-infused, it captures the high-stakes, unpredictable feeling of building a gambling empire.

