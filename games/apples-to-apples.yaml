description: |
  Apples to Apples is a 1999 party card game originally published by Out of the Box Publishing,
  later acquired by Mattel in 2007. Players hold a hand of "red apple" noun cards and take turns
  as the judge, who plays a "green apple" adjective card. Each other player submits the noun from
  their hand they think best matches the adjective, and the judge picks their favorite — subjectively.

  The game's charm lies entirely in the judge's arbitrary and often hilarious decisions, sparking
  laughter and debate about whether "Abraham Lincoln" is more "cuddly" than "puppies." It won
  Mensa Select in 1999 and was named Party Game of the Year by Games magazine. It is widely
  credited as the spiritual predecessor to Cards Against Humanity and defined the subjective
  judge-based party game genre.

