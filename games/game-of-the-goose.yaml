description: |
  Game of the Goose is widely regarded as the first commercially produced board game in history, originating in Italy as early as the 1500s and formally registered in England in 1597. Players race their pieces along a spiral track of 63 spaces by rolling dice, landing on special goose spaces to advance rapidly, or suffering penalties from hazard squares such as the Bridge, Prison, and Skull. The first player to land exactly on space 63 wins. Its elegant simplicity and centuries-long popularity across Europe established the roll-and-move race format that influenced countless later games.

