description: |
  Hydro Battle! is an electronic water battle game published by Pressman in 1999, inspired by the classic Battleship concept but adding a water element. Players fire streams of water at their opponents' naval vessels in a fast-paced, physical version of the naval guessing game. The electronic component tracks hits, making the game self-refereed and adding lights and sounds to the experience.

