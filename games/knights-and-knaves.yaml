description: |
  Knights and Knaves is a deduction-based game inspired by the classic logic puzzle format in which some players (knights) always tell the truth and others (knaves) always lie. Originating from puzzle traditions formalized by Raymond Smullyan in 1978, the game challenges players to determine each other's hidden roles through strategic questioning. Players must use logical reasoning to identify who can be trusted, making it an accessible introduction to formal deductive reasoning through game play. Exact publisher and production details vary by edition.

