description: |
  Starguard! is a 1974 science fiction skirmish miniatures wargame created by Michael Kurtick and Jon McEwan, inspired by Robert A. Heinlein's Starship Troopers and widely recognized as the oldest science fiction skirmish game. Players command small squads of infantry, treaded vehicles, and anti-gravity vehicles from various alien races, each with distinct weapons and organization tables. Combat uses a two-roll system (hit roll, then penetration roll) and "I go, you go" turn sequence, with weapons differentiated by range, blast radius, damage, and special effects. The game has remained continuously in print through seven editions over fifty years.

