description: |
  Tally Ho! is a two-player asymmetric hunting game originally published by
  Spear Spiele in 1973 as Jag und Schlag. One player controls hunters and
  lumberjacks while the other controls foxes and bears — and both sides hunt
  each other simultaneously. All pieces start face-down on the board, and on
  each turn players either flip a tile to reveal it or move a revealed tile.
  Lumberjacks clear forest paths while hunters need clear lines of sight to
  strike. Luck dominates early in the game as hidden information abounds, but
  skill and spatial planning take over as more tiles are revealed. The game
  rewards careful observation and tactical foresight.

