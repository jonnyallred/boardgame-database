description: |
  Specter Ops is a sci-fi hidden movement game of stealth and deduction in which one player secretly controls an A.R.K. agent infiltrating a Raxxon facility, moving in secret and recording their path on a private map while trying to complete objectives and escape. The remaining players control genetically enhanced Raxxon hunters who must deduce the agent's location and eliminate them before the mission succeeds. The agent reveals their position only when passing through a hunter's line of sight, creating cat-and-mouse tension with each turn. Unique agent and hunter characters each have special abilities, providing asymmetric powers that dramatically change strategy. The game is fully compatible with its standalone sequel, Specter Ops: Broken Covenant.

