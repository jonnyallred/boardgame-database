description: |
  The Dragonlords is a 1978 two-player fantasy combat board game from Fantasy Games Unlimited, set
  on the peninsula of Anador where two wizard-emperor nations compete to control three minor
  countries caught between them. Before play each player chooses a wizard class — Sorcerer,
  Enchanter, Illusionist, or Necromancer — which determines which of 33 spells from the rulebook
  they may use. Infantry, missile troops, cavalry, flying units, leaders, ships, and garrison units
  populate the hex-and-counter map in a design similar to Avalon Hill's approach but with a rich
  fantasy magic system layered atop the traditional wargame structure.

