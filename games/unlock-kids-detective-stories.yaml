description: |
  Unlock! Kids: Detective Stories is a child-friendly adaptation of the popular Unlock! escape room card game series, designed for young players aged 6 and up. The box contains three stories with two adventures each, totalling six cooperative mysteries to solve. Unlike the standard Unlock! games, no app is required — the tutorial teaches the game as it is played, making it fully accessible to children. Players explore scenes, combine objects, and follow clues to crack each case before the adventure ends.

