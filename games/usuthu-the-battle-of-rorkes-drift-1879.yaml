description: |
  Usuthu! The Battle Of Rorke's Drift 1879 is a two-player wargame published by Valhalla Games in 1989 that simulates the famous defence of the British garrison at Rorke's Drift during the Anglo-Zulu War. One player commands the British defenders, the other leads the Zulu attackers in this asymmetric historical simulation. Reviewed in Games International magazine, the game was noted as a reasonable blend of atmosphere and historical accuracy, though it is not a quick play. The title references the Zulu battle cry "uSuthu!" used during the assault.

