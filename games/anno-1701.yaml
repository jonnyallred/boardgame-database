description: |
  Anno 1701 is a 2007 colonization board game by Klaus Teuber based on the popular Anno 1701
  computer game, published by Kosmos. Players serve the queen by founding a settlement and
  developing it into a flourishing commercial town — gathering resources locally and trading
  for whatever their island cannot produce.

  Building on similar themes to Teuber's earlier Anno 1503 adaptation, the game emphasizes
  settlement growth, resource chains, and trading as core mechanics. Players balance the
  expansion of their colonial settlement against commercial voyages to secure scarce goods.
  The game adapts the "build an island civilization from scratch" feel of the Anno computer
  game series into an accessible family Euro format.

