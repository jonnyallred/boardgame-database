description: |
  La Vache Amoureuse (The Love-Struck Cow) is a French two-player bluffing and deduction game by Yves Renou and Paille Editions in which each player secretly designates one of their wooden cow pieces as the "vache amoureuse" — the cow secretly in love with the prize bull Marcel. Players move their cows by randomly drawing straws from their opponent's hand; the first to bring their love-struck cow to Marcel's end of the field wins, but the love-struck cow cannot capture others (being blinded by love). Alternatively, a player wins by capturing their opponent's love-struck cow. The hidden identity mechanic and charming wooden components make it a distinctive abstract game.

