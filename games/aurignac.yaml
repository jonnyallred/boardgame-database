description: |
  Aurignac is a light tile-placement game inspired by the prehistoric Aurignacian culture and the cave art of southern France. Players place tiles depicting prehistoric imagery onto a shared tableau, scoring points for completing patterns and connecting related symbols. The game's simple rules and archaeological theme make it an accessible introduction to pattern-based scoring. Published in 2012, it is a modest design suited for family play and those interested in prehistory-themed games.

