description: |
  Macroscope is an image deduction party game published by Mayday Games in 2017. Players take turns rolling dice and removing numbered tokens from the front of the Macroscope device, each removal revealing a bit more of the hidden picture inside. A player can keep revealing tokens to see more of the image or attempt to guess what it depicts — but the fewer tokens remain when a correct guess is made, the more victory points earned. After ten rounds the player with the most points wins. The tactile reveal mechanic and the tension between seeing enough and guessing early make it an engaging family and party game.

