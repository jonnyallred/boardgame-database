description: |
  Bezzerwizzer is a trivia game invented by Jesper Bülow in Denmark in 2006 and published
  by Mattel. The name is a play on "Besserwisser," German for "know-it-all." Players draw
  category tiles at the start of each round and answer trivia questions, with a special
  stealing mechanic allowing players to swap categories and snatch opponents' correct
  answers. With over 5,000 questions across 20 categories, the game combines general
  knowledge with tactical tile-swapping, rewarding both quiz skill and strategic cunning.

