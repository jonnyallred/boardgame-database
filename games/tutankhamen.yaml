description: |
  Tutankhamen is a Reiner Knizia set collection game published in 1993, nominated for the Spiel des Jahres that year. Players move their token along a winding track of Egyptian artifact tiles, collecting sets of matching symbols as the tiles are picked up. The key tension: moving forward uncovers new tiles, but slower players can grab specific tiles still on the track. The player who collects the best combination of matching sets wins. It was later republished by 25th Century Games in 2021 with new artwork by Jacqui Davis.

