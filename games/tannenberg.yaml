description: |
  Tannenberg is a hex-and-counter board wargame simulating the Battle of
  Tannenberg on the Eastern Front during World War I, originally published by
  SPI in 1969. Designed by Jim Dunnigan as a companion to Avalon Hill's 1914,
  the game uses a straightforward alternating turn system in which each game
  turn represents three days of combat. A significantly revised version was
  published in 1978 as a free pull-out game in SPI's Strategy & Tactics
  magazine, featuring updated mechanics including supply lines and headquarters
  rules. Modern versions continue the Der Weltkrieg series tradition of simulating
  World War I Eastern Front operations.

