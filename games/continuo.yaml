description: |
  Continuo is an elegant abstract tile-placement game invented by British designer Maureen Hiron on April Fool's Day 1982. Players take turns placing one of 42 tiles — each divided into a 4×4 grid of colored squares in four colors — adjacent to tiles already on the table, scoring points for every continuous chain of matching color their placement creates or extends. The single rule — place a tile, score the chains — makes it immediately accessible to players of any age, yet the complex, constantly shifting grid of colors rewards forward thinking. It became Britain's top-selling game within six weeks of its launch and was named Game of the Year by the Association of Board and Card Games Master Players in 1982.

