description: |
  Crappy Birthday is a light social party game in which players try to give the Birthday Judge the gift they'll love most — or hate most. Each player chooses a card from their hand of silly, mundane, or outright terrible gift options, and the Birthday Judge reveals and ranks them from most to least desirable. Points go to whoever gave the best-received and worst-received gifts, rewarding both thoughtful knowledge of friends' tastes and deliberate cruelty. Designed by Brian and Amy Weinstock and published by North Star Games, it is explicitly designed to be gifted at parties in lieu of wine, making the packaging itself part of the joke.

