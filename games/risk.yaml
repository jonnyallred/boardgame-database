description: |
  Risk is the iconic world domination board game that introduced strategic conquest to mass-market gaming when Parker Brothers released it in 1959, adapting French filmmaker Albert Lamorisse's "La Conquête du Monde." Players command armies on a political map of Earth divided into 42 territories across six continents, taking turns to attack adjacent territories with dice rolls and fortify their positions. Continents grant bonus armies for control, creating strategic pressure points as players negotiate temporary alliances and betray each other in pursuit of total global domination. As the first mass-produced multiplayer strategy game, Risk established the template for an entire genre of area control wargames and spawned dozens of themed variants and sequels.

