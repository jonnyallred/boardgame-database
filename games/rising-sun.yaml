description: |
  Rising Sun is a feudal Japan-themed area control game in which players command mythological clans competing for dominance across the islands of ancient Japan, using negotiation, betrayal, and strategic alliances as much as military might. Each of three seasonal rounds begins with a political phase in which players form and renegotiate alliances, then a war phase resolves conflicts through a secret bidding mechanic — players split coins across four slots, forcing mind games and bluffing rather than simple force-of-numbers battles. Clan abilities, powerful monster allies recruited through card drafting, and cultural victory points through ritual seppuku create many paths to victory. The game features breathtaking miniatures and is thematically rich in Japanese mythology, making it a visually spectacular and deeply political experience.

