description: |
  Cosmic Wimpout is a counterculture press-your-luck dice game played with five custom dice bearing unique symbols and numeric values. Players roll and score points for 5s, 10s, and triplets (called "Flashes"), then choose whether to keep rolling to accumulate more or bank their points — a classic press-your-luck tension. Rolling and scoring nothing causes a "Wimpout," losing all points for that turn. A distinctive feature is the Guiding Light rule, which allows players to collectively agree to add house rules during play, making each game customizable. First produced in 1976 by C3, Inc., it became a beloved hippie-era dice game sold at Grateful Dead concerts and remains a cult classic.

