description: |
  Santiago de Cuba is an economic trading game for 2–4 players set in Cuba's vibrant second city. Players move through the city visiting characters, collecting goods, and competing to be first to supply cargo ships that arrive at the port with specific demands. A clever dice mechanism determines which character is available to visit each turn, while players must decide whether to use that character themselves or pay to pass and give opponents access. The game's pick-up-and-deliver and set-collection elements combine in a lively, medium-weight package with genuine Caribbean atmosphere and meaningful decisions throughout.

