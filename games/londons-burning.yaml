description: |
  London's Burning is an aerial wargame covering the Battle of Britain in the summer and autumn of 1940, published by Avalon Hill. Players command the RAF Fighter Command defending Britain against waves of Luftwaffe bombers and fighters attempting to destroy British airfields, factories, and radar stations as a prelude to invasion. The game models the daily attrition of aircraft and pilots, the radar network giving early warning of raids, and the strategic decisions about when and where to commit squadrons. It captures the desperate calculus of the Battle of Britain — trading fighter losses against the need to intercept bombers reaching vital targets.

