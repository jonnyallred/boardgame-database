description: |
  Thunder Alley is a 2014 card-driven stock car racing game designed by Jeff and Carla Horger and published by GMT Games for 2-7 players. Each player controls a team of 3-6 cars rather than a single racer, and must maximize the collective performance of their entire team across two distinct race tracks—a tri-oval superspeedway and a tight short track—using cards covering solo movement, drafting, pursuit, and pack leading. The team-management dimension adds a unique strategic layer rare in racing games: sometimes sacrificing one car to boost another scores more points overall. The game was nominated for the 2014 Golden Geek Best Thematic Board Game.

