description: |
  Superpower is a Cold War political and military strategy game published by
  Games Workshop in 1986. Players choose one of six superpowers — including
  the USA, USSR, People's Republic of China, and three regional blocs — and
  compete to control Third World countries through propaganda, coup d'état,
  military intervention, and diplomatic maneuvering. The game uses world
  opinion as a resource, making reckless military action costly, while
  special cards and a roll-and-move track add variability to the geopolitical
  struggle. The winner controls the most Third World nations by game's end.

