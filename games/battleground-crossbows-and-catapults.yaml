description: |
  Crossbows & Catapults (later rebranded as Battleground: Crossbows & Catapults) is a dexterity combat game published by Ideal Toy Company in 1983, in which players build plastic fortresses and man them with warrior figures, then take turns firing discs using spring-loaded plastic crossbows and catapults at each other's armies. Pieces that are knocked down are removed from play, and the player who destroys all opposing warriors wins. Its toy-like components, physical shooting mechanics, and castle-building phase made it enormously popular with children in the 1980s, evoking the fantasy of medieval siege warfare in a tactile and energetic format.

