description: |
  El Capitán is a strategic trading game designed by Wolfgang Kramer and Horst-Rainer Rösner (with some editions crediting Michael Kiesling), published by Z-Man Games in 2007. Players take the roles of 15th-century Mediterranean merchants, sailing between port cities to establish warehouses and fortresses to control trade routes. The game blends area control, resource management, and competitive route-building as players race to dominate the most valuable trading cities while defending their holdings from rivals. El Capitán is a refined reimplementation of the earlier game Tycoon, with expanded rules, additional locations, and the threat of pirate interference.

