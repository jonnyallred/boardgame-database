description: |
  The March on India, 1944 is a historical wargame simulating Operation U-Go, the Imperial Japanese Army's 1944 offensive in Burma aimed at invading India and capturing the key Allied supply base at Imphal and the town of Kohima. Two players command the Japanese forces attempting the bold offensive into British India and the British-Indian forces defending. The battle of Imphal-Kohima was a decisive Allied victory that halted Japanese expansion into South Asia and is often called "the Stalingrad of the East." Details on the specific publisher of this game are limited due to its obscurity as a vintage wargame publication.

