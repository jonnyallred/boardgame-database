description: |
  Steam is a 2009 Martin Wallace train game published by Mayfair Games, a streamlined reworking of Age of Steam after trademark disputes. Players build railroad networks across a modular map, upgrade towns, improve locomotive capabilities, and deliver goods along routes to score points and generate income. Each round, players compete to determine turn order through bidding, then select actions for building and delivering. The core tension lies in balancing income generation against victory point accumulation — spending too freely leaves you unable to compete, while hoarding money loses the race.

