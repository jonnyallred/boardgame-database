description: |
  Dunkirk: The Battle of France is a 1971 hex-and-counter wargame published by Guidon Games and designed by Gary Gygax, simulating Operation Dynamo — the desperate Allied evacuation from the beaches of Dunkirk during the fall of France in World War II. The game is a two-player simulation covering the strategic and operational situation of the German breakthrough and the Allied attempt to extract their forces. As an early Gygax design predating Dungeons & Dragons, it represents a significant artifact of the founder of modern tabletop roleplaying's wargame heritage.

