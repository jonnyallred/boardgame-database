description: |
  Push Puppets are classic novelty toys consisting of small character figures mounted on collapsible platforms — pressing the button on the base causes the figure to collapse comically, and releasing it pops back upright. While primarily a toy, Push Puppets have been incorporated into tabletop game activities where players race to collapse opponents' puppets or compete in dexterity challenges. An enduring piece of mid-20th century toy design, they are listed in board game catalogs as a tactile play item.

