description: |
  Whiskey Settlers (Whisky-Siedler, "Das Wasser des Lebens") is a promotional thematic variant of The Settlers of Catan created in partnership with Glen Grant distillery and released in 1997. The standard Catan rules are unchanged but the setting is relocated to the Scottish Highlands: players build distilleries instead of settlements and cities, gather resources of barley, wood, stone, and peat, and trade over mountain passes instead of harbor routes. The English occupation forces replace the robber mechanic. Originally released exclusively for members of the Kosmos-Siedler-Club, each copy was packaged in a metal tin along with a miniature bottle of Glen Grant Scotch whisky, making it a prized collector's item.

