description: |
  Marco Polo II: In the Service of the Khan is a dice-placement worker-placement game
  and sequel to the acclaimed The Voyages of Marco Polo. Players are emissaries of the
  Great Khan traversing medieval Central Asia, accumulating resources and fulfilling
  contracts across a point-to-point movement map. Each player has a unique asymmetric
  power that fundamentally changes their strategy, while Chinese jade adds new resource
  management wrinkles. The tight action economy, high-variance starting powers, and deep
  interaction between placement spots keep each play fresh and contentious.

