description: |
  Wooden Ships and Iron Men is a naval wargame simulating fleet actions and individual ship combat during the Age of Sail (18th-19th centuries), originally published by Battleline Publications in 1974 and revised by Avalon Hill in 1975. The game includes 23 scenarios covering famous engagements including the Battles of the Saintes, the Nile, and Trafalgar. Players maneuver sailing warships on a hex grid, managing wind, firing broadsides, and boarding enemy vessels using detailed simulation rules. In a 1976 SPI poll it was rated the most popular Avalon Hill title and 7th out of 202 wargames overall.

