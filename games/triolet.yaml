description: |
  Triolet is a numbers tile-placement game published by Gigamic in which players place numbered tiles crossword-style on a board, scoring points when any three intersecting tiles sum to 15. Players place 1, 2, or 3 tiles per turn, earning bonus points when all three are placed simultaneously to form the winning combination. Designed by André Perriolat, the game blends simple arithmetic with spatial puzzle-solving into a quick, accessible family game.

