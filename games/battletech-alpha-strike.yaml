description: |
  BattleTech: Alpha Strike is a fast-playing streamlined miniature wargame variant of the classic BattleTech system, designed for the modern tabletop miniatures wargamer and published by Catalyst Game Labs in 2013. Rather than using detailed Record Sheets for each mech, Alpha Strike uses Unit Cards with abstracted statistics, dramatically speeding up play while retaining the tactical depth of the full BattleTech game. The rules allow for hexless terrain play and are derived from the BattleForce rules. Commander's Edition collected the full revised ruleset into a single comprehensive volume for serious players.

