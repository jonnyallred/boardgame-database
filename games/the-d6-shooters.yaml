description: |
  The d6 Shooters is a solitaire print-and-play dice game set in the American West, in which players lead
  a posse on a 40-day trail journey. Using a Yahtzee-style system, each die face generates a resource:
  ones move the posse along the trail, pairs of twos provide food, triples of threes yield gold, and
  other combinations trigger further actions. Players must balance movement speed against maintaining
  adequate food, ammo, and gold, resolving random trail events along the way. The design strips western
  adventure down to a tense resource-management puzzle requiring only dice and a printed play sheet.

