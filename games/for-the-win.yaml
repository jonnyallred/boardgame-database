description: |
  For The Win is an abstract strategy game in which each player controls ten tiles representing five character types — Monkeys, Zombies, Pirates, Aliens, and Ninjas — and races to connect five or more of their tiles (sides and corners count) with at least one of each character type forming the chain. Each round, players budget five actions that can be spent on placing, moving, shoving, using, or refreshing tiles, and the player who runs out of actions first gives their opponent the remaining actions all at once, creating opportunities for game-winning combos. Its light rules and quick playtime disguise meaningful tactical decisions about action management and positioning.

