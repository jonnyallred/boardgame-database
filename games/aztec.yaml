description: |
  Aztec is a two-player abstract 3D stacking puzzle game designed by Reiner Knizia in which players take turns placing identical L-shaped blocks onto a growing pyramid structure. The challenge lies in the constraint that no block may ever rise above the third level, forcing players to think spatially about where blocks can legally be placed while denying the opponent good positions. The player who successfully places the last block at the third level wins. Its simple rules hide surprising depth, as the 3D structure creates emergent tactical puzzles with each placement.

