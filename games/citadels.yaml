description: |
  Citadels is a card game designed by Bruno Faidutti in which players compete to build the most impressive medieval city by collecting gold and erecting district cards worth different points. Each round players secretly draft a character card—Assassin, Thief, King, Bishop, Merchant, and others—that determines turn order and grants a unique power, creating bluffing and deduction as players try to anticipate which roles rivals have chosen. The game's combination of variable characters, targeted take-that abilities, and city-building set collection earned it a Spiel des Jahres nomination in 2000 and has made it a perennial favorite across multiple editions.

