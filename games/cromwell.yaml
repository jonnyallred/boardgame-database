description: |
  Cromwell is a two-player hex-and-counter wargame published by Simulations Design Corporation (SDC) in 1976 as part of their Pouch series, simulating the English Civil War from 1642 to 1646. One player commands the Royalist forces and the other the Parliamentarians under Oliver Cromwell, maneuvering armies across a map of England to achieve historical objectives. The game offers three levels of play — Introductory, Basic, and Advanced — making it accessible to wargaming novices while still offering depth for experienced players. Designer Dana Lombardy was praised for creating an entry-level wargame that did not sacrifice historical substance.

