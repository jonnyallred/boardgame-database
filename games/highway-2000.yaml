description: |
  Highway 2000 is a near-future vehicle combat game published by Threshold Games in 1981 in which three to five players design heavily armed and armored cars and then fight each other on a futuristic five-lane highway in a battle royale. The three-piece modular board represents a scrolling highway, and as the action moves forward the rear section of the track can be shifted to the front to extend the road endlessly. Players create their vehicles with different weapons and armor configurations, then navigate combat alongside random civilian traffic entering the highway from various directions.

