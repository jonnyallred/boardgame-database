description: |
  The Castles of Tuscany is Stefan Feld's lighter, faster tile-placement game for 2–4 players inspired by the rolling hills and medieval villages of Tuscany. Players take turns taking cards that allow them to place hexagonal region tiles — towns, forests, quarries, vineyards, and castles — into their personal landscape, scoring points through completed areas and collected sets. The game moves faster than Feld's typical fare, with a streamlined structure that emphasizes quick decisions and satisfying tile combos over deep calculation. It captures the aesthetic warmth of the Tuscany countryside in a breezy 45–60 minute experience well-suited for family play.

