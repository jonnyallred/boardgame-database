description: |
  Piranha Pedro is a light programmed movement game in which players guide hapless Pedro across a small island surrounded by piranha-infested waters. Each player holds an identical hand of 12 cards — three cards each for up, down, left, and right, in movement values of 1, 2, and 3 spaces. Players take turns secretly choosing a card to move Pedro, trying to direct him off the board or onto a piranha tile to eliminate rivals. If your card causes Pedro to drown or get eaten, you're out. The shared-hand tension of knowing opponents have the same options you do, combined with simple programming deduction, makes it an award-winning filler that won the Essen Feather in 2005.

