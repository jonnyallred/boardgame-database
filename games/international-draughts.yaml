description: |
  International draughts is the standard form of draughts played on a 10x10 board with 20 pieces per player, governed by the World Draughts Federation. Unlike the English 8x8 version, pieces may capture backward as well as forward, and crowned kings become long-range "flying kings" able to move and capture across multiple squares in any diagonal direction. Players must maximize captures when given the option, adding tactical complexity. Widely played across Europe, Africa, and Asia, International draughts is one of the most deeply studied abstract strategy games and has been the subject of extensive computer analysis.

