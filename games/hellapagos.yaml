description: |
  Hellapagos is a semi-cooperative survival game for 3-12 players from Gigamic, where castaways on a desert island must cooperate to gather resources and build a raft before a hurricane destroys them — but the raft only holds so many. Players initially work together to collect wood, water, and food, but as supplies dwindle they must vote on which survivors to leave behind, transforming cooperation into ruthless social negotiation. The escalating tension between group survival and individual self-preservation, combined with the accessible rules and large player count, makes it a compelling party game experience.

