description: |
  No Thanks! is a brilliantly simple card-and-chip game designed by Thorsten Gimmler, published by Amigo Spiele in 2004. A deck of 33 numbered cards (3–35, with nine randomly removed) is placed face-down; each turn the active player must either take the top card and its accumulated chips or pay a chip to pass. Since you only score the lowest card in each consecutive run, clever play involves knowing when to take a painful card to block an even worse one. The game earned a Spiel des Jahres nomination in 2005 and remains a perfect example of elegant design achieving maximum tension with minimal rules.

