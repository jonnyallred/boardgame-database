description: |
  Diego Drachenzahn is a children's dexterity game designed by Manfred Ludwig, illustrated by Peter Braun, and published by HABA in 2009. Players take turns acting as Dragon Diego, rolling fireballs (balls) toward targets while the other players attempt to guess which target Diego is aiming for. The game won the Kinderspiel des Jahres (Children's Game of the Year) award in 2010, recognizing its accessible mechanics that promote fine motor skills and hand-eye coordination for children aged five and up.

