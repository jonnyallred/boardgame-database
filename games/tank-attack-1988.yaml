description: |
  Tank Attack is a 1988 hybrid board-computer wargame published by CDS
  Microsystems, designed by Stuart P. Middleton with Ake Anderson, Henrik
  Anderson, and Rory C. Green. The game uses a fold-out hex map depicting four
  countries with varied terrain, with players allocated action points each turn
  to move tanks, attack enemy forces, repair units, or defend their headquarters.
  The computer component handles rules adjudication and bookkeeping while the
  physical hex map serves as the game board. Originally released for ZX Spectrum,
  BBC Micro, Commodore 64, and Amiga, it combines the tactile appeal of board
  wargaming with digital convenience.

