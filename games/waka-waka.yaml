description: |
  Waka Waka is a 2012 trading and market game designed by Rüdiger Dorn and published by KOSMOS, set in the same thematic world as Dorn's earlier hit Jambo. Players are African traders buying and selling goods — hides, salt, tea, textiles, jewellery, and fruit — as cheaply as possible on a partially hidden market. Players may send their chimpanzee companion for a closer look at obscured goods before committing to a purchase, and can leverage the special abilities of village characters including the shaman. The game blends light trading mechanics with hidden information for a breezy market-game experience.

