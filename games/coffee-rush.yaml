description: |
  Coffee Rush is a competitive worker-placement game about becoming the greatest barista by fulfilling coffee orders faster than your rivals. Players move their barista pawns around an ingredient board to gather the components needed for each drink order, racing to complete three orders before triggering an upgrade that makes collecting ingredients more efficient. The game ends when all order cards are exhausted or when a player accumulates five penalty cards. With quick turns and an accessible theme, Coffee Rush is a light family game that delivers the frantic energy of a real coffee shop rush in about 30 minutes.

