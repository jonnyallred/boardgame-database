description: |
  Helios is a 2-4 player civilization-building game designed by Martin Kallenborn and Matthias Prinz, published by Hans im Glück in 2014. Players are high priests in a sun-worshipping culture, building personal circular island boards by acquiring and placing hexagonal terrain tiles representing different environments. The central innovation is the sun mechanic — players must spend actions to move the sun around the board, which generates resources only on the lands the sun illuminates, giving the game a unique spatial resource-management layer. Buildings constructed on these tiles provide abilities, mana stones, and victory points, and players must carefully plan their island layouts to maximize solar income and construction efficiency.

