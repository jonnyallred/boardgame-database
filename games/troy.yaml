description: |
  Troy is a two-player board wargame published by Chaosium in 1977 that simulates the legendary siege of Troy. One player defends the city while the other commands the attacking Greek forces, recreating various episodes from the Trojan War saga. Designed and illustrated by Donald Dupont, the game blends historical and mythological themes with tactical wargame mechanics in the tradition of 1970s Chaosium releases.

