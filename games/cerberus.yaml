description: |
  Cerberus is a semi-cooperative card game published by La Boite de Jeu in 2018, set in the Greek underworld where players must work together to escape while each trying to secure one of the limited seats on the barque of Charon. Each card played offers a choice between a small personal effect or a powerful group effect, creating tension between cooperation and self-interest. If caught by Cerberus, a player switches to the monster's side and tries to defeat their former companions. With ten different board layouts and adjustable difficulty, each game offers a different experience.

