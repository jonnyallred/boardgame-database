description: |
  Clash of the Gladiators is a card-based arena combat game in which players assemble teams of gladiators to battle through the trials of the arena. Players build groups of four gladiators each, choosing from distinct fighter types — including shield bearers, spear throwers, net casters, and trident carriers — each with unique effects on combat die rolls. The game delivers fast-playing gladiatorial conflict with tactical card management. Publisher and precise publication year details are limited in available sources.

