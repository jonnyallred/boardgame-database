description: |
  Troyes Dice is a roll-and-write game designed by Sébastien Dujardin, Xavier Georges, and Alain Orban — the creators of Troyes — published by Pearl Games in 2020. Players discover medieval Troyes during a time when society was organized around noble, civil, and religious orders, rolling dice and allocating results to activities in those three spheres. The signature Troyes mechanic of buying dice from others appears in adapted form, and players score for building the cathedral and meeting the needs of the city's citizens. A compact and accessible gateway into the rich Troyes universe.

