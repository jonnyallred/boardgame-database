description: |
  Clubhouse Baseball is a stat-based baseball simulation board game published by Clubhouse Games Inc. in 1989, featuring 624 individual player cards based on actual 1988 Major League Baseball season statistics. The game allows players to act as owner, manager, and coach, making decisions that mirror real-life baseball — from lineup construction to in-game strategy — with each player's performance statistically modeled after their real-world results. Players can replay the 1988 season, play a current season, or create fantasy matchups. It was praised as an accessible entry point for tabletop baseball simulation fans.

