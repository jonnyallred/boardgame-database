description: |
  Statis Pro Baseball is a 1978 Avalon Hill statistical baseball simulation created by Jim Barnes (based on his 1970 design) in which player cards encode the real-world performance of actual MLB players using a formula producing numbers from 11 to 88. Rather than dice, the game uses a deck of Fast Action Cards to generate random outcomes, which are compared against pitcher and batter ratings to determine at-bat results. The system accurately reflects each player's ability — great pitchers have wider PB ranges, great hitters dominate more frequently. New player cards were produced for each season until 1992, making it a perennial with dedicated statisticall-baseball fans.

