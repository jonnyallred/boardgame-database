description: |
  Tuknanavuhpi is a two-player abstract strategy board game played by the Hopi people of Arizona. Traditionally played on etched stone slabs, it resembles draughts and Alquerque in structure. Each player commands 20 pieces placed on a grid with a single vacant center point; pieces are moved and captured by hopping. A distinctive mechanic is "board shrinkage" — as the game progresses and rows are emptied, the playable area contracts, increasing pressure on remaining pieces. The game was documented as early as 1907 in Stewart Culin's landmark ethnographic work on Native American games.

