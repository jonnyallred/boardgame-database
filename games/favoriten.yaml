description: |
  Favoriten is a horse racing and betting game nominated for the Spiel des Jahres 1990 and winner of the Deutscher Spielepreis 1990. Players do not own horses but instead each hold three betting chips, and they take turns rolling a die to advance one of five horses along the track. The key decision each turn is when to place a bet on a horse before rolling, as the payout system rewards the first player to back the winning horse. The tension between wanting information before betting and claiming the best odds before rivals creates an engaging push-and-pull that plays quickly and accessibly.

