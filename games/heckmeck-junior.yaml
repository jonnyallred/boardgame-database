description: |
  Heckmeck Junior is a children's dice game designed by Reiner Knizia for Zoch Verlag, adapted from the Heckmeck/Pickomino family of push-your-luck games for younger players. Children roll dice to collect ingredients for the Mac Heck burger, with the player who gathers the tastiest combination crowned "Worm King of the Day." The game simplifies the core press-your-luck mechanism of the parent game to create an engaging and accessible experience appropriate for ages 5 and up, and was nominated for the Golden Geek Best Children's Board Game award.

