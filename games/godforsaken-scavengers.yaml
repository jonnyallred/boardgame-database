description: |
  Godforsaken Scavengers is a survival adventure card game designed by Tomáš Bachtík and published by Drawblack Games in 2017, originally funded through Kickstarter. Players take on the roles of desperate survivors in a dark and deadly world inspired by Lovecraftian horror, facing an unforgiving dungeon-crawler campaign across five unique game modes with distinct characters. The game features a progressive campaign where choices carry lasting consequences, and its brutal difficulty is a defining feature rather than a flaw. It can be played solo or cooperatively, emphasizing tension, resource management, and narrative dread.

