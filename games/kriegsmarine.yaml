description: |
  Kriegsmarine is a 1980 tactical naval wargame by Simulations Canada (SimCan) simulating Atlantic and Mediterranean surface combat during World War II. Designed by Stephen Newberg with cover art by Rodger B. MacGowan, only 2,000 copies were printed in ziplock bag format. The game is the third in a naval trilogy alongside IJN (1978, Pacific combat) and Torpedo (1979, submarine warfare), all using compatible rules and identically scaled maps. Players command surface fleets in engagements ranging from commerce raiding to fleet actions across the European naval theater.

