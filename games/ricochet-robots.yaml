description: |
  Ricochet Robots is a classic simultaneous puzzle game in which players race to find the fewest-move solution to navigate a robot to its target on a modular warehouse board. Robots slide without stopping until they hit a wall or another robot, creating a uniquely constrained movement system that makes even simple-looking paths into elegant puzzles. All players study the board simultaneously and bid the number of moves they think is required; the player who claims they can do it in the fewest moves must then demonstrate their solution. Its simple rules mask deep spatial reasoning, and the modular board ensures no two games are the same.

