description: |
  MESOS is a compact drafting and set-collection card game set in the ancient world where
  players lead tribes to prosperity. Each round players place their totem pawn on an offer
  track, then in pawn order acquire character or building cards. The placement position
  determines both what you can afford and in what order you choose, creating a simple but
  satisfying bidding tension. Quick to learn and play, MESOS delivers efficient and
  elegant drafting in about 25 minutes.

