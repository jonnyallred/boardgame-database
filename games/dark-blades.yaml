description: |
  Dark Blades is a medieval fantasy board wargame published in 1986 by Standard Games and Publications, using the Cry Havoc rules system and designed as an accessible introductory wargame. Set on the island of Labyrinthia, the game tells the story of the hero Dark Blades and his band of adventurers through included scenarios and maps. The Cry Havoc-derived rules make tactical battlefield movement and combat straightforward for wargame newcomers, and the game received coverage in White Dwarf magazine. A French edition was published as Dragon Noir.

