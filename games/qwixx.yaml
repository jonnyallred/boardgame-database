description: |
  Qwixx is a fast, engaging dice game for 2–5 players in which everyone participates on every single turn, eliminating downtime. Each player has a personal score sheet with four colored rows of numbers; on each turn the active player rolls six dice (two white, four colored), and all players may cross off the sum of the two white dice on any row, while the active player may additionally cross off one colored die plus one white die. Numbers must be marked in ascending order within each row, and crossing off more numbers unlocks higher scores. Qwixx won the 2013 Spiel des Jahres Recommended award and remains one of the best quick roll-and-write games available.

