description: |
  Gimel is an abstract strategy game played on an 8x18 board in which each player commands 24 pieces of three types — horus (large cylinders, worth 6 points), bastets (large triangles, worth 3 points), and scarabs (small round buttons, worth 1 point). Players alternate between placing new pieces anywhere on the empty board or moving existing pieces according to their type's movement restrictions, with the winner determined by the total point value of captured pieces rather than count. The game blends a placement phase and a maneuvering phase in a way that makes long-range planning challenging, as new pieces can appear anywhere at any time.

