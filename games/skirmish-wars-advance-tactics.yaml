description: |
  Skirmish Wars: Advance Tactics is a print-and-play wargame designed by Matthew Kloth, Brandon Pennington, and Andrew Tullsen, published by Print & Play Productions, inspired by Nintendo's Advance Wars video game series. Players start with a headquarters and limited funds, capturing cities to generate income, and spending it to build an army of varied military units across a modular map. The objective is to capture the enemy HQ or destroy all opponent forces — the modular board system creates near-endless scenario variety for a low-cost, highly replayable wargame experience.

