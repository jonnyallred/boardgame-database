description: |
  Bashni (Tower Checkers or Column Checkers) is a Russian variant of checkers in which captured pieces are not removed but instead placed under the capturing piece, forming towers. When a tower is captured, only the top piece is taken and placed under the capturing piece — the lower pieces remain in the tower. The game ends when one player captures all of their opponent's top pieces. The stacking mechanic dramatically changes strategy compared to standard checkers, as a player who is behind can recapture their own pieces by taking an enemy tower. Bashni has been played in Russia for centuries.

