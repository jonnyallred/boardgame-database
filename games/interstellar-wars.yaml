description: |
  Interstellar Wars is a 1982 two-player strategic board game by Attactix simulating conflict between galactic empires. Players compete for control of star systems in a space combat setting with straightforward wargame mechanics. Reviewed as a competent but unexceptional entry in the science fiction wargame genre, it represents the era of small-publisher space wargames that flourished in the early 1980s alongside titles from SPI and Avalon Hill.

