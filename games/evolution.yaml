description: |
  Evolution is a dynamic strategy game where 2-6 players build species and adapt them
  to a constantly changing ecosystem. Players use cards to add traits like horns, camouflage,
  or carnivore status to their species, growing populations and body sizes to compete for
  limited food. Carnivores can attack smaller species, creating a thrilling predator-prey
  dynamic that forces everyone to adapt or face extinction. The emergent ecosystem that
  develops from players' decisions makes every game feel like a unique natural experiment.

