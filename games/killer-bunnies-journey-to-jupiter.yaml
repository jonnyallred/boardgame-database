description: |
  Killer Bunnies and the Journey to Jupiter is the standalone sci-fi sequel to Killer Bunnies and the Quest for the Magic Carrot, taking the chaotic bunny-battling action into outer space. Players venture through the dark depths of space to find the Magic Carrot and deliver it to Jupiter before opponents can stop them, while deploying Beyea aliens, ships, and galaxy-themed weapons across a modular sector board. Like its predecessor, the game combines anarchic card play with a randomly determined winner through the Magic Carrot mechanic, mixing tactical hand management with gleefully uncontrolled randomness.

