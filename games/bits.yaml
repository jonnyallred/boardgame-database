description: |
  Bits is a tile placement board game designed by Monika Gohl and Walter Pepperle,
  published by Ravensburger in 2011. Players place tiles to create patterns or sequences
  on the shared game space, with strategic placement key to scoring points while
  blocking opponents. For 1 to 4 players, the game offers both competitive and solo
  play modes, making it a flexible family abstract that rewards spatial reasoning
  and planning ahead.

