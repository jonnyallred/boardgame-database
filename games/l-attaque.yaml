description: |
  L'Attaque is a 1909 French board game designed by Hermance Edan and patented in November 1908 as "a battle game with mobile pieces on a gameboard." Players deploy 36 pieces each on a 9×10 board, with piece rankings hidden from the opponent until pieces clash — the higher-ranked piece eliminates the lower-ranked. The goal is to capture the opponent's flag. L'Attaque is the direct ancestor of Stratego (1946) and all hidden-information military strategy games of the 20th century. Edan sold English-language rights to H. P. Gibson in the 1920s, helping spread the game internationally.

