description: |
  Pylos is a two-player abstract strategy game published by Gigamic in 1994 in which players take turns placing wooden marbles onto a 4x4 grid base, stacking them into a pyramid shape. Players try to conserve their 15 marbles by cleverly lifting pieces from the base to the top whenever they can form a square of four balls on which to rest a new one. The player who places the final marble at the pyramid's apex wins, making the game a beautiful spatial puzzle of planning and reclamation. Pylos was a MENSA Select game in 1994.

