description: |
  Smartphone Inc. is a competitive economic eurogame for 1–5 players simulating the cutthroat world of smartphone manufacturing and global market competition. Each round, players simultaneously program their decisions using a unique layered card system, setting prices, managing production, investing in research, and expanding their sales network to regions around the world. The simultaneous programming creates delicious tension as everyone reveals at once — price wars erupt, regions get flooded, and carefully laid plans collide. Over five rounds players build their company from a modest operation to a global tech empire, and the most profitable CEO wins.

