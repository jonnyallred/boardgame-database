description: |
  Kensington is a two-player abstract strategy game invented by Brian Taylor and Peter Forbes in 1979, named after London's Kensington Gardens and patterned on its mosaic tiling. The board combines hexagons, squares, and triangles in a rhombitrihexagonal tiling pattern; players take turns placing and then sliding pieces on vertices, aiming to capture hexagons by occupying all six surrounding vertices. Special tactical bonuses trigger when a player controls all points of a triangle (reposition one opponent piece) or square (reposition two). UK Game of the Year winner that earned significant press attention, Kensington is a geometrically rich abstract with simple rules and deep positional strategy.

