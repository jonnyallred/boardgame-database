description: |
  Angry Birds: Knock on Wood is a 2011 dexterity game by Mattel based on the hit mobile app
  franchise. Players draw mission cards showing a specific structure to build using the included
  wooden blocks and pigs, then opponents launch the iconic Angry Birds via a slingshot launcher
  to knock it all down and score points.

  The first player to reach 1,000 points wins. Simple enough for young children yet engaging
  enough for casual family play, the game faithfully recreates the satisfying destruction loop
  of the video game in physical form. It is a licensed product that brought the Angry Birds
  brand to tabletop audiences during the height of the franchise's popularity.

