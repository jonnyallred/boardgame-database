description: |
  Steam Up: A Feast of Dim Sum is a 2023 competitive set-collection and action management game for 2-5 players published by Hot Banana Games. Players compete to gather and enjoy delicious dim sum dishes themed around authentic Chinese cuisine, earning points through clever set collection and timing. The game celebrates dim sum culture with vibrant artwork and won the Barnes & Noble Game of the Year award for 2023. Its light-to-medium weight and food-themed charm make it a welcoming entry point to modern hobby games.

