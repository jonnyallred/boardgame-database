description: |
  Last Will is a worker placement and hand management game set in Victorian England with an absurd premise: your eccentric uncle has left his fortune to whichever relative can spend their inheritance the fastest. Each round, players choose a plan that determines how many actions they can take and how many cards they can play, then race to burn through money by throwing lavish parties, buying up properties, and keeping expensive horses. The interplay between your plan selection and hand management creates meaningful decisions, and the humorous theme gives the engine-burning mechanics a distinctive flavor. Published by Czech Games Edition, it rewards repeated plays as players master more extravagant spending strategies.

