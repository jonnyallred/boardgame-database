description: |
  Kerrunch is a simplified fantasy sports board game published by Games Workshop in 1991, set in the Warhammer universe and inspired by Blood Bowl. Teams of heavily armored Orcs, Dwarfs, Humans, and Elves battle their way across the pitch to score touchdowns, with violence and chaos an integral part of the sport. Designed as a more accessible entry point to the Blood Bowl experience for younger players aged 8 and up, Kerrunch strips away the deeper strategic layers while retaining the anarchic fantasy football spirit of its parent game.

