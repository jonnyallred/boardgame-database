description: |
  Orléans is a bag-building, worker-placement game set in Medieval France in which players assemble a workforce of knights, monks, farmers, traders, and craftsmen by drawing tokens from a personal bag each round to power different actions. The game's central innovation is the bag-building mechanic — analogous to deck building but with physical tokens — as players steadily improve the quality of their bags to reliably access powerful combinations. Actions include recruiting new followers, moving a merchant figure along trade routes, building trading stations, and advancing along a development track across multiple scoring dimensions. Widely considered one of the finest examples of the bag-building genre ever designed, Orléans rewards thoughtful long-term planning and adaptability.

