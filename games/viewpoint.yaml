description: |
  Viewpoint is a card game designed by Sean Carroll and published by 93 Made Games, first released at Gen Con Oz in September 2009. The game uses specially printed cards whose themes are all built around wordplay and visual concepts related to sight and perspective — cards such as "Spectacles," "Eye Spy," and "Blind Freddie." It was later reimplemented as Viewpoint Revisioned, the first entry in the "Viewniverse" episodic card game series. The original Australian release is a compact and playful filler game suited to casual groups.

