description: |
  Rommel's Panzers is a two-player hex-and-counter wargame published by Metagaming Concepts in 1980, simulating the North Africa campaign between the German Afrika Korps and British forces in 1941-1942. Designed by Roger Damon, it was the first historical game published by Metagaming and the first in their MicroHistory series of five compact wargames. The game uses a small map and streamlined rules to capture the sweeping armored warfare of the Western Desert campaign, emphasizing mobile tank warfare and the supply challenges that defined the theater. Despite its compact MicroGame format, it delivers a satisfying tactical experience of desert warfare within an accessible ruleset.

