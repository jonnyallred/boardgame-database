description: |
  Toledo is a light strategy game by Martin Wallace published by Mayfair Games, set in the Spanish city famous for its master swordsmithing. Players use cards as movement randomizers to advance pieces through the city's streets — from the cathedral to the Alcazar — collecting materials to forge sword collections for their liege lord. Described as Wallace's take on Backgammon, the game combines risk-taking with set collection in a family-accessible format that offers more depth than typical family games.

