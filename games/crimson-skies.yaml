description: |
  Crimson Skies is a dieselpunk aerial combat board game set in an alternate 1930s America where the country has fragmented into independent nations and air piracy is rampant. Players command squads of colorfully stylized fighter planes, plotting simultaneous movement on flight sheets before revealing and executing maneuvers. The damage system uses FASA's box-filling method, tracking individual weapon hits across different aircraft systems. Winner of two 1999 Origins Awards for Best Science Fiction/Fantasy Board Game and Best Graphic Presentation, it spawned a detailed shared world of fiction and a beloved Xbox video game. The physical board game never achieved a large player base due to its complexity, but has a devoted cult following.

