description: |
  Forum Trajanum is a 2-4 player tile-laying and resource management game by Stefan Feld set in ancient Rome, published in 2018. Each player governs a Colonia founded by Emperor Trajan, developing their city while also contributing to the grand construction of Trajan's Forum in the center of the board. The core mechanic involves selecting resources at the start of each round from a shared grid, then deploying workers and placing tiles to construct buildings, gain bonuses, and fulfill the emperor's requirements. Over twelve rounds — with two mid-game scoring phases — players score across a variety of categories in the classic Feld multi-path style. The game features an assistant mechanic and a tribune figure that give players meaningful tools to mitigate the randomness of resource selection.

