description: |
  Monopoly: Animal Crossing is a licensed edition of Monopoly published by Hasbro in 2021, based on Nintendo's beloved Animal Crossing: New Horizons video game. The board features islands, villagers, and landmarks from the game, with players buying and developing properties themed around the Animal Crossing universe. Custom tokens represent iconic characters and items from the series, while event cards replace the traditional Community Chest and Chance decks with Animal Crossing-themed surprises. The game appeals to both Animal Crossing fans and Monopoly players alike.

