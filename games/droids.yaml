description: |
  Droids is a science fiction board game in which players program and pilot robots around a board, attempting to eliminate their opponents' robots. Orders for robot movement and actions are given through programming tiles placed on each player's programming board before execution, creating the simultaneous reveal typical of programmed-movement games. Players must anticipate where opponents will move to outmaneuver and destroy rival robots. Limited documentation is available in English-language sources for this title beyond the core programmed-movement mechanic.

