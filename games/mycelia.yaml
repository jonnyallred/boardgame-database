description: |
  Mycelia is a tactical tile-placement game designed and illustrated by J.J. Neville, published by Split Stone Games in 2023. Players guide the lifecycle of fungi through six possible actions per turn — move, spore, explore, fruit, discover, and decay — placing mushroom tiles to grow their mycelial network across a shared board. The artwork features botanically accurate depictions of over 69 real mushroom species, creating an educational dimension alongside the gameplay. Scoring rewards players for fruiting mushrooms, expanding their network, and using decay actions to unlock powerful special effects, resulting in a medium-weight game with strong thematic integration.

