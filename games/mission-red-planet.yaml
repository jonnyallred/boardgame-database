description: |
  Mission: Red Planet is a steampunk-themed area control game designed by Bruno Cathala and Bruno Faidutti, originally published by Matagot in 2005. Players control Victorian-era mining corporations racing to exploit the mineral ores and ice deposits of Mars. On each round, all players simultaneously choose one of nine astronaut role cards that dictate special actions and launch order, sending rockets and personnel to colonize Martian territories. Controlling the most resource-rich zones at game end determines victory. The game is celebrated for its elegant simultaneous action selection combined with tense area majority scoring.

