description: |
  Richthofen's War: The Air War 1916-1918 is a two-player Avalon Hill wargame simulating aerial dogfighting during World War I, with one player commanding German aircraft and the other controlling Allied planes. Named for the legendary Red Baron Manfred von Richthofen, the game captures the tactics and dangers of early aerial combat through a hex-based movement system and combat resolution. At the time of its release in 1972, it was recognized as an improvement over its contemporaries Flying Circus and Fight in the Skies in its aerial combat simulation fidelity. The game remains a classic of the hex-and-counter wargaming genre and an important piece of World War I gaming history.

