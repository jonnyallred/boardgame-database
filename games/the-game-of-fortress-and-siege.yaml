description: |
  The game of fortress and siege (also known as Asalto or Belagerungsspiel) is a two-player abstract
  strategy game appearing in Germany as early as 1803, related to the older Fox & Geese family of hunt
  games. One player defends a fortress with two powerful officer pieces in the corner of the board, while
  the other player commands a large force of foot soldiers attempting to capture or overwhelm the fortress.
  The asymmetric piece powers — officers can move freely, soldiers are more restricted — create a tense
  cat-and-mouse dynamic. The game was popular throughout the Victorian era in England and Germany and
  remains one of the clearest early examples of asymmetric abstract gameplay.

