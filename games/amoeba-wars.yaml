description: |
  Amoeba Wars is a 1981 science fiction area control game published by Avalon Hill, set in a
  galactic empire fallen to civil war and alien infestation. Players direct fleets of ships to
  capture solar systems, push back rampaging amoeba creatures and renegade doomsday machines —
  relics of the old empire — while racing to retake Saestor, the former capital at the center of
  the board.

  The game blends elements of Risk-style territorial conquest with Cosmic Encounter-inspired chaos,
  as the neutral amoeba threat complicates every player's plans. Reviewers noted its mix of
  strategic fleet management and unpredictable monster behavior, creating a tense multi-front
  conflict. Amoeba Wars occupies a notable place in early sci-fi wargame history as an Avalon Hill
  entry into the space conquest genre.

