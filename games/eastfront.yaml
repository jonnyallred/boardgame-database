description: |
  EastFront: The War in Russia 1941-45 is a block wargame designed by Craig Besinque and Tom Dalgliesh, published by Columbia Games. The game simulates the brutal conflict between Germany and the Soviet Union during World War II using Columbia Games' signature wooden block system, which creates a "fog of war" effect as players cannot see the strength of enemy units until combat. Players command large-scale armies across the Eastern Front in a game that combines operational flexibility with strategic depth. EastFront II is a revised and expanded second edition of this classic wargame.

