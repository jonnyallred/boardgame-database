description: |
  Havana is a light simultaneous-action resource management game designed by Reinhard Staupe, framed as a spiritual sequel to the board game Cuba using Michael Menzel's atmospheric artwork. Each player has an identical deck of 13 cards from which two are played face-down each round; the numerical combination of the cards (e.g., 3 and 4 yielding 34) determines turn order, so the player who acts first risks acting on less information. Players use their card actions to gather materials and construct buildings, with thoughtful card selection creating surprising depth for such an accessible game.

