description: |
  Suomi Tietopeli is a 2003 Finnish trivia board game published by Tactic Games covering Finnish culture, history, and geography. A distinctive feature is the built-in handicap system — all players answer the same questions simultaneously, but players with less knowledge receive compensation to keep the game competitive and accessible to mixed groups. Published by the major Finnish game publisher Tactic Games, it targets the domestic Finnish market and serves as a cultural knowledge game in the tradition of family trivia games popular throughout Scandinavia.

