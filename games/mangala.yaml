description: |
  Mangala is a traditional Turkish mancala game with roots tracing back to 16th-century Ottoman miniatures, first formally described in writing by British orientalist Thomas Hyde in 1694. Played on a 2x6 or 2x7 board, players sow pieces counterclockwise from their pits, capturing groups of two or three from the opponent's side. The game is closely related to mancala variants played across the Middle East and North Africa and has been recognized by UNESCO as part of Turkey's intangible cultural heritage. Its elegant simplicity conceals substantial strategic depth, making it a beloved folk game that endures across generations.

