description: |
  Lourche (also called Lurch or Lurche) is a historical European dice and racing game popular from the 15th through 17th centuries, particularly in German-speaking lands. Played on a cross-shaped board similar to Pachisi and Ludo, players race pieces around the track using dice rolls, with the distinctive "lurch" rule that can dramatically set back players under certain conditions — the origin of the English phrase "left in the lurch." Multiple players could participate, and blocking and bypassing opponents added tactical interest. The game largely disappeared by the 18th century but has been reconstructed by historians of historical games from period documents and game boards.

