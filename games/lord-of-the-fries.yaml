description: |
  Lord of the Fries is a fast and funny card game set in "Friedey's: The Fast Food Restaurant of the Damned," where zombie employees attempt to fill customer orders from a hand of random ingredient cards. Each round a customer orders a dish, and the first player who can assemble the right combination of ingredients from their hand scores points while discarding those cards — but unplayed cards count against you at the end. Published by Cheapass Games in 1998 with its signature minimal-component philosophy, it's part of James Ernest's Fast-Food Zombie game series and remains a beloved cult game for its absurd humor and quick play.

