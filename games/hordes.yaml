description: |
  Hordes is a 30mm tabletop miniature wargame designed by Jason Soles and Matt Wilson, published by Privateer Press in 2006 as a companion game to their flagship Warmachine system. Players command warlocks and their warbeasts—powerful fantasy monsters from various savage factions—in tactical skirmishes, with the key distinction that warbeasts generate fury rather than the focus used by Warmachine warcasters. Fully cross-compatible with Warmachine, Hordes won the 2006 Origins Award for Miniatures Game or Expansion of the Year and remains an active competitive miniatures game system.

