description: |
  One Deck Dungeon is a cooperative dungeon-crawling card game for 1–2 players that fits an entire fantasy roguelite experience into a single deck. Players choose a hero, then descend through a dungeon by flipping encounter cards and rolling dice to defeat monsters, avoid traps, and collect loot. Each card serves multiple functions: as an encounter to overcome, as experience points to level up, as a skill or potion, or as a stat-boosting item — creating remarkable versatility from minimal components. The game emulates the tension and escalating difficulty of a video game roguelike in a compact, fast-playing format with strong solo appeal.

