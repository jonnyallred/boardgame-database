description: |
  Tracks to Telluride is a historical railroad game set in southwestern Colorado during the mining boom of 1873–1888, developed by John Bohrer. Players race to build rail lines to unconnected mining towns, paying different rates for narrow- versus standard-gauge track and for tunnels through terrain, while servicing mines along completed routes. The game captures the competitive era of American railroad expansion through a regional lens, rewarding efficient route planning and tactical timing of builds.

