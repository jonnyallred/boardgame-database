description: |
  Disney Villainous is a competitive asymmetric strategy game for 2–6 players in which each player takes the role of a classic Disney villain—including Captain Hook, Maleficent, Jafar, Ursula, the Queen of Hearts, and Prince John—each with a unique game board and win condition. On their turn, players move their villain to a location and take available actions such as gaining power, playing cards, or defeating heroes. Crucially, players can play Fate cards from opponents' decks, sending heroes and obstacles to thwart their plans. The 2019 TOTY Game of the Year Award winner, it launched a prolific line of expansions and standalone games.

