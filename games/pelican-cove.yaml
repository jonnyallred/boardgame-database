description: |
  Pelican Cove is a fast-paced spatial puzzle game in which players race against a sand timer to arrange eight plastic pelican figures on their individual boards according to a set of placement rules. Each round presents new configuration rules that determine where each colored pelican must or must not sit, and players must figure out a valid arrangement before time runs out. Over six rounds, players accumulate penalty stones for failed arrangements, and the player with the fewest penalties wins. Published by SimplyFun and KOSMOS, the game combines logical deduction and spatial reasoning in a quick, accessible format that works well as an educational game.

