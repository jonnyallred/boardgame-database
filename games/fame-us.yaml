description: |
  Fame Us is a party social deduction game in which each player starts with six descriptor cards bearing traits such as "tall," "blonde," "actor," "politician," or "mustachioed." On each turn, a player may play a card to the center of the table while holding a famous person in mind who matches all accumulated descriptors, pass to draw a new card, or challenge the previous player to name someone fitting the description. To maintain honesty in voting, each player is secretly assigned to one of two teams — "The VIP Table" or "The King on the Dance Floor" — adding a hidden social element to the naming and bluffing dynamics.

