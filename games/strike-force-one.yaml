description: |
  Strike Force One is a 1975 SPI wargame designed as an introductory gateway to the hex-and-counter wargaming hobby, originally given away as a free promotional item. Set in a hypothetical 1975 clash in West Germany, one player controls a Soviet invasion force, the other American defenders, on a compact 8x9 hex map. With only 10 counters and a simple "I Go, You Go" system, the game teaches movement, zones of control, basic combat, retreat, and advancement in a tight four-turn format. The Soviet player must occupy two of three town hexes to win — otherwise the Americans prevail.

