description: |
  Word on the Street Junior is the family-friendly adaptation of Word on the Street, designed for players ages 8 and up. Like the original, teams compete to slide letter tiles off the board by shouting out words that fit given categories within a time limit — but the Junior edition features the complete alphabet (rather than only 17 consonants) and uses age-appropriate categories that make it more accessible for younger players. The tug-of-war letter mechanic remains intact, making it equally energetic and fun for family game nights.

