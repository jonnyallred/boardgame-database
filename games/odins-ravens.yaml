description: |
  Odin's Ravens is a fast two-player card game rooted in Norse mythology in which players each race one of Odin's ravens — Huginn and Muninn — across a landscape track of domino-style terrain cards in opposite directions. Players play terrain cards from their hands to advance their raven by matching the land type in front of it, racing to return to Odin first with the day's news. Loki cards (called Odin cards in some editions) offer special actions such as rearranging the landscape or hindering the opponent's raven, injecting clever tactical options into an otherwise brisk racing game. Originally released in 2002 and beautifully redesigned by Osprey Games with new artwork by Johan Egerkrans, it remains a beloved two-player filler.

