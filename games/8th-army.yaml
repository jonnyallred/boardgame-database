description: |
  8th Army is a 1982 introductory hex-and-counter wargame simulating the North African campaign of World War II between Allied and Axis forces. One player commands the British 8th Army while the other controls the Axis forces, maneuvering across a large hex grid map with a supplementary mini-map representing Mediterranean supply convoys and air movements. The game is designed to be accessible to new wargamers, offering a streamlined ruleset while still capturing the operational feel of the desert war.

