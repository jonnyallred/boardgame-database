description: |
  Awithlaknakwe is a traditional strategy game of the Zuñi people of the American Southwest, documented by ethnographer Stewart Culin in his landmark 1907 study "Games of the North American Indians." Played on a board with a specific geometric pattern, players move pieces and attempt to capture opponent pieces or reach specific positions. The game represents one of the sophisticated board games played by indigenous North American peoples long before European contact, and stands as a historical artifact of pre-Columbian gaming tradition. The rules have been reconstructed primarily from Culin's ethnographic observations.

