description: |
  Qi is an abstract strategy tile-placement game in which players build patterns by
  placing and manipulating tiles on a shared board. Players score points by forming
  lines or clusters of matching symbols, with the tension building as the board fills
  and options become constrained. The game's name references the Chinese concept of
  life energy, reflected in its flowing, interconnected scoring patterns.

