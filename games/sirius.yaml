description: |
  Sirius (also published as Galax) is a 2-player abstract strategy game designed by Martial Tramond and published by Bütehorn Spiele in 1976. Players maneuver pieces of three different types, each able to capture one type of opponent's piece but vulnerable to a third, creating a rock-paper-scissors-style hierarchy of combat. The game ends when all pieces of one faction are eliminated, and the interlocking capture relationships create tactical depth from a deceptively simple rule set.

