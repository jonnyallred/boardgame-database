description: |
  Gregory Horror Show is a board game based on the Japanese CGI anime series of the same name, which was later adapted into a survival horror PlayStation 2 game by Capcom. Players navigate the strange and sinister hotel run by Gregory, collecting souls from unusual guests and avoiding the hotel's many supernatural hazards. The game comes with a board, figures, tokens, and cards, translating the anime's unique blend of dark humor and horror into tabletop form. It remains a niche collectible for fans of the anime series and early 2000s Japanese horror aesthetics.

