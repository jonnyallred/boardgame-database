description: |
  Victory in Normandy is a two-player hex-and-counter wargame covering the Allied liberation campaign in France following the D-Day landings of June 1944. Published by XTR and listed in wargaming reference databases such as Grognard.com, the game simulates operational-level combat on the Normandy front. Specific designer and publication year information is not well-documented in English-language sources; details are primarily available in specialist wargaming archives. Players command Allied or German forces as they fight for control of the crucial Normandy beachhead and breakout.

