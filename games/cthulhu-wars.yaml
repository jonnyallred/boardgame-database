description: |
  Cthulhu Wars is a massive asymmetric area control game in which players each command one of H.P. Lovecraft's Great Old Ones — Cthulhu, Crawling Chaos, Black Goat, or Yellow Sign — vying for dominance over Earth at the end of time. Each faction has a completely unique set of units, spellbooks, and special abilities that unlock as the game progresses, ensuring no two factions play alike and demanding different strategies. Players spend Power each round to move monsters, summon gates, cast spells, and unlock new powers, racing to earn enough Doom points before opponents do. The game features enormous, detailed miniatures for each faction's monsters and Great Old One, making it a visually spectacular presence on the table. Combat is swift and decisive, keeping the game moving despite the epic scale.

