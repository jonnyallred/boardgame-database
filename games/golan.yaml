description: |
  Golan is an operational-level hex-and-counter wargame designed by Irad B. Hardy with graphic design by Redmond A. Simonsen, published by Simulations Publications Inc. (SPI) in 1975. The game simulates ground combat between Syrian and Israeli forces on the Golan Heights during the 1973 Yom Kippur War, originally packaged as part of SPI's Modern Battles quadrigame alongside Chinese Farm, Wurzburg, and Mukden. Players command armored and infantry units in a fast-moving operational scenario that captured the lightning pace of the actual 1973 campaign; it ranked an impressive 33rd out of 202 games in SPI's 1976 popularity poll.

