description: |
  Khôra: Rise of an Empire is a 2021 dice-driven civilization builder for 2-4 players set in ancient Greece, where each player develops their city-state across Economy, Culture, and Military tracks. On each turn, players simultaneously roll dice and then select two of seven available actions — Philosophy, Legislation, Culture, Trade, Military, Politics, or Development — adapting their strategy to both their dice results and opponents' choices. The game packages a surprisingly deep mid-weight euro into a compact 60-90 minute window, earning a Kennerspiel des Jahres recommendation and praise for its elegant system of action scaling with track advancement.

