description: |
  Hickory Dickory is a worker rotation scavenger hunt game published by Plaid Hat Games in 2023, supporting one to four players. Players take on the roles of mice scrambling up a grandfather clock to collect treasures during the brief moments when the sleeping cat is not watching. The game uses a worker rotation mechanism in which mice placed on the clock face move each round like the hands of a clock, creating a dynamic planning puzzle. Set collection and tile placement combine to reward clever routing and timing in this family-weight cooperative experience.

