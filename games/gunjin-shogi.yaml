description: |
  Gunjin Shōgi is a Japanese two-player abstract strategy game dating to at least 1895, functioning as a children's military chess variant similar to Stratego and the earlier French game L'Attaque. Players set up pieces face-down — ranked by military officer hierarchy including generals, spies, mines, and engineers — and must deduce the enemy's hidden forces through battle encounters resolved by a referee, as pieces remain face-down throughout. The object is to capture the opponent's flag; a weak spy can capture the most powerful general, and mines destroy all but the engineers sent to defuse them. The pentagonal pieces echo the shape of Shōgi pieces, but the gameplay is entirely distinct.

