description: |
  Go Cuckoo! is a dexterity nest-building game designed by Josep M. Allué and Viktor Bautista i Roca, published by HABA in 2016. Players draw sticks one at a time and weave them into a precarious nest atop a wooden base, following color-matching rules for which stick to draw next. Once a player places all their eggs in the nest, they attempt on their next turn to perch the oversized wooden cuckoo on the structure—the first to do so successfully wins. Deceptively simple for children but surprisingly entertaining for adults, its charm lies in the wobbling tension of each carefully placed stick.

