description: |
  The Checkered Game of Life is the 1861 board game that launched the Milton Bradley Company and
  became the direct ancestor of the modern Game of Life. Played on an eight-by-eight checkerboard
  grid, players travel from Infancy to Happy Old Age, accumulating points by landing on virtuous
  squares (Honor, Truth, Temperance) while avoiding vice squares (Idleness, Crime, Ruin). A spinner
  replaced dice to avoid associations with gambling. The game sold over 45,000 copies in its first
  year and was revolutionary for framing success in secular, achievement-based terms rather than
  purely religious or moral ones — a distinctly American vision of life as a meritocratic race toward
  respectable prosperity.

