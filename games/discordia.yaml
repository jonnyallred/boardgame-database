description: |
  Discordia is a dice-driven city-building game set in ancient Roman times where players
  develop their own city by constructing farms, barracks, defenses, harbors, and markets.
  Each round players roll dice and use them to take actions, competing to build the most
  prosperous settlement through trading and resource management. The game features variable
  player powers and a sudden-death ending, rewarding players who balance expansion against
  defense and commerce.

