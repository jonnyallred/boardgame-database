description: |
  D-Day: The Great Crusade is a regimental-scale hex-and-counter wargame designed by Danny Holte, simulating the Allied invasion of Normandy from June 6 to July 6, 1944. Two 22x34" maps depict the Normandy peninsula at 1.5 km per hex with 1-day turns, and 480 die-cut counters represent the formations that fought in Operation Overlord. The game includes air support, naval bombardment, weather, bridge destruction, interdiction, and replacements, offering moderate complexity across five scenarios including the full campaign game. Playable solo or by 2-4 players, it provides a thorough operational look at the decisive first month of the Western Front's liberation.

