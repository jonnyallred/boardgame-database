description: |
  Lanterns: The Harvest Festival is a 2015 tile-placement and set-collection game by Christopher Chung, published by Renegade Game Studios, set in imperial China where artisans decorate the palace lake with floating lanterns before the harvest festival begins. When a player places a lake tile, all players — including opponents — receive lantern cards corresponding to the colors on the sides of the tile facing them, creating an interactive distribution mechanism. Players then dedicate sets of lantern cards to earn honor tokens, with larger and rarer color sets yielding more points. A 2015 Mensa Select winner, it offers an elegant, colorful, and low-conflict experience ideal for families and new gamers.

