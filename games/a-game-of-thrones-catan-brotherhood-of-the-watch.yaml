# Description
description: |
  A Game of Thrones-themed variant of the classic Settlers of Catan, designed by
  Klaus and Benjamin Teuber. Players join the Night's Watch as brothers defending
  the Wall against Wildling incursions. The familiar Catan resource-gathering and
  settlement-building mechanics are present, but each player takes on an asymmetric
  Night's Watch hero role with a special ability. Wildling threat advances across
  the board, requiring players to collaborate on defense while also competing for
  resources and settlements. The game is set in the Gift and along the Wall from
  George R.R. Martin's A Song of Ice and Fire series.

