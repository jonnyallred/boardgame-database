description: |
  Starship Troopers is a 1976 Avalon Hill hex wargame designed by Randall C. Reed, based on Robert A. Heinlein's novel. One player controls the Mobile Infantry assaulting Arachnid-controlled planets, while the other secretly plots bug-hive and tunnel systems on a paper map overlay. Using a programmed instruction approach, the game introduces concepts through escalating scenarios — from basic MI raids to the climactic assault on Klendathu. The hidden asymmetric map and gradual rule introduction were innovative design elements. The game received a Charles Roberts Award nomination for Best Tactical Game of 1976.

