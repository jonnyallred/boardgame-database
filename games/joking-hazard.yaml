description: |
  Joking Hazard is an adult party card game created by the team behind the Cyanide & Happiness webcomic, in which players compete to build the funniest three-panel comic strip. A random first panel is drawn from the deck, a judge plays the second panel, and all other players compete to provide the best punchline. With over 360 illustrated comic cards combining into millions of scenarios, the game thrives on absurdist humor and the creative mashup of its panels. It is best enjoyed by groups comfortable with dark and irreverent comedy.

