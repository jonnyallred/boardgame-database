description: |
  Castle Risk is a 1986 Parker Brothers variant of the classic Risk formula, set on a map of 18th-century Europe rather than the traditional world map. Each player controls an empire with a secret capital city — losing the capital eliminates that player — and competes to conquer castles across 18 European territories. New card types including Spy, General, Marshal, Diplomat, and Admiral add tactical nuance beyond standard Risk. Despite being a financial disappointment at launch, Castle Risk offers a more focused and faster-ending experience than the base game by tying elimination to capital control.

