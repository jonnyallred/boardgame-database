description: |
  Wabash Cannonball is a 2007 economic railway game designed by John Bohrer, published by Rio Grande Games. Set in Robber Baron-era 1830s America, players compete to build and profit from the great eastern railroads — the Pennsylvania, the Baltimore & Ohio, the Chesapeake & Ohio, and the New York Central. The game contains no luck or randomness whatsoever; every decision is purely strategic, creating a tense battle of investment, network building, and market manipulation. Its short playtime and high strategic density have made it a beloved gateway to the 18xx family of train games.

