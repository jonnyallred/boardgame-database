description: |
  Mixmo is a fast-paced French word game designed by Julien Faubet and Sylvain Hatesse, published by Cocktail Games and distributed by Asmodee. Players each pick six letter tokens and race to arrange all their letters into interlocking crossword-style words in front of them as quickly as possible. The first player to successfully place all their letters wins the round. The game has a Bananagrams-like spirit but tailored for French-language play, making it a quick and portable filler for word game enthusiasts.

