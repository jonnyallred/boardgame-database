description: |
  La'b Madjnuni ("Crazy Game") is a traditional Syrian mancala game related to the Egyptian game L'ab al-Ghashim. Played on a 2×6 board with two stores, players use cowrie shells or pebbles as pieces, sowing them around the pits in the traditional mancala manner. The "crazy" moniker likely refers to the game's unpredictable or chaotic play patterns compared to more orderly mancala variants. As a traditional game from the Levant, it represents the rich mancala heritage of the Arabic-speaking world and the regional variations that developed across the Middle East and North Africa.

