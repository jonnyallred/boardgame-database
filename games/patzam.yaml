description: |
  Patzam is an abstract strategy game played on a three-dimensional 18-spot board in which players alternate placing pieces until all positions are filled. Once all pieces are played, the middle pieces of any rows composed entirely of the same color are removed. The game's core tension comes from anticipating which pieces will be eliminated by this rule and placing accordingly. The unusual 3D board structure and the delayed-reveal elimination mechanic make Patzam a distinctive curiosity in abstract gaming, with limited publication information available.

