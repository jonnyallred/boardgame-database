# Description
description: |
  Acronymble is a party word game designed by Steven May and published by
  Acronymwits Inc. in 1991. Players draw letter cards and must create amusing
  acronyms (called "noodles" in the game) from random sequences of letters, then
  compete to see whose interpretation is the funniest or most creative.

  The game rewards lateral thinking and quick wit as players construct outlandish
  phrases from arbitrary strings of letters. The humor generated by comparing
  different players' acronyms for the same set of letters drives the party
  atmosphere. Acronymble is suitable for larger groups and works well as an
  icebreaker or party activity.

