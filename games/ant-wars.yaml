description: |
  Ant Wars is a 1982 strategy board game published by Jason McAllister Games in which tribes of
  ants battle each other for control of a backyard territory. Players manage colony expansion,
  choosing between workers — essential for gathering food — and soldiers, who are three times as
  powerful in combat but useless for foraging.

  The core tension lies in balancing a mixed population of workers and soldiers, as over-militarizing
  weakens food production while under-militarizing invites conquest. Reviewer Steve Jackson praised
  the game's fun factor and strategic population management mechanics. It is an obscure but notable
  early example of a colony-management wargame with an insect theme.

