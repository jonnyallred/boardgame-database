description: |
  On the Dot is a pattern-matching brainteaser in which players race to arrange four transparent squares — each printed with colored dots — by flipping, rotating, and overlapping them until they perfectly reproduce a target pattern shown on a challenge card. Every move requires using all four squares, and the correct arrangement is revealed only when all four layers align just right. The competitive mode has players scrambling simultaneously, with the first to match the pattern claiming the card; a solitaire variant challenges one player to solve as many patterns as possible against the clock. With 64 pattern cards progressing from simple to fiendishly complex, the game is a fast, satisfying spatial puzzle that rewards visual thinking.

