description: |
  Gift Trap is a social party game invented by Nick Kellet and published in 2006, inspired by his daughter's insight about how giving the right gift shows how well you know someone. Players use tokens to secretly indicate which gift from a random card deal they would give to each other player, while also marking which gifts they'd want to receive themselves; scoring is based on how well givers predicted receivers' preferences and vice versa. The game won the 2009 Spiel des Jahres Special Award for Party Game and earned Party Game of the Year in France in 2007.

