description: |
  Barbarian Kings is an Avalon Hill area-control and conquest game simulating the fall of Rome and the rise of barbarian kingdoms across Europe. Players command barbarian tribes — Visigoths, Vandals, Huns, Franks, and others — competing to carve out kingdoms from the crumbling Roman Empire by conquering territories and building settlements. The game blends historical authenticity with accessible mechanics, recreating the Migration Period that transformed Europe from late antiquity to the early medieval era. Multiple player factions each with unique starting positions create varied games from session to session.

