description: |
  Bookchase (Penguin Bookchase) is a literacy-themed family board game packaged in a
  giant book-like box in which players race to collect six mini books to win. Designed
  to foster a love of reading and books, the game is published with Penguin branding
  and supports 2 to 6 players from age 6 upwards. The book-shaped packaging and
  reading-themed content make it an appealing gift for young readers and a gentle
  introduction to competitive set-collection gameplay.

