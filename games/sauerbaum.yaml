description: |
  Sauerbaum (meaning "Sour Tree") is an early German cooperative dice game designed by Johannes Tranelis in which players work together to save a tree from acid rain. The board depicts a tree filled with a grid of movement spaces gradually filling from the top with tokens representing acid rain droplets. Players move their pawns through the remaining open spaces, ending their movements on raindrops to "flick" them off the tree, trying to protect it before the acid rain overwhelms the board. Published before cooperative board games became mainstream, Sauerbaum is a notably early example of the genre with an environmental conservation theme.

