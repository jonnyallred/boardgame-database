description: |
  Zatre (short for Zahlen und Treppen — numbers and steps) is a tile-placement game that plays
  like Scrabble with numbers. Players draw and place two tiles on the board each turn, extending
  existing patterns. When a vertical or horizontal line of tiles totals 10, 11, or 12, the player
  scores 1, 2, or 4 points accordingly. The game has maintained an active following in Europe for
  over 30 years and hosts annual championships.

