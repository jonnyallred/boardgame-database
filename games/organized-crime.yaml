description: |
  Organized Crime is a political strategy game about the Mafia published by Koplow Games in 1974, in which players build criminal empires through a combination of influence, corrupt politicians, illegal activities, and business investments. Players move Hit-Men around a circular board trying to rub out rival Bosses and expand their criminal influence, with the last surviving Boss winning. The game blends economic development with direct player conflict in a thematic package that captures the territorial warfare of organized crime, making it a distinctive entry in the crime-themed strategy game niche of the 1970s.

