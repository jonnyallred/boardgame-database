description: |
  Missing Words is a party word game in which players are read short stories with blanks at certain points and must supply the correct missing words. The player who fills in the most correct words wins the game. The box also contains two additional modest party games, making it a versatile party filler. The game is designed for groups and social gatherings, rewarding vocabulary and cultural knowledge. Specific designer and publisher information is not well documented in available sources.

