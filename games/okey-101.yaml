description: |
  Okey 101 is a popular Turkish tile-rummy variant played with the same 106-tile set as standard Okey but with significantly expanded hands of 21 tiles and the additional melding mechanic that allows players to lay down completed sets during play. The game's name refers to the requirement that a player's first meld must total at least 101 points in face value, adding a strategic holding element absent from standard Okey. Players may extend each other's melds on the table and must carefully balance discarding to the pile against holding valuable tiles for their opening declaration. A staple of Turkish social gatherings, Okey 101 requires more patience and planning than its parent game and is favored by experienced players seeking greater depth.

