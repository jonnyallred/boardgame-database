description: |
  Vinci is a 1999 area-control civilisation game designed by Philippe Keyaerts and published by Jeux Descartes, in which players guide successive civilisations through cycles of expansion and decline across a map of Europe. Each civilisation is formed by combining two randomly paired special powers, creating a unique faction each game. Players expand their civilization's territories until growth slows, at which point they voluntarily trigger a decline — locking in their score from existing holdings — and then adopt an entirely new civilisation to conquer fresh lands. This ingenious decline mechanic was later re-implemented with a fantasy theme as the hit game Small World (2009).

