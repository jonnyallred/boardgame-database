description: |
  Rolling Heights is a 1920s city-building game in which players literally roll their meeple workers to determine their productivity — meeples landing standing up are productive workers, while those face-down provide nothing. As a general contractor competing to build the tallest and most prestigious buildings in an expanding city, players acquire building materials, construct structures, and recruit new workers to grow their pool. Completing buildings earns prestige and unlocks new worker meeples, creating an engine-building arc with a uniquely tactile dice-rolling mechanism that puts a literal spin on the worker placement genre.

