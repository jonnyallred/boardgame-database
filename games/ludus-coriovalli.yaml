description: |
  Ludus coriovalli is a reconstructed ancient board game believed to have been played in Roman Britain, derived from archaeological finds and analysis of game boards carved into stone or played on wood. Little historical documentation survives and the exact rules are uncertain, with modern reconstructions drawing on comparison with other Roman strategy games such as Ludus latrunculorum. It is part of the broader tradition of ancient strategic board games from the Roman world. Noted primarily by archaeologists and historians of ancient games, it remains an obscure curiosity with limited documented play history.

