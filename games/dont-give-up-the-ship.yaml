description: |
  Don't Give Up the Ship! is a set of miniatures rules for naval wargaming in the Napoleonic era, first published by Guidon Games in 1972 and later republished by TSR in 1975. Notably, it represents the first collaboration between Dave Arneson and Gary Gygax—the co-creators of Dungeons & Dragons—along with co-designer Mike Carr. The rules cover ship movement, cannon fire, boarding actions, and other Age of Sail mechanics using miniature models, and can be adapted for any pike-and-musket-era naval battle beyond the Napoleonic period.

