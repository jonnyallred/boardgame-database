description: |
  Commander Chess (Cờ tư lệnh) is a Vietnamese chess variant created by Hải Quý Nguyễn in 2010, played on an 11×12 grid with 38 pieces per player on the line intersections, similar to Xiangqi. The board is divided by a river and includes a sea section, with pieces representing different military branches — infantry, navy, air force, artillery, and a Commander. Unlike standard chess, multiple piece types can transport other pieces, and anti-aircraft guns automatically counter enemy aircraft. A piece that checks the opponent's Commander permanently gains heroic status and extended movement. Victory comes by capturing the opponent's Commander or eliminating all units of one military division.

