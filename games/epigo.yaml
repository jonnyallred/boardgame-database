description: |
  Epigo is a two-or-four-player abstract strategy game published by Masquerade Games in 2011, in which players race to push three of their opponent's Epigons off the edge of the board. Each round, players simultaneously select and stack three orders from their hand, with piece rank (1-7) determining movement speed — and matching ranks causing cancellation. The game ships with 21 built-in variants and more available online, giving it exceptional replayability for a fast-playing abstract.

