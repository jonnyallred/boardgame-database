description: |
  Ingenious: Travel Edition is a compact two-player adaptation of Reiner Knizia's abstract tile-placement game Ingenious, published by Fantasy Flight Games in 2007 (US edition). The game retains the core mechanic of placing domino-like tiles to score for contiguous lines of matching symbols, with the distinctive rule that your score equals your lowest-scoring color. Designed for portability, the travel edition condenses the full game experience into a smaller format suitable for on-the-go play.

