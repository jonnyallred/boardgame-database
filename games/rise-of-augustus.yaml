description: |
  Rise of Augustus is a fast-paced set collection game inspired by ancient Rome where players race to complete "objective" cards representing Roman legions, provinces, and political offices. Each round, symbols are drawn one at a time from a bag and all players simultaneously place legionnaire meeples on matching symbols on their cards — the first to complete a card shouts "Ave Caesar!" and claims its bonus. The bag contains more of some symbols than others, adding a press-your-luck tension to card selection. Its bingo-like draw mechanism makes it accessible and exciting for mixed groups while rewarding strategic objective selection.

