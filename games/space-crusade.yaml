description: |
  Space Crusade is a Warhammer 40,000-themed adventure game designed by Steven Baker and co-produced by Milton
  Bradley and Games Workshop in 1990. Set aboard a Tyranid vessel, up to three players command Space Marine scout
  squads pursuing individual mission objectives while a fourth player controls the alien defenders — Orks, Chaos
  Warriors, and Genestealers. Combat uses custom dice resolved against armor values, and the modular board tiles
  build varied spaceship interiors each session. A simplified cousin of Space Hulk, it introduced many young
  players to the Warhammer 40,000 universe.

