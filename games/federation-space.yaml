description: |
  Federation Space is a strategic fleet action board game set in the Star Fleet Universe, designed as a companion to the more tactical Star Fleet Battles system. Players each control an entire fleet of starships for one of eight interstellar races, with the goal of destroying rival fleets across 26 included scenarios covering everything from Klingon rebellions to full-scale galactic wars. Combat uses a simple two-step damage reduction system where ships are either normal or damaged, making the game faster than its tactical counterpart while still rewarding strategic maneuvering and force management.

