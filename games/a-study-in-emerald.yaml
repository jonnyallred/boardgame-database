# Description
description: |
  Based on Neil Gaiman's short story of the same name, A Study in Emerald is set in
  an alternate Victorian world where Lovecraftian Old Ones have conquered Earth and
  rule as royalty. Players are divided into hidden factions: Loyalists (who serve the
  Old Ones) and Restorationists (who seek to overthrow them). Using a deck-building
  mechanism, players recruit agents, assassinate royals, and gain control of cities
  across Europe, never fully knowing which side their opponents are on until late in
  the game. Designed by Martin Wallace, the game features deep asymmetry and paranoia.
  A second edition with revised art was published in 2015.

