description: |
  A fully cooperative campaign board game for 1-4 players published by Lautapelit.fi in 2022, featuring over thirty unique scenarios with evolving maps and more than 100 hours of campaign gameplay. Players take on the roles of heroes in a fantasy world, making challenging moral choices that affect the unfolding story—you may become mighty heroes or the most despicable of villains. A unique Stamina chip system combines stamina and health, while a Fail Forward mechanism keeps the campaign moving even when players suffer setbacks. The game is notable for its depth of narrative, tactical combat, and meaningful player decisions across its sprawling campaign.

