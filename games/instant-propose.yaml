description: |
  Instant Propose is a Japanese party card game in which players race to combine word cards to construct the most compelling marriage proposal before time runs out. One player per round puts their head down and counts to ten, while all other players frantically combine initial cards with word cards to assemble a creative and emotional proposal phrase. The judge then picks their favorite proposal and awards a ring counter. Winner of the Game Market Award 2018 Excellent Work Award, it is an engagingly absurd creativity and word combination game for social gatherings.

