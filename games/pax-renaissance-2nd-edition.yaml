description: |
  Pax Renaissance: 2nd Edition is a deep historical card game for 2-4 players set in 15th–16th century Europe, designed by Phil Eklund and Matt Eklund. Players buy cards from eastern and western markets — prices shift with each purchase — and play them to their tableau to take actions, place pieces on a map of Europe, build banking empires, and assert influence over royal houses and republics. Four distinct victory conditions shape the future course of Western society: imperialism, trade globalization, religious totalitarianism, or enlightened art and science. This edition incorporates all previous expansion content and features new Renaissance-inspired artwork.
