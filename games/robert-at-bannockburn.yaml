description: |
  Robert at Bannockburn is a hex-and-counter wargame simulating the famous Battle of Bannockburn in 1314, in which Robert the Bruce's Scottish army achieved a decisive victory over the English forces of Edward II. Originally published by Simulations Publications Inc. (SPI) in 1979 as part of the "Great Medieval Battles" collection of four games, the game accurately models the tactical situation of one of Scotland's most celebrated military triumphs. The game rose to number five on SPI's bestseller list on release. It was reprinted in 1999 by Decision Games in Strategy & Tactics magazine with an updated map and counters, continuing its legacy as a classic medieval wargame scenario.

