description: |
  Ecosystem is a 2021 card-drafting game by Matt Simpson, published by Genius Games, in which 2–6 players build a personal ecological tableau by choosing and passing cards depicting organisms and habitats — bees, bears, streams, meadows, and more. Each card scores based on its adjacency to compatible neighbors in the player's 4×5 grid, rewarding players who create flourishing, interconnected biomes while penalizing monocultures. Simple enough for classrooms and family play, it packs genuine strategic depth into a 15-minute filler, and serves as a natural companion to Wingspan for players interested in nature themes.

