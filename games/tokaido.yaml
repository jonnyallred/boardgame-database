description: |
  Tokaido is a set collection and point-to-point movement game set along the iconic Tokaido road of ancient Japan, where players journey from Kyoto to Edo collecting experiences along the way. The ingenious movement system lets the player who is furthest behind take their turn, meaning slower travel allows more stops but grants fewer choices overall. Beautiful minimalist artwork by Naiade and a peaceful zen atmosphere make it one of the most visually distinctive gateway games, rewarding players who seek the most fulfilling journey rather than the fastest.

