description: |
  You're Bluffing! is a classic bidding and set-collection card game in which players auction
  off farm animals from a shuffled deck, trying to complete sets. The auctioneer always retains
  the right to buy at the highest bid, and trading between players uses simultaneous blind bids
  revealed together. The interplay between the open auction and the secretive trading, combined
  with the risk that the auctioneer can snatch a winning animal, creates constant tension and
  careful bluffing.

