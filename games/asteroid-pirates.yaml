description: |
  Asteroid Pirates is a 1980 tactical ship-to-ship space combat game published by Yaquinto
  Publications, set in the asteroid belt where rival pirates clash in deadly space battles.
  The game uses a hexagonal grid system with action points, simultaneous action selection,
  and dice rolling to resolve combat. Features include critical hit rules, paper-and-pencil
  tracking of ship systems, and variable setup options, making each engagement unique.
  Players maneuver their spacecraft through the asteroid field, balancing offensive
  firepower with defensive maneuvering in tense skirmish encounters.

