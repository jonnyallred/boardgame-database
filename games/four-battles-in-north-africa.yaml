description: |
  Four Battles in North Africa is a 1976 SPI "quadrigame" — a box containing four separate wargames sharing a unified ruleset — simulating key engagements from the World War II North African campaign. Building on SPI's successful Blue and Gray quad format, each of the four games also includes multiple scenarios, offering considerable replay variety for the price. The package debuted at #2 on SPI's bestseller list at release. Graphic design was by Redmond A. Simonsen. Individual games from the set were also sold separately as folio games.

