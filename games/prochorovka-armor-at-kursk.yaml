description: |
  Prochorovka: Armor at Kursk is a two-player hex-and-counter wargame designed by Stephen V. Cole and published by Task Force Games in 1979, simulating the largest tank battle of World War II fought on July 12, 1943. The German SS Panzer Korps squares off against the Soviet 5th Guards Tank Army in a tactical engagement just south of the town of Prochorovka on the Eastern Front. Published as a compact microgame, it was later re-released as the boxed set "Armor at Kursk" with additional designer notes and errata.

