description: |
  The Dungeons & Dragons Basic Game (2004) is an introductory boxed set from Wizards of the Coast designed to bridge the gap between traditional board gaming and tabletop RPGs. Created by Jonathan Tweet as an on-ramp for new players, the box includes Quick Start Rules, an Advanced Rulebook, pre-generated character sheets for four iconic D&D characters, 16 pre-painted plastic miniatures, double-sided dungeon tiles, and six dice. The set supports both basic adventures and a more advanced ruleset, making it a notable gateway product for the 3rd edition D&D era. A second edition of the Basic Game was released in 2006 with updated content.

