# Description
description: |
  A two-player hex-and-counter wargame published by Avalon Hill simulating the
  American Revolutionary War, with one player commanding the Continental Army and
  Patriots while the other commands British Loyalist forces. The game covers the
  full scope of the conflict across the American colonies, from 1775 to 1783.
  Players manage supply, movement, combat, and political control of regions.
  Classic Avalon Hill design featuring the detailed hex-map and chit-based gameplay
  that defined wargaming in the 1970s.

