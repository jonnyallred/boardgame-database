description: |
  Magic Labyrinth: Card Game is a card-based spinoff of the award-winning Magic Labyrinth board game published by Drei Magier Spiele. Players navigate the theme of the magical labyrinth through a card game format, collecting objects while avoiding dead ends. The game retains the family-friendly memory and spatial puzzle elements of the original game in a more portable and faster-playing format. Limited English-language sources are available for this specific edition.

