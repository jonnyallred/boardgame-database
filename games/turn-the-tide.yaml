description: |
  Turn the Tide (originally published in Germany as Land Unter by Stefan Dorra in 1997) is a card game of simultaneous play and hand management for 3–5 players. Players simultaneously choose a card from their hand to play, then reveal them together; the player who played the highest card in the round must take all cards played — which counts as flooding — unless they play the only high card with no others above them. The goal is to avoid collecting too many cards while carefully predicting what others will play. This elegant tension between going high to dodge floods and going low to stay safe makes Turn the Tide a beloved filler.

