description: |
  Hexxagon is a two-player abstract strategy game played on a hexagonal grid in which players compete to control the majority of pieces at the end of the game. On each turn, a player can either move one space (cloning a piece at the destination) or jump two spaces (moving without cloning). Any opponent pieces adjacent to a placed piece are converted to the active player's color. The game requires balancing aggressive conversion plays with positional awareness, and has been widely adapted as a digital game on multiple platforms.

