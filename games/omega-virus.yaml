description: |
  The Omega Virus is a pioneering electronic talking board game from Milton Bradley (1992) in which 1-4 players race to save the space station BattleSat1 from an insidious computer virus that has taken control. Players explore the 24 rooms of the station collecting colored access cards and three weapons (negatron, decoder, and disruptor) while the game's central electronic talking computer — a groundbreaking feature for 1992 — narrates the virus's progress, issues commands, and counts down to destruction. One of the first board games to incorporate voice technology, The Omega Virus established a template for the electronic talking game genre and remains fondly remembered for its dramatic sci-fi atmosphere and tension-filled gameplay.

