description: |
  Iron Horse is a 1983 train card game by R.K. Geier and Icarus Games, simulating the development of the American railroad network. Players build routes between city cards using a distance system based on Cartesian coordinates (Manhattan metric: dx+dy), creating a geometric puzzle underlying the railroad theme. Supporting up to 8 players, Iron Horse uses card play to develop North American rail connections. It represents an early and mechanically distinctive approach to the railroad network-building genre that later became popular.

