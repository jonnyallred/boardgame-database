description: |
  Ringwraiths (also known as The Lidless Eye) is a major expansion set for the Middle-earth Collectible Card Game (MECCG) published by Iron Crown Enterprises in 1997. This set introduced the ability for players to take on the role of Sauron's Ringwraiths, creating an entirely new playstyle opposed to the Wizards faction from the base game. Starter decks featured fixed cards built around one of five iconic Ringwraith characters, each with distinctive abilities and sinister thematic flavor drawn from Tolkien's lore. MECCG won two Origins Awards and remains a beloved collectible card game among Tolkien fans, though production ended in 1999 when ICE lost the Tolkien license.

