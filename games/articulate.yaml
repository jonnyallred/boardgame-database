description: |
  Articulate! is the fast-talking description party game designed by Andrew Bryceson
  and published by Drumond Park in 1992. Teams compete to describe as many words and
  phrases as possible from category cards within 30 seconds, without using prohibited
  hints like "rhymes with" or "sounds like." The game rewards quick thinking,
  communication, and personality rather than specialist knowledge, making it accessible
  to virtually everyone. It has sold over 2 million copies and has ranked among the UK's
  top adult games every year since launch, becoming one of the best-selling games in Britain.

