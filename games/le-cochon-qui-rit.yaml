description: |
  Le Cochon qui rit (known internationally as Pass the Pigs or Pig Mania) is a press-your-luck game in which players roll two small plastic pigs that serve as dice, scoring points based on how the pigs land — snout, trotter, razorback, snouter, leaning jowler, and the dreaded "pig out" or "making bacon" that resets or transfers your score. Players decide after each roll whether to bank their accumulated points or push their luck for more. The absurdly tactile and amusing nature of rolling pigs rather than dice makes it a perennial party and travel game hit. Known as "Le Cochon qui rit" in French markets.

