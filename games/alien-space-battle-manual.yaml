description: |
  A two-player tabletop spaceship combat game published by Gamescience in 1973, designed by Lou Zocchi as a revision of an earlier Star Trek-themed game. Each player chooses one of eight different ships, each with a secret weapon unknown to the opponent until revealed in play. There is no board or map—the game is played with models on an open floor area, emphasizing three-dimensional spatial reasoning. Notably, the game involves no dice rolling, relying entirely on skill and decision-making. A foundational miniatures-inspired space combat design notable for its purity of skill over chance.

