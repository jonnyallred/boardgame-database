description: |
  Shadows over Camelot is a cooperative Arthurian board game for 3–7 players designed by Serge Laget and Bruno Cathala, in which the Knights of the Round Table work together to complete quests — from seeking the Holy Grail to defeating the Black Knight — while managing a constant tide of evil events. One player may secretly be a traitor, biding their time to undermine the group at the worst moment. Success places white swords on the Round Table while failures add black swords and siege engines; if twelve swords appear or Camelot is overwhelmed, all loyal knights lose. It was one of the first major cooperative games with an optional traitor mechanic.

