description: |
  Quicksand is a children's racing board game published by Parker Brothers in 1989 in which players move explorer pawns around a path toward a hidden ancient temple, carefully avoiding treacherous quicksand spaces that can set them back significantly. The race combines the excitement of movement with suspense as players never know where the deadly quicksand lurks until they step in it. Simple enough for young children, the game delivers repeated thrills through its unpredictable hazard placement.

