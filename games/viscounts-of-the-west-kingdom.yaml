description: |
  Viscounts of the West Kingdom is the third entry in Shem Phillips and S J Macdonald's West Kingdom Trilogy, combining deck-building with worker placement and a distinctive rondel movement system. Players move their viscount around a circular board of locations, playing cards from their deck at each stop to perform actions — constructing buildings, writing manuscripts, placing retinue, and accumulating gold and influence. The deck-building is tightly integrated: cards are both the currency for actions and the objects being improved and curated. As the most mechanically dense of the trilogy, Viscounts rewards mastery with deep, satisfying play across 1–4 players.

