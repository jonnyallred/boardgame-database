description: |
  Genoa (The Traders of Genoa) is a 2001 negotiation and trading game designed by Rüdiger Dorn and published in the prestigious Alea big box series. Players move their trader towers through the streets of medieval Genoa, stopping at buildings to perform actions — but here, the twist is that all actions can be bought and sold between players, creating a rich environment of deals, counter-deals, and opportunistic negotiation. Goods, letters, and privileges are acquired and traded to achieve individual goals, and virtually every element of a turn is open for negotiation. Widely praised as one of the definitive games of its era for interaction and deal-making.

