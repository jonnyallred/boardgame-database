description: |
  Unlock! Exotic Adventures is a box set in Space Cowboys' cooperative escape room card game series, published in 2018. Containing three scenarios set in exotic locations and unusual adventure settings, players use the card-based system and free companion app to solve puzzles against the clock. Like all Unlock! games, the scenarios are played once (for each group) with no physical setup, combining card combinations, hidden codes, and app-supported puzzles in a race to escape within the hour.

