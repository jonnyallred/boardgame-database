description: |
  Modern Naval Battles is a card-based naval combat game designed by Dan Verssen and Alan Emrich, published by 3W in 1989. Players use cards representing modern warships and weapons to sink each other's fleets, earning points for each enemy vessel destroyed, with the game ending when a player reaches the required point total or all opposing ships are sunk. The game spawned two expansions: The Campaign Game (a wargame building on the base rules) and The Expansion Kit. The rights have since reverted to designer Dan Verssen, who later reimagined the concept for a modern edition.

