description: |
  Deckscape: Escape from Alcatraz is a pocket escape room card game in the Deckscape series by Martino Chiacchiera and Silvano Sorrentino, published by dV Giochi. Players are imprisoned on the infamous island fortress of Alcatraz and must cooperatively solve card-based puzzles and logic challenges to engineer an escape. Inspired by the legendary "impossible" escape from the real Alcatraz, the game recreates the intrigue and tension of a prison break through sequential card reveals and team problem-solving. Part of the globally successful Deckscape series that has sold over a million copies in total.

