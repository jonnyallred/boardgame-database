description: |
  The Collector's Edition of Trickerion: Legends of Illusion is a premium Kickstarter bundle released in 2019 containing the base game, the Dahlgaard's Academy and Dahlgaard's Gifts expansions, metal coins, custom linen pouches, and an alternate art box. Players compete as rival Victorian steampunk illusionists in the city of Magoria, simultaneously programming their workers' movements to gather components, learn tricks, and perform spectacular illusions at the theater. The Collector's Edition consolidates the full Trickerion experience into a single deluxe package with enhanced components.

