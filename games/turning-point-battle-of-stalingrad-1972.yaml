description: |
  Turning Point: The Battle of Stalingrad is an early SPI wargame published in 1972, designed by James F. Dunnigan (Jim Dunnigan) with graphic design by Redmond A. Simonsen. The game applies the "Kursk" movement system — including an extra movement phase for mechanized forces — to the pivotal WWII Eastern Front battle where the German 6th Army was encircled and destroyed. It represented an advance in operational-level game design for its era and established many conventions later used across the genre.

