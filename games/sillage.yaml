description: |
  Sillage is a card game designed by Patrick Renault and published by Asmodee in 2003, inspired by the French science fiction comic book series of the same name. Each turn, a new planet card is revealed and players are dealt alien race cards wanting to colonize it; players lay cards matching the planet's required characteristics to successfully settle alien colonies and score points. The game rewards reading the distribution of resources in your hand and adapting your colonization strategy to each planet's specific demands across the sci-fi universe of the Sillage armada.

