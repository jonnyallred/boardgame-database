description: |
  Seunggyeongdo is a traditional Korean board game from the Joseon Dynasty in which players simulate the careers of government officials, racing to ascend through ranks of the bureaucracy to reach the highest positions of Premier (yeonguijeong) or Commander-in-Chief (dowonsu). Using special dice, players advance or may be "impeached" and forced to start over, or in extreme cases made to "drink poison." Played by the yangban (noble class) as both entertainment and education about the civil service structure, it was popular enough that even King Seongjong organized games at the palace.

