description: |
  Forest Wars of the Haven is a 1980 fantasy wargame published by Attack International, based on the novel by Graham Diamond. The game pits the Forces of Man (the Forces of the Haven — humans, wolves, hawks, and eagles) against the Forest Lords who command dogs and bats in a grand tactical assault scenario. The system uses standard hex-and-counter mechanics of the era, with special rules for air support, charging units, and units with variable loyalty or hidden placement.

