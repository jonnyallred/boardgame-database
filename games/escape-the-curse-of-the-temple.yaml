description: |
  Escape: The Curse of the Temple is a frenetic real-time cooperative game played
  simultaneously by all players, accompanied by a dramatic 10-minute soundtrack that
  acts as the clock. Players roll dice to move through a modular, self-building temple,
  collecting gems and unlocking the exit before the music ends. If even one player fails
  to escape, everyone loses. The combination of real-time pressure, simultaneous play,
  and cooperative urgency creates a uniquely chaotic and exhilarating experience unlike
  any other game on the market.

