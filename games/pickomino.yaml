description: |
  Pickomino (also known as Heckmeck am Bratwurmeck) is a fast-playing push-your-luck dice game by Reiner Knizia in which 2–7 players roll eight dice repeatedly, setting aside at least one value per roll to build a running total, then claim a worm tile matching that total from a central row. Crucially, rolls must always include at least one worm face (worth 5), and if a player's total exactly matches the top tile on an opponent's stack, they can steal it. Going bust forces a player to return their top tile and flip over the highest available central tile. The game has sold over one million copies and is celebrated as a perfectly calibrated filler with its elegant escalation of tension.

