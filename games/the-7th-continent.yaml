description: |
  The 7th Continent is a massive cooperative exploration game in which players are explorers stranded
  on a mysterious continent who must lift curses placed upon them while surviving the unknown land.
  The game is built from a giant deck of cards that form the modular board — as players explore,
  they draw and place cards representing terrain, encounters, and events, creating an ever-expanding
  world. A unique push-your-luck mechanic governs most actions: players decide how many cards they
  will draw from the action deck to attempt a task, balancing success probability against depleting
  the deck, which represents the group's lifespan. A clever card-sorting save system allows campaigns
  to be paused and resumed. It won the 2017 As d'Or for Best Innovation.

