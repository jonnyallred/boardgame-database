description: |
  ChiZo Rising is a collectible tile game published by Temple Games in 2005, whose name derives from "Chinese Zodiac." Players place square tiles representing the 12 creatures of the Chinese Zodiac, aiming to complete 2x2 squares of mutually compatible creatures to score capture points. The game combines the collectible booster pack format with Euro-style set collection mechanics, using high-quality square tiles with striking art from international artists. Additional booster packs of eight random tiles can be added for expanded strategy and variety.

