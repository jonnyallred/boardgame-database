description: |
  Acey-Deucey is a popular variant of backgammon with deep roots in the US Navy, Marine Corps, and merchant marine dating to World War I. Unlike standard backgammon, all pieces start off the board and must be entered before advancing. The defining rule is the acey-deucey roll: rolling a 1 and a 2 entitles the player to move those values, then choose and play any doubles, and then roll again, creating dramatic momentum swings. The game emphasizes racing and luck over deep strategic planning, making it a faster and more chaotic relative of backgammon.

