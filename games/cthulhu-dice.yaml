description: |
  Cthulhu Dice is an ultra-light dice game by Steve Jackson Games (2010) in which players try to drive each other insane using a custom 12-sided die featuring Lovecraftian symbols. Each player starts with three sanity tokens (glass marbles), and on your turn you roll the die against another player — results cause sanity loss, sanity gain, or invocations of Cthulhu himself. The last sane player wins, though Cthulhu may claim everyone's minds if the tokens run out. A pocket-sized, beer-and-pretzels filler that plays in under 10 minutes.

