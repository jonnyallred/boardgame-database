description: |
  BattleTroops is an infantry combat game set in the BattleTech universe, published by FASA Corporation in 1989. Rather than focusing on the giant BattleMechs of the main game, BattleTroops simulates ground combat between squads of infantry soldiers, elite Battle Armor (Elementals), and light vehicles. Players use hex-grid maps and individual soldier counters, managing cover, suppressive fire, and squad morale. The game provides detailed rules for the foot soldiers whose battles take place in the shadow of the iconic mechs, expanding the BattleTech universe into a new tactical scale.

