description: |
  Chron'Autrices is a free educational board game launched on International Women's Day, March 8, 2025, by the French association Le deuxième texte. Players draw quotes by female authors and must place them on a chronological timeline, testing and building knowledge about women writers throughout history. The game was developed after a year of preparation and prototype testing, and is freely available as a print-and-play download as well as in physical form. It is designed to promote discovery of female literary figures across history in an engaging timeline format.

