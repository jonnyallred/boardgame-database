description: |
  Global War is a grand strategic and economic board wargame designed by Jim Dunnigan and published by Simulations Publications Inc. (SPI) in 1975, simulating the entire scope of World War II from 1939–1945. A classic "monster" wargame containing over 1,000 counters, one player controls the Allied powers and the other controls the Axis, managing economies, production, and massed operations across a global map. The game's enormous scope and complexity place it among the most ambitious wargames ever published, intended for serious historical gaming enthusiasts willing to invest dozens of hours in a single campaign.

