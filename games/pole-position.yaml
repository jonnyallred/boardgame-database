description: |
  Pole Position is a Formula 1 racing board game published by Parker Brothers in 1983, based on the iconic Atari arcade game of the same name. Players race around a track using card or dice mechanics, navigating the challenges of a race circuit to reach the finish line first. The game captures the excitement of Grand Prix racing in an accessible board game format aimed at family audiences, tying into the enormous popularity of the Pole Position arcade and home video game at the time.

