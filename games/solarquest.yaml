description: |
  Solarquest is a space-themed real estate trading game designed by Valen Brost and first published in 1985.
  Patterned after Monopoly, players pilot rocket ships across the solar system, buying planets and moons and
  building fuel stations to charge opponents for refueling. Red Shift cards direct ships to specific destinations,
  and optional laser combat and dwindling fuel supplies add peril beyond simple property accumulation. Its solar
  system setting and sci-fi trappings gave the Monopoly formula a memorable educational gloss about the planets
  and their moons.

