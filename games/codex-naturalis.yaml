description: |
  Codex Naturalis is a card-placement game for 2–4 players in which players continue the illuminated manuscript work of the monk Tybor Kwelein, assembling overlapping pages that depict the flora and fauna of primeval forests. Each turn a player adds a card to their growing tableau, layering it over existing cards to accumulate symbols and fulfill secret and public objectives; the visible symbols around each card's corners are what score, so careful placement creates cascading combinations. Its rapid play time, beautiful nature illustrations, and deceptively deep spatial puzzle made it a 2024 Spiel des Jahres nominee and an instant gateway classic.

