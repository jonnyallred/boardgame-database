description: |
  Paint the Roses is a cooperative deduction game for 2-5 players set in the world of Alice in Wonderland. Players are the Queen's new Royal Gardeners, each holding secret instructions on how the garden should be arranged — but they cannot tell each other directly. By cleverly placing garden tiles and interpreting clues about what others need, the group must deduce and fulfill the Queen's whims before losing their heads. With over 100 secret whim cards, every game is a fresh logical puzzle blending cooperative communication with constraint-based deduction.
