description: |
  Ribbit is a light frog-racing card and movement game in which players secretly choose which colored frog they want to win, then take turns playing movement cards to advance the frogs around the course. Each player's chosen frog identity remains hidden throughout the game, creating a bluffing element as players try to advance their own frog while disguising their loyalties. A stacking mechanic adds depth: when one frog lands on another's space it rides on top, and whenever the stack is moved all riders come along for the trip. The first player to get their secretly chosen frog across the finish line wins the game.

