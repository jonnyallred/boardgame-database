description: |
  Wallenstein is a 2002 Euro-style area control game designed by Dirk Henn and published by Queen Games, set during the Thirty Years' War. Players compete to control German territories and accumulate victory points by governing counties, constructing buildings, and managing resources across two game years. The game's most celebrated innovation is the cube tower: cubes representing armies are dropped in through the top during battles, and a random number fall out the bottom — survivors representing the combat result, while others are trapped inside and may tumble out in future battles. This elegant randomness adds memorable tension to otherwise strategic decision-making.

