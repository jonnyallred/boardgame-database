description: |
  Rimau is a traditional Malaysian abstract strategy game from the hunt game family, in which one player controls a powerful tiger and the other commands 24 hunters seeking to trap it. Played on an expanded alquerque board supplemented by two triangular "gunung" (mountains) on opposing sides for a total of 37 nodes, the tiger tries to capture hunters by leaping over them while the hunters try to surround and immobilize the tiger. The tiger wins if it captures enough hunters (typically leaving fewer than 10-11) that they can no longer effectively block its movement. Rimau belongs to the same ancient family of asymmetric hunt games as Bagh-chal (Nepal) and Aadu Puli Attam (India).

