description: |
  Boss Monster: The Dungeon Building Card Game is a 2013 card game by Brotherwise Games
  (founded by brothers Johnny and Chris O'Neal), funded via Kickstarter with over $215,000
  raised. Inspired by classic side-scrolling video games, players become villainous Bosses
  building underground dungeons, luring adventurers with treasure, then destroying them
  to collect their souls. The first Boss to collect 10 souls wins, but Bosses take wounds
  from heroes who survive the dungeon. The 8-bit pixel art aesthetic and video game humor
  made it a global bestseller.

