description: |
  Bayonets & Tomahawks is a two-player card-driven grand strategy game depicting the French & Indian War from 1755 to 1760, as France's North American empire was conquered by Britain. Each in-game year consists of nine Action Rounds and three Logistics Rounds; players use historically based event cards for maneuver, raids, sieges, diplomacy with indigenous nations, and naval operations. Instead of a traditional CRT, the game uses dice rolled per unit, with light units only capable of damaging other light forces and heavy brigades clashing only with brigades, creating a richly layered system in an accessible two-to-three hour package.

