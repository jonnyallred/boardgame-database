description: |
  Flight of the Goeben is a two-player naval wargame simulating the dramatic escape of the German battlecruiser SMS Goeben and light cruiser SMS Breslau through the Mediterranean at the outbreak of World War I in August 1914. One player commands the German ships attempting to evade the British and French fleets, while the other commands the pursuing Allies trying to intercept them. The game uses a hidden movement mechanic on a hex map of the Mediterranean — each player has their own copy of the board — creating a tense cat-and-mouse hunt. Originally published as one of the first pull-out wargames in Strategy & Tactics magazine (Issue 21, 1970), it is a notable early example of hidden-movement wargame design.

