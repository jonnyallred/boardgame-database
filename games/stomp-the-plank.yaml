description: |
  Stomp the Plank is a pirate-themed press-your-luck dexterity game by Florian Sirieix and Benoit Turpin for 2-4 players aged 5 and up. Players are elephant pirates trying to steal treasures from Captain Giraffe's chest, flipping cards to collect loot but risking a matching symbol that sends them walking the plank. Each double drawn causes wooden crates to be stacked on the player's plank overhang; if too many accumulate, the elephant stomps forward. The tactile plank-balancing element adds physical tension to the push-your-luck card play.

