description: |
  Tonkin covers the critical 1950–1954 period of the French-Indochina War in northern Vietnam and Laos, pitting French forces with artillery, air support, and motorized mobility against highly mobile Viet Minh units skilled at jungle ambush. Both players manage a limited pool of operation points and supply dumps, spending them to perform movement, combat, and logistics in a system where careful timing of actions is essential. Originally published in Vae Victis magazine and later by Legion Wargames, Tonkin is considered one of the finest wargames on the Indochina conflict.

