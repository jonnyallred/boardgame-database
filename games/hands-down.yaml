description: |
  Hands Down is a fast-paced card game combining set collection with a physical reaction element, where the goal is to make the most pairs and score the most points. When a player completes a matching pair, all players must slap their color-coded hand paddle on the central unit as quickly as possible — the last to slap loses a card, and players can feint to trick opponents into false slaps. Created by Marvin Glass and Harvey "Hank" Kramer for Ideal Toy Company in 1964, the game has been published by multiple companies including Hasbro, Milton Bradley, and Pressman, remaining a beloved family classic across generations.

