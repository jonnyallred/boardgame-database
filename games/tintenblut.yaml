description: |
  Tintenblut is the board game adaptation of Cornelia Funke's beloved fantasy novel Inkspell (the second book in the Inkworld trilogy), published by Kosmos in 2009. Players journey through the magical Inkworld alongside Meggie and her friends, following travel maps to visit locations from the novel and collecting experience points that can be strategically exchanged for victory points. Designed by Andreas Zimmermann, it appeals primarily to fans of the Inkworld book series who want to explore its world through a family board game.

