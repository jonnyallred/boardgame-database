description: |
  Rhino Hero is a delightful children's dexterity card-stacking game published by HABA in which players cooperate and compete to build a precarious skyscraper for the superhero Rhino Hero. On each turn, players bend wall cards and place a roof card, with each roof card dictating where the next player must position walls — gradually creating an ever-taller and wobblier tower. The iconic wooden Rhino Hero meeple travels up the building, and special action cards add chaos by requiring players to skip turns or change direction. A multiple-award-winning gateway game that delights children and adults alike with its blend of tension and humor.

