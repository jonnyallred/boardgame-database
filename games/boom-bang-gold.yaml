description: |
  Boom, Bang, Gold is a real-time gold-rush game designed by Alexandre Emerit and
  published by HABA in 2017 for 2 to 4 players ages 7 and up. At the command "Boom,
  Bang, Gold!" all players simultaneously throw sticks of dynamite into a central gold
  mine box, causing 160 tiles to bounce and land face-up or face-down. Players race to
  collect gold nugget tiles while avoiding boulders and special penalty tiles. A pocket
  watch serves as the round timer, and the player with the most gold nuggets at day's
  end wins this frantic speed game.

