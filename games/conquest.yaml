description: |
  Conquest is an abstract combinatorial wargame self-published by Donald Benge of Burbank, California, first released in 1972 with cardboard counters and later produced with plastic and deluxe pewter pieces. Set in an ancient island archipelago, players maneuver chess-like units — foot troops, cavalry, chariots, elephants, and ships — across a point-to-point map, attempting to capture opponents' fortifications and occupy designated "quest" locations. A four-player edition followed in 1974, and the game was sold directly by Benge for decades, achieving cult status among abstract strategy devotees who prize its chess-meets-wargame design.

