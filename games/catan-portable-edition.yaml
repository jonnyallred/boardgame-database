description: |
  Catan: Portable Edition (later updated as Catan Traveler - Compact Edition) is a travel-sized version of the classic Settlers of Catan published by Mayfair Games in 2002. The game provides the full Catan experience at half the physical size, with snap-in components that lock to the board during play to prevent shifting during transport. It also includes a tested two-player variant, making it unique among Catan editions. Ideal for gaming on the go while preserving all the standard rules for resource collection, trading, and settlement building.

