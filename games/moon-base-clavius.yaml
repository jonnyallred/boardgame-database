description: |
  Moon Base Clavius is a 1981 science fiction wargame designed by Kerry Anderson and published by Task Force Games. Set in the mid-21st century, one player commands the invading Soviet Lunar Army while the other defends the American lunar colony established in the Clavius Crater on the Moon. The game pits an attacking ground force against entrenched defenders in a tactical scenario inspired by cold war extrapolation, using the signature compact wargame format typical of Task Force Games' microgame line.

