description: |
  Ice War is the ninth game in Metagaming Concepts' pioneering MicroGame series, designed by Keith Gross and published in 1978. The game hypothesizes a Eurasian military attack against American oil infrastructure in Alaska, placing players in command of opposing forces in a cold-climate tactical conflict. Packaged in the characteristic small format of Metagaming's microgames, it was designed to be quickly learned and played in under an hour, targeting players who wanted accessible wargaming without complex rules.

