description: |
  South Dakota Trivia Trails is a regional trivia board game published by J & P Design in 1985, designed as
  a fun way to learn about the state of South Dakota. Players race along a trail board, stopping at trivia spots
  to answer questions about the state's history, geography, and culture. A niche educational product aimed at
  South Dakota residents and tourists, it represents the wave of region-specific trivia games that followed the
  success of Trivial Pursuit in the early 1980s.

