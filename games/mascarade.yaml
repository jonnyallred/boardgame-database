description: |
  Mascarade is a fast-paced bluffing card game for two to thirteen players designed by Bruno Faidutti and published by Repos Production in 2013. Each player holds a hidden character card with a special power — judge, bishop, queen, witch, and others — and the goal is to reach 13 gold coins first. Players can look at their own card, swap cards facedown with another player (or pretend to), or loudly announce they have a specific character and claim its power, with others able to challenge the claim. The constant card shuffling and memory challenge creates hilarious uncertainty about one's own identity, earning Mascarade its reputation as one of Faidutti's best-selling games.

