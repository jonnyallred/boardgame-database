description: |
  NEOM is a futuristic city-building game for 1-5 players that blends simultaneous card drafting with tile placement, drawing inspiration from 7 Wonders and Carcassonne. Each turn players draft one building tile and place it in their city grid, connecting roads and unlocking an ever-expanding tree of 17 goods that fuel increasingly powerful structures. After three eras of development the player with the most impressive city wins. NEOM rewards tight spatial planning alongside the opportunistic drafting that makes each game feel unique.
