description: |
  Complots is the French-edition bluffing card game closely related to Coup, in which players control two character cards and start with two coins. Through bluffing, manipulation, and targeted actions — each tied to character abilities — players attempt to eliminate all opponents by stripping them of their character cards. A new character card, the Inquisitor, and two-player rules distinguish this edition from its English-language counterpart. Like Coup, the game is a masterclass in social deduction with a minimal component set — just 24 cards and a handful of tokens — but delivers a surprising amount of psychological depth.

