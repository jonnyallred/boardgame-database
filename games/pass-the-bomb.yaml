description: |
  Pass the Bomb is a fast-paced word party game published by Piatnik in which players frantically think of words containing a specific letter combination before the ticking bomb in their hands goes off. A card is flipped revealing a letter pair, the die determines where in a word those letters must appear (beginning, middle, or end), and players rapidly pass the bomb as each person shouts a valid word containing the letters. The unlucky player holding the bomb when it explodes collects the card as a penalty, and the winner has the fewest penalty cards after thirteen rounds. The tension of the randomly timed explosion creates hilarious party moments.

