description: |
  Existensminimum (Swedish for "minimum subsistence") is a 2003 Swedish board game designed by Ann-Sofie Persson and two collaborators as a response to the endless wealth-accumulation games dominating the market. Rather than striving to become a millionaire, players take on the roles of economically disadvantaged people trying simply to survive and improve their circumstances — perhaps saving enough for a car, an education, or other basic necessities. Persson, a single mother of five, drew from personal experience to create a more grounded and socially conscious alternative to Monopoly-style games. The game sparked discussion about poverty, social inequality, and the values embedded in mainstream board games.

