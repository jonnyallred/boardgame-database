description: |
  Panzer Command (subtitled "The Gateway to Stalingrad") is a tactical-level hex-and-counter wargame published by Victory Games in 1984, recreating armored battles on the Soviet steppes during the pivotal 1942–43 winter campaign south of Stalingrad. Designed by Eric Lee Smith, the game is notable for introducing a chit-draw activation system that allowed players to activate one formation at a time, creating suspense and realistic command uncertainty — a mechanic that has since become widely adopted across the wargame hobby. The game's focus on combined-arms operations at the platoon and company level makes it a respected study in Eastern Front armored warfare, blending tactical realism with engaging gameplay.

