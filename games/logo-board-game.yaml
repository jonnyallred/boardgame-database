description: |
  The Logo Board Game is a brand and advertising trivia game published by Drumond Park in which players answer questions about company logos, products, slogans, and brand identities. Players move around the board by correctly identifying well-known commercial brands from multiple categories — logos, characters, colors, and associated products — with questions testing recall of everyday branding encountered in shops and on television. It has sold millions of copies, particularly in the UK and Europe, and has spawned numerous themed and updated editions. The accessible brand-recognition format makes it a popular choice for family and party game nights, as virtually everyone has unconsciously memorized the logos being questioned.

