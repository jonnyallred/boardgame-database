description: |
  Battle Rider is a light racing game published by Ravensburger in 1992 in which players race vehicles around a track using dice rolls, with combat or blocking elements allowing players to knock back opponents. The combination of racing and combat-light mechanics creates an interactive racing experience more engaging than pure movement games. Simple enough for family play, Battle Rider fits in the genre of accessible family games popular in the early 1990s. Documentation on this specific title is limited.

