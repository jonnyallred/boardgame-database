description: |
  Tyranid Attack is a 1992 board game set in the Warhammer 40,000 universe, published by Games Workshop and designed by Gerry Grace. Players control Space Marines battling against waves of Tyranid creatures (alien horrors) in a tactical skirmish game inspired by the look and feel of the Space Hulk franchise. One or more players command the beleaguered Space Marines while opponents control the swarming Tyranids, creating an asymmetric 1-vs-many experience. It is a classic entry in GW's lineup of standalone board games from the early 1990s.

