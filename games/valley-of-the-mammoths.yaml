description: |
  Valley of the Mammoths is a 1991 board game designed by Bruno Faidutti, first published by Ludodélire and later reissued by Jeux Descartes. A slightly tactical old-style game set in prehistoric times, it occupies territory somewhere between Risk and Civilization with a generous dose of fun and chaos. Players lead prehistoric tribes competing for dominance across the valley, using dice, special abilities, and tactical cunning to outmanoeuvre rival clans. With support for three to six players and a playtime of up to three hours, it is designed for an evening of raucous prehistoric conquest.

