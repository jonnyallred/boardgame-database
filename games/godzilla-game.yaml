description: |
  The Godzilla Game is a children's board game manufactured by Mattel in 1978 as a licensed product from Toho's Godzilla franchise. Players attach their miniature spaceships to a rotating platform and take turns spinning a numbered wheel, moving the platform based on the result; occasionally the spin releases a spring-loaded Godzilla figure that reaches out and "eats" one of the ships. Each player controls six spaceships designed after the P-1 spacecraft from Invasion of the Astro-Monster (1965), and the last player with any ship surviving wins. Its novel spring-loaded action piece and kaiju theme made it a beloved novelty toy of the late 1970s.

