description: |
  DragonStrike is a 1993 adventure board game from TSR designed as an accessible gateway to Dungeons & Dragons. One player takes the role of the Dragon Master, controlling monsters and setting adventure challenges, while up to four other players each command a hero — Warrior, Wizard, Thief, Elf, or Dwarf — across four different game boards including an outdoor map. The game bears strong similarities to HeroQuest but features a more advanced combat system using polyhedral dice and famously included an instructional VHS video. Praised as "perhaps the most lavishly packaged, user-friendliest introduction to role-playing ever published," it remains a nostalgic collector's piece.

