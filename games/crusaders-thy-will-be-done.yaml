description: |
  Crusaders: Thy Will Be Done is a strategy game for 2–4 players in which each player leads a knightly order—each with asymmetric special powers—spreading influence across medieval Europe. The game's signature mechanic blends a personal rondel with mancala-style action token distribution: choosing a wedge takes the action with strength equal to the tokens on it, then distributes those tokens clockwise, constantly reshaping future options. Players upgrade their rondels over the course of the game, allowing their order's faction ability to interact with their evolving action choices in deeply satisfying ways.

