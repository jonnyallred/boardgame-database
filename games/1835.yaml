# Description
description: |
  A classic 18XX railroad stock market and operations game set in Germany. Players
  invest in and manage German railway companies from the mid-19th century, buying
  and selling shares while operating trains to generate revenue. Companies must lay
  track across the German map, purchase trains of increasing capability, and pay
  dividends to shareholders. The game features Prussian state railways as major
  corporations alongside smaller private lines, creating a rich economic simulation.
  Among the most popular 18XX titles, known for its well-balanced map and accessible
  (relative to the genre) ruleset.

