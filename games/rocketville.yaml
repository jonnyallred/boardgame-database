description: |
  Rocketville is a lighthearted area majority game designed by Richard Garfield, set in a retro-futuristic "Hometown USA" community where 3-5 players campaign to become Mayor. Players travel between districts by rocket ship, accumulating votes by making promises to constituents, collecting endorsements from influential figures, and deploying robotic campaign helpers. The game combines area control, hand management, and light auction mechanics in an accessible format that delivers the spirit of competitive electioneering with a whimsical Atomic Age aesthetic. Published by Avalon Hill in 2006, it is a light and accessible design from the creator of Magic: The Gathering.

