description: |
  Catan: Ancient Egypt is a standalone Catan variant designed by Klaus Teuber that transplants the classic Settlers mechanics to the time of the Pharaohs. Players build settlements and temples along cattle pastures, papyrus groves, and quarries, using oxcarts to transport resources and competing for victory points. Optional variant modules include god cards and a Great Pyramid scenario where players race to earn the Pharaoh's blessing. The Egyptian theme is a fresh visual coat on familiar Catan gameplay, making it accessible to fans of the original and new players alike.

