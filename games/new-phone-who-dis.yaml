description: |
  New Phone, Who Dis? is an adult party card game published by What Do You Meme? in 2018. Each round, one player draws an Inbox card depicting a text message prompt and reads it aloud; all other players select the funniest Reply card from their hand and pass it face-down to the judge. The judge picks their favorite pairing and awards that player a point. The game's humor derives from the wide range of absurd, relatable, and awkward text message scenarios paired with deadpan or ridiculous replies, making it a quick and accessible game for groups who enjoy Cards Against Humanity-style party games.

