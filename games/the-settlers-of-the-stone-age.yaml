description: |
  The Settlers of the Stone Age is a 2002 standalone Catan variant designed by Klaus Teuber, set in prehistoric Africa during the Stone Age migration of early humans across the globe. Players guide Homo sapiens populations outward from Africa, gathering resources, developing technologies, and claiming territories on all continents. The game models real prehistoric dynamics including the slow desertification of Africa and the exploration bonuses of spreading into new regions, with victory points rewarding the successful peopling of the world. It won the 2003 International Gamers Award for General Strategy and is part of the Catan Histories subseries.

