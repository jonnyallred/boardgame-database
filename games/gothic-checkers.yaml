description: |
  Gothic Checkers, known in German as Altdeutsche Dame (Old German Draughts), is a historic draughts variant influenced by Turkish Draughts and played on an 8x8 board with sixteen stones per player, arranged in the two back ranks. Soldiers move one cell diagonally forward and can capture in the five forward-facing and sideways directions, promoting to kings on the last row; kings move freely in all eight directions. The player who captures all enemy stones wins, and players must always take the maximum possible captures. Its expanded movement rules compared to standard checkers add tactical depth to a familiar game framework.

