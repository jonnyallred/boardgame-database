description: |
  The Star Wars Customizable Card Game is a collectible card game published by Decipher from 1995 to 2001, at its peak the second best-selling CCG in the world behind Magic: The Gathering. One player controls the Light Side of the Force while the other plays the Dark Side, using 60-card decks to battle across iconic Star Wars locations. The "Destiny" system uses card draws to resolve random outcomes, and the Force Pile mechanic creates a resource system tied to your deck size. Notably, no card was ever banned from tournament play; instead, Decipher released specific counter-cards to balance problem strategies.

