description: |
  Balloon Cup (also published as Piñata) is a sharp two-player card game designed by Stephen Glenn and nominated for the 2003 Spiel des Jahres. Players compete in a series of hot-air balloon races across mountain and plains terrain tiles, playing numbered cards on either side of the tiles. Mountains require high cards to win; plains reward low cards. Since players may add cards to either side of any tile, each placement is both an offensive and defensive decision. The player who first collects three of the five trophies wins, delivering a remarkably tense and replayable game in under 30 minutes.

