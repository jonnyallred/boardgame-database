description: |
  Deutschlandreise (Germany Trip) is a classic German children's board game first published by Otto Maier Verlag in 1935 and designed by Jochen Zeisse to help children learn the names and locations of German cities. Players travel across a map of Germany, collecting destination cards and racing to visit eight cities before returning to their starting point. The game was re-published by Ravensburger and became a beloved family classic across multiple generations, also serving as the predecessor to its sister games Europareise and Weltreise. Simple dice-and-movement mechanics make it accessible from age 6 while offering genuine geographic learning.

