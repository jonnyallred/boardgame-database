description: |
  Roope-Setä Liikemiespeli is a Finnish family board game published by Tactic in 2010, themed around Uncle Scrooge (known as "Roope-Setä" in Finnish) from the beloved Disney duck universe. In the Monopoly-style economic game, players move around the board buying shares in various businesses, collecting income when others land on their properties, and navigating event cards that bring surprise fortunes or misfortunes. The goal is to accumulate the most wealth before the game ends, befitting the miserly yet lovable character of the world's richest duck. The familiar Disney theming makes it an approachable and entertaining option for Finnish families with children.

