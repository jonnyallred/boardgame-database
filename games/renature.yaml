description: |
  Renature is an area-majority game played with dominoes for 2–4 players in which players restore a polluted valley to its natural state. Each turn, players place an animal-themed domino onto the valley board and then plant vegetation cubes matching the numbers on the domino's halves. At the end of each round, each region of the valley is scored for the player who has the most vegetation there. The interplay between domino placement and the area-control scoring creates interesting blocking and efficiency puzzles, while the nature-restoration theme gives the dry mechanics appealing visual warmth. Designed by the acclaimed duo Michael Kiesling and Wolfgang Kramer.

