description: |
  Bagh-Chal (meaning "tigers move" in Nepali) is a traditional asymmetric strategy game from Nepal played on a 5×5 point grid. One player controls four tigers; the other controls 20 goats. The tiger player aims to capture five goats by jumping over them; the goat player aims to surround and immobilize all four tigers. Goats are introduced one at a time from outside the board during the first phase, then both sides move in the second phase. The elegant asymmetry — one side trying to corral the other while being hunted — makes it a classic example of hunt games found across many cultures.

