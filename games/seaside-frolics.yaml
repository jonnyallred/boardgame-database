description: |
  Seaside Frolics is a family board game published by San Serif in 1986 set in Shrimpton-on-Sea, a charming Edwardian-era seaside resort. Players compete to visit as many attractions and sights as possible in a limited time, collecting a postcard for each location they visit. The game evokes the leisurely atmosphere of early 20th-century British seaside holidays, with its period artwork and theme of wholesome tourist exploration.

