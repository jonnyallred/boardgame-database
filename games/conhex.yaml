description: |
  ConHex is a two-player connection game invented by Michail Antonow in 2002, played on a unique board of 41 non-regular hexagonal cells surrounded by 69 vertex holes. Players alternate placing pieces on vertices, and once a cell has pieces on at least half of its surrounding vertices, it is claimed by that player. The objective is to connect your two colored sides of the board through a continuous chain of claimed cells. Draws are impossible by design, and the indirect nature of cell-claiming — controlling vertices to claim spaces — creates a fascinating positional game distinct from Hex or Havannah. It is considered a noteworthy entry in the connection games genre by abstract game theorists.

