description: |
  Messina 1347 is a 1-4 player worker placement and engine building game designed by Raúl Fernández Aparicio and Vladimír Suchý, set during the Black Plague's catastrophic arrival in Sicily in 1347. Players take on the roles of noble Messina families evacuating the city to the countryside while simultaneously rescuing citizens and combating the spread of infection. Over six rounds, players place three workers on a modular hex board, using fire to clear plague cubes and gain bonuses on an infection track — creating an unusual loop where engaging with the game's central threat becomes mechanically rewarding. The engine-building system rewards players who develop synergistic combinations of rescued inhabitants and built-up powers.

