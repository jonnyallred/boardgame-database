description: |
  Patrol Chess is a chess variant invented by Frederik Hendrik von Meyenfeldt in 1975 in which a piece can only capture or give check if it is guarded (or "patrolled") by a friendly piece. All non-capturing and non-checking moves function as in standard chess. This single rule change fundamentally transforms piece interactions, rendering unprotected attackers harmless and making mutual support a prerequisite for offensive action. The variant has been widely used in chess problems and can also be played as a complete game. It is considered one of the more elegant fairy chess conditions for the way it reframes every tactical calculation.

