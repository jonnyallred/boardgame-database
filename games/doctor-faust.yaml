description: |
  Doctor Faust is a two-player abstract strategy game by Reinhold Wittig, published by Schmidt Spiele in 1990, in which two rival devils compete for control of Dr. Faust's soul. Each player moves their devil stone across a shared board, attempting to land on the same space as a crystal pyramid (the Soul) and then guide it onto their other devil stone to earn soul cards. Players can also place devil cards to block opponents, but landing next to an opponent's devil card ends the turn early. The winner is determined by the value of soul cards collected plus devil cards played, and the game won a SdJ Special Award for Beautiful Game.

