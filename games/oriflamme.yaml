description: |
  Oriflamme is a fast and cutthroat medieval political card game for 3-5 players in which rival noble families compete for the French throne by building an Influence Queue of face-down cards. Each round players simultaneously place a new card face-down in the queue, then reveal and resolve cards one at a time — activating powerful abilities that assassinate rivals, generate gold, or boost influence. Each player's deck of ten cards is identical at the start but only seven are dealt per game, ensuring variety and unpredictability. Winner of the French As d'Or award in 2020, Oriflamme packs genuine strategic tension into a 20-minute playtime, with the player accumulating the most Influence Points after six rounds crowned the new ruler.

