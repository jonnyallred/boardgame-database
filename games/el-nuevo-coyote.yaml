description: |
  El nuevo coyote ("New Coyote") is a traditional Mexican board game dating to approximately 1930-1950, featuring illustrations by artist Guadalupe Posada. Played on a folding board with a grid framed by coyote illustrations and Spanish-language instructions, the game is similar to checkers: one player controls a coyote that captures chickens by jumping over them, while the other player (controlling twelve chickens) attempts to corner the coyote so it can no longer move. The game is a variant of the ancient "fox and hens" family of asymmetric hunt games. Examples are preserved in museum collections as historical artifacts of Mexican folk game culture.

