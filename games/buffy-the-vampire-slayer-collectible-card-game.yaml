description: |
  The Buffy the Vampire Slayer Collectible Card Game is a CCG published by Score Entertainment in 2001, based on the hit TV series. Players build decks around heroes and villains from the show, battling for control of Sunnydale by earning destiny points through winning fights and completing challenges or by controlling Sunnydale Park for six consecutive turns. The base set "Pergamum Prophecy" was followed by two expansions: Angel's Curse and Class of '99. The game uses playmats to represent the various Sunnydale locations from the show.

