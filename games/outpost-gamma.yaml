description: |
  Outpost Gamma is a two-player sci-fi asymmetric wargame published by Dwarfstar Games in 1981, set on the colony world of Irda where ten Imperial Legionnaires must defend their outpost against a horde of native Irdans who have revolted against colonial exploitation. One player commands the high-tech but vastly outnumbered Legionnaires while the other controls the massive Irdan forces aided by sweeping planetary storms that disrupt combat unpredictably. The game's quick setup and fast-playing combat system — emphasizing high-technology versus low-technology asymmetry — made it a popular title in Dwarfstar's line of affordable, accessible wargames aimed at bringing new players into the hobby.

