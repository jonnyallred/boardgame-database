description: |
  Colomino is a simple tile-placement game in the Ravensburger Casino series in which players place multi-colored tiles on a shared board, arranging them so that their colors match adjacent tiles already placed. The rules are straightforward and accessible to young children, and the compact format makes it easy to play almost anywhere. While information about its designer is limited, the game provides a gentle introduction to spatial reasoning and color matching for younger players.

