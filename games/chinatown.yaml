description: |
  Chinatown is a 1999 negotiation and trading game by Karsten Hartwig, originally published by Alea and later reprinted by Z-Man Games, set in the bustling streets of San Francisco's Chinatown from the 1960s to the 1980s. Players randomly receive shop tiles and building lots each round, then engage in an open negotiation phase where anything can be traded — lots, tiles, and cash — to assemble matching sets of shops on contiguous lots and earn escalating income. Because tile and lot distributions are often mismatched, almost every turn demands deal-making and horse-trading with other players. Widely praised for its pure negotiation experience, it earned a Spiel des Jahres Recommended nod in 1999 and has become a beloved classic of the genre.

