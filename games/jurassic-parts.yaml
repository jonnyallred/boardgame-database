description: |
  Jurassic Parts is a light area enclosure and set collection game where players are paleontologists excavating a shared slab of rock made of hex tiles representing dinosaur fossils. On their turn, players place chisels around hex tile edges to claim sections; when a section breaks free, tiles are divided with the largest contributor taking the most. Collected tiles are assembled into dinosaur skeletons worth varying victory points, rewarding both opportunistic play and long-term fossil completion. Illustrated by Andrew Bosley (Everdell), the game offers an accessible and visually charming experience for families and casual groups.

