description: |
  Oceania is a simplified two-player tile placement game designed by Klaus Teuber, published by Mayfair Games as a streamlined offshoot of his game Entdecker. Players place an explorer ship on the board and draw sea tiles, placing them according to a matching rule (water must border water, land must border land) to build up islands and sea routes across the Pacific. The game also supports solo play. While simpler than most of Teuber's designs, it captures the pleasant exploratory feeling of gradually revealing a beautiful island landscape through shared tile placement, making it an accessible and relaxing gateway experience.

