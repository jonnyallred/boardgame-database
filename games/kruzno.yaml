description: |
  Kruzno is a 2005 two-player abstract strategy game played on a hexagonal board using chess pieces, though it functions more as a variant of hexagonal checkers. Players begin with nine pieces each — three rooks, three knights, and three bishops — governed by an intransitive rock-paper-scissors capture rule: rooks capture knights, knights capture bishops, and bishops capture rooks. A piece may also jump (without capturing) over pieces of the same type or its own color, creating a unique movement system unlike traditional checkers. This layered system of intransitive dominance and selective jumping rewards deep strategic planning.

