description: |
  Invasion America is a 1976 SPI wargame depicting a fictional near-future scenario in which three mega-national alliances — the European Socialist coalition, the South American Union, and the Pan Asiatic League — jointly invade the United States and Canada in the year 2000. Played using hex-and-counter mechanics with an "I go, You go" sequence, the game features untried units that simulate fog of war, multi-front strategic management, and six shorter scenarios plus a massive 60-turn campaign game. A notable Cold War-era wargame that imagines a plausible alternate military catastrophe on American soil.

