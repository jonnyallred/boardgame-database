description: |
  Funny Friends is a life-simulation card game in which players guide their characters from teenage years through adulthood, shaping their personalities, relationships, and careers through a series of random and chosen life events. Each decision affects attributes like wealth, health, spirituality, and various addictions, while social bonds between characters mean that one player's choices can ripple through their friends' lives. The objective is to be the first player to achieve five personal life goals drawn at the start of the game. Its irreverent tone — characters might become rock stars, priests, or have unexpected romantic encounters — makes it a hit at adult game nights.

