description: |
  Headache is a classic family race-and-capture game first released by Kohner in 1968, featuring the iconic Pop-O-Matic bubble in the center of a circular board containing two dice — one standard and one with a special red-dot side granting a bonus turn. Players move cone-shaped pieces around the board and can stack their cones on top of opponents' cones to capture them, with unlimited stacking depth creating cascading takeovers. The game's distinctive mechanics and satisfying bubble-popping dice mechanic have made it an enduring part of family gaming culture, with editions published by multiple companies over the decades.

