description: |
  Diamant (also published as Incan Gold) is a rapid press-your-luck card game for 3-8 players designed by Alan R. Moon and Bruno Faidutti. Players simultaneously decide each round whether to continue deeper into a gem mine or retreat with their haul — brave explorers who press on share any newly revealed gems, while those who flee keep what they've collected. The catch is that drawing two of the same hazard card (snakes, spiders, fires) sends all remaining adventurers home empty-handed. Played over five cave expeditions, the game is a masterclass in tension and group psychology that plays in about 20 minutes.

