description: |
  Time Tripper is a science fiction board game published by SPI in 1980 in which players control Vietnam War-era American GIs who accidentally manipulate time and are transported to famous battles throughout history and the future. Each player must survive and complete objectives across wildly different combat settings, making it an unusual blend of historical simulation and science fiction adventure. The game was a finalist for the 1981 Origins Award for Best Fantasy or Science-Fiction Board Game.

