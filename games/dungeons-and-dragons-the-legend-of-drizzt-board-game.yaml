description: |
  Dungeons & Dragons: The Legend of Drizzt Board Game is a 2011 cooperative adventure game from Wizards of the Coast and the third entry in the D&D Adventure System series. Players take the roles of Drizzt Do'Urden and his iconic companions from R.A. Salvatore's bestselling Forgotten Realms novels, exploring a modular dungeon of interlocking tiles, battling monsters, and completing scenario objectives. The game includes 40 detailed plastic miniatures, 200 encounter and treasure cards, and a rulebook and scenario book with multiple adventures. Its contents are fully compatible with Castle Ravenloft and Wrath of Ashardalon, allowing fans to mix heroes and monsters across all three games.

