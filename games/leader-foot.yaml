description: |
  Leader Foot is a racing board game published by Milton Bradley in which players compete in an automobile race, using dice and cards to advance their vehicles and hinder opponents. Players manage speed and position on a racing track, with various cards and events creating tactical opportunities to pull ahead or sabotage rivals. The game captures the excitement of motor racing in a family-accessible format with colorful vehicles and track boards. Part of Milton Bradley's broad line of racing-themed family games in the early 1990s, it offers light competitive fun for groups who enjoy the racing genre.

