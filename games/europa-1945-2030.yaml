description: |
  Europa 1945-2030 is a political and cooperative negotiation game designed by Duccio Vitale and Leo Colovini and published by Eurogames in 1998 that traces the creation and expansion of the European Union from the post-war period through a projected future. Players represent EU delegates traveling across European nations, working through four historical turns to remake the history of European integration from 1945 onward. When a country accumulates enough delegate presence, it becomes eligible to join the Union — but only if the players can reach agreement. The game also models the threat of armed conflict that players must collectively avert to maintain standing, blending political negotiation with cooperative decision-making.

