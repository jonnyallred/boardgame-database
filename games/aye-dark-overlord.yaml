description: |
  Aye, Dark Overlord! is a storytelling bluffing card game in which one player takes the role of the wrathful Dark Overlord, while the others portray hapless goblin minions desperately inventing excuses for their failures. When called upon to explain why the Overlord's plans were thwarted, each goblin must incorporate one of their Hint cards into a wild, improvised story — then try to shift blame to another player. The game rewards quick wit and shameless creativity. Winner of Best Card Game at Lucca Comics and Games 2005.

