description: |
  Time's Up! is a classic team-based party game in which players race through three progressive rounds to identify famous names from a shared deck of cards. In round one, clue-givers can say almost anything; in round two, only a single word is permitted plus gestures; and in round three, no words at all — only sounds and acting. Because the same deck of names cycles through all three rounds, players build familiarity with the cards, making later rounds a hilarious callback to earlier clues. The game's escalating restrictions transform casual name-dropping into increasingly absurd performances, creating memorable shared moments. It has won over 15 awards since its 1999 debut and inspired numerous editions and spin-offs.

