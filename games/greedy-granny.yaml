description: |
  Greedy Granny is a dexterity and press-your-luck children's game published by Goliath Games in 2018. Players take turns spinning a wheel to determine which treat to steal from Granny's tray as she dozes in her rocking chair, then carefully reach in to take it—but one wrong move triggers the chair and sends her false teeth flying. The first player to collect one of each treat wins, making every turn a tense balancing act between greed and caution. Its simple rules and slapstick premise make it a hit for young children and family game nights.

