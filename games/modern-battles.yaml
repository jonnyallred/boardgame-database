description: |
  Modern Battles: Four Contemporary Conflicts is a quadrigame published by SPI in 1975, containing four separate wargames sharing a common rule system. Three of the four games are set in the early 1970s, with Chinese Farm and Golan based on battles from the 1973 Yom Kippur War, Mukden based on a hypothetical Soviet incursion into Manchuria, and Wurzburg depicting a hypothetical Warsaw Pact invasion of West Germany. Each game features its own map and counters while using the unified rules covering modern combined-arms combat. The game reached #3 on SPI's bestseller list upon release and remained in the top ten for four months.

