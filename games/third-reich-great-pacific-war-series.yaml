description: |
  The Third Reich/Great Pacific War series refers to Avalon Hill's grand strategy World War II wargame series beginning with Rise and Decline of the Third Reich (1974), designed by John Prados. Players command the major powers of WWII across the entire European or Pacific theater from 1939-1946, managing armies, navies, air forces, and production through detailed strategic turns. The series evolved through Advanced Third Reich (1992) and its Pacific counterpart Empire of the Rising Sun (1995), which could be combined for a full global war simulation. In 2003, GMT Games republished a redesign as A World at War. The series is celebrated as one of the most comprehensive and ambitious WWII strategic simulations in the wargame hobby.

