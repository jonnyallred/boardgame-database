description: |
  Composio is a word-building game played on a board with tracks under each letter of the alphabet, with differently colored pieces for each player. The first player secretly thinks of a word and deposits a piece under one of its letters; subsequent players must think of a word containing that letter plus at least one new letter, expanding the hidden word step by step. When a player cannot continue, they pass; the last player standing must announce their word, scoring if valid or losing points if not. Cards played at the start of each round add restrictions — such as banning a specific letter — that force players to search for creative alternatives.

