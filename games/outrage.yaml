description: |
  Outrage! is the official Tower of London board game, published by Imperial Games in 1992, in which players move through the Tower of London attempting to steal the British Crown Jewels while evading Yeoman Warders. The game is loosely inspired by Thomas Blood's 1671 real-life attempt to steal the jewels. To steal a crown jewel, a player must reach the White Tower with burglary tools and cannot pass a Yeoman Warder while carrying jewels without a disguise card. A Deluxe edition featuring handcrafted jewels made of genuine precious metals and stones was produced and became the most expensive board game in the world at around £8,000. The standard edition remains a charming British novelty game with a loyal following.

