description: |
  Sampo is a Finnish board game from 1904 themed around the legendary Sampo artifact from the Finnish national epic Kalevala, in which the magical object is said to bring great fortune to its possessor. The game is notable as a historic artifact of Finnish gaming culture and is part of the permanent collection at the Finnish Museum of Games. As with many games of its era, specific rules and gameplay details are limited in modern documentation, but the game likely employed the race or fortune-gathering mechanics common to early 20th century family board games. The Sampo mythos has since inspired several modern game adaptations exploring Finnish mythology.

