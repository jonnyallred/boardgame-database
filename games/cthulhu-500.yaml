description: |
  Cthulhu 500 is a comedy motor racing card game designed by Jeff Tidball and published by Atlas Games in 2004. Players race eldritch vehicles — including the Sports Cthutility Vehicle and the Car of Cthulhu — in a chaotic mashup of H.P. Lovecraft's Cthulhu Mythos and NASCAR-style motorsport. Players spend actions upgrading their vehicles, adding pit crew members, and attempting to pass the car in front, with the winner being whoever has the most laps when the checkered flag card appears. The game won the Origins Award for Best Traditional Card Game of 2004 and remains a beloved niche comedy title.

