description: |
  The Thin Red Line is a 1979 hex-and-counter wargame designed by S. Craig Taylor and published by Yaquinto Publications, simulating the Battle of Waterloo on June 18, 1815. One player commands Napoleon's French Imperial forces, the other controls the Duke of Wellington's Anglo-Allied army in one of history's most pivotal battles. With 275 counters, a large hex-grid map, and a 24-page rulebook, the game offers moderate-to-complex tactical simulation of this decisive Napoleonic engagement. It was one of eight games simultaneously introduced by Yaquinto at GenCon XII in 1979, marking the publisher's debut in the wargame market.

