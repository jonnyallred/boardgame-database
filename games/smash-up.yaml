description: |
  Smash Up, designed by Paul Peterson and published by Alderac Entertainment Group, is the "shufflebuilding" game
  where players combine two 20-card faction decks into a single 40-card deck. Eight factions — including Pirates,
  Zombies, Dinosaurs, Robots, Ninjas, Aliens, Wizards, and Tricksters — each bring unique mechanics to the table,
  such as pirates moving cards and zombies recycling discards. Players race to smash Bases by accumulating the most
  power tokens on them, with points awarded for first through third place. Every faction combination creates a
  completely different playstyle.

