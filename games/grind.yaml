description: |
  Grind is a two-player extreme combat sports board game set in the Warmachine universe, released by Privateer Press in 2009. Each player fields a team of steam-powered mechanical giants—Runners and Crushers—equipped with interchangeable weapon arms, battling to move a giant spiked ball into the opponent's goal. Drawing inspiration from football, rugby, hockey, and stock car racing, the game blends aggressive physical positioning with careful action-point management and dice rolling. Players customize their steamjack squads before each match, and the collision of tactics and brute force makes every game a chaotic, satisfying contest.

