description: |
  Pacific Typhoon is a card game for 3-7 players published by GMT Games that recreates the great air-naval battles of the Pacific War in World War II, using the same system as the popular 1998 Avalon Hill game Atlantic Storm. Players are not assigned to fixed sides — each holds a hand of force cards representing Allied and Japanese warships, submarines, aircraft, special weapons, and events — and compete in twenty sequential historical battles using the available cards to win as many as possible. The round leader designates the battle type (Air, Surface, Sub, or Combined), and players play cards blind before simultaneous reveal, with the highest combat value in the declared suit winning. A typical game with experienced players completes in about an hour.

