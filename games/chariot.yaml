description: |
  Chariot: Tactical Warfare in the Biblical Age, 3000-500 B.C. is a board wargame published by SPI in 1975 and the first title in the PRESTAGS (Pre-Seventeenth Century Tactical Game System) series. Evolved from the earlier Armageddon game, it simulates Bronze and Iron Age battles from Egypt through the early Greek city-states and Etruscan Rome, with chariots playing a central role in each of its 14 scenarios. Players alternate through fire, movement, and melee phases on a hex map. Despite reaching the top 10 of SPI's bestseller chart, it sold fewer copies than the other four PRESTAGS titles.

