description: |
  Caesar!: Seize Rome in 20 Minutes! is a 2021 two-player asymmetric area-control game by Paolo Mori, published by PSC Games, in which one player commands Julius Caesar and the other leads Pompey in a showdown for the Roman Republic. Players draw influence tokens from a bag and allocate them to provinces — but they only ever hold two markers at a time and never know which they'll draw next, injecting a compelling push-your-luck uncertainty into every deployment decision. Three optional modules add poison, powerful Centurions, and underhanded tactics to expand the experience. Designed to play in about 20 minutes, it delivers a punchy and historically evocative wargame in a tiny package.

