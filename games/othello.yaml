description: |
  Othello (also known as Reversi) is a classic two-player abstract strategy game played on an 8×8 board with 64 reversible discs that are light on one side and dark on the other. Players take turns placing discs so that they bracket and flip one or more of the opponent's pieces, turning them to their own color. The game's famous tagline — "a minute to learn, a lifetime to master" — captures its accessibility combined with profound strategic depth. Originally dating to Victorian England as Reversi, the modern Othello trademark was patented in Japan in 1971 by Goro Hasegawa and has since sold tens of millions of copies worldwide, remaining one of the best-known abstract strategy games ever made.

