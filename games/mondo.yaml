description: |
  Mondo is a real-time tile-placement game designed by Michael Schacht and published by Hans im Glück in 2011. All players simultaneously race against a sand timer to grab tiles from a central pool and place them on their individual world boards, trying to create complete, matching biome regions populated with animals while avoiding volcanoes and mismatched edges. When the timer expires, players score for completed regions, animal diversity, and bonuses while losing points for incompletions and exposed volcanoes. Mondo includes three difficulty levels, additional challenge goals, and solo rules, making it a flexible and fast filler.

