description: |
  The Final Frontier is a 1992 Star Trek: The Original Series board game published in the United
  Kingdom by Toys & Games Limited (under the BMI imprint). Players pilot the USS Enterprise on
  a mission to visit five planets during the five-year-mission and return to Earth, moving across
  a four-piece "Solar Chart" gameboard depicting eleven planets. The game is a simple roll-and-move
  design with Starfleet event cards triggering random effects like extra turns or movement bonuses.
  A collectible artifact of 1990s Star Trek merchandise, it is more valuable as a piece of fandom
  nostalgia than as a game experience.

