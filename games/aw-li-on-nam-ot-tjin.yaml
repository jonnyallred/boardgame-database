description: |
  Aw-li On-nam Ot-tjin is a traditional board game from the Jicarilla Apache people of the American Southwest. Played on a cross-shaped track, players race their pieces around the board using sticks or dice-like implements to determine movement, competing to be the first to complete a circuit. The game is part of a broader family of Native American racing games and is related in structure to other indigenous track-racing games played across North America. Documentation is primarily ethnographic, and the game holds cultural significance as part of Jicarilla Apache heritage.

