description: |
  The Builders: Middle Ages is a fast card game in which players recruit workers and assign them
  to construction projects to earn gold and prestige. Each worker has a specialty and a daily wage,
  and players must match the right workers to each building under construction, paying upkeep costs
  while maximizing efficiency. Completing buildings earns victory points and gold that fuels further
  recruitment. The game is notable for distilling worker-placement concepts into a compact, accessible
  card format that plays quickly while still rewarding smart hand management.

