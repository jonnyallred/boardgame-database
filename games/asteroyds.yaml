description: |
  Asteroyds is a real-time planning space racing game designed by Guillaume Blossier and
  Frédéric Henry, published by Ystari Games in 2010. Players simultaneously plan their
  spacecraft's route through a dangerous asteroid field within a time limit — about one
  minute for beginners, reduced to 30 seconds for experts. The challenge lies in plotting
  a safe path before time runs out and then executing those moves while other players'
  ships may interfere. The combination of spatial reasoning under time pressure and
  simultaneous planning creates a frantic yet thoughtful experience.

