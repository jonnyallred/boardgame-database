description: |
  Maestro is a German-style board game published by Hans im Glück in 1989 in which players run theatrical agencies competing to fill ten orchestras of varying sizes with musicians. Players acquire musician cards and strategically assign them to orchestras, trying to complete the most valuable ensembles before opponents can claim them. The game is an early example of the set-collection Euro style that Hans im Glück would become famous for. Limited English-language sources are available for this title.

