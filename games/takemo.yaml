description: |
  Takemo is a 1989 two-player word game in which players each occupy opposing sides
  of the board and independently place words on their own defense lines. Words must
  be at least two letters long and must be common nouns — proper nouns, foreign words,
  abbreviations, and compound names are prohibited. On each turn, a player may place
  a new word on their defense line, connect a word to an existing word of their color
  (similar to Scrabble), attempt to reach the opponent's defense line (scoring a
  "Takemo" joker), or capture opponent words. The game blends Scrabble-like word
  placement with territorial strategy.

