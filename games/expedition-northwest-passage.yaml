description: |
  Expedition: Northwest Passage places players in the role of 19th-century Arctic explorers
  navigating the treacherous passage from Greenland to the Pacific. Players tile-place to
  build the frozen seascape, managing action points to explore, gather supplies, and set
  up camps before the seas freeze them in place. The race to return safely before winter
  closes in creates mounting tension, while the modular board ensures a unique geography
  every game. A solo variant adds replayability for solo gamers.

