description: |
  Kashgar: Merchants of the Silk Road is a 2-4 player deck-building game by Gerhard Hecht, originally published in 2013 and released in English by Grail Games in 2018. Players are spice merchants traveling the ancient Silk Road, managing three caravans simultaneously — each a vertical stack of cards where only the top of each is visible and accessible. On each turn, a player executes the one available action from one of the three active caravan tops, then cycles that card to the bottom of its stack, revealing a new card and new possibilities. This open deckbuilding structure creates a satisfying puzzle of planning ahead while watching each caravan's progression, earning a Fairplay à la carte award in 2014.

