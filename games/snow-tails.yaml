description: |
  Snow Tails is a sled-racing game designed by the Lamont Brothers and published by Asmodee in 2008, set in
  the Arctic where players race dog sleds across a modular track assembled differently each game. Each player
  manages a personal Dog Deck, playing cards onto three sled mat slots — left dog, right dog, and brakes —
  with forward speed determined by the combined dog values minus braking. Because sleds drift toward the faster
  dog, cornering and collision management are key skills, and collecting Dent cards for reckless driving shrinks
  your hand size, adding escalating penalty.

