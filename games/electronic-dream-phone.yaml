description: |
  Electronic Dream Phone is a 1991 deduction game published by Milton Bradley and designed by Michael Gray (creator of Mall Madness). Players use an included electronic pink toy phone to call one of 24 fictional teenage boys, gathering clues about clothes, sports, food, and hangout spots in order to identify which boy has a secret crush on them. A Speakerphone card allows all players to hear a call, while a Share a Secret card lets two players listen privately. The process-of-elimination gameplay and pop-culture teen theme made it an iconic 1990s girls' game and a significant piece of nostalgic board game history.

