description: |
  Crack List is a fast-paced party word game combining elements of categories and Uno into a card game format. A category is chosen, and each player holds a hand of letter cards — the twist is that your answer to the category must start with the letter on the card you play. A 20-second time limit creates real-time pressure, and special Action cards can be played at any moment to disrupt the current proceedings. The combination of letter constraint and category challenge produces naturally funny answers and memorable failures. Simple to explain and quick to play, it is well-suited for large mixed-age groups at parties or family game nights.

