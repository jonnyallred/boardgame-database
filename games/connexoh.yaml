description: |
  Connex'Oh is an abstract connection game published by the French toy and game company Djeco. Players place rotatable tiles on the board, and by twisting the tiles they can create connected corridors of matching colored halves, allowing pieces of that color to advance along the path. The tile rotation mechanism gives the game a unique puzzle-like quality, as the board state can shift dramatically with a single tile twist. The game's simple rules and colorful components make it accessible to children while offering enough spatial reasoning depth to entertain adults.

