description: |
  Comet is a competitive card game set in a prehistoric world where players guide animals to safety before a devastating comet strikes. Players manage asymmetric hero cards alongside silver and gold animal cards, using clever multi-use card play to move creatures into a safe cavern and score rescue points. Each animal has unique abilities that activate once safely sheltered, driving a satisfying engine of escalating powers. The game ends when the last silver card is drawn, triggering the comet phase for a dramatic final push. Comet stands out for its lack of direct combat, emphasizing strategic optimization and hand management over aggression.

