description: |
  Brilliant Lances is a starship combat wargame published by Game Designers' Workshop in 1993 as part of the Traveller: The New Era line. Set in the gritty far-future universe of Traveller, it provides detailed rules for ship-to-ship battles using a hex-based map, with individual system tracking for damage, maneuver, and weapons fire. The game is designed for serious wargamers who want a high-fidelity simulation of space naval combat in the Traveller setting.

