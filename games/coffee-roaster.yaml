description: |
  Coffee Roaster is a 2015 solo bag-building game by designer Saashi (Saashi & Saashi) in which the player simulates the art of roasting coffee beans to brew the perfect cup. On each turn, tokens are drawn from a cloth bag representing the roasting process — the key mechanic is managing the bag's contents by removing undesirable tokens and adding beneficial ones, controlling roast level without overshooting it. After roasting, the player brews a cup and scores based on how well the coffee profile matches the target recipe. With multiple coffee varieties to master and a satisfying push-your-luck tension in every draw, it is one of the most celebrated solo board games in the hobby.

