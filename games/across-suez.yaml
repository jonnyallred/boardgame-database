# Description
description: |
  A tactical hex-and-counter wargame published by SPI simulating the Battle of the
  Chinese Farm (October 15, 1973) during the Yom Kippur War. Egyptian and Israeli
  forces clashed in intense fighting over a strategic agricultural station near the
  Suez Canal. The game models the chaotic close-quarters combat of the operation
  as Israeli forces attempted to push through Egyptian lines to reach the canal.
  Later editions were published by Decision Games.

