description: |
  Isolation is a classic two-player abstract strategy game originally published as Isola by Ravensburger in 1972. Players take turns moving their pawn one square in any direction and then removing any tile from the board, creating a hole that neither player can enter. The goal is to trap your opponent so they cannot move. Simple rules conceal deep tactical complexity as the board shrinks and movement options narrow — chosen by Games magazine for "The Games 100" in 1980 and republished internationally under multiple names including Stranded and Isolation.

