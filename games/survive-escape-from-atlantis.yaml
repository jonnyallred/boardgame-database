description: |
  Survive: Escape from Atlantis! is a competitive survival game in which players
  race to evacuate their colored villagers from a sinking island before sea
  monsters devour them. The island is constructed from tiles that are
  progressively removed, revealing the ocean below, while sharks, giant squid,
  sea serpents, and dolphins roam the waters around the boats carrying survivors
  to safety. Players must balance moving their own pieces and sabotaging
  opponents, making each session a chaotic and often hilarious struggle.
  Originally published by Parker Brothers in 1982 and later reissued by
  Stronghold Games, it remains a beloved classic of family gaming.

