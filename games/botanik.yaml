description: |
  Botanik is a two-player abstract tile-placement game published by Space Cowboys in which rival scientists compete to assemble a formula made from flowers in a mechanical-botanical world. Players alternate placing flower tiles onto a shared grid, trying to complete their own patterns while blocking their opponent's progress. Its clean rules and tight competitive focus make it an excellent two-player filler, with meaningful decisions packed into a very short play time.

