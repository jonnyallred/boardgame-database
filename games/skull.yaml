description: |
  Skull is a razor-simple bluffing game for 3-6 players that won the 2011 As d'Or award. Each player places one of their three rose coasters or their single skull coaster face-down, then players bid on how many they can flip over without revealing a skull. Once bidding is done, the highest bidder must flip that many coasters starting with their own — and if they hit a skull, they lose one of their coasters. The first player to win twice wins the game. Skull strips bluffing to its psychological core: pure read-the-table tension with almost no rules to learn.
