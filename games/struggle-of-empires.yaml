description: |
  Struggle of Empires is Martin Wallace's epic area-control game for 2–7 players recreating the 18th century wars between European powers competing for dominance in Europe and the colonial world. Each game is divided into three wars, with players first bidding to form alliances before competing to control territories across multiple continents. Armies and fleets are built, colonies established, and wars declared in a rich interplay of economic development, military expansion, and diplomatic maneuver. The alliance system is particularly brilliant: it prevents runaway leaders and forces shifting coalitions, generating intense negotiation and political drama throughout a sweeping, thematic experience.

