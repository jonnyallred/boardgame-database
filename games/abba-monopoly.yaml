# Description
description: |
  ABBA Monopoly is a themed edition of the classic Monopoly board game featuring
  the iconic Swedish pop group ABBA. The standard Monopoly mechanics — roll dice,
  buy properties, collect rent, and bankrupt opponents — are reskinned with ABBA
  branding, music references, and imagery from the band's catalog.

  Properties, tokens, and board spaces are themed around ABBA songs, albums, and
  locations significant to the band. This collector's edition appeals to both
  Monopoly enthusiasts and ABBA fans, serving as both a playable game and a
  memorabilia piece.

