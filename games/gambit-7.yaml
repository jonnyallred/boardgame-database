description: |
  Gambit 7 is a light party game built around numerical estimation and social betting. Players simultaneously write down answers to numerical questions, then wager on their own or other players' responses, scoring points for both accuracy and successful betting. The game rewards confident bluffing and reading the room as much as knowing correct answers. Over seven rounds, the player who accumulates the most points wins, making it an accessible choice for mixed groups who enjoy trivia with a social deduction twist.

