description: |
  Numble: The Cross-Number Game is a mathematical tile-placement game from 1968 by Selchow and Righter, the maker of Scrabble, using the same board, wooden holders, and wooden number tiles as that classic word game but replacing words with arithmetic. Players lay sequences of numbered tiles whose face values must sum to a multiple of three, with double and triple value spaces on the board that must be factored into the required total. Like Scrabble, tiles are placed in intersecting patterns and must connect to existing tiles. A short-lived but beloved curiosity from the crossword game era, Numble was discontinued after limited commercial success but remains sought after by vintage game collectors.

