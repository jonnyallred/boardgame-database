description: |
  PRESTAGS (Pre-Seventeenth Century Tactical Game System) is a collection of five interconnected hex-and-counter wargames published by SPI in 1975, covering battles from the Bronze Age through the Renaissance. The five games — Chariot, Legion, Spartan, Viking, and Yeoman — share a common rule set while each featuring period-specific rules that highlight the distinctive features of warfare from their respective eras. The games were also released together as the PRESTAGS Master-Pack, making it one of the earliest unified wargame systems.

