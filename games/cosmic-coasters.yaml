description: |
  Cosmic Coasters is a compact sci-fi abstract game by Andrew Looney of Looney Labs, played on custom drink coasters representing Galilean moons of Jupiter. Each coaster-moon has four factories, four control points, and a teleporter. Players take turns moving counters (coins or similar tokens) to capture factories and control points, using Rock Paper Scissors to resolve contested battles — keeping it bar-appropriate. To win, you must seize the opponent's teleporter and beam one of your ships back to your home moon. The game was intentionally designed to be played in bars or cafes using items already on hand, and won the 2002 Origins Award for Best Abstract Board Game.

