description: |
  Spanish Checkers (Damas Españolas) is a traditional two-player variant of Checkers played in Spain for
  centuries on a standard 8x8 board. Each player begins with 12 pieces on the dark squares of their three
  home rows. Common pieces capture forward by jumping adjacent enemy pieces with an empty square beyond, while
  Kings — formed when a piece reaches the back rank — can move diagonally in any direction across multiple
  squares and capture at range. The objective is to capture all of the opponent's pieces or leave them with
  no legal moves.

