description: |
  Scrabble is the iconic crossword tile-placement game invented by Alfred Mosher Butts in the 1930s and trademarked in 1948, in which two to four players score points by placing letter tiles onto a 15x15 board to form interconnecting words. Each letter has a point value based on its frequency in English, and special squares double or triple letter or word scores. The game rewards vocabulary, strategic use of premium squares, and efficient rack management, and has become one of the best-selling and most-played board games in history with competitive play organized worldwide.

