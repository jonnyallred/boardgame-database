description: |
  Mad Gab is a hilarious word party game by Terry White and Mattel in which teams compete to decode phonetic puzzle cards in 30 seconds. The puzzle cards display nonsense word strings — like "Ice Mail Ask Hunk" — which, when read aloud quickly enough, sound like a recognizable word or phrase ("I smell a skunk"). One team reads and guesses while the opposing team listens for the answer, ready to steal if time runs out. The game's irresistible auditory illusions and the moment of sudden recognition create consistent bursts of laughter, making it a perennial party game favorite since the mid-1990s.

