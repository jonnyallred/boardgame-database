description: |
  The Fall of Rome is a 1973 solitaire wargame by John Young, published by SPI as a pullout in
  Strategy & Tactics #39 and as an individual flatpack game. The player controls Rome's beleaguered
  legions across a full European hex map as barbarian hordes attack by pre-determined rules from
  100 to 500 CE. Managing treasuries, raising militias, and suppressing barbarian revolts within
  the empire add layers of crisis management. The automated barbarian movement system creates a
  relentless pressure that mirrors the historical inevitability of Rome's decline. A revised
  edition by Joe Miranda was published in Strategy & Tactics #181 in 1997.

