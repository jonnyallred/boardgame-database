description: |
  Vector 3 is a science fiction space combat microgame published by Simulations Publications, Inc. (SPI) in 1979, designed by Greg Costikyan. Set in the densely populated Gilgamesh Cluster, the game pits two warring civilizations against each other in tactical starship combat. What makes Vector 3 distinctive is its rigorous use of Newtonian physics: ship movement is calculated using genuine vector arithmetic, tracked simultaneously on separate X-Y and X-Z charts to simulate three-dimensional space. The game functions as both an entertaining wargame and an educational tool for teaching vector math and the principles of orbital mechanics.

