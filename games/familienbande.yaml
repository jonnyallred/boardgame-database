description: |
  Familienbande (German for "Family Ties") is a 2004 dedicated deck card game designed by Leo Colovini and published by Winning Moves as the third entry in their compact game series. Players use family-themed cards to build sets and score points, navigating the interactions between family members and their connections. The game's compact format and light rules make it an accessible choice for families seeking a quick card game, while Colovini's characteristic elegant design ensures there are meaningful choices within the short play time.

