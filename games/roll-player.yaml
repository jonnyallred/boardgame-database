description: |
  Roll Player is a competitive dice-drafting and character-building game for 1–4 players that turns the character creation phase of a fantasy RPG into a full game in its own right. Players race to build the best RPG character by drafting dice to fill their character sheet's six attributes, aiming to match target numbers while also equipping armor, weapons, skills, and traits drawn from a shared market. Every die placement triggers a special action, creating delightful chained decisions. The game rewards optimization and forward planning as you try to fulfill alignment goals, backstory requirements, and class objectives simultaneously.

