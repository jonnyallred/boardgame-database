description: |
  Love Letter is a compact deduction card game for 2-4 players, played with a tiny deck of just 16 cards representing courtly characters ranked from 1 (the Guard) to 8 (the Princess). On each turn, a player draws one card and must play one of their two cards, triggering its effect — peeking at hands, forcing discards, or eliminating rivals. The last player remaining, or the one holding the highest card when the deck runs out, wins a favor token; collecting enough tokens wins the game. Designed by Seiji Kanai and originally self-published in Japan in 2012, Love Letter became a massive global hit for its brilliant distillation of tension and deduction into just 16 cards.

