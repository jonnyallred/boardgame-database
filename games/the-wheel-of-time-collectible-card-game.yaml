description: |
  The Wheel of Time Collectible Card Game is an out-of-print CCG published by Precedence Entertainment beginning in December 1999, based on Robert Jordan's epic fantasy series. Unusually among CCGs of its era, the game required a play mat, tokens, and custom six-sided dice alongside the card decks, creating a distinctive play experience. Precedence Entertainment closed in April 2002 before releasing a planned third expansion "The White Tower" or the planned 2nd Edition revision, cutting the game's lifespan short. It remains a collector's item prized by Wheel of Time fans, representing a faithful attempt to bring the Aes Sedai, Warders, and Dark One's forces of the series to the tabletop.

