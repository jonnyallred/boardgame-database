description: |
  Rail Baron is a classic railroad empire board game published by Avalon Hill in 1977, one of the earliest games with a railway theme. Players move trains along historical US railroad lines, collecting delivery payoffs by hauling passengers between cities. The key economic decision involves purchasing railroad lines to earn tolls when other players use them, creating a competitive web of infrastructure ownership and route planning. Rail Baron remains a beloved classic of the American railroad game tradition.

