description: |
  Connect Four is a classic two-player abstract strategy game in which players take turns dropping colored discs into a seven-column, six-row vertical grid. The first player to form an unbroken line of four of their own discs — horizontally, vertically, or diagonally — wins. Invented by Howard Wexler and first published by Milton Bradley in 1974, it has since sold tens of millions of copies worldwide. Despite its simple rules, Connect Four has been mathematically solved (the first player can always win with optimal play), and it remains a gateway game beloved by children and a subject of study in combinatorial game theory.

