description: |
  Starfighter is a 2015 two-player space combat card game by Stéphane Boudin published by Ystari Games. Each player commands a capital ship, launching waves of fighters represented by cards that trigger abilities whenever they become visible at the edge of a row — creating a distinctive "sliding reveal" mechanic where playing or moving cards can uncover new ability icons. Three game modes are included: a stripped-down introductory Initiation mode, a more complete Skirmish mode, and a Total War deck-building variant where players construct their own decks. Published to high production standards with thick linen-finish cards and wooden tokens.

