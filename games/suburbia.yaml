description: |
  Suburbia is a 2012 tile-laying city-building game by Ted Alspach published by Bézier Games. Players build towns using hex-shaped building tiles representing residential, commercial, civic, and industrial zones as well as special points of interest. Each tile placed modifies income and reputation — income determines spending power, while reputation drives population growth — and the player with the largest population at game end wins. Players must also achieve secret borough goals while managing interactions with neighboring towns. A winner of the Mensa Select award, Suburbia rewards thoughtful planning and engine optimization.

