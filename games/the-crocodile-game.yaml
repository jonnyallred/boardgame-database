description: |
  The Crocodile-Game (Das Krokodil-Spiel) is a suspenseful two-player bluffing game in which players
  each control a crocodile competing for dominance of the river. Players attempt to see through their
  opponent's tactics by reading intentions and timing attacks, creating a quick cat-and-mouse dynamic.
  The game is designed for children but rewards reading opponents over raw luck. Originally published in
  1987, it was later reissued by Noris-Spiele; specific original publisher details are not fully confirmed
  in available sources.

