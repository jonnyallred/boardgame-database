description: |
  Big Elementary School Game (Das große Grundschulspiel) is a German educational board
  game published around 2011 and winner of Toy of the Year in Germany. Players answer
  trivia questions from their own grade level — question sets spanning grades 3 through 8
  — using step cards, bluff tokens, and teacher tokens to collect diplomas. The leveled
  question system allows children of different ages to compete fairly against each other,
  making it ideal for mixed-age family play.

