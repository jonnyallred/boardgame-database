description: |
  Rogue Trooper is a British board wargame published by Games Workshop in 1987, based on the iconic 2000 AD comic strip created by Gerry Finley-Day and Dave Gibbons. Two players each control a Rogue Trooper G.I. hunting across the devastated hex-map wasteland of Nu-Earth, racing to find and eliminate the traitor responsible for the Quartz Zone Massacre. Players explore a card-revealed hex board with plastic G.I. miniatures, uncovering what lies in each area as they track their quarry. The game captures the comic's bleak military sci-fi atmosphere and features cover art by original artist Dave Gibbons, making it a notable piece of 2000 AD merchandise history.

