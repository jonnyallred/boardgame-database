description: |
  Sabika is a 2022 strategic Euro game designed by Germán P. Millán, set during the Nasrid dynasty in medieval Spain, in which players take on the roles of nobles contributing to the construction of the magnificent Alhambra palace complex. The game features a novel triple-rondel mechanism integrating three interrelated action wheels — one for building construction, one for carving poems in the palace halls, and one for exporting goods along trade routes. Players manage hex tiles and optimize their rondel positions across the three interconnected scenarios, creating rich multidimensional decision-making. Sabika delivers exceptional strategic depth and replayability through its innovative interlocked rondel system.

