description: |
  Fabulantica is a 2020 fairy-tale memory and movement game designed by Marco Teubner and published by Matagot, nominated for the 2019 Kinderspiel des Jahres (Children's Game of the Year). A magical spell has scattered the residents of Fabulantica across the land, taking refuge in towers, and players must find and reunite specific pairs of inhabitants. Each turn players play travel cards corresponding to different path types to move across the modular board, or use a Magic Carpet to teleport anywhere they choose. With three open mission cards to track simultaneously, the game rewards both memory and planning in an accessible package designed for ages 6 and up.

