description: |
  De Kolonisten van de Lage Landen (Settlers of the Low Countries) is a standalone Catan variant published by 999 Games in September 2009, designed by Klaus Teuber. Played on a map of the Netherlands and Flanders instead of the standard hex board, it retains the core Catan mechanics of resource gathering, trading, and settlement building while incorporating Dutch geographic features — including coastal settlements that produce fish tokens in addition to standard resources. A wooden monument marker system adds further regional flavor. It is one of several country-specific Catan editions produced for different European markets.

