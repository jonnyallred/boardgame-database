description: |
  Battle for Moscow is a two-player hex-and-counter wargame designed by Frank Chadwick, simulating the German Army Group Center's drive toward Moscow in Operation Typhoon, autumn 1941. Published as a quick-play introductory wargame, it uses streamlined rules accessible to new players while capturing the key historical dynamics: German mechanized speed versus Soviet reserves and the brutal Russian winter. The game fits on a single sheet map and plays in under two hours, making it an influential gateway wargame that introduced many players to the hobby in the 1980s.

