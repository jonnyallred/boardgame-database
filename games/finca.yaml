description: |
  Finca is a euro strategy game set on the Spanish island of Mallorca, in which players manage fruit-harvesting operations at windmill-powered farms. The game's distinctive mancala-style mechanism governs how farmers move around the board to collect almonds, oranges, lemons, figs, and grapes, then deliver crops to fulfill orders. The number of farmers in a group determines how many move, creating an elegant push-pull between timing and efficiency. A reprint in 2024 by Pandasaurus Games introduced new art, streamlined gameplay, and a fifth player to revive this out-of-print classic.

