description: |
  Rise! is a two-player abstract strategy game published by Crash Games in 2012, designed by Michael Coe, in which players race to construct three towers on an ever-changing modular board. To build a tower, a player must surround an empty space with a ring of six of their own workers — then maintain that ring for two additional turns while all three tower layers are added. Alternatively, a player can win by eliminating all of their opponent's workers from the board. The continuously evolving board state and spatial ring-encirclement mechanic deliver a satisfying combination of simple rules and meaningful strategic depth.

