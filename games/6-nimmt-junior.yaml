# Description
description: |
  6 nimmt! Junior is the children's version of the classic card game 6 nimmt!
  (also known as Take 6!), designed by Wolfgang Kramer. Published by Amigo, this
  junior edition simplifies the original to make it accessible for younger
  players while retaining the core simultaneous card play mechanic.

  Players simultaneously reveal cards and add them to rows on the table, trying to
  avoid collecting cards. The simplified rules and colorful animal theme make it
  an ideal introduction to hand management card games for children aged 5 and up,
  while the simultaneous play keeps all players engaged throughout.

