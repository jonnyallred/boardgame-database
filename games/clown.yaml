description: |
  CLOWN is a light dice and tile-collecting game in which players roll a die each turn to receive tiles representing different body parts of a clown. Higher die rolls result in bigger body parts, and after eight rounds the player who has assembled the biggest clown wins. The game is a lighthearted, luck-driven title suitable for young children and families. Publisher and precise publication year details are limited in available sources.

