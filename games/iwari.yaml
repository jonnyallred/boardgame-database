description: |
  Iwari is a beautiful reimagining of Michael Schacht's acclaimed Web of Power, featuring
  streamlined mechanics for 2-5 players. Players play cards to place tents and totems on
  a board divided into territories, competing for area majorities across different regions.
  The rule that each placement is restricted to a single territory per turn, combined with
  the need to play multiple cards to do so, forces players to carefully manage their hand
  while watching opponents' plans. Simple rules belie deep tactical and positional play.

