description: |
  Coloretto is a quick card game of color collection and painful trade-offs. On each turn a player either draws a card and adds it to one of the growing rows, or claims a row for themselves. At game end, players score positive points for their three largest color groups but negative points for every additional color they collected. The cruel twist: rows become more valuable the more cards they hold, tempting players to grab a stacked row even if it's full of colors they don't want. Designed by Michael Schacht and first published in 2003, Coloretto is an elegant filler that distills tough decisions into just two choices per turn.

