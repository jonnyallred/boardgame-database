description: |
  1936 Guerra Civil (also known as La Guerra Civil Española 1936) is a two-player wargame published by NAC in 1981, notable as one of the first wargames ever published in Spain. The game simulates the Spanish Civil War, with one player commanding Republican forces and the other controlling the Nationalist rebels, each seeking military or diplomatic victory. Its historical significance as an early Spanish wargame makes it a collector's item, and a fan-made enhanced edition with improved components was produced in 2009.

