description: |
  Panzer Warfare is a 1979 tactical board wargame that was part of Yaquinto Publications' inaugural lineup of eight games introduced at GenCon XII. Using simultaneous movement mechanics — where both players secretly plot their orders before revealing them — the game simulates armored combat at the platoon and company level on the Eastern Front of World War II. The simultaneous movement system is the game's defining feature, adding significant realism and unpredictability at the cost of longer play times compared to traditional IGO-UGO wargames. Panzer Warfare shares design DNA with the Yaquinto Panzer system later republished by Avalon Hill and ultimately reimagined by GMT Games.

