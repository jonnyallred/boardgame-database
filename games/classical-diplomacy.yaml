description: |
  Classical Diplomacy is a five-player variant of the classic Diplomacy board game, set in the Hellenistic Mediterranean following the death of Alexander the Great. One of only six commercially released Diplomacy variants, it uses the familiar Diplomacy rules and negotiation mechanics adapted to an ancient world map, with factions competing to control 18 supply centers. Players must combine military maneuvering with diplomatic negotiations, alliances, and betrayals to achieve dominance. The ancient setting provides fresh strategic dynamics compared to the original WWI-era map while retaining Diplomacy's legendary social tension.

