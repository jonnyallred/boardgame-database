description: |
  Vallco Professional Drag Racing is a card-based drag racing game invented by Greg Zyla, with origins dating to a prototype in 1963 and reaching the commercial market in 1975. Players compete as professional drag racers — initially featuring only Pro Stock drivers — using cards and dice to simulate the high-speed quarter-mile competition of professional drag racing. The game captures the tension of the strip through its mechanics, making it appealing to motorsport fans looking to experience NHRA-style competition at the tabletop.

