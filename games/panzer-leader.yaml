description: |
  Panzer Leader is a tactical hex-and-counter wargame published by Avalon Hill in 1974 as the direct sequel to PanzerBlitz, shifting the focus from the Eastern Front to the Western European theater of World War II including the Normandy campaign and the Battle of the Bulge. Designed by Jim Dunnigan, the game features four geomorphic map tiles, twenty scenarios, and improved rules over its predecessor that added air attack mechanics, engineers, and new spotting rules to address exploitable "PanzerBush" tactics. The map boards are fully interchangeable with PanzerBlitz maps, allowing players to combine both sets for larger battles. Together, PanzerBlitz and Panzer Leader defined the tactical wargame genre for a generation of players.

