description: |
  Gomocup is the premier worldwide artificial intelligence tournament for Gomoku and Renju, held annually since 2000. Based on the ancient abstract game Gomoku (five-in-a-row), players or AI programs alternate placing black or white stones on a grid, aiming to form an unbroken line of five; Renju adds forbidden-move rules to balance the game for human play. The Gomocup tournament has grown to around 40 AI participants from ten or more countries and serves as the definitive benchmark for Gomoku AI strength. As a physical abstract game, Gomoku itself requires only a Go board and stones, making it freely playable anywhere.

