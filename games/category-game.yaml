description: |
  Category Game is a party word game designed by Spartaco Albertarelli and published by Editrice Giochi in 1994. Players compete in teams to name words that fit a given category (shown on a column card) and begin with a specific letter (shown on a row tile) within a 15-second time limit. Words earn marble tokens of varying point values, and the team that collects marbles worth the most points wins. The game features a 5x5 grid of plastic components and plays quickly, making it a lively group activity.

