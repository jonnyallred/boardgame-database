description: |
  Feudum (Latin for fiefdom) is a complex euro-style economic game for 2-5 players set in a fantastical medieval world. Each turn, players select four cards from a hand of eleven unique action cards representing characters and resources, with each card offering a basic or advanced action, then execute them simultaneously. Players control medieval characters that roam the countryside farming, taxing towns, seizing outposts, and competing to acquire feudums that grant influence in one of six powerful guilds. The game rewards careful hand management, long-term economic planning, and adapting to opponents' guild strategies over five scoring epochs.

