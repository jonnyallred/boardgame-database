description: |
  Hyper Battle is a tactical space wargame published by Future and Fantasy Games in 1981, set in a future conflict between Earth and an Alpha Centauri colony. Players command opposing forces in tactical space combat scenarios, managing units across a conflict that spans interstellar distances. As a product of the early 1980s small-press wargaming scene, it offered science fiction themes at a time when space opera settings were beginning to proliferate in the hobby.

