description: |
  Austerlitz is a 1972 Avalon Hill hex-and-counter wargame simulating Napoleon's decisive victory over the Austro-Russian coalition at the Battle of Austerlitz on December 2, 1805. Players command either the French forces under Napoleon or the combined Allied armies, maneuvering infantry, cavalry, and artillery across a hex map of Moravia. The game captures the tactical brilliance of Napoleon's feigned weakness on his right flank and the critical seizure of the Pratzen Heights. A product of Avalon Hill's classic era, it offers the simulation depth characteristic of Napoleonic wargaming of the period.

