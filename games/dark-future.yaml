description: |
  Dark Future is a post-apocalyptic vehicular combat miniatures game published by Games Workshop in 1988, set in a dystopian alternate 1995 America where privatized police ("Sanctioned Operatives") pursue outlaws and gang raiders across lawless highways. Players maneuver plastic car models along an ever-extending cardboard track representing the endless interstate wastelands, using customized vehicles armed with guns, missiles, and ramming capabilities. Unlike most Games Workshop games of the era, its linear track format made it uniquely suited to high-speed road battles. It was recently revisited via a video game adaptation and a nostalgia-driven community revival.

