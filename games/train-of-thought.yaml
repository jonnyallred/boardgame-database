description: |
  Train of Thought is a creative word party game published by Tasty Minstrel Games in which the active "conductor" must lead other players from a starting word to a destination word using only three-word clues — and one of those words must come from a previous guess. The chaining mechanism forces increasingly creative associations as the chain grows longer, rewarding lateral thinking and generating plenty of memorable moments. The simple rules make it immediately playable for ages 10 and up across groups of 2–7.

