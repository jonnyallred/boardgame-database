description: |
  Gùgōng (Forbidden City) is a 2-4 player worker placement and hand management game by Andreas Steding set in Ming Dynasty China, published by Game Brewer in 2018. Players take on the roles of powerful Chinese families seeking influence by exchanging gifts with imperial officials — the central mechanic requires playing a card to take an action space, but the card played must be of higher value than the card already at that location, which is taken as the worker's replacement. This gift exchange system creates a flowing hand management puzzle where every action simultaneously fuels future options. Players travel across China, sail the Grand Canal, purchase jade, construct the Great Wall, and seek a coveted audience with the Emperor to accumulate victory points.

