description: |
  Rescue from the Hive is a sci-fi tactical combat game designed by Nick Karp and published by SPI in 1981, originally appearing as a pull-out game in Issue 7 of Ares magazine. Set in the future, one player commands a squad of Earth Space Marines attempting to rescue Ambassador Helstrom and his daughter from an alien Znon spacecraft, while the other player operates the ship's defenses, trying to hold out until the hyperdrive can engage. Solitaire rules allow the Space Marine player to face automated Znon defenses, and a Polish edition was published under the title W imieniu Ziemi.

