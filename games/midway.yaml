description: |
  Midway is a two-player naval wargame published by Avalon Hill in 1964 simulating the pivotal Battle of Midway during World War II. The Japanese player must successfully invade Midway Island by bringing a heavy cruiser ashore within the game's time limit, while the American player seeks to prevent this and sink opposing ships. The game operates at the individual ship and air squadron level, using a divided search map to maintain the fog of war as players hunt for each other's fleets. Praised for its simplicity as an introduction to wargaming, a revised Smithsonian Edition was released in 1991 to mark the 50th anniversary of Pearl Harbor.

