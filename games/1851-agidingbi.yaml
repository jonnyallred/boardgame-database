description: |
  1851 Agidingbi is Nigeria's first variant of chess, designed by culture activist and historian Oludamola Adebowale and set against the backdrop of Lagos history in 1851. The game uses a traditional checkered board but replaces standard chess pieces with figures drawn from Lagos royalty and chieftaincy, including the Oba of Lagos as king, the Erelu-Kuti as queen mother, the Adamu Eyo as rook, and the Omo Ogun Eko as pawn. Gameplay follows chess rules but requires players to understand the cultural narratives and historical events of Lagos in 1851 to fully engage with the game's themes. It is available both as a physical board game and a digital app.

