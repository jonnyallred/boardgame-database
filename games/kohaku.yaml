description: |
  Kōhaku is a serene koi-pond-building tile game where players draft pairs of tiles—a
  Koi and a Feature—from a central pond board and place them into their personal sanctuary.
  Koi tiles come in multiple varieties with distinct placement rules, while Feature tiles
  add lily pads, lanterns, and rocks to score bonuses. The quiet, meditative theme and
  elegant drafting decisions create a peaceful and accessible game suitable for families,
  with a solo mode for single-player enjoyment.

