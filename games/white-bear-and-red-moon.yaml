description: |
  White Bear and Red Moon is a fantasy hex-and-counter wargame set in Glorantha, Greg Stafford's mythological game world that would later become the backdrop for RuneQuest. Players command the forces of the invading Lunar Empire or the defending barbarian kingdom of Sartar, with each side commanding armies of infantry, cavalry, heroes, and powerful magical units. The game blends conventional wargame mechanics with unique elements such as hero units and magical organizations drawn from Gloranthan mythology. It was the founding product of Chaosium and established the Glorantha setting that has influenced tabletop roleplaying ever since.

