description: |
  Civilization: The Boardgame is a groundbreaking 1980 design by Francis Tresham that packs the sweep of human history from 8000 BC to the Roman era into a single game. Two to seven players each lead a historical civilization, expanding territory, trading resources, and advancing through a technology tree of inventions — including notable calamities — as they compete for cultural and technological supremacy. Civilization pioneered the civilization-building genre in both analog and digital gaming, directly inspiring Sid Meier's legendary video game series, as well as games like 7 Wonders and Through the Ages. Winning the 1983 Origins Award, it is considered one of the most historically significant board games ever designed.

