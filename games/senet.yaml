description: |
  Senet is one of the oldest known board games, with depictions dating to approximately 3100 BCE in ancient Egypt, where it was played as both a pastime and a symbolic journey through the afterlife. Played on a 3x10 grid of 30 squares, two players race their pawns from start to finish using throwing sticks or knuckle-bones as random generators, with special squares granting benefits or penalties along the path. By the New Kingdom era, the game had acquired deep religious symbolism representing the soul's passage through the Duat, and game boards were frequently buried with the deceased including in Tutankhamun's tomb.

