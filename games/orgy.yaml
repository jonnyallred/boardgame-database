description: |
  Orgy is an unusual trick-taking card game played with a standard 52-card deck in which Jacks, Queens, and Kings all share an equal rank of zero, while numbered cards score face value. Players are dealt 13 cards each, the dealer names trump, and play proceeds with standard suit-following rules. Scoring rewards forming valid "orgies" — sequences of at least three cards alternating male and female face-card ranks taken in tricks — with one point per card in the qualifying group. A player who captures all four Queens plus five or more Jacks and Kings achieves a Maximum Orgy and wins immediately. The game's provocative name and unusual scoring mechanism make it a notable curiosity in the literature of card games with standard decks.

