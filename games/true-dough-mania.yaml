description: |
  True Dough Mania is a 1982 Canadian political satire board game created by George J. Reti and published by Chieftain Products. Its title is a pun on "Trudeaumania," the popular excitement surrounding Prime Minister Pierre Trudeau during the 1968 election. Subtitled "a game of chance where you have no chance," the game lampoons Canadian political life and economic policy in a lighthearted, luck-driven format.

