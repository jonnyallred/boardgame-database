description: |
  Equinox is a fantasy betting and bluffing card game, a reimagining of Reiner Knizia's
  classic Colossal Arena. Players place bets on which mythical creatures they believe will
  survive an ancient tournament, with the lowest-value creature eliminated each round.
  By playing cards to influence creature values and secretly wagering on outcomes, players
  must manage both the tournament and their opponents' expectations. The clever interplay
  between card play and betting creates constant tension as the field narrows to a final
  survivor.

