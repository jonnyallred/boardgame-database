description: |
  Serpent's Tongue is a spell-casting card game by Christopher Gabrielson and UnBound Games in which players become Magi wielding an actual constructed language to cast spells. Each player builds a Hardbound Spell Codex containing incantations and must speak or perform the spells aloud during play, lending the game a unique live-action quality. The modular design supports both competitive PvP duels and cooperative campaign play, and can be expanded with additional Inscription Packs or converted into a full GM-led RPG experience.

