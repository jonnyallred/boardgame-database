description: |
  Guilford Courthouse is a hex-and-counter wargame simulating the 1781 Battle of Guilford Court House during the American Revolutionary War, designed by Frank Chadwick, Marc Miller, and Greg Novak for Game Designers' Workshop. Players command British forces under Cornwallis against Nathanael Greene's Continental Army in one of the war's most tactically significant engagements, using period-accurate unit types and formations. Originally released in 1978 as a ziplock game, it was later reissued in 1980 as a boxed set and again in 2002 by GMT Games with an expanded version covering both Guilford Courthouse and Eutaw Springs.

