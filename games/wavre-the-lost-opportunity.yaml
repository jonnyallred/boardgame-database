description: |
  Wavre: The Lost Opportunity is a 1976 hex-and-counter wargame from SPI simulating the Battle of Wavre, the largely overlooked engagement fought on June 18–19, 1815 between Marshal Grouchy's French forces and General Thielemann's Prussian rear guard—occurring simultaneously with Waterloo. The game explores the counterfactual opportunity Grouchy had to potentially march to Napoleon's aid at Waterloo instead of pursuing the Prussians, making it a study of a decisive moment of inaction in military history. An obscure but historically significant title from SPI's prolific Napoleonic wargaming catalog.

