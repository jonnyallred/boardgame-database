description: |
  Stonehenge: An Anthology Board Game is a landmark 2007 design published by Paizo Publishing under the Titanic Games imprint — widely considered the world's first anthology board game. Five celebrated designers — Richard Garfield, Richard Borg, James Ernest, Bruno Faidutti, and Mike Selinker — were each given the same set of components and created entirely different games using them: a magic duel, a political simulation, a battle game, an auction game, and a science fiction game respectively. The shared physical components (the iconic Stonehenge monument and pieces) belie five completely distinct gaming experiences, showcasing the creative range of these legendary designers.

