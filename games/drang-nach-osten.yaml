description: |
  Drang Nach Osten! ("Drive to the East!") is a 1973 monster wargame from Game Designers' Workshop, designed by Frank Chadwick and Paul R. Banner, that simulates Operation Barbarossa — the German invasion of the Soviet Union — from June 1941 through the Soviet winter counteroffensive of March 1942. With over 1,000 counters and a massive hex-grid mapboard, it was the first entry in the Europa series, a planned grand simulation of the entire Second World War in Europe using unified rules and map scale. The companion game Unentschieden extends the campaign through May 1945. In a 1976 Simulations Publications poll of 202 games, the DNO/Unentschieden combination was voted the most popular wargame in North America.

