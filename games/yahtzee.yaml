description: |
  Yahtzee is a classic dice game in which players take turns rolling five dice up to three times per
  turn, trying to achieve scoring combinations such as three-of-a-kind, straights, and the coveted
  Yahtzee (five of a kind). Players mark completed combinations on a scorecard, and each category
  can only be scored once per game. Originally inspired by the Canadian yacht game "Yacht," it was
  commercialized by Edwin S. Lowe in 1956 and became one of the best-selling dice games in history.

