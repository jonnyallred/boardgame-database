description: |
  Troyes is an acclaimed Euro strategy game set in medieval Champagne, France, in which players manage the three domains of the famous city — religious, military, and civil — through a unique dice drafting mechanism. Each round, players roll dice matching their influence in each domain, then use or purchase dice to activate character cards representing historical figures of the era. The strategic depth comes from hiring opponents' dice and blocking their plans while pursuing hidden individual objectives. Published by Pearl Games in 2010, Troyes became a modern classic for its elegant blend of chance and deep strategic decisions.

