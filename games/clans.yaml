description: |
  Clans is a deceptively simple prehistoric-themed board game designed by Leo Colovini and published by Rio Grande Games in 2002. Players secretly draw a color at game start — red, yellow, blue, green, or black — and spend the game moving nomadic huts across the board to found villages when a territory becomes completely enclosed. Since everyone scores points for the color they are assigned, and those assignments are hidden, players must simultaneously try to benefit their own color while bluffing and deducing opponents' secret identities. With only one action per turn and a four-page rulebook, Clans is an accessible but deeply strategic game.

