description: |
  Pueblo is an abstract 3D building game designed by the award-winning duo Wolfgang Kramer and Michael Kiesling, published by Ravensburger in 2002. Players place wooden building blocks to construct a pueblo village while trying to hide their own colored blocks from the roaming Chief figure, who reveals hidden block faces and scores penalty points against the owning players. The goal is to avoid scoring — the player with the fewest exposed blocks wins, creating a tense strategic puzzle of concealment and misdirection.

