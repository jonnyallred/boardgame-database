description: |
  L'Anniversaire des triplés (The Triplets' Birthday) is a 1991 French children's board game published by Nathan in which players advance along a calendar track divided by months. Players use dice to move their cake-shaped game pieces around the track, collecting candles each time they pass their birth month and gift cards when landing on it exactly — but some gifts are poisoned. The first player to collect enough candles to match their age wins. A light, thematic racing game designed to introduce young children to turn-based board gaming through a birthday celebration theme.

