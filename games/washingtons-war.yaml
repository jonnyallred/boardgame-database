description: |
  Washington's War is Mark Herman's redesign of his pioneering card-driven wargame We the People, published by GMT Games in 2010 and set during the American Revolutionary War. One player controls American forces while the other commands the British, with each side alternately playing cards from a 64-card deck to spend operations points or trigger special historical events that affect political and military control of colonies. The new CDG discard mechanic allows every card to be played by letting opponents buy discarded events for operations points, maintaining tension throughout. Washington's War won both the 2010 Charles S. Roberts Award for Best Ancient to Napoleonic Era Wargame and the 2010 Golden Geek Award for Best 2-Player Game.

