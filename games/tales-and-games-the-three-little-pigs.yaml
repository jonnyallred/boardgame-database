description: |
  Tales & Games: The Three Little Pigs is a family dice game published by IELLO
  inspired by the classic fairy tale. Players roll special pink dice up to three
  times per turn, attempting to generate matching symbols that can be traded for
  house-building materials — straw, wood, and brick doors, windows, and roofs.
  Different material combinations yield different point values, creating push-
  your-luck decisions as players decide when to stop rolling. The game's cheerful
  art and simple dice mechanics make it an ideal introduction to press-your-luck
  gameplay for younger players.

