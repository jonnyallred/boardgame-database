description: |
  Djam is a cooperative word game published by Asmodee in which players work together to find words based on prompts from colored dice. A color die determines the first letter of the word to find, and the theme is established by cards drawn from the deck. Players collectively propose one word per round, earning chips for each found letter in the word. The game includes five letter dice, one color die, one number die, theme cards, and variant cards, making it a lightweight party activity well-suited to family gatherings.

