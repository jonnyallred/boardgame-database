description: |
  Stixx is a fast-playing abstract strategy game by Goliath Games in which players take turns placing or removing sticks from a central bundle, trying to avoid being the one who takes the last stick. The simple premise belies the bluffing and counting strategy involved, as players must calculate how many sticks remain and manipulate opponents into taking the final one. Easy to learn and quick to play, Stixx works well as a light family game or filler.

