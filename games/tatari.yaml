description: |
  Tatari is a 2022 push-your-luck dice game by Reiner Knizia, published by Studio Mundy (スタジオムンディ), in which a group of friends is haunted by mysterious cursed Japanese dolls that must be confined to a magical shrine. Each player starts with 10 cursed dolls and uses 6 dice to roll combinations of numbers and dolls, determining which shrine tile to use and how many dolls they gain or lose. The tension lies in deciding how aggressively to reroll and lock dice in pursuit of the best combination. The first player to begin their turn with no dolls remaining wins, creating a race to offload a supernatural burden before the others do.

