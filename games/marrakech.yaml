description: |
  Marrakech is a light family abstract game designed by Dominique Ehrhard and published by Gigamic in 2007. Players are competing rug merchants in the city of Marrakech, taking turns rolling the die and moving Assam the market organizer, then placing a rug tile adjacent to where he stops. If Assam lands on an opponent's rug, the active player pays that opponent for each connected rug tile of that color. At game end, the player with the most money combined with visible rug tiles wins. Its simple rules, colorful components, and quick play time make it a beloved family and gateway game.

