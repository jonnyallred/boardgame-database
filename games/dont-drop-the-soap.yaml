description: |
  Don't Drop the Soap is a dark-humored adult party card game set in a prison shower. The game has no winners—only one loser. Players take turns playing action cards from their hand and following the instructions; the game ends when a player is forced to play a soap card, at which point they lose. Published by Don't Panic Games, it is a fast and absurdist take on hot-potato game mechanics with mature prison-themed content and is recommended for ages 18+.

