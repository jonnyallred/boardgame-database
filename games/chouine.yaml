description: |
  Chouine is a venerable French two-player point-trick card game of the ace-ten family, played with a 32-card piquet pack, that remains alive today in the Loire Valley of northern Touraine. Dating to at least the 16th century, it rewards players for collecting high-value cards (aces worth 11 points, tens worth 10) and awarding bonus points for declarations and winning the last trick. The defining "chouine" combination — ace, ten, king, queen, and jack of the same suit — wins the hand outright. Since 1974, an annual World Championship has been held in the village of Lavardin, Loir-et-Cher.

