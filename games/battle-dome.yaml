description: |
  Battle Dome is a 1990s children's toy-game in which players flick or launch small ball projectiles at plastic targets protected within a dome structure, trying to knock down the opponent's targets before their own are eliminated. The physical, dexterity-based gameplay and shooting mechanics make it more of an active toy than a strategic game, aimed squarely at the young children's market. Its simple premise and kinetic play style made it popular as a quick-play family game requiring no reading or complex rules.

