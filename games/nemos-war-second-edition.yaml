description: |
  Nemo's War (Second Edition) is primarily a solo adventure game by Chris Taylor, published by Victory Point Games in 2017, based on Jules Verne's Twenty Thousand Leagues Under the Sea. Players take control of Captain Nemo and his magnificent submarine the Nautilus, choosing a motivation that shapes how they score — exploring the deep, making war on surface ships, or aiding the oppressed — and then navigating a world map over multiple chapters of action-packed turns. Each turn players spend action points to move, fight, research, or dive to hidden depths, rolling dice to resolve encounters drawn from an event deck. The game features stunning artwork by Ian O'Toole and optional 2-4 player cooperative and semi-competitive rules, though the solo experience is its core.

