description: |
  Allenby's Blitzkrieg is a two-player operational wargame covering the first 48 hours of General
  Edmund Allenby's September 1918 offensive in northern Palestine, considered the last great horse
  cavalry campaign in military history. Designed by Peter Schutze and published by Schutze Games,
  the game pits a British Empire force (primarily Indian and Australian troops) against the Ottoman
  Turks on an 11×17-inch map of the region.

  The scenario opens with Allenby's brilliant deception operation catching the Turks out of position,
  and players must manage the unprecedented speed of the mounted units — a feat the designer notes
  exceeded even the best German Blitzkrieg operations of WWII. With 154 double-sided counters,
  the game is a compact and focused study of this overlooked campaign.

