description: |
  Tsushima is a naval wargame designed by Marc W. Miller and published by Game Designers' Workshop in 1975, simulating the decisive naval battles of the Russo-Japanese War of 1904-1905. The game was published as part of the two-game set The Russo-Japanese War alongside Port Arthur, which covered the land campaign. One player commands the Imperial Japanese Navy and the other the Russian fleet, recreating the strategic and tactical decisions of one of history's most dramatic naval engagements. Artwork was by Rich Banner.

