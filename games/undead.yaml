description: |
  Undead is a 1981 board game published by Steve Jackson Games for 2-3 players, based on Bram Stoker's classic novel Dracula. One player takes the role of Dracula while others play Professor van Helsing and vampire hunters, creating an asymmetric hidden-movement chase through the gothic setting of the novel. Dracula secretly moves across the board while the hunters track him down and attempt to destroy him. The game received positive reviews upon release, earning an 8/10 from White Dwarf magazine.

