description: |
  VII Legio is a science fiction board game designed by Marco Donadoni and Silvio Cadelo, published by International Team in 1982 with artwork by Cadelo. Despite its Roman numeral title evoking a Roman legion, the game is set in outer space: one player acts as a game master who creates a galaxy map, while the other players command starships that must explore planets and interact with alien races through capture, combat, negotiation, and trade. Players accumulate command points to earn promotions and acquire more powerful ships, while navigating the hazards of pirate ships, black holes, and unknown dangers.

