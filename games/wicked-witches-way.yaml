description: |
  Wicked Witches Way is a dice-and-card racing game for 2-6 players in which witches race to the finish line on broomsticks while performing aerial maneuvers to impress the crowd and score points. Players simultaneously select cards representing flight maneuvers, then roll dice to determine their progress, with daring stunts earning extra points at the risk of a tumble. Designed by Bruno Cathala and Serge Laget, it is a family-friendly game that balances luck and light strategy with a whimsical fantasy theme.

