description: |
  Aficionado is a French-language party game published by Dujardin in which players race to combine sentence fragments into new, absurd phrases. Each of the 45 cards presents three beginnings of song titles, movie titles, or proverbs; the active player reads them aloud and all others rush to shout out a coherent or humorously incongruous sentence using those fragments. The fastest correct answer claims the card, and the first player to collect seven cards wins, rewarding quick wit and wordplay.

