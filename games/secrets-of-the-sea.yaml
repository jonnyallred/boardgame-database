description: |
  Secrets of the Sea is a 2009 children's press-your-luck diving game designed by Reiner Knizia and published by Playroom Entertainment, aimed at players aged 5 to 10. Players dive beneath the waves to retrieve sunken treasures, deciding on each turn whether to push deeper for greater rewards or surface with what they've already found — all while watching out for sea monsters lurking in the depths. The game captures Knizia's trademark elegance by distilling a tense risk-reward decision into an accessible format suitable for young players and families.

