description: |
  The Queen's Gambit: The Board Game is a 2021 strategy game published by Mixlore, based on the hit Netflix series. The game takes place on a traditional chessboard but replaces standard chess rules with a card-driven system for 2-4 players, in which players use decks of cards to make moves, capture pieces, and outmaneuver opponents. Inspired by the chess prodigy Beth Harmon's journey in the series, the game distills chess-like strategic thinking into an accessible format suitable for casual and family play. It serves as both a tie-in product and an entry point for players interested in chess-themed strategy games.

