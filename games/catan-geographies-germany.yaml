description: |
  Catan Geographies: Germany is a regional map expansion for Settlers of Catan that uses a fixed historical map of medieval Germany. Players use the standard Catan rules but settle actual German cities and regions, with geographic and resource placements reflecting real-world locations. The fixed map creates a different strategic landscape from the standard modular board, and the historical theme lends an educational dimension. Requires the base Catan game to play.

