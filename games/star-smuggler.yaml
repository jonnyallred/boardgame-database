description: |
  Star Smuggler is a solitaire programmed adventure game designed by B. Dennis Sustare and published by Dwarfstar
  (Heritage Games) in 1982. The player is Duke Springer, a planet-hopping entrepreneur in the Pavonis Sector,
  flying a starship and smuggling goods — drugs, weapons, robotics — to pay off a mounting debt. An Event Booklet
  drives encounters that differ each playthrough, simulating a free-roaming space adventure without a human
  opponent. One of the celebrated Dwarfstar microgames, it remains a fondly remembered solitaire classic of the
  early 1980s.

