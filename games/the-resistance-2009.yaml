description: |
  The Resistance is a 2009 social deduction game designed by Don Eskridge for 5-10 players, in which members of a dystopian resistance movement try to complete covert missions while hidden Imperial Spies sabotage their efforts. Each round, the leader proposes a team for a mission; all players vote to approve or reject the team, then selected team members secretly play success or fail cards to determine the mission's outcome. Unlike Mafia and Werewolf, The Resistance has no player elimination, keeping all players engaged for the full game. Its tight, information-rich design sparked a wave of social deduction games and remains one of the most acclaimed party games ever made.

