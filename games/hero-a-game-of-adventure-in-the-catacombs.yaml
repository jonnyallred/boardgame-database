description: |
  Hero: A Game of Adventure in the Catacombs is a 1980 dungeon crawl adventure game designed by John Hagen and published by Yaquinto as one of their Album Game series. Each player builds a hero using point-buy attributes — Courage, Comeliness, Class, Intelligence, and Luck — and races to navigate a labyrinthine catacomb to reach the dungeon exit, while also controlling monsters in opponents' separate dungeons to slow or eliminate rival heroes. The first player whose hero exits their catacomb wins the hand of Princess Alysa and the game.

