description: |
  Unlock! Heroic Adventures is a box set in Space Cowboys' cooperative escape room card game series, published in 2018. The collection contains three scenarios with heroic and fantastical themes — players use the card-based Unlock! system and free companion app to solve puzzles as protagonists on larger-than-life adventures. As with all Unlock! games, no physical setup is needed, the app manages timing and hints, and the cooperative card interactions produce a seamless tabletop escape room experience.

