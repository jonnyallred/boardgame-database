description: |
  Orient Express is a deduction and mystery board game published in 1985 by Just Games (and Jumbo), inspired by Agatha Christie's iconic 1934 novel Murder on the Orient Express. Players interview suspects and gather evidence during a rail journey from Paris to Istanbul, attempting to identify the murderer before the train reaches its destination, with 10 distinct mystery cases included — each playable only once. A winner of the 1987 Spiel des Jahres "Beautiful Game" award, Orient Express is celebrated for its atmospheric presentation and genuinely challenging logical deduction, with five additional mystery plots released in 1987 extending the game's replayability considerably.

