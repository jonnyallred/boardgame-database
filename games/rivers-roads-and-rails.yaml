description: |
  Rivers, Roads & Rails is a classic Ravensburger transportation tile-matching game in which players cooperate or compete to create an interconnected network by matching picture-card edges. Each of the 140 illustrated scenery cards must connect perfectly to adjacent cards — river to river, road to road, and rail to rail — building an ever-growing landscape of transportation routes. Players draw 10 tiles and take turns adding them to the shared tableau; those who cannot play must pass, and the first to empty their hand wins. Its non-reading cooperative format and beautiful illustrated tiles have made it a beloved children's game since its 1984 Ravensburger release.

