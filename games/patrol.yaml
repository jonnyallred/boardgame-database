description: |
  Patrol is a skirmish-level tactical wargame published by SPI in 1974, designed by James Dunnigan as a companion to his earlier Sniper! simulation. Each player controls 5–15 individual soldiers in scenarios spanning World War I through 1970, with each game turn representing 5 seconds to 5 minutes of real-time action. Counters have 10 Movement Points and players secretly "buy" actions simultaneously, then reveal and resolve them. The game covers the wide range of personal weapons and transportation methods across 20th-century warfare, making it one of the earliest and most comprehensive man-to-man tactical wargames published.

