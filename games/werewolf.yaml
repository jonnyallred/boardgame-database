description: |
  Werewolf (also known as Mafia) is a social deduction party game created by psychology student Dmitry Davidoff at Moscow State University in 1986–87, modeling a conflict between an informed minority (the werewolves) and an uninformed majority (the villagers). Each night, the werewolves secretly eliminate a villager; each day, the village collectively votes to eliminate a suspect through discussion, accusation, and persuasion. Optional roles such as the Seer—who can secretly learn one player's identity each night—add asymmetric information that enriches the social dynamics. Dozens of commercial editions have followed, including Ultimate Werewolf (Bezier Games) and One Night Ultimate Werewolf, but the game can be played with any standard deck of cards or role cards.

