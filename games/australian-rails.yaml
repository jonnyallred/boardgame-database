description: |
  Australian Rails is part of Mayfair Games' Empire Builder crayon rail series, tasking players with building a profitable train network across the Australian continent. Using crayons to draw rail lines directly on a laminated map, players carve routes connecting major cities like Perth, Brisbane, Sydney, Melbourne, and Adelaide while hauling goods to earn $250 million. Terrain features such as mountains, deserts, and seasonal flooding add strategic challenge, and sandstorms can erase desert routes. Winner of the 1995 Origins Award for Best Modern-Day Boardgame, it captures the vast and unforgiving landscape of Australia.

