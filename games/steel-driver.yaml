description: |
  Steel Driver is a 2008 Martin Wallace auction game of railroad building and stock ownership set in 19th century North America. Each round players bid using investment cubes to control railroad companies; winning a bid grants a share in that company and the cubes bid become the budget for building that company's track. Players accumulate shares across multiple companies and score based on each company's track-building performance at game end. The elegant interaction between bidding amount, track-building budget, and share ownership creates deep decisions in a compact playing time.

