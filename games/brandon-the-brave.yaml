description: |
  Brandon the Brave (Richard Ritterschlag in German) is a 2013 tile-placement children's
  game published by HABA that was nominated for the Kinderspiel des Jahres in 2014.
  Players draw and place field tiles on an ever-expanding board where their knights
  undertake adventures, seeking out giants, dragons, witches, and other dangers. Players
  who skillfully place tiles next to each other to master challenges become champion
  at game's end. The game combines spatial tile-laying with fantasy adventure narratives
  appropriate for ages 5 and up.

