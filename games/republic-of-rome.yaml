description: |
  Republic of Rome is a complex semi-cooperative political simulation of the Roman Senate from Avalon Hill, published in 1990. Players control rival senatorial factions competing for influence, wealth, and prestige while collectively governing Rome against external threats such as wars, barbarian invasions, and internal crises. The game demands that players balance self-interest with the shared survival of the Republic — a faction that allows Rome to collapse loses along with everyone else. Winner of the Origins Award for Best Pre-20th Century Boardgame of 1990, it remains one of the most historically rich and demanding political games ever designed.

