description: |
  Eminent Domain is a deck-building civilization game designed by Seth Jaffee and published by Tasty Minstrel Games in 2011, set in a future where humanity colonizes the stars. Players build decks of Role cards (Survey, Research, Colonize, Produce/Trade, Warfare) that define their civilization's capabilities, and each turn choose a Role to execute — with opponents having the option to "follow" the same role. Playing matching cards amplifies a role's effect, creating a satisfying feedback loop: the more you research, the better your research becomes. Donald X. Vaccarino cited Eminent Domain as one of the few deck-building games to introduce mechanics he considered genuinely new.

