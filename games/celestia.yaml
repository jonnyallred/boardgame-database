description: |
  Celestia is a press-your-luck card game for 2-6 players, published in 2015 as a colorful retheme of the 1999 game Cloud 9. Players travel aboard a steampunk airship visiting exotic floating cities, each richer than the last, and must decide whether to stay aboard for greater treasures or disembark and take what they have already earned. Each round the captain rolls special dice to reveal hazards, and only players who have the right equipment cards can safely fly on; others must leave the ship. With charming components including a 3D cardboard airship, Celestia is an accessible, light family game full of suspense.

