description: |
  Empires: Age of Discovery (originally published in 2007 as Age of Empires III: The Age of Discovery, renamed after losing the licensing rights) is a worker placement and area control game designed by Glenn Drover. Players take the roles of European colonial powers competing to explore, settle, and exploit the New World, deploying multiple distinct worker types — Merchants, Soldiers, Missionaries, and Captains — each serving different strategic purposes. The game was notable at release for being among the first to feature multiple differentiated worker types, predating later games that would make this a standard Euro mechanic. A deluxe edition was published by Eagle-Gryphon Games in 2015.

