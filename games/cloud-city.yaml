description: |
  Cloud City is a tile-placement and network-building game for 2–4 players designed by Phil Walker-Harding, in which players compete as city architects to create the most impressive sky city by placing tiles and connecting buildings with walkways. Each turn players add a tile from their hand to their growing city, then build walkways between buildings—longer walkways earn more city council votes. The 3D buildings and colorful tiles make the game visually striking, while the walkway scoring creates satisfying network-building decisions that are easy to teach but reward careful planning.

