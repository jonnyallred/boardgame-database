description: |
  Zombie Fluxx is the zombie-themed entry in the Fluxx series of ever-changing card games by
  Andrew Looney. Like all Fluxx games, it begins with a simple draw one, play one rule that is
  constantly rewritten as players play new rule cards, goal cards, and creeper cards. This edition
  introduced the Creeper mechanic — zombie creepers attach to players and can prevent them from
  winning — and the Ungoal, a loss condition for the whole group. It won the Origins Award for
  Traditional Card Game of the Year in 2008.

