description: |
  La Granja is a 2014 farm management euro game by Andreas Odendahl and Michael Keller in which 1-4 players develop small Mallorcan estates near the village of Esporles, expanding fields, adding farm extensions, and delivering goods across six game rounds. Each multi-use card can be played in four different ways — as a field, extension, market barrow, or helper — creating rich decision chains around how to deploy each card. Dice add an element of uncertainty to each round while player turn order manipulation adds a tactical layer. Published by Stronghold Games with detailed art by Harald Lieske, it rewards sophisticated planning and multi-turn efficiency.

