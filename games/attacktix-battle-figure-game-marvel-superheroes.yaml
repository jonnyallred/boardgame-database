description: |
  Attacktix Battle Figure Game: Marvel Superheroes is a collectible dexterity miniatures
  game published by Hasbro in 2006, featuring Marvel Comics characters. Players field
  teams of spring-loaded action figures — each with projectile launchers or swinging
  close combat mechanisms — and the goal is to physically knock down the opponent's
  figures. Figures come on bases bearing each character's speed, defense, point value,
  and special powers. No dice or boards are required; the figures themselves are the
  game components. The game was part of a broader Attacktix franchise covering Marvel,
  Star Wars, and Transformers licenses.

