description: |
  Schatz-Rabatz is a real-time children's game designed by Karin Hetling, nominated for the Kinderspiel des Jahres, in which all players simultaneously snatch treasure objects from the center of the table and pack them into their chests before the sand timer runs out. After time expires, a treasure card is revealed showing which items count that round, and only players who have the matching items in their closable chest score ship pieces. The game's frantic simultaneous grabbing and the randomized reveal of valuable items makes it a chaotic and exciting game for young children.

