description: |
  Wortfix is a compact German word game from Ravensburger first published in 1976 that challenges players to quickly form compound words. Red cards indicate the first part of a compound word while blue cards provide the second part, and quick thinkers earn chips by shouting out valid compounds before their opponents. The game rewards vocabulary and mental agility in a fast-paced format that has made it a long-running travel game in the Ravensburger lineup, with updated editions over several decades.

