description: |
  Notre Dame is a card-drafting area-influence game by Stefan Feld, published by alea and Rio Grande Games in 2007. Players each control one of the boroughs surrounding the Notre Dame cathedral in medieval Paris, using a three-card draft to activate a shared set of actions — building improvements, placing persons, gathering resources, and advancing their carriage to the cathedral. Each round also introduces a plague rat threat that grows in each borough unless mitigated, punishing neglectful players with devastating point losses. One of Feld's earliest designs, it established the hallmarks of his style: multiple competing priorities, elegant card flow, and memorable pain.

