description: |
  Zig-Zag is a grab-and-collect card racing game in which players lay out 28 landscape cards to
  form a circuit. Players must move their pawns through a variety of terrain types — clay flats,
  fields, hot sand, green lawns, water, and cobblestones — using their hands of cards. The game
  blends fast-paced card play with bluffing elements as players try to outmaneuver opponents
  across the modular landscape they collectively constructed.

