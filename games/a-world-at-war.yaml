# Description
description: |
  A grand strategic simulation of World War II published by GMT Games, considered
  one of the most comprehensive and complex WWII games ever designed. Players
  control the major powers of the conflict — Allies and Axis — managing industrial
  production, research and development, diplomacy, and military operations across
  all theaters of war simultaneously. The game models everything from infantry
  battalions to strategic bombing campaigns to naval warfare to atomic research.
  Widely regarded as the definitive WWII grand strategy wargame, and one of the
  most demanding games in terms of rules complexity and playing time.

