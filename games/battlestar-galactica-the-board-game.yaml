description: |
  Battlestar Galactica: The Board Game is a semi-cooperative hidden-traitor game in which human players must guide the Battlestar Galactica and its refugee fleet to Kobol while managing dwindling resources — food, fuel, population, and morale — against relentless Cylon attacks. The critical tension comes from the fact that one or more players are secretly Cylons, trying to sabotage human efforts without revealing themselves. A mid-game "Sleeper Agent" phase may flip additional players to the Cylon side. Designed by Corey Konieczka and published by Fantasy Flight Games in 2008, it is widely regarded as one of the finest traitor games ever made, capturing the paranoia and desperation of the TV series.

