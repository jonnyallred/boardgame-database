description: |
  Tempus is a streamlined civilization-building board game designed by Martin
  Wallace and published by Café Games in 2006. Players build empires across a
  modular hex-tile landscape, advancing through technological eras from fire to
  the modern age using Idea cards that drive military and expansion capabilities.
  A rubber-banding technology mechanic ensures all players advance together at
  the end of each turn, keeping the game competitive without runaway leaders.
  A diceless battle system and subtle fog-of-war through hand management keep
  sessions to around 90 minutes — earning Tempus recognition as a satisfying
  "civilization-lite" game with an excellent balance of depth and accessibility.

