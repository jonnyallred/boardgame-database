description: |
  Mr. Jack Pocket is a compact two-player deduction game by Bruno Cathala and Ludovic Maublanc, published by Hurrican in 2010 as a streamlined version of Mr. Jack. The 3x3 grid of London street cards serves simultaneously as a board and as the nine suspects, with Watson, Holmes, and a police dog token placed around it. Players take turns rotating cards and moving detective tokens, with Jack trying to maintain alibi by staying out of sight of investigators, and the detective trying to isolate and identify him. Playing in under 15 minutes, it won nominations for Best 2-Player Game and is an ideal portable entry point to the Mr. Jack series.

