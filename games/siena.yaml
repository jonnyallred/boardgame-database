description: |
  Siena is an unusual Euro game designed by Mario Papini and published by Z-Man Games in 2005, using the famous 1338 fresco by Ambrogio Lorenzetti as both its gameboard and the artwork for all its cards. Players rise through medieval social ranks from peasant to merchant to banker, earning victory points through charitable giving, hiring artists, donating to the church, and constructing the Torre del Mangia. The game is noted for its strikingly non-intuitive mechanics that require extended play before their logic becomes apparent, making it a challenging but artistically unique experience.

