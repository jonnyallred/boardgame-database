description: |
  T.I.M.E Stories is a narrative cooperative board game published by Space
  Cowboys in which players take on the roles of temporal agents sent back in
  time to fix anomalies in history. Each scenario is a "decksploration" — players
  investigate a world built from location cards, making decisions and consuming
  Temporal Units (TUs) with every action. When TUs run out, the run ends and
  players restart with knowledge carried over from previous attempts. The game
  pioneered the replayable-deduction adventure format, spawning numerous
  expansion scenarios, and is notable for its innovative "time loop" mechanic
  that rewards persistence and deduction.

