description: |
  Metro is a tile-placement game designed by Dirk Henn and published by Queen Games in 2000, set during the construction of the Paris Metro for the 1900 World's Fair. Players take turns placing track tiles on a 10x10 grid to extend underground rail lines, with each player assigned stations on the board's edge. Connecting lines to the central main stations earns double points, and the player whose trains travel the most distance wins. Metro was nominated for the Spiel des Jahres in 2000 and received the Mensa Select award in 2001.

