description: |
  Fit to Print is a real-time tile-laying puzzle game set in the charming woodland newsroom of a small-town newspaper, designed by Peter McPherson and published by Alderac Entertainment Group in 2023. Players simultaneously draft newspaper tiles, stacking them on their desk until shouting "Layout!" to begin assembling the perfect front page — balancing centerpieces, articles, photos, and advertisements. The game includes both a timed real-time mode and a "slo-mode" for those who prefer a relaxed experience, plus 6 unique character abilities and over 100 distinct tile designs.

