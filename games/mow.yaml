description: |
  Mow is a simple and fast card game published by Asmodee in which players try to get rid of all their cow cards. The game involves playing cards into a sequence on the table, with cows moving across the board or field in a chain of plays. Players must follow suit or play special action cards, and the first to empty their hand wins. Mow is quick, light, and family-friendly, making it a popular filler game in the Asmodee catalog.

