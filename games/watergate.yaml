description: |
  Watergate is a tense asymmetric card game for exactly two players inspired by the political scandal that ended Nixon's presidency. One player takes the role of Nixon's administration trying to weather the storm by accumulating momentum tokens, while the other plays the newspaper editors pursuing the investigation by connecting informants to the evidence network. Both players use the same deck of dual-use historical cards, choosing to use each card for its top effect or its bottom effect. The asymmetric win conditions and dual-purpose card mechanics create extraordinary depth in a 30–60 minute package that rewards study and repays repeated play.

