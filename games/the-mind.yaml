description: |
  The Mind is a deceptively simple cooperative card game for 2–4 players that contains only numbered cards from 1 to 100. Players must play all their cards to the center pile in ascending order — without any communication whatsoever. No telling other players what you hold, no signals, no gestures: only a shared moment of intense focus and intuition. Players advance through levels by successfully playing all cards, with each level adding more cards to everyone's hand. The game's unique tension comes entirely from the challenge of synchronizing with teammates through silence, making it one of the most talked-about and polarizing designs of recent years.

