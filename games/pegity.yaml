description: |
  Pegity (originally Peg'ity) is a classic abstract strategy game published by Parker Brothers in 1925 that predates and anticipates games like Connect 4 and Gomoku. Played on a 16x16 pegboard, 2–4 players take turns placing colored pegs into holes, each trying to be first to create an unbroken line of five pegs in a row — horizontally, vertically, or diagonally — while also blocking opponents from completing their lines. Its simple rules and physical peg components made it a popular family game for decades, and it is considered an important early example of the five-in-a-row family of abstract games.

