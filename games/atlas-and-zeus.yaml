description: |
  Atlas & Zeus is a two-player strategy game set in the world of Atlantis, where rival
  clans compete as the island sinks around them. The game features area control mechanics
  with mythology-inspired theming. Limited publisher and designer information is available
  in English-language sources, though the game appears from online discussions to be an
  early 2000s publication with minimal setup time and unique character abilities drawn
  from Greek mythology.

