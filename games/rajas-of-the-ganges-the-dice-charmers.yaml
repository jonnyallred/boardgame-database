description: |
  Rajas of the Ganges: The Dice Charmers is a roll-and-write standalone spin-off of the acclaimed Rajas of the Ganges, designed by Inka and Markus Brand. Players use eight symbol dice to develop their Indian province, gathering goods, selling at the market, winning over influential personalities at the palace, and sailing up and down the Ganges River — all on their personal score sheets. Like the original, each player tracks both fame and fortune on two separate tracks that move in opposite directions, and the winner is the first to cross both tracks at the same point. It distills the thematic richness of the base game into a portable, fast-playing format for 2–5.

