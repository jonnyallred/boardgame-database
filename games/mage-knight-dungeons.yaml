description: |
  Mage Knight Dungeons is a 2002 expansion to the Mage Knight collectible miniatures line from WizKids that introduced dungeon-crawl style gameplay. Players select teams of Hero characters and explore tile-laid dungeon maps filled with wandering monsters and treasure chests, with opponents controlling the monsters when a hero encounters them. Heroes gain experience across five levels of advancement, and adventures can be played as standalone sessions or as part of a connected campaign. The dungeon crawl format was released in blind booster packs alongside the original wargame format.

