description: |
  Fast Attack Boats is a hex-and-counter wargame published by Yaquinto in 1980 covering naval actions of the Arab-Israeli War of October 1973. Players command small naval craft and attempt to sink opponents using missiles, torpedoes, guns, and ramming in fast-paced tactical scenarios. Published as a Yaquinto "Album Game" — packaged in a double vinyl record album jacket with the mapboard printed inside — the game was praised for authentically capturing the flavor of missile-boat warfare in the Mediterranean.

