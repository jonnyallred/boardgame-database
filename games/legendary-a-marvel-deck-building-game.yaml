description: |
  Legendary: A Marvel Deck Building Game is a semi-cooperative deck builder for 1-5 players in which players recruit Marvel heroes to build powerful decks and defeat a villainous Mastermind and their scheme. Each game, players select a Mastermind (like Magneto or Dr. Doom), a scheme, villain groups, and hero decks from dozens of options, creating enormous replayability. Players recruit heroes to add to their personal decks, using their combined might to battle villains threatening the city and ultimately defeat the Mastermind. The modular setup system and hundreds of expansions have made it one of the most expansive deck-building systems in the hobby, blending cooperative play with individual deck-building optimization.

