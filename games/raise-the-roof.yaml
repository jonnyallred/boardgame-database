description: |
  Raise the Roof is a card game published by Henard Industries in 1982 in which players race to construct a complete house of cards while simultaneously sabotaging their opponents' building efforts. Players collect the rooms and systems needed to finish their home while playing disaster cards — fires, labor problems, and other calamities — against rivals. The game blends light construction management with take-that card play in a family-friendly format, and was discontinued after a few years in print.

