description: |
  Kamon is a two-player abstract strategy game played on a hexagonal grid of 37 tokens, each showing one of six colors and one of six symbols. On each turn, a player places a pawn, but the color or symbol of that token dictates which tokens their opponent may choose next — creating cascading constraints. Victory comes through one of three paths: connecting opposite board edges, forming a loop with your pawns, or locking out your opponent. Designed by Bruno Cathala, Kamon is an elegantly simple game that conceals surprising strategic depth.

