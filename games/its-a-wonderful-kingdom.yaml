description: |
  It's a Wonderful Kingdom is a two-player game that adapts the engine-building drafting
  of its predecessor It's a Wonderful World into a head-to-head duel with bluffing. The
  signature "Split & Trap" mechanic has one player divide a set of cards into two piles
  while the other chooses which pile to take, creating a mind-reading tension throughout.
  Modular rules introduce new mechanics each game, and a solo mode extends replayability.
  The bluffing layer elevates this beyond a simple two-player drafting game into a
  genuinely interactive duel.

