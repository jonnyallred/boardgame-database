description: |
  Federation and Empire is a strategic-level board wargame set in the Star Fleet Universe, a spinoff of the Star Trek setting. Players take command of one of several interstellar empires — including the United Federation of Planets, the Klingon Empire, and the Romulan Star Empire — managing economies, producing fleets, and fighting for galactic dominance across an 18-year General War campaign. The game emphasizes economic planning, force organization, and attrition warfare, with each hex representing 500 parsecs of space. It is an extremely deep, long-form simulation suitable only for dedicated wargamers, and spawned numerous expansion modules.

