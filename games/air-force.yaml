description: |
  A complex multi-player wargame simulating World War II aerial combat published by Battleline Publications in 1976 and re-released by Avalon Hill in 1977. Each player controls one or more aircraft using data cards that track speed, maneuverability, armaments, ammunition, damage, altitude, and attitude—with 30 aircraft from the Luftwaffe, RAF, and USAAF represented. Players plot simultaneous movement, and the system for determining permissible maneuvers makes positioning and energy management critical. A companion game, Dauntless, added 30 Pacific theater aircraft. Regarded as one of the most realistic tabletop air combat simulations of its era.

