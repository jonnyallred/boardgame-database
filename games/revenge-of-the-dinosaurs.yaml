description: |
  Revenge of the Dinosaurs is a children's race board game published by Waddingtons in which players move their dinosaur pieces around the board trying to complete a circuit while avoiding the fearsome Tyrannosaurus Rex. The game features simple dice-driven movement and elimination-style mechanics appropriate for young children, with the exciting theme of prehistoric creatures adding appeal. As a Waddingtons product from the late 1970s, it reflects the era's accessible family game design intended to introduce young players to competitive board gaming through a fun dinosaur theme.

