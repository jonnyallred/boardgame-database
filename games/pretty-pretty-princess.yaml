description: |
  Pretty Pretty Princess is a classic children's jewelry dress-up board game originally designed by Elizabeth Pacza at Meyer/Glass Design, Ltd. Players roll and move around the board, collecting plastic costume jewelry in their color, with the goal of holding both the crown and a full jewelry set while avoiding the unlucky black ring. First published in 1990 and later acquired by Hasbro and marketed under the Milton Bradley imprint, the game blends imaginative dress-up play with simple competitive mechanics for young children.

