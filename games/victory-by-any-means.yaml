description: |
  Victory by Any Means (VBAM) is a strategic-level 4X space game published by VBAM Games in 2004, designed by Jay Waschak and Byron Sinor. Set two centuries after the collapse of the last galactic civilization, players guide interstellar powers competing through exploration, diplomacy, economic development, and military conquest across the stars. A second edition followed in 2015 with refined mechanics. The game is notable for its comprehensive approach to simulating a complete interstellar civilisation's rise to power, making it a favourite in the grand strategy wargaming niche.

