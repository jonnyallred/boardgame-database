description: |
  Liberian Queah is a traditional strategy game from the Queah people of Liberia, played on a 4x5 or 5x5 grid. Players take turns moving and capturing opponent pieces in a manner somewhat similar to draughts, with each side starting with a limited number of pieces placed in their home territory. The game uses a distinctive rule where captured pieces are removed from the board, and the player who captures all opponent pieces wins. Queah is one of the traditional games documented by researchers of African board games and represents the rich indigenous game-playing traditions of West Africa.

