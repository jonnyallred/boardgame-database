description: |
  Hype is a board game designed by Steve Fairnie (lead singer of British post-punk bands Writz and The Technos) and Willie Williams, published by Virgin Games in 1985. Players start as unknown pop bands and must climb from performing local gigs and recording demos all the way to getting a record deal and flying on a private jet, with the first band to land a Number 1 hit winning. The game simulates the music industry's economics and luck-driven nature, reflecting the era's vibrant UK pop music scene.

