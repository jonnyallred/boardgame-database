description: |
  Auf die Nüsse! (Nuts!) is a light press-your-luck dice game for the whole family themed around squirrels collecting nuts. Players roll dice and choose when to stop, trying to collect the most nuts without busting. The colorful components and quick decisions make it ideal for younger players and family gaming sessions. Its simple ruleset and cute animal theme keep it accessible and lighthearted.

