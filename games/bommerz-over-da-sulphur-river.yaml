description: |
  Bommerz over da Sulphur River is a 1998 Warhammer 40,000 aerial combat board game
  published by Games Workshop in which Ork Fighta-Bommer pilots attempt to destroy vital
  Imperial bridges, while Imperial defenders pour flak and laser fire at the attackers.
  The game includes four Ork Fighta-Bommerz miniatures, two Imperial Thunderbolt
  Interceptors, and a full-color three-piece game board. The game's focus on Ork air
  assault mechanics and its dedicated miniatures made it a popular collector's piece for
  Warhammer 40,000 fans.

