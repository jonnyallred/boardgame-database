description: |
  The World of Warcraft Trading Card Game is a collectible card game published by Upper Deck Entertainment in 2006 based on Blizzard's massively popular MMORPG. Players build decks around a Hero card representing their character's race, class, and faction (Alliance or Horde), using allies, abilities, armor, and weapons to defeat the opponent. A unique resource system scales power availability throughout the game. Notable for its loot card mechanic: special rare cards contained redemption codes for exclusive in-game items such as rare mounts and pets in the online game, bridging the physical and digital play spaces.

