description: |
  WarCry is a skirmish wargame released by Games Workshop in 2019 set within the Warhammer Age of Sigmar universe, pitting small warbands of 3–15 miniatures against each other in fast-paced mission-based battles. Players control forces drawn from the chaos warbands of the Eightpoints or other Age of Sigmar factions, fighting for dominance across densely scenery-filled 22" by 30" game boards. Games typically last 30 to 60 minutes, offering a quicker and more accessible entry point into Warhammer gaming compared to large-scale army battles. The starter set introduced the Iron Golems and Untamed Beasts warbands alongside an extensive scenery collection.

