description: |
  New Bedford is a 2016 worker-placement and town-building game by Nathaniel Levan, published by Greater Than Games (Dice Hate Me Games), set in the Massachusetts whaling town during the mid-1800s golden age of the industry. Players build out the historic town by placing workers on buildings — which they can construct and own, earning rent from others who use them — while also sending ships out to sea to hunt whales and bring back resources. Cleverly, the whale-bag mechanic reflects real history: empty sea tokens are returned each round but whale tokens are not, so the ocean becomes progressively depleted over twelve rounds. It is a medium-weight euro with strong thematic integration and meaningful ownership decisions.

