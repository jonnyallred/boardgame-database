description: |
  Irish Gauge is a streamlined cube-rails investment game set in mid-1800s Ireland where
  players bid to fund railroad companies and build their networks across the island.
  Rather than directly controlling a single railroad, players hold shares in multiple
  companies and profit whenever those companies pay dividends. The interplay between
  building routes to generate income and timing when to collect dividends creates
  surprisingly deep strategic tension in under an hour. A refined and approachable
  entry point into the classic Winsome Games stock-train genre.

