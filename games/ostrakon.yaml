description: |
  Ostrakon is a social deduction card game published by daVinci Games and Mayfair Games in 2004, themed around the ancient Athenian practice of ostracism in which citizens voted to exile prominent figures by writing names on clay fragments called ostraka. One player acts as a philosopher posing a question with only two possible answers, while others vote for the answer they personally prefer — but the philosopher secretly predicts which side will get more votes. The game rewards players who can read social dynamics, predict group preferences, and strategically phrase questions to manipulate the majority. Its artwork evokes ancient Greek pottery and mosaics, giving it an appropriately classical atmosphere.

