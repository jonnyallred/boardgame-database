description: |
  Transylvania is an early microgame published by Mayfair Games in 1981 pitting two players against each other — one controlling a vampire lord defending their castle and the other commanding villagers determined to end the vampire's reign. The game ends when evil forces occupy the village for three turns or villagers seize the castle for two turns, making for a short, tense asymmetric struggle. Noted in retrospect for its low-budget production (including cardstock counters and a cover with a misspelled title), it was an early experiment in asymmetric vampire-themed wargaming.

