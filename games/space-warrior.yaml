description: |
  Space Warrior is a 1980 science fiction microgame published by Argon Games, simulating shipboard infantry
  combat in outer space. One player commands a boarding party attempting to seize control of a vessel, while
  the other commands the crew defending their ship. The compact game includes a map, counters, charts, a
  rulebook, and character sheets, providing a focused skirmish experience reminiscent of other space boarding
  action games of the era such as Traveller's Snapshot.

