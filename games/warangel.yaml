description: |
  Warangel is an Italian fantasy wargame created and illustrated by Angelo Porazzi, with the first boxed edition published in 2000 and awarded Best Italian Board Game at multiple conventions. Players command one of 120 distinct warrior races drawn from a post-nuclear Earth, each with unique abilities, battling across hex maps depicting real sectors of the globe. The "blue hole" portal system connects disparate maps into multi-board battles, adding a distinctive layer of tactical depth. A card game spin-off was later picked up by Hasbro Italy for national distribution in 2002.

