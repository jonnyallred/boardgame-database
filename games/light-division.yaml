description: |
  Light Division is a Napoleonic era wargame published by SPI (Simulations Publications, Inc.) focusing on the exploits of Wellington's celebrated Light Division during the Peninsular War. The Light Division was famous for its elite rifle-armed troops, flexible tactics, and the leadership of commanders like Craufurd and later Alten. The game models the distinctive hit-and-run, skirmishing tactics of light infantry warfare, contrasting with the heavier line battalions of the period. SPI's detailed series design captures the period's tactical nuances within their standard hex-and-counter framework.

