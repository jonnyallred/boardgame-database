description: |
  Star Viking is a 1981 two-player wargame published by Heritage Models set in a distant science-fiction future. One player commands the Federate forces tasked with protecting a cluster of star systems, while the other player controls the Star Vikings who seek to raid and pillage those provinces. The asymmetric factions have different strategic goals and strengths, creating an engaging attacker-versus-defender dynamic. The game was later made available as a free print-and-play download through the Dwarfstar Games heritage archive.

