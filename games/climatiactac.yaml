description: |
  ClimaTicTac is a cooperative educational board game developed by climate scientists at the IPSL (Institut Pierre-Simon Laplace) to make human-induced climate change tangible and accessible to students and the general public. Players work together across a world map of 30 climate-vulnerable cities spanning the 21st century, managing CO2 concentrations, mitigating damage, and adapting to climate impacts before cities become uninhabitable. It has been distributed to schools by French local authorities and was awarded the CNRS medal for scientific outreach. A family adaptation was published by Bioviva Editions for distribution across France, Belgium, Switzerland, and Canada.

