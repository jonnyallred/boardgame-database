description: |
  Marvel Heroes (Marvel Comics Super Heroes Strategy Game) is a chess-inspired two-player abstract published by Milton Bradley in 1980. One player commands Marvel superheroes — Thor, Captain America, Iron Man, Silver Surfer, Spider-Man, and Mister Fantastic — while the other fields supervillains, maneuvering pieces across a city gameboard trying to capture five of the opponent's characters. Pieces reaching the far side of the board become "Super" versions that can move freely along their color path, and players must announce threats similar to chess check by declaring "AH-HA!" The game brings the Marvel universe to a family-accessible strategic board game format.

