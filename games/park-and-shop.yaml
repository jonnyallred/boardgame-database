description: |
  Park and Shop is a 1960 roll-and-move family game by Milton Bradley set in a city shopping district. Players drive their car marker to the Park & Shop parking lot, then walk their pedestrian marker around to complete a personal shopping list before returning to the car and driving home — first to finish wins. An optional "money version" adds currency management with purchases, parking fees, and library fines, giving the game a light economic dimension unusual for its era. The split mechanic of managing both a car and a pedestrian token makes it a charming period piece capturing midcentury suburban American life.

