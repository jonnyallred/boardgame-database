description: |
  John Carter: Warlord of Mars is a two-player hybrid board game published by SPI in 1979 based on Edgar Rice Burroughs' Barsoom novels. Uniquely structured as three interlocking games — a Duelling Game, Strategic Game, and Military Game — it blends wargame mechanics with role-playing elements on the exotic world of Mars. Players navigate detailed charts covering everything from military strategy to love, romance, and "unspeakable acts," creating emergent narratives in the spirit of the source novels. A fascinating historical curiosity that prefigured the wargame/RPG hybrid genre, it combines variable player powers, dice rolling, and narrative agency in a single complex package.

