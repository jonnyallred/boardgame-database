description: |
  Devil Bunny Hates the Earth is game #033 in Cheapass Games' catalog, a mancala-variant in which players are taffy machines in Devil Bunny's candy factory. Knowing that Devil Bunny intends to destroy the Earth with inferior saltwater taffy, players conspire to thwart him by luring squirrels into the factory to destroy the machines — including their own. The game's surreal premise pairs with surprisingly engaging mancala mechanics, earning it a nomination for the Origins Award for Best Abstract Board Game of 2001. Later revived by Greater Than Games alongside its companion game Devil Bunny Needs a Ham.

