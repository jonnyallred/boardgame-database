description: |
  Rauha is a competitive engine-building card-drafting game for 1-5 players in which each player is a Shaman building a diverse planetary biome. Players select biome cards and place them in their board; at the end of each turn, activating a row or column triggers special spore abilities that accumulate into powerful combo chains. Variable player powers and simultaneous action selection keep the pace lively, while the stacking engine of spore activations rewards players who think several turns ahead. Its nature-themed artwork and satisfying combo mechanics have made it a standout from 2023.
