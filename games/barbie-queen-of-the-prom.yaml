description: |
  Barbie Queen of the Prom is a 1960 Mattel board game designed to accompany the then-new Barbie doll, making it one of the earliest Barbie-branded games. Players draw cards and spin to collect a boyfriend, a prom dress, a club membership, and money, racing to be the first to assemble all four items and be declared "Queen of the Prom." The game reflects the cultural values of 1960s American girlhood and is now considered a pop culture artifact. As a game, it is entirely luck-based, but it holds significant historical value as an early piece of Barbie merchandise and mid-century game design.

