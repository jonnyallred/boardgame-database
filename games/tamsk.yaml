description: |
  TAMSK is the second game in Kris Burm's acclaimed GIPF Project series of
  abstract strategy games, published in 1998. Players move sand hourglass timers
  across a hexagonal board, flipping them over with each move and placing plastic
  rings to mark visited positions. Hourglasses must have sand running to be
  moved — if one runs out, it is frozen permanently. The player with the fewest
  remaining rings at the end wins. The shrinking usable board creates an elegant
  tension as players race against time and each other. TAMSK was later replaced
  in the GIPF series by TZAAR, though it retains a loyal following for its
  unique real-time element.

