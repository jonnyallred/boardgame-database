description: |
  Courtisans is a tense card game of intrigue in a medieval royal court where 2-5 players manipulate the influence of noble families to score points and sabotage rivals. Each turn, a player plays three cards — one to the Queen's table to shift a family's standing up or down, and one each to their own domain and an opponent's domain. Special roles like Spies (played face-down), Assassins (who remove cards), and Guards (immune to assassination) add layers of uncertainty and mind games. The entire experience is built around nonverbal negotiation and inference — reading your opponents as much as your cards. Praised for delivering big social tension in a tiny, ultra-fast package.

