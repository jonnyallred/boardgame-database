description: |
  Granada: The Fall of Moslem Spain is a two-player wargame by Robert G. Markham and published by Avalanche Press, recreating the final decade of the Reconquista (1481–1492) in which Ferdinand and Isabella's forces sought to extinguish the last Moorish kingdom on the Iberian Peninsula. Players command either the Christian Spanish coalition or the Nasrid defenders of Granada, maneuvering forces across a historically detailed map. The game is praised for its physical beauty and for capturing the political and military complexity of the campaign in an accessible format.

