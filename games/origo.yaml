description: |
  Origo is a card and board strategy game published by Parker Brothers in 2007 set in ancient Europe, in which 2-5 players lead tribes competing for dominance by expanding territories, launching attacks, and maneuvering figures across the board. Players perform actions in any sequence — expanding, attacking, hiking, and sailing — driven by a hand of cards that power movement and conflict, while the shifting majority on the board determines who controls which regions. Combining some luck with tactical decisions, Origo offers a relatively accessible area control experience themed around the ancient tribal conflicts of prehistoric and early European civilizations.

