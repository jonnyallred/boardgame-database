description: |
  Civil War is a strategic-level American Civil War wargame published by Avalon Hill in 1961 as part of the centennial commemorations, designed by Charles S. Roberts. Unusually for Avalon Hill, it uses plastic tokens instead of cardboard counters, and covers the entire Civil War from April 1861 to March 1865 with one player controlling Union forces and the other the Confederacy. It employs the standard hex grid and Combat Results Table mechanics of the era. Despite fitting neatly into neither the wargamer nor the social gamer market, it was short-lived in Avalon Hill's catalog but remains historically notable as a Roberts design.

