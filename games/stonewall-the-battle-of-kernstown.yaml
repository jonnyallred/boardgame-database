description: |
  Stonewall: The Battle of Kernstown is a 1978 hex-and-counter wargame designed by Mark Herman and published as a pull-out game in SPI's Strategy & Tactics magazine. The game covers the First Battle of Kernstown (March 23, 1862), the only tactical defeat of Stonewall Jackson's Shenandoah Valley Campaign, where Union forces under General Shields repulsed Jackson's attack. Players command Union and Confederate forces across a detailed hex map, managing unit cohesion and terrain as they re-enact this pivotal early Civil War engagement. It represents an early design from Herman, who would go on to create many celebrated wargames.

