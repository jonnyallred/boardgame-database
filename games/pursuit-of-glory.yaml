description: |
  Pursuit of Glory is a card-driven two-player wargame published by GMT Games in 2008, serving as a standalone sequel to the acclaimed Paths of Glory. The game focuses on the Great War in the Near East (1914–1918), covering the Ottoman Empire's campaigns against British and Russian forces across the Middle East, Caucasus, and Gallipoli. Using the same point-to-point movement and hand management system as its predecessor, players command historical figures such as Churchill, Lawrence of Arabia, and Enver Pasha through scenarios shaped by the Russian Revolution, holy war declarations, and the Suez Canal. A 2009 Golden Geek nominee for Best War Game.

