description: |
  Tekhenu: Obelisk of the Sun is a complex Euro game for 1–4 players set in ancient Egypt, centered on an impressive central obelisk that casts its shadow across six divine domains. Each domain corresponds to a different Egyptian god — Horus, Ra, Hathor, Bastet, Thoth, and Osiris — and is divided into sunny, shaded, and dark sections by the shadow. Players draft dice from these sections to perform actions, but dice from the shadow are considered "forbidden" and must be balanced against "pure" dice on a personal scale to avoid penalties. This purity mechanic, combined with the rotating shadow and engine-building across six areas, creates exceptional strategic depth and thematic elegance.

