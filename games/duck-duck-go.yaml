description: |
  duck! duck! Go! is a 2009 rubber duckie racing game from APE Games in which players race their ducks around a bathtub-themed board to hit all three buoys before crossing the finish line drain. Each round, players simultaneously choose movement cards from their hand, steering their duck according to the card's directions. Real rubber ducks are included as playing pieces, adding tactile charm. The game made the Games Magazine Games 100 list and was nominated for an Origins Award for Best Family Game. A companion title, duck! duck! SAFARI!, uses the same system in a jungle setting.

