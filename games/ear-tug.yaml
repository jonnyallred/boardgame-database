description: |
  Ear Tug is a children's sensory and sorting game designed by Brigitte Pokornik and published by HABA in 2004. Players roll dice and perform physical actions with colorful cloth bags shaped like animal ears, developing fine motor skills and sensory awareness. Designed for young children aged 3 and up, the game emphasizes playful interaction and tactile exploration over competitive strategy, making it an ideal early childhood game.

