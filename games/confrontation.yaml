description: |
  Confrontation is a French skirmish-scale fantasy miniatures game set in the richly detailed world of Aarklash, where factions of knights, wolfen, orcs, elves, undead, and many others wage endless war for continental supremacy. Players assemble small armies of highly detailed metal miniatures and clash in tactical scenarios, with rules covering individual abilities, magic, and unit leadership. The game's deep lore and exceptional miniature quality (designed by sculptor Stéphane Gantiez) attracted a passionate following across Europe in the early 2000s. Rackham collapsed in 2010, but the game maintains an active fan community continuing to release rules and scenario content. It remains a cult classic in the miniatures hobby.

