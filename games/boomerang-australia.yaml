description: |
  Boomerang: Australia is a "draft and write" game that blends card drafting (like 7 Wonders) with the mark-and-score approach of roll-and-write games. Players explore the Australian continent by drafting location cards featuring unique landmarks, activities, and wildlife, then recording their selections on personal score sheets to build sets of activities and animal sightings. The simultaneous drafting and writing keeps all players engaged throughout, and the game's short play time and Australian theme make it an accessible, travel-friendly filler. It is the first in a series that also includes Boomerang: USA and Boomerang: Europe.

