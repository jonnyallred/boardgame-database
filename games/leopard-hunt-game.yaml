description: |
  The Leopard Hunt Game is a traditional African hunt game in the family of asymmetric chase-and-capture games found across Africa and Asia, where one player controls a powerful leopard piece and the other controls a group of hunters trying to trap or corner the leopard. The hunters outnumber the leopard but individually are weaker, creating asymmetric gameplay where the leopard tries to capture hunters and the hunters cooperate to immobilize the leopard. This category of asymmetric predator-versus-prey abstract games appears independently across multiple cultures, with regional variants documented in Africa, South Asia, and Southeast Asia under various names. Exact rules vary by region and tradition.

