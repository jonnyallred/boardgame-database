description: |
  The Middle-earth Collectible Card Game (MECCG) is a collectible card game released by Iron Crown Enterprises in 1995, the first CCG based on J.R.R. Tolkien's Middle-earth. Players control Wizards guiding Fellowship members on quests through Middle-earth, with cards depicting the iconic characters, locations, and events drawn from Tolkien's writings and ICE's own MERP roleplaying sourcebooks. The game featured art by celebrated Tolkien illustrators including John Howe, Ted Nasmith, and Angus McBride. Production ended in 1999 when ICE lost the license, but a dedicated fan community keeps the game alive online through GCCG platforms. MECCG won the Origins Award for Best Card Game of 1995.

