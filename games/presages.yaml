description: |
  Présages is a cooperative card game designed by Maxime Rambourg and illustrated by Ben Renaut, published by Spiral Editions. Players work together to reduce their hands to a single card each, using carefully planned card plays and communication to whittle down their collective holdings without breaking the rules. Winner of awards at the Prix des Boutiques Ludiques for both its designer and illustrator, the game is praised for combining elegant simplicity with satisfying cooperative tension.

