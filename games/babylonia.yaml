description: |
  Babylonia is a 2019 tile-placement game by Reiner Knizia set in the Neo-Babylonian era, where players compete to make their clans prosper. On their turn, players place noble, priest, and craftsman tokens on a map to build long chains linking them to cities, as scoring relies heavily on creating and extending these chains. Positioning next to the court grants access to special ruler powers, while peasants placed in fertile areas add value to crops at scoring. With elegantly simple rules concealing genuine strategic depth, Babylonia exemplifies Knizia's ability to distill complex interactions into clean, tense decisions.

