description: |
  MechWarrior: Dark Age is a collectible miniatures wargame published by WizKids from 2002 to 2008, set in the BattleTech universe during the 32nd century. Using the Clix system, players field pre-painted infantry squads, vehicles, and giant BattleMech walking war machines whose combat dials replace traditional record sheets, enabling combined-arms battles to resolve dramatically faster than classic BattleTech. The game won the 2002 Origins Awards for Game of the Year and Best Sci-Fi Miniatures Series. Despite its success, it was discontinued in 2008 following WizKids' sale to Topps.

