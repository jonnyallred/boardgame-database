description: |
  Unanimo is a party word association game designed by Theo and Ora Coster (creators of Guess Who?) and published in 1990. Players simultaneously write down eight words they associate with the theme on the current card, then score points for each word that another player also wrote. The twist: you want to think like everyone else, not uniquely. The game rewards common cultural knowledge and group mentality over cleverness, creating a fun, social experience. Published in multiple editions by Ravensburger, Cocktail Games, and others worldwide.

