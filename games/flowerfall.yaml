description: |
  FlowerFall is a dexterity card game designed by Carl Chudyk (of Innovation fame) and published by Asmadi Games. Players drop flower-patterned cards from above the table, letting them flutter and land freely, then score points for the largest continuous patches of their color. The central mechanic of physically dropping cards — allowing gravity, air currents, and skill to determine their resting position — creates unpredictable and chaotic garden arrangements that change every game. Supporting 2-7 players in about 10 minutes, FlowerFall is a delightfully simple yet whimsical filler that rewards spatial thinking mixed with environmental luck.

