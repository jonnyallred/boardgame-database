description: |
  Star Wars Risk: The Clone Wars Edition is a 2005 Hasbro adaptation of the classic Risk game set during the Star Wars prequel era. One player commands the Galactic Republic (led by the Jedi) against the Separatists (led by Count Dooku) in a galaxy-spanning conflict. The game adds Star Wars-specific spacecraft that players can place in territories for tactical benefits — Fighters allow rerolling 1s, Corvettes add +1 to a die, and Capital Ships let players roll an 8-sided die instead of a 6-sided one. Card collection for winning battles follows standard Risk conventions.

