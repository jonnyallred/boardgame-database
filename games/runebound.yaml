description: |
  Runebound is a high fantasy adventure game set in the world of Terrinoth where 1-6 players take on the roles of heroes roaming the land, completing quests, gaining experience, and growing in power. Players move across a modular map seeking quest markers, fighting monsters in multi-stage dice-based combat, and acquiring equipment and abilities to face increasingly powerful adversaries. The game features a large card library of monsters, items, and allies that give each hero a personalized growth arc. Runebound shares its world with other Fantasy Flight games like Descent and Runewars, and spawned two revised editions plus numerous expansions, becoming a flagship of the adventure genre.

