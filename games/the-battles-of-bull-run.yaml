description: |
  The Battles of Bull Run is a 1972 SPI wargame containing two simulations of the American Civil
  War's pivotal engagements at Manassas: First Bull Run (June 1861) and Second Bull Run (August 1862).
  The game uses an innovative simultaneous hidden movement system in which both players turn all units
  face-down and secretly write movement orders through numbered hexes, only revealing units when they
  come into contact with enemies. Dummy counters add another layer of deception. This system was
  notable for its sophistication in simulating the fog of war, and a published variant allows five
  players by splitting Union command among multiple players.

