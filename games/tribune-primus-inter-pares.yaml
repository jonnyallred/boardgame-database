description: |
  Tribune: Primus Inter Pares places players in ancient Rome as ambitious patrician families vying for dominance over the city's factions. Players deploy workers to influence the Legions, the Vestals, the Gladiators, and other powerful groups, collecting faction cards to win control and claim the prestigious title of Tribune. Designer Karl-Heinz Schmiel blends worker placement with set collection in a game where variable win conditions — players choose their own victory goals at the start — create radically different strategic paths each session. Published by Fantasy Flight Games in 2007.

