description: |
  Blue Moon City is a 2006 resource management and city rebuilding game by Reiner Knizia,
  published by Fantasy Flight Games with thematic connections to the Blue Moon card game.
  Players use cards representing the different peoples of Blue Moon to contribute to the
  restoration of the destroyed city's buildings. Whoever contributes resources to each
  building shares in its completed rewards, creating a push-pull competition over which
  structures to prioritize. The game won the 2006 Meeples' Choice Award and placed
  fourth in the Deutscher Spiele Preis.

