description: |
  Star Trek: Attack Wing is a miniatures space combat game published by WizKids in 2013, using the FlightPath
  maneuver system licensed from Fantasy Flight Games. Players command fleets of customizable starships from
  across the Star Trek universe, assigning crew members such as Kirk, Picard, and Worf to grant special abilities.
  Ships are rated with combat dials tracking damage, shields, and upgrades, and fleets compete in scenario-based
  engagements ranging from dogfights to complex multi-objective missions. An extensive range of expansion packs
  provides hundreds of ships and crew options.

