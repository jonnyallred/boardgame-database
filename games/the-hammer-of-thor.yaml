description: |
  The Hammer of Thor: The Game of Norse Mythology is a 1980 fantasy board game published by Nova
  Game Designs in which each player chooses a champion from Norse mythology to compete for victory
  at the Battle of Ragnarok between the Norse gods and the giants. Players spend the game in
  wilderness adventures gathering forces, collecting items, and building reputation. The game
  includes 365 unique cards, each representing a different character from Norse mythology, giving
  it extraordinary depth of theme. Reputation on the winning side at Ragnarok determines the
  winner. Despite noted rulebook issues, the game is celebrated for its ambitious scope and
  comprehensive treatment of Norse mythological lore.

