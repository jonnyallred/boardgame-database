description: |
  Heroes of Barcadia is a tile-based dungeon-crawling party game designed by Madison O'Neil and published by Rollacrit in 2022, featuring the game's signature Liquid Life System where players track their character's health through the drink in their cup. Players explore modular dungeon tiles, battle monsters, and collect loot in a cooperative framework that doubles as a social drinking experience. The game blends approachable dungeon crawler mechanics with party game energy, making it popular for game nights where fun trumps strategy.

