description: |
  Cardino is a tile-placement game published by Ravensburger (also released as Cartino) in which players place tiles of matching suits onto a shared board, scoring points for each tile placed and earning a bonus for playing all five hand tiles in a single turn. Drawing from a shared pool and racing to play high-value runs of matching tiles creates a satisfying balance of luck and concentration. The game takes only minutes to explain and offers solid variety in its combination possibilities.

