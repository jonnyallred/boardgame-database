description: |
  Don't Break the Ice is a classic children's dexterity game originally marketed by Schaper Toys in 1968 and later acquired by Milton Bradley (Hasbro). Players take turns tapping out individual ice blocks from a plastic frame with small hammers, trying not to be the one whose tap causes the central character (Phillip the Penguin or similar figure) to fall through the ice. The game combines a fun physical mechanic with simple rules suitable for preschool-age children, and remains a popular introductory game for very young players.

