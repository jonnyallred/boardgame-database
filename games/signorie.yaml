description: |
  Signorie is a heavy Euro game for 2-4 players set during 15th-century Renaissance Italy, where players lead powerful noble families competing for influence and magnificence. The central mechanic uses dice selection and worker placement to take actions — players choose from a pool of dice to determine what family-influence actions they may perform. Set collection and resource management layer over the dice selection, with players building connections across Italian city-states to score points for influence, title, and wealth. Its thematic depth and interlocking mechanisms reward experienced Eurogame players.
