description: |
  Pagan: Fate of Roanoke is a 2-player asymmetric deduction card game set in colonial America in 1587, where one player is a witch and the other a witch hunter. Each player manages their own 50-card variable deck, placing action pawns on villagers to draw cards, play cards, and gather influence, while simultaneously trying to uncover — or conceal — their true identity and objectives. The prototype won the Danish design award Otto at Fastaval in 2018, and its final release by Capstone Games features tight asymmetric mechanics and a tense hidden-information cat-and-mouse dynamic.
