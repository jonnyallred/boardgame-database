description: |
  Daldøs is a traditional Scandinavian running-fight board game with a history traceable to approximately 1800, known from a small number of coastal locations in Denmark and Norway. Played on a ship-shaped board with three rows of holes, players roll unusual four-sided stick dice to move pieces along the track, removing enemy pieces when landing on occupied spaces. The game bears similarities to the Sámi game Sáhkku and remains a living tradition in Jæren, Norway. Handcrafted wooden sets are still made today, often featuring wood-burned artwork inspired by Viking imagery.

