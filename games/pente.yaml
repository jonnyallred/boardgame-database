description: |
  Pente is a classic abstract strategy game invented in 1977 by Gary Gabrel, played on a 19x19 grid similar to a Go board. Players alternate placing stones of their color on intersections, with the goal of either aligning five or more stones in a row (horizontally, vertically, or diagonally) or capturing five pairs of the opponent's stones. Captures are made by flanking exactly two adjacent opponent stones with your own on either side, which removes them from the board. The addition of the capture mechanic to a five-in-a-row framework creates rich strategic depth far beyond simple alignment games. The game became a commercial success and remains one of the most respected modern abstract strategy games.

