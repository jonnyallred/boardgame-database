description: |
  Schloss Schlotterstein (Shiver-stone Castle) is a children's dexterity game designed by Kai Haferkamp and published by HABA in 2003, winner of the Deutscher Kinderspiele Preis. Players use a magnetic wand moved beneath the castle board to control a ghost piece and move it to scare the castle residents depicted on drawn picture cards. The combination of physical magnet manipulation, picture matching, and a whimsical haunted castle theme earned it critical acclaim as an innovative children's game of its era.

