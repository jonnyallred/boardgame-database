description: |
  Star Quest is a science fiction space combat game published by Operational Studies Group (OSG) in 1979.
  Players represent interstellar trading houses whose starships have entered a newly discovered star system,
  hyperjumping to random locations on an 11x17 hex grid and then maneuvering under physics-based movement
  rules that reward multi-turn planning. The realism of its momentum-based navigation — uncommonly rigorous for
  its era — creates tense tactical duels, particularly at two players, and the short playing time makes it
  suitable for repeat sessions.

