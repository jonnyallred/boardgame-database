description: |
  Firefight: Modern U.S. and Soviet Small Unit Tactics is a 1976 SPI hex wargame originally commissioned by the U.S. Army as small-unit training material for soldiers serving in Europe during the Cold War, then converted to a commercial product by designer Jim Dunnigan. The game hypothesizes Cold War-era squad combat between American and Soviet forces in West Germany, with each hex representing 50 meters and each counter a 2-4 person fire team or vehicle. The lethality is high — its core design principle is "if you can see it, you can kill it" — and the rules are divided into three graduated modules (Firefight I, II, and III) allowing players to ramp up complexity. Decision Games later acquired and reprinted it.

