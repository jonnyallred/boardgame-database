description: |
  KuZOOkA is a 2022 cooperative game by Pegasus Spiele for 2-6 players in which zoo animals secretly work together to stage a daring escape. Each player controls one of ten animals with a unique power and must covertly coordinate with teammates using zoo visitor trash as crafting materials for an escape plan. Players move along a color-coded path on the board, playing cards to advance their animals while keeping communication subtle enough to avoid being detected. The game's charm comes from its animal ensemble cast and the secret-cooperation mechanic that requires coordination without open discussion.

