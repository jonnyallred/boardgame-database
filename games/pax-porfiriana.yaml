description: |
  Pax Porfiriana is a deeply historical card game for 1–6 players set during the 33-year reign of Mexican dictator Porfirio Díaz (1876–1910). Players take the roles of wealthy hacendados building business empires through ranches, mines, newspapers, and military units while manipulating the political climate — toppling Díaz's regime or propping it up to suit their ends. The card-driven engine building is dense with historical simulation and emergent narrative, featuring multiple victory conditions tied to who controls the political landscape when the game ends. Designed by Phil Eklund, Pax Porfiriana rewards deep study and offers a uniquely thematic experience unlike most modern board games.

