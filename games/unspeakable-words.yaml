description: |
  Unspeakable Words is a Cthulhu-themed word game by James Ernest and Mike Selinker in which players form words from their hand of letter cards, scoring points equal to the number of angles in the letters used. The catch: each word formed requires a roll of a d20 equal to or higher than its point value — fail and you lose a sanity token represented by an adorable Cthulhu pawn. Lose all your sanity and you are eliminated; the first player to reach 100 points while retaining at least one sanity token wins. The deluxe edition features artwork by John Kovalic and supports up to eight players with custom components.

