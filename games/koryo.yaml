description: |
  Koryŏ is a 2013 card game for 2-4 players set in a uchronic steampunk-inflected version of 10th-century Great Korea, where players compete for political influence through card collection and set management. Players draft and acquire numbered character cards representing various factions, with majorities in each number triggering unique power effects — the player with the most of any number controls that faction's special ability. The game's elegant tension comes from the simultaneous push for set collection and faction control in a tight, 20-minute format. Published internationally by Asmodee.

