description: |
  Lagoonis (known as Glupschgeister in German) is a three-dimensional children's game in which players hunt for creatures called Lagoonies — big-eyed, pale green sea creatures visible through frosted underwater windows that distort their appearance. Each round an octopus spinner determines which Lagoonies must be found, with players discovering and blocking off windows with starfish tokens. The atmospheric deep-sea presentation and tactile three-dimensional board create an immersive and whimsical experience for young players. A player collects nine Lagoonies to win.

