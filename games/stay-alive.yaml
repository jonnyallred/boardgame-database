description: |
  Stay Alive is a 1971 Milton Bradley marble survival game marketed as "the ultimate survival game." Players place marbles on a 7x7 sliding grid board, then take turns moving sliders one notch, causing holes in the overlapping sliders to potentially align and drop marbles through. Strategy lies in manipulating slides to eliminate opponents' marbles while protecting your own. The last player with at least one marble remaining wins. Simple rules and tactile marble-dropping tension have made it a beloved classic across generations.

