description: |
  Chocolate Factory is a Euro game of literal factory building in which players draft employee cards and construct a physical production line using a pushable conveyor belt to manufacture chocolates and fulfill customer orders. Each factory is unique, built from drafted machinery tiles that process raw cacao through different stages, and the physical act of pushing wooden chocolate pieces along the belt brings the theme gloriously to life. The combination of card drafting, spatial factory planning, and the tactile conveyor belt mechanic makes Chocolate Factory a standout production-engine game.

