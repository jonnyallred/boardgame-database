description: |
  Ticket to Ride: San Francisco is the fourth entry in the Cities line, set in the San Francisco Bay Area of the 1960s where players use cable cars instead of trains. Players race to visit iconic city landmarks and collect souvenir tokens representing famous sights, with those tokens providing bonus points at game end. The compact map and 10–15 minute playtime deliver the core Ticket to Ride experience in a portable, affordable package.

