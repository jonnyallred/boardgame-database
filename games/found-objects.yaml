description: |
  Found Objects (Objets Trouvés in French) is a creative guessing party game published by Asmodee in 2005, designed by Philippe Des Pallières. One player acts as the "artist" who must represent a secret concept — chosen from six options — using 13 physical objects, constructing a kind of sculptural tableau for others to decipher. Other players bet on what they think the artist is depicting, with faster correct guesses earning more points and the artist scoring if they successfully communicate their concept. The game celebrates imagination and unconventional thinking, rewarding players who can see meaning in arrangements of everyday objects.

