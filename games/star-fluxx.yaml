description: |
  Star Fluxx is a sci-fi themed version of the Fluxx card game series designed by Andrew Looney and published by Looney Labs in 2011. Like all Fluxx games, it begins with a simple rule — draw one card, play one card — but players continuously change the rules and victory conditions with the cards they play. Star Fluxx adds space-exploration thematic elements with cards referencing robots, alien invaders, rocket ships, and time travel, as well as Surprise cards that can be played at any time. The ever-shifting rules create a chaotic, unpredictable experience that rewards flexibility over rigid planning.

