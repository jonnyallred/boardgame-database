description: |
  Cluedo (marketed as Clue in North America) is the original murder mystery deduction game designed by British inventor Anthony Pratt in 1943 and first published by Waddingtons in 1949. Three to six players move through the rooms of Tudor Mansion, gathering information through questioning to deduce which of six suspects killed the victim, in which room, and with which weapon. Players eliminate possibilities using logical deduction with private notepads until one can confidently accuse the murderer. One of the bestselling and most iconic board games ever created, it has spawned countless editions, spin-offs, a 1985 film, and has been continuously in print for over 75 years.

