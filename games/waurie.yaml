description: |
  Waurie is a traditional mancala game played on the Cayman Islands, also known as Island Wari, with roots traced to West African traditions brought to the Caribbean. Played on a two-row, six-hole board with a storehouse at each end and four seeds per hole at start, Waurie has the unusual win condition of emptying your own side of the board rather than accumulating the most seeds. Play proceeds counter-clockwise in single-lap style, with a bonus move when the last seed lands in your own endpit. Two rulesets coexist on Grand Cayman—one rooted in African tradition and one influenced by American visitors—under the same name.

