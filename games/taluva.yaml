description: |
  Taluva is an abstract tile-placement and area control game set on a South Sea
  island slowly emerging from volcanic eruptions. On each turn, players place a
  new volcano tile — either expanding the island's edges or stacking on existing
  terrain to build height — then construct one of three building types: huts,
  temples, or towers. Players win by being the first to place all pieces from any
  two of the three building types. The layered, three-dimensional board that
  emerges creates a visually striking game with elegant spatial decisions, making
  Taluva a respected gem in the abstract game genre.

