description: |
  Archworld is a fantasy and medieval miniatures wargame published by Fantasy Games Unlimited
  in 1977, designed by Mike and Sheila Gilbert. Set in the Archworld campaign setting,
  the game uses a 1-inch hex grid system to simulate grand tactical warfare across ancient,
  medieval, and early gunpowder periods. Magic exists within the system but is secondary
  to military and economic strategy, rewarding players who balance spell-casting with
  sound tactical and strategic planning. The 76-page rulebook includes naval vessel diagrams
  and reference cards, making it a comprehensive system for miniatures combat.

