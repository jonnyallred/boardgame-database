description: |
  Obélix contre Hattack is a 1996 French children's board game published by Nathan and based on the beloved Astérix and Obélix comic series. Players take on the roles of Gauls — Falbala, Panoramix, Astérix, and Abraracourcix — and roll dice to move through the forest in search of the mysterious sorcerer Hattack, encountering friends and foes along the way including Romans, wild boars, and rotten fish that either help or hinder progress. Two game boards, a large Obélix figurine, and various card types add variety to each adventure, and the first player to locate Hattack wins the round. A lighthearted race game for the youngest fans of the classic Gaulish heroes.

