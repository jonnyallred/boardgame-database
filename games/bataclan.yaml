description: |
  Bataclan is a stacking and balance dexterity game published by Gigamic in which players take turns placing colorful wooden pieces onto a shared structure, trying not to be the one to cause a collapse. The pieces come in various shapes that must be carefully positioned on the precarious growing stack. Simple enough for young children but requiring genuine dexterity, Bataclan delivers the suspense of escalating tension with every carefully placed piece. It is a family-friendly introduction to dexterity games with minimal rules overhead.

