description: |
  BattleDroids is the original 1984 FASA publication that launched the BattleTech franchise, subsequently renamed BattleTech in 1985 due to a trademark dispute with Lucasfilm's Droids property. Players pilot giant humanoid war machines called BattleDroids (later BattleMechs) across hex-grid terrain maps, managing heat buildup, weapon ranges, armor damage, and pilot skill in detailed tactical combat. The game's intricate record-keeping and rich science-fiction universe of feudalistic future warfare captured imaginations and spawned a franchise encompassing dozens of games, novels, a television series, and video games. BattleDroids is a historically significant first edition of one of gaming's most expansive universes.

