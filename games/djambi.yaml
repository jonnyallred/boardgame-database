description: |
  Djambi, subtitled "Machiavelli's Chessboard," is a 4-player abstract strategy game invented by Jean Anesto in 1975 and played on a 9×9 grid with a marked central "maze" square. Each player commands nine pieces of distinct types—chief, assassin, reporter, provocateur, necromobile, and four militants—representing the full toolkit of political wrongdoing. The goal is to achieve absolute power by being the last chief alive; a chief occupying the maze gains extra turns and control over surrounded chiefs' pieces. Eliminated pieces remain on the board as corpses usable for strategic blocking, making public alliances and betrayals central to the experience.

