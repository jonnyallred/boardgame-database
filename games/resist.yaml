description: |
  Resist! is a fast-playing solitaire card game set in Franco-era Spain, casting the player as the Spanish Maquis fighting against the Francoist regime through a series of clandestine missions. Over multiple rounds, you undertake increasingly difficult missions using a limited hand of cards, earning points toward victory while deciding whether to press your luck and take on another dangerous assignment or end the resistance for the day. The game captures the desperate courage of underground resistance fighters through tight resource management and escalating risk-reward decisions. Its compact design and solo focus make it an ideal quick play experience for fans of historical card games.

