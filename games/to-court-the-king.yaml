description: |
  To Court the King is a Yahtzee-style dice game for 2–5 players in which players compete to amass the most powerful collection of medieval court characters. On each turn, players roll dice up to three times trying to match the pattern required to claim a character card; claimed characters provide special die-manipulation powers that stack over time. The goal is to roll the highest five-dice combination at the final "King's Roll" to win the game. The satisfying escalation of powers as your court grows, combined with the press-your-luck tension of each roll, makes To Court the King a compelling dice-chaining filler designed by Tom Lehmann.

