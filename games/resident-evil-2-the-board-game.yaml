description: |
  Resident Evil 2: The Board Game is a cooperative survival horror game for 1-4 players that faithfully adapts the classic video game to the tabletop. Players take on the roles of Leon Kennedy, Claire Redfield, and other iconic characters as they navigate the zombie-infested Raccoon City Police Department, managing limited resources and fighting off relentless undead threats. Each round players take four actions — moving, attacking, opening doors, or using items — before a Tension deck card drives enemy reactions and escalates the dread. The game is praised for its ability to capture the claustrophobic tension and resource scarcity of the original video game in tabletop form.

