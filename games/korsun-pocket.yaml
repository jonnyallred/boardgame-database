description: |
  Korsun Pocket: Little Stalingrad on the Dnepr is a 1979 grand-tactical operational "monster" wargame by Jack Radey and People's War Games simulating the encirclement battle at Korsun-Shevchenkovsky (January 25 – February 17, 1944) — the first large-scale German encirclement after Stalingrad. Played at 1:100,000 scale with one mile per hex and battalion-level units, the game features over 1,200 playing pieces and 800 markers and divides each day into two five-hour day turns and a 14-hour night turn. A Game Designers' Guild Select Award Winner in 1979, the game was later updated as Korsun Pocket 2 by Pacific Rim Publishing in 2022.

