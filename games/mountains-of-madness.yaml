description: |
  Mountains of Madness is a cooperative Lovecraftian party game designed by Rob Daviau and published by Iello in 2017, inspired by H.P. Lovecraft's novella At the Mountains of Madness. Players are Antarctic expedition members trying to escape the frozen plateau by collectively contributing cards to overcome challenge tiles, but crucially, they cannot show cards to each other and have only 30 seconds to communicate. As the expedition progresses, players accumulate madness cards that disrupt how they can interact — forcing players to whisper, yell, shake hands, or perform other disorienting behaviors. The game deliberately opts for a lighter, often comedic tone rather than the dread typical of Lovecraftian games.

