description: |
  Krosmaster: Arena is a 2012 anime-style tactical miniature combat game created by Tot and Jérôme Peschard, set in the Wakfu/Dofus universe. Players build teams of collectible chibi-style characters with unique abilities and face off in tactical arena battles on three-dimensional terrain. The base game features eight fighters, each with distinct cards defining their talents, with additional miniatures available through expansion sets. Funded through Kickstarter and renowned for its exceptional production quality, the game blends collectible miniature gaming with accessible tactical card-driven combat. Published internationally by Japanime Games and CMON.

