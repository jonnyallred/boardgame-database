description: |
  Alpha Blitz is a 1998 word card game designed by Mike Selinker and published by Wizards of the
  Coast, named Games Magazine's Word Game of the Year in 1998. The game contains 98 letter cards
  and 10 "Blitz" lightning bolt cards that accelerate the end of the game. Players work with a
  shared pool of letter cards on the table, using them as a letter bank to form words.

  The game is actually two games in one: in Alpha mode, players take methodical turns replacing
  or destroying letters and forming the longest word possible; in Blitz mode, all players play
  simultaneously, racing to call out progressively longer words than the previous player. The dual
  format provides both a strategic and a frantic party experience.

