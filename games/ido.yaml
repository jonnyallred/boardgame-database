description: |
  Ido is a visually striking abstract strategy game published by Rio Grande Games in 1998, named a Game of the Year by Games Magazine. Players move colorful blocks on an abstract board, trying to get four of their blocks from one side to the other. Uniquely, players may also move the board itself, rotating it to change the geometric pattern and shift pieces closer to their goal. The combination of piece movement and board manipulation creates an innovative spatial puzzle that won acclaim for its beauty and originality.

