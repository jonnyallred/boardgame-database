description: |
  Border Reivers is a two-player area control and economic game designed by Jackson Pope
  and self-published by Reiver Games in 2006, set along the turbulent Scottish-English
  border during the 16th century. Players control rival clans competing for wealth and
  territory through raiding, trade, and military action in the lawless border marches.
  The game was created as a hand-made self-published run before broader commercial
  distribution. A separate thematic wargame with the full title "Border Reivers:
  Anglo-Scottish Border Raids, 1513-1603" was later published by GMT Games.

