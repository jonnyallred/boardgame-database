description: |
  Middle Earth (also known as The Games of Middle Earth) is a boxed wargame set published by Simulations Publications, Inc. (SPI) in 1977, designed by Howard Barasch and Richard Berg, based on J.R.R. Tolkien's The Lord of the Rings. The set contains three games: War of the Ring, Gondor: The Siege of Minas Tirith, and Sauron, each simulating major conflicts from the books using hex-map wargame mechanics. War of the Ring won the Charles S. Roberts Award for Best Fantasy Board Game of 1977 and was one of SPI's bestselling titles, entering the publisher's Top Ten list at number one based on pre-orders alone. The games can be played individually or combined for an epic campaign spanning the full scope of Tolkien's world.

