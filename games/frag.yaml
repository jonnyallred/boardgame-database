description: |
  Frag is a board game by Steve Jackson Games that simulates the first-person shooter video game experience on a tabletop. Players create characters by distributing seven points among Health, Speed, and Accuracy attributes, then move around an arena map shooting at each other and collecting weapon and gadget cards. The goal is to score three "frags" (kills) before opponents do; players respawn at random points when eliminated. Deliberately designed to evoke the chaotic fun of games like Quake and Doom, Frag is a fast, tongue-in-cheek arena brawler that plays best with 4-6 players.

