description: |
  Riff Raff is a wildly entertaining dexterity and balance game where players compete to load wooden cargo — sailors, bottles, rats, and crates — onto a swaying pirate ship suspended by a cardanic hinge mechanism. Each round, players simultaneously choose a numbered card to determine placement order, then take turns placing pieces onto the ship's body and three rotating yardarms. If the ship tips and cargo falls, whatever you fail to catch is added back to your pile. The first player to unload all their cargo wins, making for a hilarious and tense balancing act that delights players of all ages.

