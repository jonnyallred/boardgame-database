description: |
  Kulami is a 2011 two-player abstract strategy game by Andreas Kuhnekath in which players place colored glass marbles on a modular board of 17 interlocking wooden panels of varying sizes to control as many panels as possible. Each player alternately places a marble on a panel, with the restriction that each move must be on the same row or column as the previous opponent's move, creating a chain of constrained decisions that rapidly narrows options. The player controlling the majority on each panel scores for its area at game end. Kulami received a 2012 Spiel des Jahres recommendation, a 2013 Mensa Select award, and a 2014 Games Magazine Best New Abstract Strategy Game award.

