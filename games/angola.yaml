description: |
  Angola is a 1988 four-player wargame depicting the Angolan Civil War of 1975-1976, in which
  players control the Soviet- and US-backed factions — MPLA, FNLA, UNITA, and South African/Cuban
  intervening forces — as they compete for control of newly independent Angola. The game uses a
  hex grid map, counters, and two decks of event cards to simulate the chaotic multi-faction
  conflict.

  Its innovative use of dual-use event cards, asymmetric faction abilities, and overlapping victory
  conditions prefigured many later designs. The COIN series creator Volko Ruhnke has cited Angola
  as a direct influence. A second edition published by Multi-Man Publishing in 2012 was a finalist
  for the Charles S. Roberts Award. It remains a landmark in politically complex, multi-sided
  wargame design.

