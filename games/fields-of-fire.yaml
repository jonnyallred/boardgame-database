description: |
  Fields of Fire is a solitaire card-driven wargame designed by Ben Hull in which the player commands a rifle company across WWII, Korea, and Vietnam campaigns based on the real experiences of the 9th US Infantry. Notably, the game is entirely diceless — two card decks handle all actions: the Terrain Deck builds a map for each mission, and the Action Deck drives combat, command, and activity resolution. A mission takes about 1-2 hours, and the game's deep system rewards study and repeat play. The Deluxe Edition (2019) refines 15 years of feedback into a more accessible version while retaining the full strategic complexity fans prize.

