description: |
  Unfathomable is a hidden traitor cooperative board game published by Fantasy Flight Games in 2021, designed by Tony Fanchi and Corey Konieczka as a reimagining of Battlestar Galactica: The Board Game set in the Arkham Horror Files universe. Players crew a steamship crossing the Atlantic, battling Deep One attacks, managing crises, and maintaining the ship's systems — while one or more players secretly work for the forces of the deep, sabotaging the mission. The game captures the paranoia and tension of the original BSG game in a Lovecraftian eldritch horror setting, with rich narrative events and asymmetric traitor mechanics.

