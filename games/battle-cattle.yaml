description: |
  Battle Cattle is a humorous miniature wargame published by Sierra Madre Games in 1993, in which cybernetically enhanced cows (moo-tanks, if you will) do battle across the barnyard. Players outfit their bovine warriors with weapons, armor, and special equipment then engage in tactical combat using dice and simple range rules. The absurdist premise — heavily armed cows fighting it out with military hardware — is the game's chief selling point, delivering laughs alongside quick tactical play. It later spawned a card game variant.

