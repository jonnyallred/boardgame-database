description: |
  Frigate: Sea War in the Age of Sail is a naval wargame designed by Jim Dunnigan and published by SPI in 1974. Set in the Napoleonic era, the game simulates frigate combat during the Age of Sail, with players simultaneously pre-plotting their ship movements before revealing them, while wind direction and velocity are determined by dice at the start of each turn. The game includes 20 historical scenarios based on naval combats from 1702 to 1812, ranging from single ship duels to larger fleet engagements. Described by game designer Jon Freeman as "a game of maneuver," Frigate rewards careful planning and exploitation of wind and position.

