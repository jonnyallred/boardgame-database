description: |
  Gambler is a 1975 Parker Brothers dice game in which players start with $100 and race to accumulate $1,000 through betting and dice rolls. Each turn, players make wagers before shaking a special Dice Shaker device containing six dice, with results determining payouts. The game combines luck-based dice mechanics with simple social wagering to create a family-friendly simulation of casino-style gambling. A redesigned edition was released in 1977.

