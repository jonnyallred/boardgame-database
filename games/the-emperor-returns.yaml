description: |
  The Emperor Returns is a 1986 Clash of Arms Games Napoleonic wargame by Kevin Zucker asking:
  what if Napoleon had won at Waterloo? Players control French forces under Napoleon and the
  armies of the Seventh Coalition under Wellington across a month-long hypothetical campaign in
  Belgium following a fictional French victory. Victory is determined not by casualties but by
  breaking the enemy's morale — the historical model of Napoleonic warfare where army collapse
  rather than annihilation decided campaigns. Rules cover supply, attrition, morale, leadership,
  and military administration, making this a sophisticated operational simulation of the Hundred
  Days campaign's counterfactual continuation.

