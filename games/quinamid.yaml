description: |
  Quinamid is a two-player abstract strategy game designed by Antony Brown and published by Third Dynasty Games in which players compete to create a line of five counters across a pyramidal structure of five sliding and rotating boards of progressively smaller size. Placing stones on the boards shifts their positions relative to one another, creating a dynamic three-dimensional puzzle where the winning alignment changes with every move. The game's rotating and sliding board mechanics give it a distinctly spatial feel unlike most conventional abstract games.

