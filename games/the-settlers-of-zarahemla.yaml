description: |
  The Settlers of Zarahemla is a 2003 licensed Catan adaptation published by Inspiration Games, set in the world of the Book of Mormon. Players build settlements and roads across the land of Zarahemla using the familiar Catan resource-production mechanics, with the robber replaced by thematically appropriate alternatives. The board uses five strips of hexes rather than individual tiles, and players may contribute stones to the Temple of Zarahemla for bonus victory points—the greatest contributor earns two points. The game also officially supports two-player play, making it slightly more accessible than the base Catan game.

