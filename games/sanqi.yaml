description: |
  SANQI is an abstract strategy game played on a hexagonal grid, inspired by the ancient Chinese divination work Lingqijing with its three symbolic forms. Two players share three colors of stones — red, yellow, and blue — taking turns to either place a new stone on the board or change an existing stone's color to match its neighbors. One player aims to form a circle of six same-colored stones, while the other seeks to create a triangle. Despite its elegant and minimal ruleset, SANQI conceals considerable strategic depth in managing the three-color balance and pattern interference. The game's Chinese divination heritage gives it a contemplative meditative quality unusual among modern abstract games.

