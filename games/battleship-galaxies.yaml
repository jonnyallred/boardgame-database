description: |
  Battleship Galaxies is a science-fiction miniatures wargame published by Hasbro in 2011 that reimagines the classic Battleship concept as a scenario-driven space battle. Players command fleets of detailed plastic starships — the human Intergalactic Space Navy versus the alien Wretcheridians — across a hexagonal star field board. Each turn, players spend energy points to move and fire, with combat resolved using custom letter-and-number dice matched against ship reference cards. Twenty starship miniatures and multiple scenarios give the game significant replay value for fans of tactical space combat.

