description: |
  Star Wars: The Ultimate Space Adventure Game is a 1982 Parker Brothers board game for 2-4 players set during The Empire Strikes Back. Players are Rebel Alliance commanders who must escape Darth Vader's TIE fighter attack on Hoth and pilot their X-wing fighters through hyperspace, past asteroid fields and Imperial pursuit, to reach the planet Dantooine. The game uses a spinner for movement and first-to-arrive wins. A simple race game designed for younger Star Wars fans.

