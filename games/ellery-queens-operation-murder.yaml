description: |
  Ellery Queen's Operation: Murder is a 1986 interactive mystery game published by Spinnaker Software that combines VHS video with board game elements. Players watch a 30-minute dramatic video presenting a murder mystery based on Ellery Queen's The Dutch Shoe Mystery, pausing between segments to discuss clues read from eight playing cards. After watching the complete video, players pool their deductions to identify the killer of Abby Doorn. One of the early "VCR board games" that emerged in the mid-1980s, it blends passive media with cooperative deduction in a format that was innovative for its time.

