description: |
  Cathedral is a two-player abstract strategy game invented by New Zealand pilot Robert Moore and first published in 1979, inspired by the interlocking buildings he observed from the air around Christchurch Cathedral. Played on a 10x10 wooden board enclosed by turreted walls representing a medieval city, players alternate placing polyomino-like wooden pieces representing buildings, trying to claim territory by enclosing it wall-to-wall with their pieces. The neutral Cathedral piece is placed first, and each player then attempts to maximize their territory while denying space to their opponent. With simple rules but deep spatial reasoning, Cathedral is considered a classic of abstract design.

