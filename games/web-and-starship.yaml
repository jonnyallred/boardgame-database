description: |
  Web and Starship is a hard science fiction wargame designed by Greg Costikyan and published by West End Games in 1984, set on a two-dimensional map of nearby stars with the third dimension tracked via notation. Three deeply asymmetric factions compete: the Pereen use an instantaneous "Web" network but must expand it slowly via sub-light probes; the Gwynhyfarr travel by Faster Than Light ships too small to move bulk cargo; while Earth begins with limited versions of both technologies that gradually improve over the game. This radical asymmetry forces entirely different strategic approaches from each player, creating a thoughtful and distinctive take on interstellar conflict.

