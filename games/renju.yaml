description: |
  Renju is a professional tournament variant of Gomoku (five-in-a-row) played on a 15×15 Go board with black and white stones. Named by Japanese journalist Ruikou Kuroiwa in 1899, the name means "connected pearls" in Japanese. Unlike basic Gomoku, Renju introduces special forbidden moves for Black — such as double threes, double fours, and overlines — to balance the first-player advantage, creating a strategically rich game governed by the Renju International Federation (founded 1988). It remains the premier competitive format for five-in-a-row games worldwide.

