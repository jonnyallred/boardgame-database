description: |
  Ambush! is a groundbreaking 1983 solitaire wargame published by Victory Games (a subsidiary of
  Avalon Hill), set during World War II in France. The player commands a small American squad through
  a series of missions against a hidden German foe, whose actions are determined entirely by a
  "paragraph book" — a system of tables and narrative paragraphs that simulate enemy intelligence
  without requiring a human opponent.

  This programmed-paragraph solitaire system was revolutionary for wargaming at the time, allowing
  deeply tactical man-to-man combat to be experienced alone. Players manage movement, line of sight,
  and squad cohesion on hex-grid maps while the paragraph system delivers surprising enemy responses.
  Ambush! won the Origins Award for Best 20th Century Boardgame of 1983 and spawned multiple
  expansions, remaining a landmark in solo wargaming design.

