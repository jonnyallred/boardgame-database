description: |
  Emergo is an abstract strategy game created by Christian Freeling and Ed van Zon in 1986, belonging to the tradition of column checkers alongside Bashni and Lasca. It is played on a 9x9 checkered board where pieces stack into columns, and the game unfolds in two phases: an entering phase and a movement phase. Players must capture three of their opponent's Epigons by pushing them off the board's edge, and of all games Christian Freeling has created, Emergo is his personal favourite for its elegant depth and beauty.

