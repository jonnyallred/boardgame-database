description: |
  Krur is a traditional mancala game played by Hassaniya-speaking peoples in Western Sahara, Morocco, and Mauritania, mostly by children. The game uses a simple 2×4 board with four seeds per hole at the start, with players sowing seeds in an anticlockwise direction one by one. First documented by C. Béart in 1955 in Mauritania and later described by Fernando Pinto Cebrián in 1999 in Western Sahara, Krur represents a regional mancala tradition from the western Sahel and represents one of the simplest variants of the sowing game family.

