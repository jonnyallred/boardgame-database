description: |
  Yōkai is a cooperative communication-restricted puzzle game themed around Japanese mythology, inspired by the mechanics of the Hanabi-style genre. Players hold their cards facing outward so they can see others' cards but not their own, and must work together to sort yōkai spirits into the correct groups without directly communicating about card content. Special conversation tokens allow limited exchanges of information, and players must read gestures and indirect hints to successfully arrange all the spirits. Quick to play and accessible for families, Yōkai wraps the tense cooperative communication puzzle in a beautiful folkloric aesthetic.

