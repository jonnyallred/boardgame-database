description: |
  Star Wars: Escape from Death Star is a 1977 Kenner board game — one of the very first Star Wars licensed products — in which players guide the heroes through the Death Star's trash compactor and race to reach the Rebel base on Yavin 4. Players use a spinning wheel and draw cards that provide benefits and penalties during their escape. As a foundational artifact of Star Wars licensing history, the game is prized by collectors and represents the beginning of the Star Wars merchandise phenomenon.

