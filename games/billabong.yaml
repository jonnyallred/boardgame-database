description: |
  Billabong is a racing strategy game designed by Eric Solomon and published by Amigo
  in 1993 that was nominated for the Spiel des Jahres that year. Each player controls
  five kangaroos racing around a central lake (the billabong), moving by jumping over
  other kangaroos — including opponents' — with long-distance jumps possible when the
  jumped kangaroo is far away. Good positioning is the key to success, as it enables
  longer and more powerful jumps. The game has similarities to Chinese Checkers but
  with deeper strategic choices due to the jumping mechanics.

