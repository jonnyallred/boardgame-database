description: |
  Dog Park is a card-drafting and set-collection game where players recruit dogs into
  their kennels, then take them for walks through the park to earn points. Over four
  rounds, players secretly bid reputation points to acquire dogs, then select which dogs
  to walk and navigate the shared park paths. Points come from completing objectives,
  building tableau synergies, and end-game powers, all wrapped in a charming dog-walking
  theme that makes it appealing to families and gamers alike.

