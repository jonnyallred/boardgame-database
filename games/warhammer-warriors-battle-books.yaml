description: |
  Warhammer Warriors Battle Books are a series of multiplayer combat gamebooks published by Games Workshop, similar in format to the Lost Worlds Fantasy Combat Books, set in the Warhammer 40,000 science fiction universe. Each book represents a specific character—such as Kal Jerico (Necromunda Bounty Hunter), a Blood Angel Captain, or Ephrael Stern (Sister of Battle)—and two players use their respective books to resolve combat by referencing illustrated combat pages. Characters advance by winning battles, unlocking special moves over time. The format provides quick, accessible wargame-style skirmishes without requiring full miniature collections.

