description: |
  Conflict is a family wargame first published by Parker Brothers in 1940, billed as an abstract land, sea, and air combat game. Players move military miniatures (infantry, ships, planes) around a symmetrical board divided into four zones, attempting to either invade an opponent's home zone or capture all enemy units. The game's streamlined mechanics strip away detailed simulation in favor of accessible family-weight strategy, making it one of the early mass-market wargames aimed at a general audience. Various editions were produced through the 1960s.

