description: |
  Trivial Pursuit is the definitive trivia board game, created by Canadians Chris Haney and Scott Abbott in 1979 and first published in 1981 through their company Horn Abbott Ltd. Players move around a wheel-shaped track by correctly answering questions from six color-coded categories — Geography, Entertainment, History, Art & Literature, Science & Nature, and Sports & Leisure — collecting wedges from the category spaces to fill their playing piece. The game became a worldwide sensation in the 1980s, eventually selling over 100 million copies in more than 30 languages and spawning hundreds of themed editions. It is now owned and published by Hasbro.

