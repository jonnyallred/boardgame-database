description: |
  Ride the Rails is the second game in the Iron Rail series by John Bohrer, published by Capstone Games. Players invest in American railroad companies, build track across the United States, and deliver passengers to cities to earn points. Every track placement affects all players since rail lines intersect and connect — meaning the route you build helps or hinders others and creates shared incentive. The elegant overlap of network expansion and stock portfolio management produces deep interaction without excessive complexity, supported by Ian O'Toole's distinctive artwork.
