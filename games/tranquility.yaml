description: |
  Tranquility is a near-silent cooperative card game designed by James Emmerson and published by Lucky Duck Games in 2020. Players work together to fill the sea with number island cards in ascending order from edge to center, guiding their ship home before anyone runs out of cards — but they cannot talk or share card information. Each card played must fit numerically between its neighbors, and placing a card that creates a large gap costs discard penalties. The challenge of coordinating under this communication restriction creates a uniquely meditative yet tense cooperative experience, accessible to all ages and experience levels.

