description: |
  Soldiers: Tactical Combat in 1914–15 is a two-player board wargame published by SPI in 1972, simulating
  the early mobile phase of World War I before the onset of trench warfare. On a hex map scaled at 100 metres
  per hex, players command forces of six nations — British, French, Russian, Belgian, German, and Austro-Hungarian
  — in ten-minute turns of move-and-fire. Unusually, attacking fire is compared against the defending unit's
  terrain rather than its strength, rewarding positional awareness. The game is credited as an influential
  predecessor to Sniper! and Squad Leader, establishing the tactical wargame lineage at SPI.

