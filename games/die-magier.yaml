description: |
  Die Magier is a German board game from 1985 with a wizard theme, in which players move magical figures across a board to collect items or reach objectives through dice-driven movement. A family-weight game typical of mid-1980s German hobby publishing, it offers light competitive racing with a fantasy atmosphere. As an older and modestly distributed German release, detailed English-language documentation is limited, but the game is catalogued in historical German game databases.

