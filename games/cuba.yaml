description: |
  Cuba is a 2007 Euro game for 2-5 players designed by Michael Rieneck and Stefan Stadler, set on the vibrant island of Cuba. Players manage plantations and factories, loading goods onto ships at the harbor for victory points while gaining influence in Cuba's parliament, where laws can shift the rules of the game significantly. Each round, players choose roles that grant unique abilities, and parliament votes determine how those abilities are modified. The interplay between economic development and legislative maneuvering gives Cuba a distinctive flavor among Euro games of its era.

