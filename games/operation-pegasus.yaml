description: |
  Operation Pegasus is a two-player wargame published by Task Force Games in 1980 simulating the March 1968 relief of the besieged U.S. Marine base at Khe Sanh during the Vietnam War. The actual Operation Pegasus was a joint U.S. Army and ARVN overland relief mission launched to end the 77-day siege by North Vietnamese forces. Initially released as Task Force Games' 8th microgame in a ziplock bag format, it was later released as a boxed set the same year. As a compact wargame it captures the relief operation's race against time and logistical challenges in an accessible microgame format.

