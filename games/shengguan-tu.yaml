description: |
  Shengguan Tu (Table of Bureaucratic Promotion) is an ancient Chinese board game originating in the Tang Dynasty around 836 CE, designed to simulate the advancement of civil servants through the complex Confucian bureaucratic hierarchy. Players roll six dice in a bowl and advance three tokens (a primary mandarin and two side officials) up a chart of 63–117 official positions, accumulating wealth through promotions while suffering setbacks from vice and bad fortune. Often compared to a cross between Snakes & Ladders and Monopoly, the game is still played in mainland China, Hong Kong, and Taiwan today.

