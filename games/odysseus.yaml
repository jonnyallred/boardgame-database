description: |
  Odysseus is a board game published by Jumbo International in which players take on the roles of Greek gods — each with unique powers — competing to steer Odysseus' ship toward adventures that score points based on secretly held Task cards. Players vote on the course of Odysseus' journey each round, but divine abilities and hidden agendas make every vote a layer of bluffing and negotiation. The first player to complete adventures worth 10 points wins. Inspired by Homer's Odyssey, the game captures the caprice of divine interference in mortal affairs through a lively social voting mechanism well-suited for family play.

