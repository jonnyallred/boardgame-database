description: |
  Dutch Blitz is a fast-paced real-time card game created by a German immigrant to Pennsylvania and first published around 1960, originally popular in Pennsylvania Dutch communities. Each player has their own 40-card deck with numbers 1-10 in four colors, and simultaneously races to empty their personal Blitz Pile by playing cards onto shared Dutch Piles in ascending order and matching colors. The player who first empties their Blitz Pile calls "Blitz!" to end the round; players then score one point per card played to Dutch Piles minus two per card remaining in their Blitz Pile. Renowned for its frenetic simultaneous play and the coordination-breaking chaos of four people all grabbing at shared center piles at once.

