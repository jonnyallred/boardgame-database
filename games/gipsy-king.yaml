description: |
  Gipsy King is an abstract area-control and network-building game for 2–5 players designed by Corné van Moorsel and published by Cwali in 2007. Players build caravan routes across a modular board of free lands near lakes, vying to claim the most lucrative and popular spots for their Gipsy families. Scoring rewards controlling lakes with gold coins and maintaining connected caravan groups over two rounds of play. The player who amasses the most points across both rounds is crowned the Gipsy King.

