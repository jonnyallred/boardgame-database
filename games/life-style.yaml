description: |
  Life Style is a life simulation board game in the tradition of games like The Game of Life, in which players make choices and encounter random events as they progress through various stages of adult life. Players navigate education, career, family, and financial decisions on a board track, with dice and card draws determining outcomes and the final winner being the player who best manages their life path's challenges and opportunities. Published in the early 1970s, it reflects the era's popular life-planning game genre exemplified by Milton Bradley's Game of Life, with a somewhat more modern framing of lifestyle choices.

