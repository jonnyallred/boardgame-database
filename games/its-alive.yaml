description: |
  It's Alive! is a light auction and set collection card game published by Reiver Games in 2007 in which players compete as mad scientists racing to assemble a complete monster from body parts. Each turn, a body part card is flipped and players bid to acquire it or take gold instead, creating a tense push-and-pull between collecting and banking. The game ends when one player completes their monster and cries "It's Alive!" A third edition was published as Candle Quest by Victory Point Games with a Hanukkah theme, reflecting the game's original mockup concept.

