# Description
description: |
  Activity is a popular party game published by Piatnik in 1990, designed for
  teams of at least 2 players each. Teams compete to guess words through a
  variety of communication methods: drawing, acting, and describing without using
  restricted words.

  Players move their team's pawn around the board by successfully completing the
  communication challenges shown on cards. The combination of drawing, mime, and
  verbal description creates varied and often hilarious moments. Activity has been
  translated into many languages and remains one of Piatnik's most successful
  titles, appealing to mixed groups at family gatherings and parties.

