description: |
  Burma is a historical wargame covering the Burma Campaign of World War II, depicting the brutal jungle warfare between Allied and Japanese forces in Southeast Asia from 1942 to 1945. Players command ground forces, air assets, and supply chains through dense terrain in one of the most logistically challenging theaters of the war. Limited publisher and designer information is available for this title.

