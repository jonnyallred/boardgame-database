description: |
  Ierusalem: Anno Domini is a strategy board game designed by Carmen García Jiménez and published by Devir in 2023, set in Jerusalem during the spring of 33 AD as Jesus prepares to celebrate the Passover seder. Players navigate the social and political dynamics of the city in the days of the Last Supper, managing relationships with apostles, followers, and city authorities. The game combines worker placement with hand management to tell one of history's most pivotal stories through the lens of interactive historical strategy.

