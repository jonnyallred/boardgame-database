description: |
  Mordheim is a Warhammer Fantasy skirmish miniatures game published by Games Workshop in 1999, set during a civil war in the Empire shortly after a comet destroys the city of Mordheim and scatters the precious and mysterious substance wyrdstone across its ruins. Players control small warbands from factions including Reiklanders, Witch Hunters, Sisters of Sigmar, Undead, Skaven, and Chaos cults, fighting rival groups for the scattered wyrdstone. The campaign system allows warbands to gain experience, acquire equipment, and suffer lasting injuries between games in an RPG-like progression. Though officially discontinued by 2004, Mordheim remains beloved by a devoted hobbyist community still producing content decades later.

