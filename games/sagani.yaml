description: |
  Sagani is a compact tile-placement game by Uwe Rosenberg for 1-4 players in which players draft spirit tiles and arrange them in their expanding tableau. Each tile has arrows pointing to specific color directions, and when an arrow points to a matching-color neighbor, a sound disc is placed on it. Collecting a set number of sound discs triggers the end game, while unfulfilled arrows must be covered by costly "cacophony discs" that score negative points. The elegant scoring system — maximizing harmony by fulfilling arrows in all directions — rewards careful spatial planning in a breezy 30-minute package.
