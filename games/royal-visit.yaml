description: |
  Royal Visit is a 2020 two-player tug-of-war card game by Reiner Knizia published by IELLO, reimagining his 2006 game Times Square in a vaguely medieval setting. Players compete to entice the King and his court across the valley into their own castle by playing color-matched cards to move characters along a central track, while leveraging the special abilities of characters like the Bishop and the Sorcerer. A player wins immediately if they manage to bring the King or the Crown into their castle. Super quick to learn and set up, Royal Visit offers a surprisingly tense and replayable gateway experience.

