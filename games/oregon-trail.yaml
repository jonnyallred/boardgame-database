description: |
  The Oregon Trail Card Game is a cooperative card game based on the beloved 1970s educational computer game, published by Pressman in 2016 as a Target exclusive that quickly sold out and became a cultural phenomenon. Players work together to guide a wagon party along the Oregon Trail from Independence, Missouri to the Willamette Valley, playing trail cards to progress while overcoming calamities like river crossings, disease, and food shortages using Supply Cards. When a player succumbs to a calamity like dysentery, they customize a tombstone card in classic Oregon Trail fashion. The game captures the nostalgic dark humor of the original video game, with its 8-bit aesthetic and high mortality rate making it a popular party experience for adults who grew up with the computer game.

