description: |
  Panzer Pranks is a comedic wargame parody published by Chaosium in 1980, created by brothers Kurt and Steve Lortz and subtitled "WWII As It Actually Was in the Movies." The game deliberately violates every convention of standard board wargames — tanks can make bank shots off the edge of the board, movement points can be saved and spent all at once, and Hollywood-style absurdity governs combat outcomes — serving as a satirical commentary on the stereotypes of war movies rather than actual military history. Chaosium, better known for role-playing games like Call of Cthulhu, published Panzer Pranks as a rare foray into comic wargaming, and it remains an affectionate cult curiosity from the early hobby's playful side.

