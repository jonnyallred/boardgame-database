description: |
  Odysea Organization is a cooperative board game in which players work together as a team to discover a ninth planet in space, overcoming challenges and collaborating to complete their mission. Players must coordinate their efforts and resources to navigate obstacles and achieve shared objectives before time or resources run out. Limited online documentation is available for this game outside its publisher's native market. It represents the category of thematic cooperative games designed for family or group play with an exploration-and-teamwork theme.

