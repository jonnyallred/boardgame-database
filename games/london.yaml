description: |
  London is a card-driven city-building game by Martin Wallace in which players rebuild the city after the Great Fire of London, constructing boroughs and playing cards representing buildings of economic, political, and cultural significance. On each turn, players run their built-up city to generate money and victory points — but running the city also accrues poverty tokens, which can devastate a final score. Managing the balance between rapid development and poverty accumulation is central to every decision. Originally published by Treefrog Games in 2010 and later revised by Osprey Games, London rewards strategic planning across overlapping card synergies and remains one of Wallace's most celebrated designs.

