description: |
  Dungeon Petz is a 2011 worker placement game by Vlaada Chvatil and Czech Games Edition, set in the same universe as Dungeon Lords. Players run a family of imps who have set up a pet shop, breeding magical monster cubs and selling them to dungeon lords. The unusual worker placement mechanism has players simultaneously and secretly assign groups of imps to tasks — bigger groups go first but are more expensive to feed. Each pet has ongoing needs (food, attention, magic) represented by need cards, and must be timed for sale when it is at peak impressive quality rather than sick or relieving itself at inopportune moments. The game's darkly comic theme and satisfying multi-stage engine make it a Czech Games Edition highlight.

