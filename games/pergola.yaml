description: |
  Pergola is a garden-themed Euro game for 1-4 players from Rebel Studio. Players develop their own gardens by choosing tools that allow them to pick plants, arrange them on their grid, and attract insects and small animals. The action-drafting mechanism means the tool you choose limits what others can do, adding competitive tension to the otherwise serene gardening theme. Hand-painted watercolor artwork by Karolina Kijak-Dzikońska gives Pergola a distinctive visual identity reminiscent of the celebrated Meadow series.
