description: |
  Kerala: The Way of the Elephant is a tile placement game set during a Kerala elephant festival in India, where players build their festival platforms by moving elephants to claim and place colorful tiles. Each round players move one of their two elephants to take a new tile and expand their grid; the goal is to have all colors represented on their platform with each color forming a single contiguous group. Tiles show elephant symbols that score points, but isolated color groups must be discarded at game end — creating a spatial puzzle that demands careful planning with limited moves.

