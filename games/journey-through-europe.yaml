description: |
  Journey through Europe is a Ravensburger geography travel game set on a detailed map of Europe, where players pick a home city and draw eight destination cards they must visit before returning home. Each turn players roll the die and choose to travel by road, sea, or air — each with different movement rules and costs — while 63 special cities on the map can yield bonuses or penalties. First player to complete all destinations and return home wins. A classic family game with genuine educational value, it helped popularize European geography-themed tabletop travel racing.

