description: |
  Azul Duel is a two-player head-to-head version of Michael Kiesling's award-winning tile-placement series, built specifically for intimate, tactical competition. Players draft tiles from a shared market using the signature Azul drafting mechanism, enhanced with a new stacking twist, and lay them onto modular pattern plates that create a unique player board layout each game. The game preserves the elegant pattern-building and penalty-avoiding tension of the original Azul while adding additional strategic options tailored for the pure duel format.

