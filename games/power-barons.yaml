description: |
  Power Barons is a 1986 Milton Bradley game of international rivalry for 3–4 players in which the objective is to build power bases in opponents' territories. Players engage in card-based duels across four suits plus a special "political power" suit — each player challenges an opponent in a suit, plays a card, and the opponent responds, with players alternately raising or withdrawing. Strategic bluffing and negotiation determine outcomes, as players maneuver diplomatically and militarily to establish dominance. The mix of card dueling, power accumulation, and negotiation makes it an accessible political game with surprising depth.

