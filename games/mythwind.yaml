description: |
  Mythwind is a cooperative "cozy" persistent-world board game designed by Nathan Lige and Brendan McCaskell, published by Open Owl Studios. Players take on the roles of unique characters — each with their own profession, skills, and storyline — working together to establish and grow a new town in the magical Mythwind Valley. Between sessions the town and characters persist without resetting, allowing players to dip in and out with no pressure of campaign failure. The game blends town-building, character development, sprite relationships, and light adventure in a format that emphasizes relaxed collaborative play over competitive stakes.

