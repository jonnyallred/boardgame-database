description: |
  Survivor: The Tribe Has Spoken is an officially licensed card game based on
  the hit reality TV show, designed by Elan Lee and published by Exploding
  Kittens. Players collect cards representing knowledge, power, and resources,
  while using action cards to steal from opponents, form alliances, find hidden
  immunity idols, and manipulate votes at Tribal Council. The fast-paced turns
  encourage direct player interaction and scheming, culminating in elimination
  votes that thin the field until one player claims victory. The game captures
  the social dynamics, alliances, and blindsides that have defined 50 seasons
  of the beloved reality competition.

