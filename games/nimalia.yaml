description: |
  Nimalia is a simultaneous card-drafting and tile-placement game for 2-5 players in which players build a wildlife sanctuary. Each round players draw three cards, keep one, and pass the rest — then place their chosen card in their 6×6 sanctuary grid, covering at least one existing biome. Cards show four biomes each containing an animal, and points are scored for the largest zones of each biome type and for specific animal patterns. Its colorful, nature-themed artwork and simple rules make it an accessible family game with surprising spatial depth.
