description: |
  Funny Bunny is a Ravensburger children's racing game in which players race their bunnies up a hill to reach the winning carrot at the top. On each turn, a card is drawn — bunny cards advance your pieces while carrot cards rotate the carrot on the hill, potentially triggering traps such as holes, a mole, a swinging gate, or a drawbridge that send bunnies tumbling back down. The first player to get a bunny safely to the top wins. With its random card-driven movement and whimsical interactive board elements, it is a popular first board game for young children.

