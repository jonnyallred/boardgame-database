description: |
  Baden-Württemberg Catan is a regional promotional edition of The Settlers of Catan produced by Kosmos, featuring a map of the German state of Baden-Württemberg instead of the standard Catan island. The game uses the familiar Catan mechanics — resource production, settlement building, road construction, trading, and development cards — applied to a geographically themed board representing actual cities and regions of Baden-Württemberg. Such regional Catan editions were produced for various German states and locations, serving as promotional items and collectibles for local fans of the game.

