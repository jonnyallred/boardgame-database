description: |
  Kill Doctor Lucky is a darkly comedic 1996 game by James Ernest that inverts the premise of Clue: players race to be the first to murder the mansion's owner, Doctor Lucky, before their opponents can claim the kill. Players move through the mansion searching for weapons and waiting until the Doctor is alone in a room, at which point they attempt the murder — only to have every other player play failure cards to thwart them. The game captures the absurd escalation of everyone watching each other while pretending not to, and won the Origins Award for Best Abstract Board Game in 1997. A flagship title of Cheapass Games and a beloved cult classic of the party-game genre.

