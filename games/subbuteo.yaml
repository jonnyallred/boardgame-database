description: |
  Subbuteo is a tabletop football (soccer) dexterity game invented by Peter Adolph in 1946 and first sold in 1947. Players flick miniature figures mounted on weighted hemispherical bases to simulate the play of association football, following rules closely modeled on the real sport. Hundreds of team kits representing real clubs worldwide are available, giving the game strong collector appeal alongside its skill-based gameplay. The game dominated tabletop sports simulation from the 1960s through the 1980s before video games reduced its popularity.

