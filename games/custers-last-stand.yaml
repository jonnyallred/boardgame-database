description: |
  Custer's Last Stand is a two-player hex-and-counter wargame published by Battleline in 1976 depicting the Battle of Little Bighorn on June 25, 1876. One player commands Lieutenant Colonel George Armstrong Custer's 7th Cavalry and the other commands the united Sioux and Cheyenne nations under Sitting Bull and Crazy Horse. The game includes 120 die-cut counters and an 8-page rulebook, offering a compact but historically grounded simulation of one of the most famous military engagements of the American frontier. Multiple publishers have produced variants and successors to this classic wargame subject over the decades.

