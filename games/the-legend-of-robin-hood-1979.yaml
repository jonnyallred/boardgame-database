description: |
  The Legend of Robin Hood is a 1979 asymmetric two-player microgame originally published by
  Operational Studies Group (OSG) and later republished by Avalon Hill in 1983. One player
  commands Robin Hood and his Merry Men operating in Sherwood Forest, while the other plays the
  Sheriff of Nottingham hunting them down. An area movement system handles terrain, a simple
  personal combat structure resolves confrontations, and a recruitment mechanic lets Robin Hood
  gather outlaws. The two sides play entirely differently from one another, creating a true
  cat-and-mouse experience. The Avalon Hill edition was a 1983 Origins Awards finalist for Best
  Fantasy Board Game.

