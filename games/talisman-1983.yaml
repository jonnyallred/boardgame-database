description: |
  Talisman is a fantasy adventure board game designed by Robert Harris and first
  published by Games Workshop in 1983. Players choose from iconic character
  classes — Warrior, Wizard, Thief, and many more — each with unique Strength
  and Craft stats, then roll dice to move through the modular Outer, Middle, and
  Inner Regions of the game board, encountering adventure cards with monsters,
  treasures, and events. The objective is to reach the Crown of Command at the
  board's center and use it to eliminate all other players. The game is notorious
  for its lengthy playtimes and chaotic dice-driven randomness, but remains a
  beloved classic in fantasy gaming with five editions spanning decades.

