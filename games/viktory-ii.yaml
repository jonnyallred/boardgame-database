description: |
  Viktory II is a 2006 fast-paced conquest strategy game designed by Peter Morrison and published by Morrison Games, supporting two to eight players on a randomly generated modular hex map. Inspired by 19th-century Napoleonic warfare, players deploy custom infantry, cavalry, artillery, and frigate units as they compete for dominance through aggressive combined-arms tactics and dice-resolved combat. The game offers two win conditions: player elimination or subjugation through total domination. The modular map ensures that no two games play out identically, providing substantial replay value for fans of direct conquest games.

