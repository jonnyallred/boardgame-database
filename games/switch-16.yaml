description: |
  Switch 16 is a dice-and-card-shedding game for 2–4 players designed by Anthony
  Vadasz and originally published by Tomy in 2001, later republished by Goliath,
  Piatnik, and Pressman Toy Corporation. Players race to be first to discard the
  number 16 card from their deck by rolling a combination of dice matching the
  value of the top card. A green Switch die lets the active player swap decks with
  any opponent, while a red Switch die forces an immediate deck exchange with the
  player holding the lowest top card — creating chaotic reversals of fortune. The
  game's simplicity and surprise swaps make it a lively family filler.

