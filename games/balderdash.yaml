description: |
  Balderdash is a bluffing party game created by Laura Robinson and Paul Toyne in 1984, based on the classic parlour game Fictionary. One player reads an obscure word, acronym, person, movie title, or law aloud, and all other players secretly write a plausible-sounding but invented definition. The definitions are read aloud and players vote on which they believe is correct. Points are awarded both for guessing the real answer and for fooling others into voting for your fabrication. With over 15 million copies sold, it has become a party game staple renowned for generating laughter and creative deception.

