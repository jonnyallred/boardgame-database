description: |
  Super Fantasy Brawl is a fast-paced competitive miniatures board game published by Mythic Games in 2020, for 2–4 players. Players select teams of three champions from a diverse roster, combining their unique action card decks to create synergistic combinations. On each turn, players use their hand of action cards to maneuver, attack, displace enemies, and claim objectives to score victory points. The faction-free champion selection allows for unlimited team combinations, and the card-driven actions create strategic depth without requiring complex rule memorization. Games play in 30–40 minutes, making it an accessible yet rewarding arena brawler.

