description: |
  Jerusalem! Tactical Game of the 1948 War is a two-player hex-and-counter wargame published by Simulations Design Corporation in 1975 simulating the 1948 Arab-Israeli War battle for Jerusalem. One player commands Israeli forces while the other controls Arab forces, with the Israelis needing to get a convoy of supplies through to the besieged city along a declared route. The game borrows mechanics from SDC's earlier Battle for Hue and runs twelve turns. A second edition was published by Mayfair Games in 1982 as a boxed game, and a third edition with a new scenario appeared in 2007.

