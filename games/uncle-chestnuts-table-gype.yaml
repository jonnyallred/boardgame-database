description: |
  Uncle Chestnut's Table Gype is a modern realization of a fictional game concept invented by G.K. Chesterton and H.G. Wells over 100 years ago as a joke. Designers Paul and Christopher Nowak (Eternal Revolution) developed it into a real game in which players race to move their dice-pieces — each face showing an icon that dictates how that piece may move — to the opposite home base in a format blending elements of Chinese Checkers and chess. The icons on each die (Flame, Book, Tree, Swords, Hat, and Ear) create unique movement rules, and flipping pieces changes their capabilities, adding a layer of strategic depth to a charmingly literary game concept.

