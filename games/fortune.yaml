description: |
  Fortune is a property trading board game published by Parker Brothers in 1935 as an alternative to Monopoly, produced in a limited run of approximately 10,000 copies primarily to secure trademark rights to the name. Based on the same core real estate and trading mechanics as Monopoly, Fortune features players buying and trading properties while navigating the board. Its limited production makes it a significant collector's item among vintage board game enthusiasts, and it remains largely obscure outside of Monopoly history discussions.

