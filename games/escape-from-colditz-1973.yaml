description: |
  Escape from Colditz is a classic board game first published in 1973 by Gibsons Games of London, co-designed by Pat Reid, a British officer who actually escaped from Colditz Castle (Oflag IV-C) during World War II. One player takes the role of the German security officer while the remaining players represent Allied POWs of different nationalities — British, French, Dutch, and Polish — each attempting to gather equipment cards and make a successful escape from the castle. Released to coincide with the popular BBC television series of the same name, the game became a best-seller in the UK and proved especially popular in Spain. A new edition with updated artwork and rules was released by Osprey Games in 2016.

