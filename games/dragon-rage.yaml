description: |
  Dragon Rage is a 1982 asymmetric two-player wargame published by Dwarfstar Games (a division of Heritage Models), designed by Lewis Pulsipher with art by David Helber. One player commands a horde of fantasy monsters — including dragons, giants, goblins, orcs, trolls, great birds, and wizards — seeking revenge against a walled medieval city that destroyed their eggs; the other player commands the city's defenses, including knights, infantry, heroes, and wizards. Six included scenarios offer different combinations of attackers and defenders, and rules allow players to create their own configurations. Despite Dwarfstar's bankruptcy shortly after publication, the game was reissued in an expanded format by Belgium's Flatlined Games in 2011.

