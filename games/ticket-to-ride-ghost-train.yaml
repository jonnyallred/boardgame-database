description: |
  Ticket to Ride: Ghost Train is a Halloween-themed standalone entry in the Ticket to Ride First Journey line, designed for families and younger players. Players collect Parade Float cards to claim routes on a spooky map connecting locations like the Mad Scientist's Lab, the Gingerbread House, and the Lonely Barn. The simplified rules and short playtime make it an ideal introduction to the Ticket to Ride series for children aged 6 and up.

