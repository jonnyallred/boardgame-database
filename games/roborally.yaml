description: |
  RoboRally is Richard Garfield's chaotic programming game in which players simultaneously program robots to race through a hazard-filled widget factory, trying to reach checkpoints in order while conveyor belts, lasers, crushers, and pits conspire against them. Each round players draft five program cards from a hand of nine — choosing forward moves, rotations, backups, and U-turns — then execute them phase by phase in a beautiful, often catastrophic ballet of robots careening off course. Delayed programming and interactive factory hazards create delightful chaos as well-laid plans go hilariously wrong, cementing RoboRally as a beloved cult classic of the programming game genre.

