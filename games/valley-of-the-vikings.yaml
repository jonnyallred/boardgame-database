description: |
  Valley of the Vikings is a children's dexterity game designed by Marie Fort and Wilfried Fort, published by HABA, and winner of the 2019 Kinderspiel des Jahres (Children's Game of the Year). Players take turns launching a bowling ball to knock down barrels in a Viking village, strategically targeting the barrels they need to score points while trying to send opponents' Vikings tumbling into the water. The tactile barrel-bowling action makes the game immediately accessible and exciting for young players, while the light strategic element — choosing which barrels to aim for — gives it enough depth to appeal to the whole family.

