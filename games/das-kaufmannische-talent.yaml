  Das kaufmännische Talent (The Commercial Talent) is a German economic board game from the mid-1980s in which players develop trading and business skills in a competitive marketplace setting. As an older German educational game with limited English-language documentation, detailed designer and publisher information is not readily available in modern sources. The game appears to use trading and negotiation mechanics to simulate commercial competition.

