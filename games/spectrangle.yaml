description: |
  Spectrangle is an abstract tile-placement game invented by Graham Gordon in 1989, based on mathematical work
  by British mathematician Percy Alexander MacMahon. Players place colourful double-sided triangular tiles called
  "trangs," which represent all permutations of five colors (red, yellow, green, cyan, and magenta), plus one
  all-white joker tile. Tiles must be placed so that touching edges match in color, and players score points
  based on the multiplication of values on the matched trangs. The compact version supports up to four players
  with 36 tiles, while the original game accommodates up to eight players with 60 tiles.

