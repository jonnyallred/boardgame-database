description: |
  Ticket to Ride: Northern Lights is a standalone entry in the series covering Denmark, Norway, Sweden, and Finland, functioning as a modern replacement for the Nordic Countries edition. Players build rail and sea routes through fjords, forests, mountains, and capital port cities while also competing for four randomly selected common objective cards that award bonus points at game end. The shared common objectives add a new layer of tension and strategic consideration beyond the classic Ticket to Ride formula.

