description: |
  Poison is a light card game by Reiner Knizia in which 3–6 players take turns playing cards from their hands into one of three colored cauldrons. Each cauldron has a limit of 13; if your card causes a cauldron to exceed that total, you must take all of its cards into your score pile. At the end of each round, each card is worth one point, but each Poison card is worth double — and the player with the fewest points at the end of multiple rounds wins. The simple push-your-luck tension of loading cauldrons while avoiding being the one who tips them over makes Poison an effective and accessible filler.

