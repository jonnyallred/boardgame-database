description: |
  Hexdame is a two-player abstract strategy game invented by Christian Freeling in 1979 as a direct adaptation of International Draughts (checkers) played on a hexagonal grid of 61 cells. Each player begins with 16 men that can move forward to adjacent empty cells or capture opponent pieces by jumping over them. Men promoted to kings gain full multi-directional movement and jumping. The game retains the complete rule set of International Draughts, including mandatory captures and chain jumps, while the hexagonal board creates richer positional dynamics.

