description: |
  Septikon: Uranium Wars is a sci-fi board game designed by Konstantin Seleznev and published by Hobby World (Russia) in 2012, in which 2 or 4 players control competing orbital uranium mining stations. Players roll a die and move clones to land on and activate the module's special abilities, managing production, defenses, and attacks against rival stations. The game's deep action variety — with five clone types and dozens of module combinations across the hexagonal space station board — creates emergent strategic situations refined over the designer's twelve years of development.

