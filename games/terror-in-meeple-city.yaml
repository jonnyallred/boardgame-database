description: |
  Terror in Meeple City (originally released as Rampage) is a dexterity-driven
  chaos game designed by Ludovic Maublanc and Antoine Bauza and published by
  Repos Production in 2013. Players control giant monsters rampaging through
  a cardboard city, physically dropping wooden towers onto buildings, literally
  blowing pieces across the table with their breath, and launching a "breath
  attack" against opponents. Collecting sets of colored meeples earns bonus
  points. Each monster has unique asymmetric powers via ability cards. The game
  delivers an unabashedly silly, tactile experience that delights in the chaos
  of literal monster-scale destruction.

