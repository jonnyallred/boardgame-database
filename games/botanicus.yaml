description: |
  Botanicus is a 2024 worker placement game designed by Samuele Tabellini and Vieri
  Masseini and published by Hans im Glück, in which players act as aristocratic owners
  competing to build the most beautiful botanical garden in the late 19th century. Players
  acquire and care for plants, water them, manage a gardener, and satisfy picky visitors
  who have specific preferences. A unique action-selection mechanism competes for the best
  spots in the garden, and the game received a 2024 Kennerspiel des Jahres nomination
  for its elegant mechanics.

