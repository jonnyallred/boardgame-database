description: |
  Witchcraft! is a solo card-driven game in which you lead a coven of witches protecting a village in a world where magic is real — and so are the monsters. Building on the hidden/revealed mechanism of Resist!, you must decide when to use magic to defeat the challenges you face, at the risk of being discovered and imprisoned for witchcraft. Players build their coven from multiple witch families, each specializing in different tasks such as revealing challenges, attacking monsters, uncovering juror convictions, or capturing familiars. The game balances resource management with push-your-luck tension across a 20-40 minute play session.

