description: |
  Marrakesh is a point-salad Euro game by Stefan Feld, published by Queen Games in 2022 as part of the Stefan Feld City Collection. Players simultaneously and secretly select three colored cylinders from behind their screens to activate a shared action wheel, then take actions based on the revealed combination — exploring the desert, harvesting figs, advancing on the mosque and palace tracks, and collecting luxury items for scoring. The simultaneous selection system creates fascinating mind-game dynamics as players try to anticipate and deny opponents' chosen actions. One of Feld's more ambitious recent designs, it is praised for its puzzle depth and visual spectacle.

