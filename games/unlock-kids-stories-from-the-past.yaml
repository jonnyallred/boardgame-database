description: |
  Unlock! Kids: Stories From the Past is the second volume in the child-friendly Unlock! series, sending young players on adventures through three historical settings: prehistoric times, Ancient Egypt, and the Wild West. Each of the three stories contains two self-contained adventures, giving six cooperative mysteries in total. Like the first Unlock! Kids box, no companion app is required and the game teaches itself via an included tutorial, making it fully accessible to ages 6 and up. Players combine cards and solve simple puzzles together to complete each story.

