description: |
  Nightmare (also known as Atmosfear) is a VHS-driven interactive board game published by A Couple 'A Cowboys/J.W. Spear & Sons in 1991. Players race around the board collecting six keys while being terrorized by the Gatekeeper — a sinister host who appears on the tape at unpredictable intervals to taunt, punish, and direct players. Each player adopts a supernatural persona (werewolf, poltergeist, mummy, zombie, witch, or vampire) and must race against a 60-minute real-time clock to gather their keys and reach the Nightmare in the center. The game became a cult classic of the VHS board game era and launched the broader Atmosfear franchise.

