description: |
  Sail is a cooperative two-player trick-taking game with a nautical theme, designed by Akiyama Koryo and Korzu Yusei and published by Allplay. Before each round begins, players exchange a limited number of cards to coordinate strategy, then play through a series of tricks in complete communication silence — no discussion of cards or tactics is permitted once cards are dealt. Different game actions trigger based on who wins each trick in combination with each player's unique character skills, creating a deep non-verbal coordination puzzle. The game rewards players who learn to read their partner's plays and develop intuitive communication through the card exchange phase alone.

