description: |
  The Battle of Britain is a 1968 air combat wargame designed by Lou Zocchi and published by
  Gamescience (under the Renwal imprint), covering the famous 1940 aerial campaign over England.
  Players control groups of aircraft over the English Channel and southern England, using both basic
  and advanced rule sets that allow the game to scale from introductory to detailed simulation.
  Zocchi researched the battle extensively while serving in the U.S. military in Japan and designed
  the game after finding no existing wargames covered air combat at this level of focus. It was
  one of the first dedicated air-combat board wargames and had significant influence on subsequent
  aerial warfare game design.

