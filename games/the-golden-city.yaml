description: |
  The Golden City is a route-building and area influence game by Michael Schacht, published by
  Z-Man Games and nominated for the 2009 Kinderspielexperten "8-to-13-year-olds" award. Players
  are merchants arriving by sea on a mythical island, establishing trade routes from the coast
  inward toward the Golden City. Building trade houses in coastal towns and then connecting them
  one link at a time towards the interior, players compete to collect Letters of Recommendation
  from city nobles. Area influence mechanics and a bidding element add competitive tension to
  the elegant network-building core.

