description: |
  Merv: The Heart of the Silk Road is a tense economic worker placement game by Fabio Lopiano with art by Ian O'Toole, published by Osprey Games in 2020. Players are merchants competing for power and wealth in the greatest city of the medieval Silk Road, vying for influence through court intrigue, donations to the grand mosque, and securing lucrative trade deals — all while Mongol hordes creep ever closer to the city walls. The threat of the Mongol invasion creates a constant ticking clock: contributing to the city's defenses delays destruction but costs valuable actions, while ignoring it courts catastrophic point loss. The beautiful production and taut action economy made it one of 2020's most acclaimed releases.

