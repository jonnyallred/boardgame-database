description: |
  Nordlingen is a tactical hex-and-counter wargame originally published by Simulations Publications Inc. (SPI) in 1976, simulating the Battle of Nordlingen on September 6, 1634, during the Thirty Years' War — when Imperialist and Spanish forces decisively defeated the Swedish army. Originally one of four scenarios in SPI's Thirty Years War quadrigame, Nordlingen was also released as a standalone game and was considered by many critics the best of the four scenarios. The battle's terrain — featuring eight major hills, woods, and multiple towns — creates a rich tactical puzzle on the map that the game is particularly praised for.

