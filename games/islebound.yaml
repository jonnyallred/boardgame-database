description: |
  Islebound is a seafaring exploration game set in Ryan Laukat's richly illustrated fantasy world of sea monsters, pirates, and mystical island towns. Players sail between islands to gather resources, hire crew, and conquer or befriend towns — either through combat with pirates and sea monsters, or by completing diplomatic events. Conquered towns are commissioned as buildings in each player's capital city, granting unique abilities and scoring bonuses. The modular map changes every game, and the variety of strategies (conqueror, diplomat, merchant) gives Islebound strong replayability alongside its gorgeous art direction.

