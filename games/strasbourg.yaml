description: |
  Strasbourg is a 2011 Euro game by Stefan Feld published by Pegasus Spiele, set in 15th century Strasbourg where players lead ambitious families competing for guild influence. Each round players secretly divide a hand of bid cards into up to five separate lots — one per guild auction — and those lots are locked in before any auctions begin. This "once-around bid" creates agonizing resource allocation decisions, as spending heavily in one guild weakens bids in others. Players compete to place family members as apprentices, assistants, or master craftsmen, earning victory points through guild dominance. Nominated for the 2011 Kennerspiel des Jahres.

