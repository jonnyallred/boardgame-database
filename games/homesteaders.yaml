description: |
  Homesteaders is an auction and resource management game designed by Alex Rockwell and published by Tasty Minstrel Games in 2009. Over ten rounds, players bid on the right to build specific types of frontier buildings, then spend resource cubes to construct one building from the available options. Each building provides ongoing income in resources or victory points, and players must manage trade rails and debts to fund their growing settlement. The fixed-placement auction system creates meaningful competition for key building types, and economic engines must be carefully planned to maximize the final score.

