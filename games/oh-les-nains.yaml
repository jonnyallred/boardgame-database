description: |
  Oh ! les nains is a 1997 French card game published by Asmodee, designed by Philippe des Pallières, in which two teams of garden gnomes engage in a tug-of-war over a garden hose stretched across a fence. Players play cards from three types — gnome-adding cards, hose-pulling cards, and squirrel-interference cards — to drag the opposing team's lead gnome into the fence, eliminating them from the round. The team whose lead gnome is knocked down first loses the round, and the first side to win two rounds takes the game. Fast and funny, Oh ! les nains is a light but tactically engaging card battle designed for family play.

