description: |
  The Magic Labyrinth is a 2009 children's memory and maze game designed by Dirk Baumann for Drei Magier Spiele. Players move wizard pieces atop a 6x6 board, each connected via magnets to a metal ball rolling beneath—when a wizard hits an invisible wall, the ball drops and the wizard returns to start. The walls change each game using a modular grid of maze pieces below the board, ensuring no two sessions are alike. Players race to collect five magical items by memorizing the hidden wall layout, making it an elegant, tactile memory game that won the Kinderspiel des Jahres award.

