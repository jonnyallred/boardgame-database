description: |
  Oregon is a card-driven tile-placement game set in the American frontier, designed by Henrik and Åse Berg and published by Hans im Glück in 2007. Players use pairs of cards from their hands to determine where they may place farmers or construct buildings — mines, forts, trading posts — on a grid-style Oregon landscape, scoring points for adjacency to existing structures and farmers. The game's elegant dual-card placement system — one card indicating the column, one the row where a tile may go — creates interesting hand management decisions within a simple ruleset. Published in partnership with Rio Grande Games for the English market, Oregon offers a quick and accessible Euro experience with a pleasant frontier aesthetic.

