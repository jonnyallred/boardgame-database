description: |
  The Jolly Darkie Target Game is a 19th-century tabletop tossing game produced by McLoughlin
  Brothers from approximately 1890, in which players throw small wooden balls at a lithographed
  stand-up target, earning points for landing balls in the target's open mouth or numbered holes.
  The game is a historically significant artifact of American racism — it depicts a caricatured
  Black male figure with exaggerated features intended to dehumanize and mock, and was one of
  many contemporary toys and games marketed as acceptable entertainment that reinforced white
  supremacist attitudes. It is preserved and studied in museum collections including the Strong
  National Museum of Play as a primary source for understanding how racist ideology was normalized
  and commodified in American consumer culture.

