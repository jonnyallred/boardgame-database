description: |
  Cherry Ames' Nursing Game is a 1959 Parker Brothers board game based on the popular Cherry Ames book series about a young student nurse. Two to six players travel around a track representing different phases of nurses' training, collecting six colored rings and racing to be the first to "graduate" from nursing school. The game features a simple racing mechanic typical of family games of the era, with the board illustrated to reflect the nursing career theme. It reflects the mid-century trend of creating games based on popular children's book series.

