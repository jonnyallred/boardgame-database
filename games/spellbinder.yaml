description: |
  Spellbinder is a fantasy microgame designed by R. Vance Buck and published by Task Force Games in 1980. Four
  wizards battle to conquer Yof-Pintre, the central castle on a hex board, each commanding armies from lesser
  corner castles. The central mechanic involves simultaneously selecting spells in secret, then revealing them
  together — spells damage enemy forces but may also backfire on the caster. Shifting alliances and clever spell
  selection give the game surprising depth for its compact format, blending area control with bluffing in a
  classic fantasy wargame package.

