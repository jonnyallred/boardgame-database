description: |
  Wizard's Quest is a fantasy area control board game published by Avalon Hill in 1979, set on the island kingdom of Marnon where 2-6 players compete to be the first to recover all their lost treasures. The board features 18 hexagonal islands placed randomly each game, while Orc armies occupy territories and a wandering dragon and wizard add unpredictable events. Combat uses a simple die-roll mechanic, and players can collect Hero and Sorcerer units to boost their combat potential. The game blends wargame area control with accessible family-game sensibilities, defying easy genre classification.

