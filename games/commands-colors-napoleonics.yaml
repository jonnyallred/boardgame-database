description: |
  Commands & Colors: Napoleonics applies Richard Borg's classic command card system to the Napoleonic Wars, covering battles of the Peninsular War and the Hundred Days campaign including Waterloo. Like its predecessors, players use command cards to activate units in specific sections of the battlefield, then roll custom dice to resolve combat. The Napoleonic period introduces key distinctions between Infantry, Cavalry, and Artillery roles, with infantry squares providing a unique defensive option against cavalry charges. Unit blocks degrade as they take losses, directly reducing combat effectiveness. Multiple expansion modules have extended coverage to additional nations and campaigns, making it one of the most complete Napoleonic wargames in the hobby.

