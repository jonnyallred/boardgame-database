description: |
  Tomb is a competitive dungeon crawl game published by Alderac Entertainment Group in which each player builds their own party of adventurers in a tavern before delving into crypts filled with monsters, traps, and treasure. Players secretly populate the tomb with hazards and rewards, then compete to earn the most treasure while hindering rivals through tactical party management and combat. Variable characters, random map layouts, and unpredictable encounters ensure high replayability in this Ameritrash-style dungeon adventure.

