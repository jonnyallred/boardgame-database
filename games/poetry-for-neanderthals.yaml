description: |
  Poetry for Neanderthals is a hilarious team word-guessing party game from Exploding Kittens in which clue-givers must describe words and phrases using only single-syllable words. Any time a clue-giver accidentally uses a word with two or more syllables, the opposing team gets to bop them with the game's included 2-foot inflatable "No!" stick. Teams earn points for each card they guess correctly. The 200-card deck features both easy and challenging concepts, making it accessible for families while remaining entertaining for adults. Released during the COVID-19 pandemic in 2020, it became a party game hit.

