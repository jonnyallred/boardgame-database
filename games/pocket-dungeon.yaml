description: |
  Pocket Dungeon is a solo print-and-play dungeon crawler released in 2009 by Print & Play Productions. Players create a hero and explore a procedurally generated dungeon using the innovative DunGen system, which reveals the dungeon layout as they move through it. The objective is to clear the dungeon of monsters, locate the boss, and defeat it. The game notably introduced stealth dice mechanics and is designed to be played in short sessions or a single sitting. Released under a Creative Commons license, it was an early champion of accessible solo print-and-play gaming.

