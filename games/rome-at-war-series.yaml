description: |
  The Rome at War series is a board wargame series published by Avalanche Press covering ancient land combat from the Roman era, initiated with the release of Hannibal at Bay in 2000 and designed by ancient warfare authority Stephen C. Jackson. The series employs a distinctive "miniatures" look for playing pieces, with dramatic three-quarter views of legions, phalanxes, cavalry, and other combat units. Games in the series span Roman history from the Punic Wars to frontier battles against barbarian armies, offering tactical-level coverage of key engagements with units rated for combat strength and morale. The series provides an accessible entry point into ancient wargaming with streamlined rules that still capture the essential character of Roman-era combat.

