description: |
  Time's Up! Deluxe is an expanded edition of R&R Games' award-winning party game designed by Peter Sarrett, combining the best cards from the original and its expansions with new material totaling over 525 name cards and an electronic timer. Teams of two or more players compete across three rounds to guess as many celebrity and notable-person names as possible in 30 seconds, with cluing progressively restricted: full sentences allowed in round one, one word only in round two, and silent charades in round three. Named Best Party Game by multiple publications and a multiple award winner, it remains one of the most reliably hilarious team party games.

