description: |
  Britannia is a historical area-control wargame designed by Lewis Pulsipher and first published by Gibsons Games in 1986, later republished by Avalon Hill. Spanning roughly 1000 years of British history from the Roman invasion to the Norman Conquest, three to four players each control multiple factions representing waves of invaders and native peoples. Each nation has unique scoring objectives tied to its historical narrative, creating fascinating tensions as players must advance their own nations while managing the board for long-term position. It is considered a foundational work in the "Mother of All..." genre of multi-faction historical wargames.

