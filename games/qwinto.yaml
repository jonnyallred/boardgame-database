description: |
  Qwinto is a fast-paced roll-and-write dice game for 1-5 players from the designers of Qwixx, where everyone plays at the same time. On your turn you choose to roll 1, 2, or 3 colored dice and all players may write the sum in a matching-colored row on their scoresheet — but numbers must increase left to right, and no column may repeat a value. Two failed rolls per player ends the game. The simultaneous participation mechanic and lightning playtime make Qwinto an ideal filler that fits in a pocket.
