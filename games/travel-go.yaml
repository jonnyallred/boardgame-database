description: |
  Travel Go (also published as "Go: The International Travel Game" by Waddingtons in 1961) is a family travel-themed board game in which players journey across the world by air, sea, rail, and road, collecting souvenirs from each city visited before returning to the starting point in London. Distinct from the ancient abstract strategy game Go (Weiqi), this is an accessible family game blending route selection and set collection in a globe-trotting adventure format that proved popular enough to remain nostalgically beloved decades after its initial release.

