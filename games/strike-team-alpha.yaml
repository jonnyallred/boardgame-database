description: |
  Strike Team Alpha is a 1978 Gamescience science fiction wargame designed by M. Scott Kurtick simulating tactical infantry warfare between three enemy factions in the 22nd and 23rd centuries. Eleven scenarios recreate futuristic man-to-alien combat in the depths of space featuring exotic weapons and futuristic equipment. The 16-page rulebook was tested by experienced wargamers and science fiction fans, including Hugo nominee George Alec Effinger, to ensure both accessibility and accuracy of the sci-fi atmosphere.

