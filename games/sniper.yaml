description: |
  Sniper! is a two-player board wargame designed by James Dunnigan and published by Simulations Publications Inc.
  (SPI) in 1973, simulating man-to-man combat in World War II urban environments at a ground scale of two metres
  per hex. Notably the first commercial tactical wargame to treat individual WWII infantry combat, it featured
  a simultaneous movement system where both players pre-plot orders before revealing and resolving actions together.
  Multiple editions were published, including a Designer's Edition with mounted mapboards, and the game influenced
  an entire generation of tactical wargaming design.

