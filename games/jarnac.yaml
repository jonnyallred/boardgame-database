description: |
  Jarnac is a two-player competitive word game created by Maître Emile Lombard in the late 1970s, described as a "duel of words without mercy." Players compete to form progressively longer words, while also attempting to steal their opponent's words by extending or rearranging the letters. The game demands vocabulary, quick thinking, and the ability to spot letter combinations the opponent has formed. A classic of French word gaming, it has been republished by several companies including Blackrock Editions, and remains popular as an intense heads-up word duel.

