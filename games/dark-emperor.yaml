description: |
  Dark Emperor is a two-player fantasy warfare game designed by Greg Costikyan and published by Avalon Hill in 1985. One player controls an evil necromancer and his vampire legions invading from another dimension, while the other player rallies the kingdoms of the world against the dark tide, managing diplomatic, magical, and military resources. The game was noted for its thematic ambition and asymmetric design, though Avalon Hill eventually acknowledged that some aspects proved difficult to play in practice and it met with modest commercial reception.

