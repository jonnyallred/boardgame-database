description: |
  Chinese Civil War is a hex-based board wargame simulating the conflict between Nationalist Kuomintang forces and the Communist People's Liberation Army in China from 1946 to 1949. Originally released in issue #10 of The Wargamer magazine, it offers a strategic-level simulation of this pivotal conflict that determined the fate of modern China. Players command the opposing armies across a map of China, using military and supply mechanics to enact the war's historical turning points. The game provides an accessible entry into an underrepresented theater of 20th-century wargaming.

