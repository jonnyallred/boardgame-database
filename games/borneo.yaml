description: |
  Borneo is a merchant trading game published by DaVinci Games in which players take
  the roles of 17th century spice merchants conducting commerce with the East Indies.
  Players manage shipment cards, establish harbors, and carry out missions to advance
  their standing in their trading company. For 3 to 5 players, the game features
  compact Euro-style mechanics focused on hand management and maritime trade in the
  age of the spice route.

