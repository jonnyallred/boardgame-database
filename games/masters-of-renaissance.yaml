description: |
  Masters of Renaissance is a streamlined card game distilling the essence of Lorenzo il
  Magnifico into an accessible, physical-puzzle format. Players push colored marbles through
  a 3×4 grid market, collecting resources based on which row or column they displace marbles
  from, then spend those resources to buy development cards and advance on personal tracks.
  Cards trigger chain reactions of resource conversion, building satisfying engines. The
  tactile marble-market mechanic is unique among card games and makes resource gathering
  feel physical and intuitive even in this lighter format.

