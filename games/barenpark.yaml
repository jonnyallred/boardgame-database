description: |
  Bärenpark is a tile-placement game for 2–4 players designed by Phil Walker-Harding in which players compete to build the most impressive bear park by filling their individual park boards with polyomino-shaped enclosures and animal buildings. Each player starts with a 4×4 land tile and expands by collecting and placing a sequence of differently shaped tiles that must completely cover specific terrain icons, triggering new land tiles and special building pieces when they do. The satisfying puzzle of fitting tiles snugly into your grid, combined with the race to claim the most valuable bear enclosures, makes Bärenpark an accessible yet strategically rich family game.

