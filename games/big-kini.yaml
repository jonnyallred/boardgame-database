description: |
  Big Kini is a 2007 tile-placement game published by Amigo Spiele in which players
  explore a variable island landscape, discovering islands and vying for influence and
  prestige. Influence is gained by capturing posts on islands, which grant special
  abilities, making positioning and timing key to success. An expansion adds support
  for five to six players along with additional action card options, extending the
  reach of the base game.

