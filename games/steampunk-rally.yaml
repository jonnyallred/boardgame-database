description: |
  Steampunk Rally is a competitive card-drafting and dice-placement race game for 2–8 players in which players take on the roles of famous historical inventors — Tesla, Curie, Edison, and others — building fantastical steampunk contraptions to race through the Swiss Alps. Each round players draft cards to attach new machine components to their contraption, then roll and allocate dice to power those components, generating steam, heat, electricity, and movement. The modular race track scrolls as the leader advances, and damaged components can fly off mid-race. The game blends engine-building satisfaction with chaotic racing energy for a uniquely fun experience.

