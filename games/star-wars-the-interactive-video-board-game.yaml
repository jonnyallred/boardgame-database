description: |
  Star Wars: The Interactive Video Board Game is a 1996 Parker Brothers board game incorporating a VHS tape featuring newly filmed footage of Darth Vader on the original Death Star set, performed by David Prowse with narration by James Earl Jones. Players join the Rebel Alliance in a mission to destroy the reconstructed Death Star before it reaches the moon of Endor. The game notably resulted in the canonization of four new Star Wars characters and features extensive rule components for its era.

