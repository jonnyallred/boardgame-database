description: |
  Stocks & Bonds is a 1964 3M Bookshelf Game stock market simulation for 2-8 players. Each round represents a trading year in which players buy and sell shares in 10 securities, trying to become the wealthiest stockholder. A unique calculator component helps determine whether the market experienced a "Happy Monday" or a "Black Friday." Situation cards and dice create market volatility, while players must decide when to buy, hold, or sell their portfolio. The game has been used in educational settings to teach financial literacy and investment strategy.

