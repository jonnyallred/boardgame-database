description: |
  Draw Out is a drawing party game published by Spear's Games. Players roll a die to determine a category color, then draw a clue from that category against a sand timer while other players race to guess the correct answer. The combination of timed pressure, random category selection, and free-form drawing makes it an accessible party game for families and groups. Limited documentation is available in English-language sources for this title.

