description: |
  Fevga is a traditional two-player Greek tables game (related to backgammon) and one of the three games played in succession as Tavli in Greek coffee shops and social gatherings. Unlike backgammon, Fevga is a running game of parallel movement: both players start in opposite corners but move in the same anticlockwise direction, and — crucially — there is no hitting. A single checker controls a point and blocks opponents from landing there, making the game about building primes (chains of blocked points) to trap the rival. Players bear off once all 15 checkers have reached the home table, with the first to bear all pieces off winning.

