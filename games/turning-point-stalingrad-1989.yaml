description: |
  Turning Point: Stalingrad (1989) is a block-level wargame designed by Don Greenwood and published by Avalon Hill, simulating the brutal street-by-street fighting of the 1942-43 Battle of Stalingrad. The third in a series using the innovative "Impulse Area" system, the game was deliberately streamlined to just ten pages of rules while maintaining rich tactical depth. It received a top score of 5/5 from Games International. One player commands Soviet defenders while the other leads German attackers in a race against time and attrition.

