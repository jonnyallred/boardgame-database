description: |
  Historical Mystery: Treasures of the Galleon is a maritime-themed deduction game in Hobby World International's Historical Mystery series, centered on mysteries surrounding a sunken or stolen treasure from a historical galleon. Players conduct their investigation by visiting locations and questioning witnesses over a fixed number of moves, then resolve the case by answering the game's questions. The series uses real historical events as the basis for each case, adding an educational dimension to the detective gameplay.

