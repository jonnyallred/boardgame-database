description: |
  Satori is a 2023 strategy game designed by Paco Yanez set in a world of Buddhist-inspired spiritual competition, in which 1-4 players advance on the path to enlightenment by building temples for devotees, recruiting wise monks, and contributing to the construction of a great pagoda. The game plays over five rounds using worker placement mechanics with different worker types, action chaining, and drafting elements that create a rich decision space despite its thematic focus on mindfulness and spiritual growth. Solo and multiplayer modes accommodate a wide range of playtimes from 25 to 100 minutes. The name Satori refers to the Zen Buddhist concept of sudden enlightenment.

