description: |
  Manila is a push-your-luck stock market game with a pirate twist, designed by Franz-Benno Delonge and published by Zoch in 2005. Players bid for the role of harbormaster each round, which allows placing the starting positions of four cargo ships trying to reach port — then dice determine how far each ship moves, whether it survives pirate attacks, and which players collect dividends from the shares they hold. The tension between harboring just enough influence to profit and losing resources to pirates and wrecks drives the game's exciting gambling atmosphere. Its blend of auctioning, press-your-luck, and commodity speculation creates a uniquely thrilling experience.

