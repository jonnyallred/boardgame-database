description: |
  Bao la Kiswahili is the supreme variant of the mancala family of games, traditionally played throughout East Africa — particularly among the Swahili peoples of Tanzania, Kenya, and Zanzibar. Played on a 4×8 board with 32 holes and 64 seeds, it is considered by scholars the most strategically complex of all mancala games, with research touching game theory, complexity theory, and psychology. Play proceeds in two phases — the namua (seed introduction) phase and the main phase — with special rules governing the nyumba (home pit). The game demands deep pattern recognition and long-term planning, and masters dedicate years to its study.

