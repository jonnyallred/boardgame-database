description: |
  Yokohama is a worker placement and route-building game designed by Hisashi Hayashi and published by OKAZU Brand and Tasty Minstrel Games in 2016, set in Meiji-era Japan during the opening of the city of Yokohama to foreign trade. Players build merchant networks by placing president and assistant tokens across a modular city grid, using adjacency of their assistants to the president's location to determine available actions. Managing imports, exports, foreign contacts, and church influence creates a richly textured economic puzzle. The cleverly constrained placement system ensures that positioning and movement feel uniquely satisfying compared to standard worker placement games.

