description: |
  Battlesuit is a 1983 Steve Jackson Games microgame set in the same science-fiction universe as the OGRE and GEV games, focusing on infantry combat in powered armor suits. Players command squads of soldiers in powered battlesuits fighting across a hex-grid battlefield, using small unit tactics rather than the massive cybertank focus of OGRE. The game uses the same design philosophy as Jackson's earlier microgames — small box, affordable, and playable in under two hours — while exploring a different scale of futuristic warfare. It is compatible and interchangeable with the broader OGRE universe.

