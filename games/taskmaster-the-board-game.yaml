description: |
  Taskmaster: The Board Game is the officially licensed board game adaptation
  of the popular British comedy panel TV show, published by Ginger Fox Games
  in 2018. Players take turns as the Taskmaster while others complete 200
  challenge cards — including video tasks from host Alex Horne — with the
  Taskmaster awarding points based on their subjective judgment. Each player also
  has a hidden secret task to accomplish throughout the game without detection,
  worth bonus points if undiscovered at the end. The game captures the show's
  spirit of absurdist creativity and judge-pleasing humor in a party format.

