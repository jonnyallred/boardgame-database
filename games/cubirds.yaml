description: |
  CuBirds is a hand-management and set-collection card game for 2–5 players in which players gather flocks of charmingly illustrated cubic birds to fly them home and score. On each turn, a player places cards of the same bird species from their hand onto one of four rows, flanking existing cards of the same type to flock them into their hand—or if not possible, taking all cards they just placed plus one from the row. Players complete sets of birds to keep as scored species, and the first to collect either 7 different species or 3 species with 3+ copies wins. Its simple rules, quick play, and adorable art make it a beloved filler.

