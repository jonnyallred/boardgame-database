description: |
  Say Anything is a party game where one player draws a question card and reads it aloud, and every other player writes down their best answer on a personal dry-erase board. The reader secretly picks their favorite response using the Select-O-Matic device, while everyone else bets their tokens on which answer they think was chosen. Points are scored for having your answer picked or for correctly guessing the reader's choice. The game thrives on revealing each other's opinions, preferences, and sense of humor in a lightweight, social format perfect for mixed groups.

