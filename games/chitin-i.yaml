description: |
  Chitin: I is the second title in Metagaming Concepts' pioneering MicroGame series, designed by Howard Thompson and published in 1977 with artwork by Jennell Jaquays. The game depicts two alien insect hive-cities competing to gather more food for their colony, with players commanding varied insect types across a hex map in a race to dominate the harvest. As a ziplock-packaged microgame, it was an affordable and fast-playing wargame that helped establish the MicroGame format. A second printing with revised cover art appeared in 1978.

