description: |
  Raiders and Traders: The Heroic Age of Greece is a historical board game designed and illustrated by Donald Dupont and published by Chaosium in 1979. Set in the ancient Aegean world, players command rival Greek city-states, engaging in maritime trade, exploration, and military raids across the islands and coastlines. Players balance economic expansion through trading with aggressive raiding against competitors, capturing the dual pillars of ancient Greek society that inspired the game's title.

