description: |
  King of the Mountain is a 1980 fantasy board game by Dimension Six for 2-10 players in which one player takes on the asymmetric role of the wizard Promonthorius, who uses magic and fell creatures to kill anyone attempting to climb the Mountain. The remaining players cooperate — or compete — to be the first to reach the summit despite the wizard's deadly defenses. Designer Mike Dinacola reportedly had no prior experience with wargames or fantasy games before creating it. The game's 1 vs. Many asymmetric structure predated the genre's popularity by decades.

