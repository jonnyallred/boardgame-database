description: |
  Napoleon: The Waterloo Campaign, 1815 is a pioneering block wargame designed by Tom Dalgliesh, originally published in 1974 by Gamma Two Games (now Columbia Games). Players command the French and Allied forces across the Waterloo campaign, with wooden blocks standing on their edges to hide unit strength from the opponent — creating the "fog of war" that became the hallmark of Columbia Games' block wargame series. Updated editions have been released through 2013, each refining the rules while preserving the elegant core system. The game is widely recognized as one of the most influential block wargames ever designed.

