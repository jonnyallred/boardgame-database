description: |
  Hannin Wa Odoru (The Criminal Dances) is a Japanese bluffing and deduction card game for 3-8 players in which one player secretly holds the "Criminal" card and tries to avoid detection while the others try to identify and catch them. Players each hold four cards and play them one by one; the Criminal wins by playing their card without being caught, while other players win by catching the Criminal through card play and deduction. The game's fast, chaotic energy and simple hand management make it a popular filler and party game across Japan and internationally.

