description: |
  Rise and Decline of the Third Reich is a landmark grand strategy wargame covering the entire European theater of World War II from 1939 to 1946, designed by John Prados and published by Avalon Hill in 1974. Up to six players command the major powers — Germany, Italy, United Kingdom, France, the Soviet Union, and the United States — managing the interplay of economics, politics, and multi-domain warfare across land, sea, air, and strategic bombing campaigns. The game won the Charles S. Roberts Award for Best Professional Game of 1974 and influenced an entire generation of grand strategy wargames, eventually spawning the Advanced Third Reich variant. Its breadth of simulation and historical scope remain impressive even by modern standards.

