description: |
  Conspiracy is a 1973 strategy-bluffing game designed by British game designer Eric Solomon and published by Milton Bradley, also released as "The Sigma File," "Agent," and "Casablanca." Players move agents secretly around a board, attempting to maneuver a key piece to their own side while blocking opponents. The hidden movement and bluffing core creates a tense cat-and-mouse experience with a spy theme. Solomon's elegant design stripped the espionage genre to its essentials and earned the game a long publishing history under multiple titles across different markets.

