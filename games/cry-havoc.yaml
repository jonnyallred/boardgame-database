description: |
  Cry Havoc is a card-driven asymmetric area control wargame set in a brutal science-fiction world, published by Portal Games in 2016. Four unique factions — Humans, Trogs, Machines, and Pilgrims — each with completely different abilities and unit types vie for control of a richly detailed alien planet. Players use faction-specific card decks to trigger actions and resolve tense battle sequences in a distinctive card-based combat system. Featuring 54 custom miniatures and a dramatic visual presentation, Cry Havoc delivers epic-feeling sci-fi conflict in a surprisingly efficient 90-minute play window.

