description: |
  Mysterium Kids: Captain Echo's Treasure is a cooperative deduction game for young players published by Libellud/Asmodee in 2021. Each round one child plays the ghost of Captain Echo, communicating clues by tapping rhythms on a tambourine to help teammates identify the correct Noise card that points toward hidden treasure. The game builds communication and listening skills through imaginative play, with a reversible game board offering two difficulty levels. It is a standalone children's spin-off of Mysterium, stripping away the visual card-matching of the original in favor of sound-based clue-giving suited to ages 6 and up.

