description: |
  Catan Scenario: Crop Trust is a 2018 expansion scenario for Settlers of Catan, developed in collaboration with the Global Crop Diversity Trust. Players balance their individual drive to harvest crops for personal points against a collective obligation to store and preserve seeds in the Seed Vault, introducing a semi-cooperative mechanic to the standard competitive Catan framework. The scenario raises awareness of real-world crop diversity and food security while adding educational depth to a familiar game. Requires the base Catan game to play.

