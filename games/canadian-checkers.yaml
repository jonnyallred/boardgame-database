description: |
  Canadian Checkers (also known as Canadian Draughts) is a traditional variant of draughts played on a 12x12 board with 30 pieces per player, making it one of the largest and most complex variants of the game. As in standard checkers, pieces advance diagonally and capture by jumping over opponents, with kings able to move any number of squares. The larger board and increased piece count create a significantly deeper strategic game than the standard 8x8 variant, requiring precise long-term planning. It is a traditional game with no specific designer or publisher.

