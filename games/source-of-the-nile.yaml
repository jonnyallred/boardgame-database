description: |
  Source of the Nile is an exploration game designed by Ross Maker and David Wesely, published by Discovery Games
  in 1978 and later by Avalon Hill. Set in 19th-century Africa from Khartoum to Capetown, players are Victorian
  explorers tracing expeditions across a hexagonal map that begins blank — terrain, tribes, and events are
  discovered by drawing cards as each new hex is entered, and players literally draw the landscape with crayons.
  The goal is to make significant geographical discoveries and return to Europe to publish them, with victory
  going to the most celebrated explorer. It won two Charles S. Roberts Awards.

