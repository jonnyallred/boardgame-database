description: |
  Underwater Cities is a heavy Euro strategy game designed by Vladimír Suchý (Last Will, Pulsar 2849) and published by Delicious Games in 2018. Players build and develop networks of underwater metropolises — constructing kelp farms, desalination plants, laboratories, and tunnels — in a future where humanity has colonized the ocean floor. The heart of the design is a worker placement system with color-coded action slots: playing a card matching the slot's color triggers a powerful bonus action, incentivizing careful hand management. The game accommodates 1-4 players including a solitaire mode, and won numerous awards for its elegant interaction of chance and deep strategic planning.

