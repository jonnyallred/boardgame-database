# Description
description: |
  A tile-placement and set-collection game in which players build a 10-day itinerary
  across Europe. Each turn players draw and swap country tiles, trying to form a
  continuous journey where adjacent countries share borders or are connected by
  colored plane or ship tiles. The game requires geographic knowledge and hand
  management to complete valid routes before opponents. One of several games in
  the "10 Days in..." series by Moon and Weissblum, covering Africa, Asia, the
  Americas, and the USA.

