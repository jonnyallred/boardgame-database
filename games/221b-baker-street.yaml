# Description
description: |
  Players take on the roles of detectives in Victorian London competing to solve
  Sherlock Holmes mystery cases. Each case provides clues scattered across locations
  on the London board map; players move between locations, gather information, and
  attempt to answer questions to solve the mystery before their opponents. Designed
  by Jay Moriarty and first sold by the John N. Hansen Co. in 1977, the game became
  a classic deduction game with multiple editions published over the decades.

