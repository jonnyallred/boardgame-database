description: |
  Luna is a 1-5 player worker placement and area control game designed by Stefan Feld, first published in 2010 by Z-Man Games. Players move novice workers across a series of floating island tiles surrounding a central sanctum, competing to impress the Moon Priestess Luna by performing rituals, constructing buildings, and accumulating influence. The modular board — with islands placed in a different arrangement each game — creates varied strategic landscapes and ensures no two sessions play identically. Area control competition for the sanctum itself is particularly intense, as end-game scoring heavily rewards the player who has established the greatest presence there. Luna is regarded as one of Feld's most tactically rich designs.

