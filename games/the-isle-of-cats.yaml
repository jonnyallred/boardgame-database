description: |
  The Isle of Cats is a card-drafting and polyomino tile-placement game by Frank West in which
  players are rescuers sailing to the Isle of Cats to save its feline inhabitants from the villain
  Vesh. Over five rounds, players draft cards and spend fish to catch cat tiles, then arrange them
  like puzzle pieces on their boat. Keeping families (colors) of cats together scores points, while
  uncovered rat spaces on the boat subtract points. The balance of planning your boat layout versus
  reacting to available cats creates satisfying spatial puzzles each game. The game also includes
  a family mode for younger players and a solo mode.

