description: |
  Rolling Stock is a deep economic card game inspired by the 18XX railroad stock market tradition, designed by Bjorn Rabenstein, in which players are investors buying private companies at auction and developing them into public corporations. Players bid for private companies, then decide whether to take them public via an IPO or sell them as subsidiaries to existing corporations; the majority shareholder of each corporation controls its actions including issuing shares, paying dividends, and acquiring subsidiaries. The layered financial mechanisms — market prices, dividends, share dilution, and foreign investor dynamics — create an intense economic simulation that rewards careful long-term strategic thinking. It occupies a rare niche as an 18XX-style experience without requiring a railroad map.

