description: |
  Operation Greif is a 1970 self-published variant for Avalon Hill's 1965 Battle of the Bulge wargame, designed by Don Lowry to recreate the historical Operation Greif — the World War II deception mission led by SS-Obersturmbannführer Otto Skorzeny in December 1944, where German soldiers disguised as American troops caused confusion behind Allied lines during the Ardennes Offensive. The variant adds rules for the 150th Panzer Brigade's infiltration tactics, modified zone of control rules, road movement, tactical air support, and paradrops, requiring ownership of the base Battle of the Bulge game for play. It represents the deep modding culture of early wargaming in which dedicated hobbyists extended commercial games with historically researched variant rules.

