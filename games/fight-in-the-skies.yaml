description: |
  Fight in the Skies (later renamed Dawn Patrol by TSR) is a WWI aerial combat board game first self-published by Mike Carr in 1966 and one of the longest-running games in hobby gaming history. Each player controls a WWI aircraft, using a grid and cardboard counters to track position and altitude (recorded on a log), then fires at opponents in sight at turn's end using dice to resolve hits and damage. The game supports 2-12 players and is famous for being the only game to appear on the event schedule of every Gen Con since Gen Con I. TSR published the 7th edition under the name Dawn Patrol in 1982.

