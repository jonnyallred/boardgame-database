description: |
  Ora et Labora (Latin for "Pray and Work") is Uwe Rosenberg's richly complex monastery-building game in which each player heads a Medieval religious community that acquires land and constructs an intricate network of buildings and enterprises. The game's central innovation is a rondel-based resource system that governs how many of each good is available each round, rewarding players who time their building chains efficiently. Three workers are placed into buildings to trigger actions, but workers remain in place and rivals may use your buildings for a fee — creating a passive income dynamic similar to Rosenberg's Le Havre. Considered one of his finest designs, it rewards repeated play as players master the elegant interplay of land clearing, building placement, and prestigious item crafting.

