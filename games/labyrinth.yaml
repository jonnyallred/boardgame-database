description: |
  Labyrinth is a 1986 Ravensburger classic designed by German psychologist Max Kobbert in which 2-4 players navigate a shifting maze to collect treasure tokens. The game board consists of both fixed and sliding tile sections; on each turn, a player inserts a spare tile from the edge to push the row or column, reshaping the maze before moving their token. Players race to reach all their treasures in the order dictated by their cards, using the ever-changing pathways to their advantage while blocking opponents. Published as "Das verrückte Labyrinth" in Germany, it has spawned over 60 versions in nearly 40 years and remains Ravensburger's signature family game title.

