description: |
  D.A.K. is a board wargame published by Simulations Canada in 1982 in a limited print run of 1000 copies, simulating the North African Campaign (Deutsches Afrika Korps). Designed by Stephen Newberg as an exercise in supply management, the game centers on "Ops Points" — the operational currency needed to move, fight, or even maintain position — making logistics as decisive as tactical maneuvering. The design represents a more analytically rigorous approach to the desert war than contemporary commercial wargames, aimed at serious grognards interested in supply-chain simulation in a historical context.

