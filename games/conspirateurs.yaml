description: |
  Conspirateurs is a traditional strategy board game believed to have originated in France after the French Revolution, around 1789 or shortly thereafter. Played on a 17×17 grid with a specially marked central "secret meeting place" and 39 sanctuary points around the perimeter, the game has two phases: a drop phase where all pieces are placed into the central meeting area, and a move phase where players race to move their pieces to their sanctuary points on the board's edges. Pieces can jump over friendly or enemy pieces to move faster without capturing anything — the only goal is to safely evacuate all conspirators to refuge first. It resembles Halma and Chinese Checkers in structure but has a distinctive French revolutionary atmosphere.

