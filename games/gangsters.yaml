description: |
  Gangsters is an Avalon Hill board game for 2-4 players set in Prohibition-era Chicago, designed by Don Greenwood and published in 1992. Players lead rival criminal organizations, accumulating money through extortion and crime while purchasing properties and bribing law enforcement to expand their influence. Strategic territory control is balanced against the ever-present threat of rival gangs and police crackdowns. The game captures the atmosphere of 1920s organized crime with tight competitive play and meaningful economic decisions.

