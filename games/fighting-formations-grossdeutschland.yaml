description: |
  Fighting Formations: Grossdeutschland Motorized Infantry Division is a WWII tactical wargame designed by Chad Jensen and published by GMT Games in 2011, covering combined-arms combat at the platoon and squad level on the Eastern Front. Each hex represents 75 meters and each turn about 5 minutes of real time, with units representing squads, gun crews, individual vehicles, and platoons. The game was widely acclaimed for its innovative approach to squad-level tactics and spawned a series of expansions covering battles at Kharkov and Kursk. It is considered one of the strongest entries in the modern wargame revival of squad-level WWII gaming.

