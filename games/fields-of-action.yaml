description: |
  Fields of Action is an abstract strategy game designed by Sid Sackson, originally appearing in his influential 1969 book A Gamut of Games and later published in Games Magazine (1989). The game is inspired by Lines of Action and uses similar movement rules: a piece can move in one direction a number of squares equal to the number of pieces adjacent to it, landing only in empty squares. The objective is to capture five opposing pieces in numerical sequence, requiring careful positional play and spatial awareness. It can be played with a standard checkerboard and chess pieces, making it immediately accessible.

