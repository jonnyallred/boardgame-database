description: |
  Burgle Bros. is a cooperative heist game for 1–4 players designed and self-published by Tim Fowers, in which players must break into a multi-floor building, crack the safes on each floor, and escape to the roof without being caught by roaming guards. The building is represented by a randomly stacked modular board of face-down room tiles, creating a different puzzle each game as players reveal spaces, manage action points, and coordinate their individual abilities. The guard AI, hidden room contents, and escalating alarm level create palpable tension that makes even experienced players sweat through every turn.

