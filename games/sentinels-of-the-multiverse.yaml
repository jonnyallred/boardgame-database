description: |
  Sentinels of the Multiverse is a fully cooperative superhero card game in which 1–5 players each control a unique hero battling a villain across a variety of dangerous environments. Each hero, villain, and environment has its own custom deck that auto-plays according to set rules, creating a dynamic three-way interaction. The original comic book aesthetic and deep expansion library helped it become a beloved staple of the cooperative gaming community, and the game was later updated as the Definitive Edition with streamlined rules and new art.

