description: |
  DDR-Reise is a travel racing board game set in the German Democratic Republic (East Germany), in which players plan optimized routes to visit specific cities drawn from destination cards before returning to their home city. A product of East German game publishing, it served a similar educational and entertainment role to the West German Deutschlandreise, introducing players to the geography of the GDR through competitive route-planning gameplay. As a historically specific artifact of Cold War-era German culture, it is today of interest to collectors of socialist-era board games.

