description: |
  Tajuto is a 2019 spiritual tile-placement game by Reiner Knizia set in 6th-century Japan, where Prince Shotoku has tasked Buddhist monks with erecting eight grand pagodas. Players draw pagoda tiles from a bag, build and extend pagoda structures on the board, make offerings to gain meditation points, and acquire action tiles to advance their goals. Activating multiple actions in a turn costs precious meditation points, creating a tight resource tension throughout. The game ends when the fourth pagoda is completed, and the player who has most effectively spread their religion and accrued spirituality points wins.

