description: |
  Pasang is a traditional two-player abstract strategy game originating from Brunei Darussalam, played on an 11x11 grid with 60 black and 60 white tokens. The game proceeds in three phases: players first capture a column of tokens to create a "passage," then choose a mobile "ka" piece that moves through the passage to capture tokens in patterns. Over 30 different predefined patterns determine valid captures, with black tokens worth 1 point and white tokens worth 2 points. The player who accumulates the most points across the three-phase game wins. Pasang represents an important piece of Southeast Asian cultural heritage, recognized as part of Brunei's traditional games.

