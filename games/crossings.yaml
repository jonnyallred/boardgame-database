description: |
  Crossings is a two-player abstract strategy game invented by Robert Abbott and published in Sid Sackson's classic anthology A Gamut of Games. Players move their pieces across the board trying to reach the opposite side, while blocking the opponent from doing the same. The game is considered a precursor to Epaminondas, which uses a larger board and more developed movement rules. As a pencil-and-paper publishable abstract, it is notable for its elegant simplicity and its influence on later abstract design.

