description: |
  Legend of Zagor is a cooperative dungeon crawling board game published by MB Games in 1993, based on Ian Livingstone's Fighting Fantasy gamebook series. Players work together as adventurers exploring a modular dungeon to find and defeat the evil warlock Zagor, battling monsters and collecting treasure along the way. The game uses a mix of cards and dice for combat resolution and features the atmospheric artwork and monster roster familiar from the Fighting Fantasy books. Aimed at younger players entering the dungeon-crawl genre, it offers accessible cooperative adventure with nostalgic appeal for Fighting Fantasy fans.

