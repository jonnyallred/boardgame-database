description: |
  Warriors of the Green Planet Trilogy is a collection of three science fiction miniature wargames published by Fact and Fantasy Games in 1976, with the third game (Warriors of the Green Planet) providing rules for futuristic ground combat. The series represents an early foray into dedicated science fiction miniature gaming from the mid-1970s, a period that preceded mainstream sci-fi wargaming. The trilogy is an obscure but historically significant entry in the early science fiction gaming catalog.

