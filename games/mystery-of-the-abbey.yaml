description: |
  Mystery of the Abbey is a deduction game by Bruno Faidutti and Serge Laget, republished by Days of Wonder in 2003 (originally 1998 as Meurtre à l'Abbaye). Players move through the rooms of a medieval monastery, questioning fellow monk-players about cards in their hands to eliminate suspects from a murder investigation, evoking the spirit of Umberto Eco's The Name of the Rose. Unlike traditional Cluedo, questioning is open and interactive — what you reveal is as important as what you learn. Card events shake up play periodically, keeping the game lively and unpredictable across its engaging 75-minute runtime.

