description: |
  Chinesenspiel (German for "Chinese game") is a 19th-century German race game of the Pachisi family, simplified so that each player controls only a single piece. The cross-and-circle board is deformed into a squared perimeter connected at the corners by crossing diagonals, and players race their colored Chinese figure pieces around it. Related to Korean Yut Nori in layout, the game belongs to the broad family of Pachisi descendants that includes Ludo, Parcheesi, and Sorry. It represents an early European adaptation of South Asian racing game traditions.

