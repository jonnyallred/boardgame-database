description: |
  Quartermaster General: South Front is a fast-paced 2-player wargame depicting WWII's Mediterranean theater from Summer 1940 to Spring 1944. Each player commands a unique deck of cards reflecting the equipment, manpower, and strategies of their side — the Allies or Axis — as they contest land, air, and sea across Southern Europe, North Africa, and the Mediterranean. Players compete for geographic objectives across 16 seasonal rounds, with Victory Points tallied at four key scoring phases. As the second title in the Quartermaster General Front series, it delivers accessible card-driven wargaming without sacrificing historical depth.
