description: |
  Go to the Head of the Class is a classic educational trivia board game first published by Milton Bradley in the 1930s, with numerous editions updated through the decades. Players answer questions across multiple categories—Language, Science, Art and Music, Mathematics, History, Literature, and Geography—at junior, intermediate, or senior difficulty levels, moving forward six spaces for correct answers and retreating two for wrong ones. The goal is to advance through rows of student desks to occupy the seat at the head of the class. A beloved family staple that has appeared in over twenty editions, it has sold millions of copies worldwide.

