# Description
description: |
  1856: Railroading in Upper Canada from 1856 is an 18XX railway game set in
  Upper Canada (now Ontario), covering the railway development from the Toronto
  to Detroit corridor through southern Ontario and the upper reaches of the
  St. Lawrence River. Designed by Bill Dixon and published by Mayfair Games,
  it is considered one of the more accessible entries in the 18XX family.

  Players alternate between stock rounds (buying and selling shares in railway
  companies) and operating rounds (building track and running trains). The game
  features the CGR (Canadian Government Railway) mechanic, where financially
  troubled companies can be nationalized, providing a distinctive twist on the
  standard 18XX formula. For 3-6 players, typical play runs 3-4 hours.

