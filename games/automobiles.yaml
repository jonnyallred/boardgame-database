description: |
  Automobiles is a bag-building racing game for 2-6 players from AEG, the third title in the Destination Fun series alongside Trains and Planes. Each player builds a personal pool of colored cubes representing different abilities — moving their car, improving handling, optimizing their pit crew, and changing gears — and draws a hand of cubes each turn to take actions. Unlike traditional deck builders, the physical randomness of pulling cubes from a bag adds a tactile push-your-luck element as players try to draw the right combination for each situation. The racing track modular board changes each game, and players must balance investing in their cube pool against actually advancing their car around the circuit.

