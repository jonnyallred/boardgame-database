description: |
  Suomen vapaussota is a 1918 Finnish board wargame published by Minerva covering the Finnish War of Independence (Finnish Civil War) of the same year. Published in the very year of the conflict it depicts, it is a historically significant early example of a contemporaneous war game, covering the White and Red forces that fought in Finland's brief but bloody civil war following the country's declaration of independence from Russia. Information about the game's mechanics and designer is extremely limited due to its age and domestic Finnish publication, but it stands as a notable artifact of early twentieth-century board game history.

