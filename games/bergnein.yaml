description: |
  Bergnein is a card game created by Alexander Kandiloros and published in 2017 by
  Ninja Print (Beware of Ninja AB, Gothenburg), satirizing the notoriously selective
  door policy of Berlin's legendary Berghain nightclub. Players act as the doorman,
  deciding which guests in line gain entry to the club based on appearance and attitude
  cards. The game was originally titled "Berghain ze Game" but was renamed following
  legal threats from the club, and was subsequently withdrawn from sale after legal action.
  It remains a cult curiosity reflecting the myth of the world's most exclusive door policy.

