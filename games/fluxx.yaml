description: |
  Fluxx is the card game of ever-changing rules, designed by Andrew Looney and published by Looney Labs since 1997. The game begins simply — draw one card, play one card — but players quickly alter the rules and goals by playing New Rule cards and Goal cards from their hands, so the win condition and card-draw amounts shift constantly throughout the session. The first player to satisfy whatever the current Goal says (matching Keeper cards in play) wins, but that goal can change at any time. Now in its 5th edition and spawned dozens of themed variants (Zombie Fluxx, Star Fluxx, etc.), it is one of the most commercially successful independent card games ever made.

