description: |
  Legions of the Petal Throne is a miniatures wargame published by TSR in 1977, designed by M.A.R. Barker set in his invented world of Tékumel — the same richly detailed alien fantasy world that formed the basis of the roleplaying game Empire of the Petal Throne. Players command armies of Tékumel's various human empires and alien non-human races in large-scale fantasy battles, using miniatures to represent detailed troop types including infantry, cavalry, and magical creatures specific to the world's unique non-Western mythology. One of the earliest fantasy miniatures games tied to a roleplaying game setting, it is prized by collectors and Tékumel enthusiasts.

