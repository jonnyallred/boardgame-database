description: |
  Dark Moon is a streamlined hidden traitor game set in a sci-fi mining facility on Ganymede, published by Stronghold Games in 2015. Originally designed as a free print-and-play fan variant of Battlestar Galactica, it evolved into a polished standalone game that retains the tense traitor mechanics while cutting play time dramatically. Most players are loyal crewmembers working together to keep the station operational, but one or more secret infected players are sabotaging from within. The game's quarantine system and dice-based task resolution create paranoid, accusation-filled sessions that play out in under an hour.

