description: |
  Here I Stand is a card-driven multiplayer wargame published by GMT Games in 2006, simulating the struggle for religious and political dominance in early 16th century Europe during the Reformation (1517–1555). Up to six players command the Habsburg Empire, Ottoman Empire, England, France, the Papacy, and the Protestants — each with asymmetric objectives and mechanics reflecting their historical role, from military conquest to theological debate. The card system drives both operational actions and historical events across nine turns representing the tumultuous decades from Luther's Ninety-Five Theses to the Peace of Augsburg. Designed by Ed Beach, it won the 2006 Charles S. Roberts Award and has been consistently ranked among the finest wargames ever made.

