description: |
  Proteus is a meta-game in which the rules themselves can change during play, as nine wooden tiles bearing rule symbols determine how players may move their pieces, trade tiles, and achieve victory. Players activate rules by moving their pieces onto the corresponding tile spaces, creating a dynamic shifting ruleset that evolves each game. Published by Kadon Enterprises, Proteus is notable for its reflexive design — the game literally rewrites its own rules as play progresses — making each session a unique strategic puzzle.

