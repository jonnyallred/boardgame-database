description: |
  Truc y flou is a traditional card game from the Aragon region of Spain, now primarily played in the French Pyrenees valleys of Aure, Louron, and Oueil. Part of the Put family of trick-taking games, it is related to Aluette, Brisca, and Mus. A defining feature is the rich communication and bluffing culture between partners, where signaling and deception are integral to winning. The game is a regional folk tradition with no known commercial publisher or fixed designer.

