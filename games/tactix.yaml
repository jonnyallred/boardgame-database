description: |
  TacTix is a two-player abstract strategy game invented by Danish polymath
  Piet Hein — also known for creating the game Hex — in the late 1940s. It is
  a two-dimensional variation of Nim, played on a 4x4 (or larger) grid of
  tokens; players take turns removing one or more tokens from a single row or
  column, and the player forced to take the last token loses. TacTix was
  popularized in recreational mathematics by Martin Gardner's February 1958
  Scientific American column, making it a beloved puzzle challenge among
  mathematicians and abstract game enthusiasts.

