description: |
  Samsara is a deck-building and pawn-movement game published by Oka Luda, in which players guide their characters around an octagonal rondel game board on a spiritual journey toward Nirvana. The game board is structured as a cycle — Samsara, the cycle of rebirth — and players land on different sections to acquire cards and advance toward the game's spiritual goal. The design won recognition as a prototype twice in France in 2016, earning the Ludix d'Or and Prix du Fou du Jeu awards before its Kickstarter commercial release. Its meditative theme, cycling board structure, and deck-building mechanics combine to create a thematically coherent experience inspired by Buddhist cosmology.

