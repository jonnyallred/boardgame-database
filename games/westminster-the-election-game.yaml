description: |
  Westminster: The Election Game is a 1983 board game designed by Charles Lewis and published by Gibsons Games to coincide with the UK general election of that year. Players control political parties competing across 16 representative constituencies in an initial General Election, with the winner forming the government. Further by-elections across 16 more constituencies follow, potentially changing which party governs. The ultimate winner is the first player to form a Government and pass three "readings" of a legislative Bill into law, blending electoral strategy with parliamentary procedure. The game's rush to publication led to some criticized rule imbalances.

