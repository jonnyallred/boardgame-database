description: |
  Die Ritter von der Haselnuss (The Knights of the Hazelnut) is a children's board game designed by Klaus Teuber and first published in 1996 by Asmodée Editions, with a German edition by Goldsieber Spiele following in 1997. Players take on the roles of squirrels racing to collect hazelnuts from a forest, drawing cards from bushes they land on — some reveal nuts to keep, others reveal predators (a lynx, marten, or fox) that players must try to remember for future turns. The game won the Deutscher Kinderspiele Preis (German Children's Game Prize) in 1997, and shows Teuber's talent for designing accessible, award-winning family experiences.

