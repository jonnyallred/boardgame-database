description: |
  Mystery Date is a classic board game designed by Marvin Glass and Henry Stan, originally published by Milton Bradley in 1965 and periodically reprinted since. Players collect sets of four cards that match one of five hidden "dates" behind a plastic door in the center of the board; when ready, they open the door to reveal their mystery date — or the infamous "dud." The game became a cultural touchstone of 1960s toy design and is considered one of the most sought-after vintage games from the era, reflecting the pop-romance themes aimed at girls of the period. Later editions updated the artwork and character designs for contemporary audiences.

