description: |
  Monopoly: The Simpsons is a licensed edition of Monopoly based on the long-running Fox animated television series, replacing properties with Springfield locations and characters. Players buy famous spots from the show like Moe's Tavern, the Kwik-E-Mart, and Springfield Elementary, using tokens modeled on iconic Simpsons characters. All standard Monopoly rules apply, with Chance and Community Chest cards replaced with Springfield-themed event cards. The game is a popular collectible for fans of the series and the classic board game franchise.

