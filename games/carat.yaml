description: |
  Carat is a light card game designed by Klaus-Jürgen Wrede involving gem collection and trading. Players compete to collect sets of precious stones — diamonds, rubies, emeralds — through clever card play and trading mechanics. The game offers a quick, accessible experience with enough tactical depth to reward attentive play across its short play time.

