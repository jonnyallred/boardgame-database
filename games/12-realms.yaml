# Description
description: |
  12 Realms is a cooperative fantasy board game for 1-6 players in which heroes
  inspired by fairy tales must band together to defend twelve magical realms from
  the Lords of Darkness. Players choose from iconic characters drawn from fairy
  tales and folklore, then travel between realms to gather ancient artifacts and
  battle unique monsters before the darkness overwhelms them.

  Each realm has its own unique theme, monsters, and challenges. Players cooperate
  by sharing items, combining abilities, and coordinating attacks. As the threat
  escalates, players must balance exploration with defense, making the game
  a tense cooperative experience with escalating difficulty.

