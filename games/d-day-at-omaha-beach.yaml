description: |
  D-Day at Omaha Beach is an acclaimed solitaire wargame designed by John Butterfield and published by Decision Games, simulating the brutal American landings at Omaha Beach on June 6, 1944. The player controls the US 1st and 29th Infantry Divisions as they fight to establish a beachhead against unknown German defensive positions, using an innovative diceless combat system that emphasizes intelligent use of weapons and tactical decision-making. The game offers three scenarios ranging from a 2-3 hour introduction to a full-day 7-hour recreation of the entire battle. It won the 2009 Charles S. Roberts Award for Best World War 2 Era Board Wargame and is widely regarded as one of the finest solitaire wargames ever designed.

