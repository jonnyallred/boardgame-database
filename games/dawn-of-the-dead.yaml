description: |
  Dawn of the Dead is a science fiction board wargame published by Simulations Publications, Inc. (SPI) in 1978, based on George Romero's landmark zombie film released the same year. Set in a shopping mall on the day after the zombie apocalypse, the game pits four survivors — two SWAT officers and two civilians — against fifty zombie counters on an 11x17" mall map. One player controls the humans trying to arm civilians, seal the mall, and eliminate all zombies, while the other (or an automated system in solitaire mode) controls the zombie horde. A rare collector's item today, it stands as an early example of licensed horror board gaming.

