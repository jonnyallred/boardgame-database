description: |
  The High Crusade is a 1983 TSR board game designed by David "Zeb" Cook and Edward G. Sollers,
  based on Poul Anderson's beloved 1960 science fiction novel in which medieval English knights
  accidentally board an alien spacecraft and embark on an interstellar crusade. The game captures
  the novel's delightfully anachronistic premise of combining medieval warfare with science fiction
  technology, with players alternating turns to make moves and engage in combat using both period
  and futuristic elements. It reflects TSR's willingness during this era to adapt beloved literary
  SF properties into tabletop wargames.

