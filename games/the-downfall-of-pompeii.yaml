description: |
  The Downfall of Pompeii is a two-phase game for 2–4 players designed by Klaus-Jürgen Wrede (of Carcassonne fame) set during the catastrophic eruption of Mount Vesuvius. In the first phase, players peacefully place citizen cards into Pompeii's buildings, populating the city. In the second phase, the volcano erupts: lava tiles spill across the board and players frantically try to evacuate as many of their citizens as possible through the city gates. Opponents can place lava to block escape routes, creating tense confrontations. The game's memorable arc from tranquil city-building to panicked evacuation makes it a unique and repeatedly enjoyable design.

