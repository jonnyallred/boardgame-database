description: |
  Tongiaki: Journey into the Unknown is set in 300 AD as Polynesian peoples launch daring voyages on catamarans across the Pacific in search of new islands to settle. Players place boats on a modular tile board with unique hexagonal water tiles, expanding the map and competing to establish a presence on as many islands as possible by game end. The bright, colorful components and cooperative aspects of ocean exploration sit alongside competitive area control, creating a game of shared risk on the open sea.

