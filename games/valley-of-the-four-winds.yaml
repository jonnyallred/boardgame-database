description: |
  Valley of the Four Winds is a 1980 fantasy board game designed by Lewis Pulsipher and published by Games Workshop. The game is based on a serialised fantasy story that originally appeared in the British gaming magazine White Dwarf, bringing its rich setting to the tabletop. Players compete for control across a fantasy landscape, with the adventure-style gameplay typical of early Games Workshop productions. The game is considered a vintage classic of British game design and was one of Games Workshop's early tabletop titles before the company shifted its focus to miniatures wargaming.

