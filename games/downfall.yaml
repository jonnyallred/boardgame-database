description: |
  Downfall is a two-player abstract strategy game first published by Milton Bradley in 1970. The game features a vertical board with five rotating slotted dials on each side; each player starts with ten numbered discs at the top and must maneuver them to the bottom of the board in ascending numerical order. On each turn a player rotates one of the shared dials — but the exact position of the disc channels is only partially visible, so neither player knows precisely whether a rotation helps or hinders their opponent. The first player to drop all their discs through to the collection tray in correct sequence wins. The game was later re-released by Hasbro as New Downfall.

