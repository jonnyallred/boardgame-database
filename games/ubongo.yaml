description: |
  Ubongo is a real-time competitive puzzle game designed by Grzegorz Rejchtman. Originally published as "Pyramidens Portar" in Sweden in 2003 (winning the Swedish Årets Spel Prize), it was republished in Germany in 2005 as Ubongo by KOSMOS. Players simultaneously race against a sand timer to place polyomino tiles onto their puzzle board to fill a designated area completely. The first to finish shouts "Ubongo!" and earns gems — the fastest players also claim bonus gems from the round track. After nine rounds, the player with the most valuable gem collection wins, blending spatial puzzle-solving with the excitement of real-time competition.

