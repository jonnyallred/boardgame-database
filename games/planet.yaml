description: |
  Planet is a visually stunning drafting and tile-placement game in which 2–4 players build three-dimensional planets using magnetic landscape tiles representing oceans, deserts, mountains, and frozen tundra. Over 12 rounds, players take turns selecting and placing continent tiles onto their 12-sided planet cores, attempting to create the most attractive habitats for different animal species. At the end of each round, players win animal cards by having the largest single biome that matches each animal's habitat preference. A secret Natural Habitat objective for each player adds a layer of hidden scoring. Winner of multiple awards and beloved for its extraordinary tactile components and accessible design.

