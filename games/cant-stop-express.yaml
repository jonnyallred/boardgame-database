description: |
  Can't Stop Express is a simplified, faster-playing version of Sid Sackson's classic push-your-luck dice game Can't Stop, adapted into a more compact format. Players roll four dice and pair them to score on numbered columns of a simpler scoring track, pressing their luck for more points before risking a bust. The game preserves the essential tension of the original in a shorter, lighter package suitable for quick sessions or larger groups.

