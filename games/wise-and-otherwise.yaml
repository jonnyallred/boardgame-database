description: |
  Wise and Otherwise is a bluffing party game in which players complete the endings of obscure proverbs from cultures around the world. The reader draws a card and reads the beginning of an authentic proverb aloud; all other players write convincing fake endings while the reader copies down the real one. The submitted endings are shuffled and read aloud, and players vote on which they believe is genuine — earning points for convincing bluffs and for identifying the true proverb. It was named Games Magazine's Party Game of the Year in 1998.

