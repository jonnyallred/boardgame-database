description: |
  Missä lahjat herra Hakkarainen? (Where are the gifts, Mr. Hakkarainen?) is a Finnish children's board game based on the beloved character Herra Hakkarainen from author-illustrator Mauri Kunnas's popular children's books. Mr. Hakkarainen has mixed up birthday presents in his vans, and each player races to find their own gifts as quickly as possible. Movement is determined by a spinner wheel attached to the gameboard that dictates how many steps a player may move and triggers special events. The game serves as a gentle introduction to board game mechanics for very young Finnish children.

