description: |
  Space Empires is a 1981 microgame published by Mayfair Games in which 2-4 players each control alien civilizations competing to dominate a star cluster. Each player draws two races at random, places their fleets on home worlds, and expands across space by moving ships through a hex grid where proximity triggers mandatory combat. Neutral alien races occupy the remaining home worlds and act as obstacles. The player controlling the most star systems at game's end wins, earning the game comparisons to "a space version of Risk" for its accessible conquest mechanics.

