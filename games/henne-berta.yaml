description: |
  Henne Berta is a HABA children's board game in which players help a wooden hen gather grain and in return collect eggs into little baskets. The game features a wooden board and large wooden pieces typical of HABA's preschool line, with the first player to collect three eggs winning the game. The large wooden components, bright colors, and simple rules make it well-suited for young children taking their first steps with structured board gaming.

