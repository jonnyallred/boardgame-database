description: |
  Blank Slate is a word association party game published by USAopoly (The Op Games)
  in 2020 in which players secretly write a word to complete an incomplete phrase shown
  on a cue card. Scoring rewards matching exactly one other player — worth 3 points —
  while three or more matches score only 1 point each and no matches score nothing.
  The game balances trying to think like a crowd versus standing out, creating a
  delightful tension between conformity and uniqueness. Includes 250 double-sided
  cue cards for 500 total prompts.

