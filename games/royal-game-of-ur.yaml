description: |
  The Royal Game of Ur is one of the oldest known board games in the world, dating to ancient Mesopotamia circa 2600-2400 BCE and first excavated from the Royal Cemetery at Ur by archaeologist Sir Leonard Woolley in the 1920s. Two players race their pieces along a distinctive 20-square board, using tetrahedral dice-like throwing sticks to determine movement in a manner similar to modern backgammon. Rules were partially reconstructed by British Museum curator Irving Finkel from a 2nd-century BC cuneiform clay tablet, and the game spread across the ancient Middle East, Levant, Egypt, and as far as Crete and Sri Lanka. Its combination of luck and strategic race positioning gave the game spiritual significance, with outcomes believed to foretell a player's future.

