description: |
  Z-G (Zero Gravity) was the debut product from Atomoton, the solo company of Mark Rein-Hagen,
  creator of Vampire: The Masquerade. Debuted at Gen Con 2001, it was the first collectible action
  figure game, featuring posable 4.5-inch cybernetic gladiator figures with 14 points of articulation
  and eight interchangeable weapon and armor accessories. Players pit their customized sci-fi
  warriors against each other in arena combat in a zero-gravity setting.

