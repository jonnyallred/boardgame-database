description: |
  Third Crusade is a 2024 medieval strategy game designed by Kieran Symington and published by Ion Game Design, set during the early 1190s conflict for the Holy Land. Two to four players lead factions of either the Muslim or Crusader Alliance across three years of campaign, with each year divided into four rounds of five phases. Players secretly issue simultaneous commands, negotiate alliances, and employ battlefield deception to outmaneuver rivals across a shifting map. The combination of hidden orders, diplomatic negotiation, and bidding for tactical advantage makes this an accessible but strategically deep debut design from first-time designer Symington.

