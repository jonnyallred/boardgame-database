description: |
  Word Rummikub replaces the numbers of the classic Rummikub tile game with letters, challenging players to form complete words instead of number sequences. Players draw from 112 letter tiles and take turns melding words of three or more letters onto the table or adding tiles to existing words; crucially, they can also rearrange words already on the table to create new ones and offload more of their tiles. Two wild Joker tiles can represent any letter, and the first player to empty their rack wins. The Scrabble-meets-Rummikub design rewards vocabulary and creative tile manipulation equally.

