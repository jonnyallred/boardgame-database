description: |
  SPY is a tiny card game in Chris Handy's Pack O Game series, published by Perplext. It is an elegant game
  of deduction played entirely in the hand — no table required — making it perfect for travel. Players work
  through a hand-management and deduction puzzle in the spy theme, attempting to identify hidden roles and
  information while concealing their own. At just 10 minutes, SPY is a masterclass in miniaturized design,
  fitting a complete social experience into a pocket-sized pack of cards.

