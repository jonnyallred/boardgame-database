description: |
  Illuminati is a card game designed by Steve Jackson and published by Steve Jackson Games in 1982, inspired by the Illuminatus! Trilogy by Robert Shea and Robert Anton Wilson. Players each control a secret Illuminati faction competing to take over the world by gaining control of groups ranging from the International Communist Conspiracy to the Secret Masters of Fandom. Players spend money to attack and control other groups, building a power structure of linked cards while negotiating deals and forming temporary alliances. The game won the 1982 Origins Award and is celebrated as a tongue-in-cheek conspiracy satire.

