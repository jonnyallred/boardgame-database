description: |
  Photosynthesis is a stunning strategy game in which 2–4 players grow trees in a circular forest, competing to collect sunlight and score points by completing the lifecycle of their trees. As the sun rotates around the board each turn, trees on the illuminated side collect light points based on their height — but taller trees cast shadows on shorter ones behind them, blocking their light. Players spend light points to grow seeds into saplings, medium trees, and tall trees, then harvest fully-grown trees for scoring tokens whose value decreases over time as spots fill in. The game's beautiful table presence with colorful 3D trees and elegant resource cycle make it a standout family strategy title.

