description: |
  Monster Derby is a 1994 fantasy racing board game designed by Jeff Siadek and published by Gamesmiths, later republished by Gorilla Games. Fantasy monsters race across a modular terrain course, and before the race begins, each player secretly predicts the finishing order of all the monsters. Players then take turns moving different monsters, creating strategic tension as they try to influence outcomes in their favor without revealing their hidden predictions to the other players. The combination of secret goals and shared control of all racing monsters produces a uniquely chaotic and humorous competition.

