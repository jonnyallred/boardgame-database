description: |
  High Season: Grand Hotel Roll & Write brings the beloved management puzzle of Grand
  Austria Hotel to a flip-and-fill format. Over seven rounds, players draft dice from
  a shared action board—placing them on spaces 1-6—to prepare rooms, accommodate guests,
  hire staff, manage finances, and court the Emperor's favor on their personal hotel
  sheets. The interplay between dice drafting and engine-building on paper captures much
  of the original game's strategic richness while dramatically reducing setup time and
  allowing simultaneous play.

