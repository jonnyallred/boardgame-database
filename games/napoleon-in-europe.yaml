description: |
  Napoleon in Europe is a grand strategy board game published by Eagle Games in 2001, simulating the Napoleonic Wars across the whole of Europe with up to seven players each controlling a major power — France, Great Britain, Russia, Austria, Prussia, Spain, or the Ottoman Empire. Players build armies using plastic 1/72-scale miniatures and engage in tactical battles featuring infantry, cavalry, and artillery, while also managing economics, diplomacy, and alliances. Each turn represents a month, making the game an epic undertaking that combines military, economic, and political simulation in a sprawling multi-player experience.

