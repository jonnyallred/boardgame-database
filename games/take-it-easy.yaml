description: |
  Take It Easy is a simultaneous tile-placement puzzle game designed by Peter
  Burley, first published in 1983. Each player has their own hexagonal board of
  19 spaces and an identical set of 27 hexagonal tiles featuring three colored
  lines with different values. One player randomly draws a tile and all players
  must place that same tile on their own board. The goal is to complete
  contiguous lines of matching colors across the board, scoring the line value
  multiplied by the tile count. Since all players use the same tile each round
  but place them independently, the game produces a fascinating parallel puzzle
  experience. It was nominated for the 1994 Spiel des Jahres.

