description: |
  Masterpiece is an art auction board game designed by Jeffrey Breslow and published by Parker Brothers in 1970. Players are art collectors competing to amass the greatest fortune by buying and selling famous paintings reproduced on full-color postcards, with each painting's hidden value card ranging from a worthless forgery to one million dollars. The bluffing element — bidding aggressively on a painting you know is a forgery to trick opponents into overpaying — gives the game a delightful social edge. A family classic, Masterpiece introduced generations of children to the concept of auctions, bluffing, and art appreciation.

