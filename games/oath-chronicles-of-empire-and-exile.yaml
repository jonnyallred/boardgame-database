description: |
  Oath: Chronicles of Empire and Exile is an asymmetric area control game for 1-6 players set in a living fantasy world where the outcome of each game permanently shapes the narrative and factions for future sessions. Players take on the roles of the Chancellor — who seeks to maintain power — and various Exiles and Denizens who each pursue their own victory conditions, from oath-keeping to conquest to trade. Designed by Cole Wehrle and illustrated by Kyle Ferrin, the game won the 2021 Golden Geek Award for Most Innovative Board Game, celebrated for its emergent storytelling where every session rewrites the history of the realm. The legacy-lite structure means no two campaigns ever unfold the same way.

