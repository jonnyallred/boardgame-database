description: |
  Squatter is an Australian board game designed by Robert Crofton Lloyd and first published in 1962 by John Sands
  Ltd, launched at the Royal Melbourne Show on the Australian Wool Bureau stand. Players manage sheep stations,
  improving pastures through irrigation and investment, stocking their land, and navigating the unpredictable
  challenges of Australian pastoral life — droughts, floods, bushfires, disease, and fluctuating wool prices.
  Combining luck and strategy, Squatter became the most successful board game ever developed in Australia, selling
  over 500,000 copies by 2007.

