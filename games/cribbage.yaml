description: |
  Cribbage is a classic English card game created by the poet Sir John Suckling in the early 17th century, descended from the older game of Noddy. Two players (adaptable to three or four) are dealt six cards, each discarding two face-down into "the crib"—an extra hand scored by the dealer—then play out their remaining cards in a sequence, scoring points for pairs, runs, and combinations summing to 15 or 31. Scores are tracked on the distinctive peg-and-board cribbage board through 121 points, and the interplay between the pegging phase and the hand-scoring phase makes Cribbage one of the most enduring two-player skill games in history.

