description: |
  Flying Carpet is a 1987 family racing game published by Ravensburger in which players race their flying carpets across a fantasy board by playing cards that determine movement direction and distance. The game received a Spiel des Jahres nomination, recognizing it as one of the more noteworthy family games of its era. With simple card-play mechanics and a colorful Arabian Nights theme, it offers light strategic choices within an accessible racing format.

