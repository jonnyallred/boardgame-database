description: |
  The Young Jedi Collectible Card Game was Decipher's second Star Wars licensed card game,
  released in 1999 to coincide with The Phantom Menace. Designed with a simplified ruleset aimed
  at younger players, it featured characters and scenarios from the prequel film. Seven expansions
  were released before the game was discontinued in 2001. It was voted CCG of the Year by
  InQuest Gamer magazine in its fan poll.

