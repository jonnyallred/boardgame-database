description: |
  Pictionary is a classic team-based party game invented by Robert Angel in 1985 in which players race to guess what their teammate is drawing before the sand timer runs out. Teams take turns sending a designated "picturist" to draw a word from a card while their team calls out guesses — no letters, numbers, spoken clues, or sounds are allowed. Cards span multiple categories including objects, actions, difficult concepts, and "all play" rounds where all teams compete simultaneously. The game's simple premise has made it a staple of game nights worldwide, with Hasbro acquiring it from Parker Brothers in 1994 and numerous editions released over the decades.

