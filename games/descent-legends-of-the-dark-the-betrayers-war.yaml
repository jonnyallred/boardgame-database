description: |
  The Betrayer's War is the second Act of Descent: Legends of the Dark, published by Fantasy Flight Games in 2023 as a major expansion requiring the base game. Players continue the story of the six heroes — Brynn, Chance, Galaden, Kehli, Syrus, and Vaerix — through a full-length new campaign set in the kingdom of Terrinoth, facing new enemies including a massive dragon. Each hero gains new character cards representing their growth from Act 1, and new gameplay elements deepen the companion-app-driven dungeon crawl experience. Released at $159.99 MSRP, it represents a substantial investment in the Descent: Legends of the Dark ecosystem.

