description: |
  Vegas Showdown is a 2005 board game designed by Henry Stern and published by Avalon Hill in which 3–5 players compete to build the most lucrative casino hotel. Players bid at auction for room tiles — slots, restaurants, lounges, and entertainment venues — and place them into their growing casino floor plan, trying to attract the most visitors and earn the most profit. The combination of auction dynamics and spatial tile-placement gives the game both a competitive bidding layer and a satisfying puzzle of optimising your floor layout. It became a cult favourite for its approachable design and remains a popular gateway to auction-mechanic games.

