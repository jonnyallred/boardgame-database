description: |
  War at Sea is a two-player strategic wargame simulating the naval conflict of World War II in the Atlantic and Mediterranean, originally published by Jedko Games in 1975 and revised by Avalon Hill in 1976. One player controls Allied naval forces (Britain and Russia) while the other commands Axis forces (Germany and Italy), with the United States beginning as a neutral power that both sides compete to influence. The Atlantic is divided into six sea areas where fleets maneuver and fight for supremacy. Despite its simplicity compared to later naval wargames, it remains a compelling and accessible introduction to WWII naval strategy.

