description: |
  The Fury of Dracula is the original 1987 hidden movement game designed by Stephen Hand and
  published by Games Workshop, pitting one player as Count Dracula secretly moving across a
  stylized map of Victorian Europe against one to three hunters working cooperatively to track
  him down. Dracula moves in secret behind a screen, placing encounter cards along his trail,
  while hunters travel by road, rail, and sea trying to deduce his location. Combat uses a card-
  based tactical rock-paper-scissors system. The game established many conventions of the 1 vs Many
  asymmetric hidden movement genre and inspired multiple revised editions, with the third and fourth
  editions published by Fantasy Flight Games.

