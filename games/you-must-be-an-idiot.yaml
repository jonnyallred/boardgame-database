description: |
  You Must Be an Idiot! is a trivia bluffing party game in which a rotating "genius" poses a
  question to the group, but some players are secretly designated as "idiots" and must give a
  wrong answer. Scoring rewards getting the right answer when you're not an idiot, correctly
  accusing an idiot, and successfully avoiding detection when you are the idiot. The combination
  of genuine trivia knowledge and social bluffing creates a lively guessing game for groups.

