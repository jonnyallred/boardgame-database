description: |
  Just4Fun Colours is a color-based variant of Just 4 Fun by Jürgen Grunau and KOSMOS. Players play color cards from their hand to place stackable stones on matching colored spaces on the game board, aiming to form a line of four in a row. When a space is already occupied, the active player must play additional color cards to build on top — making contested spaces increasingly costly. The color-based version is slightly more accessible than the number-based original, while preserving the same quick, engaging four-in-a-row competitive tension.

