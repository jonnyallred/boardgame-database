description: |
  Jagd auf Kohlenklau ("Hunt for the Coal Thief") is a 1943 Nazi German propaganda board game produced by Leptien-Schiffers as part of the wartime "Kampf dem Kohlenklau" (Fight the Coal Thief) energy conservation campaign. Players roll a die and race across 50 spaces in pursuit of the cartoon Kohlenklau figure symbolizing household energy waste undermining the German war effort. Four million copies were produced and distributed to large households. The Kohlenklau character became a widely recognized propaganda icon appearing across German media. A historically significant artifact of WWII-era state propaganda through board gaming.

