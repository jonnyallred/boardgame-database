description: |
  Disney Hocus Pocus: The Game is a cooperative card game for 2–6 players inspired by the Disney film. Players work together to stop the Sanderson Sisters from completing their wicked potion before sunrise, using spells, tricks, and teamwork to stun witches and bring the sun closer to rising. On each turn, players attempt to align the correct combination of ingredient cards in the cauldron without seeing each other's hands. The game features simple rules ideal for families, a Binx meeple, and multiple spell cards that introduce special abilities.

