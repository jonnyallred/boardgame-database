description: |
  The Ladybug's Costume Party is a 2002 children's game by Peter-Paul Joopen, published by Selecta
  and winner of the 2002 Kinderspiel des Jahres. Players spin a spinner on the board and move one
  of eight ladybug pieces to visit other ladybugs. Each ladybug piece has a magnetic nose; when
  visiting, if the ladybugs "like" each other (determined by magnets attracting), they can swap
  spots. Once a ladybug has collected five spots of different colors, she is dressed for the ball
  and removed from the game. The combination of magnetic interaction, color-matching, and a cute
  costume party theme makes it a charming and accessible first game for very young children.

