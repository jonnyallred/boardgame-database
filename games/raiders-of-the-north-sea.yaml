description: |
  Raiders of the North Sea is a worker placement game set in the Viking Age, where players recruit crew members, gather provisions, and lead raids on coastal settlements to impress the Chieftain. The game features an innovative "place and take" worker placement mechanism — players place a worker from their hand to gain resources, then take a worker already on the board to perform an action, ensuring constant interaction without worker removal frustration. Players earn Valour Points through raiding, offerings, and crew quality, and the game ends when the Valkyrie tile is revealed, adding strategic tension about timing. It was nominated for the Kennerspiel des Jahres and is part of the North Sea trilogy.

