description: |
  Masons is an abstract city-building game designed by Leo Colovini in which players collaboratively build walled cities on a shared landscape while competing for points. Each turn a player places a wall section using dice that determine tower colors and house colors on each side; when walls enclose a city, all players score based on the guild cards they hold. The reactive interplay between dice rolls and hand management creates a light but strategic game where timing the right card for the right city completion is the key skill. Published in the United States by Rio Grande Games, Masons is a quick-playing Euro with broad family appeal.

