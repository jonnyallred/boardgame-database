description: |
  Johnny Reb is a miniatures wargame designed by John Hill for regimental-level American Civil War battles. Each game turn represents approximately 15 minutes of real battle time, giving engagements a realistic flow and pacing. The rules accommodate almost any scale of miniatures from 9mm to 25mm, and include complete order-of-battle systems, morale, command, and combat resolution. Published first by Adventure Games in 1983, Johnny Reb spawned two subsequent editions and remains a respected rule set in the historical wargaming community for its accessible yet detailed simulation of Civil War infantry, cavalry, and artillery combat.

