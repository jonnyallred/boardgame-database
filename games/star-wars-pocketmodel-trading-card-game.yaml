description: |
  Star Wars PocketModel Trading Card Game is a 2007 WizKids game blending constructable starship miniatures with trading card game deck building. Each game pack contained styrene cards that players punched out and assembled into 3D starships, plus game cards, micro dice, and complete rules. Players build fleets from different Star Wars eras and factions, mixing and matching units freely, and engage in space and ground battles using cards as both units and action modifiers. The game was discontinued in November 2008 when Topps shut down WizKids operations.

