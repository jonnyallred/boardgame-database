description: |
  Jamaica is a pirate-themed racing game set on the high seas where players sail their ships around the island of Jamaica, battling rivals and collecting treasure. Each round the captain player rolls two dice and assigns them to day or night actions — all players simultaneously choose a card to play, balancing movement, food, gold, and cannons. Cutthroat combat erupts when ships occupy the same space, with the loser losing cargo. Players race to finish first while accumulating the most gold and victory points, creating a lively mix of racing tactics and opportunistic piracy that works well with families and casual groups.

