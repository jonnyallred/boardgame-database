description: |
  Stuffed Fables is a 2018 cooperative AdventureBook game by Jerry Hawthorne published by Plaid Hat Games, in which 2-4 players control brave stuffed animals protecting the child they love from an evil mastermind. All gameplay takes place across the pages of a large storybook that serves simultaneously as rulebook, narrative guide, and game board. Players draw dice from a bag — colored dice unlock different action types — while black dice accumulate to trigger enemy attacks and reset the bag. Designed to be played by parents with young children, it offers a narrative-driven campaign full of whimsy and heart.

