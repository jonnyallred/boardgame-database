description: |
  Montgolfière is a light hot air balloon race game published by Eurogames in France in 1992. Players race their balloons from Earth toward the moon, using grappling hooks to snag opponents above them and sleeping gas to slow those below. The game is a family-friendly racing experience themed around the famous Montgolfier brothers and the era of early balloon flight, making it accessible for children and casual players.

