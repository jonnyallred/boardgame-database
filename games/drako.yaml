description: |
  Drako: Dragon & Dwarves is a 2012 asymmetric two-player card game from Rebel Studio in which one player controls a fearsome dragon and the other commands a team of three experienced dwarf hunters. Each side has a unique deck with different actions: the dragon can move, bite, breathe fire, fly, and defend, while the dwarves can attack with axes, shoot crossbows, move individually or as a group, and cast nets. The dwarves win if they kill the dragon before it escapes; the dragon wins by surviving until the dwarf deck runs out. The stark asymmetry and fast play time make it an excellent head-to-head filler.

