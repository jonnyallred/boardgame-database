description: |
  Fortress America is a strategic wargame designed by Michael Gray and published by Milton Bradley in 1986 as part of the Gamemaster Series. Set in a near-future scenario, three invading world powers attack the United States from the east, west, and south simultaneously — one player commands the defending Americans while up to three others control the invading armies. The asymmetric design puts the US player in a desperate defensive war, using an advanced satellite laser defense system and guerrilla fighters, while the invaders push inland from all directions. The game won the Charles S. Roberts Award for Best 20th Century Game in 1987 and was later republished by Fantasy Flight Games in 2012.

