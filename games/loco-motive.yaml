description: |
  Loco Motive is a deduction and mystery board game set aboard a moving locomotive, in which players investigate a crime that has occurred on the train. Players gather clues from other passengers and different train cars, piecing together the suspect, weapon, and motive before the train reaches its destination. The combination of a locked-room mystery format with the confined geography of a passenger train creates an atmospheric puzzle. The humorous title plays on the word "locomotive" while hinting at the sometimes comical nature of the investigation. Note: limited English-language documentation distinguishes this title from other games and media using the same name.

