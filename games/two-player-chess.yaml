description: |
  Two-player chess refers to the standard game of Chess in its classical two-player form, the most widely played and studied board game in history. Originating in 6th century India as Chaturanga, Chess reached its modern form in Europe in the 15th century. Two players command asymmetric armies of 16 pieces each — King, Queen, Rooks, Bishops, Knights, and Pawns — across an 8x8 board, seeking to checkmate the opponent's King. Chess has generated more recorded theory, competitive tournaments, and dedicated study than any other board game, and remains the defining benchmark for abstract strategy mastery.

