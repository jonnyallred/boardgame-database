description: |
  Don't Be Annoyed (Mensch ärgere Dich nicht, "Man, Don't Get Angry") is one of the most popular board games in the German-speaking world, invented by Josef Friedrich Schmidt around 1907/1908 and first published in 1914, with over 70 million copies sold. Each player races four pieces from start to home around a cross-shaped track by rolling dice, but landing on an opponent's piece sends it back to start. The year 1999 noted here reflects a particular edition; the original game has been produced continuously by Schmidt Spiele and remains a beloved family staple.

