description: |
  Puzzle Strike: Bag of Chips is a competitive bag-building game designed by David Sirlin, inspired by Dominion and the video game Super Puzzle Fighter II Turbo. Instead of cards, players draw poker-chip-sized tokens from cloth bags, using them to build their hand and send gem piles to opponents. The goal is to avoid gem overflow — ending a turn with too many gems means losing — while engineering devastating combos against rivals. With 20 asymmetric characters creating hundreds of distinct matchups, the game rewards deep mastery of its intricate systems.

