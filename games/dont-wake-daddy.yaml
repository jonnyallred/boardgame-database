description: |
  Don't Wake Daddy is a 1992 Parker Brothers children's game in which players take the roles of children sneaking to the refrigerator for a midnight snack without waking their sleeping father lying in the center of the board. Movement is determined by a spinner, and landing on noise spaces may require pressing the alarm clock button next to Dad a set number of times—triggering him to bolt upright if pressed too many times, sending the guilty child back to start. The first player to reach the refrigerator wins. The tension of pressing the alarm clock button is the game's central thrill.

