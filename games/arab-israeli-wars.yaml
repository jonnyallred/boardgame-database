description: |
  The Arab-Israeli Wars: Tank Battles in the Mideast is a 1977 tactical wargame published by
  Avalon Hill that recreates armored engagements from the Suez Crisis (1956), Six-Day War (1967),
  and Yom Kippur War (1973). Designed by Russell Vane and Seth Carus as an expanded variant of
  Avalon Hill's PanzerBlitz rules, the game uses four geomorphic hex-grid maps at 250 meters per
  hex and includes 24 historical scenarios.

  Special rules cover roadblocks, minefields, electronic warfare, bore-sighting, and firing while
  moving, reflecting the modern combined-arms combat of the Middle East conflicts. The geomorphic
  map system allows varied terrain setups across scenarios. It remains a touchstone of modern-era
  tactical wargaming and introduced many players to the complexity of post-WWII armored warfare.

