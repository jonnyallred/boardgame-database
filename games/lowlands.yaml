description: |
  Lowlands is a semi-cooperative worker placement game for 2-4 players set on North Sea polders, where each player develops their own sheep farm while everyone shares the ongoing threat of rising floodwaters. Workers spent building the communal dike are workers not tending your flock — creating a constant push-pull between personal advancement and collective survival. Each round a flood die determines the sea's advance, and if the dike is too low when the storm arrives, all players suffer damage. The interplay between individual engine building and shared catastrophe risk creates distinctive tension not found in purely competitive games.

