description: |
  Top Ten is a cooperative party game for 4–9 players in which the team works together to survive five rounds without accumulating too many failures. Each round, one player draws a bizarre prompt card — "things that could ruin a date" or "sounds that annoy your neighbors" — and each player secretly receives a number from 1 (terrible) to 10 (magnificent). Players must give creative answers matching the intensity of their secret numbers, while the active player tries to correctly guess the number behind each teammate's answer. The game rewards shared humor and creative interpretation, generating laughter-filled moments as players stretch their imagination to justify extreme numbers.

