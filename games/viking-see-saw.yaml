description: |
  Viking See-Saw is a 2022 dexterity balancing game by Reiner Knizia, published by Itten Games as part of their Funbrick Series, played on a miniature purple boat with a fulcrum at its center. On each turn, a player picks one piece of luggage and places it on whichever side of the see-saw is currently raised; if the boat tilts, they must take a chest from the boat as a penalty. The key challenge is guessing the weight of each piece correctly, since items are made from different materials — brass, aluminum, iron, glass, acrylic, and wood — each with subtly different heft. Quick, tactile, and accessible, it is a delightful filler that works for all ages.

