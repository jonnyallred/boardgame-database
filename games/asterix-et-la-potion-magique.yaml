description: |
  Astérix et la Potion magique is a French board game based on the beloved Asterix comic
  series, released in 1986 by Coktel Vision as part of a package with the Asterix video
  game. The game was released exclusively in France and included a 3-page comic strip
  titled "In 50 B.C." along with minipuzzles. Set in the world of the Gaulish village
  and featuring characters from the Asterix comics, it offers light family fun with
  the iconic Asterix theme.

