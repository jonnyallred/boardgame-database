description: |
  Gizmos is a marble-drafting engine-building game where players construct fantastical
  machines that trigger chain reactions. Each turn a player picks a marble from a 3D
  marble dispenser and uses its color to take actions: pick up energy, file a blueprint,
  build a gizmo, or research new options. As gizmos are added to your machine, they
  automatically trigger when their conditions are met, creating satisfying cascades of
  free actions. The tactile marble dispenser and escalating chain reactions give Gizmos
  a uniquely kinetic feel for an engine builder.

