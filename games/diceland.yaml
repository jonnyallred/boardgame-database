description: |
  Diceland is a collectible dexterity combat game designed by Toivo Rovainen and James Ernest and published by Cheapass Games in 2002. Players physically throw paper octahedral dice into a combat arena; once in play, dice can be maneuvered and used to attack opponents, combining the luck of an uncontrolled throw with tactical positioning. The game blends skill (accurate throwing), luck (die orientation), and strategy (positioning and targeting), playing like a miniatures game where the "miniature" is the die itself. Multiple themed sets were released including Diceland: Space and Diceland: Ogre (a crossover with Steve Jackson's classic wargame).

