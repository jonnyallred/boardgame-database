description: |
  Founding Fathers is a 3-5 player card-driven game by Jason Matthews and Christian Leonhard — the designers of 1960: The Making of the President — set during the Constitutional Convention of 1787. Players represent state delegations, using a hand of three delegate cards whose special abilities reflect the historical personalities attending the convention. Each round an article of the Constitution is debated (Federalist, Anti-Federalist, Big State, or Small State), and players vote to steer history while accumulating influence tokens across four issue types. With only 8 cards per player across the whole game, every card play is weighty, making Founding Fathers a tense game of political dealmaking and hand management.

