description: |
  Arcadia Quest is a campaign-based dungeon-crawling board game that blends PvE and PvP combat, as players guide guilds of heroes through a city overrun by the vampire lord Malachar. Each player controls a guild of three heroes battling monsters across modular board scenarios while simultaneously competing against rival guilds for quest objectives. Heroes are equipped with cards that power their abilities, and fallen heroes can be revived between scenarios, but the campaign tracks wins and losses across a series of linked missions. With no game master required — monsters react automatically to player actions — all players remain fully engaged. The game features high-quality miniatures and a lighthearted fantasy art style.

