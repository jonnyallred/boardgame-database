description: |
  Tak is a two-player abstract strategy game that originated as a fictional
  game in Patrick Rothfuss's The Kingkiller Chronicle novels before being
  brought to life by designer James Ernest. Players compete to be the first
  to build a "road" — a connected line of their flat pieces spanning opposite
  sides of the square board — using flats, standing stones, and capstones with
  different placement and stacking rules. The game was famously funded on
  Kickstarter in 2016, attracting over 12,000 backers and more than $1.35
  million, and has since developed a dedicated competitive community through
  the US Tak Association.

