description: |
  Dreadful Meadows is a 2024 worker placement and tile placement game from Arkus Games in which players take on the roles of confectioners growing sinister candy crops in a whimsically dark meadow setting. Each turn, players sow and tend patches of magical candy plants, recruit Sugar Sprites with special abilities, and deploy Harvesters to maximize their yield. Victory points come from strategic patch placement, completing Concoction Cards, and leftover candy at game end. The game's charming but unsettling candy horror aesthetic sets it apart in the worker placement genre, and it supports solo play as well as up to four players.

