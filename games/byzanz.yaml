description: |
  Byzanz is a fast-playing card game of trading and auctions designed by Emanuele Ornella. Players act as merchants in a bazaar, bidding for sets of goods cards using their hand as currency — meaning every bid card you spend is gone, but every card you win adds to your collection. The push-and-pull of spending cards to win more cards creates a delightful economic tension in a compact filler format. The player who accumulates the most valuable collection of goods at game end wins.

