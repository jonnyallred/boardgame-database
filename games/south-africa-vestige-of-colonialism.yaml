description: |
  South Africa: Vestige of Colonialism is a board wargame by Irad B. Hardy, published by SPI in 1977 as a
  pull-out game in Strategy & Tactics magazine issue #62. The game simulates a hypothetical guerrilla war during
  the apartheid era: one player commands conventional RSA forces while the other leads the ANC invading from
  neighboring countries. Play alternates in 13-turn seasons, with the RSA player managing taxation and manpower
  depletion, and the ANC winning by controlling seven town hexes and one city hex. The rules uniquely state that
  "no RSA victory is possible," making it one of the era's most politically charged wargames.

