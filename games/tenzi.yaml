description: |
  Tenzi is a fast-paced real-time dice game created by Kevin and Steve Carroll
  in 2011. Each player receives ten dice of the same color and simultaneously
  rolls them all, keeping any showing their chosen target number and re-rolling
  the rest, racing to be the first to roll all ten dice to the same number and
  shout "TENZI!" The game offers over 75 published alternative ways to play
  (via the Sassy Tenzi card set), keeping gameplay fresh and adaptable for all
  ages. Tenzi has grown from a local toy store curiosity to a nationally
  distributed game sold in over 5,000 stores across North America.

