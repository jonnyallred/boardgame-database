description: |
  Marienbad is a variant of the ancient mathematical game Nim, popularized by the 1961 French New Wave film "Last Year at Marienbad" (L'Année dernière à Marienbad). Two players alternate taking any number of objects from four piles of 1, 3, 5, and 7 items, with the player forced to take the last object losing. The game has a known optimal strategy derivable through binary number analysis — the second player can always guarantee victory from the starting position — making it both a puzzle of pure logic and a study in mathematical game theory. Despite its theoretical solution, it remains an enduring parlor game and mathematical curiosity.

