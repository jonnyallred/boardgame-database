description: |
  Asteroid is a 1980 science fiction board game published by Game Designers' Workshop
  (GDW) as part of their Series 120 line (games playable in under two hours). Designed
  by Marc Miller and Frank Chadwick, players must destroy a mad scientist's computer-
  controlled asteroid before it crashes into Earth. Adventurers with unique abilities
  including combat prowess, computer hacking, demolition expertise, stealth, psychic
  powers, and luck infiltrate the mining station to disable its systems and escape before
  self-destruction. A modular board represents the interior of the asteroid, blending
  wargaming and pulp adventure in a compact package. A second edition with new cover art
  was published in 1983.

