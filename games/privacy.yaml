description: |
  Privacy is a party game in which players secretly answer personal yes/no questions and then try to guess what the rest of the group answered. After everyone has voted in secret, the results are revealed and players score points for correctly predicting how many others answered yes. The game creates entertaining revelations about friends and family while keeping individual answers private, making it a popular adult party game. Published by NSV (Nürnberger-Spielkarten-Verlag) and designed by Reinhard Staupe.

