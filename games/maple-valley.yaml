description: |
  Maple Valley is a strategy game published by Kids Table BG in 2023, set in the same charming woodland universe as Creature Comforts. Players guide critter scouts through trails, collect spring ingredients, and recruit Friends whose abilities provide movement, resources, special actions, and end-game points. Over five rounds, players build up their team of friends and complete Favour and Patch cards to score victory points, culminating in a spring celebration. The game blends gentle worker-placement and set-collection into an accessible but satisfying family experience with beautiful animal artwork.

