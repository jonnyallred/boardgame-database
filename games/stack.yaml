description: |
  Stack is a 1986 two-player abstract strategy game published by BB Games in which players position and stack pieces on a shared board. The objective is to get one of your pieces onto the opponent's back row and keep it there for one additional turn. Reviewer Eric Solomon praised the game highly, awarding it 4 out of 5 stars and calling it "the best two-player game of its type." The game offers compact, focused strategic play in a small package.

