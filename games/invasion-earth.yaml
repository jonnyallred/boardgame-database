description: |
  Invasion: Earth is a 1981 Game Designers' Workshop wargame set in the Traveller RPG universe, depicting the climactic final battle of the Solomani Rim War as Imperial forces attempt to invade and conquer Earth. The game unfolds in three phases: space battle for orbital control, consolidation of beachheads, and corps-scale ground combat across a hex map of Earth's surface at 1,140 km per hex. Turns represent two weeks, and the real challenge lies in logistics — bringing the right forces at the right time against a stubborn defense. Deceptively simple rules conceal deep operational planning requirements.

