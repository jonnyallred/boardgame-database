description: |
  Skirrid is a mathematical tile-placement game designed by Brian Taylor and Mark Eliot, published by Kenner in 1977, and described as a mathematical cousin to Scrabble. Players place pentomino-shaped tiles on a numbered board, scoring the numbers covered by their pieces — but when a piece's own number lands directly over a scoring square, the values are multiplied. Named after Skirrid mountain in Wales, the game rewards both spatial thinking and numerical strategy through its distinctive pentomino-and-multiplication scoring system.

