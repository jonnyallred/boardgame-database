description: |
  Transformers: Defeat the Decepticons is a children's board game from 1984 based on the popular Hasbro toy line and animated television series. Two players take the roles of the Autobots and Decepticons in a race/combat game tied to the franchise's central conflict between the heroic Autobots and villainous Decepticons. Like most licensed games of its era, it functions primarily as a collectible item for fans of the Transformers brand rather than a deep gaming experience.

