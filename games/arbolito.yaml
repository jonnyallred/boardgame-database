description: |
  Arbolito is a 2024 card-stacking dexterity game published by Red Cat Games in which players
  build a colorful tree by physically hanging leaf cards onto it. Players race to get rid of
  their cards first, using special effects and card combos to accelerate their own hand or
  hinder opponents.

  The tactile challenge of hanging cards on the growing tree without toppling it adds physical
  tension to the hand management decisions. Available in Italian and French editions, Arbolito
  is a light, fast-playing family game that combines spatial dexterity with light card play.

