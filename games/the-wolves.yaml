description: |
  The Wolves is a pack-building area-control game designed by Ashwin Kamath and Clarence Simpson and published by Pandasaurus Games in 2022. Players compete to build the largest and most dominant wolf pack by claiming territory, recruiting lone wolves, hunting prey, and upgrading their pack's attributes on a modular map. Each round, players take two actions from a shared action track, creating tension between what you want to do and what you can afford to let opponents do. The combination of territory control, pack evolution, and competitive action selection makes The Wolves a rich strategy game that rewards long-term planning.

