description: |
  Knights of Camelot is a 1980 TSR board game designed by Glenn and Kenneth Rahman (also known for Divine Right) in which 2-6 players take on the roles of freshly knighted knights wandering the Arthurian realm. Players encounter damsels in distress, monsters, brigands, and rival knights across Darlene Pekul's detailed play map, using extensive random tables in the spirit of early RPG adventure. The game sits at the intersection of wargame and role-playing game, offering narrative adventure with competitive victory conditions. It was a finalist at the 1980 Charles S. Roberts Awards in two categories.

