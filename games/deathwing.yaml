description: |
  Deathwing is a 1990 expansion for Games Workshop's acclaimed Space Hulk board game, designed by Richard Halliwell and Jervis Johnson. It introduces the Dark Angels' elite Deathwing Company (First Company) with their distinctive bone-white Terminator armor, adding new unit types including a Captain and Librarian, plus expanded weapon options that broaden the tactical depth of Space Hulk's corridor-combat gameplay. A copy of Space Hulk is required to play. Deathwing won the Origins Award for Best Fantasy or Science Fiction Boardgame of 1990, following Space Hulk's own Origins Award win the previous year.

