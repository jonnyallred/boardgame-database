description: |
  Aquatika is an abstract racing board game in which players move pieces across the board toward
  a goal box, aiming to be the first to successfully cross with one of their pieces. Each player
  controls nine pieces of three distinct types, including a Shark that can capture even friendly
  pieces — introducing a treacherous element to movement planning.

  The mix of piece types and the Shark's unique cannibalistic capture rule create tactical choices
  beyond simple racing, requiring players to plan routes that avoid their own Shark while using it
  against opponents. Specific publisher and year information is not widely documented for this
  obscure title.

