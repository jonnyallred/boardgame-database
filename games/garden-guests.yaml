description: |
  Garden Guests is a 2023 strategy game from Van Ryder Games in which players or teams construct an unbroken path of stones and beetle colonies across a vibrant hexagonal game board. Players compete to fully traverse the board with their path before opponents can do the same, using movement patterns and careful planning. The game can be played with individuals or teams, but communication between teammates is restricted, making coordination a puzzle in itself. With its beautiful paper-cut art and accessible rules, it earned a Barnes and Noble Game of the Month nomination in 2024.

