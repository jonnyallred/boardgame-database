description: |
  To the Last Man! The Great War in the West is a card-driven wargame published by Nuts! Publishing covering the grand strategic land battles of the Western Front in World War I, designed to be completed in approximately three hours. Designed by Tim Taylor over two decades of research, it puts players in command of the opposing forces in the war's most iconic theater from Belgium to the Alps. The card-driven mechanism captures the chaos and opportunity of a dynamic front while delivering an accessible grand-strategic experience for two players.

