description: |
  About Time is a historical trivia party game created by the founders of Circa Circa Ltd and first released at Spiel 2007. Rather than asking for factual answers, the game challenges players to estimate the year a historical event occurred, with the player whose guess is closest winning each card. This numerical guessing format levels the playing field compared to traditional trivia games, creating tense and amusing moments as players debate timelines. The game became notable after appearing on BBC's Dragon's Den in 2007 and supports up to 20 players.

