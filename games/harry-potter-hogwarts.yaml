description: |
  Harry Potter Hogwarts (Mystery at Hogwarts) is a licensed deduction board game published by Mattel in 2000, set within the world of J.K. Rowling's Harry Potter series. Players navigate Hogwarts castle to solve a mystery using classic deductive reasoning, identifying the culprit, location, and means through process of elimination in a family-friendly format inspired by Clue. The game was one of several Mattel-published Harry Potter games released in the early 2000s to coincide with the film franchise's launch.

