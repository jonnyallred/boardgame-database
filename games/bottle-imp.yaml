description: |
  Bottle Imp (Flaschenteufel) is an innovative trick-taking card game designed by
  Günter Cornett and first published by Bambus Spieleverlag in 1995, based on Robert
  Louis Stevenson's short story "The Bottle Imp." The card numbering contains a gap
  and the bottle's current price shifts as the game progresses — whoever holds the
  bottle when the final trick is played must keep it, losing all their cards' points.
  This inversion of trick-taking goals creates extraordinary tension as players
  deliberately avoid winning certain tricks. Re-released by Z-Man Games in 2010.

