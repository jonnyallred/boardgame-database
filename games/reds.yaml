description: |
  Reds! is an operational-level wargame of the Russian Civil War (1918-1921) designed by Ted Raicer and published by GMT Games in 2001. Players command the Bolshevik Red Army against the combined White Guard forces and Allied interventions across an enormous map of the former Russian Empire. The game uses a chit-pull activation system and includes two random event tables — one per side — while a logistics phase represents the supply challenges that defined the conflict. Playable in solitaire mode, it is widely regarded as one of the most comprehensive simulations of this chaotic and decisive period of modern history.

