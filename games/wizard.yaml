description: |
  Wizard is a trick-taking card game designed by Ken Fisher of Toronto in 1984 and first commercially printed in 1986, published in Germany by Amigo Spiele from 1996. The standard 52-card deck is augmented with four Wizard cards (always win) and four Jester cards (always lose). Before each round, players bid the exact number of tricks they expect to win, and then must hit that prediction precisely to score; being over or under both result in point penalties. The expanding hand size each round means players must constantly re-evaluate odds. Wizard remains one of the most beloved and elegantly designed bidding card games ever made.

