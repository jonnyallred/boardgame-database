description: |
  Whale Riders is a 2021 race-and-market game by Reiner Knizia for 2–6 players, illustrated by Vincent Dutrait, in which players race along the Ice Coast while buying and selling resources to accumulate precious pearls. Each turn a player takes two actions from options including moving their rider, purchasing goods at market, or selling goods for profit; the player who finishes the race having acquired the most valuable pearls wins. Combining a straightforward racing structure with hand-management decisions about when to buy and sell, it works well across player counts as a family gateway title.

