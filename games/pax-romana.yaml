description: |
  Pax Romana is an epic multi-player wargame covering Mediterranean history from 300 BCE through 50 CE, with players commanding Rome, Carthage, Greece, and the Eastern empires in their struggles for dominance. The game features hundreds of counters, dozens of pages of intricate rules, and scenarios ranging from focused two-player confrontations to full four-player campaigns that can span 40 or more hours. Military conquest, political maneuvering, economic development, and diplomatic dealings all interweave as civilizations rise and fall across the ancient world. Published by GMT Games in a second edition, Pax Romana is widely regarded as one of the most ambitious and comprehensive ancient world simulations available.

