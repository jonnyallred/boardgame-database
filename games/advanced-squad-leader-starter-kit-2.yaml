# Description
description: |
  The second entry in Multi-Man Publishing's Starter Kit series, designed to introduce
  players to the legendary Advanced Squad Leader (ASL) system. This kit adds artillery
  rules to the infantry mechanics introduced in Starter Kit #1, allowing players to
  engage with more complex tactical situations. The Starter Kits are widely recommended
  as the best entry point to ASL, which is one of the most detailed and comprehensive
  tactical-level WWII wargames ever designed. Each scenario presents a historical
  engagement from World War II.

