description: |
  The Warlock of Firetop Mountain is a 1986 adventure board game by Games Workshop designed by Steve Jackson, based on the pioneering Fighting Fantasy gamebook of the same name co-authored by Jackson and Ian Livingstone in 1982. Two to six players roam a labyrinthine dungeon fighting creatures, finding treasure, and searching for three keys needed to open the Warlock Zagor's treasure chest. Each character has SKILL, STAMINA, and LUCK scores that mirror the gamebook's combat system, and players must deduce the correct key combination while competing and sometimes stealing keys from each other. The game helped establish the dungeon crawl board game genre and remains a nostalgic classic of 1980s British gaming.

