description: |
  Starfall is a 1979 Yaquinto Publications space exploration and colonization game for 1-4 players set in the 24th century. Players build ships to explore a stellar cluster, generate detailed worlds, decide whether to colonize planets, and deal with any native inhabitants. Wormholes may be discovered during play, changing the topology of the galaxy map. Unlike many wargames of its era, Starfall is primarily an economic game — players compete over colonization rather than direct military conquest, though armed conflict is possible. Despite being published by a known wargame publisher, the game rewards economic strategy over pure military aggression.

