description: |
  Cauldron: Battle of Gazala, May 1942 is a hex-and-counter wargame published by SPI in 1976, simulating Rommel's 1942 offensive against British forces in North Africa. Originally part of the Four Battles in North Africa quadrigame, it covers 26 turns of fluid, mobile desert warfare with extensive minefields shaping the battle lines. The game is notable for its historical accuracy in depicting Rommel's bold encircling maneuver that led to the fall of Tobruk. It uses standard SPI combat mechanics and is suitable for experienced wargamers interested in the North Africa campaign.

