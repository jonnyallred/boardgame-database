description: |
  1862: Railway Mania in the Eastern Counties is an 18xx railroad investment game set during the Victorian Railway Mania of the 1840s in the Eastern Counties of England, designed by Mike Hutton and published by GMT Games in 2020. The game introduces a unique "Parliament Round" where companies can be started at a reduced cost by being chartered — a mechanic that mirrors the historical parliamentary approval required to launch railways. Unlike most 18xx games, 1862 allows companies to merge and reorganize in unusual ways, and shares can be sold short for profit. These innovations give the game a distinct economic texture that rewards players who understand how to manipulate corporate structures.

