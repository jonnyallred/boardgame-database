description: |
  A classic American marble racing game first published in 1962 by Co-5 Corporation, later licensed to Lakeside, Milton Bradley, and ultimately Hasbro. Players race four marble playing pieces around the board toward their home section, with a distinctive mechanic called "aggravating"—landing on an opponent's space sends their piece back to their base. The board includes shortcuts and a distinctive star-shaped center, and rolling a six grants an extra turn. A beloved family game rooted in the Pachisi/Parcheesi tradition, distinguished by its glass marbles and the particular pleasure of sending rivals back to start.

