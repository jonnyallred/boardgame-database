description: |
  The Stock Market Game is a 1970 economic strategy game designed by Thomas N. Shaw and published by Avalon Hill in which players buy and sell five different stocks and bonds at fluctuating prices within timed trading rounds, aiming to accumulate the most wealth. Players must track market conditions, time their trades, and out-maneuver competitors in a simulated stock market environment. As one of Avalon Hill's classic economic games of the era, it brought financial speculation mechanics to hobby gaming at a time when Euro-style economic games were still decades away, offering accessible entry into stock trading concepts.

