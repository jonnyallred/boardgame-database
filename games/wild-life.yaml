description: |
  WildLife is a prehistoric area control game for 2-6 players designed by Wolfgang Kramer in which players guide competing species — Eagles in the mountains, Bears in the forests, Crocodiles in the water, Mammoths on the plains, Men in the savannah, and Snakes in the desert — in their struggle for survival. Players expand herds, develop new survival abilities, and compete for territorial control through tile placement and auctions. When space is plentiful, creatures coexist peacefully; when resources grow scarce, direct competition erupts. The game won GAMES Magazine's Best Advanced Strategy Game award in 2004.

