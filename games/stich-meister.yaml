description: |
  Stich-Meister is a trick-taking card game by Friedemann Friese for 3-5 players in which the rules themselves change each round based on cards played by the players. The game uses a deck of 60 cards in four suits numbered 1-15, plus a separate deck of 60 rule cards. Each player holds three rule cards and plays one at the start of each round; these determine the trump suit, scoring values of tricks, and special rules for play. The ever-shifting ruleset creates a uniquely unpredictable trick-taking experience where mastering the meta-game of when to play which rule cards is as important as the card play itself.

