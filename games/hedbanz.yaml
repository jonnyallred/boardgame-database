description: |
  Hedbanz is a quick-question picture guessing game where players wear a card on a headband without seeing it, then ask "yes" or "no" questions to figure out whether the cartoon on their head depicts an animal, food, or man-made object. Players race to guess their card before a timer runs out, using process of elimination through targeted questioning. The game's simple headband mechanic and broad accessibility have made it a long-running family game franchise with numerous editions and licensed variants published by Spin Master.

