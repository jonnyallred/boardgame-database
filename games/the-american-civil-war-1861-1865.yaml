description: |
  The American Civil War: 1861–1865 is a grand-strategic simulation published by SPI in 1974,
  originally as a pull-out game in Strategy & Tactics #43 before being released as a boxed set.
  One player takes the role of Abraham Lincoln commanding Union forces, while the other plays
  Jefferson Davis and the Confederacy, each managing corps and armies across the entire theater
  of the war. The game operates at a strategic level that encompasses the full conflict from
  Fort Sumter to Appomattox, requiring players to balance military operations with the war's
  political and logistical dimensions. A revision by Joseph Reiser and Bruce Shelley appeared
  in Strategy & Tactics #93 in 1983.

