description: |
  Big Boss is a stock acquisition and investment game designed by Wolfgang Kramer and
  published by Kosmos in 1994, conceived as a response to Sid Sackson's classic Acquire.
  Players invest in hotel chains, maneuvering for majority control while managing
  finances through stock purchases and mergers. For 2 to 6 players, the game rewards
  long-term financial strategy and timing — buying in before value spikes and selling
  before a rival takes control. Its elegant economic tension makes it a respected
  entry in the business game genre.

