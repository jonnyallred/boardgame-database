description: |
  Green Ghost is a vintage board game published by Transogram in 1965, notable as the first board game designed to be played in the dark—its components, especially the spinner, were made with phosphorescent plastic that glows in the dark. The three-dimensional board depicts a spooky town with winding paths and standing scenery inspired by campy horror aesthetics similar to The Addams Family. Players navigate the glowing board, collecting pieces as they move through the haunted landscape. A collectible classic with multiple editions, it was rereleased in a 30th Anniversary edition by Marx Toys in 1997.

