description: |
  Mall of Horror is a survival negotiation game designed by Nicolas Normandon and published by Asmodee in 2005. Each player controls three characters — a blonde, a bad boy, and a brute — trapped in a zombie-invaded shopping mall where locations fill with undead each round. When a location becomes overwhelmed, the players present there must vote for who gets sacrificed to the zombie horde, turning every round into a tense negotiation of alliances, bribes, and betrayal. The tagline "Survival is in the Betrayal" captures its spirit: it plays like a shorter, more vicious version of Diplomacy with zombies, rewarding political cunning over tactical play.

