description: |
  Uruk: Cradle of Civilization is a strategy board game set in ancient Mesopotamia in which 2–4 players each build a civilization along the Euphrates River. Inventions — represented as cards — form the backbone of each player's growing settlement, starting from simple mud huts and advancing through increasingly sophisticated developments like aqueducts. Inventions generate resources used to build settlements, and settlements in turn score points based on the level of invention they are built upon. Players must also contend with disasters and seek blessings from Sumerian gods as they compete to establish the most prosperous civilization.

