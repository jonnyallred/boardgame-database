description: |
  Kursk: Operation Zitadelle is a 1971 SPI hex-and-counter wargame simulating the July 1943 Battle of Kursk, one of the largest tank engagements in history. Designed by Sterling S. Hart with development by Jim Dunnigan, it was one of the first games to simulate a single battle rather than an entire campaign, focusing on the German summer offensive against strongly entrenched Soviet armor. One player commands the attacking German forces while the other defends as the Soviets, across historical and hypothetical scenarios. Dunnigan added an extra movement phase for mechanized forces to simulate tank exploitation breakthroughs, a design innovation that influenced later wargames.

