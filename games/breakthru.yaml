description: |
  Breakthru is an asymmetric abstract strategy game designed by Alex Randolph and published by 3M in 1965 as part of the 3M Bookshelf Games series. One player commands a gold fleet of one flagship and twelve escorts whose goal is to move the flagship to the edge of the 11x11 board, while the opponent controls twenty silver ships trying to capture the flagship. The asymmetric objectives and piece counts make Breakthru a rich tactical puzzle reminiscent of the ancient Norse game Hnefatafl.

