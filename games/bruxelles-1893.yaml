description: |
  Bruxelles 1893 is a worker placement and bidding game designed by Etienne Espreman and published by Pearl Games/Z-Man in 2013, set in the Art Nouveau Brussels of the late 19th century. Players act as architects competing to complete elaborate Art Nouveau buildings and sell artwork to wealthy patrons, gaining both money and prestige. The board features a clever dual-action system where some worker placements cost money but are safe, while others are free but carry the risk of losing a worker to majority displacement. After five rounds the player with the most prestige from completed works, art sales, and bonus cards wins.

