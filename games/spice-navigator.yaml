description: |
  Spice Navigator (La Route des Épices) is a strategy board game published by Sentosphere in France in 1999.
  Players follow the Royal Spice Route in a race for riches, with the game notably including 18 scent flasks
  representing actual spices — a unique sensory component that immerses players in the fragrant world of the
  historical spice trade. Designed for ages 8 and up, the game combines movement and trading mechanics with
  a memorable aromatic theme.

