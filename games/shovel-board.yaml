description: |
  Shovel Board (or Shovelboard) is a traditional English table game dating back to at least 1532, when records show Henry VIII playing "shovillabourde" for stakes. Players slide heavy metal weights down a long narrow table (historically up to 30 feet) attempting to land them past a scoring line near the far end without falling off. The player whose weight rests nearest the end scores the round. While the original courtly game fell out of use, it spawned descendants including Dutch Sjoelbak and North American Shuffleboard, which remain popular today.

