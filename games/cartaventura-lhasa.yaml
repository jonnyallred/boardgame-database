description: |
  Cartaventura: Lhasa is a cooperative narrative card game published by Kosmos/Thames & Kosmos in 2021, inspired by explorer Alexandra David-Neel's 1916 journey to Tibet. Players build an adventure map with cards, making collective decisions at each branching point — draw, reveal, discard, or use an object — as the story unfolds toward one of five possible endings with no rulebook: instructions emerge naturally from the cards themselves. Set against a backdrop of tigers, hidden temples, and Himalayan mysteries, it delivers a distinctive self-teaching narrative experience for one to six players.

