description: |
  Caesar (originally published as Alesia) is a two-player hex-based wargame designed by Robert Bradley and published by Avalon Hill in 1976, simulating Julius Caesar's famous siege of Alesia in 52 BC. One player commands the Roman legions encircling the Gallic stronghold while the other controls Vercingetorix's defenders inside and the relief army attacking from outside. The asymmetric strategic challenge — simultaneously defending an encirclement from within and without — makes it a classic study in ancient siege warfare.

