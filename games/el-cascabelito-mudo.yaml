description: |
  El cascabelito mudo ("The Silent Bell") is a traditional Spanish parlor game played with five small brass bells, one of which is silent (contains no ball). A leader conceals all five bells in a handkerchief and presents them to players one by one; a player must identify the silent bell. Those who fail pay a forfeit. The game was collected by Professor Frederick Starr around 1898 and examples are held in museum collections. The year given is approximate based on collection date; the game's true origin is much older as a traditional folk game. No commercial publisher or designer is known.

