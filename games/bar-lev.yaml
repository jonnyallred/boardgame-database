description: |
  Bar-Lev is a hex-and-counter wargame simulating the Yom Kippur War of 1973, specifically the Egyptian assault across the Suez Canal against Israel's fortified Bar-Lev Line. Players command either the Israeli Defense Forces defending along the canal or the Egyptian forces launching a surprise crossing. The game captures the dramatic reversal of the war — initial Egyptian success followed by an Israeli counterattack crossing into Africa. Published by Conflict Game Company and later by Avalon Hill, it is a significant grognard-era simulation of the 1973 Middle East conflict.

