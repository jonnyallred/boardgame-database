description: |
  Dune is the 2019 Gale Force Nine reprint of the landmark 1979 Avalon Hill game, designed by Bill Eberle, Jack Kittredge, and Peter Olotka, set in Frank Herbert's science fiction universe. Up to six players control iconic factions — including the Atreides, Harkonnen, Fremen, Bene Gesserit, Spacing Guild, and Emperor — each with radically asymmetric powers that fundamentally alter how they interact with the game's rules. Over ten rounds, factions compete for control of Arrakis and its all-important spice melange, using storm movement, bidding, treachery cards, and alliance negotiations. The 2019 edition made only minor rule adjustments (around 3-5%) to the original game, and has since received expansions adding the Ixians, Tleilaxu, CHOAM, Richese, Ecaz, and Moritani factions.

