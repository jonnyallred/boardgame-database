description: |
  The Fall of South Vietnam is a two-player board wargame published by Yaquinto Publications
  covering the final phase of the Vietnam War from 1973 to 1975, after the Paris Peace Accords.
  One player controls North Vietnamese forces invading from the North, while the other commands
  South Vietnamese defenders fighting to hold their provinces against the onslaught. Province
  control determines victory, capturing the desperate, territory-focused nature of the final
  NVA offensive that culminated in the fall of Saigon on April 30, 1975. The game covers one
  of the most dramatic and decisive military campaigns of the Cold War era.

