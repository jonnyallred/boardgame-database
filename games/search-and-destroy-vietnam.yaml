description: |
  Search & Destroy: Tactical Combat Vietnam 1965-1966 is a squad- and platoon-level tactical wargame designed by John Young and published by SPI in 1975, simulating non-urban combat between American forces and Viet Cong guerrillas during the early years of U.S. involvement in Vietnam. A heavily revised version of SPI's earlier Grunt game system, it improved counters, map design, and rule clarity while capturing the asymmetric nature of jungle warfare including ambushes, search operations, and the fog of guerrilla conflict. The game represents a significant advancement in the design of Vietnam-era tactical wargames.

