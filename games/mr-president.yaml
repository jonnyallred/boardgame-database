description: |
  Mr. President is a sprawling solitaire board game published by GMT Games in 2023, in which the player takes the role of the President of the United States navigating the complex challenges of governing in the early 21st century. This is not an election game — it begins after the election, focusing on resource management, domestic politics, foreign policy, and crisis response. The player must prioritize a limited action budget to advance their agenda against a never-ending stream of unpredictable events and crises. The game comes in a massive box with multiple mounted game boards, extensive rulebooks, and hundreds of components, making it one of the most ambitious solitaire experiences in modern board gaming.

