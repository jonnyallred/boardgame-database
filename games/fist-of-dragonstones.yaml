description: |
  Fist of Dragonstones is a blind-bidding fantasy auction game designed by Bruno Faidutti and Michael Schacht and originally published by Days of Wonder in 2002. Players use gold and magic coins held in their closed fists to outbid rivals for enchanted character cards, whose powers help collect valuable Dragonstones — but every player pays their bid whether they win or not, giving the game a uniquely tense bluffing dimension. A Tavern Edition was republished by Stronghold Games in 2018 with updated components and slight rule refinements.

