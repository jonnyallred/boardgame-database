description: |
  A traditional mancala game played by the Wataweat people of the Asosa-Beni Sangul area along the Ethiopia-Sudan border, first documented by Ethiopian scholar Richard Pankhurst in 1971. The game is played on a wooden board with 2x5 holes (called tisiya alemungula) using five stones per hole. A distinctive feature is its directional movement rule: left-hand holes move clockwise, right-hand holes move anti-clockwise, and the center hole allows the player to choose direction. Singletons may also be moved, adding tactical complexity over the related Um el Bagara variant played by the Baggara people of Sudan.

