description: |
  Sushizock im Gockelwok is a push-your-luck dice game designed by Reiner
  Knizia and published by Zoch Verlag. Players roll five custom dice — each
  showing sushi pieces, fishbones, and colored chopsticks — and try to collect
  matching tiles from the center of the table. Rolling three or more chopsticks
  of the same color lets players steal tiles from opponents, adding a thieving
  element to the press-your-luck core. The game blends simple dice mechanics
  with memory and set collection for a fast-playing family experience. It was
  nominated for the 2009 Golden Geek Best Children's Board Game award.

