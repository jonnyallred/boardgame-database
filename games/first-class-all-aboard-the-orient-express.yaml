description: |
  First Class: All Aboard the Orient Express! is a 2-4 player card-driven tableau building game designed by Helmut Ohley, set during the golden age of the Orient Express railway. Players compete to score the most fame points by extending rail networks, constructing luxurious train cars, and serving wealthy passengers — all through a shared pool of action cards that are carefully drafted each round. What makes First Class particularly replayable is its modular design: each game uses only two of five available modules, each introducing different mechanics such as contracts, celebrities, or postcards, ensuring that no two games feel alike. The tight action selection and multiple scoring paths reward careful planning and adaptability.

