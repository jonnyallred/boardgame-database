description: |
  Axis & Allies: D-Day is a focused standalone entry in the Axis & Allies series published by Avalon Hill in 2004, simulating the Allied invasion of Normandy on June 6, 1944. Allied players must land troops on five beaches, push through German defenses, and liberate key French cities before the Germans can reinforce their positions. The asymmetric design — Allied forces landing against entrenched German defenders — creates a different strategic challenge from the classic global game. Faster and more accessible than the full Axis & Allies experience, D-Day captures the tension of Operation Overlord in a shorter playing time.

