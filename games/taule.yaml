description: |
  Taule is a medieval Scandinavian tables game — the general family of racing
  and blocking dice games to which backgammon belongs — played across Northern
  Europe during the Viking and medieval periods. Like other tables games, two
  players move pieces around a board according to dice rolls, attempting to
  bear all their pieces off first while blocking and hitting opponents. The game
  belongs to the same broad family as Tabula, Nard, and backgammon, sharing
  the characteristic 24-point board and 15-piece setup while differing in
  specific regional rules for entry, movement direction, and blocking.

