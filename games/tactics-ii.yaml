description: |
  Tactics II is a foundational board wargame designed by Charles S. Roberts and
  published by Avalon Hill in 1958. It is the sequel to the original Tactics and
  uses a fictional continent divided into two countries (Blue and Red) as its
  battlefield. The game introduced many standard wargaming conventions including
  movement points, attack strength ratings, odds-based combat resolution using a
  combat results table, and the zone-of-control rule. Played on a square-grid
  map (rather than hexes), it was instrumental in launching the commercial
  wargaming hobby and is considered a landmark in board game history.

