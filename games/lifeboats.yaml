description: |
  Lifeboats is a negotiation and social voting game of cutthroat maritime survival in which a shipwreck has left players stranded in six overcrowded lifeboats drifting toward shore. Each turn, players vote on which lifeboat moves toward safety and which springs a leak — and when an overloaded leaking boat sinks, the group must vote on who gets thrown to the sharks. Players secretly hold loyalty cards for specific boats, creating hidden agendas that drive deal-making and betrayal. The blend of negotiation, voting, and ruthless self-preservation makes it a sharp social experience best enjoyed with the right group.

