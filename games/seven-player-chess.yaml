description: |
  Seven-Player Chess is a multiplayer variant of chess adapted for exactly seven players, using a specially designed board and modified rules to accommodate the unusual player count while preserving the essential tactical and strategic elements of standard chess. As with most multi-player chess variants, players each control an army of pieces, moving in turn order, with victory awarded to the player who checkmates the most opponents or is the last player with a king on the board. No single standardized commercial edition of seven-player chess is widely documented; the game is typically played with custom boards produced by individual game designers or enthusiast groups.

