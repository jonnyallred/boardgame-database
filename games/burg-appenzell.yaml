description: |
  Burg Appenzell (The Castle of Appenzell) is a 3D family game designed by Jens-Peter Schliemann and Bernhard Weber, published by Zoch in 2007. Players move mice through the corridors of a castle, using action points to reveal passages and shift floor tiles to expose cheese hidden beneath. When two mice of the same color meet a cheese type, their player collects that cheese — the first to gather four different varieties wins. The clever sliding-tile castle creates a constantly shifting puzzle and delivers surprising moments of discovery for young players.

