description: |
  Gute Freunde is a charming cooperative children's game designed by Alex Randolph for Selecta in 1988, using twelve beautifully painted wooden water lily leaves arranged into a circuit for frog playing pieces. When two or more players' frogs land on the same lily leaf, they hold hands and say "Gute Freunde" (Good Friends), earning the chance to draw a wooden coin from a bag — making cooperation and shared spaces the heart of the experience. The game won the special children's games award at the Spiel des Jahres in 1989, and was later reprinted by Drei Magier Spiele in 2005.

