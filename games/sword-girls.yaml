description: |
  Sword Girls is a collectible card game published as a physical offline version
  of the Korean digital trading card game developed by Zeonix, which originally
  launched online in 2011. The game features four main factions — Vita, Academy,
  Crux, and Darklore — each with distinct strategic identities and artwork influenced
  by manga aesthetics. Players build decks from their faction and duel opponents in
  strategic card combat, managing hand resources and deploying character cards with
  various abilities. The physical CCG edition was released in 2012–2013, though the
  franchise has since been discontinued.

