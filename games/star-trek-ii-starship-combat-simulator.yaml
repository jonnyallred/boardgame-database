description: |
  Star Trek II: Starship Combat Simulator is a board wargame published by FASA in 1984, set in the Star Trek
  universe. The game includes Basic, Advanced, and Expert Starship Tactics systems as well as a Command & Control
  role-playing layer, using ten-sided dice and counters to simulate tactical combat between Federation and Klingon
  starships. While designed as a companion to FASA's Star Trek role-playing game, it is a complete standalone
  game and does not require ownership of the RPG to play.

