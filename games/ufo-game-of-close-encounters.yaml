description: |
  UFO: Game of Close Encounters is a board game designed by Tom Dalgliesh and originally published in Canada by Gamma Two Games in 1976. Avalon Hill purchased and republished the game in the United States in 1978. The game captures the era's fascination with UFOs and extraterrestrial phenomena, presenting players with scenarios involving alien sightings and encounters in a competitive format.

