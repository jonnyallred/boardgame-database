description: |
  The Shipwreck Arcana is a compact cooperative deduction game for 2–5 players with a gorgeous tarot-card aesthetic. Players hold secret number tiles and must play them to an ever-changing tableau of Arcana cards according to strict rules, communicating information to teammates about their hidden numbers without speaking. The group must collectively guess each player's numbers to prevent Doom from reaching zero. The deduction puzzle is elegant: cards limit which numbers can be placed on them, and clever players will communicate maximum information with each placement. It packs remarkable strategic depth and cooperative tension into a small box and a 20-minute play time.

