description: |
  Yalu is a two-player hex-and-counter wargame covering the Chinese counteroffensive during the
  Korean War, from November 1950 to May 1951. One player commands asymmetric UN forces with
  superior supplies and combat strength, while the other controls Chinese and North Korean forces
  with greater mobility and unit count but limited supplies. Each hex represents 10 miles and each
  turn one week of game time, with units at battalion to division level. It was John Hill's first
  design and served as a test bed for many of his subsequent game ideas.

