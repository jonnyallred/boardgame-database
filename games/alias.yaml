description: |
  A team-based party word game invented in Finland in the late 1980s by Mikko Koivusalo and published by Tactic Games in 1989. Each turn, one team member explains words on cards to teammates without using the target word itself—the team moves on the board equal to the number of words correctly guessed. Simple to explain and endlessly replayable, Alias has grown into one of Northern Europe's best-selling board games with over 6 million copies sold in more than 40 countries. Numerous themed editions and variations have expanded the brand while maintaining the game's core accessible appeal.

