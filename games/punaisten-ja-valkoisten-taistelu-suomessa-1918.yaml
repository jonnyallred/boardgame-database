description: |
  Punaisten ja valkoisten taistelu Suomessa 1918 (Battle of the Reds and Whites in Finland 1918) is a remarkable historical artifact: a board game depicting the Finnish Civil War that was published for the Christmas market in the very same year the war ended. The game uses a roll-and-move point-movement map with red and white wooden pieces representing the opposing forces occupying different towns across Finland. Its rapid production after the conflict ended makes it one of the earliest examples of a topical wargame created to capitalize on public interest in a current event. Original copies are preserved in archives and documented on Wikimedia Commons.

