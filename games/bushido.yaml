description: |
  Bushido is a feudal Japan miniatures wargame designed by Bob Charrette and Paul Hume, published by Fantasy Games Unlimited in 1979. Players command samurai and ninja in skirmish combat, with detailed rules for honor, morale, and the unique abilities of different warrior types. The game was one of the first to simulate Japanese feudal warfare in depth, and its detailed combat system was influential in the development of subsequent miniatures and RPG games set in feudal Japan.

