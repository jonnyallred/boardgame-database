description: |
  Micro Armour: The Game – WWII is a set of miniature wargaming rules published by GHQ Models in 2001, designed to use their trademarked 1:285 scale micro armour miniatures that have been produced since 1967. Players command World War II era armored forces on a tabletop, using a scale where the small model size means a game requires only one-ninth the playing space of equivalent 1:87 scale games. The rules cover WWII combined arms combat with infantry, armor, artillery, and air support, allowing players to fight historical and hypothetical engagements from the European and Pacific theaters.

