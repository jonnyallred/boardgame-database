description: |
  Jurassic World: The Legacy of Isla Nublar is a cooperative legacy board game in which players work together through 12 linked adventures retelling the story of the first five Jurassic Park films. Each session's choices permanently alter the board with stickers, dinosaur populations, and park decisions that carry forward into future games. Players must agree on actions as a team, and permanent consequences make every decision meaningful. Created by Prospero Hall for Funko Games, it was the first film-based legacy game and is noted for its strong narrative integration and accessible cooperative gameplay.

