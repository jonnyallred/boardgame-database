description: |
  Carcassonne: The Castle is a two-player tile-placement game co-designed by Reiner Knizia and Carcassonne creator Klaus-Jürgen Wrede, published in 2003. Unlike the original game's open landscape, players here build entirely within the fixed walls of a medieval castle, placing tiles to complete paths, towers, houses, and courts, and scoring follower majorities in each. The castle's perimeter doubles as a scoring track where landing on bonus spaces grants extra points, creating tight, head-to-head tactical drama in a compact 60-minute experience.

