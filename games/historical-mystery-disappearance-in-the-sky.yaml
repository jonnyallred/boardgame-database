description: |
  Historical Mystery: Disappearance in the Sky is part of Hobby World International's Historical Mystery deduction game series, each entry based on a real historical case. Players investigate a mysterious disappearance involving aviation, gathering clues by visiting locations and questioning witnesses over a fixed number of moves before answering a series of case-resolution questions. The series is notable for grounding its mysteries in verifiable historical events, giving players educational context alongside the deduction gameplay.

