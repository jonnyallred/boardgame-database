description: |
  Pack of Flies is a simultaneous bidding card game in which players reveal a set of cards available for collection and secretly choose a number of flies to bid, then simultaneously reveal their bids. The total of all flies bid determines which cards are claimed and by whom, creating a guessing game about what other players will do. Like many small bidding fillers, the game rewards reading your opponents and adjusting your bids accordingly, with the player who best manages the tension between bidding high enough to win desired cards and not overbidding taking the victory. It is a compact and accessible simultaneous-bidding experience in the tradition of I'm the Boss and similar light negotiation games.

