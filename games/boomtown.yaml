description: |
  Boomtown is a gold rush card and dice game designed by Bruno Cathala and Bruno Faidutti,
  published by Face2Face Games in 2004. Players compete as prospectors bidding on
  mining concessions in the Wild West, using dice to determine gold production and action
  cards to hire highwaymen, card sharks, and politicians. Players can become Mayor of
  towns like Whiskey River or San Narciso for bonus income, or build saloons to diversify
  revenue. The game plays in about 30 minutes, making it an ideal casual game with
  meaningful auction tension.

