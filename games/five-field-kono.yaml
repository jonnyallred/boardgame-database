description: |
  Five-Field Kono is a traditional Korean abstract strategy game of unknown ancient origin, first recorded in western literature in 1895. Played on a 5x5 grid, each player starts with seven pieces arranged in the two rows nearest to them and takes turns moving one piece diagonally one space at a time, with the goal of being the first to occupy all the starting positions of the opponent. There is no capturing — only blocking — making the game a pure spatial puzzle of patience and foresight.

