description: |
  Excalibur is a medieval strategy board game published by Wotan Games in 1989 set in the legendary valley of Camelot, where each player commands one of the Knights of the Grail competing to prove their right to rule Britain. The game is structured around four seasons per turn, with players moving knights and mercenaries simultaneously (or via secretly written orders) to conquer fiefs, fight rivals, and besiege castles and monasteries. Strategic layering of simultaneous movement with siege mechanics gives the game a distinct hidden-information tension. The title is part of Wotan Games' broader Arthurian series alongside King Arthur and the Knights of the Round Table and Merlin.

