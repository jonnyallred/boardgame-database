# Description
description: |
  The classic parlor game formalized as a board game. One player thinks of a person,
  place, or thing while others ask up to 20 yes-or-no questions to guess what it is.
  The guesser wins if they identify the subject within 20 questions; the thinker wins
  if they stump the group. Various commercial editions have been published over the
  decades, but the game can be played without any components at all. Simple, portable,
  and enjoyable across all ages.

