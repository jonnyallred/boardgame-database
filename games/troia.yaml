description: |
  Troia (2000) is a strategy board game set in the legendary city of Troy, published by Amigo Spiele. Players take on the roles of archaeologists competing to reconstruct the ancient city and build their academic reputations, collecting artifacts and improving their standing in the scholarly community. The game blends area control and set collection in a Mediterranean historical theme, offering a mid-weight Euro experience. Designer Eloi Pujadas draws on the mythos of the Trojan War as a backdrop for an accessible competitive game.

