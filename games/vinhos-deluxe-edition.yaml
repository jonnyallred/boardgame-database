description: |
  Vinhos: Deluxe Edition is Vital Lacerda's acclaimed 2016 reimplementation of his 2010 wine-production game, featuring completely redesigned rules and stunning artwork by Ian O'Toole. Players manage Portuguese wine estates over six years, cultivating vineyards, hiring enologists, attending wine fairs, and exporting vintages to international markets. The action selection system creates intense efficiency puzzles: regions of the board are shared, and the actions you take affect what your opponents can do nearby. The Deluxe Edition adds solo and two-player modes alongside the refined multiplayer experience, cementing its status as one of the finest worker-placement euros in the genre.

