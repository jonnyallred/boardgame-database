description: |
  Blokus Duo is the two-player variant of Blokus, played on a smaller 14x14 board
  with black and white pieces (originally purple and orange). As in the original,
  each player places all 21 polyomino pieces touching only their own pieces corner-to-corner,
  never face-to-face. Starting squares are positioned closer to the center rather
  than corners, making the game more aggressive and offensive-focused. Blokus Duo
  is considered a purer strategy experience than the four-player version since there
  is no multi-player politics, and was nominated for the 2006 International Gamers Award.

