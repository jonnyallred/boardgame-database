description: |
  Metropolis is a city-building board game designed by Sid Sackson and published by Ravensburger in 1984. The abstract city board consists of nine blocks with ten plots each, represented by a matching numbered card deck. Players take turns selecting plot cards and claiming ownership with their colored markers, with adjacency restrictions applying once a block fills up. Three-dimensional plastic buildings are placed to signify developed plots, and the game combines spatial planning with set collection and area control principles. Metropolis was recommended by the Spiel des Jahres jury in 1984 and is now out of print.

