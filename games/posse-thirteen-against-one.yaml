description: |
  Posse: Thirteen Against One is an asymmetric abstract strategy game with an Old West theme published by Milton Bradley in 1970. One player controls the lone Outlaw, the other controls 13 deputies forming the Posse. The Outlaw moves orthogonally across the board and can jump over (and eliminate) deputies as in checkers, trying to reduce the posse to an unwinnable number. The Posse wins by surrounding the Outlaw such that they cannot move. The highly asymmetric setup creates very different strategic challenges for each side in a fast, elegant two-player experience.

