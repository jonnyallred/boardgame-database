description: |
  Ancients is a wargame designed by Bill Banks covering 32 historical scenarios from 1800 BC to
  1400 AD, originally published by SPI. The game simulates battles from the pre-gunpowder era,
  taking into account unit fighting class, the importance of tight formations and line integrity,
  and morale breaking — capturing broad truths about ancient and medieval warfare in an accessible
  system rated highly for solitaire suitability.

  Players can recreate engagements from Greek phalanxes to medieval cavalry charges, with each
  scenario presenting distinct tactical challenges. The low complexity rating makes it approachable
  for players new to historical wargaming, while the variety of 32 scenarios provides substantial
  replay value. Ancients stands as a foundational title in ancient-era hex-and-counter wargaming.

