description: |
  Husch Husch kleine Hexe is a children's memory and deduction game designed by Heinz Meister and published by Zoch Verlag, winner of the 1994 Deutscher Spiele Preis Best Children's Game. Five witch tokens in different colors are hidden under witch-hat covers, and players must remember or deduce which witch is hiding where. The game is designed for very young children, with simple mechanics, charming witch-themed components, and a game time short enough to hold preschoolers' attention.

