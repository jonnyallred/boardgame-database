description: |
  This War of Mine: The Board Game is a 2017 fully cooperative survival game designed by Michal Oracz and Jakub Wisniewski, published by Awaken Realms, adapted from the acclaimed 11 bit studios video game. One to six players portray civilians trapped in a besieged city inspired by the Siege of Sarajevo, scavenging for food and medicine during the day and defending their shelter by night while grappling with brutal ethical dilemmas. The game is notable for its unflinching emotional weight—players frequently face impossible moral choices between their own survival and the welfare of others. Its bleak atmosphere and cooperative storytelling make it one of the most impactful and emotionally resonant board games ever published.

