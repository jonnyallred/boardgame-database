description: |
  The Fantasy Trip began in 1977 with Melee (MicroGame #3), a fast person-to-person fantasy combat
  microgame designed by Steve Jackson and published by Metagaming Concepts. Characters have two
  primary stats — Strength and Dexterity — with players rolling 3d6 equal to or under adjusted
  Dexterity to hit. The game was historically significant as the first tabletop game to use a
  point-buy character creation system instead of random die rolls. Wizard (1978) expanded the
  system with magic, and both eventually fed into a full RPG. Jackson later reclaimed the rights
  and a Legacy Edition was published by Steve Jackson Games in 2018 following a successful Kickstarter.

