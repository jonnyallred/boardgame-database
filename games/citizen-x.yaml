description: |
  Citizen X is a social deduction board game in which players try to identify which members of the group are "zombies" hiding among regular citizens. Similar in concept to Mafia or Werewolf, players use deduction, observation, and bluffing to root out the hidden threat before the zombies can overwhelm the citizens. The game emphasizes group dynamics and paranoia-driven decision-making. Specific details on the publisher, designer, and precise publication year are limited in available sources.

