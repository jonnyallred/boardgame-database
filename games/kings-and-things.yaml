description: |
  Kings & Things is a 1986 fantasy board game designed by Tom Wham and co-published by West End Games and Games Workshop in which 2-4 players compete to become the Emperor of Kadab by raising armies and building a citadel on a randomly assembled hex-tile map. Players recruit 351 die-cut counters representing creatures, magic items, and special events to field diverse armies and expand their domain. The game won the 1987 Origins Award Charles S. Roberts Award for Best Fantasy or Science Fiction Game, though critics noted its luck-heavy systems and slow endgame. A 2010 Z-Man Games edition revitalized the title for a new generation.

