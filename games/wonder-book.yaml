description: |
  Wonder Book is a cooperative narrative dungeon-crawler for 1-4 players in which the game board is a spectacular interactive 3D pop-up book. The game features 6 campaign chapters, each built around a different pop-up structure with its own unique gameplay rules, and the full campaign offers approximately 10 hours of play. Players explore chapters of a branching story, fighting monsters and making decisions that shape the narrative, with the pop-up book itself serving as both board and atmosphere. The innovative use of a physical pop-up structure as the central game component makes Wonder Book a uniquely memorable table experience.

