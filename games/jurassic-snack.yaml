description: |
  Jurassic Snack is a light two-player abstract game where players guide herds of chunky diplodocus dinosaurs across a terrain of face-down vegetation tokens, munching food as they move in straight lines. Tokens are revealed when collected, showing varying point values, volcanic eruptions, or occasionally a ravenous T-Rex that replaces one of your friendly herbivores. The hidden token element adds just enough uncertainty to keep both players engaged and surprised. Designed by Bruno Cathala and Théo Rivière, Jurassic Snack is a charming entry-level game well-suited for children and family gaming.

