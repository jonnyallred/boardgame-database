description: |
  Sanctuary is a zoo-building tile-placement game designed by Mathias Wigge, published by Capstone Games, and inspired by the acclaimed Ark Nova. Players plan and construct a scientifically-managed modern zoo from a supply of 135 unique tiles representing animals, buildings, and projects, placing differently-sized habitats and assigning animal cards to fill them. Each player has four action cards, and the power of each action is determined by which slot the card currently occupies, creating an evolving priority system of choices. Sanctuary simplifies and refines many of Ark Nova's mechanisms while retaining its satisfying nature conservation theme, making it a worthy accessible companion to its celebrated predecessor.

