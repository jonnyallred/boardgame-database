description: |
  TEG (Táctica y Estrategia para la Guerra) is an Argentine strategy board game
  published by Yetem in 1976, closely based on Risk. Players expand their
  dominion across a 50-country world map divided into six continents, using dice
  to resolve attacks and defend territories. Unlike Risk, TEG incorporates secret
  and common objectives — the first player to achieve their objective wins rather
  than requiring total elimination of opponents. This objective-based victory
  condition reduces game length and encourages strategic focus. TEG is a cultural
  institution in Argentina and the broader Spanish-speaking world, with the
  Yetem logo a familiar sight in Argentine households.

