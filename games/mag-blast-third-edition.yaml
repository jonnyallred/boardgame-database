description: |
  Mag-Blast: Third Edition is a fast and chaotic space-fleet card game designed by Anders M. Petersen and published by Fantasy Flight Games in 2007, featuring art by cartoonist John Kovalic. Players command fleets of sci-fi ships — Scouts, Gunships, Dreadnoughts, Destroyers — and fire blast cards at opponents, with the infamous "Make a Silly Noise or Miss" Blast Targeting System requiring players to accompany their shots with matching sound effects. Games explode to conclusion in 10-15 minutes of pure mayhem across up to eight players. The third edition refreshed the game with ten new alien races, streamlined rules, and new flagship mechanics.

