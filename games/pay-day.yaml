description: |
  Pay Day is a classic family finance game originally published by Parker Brothers in 1975, set on a calendar board representing a single month. Players roll dice and move along calendar spaces, encountering bills, expenses, deals, and windfalls as they try to manage their money until payday arrives at the end of the month. Deals can be accepted or declined, and players can take loans to stay afloat — at interest — adding a light resource-management element. The game has remained popular for decades due to its accessible theme, simple rules, and gentle introduction to personal finance concepts.

