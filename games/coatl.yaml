description: |
  Cóatl is an Aztec-themed strategy game for 1–4 players in which players act as priests assembling feathered serpents to fulfill divine prophecies. On each turn, a player either takes Cóatl pieces (head, body segments, or tail) from the shared supply, chooses Prophecy cards that specify which combinations score points, or assembles their collected pieces into a complete serpent. The better a completed Cóatl satisfies Prophecy cards and Temple bonuses, the more prestige it earns, creating an elegant puzzle of piece collection and prophecy fulfillment with striking 3D serpent constructions on the table.

