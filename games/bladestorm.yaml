description: |
  Bladestorm is a fantasy skirmish-level miniatures board game designed by Coleman
  Charlton and published by Iron Crown Enterprises (ICE) in 1990, designed as an
  adjunct to fantasy role-playing games for battles too large to resolve under standard
  RPG rules. The game features an elegant magic system — the "bladestorm" spell itself
  being a devastating tornado or expanding ring — along with detailed combat mechanics
  and a fully realized fantasy world setting. Reviewer Rick Swan called it "a remarkable
  design" with elegant mechanics in Dragon magazine Issue #178.

