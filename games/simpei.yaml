description: |
  Simpei is a 2-player abstract strategy game designed by Simpei Takahashi and published by Bandai in Japan in 2005. Like other n-in-a-row games but with two key innovations: the board has both an upper and lower "world," and players can freely move opponent pieces that are flanked (clipped) by their own pieces — a capturing mechanic that creates entirely new strategic possibilities. The game was selected as a problem for the Games and Puzzles Competitions on Computers (GPCC) and studied in academic research on abstract game complexity.

