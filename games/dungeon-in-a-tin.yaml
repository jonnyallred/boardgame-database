description: |
  Dungeon in a Tin is a 2011 solo or cooperative print-and-play dungeon crawl designed by Jake Staines for a single-sheet label design contest on BoardGameGeek, intended to fit physically inside an Altoids tin. Players descend into a randomly laid-out dungeon built from a stack of tiles, fighting through orc and goblin hordes to rescue a kidnapped maiden and collect treasure. Each new room triggers a monster dice roll to determine enemies and loot; combat is resolved by matching a hand card against the monster's attack die. A charming compact design that proves a complete dungeon crawl experience can fit on one printed sheet.

