description: |
  Red Flags: The Game of Terrible Dates is a party card game designed by Jack Dire (creator of Superfight) in which players compete to set the Single up with the most attractive fictional date using Perk cards, then sabotage everyone else's dates with Red Flag cards describing terrible traits. The Single judges which date is most appealing despite the red flags, and the winner keeps the Single card for the round. Played with 3-10 players, the game generates raucous debate and laughter as players argue why their deeply flawed date is still the best option.

