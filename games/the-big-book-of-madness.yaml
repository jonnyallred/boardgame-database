description: |
  The Big Book of Madness is a cooperative deck-building game by Maxime Rambourg in which players
  are student wizards who must turn all the pages of a cursed tome and then seal it shut by defeating
  each monster they've released. Each player manages their own elemental deck, learning spells and
  adding new elements to build synergies across turns. Spells allow players to support teammates,
  accelerate deck development, and mitigate curses. As the book progresses, monsters become more
  powerful and place additional curse cards into players' decks, creating mounting pressure that
  makes efficient team cooperation crucial to survival.

