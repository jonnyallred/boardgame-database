description: |
  Spooky Stairs (known as Geistertreppe in German) is a children's memory-and-racing game designed by Michelle
  Schanen and published by Schmidt Spiele. Players race their pawns up a haunted staircase toward the top, but
  when a player rolls a ghost, they may cover another player's pawn with a ghost piece — a magnetic mechanism
  that hides it from view. Players must remember which ghost hides their own figure for the rest of the game,
  blending roll-and-move with a cunning memory element. The game won the Kinderspiel des Jahres award for
  children's games.

