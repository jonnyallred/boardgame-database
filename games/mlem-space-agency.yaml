description: |
  MLEM: Space Agency is a push-your-luck dice game starring cats attempting to reach space.
  On their turn the active captain rolls dice and decides whether to continue or disembark
  their cats—but any player can choose to pull their own cats off the rocket at any time.
  Area majority scoring means players compete for position across multiple launch pads.
  Light, funny, and instantly understandable, MLEM channels classic Knizia elegance into
  a joyful filler about space-faring felines.

