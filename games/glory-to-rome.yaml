description: |
  Glory to Rome is a card-driven city-building game set in Rome after the Great Fire of 64 AD, designed by Carl Chudyk and Ed Carter and published by Cambridge Games Factory in 2005. Its signature mechanic is that every card serves multiple purposes: as a building to construct, a client who provides ongoing abilities, a raw material needed for construction, or a valuable resource to sell. Players react to each other's role selections—following or refusing actions in a hand-management dance of timing and opportunity. Long out of print and highly sought after, Glory to Rome has achieved cult classic status for its depth, interaction, and nearly infinite replay value.

