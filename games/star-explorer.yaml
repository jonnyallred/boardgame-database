description: |
  Star Explorer is a science fiction game published by Fantasy Games Unlimited in 1982, designed by Douglas
  Bonforte and Leonard H. Kanterman. Each player commands a Space Fleet Service cruiser, spending a design pool
  to customize their ship and crew before embarking on randomly allocated missions across a hex-mapped star system.
  Energy points drive movement and actions, and encounters with alien species are randomly generated, with outcomes
  based on ship systems, crew assignments, and energy expenditure. Though unlicensed, the game is heavily inspired
  by Star Trek tropes and structure.

