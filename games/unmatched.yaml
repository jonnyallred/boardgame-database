description: |
  Unmatched: Battle of Legends, Volume One is a fast, asymmetric skirmish game for 2–4 players featuring mythological and pop-culture heroes battling on unique maps. Each fighter — including King Arthur, Alice, Medusa, and Sinbad in the base set — has a completely different deck of cards representing their combat style, special abilities, and sidekick powers. Players alternate activating their hero and sidekick, using movement and card play to position for attacks. The genius of Unmatched lies in its asymmetry: every character plays and feels fundamentally different, and cross-set compatibility means the roster expands endlessly.

