description: |
  Battles of the Third Age is an expansion for War of the Ring (2004) that introduces three new standalone battle scenarios set in J.R.R. Tolkien's Middle-earth: the siege of Helm's Deep, the battle at the Black Gate, and the assault on Minas Tirith. Each scenario uses the War of the Ring dice and card system but focuses on specific pivotal battles rather than the full campaign. Published by Fantasy Flight Games in 2005, it allows players to replay the most dramatic military confrontations of The Lord of the Rings in detail, with dedicated rules for siege mechanics and special characters.

