description: |
  The Black Path Game is a two-player topological abstract game invented by Larry Black
  in 1960 and popularized by Martin Gardner in his October 1963 Scientific American column.
  Players alternately extend a connected path by filling adjacent squares with one of
  three tile configurations; the player who forces the path to run back into the board
  edge loses. For rectangular boards with an even number of squares, a first-player
  winning strategy was discovered by Elwyn R. Berlekamp. Simple in concept but rich in
  mathematical structure, the game is a classic among abstract game enthusiasts.

