description: |
  Crows is a tile placement game designed by Tyler Sigman and published by Valley Games in 2010, in which players compete to attract the most crows by placing shiny objects on a modular board of tree tiles. Players take turns placing tiles and positioning their trinkets to lure crows, but when six or more crows converge on a single tile, a "murder of crows" occurs — the group disperses dramatically, rewarding some players while scattering others' plans. The game's elegant emergent behavior and charming crow theme make it a distinctive entry in the abstract-adjacent family game space. It was subsequently reprinted and redesigned as Tyler Sigman's Crows.

