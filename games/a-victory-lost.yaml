description: |
  A Victory Lost: Crisis in Ukraine 1942-1943 is a two-player operational wargame simulating the intense mobile fighting on the Eastern Front, from the Soviet encirclement at Stalingrad in December 1942 through Field Marshal von Manstein's famous "Backhand Blow" counterattack in March 1943. Part of Multi-Man Publishing's International Game Series and the "Fierce Fight!" system, the game uses a chit-pull activation mechanism that creates fog of war and unpredictable tempo, forcing both sides to make critical decisions under uncertainty. Originally a celebrated Japanese design by Tetsuya Nakamura, the game is widely praised for its elegant system that captures fluid, mobile warfare at the division-to-corps scale.

