description: |
  Red Rising is a competitive hand-management and combo-building card game for 1–6 players inspired by Pierce Brown's dystopian sci-fi novel series. Players draft cards from a central "The Citadel" tableau, placing them into their personal tableau to activate powerful card synergies, while strategically managing when to pick up cards versus play them for points. The game distills the politics and faction rivalry of the source material into tight decisions: each of the 60 unique character cards has a special ability that interacts with the others, rewarding players who build clever combinations. Designed by Jamey Stegmaier and Alexander Schmidt, it plays in under an hour with a satisfying depth-to-weight ratio.

