description: |
  Catan (originally The Settlers of Catan) is the landmark 1995 Eurogame by Klaus Teuber that brought hobby board gaming to mainstream audiences worldwide, winning both the Spiel des Jahres and Deutscher Spiele Preis in its release year. Players take the role of settlers on a randomly assembled island of hexagonal terrain tiles, collecting resources — wool, grain, lumber, brick, and ore — based on dice rolls and the location of their settlements. Through trading with opponents and building roads, settlements, and cities, players race to reach 10 victory points first. Its combination of accessible rules, meaningful player interaction through trading, and the tension of the robber mechanic made it one of the best-selling board games of all time, with over 45 million copies sold.

