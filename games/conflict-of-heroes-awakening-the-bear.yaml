description: |
  Conflict of Heroes: Awakening the Bear! is a hex-and-counter wargame simulating squad-level and platoon-level combat on the Eastern Front during the German invasion of the Soviet Union in 1941-42. Players command squads and individual units using an action point system where each unit can act independently, giving the game a fluid, intuitive feel compared to traditional IGO-UGO wargames. The "initiative" system allows players to react to enemy moves in real time, creating dynamic back-and-forth tension even outside of your own turn. Winner of the 2009 Origins Award for Best Historical Board Game, it is widely praised for being one of the most accessible hex wargames for newcomers while still offering significant tactical depth.

