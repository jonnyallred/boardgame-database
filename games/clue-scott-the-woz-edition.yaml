description: |
  Clue: Scott the Woz Edition is a 2022 themed edition of the classic Clue deduction game, licensed by Hasbro and published by USAopoly in partnership with Pixel Empire, based on the popular YouTube video game review series Scott the Woz by Scott Wozniak. Players investigate who killed dinner-party host Chet Shaft among the cast of characters from the series. Released during the Scott the Woz Merchandise for Charity Bonanza 2022, with proceeds benefiting Critical Care Comics and Children's Miracle Network Hospitals, it is a limited collector's edition for fans of the internet series.

