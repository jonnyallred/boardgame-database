description: |
  Carabande (later rebranded as PitchCar) is a dexterity racing game designed by Jacques Zeimet and published by Goldsieber Spiele in 1996, winning a Spiel des Jahres special award. Players assemble a modular wooden track — with straights, curves, and even ramps and bridges in expansions — and race small wooden pucks around it by flicking them with a finger, carrom-style. Staying on track requires a delicate touch, and spectacular wipeouts when pucks fly off the rails are as entertaining as the race itself, making Carabande an enduring crowd-pleaser for all ages.

