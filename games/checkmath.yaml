description: |
  Checkmath is an educational strategy game published by Educational Insights that applies mathematics to a checker-like format. Players advance numbered tiles to squares that are multiples of the number on their tile, capturing opposing pieces along the way. The game teaches multiplication, multiples, and factors through strategic gameplay on a numbered board. With 20 double-sided bamboo tiles and an elegantly simple ruleset, Checkmath makes math practice feel like a genuine competitive game rather than a drill.

