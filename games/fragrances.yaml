description: |
  Fragrances is an olfactory party game published by SentoSphere of Paris in 1990, described as "an amusing original family game about perfume." Players engage their sense of smell to identify and match various fragrance samples in a guessing-game format suitable for 2-6 players aged 12 and up. The game is notable for incorporating real scents as a core game component, making it a distinctive sensory experience that diverges from purely visual or tactile board game mechanics. Information on detailed rules and mechanics is limited in English-language sources.

