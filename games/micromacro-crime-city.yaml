description: |
  MicroMacro: Crime City is a cooperative hidden-object mystery game designed by Johannes Sich and published by Edition Spielwiese in 2020. Players unfold a poster-sized (45 x 30 inches) illustrated city map teeming with characters engaged in everyday life — and criminal activity. Working through a deck of case cards, players act as detectives piecing together crimes ranging from petty theft to murder by searching the detailed scene for clues. The game blends elements of Where's Wally? with Sherlock Holmes-style deduction, and its accessibility and unique format earned it the Spiel des Jahres award in 2021.

