description: |
  The Battle of Versailles is a two-player asymmetric card game inspired by the famous 1973 fashion
  showdown at the Palace of Versailles, where American and French designers faced off in a legendary
  event. Players take sides as either the French or American team, competing to showcase the best
  dresses, attract celebrities, and undermine opponents through gossip. The French player has five
  actions per round while the American has only three, creating an inherent asymmetry that reflects
  the historical context. Outfits function as set collection, celebrities provide special effects,
  and players also contribute to the restoration of the palace. Published by Salt and Pepper Games
  in 2024.

