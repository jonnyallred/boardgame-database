description: |
  Kanban EV is a 1-4 player heavy economic game by Vital Lacerda, published by Eagle-Gryphon Games in 2020, thematically set in an electric vehicle factory. Players are rookie employees competing to secure their careers by mastering all aspects of EV production — designing cars, managing supplies, assembling vehicles, and satisfying the demanding factory manager Sandra. The game uses an action-selection system with variable phase order, and players must carefully plan multi-step production chains while monitoring Sandra's movements and reviews, which periodically evaluate each player's factory performance. Widely praised for Ian O'Toole's stunning visual design, Kanban EV is considered a streamlined and more accessible evolution of the original Kanban while retaining Lacerda's signature depth.

