description: |
  Chaco is a board wargame by Game Designers' Workshop (GDW) published in 1973, simulating the Chaco War fought between Bolivia and Paraguay from 1932 to 1935 over the disputed Gran Chaco region. Played at regimental level, the game uniquely emphasizes water supply as a critical resource alongside combat, since soldiers in this arid theater often spent more time searching for water than fighting. Supply lines follow rivers and roads, restricting movement through the harsh terrain. The game offers an unusual historical conflict rarely covered in wargaming.

