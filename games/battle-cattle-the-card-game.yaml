description: |
  Battle Cattle: The Card Game is a card-based adaptation of Sierra Madre Games' absurdist Battle Cattle miniature wargame, in which cybernetically enhanced cows wage tactical warfare. Players build hands of equipment and attack cards to outfit and fight with their bovine warriors, streamlining the original miniatures experience into a portable format. Like its predecessor, the game's humor — deadly serious rules applied to ridiculous livestock combat — is its primary appeal. The card format makes it more accessible and faster to set up than the original miniatures game.

