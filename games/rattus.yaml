description: |
  Rattus is an area control game set in medieval Europe during the Black Death, where players vie for control of regions while managing their populations' survival amid the spreading plague. Players assume class roles — Witch, Merchant, Knight, Monk, and others — to gain special abilities, but each role also brings vulnerability to the Black Death. Designed by Åse and Henrik Berg and published by Z-Man Games in 2010, the game combines tight area control with agonizing risk-management as the plague ruthlessly culls the population.

