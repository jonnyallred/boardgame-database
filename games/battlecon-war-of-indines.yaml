description: |
  BattleCON: War of Indines is a head-to-head card-based fighting game designed by D. Brad Talton Jr. and published by Level 99 Games that distills the strategic depth of 2D fighting video games into a tabletop format. Players select from 18 asymmetric fighters, each with unique special abilities, and combine character-specific Style cards with shared Base cards to form attacks each round. Because all characters use the same bases, learning a new fighter is intuitive while mastering them takes many plays. The simultaneous attack system and reactive mechanics create the mind-game tension of anticipating and countering an opponent's strategy.

