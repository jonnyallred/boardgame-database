description: |
  Divine Right is a 1979 fantasy board wargame set in the world of Minaria, in which 2–6 players take the roles of kings of human kingdoms or leaders of non-human factions—elves, trolls, dwarves, goblins—or sorcerous factions, battling for supremacy over 20 turns. Players control armies, fleets, diplomats, and monarch counters, earning victory points by plundering castles and capturing or killing opposing monarchs. Magical creatures and items add further complexity, and a robust diplomatic system allows alliances and betrayals. Designed as an early TSR title predating D&D's mass popularity, it blends wargame mechanics with role-playing inspiration.

