description: |
  Chill: Black Morn Manor is a 1985 horror board game by Pacesetter Ltd., based on the Chill roleplaying game system, in which players explore an ever-changing haunted manor assembled from 48 modular tiles. Each session pits the players against one of ten possible secret creatures hidden within the manor, while the traitor mechanic means companions may turn against each other mid-game. With 96 cards, six pawns, and 10-sided dice, the game delivers replayable tension through its variable board and hidden monster system. It was praised upon release as the best horror board game of its time.

