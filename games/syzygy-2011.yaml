description: |
  Syzygy is a two-player abstract strategy game designed by Olaf Pieters in
  2011. The game is played with 16 planet-like pieces on a compact board, and
  players maneuver to achieve a winning alignment — a "syzygy" in the
  astronomical sense of three celestial bodies in alignment. With short play
  sessions of around 15 minutes, Syzygy offers a focused abstract puzzle
  suitable for players aged 8 and up.

