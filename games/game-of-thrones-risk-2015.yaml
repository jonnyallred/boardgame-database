description: |
  Risk: Game of Thrones is a 2015 licensed edition of the classic Risk area-control game set in the world of HBO's Game of Thrones. Players command one of seven great houses — Stark, Lannister, Targaryen, Baratheon, Tyrell, Martell, or Ghiscari — competing for dominance across two iconic game boards representing Westeros and Essos. Three play modes are available: Skirmish (introductory), Dominion (full game with character cards and objectives), and World at War (both maps simultaneously). Character cards add house-specific abilities, such as Daenerys Targaryen's ability to substitute eight-sided dice in battle.

