description: |
  Heroscape Master Set: Swarm of the Marro is the second master set for Hasbro's Heroscape miniatures game, released in August 2007 by Milton Bradley. Players build 3D battlefields from interlocking hexagonal terrain tiles and draft armies up to a predetermined point value from a roster of fantasy and sci-fi miniatures, with the Marro — an insectoid alien species — as the central new faction. Combat is resolved by rolling attack and defense dice with skulls indicating damage, and each miniature comes with a card detailing its special powers and movement capabilities.

