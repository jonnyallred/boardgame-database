description: |
  Westwall: Four Battles to Germany is an SPI "Quadrigame" published in 1976 containing four separate hex-and-counter wargames simulating late-1944 and early-1945 Western Front battles: Operation Market-Garden (Arnhem), the Battle of the Bulge (Bastogne), the Hürtgen Forest campaign, and the Rhine crossing at Remagen. Each game uses a common ruleset based on the Modern Battles system while adding scenario-specific rules, with turns representing 12 hours and hexes scaled at 850 meters. The format emphasized playability over complexity, and in a 1976 SPI poll Westwall ranked 15th out of 202 games—the highest-rated quadrigame on the list.

