description: |
  The Builders: Antiquity is a card game designed by Frédéric Henry and published by Bombyx/Asmodee in 2015, setting the worker-hiring and monument-construction mechanics of The Builders: Middle Ages in ancient civilizations. Players spend their three actions per turn hiring craftsmen, assigning them to construction projects, and collecting wages, aiming to reach 17 victory points through completed ancient structures. New elements like tools, loans, prisoners, and universities add flavor and strategic options beyond the original design. Quick to learn and play, it's an accessible gateway to worker-allocation euro games.

