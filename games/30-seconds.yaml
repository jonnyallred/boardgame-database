# Description
description: |
  A fast-paced team party game originating in South Africa in which teams compete to
  guess as many words, names, or phrases as possible from verbal descriptions given
  by a teammate within 30 seconds. A custom die determines how far teams advance on
  the board when they answer correctly. No acting or drawing allowed — only words.
  The game has been enormously popular in South Africa and Ireland, and has been
  localized into many regional editions.

