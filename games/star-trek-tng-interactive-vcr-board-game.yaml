description: |
  Star Trek: The Next Generation Interactive VCR Board Game – A Klingon Challenge is a 1993 cooperative video board game created by Decipher and published by Milton Bradley. Players must stop a Klingon villain named Kavok from using the hijacked USS Enterprise to start a war, working together to collect isolinear chips, retrieve phasers, and reach the bridge within 60 minutes — timed by the included VHS tape. The tape features original footage filmed on the TNG sets at Paramount with cast members including Jonathan Frakes and Robert O'Reilly. A charming time-capsule of the VCR board game era.

