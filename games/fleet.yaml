description: |
  Fleet is a strategic card game with a unique commercial fishing theme where players
  compete to earn the most victory points by purchasing fishing licenses, launching boats,
  and hiring captains. Each round consists of five phases including an auction for licenses
  and card play to advance fishing operations. The hand management decisions—when to bid,
  when to launch, when to fish—create satisfying economic tension in a compact and
  approachable package. Fleet was the 2012 Dice Hate Me Game of the Year.

