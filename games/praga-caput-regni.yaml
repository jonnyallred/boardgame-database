description: |
  Praga Caput Regni is a heavy euro game set in medieval Prague during the reign of Holy Roman Emperor Charles IV, designed by the creator of Underwater Cities. Players take the role of wealthy citizens organizing building projects throughout the city, constructing cathedral towers, city walls, and bridges while gaining the king's favor. The game features an innovative action selection wheel called the "Wheel of Fortune" that provides asymmetric action options and gradually reveals bonuses. With a rich engine-building arc and multiple interconnected systems — technology tracks, resource management, card play — it rewards long-term planning and efficient optimization.

