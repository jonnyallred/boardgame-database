description: |
  Fury of the Clansmen is a tactical miniatures board game set in the Mutant Chronicles universe, released in 1994. Players control squads of Imperial's Wolfbane Commandos or Necromutant forces of the Dark Legion in skirmish-level combat missions on the planet Venus. A companion to Siege of the Citadel with somewhat more complex rules, the game emphasizes unit positioning and squad tactics in a grimdark sci-fi setting. It is primarily of interest to Mutant Chronicles fans and collectors of 1990s miniature wargames.

