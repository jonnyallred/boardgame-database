description: |
  Monkey Palace is the first jointly developed board game from the LEGO Group and Asmodee, designed by David Gordon and Tin Aung Myaing (TAM) and released at Essen Spiel 2024. Players use real LEGO building elements to collaboratively construct the Monkey Palace on a shared 32x32 plate while simultaneously competing for the highest brick income and points under the watchful Monkey's gaze. The game uniquely combines tactile LEGO building with strategic card play, creating an experience that is simultaneously cooperative and competitive in a jungle-themed setting.

