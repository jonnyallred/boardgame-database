description: |
  Karma is a fast-playing elimination card game from Set Enterprises, where the last player holding cards loses. Players must play cards of equal or higher value onto a discard pile, but if they cannot, they take the entire pile. Players start with face-up and face-down table cards that are only playable after the hand is empty — adding a hidden uncertainty at game end. Special Karma wild cards introduce chaos with effects like "Give the Pile to a Friend" and "Bottoms Up." Quick, mean, and entertaining, Karma is an accessible take-that game well-suited for family game nights.

