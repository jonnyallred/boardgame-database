description: |
  Fantasy Business is a 2002 fantasy trading game designed by Christophe Boelinger and published by Descartes Editeur, nominated for the Tric Trac award. Players operate shops selling swords, magical powders, horses, and other fantasy goods, competing to buy commodities at low prices through bidding and resell them at higher prices. The game's commodity speculation and auction mechanics create a lively economic experience for 3-8 players in a fun fantasy market setting.

