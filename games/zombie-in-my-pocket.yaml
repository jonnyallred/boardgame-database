description: |
  Zombie in My Pocket is a compact solitaire or cooperative card game in which a lone survivor
  must navigate a zombie-infested neighbourhood, searching for the ancient totem needed to end
  the zombie plague. Tiles are drawn to reveal locations filled with zombies, items, and encounters,
  and the protagonist must survive long enough to bury the totem. Originally developed as a
  print-and-play game, it won the 2010 Golden Geek Best Print & Play Board Game award before
  receiving a retail release.

