description: |
  Ghettopoly is a deeply controversial 2003 Monopoly parody created by Taiwanese-American David Chang that replaces the classic board game's properties with liquor stores, and its houses and hotels with crack houses and projects. The seven player tokens include a pimp, a hoe, and drug paraphernalia. Released without authorization, the game sparked national protests, condemnation from the NAACP, and a successful lawsuit by Hasbro over trademark infringement. It is documented here primarily as a significant cultural artifact in the history of controversial board games, not as a recommended product.

