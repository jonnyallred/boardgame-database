description: |
  Voice of the Mummy is a 1971 three-dimensional board game by Milton Bradley, famous for being "the game that talks to you." The centrepiece is a battery-powered record player disguised as a sarcophagus, which plays one of 40 messages recorded in the ominous voice of a pharaoh's mummy. Players — called Explorers — travel up a three-level pyramid path around the sarcophagus, collecting jewels directed by the mummy's commands. The player who acquires the "great jewel" also receives the dreaded cobra curse, and must then try to pass it off to an opponent before escaping the tomb. The audio technology made it a novelty classic of its era.

