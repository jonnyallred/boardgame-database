description: |
  Shifting Sands: The Campaign for North Africa 1940-1943 is a comprehensive operational wargame designed by Dean Essig and Michael Rinella, published by Multi-Man Publishing, covering the entire North African campaign including the Abyssinian Campaign of 1940–41. The game uses a point-to-point movement system and card-driven mechanics to simulate the strategic and logistical challenges faced by Axis and Allied forces across the desert theater. Its combination of historical depth, supply management, and event-driven narrative makes it a landmark title for players seeking an immersive grand-operational WWII experience.

