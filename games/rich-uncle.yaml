description: |
  Rich Uncle is a vintage stock market board game published by Parker Brothers in 1946, predating and sometimes considered a precursor to Monopoly's widespread dominance of the economic game genre. Players accumulate wealth by trading stocks, buying news-sheets, and attempting to outsmart opponents in a market-driven race to become the wealthiest player. The game comes with market cards, stock cards, news-sheets, and play money in various denominations from $100 to $10,000 bills. It was reissued in later editions through the 1950s and remains a collectible artifact of mid-20th century American family gaming history.

