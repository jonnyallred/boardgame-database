description: |
  1870: Railroading Across the Trans Mississippi from 1870 is an 18xx railroad investment game set in the central United States, published by Mayfair Games in 1992. Players buy and sell stock in rail corporations that compete to build profitable routes across the sprawling Trans-Mississippi map, making it one of the larger and more complex 18xx titles. The game features private companies with special abilities, multiple train types with escalating power, and the classic 18xx stock market dynamic where company values rise and fall based on dividend declarations. Its large map and extended play time make it a favorite for dedicated 18xx enthusiasts looking for a session-long challenge.

