description: |
  A stock-holding and route-building euro game for 2-5 players by Alan R. Moon published in 2011, featuring 112 tiny detailed airplanes on a European airline map. Players build and invest in competing airline routes across Europe, earning points for the stocks they hold in each airline when randomly-triggered scoring rounds occur. A spiritual successor to Moon's earlier airline games with a streamlined ruleset, European setting, and tighter playing time compared to its predecessors. Strategic timing of scoring events and stock acquisitions are central to winning, making it an accessible but thoughtful investment game.

