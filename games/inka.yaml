description: |
  Inka is an abstract strategy game designed by Wolfgang Kramer and published by Schmidt Spiele in 1988, themed around the ancient Incan civilization of South America. Players control and maneuver pieces across a board representing Incan territory, competing through area control or movement-based mechanics. The game reflects Kramer's interest in historical civilizations as thematic vehicles for clean, accessible abstract gameplay.

