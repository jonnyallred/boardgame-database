description: |
  Brainstonz is a two-player abstract strategy game designed by Philippe Trudel and
  published by McWiz Games, in which players place pairs of stones on a board to form
  a row of four in vertical, horizontal, or diagonal lines. On each turn a player
  places two stones on the board or removes an opponent's stone when their stones sit
  on twin symbols. The game has a strong following among abstract game enthusiasts and
  has been implemented as an open-source digital application with AI opponents.

