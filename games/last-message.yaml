description: |
  Last Message is a cooperative deduction party game in which a crime has been committed and the victim is desperately trying to sketch the culprit before their last breath fades. One player acts as the victim and draws clues identifying the criminal, but each turn the culprit player gets to erase part of the sketch to obscure the evidence. The detective players must study the evolving (and increasingly smudged) drawing and identify the criminal from a lineup. Quick, tactile, and accessible, it offers an inventive social experience that plays in about 20 minutes and works well as a warm-up or party game.

