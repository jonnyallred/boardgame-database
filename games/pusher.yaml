description: |
  Pusher is an abstract board game in which players compete to push their pieces off the opposite edge of the board (or to be the last player standing, depending on the variant). Players alternate moves that push lines of pieces in various directions, creating chain reactions across the board. The game is noted in board game databases as a compact abstract in the tradition of push-puzzle mechanics.

