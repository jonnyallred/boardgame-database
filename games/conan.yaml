description: |
  Conan is an asymmetric miniatures adventure game faithfully adapted from Robert E. Howard's original Conan stories (not the films). One player takes on the role of the Overlord, commanding waves of savage enemies, sorcerers, and undead across detailed scenario maps, while 1-4 other players control the iconic hero Conan and his companions — each with unique abilities tracked on individual character sheets. Heroes spend gems from a limited action pool to move, fight, and use skills, creating a constant tension between aggression and endurance. The lavish miniatures, scenario-driven design, and deeply thematic feel made the 2015 Kickstarter campaign one of the most successful board game crowdfunds of its era.

