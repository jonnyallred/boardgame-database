description: |
  Ultimate Combat! is an out-of-print collectible card game designed by judo sensei Dave Long and released in 1995 by Ultimate Games, with cards manufactured by Upper Deck. The game is built around Asian martial arts combat, with players building decks representing fighters and their techniques to compete in head-to-head matches. It was one of the many CCGs that emerged in the wake of Magic: The Gathering's success in the mid-1990s.

