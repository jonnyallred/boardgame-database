description: |
  Okiya (also known as Niya) is a minimalist two-player abstract strategy game by Bruno Cathala set in a Japanese garden where players place geisha tokens on a 4x4 grid of tiles. Each tile shows one of four types of vegetation and one of four poetic symbols, and the first player removes a border tile and claims its space, then their opponent must choose a tile sharing the same vegetation or symbol. The goal is to form a row, column, diagonal, or 2x2 square of your geisha tokens — or to force your opponent into a position where they cannot move. In fewer than ten minutes, Okiya achieves remarkable depth through a single elegant constraint, making it a widely praised exercise in minimalist design.

