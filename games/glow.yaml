description: |
  Glow is a competitive dice-rolling and card-drafting game set in a fantastical glowing
  world. Over eight rounds, players roll dice and draft combinations of character and
  ability cards, seeking to create the most potent combos. The game blends push-your-luck
  decisions with strategic set collection, as players weigh the value of their current
  dice results against the cards available. The beautiful luminescent art and accessible
  mechanics make it a strong choice for families and casual players.

