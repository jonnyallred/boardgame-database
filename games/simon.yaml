description: |
  Simon is an electronic memory game invented by Ralph H. Baer and Howard J. Morrison and manufactured by Milton Bradley starting in 1978. The circular device has four colored buttons that light up in random sequences with accompanying tones; players must repeat each sequence correctly to advance, with the sequence growing by one step after each successful repetition. Available in multiple skill levels and game modes, Simon became one of the iconic toys of the late 1970s and has been continuously produced in various forms since its introduction.

