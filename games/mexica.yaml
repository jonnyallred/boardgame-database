description: |
  Mexica is the third game in Wolfgang Kramer and Michael Kiesling's Mask Trilogy, following Tikal and Java, published in 2002. Set in ancient Tenochtitlan, players take on the roles of Aztec architects competing to partition and develop the city built on Lake Texcoco. Players use action points to construct canals that divide the city into districts, place buildings to develop those districts, and score influence when districts are completed. Unlike traditional area control games, players in Mexica must actively create the contested regions before fighting over them. The game placed 5th in the 2002 Deutscher Spiele Preis.

