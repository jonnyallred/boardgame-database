description: |
  March Madness is a college basketball tournament simulation game published by Avalon Hill in 1991, the first board game based on the NCAA tournament format. Players use historical team statistics cards and dice rolls to simulate basketball games, competing through a 64-team bracket to determine a champion. The game allows two players to replay classic Final Four matchups or stage full tournament brackets. It blends sports statistics with probability-based dice resolution in the classic Avalon Hill wargame tradition.

