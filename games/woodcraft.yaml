description: |
  Woodcraft is a strategic Euro game for 1-4 players set in a forest community where players run competing woodworking workshops. An innovative action selection wheel drives the game, with players splitting and combining dice pips to satisfy demands on contract cards — representing cutting, gluing, purchasing, or growing different types of wood. Players hire helpers, improve their workshop, and fulfill contracts for customers while managing a variety of wooden resources. The dice manipulation mechanic gives the game a distinctly original feel that rewards careful planning and creative problem-solving.

