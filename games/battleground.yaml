description: |
  Battleground is a card-based miniature wargame published by Your Move Games in 2005, in which players collect army cards representing historical and fantasy military units and fight battles using those cards arranged on a table as unit markers. Players construct armies using faction decks and command units through a hand of order cards, with the game resolving combat through dice and card effects. The system eliminates the cost of physical miniatures while preserving tactical maneuvering, offering multiple army factions including ancient armies and fantasy races.

