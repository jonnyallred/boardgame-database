description: |
  Therapy is a 1986 party psychology game designed by Jay Titel and published by Pressman in which 3-6 players collect pieces representing six phases of life: infancy, childhood, adolescence, adulthood, seniority, and cosmos. Players landing on Therapy squares must answer personal questions about themselves while other players try to guess their answers—individually or in "group therapy" consensus. The game incorporates Rorschach-style "Thinkblot" ink-blot cards for psychological analysis, creating a light-hearted exploration of personality and behavior. A second edition called "Second Session" was released in 1996, attesting to the game's lasting popularity as a conversation-starter at parties.

