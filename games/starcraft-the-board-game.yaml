description: |
  StarCraft: The Board Game is a 2007 Fantasy Flight Games adaptation of the iconic real-time strategy video game for 2-6 players, designed by Corey Konieczka and Christian T. Petersen. Players take command of one of the game's iconic leaders — Jim Raynor, Sarah Kerrigan, Judicator Aldaris, or others — leading Terran, Protoss, or Zerg forces across a modular map of up to twelve planets. The diceless, card-driven combat system allows players to expand their faction with powerful technologies, while competing for resources (minerals and Vespene gas) through worker placement. The game won the Origins Award for Board Game of the Year in 2007.

