description: |
  Kotra is a two-player strategy game based on the fictional Cardassian board game from the Star Trek: Deep Space Nine universe, played on a 51-space double-fan board. Described in the show as "a cross between chess and Stratego," it features pieces with hidden ranks that are only revealed during combat. Movement is determined by a pair of 10-sided dice — one controlling how many pieces may move, the other controlling how far — creating a strategic layer where resource allocation across multiple pieces is key. The game favors bold tactical aggression, reflecting the Cardassian cultural philosophy depicted in the series.

