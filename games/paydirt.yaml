description: |
  Paydirt is a classic two-player American football simulation game originally published by Time Warner as "Sports Illustrated Pro Football" and later acquired by Avalon Hill. Each player selects a team represented by a Team Chart capturing that NFL season's real statistical strengths and weaknesses — from run and pass offense ratings to multiple defensive categories. Players secretly select play types (run, short pass, long pass, etc.), roll dice, and consult their charts to resolve each down. The deep statistical underpinning and game-planning element made it a beloved sports simulation for football enthusiasts looking for authentic gridiron strategy.

