description: |
  Oust is a minimalist two-player abstract strategy game designed by Mark Steere in 2007, played on a hex grid (or alternatively with a Go set) in which players place stones and win by eliminating all of the opponent's groups in a single devastating turn. The core mechanic is elegant: you may only place a stone that connects your existing groups into one that is larger than all the enemy groups it newly touches — upon which all those enemy groups are immediately removed. Starting from an empty board, the game paradoxically must end in one army completely annihilating the other. Oust is considered Mark Steere's most popular and influential design, combining extreme simplicity of rules with profound tactical depth, and is freely available to print and play.

