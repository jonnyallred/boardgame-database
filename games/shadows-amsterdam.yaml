description: |
  Shadows: Amsterdam is a real-time team deduction game designed by Mathieu Aubert and published by Libellud, in which pairs of players race across an Amsterdam-themed board to find three clues. One player on each team acts as the Informer, using image cards to silently direct their Detectives to the correct locations without speaking. The first team to gather all three clues and return to their sponsor wins. The game's visual communication mechanic and fast pace make it an exciting filler for groups of 2–8 players.

