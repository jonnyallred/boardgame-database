description: |
  Terraforming Mars: Ares Expedition is a standalone card game designed by
  Sydney Engelstein, Jacob Fryxelius, and Nick Little, merging the Terraforming
  Mars engine-building experience with the simultaneous phase-selection mechanic
  from Race for the Galaxy. Players control corporations competing to raise Mars's
  temperature, oxygen, and ocean coverage through played project cards. Each
  round, players secretly choose from five phases — Development, Construction,
  Action, Production, and Research — and all chosen phases activate for everyone,
  creating dynamic multi-player solitaire engine-building. The result is a
  streamlined, 60-minute take on Mars colonization with exceptional replayability.

