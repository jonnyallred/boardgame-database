description: |
  Kahuna is a two-player area control card game set in a Polynesian archipelago of 12 islands, where players compete to dominate islands by placing bridge tokens. Players play cards matching island names to place bridges, and when a player owns the majority of bridges around an island they capture it and remove all opponent bridges — triggering chain reactions. The game is played over three short rounds with mid-game scoring, rewarding tactical hand management and chain-capture tactics. Originally published as Arabana-Ikibiti by Bambus Spieleverlag, the Kosmos edition brought it into the well-regarded two-player game series.

