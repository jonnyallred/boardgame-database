description: |
  Sobek is a set-collection card game by Bruno Cathala set in ancient Egypt along the Nile. Players gather
  precious merchandise — ivory, marble, ebony, wheat, fish, and cattle — arriving by boat, then bundle matching
  goods into lots to sell for profit. On each turn, players take a card, play a powerful character card, or
  sell a family of three or more matching goods; a corruption mechanic penalizes those who grab too many cards
  in a single turn. The interplay of timing, card selection, and character powers creates a tight, elegant
  competition.

