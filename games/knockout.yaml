description: |
  Knockout is a 1991 Milton Bradley dexterity and stacking game in which players use a rammer hammer mechanism to knock pieces out of a stacking structure. Players take turns using the hammer device to pop out "stoppers," with the goal of controlling more pieces on the grid when the game ends. The game's satisfying physical mechanism and fast play made it a popular children's title. A later Bob the Builder-themed edition was released in 2002.

