description: |
  Campaign Trail: The Game of Presidential Elections is a political strategy board game published by Game Designers' Workshop in 1984. Players take on the roles of presidential candidates, traveling the country to collect votes by moving their tokens across the electoral map of the United States. The goal is to win enough electoral votes to secure the presidency, with players balancing resource management, geographic strategy, and voter outreach. The game supports 2 to 6 players and provides a lively simulation of American presidential campaigning.

