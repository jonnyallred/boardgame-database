description: |
  Rapier & Dagger is a two-player abstract wargame simulating one-on-one dueling combat with Renaissance-era weapons. Players maneuver their fighters across a grid, making attacks and defensive moves with rapier and dagger in a tactical dance of range and initiative. The game captures the strategic complexity of historical European martial arts in a condensed board game format.

