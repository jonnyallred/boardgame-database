description: |
  König von Siam (King of Siam) is a 2-4 player area influence and hand management game designed by Peer Sylvester, published by Histogame in 2007. Set in Siam in 1874, the game depicts King Rama V's struggle to modernize the nation against competing factions — Royalists, Northern Lao, and Southern Malays. Each player has only 8 cards available for the entire game, making every play enormously consequential. Players use their cards to compete for influence in each of the eight regions and tip the power struggle toward factions where their own influence is greatest, with no random elements after the initial setup. The extreme scarcity of actions and total absence of luck makes König von Siam a game of pure tactical calculation and bluffing.

