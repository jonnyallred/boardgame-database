description: |
  Small World Underground is a standalone game in the Small World series, published by Days of Wonder in 2011.
  Set in the caverns beneath the Surface, players command 15 underground creature races — each paired with one of
  21 special powers — to claim subterranean territories. Monster-occupied regions guarding powerful relics must be
  conquered first, adding a new layer of tactical challenge. The river mechanic creates both a boundary and access
  route, and the core decline-and-draft system from the original returns in this fresh underground setting.

