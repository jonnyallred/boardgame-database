description: |
  DungeonQuest is a 1987 Games Workshop publication (originally released in Sweden in 1985 as Drakborgen by Alga AB) in which one to four adventurers enter the ruins of Dragonfire Castle to steal from the sleeping dragon's hoard. Players must navigate a modular dungeon of random tiles, collect treasure from the central lair, and escape before sunset — at which point the dragon awakens and kills all remaining characters. The game is notorious for its extreme lethality, with statistically very few characters surviving a given session. Fantasy Flight Games produced a revised edition in 2010, and the game's "survive against the odds" tension is its defining feature.

