description: |
  Ætherverse is a science-fantasy miniature wargame set in a universe where the discovery of
  multiple parallel universes triggered wars of conquest across the Ætherverse. Its central design
  goal was a universal rules system allowing players to construct any imaginable army using
  miniatures from any manufacturer. The core rulebook includes background on over a dozen
  universes and 17 army lists, plus fifteen battle scenarios. The game was nominated for a 2004
  Origins Award in the Best Miniature Wargame category.

