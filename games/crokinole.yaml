description: |
  Crokinole is a classic Canadian disk-flicking dexterity game played on a circular wooden board, tracing its origins to the 1870s in Ontario. Players take turns shooting wooden discs across the board with their fingers, aiming to land in the high-scoring center hole (worth 20 points) while simultaneously knocking opponents' discs off. The game blends precision, strategy, and physics in a way that makes it accessible to all ages yet deeply rewarding to master. Often passed down through generations, Crokinole boards are frequently handcrafted heirlooms prized for both gameplay and craftsmanship.

