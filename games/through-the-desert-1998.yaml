description: |
  Through the Desert is a 1998 abstract area control game designed by Reiner Knizia, part of his celebrated tile-laying trilogy alongside Samurai and Tigris & Euphrates. Two to five players place pastel-colored plastic camel caravans on a hex grid, with each camel placed adjacent to the same-colored group; points are scored by capturing watering holes and enclosing oases. The constraint that each color's caravan must connect back to a leader piece creates interesting blocking and territory decisions, and the elegant scoring systems reward both aggression and opportunistic expansion. Its beautiful pastel camels and clean mechanics have made it a beloved classic of abstract Euro design.

