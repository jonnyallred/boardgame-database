description: |
  Pixies is a card placement game for 2-5 players featuring extraordinary photography of hand-crafted woodland creature models made from natural materials. Players place cards in their personal playing area according to number rules, with stacked validated cards and large color zones scoring at round end. The layering mechanic — placing cards on top of others to lock in scores — creates satisfying decisions about when to commit versus when to build further. Pixies is notable for its unique nature-photography art style, giving it a truly distinctive table presence.
