description: |
  Warriors of Mars is a 1974 miniatures wargame rule book written by Gary Gygax and Brian Blume and published by TSR, simulating combat in the fictional world of Barsoom from Edgar Rice Burroughs' John Carter of Mars novels. The 56-page booklet was published in the same style as the original Dungeons & Dragons rules and shares artist Greg Bell. TSR published the game without permission from the Burroughs estate, and after a cease and desist order the game was pulled from distribution, making surviving copies rare and valuable. It stands as an important artifact of the very earliest days of TSR and the tabletop gaming hobby.

