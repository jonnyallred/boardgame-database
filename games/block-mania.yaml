description: |
  Block Mania is a two-player tactical combat game designed by Richard Halliwell and
  published by Games Workshop in 1987, set in the dystopian Mega-City One of the Judge
  Dredd universe from the 2000 AD comic. Players control neighboring city blocks whose
  citizens are engaged in chaotic inter-block warfare, maneuvering mobs of juves,
  fatties, and futsies with flamers, lasers, and barricades, before the Judges arrive.
  An expansion, Mega-Mania, extended play to four blocks, and additional rules appeared
  in White Dwarf magazine.

