description: |
  Feudal Lord (originally "Sengoku Daimyo") is a wargame simulating Japan's Sengoku period (late 16th century), in which players control rival feudal lords competing to unify the country under a single shogun. Players manage military units, fortresses, leaders, and ships across historically detailed maps using over 1,300 diecut counters, with 20 scenarios reflecting major campaigns of the era. The game supports an unusually wide player range (1-16) and combines area movement, dice-based combat, and economic management to create a broad-scale historical simulation of Japan's civil war period.

