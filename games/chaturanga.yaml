description: |
  Chaturanga is the ancient Indian strategy game widely considered the ancestor of chess, first documented in the 7th century AD though likely originating centuries earlier. Played on an 8x8 uncheckered board called ashtapada, each player commanded 16 pieces representing the four divisions of the Indian army: infantry, cavalry, elephants, and chariots — mirroring the four "limbs" the game's Sanskrit name describes. The game spread westward to Persia as shatranj and eventually evolved into modern chess as it traveled through the Arab world into medieval Europe, making it one of the most historically significant games ever created.

