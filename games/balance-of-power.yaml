description: |
  Balance of Power is a geopolitical negotiation and area-control board game published by Avalon Hill. Players represent major world powers — the United States, Soviet Union, and other great powers — competing for global influence during the Cold War era by supporting client states, intervening in regional conflicts, and managing the risk of superpower confrontation. The game's central mechanic rewards players who extend their influence without triggering a nuclear confrontation, capturing the delicate brinkmanship of Cold War politics. Players must negotiate alliances and make credible threats while avoiding the game-ending scenario of direct nuclear exchange.

