description: |
  Empire Builder is a railroad building board game designed by Bill Fawcett and Darwin Bromley, published by Mayfair Games in 1982. Players use wax crayons to draw railroad track directly on the reusable laminated board — earning it and its relatives the nickname "crayon rail games" — then transport goods between cities to earn money and ultimately build a transcontinental network. The game spawned an extensive series of spin-offs covering other geographies and fantasy settings (British Rails, Eurorails, Australian Rails, Iron Dragon, Martian Rails, etc.). Empire Builder is notable for its freeform track-laying mechanic, which gives players genuine creative freedom in designing their rail networks.

