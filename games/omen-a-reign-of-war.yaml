description: |
  Omen: A Reign of War is a head-to-head two-player card game rooted in Greek mythology, in which both players are children of Zeus competing to win the favor of the gods by controlling three contested cities. Each player deploys units — Soldiers, Oracles, and mythical Beasts such as Satyrs, the Phoenix, and Minotaurs — and makes offerings to different gods to gain powerful advantages. Players alternate gathering wealth, playing unit cards, battling for city dominance, and triggering god abilities, with the winner being whoever best demonstrates their worthiness to inherit Zeus's legacy. Originally published by Small Box Games in 2011 and later republished by Kolossal Games, it supports both a standard and a draft mode for variety.

