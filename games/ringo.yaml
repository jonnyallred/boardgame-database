description: |
  Ringo is a compact two-player abstract strategy game that reimagines the classic four-in-a-row challenge with an organic, growing board made of metal rings and wooden discs. Players take turns placing a disc in one of the eight metal rings and then moving that ring to an adjacent position, creating a constantly shifting playing field with no fixed board boundaries. The goal is to be the first to align four discs or four rings of your color in a horizontal or vertical line. Crafted with high-quality wooden and metal components, Ringo is one of the most portable and elegant abstract strategy games available, delivering deep tactical play in a tiny package.

