description: |
  Qawale is a two-player abstract strategy game from Gigamic designed by Romain Froger and Didier Lenain-Bragard that combines Mancala-style stone stacking with a connection win condition similar to Connect Four. Players place pebbles onto a 4x4 grid, stacking them on existing stones, then redistributing the stack Mancala-style to create chains of their color. The goal is to align four of your stones in a row, column, or diagonal. A MENSA Select winner, Qawale is praised for its deceptively simple one-minute rule set and the surprising strategic depth that emerges from its stone-stacking mechanics.

