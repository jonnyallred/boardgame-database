description: |
  Octi is an award-winning abstract strategy game for 2-4 players designed by Donald Green, in which players move octagonal "pod" pieces on a grid and win by moving all of their pods into the opponent's starting positions. The game's defining feature is its modular movement system — each pod starts bare but players add directional "prongs" to pods over the course of the game, determining how those pieces can move, jump, or capture. This means the game begins slowly as pieces have limited mobility, then accelerates dramatically as the board fills with armed pods capable of powerful multi-jump sequences. Widely praised by abstract game enthusiasts for its elegant scalability and depth, Octi won Best New Abstract Strategy Game in 2000.

