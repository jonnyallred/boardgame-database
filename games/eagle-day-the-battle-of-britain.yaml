description: |
  Eagle Day: The Battle of Britain is a two-player hex-and-counter wargame simulating the pivotal 1940 air campaign over southern England. One player controls German bombers attempting to strike British targets, while the other commands RAF fighter squadrons defending the homeland. Published by Gamescience in 1973, the game uses a hex grid map depicting the coast of France and southeast England, with 142 die-cut counters representing aircraft units. It is notable as a compact wargame that captures the tension of the Battle of Britain in a manageable format.

