description: |
  Star Munchkin is a science fiction standalone expansion in the Munchkin family, designed by Steve Jackson and
  published by Steve Jackson Games in 2002. Players play space-themed Classes and Races, fight alien monsters,
  and race to Level 10 by kicking down doors, looting treasure, and backstabbing their rivals with cards from
  their hands. Like all Munchkin games it rewards opportunistic card play and shameless treachery; Star Munchkin
  won the 2002 Origins Award for Best Traditional Card Game.

