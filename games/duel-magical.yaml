description: |
  Duel Magical is a 1982 two-player fantasy arena game published by Ragnarok Enterprises and designed by Dave Nalle. Two mages meet in a high-sorcery arena for a simple but atmospheric battle resolved through card play or dice mechanics in the tradition of early wizard-duel games. The game brings to life a world of high sorcery through streamlined confrontational mechanics typical of small-press fantasy games of the early 1980s. Documentation for this title is limited in modern English-language sources.

