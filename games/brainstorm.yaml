description: |
  Brainstorm is a party game in which players race to name items in a given category
  drawn from a card — listing people, places, or things that fit the category description.
  Each correct answer matching one written on the category card advances the player one
  step on the board, with bonus movement for unusual or unexpected answers that still
  qualify. The game rewards quick thinking, broad general knowledge, and creativity in
  category interpretation, making it accessible to players of various backgrounds.

