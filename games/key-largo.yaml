description: |
  Key Largo is an early entry in Richard Breese's Key series, published by Hans im Glück in 1997. Players take on the roles of deep-sea diving entrepreneurs who hire divers, purchase equipment, and explore underwater wrecks in the Florida Keys. A simultaneous action selection mechanic drives the game — players secretly choose locations for their ships twice each day, over a ten-day game sequence. Competing for dive sites and wreck treasures creates tense overlap and interference. Key Largo is an intriguing forerunner to the more celebrated later Key games, showcasing Breese's interest in simultaneous action and maritime themes.

