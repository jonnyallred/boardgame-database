description: |
  Kaooa (also called Vultures and Crows) is a traditional asymmetric abstract strategy hunt game from India, thought to originate over 600 years ago. Played on a five-pointed star (pentagram) board, one player controls a single vulture while the other places and moves seven crows. The vulture wins by capturing four crows through diagonal jumping; the crows win by surrounding the vulture so it cannot move. Crows are dropped onto the board one at a time before they can move, creating a tense build-up phase. A compact and elegant predator-versus-prey design from the Indian subcontinent.

