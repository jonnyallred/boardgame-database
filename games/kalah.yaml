description: |
  Kalah is a modern variant of the ancient mancala family of games, invented by William Julius Champion Jr. in 1940 and commercially sold from 1944 onward. Played on a board of two rows of six pits plus two stores (kalahs) at each end, players take turns sowing seeds counterclockwise from their pits, with bonus turns for landing in their own store and captures triggered by landing in empty opponent-adjacent pits. Simple to learn yet strategically rich, Kalah is one of the most widely sold and recognized abstract strategy games in the world, forming the basis for most commercial Mancala sets.

