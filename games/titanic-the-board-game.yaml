description: |
  Titanic: The Board Game is a roll-and-move game published by Universal Games in 1998 timed to the blockbuster film release, in which 2–6 players race as passengers aboard the doomed RMS Titanic to collect five key items — passport, life vest, room key, ticket, and valuables — and reach the lifeboats before the ship sinks. Event cards introduce hazards like locked doors and countdowns, while the race to escape adds genuine urgency to the simple movement mechanics. The game sold 300,000 copies in its launch year and became one of the top-five selling games at Toys "R" Us in 1998.

