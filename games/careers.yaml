description: |
  Careers is a life-path board game designed by sociologist James Cook Brown and published by Parker Brothers in 1955. Before the game begins each player secretly defines their own "Success Formula" — a personal mix of money, fame, and happiness totaling 60 points — reflecting Brown's philosophy that success means different things to different people. Players travel the board's career paths (politics, Hollywood, farming, sea, and more) collecting their chosen mix of success tokens via cards and dice. The variable victory condition system was innovative for its era and gives Careers a personal, narrative quality rarely found in games of that period.

