description: |
  War of the Ring: Collector's Edition is a premium deluxe version of Ares Games' acclaimed War of the Ring 2nd Edition, released in 2010 with hand-painted miniatures, a leather-bound rulebook, and updated rules incorporating all expansion content. One player leads the Free Peoples in a desperate quest to destroy the One Ring at Mount Doom, while the other commands Sauron's Shadow Armies in a conquest to overwhelm the Free Peoples' cities and strongholds. The edition includes factions and characters from the expansions such as Galadriel, the Balrog, the Ents, Dunlendings, siege engines, and Corsairs. Victory can be achieved militarily or—for the Free Peoples—by completing the Ringbearer's quest.

