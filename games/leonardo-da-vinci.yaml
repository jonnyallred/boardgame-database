description: |
  Leonardo da Vinci is a worker placement game set in Renaissance Italy where players compete as inventors in Leonardo's workshop, racing to complete inventions before their rivals. Players bid workers to gain priority at workshops that produce resources and advance invention projects, with higher bids placing workers earlier in the action queue but leaving fewer resources for later actions. The tension between bidding aggressively for position and conserving workers creates the game's central puzzle. Published by dV Giochi in 2006, it was an early and influential entry in the worker placement genre, later reimplemented as Codex Leicester in 2023.

