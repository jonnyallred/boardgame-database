description: |
  Genial Spezial is an abstract connection game designed by Reiner Knizia and part of the Ingenious family of games. Players place tiles to form tower connections on the board, competing to score across multiple colors while attempting to maximize their weakest color — since the final score is determined by the color in which you have the fewest points. The game adds wild-point bonuses for covering special spaces and linking tall towers, rewarding both offensive planning and defensive blocking. It is considered a tragically underrated entry in Knizia's abstract catalog and is noted as the design ancestor of the 2024 game Cascadero.

