description: |
  Break the Code is a compact deduction game for 2–4 players in which each player attempts to deduce a hidden sequence of numbered tiles held by their opponents. Players use question cards to ask logical queries—such as comparing values or positions—and must reason from the answers to identify their opponents' hidden codes before the others figure out theirs. Originally published in Japan as Tagiron by Jelly Jelly Games, this IELLO edition brings the clean logical deduction to an international audience with elegant components and quick play time.

