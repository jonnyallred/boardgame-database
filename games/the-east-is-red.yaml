description: |
  The East is Red: The Sino-Soviet War is a 1974 SPI strategic/operational simulation originally
  published in Strategy & Tactics #42, covering a hypothetical Soviet invasion of Manchuria and
  North China set in the then-contemporary 1970s. One player commands Soviet forces attempting
  to occupy key Chinese territory; the other controls Chinese defenders resisting the invasion.
  Division and corps-level units operate under a scenario that assumes the use of tactical nuclear
  weapons and atomic demolitions within the theater of operations — an unusually explicit nuclear
  warfighting premise for a board game of the era, reflecting the heightened Sino-Soviet tensions
  of the 1960s-70s.

