description: |
  Parthenon: Rise of the Aegean is a trading and civilization-building game set in the Aegean Sea around 600 B.C. in which 3–6 players each control an island and compete to be the first to construct all their buildings, including two Great Wonders. Each player develops their island through maritime trade, accumulating resources to build villages, workshops, fortresses, shrines, and academies across four seasons of ten phases per year — representing three years of time. The game's economy of trade and development, combined with historical flavor and a race-to-completion victory condition, earned it the Origins Award for Board Game of the Year.

