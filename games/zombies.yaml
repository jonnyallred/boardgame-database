description: |
  Zombies!!! is a competitive tile-based survival game in which players build a zombie-infested
  town as they explore, racing to either collect 25 zombie kills or reach the central helipad tile.
  Combat is resolved by rolling a single die, and event cards introduce unpredictable take-that
  moments that disrupt opponents' plans. The modular tile system ensures every game produces a
  unique town layout. The original game won the 2001 Origins Award for Best Graphic Presentation
  of a Board Game.

