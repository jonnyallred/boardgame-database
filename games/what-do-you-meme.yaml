description: |
  What Do You Meme? is an adult party card game created by Elliot Tebele, Elie Ballas, and Ben Kaplan in 2016, launched via Kickstarter where it raised over $229,000. Players compete to create the funniest internet meme by pairing caption cards from their hand with a rotating photo card, with a judge determining the best combination each round. The game's format closely parallels Cards Against Humanity and was the 9th best-selling game on Amazon in 2017. It is intended for ages 17 and up due to mature content.

