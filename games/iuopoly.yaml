description: |
  I.U.opoly is an Indiana University-themed Monopoly variant published by Late for the Sky Productions in 1987, featuring Hoosier-themed properties, landmarks, and university locations instead of the standard Atlantic City streets. Players buy, trade, and develop IU properties while competing to bankrupt opponents in the classic Monopoly fashion. Like all university Monopoly editions, it serves as both a souvenir and a functional game for fans and alumni of Indiana University.

