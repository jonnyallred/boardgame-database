description: |
  Objective Moscow: The Death of Soviet Communism is a massive strategic wargame published by SPI in 1978, simulating a hypothetical multi-power invasion of a weakened Soviet Union in 1998. The game features four enormous 22"x34" hex grid maps covering most of the former USSR, continental Europe, and parts of China, plus 1,200 die-cut counters representing NATO, a united Europe, Iran, China, and other forces converging on the USSR. One player controls the Soviet defenders while multiple opponents can play the invaders in the game's multi-player scenarios, using a phased movement system with a mechanized exploitation phase. One of the largest and most ambitious wargames of the SPI era, it represents the absolute pinnacle of "monster wargame" design.

