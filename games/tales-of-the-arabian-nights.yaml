description: |
  Tales of the Arabian Nights is a legendary narrative board game designed by
  Eric Goldberg and originally published by West End Games in 1985, then reissued
  in expanded form by Z-Man Games in 2009. Players journey across an Arabian
  map encountering adventure cards and consulting the massive Book of Tales —
  a choose-your-own-adventure reference book containing 2,600 unique entries —
  to resolve encounters ranging from cursed genies to grateful thieves. Characters
  develop skills and acquire story tokens as they experience unfolding tales.
  The game is beloved for its storytelling experience and wild unpredictability
  rather than competitive strategy.

