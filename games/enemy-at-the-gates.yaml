description: |
  Enemy at the Gates is a World War II operational-level wargame designed by Dean Essig and published by The Gamers in 1994, part of the Operational Combat Series. The game covers the Soviet Operation Uranus counteroffensive that encircled the German Sixth Army at Stalingrad, as well as Manstein's subsequent "Backhand Blow" counterattack in the Fourth Battle of Kharkov. Using the detailed OCS system, players manage supply lines, plan complex operational maneuvers, and conduct combined arms warfare at the corps and division level. The OCS system is renowned among wargame enthusiasts for its realistic portrayal of logistics and operational planning.

