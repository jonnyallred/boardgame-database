description: |
  Saboteur: The Dark Cave is a standalone entry in the beloved Saboteur series designed by Frederic Moyersoen, bringing the classic hidden-role tunnel-building experience to a new setting. Players are dwarves digging through a dark cave, with most trying to reach treasure but saboteurs secretly working to thwart their progress using blocking cards and broken-tool actions. The new dark cave setting introduces fresh twists and cards while retaining the social deduction and light-hearted deception that made the original series popular. Compatible for large groups, it provides a quick and accessible hidden-role experience for casual and family gaming.

