description: |
  We the People is Mark Herman's 1993 Avalon Hill design that pioneered the card-driven wargame genre, using a deck of 64 strategy cards to control the pace and tempo of the American Revolutionary War. One player commands American forces, the other British, with each side alternating card plays that provide operations points or trigger special historical events affecting colonial political control. Drawing inspiration from Lt-Colonel Simcoe's memoirs, Herman designed a system that better approximated the war of skirmishes and raids, rather than conventional pitched battles. The game's innovative hidden card mechanic created a "fog of war" that would influence an entire generation of wargame designers, leading directly to Herman's 2010 redesign, Washington's War.

