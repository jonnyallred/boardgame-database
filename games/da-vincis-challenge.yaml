description: |
  Da Vinci's Challenge is an abstract strategy game designed by Paul Micarelli and published in 2004, played on a board based on the ancient geometric pattern of interlocking circles known as the Flower of Life. Players take turns placing pieces on the board to form nine distinct geometric patterns — triangles, diamonds, stars, circles, and others — each worth different point values from 1 to 25. The game combines straightforward placement rules with deep pattern-recognition strategy, as players balance attacking new patterns against blocking opponents. Its visually striking board inspired by Leonardo da Vinci's geometric studies gives the game a distinctive aesthetic appeal.

