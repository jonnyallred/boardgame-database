description: |
  Gumball Rally is a fast-playing card race game for 3-8 players where go-karts jockey for position by playing numbered and colored cards. Higher numbers leap over lower-numbered karts, while matching colors let a kart jump past any same-color kart ahead of it — but a hazard card drawn at the end of each turn sends all matching-colored karts to the back of the pack. The game plays through two checkpoints before a final sprint to the finish, rewarding hand reading and a bit of color-management savvy in a very accessible package.

