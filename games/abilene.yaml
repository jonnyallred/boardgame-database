description: |
  Abilene is a 1984 Western-themed board game set in 1870 when the Kansas city was the premier transshipment point for Texas cattle drives. Players take on the roles of cowboys herding cattle across the Great Plains and racing to deliver their herds to Abilene for profit. The game was originally published by Hexagames and later republished by Schmidt Spiele in 1993, and captures the competitive spirit of the cattle-drive era in a family-friendly format.

