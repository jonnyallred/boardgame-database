description: |
  Trias places players in the Triassic era as dinosaur herds compete for territory on the fragmenting supercontinent Pangaea. Using an action-point system, players move their dinosaurs and split hex tiles to cause continental drift, constantly reshaping the board and creating new landmasses. The game blends area majority with the unique mechanic of a physically changing map, as players score points based on controlling the most dinosaurs on each separated continent. Published by Rio Grande Games, Trias earned acclaim for its clever integration of theme and mechanics.

