description: |
  Now Boarding is a real-time cooperative game for 2-5 players where everyone plays simultaneously as pilots scrambling to get passengers to their destinations before frustration boils over. New passengers constantly arrive across the map while a countdown timer drives urgency, demanding constant table communication and clever hand-offs. Each plane has limited capacity and movement, so players must coordinate routes and passenger transfers on the fly — literally. Designer Tim Fowers gives the chaos structure with clear action limits, making Now Boarding a frantic but learnable co-op experience.
