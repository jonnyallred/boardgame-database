description: |
  Hues and Cues is a color-guessing party game published by The Op Games in 2020 in which one player gives one-word and two-word verbal clues to direct others toward a specific shade among 480 colors displayed on a large board. Guessers place pawns where they think the target color sits, then the active player frames a 3x3 area around the actual color, with scoring based on proximity. The game's brilliance lies in how it reveals the surprising differences in how people perceive and name colors, making every session a conversation starter. It supports up to ten players, making it ideal for large gatherings.

