description: |
  Vivid Memories is a 2022 drafting and pattern-building game designed by Brett J. Gilbert and Matthew Dunstan, published by Floodgate Games and Matagot. Players collect colourful fragments of memory from a shared pool and place them onto their personal Brain board, weaving a tapestry of connected threads. End-of-round abilities reward clever routing and grid coverage, while hidden Aspiration cards give each player a secret colour goal for bonus points. The game's tactile, meditative quality and beautiful visual design make it stand out as a gateway abstract for players who enjoy spatial puzzles and incremental engine-building.

