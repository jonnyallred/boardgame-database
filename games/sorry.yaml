description: |
  Sorry! is a classic race-and-pounce board game patented in England in 1929 by William Henry Storey, adopted
  by Parker Brothers in 1934 and now owned by Hasbro. Players draw cards rather than roll dice to move pawns
  from Start to Home, using special "Sorry!" cards to bump opponents back to the beginning. Slides, Safety Zones,
  and strategic card play add modest tactical decisions to an otherwise luck-driven chase, making it a perennial
  family favorite for generations of players.

