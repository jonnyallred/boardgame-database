description: |
  Stardew Valley: The Board Game is a 2021 cooperative game for 1-4 players designed by Eric Barone (ConcernedApe) and Cole Medeiros, faithfully adapting the beloved farming video game. Players work together to restore the Community Center by completing Grandpa's objectives and collecting six sets of resources — crops, animals, fish, foraged goods, minerals, and cooked items — before the seasons deck runs out. Each player chooses a profession and tool loadout, taking turns performing actions at locations like the mine, farm, and forest. The game captures the cozy, collaborative spirit of the video game while adding meaningful cooperative decision-making.

