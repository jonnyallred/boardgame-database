description: |
  Space Opera is a science fiction role-playing game published by Fantasy Games Unlimited in 1980, marketed as
  "the most complete science fiction role-playing game ever produced." Players choose from classes — Armsman,
  Astronaut, Tech, and Scientist — building characters across 14 characteristics using percentile dice. The game
  covers character and planet generation, human and alien races, skills, starship design (requiring physics
  knowledge to appreciate), and tactical combat rivaling dedicated wargames in detail. A complete scenario can
  take an entire weekend; the game's ambition for comprehensiveness made it both celebrated and notoriously complex.

