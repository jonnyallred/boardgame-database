description: |
  Globalissimo is a geography trivia and estimation game released in 2008, designed by Günter Burkhardt. Players compare statistics about countries around the world—ranking nations by population, land area, gross national product, and similar measures—guessing how countries stack up against each other. The game tests both factual knowledge and intuitive estimation, rewarding players who can reason about relative sizes even without precise data. Its broad geographic scope and competitive ranking mechanic make it an engaging educational game for older children and adults.

