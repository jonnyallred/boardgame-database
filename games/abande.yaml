# Description
description: |
  Abande is a two-player abstract strategy game designed by Dieter Stein and
  published by Bambus Spielverlag in 2005. The game is played with stackable
  pieces on a hexagonal board, and the central constraint is that the board must
  always remain connected — no piece or group of pieces may be isolated.

  Players place or move pieces and stacks, scoring at game end based on the
  configuration of pieces. The connectivity rule creates a unique tactical
  environment where every move must consider the global board state. Abande was
  first published digitally and in the German game design magazine Spiel & Autor
  before receiving a physical release.

