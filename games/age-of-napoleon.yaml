description: |
  A two-player historical wargame of the Napoleonic Wars covering the period 1805-1815, published by Mayfair Games and Phalanx Games in 2003. One player commands the First French Empire and its allies while the other controls the Coalition led by Great Britain, with diplomacy playing a key role alongside military campaigns. Three scenario starting points are available: 1805, 1809, and 1813, each reflecting historical alignments. The game incorporates area movement, card-driven mechanics, and dice combat to recreate the sweeping campaigns of the Napoleonic era at a strategic level.

