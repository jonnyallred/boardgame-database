# Description
description: |
  Aeroplane Chess (Fei Xing Qi in Chinese) is a Chinese cross-and-circle board
  game similar to the Indian game Pachisi and the Western game Ludo. Developed in
  the early-to-mid 20th century, the game features airplane-shaped playing pieces
  racing around a cross-shaped track back to their home base.

  Players roll dice to move their four airplanes from the starting area around
  the board, aiming to get all pieces home before opponents. Like Ludo, players
  can send opponents' pieces back to start by landing on their space. Aeroplane
  Chess is enormously popular in China and across East and Southeast Asia, and
  has been adapted into numerous digital formats.

