description: |
  Ferris Bueller's Day Off is an art-print board game created by illustrator Max Dalton as a tribute piece for the John Hughes retrospective at Gallery 1988 in 2011. The game translates the plot of the beloved 1986 film into a conventional board game format, with players racing through Chicago landmarks and events from the movie. Rendered in a charming retro illustrative style, it is more a collectible art piece than a commercial game, sold through galleries like Spoke Art rather than traditional retail channels.

