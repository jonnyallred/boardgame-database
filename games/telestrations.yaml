description: |
  Telestrations is a hilarious party game combining Telephone and Pictionary,
  published by The Op. Each player starts with a secret word, draws it in their
  sketchbook, then passes the book to the next player who guesses what the
  drawing depicts and writes their guess. The book continues around the table
  alternating between drawings and guesses, so the original word inevitably
  transforms into something completely different by the time it returns to its
  owner. Players share their books at the end to reveal the comedic evolution
  of each word. The game excels at generating genuine laughter regardless of
  artistic ability, making it a go-to party staple for all ages.

