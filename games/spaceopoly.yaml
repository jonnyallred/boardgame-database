description: |
  Spaceopoly is a Monopoly-style space travel game published by Valen Brost Game Co., described as a revised
  and simplified edition of Solarquest. Players fly spaceships around the solar system, purchasing planets and
  moons and collecting rent when opponents land on their properties. The game adds laser combat that can disable
  rivals and offers multiple victory conditions — fulfilling a secret mission, being last on the board, or having
  the most assets — beyond simple bankruptcy elimination. Its accessible rules and space theme make it a family-
  friendly educational game about the solar system.

