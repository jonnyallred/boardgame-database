description: |
  Takenoko is a family strategy game designed by Antoine Bauza and published by
  Bombyx and Matagot in 2011. Players tend an imperial Japanese garden for the
  Emperor's giant panda, placing hexagonal terrain tiles, irrigating plots to
  grow colored bamboo, moving the gardener to nurture growth, and positioning the
  panda to eat bamboo segments. Each turn players choose from a set of actions
  while secretly pursuing objective cards for victory points. The game won the
  2012 As d'Or - Jeu de l'Année in France and is celebrated for its beautiful
  components and accessible yet strategic gameplay.

