description: |
  Dicke Kartoffeln (Big Potatoes) is a German potato farming economic game designed by Frank Nestel and Doris Matthäus, published by Abacus Spiele at the Spiel 1989 fair in Essen. Each player manages a farm of five fields, navigating crop rotation, market prices, over-fertilization, pests, and weather over multiple growing seasons. The game offers two distinct winning conditions — financial victory and an environmental win — rewarding either capitalist efficiency or sustainable farming practices. It was one of the few early games by the Doris & Frank design duo published by a larger publisher rather than self-published.

