description: |
  Hidden Leaders is a fast card game combining hidden-role deduction with tableau building.
  Two factions—light and dark—fight for dominance through heroes played to a shared track,
  while each player secretly backs one faction's victory. Players simultaneously build their
  own tableau of heroes while influencing the tug-of-war track, but must be careful not to
  reveal their allegiance prematurely. The winning condition depends on both the faction
  that wins the war and which players were secretly supporting it, creating layered social
  deduction in a surprisingly compact package.

