description: |
  Linq is a social deduction word game in which one pair of secretly connected players must find each other by giving one-word clues related to their shared secret word — without revealing it to the other players. All players give a one-word clue, then everyone votes on who they think is linked. The linked pair scores points for finding each other while hiding their connection; the others score for unmasking them. This compact and quick design rewards clever misdirection and reading opponents, and plays well as a warm-up or party game. Its simplicity makes it highly accessible, though experienced groups will exhaust the word list quickly.

