description: |
  Ticket to Ride: Rails & Sails expands the series to cover both land and sea on a double-sided board, with one side depicting the entire world map and the other the Great Lakes of North America. Players manage two separate decks — train cards for rail routes and ship cards for sea routes — and must also build harbors to connect land and water networks. The added complexity of dual resource management and the ambitious global or Great Lakes scale make this one of the most strategically rich standalone entries in the Ticket to Ride family.

