description: |
  KampfPanzer: Armored Combat, 1937-40 (German for "battle tank") is a 1973 SPI wargame designed by Jim Dunnigan simulating the earliest tank-versus-tank combat engagements, featuring various combinations of tanks, infantry, and artillery from the first years of armored warfare. Originally published as a pull-out game in Strategy & Tactics magazine No. 41, it was also released in a flat-pack box. The game introduced the SiMov simultaneous movement system, which was criticized as too cumbersome; it placed 136th out of 202 games in SPI's 1976 North American popularity poll, leading SPI to abandon the system. A historical curiosity for wargame design history.

