description: |
  Candamir: The First Settlers is the debut entry in the Catan Adventures series, designed by Klaus Teuber and published in 2004. Players take on the roles of shipwrecked settlers on Catan, exploring the island to gather raw materials and natural resources for building and brewing, while encountering wild animals and gaining experience that improves their character's strength, intelligence, or charisma. Unlike other Catan titles, Candamir is a semi-cooperative adventure game focused on character progression and exploration rather than competitive building, bringing an RPG-lite feel to the Catan universe.

