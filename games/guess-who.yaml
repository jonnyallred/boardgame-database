description: |
  Guess Who? is a two-player deduction game where each player draws a mystery face card and must identify their opponent's character before their own is revealed. Players take turns asking yes/no questions about physical attributes — hair color, glasses, hats, facial hair — and eliminate possibilities by folding down faces on their board. The game distills the parlor tradition of 20 Questions into a physical, tactile format accessible to young children, and has been a perennial family classic since its 1979 Milton Bradley release.

