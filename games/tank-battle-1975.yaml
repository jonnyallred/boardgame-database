description: |
  Tank Battle is a two-player strategy game published by Milton Bradley in 1975,
  combining elements of Battleship and Stratego in a World War II armored combat
  setting. Players secretly deploy tanks, anti-tank guns, fuel and ammunition
  dumps, and mines on their half of the board, then attempt to outguess and
  outmaneuver their opponent's forces. Each turn players target positions where
  they believe enemy tanks will move, with special one-time shots providing
  additional tactical options. The game was only produced in 1975 and 1976 before
  being discontinued, making complete sets increasingly collectible.

