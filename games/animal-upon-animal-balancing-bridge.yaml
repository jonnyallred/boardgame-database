description: |
  Animal Upon Animal: Balancing Bridge is a 2010 standalone stacking game by HABA that expands
  upon the original Animal Upon Animal formula with a central cardboard bridge as the balancing
  surface. Players are dealt objective cards showing combinations of three animals they must place
  to score points, adding a strategic layer absent from the base game.

  The 29 wooden animals feature various ridges and bumps to provide grip during precarious
  balancing acts, and the bridge's curved surface creates fresh spatial challenges compared to
  the crocodile base of the original. It can be played independently or combined with other
  HABA Animal Upon Animal titles for extended play.

