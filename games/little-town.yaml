description: |
  Little Town is a family-weight worker placement and tile placement game for 2-4 players, designed by the husband-and-wife team of Shun and Aya Taguchi. Over four rounds, players place workers onto a central board to collect adjacent resources — wood, stone, fish, and wheat — and use those resources to build buildings on the town board, which in turn generate new resources and points when workers land nearby. The elegant economy of workers-trigger-buildings creates satisfying chain reactions, while a double-sided board offers variety between plays. Quick to learn but rewarding to master, Little Town is a gateway Euro that distills worker placement into its most approachable form.

