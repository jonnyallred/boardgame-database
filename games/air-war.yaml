description: |
  An ultra-complex modern tactical air combat simulation published by SPI in 1977, rated at maximum complexity (100%) on the box. Each turn represents 2.5 seconds of real time, and players must essentially "fly" their aircraft, managing speed, altitude, turning stress, energy management, and weapons systems for 1970s-era jet fighters. The game contains ten scenarios and demands mastery of advanced aeronautical concepts to play effectively. A finalist for Best Tactical Game at the 1978 Origins Awards, Air War remains one of the most technically demanding wargames ever published.

