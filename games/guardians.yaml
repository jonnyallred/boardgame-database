description: |
  Guardians is a two-player tactical superhero card game (with a 2-on-2 variant) designed by Callin Flores and published by Plaid Hat Games in 2018. Each player drafts a team of three heroes from a random selection, then battles for control of the city across multiple zones. Knocked-out heroes are restored rather than eliminated, keeping the action intense throughout without snowballing defeats. Asymmetric hero abilities and shifting zone priorities give the game a fresh feel each session.

