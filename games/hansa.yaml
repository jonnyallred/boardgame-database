description: |
  Hansa is a route-building and trading game set among Hanseatic League merchants sailing the Baltic Sea in medieval times, designed by Michael Schacht and published by ABACUSSPIELE in 2004. The active player takes control of a shared boat and pays to move it port by port, choosing to buy goods, sell goods, or establish trading posts at each stop — while opponents can only react at visited ports. Players compete to gather sets of goods and translate them into victory points, with timing and position critical since the boat is shared and not owned. Its elegant use of action points and straightforward rules make it a popular gateway Euro.

