description: |
  Mindbug: First Contact is a two-player dueling card game co-designed by Magic: The Gathering creator Richard Garfield, published by Nerdlab Games in 2022. Each player has ten creature cards — five in hand and five in a deck — and tries to reduce the opponent's life total to zero by summoning hybrid monsters. The game's defining mechanic is the Mindbug: each player holds two single-use Mindbug cards that can instantly steal control of any creature the opponent plays at the moment of summoning, turning your own best cards into potential weapons for the enemy. This creates a mind-game of bluffing and baiting, where playing your strongest card at the wrong moment can be catastrophically self-defeating.

