description: |
  Seasons is a tactical card-and-dice game set in a magical tournament in which players first draft a 9-card hand split into three yearly groups, then roll season-specific dice to harvest elemental energies and power their summoned enchantments. Each die unchosen by the active player advances the time track, creating a clever tension between taking resources and accelerating the passage of time. The interplay between drafted combos, dice selection, and the changing resource availability across four seasons rewards careful planning and makes each game feel distinctly different.

