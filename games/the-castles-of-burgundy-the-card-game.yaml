description: |
  The Castles of Burgundy: The Card Game is a streamlined card adaptation of Stefan Feld's acclaimed tile-laying game for 2–4 players. Players draft cards representing settlements, mines, castles, and other domains, playing them into their personal estates to score points from sets and completed regions. The core engine-building and set-completion satisfactions of the original are preserved in a compact card format that plays in under 30 minutes. While it lacks the dice-drafting tension of the board game, the card game offers a fast and accessible entry point to the Burgundy mechanisms and a satisfying filler for fans of the original.

