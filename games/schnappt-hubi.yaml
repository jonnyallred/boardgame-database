description: |
  Schnappt Hubi! is a cooperative children's deduction game designed by Steffen Bogen and published by Ravensburger in 2011, winner of the Kinderspiel des Jahres 2012. Players first build a 3D house labyrinth in the dark, then cooperatively chase a ghost named Hubi through the rooms using an electronic compass device that responds to button presses to indicate what kind of wall is in each direction. Different animals can pass through different wall types, requiring teamwork to navigate the maze and corner the ghost before it escapes.

