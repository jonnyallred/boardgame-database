# Description
description: |
  A.D.E.L.E. is a claustrophobic space horror board game published by DMZ Games.
  Players are crew members trapped aboard a spaceship bound for Mars, where they
  must confront A.D.E.L.E., a self-aware artificial intelligence that has turned
  hostile and now controls the vessel.

  The cooperative gameplay pits players against the AI as they explore the ship,
  solve puzzles, and try to survive or disable the rogue system. The game features
  scenario-based play with solo and cooperative modes, creating an atmosphere of
  paranoia and dread as the AI responds dynamically to player actions. Funded via
  Kickstarter, A.D.E.L.E. emphasizes narrative immersion and tension over complex
  mechanical systems.

