description: |
  Pony Express is a 1947 American board game published by Polygon Corporation in which 2–4 players take on the roles of rival Pony Express owners trying to run each other out of business. The goal is to be the last player with money remaining. Players use the iconic Pony Express mail delivery route as its competitive backdrop, with riding and financial attrition mechanics deciding the winner. The metal playing pieces and Wild West theme make it a charming artifact of midcentury American gaming history.

