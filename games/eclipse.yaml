description: |
  Eclipse: New Dawn for the Galaxy is a sprawling 4X science fiction strategy game designed by Touko Tahkokallio and published by Lautapelit.fi in 2011. Players command unique alien or human civilizations, building interstellar empires through resource management, technological advancement, territorial expansion, and fleet combat across a modular hex-tile galaxy. The game features over 100 technology tiles across population, fleet, and science tracks, allowing deep ship customization and strategic specialization. Eclipse is celebrated for delivering a comprehensive 4X experience in a manageable session length compared to other games of its scope, and was reimplemented as Eclipse: Second Dawn for the Galaxy in 2020.

