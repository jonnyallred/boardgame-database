description: |
  Doorways to Adventure is a VCR board game published by Pressman Toy Corporation in 1986, designed by Sid Sackson as part of an early wave of interactive videotape games. Players use a VHS tape featuring classic copyright-free Hollywood adventure footage as an interactive game element while following along on a board. The companion release Doorways to Horror used the same format with horror film footage. Both games represent a distinctive artifact of the mid-1980s VCR game craze, combining traditional board gameplay with a television screen as a dynamic game component.

