# Description
description: |
  Advanced Third Reich (A3R) is a grand strategic board wargame designed by
  Bruce Harper and published by Avalon Hill in 1992. It simulates the European
  and African theaters of World War II at the strategic level, covering the entire
  conflict from 1939 to 1945.

  Players control the major powers of the conflict — Germany and Italy on the
  Axis side, and Britain, France, the Soviet Union, and the United States on the
  Allied side. The game uses a detailed economic system for production, a
  sophisticated combat model, and rules for diplomacy and political events.
  A3R is one of the most comprehensive and highly-regarded WWII strategic
  simulations ever produced, though its immense scope demands a serious time
  commitment and experienced players.

