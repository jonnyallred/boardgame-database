description: |
  High Frontier is a complex science-fiction board game designed by Phil Eklund and published by Sierra Madre Games in 2010, based on Gerard K. O'Neill's vision of space colonization using real near-future technology. Players compete as space agencies or private corporations racing to industrialize the solar system by acquiring patents for rockets, robotics, and refineries, then launching expeditions to asteroids, moons, and planets to establish factories. The game is renowned for its extreme rules complexity and scientific realism, with a technology deck drawn from actual physics and aerospace research. A fourth edition, High Frontier 4 All, was published in 2021 by ION Game Design.

