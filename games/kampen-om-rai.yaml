description: |
  Kampen om Rai is a two-player abstract strategy game in which each player has a hidden treasure concealed within one of their armies, with the objective of getting both treasures to Rai — the central capital — and holding them there for three consecutive turns. Players maneuver armies through varied terrain that provides different advantages to different unit types, creating a spatial strategy game of positioning, deception, and terrain exploitation. An obscure Norwegian abstract design with hidden-information elements adding uncertainty to the strategic positioning challenge.

