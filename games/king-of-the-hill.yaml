description: |
  King of the Hill is a 1960 children's board game by Schaper Toys featuring a large 3D plastic mountain that players race their marble pieces to the top of. Instead of dice, players use a "tilt-score" mechanism to determine how many spaces they can move upward, while holes (traps) in the mountain paths can swallow marbles, causing them to roll through the mountain's interior and exit from lower caves. The game's distinctive physical component — the hollow plastic mountain with hidden internal channels — made it a memorable childhood staple, and it was re-released by Winning Moves in 2006.

