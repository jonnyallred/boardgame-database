description: |
  Siemens Grand Prix Game 2004 is a promotional Formula One racing board game produced in conjunction with Siemens' sponsorship of the McLaren F1 team during the 2004 season, supporting 3 to 6 players. Released as a branded merchandise item rather than through standard retail channels, the game simulates the excitement of a Grand Prix race using dice and a track board. Little documentation of the game's specific mechanics survives in public sources, making it a rare collectible associated with the early 2000s F1 sponsorship era.

