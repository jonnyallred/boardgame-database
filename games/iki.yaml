description: |
  Iki is a worker placement and set collection game designed by Koota Yamada, set in the bustling markets of Edo-period Tokyo (Japan). Players hire artisans who sell goods and attract customers, moving them around a large rondel that doubles as the town map, earning bonuses when visiting rival shops and eventually retiring artisans to their player boards for end-game scoring. A fire mechanic periodically threatens the market, requiring players to contribute firefighting strength or risk losing progress. The game's elegant rondel mechanism and beautiful artwork make it a standout Euro with a distinctive Japanese aesthetic.

