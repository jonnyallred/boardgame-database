description: |
  La Belle Alliance: The Battle of Waterloo is a 1976 SPI board wargame simulating Napoleon's final battle on June 18, 1815, published as one of four games in the Napoleon's Last Battles "quadrigame." The game pits Napoleon's French Armée du Nord against Wellington's Allied forces and Blücher's Prussian army, capturing the desperate French attacks on Wellington's ridge position and the critical timing of Prussian reinforcement. Using the shared rules system of Napoleon's Last Battles, it allows for varied play from solo scenarios to head-to-head command. The quadrigame format made it highly efficient to produce alongside Ligny, Wavre, and Quatre Bras.

