description: |
  RWBY: Combat Ready is a cooperative combat board game for 2-5 players based on the popular animated web series RWBY, published by Arcane Wonders in 2018. Players take on the roles of series protagonists Ruby, Weiss, Blake, Yang, or Penny, each with unique asymmetric abilities, and must work together to defeat powerful villains including Roman Torchwick, Adam Taurus, and Cinder Fall. The game captures the action-oriented combat and teamwork themes of the show through hand management and character ability interactions, with players combining their heroes' powers to overcome escalating boss challenges. Expansions have expanded both the hero roster and villain lineup for fans of the series.

