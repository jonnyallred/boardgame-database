description: |
  The Fury of the Norsemen is a 1980 Metagaming Concepts microgame (MicroHistory #4) by Kevin
  Hendryx simulating Viking raids of the 9th and 10th centuries on Western European settlements.
  One player controls Viking raiders seeking to plunder, while the other defends with soldiers
  and villagers. Rules cover plundering, capture, berserker rages, torching settlements, leader
  units, missile combat, and a special Divine Wrath rule affecting clergy — giving the game
  surprising tactical depth in a compact 126-counter format with a modest 14" x 12" map. The
  asymmetric attacker-defender structure and varied Viking raider abilities make it a tense and
  thematically evocative microgame.

