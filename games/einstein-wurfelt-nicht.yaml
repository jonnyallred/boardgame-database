description: |
  EinStein würfelt nicht! (German for "Einstein doesn't roll dice") is a two-player abstract game of chance and strategy designed by mathematician Ingo Althöfer and published in 2004. Each player has six numbered cubes (1-6) on a 5x5 grid, and each turn a die roll determines which cube the active player must move toward the opponent's corner. The blend of dice luck with genuine tactical choice — selecting which of several valid cubes to move — gives the game its distinctive character. The game was the official game of the Einstein Year 2005 exhibition in Germany and has been the subject of academic AI research.

