description: |
  The Great War is Richard Borg's adaptation of his acclaimed Commands & Colors system to the
  Western Front of World War I, published by PSC Games as the Centenary Edition in 2017. Players
  use a hand of command cards to activate units in the left, center, or right sections of the
  hexagonal battlefield, then roll custom dice to resolve combat. The trench warfare setting required
  modifications to the classic C&C formula — units hunker into trenches for protection, artillery
  barrages soften positions before assaults, and barbed wire slows advances. Each scenario recreates
  a historical engagement with asymmetric forces and objectives, rewarding tactical finesse over
  brute-force pushing.

