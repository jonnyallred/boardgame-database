description: |
  Destruction of Army Group Center (subtitled "The Soviet Summer Offensive, 1944") is a board wargame published by Simulations Publications Inc. (SPI) in 1973 in Strategy & Tactics magazine #36, designed by James Dunnigan. The game simulates Operation Bagration, the massive Soviet offensive of June 1944 that shattered Germany's Army Group Center and began the final push toward Berlin. Using a 10-mile per hex map with two-day turns and 200 operational counters, it features asymmetric forces — Soviet armies versus German divisions — reflecting the historical imbalance. Decision Games later published a revised second edition in 2009 under the World at War magazine label.

