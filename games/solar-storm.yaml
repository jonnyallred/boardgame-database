description: |
  Solar Storm is a cooperative hand-management survival game for 1-4 players designed by Ayden Lowther, winner of the UK Games Expo Award for Best Strategic Card Game in 2020. Players are crew members aboard a ship caught in the sun's gravitational pull after a solar flare has disabled the energy core. On each turn players may take up to 3 actions — moving through the ship's areas, using resource cards to repair damage, diverting power, or sharing resources with crewmates. Win by restoring power to all areas before the resource deck runs out or an area takes fatal damage.
