description: |
  Sune och ryska posten is a 1992 Swedish children's board game based on the classic Scandinavian party game "Ryska posten" (Russian Post), a social elimination game in which players pass a secret message or token around without the recipient knowing it is coming. The board game adaptation is tied to the popular Swedish "Sune" children's book and film character, packaging a familiar social game in a branded family product. Detailed mechanical and publisher information is limited due to the game's regional, domestic Swedish market release.

