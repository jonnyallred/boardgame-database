description: |
  Spots is a push-your-luck dice game designed by Alex Hague, Jon Perry, and Justin Vickers, published by CMYK
  in 2022. Players roll dice and place them onto dog cards whose spots match the die pips — complete a dog by
  filling all its spots to claim it. Dice that cannot be placed are buried in your yard, and burying too many
  causes a bust that loses your progress; be the first to complete six dogs to win. The charming dog illustrations
  by John Bond and the elegant push-your-luck tension have made Spots a beloved modern filler.

