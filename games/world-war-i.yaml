description: |
  World War I: 1914–1918 is a two-player strategic-level wargame published by SPI in 1975, simulating the First World War with one player controlling the Triple Entente and the other the Central Powers. Originally released as a pull-out game in Strategy & Tactics issue 51, the compact design — just 100 counters and 8 pages of rules — belies its strategic depth, with critics praising its ingenious rules, short playing time, and emphasis on resource management. The game captures the essential tension of the Great War's grinding attrition and coalition management in an unusually accessible format.

