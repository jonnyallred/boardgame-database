description: |
  Spyrium is a worker-placement and engine-building game by William Attia, published by Ystari Games and Asmodee in 2013, set in a steampunk Victorian England where the mineral Spyrium has revolutionized industry. Players lead industrial conglomerates, recruiting workers, constructing factories, and patenting techniques over six turns to score victory points. The unique placement mechanic has workers placed between face-up cards in the market row; to take an action, a player must remove a worker and pay resources based on how many other workers neighbor the card. This creates elegant tension between workers claiming space and workers converting that adjacency into powerful actions.

