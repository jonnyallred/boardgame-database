description: |
  Freiburg (subtitled "3–9 August 1644 – Conquest of the Rhine Valley") is a board wargame published by SPI in 1976, simulating the Battle of Freiburg during the Thirty Years' War. Originally one of four games packaged together in SPI's Thirty Years War quadrigame, it was also sold as a standalone folio game. Critics generally regarded Freiburg as the weakest entry in the Thirty Years War set, describing it as a series of grinding attritional battles with limited strategic variety. The shared quadrigame rules system kept learning the game accessible for existing SPI wargamers.

