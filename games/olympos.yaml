description: |
  Olympos is a civilization-building board game set in ancient Greece and the Aegean coast of Turkey in which players lead tribes competing to colonize territory at the cradle of Greek civilization. Players spend action points to expand their territory, advance along a technology tree, and seek favor from the Olympian gods who grant powerful special abilities. The time track mechanic drives the game's pace — players can take fewer actions by moving further ahead on the timeline, but may miss opportunities as the era shifts around them. Designed by Philippe Keyaerts and published by Ystari Games in 2011, Olympos offers a compact and elegant civilization experience driven by careful time management and territorial control.

