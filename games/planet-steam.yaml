description: |
  Planet Steam is a steampunk-themed economic strategy game for 2–5 players in which entrepreneurs race to claim plots in a steam-powered boomtown, extract resources using specialized tank and converter equipment, and profit from a volatile open market. Players assemble equipment networks to harvest energy, ore, and quartz from steam vents, then buy and sell on a fluctuating market, with the richest entrepreneur winning after a fixed number of rounds. The game features a large board, high-quality components with strong steampunk aesthetics, and an interconnected economy of resource extraction, market dynamics, and equipment building that rewards efficient planning and market timing.

