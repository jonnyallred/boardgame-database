description: |
  Endodoi is a traditional mancala board game played by the Maasai people of Kenya and Tanzania. The game is closely related to the Yoruba game Ayoayo and is played on a wooden board with 2 rows of 6 to 10 holes, using seeds, stones, or beans as counters. Players take turns sowing and capturing seeds according to traditional mancala rules, with the goal of capturing more seeds than the opponent. Endodoi boards are carved from wood, often two feet long, and the game has been played for generations as part of Maasai culture. The year given is approximate, as this is an ancient traditional game without a recorded invention date.

