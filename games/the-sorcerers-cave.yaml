description: |
  The Sorcerer's Cave is a 1978 fantasy dungeon-exploration game designed by Terence Peter Donnelly and published by Ariel Productions and Gibsons Games, inspired by early Dungeons & Dragons. Players control parties of adventurers exploring a multi-level dungeon that is randomly generated by drawing area cards, creating a different cave layout every session. Encounters include special rooms, traps, monsters, allies, magical items, and treasures, with the game supporting solo, cooperative, and competitive modes. It is recognized as a pioneering influence on the modern dungeon crawler genre, predating many of the tile-laying and deck-driven dungeon games that followed.

