description: |
  Fiction is a Wordle-inspired word guessing game for 2-8 players with an asymmetric twist: one player is the "Lie-brarian" who chooses a secret five-letter word drawn from cards featuring passages from classic literature (A Christmas Carol, The Great Gatsby, Pride and Prejudice, and more). The remaining players work cooperatively to guess the word within 10 guesses or 20 minutes, but the Lie-brarian must tell exactly one lie per guess report about whether a letter is correct or in the wrong position. The guessing team holds Fact/Fiction tokens that can force the Lie-brarian to tell the truth, creating cat-and-mouse tension across two halves of play.

