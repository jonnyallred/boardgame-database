description: |
  Rumis (later rebranded as Blokus 3D) is a three-dimensional abstract strategy game designed by Stefan Kögl in which players place polycube pieces on a shared board, building up a structure with the goal of having the most of their color visible from the top view at game's end. Pieces cannot leave empty space underneath them when placed, creating a puzzle of spatial reasoning as players stack and compete for the most visible surface area. Unlike flat Blokus, the 3D format adds height as a strategic dimension, allowing players to bury opponents' pieces or claim aerial territory. The Mayan-themed original became Blokus 3D when the Blokus brand proved more commercially powerful.

