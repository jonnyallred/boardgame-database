description: |
  Ashtapada is one of the oldest known board games, played in India as early as the
  5th or 6th century BC on an 8x8 grid that predates and likely influenced the development
  of chess. The board features special marked squares called "castles" where pieces are
  safe from capture. Players use cowrie shells as dice and move pieces clockwise around
  the board, seeking to enter and exit the central castle. The game's exact rules are
  only partially reconstructed from historical sources, as it was condemned in early
  Brahman texts and gradually fell out of widespread practice. It is considered the
  direct ancestor of Chaturanga, which itself became chess.

