description: |
  Cambrai, 1917: The First Blitzkrieg is a two-player hex-based wargame designed by David C. Isby and published by Rand Game Associates in 1974, simulating the pivotal November 1917 Battle of Cambrai — the first major use of tanks in warfare. One player controls the Allied attackers and the other the German defenders, using counters on a mapboard to recreate or revise the battle's outcome. The game was later revised and republished in 2012 by Microsoft Design Group with a larger map and doubled counter count.

