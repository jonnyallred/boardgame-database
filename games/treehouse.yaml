description: |
  Treehouse is an abstract dice game published by Looney Labs in 2006 in which players attempt to move and rearrange their set of three colorful pyramid pieces to match the configuration of a central "House" shared by all players. A custom six-sided die determines which manipulation action is available each turn — Tip, Swap, Dig, Aim, Hop, or Wild — and the first player to match their trio to the House wins. Designed by Andy Looney and winner of the 2006 Origins Award for Best Board Game, Treehouse serves as the gateway to the broader Looney Pyramids game system.

