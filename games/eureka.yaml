description: |
  Eureka is a family deduction and pattern-recognition game published by Ravensburger in which players try to reconstruct hidden arrangements or match configurations before their opponents. The game features simple, accessible rules that make it suitable for a wide age range, with light strategic elements added through hand management and observation. Its compact format and short play time make it a solid choice for family game nights. The game is sometimes listed as Eureka! in various regional editions.

