description: |
  duck! duck! SAFARI! is a 2009 standalone game from APE Games that transplants the rubber duck racing system of duck! duck! Go! into an exotic jungle safari setting. Players guide safari animal duckies — led by the jungle explorer "Ducktor Livingstone" — through five original mini-games. The game uses programmed movement cards like its predecessor and supports up to six players. It is compatible with duck! duck! Go! components and was published alongside the original game to expand the duck racing universe.

