description: |
  La Bataille d'Auerstædt is a 1977 Napoleonic wargame by Marshal Enterprises designed by Monte Mattson, Ed Wimble, and Dennis A. Spors, simulating the October 1806 Battle of Auerstadt in which Davout's single corps remarkably defeated the main Prussian army under the Duke of Brunswick. First released in a ziplock bag, a revised second edition appeared in 1984, and Clash of Arms later re-released it in 1991 after acquiring the entire La Bataille series. Despite early criticism of its rules clarity and production values, the game represents an important early entry in the landmark La Bataille series of Napoleonic simulations.

