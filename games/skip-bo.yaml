description: |
  Skip-Bo is a sequencing card game created by Minnie Hazel "Skip" Bowman in Brownfield, Texas in 1967, and later acquired by Mattel. Players draw from personal stockpiles and try to play cards in numerical order from 1 to 12 onto shared building piles, using wild Skip-Bo cards to fill gaps. The objective is to be the first to empty your stockpile, and the game's blend of luck and light strategy has kept it popular for decades as one of the most-played card games in the world.

