description: |
  Riddle of the Ring is an early board game adaptation of J.R.R. Tolkien's The Lord of the Rings, first published in 1977 by Fellowship Games and later acquired and republished with improved production by Iron Crown Enterprises in 1982. Players take on the roles of various factions from Middle-earth competing across a map of Tolkien's world in a strategy game of area control and conflict. The game was one of the first licensed Tolkien board games and reflects the era's wargame design sensibilities. Its historical significance lies in being an early attempt to translate the epic scope of The Lord of the Rings into tabletop form.

