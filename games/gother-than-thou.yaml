description: |
  Gother Than Thou: The Most Pretentious Card Game Ever Made is a 55-card game of backstabbing and one-upmanship within the gothic subculture, designed by R. Hunter Gough and published by Savant Garde Entertainment in 2000. Players accumulate Goth Points through cards representing cloves, absinthe, eyeliner, and boots, while combating opponents' cards for Sickness, Debt, and the dreaded Visit from Mom. Its sharp satirical wit earned it a spot on the 2001 Games 100 list and a nomination for the 2002 Origins Award for Best Graphic Presentation of a Card Game. A beloved niche party game for goths and those who love to laugh at them.

