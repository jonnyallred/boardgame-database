description: |
  The Taliesin Master Game is a three-dimensional abstract strategy game invented
  by Ronald William Astle and distributed by Talforce Ltd. in 1981. Played on
  three stacked circular boards connected by a central "black hole" that allows
  pieces to transfer between levels, players control nine types of gold and silver
  pieces, each with unique movement rules. The objective is to capture the
  opponent's Life Force piece. The game was available in a Starter version, a
  full Master Game with all three intricately designed circular levels, and a
  luxury Executive version with glass boards. It was sold at Harrods and Hamleys
  and marketed through Mensa magazine.

