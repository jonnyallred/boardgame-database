description: |
  Ligny: Incomplete Victory is a hex-and-counter wargame covering the Battle of Ligny on June 16, 1815, the day before Waterloo, where Napoleon defeated the Prussian Army under Blücher. Players command the French Imperial Army attempting to decisively destroy the Prussians before they can link with Wellington's Anglo-Allied forces, or the Prussians trying to hold long enough to conduct an orderly retreat. The game explores the what-ifs of the campaign's opening — could Napoleon have won decisively enough to alter the outcome at Waterloo? The title refers to the incomplete nature of the French tactical victory that still left the Prussians able to march to Wellington's aid two days later.

