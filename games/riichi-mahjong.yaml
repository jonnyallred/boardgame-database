description: |
  Riichi Mahjong is the Japanese variant of the ancient tile-drawing game, adapted and standardized in Japan in the early 20th century. Four players draw and discard tiles from a 136-tile set, working to assemble a winning hand of four sets and one pair while tracking what opponents are discarding. The signature "riichi" declaration — announcing a complete hand minus one tile as a scored wager — adds unique tension and commitment mechanics not found in other mahjong variants. Hand scoring through yaku (valid patterns) makes it one of the most strategically rich tile games in the world.
