description: |
  Chinese Checkers is a popular abstract strategy game invented in Germany in 1892 as Stern-Halma (Star Halma), a star-shaped variant of the American game Halma. Despite its name, the game has no historical connection to China — the "Chinese" branding was added by J. Pressman & Co. in 1928 as an exotic marketing hook for the American market. Played on a six-pointed star board, each player races their colored marbles from their starting corner to the opposite corner by moving or hopping over other pieces. Up to six players can play simultaneously, making it one of the most accessible and widely played family board games in history.

