description: |
  Rex: Final Days of an Empire is a game of diplomacy, conquest, and betrayal for 3-6 players set in the crumbling imperial city of Mecatol Rex in the Twilight Imperium universe. Players control asymmetric alien civilizations, each with unique racial abilities, competing to gain control of the city through area control, negotiation, and tactical combat. Like the classic Dune board game it adapts, Rex features a simultaneous dial-based battle system and rich diplomatic metagame where alliances shift and betrayals determine victory as much as military might. Its depth comes from bluffing, deal-making, and the tension of a city collapsing around competing factions, making it a landmark negotiation game.

