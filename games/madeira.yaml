description: |
  Madeira is a heavy economic euro game set on the 15th-century Portuguese island of Madeira,
  where players develop their estates, trade goods, and manage Guild and Pirate dice to take
  actions. The innovative dice-as-worker system means players must distribute dice among
  characters, with higher-value dice costing more Guild influence while Pirates threaten
  to disrupt operations. The layered decision-making across multiple action types, deep
  resource management, and Ian O'Toole's striking artwork combine to make Madeira a
  demanding and rewarding experience for dedicated Euro enthusiasts.

