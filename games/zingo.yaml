description: |
  Zingo! is a pre-reader bingo game in which players use a special Zingo Zinger device that slides
  to reveal tiles one at a time. Players race to match the revealed tiles to pictures and words on
  their challenge cards. The first to complete their card shouts "Zingo!" to win. Multiple levels of
  play accommodate early readers and non-readers alike, and the distinctive Zinger mechanism
  provides the physical excitement of the reveal. It has won numerous toy awards including the
  Oppenheim Gold and Parents' Choice Award.

