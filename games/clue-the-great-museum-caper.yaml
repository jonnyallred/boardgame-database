description: |
  Clue: The Great Museum Caper is a semi-cooperative asymmetric spin-off of the classic Clue franchise, published by Parker Brothers in 1991. One player secretly acts as a thief navigating a 3D model art museum, trying to steal three valuable paintings without being caught, while the other players cooperate as detectives using video cameras, motion detectors, and line-of-sight to track down the thief. The thief can deactivate cameras or cut museum power to mask movements. With hidden movement mechanics and asymmetric play, it anticipated later games like Scotland Yard and Letters from Whitechapel in its genre.

