description: |
  The Crew: Mission Deep Sea is a cooperative trick-taking card game and the sequel to the award-
  winning The Crew: Quest for Planet Nine. Players are a submarine crew searching for the lost
  continent of Mu, and must complete task cards by winning specific tricks in a specific order,
  all while communicating under tight restrictions. New mechanics introduced include distress
  signals that allow limited communication, and tasks that must be completed in strict sequence.
  With 32 increasingly challenging missions, the game builds on its predecessor's beloved formula
  while adding greater complexity and variety. It won the 2021 Spiel des Jahres.

