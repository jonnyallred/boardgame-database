description: |
  Catan: New Energies is a standalone 2024 game designed by Klaus Teuber and Benjamin Teuber that grafts an energy and climate theme onto the familiar Catan resource-gathering, trading, and building framework. Players manage energy production starting with cheap but polluting fossil fuels, and can invest in renewable energy sources to reduce pollution levels; pollution events disrupt resource production for all players, creating collective incentive to transition to clean energy. The game adds power plants and environmental events as new strategic levers, making it both a modern Catan evolution and a subtle commentary on sustainable development.

