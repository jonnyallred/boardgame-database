description: |
  Hot Spot is a wargame microgame designed by W.G. Armintrout and published by Metagaming Concepts in 1979 as part of their pioneering small-box microgame format. Players command forces in a compact tactical scenario where positioning and resource allocation determine victory. As a microgame, it was designed to be learned quickly and played in under an hour, making it an accessible entry point to wargaming.

