description: |
  One-Player Chess is a solitaire puzzle game in which all pieces on the board are the same color, and the player must move them so that pieces capture each other until only one piece remains on the board. Every move must result in a capture, pieces move according to standard chess rules, and no individual piece may capture more than twice per puzzle, with a king (if present) required to be the last piece remaining. The format was popularized by ThinkFun's Solitaire Chess (2010) and Chess.com's online Solo Chess mode, which both present a series of challenge positions ranging from beginner to expert difficulty. The game strips chess down to its movement rules and turns them into a satisfying sequence of spatial logic puzzles, making it an ideal introduction to chess piece movement for novices.

