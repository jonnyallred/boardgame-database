description: |
  Khalkhin-Gol is a 1973 two-player hex-and-counter wargame published by Simulations Design Corporation that simulates the decisive 1939 Soviet-Japanese border conflict on the sandy plains and marshes of Mongolia. Players command regimental-level forces including infantry, tanks, cavalry, and artillery in this tactical recreation of the battle that ended the Soviet-Japanese border wars. Designed by Dana Lombardy, the game is a compact and historically focused simulation of a frequently overlooked but strategically significant WWII prelude conflict.

