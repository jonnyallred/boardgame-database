description: |
  Munchkin is a humorous card game parody of dungeon-crawling role-playing games, designed by Steve Jackson and illustrated by John Kovalic. Players kick open doors to fight monsters, collect treasures, and level up their characters in a race to reach level 10 first. The game is notorious for its player interaction — anyone can backstab, bribe, or assist fellow players mid-combat — creating chaotic and often hilarious swings of fortune. With dozens of expansions and themed editions, Munchkin has become one of the best-selling card games of all time.

