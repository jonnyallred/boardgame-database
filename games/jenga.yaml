description: |
  Jenga is the classic dexterity game in which players take turns removing one wooden block at a time from a tower of 54 stacked blocks and placing it on top, gradually making the tower taller and more precarious. The challenge is to extract blocks without toppling the whole structure, requiring steady hands and careful judgment of which blocks are load-bearing. Invented by Leslie Scott and sold to Hasbro, Jenga is one of the best-selling board games of all time and remains a staple of family game nights and social gatherings worldwide for its simple rules and suspenseful play.

