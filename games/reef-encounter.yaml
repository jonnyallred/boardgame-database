description: |
  Reef Encounter is a highly regarded Euro-style game designed by Richard Breese, originally published by R&D Games in 2004 and later by Z-Man Games. Players manage different species of coral polyps on a reef, growing them by placing tiles and protecting them using shrimp counters to prevent rival corals from overgrowing their colonies. The complex interaction between coral species — some naturally dominate others — creates intricate tactical decisions about when to grow, attack, and convert opponent corals into victory points. The game is praised for its elegant biological theme and deep strategic interplay.

