description: |
  Occhio! (Italian for "Eye!" or "Watch out!") is an Italian abstract board game played on a circular board where each player begins with six pieces of two types, plus four additional pieces held in reserve. On each turn a player makes two moves — either moving two different pieces once each, or moving one piece twice — working to control territory and outmaneuver opponents. The circular board and dual-type piece system create a distinctive tactical space that rewards spatial awareness and anticipation. Limited documentation is available in English; the game was published in the Italian market and represents the tradition of compact abstract strategy games designed for family audiences.

