description: |
  Warhammer Quest is a cooperative dungeon crawl adventure game released by Games Workshop in 1995 as the successor to HeroQuest and Advanced HeroQuest, set in the Warhammer Fantasy world. Up to four adventurers—Barbarian, Elf, Dwarf, and Wizard—explore randomly generated dungeon layouts built from the Dungeon Deck, fighting creatures such as orcs, goblins, and Skaven while collecting treasure and completing scenario objectives. The game ships with over 90 miniatures, chunky plastic doorway clips, and five different objective rooms each with six missions. It became the benchmark against which subsequent dungeon crawlers were measured and inspired a series of spiritual successors including Silver Tower, Shadows Over Hammerhal, and Blackstone Fortress.

