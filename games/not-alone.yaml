description: |
  Not Alone is an asymmetric 1-vs-many card game for 2-7 players set on a hostile alien planet. One player controls the Creature, a predator hunting stranded survivors, while the rest play as the Hunted who must cooperate to survive. Each round both sides simultaneously choose their actions — the Hunted explore location cards for resources and special powers, while the Creature hunts to recapture them. The race mechanic drives everything: Hunted players must push their Will token to 0 to win, while the Creature tries to advance theirs to 10. Short, tense, and satisfying with escalating asymmetric strategy.
