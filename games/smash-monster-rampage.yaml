description: |
  Smash Monster Rampage! is a cooperative board game published by 5th Street Games in which players work together
  to defeat a rampaging monster before it destroys the town or eliminates too many survivors. Players control tanks
  and helicopter units, coordinating movement and attacks against an unpredictable monster whose actions are driven
  by a "Monster Die." The game features a grid-based city map and escalating tension as the monster causes havoc
  each round.

