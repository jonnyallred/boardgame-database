description: |
  Monopoly: Scott the Woz Edition is a novelty Monopoly edition based on the YouTube personality Scott Wozniak, known for his video game-themed comedy commentary series "Scott the Woz." The game replaces standard Monopoly properties with references to Scott's show, video game culture, and running jokes from his videos. Custom tokens and themed cards make this a collector's item for fans of the channel. Standard Monopoly rules apply.

