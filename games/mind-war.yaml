description: |
  Mind War is a 1976 science fiction wargame published by Fact and Fantasy Games, in which future psionic warriors engage in mental combat. Designed as a standalone two-player experience, it is the first game in the Warriors of the Green Planet Trilogy. The rules are simple to learn and fast-moving, with most sessions completable in under an hour, making it an accessible entry point to the psionics-themed microgame genre popular in the late 1970s.

