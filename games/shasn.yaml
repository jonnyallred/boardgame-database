description: |
  Shasn is a political strategy board game designed by Zain Memon in which 3–5 players contest elections by controlling territories, managing resources, and answering ethical political dilemmas that shape their character's ideology. Players build custom decks based on their political stances — from promises to propaganda — and deploy them to win voter support across a contested map. The game has attracted both critical acclaim for its thematic depth and controversy for its frank engagement with political manipulation and modern electoral dynamics.

