description: |
  Napoleon's Last Battles is a hex-and-counter wargame quadrigame designed by Kevin Zucker and Jay Nelson, originally published by Simulations Publications Inc. (SPI) in 1976, with later editions by TSR and Decision Games. The box contains four linked battle scenarios from Napoleon's final 1815 Waterloo campaign — including Ligny, Quatre Bras, Wavre, and Waterloo — all using a shared ruleset so players can experience individual battles or combine them. The game reached the top 5 on SPI's bestseller list at launch and remains a foundational design in Napoleonic wargaming, praised for its elegant quadrigame format and historical fidelity.

