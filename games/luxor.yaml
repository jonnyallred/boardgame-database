description: |
  Luxor is a hand management race game designed by Rüdiger Dorn in which 2-4 players guide archaeologist teams through the ancient Egyptian temple of Luxor toward the burial chamber. Players use cards from their hands to move their pawns forward along a tile-covered path, collecting treasure and Horus tiles as they advance — but crucially, cards can only move pawns forward from the back of your group, requiring careful sequencing. The modular tile path and set collection scoring create interesting decisions about when to push for the burial chamber versus lingering for treasure. Nominated for the Spiel des Jahres in 2018, it is a masterclass in accessible Euro design.

