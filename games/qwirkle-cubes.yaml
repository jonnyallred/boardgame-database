description: |
  Qwirkle Cubes is a dice-based variant of the popular Qwirkle tile-laying game, designed by Susan McKinley Ross and published by IELLO. Instead of fixed tiles, players roll six-sided dice that display all six symbols in a given color, introducing an element of luck before placing pieces to build rows and columns of matching colors or shapes. The twist of needing to roll before placing creates a fresh layer of decision-making on top of the core pattern-building mechanics of the original Qwirkle.

