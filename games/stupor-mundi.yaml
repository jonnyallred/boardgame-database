description: |
  Stupor Mundi is a strategic euro game designed by Nestore Mangone and published by Quined Games in 2024, themed around Frederick II, Holy Roman Emperor, known to contemporaries as "the wonder of the world." Players serve as Frederick's vassals, summoning allies from around the Mediterranean, building structures in their castles, and promoting specialists to strengthen their kingdoms. The game features tight resource management and meaningful decisions about which combination of actions to pursue each round. Its unforgiving optimization puzzle rewards experienced euro gamers who enjoy complex, interlocking systems.

