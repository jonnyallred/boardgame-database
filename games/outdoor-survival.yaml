description: |
  Outdoor Survival is a 1972 Avalon Hill board game simulating wilderness survival across a three-part hex-grid map covering over 13,000 square miles of mountain, forest, and desert terrain. Players manage food, water, and stamina while navigating toward safety, facing natural hazards and wildlife in multiple scenarios ranging from solo escape to competitive pursuit. One of Avalon Hill's perennial bestsellers, it sold primarily through outdoor gear stores and outdoor sports channels rather than traditional toy outlets. Notably, Gary Gygax cited it in the original 1974 Dungeons and Dragons rules as recommended equipment for wilderness adventuring, cementing its place in roleplaying game history.

