description: |
  Traboulet is a two-player abstract strategy game in which players compete to capture seven red balls, or to capture all of their opponent's balls to win. Players maneuver pieces across the board in a spatial capture game where draws by repetition are possible. The game is available to play online at Board Space, indicating an active digital community despite its niche status.

