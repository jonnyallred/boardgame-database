description: |
  Mucca Pazza (Italian for "mad cow") is a children's sliding puzzle game designed by Iris Rossbach and published by Zoch Verlag. The game board features three sliding rails holding the mixed-up heads, bodies, and legs of ten different animals; on each turn, a player makes up to three sliding moves to correctly reassemble a target animal shown on a chit, claiming it to score a point. With ten chits always available above the board and a simplified mode using only five animals for younger players, Mucca Pazza offers a lively and accessible spatial reasoning challenge that plays in just 15 minutes.

