description: |
  Monopoly - Paris is a city-themed edition of the classic Monopoly board game, replacing the standard Atlantic City properties with famous Parisian streets, landmarks, and neighborhoods such as the Champs-Élysées, the Eiffel Tower, and Montmartre. Standard Monopoly rules apply — players buy and develop properties, collect rent from opponents, and attempt to bankrupt the competition. City-themed editions like this one are popular as souvenirs and gifts for lovers of the featured city.

