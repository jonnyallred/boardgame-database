description: |
  The Castles of Burgundy is a classic Euro dice-placement game by Stefan Feld in which players
  take the role of medieval aristocrats building and expanding their princedoms along the Rhone
  river. Each round, players roll two dice and use the results to take hexagonal tiles from a
  central market and place them onto their personal estate boards, earning bonuses for completing
  regions. Workers can modify dice values, giving players flexibility. With livestock farming,
  silver mines, trade goods, and various building types all yielding different scoring opportunities,
  the game rewards careful planning and adapting to what the dice provide. It is widely regarded as
  one of the defining Eurogames of its era and remains in print as an alea classic.

