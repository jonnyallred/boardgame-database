description: |
  Personal Preference is a 1987 party game by Broderbund in which friends and family compete to predict each other's personal likes and dislikes across categories such as food, activities, and people. Players in the spotlight rank their preferences while other players try to correctly guess the order. The game's appeal lies in revealing surprising things about people you thought you knew — creating memorable moments of laughter and discovery. A Games 100 award winner, it supports 2–16 players and was a popular adult party game of the late 1980s.

