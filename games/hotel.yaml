description: |
  Hotel is a family board game originally designed by Geoff Hayes and published by Denys Fisher Toys in 1974, later republished by Milton Bradley as Hotels in 1987. Players purchase and construct hotels on various properties, then charge rent when opponents land on their locations. The game features three-dimensional plastic hotel buildings as a key visual attraction, making setup and play feel more tactile than traditional flat board games. It blends the real estate competition of Monopoly with a construction and building element that gives players a satisfying sense of progress.

