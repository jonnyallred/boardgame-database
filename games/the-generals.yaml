description: |
  The Generals (Game of the Generals) is a two-player strategy game invented in the Philippines by
  Sofronio H. Pasola Jr. and publicly released in 1973. Played on a 9x8 grid, each player commands
  an army of 12 officers of different ranks, six privates, two spies, and a flag — all with hidden
  identities revealed only during confrontations resolved by a neutral arbiter. The fog of war is
  central: players must infer the identity of opposing pieces from their movements, positions, and
  the outcomes of challenges. Higher-ranking officers defeat lower-ranked ones in challenges, but
  spies can defeat the highest general. The game is the national board game of the Philippines.

