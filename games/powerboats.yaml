description: |
  Powerboats is a speedboat racing game for 2-6 players in which each player pilots a speedboat around a modular lake board, racing between islands and around buoys. The game uses unique three-sided dice to represent boat speed — each turn players hold their dice from the previous turn and may add or remove one die to accelerate or slow down, then freely choose which to reroll. Collisions with obstacles damage boats, and too much damage results in sinking. The game is played over three races, with players accumulating points based on finishing position.

