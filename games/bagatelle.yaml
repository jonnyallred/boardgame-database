description: |
  Bagatelle is a historic table game and forerunner of pinball, originating in 18th-century France — reportedly popularized at the Château de Bagatelle in 1777. Players use a cue or spring launcher to propel small balls up an inclined playing surface studded with pins, aiming for holes or targets that score points. The game exists in many forms, from elaborate Victorian parlor tables to simple pub games, and directly inspired the development of pachinko in Japan and the modern pinball machine. As a dexterity game relying primarily on physical skill, it requires practice to aim precisely around the pins.

