description: |
  Santa Monica is a breezy card-drafting and tableau-building game for 2–4 players set along the iconic Southern California beachfront. Each turn, players draft location cards and place them into one of two distinct areas: the Beach, which scores based on sets of identical icons, or the Street, which scores based on chains of connected card types. The interplay between these two scoring zones forces delightful tension every draft, as a card ideal for one zone may cripple the other. Santa Monica's relaxed theme belies a tight puzzle that plays in about 40 minutes and scales well across player counts.

