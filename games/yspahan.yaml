description: |
  Yspahan is a 2006 Euro game set in 1598 Isfahan (Persia), when the city served as the jewel of the Safavid empire. Each turn, a dice pool is rolled and players draft actions based on how the dice are grouped — placing goods into souk stalls in various city neighbourhoods, sending goods to the caravan for immediate points, or constructing buildings that upgrade future actions. Control of neighbourhoods scores end-game points, while the Shah's supervisor pawn can disrupt rivals' placements. The game unfolds over three in-game weeks, rewarding players who balance short-term caravan profits against long-term souk majorities, and was nominated for the 2007 Spiel des Jahres.

