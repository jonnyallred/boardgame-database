description: |
  Ra: The Dice Game is a Yahtzee-style dice adaptation of Reiner Knizia's acclaimed Egyptian auction game Ra, published by Rio Grande Games in 2009. Players roll custom dice to collect symbols representing different ancient Egyptian civilizations — Nile, Sun, Pharaoh, Monument, and Gold — and must decide when to lock in their results or reroll to push for better scoring combinations. The set collection logic and penalty/bonus structure of the original Ra is preserved in a compact, faster-playing dice format. The game was later reprinted through a Kickstarter campaign by 25th Century Games.

