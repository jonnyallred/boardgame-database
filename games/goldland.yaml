description: |
  Goldland is an adventure and exploration Euro game designed by Wolfgang Kramer and published by Goldsieber Spiele in 2002. Players are explorers with backpacks that hold up to twelve items—tools, provisions, trading goods, and treasures—and the number of empty spaces in the backpack determines how far you can move each turn, creating an elegant tension between traveling light and carrying useful equipment. Tile laying reveals the wilderness map as players explore, and each adventure encounter demands specific resource combinations. The game blends puzzle-like resource management with a race to claim treasures from Goldland.

