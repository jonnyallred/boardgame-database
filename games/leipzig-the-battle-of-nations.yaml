description: |
  Leipzig: The Battle of Nations is a hex-and-counter wargame covering the massive three-day Battle of Leipzig in October 1813, the largest battle of the Napoleonic Wars and arguably Europe's largest battle before World War I. Napoleon's Grande Armée faced a coalition of Prussian, Austrian, Russian, and Swedish forces totaling over 300,000 troops; the game captures this enormous scale with differentiated national armies and their varying capabilities, command structures, and morale. Multiple scenarios allow players to explore key phases of the battle. The game's multi-player options reflect the coalition nature of the forces arrayed against Napoleon.

