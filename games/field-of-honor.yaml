description: |
  Fields of Honor is a miniatures wargame system for recreating 19th-century conflicts from 1843 to 1902, covering five unit scales from section to brigade. The 120-page rulebook includes army lists and weapon data for 21 wars including the Crimean War, the American Civil War, the Franco-Prussian War, and various British colonial conflicts. Its "multiple scale" system allows any size battle to be fought with whatever miniatures a player has available, accommodating the smoothbore, rifled musket, and modern rifle eras within a flexible mechanical framework. The system later spawned sequels covering the American War of Independence and World War II.

