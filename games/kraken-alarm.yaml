description: |
  Kraken-Alarm is a 2010 children's memory and dexterity game by Oliver Igelhaut and Kosmos in which players navigate a sea region home to a protective octopus father and his young son. Players must remember the positions of hidden animal chips in the sea area, then contend with a swinging tentacle mechanism that introduces a luck element as they move their boats. The game won the 2010 Deutscher Kinderspiele Preis (German Children's Game Prize) and received a Kinderspiel des Jahres nomination, recognizing its charming combination of memory and surprise. It was published in France as SOS Octopus.

