description: |
  Brick Like This! is a cooperative team building game published in 2024 as a partnership between Asmodee and the LEGO Group, designed by Luca Bellini (a retheme of his earlier game Brick Party). Teams of two compete in real time: one player studies a build card showing a specific LEGO structure, then verbally instructs their blindfolded or turned-away partner how to assemble it from a shared pool of bricks. The team that correctly constructs the shape first wins the round. It is a hilarious and fast-paced communication game ideal for families.

