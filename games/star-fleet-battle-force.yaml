description: |
  Star Fleet Battle Force is a card-based starship combat game published by Amarillo Design Bureau, set in the
  Star Fleet Universe. Each starship is represented by a card detailing its weapon types, hull boxes, and special
  abilities such as Romulan cloaking devices; weapon cards (Phasers, Photon Torpedoes, Disruptors) and event cards
  drive the action while damage counters track destroyed systems. Rules support one to six players with solitaire
  and team options, and a Basic/Advanced structure allows players to learn at their own pace. It provides a faster
  entry point into Star Fleet Battles combat than the flagship game.

