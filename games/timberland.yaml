description: |
  Timberland is a family board game designed by Klaus Teuber and published in 1989 featuring beautiful enamelled wooden components representing trees, seeds, a lumberjack, and a boar. The game unfolds across the four seasons: fruits fall in autumn, a wild boar forages in winter, seeds sprout into trees in spring, and the lumberjack harvests trees in summer. The gentle nature-cycle theme and tactile wooden pieces make it especially appealing to younger players, and the game placed ninth in the 1989 Deutscher Spiele Preis.

