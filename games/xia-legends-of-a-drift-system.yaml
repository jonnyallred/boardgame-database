description: |
  Xia: Legends of a Drift System is an open-world sandbox space exploration game in which each player pilots a uniquely customizable starship across a modular galaxy that is revealed tile by tile as ships venture beyond known space. Players choose their own path to fame — trading goods between planets, mining asteroids, completing missions, engaging in piracy, or fighting other ships — with no single prescribed strategy for victory. Ships can be upgraded with outfitted systems purchased at space stations, growing in power over the course of the game. Dice-based combat and movement create moments of press-your-luck thrills, while the emergent sandbox narrative generates different stories each session. The lush miniature starships and dramatic tile reveals give the game a strong sense of wonder and discovery.

