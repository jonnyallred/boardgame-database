description: |
  Goth: The Game of Horror Trivia is a horror-themed trivia board game in which players roll the die, move around the board, and answer questions on blank spaces while special spaces trigger various effects. The game is designed for fans of horror media and gothic culture, testing knowledge of horror films, literature, and subculture. Its straightforward trivia format and dark theme make it a niche party game for horror enthusiasts. Designer and publisher information is not widely documented for this title.

