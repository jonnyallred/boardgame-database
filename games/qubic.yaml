description: |
  Qubic is Parker Brothers' brand name for a 3D tic-tac-toe game first manufactured in 1964, played on a four-level structure of 4×4 transparent boards. Players take turns placing colored chips on any level, attempting to create a row of four in any direction — horizontal, vertical, or diagonal across or through levels — before their opponent does. The three-dimensional nature transforms the familiar tic-tac-toe concept into a surprisingly deep spatial challenge, and the game was reissued in a modernized design in 1972 before eventually being discontinued.

