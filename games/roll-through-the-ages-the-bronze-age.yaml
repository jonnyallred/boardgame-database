description: |
  Roll Through the Ages: The Bronze Age is a compact civilization dice game designed by Matt Leacock in which players roll a set of custom dice to gather food, workers, and commodities to advance their ancient civilization. Dice can be rerolled up to twice unless they show hazard faces, introducing meaningful press-your-luck decisions around risk and resource acquisition. Workers build infrastructure and monuments that score victory points, while developments provide permanent advantages. Its streamlined design delivers a satisfying civilization-building arc in under 45 minutes, making it an ideal gateway into both roll-and-write style games and the civilization genre.

