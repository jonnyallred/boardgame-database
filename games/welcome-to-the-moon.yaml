description: |
  Welcome to the Moon is a narrative flip-and-write game designed by Alexis Allard and Benoit Turpin and published by Blue Cocker Games in 2021. The final entry in the Welcome To... trilogy, it features eight standalone adventures of escalating difficulty that form a connected story about humanity's escape to the moon. Using the same card-flip mechanism as Welcome To..., players choose number-action combinations to fill their personal spacesheet, but each adventure introduces unique rules and scoring conditions that transform the familiar system into something fresh each time. Accessible as individual scenarios or played as a campaign, it adds remarkable variety and narrative texture to the flip-and-write genre.

