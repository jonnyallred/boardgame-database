description: |
  Drop It is a 2018 dexterity and abstract game from KOSMOS often described as "Connect Four for gamers." Players take turns dropping geometric wooden shapes — squares, triangles, circles, and diamonds — into an upright plastic tray, scoring points based on how high their piece lands. The twist: you score nothing if your piece touches another shape or color that matches your own, demanding both careful aim and spatial reasoning. Physics plays a key role, as pieces bounce, slide, and settle unpredictably. The game uses birch wood pieces of high quality and has been recommended by the American Tabletop Early Gamers association.

