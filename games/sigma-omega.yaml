description: |
  Sigma Omega is a 1979 science fiction space combat tactical wargame published by Game Technology, simulating intense spaceship battles on a hex grid with complex energy and systems management. Reviewed in The Space Gamer, the game was noted for its highly detailed and demanding ruleset — the rules were described as reading "like instructions for a nuclear reaction" — but also for the excitement of play for those who mastered them. Despite its complexity, it attracted a dedicated following and was recognized as a pioneer in the space combat tactical game genre of the late 1970s.

