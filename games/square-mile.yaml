description: |
  Square Mile is a land development board game designed by Reuben Klamer and published by Milton Bradley in 1962.
  A 16-tract square mile of land is divided among players, with each player starting with $100,000 and one free
  tract allocated randomly. An auction round allows players to bid cheaply on additional land; players then
  develop their tracts with roads and buildings, selling properties at market value when profitable. Considered
  ahead of its time as a city-building and real estate game, Square Mile anticipated mechanics that would become
  common in the Euro game era decades later.

