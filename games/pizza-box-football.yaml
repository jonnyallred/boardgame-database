description: |
  Pizza Box Football is a compact head-to-head American football strategy game that literally opens up from a pizza box shape into its playing surface. Designed by Scott Smith and published in 2005, players call plays and roll dice guided by cards, applying football strategy in choosing when to run, pass short, pass long, or attempt trick plays. All 32 NFL teams are rated in three offensive and defensive categories (run, short pass, long pass) based on real season statistics, creating authentic matchup dynamics. The game offers four rule variants ranging from a quick Red Zone Shootout to a full professional game, with expansion packs covering additional seasons.

