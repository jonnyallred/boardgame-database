description: |
  Slick! is a stock market and oil industry board game published by Rostherne Games in 1988, designed by David
  Watts. Players buy shares in seven fictional oil companies, competing to gain controlling interests and maximize
  returns. The game centers on economic maneuvering and share accumulation across a commodity market theme, though
  reviewers of the era found its game system somewhat uninspiring despite reasonable production quality.

