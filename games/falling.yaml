description: |
  Falling is a real-time card game designed by James Ernest and published by Cheapass Games in 1998 in which all players are simultaneously falling from the sky and trying to hit the ground last. One player acts as the dealer, whose sole role is to steadily deal cards face-up in front of each player; players must immediately react to their cards and can play action cards — called riders — onto themselves or opponents. The object is simply to outlast everyone else, as the first players to accumulate ground cards are eliminated. Falling was the first full-color and first real-time card game from James Ernest, pioneering a format that would later become much more common in hobby gaming.

