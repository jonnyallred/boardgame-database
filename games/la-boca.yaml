description: |
  La Boca is a 2013 cooperative speed puzzle game by Inka and Markus Brand in which pairs of players race to recreate a colorful pattern using shared wooden blocks, where each partner can only see their own perspective of the completed image. Players sit across from each other and must communicate through verbal description alone while racing against a timer, with faster completions earning more points. Regular and hard difficulty cards extend the game's challenge, and rotating partners ensures everyone faces different collaborators. Published by Huch & Friends, the game rewards communication skills and spatial reasoning under delightful pressure.

