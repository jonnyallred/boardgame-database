description: |
  On the Road to Abha is a simple family board game offering two games in one: a standard roll-and-move race from Riyadh to the city of Abha in Saudi Arabia, and a collection variant in which players compete to gather the most coffee pot tokens along the route. Designed as a cultural and educational game celebrating the journey through the Saudi Arabian highlands, it provides a gentle introduction to the geography and cultural symbols of the region, particularly the traditional qahwa (coffee) culture associated with the Asir region around Abha. Both game modes are intentionally simple and accessible for young children.

