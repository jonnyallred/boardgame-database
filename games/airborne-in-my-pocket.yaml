description: |
  A compact cooperative print-and-play microgame published by Print & Play Productions in 2009, set during the WWII Normandy landings. Part of the "...in my Pocket" series originating with Zombie in my Pocket, this entry puts players in command of American airborne forces navigating the chaos of the D-Day invasion. Players cooperate to complete objectives with minimal components—the game lives up to its "pocket" name with just a few cards and tokens. A quick and accessible entry point into both cooperative gaming and historical wargame themes.

