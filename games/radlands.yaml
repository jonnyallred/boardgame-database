description: |
  Radlands is a two-player competitive card game set in a vibrant post-apocalyptic wasteland where each player controls three base camps that must be defended. Players build their tableau with people and event cards arranged in lanes, spending water (the game's resource) to play cards and use abilities in a back-and-forth battle to destroy all of the opponent's camps. Designed by Daniel Piechnick and published by Roxley Games in 2021 after a record-breaking Kickstarter campaign raising over CA$600,000, the game is celebrated for its fast play, strategic depth, and striking neon art style.

