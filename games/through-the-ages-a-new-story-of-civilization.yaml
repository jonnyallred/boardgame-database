# Description
description: |
  The revised and streamlined edition of the acclaimed civilization card game in which
  players guide a nation from antiquity to the modern era. Players draft leaders,
  technologies, wonders, and military cards from a shared row, balancing civil actions
  and military actions each turn. Improvements over the 2006 original include cleaner
  card text, rebalanced military cards, and a revised political system. Players must
  manage food and resource production to grow their population and build improvements,
  while also developing culture to win. Military strength deters aggression and enables
  events. The game rewards long-term planning, knowledge of the card pool, and
  adaptability. Widely regarded as one of the deepest strategy games available.

