description: |
  Shockforce: Battles in the Remnants of America is a 1998 miniatures wargame published by DemonBlade Games and designed by Aaron "Warpeyes" Overton, set in a war-torn post-apocalyptic future United States. Players build forces using a flexible build-it-yourself mechanic, assigning weapons and defensive values to models, then resolve fast-paced firefights and close assaults using opposed dice pools — the attacker's weapon dice versus the target's defense dice. Praised for its accessible yet tense core mechanic, the game earned a cult following and was later released in an expanded second edition through Wargame Vault.

