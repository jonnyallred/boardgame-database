description: |
  Bagh Bandi is a traditional Indian territory-enclosure game related to the hunt game family. Played on a grid with diagonal lines, two players compete to encircle and trap pieces — somewhat like a fusion of territory control and the tiger-and-goats dynamic found in related South Asian games. The game has been played across India for centuries and represents a regional variation on asymmetric placement and movement games. Specific documented rules vary by source, and the game is most commonly encountered in Bengal and surrounding regions.

