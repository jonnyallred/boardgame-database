description: |
  Exit: The Game – The Abandoned Cabin is the 2016 debut entry in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players find themselves trapped in a mysterious abandoned cabin with no memory of how they arrived, and must solve a series of interlocking riddles and puzzles to escape. As one of the original three titles in the series, The Abandoned Cabin has a difficulty rating of 2.5 out of 5, making it accessible to newcomers. It helped establish the EXIT formula of card-based puzzle solving with a code dial, and the series went on to win the 2017 Kennerspiel des Jahres.

