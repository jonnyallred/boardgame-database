description: |
  Kiothi is a traditional two-player mancala game of the Meru people of Kenya, whose name means "to place" — describing the core action of seeding pits. Played on a 2×10 board with 30 seeds per player concentrated in the rightmost five pits, players may redistribute their starting seeds before play begins, creating a strategic opening phase unique to this game. Players relay-sow seeds counter-clockwise, with capture occurring when the final seed lands in an empty pit in one's own row after having crossed the opponent's row. The player who cannot move loses all remaining seeds on the board.

