description: |
  Epäillyt is a Finnish deduction game designed by Kimmo Sorsamo in which players attempt to identify which three of twelve characters — drawn from three categories of wealthy men, women, and laborers — are the murderers. Players gather clues through questioning and elimination, narrowing suspects across each category until one culprit per group is unmasked. The game blends a Cluedo-style whodunit structure with lightweight Finnish design sensibilities, making it accessible for families.

