description: |
  Super Cluedo Challenge is a 1986 Waddingtons expansion of the classic Cluedo murder mystery deduction game, introducing three new suspect characters (Captain Brown, Miss Peach, and Mr. Slate-Grey), three new weapons (blunderbuss, poison, and axe), and a garden location with hidden clues under decorative ornaments. Cards feature special coloured-and-numbered corner squares that are revealed gradually through special card holders, allowing partial clues rather than full reveals — adding a new layer of information management to the deduction process. Clues must be discovered on the board rather than dealt at the start, fundamentally changing the pacing and investigation strategy.

