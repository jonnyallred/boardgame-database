description: |
  Combat Commander: Pacific expands Chad Jensen's award-winning card-driven tactical wargame system to cover the Pacific Theater of World War II. Built on the Combat Commander: Europe engine, it introduces three new factions — Imperial Japan, Pacific US Marines, and Commonwealth forces — along with rules tailored to the Pacific experience: Banzai charges, beach landings, hidden movement, caves, scout units, aircraft, and bayonet charges. Twelve new maps depict Pacific terrain, and the scenario playbook and Random Scenario Generator provide extensive replay value. The asymmetric faction design, where Japanese players deal with Banzai rules while US players manage amphibious operations, captures the unique character of Pacific island warfare.

