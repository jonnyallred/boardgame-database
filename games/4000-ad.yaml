# Description
description: |
  4000 A.D. is a science fiction conquest board game published by Waddingtons in
  1972. Set in a distant future where humanity has colonized the galaxy, players
  command space fleets and armies competing for control of star systems. The game
  features area control mechanics where players expand their empires across a
  cosmic map.

  As a product of the early 1970s Waddingtons catalog, 4000 A.D. represents an
  early entry in the space-conquest genre for mass-market board games, blending
  accessible rules with enough strategic decision-making to engage players of
  various experience levels.

