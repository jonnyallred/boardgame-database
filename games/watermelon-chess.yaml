description: |
  Watermelon Chess (Xi Gua Qi) is a traditional two-player abstract strategy game from Hangzhou, Zhejiang Province, China, traditionally played by children. Each player controls six pieces on a shared board, taking turns to move and capture the opponent's pieces by surrounding them. What makes the game distinctive as a folk game is its elegance and simplicity—the rules can be learned in minutes, yet the game rewards positional thinking. It is believed to have originated many centuries ago as a folk game passed down through Chinese communities.

