description: |
  Alkkagi is a traditional Korean two-player abstract game in which players flick stones across a
  board, trying to knock their opponent's pieces off the edge while keeping their own on the surface.
  Each player starts with an equal number of stones (typically 5 or 7) arranged on their side of the
  board, alternating turns to flick one stone in any direction.

  The game rewards precision and strategic targeting — a skilled player can knock multiple opponent
  stones off with a single well-aimed shot (iltaipi), or cleverly position pieces to block opponents.
  Variants of the game appear in Chinese historical records as Tanqi, traced back to the Han dynasty.
  Alkkagi combines elements of dexterity, spatial reasoning, and tactical positioning in a simple yet
  deeply engaging format that has been played in Korea for centuries.

