description: |
  Cemetery Hill is a division-level hex-and-counter wargame simulating the Battle of Gettysburg from July 1-3, 1863, published by SPI in 1975 as part of the Blue & Gray quadrigame series. The game uses simplified rules derived from Napoleon at Waterloo, with a compact map, only 100 counters, and an alternating turn structure where each hex represents 400 meters and each turn 1-2 hours of battle. It was SPI's top-selling game upon release, though critics considered it a relatively accessible introductory wargame rather than a deep simulation of the famous battle.

