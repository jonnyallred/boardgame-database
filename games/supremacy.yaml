description: |
  Supremacy: The Game of the Superpowers is a political, economic, and military
  strategy wargame in which players control one of six global superpowers
  vying for world domination in a modern Cold War setting. Players develop
  economies, build conventional and nuclear arsenals, and deploy laser defense
  satellites, all while managing the constant threat of nuclear war — which
  results in a nuclear winter and universal defeat if triggered. The game
  combines economic management, research and development, and direct military
  conflict in a tense multi-player sandbox that captures the brinksmanship of
  the Cold War era.

