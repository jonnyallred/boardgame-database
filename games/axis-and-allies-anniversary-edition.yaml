description: |
  Axis & Allies Anniversary Edition is a landmark expanded edition of the classic World War II strategic board game, published by Avalon Hill in 2008 to commemorate the franchise's history. Players command the five major powers — USA, UK, Soviet Union, Germany, and Japan — plus Italy in this edition, managing economies measured in Industrial Production Certificates (IPCs) to build armies, navies, and air forces. The Anniversary Edition adds Italy as a separate power, new unit sculpts, and over 650 pieces across an expanded global map. Designed by Larry Harris Jr., it is considered the definitive large-scale Axis & Allies experience for serious fans.

