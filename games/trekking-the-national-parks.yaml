description: |
  Trekking the National Parks is a family strategy game in which players race across a beautifully illustrated map of US National Parks, spending cards to move and collecting trail stones and Park Cards to score points. Cards serve a dual purpose — used for movement or saved to claim specific parks — forcing constant decisions between speed and acquisition. Major parks grant special abilities in addition to victory points, and the variety of scoring paths (stone sets, park claims, area presence) ensure that no single dominant strategy emerges.

