description: |
  Zoff in Buffalo is a strategic card game in which players compete to graze their cows on limited
  pastures. Each round, players simultaneously select two of ten cards designating which pastures
  they will attempt to fill, but the twist is that no two players may have exactly the same number
  of cows in any given pasture. If a collision occurs when cows are placed, the total is reduced by
  one. The most cows on pastures at game's end wins, rewarding careful anticipation of opponents'
  moves.

