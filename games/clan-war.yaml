description: |
  Clan War is a 28mm fantasy miniatures wargame published by Alderac Entertainment Group in 1998, set in the Legend of the Five Rings universe of feudal Rokugan. Players build samurai armies from one of the great clans — including warriors, shugenja (mages), and supernatural creatures — and fight for the right to name their lord Emperor. The game combines a card deck with a d10 dice system to determine combat outcomes, with clan armies generally restricted to a single faction. The miniatures, originally produced by AEG and later re-released by Magnificent Egos, are 28mm Asian fantasy figures.

