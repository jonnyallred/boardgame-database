description: |
  1918 is a two-player operational wargame published by SPI in 1970 that simulates Operation Michael, Germany's massive 1918 spring offensive on the Western Front — their last major attempt to win the war before American forces arrived in strength. Designed by James F. Dunnigan, the game uses a hex-and-counter system to depict the ten-day offensive from March 21 to 30, 1918. The German player must punch through Allied lines and achieve decisive territorial objectives, while the Allied player must contain the breakthrough before it becomes catastrophic. A revised second edition appeared in 1972 with refined rules based on player feedback.

