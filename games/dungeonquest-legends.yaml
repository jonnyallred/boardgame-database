description: |
  DungeonQuest Legends is an expansion supplement for the Fantasy Flight Games edition of DungeonQuest (Revised Edition, 2014), introducing new legendary heroes and enhanced encounters for the classic treasure-hunt dungeon game. Players delve into Dragonfire Castle attempting to steal from the sleeping dragon's hoard before sunset, now with expanded hero options and additional legendary content. The expansion maintains the notoriously lethal press-your-luck character of the base game while adding new story and mechanical variety for experienced players.

