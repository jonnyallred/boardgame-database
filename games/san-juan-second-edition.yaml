description: |
  San Juan Second Edition is a 2014 update of Andreas Seyfarth's beloved card game adaptation of Puerto Rico, published by Alea. Players build a colonial city using a 110-card deck that functions simultaneously as the building supply, the currency for construction, and the victory point tracker. The role-selection mechanic from Puerto Rico is preserved — each round one player selects from roles like Builder, Producer, and Trader, with all players participating but the selector gaining a bonus. The second edition adds new building cards that expand strategic options while preserving the elegant, fast-playing core. It remains one of the finest card games in the genre.

