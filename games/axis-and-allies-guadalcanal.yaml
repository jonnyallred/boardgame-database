description: |
  Axis & Allies: Guadalcanal is a 2007 standalone entry in the Axis & Allies series focused on the brutal 1942-1943 campaign for control of Guadalcanal island in the Pacific. The two-player game emphasizes naval and air combat as the US and Japan fight to control the crucial airstrip at Henderson Field. Players must manage troop landings, air superiority, and naval interdiction along "the Slot," capturing the exhausting logistical struggle that defined the Guadalcanal campaign. Its naval-heavy mechanics distinguish it from other Axis & Allies titles.

