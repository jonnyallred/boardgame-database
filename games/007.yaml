description: |
  An abstract tile-based strategy game published by Milton Bradley in 1965 inspired by the James Bond franchise. Two to four players compete in red or black teams, attempting to capture opponents' numbered tiles placed into 16 windows on the game board. Dot tiles have point values of 1-5, while the "007" tiles are worth 10 points each. A straightforward competitive game designed to capitalize on the James Bond movie craze of the mid-1960s, offering a simple two-team capture mechanic accessible to family players.

