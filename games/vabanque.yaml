description: |
  Vabanque is a small bluffing and intuition game by Bruno Faidutti and Leo Colovini, first published in 2001. Players gather in a casino where they play character cards and manoeuvre their pawns to claim a share of the prize money at various casino tables. Payouts can be multiplied by good play or lost entirely to card sharks, and the stakes escalate from round to round. The game's core tension lies in reading opponents and committing to tables before the full picture is revealed. Later editions were published by New Games Order and Igiari.

