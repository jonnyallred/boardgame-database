description: |
  Dragon Castle is a tile-drafting and set-collection game freely inspired by Mahjong
  Solitaire. Players take matching tiles from the central 3D castle structure and use them
  to build their own personal realm, scoring points by creating sets of the same color and
  constructing shrines. As the castle collapses tile by tile, new decisions emerge about
  which tiles to take and where to place them. The game's elegant simplicity, beautiful
  3D castle centerpiece, and satisfying pattern-building make it a visually striking and
  accessible game for all ages.

