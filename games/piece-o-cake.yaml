description: |
  Piece o' Cake (also known as "Ein Stück vom Kuchen") is a light set-collection game in which players divide five cakes into slices and decide whether to eat each piece for immediate points or collect it to potentially score more at game end. One player divides a cake into slices and then opponents in turn order choose a slice — but the divider takes what is left. When eating a slice, players score the number of dollops shown; when collecting, players compete for end-game majority in each variety. The elegantly simple I-cut-you-choose mechanic, combined with the eat-or-keep tension, packs surprising decisions into a very accessible package. Later reimagined as New York Slice with a pizza theme.

