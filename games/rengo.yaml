description: |
  Rengo is a team variant of the ancient board game Go in which two two-player teams play a single game, with partners alternating moves. Originating in Japan during the Edo period (1603–1868), Rengo adds a unique social dimension to traditional Go — partners are forbidden from communicating or signaling during the game, forcing each player to intuit their partner's strategy from the board state alone. The format promotes a deep shared experience and is widely used in training settings to sharpen intuitive play.

