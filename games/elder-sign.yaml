description: |
  Elder Sign is a fast-paced cooperative dice game of supernatural intrigue designed by Richard Launius and Kevin Wilson (the creators of Arkham Horror) and published by Fantasy Flight Games in 2011. Players take the roles of investigators racing against time inside a haunted museum to find Elder Signs — mystical symbols that can seal away an awakening Ancient One from the Cthulhu Mythos. Each turn investigators choose adventures (cards) to attempt, rolling custom dice against requirements while managing limited tools, spells, and allies. Elder Sign distills the Arkham Horror experience into a 1-2 hour session, making the Lovecraftian universe accessible to a broader audience without sacrificing thematic atmosphere.

