description: |
  Western Legends is an open-world sandbox tabletop adventure for 2–6 players set in the American Wild West, published by Kolossal Games in 2018 and designed by Hervé Lemaître. Players assume the roles of historical figures earning Legendary Points through a wide variety of activities: mining for gold, driving cattle, gambling in saloons, robbing banks, fighting bandits, pursuing story quests, or upholding the law and arresting outlaws. Each turn begins with drawing poker cards and gaining cash, then choosing three actions that leverage the current location on the sprawling map. The game's sandbox freedom and variety of paths to victory make it the definitive western-themed board game experience.

