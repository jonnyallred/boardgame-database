description: |
  Herd Mentality is a party game from Big Potato Games where the goal is simple: think like the herd. Players are asked a question and must write down the same answer as everyone else — popular answers earn cow tokens, but whoever gives the unique odd-one-out answer gets stuck with the angry Pink Cow, making all their accumulated cows worthless until they can offload it. The first player to collect eight cows wins. Its accessibility, large player count support (up to 20), and laugh-generating disagreements make it a natural hit for family gatherings and game nights.

