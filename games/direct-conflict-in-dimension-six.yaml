description: |
  Direct Conflict in Dimension Six is a 1977 science fiction combat board game published by Dimension Six, Inc. in which two players battle for galactic superiority across a two-dimensional grid. Players mine supplies of a mineral called Delium, which is used to construct missiles and sustain military operations. The game's resource-to-combat loop — collect Delium, build weapons, press the attack — creates a compressed economic wargame experience. It is an obscure entry in the 1970s self-published sci-fi wargame tradition.

