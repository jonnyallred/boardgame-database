description: |
  Dragonlance is a 1988 fantasy board game published by TSR, based on the popular Dragonlance campaign setting for Dungeons & Dragons. Players each command a team of colored dragon figures on a large hex-grid mapboard, racing to breach a central forbidden tower, claim the legendary Dragonlance, and return it to their home base. Movement is determined by rolling a ten-sided die, and dragons can change altitude using altitude markers, adding a tactical layer to an otherwise accessible race game. The game includes both Basic and Advanced rule sets, making it suitable for a range of experience levels.

