description: |
  James Clavell's Tai-Pan is a board game published by FASA in 1981 based on James Clavell's 1966 novel of the same name, set along the exotic Chinese coast of the 1830s. Players use clipper ships to transport opium from India to China, then acquire Chinese goods like silk and tea to race back to England for the highest prices. The first clipper to return to England wins. Produced in the wake of the successful 1981 TV miniseries of another Clavell novel, it captures the cutthroat spirit of international trade during the opium trade era.

