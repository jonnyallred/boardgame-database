description: |
  Hammer's Slammers is a science fiction wargame published by Mayfair Games in 1984, based on David Drake's acclaimed military science fiction short story collection of the same name. Players command futuristic armored combat units including supertanks and air-cushion vehicles across hex-map battlefields, with rules capturing the brutal efficiency of Drake's mercenary tank regiment in the far future. The game faithfully adapts the high-tech lethality and combined-arms tactics of the source material into a playable wargaming system.

