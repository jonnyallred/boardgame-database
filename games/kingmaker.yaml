description: |
  Kingmaker is a 1974 diplomatic simulation of England's Wars of the Roses in which 2-6 players control factions of noble families vying to place a royal claimant on the throne. Players maneuver noble cards controlling armies and claimants across a map of England, using military force, intrigue, and diplomacy to outmaneuver rivals. The game captures the shifting alliances and betrayals of the Plantagenet succession crisis from 1450 to 1490, and has been praised as one of the finest diplomacy-oriented simulations available. Originally published by PhilMar in the UK, Avalon Hill's 1976 revised edition added improved Parliament rules and broader distribution.

