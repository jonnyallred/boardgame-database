description: |
  Star Wars Monopoly is a 1997 themed edition of the classic Monopoly board game, published by Parker Brothers. Players buy and trade iconic Star Wars locations from the original trilogy in place of traditional properties, and collect rent as opponents land on them. The game features nine pewter playing tokens of Star Wars characters cast by Rawcliffe, including Han Solo, Princess Leia, C-3PO, and the Emperor. The core Monopoly mechanics of roll-and-move, property acquisition, and rent collection remain unchanged.

