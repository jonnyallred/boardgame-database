description: |
  Assault Across the Suez simulates the Battle of the Chinese Farm on October 15, 1973
  during the Arab-Israeli War, published by SPI in 1980. Designed by Jim Dunnigan and
  Mark Herman, the game was part of SPI's "gateway" series intended to introduce new
  players to the wargaming hobby with simplified rules that remain strategically satisfying.
  The seven-turn game can be completed in approximately two hours, depicting the Israeli
  crossing of the Suez Canal and Egyptian defensive efforts during the Yom Kippur War.
  Decision Games later republished the game in 1995 after SPI closed.

