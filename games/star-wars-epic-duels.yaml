description: |
  Star Wars Epic Duels is a 2002 Milton Bradley card-and-miniatures combat game in which players choose iconic Star Wars characters — each with a unique 31-card deck — and battle to eliminate all opposing major characters. Each character team consists of a major hero or villain paired with one or two minor characters, and card play governs both attack values and special abilities like Force Lightning or Han's trick shots. The game includes 31 painted figures and four grid-based battle maps. Out of print by 2004, it developed a large cult following.

