description: |
  Camelot is an abstract strategy game for two players invented by George S. Parker, originally published as Chivalry in 1882 and republished under the name Camelot by Parker Brothers in 1930. Players move knights and pawns across a 16×12 board, seeking to place two pieces in the opponent's castle while using canters and leaping moves to attack and defend. The game achieved remarkable popularity in the 1930s and attracted admirers including World Chess Champion José Raúl Capablanca, who praised its accessible yet tactically rich gameplay.

