description: |
  Swords & Sorcery is a fantasy-themed board wargame published by SPI in 1978,
  designed by Greg Costikyan with development by Eric Goldberg. The game
  includes two modes: an Army game in which 2–6 players control armies using
  hex grid movement and combat rules, and a Quest game in which individual
  characters undertake adventures. Magical spells add a distinctive fantasy
  layer to traditional wargame mechanics involving zones of control and a combat
  results table. The game rose to No. 1 on SPI's Top Ten Bestseller List after
  publication and was nominated for the 1979 Origins Award for Best Fantasy
  Board Game.

