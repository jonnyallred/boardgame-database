description: |
  The Worlds of Boris Vallejo is a 1984 fantasy strategy board game published by Mayfair Games, notable for featuring 30 world tiles each illustrated with original paintings by legendary fantasy and science fiction artist Boris Vallejo. Two to six players compete across these visually stunning fantasy worlds, using strategy cards and plastic markers to claim territory. The game's primary appeal lies in Vallejo's breathtaking artwork depicting warriors, sorcerers, and mythical creatures in his signature hyper-detailed style, making it as much a gallery of his work as a competitive game. It remains a collector's item for fans of both Vallejo's art and vintage Mayfair Games.

