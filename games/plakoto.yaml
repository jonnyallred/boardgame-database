description: |
  Plakoto is a traditional Greek backgammon variant and one of three games collectively known as Tavli, played widely across Greece, Turkey, Egypt, Bulgaria, and Lebanon. Like backgammon, players roll two dice and race their 15 checkers around the board to bear them off, but Plakoto's key distinction is its pinning mechanic: instead of hitting and sending opponent pieces to the bar, a player traps an opponent's single checker by landing on it, immobilizing it until the pinning piece moves away. The "mother piece" — the last checker to leave the starting point — is critical, as getting it pinned before it moves results in an automatic double loss. Doublets (pairs) are played four times in the standard backgammon fashion.

