description: |
  Reigns: The Council is an asymmetric party game based on the Reigns video game series by Nerial/Devolver Digital, designed by Bruno Faidutti and Hervé Marly. One player takes the role of the Monarch receiving petitions from the other players (advisers), each of whom secretly works to advance their own agenda by influencing the four kingdom pillars — Church, Army, People, and Wealth. The Monarch must keep all pillars balanced while the advisers scheme to tip the scales in their favor, creating a game of social manipulation and misdirection with a medieval narrative veneer.

