description: |
  Conquest of the Empire is a military strategy game set in the fractured Roman Empire following the death of Marcus Aurelius, part of Milton Bradley's prestigious Gamemaster series alongside Axis & Allies, Shogun, and Fortress America. Players lead rival Roman factions — each with a Caesar, generals, infantry, cavalry, catapults, and warships — across a Mediterranean map in a battle for imperial supremacy. The original 1984 rules focus on military conquest, while a 2005 Eagle Games re-release added auction mechanics and political elements for a deeper strategic experience. The game is beloved for its epic scale, high quality plastic miniatures, and the classic Gamemaster series feel.

