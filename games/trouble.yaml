description: |
  Trouble is a classic family race game developed by the Kohner Brothers and first manufactured by Irwin Toy Ltd., then by Milton Bradley in 1965. Players race four colored pegs around a circular track, aiming to move all their pieces to the finish zone before opponents. The game's iconic feature is the "Pop-O-Matic" bubble — a clear plastic dome over a die that players press to roll, producing a distinctive popping sound and preventing die loss or cheating. Trouble is a pure luck game beloved for generations, now published by Hasbro, and also sold internationally as "Frustration."

