description: |
  The Quest of the Philosopher's Stone is a 1986 Canadian fantasy board game designed by Lowell Haynes and published by Questone Marketing Inc. Players quest through a medieval fantasy world featuring iconic mythical sites—Camelot, Atlantis, and Stonehenge—in search of the legendary Philosopher's Stone, the alchemical object believed to transmute base metals into gold and grant immortality. The game blends adventure, mystery, and exploration mechanics suitable for family play, and represents a period when alchemical and Arthurian themes were frequently explored in hobby board gaming.

