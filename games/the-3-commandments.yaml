description: |
  The 3 Commandments is a deduction and bluffing party game published by Rio Grande Games in 2008,
  designed by Friedemann Friese along with Gordon and Fraser Lamont. One player secretly sets three
  rules (commandments) that govern which objects are acceptable, and other players must deduce those
  rules by proposing objects and observing whether they are accepted or rejected. The deduction
  mechanic rewards careful observation and lateral thinking as players narrow down the hidden logic
  through a process of elimination and clever questioning.

