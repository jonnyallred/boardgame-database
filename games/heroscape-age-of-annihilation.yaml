description: |
  Heroscape Age of Annihilation is the 2024 reboot of the beloved Heroscape miniatures game, published by Renegade Game Studios after acquiring the license from Hasbro. Players build 3D hexagonal terrain and command units of fantasy and sci-fi warriors, with each round involving secret order-marker assignment and alternating unit activation. The game features both basic and advanced rules sets, zone-of-control mechanics, and line-of-sight resolution on fully three-dimensional terrain, preserving the tactical depth and spectacle that made the original Heroscape a cult classic.

