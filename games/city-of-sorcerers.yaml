description: |
  City of Sorcerers is a fantasy board game for 2-4 players published by Standard Games and Publications in which apprentice wizards travel around a sprawling city researching spells and gathering powers, then enter the Sorcerers' Arena to eliminate all rivals and claim sorcerer status. The game is divided into two distinct phases: the city exploration phase, where players research magical abilities, and the arena combat phase, where those abilities are deployed to decisive effect. Players customize their wizard's power set during the first phase, adding strategic depth to the final showdown.

