description: |
  Omweso (also known as Mweso) is the traditional mancala game of the Ugandan people, believed to have been introduced by the Bachwezi people of the ancient Bunyoro-Kitara Empire. The game is played on a board of 32 pits arranged in a four-row by eight-column grid, with 64 undifferentiated seeds distributed between the two players' 16 pits each. Players sow seeds counter-clockwise around their own side of the board, capturing opponent's seeds on the opposite side through complex relay-sowing rules, and win by reducing the opponent to no more than one seed per pit or eliminating their ability to move. Omweso was part of the crowning ceremony of Ugandan kings and remains deeply embedded in Ugandan cultural identity as both a competitive game and a ritual tradition.

