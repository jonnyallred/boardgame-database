description: |
  Samurai Blades is a 1984 man-to-man skirmish wargame set in feudal Japan, published by Standard Games and Publications, that simulates bloody close-quarters combat between samurai, ninja, ashigaru, monks, and peasants on a hex board. Each character is represented by multiple cardboard miniature pieces showing different damage states, and combat is resolved with a 20-sided die, making each exchange feel tactically weighty. The game's roster includes Mounted Samurai, Ninja, Ashigaru armed with bows, yari, and naginata, and various other feudal Japanese combatants. Reviewers praised it for capturing the visceral flavor of samurai cinema in a tight, bloody, and fast-playing format.

