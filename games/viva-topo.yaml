description: |
  Viva Topo! is a children's racing game designed by Manfred Ludwig and published by Pegasus Spiele, winner of the German Kids' Game Award in 2003. Players guide their mice from the starting burrow towards cheese-laden goals at the far end of the board — the further the goal, the more cheese points it is worth. A shared die also advances a hungry cat chasing the mice, and any mouse the cat catches is eliminated. Players must decide how far to push their luck: advance deeper into the board for more cheese but risk being caught, or retreat safely with fewer points. Its simple risk-reward tension makes it ideal for young children and families.

