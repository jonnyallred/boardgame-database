description: |
  Exorbitare (also known as Quantum Jump) is a 1981 abstract family game designed by Nicholas Brennan and Bob Edwards and published by British company Orca Games. The circular board represents the first 86 elements of the Periodic Table of Elements — from hydrogen to radon — arranged around the various electron energy levels of an atom, giving the game a scientific educational theme unusual for abstract games of its era. Players move pieces around this atomic board according to quantum jump-inspired rules, aiming to position tokens advantageously. Orca Games produced only three titles, with Exorbitare being among their first releases.

