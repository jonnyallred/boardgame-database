description: |
  Fantasy Land is a 1981 board game designed by Gary Lange and published by Lange Games, in which player characters are transported to a realm where they must compete in World War I aerial dogfights, magical duels, gunfights, jousts, space battles, and gladiatorial contests. The game's eclectic mix of historical and fantastical combat scenarios gives it an anything-goes character that blends multiple genres in a single gaming experience. Its ambitious scope and diverse encounter types made it a distinctive entry in the early 1980s wave of hybrid adventure games.

