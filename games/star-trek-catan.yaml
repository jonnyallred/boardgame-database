description: |
  Star Trek: Catan is a licensed adaptation of The Settlers of Catan designed by Klaus Teuber, first published
  in 2012 by Kosmos. Players take on the roles of Federation members colonizing uncharted space, gathering
  resources — Dilithium, Tritanium, Oxygen, Food, and Energy — to build outposts and spaceships across a modular
  hex map. The game retains Catan's core resource trading mechanics while adding ten character support cards
  (Kirk, Spock, Uhura, and others) that grant unique abilities, giving the familiar formula a fresh Star Trek
  identity for fans of both franchises.

