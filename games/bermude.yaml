description: |
  Bermude (Bermudes) is a French party game published by Gigamic in which players hold
  their breath as the real-time timer for the round — the difficulty being to succeed
  at the game without laughing or breathing. Players place cards to recover treasures
  from the ocean floor, but when someone takes a breath the round ends and points are
  tallied. Over five rounds, players try to accumulate more treasures than the mermaid
  to win cooperatively. Its unique breathing mechanic makes it a memorable and
  chaotic experience.

