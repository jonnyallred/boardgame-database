description: |
  Oriflamme: Ablaze is a standalone expansion to the award-winning Oriflamme card game, adding 11 new cards with powerful and synergistic abilities to the medieval political conflict. Set during an incendiary war that threatens to reduce the kingdom to ash, the expansion introduces fire-themed card effects that can be mixed with the original Oriflamme or played entirely on their own. Like the base game, players build an Influence Queue of face-down cards over six rounds and score the most influence points to claim victory, but the new cards add fresh tactical layers and deceptive possibilities that expand the game's strategic palette.

