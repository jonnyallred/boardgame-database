description: |
  Startups is a 2017 Oink Games card game of investment and information asymmetry for 3-7 players designed by Jun Sasaki. Each card represents a share in one of six startup companies, and players take turns drawing from the deck (blind, placing a coin on each market card) or taking a market card and any coins on it. The mix of public information (which companies a player is investing in, since played cards are visible) and private hand information creates a clever guessing game. The player with the largest stake in each company claims its victory points at game end.

