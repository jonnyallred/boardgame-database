description: |
  Tac Air is a complex two-player operational-level wargame published by Avalon
  Hill in 1987, depicting NATO vs. Warsaw Pact combat in southern Germany along
  the Main River corridor. Originally developed by US Air Force officers, the
  game models the "modern air-land battle" doctrine with remarkable fidelity,
  including air-to-air combat, close air support, interdiction, Wild Weasel and
  electronic warfare missions, reconnaissance flights, and surface-to-air missile
  networks. Players must coordinate ground forces and air power to either blunt
  or execute a Warsaw Pact invasion. It won the CSR award for Best Modern Era
  Boardgame in 1987.

