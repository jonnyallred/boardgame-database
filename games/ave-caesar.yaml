description: |
  Ave Caesar is a chariot racing game set in the Circus Maximus of ancient Rome, where players must navigate their chariots around a variable track over three laps using a hand of movement cards. The game's defining twist is that every player must stop at Caesar's box at least once to pay homage, costing them precious movement. Track bottlenecks, aggressive blocking, and tight card management create genuine tension in this quick and interactive racing game. It won the 1989 Årets Spel Best Family Game Award and remains a beloved racing classic.

