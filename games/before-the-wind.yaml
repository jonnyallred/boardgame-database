description: |
  Before the Wind is a 2007 merchant trading game in which players compete as merchants
  trying to fill their warehouses with goods that ship captains require for their voyages.
  Since each captain will only accept goods from a single merchant, players must quickly
  collect the right combination of cargo before their rivals do. The game rewards
  hand management and set collection skills, with a maritime theme of bustling
  harbor commerce set in the age of sail.

