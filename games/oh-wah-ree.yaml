description: |
  Oh-Wah-Ree is a mancala variant designed by Alex Randolph and published in 1962 by 3M as part of their renowned Bookshelf Games line, based on the West African mancala game Oware. The game is played on a distinctive contoured fold-away board with a ring of pits and stone playing pieces, and distinguishes itself from standard mancala by including a second ring of holes to mark ownership of pits — a feature that allows play between two, three, or four players simultaneously. Multiple mancala variations are included in the rules, giving the set considerable depth and variety. The game was recognized by Games Magazine in their Top 100 Games of 1981 as the definitive commercial mancala offering due to its multi-variant ruleset.

