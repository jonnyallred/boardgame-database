description: |
  Snit's Revenge is a two-player game designed and illustrated by Tom Wham, first published as a Dragon Magazine
  insert in 1977 and later as a boxed game by TSR. One player controls a tribe of tiny Snits invading a massive
  alien creature called a Bolotomus from within, while the other commands the creature's bizarre internal defenses
  — including Runnungitms (white-blood-cell analogues) and absurdly named organs connected by narrow tubes. Snits
  win by kicking a percentage of Snorgs to death or finding the hidden Spark of Life; the Bolotomus wins by
  Chomping all Snits. Its utterly whimsical theme and clever asymmetric combat are a beloved Tom Wham trademark.

