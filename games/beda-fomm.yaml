description: |
  Beda Fomm is a two-player WWII wargame designed by Frank Chadwick and published by
  Game Designer's Workshop (GDW) in 1979, simulating the 1941 Battle of Beda Fomm in
  Libya where British forces trapped an Italian army trying to escape. Part of GDW's
  "120 System" — games with 120 counters designed to play in about 120 minutes — one
  player controls the British setting an ambush while the other controls the Italians
  attempting a breakout. A revised edition was published by Consim Press in 2010.

