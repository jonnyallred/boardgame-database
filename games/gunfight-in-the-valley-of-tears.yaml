description: |
  Gunfight in the Valley of Tears, October 9, 1973 is a desktop-published (DTP) tactical wargame simulating the decisive three-hour tank battle between Israel and Syria on the Golan Heights during the 1973 Yom Kippur War. The game operates at a scale of 200 yards per hex with individual tanks and infantry squads, and 20-minute turns capturing the rapid intensity of what became a turning point in the conflict. Designed as an accessible introductory wargame, it was released by Perry Moore in a plastic sleeve with a paper map and uncut counters, making it inexpensive and portable while covering one of the most consequential small-unit armor engagements in modern military history.

