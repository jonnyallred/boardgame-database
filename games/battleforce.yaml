description: |
  BattleForce is a large-scale tactical wargame set in the BattleTech universe, published by FASA Corporation in 1987. Whereas classic BattleTech simulates individual mech-on-mech combat, BattleForce abstracts the statistics to allow players to command entire companies, battalions, and larger formations. Units are represented by counters on a hex map, with streamlined combat resolution enabling much larger battles than the base game supports. BattleForce became the foundation for the later Alpha Strike streamlined rules system and provides a compelling option for players who want to fight at the grand tactical scale of the BattleTech universe.

