description: |
  Crimea: The Dawn of Modern Warfare is a grand-tactical wargame by Frank Chadwick published by Game Designers' Workshop (GDW) in 1975, covering the Crimean War from the Allied landings at Evpatoria through the fall of Sevastopol. Unlike most wargames of its era that used a simple alternating I-Go-You-Go turn structure, Crimea uses an innovative mixed-initiative system where movement and combat from both players interleave in an open-ended structure, ending only when combat naturally subsides. Initially sold as a ziplock bag game, it was highly rated, placing 7th in a 1976 SPI poll of the 202 most popular wargames in North America. It remains a historically notable design for its departure from conventional wargame turn structures.

