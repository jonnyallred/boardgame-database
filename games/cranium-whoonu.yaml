description: |
  Cranium Whoonu is a party game in which players compete to predict each other's favorite things. One player is the Whoozit — the "birthday person" — and everyone else submits cards from their hands representing potential favorites. The Whoozit secretly ranks all gifts from least favorite to most, then reveals them one at a time, awarding points to whoever submitted each item at its rank. Winning requires knowing your friends well enough to give them what they actually love (or deliberately choosing the worst gift!). The game rewards social insight and creates naturally funny moments as players discover surprising preferences about people they thought they knew.

