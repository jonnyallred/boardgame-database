description: |
  Attika transports players to ancient Greece, where rival city-states compete to build their settlements across a modular hex-tile landscape. On each turn, players may either gather resources or build one or more structures from their hand of 30 building tiles. The clever catch is that connecting a building to two or more existing structures of the same terrain type allows it to be placed for free. Victory is achieved either by connecting two sacred shrines on opposite sides of the board or by constructing all 30 of your buildings. The tension between rapid expansion and blocking opponents makes Attika a sharp, elegant Spiel des Jahres nominee.

