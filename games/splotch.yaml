description: |
  Splotch! is a standalone expansion for the frog-themed board game Croak!, in which players move frog pieces around a board attempting to land on opposing frogs to eliminate them while protecting their own queen frog. The game retains Croak!'s core eat-or-be-eaten capture mechanics where landing on an opponent's piece removes it from play, while the standalone design allows it to be played without the base game. Publisher and designer details are not well documented for this edition.

