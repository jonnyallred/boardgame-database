description: |
  TransAmerica is a streamlined railroad network game in which each player secretly holds five cities across the United States that must be connected by rail. Each turn players place one or two track segments, benefiting from and contributing to a shared network — the player who can best exploit opponents' rails while completing their own connections wins. Praised for its elegant simplicity, it was nominated for the 2002 Spiel des Jahres and won a Mensa Select award, establishing itself as a classic gateway game that plays in under 30 minutes.

