description: |
  Last Battle: Twilight 2000 is a tactical wargame published by GDW (Game Designers' Workshop) set in the post-nuclear war Twilight 2000 universe, depicting conventional military conflict in a devastated near-future Europe. Players command remnant military units fighting for resources and survival in a world where World War III has collapsed most of civilization. The game uses hex-based maps and counter-based units representing infantry, armor, and support weapons, with rules reflecting the degraded logistics and improvised nature of post-apocalyptic warfare. It is part of GDW's Twilight 2000 product line that combined role-playing and wargaming elements.

