description: |
  Oil War: American Intervention in the Persian Gulf is a 1975 board wargame published by Simulations Publications Inc. (SPI), designed by Jim Dunnigan and released as a pull-out game in Strategy & Tactics magazine issue 52. The game simulates a hypothetical US-led military intervention into the oil-producing regions of the Middle East, inspired by the 1973 OPEC oil embargo, at the brigade and squadron level across a sixteen-day campaign. Players choose from three scenarios covering different operational objectives, managing land and air forces in a fluid and fast-playing system Dunnigan designed in under a year after the real-world crisis. Innovative for its time, the game received praise for its clean, novel game system despite modest commercial performance.

