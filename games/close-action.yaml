description: |
  Close Action is a hex-based naval wargame covering Age of Sail warfare from 1740 to 1815, published by Clash of Arms Games. Players plot simultaneous movement orders for their ships each turn on individual ship logs — assigning crew to sails, guns, and damage control — then execute those orders, recreating the tactical complexity of 18th-century fleet actions. The game includes 25 scenarios ranging from single-ship duels to full fleet engagements, allowing historical battles to be accurately recreated. Its detailed simulation of wind, rigging, and naval gunnery makes it a respected choice for serious Age of Sail wargamers.

