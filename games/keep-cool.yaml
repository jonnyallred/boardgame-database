description: |
  Keep Cool: Gambling with the Climate is an educational negotiation game developed by scientists at the Potsdam Institute for Climate Impact Research, in which 3-6 players represent groups of nations — such as Europe, OPEC, and developing countries — navigating the tension between economic growth and climate stability. Players choose between "black" (polluting) or "green" growth strategies while negotiating emissions agreements, adapting to climate impacts like droughts and floods that intensify as global temperature rises. Created as a serious game for environmental education, Keep Cool has been used in schools, universities, and by the German Federal Ministry for the Environment as a teaching tool.

