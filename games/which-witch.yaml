description: |
  Which Witch? is a 1970 Milton Bradley board game designed by Marvin Glass & Associates featuring a memorable three-dimensional haunted house game board with four rooms—the Spell Cell, Bat's Ballroom, Broom Room, and Witchin Kitchen—and a central chimney. Players roll dice to move their pawns through the house, drawing cards that summon one of three witches: Wanda the Wicked (who turns players into mice, freezing them), Ghoulish Gertie, or Glenda the Good (who breaks Wanda's spells). The goal is to be the first to escape to the Charmed Circle. Its imaginative 3D components and whimsical theme made it a beloved classic of 1970s children's gaming.

