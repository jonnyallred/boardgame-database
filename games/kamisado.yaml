description: |
  Kamisado is a two-player abstract strategy game played on an 8x8 multicolored board where each player controls eight octagonal dragon tower pieces, each matching one of eight colors on the board. The key constraint: after your opponent moves, you must move the piece whose color matches the square your opponent just landed on — so each move determines what your opponent can do next, creating chains of forced and opportunistic plays. Pieces can be promoted to Sumos with the ability to push opponents backward. Elegant in its simplicity yet deep in strategy, Kamisado rewards pattern recognition and long-range planning.

