description: |
  The Devil's Cauldron is a company-level simulation of Operation Market Garden's northern two drop
  zones — the battles for Arnhem and Nijmegen — published by Multi-Man Publishing in 2008 and
  designed by Adam Starkweather. Using a chit-pull activation system combined with command points,
  units remain inactive until drawn or activated, creating the fog and friction of the actual
  battle. The hexagonal map system includes line-of-sight calculations, and dice determine combat
  outcomes. The game is celebrated in the operational wargame community for its fidelity to the
  historical campaign and its demanding but rewarding complexity, making it a landmark title in
  the MMP/GTS series.

