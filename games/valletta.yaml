description: |
  Valletta is a deck-building game for 2–4 players set in the historic Maltese capital, the youngest city ever to hold the title of European Capital of Culture. Players build individual decks of action cards representing the city's notable citizens — merchants, guards, architects — using them to gather resources, construct buildings, and score points. What distinguishes Valletta is its flexible card-timing system: players can play cards from hand, from the top of their deck, or from their discard pile, giving remarkable control over combo execution. The result is a satisfying, medium-weight deck-builder with a distinctive structure and appealing Mediterranean theme.

