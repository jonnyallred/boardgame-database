description: |
  Mountain Goats is a light press-your-luck dice game in which players roll dice to move their goats to the tops of six different mountains. A goat at the top of a mountain scores points for as long as it stays there, but opponents can knock it down by landing their own goat higher up. The game combines tactical goat placement decisions with dice randomness, creating a quick and accessible experience. Published by Allplay, Mountain Goats plays in about 20 minutes and is suitable for families and casual players.

