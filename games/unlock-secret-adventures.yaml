description: |
  Unlock! Secret Adventures is an installment in the Unlock! cooperative escape-room card game series from Space Cowboys, containing three standalone scenarios. Players foil Professor Noside's revenge plot, protect cargo from train robbers aboard the Tombstone Express, and help Dorothy and her companions escape the Wicked Witch in a Land of Oz adventure. Using only a deck of illustrated cards and the free companion app for hints and code verification, teams collaborate to search scenes, combine objects, and escape before the one-hour timer runs out.

