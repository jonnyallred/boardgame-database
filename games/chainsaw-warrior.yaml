description: |
  Chainsaw Warrior is a solo board game published by Games Workshop in 1987 in which a lone heavily armed hero must battle through an infested building to defeat the mysterious entity known as Darkness before time runs out and New York is destroyed. Players equip their warrior with high-tech weapons from a selection of cards and then work through a tile-drawing system, fighting zombies, mutants, and other horrors. The game is entirely solitaire and plays within an hour, making it a notably early example of the solo board game genre. Its blend of pulp horror and against-the-clock tension earned it cult status.

