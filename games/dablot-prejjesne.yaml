description: |
  Dablot Prejjesne (meaning "To play Dablo on a board" in Sami) is a traditional two-player abstract strategy game from the Lapland region of Sweden, representing the historical struggle between the nomadic Sami people and Finnish landowners settling their territory. Played on a 6x7 diagonal grid with pieces at intersections, each side commands 30 pieces with three ranks — a king, a prince/son, and 28 warriors/peasants — each with different capturing powers. The hierarchical piece system adds tactical depth: kings can capture anyone, while lower-ranked pieces cannot capture the opponent's top leaders. It is one of the most culturally distinctive abstract games of northern Europe.

