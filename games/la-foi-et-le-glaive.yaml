description: |
  La Foi et le Glaive (The Faith and the Sword) is a 1993 French board game published by Azure Wish Enterprise simulating the religious and military struggles of 7th-century Europe and the Near East. Six players each control one of the major empires and faiths of the era — the Frankish Catholics, Avar shamanists, Viking pagans, Arab Muslims, Persian Zoroastrians, and Byzantine Christians — using conventional military forces and priests on a double-sided map that tracks both military and religious events simultaneously. Military maneuvering is managed similarly to the game Diplomacy, while the religious dimension adds an additional sphere of influence to contest.

