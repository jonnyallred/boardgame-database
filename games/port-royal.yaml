description: |
  Port Royal is a push-your-luck card game for 2–5 players set in the raucous Caribbean Sea, where merchant players compete to hire the most valuable crews and rack up points before their luck runs dry. On your turn you flip ship cards one at a time, collecting coins — but two ships of the same color forces you to stop and take nothing. Stop early and use coins to hire crew members with ongoing powers. First player to 12 points ends the game. Port Royal is a brilliant gateway filler from Alexander Pfister that packs genuine tension and player interaction into a tiny box.

