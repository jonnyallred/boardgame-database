description: |
  Kung Fu 2100 is a 1980 sci-fi martial arts microgame by Steve Jackson Games designed by Dennis Sustare, set in a future dystopia where an evil CloneMaster rules through trained Terminator warriors. One player controls the freedom-fighting Terminators, the other the CloneMaster's minions, with combat resolved through a skill-counter selection system combined with a six-sided die and combat results table. Originally published in The Space Gamer magazine in August 1980 alongside a companion story, it was then released as a standalone microgame. A 2019 Pocket Box edition brought the game back to print in updated form.

