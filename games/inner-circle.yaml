description: |
  Inner Circle is a board game designed by Virginia Charves and Wayne J. Yee, published by Milton Bradley in 1981. Played on a unique multi-level gameboard, players navigate from the outer ring toward the inner circle, encountering opportunities and hazards along the way. The game was marketed as a survival-themed board game in which strategic movement and resource management determine who reaches the coveted inner circle first.

