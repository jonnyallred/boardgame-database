description: |
  Orongo is a 2014 bidding and building game by Reiner Knizia, published by Ravensburger, set on the mysterious Easter Island where players pay homage to the gods and erect the famous giant stone moai statues. Players bid shells to claim the best building sites and resources needed to construct the statues, combining a repeated auction structure with area-control scoring. The game ends when a player completes all of their own moai and then helps construct the communal seventh moai on the board. Simple rules and an intriguing blend of bidding and placement make Orongo an accessible strategy game for families.

