description: |
  The Witcher RPG is a 2018 tabletop role-playing game designed by Cody Pondsmith and published by R. Talsorian Games, set in Andrzej Sapkowski's Witcher universe. Players take on the roles of characters living in the morally grey world of the Continent—as Witchers, mages, bards, merchants, or ordinary humans—navigating political intrigue, monster hunts, and the consequences of war. The game uses a percentile-based system adapted from Cyberpunk, with combat that is lethal and tactical, emphasizing gritty realism over heroic fantasy. It captures the atmosphere of the novels and video games with a focus on meaningful choices and morally complex storytelling.

