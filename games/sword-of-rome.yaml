description: |
  Sword of Rome is a card-driven wargame published by GMT Games simulating the
  vicious struggles among the peoples of Italy and Sicily in the 4th and 3rd
  centuries BC. Using GMT's acclaimed card-driven game system, players control
  one of up to five factions — including Romans, Samnites, Latins, Greek city-
  states, and Celts — each with a customized deck of 152 event cards that
  reflect their unique historical strengths. Point-to-point movement and events
  covering Roman colonies, Gallic raids, siege craft, and war elephants recreate
  over 100 years of classical history in nine hands of cards. A second edition
  in 2010 expanded support to five players.

