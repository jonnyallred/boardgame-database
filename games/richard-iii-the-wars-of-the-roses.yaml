description: |
  Richard III: The Wars of the Roses is an epic two-player block wargame published by Columbia Games in 2009, designed by Tom Dalgliesh and Jerry Taylor, depicting the thirty-two-year dynastic struggle between the Houses of Lancaster and York for the English throne (1455–1486). Using Columbia's signature block system, players can see the full strength of their own forces but not their opponent's, creating an integrated fog-of-war that rewards careful deduction and deception. The game builds on the award-winning system of Hammer of the Scots with innovative new rules to capture the political intrigue, shifting alliances, and brutal military campaigns surrounding the reigns of Henry VI, Edward IV, Richard III, and Henry VII. Covering some of the most dramatic events in English medieval history, the game offers exceptional strategic depth within an elegantly streamlined block wargame framework.

