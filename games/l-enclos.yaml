description: |
  L'Enclos is a 1986 two-player abstract strategy game designed by Michel Boutin and first published in the French educational journal Vers l'Éducation Nouvelle. The game lasts approximately 15 minutes and offers a compact strategic challenge. Being an obscure publication from a French educational publication, detailed rules are not widely available in English, but it represents an example of abstract game design from French educational gaming circles of the 1980s.

