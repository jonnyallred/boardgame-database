description: |
  Sevens (also known as Fan Tan, Parliament, and Domino) is a traditional shedding card game played with a standard deck in which players take turns building a layout of cards in suit order starting from the sevens. Each player must play a card adjacent to an existing card in the layout on their turn or pass; the first player to empty their hand wins. The game's accessibility and the light strategic element of blocking opponents' card plays with your own hand make it a perennial family favorite played worldwide.

