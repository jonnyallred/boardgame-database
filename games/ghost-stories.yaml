description: |
  Ghost Stories is a brutally challenging cooperative board game for 1-4 players designed by Antoine Bauza and published by Repos Production. Players take on the roles of Taoist monks defending a remote Chinese mountain village from a relentless horde of ghosts summoned by the demon lord Wu-Feng. Each monk has unique powers; on each turn, the haunting intensifies as new ghost tiles enter the board, threatening to overrun the village. Players must coordinate carefully, manage limited resources, and work together to exorcise ghosts before the village falls. Celebrated for its stunning artwork and punishing difficulty, it is considered one of the finest cooperative games ever designed.

