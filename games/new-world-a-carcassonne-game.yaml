description: |
  New World: A Carcassonne Game is a standalone tile-placement game by Klaus-Jürgen Wrede, published by Hans im Glück and Rio Grande Games in 2008 (originally released in German as Mayflower). Set during the colonization of North America rather than medieval France, the game uses the familiar Carcassonne tile-drawing and meeple-placement system but replaces roads and cities with native American trails, farmland, and settlements. A westward migration mechanic adds a distinctive twist: as play advances, a "migration line" moves east to west across the board, removing meeples in low-scoring positions and forcing players to continually push forward.

