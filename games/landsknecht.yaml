description: |
  Landsknecht is a Renaissance-era wargame that uses individual counters representing footmen and horsemen to simulate tactical combat during the late Middle Ages and early Renaissance in Europe. The game introduces basic military concepts including formation, drill, enfilade, defilade, and battlefield maneuver at a realistic tactical scale. A distinctive feature of the rules is a no-dice mechanism intended to restore fun and suspense through tactical positioning rather than random resolution. The game covers the period of the famous German Landsknecht mercenary infantry formations that dominated European warfare in the 15th and 16th centuries.

