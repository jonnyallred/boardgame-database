description: |
  Cheese Chasers is a solitaire and multiplayer tile-placement card game published by Burnt Toast Publishing in 2008, originally designed as a free print-and-play game. Players draw cards in random order and place them in a play area, trying to surround cheese with their mice while avoiding cats and traps. Games last just one to five minutes, making it one of the fastest card games in existence. A digital adaptation was later developed for mobile platforms by Boardnaut Studios.

