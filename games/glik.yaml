description: |
  Glik is a light abstract strategy game designed by Adam Kałuża, available as a print-and-play game sharing components with its sibling game Glak. Players attempt to transport all their pieces from a starting position to a home position, with pieces sliding until they hit a wall or a special blocker piece. The movement interplay between standard pieces and blocker pieces creates tactical opportunities for impeding opponents while advancing your own. Its minimal rules and compact design make it an accessible introduction to abstract racing-style puzzles.

