description: |
  La Grande Armée is a 1972 SPI operational wargame designed by Richard Berg covering three of Napoleon's central European campaigns: the 1805 Austrian campaign, the 1806 Prussian campaign, and the 1809 Austrian campaign. One player commands Napoleon while the other controls his varied enemies, with each 10-day turn requiring movement, combat, and supply resolution. Units can execute forced marches at the cost of disruption and straggler losses, while corps can be broken down for speed or consolidated for mass. The most popular Napoleonic operational game in a 1976 SPI poll and praised as an SPI classic in The Complete Book of Wargames.

