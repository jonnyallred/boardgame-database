description: |
  Mini Rogue is a minimalist dungeon-crawling game for 1-2 players that packs a full roguelike experience into just a handful of cards and dice. Players descend through a dungeon, making decisions at each room about fighting monsters, collecting treasure, or fleeing — with dice rolls creating the push-your-luck tension familiar to the video game genre. Originally a beloved 9-card PnP game that won Best New Designers at the 2016 Nanogame Design Contest, the Ares Games edition adds full production value while preserving the essence: every run is different, death is always close, and victory feels hard-earned.
