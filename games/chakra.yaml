description: |
  Chakra is an abstract strategy game for 2–4 players from publisher BLAM! in which players channel energy through their personal chakra boards, drafting colored gem tokens and sliding them through rows to build complete, harmonious energy centers. Players must carefully manage the flow of gems—pushing new ones in from one end cascades existing gems through the board—while racing to align seven chakras before their opponents. The elegant push-slide mechanism and vibrant components make Chakra a visually striking and mentally satisfying light abstract.

