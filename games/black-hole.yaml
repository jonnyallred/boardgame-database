description: |
  Black Hole is a two-player science fiction microgame designed by Robert Taylor and
  published by Metagaming Concepts in 1978, set on a donut-shaped asteroid created by
  aliens with a black hole at its center. Players command corporate armies of heavy armor
  units armed with rockets or lasers, maneuvering across a unique two-dimensional map
  that approximates three-dimensional space around the gravitational anomaly. As one of
  Metagaming's early microgames following Ogre, Black Hole plays quickly and was praised
  for its innovative spatial mechanics.

