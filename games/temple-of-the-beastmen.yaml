description: |
  Temple of the Beastmen is a cooperative dungeon-crawl board game published
  by Game Designers' Workshop in 1989, set in the Space 1889 steampunk science
  fiction universe. Players lead a team of up to ten adventurers into the mines
  of the sinister Martian King Gnaashriik to rescue slaves and collect treasure.
  The mine is generated from shuffled face-down tiles placed five levels deep,
  creating a different dungeon layout each game. A card deck drives discoveries,
  hidden passages, traps, and combat as characters with unique abilities and
  special scoring conditions explore the procedurally-generated maze together.

