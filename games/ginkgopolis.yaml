description: |
  Ginkgopolis is a city-building card-and-tile game where players simultaneously choose
  cards to expand or build upon a shared futuristic city. Playing a card either adds a
  new tile to the city's border or stacks a tile on top of an existing one, altering who
  controls which districts. A hand-drafting mechanism means players rotate cards, gradually
  building personalized engines while competing for the most valuable urban real estate.
  The elegant interplay between card drafting, area control, and engine building rewards
  multiple plays to master.

