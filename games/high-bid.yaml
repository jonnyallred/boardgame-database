description: |
  High-Bid is an auction game published by 3M as part of their Bookshelf Games series in 1963, simulating the buying and selling of items at auction. Players bid against each other for various objects, trying to acquire the most valuable collection within a budget. The game sold well enough to prompt numerous new editions through 1975, and was later republished by Avalon Hill as The Collector (1977) and Auction (1989). It was one of the early mass-market games to popularize auction mechanics as a core gameplay system.

