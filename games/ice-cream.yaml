description: |
  Ice Cream is a children's board game themed around collecting and building ice cream sundaes or cones. Players compete to gather the right ingredients or scoops to complete their ice cream orders before opponents, using simple mechanics appropriate for young children. The game's bright, appetizing artwork and food theme make it an approachable first game for young players.

