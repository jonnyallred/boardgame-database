description: |
  Tabula is an ancient Greco-Roman board game, an early predecessor to
  backgammon, that was popular across the Roman Empire from approximately the
  1st century AD. Played on a board with 24 points arranged like a modern
  backgammon board, each of two players moves 15 pieces anticlockwise according
  to the roll of three six-sided dice. Unlike modern backgammon, all pieces
  enter the board from the start and both players move in the same direction.
  Single pieces on a point can be captured and must restart. Emperor Claudius
  was a noted enthusiast and reportedly wrote a book on the game.

