description: |
  Breakout: Normandy is a two-player operational-level wargame covering the Allied campaign
  to break out of the Normandy beachhead following D-Day in the summer of 1944, published
  by Avalon Hill in 1992. The game uses an innovative impulse-based action system — rather
  than alternating full turns, each player takes a limited number of actions per impulse —
  creating a tense, reactive experience that captures the fluid pace of modern armored
  warfare. Players command entire army groups across a hex map of northwestern France,
  managing supply lines and exploitation breakthroughs. The game is well-regarded for its
  historically plausible outcomes and the way its activation system keeps both players
  engaged throughout.

