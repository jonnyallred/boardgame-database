description: |
  Catan Historical Scenarios I: Alexander and Cheops is a 1998 expansion for Settlers of Catan containing two historical scenarios. In Cheops, players use standard Catan mechanics to expand their settlements while also contributing resources to build the Great Pyramid — accessible only to players with settlements at its base or connected roads. In Alexander the Great, players advise the expanding Macedonian empire starting with no settlements, growing outward from Alexander's starting point. Both scenarios transplant the familiar Catan engine into richly themed ancient historical settings. Requires the base Catan game.

