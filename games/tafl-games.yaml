description: |
  Tafl games (also called hnefatafl games) are a family of ancient Northern
  European two-player strategy board games that were widely played by Norse and
  Celtic peoples from approximately the 4th century AD until chess supplanted
  them in the 12th century. Played on a grid with asymmetric armies — one side
  defends a king in the center while the other seeks to capture it — pieces move
  like rooks in chess and are captured by surrounding them on two sides. The most
  famous variant, tablut, was documented by Linnaeus in 1732, and modern
  players enjoy dozens of regional variants on boards ranging from 7x7 to 19x19.

