description: |
  Such a Thing? is a 1989 card game designed by Urs Hostettler in which players take turns adding category cards — "needs fuel," "swims," "can be used militarily" — to a central collection, challenging each other to think of a real thing that satisfies all the criteria. When a player doubts a match exists, they can challenge; if the previous player can name a convincing thing, the doubter takes a penalty, but if they cannot, the previous player is penalized instead. The game earned a Spiel des Jahres Recommended nomination and placed third at the Deutscher Spiele Preis, and its simple, escalating creativity makes it an effective party game.

