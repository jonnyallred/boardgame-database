description: |
  Uisge (Scottish Gaelic for "water," pronounced similarly to "whisky") is a two-player abstract strategy game designed by Roland Siegers and published by Hexagames in 1984 (also known as Skorpion). Players race to flip all their playing stones on a rectangular grid through careful positioning and tactical moves. The game was featured as a "break-away game" in Spielbox magazine in 1983, earning early recognition among European abstract strategy enthusiasts.

