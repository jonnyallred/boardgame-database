description: |
  Attacktix Battle Figure Game: Star Wars is a collectible dexterity miniatures game
  published by Hasbro in 2005, timed to promote Star Wars Episode III: Revenge of the
  Sith. Players field teams of Star Wars characters on spring-loaded bases with projectile
  launchers and swinging combat mechanisms, aiming to knock down the opponent's figures.
  Each base features clicking movement wheels for measuring distance, and characters
  carry speed, defense, point values, and unique special powers. The Star Wars series
  was the first Attacktix line, later expanded to Marvel and Transformers, and offered
  a fun, physical collectible experience for fans of the franchise.

