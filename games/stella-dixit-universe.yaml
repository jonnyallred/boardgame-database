description: |
  Stella: Dixit Universe is a competitive standalone game set in the Dixit universe, published by Libellud/Asmodee in 2021, for 3–6 players. Each round, all players receive the same clue word and secretly mark Dixit image cards on their personal erasable slates that they associate with that word. Scoring rewards matching other players' choices — selecting the same cards as others earns points, while picking a unique card nobody else chose risks a penalty. The result is a fascinating social-deduction guessing game about how other players think, using the gorgeous surrealist Dixit artwork as the shared canvas.

