description: |
  Lunch Money is an irreverent elimination card game for 2-5 players centered on a darkly humorous schoolyard brawl theme, featuring Gothic black-and-white photographs of a pigtailed girl. Each player starts with 15 health points and takes turns playing attack cards — punches, kicks, and nasty special moves — against opponents who can attempt to block, dodge, or counter-attack. The last player standing wins. Released by Atlas Games in 1996, it jointly won the Origins Award for Best Card Game of 1996, and its audacious photography and straightforward mechanics made it a cult favorite in the early CCG era despite being a conventional card game.

