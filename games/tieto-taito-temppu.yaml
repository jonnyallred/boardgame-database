description: |
  Tieto & Taito & Temppu (Knowledge, Skill & Trick) is a Finnish children's educational board game published by Peliko in which players move around a circular calendar-themed board based on die rolls. Landing on special squares prompts players to draw a card and attempt either a trivia question, a math or language skill task, or a physical activity. The birthdate-based starting position and calendar structure make the game feel personally tailored to each child, and the variety of task types keeps all learning styles engaged.

