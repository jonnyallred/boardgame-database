description: |
  The Pillars of the Earth is a 2006 worker placement game designed by Michael Rieneck and Stefan Stadler, based on Ken Follett's novel of the same name. Players assume the roles of medieval builders competing to construct a great cathedral, earning victory points through the resources and labor they commit to the project. The game's defining mechanic is its bag-pulling worker placement: each player's three master builder pawns are placed in a bag, drawn randomly one by one, with the cost to place dropping as more pawns are revealed—creating agonizing timing decisions. An expansion released in 2007 adds craftsmen cards, new characters, and support for up to six players.

