description: |
  Great Western Trail: Second Edition is a refined reprint of Alexander Pfister's acclaimed
  cattle-drive deck-builder. Players drive herds from Texas to Kansas City, acquiring and
  culling cattle cards to deliver increasingly valuable herds while hiring workers, building
  private structures, and advancing their railroad network. The second edition streamlines
  several first-edition rough edges, improves iconography, and adds a solo mode, while
  preserving the rich interlocking strategic paths—cattle breeding, infrastructure building,
  and train advancement—that made the original one of the most celebrated Euros of its era.

