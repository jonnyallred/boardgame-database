description: |
  Sporz Original Outbreak is a social deduction game for 7 to 20 players published in 2011, inspired by Werewolf
  and Mafia. A mysterious alien spore has begun turning humans into mutants, and players must cooperate to identify
  and eliminate the infected while each contaminated player secretly works to turn others and betray their former
  allies. The game follows a day-night cycle: at night a narrator calls on each special role, and during the day
  players debate and vote anonymously to execute a suspect. Its science-fiction skin and large player count make
  it well-suited for parties and conventions.

