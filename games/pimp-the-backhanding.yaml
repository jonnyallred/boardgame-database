description: |
  Pimp: The Backhanding is a controversial adult card game published in 2005 by Arthaus Games (an imprint of White Wolf Publishing), designed for 2–4 players. Players use a deck of 100 cards — including Pimp cards, Ho cards, and Draw cards — to compete over three turns of macking and backhanding, using dice rolls modified by card values to win and damage Ho cards. The player with the most valuable Hos at game end wins. The game's graphic content, provocative theme, and intentional shock humor led to significant controversy and banning by numerous retailers, while also earning a cult following among adult party game enthusiasts.

