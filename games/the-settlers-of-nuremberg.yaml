description: |
  The Settlers of Nuremberg is a 1999 standalone Catan variant designed by Klaus Teuber, published in German to commemorate Nuremberg's founding anniversary. Players build settlements and workshops across a split-map board—one half showing the surrounding countryside's resource hexes, the other a close-up of Nuremberg where workshops are constructed. Rather than dice, a card deck determines each turn's production and events. Players also contribute to the construction of Nuremberg's walls and towers for prestige, adding a cooperative-within-competition layer. The game is more complex than base Catan, comparable to Cities & Knights, and was published only in German.

