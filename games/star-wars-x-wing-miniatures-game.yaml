description: |
  Star Wars: X-Wing Miniatures Game is a 2012 tactical dogfighting game by Fantasy Flight Games in which players command squads of highly detailed pre-painted starships in fast-paced space combat. Both players simultaneously select and reveal movement dials for each of their ships before resolving actions and attacks, creating tense mind-game decisions about positioning and engagement. The game uses a range ruler and custom dice for attack and defense, and a rich expansion library of ships across factions including Rebel, Imperial, and Scum & Villainy. This first edition ran until 2018 when it was replaced by Second Edition.

