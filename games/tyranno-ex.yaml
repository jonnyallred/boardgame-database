description: |
  Tyranno Ex is a prehistoric strategy game designed by Karl-Heinz Schmiel and published by Avalon Hill in 1990. Players evolve their chosen dinosaur species to survive in a constantly shifting environment, with each player able to alter environmental conditions each round. Dinosaurs that cannot adapt to the current habitat face extinction, while survivors must contend with attacks from opponents' species. The game blends Euro-style resource and adaptation mechanics with the dramatic tension of an ever-changing prehistoric world.

