description: |
  Gridlock is an abstract strategy game in which players choose a piece to drop onto the grid, then rotate pieces in front of the dropped piece based on the number dropped, turning them to point away from the player. Only pieces lying flat are rotated, creating an evolving board state with each move. Players must anticipate how their drops will ripple through the board, rewarding spatial thinking and forward planning. Detailed designer and publisher information for this edition is not widely documented in available sources.

