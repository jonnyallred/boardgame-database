description: |
  Galacta: Star Commandos is a 1980 science fiction adventure board game played with miniature figures, simulating futuristic combat during a great Rebellion against the interstellar Galactan Empire. Players command squads of space commandos in tactical missions set across the science fiction universe. Limited documentation exists about this title outside collector communities, but it is part of the Galacta game line and represents an early entry in the sci-fi miniatures board game genre.

