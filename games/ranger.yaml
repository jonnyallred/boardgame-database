description: |
  Ranger: Simulation of Modern Patrolling Operations is a wargame published by SPI simulating the dangerous work of infantry patrol missions during the Vietnam era. Players command small units navigating jungle terrain, managing contact with enemy forces, and accomplishing mission objectives while keeping casualties to a minimum. The game is notable for its detailed simulation of small-unit tactics and the psychological tension of patrol operations, making it one of the more grounded tactical wargames of its period.

