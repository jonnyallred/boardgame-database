description: |
  Elric is a 1977 licensed board game published by Chaosium based on Michael Moorcock's Elric of Melniboné novels — Chaosium's first licensed game following their 1975 founding. Players command warring armies and iconic heroes in a cosmic conflict between the forces of Chaos and Law, mediated by a Cosmic Balance mechanic. The original 1977 ziploc edition includes a large color map by William Church, a full sheet of 1-inch character and army counters, and magic cards that introduce unique fantasy elements not found in standard wargames. A revised boxed edition followed in 1981. The game stands as an early example of literary fantasy wargaming that predates the RPG era's full dominance of the hobby.

