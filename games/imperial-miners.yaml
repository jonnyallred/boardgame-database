description: |
  Imperial Miners is a light engine-building card game where players excavate mines and
  build synergistic card engines. Using a clever card-activation system, players chain
  effects across their growing tableau of mine buildings to generate resources, advance
  tracks, and score points. The simultaneous action selection keeps downtime minimal
  while the combo-finding creates satisfying "aha" moments. As a lighter offering from
  Portal Games, Imperial Miners provides accessible engine-building pleasure for 1-5 players.

