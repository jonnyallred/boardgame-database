description: |
  Exploding Kittens is a 2015 card game designed by Elan Lee, Matthew Inman (of The Oatmeal webcomic), and Shane Small, funded via Kickstarter where it raised $8.7 million from 219,382 backers — at the time the most-backed project in Kickstarter history. Players take turns drawing cards from a shuffled deck, trying to avoid drawing an Exploding Kitten which eliminates them from the game. Various action cards allow players to skip their draw, peek at the deck, shuffle it, steal cards, or force opponents to draw more cards, creating a chaotic last-one-standing dynamic. The game's irreverent humor, absurdist art by Matthew Inman, and simple rules made it a massive commercial success, spawning numerous expansions and spin-offs.

