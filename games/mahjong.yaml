description: |
  Mahjong is a tile-based game developed in China during the Qing Dynasty, with the earliest surviving sets dating to the 1870s. Four players draw and discard tiles, working to assemble a winning hand of four melds (sets of three) and one pair from 136 to 144 tiles across three suits plus honor tiles (winds and dragons). The clacking sound of shuffled tiles — said to resemble chattering sparrows, the game's original name — is iconic worldwide. Brought to the United States by businessman Joseph P. Babcock in the 1920s, mahjong became a global phenomenon with dozens of regional variants each boasting distinct rules, scoring systems, and cultural traditions.

