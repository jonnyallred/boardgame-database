description: |
  Bakio is a traditional mancala game from Central Africa. Like other mancala variants in the region, it is played on a two-row board with players sowing seeds and capturing according to rules specific to the local tradition. Bakio is part of a rich family of seed-sowing games found throughout Africa, with each regional variant reflecting local cultural practices. Published documentation on Bakio's specific rules is very limited, and the game is primarily known through ethnographic records of traditional African games.

