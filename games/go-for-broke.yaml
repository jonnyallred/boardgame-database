description: |
  Go for Broke! is a reverse-Monopoly style press-your-luck game published by Selchow & Righter in 1965 in which each player starts with one million dollars and races to be the first to go completely broke. On a turn, players roll dice and pay the bank an amount based on the total rolled, but rolling a one earns money back—creating a constant tension between pushing for bigger losses and the risk of a lucky bounce that refills your wallet. Its counter-intuitive goal of intentional bankruptcy makes it an immediate crowd-pleaser and a lasting piece of American game history.

