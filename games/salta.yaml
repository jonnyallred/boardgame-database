description: |
  Salta is a two-player abstract strategy game invented by Konrad Heinrich Büttgenbach in Germany in 1899, played on a 10x10 checkerboard with 15 pieces per player arranged in three ranked rows of stars, moons, and suns. The game reached its peak popularity in the early 1900s before World War I, particularly in France and Germany, attracting famous players including chess grandmasters Frank Marshall and Emanuel Lasker, and French actress Sarah Bernhardt. A celebrated Salta board made of mahogany with golden counters adorned with over 5,000 diamonds was exhibited at the 1900 World Trade Fair in Paris. The game's distinctive piece-type hierarchy and movement rules distinguish it from checkers despite the shared board.

