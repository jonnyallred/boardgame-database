description: |
  Oltre Mare is a trading card and set-collection game set among competing merchant families sailing the Mediterranean, originally published in 2004 and reprinted by Rio Grande Games. Players move ships from port to port, loading and delivering cargoes of seven different goods — spices, silk, silver, sugar, wine, wood, and grain — while trading with rival merchants and playing cards to earn money, draw cards, or advance their ships across the map. In spirit and mechanics, it closely resembles Bohnanza, with tight hand management constraints and lively trading at the heart of the experience. The combination of route management, hand limits, and negotiated trades creates a fast and social economic game.

