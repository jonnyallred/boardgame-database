description: |
  Bug Race is a 2014 dexterity racing game for two to four players in which each player maneuvers their own bug piece toward the finish line by moving its legs one at a time in sequence. The game captures the comedic and tactile joy of controlling an insect's multi-legged movement in a racing format accessible to children and families. Limited publisher information is available for this title.

