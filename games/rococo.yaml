description: |
  Rococo is an elegant Euro game set in 18th century France where players run competing dressmaking workshops preparing elaborate ball gowns and decorations for the Rococo-era court of Louis XV. On each turn, players play employee cards from their personal deck to hire new workers, purchase fabrics, manufacture dresses, or invest in decorating the grand ball. The game weaves together deck building, resource management, and area control as players compete to have their creations displayed most prominently at the ball after seven rounds. Its unique blend of mechanics and distinctive theme — unusual in Euro gaming — earned it wide acclaim and a lavish deluxe edition from Eagle-Gryphon Games.

