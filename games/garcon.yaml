description: |
  Garçon is a café-themed card game in which players take on the role of waiters trying to memorize and fulfill customer orders to earn the best tips. Players must balance remembering their tables' orders against using event cards to disrupt opponents and manage the passage of time. The 77-card game is a light, accessible memory-and-management filler with a charming French bistro atmosphere. Players who best anticipate the table and outmaneuver rivals will collect the most tips and win.

