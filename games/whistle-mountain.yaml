description: |
  Whistle Mountain is a steampunk worker-placement and engine-building game for 2–4 players set on a fantastical mountain where players construct ever-taller airship scaffolding and machines. Workers are placed on a shared mountain board, but the mountain floods periodically — workers left too low drown and are lost, forcing players to continually build their infrastructure higher. Players gather resources, build machines, and deploy airships to access elevated construction sites, creating an escalating vertical race. The flood mechanism creates urgent tension while the engine-building rewards careful planning across the mountain's many interconnected actions.

