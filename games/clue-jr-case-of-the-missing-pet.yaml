description: |
  Clue Jr.: Case of the Missing Pet is a children's deduction game published by Parker Brothers in 1989, adapted from the classic Clue formula for younger players. Instead of solving a murder, children determine which pet was stolen, who took it, and where it is hidden, using a mystery wheel game board that generates 24 different unique scenarios. A red magnifying glass is required to read hidden clues on the wheel, adding a charming physical element to the deduction. As the first in the Clue Jr. series, it was designed to introduce children aged 5 and up to the deduction genre in an age-appropriate way.

