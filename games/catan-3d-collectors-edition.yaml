description: |
  Catan 3D Collector's Edition is a premium collector's version of the classic Settlers of Catan game featuring hand-painted, three-dimensional resin hex tiles and interlocking border pieces. Each player receives hand-painted settlements, cities, metropolises, city walls, knights, and roads, all stored in a specially crafted hardwood case with felt-lined slots. The edition includes the base game and the Cities and Knights expansion, making it the complete luxury Catan package for dedicated fans and collectors. The standard Catan rules apply throughout.

