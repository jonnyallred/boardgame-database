description: |
  Spion & Spion is a 1987 German board game themed around the MAD magazine comic strip Spy vs. Spy. Two players
  each control three spy pawns of their color, racing to break into the opposing embassy to steal the "BAZONG"
  secret item or accumulate 37 coins. Movement is driven by cards allowing 0–4 steps plus various special
  benefits or penalties. The first player to collect 37 coins or successfully transport the stolen BAZONG back
  to their home embassy wins, in a fast-playing two-player race with comic espionage flair.

