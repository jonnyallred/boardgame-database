description: |
  Mhing is a card game based on Mah Jongg, published by Suntex International in 1982, using a 150-card deck organized into three suits (bamboo, characters, and coins numbered 1-9) plus honor cards (four winds and three dragons) and special wild Mhing cards. Like Mah Jongg, the objective is to be the first player to collect four sets of three cards plus one pair, with sets being either sequences or triplets in the same suit. After someone calls Mhing, bonus credits are awarded for special hand configurations such as sequence-only hands or identical double sequences. The Chinese art theme and familiar rummy-like mechanics make it an accessible introduction to Mah Jongg principles.

