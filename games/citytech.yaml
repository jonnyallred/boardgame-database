description: |
  CityTech is a wargame expansion for the BattleTech universe published by FASA in 1986, extending the BattleMech combat rules with infantry and vehicle warfare in urban environments. Players battle through city blocks using BattleMechs, conventional vehicles, and infantry units across two detailed maps and 160 building pieces. The game adds critical street-fighting mechanics to the BattleTech system — including building destruction and confined-space tactics — expanding the tactical possibilities of one of the most celebrated sci-fi miniature wargame systems.

