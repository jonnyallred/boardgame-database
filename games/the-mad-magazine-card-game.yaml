description: |
  The Mad Magazine Card Game is a 1979 card game published by Parker Brothers that blends the mechanics of UNO and Crazy Eights with Mad Magazine's irreverent humor. Players match cards by number, color, picture, or message to the face-up discard pile, and the goal—like the board game companion—is to get rid of all your cards. The game features Alfred E. Neuman's trademark "What, Me Worry?" attitude throughout its cards, making it a party-friendly filler that captures the magazine's satirical spirit in a simple card game format.

