description: |
  Fealty is an abstract territory control game in which players take turns simultaneously adding one piece per round to a shared board over eight rounds, with increasing placement constraints as the board fills. Each player starts with three cards and reveals them simultaneously, with the lowest-numbered card acting first. Players cannot place in the same duchy as another player in the same round and cannot repeat a row or column from their prior placements. After eight rounds, scores are tallied based on territory influence, rewarding players who think ahead while adapting to opponent placements.

