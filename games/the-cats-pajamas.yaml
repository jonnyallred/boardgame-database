description: |
  The Cat's Pajamas is a children's set collection and memory game published by Haywire Group in
  2010. Silly cats have put on too many pairs of pajamas and overheated — players race to remove
  matching pajama tops and bottoms from their cat pawns, layer by layer, to be the first to get
  their cat cool and comfortable in their "Nighty Whiteys." The game uses a simple die-roll
  mechanic combined with matching, making it an accessible early game for young children while
  teaching pattern recognition and color matching in a humorous feline setting.

