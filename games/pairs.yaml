description: |
  Pairs is a simple press-your-luck card game designed by James Ernest and Paul Peterson as "a new classic pub game," funded via Kickstarter in 2014 with over 7,700 backers. The deck has a triangular distribution — one 1, two 2s, three 3s, and so on up to ten 10s — and on each turn a player either draws another card hoping not to match a card already in front of them, or folds and takes the lowest card in play as their score. The game has no winner, only a loser — the first player to accumulate too many points — and its brilliant simplicity has spawned over fifty themed variations using the same deck. A true pub game at heart, Pairs is fast, social, and endlessly replayable.

