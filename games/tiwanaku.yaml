description: |
  Tiwanaku is a deduction and exploration game designed by Olivier Grégoire and published by Sit Down! in 2022, themed around the ancient Andean civilization. Players explore a hidden map of crop fields, using logic to deduce which crops are planted in which areas — like Sudoku meets Minesweeper. Each turn, players place exploration tokens and gather clues to piece together the hidden layout, then score points for correctly identifying completed fields. Solo-playable and beautifully illustrated with Andean mythology, Tiwanaku rewards methodical deductive reasoning over the course of a deeply satisfying puzzle game experience.

