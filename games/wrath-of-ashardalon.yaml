description: |
  Dungeons & Dragons: Wrath of Ashardalon Board Game is a cooperative dungeon-crawling adventure for 1-5 players published by Wizards of the Coast in 2011. Players navigate a monster-infested labyrinth beneath a volcano to confront the fearsome red dragon Ashardalon, revealing dungeon tiles as they explore and fighting monsters drawn from encounter cards. The box includes 42 detailed plastic miniatures, 13 sheets of interlocking dungeon tiles, and 200 encounter and treasure cards across multiple scenarios. It is part of the D&D Adventure System series, fully compatible with Castle Ravenloft and Legend of Drizzt.

