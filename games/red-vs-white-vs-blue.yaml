description: |
  Red vs White vs Blue: A Russian Civil War 1918-1922 is a multi-sided wargame simulating the complex multi-faction struggle of the Russian Civil War. Players control the Bolshevik Red Army, the counter-revolutionary White forces, and potentially the Allied interventionists or other factions competing for control of the former Russian Empire. The three-way dynamic creates unusual strategic situations where temporary alliances and betrayals shape the outcome, capturing the chaotic nature of one of the 20th century's most complex conflicts.

