description: |
  Revolt On Antares is a science fiction hex-and-counter wargame published by TSR in 1981 as part of their microgame line. Set on the alien world of Imhirros, players control noble houses that are either loyal to the Terran Empire or in open rebellion against it, fighting for dominance across a full-color hex map. The game includes three scenarios — Revolt Against Terra, The Silakka Invasion, and Power Politics on Imirrhos — offering both two-player and multiplayer experiences. Each turn progresses through ten ordered phases covering movement, combat, recruitment, and alliance-building, making it a compact but richly layered wargame experience.

