description: |
  Ultra-Warrior is a 1981 science fiction wargame published by Task Force Games and designed by Thomas Zarbock. Set in the far future, the game features single combatants wearing powerful environmental control suits equipped with energy barriers and devastating weapons capable of altering the landscape during combat. Players maneuver their ultra-warriors across the battlefield, using their suits' capabilities strategically while managing terrain modification as part of the tactical challenge.

