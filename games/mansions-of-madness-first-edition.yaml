description: |
  Mansions of Madness: First Edition is a story-driven horror game set in the Arkham Horror universe, designed by Corey Konieczka and published by Fantasy Flight Games in 2011. One player takes the role of the Keeper who controls monsters, manages traps, and guides the narrative while the remaining players cooperatively control investigators exploring a cursed location. Players must uncover clues, solve puzzles, and survive long enough to complete the scenario's objective before the Keeper's plans reach fruition. The game is notable for its immersive 1-vs-many structure and Lovecraftian atmosphere, though it was eventually succeeded by the app-driven Second Edition.

