description: |
  Vikings is a 2007 Spiel des Jahres-recommended tile-placement and economic game designed by Michael Kiesling, published by Rio Grande Games. Players use an innovative pricing wheel to draft pairs of Viking meeples and territory tiles, placing them to populate and settle their island boards. The game's most distinctive feature is its rotating market wheel, which pairs worker types with tiles and adjusts prices each round — certain combinations become cheap while others grow costly, creating clever indirect competition for resources. With no direct player interaction beyond the drafting, Vikings rewards planning and efficient use of limited workers.

