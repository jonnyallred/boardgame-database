description: |
  Ram Speed is a two-player microgame of ancient Mediterranean naval warfare designed by Colin Keizer and published by Metagaming Concepts in 1980. Players build fleets of penteconters, biremes, triremes, and quinqueremes using a point-buy system, then maneuver their galleys across a hex map in the ultimate contest of ship-to-ship ramming tactics. Galleys can move at full speed forward or half speed backward, with short bursts of double or triple speed available at the risk of exhaustion. A compact but tactically rich wargame for Bronze Age naval enthusiasts.

