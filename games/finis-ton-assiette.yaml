description: |
  Finis ton Assiette ("Finish Your Plate!") is a light 2005 children's card game published by Interlude, themed around the comical challenge of finishing a meal. Each player starts with three dish cards (showing foods like chocolate eclairs and chicken with fries), each marked with a number of colored forks. Players play matching Fork action cards to clear their own dishes, while using special cards to add extra dishes to opponents' plates or exchange dishes with rivals. The first player to clear all their dishes wins, creating a fast, luck-driven race for young players.

