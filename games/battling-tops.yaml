description: |
  Battling Tops is a classic dexterity toy-game published by the Ideal Toy Company in 1969 in which players wind up spinning tops and release them simultaneously into a central arena. The spinning tops careen around the arena, knocking each other off the edge; the last top spinning wins the round. No strategy is involved — success depends entirely on the spin imparted at launch and random collisions — making it pure kinetic entertainment. Its simple appeal and tactile excitement have kept it a beloved children's classic for decades, with multiple republications by various toymakers.

