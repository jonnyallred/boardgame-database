description: |
  Sid Meier's Civilization: The Board Game is a 2010 board game designed by Kevin Wilson and published by Fantasy Flight Games, inspired by the acclaimed Civilization IV video game. Two to four players lead one of six civilizations (Americans, Chinese, Egyptians, Germans, Romans, or Russians) on a modular tile board, pursuing four distinct paths to victory: military conquest, scientific achievement (reaching Space Flight), economic dominance (15 coins), or cultural advancement. Combat, technology research, city construction, and trade all play vital roles. Two expansions — Fame and Fortune (2011) and Wisdom and Warfare (2013) — add further civilizations and strategic options.

