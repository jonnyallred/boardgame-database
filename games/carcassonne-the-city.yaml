description: |
  Carcassonne: The City is a deluxe stand-alone Carcassonne variant designed by Klaus-Jürgen Wrede and published by Hans im Glück/Rio Grande Games in 2004, packaged in a distinctive wooden box. Players tile-place streets, markets, and residential areas within an expanding medieval city, and once the first tile pile is exhausted, players begin adding wooden city walls and a gate around the growing settlement. Scoring walls segments for adjacent features adds a dynamic second layer to the familiar Carcassonne experience, and the premium production quality makes it a prized collector's edition.

