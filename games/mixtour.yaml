description: |
  Mixtour is a two-player abstract stacking game designed by Dieter Stein, born out of a stacking game design contest in the rec.games.abstract newsgroup around 2010-2011. Starting with an empty board, players alternately enter new pieces and move existing stacks, with movement range determined by the height of the target stack rather than the moving piece. The goal is to build a stack of five or more pieces with your own color on top — but opponents' pieces can also be moved, so towers become cooperative constructions of both colors. The game was recognized by the Spiel des Jahres organization. It is published by Stein's own spielstein label.

