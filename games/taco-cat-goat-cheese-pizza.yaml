description: |
  Taco Cat Goat Cheese Pizza is a fast-paced reflex card game published by
  Dolphin Hat Games in 2018. Players take turns flipping cards while chanting
  "Taco," "Cat," "Goat," "Cheese," and "Pizza" in sequence — when the spoken
  word matches the flipped card, everyone races to slap the pile. Three special
  action cards (Gorillas, Groundhogs, and Narwhals) trigger silly physical
  challenges before players can slap. The first player to empty their hand wins.
  Simple, hilarious, and endlessly replayable, the game won the 2021 Palme d'Or
  for Best Party Game and has spawned numerous themed editions.

