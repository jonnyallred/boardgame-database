description: |
  Girl Talk is a party board game first published by Golden in 1988, aimed primarily at teenage girls and inspired by truth-or-dare gameplay. Players take turns spinning a wheel to determine whether they must answer a special question, perform a stunt, or draw a fortune card from one of four life categories: career, children, marriage, and special moments. The first player to collect one fortune card from each category wins, but the real appeal lies in the dares, confessions, and silliness along the way. Milton Bradley later acquired and redesigned the game in 1995, making it a nostalgic staple of 1990s sleepovers.

