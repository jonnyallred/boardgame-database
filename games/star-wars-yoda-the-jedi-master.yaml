description: |
  Star Wars: Yoda the Jedi Master is a 1981 Kenner board game based on Luke Skywalker's Jedi training scenes in The Empire Strikes Back. Players complete difficult tasks and trials set by Yoda, accumulating Jedi merit as they progress around the board via spinner. Once a player has enough merit, they enter the Jedi Knight circle and must out-spin the Dark Side of the Force to win. A colorful family game capturing the mystical appeal of Dagobah and the Jedi path.

