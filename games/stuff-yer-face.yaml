description: |
  Stuff Yer Face is a 1982 Milton Bradley dexterity game for two players set in a carnival atmosphere. Each player controls a whimsical clown puppet with movable arms, trying to scoop up and feed their clown all ten marbles of their assigned color (yellow or green) from the circular arena, while avoiding the five red marbles — eating one causes an immediate loss. The marble-eating puppet mechanic gives the game its tactile, physical appeal, making it a popular toy-game hybrid for young children.

