description: |
  Star Trek: The Adventure Game is a 1985 board game by West End Games in which players command Federation and Klingon squadrons competing to win political allegiance in the Organian Treaty Zone. Ships explore planets whose outcomes are determined by a paragraph book system, making exploration feel like a branching narrative. A die-driven movement system creates tension as rushing ships risk burning out dilithium crystals. The game includes solitaire rules and rewards both strategic fleet management and careful resource decisions.

