description: |
  SSN: Modern Tactical Submarine Warfare is a naval wargame designed by Stephen Newberg and Marc W. Miller,
  published by Game Designers' Workshop in 1975. Players command Cold War-era submarines and surface fleets on
  a 1,000-yards-per-hex ocean map. Submarines move secretly off the main map until detected, creating a hidden
  movement cat-and-mouse dynamic; detection success depends on technology levels and submarine noise signatures.
  The game includes 15 scenarios ranging from peacetime electronic surveillance to wartime confrontations pitting
  one submarine against up to 12 surface vessels, with combat resolved on an odds-based CRT using nuclear or
  conventional weapons.

