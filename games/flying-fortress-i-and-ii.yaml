description: |
  Flying Fortress I & II are companion board wargames designed by Jim Dunnigan and published by Poultron Press in 1969 (which shortly became Simulations Publications Inc.), simulating the American daylight bombing campaign over Europe during World War II. The two versions represent an experimental test series in which Dunnigan intended to determine which design worked better for potential republication as a game called Luftwaffe — though that follow-up was never released. The games are historically significant as early examples of the SPI-style hex-and-counter wargame approach.

