description: |
  Owela is a traditional mancala game played by the Oshiwambo-speaking peoples of Namibia and Angola, as well as the Nama, Herero, and Rukwangali communities of southern Africa. Played on a board with four rows of six to twenty-four pits, players sow seeds around the board and capture by moving opponent's stones to their own rows — a mechanic that links it to the Omweso family of Eastern and Southern African mancala games. Traditionally played in pits dug into the earth with no fixed restriction on the number of players, Owela has been transmitted through oral tradition and communal play for generations. Despite the apparently simple rules, the cascading consequences of each move can be difficult to predict, giving the game a quality of elegant unpredictability alongside deep strategic potential.

