description: |
  ACHTUNG! is an abstract game in which players create a growing set of pointless laws and annoying rules that everyone at the table must follow throughout the game. Each new rule added changes the constraints on all players, building an increasingly byzantine web of restrictions that tests attention and compliance. The game rewards players who can remember and navigate the accumulated rules while also trying to trip up their opponents. Specific publisher and designer details are not widely documented.

