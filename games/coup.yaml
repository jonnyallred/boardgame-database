description: |
  Coup is a razor-sharp bluffing card game set in a dystopian future where players are rival courtiers vying for control of a corrupt government. Each player holds two character cards representing different roles — Duke, Assassin, Captain, Ambassador, or Contessa — but may act as any character whether or not they hold it. Players use influence to take coins and eliminate rivals, but any claimed action can be challenged. Caught in a lie or unable to counter a coup, you lose an influence card; lose both and you're out. Coup distills social deduction to its essentials: a fast, brutal game of bluff and counter-bluff that ends in minutes.

