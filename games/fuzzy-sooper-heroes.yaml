description: |
  Fuzzy Sooper Heroes is the second book in the Fuzzy Heroes game system, expanding the core plush-toy miniatures wargame with superhero rules including capes, masks, powers, flight, and chivalry points for doing the right thing. As with the base game, players use their own stuffed animals and plastic toys as miniatures. The supplement includes a ready-to-play superhero adventure and requires ownership of the original Fuzzy Heroes rules. It broadens the creative and imaginative scope of the original game with a comedic superhero theme.

