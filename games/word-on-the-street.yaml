description: |
  Word on the Street is a team-based word game for 2+ teams in which letter tiles are arranged along the center of a street-shaped board. On each turn, one team is given a category and has 30 seconds to agree on a word that fits, then slides each letter in that word one space toward their side of the board. Letters that get pushed completely off one side are captured by that team, and the first team to claim 8 letters wins. Described as a mashup of Scrabble, Scattergories, and tug-of-war, it is fast-paced, hilarious, and accessible to players of all trivia knowledge levels.

