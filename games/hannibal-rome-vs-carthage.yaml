description: |
  Hannibal: Rome vs. Carthage is a card-driven wargame published by Avalon Hill in 1996, simulating the Second Punic War (218–201 BC) between Carthaginian general Hannibal and the Roman Republic. Players use multi-purpose strategy cards to move generals, levy troops, control provinces, and trigger historical events, with the card system — pioneered in the earlier We the People — allowing for exceptional depth with relatively accessible rules. The game features asymmetric forces reflecting Carthage's reliance on its brilliant commander versus Rome's ability to absorb losses and recruit replacements. Hannibal has won the Golden Geek Award for Best 2-Player Game and Best Wargame and is considered a landmark title in the card-driven wargame genre.

