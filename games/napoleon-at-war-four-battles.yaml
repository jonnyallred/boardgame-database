description: |
  Napoleon at War: Four Battles is a SPI quadrigame published in 1975, containing four separate hex-and-counter wargames covering key Napoleonic battles: Marengo (1800), Jena-Auerstadt (1806), Wagram (1809), and the Battle of Nations at Leipzig (1813). Each game has its own designer but shares a common rules framework, allowing players to experience Napoleon's campaigns across different eras of the Napoleonic Wars. The quadrigame format, pioneered by SPI in the 1970s, made it possible to own four complete wargames in one box, making this series influential in the history of hobby wargaming.

