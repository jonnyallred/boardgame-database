description: |
  Ghosts (Geister, Good and Bad Ghosts) is a two-player abstract strategy game designed by Alex Randolph and published in 1982 by Milton Bradley. Each player has eight ghost pieces — four good (marked blue) and four evil (marked red) — but all pieces look identical from the front, hiding their alignment from the opponent. Players race to either capture all four of the opponent's good ghosts or escape one of their own good ghosts through an exit corner, but must avoid capturing opponent's evil ghosts since doing so loses the game. The deduction and bluffing created by hidden piece identities creates rich strategic tension in a remarkably simple game, which was recommended for the 1982 Spiel des Jahres.

