description: |
  Pin Pon! is a cooperative children's game by Djeco in which players race to get the fire truck to a burning house before all the firefighters are used up. Players roll a die each turn — a red result moves the fire truck one step forward; other colors prompt players to flip path cards, which either clear the road or block it. If the fire truck reaches the house in time, all players win together. The game was nominated for the As d'or 2022 Children's Game of the Year award and is designed to introduce very young children to cooperative play in a fun, thematic firefighting scenario.

