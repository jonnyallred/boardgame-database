description: |
  Fuzzy Heroes is a miniatures wargame published by Inner City Games Designs in which players pit their plush and plastic toys against each other in tabletop combat. No special components are required — players use toys they already own, with pillows and clothes serving as terrain. Each toy's stats (Energy Points, Defensive Classification, Movement, and so on) are determined by its actual physical characteristics such as size, material, and color. The game teaches strategy and basic math skills in a uniquely playful and accessible format that encourages creative use of household items.

