description: |
  An interactive VCR murder mystery game published by Spinnaker in 1986, featuring a 30-minute videocassette that players watch and pause at designated moments to read clues aloud from eight playing cards. The plot involves a death at a boarding house, with the victim found behind a Chinese screen. With over 250 possible combinations of clues leading to different endings, the game offers significant replayability, and includes a Detective's Notepad and Solution Decoder to track deductions and reveal the killer.

