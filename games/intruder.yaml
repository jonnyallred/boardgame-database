description: |
  Intruder is a solitaire science fiction microgame published by Task Force Games in 1980, inspired by the film Alien. An alien creature has escaped the labs of space station Prometheus and hunts crew members as it matures and gains new abilities. The player controls the crew, working to capture the alien while young or kill it before losses become unacceptable, with the option of triggering a self-destruct as a last resort. Strategic decisions snowball quickly, creating a tense 45-minute experience of escalating threat management aboard a doomed space station.

