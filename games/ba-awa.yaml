description: |
  Ba-awa is a traditional mancala game originating from the Akan-speaking peoples of Ghana. Played on a two-row board, players sow seeds around the pits, capturing opponent seeds according to standard mancala capture rules. The game is part of a broader family of West African mancala games and is closely related to Oware. Ba-awa is primarily a children's game in its traditional context, providing an accessible entry point into the mancala family of games. Sources on this specific variant are limited, and rules may vary by region and community tradition.

