description: |
  Starship: The Game of Space Contact is a 1975 Fantasy Games Unlimited two-player tactical starship game in which one player is the Interceptor and the other the Intruder, each with a secretly chosen mission. Missions range from peaceful contact to total destruction, and violating one's orders prevents achieving a command victory. Points are awarded for strategic, command, and tactical victories based on ship damage. The emphasis is on skill, bluffing, outmaneuvering, and planning rather than luck, making it a cerebral space combat experience unusual for its era.

