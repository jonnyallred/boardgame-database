description: |
  Olympica is a sci-fi microgame by Steve Jackson published by Metagaming Concepts, pitting U.N. forces against Martian defenders on the surface of Mars. One player commands the attacking United Nations troops attempting to storm the Martian facility at Olympica, while the other controls the Martian defenders. Like other Metagaming microgames of this era, Olympica was designed to be fast-playing and affordable, fitting the full game experience into a small package with a hex map and cardboard counters. It is regarded as an accessible and enjoyable example of the microgame format pioneered by Metagaming in the 1970s-80s.

