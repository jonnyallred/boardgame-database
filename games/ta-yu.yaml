description: |
  Ta Yü is a two-player abstract tile-placement game in which each player tries
  to build a connected network reaching opposite sides of the board. One player
  races to link the east and west edges; the other tries to link north and south.
  On each turn, a player draws a tile — each tile is 3x1 with three connection
  outlets — and decides where to place it on the expanding network. The score is
  calculated as the product of connections reached on both target edges, so
  players cannot afford to ignore either side. Originally published by Goliath
  and Rio Grande Games in 1999, it is a clever spatial competition with elegant
  tension.

