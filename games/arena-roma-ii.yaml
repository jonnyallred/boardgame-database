description: |
  Arena: Roma II is a two-player tactical card-and-dice game by Stefan Feld set in ancient
  Rome. Players use dice for action points to play cards representing Roman citizens and
  soldiers, competing to control the Roman forum and maximize prestige. The game is a
  complete standalone but can be combined with cards from the original Roma. It rewards
  hand management and opportunistic play with its tight dice action system, making it
  an excellent filler game for two players who enjoy tense, quick competition.

