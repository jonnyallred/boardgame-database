description: |
  Windmill Valley is a strategic Euro game for 1-4 players set among the famous tulip fields and windmills of the Netherlands. Players act as tulip farmers who plant flowers, manage water resources, and upgrade their windmill boards using a clever action wheel (rondel) system. The rotating wheel restricts which actions are available on your turn, encouraging efficient planning and engine-building as you develop your farm into a flourishing floral empire. With dual-layered player boards, 36 custom wooden windmill tokens, and 195 colorful tulip pieces, the game makes a gorgeous table presence.

