description: |
  Rheinländer is an area control game by Reiner Knizia in which players take on the roles of dukes vying for dominance of territories along the Rhine River in medieval Germany. On each turn, players play a card from hand to place a knight on the board, or draw a ship card to move a trading ship downriver, potentially scoring bonus points. Victory goes to the player who accumulates the most points by enclosing and controlling "duchies" — contiguous regions of the river. Its deceptively simple rules hide a highly tactical game of hand management and territorial enclosure.

