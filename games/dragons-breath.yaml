description: |
  Dragon's Breath is a 2017 children's game from HABA designed by Gunter and Lena Burkhardt, winner of the 2018 Kinderspiel des Jahres. Dragon children Mira, Feo, Luna, and Diego have discovered a column of ice with sparkling gems frozen inside. Each round, players secretly choose which gem color they hope will fall when the dragon father uses his fiery breath to melt the next ring from the ice column. Once all players have picked, the ring is removed and gems tumble out to be collected by those who guessed correctly. The charming push-your-luck gem-guessing mechanic and tactile ice-column centerpiece make it an ideal first game for young children.

