description: |
  Down Styphon! is a 1977 miniatures wargame published by Fantasy Games Unlimited, based on H. Beam Piper's novel Lord Kalvan of Otherwhen. Using a modified version of the Musket and Pike rules (originally published by SPI in 1973), the game recreates 16th and 17th century pike-and-shot battles, with the addition of elements from Piper's alternate-history setting where the gunpowder monopoly of the god Styphon has been broken. The rules include complete army organizations, flags, and uniforms for a full campaign, and can also be adapted for other historical pike-and-musket periods such as the English Civil War. Designed for use with 15mm miniature soldiers, counter sheets are included for tabletop play without purchasing miniatures.

