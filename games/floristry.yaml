description: |
  Floristry is a fast two-player competitive game of flower auctions and storefront design published by UP Games in 2024. Each round, players draw flower tiles from a bag and then compete for them through a Dutch auction run via a companion app (no download required, no internet needed). Tiles acquired are placed in personal storefront frames, and players score points for their largest continuous patch of each of six flower types — yellow tulip, green chrysanthemum, red rose, blue hydrangea, pink daisy, and orange. After 10 rounds of bidding and placing, the player with the most charm points is declared the winner, blending auction tension with spatial pattern-building in a ruleset that fits on a single sheet.

