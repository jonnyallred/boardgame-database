description: |
  One Night Ultimate Werewolf is a fast-paced social deduction game for 3-10 players that condenses the classic Werewolf/Mafia experience into a single action-packed round. Each player receives a secret role — Werewolf, Seer, Robber, Troublemaker, or others — and during the night phase (guided by an optional smartphone app) players secretly swap, peek at, or manipulate role cards. At dawn, everyone debates and votes to eliminate the player they believe is a Werewolf, with roles potentially changed since the start. A recommended title for the Spiel des Jahres, it is celebrated for revolutionary app integration and its ability to pack rich social dynamics into just ten minutes of play.

