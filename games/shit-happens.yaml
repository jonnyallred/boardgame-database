description: |
  Shit Happens is an adult party card game published by Goliath Games in 2016 in which players try to correctly rank terrible life situations on a Misery Index from 1 to 100. Each card depicts a horrible scenario (ranked by actual therapists and counselors), and players must insert new cards into their growing hand in the correct position relative to the ones they already hold — get it right and keep it, get it wrong and lose it. The first to collect 10 cards wins, and the game thrives on arguments about whose misfortune is worse.

