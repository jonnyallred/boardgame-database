description: |
  Cineplexity is a movie party game for 4-10 players published by Out of the Box (creators of Apples to Apples) in which players race to name a film matching criteria from two simultaneously revealed category cards. The 315 cards cover nine categories including Actors, Characters, Genre, Props, Setting, and Theme, and each round players shout out titles matching both drawn cards before anyone else. Speed and broad film knowledge are rewarded equally. The game is ideal for film buffs and casual players alike at parties and social gatherings.

