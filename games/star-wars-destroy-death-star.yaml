description: |
  Star Wars: Destroy Death Star is a 1977 Kenner board game re-enacting the Battle of Yavin from the original Star Wars film. Players move X-wing squadrons along the board, trying to fly down the trench and land on the exhaust port by exact count to fire the torpedoes and destroy the Death Star. The game's centerpiece is a rotating Death Star board that turns with each player's turn, requiring precise timing and lucky rolls to hit the target. A companion game to Kenner's Escape from Death Star.

