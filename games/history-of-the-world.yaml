description: |
  History of the World is a civilization-building board game originally published in 1991 by Ragnar Brothers and republished in a definitive edition by Avalon Hill in 1993. Players each control a succession of historical empires across seven epochs spanning from ancient Mesopotamia to the modern era, with each epoch assigning different civilizations to each player. The goal is to accumulate the most points through territorial conquest and monument building, but since civilizations are handed off each epoch, no one player benefits entirely from their previous empire. This creates a unique tension between building for yourself and not leaving too strong a position for whoever inherits your civilization.

