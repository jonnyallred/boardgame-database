description: |
  Bunny Bunny Moose Moose is a silly real-time party game designed by Vlaada Chvatil and published by Czech Games Edition. Players simultaneously form rabbit ears or moose antlers with their hands while a narrator reads a trail card; when the narrator says "Bam!" everyone freezes and players score only if they are showing exactly the right animal — rabbit ears OR moose antlers, not both, not neither. The laugh-out-loud moments come from the frantic hand gymnastics and the inevitable errors under time pressure, making it an ideal quick warm-up game.

