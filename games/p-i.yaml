description: |
  P.I. (Private Investigator) is a competitive deduction game for 2-4 players designed by Martin Wallace, consisting of three mini-investigations played back to back. At the start of each mini-game, players secretly receive a suspect, crime, and location — forming a case that the player to their left must solve. On their turn, investigators place pawns to gather evidence discs and cubes that reveal adjacency and matches without pointing directly to the answer. The player who solves their case first earns the most points, rewarding logical reasoning and careful observation over three brisk rounds.
