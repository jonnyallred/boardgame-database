description: |
  Landslide is a 1971 Parker Brothers board game simulating a U.S. presidential election using the Electoral College system. For 2-4 players, competitors bid popular vote currency to win states' electoral votes in four regional sections of the United States — East, South, Midwest, and West. The game's board correctly reflects the electoral apportionment from the 1970 census. Politics cards allow stealing states, blocking actions, and other strategic disruptions, while Secret Ballot and State spaces create varied board interactions. A period artifact of American political gaming during the Vietnam-era election cycle.

