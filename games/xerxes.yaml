description: |
  Xerxes is a 1973 board wargame covering ancient warfare related to the Persian king Xerxes and
  the Greco-Persian Wars. As a hex-and-counter wargame of the era, it would simulate the tactical
  and operational challenges of the Persian invasion of Greece, a pivotal conflict in ancient history.
  Little documentation has survived in widely accessible sources; details of the designer and
  publisher remain unclear from available records.

