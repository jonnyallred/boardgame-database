description: |
  Sequence is a card-and-board game designed by Douglas Reuter and commercially released in 1982, in which players play cards from their hand to claim corresponding spaces on a 10x10 board, aiming to form rows of five chips (sequences). Wild jack cards let you place anywhere or remove opponent chips, adding a layer of disruption to what otherwise seems like a simple pattern-building game. It supports 2–12 players in teams and blends the accessibility of card games with a spatial board element, making it a popular family game worldwide.

