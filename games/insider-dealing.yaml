description: |
  Insider Dealing is a stock market board game simulating the London Stock Exchange, where players trade shares in twelve fictional companies on a hexagonal floor board. A separate circuit board tracks trading periods and dividend payments. The key mechanic involves information cards that reveal future price movements — players who collect them can buy or sell ahead of the market. The game rewards those who exploit insider knowledge while navigating a spatial trading floor. An obscure British economic game combining movement, information asymmetry, and stock market speculation.

