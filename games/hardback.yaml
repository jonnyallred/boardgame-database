description: |
  Hardback is a deck-building word game and prequel to Paperback, set in the 19th century where players portray aspiring novelists competing for literary prestige. Players draw five cards from their personal deck, use them to spell words, and generate coin and points — matching genre colors across cards activates powerful card abilities and the Ink system lets players press their luck for additional letters. Earned money buys new, more powerful cards to improve the deck, and the first player to accumulate 60 points wins. Designed by Tim Fowers and Jeff Beck with art by Ryan Goldsberry, it elegantly marries the cognitive challenge of word games with the satisfying engine-building of deck construction.

