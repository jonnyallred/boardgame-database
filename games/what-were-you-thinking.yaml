description: |
  What Were You Thinking? is a 1998 party game designed by Richard Garfield and published by Wizards of the Coast in which players must guess the most common answer given by the current group to open-ended questions. A player who gives a unique answer—one that no other player shares—moves up the penalty track, risking elimination. The game rewards thinking like the crowd rather than being clever or original, creating a fascinating social mirror effect. Later republished by Exploding Kittens, it remains an accessible party game with a surprisingly elegant push-your-luck dynamic.

