description: |
  Hepta is a tile-placement puzzle and strategy game designed by Alex Randolph, published by Ravensburger in 1974 as part of their Traveller series. Players place 14 tiles on the board, aiming to cover all but one of the 7 colors — described as "a pleasing combination of puzzle and strategic game." The game was later released as Magic 7 by Ideal and Cover-up in 1982, demonstrating the design's enduring appeal. Alex Randolph's elegant spatial challenge distills competitive tile-laying into a focused, replayable brain exercise.

