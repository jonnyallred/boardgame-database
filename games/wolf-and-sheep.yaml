description: |
  Wolf and Sheep is a classic asymmetric two-player abstract game in which one player controls a small number of wolves and the other a large flock of sheep on a checkered board. The sheep can only move forward diagonally while the wolves may move in any diagonal direction; the sheep win by trapping the wolves so they cannot move, while the wolves win by breaking through the sheep's defensive line. The game is an ancient folk game related to Fox and Hounds and similar barrier games, known by many names across different cultures, and is often produced in decorative wooden or travel editions.

