description: |
  Mine a Million (also sold as The Business Game) is an economic simulation board game designed by Peter and Philip Bergner and published by Waddingtons in 1965. Set in a developing country where all transport must travel fully loaded — a rule imposed by the Minister for Transport — players manage tin mines, rolling dice to produce ore and then subcontracting transport to get it to Newport warehouse where it can be sold. The goal is to be the first player to accumulate a million pounds in profit, requiring careful management of production capacity, logistics, and the transport subcontracting system.

