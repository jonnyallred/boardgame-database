description: |
  Dala is a traditional two-player abstract strategy game from Sudan, played especially by the Baggara tribes and also known as "Herding the Cows." It is played on a 6x6 board with 12 pieces per player, following a two-phase format: players first drop pieces onto the board, then move them orthogonally to form three-in-a-row alignments that allow capturing an opponent's piece. The player who reduces their opponent to fewer than three pieces wins. Traditionally played on raised mud boards with sharpened sticks as pieces, Dala is one of many richly varied alignment-and-capture games from the African continent.

