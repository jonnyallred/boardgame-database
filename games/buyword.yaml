description: |
  BuyWord is a word game designed by Sid Sackson that combines vocabulary with an economic twist, winner of the 2005 Games Magazine Game of the Year award. Players spend money to buy sets of letter tiles from the bag, then form words to sell for profit — with payoffs based on the quantity and quality of letters used. Discarding down to eight tiles at turn's end and carefully managing cash while building profitable words creates a satisfying puzzle that rewards both word-smithing ability and economic savvy.

