description: |
  Europa Universalis is a geopolitical strategy board game designed by Philippe Thibaut and released by Azure Wish Enterprise in 1993, set during the period 1492 to 1792 in which players command the great powers of Europe through exploration, conquest, trade, and diplomacy. The game is historically notable as the direct inspiration for Paradox Interactive's legendary video game series of the same name, which launched in 2000 and spawned multiple sequels. Players manage armies, fleets, and colonial ambitions across a map of the known world, competing for dominance through military, economic, and diplomatic means. Its comprehensive scope and rich historical simulation made it a landmark in geopolitical gaming.

