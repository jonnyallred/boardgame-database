description: |
  The Search for Spock is a 1984 board game published by FASA, one of four Star Trek Micro-Adventure games released to coincide with the film Star Trek III: The Search for Spock. Players must find the young Spock on the disintegrating Genesis Planet, beaming him aboard their ship before the planet collapses—while evading Klingons and the dangerous lifeforms created by the Genesis effect. The game features a modular map system capable of creating over 10,000 different planet configurations, 112 playing pieces, and 76 event cards, providing good replay value for a movie tie-in game.

