description: |
  The X-Files Board Game is a 2015 asymmetric deduction and conspiracy game designed by Kevin Wilson and published by IDW Games for 2-5 players. One player takes the role of the Cigarette Smoking Man, plotting against the other players who cooperate as FBI agents Mulder, Scully, Skinner, and Krycek. Agents move across the United States solving X-Files cases by collecting evidence and influence, while the Cigarette Smoking Man uses cards to delay, misdirect, and cover up the truth without ever directly attacking. The game's distinctive mechanic—the villain orchestrating events passively rather than through direct control—captures the show's atmosphere of institutional conspiracy and ambiguous threat exceptionally well.

