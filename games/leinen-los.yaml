description: |
  Leinen los! (Hoist the Sails!) is a roll-and-write sailing race game for 2-6 players published by Ravensburger. Players roll the shared dice each round and choose how to use the results to advance their sailing ship, adjusting sails, managing wind direction, and plotting a course around the map. The simultaneous decision-making keeps all players engaged on every roll, and the interplay between wind and sail settings creates light strategic choices within the dice constraints. A family-friendly filler game delivering a breezy nautical experience in about 30 minutes.

