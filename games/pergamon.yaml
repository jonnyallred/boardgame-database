description: |
  Pergamon is an elegant bidding and tile-placement game for 2–4 players set during the 1878 archaeological excavations in what is now modern Turkey. Players seek federal research grants through a clever reverse-auction mechanism: the less funding you request, the earlier you get to excavate — but frugality means smaller dig budgets. Excavated artifacts are assembled into exhibitions, scored based on completeness and quality. The core tension between grabbing funding early versus holding out for more creates constant, satisfying decision-making in a compact 45–60 minute playtime.

