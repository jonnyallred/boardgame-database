description: |
  Great Plains is a 2021 two-player abstract area-control game by Brett J. Gilbert and Trevor Benjamin, published by Lookout Games, in which rival tribes of clever foxes and wise snakes compete for dominance across the American Great Plains. Players take turns placing one piece adjacent to a previously placed piece on a modular hex grid, and when all pieces are placed, the player controlling the most meadow sections wins. The elegant simplicity of having just one action per turn — yet with deep spatial consequences — makes it an ideal filler-weight abstract that plays in 20 minutes but rewards experienced players who can think several moves ahead.

