description: |
  World in Flames is the definitive grand-strategic World War II board wargame from Australian Design Group, first published in 1985 and now in its 8th edition. Players control the major powers of WWII across land, sea, and air theaters using an impulse-based turn structure that governs how many units each nation can commit per turn. The game models supply lines, resource production, rail and naval logistics, strategic bombing, and national production in staggering detail. Known as one of the most complex and comprehensive wargames ever published, a full game can take weeks or months to complete.

