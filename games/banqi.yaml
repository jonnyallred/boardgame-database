description: |
  Banqi (also called Half Chess, Dark Chess, or Blind Chess) is a popular Chinese board game played on a 4×8 half-board using face-down Chinese chess pieces. Players begin by randomly placing all pieces face-down and take turns either flipping a piece to reveal it, moving a revealed piece, or capturing an opponent's piece. Piece strength follows the traditional Chinese chess hierarchy, with the general capturing everything except cannons, which capture by jumping. The hidden information element — not knowing which pieces are which until they are flipped — adds a significant luck and deduction dimension to the tactical game. Widely played in Taiwan, Hong Kong, and southern China.

