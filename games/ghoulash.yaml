description: |
  Ghoulash: The Last Game on Earth is a two-player paper-based RPG-like game self-published by Mike Suchcicki in 1982. Playing entirely on paper using specially designed charts — with no dice, cards, spinners, or physical pieces of any kind — each player serves as the game master for the other, hiding obstacles and items to be discovered in a mechanic resembling a narrative version of Battleship. One player describes a move; the opponent describes its consequences, creating a miniature cooperative storytelling duel with a horror survival theme.

