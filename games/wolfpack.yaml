description: |
  Wolfpack is a solitaire wargame published by SPI in 1974 in which the player commands German U-boats attacking Allied convoys in the Battle of the Atlantic, 1942-44. Originally published as a pull-out game in Strategy & Tactics magazine issue 47, the map covers convoy zones between Ireland, Greenland, Newfoundland, and the Azores. The game features four one-month scenarios set in 1943, each progressively more difficult as Allied convoy defenses improve, creating a campaign arc that captures the changing tide of the submarine war.

