description: |
  Jekyll & Hyde vs Scotland Yard is a cooperative two-player trick-taking game where both players work together as the dual-natured Jekyll and Hyde, attempting to evade Scotland Yard through the streets of London. Players must carefully balance their trick wins: movement forward is determined by the lower-scoring player's tricks, so over-performance moves Scotland Yard closer to catching them. Played over two rounds with communication limits, the game demands precise coordination and reading your partner's hand. A clever spin on cooperative trick-taking that creates unique tension through its constraint-based movement system.

