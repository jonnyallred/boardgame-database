description: |
  The Last Starfighter: Tunnel Chase is a 1984 FASA board game designed by Jordan Weisman, based
  on the climactic sequences of the 1984 sci-fi film The Last Starfighter. Players maneuver
  miniature starfighter pieces across a modular hex-based board representing the asteroid tunnel
  interior, using simultaneous action selection and dice rolling for combat. The game can
  accommodate up to 25 players, an unusual capacity that made it suitable for large-group
  conventions and events. Paper-and-pencil tracking and player elimination add to the simulation
  feel of this fast-and-frantic space combat experience.

