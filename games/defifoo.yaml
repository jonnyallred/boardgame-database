description: |
  Défifoo is a 1998 French party game published by Gigamic that has become a reference French family game, accommodating up to 18 players. Three teams rotate between competing and refereeing: two teams face off in 150 zany challenges spanning mime, drawing, action, speed, memory, and skill, while the third team acts as referee. The first team to win seven challenges wins the game. The celebration of its 25th anniversary led to a reinvented edition with updated challenges for new generations of players.

