description: |
  Teeko is a two-player abstract strategy game invented by American game designer
  and magician John Scarne, first published in 1945 with a refined version in
  1952. Played on a 5x5 grid, each player controls four pieces and wins by
  arranging them in a straight line of four (horizontal, vertical, or diagonal)
  or in a 2x2 square. Play divides into two phases: placement (alternately
  dropping pieces onto empty squares) and movement (sliding one piece per turn
  to any adjacent square, including diagonally). The game's name borrows letters
  from Tic-tac-toe, Chess, Checkers, and Bingo, signaling its aspirations as a
  synthesis of classic games.

