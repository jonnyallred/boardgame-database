description: |
  Escalado is a classic British horse racing game invented by Swiss inventor Arthur Gueydan in 1928 and produced by Chad Valley. Lead (later plastic) model racehorses travel down a long green fabric racetrack to the finish line, propelled by a mechanical hand crank that vibrates the track to simulate the random chaos of a live race. Originally issued with a Royal Warrant, the game became a beloved family staple in the UK and was produced continuously in various editions through to the early 2000s.

