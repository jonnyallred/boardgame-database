description: |
  Marvel Super Dice is a collectible superhero dice game published by TSR in 1997, featuring characters from the Marvel Comics universe. Players roll custom dice representing Marvel heroes and villains to resolve battles, with each character bringing unique dice and abilities to the fight. The collectible format allowed players to expand their roster of superheroes, bringing the trading element of collectible card games to dice-based superhero combat. Limited English-language review sources are available for this title.

