description: |
  The Animals of Baker Street is a cooperative deduction game set in a whimsical Sherlock Holmes-
  inspired world populated by animal characters, written by youth author Clémentine Beauvais and
  Sherlock game specialist Dave Neale, published by IELLO in 2022. Players collectively choose
  which locations to visit across Baker Street, interact with quirky animal characters, and collect
  clues to solve a mystery. Each detective character has unique abilities that can be activated during
  visits, but time is limited and every location visited advances the clock. Players must plan their
  path wisely to gather enough information to crack the case before time runs out.

