description: |
  Pixel is an abstract strategy game played on an 8x8 grid using two sliding mechanisms — one horizontal, one vertical — to place colored stones. Players compete to be the first to align four stones of their color in a horizontal, vertical, or diagonal row. The cross-action slider mechanism means that placing a stone simultaneously affects multiple rows and columns, creating unexpected interaction patterns and requiring players to think in terms of both offense and defense across the entire grid. The simple components and quick setup make it an accessible abstract that rewards spatial thinking.

