description: |
  Astrotime is a psychology and astrology-themed board game published by Ravensburger.
  Players prepare personal game tablets using their zodiac sign and work through 12 turns
  representing each sign of the Zodiac. Cards are drawn and placed in the center of the
  board, and players choose the cards that best suit their personality to score points.
  The game blends light social mechanics with astrological theming, making it an accessible
  party-style game. Specific year of publication and designer information are not readily
  available in English-language sources.

