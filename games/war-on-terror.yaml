description: |
  War on Terror is a satirical strategic board game conceived by Andy Tompkins and Andrew Sheerin and published by TerrorBull Games in 2006, offering biting commentary on post-9/11 geopolitics. Players control empires vying for global dominance while simultaneously managing or becoming insurgent forces, navigating mechanics including suicide bombings, renditions, and regime changes depicted on event cards. The game deliberately blurs the moral line between empire and terrorism, with each player potentially shifting roles during play. It generated significant controversy and faced challenges from retailers due to its provocative subject matter, but built a dedicated audience for its dark humor and strategic depth.

