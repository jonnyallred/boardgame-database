description: |
  Attangle is a two-player abstract stacking game played on a 37-cell hexagonal board with 18 stackable pieces per player. Players alternate placing pieces, and when two of a player's pieces converge on an opponent's piece from different directions, they capture it by stacking on top. The objective is to be first to build three triple stacks. Part of Dieter Stein's stacking trilogy alongside Abande and Accasta, Attangle rewards spatial reasoning and tactical threat-creation in a compact and elegant package.

