description: |
  Dweebies is a card game from Gamewright in which players take turns placing one card adjacent to a card already on the table. If the card at either end of any row matches the card just placed, the player collects those two matching cards and all the cards between them. Each Dweebie character has a profession-themed name (Super Dweebie, Dr. Dweebie, Fix-it Dweebie) and appears in the deck as a singleton, twin, triplet, or quadruplet. Incredibly easy to learn but surprisingly tricky to win, the game rewards spatial awareness and patience while offering the satisfying sweep of capturing a long run of cards.

