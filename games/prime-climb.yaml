description: |
  Prime Climb is a colorful mathematical racing game in which players roll two 10-sided dice and apply arithmetic operations — addition, subtraction, multiplication, and division — to move their two pawns toward the center of the board numbered 0 to 101. Landing on a prime number earns a special bonus, while landing on another player's pawn sends them back to start. Designed by mathematicians Dan Finkel and Katherine Cook of Math for Love, the game makes number theory engaging through competitive play and strategic decision-making.

