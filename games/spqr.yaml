description: |
  SPQR is the second volume in GMT Games' Great Battles of History series, designed by Richard Berg and Mark
  Herman and first published in 1992. The game simulates the emergence of the Roman military system and its
  clashes with opponents including Samnites, Etruscans, Epirotes, and Macedonians. Using a command-activation
  system, generals activate units within their command range to rout or destroy the enemy army, with Roman
  commanders often limited to a single legion at a time — a historically realistic constraint. A Deluxe Edition
  in 2008 consolidated SPQR with nearly all its expansion modules.

