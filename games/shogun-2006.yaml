description: |
  Shogun (2006) is a strategic area-control game designed by Dirk Henn set in Sengoku-era Japan, where 2–5 players take the roles of powerful Daimyo competing to dominate provinces through agriculture, castle construction, and military conquest. Players secretly program their ten available actions simultaneously each round, then resolve them in a fixed order that creates surprising conflicts and tactical dilemmas. Combat is resolved using a unique tower mechanism that randomizes outcomes, and the player who controls the most provinces and builds the most impressive domain wins over a two-season campaign.

