description: |
  Newton is a hand-management and tableau-building game by Simone Luciani and Nestore Mangone, published by Cranio Creations in 2018. Players take on roles of young scientists traveling through 17th-century Europe, playing five cards each round to trigger actions such as movement, book acquisition, and laboratory advancement. The twist: at the end of each round, one of the five played cards is permanently retained in the player's book collection rather than returned to hand, boosting that action's future power but permanently reducing hand flexibility. Over six rounds, players build an increasingly potent engine, competing across tracks for scholarly prestige and end-game bonuses.

