description: |
  Savannah Café is a fast, colorful card game published by Eurogames in which each player manages a trio of African animal characters — a lion, a gazelle, and a hippopotamus — racing to be the first to move one of their animals to reach the café bar at the top of the board. Players play cards to move their animals while strategically blocking opponents, making for a light and visually engaging game with strong appeal for families and younger players. Its simple mechanics, beautiful animal graphics, and quick playtime make it an ideal filler or gateway game with a fun safari theme.

