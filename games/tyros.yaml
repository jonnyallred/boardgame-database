description: |
  Tyros is a 2002 Euro strategy game designed by Martin Wallace and published by 999 Games and Thames & Kosmos. Players compete for area majority and influence on a grid, managing hand cards and trading resources to achieve end-game scoring conditions. The game incorporates multiple mechanics including resource management, set collection, and grid movement, offering the kind of tightly interlocking strategic decisions characteristic of Wallace's design work from this period.

