description: |
  Saga is a 1980 microgame published by TSR in which players take on the roles of Viking heroes in northern Europe, battling against trolls, giants, drows, ghosts, witches, dragons, jarls, and rival heroes. Part of TSR's line of compact wargames inspired by Metagaming's pioneering MicroGame format, Saga delivers a compact Norse mythological fantasy combat experience in a small box. The game's Viking theme captures the heroic mythology of northern Europe with accessible wargame mechanics suited to the microgame format's emphasis on quick setup and play. It stands as an early example of licensed Norse mythology in tabletop wargaming.

