description: |
  VOR: The Maelstrom is a 28mm miniature wargame published by FASA in 1999-2000, one of the company's final products before its closure. The game is set in a bizarre dimensional maelstrom — a pocket reality into which armies and monsters from across time and space have been pulled — and pits asymmetric factions (including humans, aliens, and monsters) against each other in skirmish combat. Factions included the North American Union military and various alien and mutated Growler creatures. Though short-lived due to FASA's shutdown, the game developed a cult following for its distinctive setting and solid miniatures.

