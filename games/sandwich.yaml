description: |
  Sandwich is a food-themed card game in which players compete to build wacky sandwiches and score points by having other players rate their creations. The game plays quickly and is oriented toward light social fun, with the playful sandwich-building premise providing humor and creative expression for all ages. Players assemble ingredient combinations from hand cards and present their sandwiches to the table, with scoring based on how well they match the judging criteria. Its accessible premise and short playtime make it an ideal party filler for mixed groups.

