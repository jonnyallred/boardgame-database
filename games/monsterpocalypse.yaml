description: |
  Monsterpocalypse is a Kaiju-themed skirmish miniatures game published by Privateer Press, originally released in 2008 as a collectible game before transitioning to a non-collectible format. Players control giant monsters and their supporting units battling across city boards, knocking each other through buildings and vying for power points. Each monster faction has a unique playstyle and power set, creating asymmetric matchups. The game later partnered with Mythic Games for a big-box board game edition that maintained full compatibility with existing miniatures, though that crowdfunding project encountered fulfillment difficulties.

