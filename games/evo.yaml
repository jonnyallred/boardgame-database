description: |
  Evo is a 2001 evolutionary strategy game designed by Philippe Keyaerts in which players control species of early dinosaurs struggling for survival on a prehistoric island divided into climate zones. Each round, players bid in an auction to acquire genetic mutations — such as fur for cold resistance, horns for combat, or shells for defense — then migrate their species across the modular board to survive climate shifts and compete for territory. Points are accumulated from reproduction and survival before a randomly drawn meteor card ends the era. Evo won the GAMES Magazine Game of the Year award in 2002 and received a revised second edition in 2011 from Days of Wonder.

