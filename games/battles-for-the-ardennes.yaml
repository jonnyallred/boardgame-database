description: |
  Battles for the Ardennes is a 1983 Avalon Hill operational wargame designed by Don Greenwood, simulating the German Ardennes Offensive (Battle of the Bulge) of December 1944-January 1945. The game covers the campaign at the divisional level across multiple scenarios of varying scope, from small engagements to the full campaign. Unlike simpler Bulge games, it provides detailed operational simulation with supply rules, weather effects, and the critical role of road networks in winter terrain. Considered a grognard classic, it is one of the most detailed English-language simulations of the campaign.

