description: |
  Aqua Romana is a 2005 tile-laying game by Martin Schlegel, published by Queen Games, in which
  players act as Roman architects constructing aqueducts to bring water to the citizens of the
  Roman Empire. On each turn, players extend one of their four aqueducts by placing a tile
  (straight, curve, crossing, or parallel curve) — but only if their workers have line-of-sight
  to a builder pawn.

  Scoring rewards completing closed aqueduct loops, with points equal to the number of tiles
  in the loop. Aqueducts that cross tiles a second time score double. The worker placement
  adjacency rule creates indirect blocking opportunities, adding tactical depth to what appears
  a simple tile game. It was well-received as a clean, mid-weight abstract Euro with a thematic
  Roman setting.

