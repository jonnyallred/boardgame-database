description: |
  Saboteur: The Duel is a standalone 1-2 player adaptation of the classic Saboteur card game by Frederic Moyersoen that distills the tunnel-building experience into a competitive two-player or solo format. Players lay path cards to create a maze leading toward six goal cards containing variable amounts of gold, while using action cards to hinder their opponent or repair their own broken equipment. A greedy troll lurks in the mine, demanding payment to let miners pass. The goal is to collect more gold than your opponent by strategically navigating the tunnels and blocking their routes, making it a quick and competitive duel that captures the original's spirit in a compact package.

