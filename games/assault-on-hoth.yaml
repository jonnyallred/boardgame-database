description: |
  Assault on Hoth: The Empire Strikes Back is a two-player strategic board game designed
  by Paul Murphy and published by West End Games in 1988, recreating the Battle of Hoth
  from Star Wars Episode V. One player commands the Imperial forces under AT-AT walkers
  as they advance on the Rebel base, while the other controls the Rebel defenders attempting
  to hold long enough to evacuate. One of the first products West End Games released under
  their newly acquired Star Wars license, the game captures the asymmetric nature of the
  screen battle with mechanically distinct sides and objectives.

