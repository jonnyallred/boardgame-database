# Description
description: |
  The second entry in the cooperative Unmatched Adventures series, featuring the four
  Teenage Mutant Ninja Turtles — Leonardo, Donatello, Raphael, and Michelangelo — as
  they battle enemies across New York City. Each turtle is a unique hero with their own
  deck of cards and special abilities, and players must work together to defeat villain
  scenarios. Like other Unmatched titles, combat uses hand management and deck mechanics,
  but this cooperative variant replaces direct PvP combat with collaborative missions
  against AI enemies. Compatible with other Unmatched Adventures content.

