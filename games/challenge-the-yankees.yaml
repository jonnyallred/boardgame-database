description: |
  Challenge The Yankees is a baseball simulation board game sold by Hasbro in 1964 and 1965, officially licensed as "The Official New York Yankees Baseball Game." Players set their lineup and roll dice, consulting batter cards to determine outcomes, with 50 player photo cards including 25 Yankees legends (Mickey Mantle, Roger Maris, Yogi Berra) and 25 All-Stars. The game came with a replica of Yankee Stadium that could be physically assembled from its parts. Originally conceived by Roger Franklin in 1949, it offered an accessible dice-driven baseball experience rather than the deeper statistical systems of APBA or Strat-O-Matic.

