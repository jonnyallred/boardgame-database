description: |
  The Red Dragon Inn is a 2007 party card game by SlugFest Games in which 2-4 players take on the roles of fantasy adventurers unwinding at the titular tavern after a dungeon crawl. Players must manage their character's Fortitude (health) and Alcohol Content, trying to remain conscious and retain enough gold while forcing their rivals to drink themselves under the table. Each adventurer has a unique deck of cards representing their special abilities and antics, fueling hilarious interactions as characters gamble, brawl, and slam drinks. The game has spawned numerous standalone expansions with new characters, making it one of the most enduring and charming light card games in the hobby.

