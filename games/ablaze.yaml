# Description
description: |
  Ablaze! is a cooperative firefighting board game published by Mayfair Games.
  Players work together as firefighters attempting to contain a spreading wildfire
  before it consumes the forest. The game contains multiple scenarios including
  Wild Fire!, a reworked version of the German game Feurio!

  Players place tiles representing the fire spreading across the board while
  cooperating to strategically position their firefighting resources. The
  escalating threat of the fire creates genuine tension as teams must balance
  containment priorities. Ablaze! works well as a family cooperative game with
  accessible rules and satisfying teamwork moments.

