description: |
  Stone Age is a 2008 worker placement game by Michael Tummelhofer published by Hans im Glück in which players lead prehistoric tribes competing to gather resources, develop their villages, and build the most powerful civilization. Players send their tribe members to gather wood, clay, stone, and gold from the river — rolling dice to determine the harvest quantity — and use resources to buy building tiles or civilization cards that score points at game end. The game elegantly balances luck (dice rolls) with planning (worker placement), making it an approachable gateway to the genre.

