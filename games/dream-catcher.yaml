description: |
  Dream Catcher is a 2020 children's board game published by Space Cow (an Asmodee imprint) for ages 4 and up, designed by Laurent Escoffier and David Franck. Players choose cuddly toy cards to fully cover a nightmare's shape, with smaller cuddly toys earning more Dream tokens to fill their cloud. The first player to fill their cloud wins. A cooperative mode for ages 3 and up is included in the box, making it accessible to very young children. The game won the Golden Ace 2020 in the Children's Game category and helps develop observation skills, spatial recognition, and shape assessment.

