description: |
  Le jeu des chaises musicales is a French board game adaptation of the classic party game Musical Chairs, translating the physical activity of rushing to claim chairs when the music stops into a tabletop format. Players likely move pieces around a board representing chairs, with a random element (cards, spinner, or dice) indicating when chairs become unavailable, with players competing to secure their piece in a valid chair before one player is eliminated each round. The game packages a familiar children's party game into a more portable, weather-independent format. As a tabletop abstraction of Musical Chairs, it retains the elimination mechanic that creates immediate tension.

