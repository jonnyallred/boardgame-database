# Description
description: |
  Part of Academy Games' "Birth of America" series, 1754 recreates the French and
  Indian War (also known as the War of Conquest in Canada and the Seven Years War in
  Europe) in which French and British factions fought for dominance over North America.
  Players control multiple factions — French, British, Colonials, and Native Americans —
  each with unique asymmetric abilities and victory conditions. Area control and
  maneuvering of armies across the colonial map drives gameplay, with event cards
  adding historical flavor and unpredictability.

