description: |
  Smart 10 is a trivia party game designed by Christoph Reiser and Arno Steinwender, published in 2017.
  Each question has ten possible answers, and every player participates in every round — deciding how many
  answers to attempt before passing. Correct answers score points, but a wrong answer wipes out everything
  earned that round, creating a satisfying push-your-luck tension. The first player or team to 30 points wins,
  making it a quick, accessible game for large groups.

