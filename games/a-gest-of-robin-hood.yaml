description: |
  A Gest of Robin Hood is a two-player asymmetric game in the Irregular Conflicts Series, adapting the COIN system to depict feudal tax collection and outlaw activities in late 12th-century Nottinghamshire. One player controls Robin Hood and his Merry Men, using hidden movement and press-your-luck encounters to rob rich travelers and organize peasant revolts, while the other plays the Sheriff of Nottingham chasing Robin across the county. The streamlined card-driven system delivers a full strategic experience in roughly an hour, making it one of the most accessible wargames in the COIN family.

