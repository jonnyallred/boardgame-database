description: |
  Pyramid of Pengqueen is a unique one-versus-all hidden movement game played on a vertical 3D magnetic board where penguin treasure hunters attempt to recover gems from an ancient pyramid while avoiding the Mummy. The Mummy player, who cannot see the penguins' moves, must use deduction and logic to intercept them, while the hunters must use strategy and risk assessment to escape. Originally designed by Marcel-André Casasola Merkle in 2008, the 2018 Brain Games edition features updated artwork tying it to the Ice Cool universe.

