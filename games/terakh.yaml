description: |
  Terakh is a Canadian abstract strategy board game published by Stoneplay in
  2005, named after its inventors Terence Wong and Akhil Patel (Te-rakh). Played
  on a variable battlefield assembled from triangular panels that players combine
  before each game, Terakh pits 2–6 players against each other in a turn-based
  combat of troops and territory. Players deploy and maneuver forces across the
  modular hexagonal battlefield, combining strategic planning with variable setup
  to ensure a fresh challenge each game. The concept was originally conceived
  by Wong in 1999 before reaching its published form.

