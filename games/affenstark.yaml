description: |
  Affenstark (also known as Mighty Monkey) is a 1996 children's dexterity game from Zoch Verlag in which players roll a die and carefully place wooden banana pieces on a growing pile held by a monkey figure named Carla. A player may also choose to place the smaller monkey Alfons on top of the banana pile for a chance at two victory points, but if the pile tumbles, they lose a point. The first player to reach nine victory points wins, making this a light and accessible stacking game well-suited for young children.

