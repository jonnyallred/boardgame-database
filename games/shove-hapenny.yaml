description: |
  Shove Ha'penny is a traditional British pub game with origins in Tudor England, in which two players alternately shove five coins or discs along a smooth wooden board using the palm of the hand, trying to land them cleanly within the nine scored "beds" (strips between horizontal lines). Each bed must be scored exactly three times to win it; the first player to score all nine beds wins. Once a common fixture in English pubs, it belongs to the shuffleboard family and has roots traceable to the 15th-century game shoffe-grote played with groat coins.

