description: |
  Interplanetary is a 1943 science fiction board game created by fan Art Widner and considered one of the earliest original science fiction board games ever designed. Combining elements of a race game and Monopoly, players travel the solar system mining nearer planets to fund expeditions to increasingly distant ones, with Pluto harboring "Immortality Dust" as the ultimate prize. Planets move dynamically, and hazards including a negasphere (black hole), space pirates, and solar gravity threaten each voyage. Influenced by E.E. Smith's Lensman novels, the full game took 8-12 hours; a streamlined version remained popular in science fiction fan circles into the 1960s. Never commercially published, Interplanetary is a historical artifact of science fiction fandom's gaming culture.

