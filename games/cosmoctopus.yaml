description: |
  Cosmoctopus is an engine-building, tentacle-gathering game for 1–4 devotees in which players guide the cosmic cephalopod Cosmoctopus through the Inky Realm, collecting resources and obtaining powerful cards representing relics, scripture, hallucinations, and constellations. Players craft potent card combinations and are the first to gather 8 tentacles to win, traversing a modular board that changes each game. Originally funded by Paper Fort Games on Kickstarter, the game blends Lovecraftian cosmic horror aesthetics with satisfying engine-building mechanics.

