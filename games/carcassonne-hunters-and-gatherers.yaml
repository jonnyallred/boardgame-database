description: |
  Carcassonne: Hunters and Gatherers is a standalone prehistoric reimagining of the classic Carcassonne tile-laying game, transporting the familiar meeple-placement mechanics to the Stone Age. Players build a prehistoric landscape of forests, rivers, and meadows, deploying their tribe members as gatherers in forests, hunters on plains, and fishermen along rivers. The game introduces new wrinkles such as gold nuggets in forests that grant bonus tile draws, and huts placed on rivers that score the entire connected waterway at game end. While mechanically similar to the original, the prehistoric theme and revised scoring make Hunters and Gatherers a fresh and complete standalone experience that many players prefer to the original.

