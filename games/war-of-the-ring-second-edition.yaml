description: |
  War of the Ring (Second Edition) is an epic asymmetric wargame set in J.R.R. Tolkien's Middle-earth, pitting the Shadow player commanding Sauron's vast armies against the Free Peoples player guiding the Fellowship of the Ring toward Mount Doom. One player wins through military conquest, corrupting the Ringbearer, or overwhelming the free cities, while the other seeks to advance the Fellowship in secret and destroy the One Ring. An action-dice system drives each turn, with players allocating dice results to mobilize armies, muster forces, or advance the Fellowship, creating constant tension between military and narrative priorities. The 2011 Ares Games second edition refined the first edition's rules, improved components, and added expansions for lords and warriors of Middle-earth, cementing it as one of the definitive thematic board games.

