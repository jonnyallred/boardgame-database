description: |
  World at War: Eisenbach Gap is a Cold War platoon-level hex wargame from Lock 'n Load Publishing simulating a hypothetical NATO vs. Warsaw Pact conflict in West Germany. Units represent platoons, each hex covers 150 meters, and activation is handled through a chit-pull system where formations activate in random order. Players manage self-propelled mortars, ATGMs, thin-skinned vehicles, and support weapons, resolving combat with dice in a flurry of fire. As the founding game of the World at War system, learning Eisenbach Gap unlocks access to any follow-on modules in the series.

