description: |
  The Game of Life Card Game is a 2002 Hasbro card game designed by Rob Daviau, adapting the
  iconic board game into a compact card format. Players choose whether to pursue a career directly
  or invest time in college first. Each turn they draw to fill their hands and complete life goal
  cards by paying costs in money or time — Career, Student/Married, Early Life, and Later Life
  card types reflect different phases of the journey. Getting married and having children costs
  time but earns bonus points. The game ends when LIFE cards are exhausted, and the player with
  the most points from completed goals wins.

