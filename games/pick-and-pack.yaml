description: |
  Pick & Pack is a two-player coordination game in which players work the controls of a broken mechanical arm — one player moves it vertically, the other horizontally — to pick up apple crates and deposit them. The split control mechanic means both players must cooperate on each move, but the game's competitive scoring means each player wants to claim the best crates for themselves. Quality control rules and order mix-ups add complication, and the player with the most apples in their crates at game end wins. The unusual shared-control mechanism creates humorous moments of miscommunication and negotiation in a compact package.

