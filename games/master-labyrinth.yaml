description: |
  Master Labyrinth is a fantasy maze game published by Ravensburger in 1991, designed by Max Kobbert, who was inspired by the opening and closing of his desk drawer to create the sliding board mechanic. Players are wizards-in-training who must collect numbered ingredient tokens to complete their secret recipe, navigating a constantly shifting maze by sliding a spare tile onto the board each turn to open new paths and close off opponents'. The game won the 1991 Spiel des Jahres special award for Most Beautiful Game, Mensa Select, and Deutscher Spiele Preis. It paved the way for the enormously popular Labyrinth series.

