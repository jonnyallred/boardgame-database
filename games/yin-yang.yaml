description: |
  Yin Yang is a card game by Reiner Knizia in which players try to play cards to avoid taking
  points, balancing an opposing pair of objectives in the spirit of yin-yang philosophy. The game
  blends hand management with careful timing, as players must navigate the tension between
  scoring and avoiding penalty cards. Its compact ruleset and quick plays make it an accessible
  filler with surprising strategic depth.

