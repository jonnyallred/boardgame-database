description: |
  Cryptid is a deduction game for 3-5 players in which each player is a cryptozoologist holding secret clues about the location of a legendary creature on a modular hex-tile map of North America. Players take turns querying opponents to narrow down possibilities, but must answer honestly when questioned themselves, creating a tense game of misdirection and logical deduction. Designed by Hal Duncan and Ruth Veevers with art by Kwanchai Moriya, published by Osprey Games in 2019, Cryptid stands out for its elegant information-sharing system that ensures every clue matters and no information is wasted. The game scales well across player counts and offers high replayability through its clue booklet system.

