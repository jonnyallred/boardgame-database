description: |
  Copa is a publisher anniversary game packaged in an elegant white box containing wooden shells and beans, presenting a collection of four classic game disciplines: strategy, memory, skill, and bluff. Designed as a celebration of gaming traditions, the box functions as a portable multi-game set using minimalist components. Specific designer and publisher attribution details are limited in English-language sources. The game is notable as a curated anthology piece rather than a single standalone design.

