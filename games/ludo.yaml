description: |
  Ludo is a classic race-and-chase board game derived from the ancient Indian game of Pachisi, which itself dates back to at least the 4th century AD. Patented in England in 1896 by Alfred Collier, each player rolls a die and races four tokens from their starting yard around the cross-shaped board to the center home area, attempting to land on opponents' tokens to send them back to start. Pure dice luck drives the game with almost no strategic decisions, making it accessible to the youngest players while its competitive elimination element keeps adults engaged. Ludo remains one of the most widely played board games in the world, particularly popular across South Asia, Europe, and Africa.

