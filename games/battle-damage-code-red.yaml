description: |
  Battle Damage: Code Red is a combat board game from the 1990s in which players field military units and resolve engagements through dice rolls and card play. Players track unit damage and attempt to eliminate enemy forces across a tactical map. The game is part of the wave of simpler tactical combat games that emerged as more accessible alternatives to traditional hex wargames. Detailed documentation on this title is limited, and it is primarily known through collector and hobby game records.

