description: |
  HysteriCoach is a team party game designed by Walter Obert and published by Kikigagne for four to fourteen players. Coaches direct their team members using only gestures and by calling out player names, without verbal instructions, to accomplish comedic physical tasks or answer challenges. The game is available in both a football-themed original edition and the HysteriCoach Hockey edition for the Canadian and American market. Its physical, communicative gameplay makes it ideal for large group events and team-building activities.

