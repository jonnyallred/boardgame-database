description: |
  Chess is the world's most renowned abstract strategy game, descended from the ancient Indian game chaturanga through Persian shatranj, reaching its modern form in 15th-century Europe. Two players command 16 pieces each — representing different military roles with unique movement rules — on an 8x8 board, seeking to checkmate the opponent's king. With essentially infinite strategic depth and a vast body of theory, openings, and endgame study accumulated over centuries, chess stands unmatched as a game of pure intellectual competition and is played competitively at every level from local clubs to world championship level.

