description: |
  Cottage Garden is a relaxing polyomino tile-placement game by Uwe Rosenberg in which players tend two garden beds simultaneously, filling them with colorful flower tiles selected from a central market grid. A gardener pawn moves around the market each round, determining which tiles players may choose. Completing a garden bed scores points on two separate tracks — flowerpots and cats — and grants bonus tokens to fill awkward gaps. The game has a meditative, low-conflict feel compared to many of Rosenberg's heavier designs, making it an ideal introduction to polyomino mechanics for families while still rewarding spatial planning and foresight.

