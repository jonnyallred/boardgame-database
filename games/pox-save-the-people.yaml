description: |
  Pox: Save the People is an educational cooperative game designed to explore concepts of vaccination and disease spread. Players work together to vaccinate populations and stop an outbreak before it overwhelms the community. Created by the Tiltfactor lab led by Mary Flanagan, the game was developed before the COVID-19 pandemic to address public hesitancy around vaccination in an accessible, playful format, and later inspired the zombie-themed variant Zombiepox.

