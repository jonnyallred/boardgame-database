description: |
  The Teenage Mutant Ninja Turtles Game is a licensed children's board game
  published by Milton Bradley in 2003, based on the 2003 animated television
  series. Four Turtles must infiltrate a towering skyscraper to battle Shredder
  and stop his world domination plans, fighting through sewers and city streets
  while encountering Foot Clan henchmen. The oversized gameboard includes sewer
  tiles, street tiles, subway tiles, and Baxter Stockman's lab sections, with
  dice-driven movement and combat. Designed for 2–4 players aged 5 and up, the
  game translates the 2003 cartoon's action-adventure storylines into a simple
  family-friendly format.

