description: |
  Thud is a 2002 asymmetric abstract strategy game designed by Trevor Truran, inspired by Terry Pratchett's Discworld novels and named by Pratchett himself. Two players take opposing sides—the smaller but powerful Troll and the more numerous but weaker Dwarfs—battling on an octagonal board across a grid of squares. The game draws on ancient Norse Hnefatafl-style asymmetric capture games but radically redesigns the balance to make competition genuinely even. Referenced in Pratchett's "Going Postal" and central to the novel "Thud!", the game occupies a unique place in literary gaming culture as a functional and beautifully designed abstract that emerged directly from fictional worldbuilding.

