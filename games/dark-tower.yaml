description: |
  Dark Tower is a landmark 1981 electronic board game by Milton Bradley that was revolutionary for its time, featuring an imposing electronic tower that served as the game's computer — an unheard-of innovation at the time. Players travel the four realms of a circular board seeking three keys to unlock the Dark Tower, battling brigands, surviving plague and starvation, and managing supplies through bazaar stops. The tower itself tracks every player's state, announces battles, and controls the pacing of the adventure. A beloved classic of game history, it pioneered electronic gameplay integration decades before it became commonplace.

