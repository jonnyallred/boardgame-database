description: |
  Samurai is one of Reiner Knizia's acclaimed tile-laying trilogy, a mathematically elegant abstract game in which 2-4 players compete to gain the favor of three castes — religious, commercial, and military — across feudal Japan. Players place tiles representing religious influence, commercial power, and military might around cities, villages, and the capital of Edo, with each city's figures claimed by whoever exerts the most influence of each type when it is surrounded. Victory goes to the player who dominates the most castes, with ties broken by comparing second-place holdings. Its sparse, elegant ruleset conceals a fiendishly tactical spatial puzzle that plays in under an hour.

