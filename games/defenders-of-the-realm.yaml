description: |
  Defenders of the Realm is a cooperative fantasy board game for 1-4 players designed by Richard Launius and published by Eagle-Gryphon Games in 2010, set in the richly illustrated world of artist Larry Elmore. Players choose from heroic champions — Cleric, Ranger, Wizard, Rogue, and others — and must coordinate to defeat four invading generals and their minion armies before they can reach Monarch City. The game draws clear inspiration from Pandemic's cooperative structure but applies it to a high-fantasy Dungeons & Dragons-adjacent setting with card-driven special abilities and dice combat. It earned nominations for Best Thematic Board Game and helped establish the fantasy co-op genre that flourished in the 2010s.

