description: |
  La Bataille de Valmy is a Napoleonic-era wargame published by Jeux Descartes simulating the Franco-Prussian engagement at the start of the French Revolutionary Wars on 20 September 1792 — the "Miracle of Valmy" that halted the Prussian invasion of France. Part of the La Bataille system of Napoleonic tactical simulations, the game uses the battalion/regimental level rules developed across the series to model the unique characteristics of early Revolutionary War armies. The engagement was historically remarkable for a French citizen army repelling the professional Prussian military, and the game captures the tactical dynamics of this pivotal battle.

