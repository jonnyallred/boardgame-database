description: |
  Astra is a streamlined area-majority and set-collection game for 2–4 players in which astronomers race to discover and claim constellation cards by marking stars with a dry-erase marker. On each turn, players either spend Stardust to mark stars in a straight line (using Telescope tokens to start new lines), or Rest to refill resources and reactivate card abilities. The moment a player marks the final star in a constellation, they claim the card and gain a powerful reusable ability, rewarding careful timing and resource management in a fast-paced race for astronomical fame.

