description: |
  Strange New Worlds is a 1978 Gametime Games space exploration and colonization game for 2-6 players. Each player commands a single starship traveling jump-routes to new star systems, exploring and colonizing planets for profit. Players can purchase crew cards (Astro-Marines, Science Officers, Star Soldiers) and manage up to four crew cards aboard at once, using their abilities to overcome challenges on distant worlds. Establishing profitable colonies drives the game's economy and determines the winner.

