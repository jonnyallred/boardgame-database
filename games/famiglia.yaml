description: |
  Famiglia (also known as La Famiglia: The Great Mafia War) is a 2023 conflict game designed by Maximilian Maria Thiel and published by Boardgame Atelier, depicting the brutal Sicilian Mafia wars of the 1980s. Inspired by the Corleonesi clan's violent takeover of Cosa Nostra — which resulted in over 1,000 deaths between 1981 and 1983 — players control rival mafia families competing for dominance through area control, intimidation, and strategic conflict. The game won the As d'Or (Golden Ace) at the 2024 Cannes International Games Festival, though its subject matter sparked controversy in Italy. Its historical basis and unflinching thematic approach set it apart from more sanitized conflict games.

