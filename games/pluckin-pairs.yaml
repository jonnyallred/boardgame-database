description: |
  Pluckin' Pairs is a party game from R&R Games in which 3–8 players simultaneously create pairs from a shared tableau of 11 image cards in 90 seconds — one image is always left unpaired. Players secretly write down their chosen pairs and their reasoning (coins and manholes both being round, for example), then reveal. Scoring rewards consensus: if only some players made the same pair, each of those players scores points equal to the number of players who agreed. No agreement and no points; universal agreement and no points — the sweet spot is partial consensus. The game won the Creative Child Game of the Year and excels at sparking creative conversation about associations.

