description: |
  Carla Caramel is a children's puzzle and memory game with a sweet candy-shop theme, published by Djeco. Young players help the caramel-making character Carla complete candy orders, using memory and matching skills. The colorful, child-friendly components and simple cooperative mechanics make it an ideal introduction to structured gameplay for preschool-age children.

