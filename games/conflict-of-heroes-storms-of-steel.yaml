description: |
  Conflict of Heroes: Storms of Steel! – Kursk 1943 is a tactical wargame covering the massive armored clash at Kursk in 1943, one of the largest tank battles in history. Using the same intuitive action-point system as Awakening the Bear!, players command infantry squads, anti-tank guns, and tanks across detailed hex maps, fighting for scenario objectives worth victory points. The initiative system allows real-time reaction to enemy moves, keeping both players engaged throughout. The game scales from quick 30-minute firefights to multi-hour campaigns, and a 3rd Edition released in 2019 updated all artwork, counters, and rules. It supports both competitive and cooperative play for 2-4 players.

