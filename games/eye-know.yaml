description: |
  Eye Know is a visual trivia betting game published by Cardinal Games, a Mensa Select national competition winner. Players select picture cards from the board, identify the image shown, and then bid poker chips on whether they can correctly answer a trivia question related to that image. Questions come in three varieties — true/false (1:1 payout), multiple choice (2:1), and open-ended (3:1) — with higher risk yielding greater rewards. Collecting sets of correct answer cards earns bonus points. The combination of image identification, wagering, and varied question difficulty creates a distinctive take on the trivia genre.

