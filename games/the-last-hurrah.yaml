description: |
  The Last Hurrah is Advanced Squad Leader Module 6, published by Avalon Hill in 1988, and requires
  ASL Rules, Beyond Valor, and Yanks to play. Eight scenarios focus on the early German blitzkrieg
  campaigns of World War II, featuring multiple nationalities who opposed the initial German
  invasions. The module includes one countersheet of Allied Minor infantry and support weapons,
  and two geomorphic boards — Board 11 with revised artwork and Board 33 featuring open terrain
  and a large grainfield. As part of the celebrated ASL system, the module delivers the system's
  trademark operational detail and scenario variety within the constraints of a modular expansion.

