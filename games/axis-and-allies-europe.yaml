description: |
  Axis & Allies: Europe is a 1999 standalone game in the Axis & Allies family that focuses exclusively on the European theater of World War II, beginning in spring 1941. Players command Germany for the Axis and the Soviet Union, Great Britain, and United States for the Allies, building forces with Industrial Production Certificates and battling across Europe, the Atlantic, North Africa, and the Middle East. The European focus allows for greater strategic depth in a smaller geographic scope, with naval control of the Atlantic playing a key role. Designed by Larry Harris Jr. and published by Hasbro under the Avalon Hill brand.

