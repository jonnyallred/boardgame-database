description: |
  Macao is a complex Euro game by Stefan Feld, the 13th entry in the alea big box series, set in the legendary Portuguese trading port in 17th-century China. Each round players draft colored dice rolled by the current player, receiving a matching number of cubes that can only be spent a corresponding number of rounds in the future, creating a demanding puzzle of resource planning. Cubes are spent to activate cards, build city quarters, move ships to deliver goods, and gain gold, all culminating in a tight twelve-round race for victory points. Considered one of Feld's most demanding designs, Macao is celebrated for its unique dice-as-delayed-resources mechanism.

