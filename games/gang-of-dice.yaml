description: |
  Gang of Dice is a 2022 dice-rolling press-your-luck game by Reiner Knizia, published by Mandoo Games, themed around mob lieutenants vying to become the successor to a retiring crime boss by recruiting the most minions. Each round a Warning card is revealed showing a dangerous dice combination or threshold; players then choose any number of their dice and roll them, trying to get the highest result without triggering the warned combination. The winner collects all the dice rolled by all players, growing their gang — but going too far risks losing everything. Light and fast, it rewards reading the odds and knowing when to hold back.

