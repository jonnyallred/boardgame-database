description: |
  Warzone is a squad-based miniature skirmish game set in the Mutant Chronicles science fiction universe, designed by Bill King and published by Target Games in 1995. The game pits competing corporations and dark forces against each other in the grim solar system of the Mutant Chronicles setting, won the Origins Award for Best Miniatures Rules of 1995. Often compared to Warhammer 40,000 for its similar scale and target audience, Warzone distinguished itself with the Mutant Chronicles lore and corporate faction dynamics. After Target Games restructured, the rights passed through several owners, with later editions released by Paradox Entertainment and then Res Nova.

