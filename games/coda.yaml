description: |
  Coda is a deduction game in which each player sets up a row of numbered plastic panels (0-11 plus a dash panel) in a secret sequence. On each turn players guess an opponent's hidden number — a correct guess knocks that panel down, revealing the digit, while an incorrect guess forces the guesser to expose one of their own panels. A new number enters play each turn, narrowing the possibilities. The first player to expose all of an opponent's panels wins. The game was also sold under the title "The DaVinci Code" game and shares its light-deduction hook with a wide audience.

