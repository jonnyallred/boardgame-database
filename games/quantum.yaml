description: |
  Quantum is a 2-4 player space conquest game where players' dice are their spaceships — and crucially, a die's face value both determines its movement speed and its combat power. A 6 is a fast but fragile Scout; a 1 is a slow but mighty Battlestation. Players maneuver their fleets across a modular space sector, racing to place quantum cubes on planets to trigger victory conditions. The elegant inversion — low numbers are powerful but slow — combined with variable boards and strategic rerolling makes Quantum a beloved cult classic in the 4X-lite space.
