description: |
  Dindons & Dragons is a light fantasy card game designed by Sylvie Barc, illustrated by Didier Guiserix, and published in 2003 by La Haute Roche. Players take on the roles of trolls who must distribute prey — adventurers divided into classes such as barbarian, paladin, priest, rogue, and sorceress, as well as dragons and turkeys — among themselves. The distribution and negotiation mechanics create a quick, humorous experience for 3 to 6 players that plays in approximately 20 minutes, making it a light filler with a playful fantasy twist on troll-eats-adventurer tropes.

