description: |
  Dirty Minds: The Game of Naughty Clues is an adult party game created in 1988 by Larry Balsamo and Sandra Schaeffer and published by TDC Games in Itasca, Illinois. Players listen to suggestive-sounding clues read from a puzzle booklet and must guess the clean, innocent answers — the humor arising from the gap between the risqué clues and their mundane solutions. The goal is to spell out "DIRTY" by collecting D, I, R, T, and Y letter cards, with Wild and Action cards adding variety. The game became a popular adult party staple throughout the 1990s and has been reprinted in multiple anniversary editions.

