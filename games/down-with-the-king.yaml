description: |
  Down with the King is a political card game for 2-6 players set in the fictional European Baroque nation of Fandonia. Each player portrays a noble seeking to depose the current monarch and place their own lackey on the throne. Players build their faction's skills, influence, and prestige, earning the loyalty of non-player characters and securing political offices. While all players must cooperate to destabilize the reigning monarch, only one can ultimately claim the crown — making betrayal an ever-present concern. Designed by Glenn Rahman, Kenneth Rahman, and Alan R. Moon, the game features both cooperative and competitive elements with freeform negotiation and hidden agendas.

