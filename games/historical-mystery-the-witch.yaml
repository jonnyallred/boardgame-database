description: |
  Historical Mystery: The Witch is a deduction game from Hobby World International's Historical Mystery series, set around a historical witch trial or accusation. Players investigate the circumstances of the case by visiting locations and gathering testimony over a limited number of moves, then answering a series of questions to resolve the mystery. The game draws on real historical events around witch persecution, providing a historically grounded detective experience.

