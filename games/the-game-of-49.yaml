description: |
  The Game of 49 is a clever bidding and area control game described as Connect Four with auctions.
  Each turn a numbered card is flipped, revealing a space on the 7x7 grid up for auction; players
  bid for the right to place their chip there, with the winner paying their bid to the bank. Special
  wild cards trigger an income phase where each player collects $7 per chip already on the board
  (up to $49), creating a satisfying economic rhythm. The first player to claim four chips in a row
  wins. The combination of public auctions, spatial strategy, and money management makes it
  deceptively engaging despite minimal rules overhead.

