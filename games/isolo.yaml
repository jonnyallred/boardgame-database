description: |
  Isolo is a family of traditional mancala games played across East and Central Africa, with distinct variants played by the Bemba of Zambia and the Sukuma of Tanzania (with separate versions for boys and girls). Played on a 4x8 board, players take turns sowing seeds counterclockwise from holes on their side, capturing opponent seeds through specific landing rules. More than a recreational game, Isolo reflects African social traditions and is passed down across generations, with different rule variants encoding community-specific cultural meanings. A significant example of African board game heritage.

