description: |
  Inspector Moss: House Arrest is a deduction puzzle game in which players take the role of Inspector Moss investigating the murder of millionaire baker John Dough at his country manor. Players explore a 25-tile house grid, rolling dice to move, gather evidence, and obtain assistance. Uniquely, the identity of the murderer is not set at the start — it emerges through evidence collected during play, requiring players to uncover the truth before time runs out. The dice-based resource system and tile-based exploration give the game a refreshing procedural detective feel.

