description: |
  Splotch! (1998) is a standalone expansion for the frog-themed board game Croak!, published by Darwin Project and designed by Igor Polouchine and Mathieu Leyssenne. It follows the same core rules as Croak! — players move frog pieces across a tile board, flipping tiles and trying to land on opposing frogs to eat them — with the addition of a card system where each player draws up to three cards and may play them to manipulate piece positions, cards, or turn mechanics. This card layer adds additional tactical depth and interaction to the base game experience.

