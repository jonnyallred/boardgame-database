description: |
  The China War: Sino-Soviet Conflict in the 1980s is a two-player operational wargame published by SPI
  in Strategy & Tactics magazine issue 76 (1979) and also as a standalone boxed set. Designed by Brad
  Hessel with graphics by Redmond Simonsen, the game simulates hypothetical near-future conflicts
  involving China across three scenarios: a Soviet invasion of China, a Chinese invasion of Vietnam, and
  a Chinese amphibious assault on Taiwan. The 126-kilometer hex map covers all of mainland China; Soviet
  forces race against logistical constraints while Chinese forces score by engaging the enemy. A reaction
  phase and political events system add asymmetric depth, and rules covering tactical nuclear weapons and
  chemical warfare reflect the era's Cold War anxieties.

