description: |
  Conquest of Nerath is a fantasy conquest board game set in the Dungeons & Dragons universe, pitting 2-4 players as competing factions against each other across the Nentir Vale. Players muster armies of foot soldiers, siege engines, dragons, sea vessels, and monsters, with powerful hero units leading assaults and exploring dungeons for magical artifacts. Combat is resolved with dice, and the dungeon exploration adds a treasure-hunting layer atop the strategic war. Winner of the 2011 Origins Award for Best Board Game, it offers a lighter, faster experience than Axis & Allies while capturing the epic fantasy scope of D&D's world.

