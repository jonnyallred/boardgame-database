description: |
  Otys is a puzzle-like worker placement game set in a post-apocalyptic 22nd century where rising oceans have submerged the world, and players lead factions in the floating Otys colony sending divers to harvest debris from drowned civilizations. Each player has a column of five divers at different depths (1-5), and on their turn selects a depth to activate a shared board action and their diver's special power at that depth — after which the diver surfaces and pushes all others deeper, creating a rotating queue. The tight management of which diver is available at which depth, combined with the shared action spaces, creates a deeply tactical and intellectually satisfying optimization puzzle. Published by Libellud in 2017, Otys was praised for its distinctive and elegant depth-tracking mechanism.

