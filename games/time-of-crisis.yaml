description: |
  Time of Crisis places 2–4 players in command of Roman dynasties during the turbulent Crisis of the Third Century, when 50 years of civil war and barbarian invasion nearly tore the empire apart. Players gather influence among the Senate, military, and people of Rome using a deck-building mechanism where cards gained reflect your powerbase and determine future actions, while board position controls access to new cards. The hybrid deck-building/wargame design, published by GMT Games, was praised for making ancient Roman political maneuvering feel both tense and thematic.

