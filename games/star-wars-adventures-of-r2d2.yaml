description: |
  Star Wars: Adventures of R2-D2 is a 1977 Kenner board game released alongside the original Star Wars film, following R2-D2 along a brightly colored adventure path. It is a simple roll-and-move children's game with cards providing benefits and penalties, themed around the events of Episode IV: A New Hope. As one of the earliest Star Wars licensed products, it is a collector's piece representing the dawn of Star Wars merchandise.

