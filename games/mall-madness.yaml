description: |
  Mall Madness is a classic shopping-themed electronic board game designed by Michael Gray and published by Milton Bradley in 1988, with a talking electronic edition following in 1989. Players race around a two-story mall map to be the first to buy six items on their shopping list and return to the parking lot, guided by an electronic unit that announces sales, restocks stores, and hands out money. The electronic talking component was groundbreaking for its era, making it one of the most memorable children's games of the late 1980s and 1990s with multiple generations of redesigns to follow.

