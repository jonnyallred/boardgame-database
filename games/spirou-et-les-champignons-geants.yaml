description: |
  Spirou et les champignons géants is a French children's board game published by Nathan in 1995, based on the
  beloved Belgian comic strip character Spirou. Players guide Spirou, Spip, Fantasio, and the Count of Champignac
  through the Valley of the Giant Mushrooms, each making two round trips to retrieve talismans. The clever central
  mechanic allows players each turn to modify the size of one mushroom and then move — or move first and modify
  after — creating opportunities for both blocking opponents and clearing paths for oneself. Praised for its
  original components and child-friendly strategy.

