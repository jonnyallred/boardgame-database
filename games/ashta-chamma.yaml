description: |
  Ashta Chamma, also known as Chowka Bhara or Chowka Bara, is an ancient Indian racing
  board game played for centuries across South India. Controlled by throwing four cowry
  shells, players move pieces around a 5x5 board, with the shell outcomes of "ashta"
  (all inverted = 8) and "chamma" (all upright = 4) granting extra turns. Players race
  to bring all pieces to the center while capturing opponents' pieces, which sends them
  back to start. The game has references in ancient Indian epics including the Mahabharata
  and is considered one of the oldest racing games still played today.

