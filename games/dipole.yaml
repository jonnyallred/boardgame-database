description: |
  Dipole is an original abstract strategy game designed by Mark Steere, who has created numerous two-player abstract games distributed freely online. The objective is to eliminate an opponent's pieces from the board before they eliminate yours, using movement mechanics based on dipole principles where pieces interact in constrained, attraction-repulsion patterns. Like other Steere designs, Dipole is freely available as print-and-play and playable on several abstract game servers including Boardspace.net, with no commercial publisher.

