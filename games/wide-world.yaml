description: |
  Wide World is a vintage air travel racing board game from Parker Brothers featuring a large world map as its playing surface. Players race their airplanes around the globe, visiting famous cities and countries in a roll-and-move format typical of mid-century American family games. The game's appeal lies in its geography-themed board that introduces young players to world travel and landmarks, and it remains a collectible piece of mid-twentieth century game history.

