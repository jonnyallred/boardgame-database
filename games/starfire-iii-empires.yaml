description: |
  Starfire III: Empires is a 1981 Task Force Games campaign expansion for the Starfire tactical wargame system, adding strategic-level rules for building and managing interstellar empires. Players create their own alien races, colonize planets, research technologies, develop economies, and project military power across the galaxy — adding a grand-strategy layer above the tactical combat of the base game. Designed in part by science fiction novelist David Weber, Empires transforms Starfire into a complete 4X experience spanning multiple sessions. It remains a landmark in the development of the 4X genre.

