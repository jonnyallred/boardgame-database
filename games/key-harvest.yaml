description: |
  Key Harvest is a 2-4 player worker placement and tile-placement game designed by Richard Breese, part of his Key series, published in 2007. Players build personal country boards by placing field tiles in connected groups, scoring one point per tile in their largest group and two points per tile in their second largest — a scoring system that rewards planning compact, interconnected territories rather than sprawling expansion. Workers are placed to acquire tiles, bid for better placement options, or take other actions, and the interaction between players comes primarily through competing for desirable tiles and disrupting opponents' field layouts. The game is notable for its elegantly simple scoring that nevertheless produces deep spatial decision-making.

