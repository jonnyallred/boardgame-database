description: |
  Bonnie and Clyde is a rummy-variant card game published by Abacusspiele (Rio Grande
  Games in English) in which players are FBI agents competing to catch the famous outlaw
  duo by scoring 100 or more points first. The game uses a small board with 10 historical
  locations from Kaufman, Texas to Gibson, Louisiana; Bonnie and Clyde cards are seeded
  among location cards face-down, and players meld Evidence cards for points while
  searching for the outlaws. Bonnie and Clyde cards are each worth 10 points when captured.

