description: |
  Strat-O-Matic Football is a statistical simulation game first published in 1968 by Hal Richman's Strat-O-Matic company, part of the same acclaimed sports simulation series as Strat-O-Matic Baseball. Players use cards representing real NFL players, each with statistically derived ratings, combined with dice rolls to simulate realistic game outcomes down to the play level. Teams and rosters are updated annually to reflect real-world NFL seasons, giving the game enduring appeal for football fans who want to replay historical seasons or compare eras. The deep statistical foundation has made Strat-O-Matic a beloved institution among sports simulation hobbyists for decades.

