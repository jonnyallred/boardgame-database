description: |
  GHQ is an abstract strategy game designed by the novelist Kurt Vonnegut in the 1950s and finally published by Mars International in 2024. Played on an 8x8 board, each player controls Infantry and Artillery pieces with the goal of capturing the opponent's Headquarters; Infantry capture by surrounding enemy pieces while Artillery bombard distant squares. The game is historically notable for potentially containing the world's first instance of zone-of-control rules, and its 70-year journey from Vonnegut's desk to store shelves makes it one of the most storied game discoveries in recent memory.

