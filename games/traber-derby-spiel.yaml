description: |
  Traber Derby Spiel is a German harness racing board game published in 1989 by BURK-Verlag in which eight teams of horses compete around a trotting track. Players race their horses using dice or card mechanics in this family-friendly racing simulation themed around the popular German sport of Trabrennen (trotting racing). The accessible rules and racing theme make it suitable for family play and casual horse racing enthusiasts.

