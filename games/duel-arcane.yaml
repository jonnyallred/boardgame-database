description: |
  Duel Arcane is a 1980 two-player fantasy game published by Gamelords and designed by John Shannonhouse. Before play begins each player creates a mage by rolling dice to generate values for five abilities: Talent, Reflexes, Perception, Stamina, and Resistance. The two mages then battle using shapeshifting abilities — transforming into various animals with different combat characteristics — in an arena-style duel that blends role-playing character creation with tactical combat resolution. The game reflects the early days of RPG-adjacent wargames popular in the late 1970s and early 1980s.

