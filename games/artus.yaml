description: |
  Artus is a hand management and area influence game by the acclaimed design duo of
  Michael Kiesling and Wolfgang Kramer, published by alea in 2011. Set in the legend
  of King Arthur's court, players lead groups of knights competing for prestige at the
  Round Table. Each player holds six cards — knight, royalty, and scoring types — and
  plays two per turn to place or move colored figures around the table or score areas.
  The combination of simultaneous hand management and spatial positioning creates subtle
  tactical depth within an accessible ruleset, earning Golden Geek nominations for
  Best Abstract Board Game.

