description: |
  Gammarauders is a post-apocalyptic board wargame published by TSR in 1987 in which players command giant mutant creatures called bioborgs — such as Elvin the Tyrexian (a mutated T-Rex) or Kizaro the Chimpanzero — across a devastated future landscape. Players act as human handlers directing their bioborgs in humorous yet strategic combat, building up forces and competing for territory in a setting that blends the grim genre of post-apocalypse with comedic creature design. The game spawned an expansion (Revenge of the Factoids) and a 10-issue DC Comics tie-in series.

