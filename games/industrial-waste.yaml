description: |
  Industrial Waste is a 3-4 player economic card game designed by Jürgen Strohm and published by Rio Grande Games in 2001. Players run competing factories, buying raw materials, completing production orders, and investing in technological upgrades to earn victory points — but must carefully manage the waste their operations generate. Exceeding waste capacity triggers environmental disasters requiring expensive cleanups, punishing players who prioritize growth without environmental responsibility. The tension between aggressive expansion and clean production creates interesting decisions, and the game ends when the first factory reaches a value of twenty, giving players a natural race element alongside the economic competition.

