description: |
  Tokyo Express: The Guadalcanal Naval Campaign – 1942 is a solitaire and two-player naval wargame published by Victory Games in 1988, simulating the night naval battles off Guadalcanal during World War II. In the solitaire mode, the player commands the US fleet waiting in darkness for Japanese supply convoys (the "Tokyo Express") to emerge. The game won the 1988 Charles R. Roberts Award for Best WWII Board Game and is praised for its atmospheric recreation of night combat at sea.

