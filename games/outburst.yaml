description: |
  Outburst! is a fast-paced team party game published by Parker Brothers (now Hasbro) in 1986 in which two competing teams race to shout out as many correct answers as possible to a given topic before the timer runs out. Each Topic Card lists 10 possible answers — for example "Commands you give a Dog" or "Slang Terms from the 60s" — and the active team scores a point for each answer they match within the time limit. The game features over 450 topics spanning a broad range of popular culture and general knowledge, rewarding teams that think broadly and speak quickly rather than deeply about any single category. Simple, loud, and sociable, it remains a fixture of party game collections.

