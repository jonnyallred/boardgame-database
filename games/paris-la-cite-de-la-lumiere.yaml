description: |
  Paris: La Cité de la Lumière is a two-player tile-placement game set during the 1889 Exposition Universelle, when the City of Light was dazzling the world with the debut of public electricity. In the first phase, players take turns drafting and placing tiles to jointly build the streets of Paris; in the second phase, they place their pawns to claim the illuminated sections they've carefully set up. The game rewards planning ahead during tile placement while staying alert to your opponent's intentions, all in a tight and elegant 30-minute package with gorgeous Parisian artwork.

