description: |
  Modern Art is an acclaimed auction game by Reiner Knizia, first published in 1992 by Hans im Glück. Players act as art dealers who both sell and purchase works by five fictional artists, using several different auction formats — open, fixed-price, one-offer, hidden bid, and double — determined by the artwork card being offered. At the end of each of four rounds, players sell paintings back to the bank based on artist popularity as determined by how many works have been auctioned that round. The game's elegant combination of auction mechanics and market valuation creates a rich economic tension that rewards reading both the art market and your opponents. Recommended for the 1993 Spiel des Jahres.

