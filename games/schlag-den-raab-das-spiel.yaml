description: |
  Schlag den Raab: Das Spiel is a party board game by Ravensburger published in 2009, based on the popular German TV show of the same name in which contestants attempt to beat host Stefan Raab at a series of mini-games. One player takes the role of Stefan Raab while the others form a team, competing across up to 15 randomly selected mini-games from a set of 36, ranging from quiz questions and memory challenges to physical and motor skill tasks. Points escalate with each successive game, creating dramatic comeback potential in later rounds.

