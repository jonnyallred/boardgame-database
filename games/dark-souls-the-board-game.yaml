description: |
  Dark Souls: The Board Game is a cooperative miniature-based dungeon crawler published by Steamforged Games in 2017, based on FromSoftware's beloved video game series. Players explore modular tile dungeons, battling enemies that follow intricate AI card decks, and ultimately face fearsome boss encounters that mirror the punishing difficulty of the source material. The game raised over £3.7 million on Kickstarter and is noted for its faithful recreation of the video game's challenging atmosphere and high production value with detailed miniatures. Like its digital counterpart, death is frequent and punishing, demanding careful resource management and tactical positioning to survive.

