description: |
  Black Box is a deduction board game created by Eric Solomon and first published by
  Waddingtons in the United Kingdom in 1976. Players shoot "rays" into a black box to
  discover the hidden locations of "atoms" inside using the minimum number of probes.
  Rays deflect, reflect, and pass straight through depending on atom positions, requiring
  careful deductive reasoning to map the interior. The game was inspired by Godfrey
  Hounsfield's CAT scanner work (for which he won the 1979 Nobel Prize in Medicine).
  Parker Brothers published a North American edition in the late 1970s.

