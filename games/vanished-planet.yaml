description: |
  Vanished Planet is a cooperative strategy board game designed by Samuel Blanchard and Craig Oliver, first showcased at the World Boardgaming Championships in 2003 and published by Vanished Planet Games. Players must work together against a racing countdown, managing shared resources and completing a set of mission goals before time runs out — if they fail, they all lose together. For one to six players, the game requires careful coordination and planning, with cooperative management of limited resources and actions being essential to survival. It represents an early example of the purely cooperative genre that would later flourish in the hobby.

