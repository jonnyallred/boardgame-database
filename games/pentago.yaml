description: |
  Pentago is a two-player abstract strategy game played on a 6x6 board divided into four rotatable 3x3 quadrants. On each turn, a player places one marble of their color onto an empty space, then rotates any of the four quadrants 90 degrees clockwise or counterclockwise. The winner is the first to align five marbles in a row — horizontally, vertically, or diagonally — before or after the rotation. The mandatory twist mechanic radically transforms positions each turn, creating dramatic reversals and requiring deep forward-thinking. Winner of the Swedish Game of the Year in 2005 and the Mensa Select Award in 2006, Pentago offers exceptional depth in a deceptively simple package.

