description: |
  Tiki Topple is a fast-paced tactical card game published by Gamewright in which players secretly choose which of the totem tiki pieces they want to advance to the top of the line. Players play action cards each turn to push tikis up the row, topple rivals to the bottom, or toast the last-place tiki off the board entirely, all while keeping their secret objectives hidden from opponents. The bluffing element — since everyone is trying to advance their tiki without revealing which one they own — gives the game surprising depth for its simple rules.

