description: |
  Njet! is a trick-taking card game designed by Stefan Dorra, published in updated form by IELLO in 2013 (originally 1997 by Goldsieber). Before each round, players take turns eliminating options on a negotiation grid, collectively determining the trump suit, starting player, pass direction, and value of tricks for that hand, with eliminated options having no effect. This setup phase creates fascinating pre-game negotiation that sets Njet! apart from conventional trick-takers. The game supports 2–5 players with a variable partnership dynamic and delivers sharp, replayable sessions.

