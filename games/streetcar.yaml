description: |
  Streetcar (originally published as Linie 1 by Goldsieber) is a 1995 tile-laying game designed by Stefan Dorra set in New Orleans. Each player receives a secret set of required stations and a trolley route to complete; players share a common track network being built from tiles of varying complexity — straights, curves, junctions, and crossroads. Once a player connects their terminals and visits all required stations, they race their trolley through the network to win. The game was recommended for the 1995 Spiel des Jahres and placed second in the Deutscher Spiele Preis that year.

