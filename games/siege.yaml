description: |
  Siege!: The Game of Siege Warfare, 50 AD-1400 AD is a 2-player hex-grid wargame published by Fact and Fantasy Games in 1974 simulating historical siege combat across fourteen centuries of medieval and ancient history. One player commands the attackers deploying siege engines and escalade forces; the other defends walls and fortifications using the period-appropriate weapons available. The modular map system allows players to design their own scenarios with varied terrain, fortification types, and unit mixes, making it an open-ended game system rather than just a fixed historical recreation.

