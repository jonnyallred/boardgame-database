description: |
  Trailblazers is a simultaneous card-drafting and route-building game published by Bitewing Games and Allplay in which players construct networks of hiking, biking, and kayaking trails. Each round players are dealt eight trail cards, draft two, arrange them in their play area to form loops, and pass the remainder — only closed loops starting and ending at a matching campsite score points, rewarding careful planning and risk-taking. The game's outdoor adventure theme, quick 30-minute playtime, and scalability up to 8 players make it an approachable gateway for families and groups.

