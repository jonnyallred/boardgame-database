description: |
  Long Shot is a horse racing board game for up to 8 players in which participants bet on and buy horses as a race unfolds turn by turn. Each round dice determine which horse advances, and players can use action cards to influence the race — speeding up their horse, slowing opponents, or buying horses mid-race for a share of any winnings. The combination of betting, ownership, and card play creates an exciting social experience where fortunes can shift dramatically. Originally published by Z-Man Games in 2009, the game captures the unpredictable excitement of the racetrack and plays best with a larger group.

