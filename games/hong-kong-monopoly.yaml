description: |
  Hong Kong Monopoly is a localized edition of the classic Monopoly board game first published by John Waddingtons in 1965 and later by Parker Brothers and Hasbro for the Hong Kong market. The game replaces the standard Atlantic City properties with Hong Kong streets and landmarks, providing local flavor while using the same buy, build, and collect rent mechanics as the original. A 1997 commemorative edition was produced to mark the Transfer of Sovereignty of Hong Kong, and a 2007 limited edition celebrated the handover's 10th anniversary.

