description: |
  Voodoo (Vudù in Italian) is a 2014 party game by Francesco Giovo and Marco Valtriani, published by Red Glove. Players take on the role of competing magic-wielders — a cunning Egyptian adept, a mischievous Dead Druid, or a voodoo sorcerer — and roll dice to gather ingredients for casting curses. Each spell imposes a silly physical condition on opponents, such as speaking with tongue out, using only one hand, or running around the table after each turn. The accumulating comedy of multiple simultaneous curses makes the game escalate in absurdity, making it an ideal icebreaker for social occasions.

