description: |
  Key to the Kingdom is a fantasy adventure board game originally published by Milton Bradley in 1990, with a notable restoration by Restoration Games. Players take the roles of quirky heroes — Pitiless Pixie, Knovice Knight, Unique Unicorn, and others — gathering three pieces of a magic key to defeat the Demon King. The signature mechanic is a hole-in-the-board portal system: stepping on whirlpool spaces physically opens or closes board sections, revealing new terrain. Mini adventure dice games scattered throughout the journey provide variety, while an item system lets players modify dice rolls. A beloved family adventure classic with imaginative physical board design.

