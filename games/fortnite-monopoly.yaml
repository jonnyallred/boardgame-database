description: |
  Monopoly: Fortnite Edition is a licensed reskin of the classic Monopoly property game published by Hasbro in 2018, themed around the massively popular Fortnite Battle Royale video game. Rather than buying properties with money, players claim locations from Fortnite's Chapter 1 island map and manage Health Points (HP) instead of cash. An action die introduces battle royale mechanics — picking up health packs, building walls, and dealing damage to opponents — while a Storm mechanic triggers each time a player passes Go, potentially damaging anyone caught in it. The last player with HP remaining wins, creating a survival-focused twist on the classic Monopoly formula.

