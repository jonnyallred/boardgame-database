description: |
  Shikoku 1889 is an 18xx train game set in 1889 Japan, modelling the early railway development of the Shikoku island. Players buy shares in railroad companies, manage those companies through share dealing and operating rounds, and build track across the hexagonal map to connect cities and generate revenue. The player controlling the majority of shares in a company directs its operations, but all shareholders receive dividends — creating ruthless financial tension between personal wealth and company investment. Often cited as the best entry-point into the notoriously complex 18xx family, Shikoku 1889 delivers the full genre experience in a more accessible map and time frame.

