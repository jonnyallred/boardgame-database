description: |
  Blackbeard is a board game designed by Richard H. Berg and published by Avalon Hill
  in 1991, simulating the Golden Age of Piracy at the turn of the 18th century. Each
  player controls one or more historical pirates — including Blackbeard (Edward Teach),
  Black Bart Roberts, and 21 others — amassing fortune before being caught by a King's
  Commissioner or betrayed by their own crew. Units activate when drawn from a deck,
  creating dramatic turns where players can take on the role of pursuing warships.
  GMT Games published a revised second edition updating the system.

