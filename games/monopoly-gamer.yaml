description: |
  Monopoly Gamer is a Nintendo-themed edition of Monopoly published by Hasbro in 2017. Players choose from Super Mario characters — Mario, Princess Peach, Yoshi, and Donkey Kong — each with unique power-up abilities activated by landing on Super Star spaces. The game adds a Power-up Die alongside the standard die, introduces Boss cards for special challenges, and awards victory to the player with the most points from coins collected, properties owned, and bosses defeated rather than through bankruptcy. The Nintendo characters and special power mechanics give the game a faster, more action-oriented feel than classic Monopoly.

