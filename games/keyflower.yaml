description: |
  Keyflower is a critically acclaimed Euro game of bidding and worker placement set over four seasons, where players bid for and activate hexagonal village tiles using color-coded worker meeples. The twist is that workers used to bid on a tile are then left there and can be used by others to activate it — creating a fascinating push-pull between bidding aggressively and conserving workers. Building a cohesive village that efficiently converts resources into victory points requires long-term planning across all four rounds. Part of Richard Breese's Key series, Keyflower is widely regarded as one of the most elegantly interlocking Euro designs ever published.

