description: |
  Exit: The Game – The Sunken Treasure is a 2018 entry in the EXIT: The Game series designed by Inka and Markus Brand and published by KOSMOS. Players take on the role of treasure hunters diving to a sunken shipwreck in search of legendary riches, solving a chain of underwater-themed puzzles and maritime riddles to recover the treasure and return safely to the surface. With one of the lower difficulty ratings in the series, The Sunken Treasure is particularly well-suited for families and younger players. Its aquatic adventure theme and accessible puzzle design make it an inviting entry point into the EXIT series.

