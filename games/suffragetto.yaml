description: |
  Suffragetto is a 1908 two-player strategy board game published by the Women's Social and Political Union (WSPU) and manufactured by Sargeant Bros. Ltd. in Edwardian London. One player controls 21 green suffragette pieces seeking to break through police lines and enter the House of Commons; the other controls 21 dark blue police constables trying to disrupt the suffragettes' meeting at Albert Hall. Arrested suffragettes go to "prison" and disabled constables to "hospital." The first player to get six pieces into the opponent's base wins. Only one known original copy survives in Oxford's Bodleian Libraries; print-and-play versions have since made it accessible to modern players.

