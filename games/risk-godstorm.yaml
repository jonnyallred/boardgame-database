description: |
  Risk Godstorm is a Risk variant set in the ancient world where the cultures of the Celts, Norse, Greeks, Egyptians, and Babylonians clash for supremacy, each backed by divine pantheons of gods. Designed by Mike Selinker, the game adds gods aligned with sky, war, death, and magic domains to the classic area control formula — players bring gods onto the map to gain powerful advantages. A significant innovation is the Underworld board: fallen soldiers descend to the afterlife and can be used to conquer the underworld territories, adding a second front to the battle. Atlantis can also sink during play, permanently removing a territory from the game and adding dramatic uncertainty.

