description: |
  Catan Histories: Merchants of Europe is a standalone Catan game published by Mayfair Games in 2010, set in medieval Europe's thriving trade networks. Players start with three trading posts and compete to be first to deliver all their commodities to foreign cities across the continent, moving caravans and establishing new outposts while collecting resources from adjacent hexes. The game shares its delivery race mechanic with Settlers of America: Trails to Rails but wraps it in a European medieval merchant theme, creating a more geographically grounded Catan experience.

