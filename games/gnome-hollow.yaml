description: |
  Gnome Hollow is a tile-placement and worker-placement game designed and illustrated by Ammon Anderson, published by The Op (USAopoly) in 2024. Players grow a tabletop garden of mushrooms and flowers, placing gnome workers to claim and cultivate tiles while competing to fulfill objective sets. The game blends spatial puzzle-solving with set collection in a charming garden theme, and was B&N Game of the Month on launch. Ammon Anderson later co-founded Uncommons Publishing; Gnome Hollow received wide acclaim for its accessible depth and beautiful art.

