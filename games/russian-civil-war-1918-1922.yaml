description: |
  Russian Civil War 1918-1922 is a grand scale board wargame published by Simulations Publications Inc. (SPI) in 1976 covering the chaotic multi-faction conflict that followed the Russian Revolution, originally designed and later redesigned by Joseph Miranda. Players command the Bolsheviks, White Army factions, and various nationalist and foreign interventionist forces across a map of the former Russian Empire, managing the military and political dimensions of one of history's most complex civil conflicts. The second edition updated the map, counters, and rules while preserving the scope and depth of the original simulation. Its multi-player structure allows it to capture the historical complexity of shifting alliances and fragmented fronts.

