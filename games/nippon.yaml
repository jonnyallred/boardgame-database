description: |
  Nippon is a heavyweight economic euro game for 2-4 players set during Japan's Meiji industrialization era. Players control Zaibatsu — powerful industrial conglomerates — competing to develop factories, improve technology, ship goods abroad, and satisfy domestic demand. The game features a rich action-selection system where workers placed on the board generate resources and trigger cascading decisions about investing in new industries versus dominating market areas. Its tight resource management and deep strategic branching reward experienced players who plan across multiple turns.
