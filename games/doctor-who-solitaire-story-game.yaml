description: |
  Doctor Who: Solitaire Story Game is a fan-made paragraph-driven solo experience designed by Simon Cogan, available as a free download. Drawing inspiration from classic 1980s solitaire games like Barbarian Prince and Star Smuggler, it sends the player on adventures through the Doctor Who universe by reading numbered sections whose order is determined by rules, dice tables, and player choices. Four rulebooks guide the player through varied situations and encounters, ensuring each playthrough offers a fresh narrative experience. While unofficial, it is widely praised as a faithful and creative tribute to both the source material and the solitaire game format.

