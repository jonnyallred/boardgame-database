description: |
  Die Dracheninsel (Dragon Island) is a German adventure game designed by Tom Schoeps and published by Amigo, in which players are treasure hunters navigating across a dragon island to reach the treasure at its center. The key twist: two players must work together to carry the central dragon coin back to their boat, and upon arrival the boat owner faces a critical decision — split the loot fairly or betray their partner and take it all. This "cooperate or defect" moment gives the game its distinctive tension, blending racing mechanics with a gripping social dilemma that plays out differently each session.

