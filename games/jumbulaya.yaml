description: |
  Jumbulaya is an ever-changing word jumble game for 2-4 players where players build and rearrange words on a nine-row board. Unlike traditional word games, players may trade tiles with those already on the board and rearrange any complete row to form new words, making the puzzle dynamic and constantly shifting. A player wins by building a 10-letter word, claiming all 9 rows, or calling a JUMBULAYA — a word using one letter from seven or more words already on the board. The ability to restructure existing words rather than just adding to them gives Jumbulaya a distinctly strategic character among word games.

