description: |
  Colonial Diplomacy is a commercially published variant of the classic negotiation game Diplomacy, transposed from World War I Europe to Asia in the late 19th century. Seven world powers — including Russia, China, Britain, Japan, Holland, France, and Turkey — compete for colonial dominance across South and Southeast Asia, the Middle East, and the Pacific. Like the original Diplomacy, orders are submitted simultaneously and all moves resolved at once, making pre-negotiation alliances and betrayals the central mechanism. With 58 supply centers and 29 needed to win, full games can last many hours, rewarding players with the patience for deep diplomatic maneuvering. Best played with a full complement of seven.

