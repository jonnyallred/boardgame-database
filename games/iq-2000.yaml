description: |
  I.Q. 2000 is a children's trivia board game published by Playtoy Industries in 1984, featuring 2000 questions at two difficulty levels for players of different ages. Players journey through a space-themed board from Earth toward a fictional planet called Quizzar, answering questions that test general knowledge in science, history, and pop culture. The dual difficulty levels allow younger and older children to compete fairly in family play. A Canadian edition (Trans Canada Trivia) adapted the questions to Canadian geography and culture.

