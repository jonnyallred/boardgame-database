description: |
  Aether Captains is an asymmetric steampunk scenario game set in the world of Arkady, where one player commands a navy zeppelin while the remaining players control sky pirates attempting to bring it down. The naval zeppelin is represented by a cluster of six-sided dice, each die face showing different stats for attack, defense, engines, and crew, making damage a literal die-flip rather than a token. Originally designed by Todd Sanders as a print-and-play title and later published by MAGE Company via Kickstarter, the game features multiple scenarios and a strong asymmetric feel that rewards both sides with different tactical puzzles.

