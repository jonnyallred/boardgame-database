description: |
  Agon is a two-player abstract strategy game first published in London in 1842, making it the oldest known board game played on a hexagonal grid. Played on a hexagonal board of 91 hexagonal spaces, each player controls one queen and six guards, with the objective of maneuvering the queen to the center of the board, surrounded by her six guards. Pieces move one space per turn, restricted to directions toward the center, and players must capture opponents' guards by surrounding them. A historically significant abstract game of positional strategy that influenced later hexagonal game design.

