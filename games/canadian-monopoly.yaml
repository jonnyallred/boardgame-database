description: |
  Canadian Monopoly is the Canadian regional edition of the classic Monopoly board game, first published in the mid-20th century. The standard Monopoly rules of buying, selling, and trading properties are preserved, but the board features Canadian cities and landmarks — including Toronto, Montreal, Vancouver, Ottawa, and other Canadian locations — replacing the Atlantic City properties of the American original. It is one of many regional Monopoly editions adapted for national markets worldwide.

