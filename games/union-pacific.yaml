description: |
  Union Pacific is a train route building and stock investment game designed by Alan R. Moon and published by Amigo Spiele and Rio Grande Games in 1999. Players expand a railroad network by building routes across the board while also investing in stock shares of competing railway companies. Points are scored at multiple scoring rounds throughout the game based on stock holdings and railroad control. The game received a Spiel des Jahres nomination and placed third in the Deutscher Spiele Preis, bridging the gap between family games and the strategy-heavy Ticket to Ride series Moon later created.

