description: |
  Minecraft: Builders & Biomes is a licensed strategy board game published by Ravensburger in 2019, translating the iconic video game into a family-friendly tabletop experience. Players mine a central 3D cube of blocks to gather resources, reveal monsters and buildings in the Overworld, collect weapons to defeat mobs, and construct structures. Three scoring rounds occur as layers of the cube are stripped away, each scoring different aspects — biomes, building materials, and structure types. The game captures the exploration and building spirit of Minecraft while delivering a satisfying and accessible Euro-style experience.

