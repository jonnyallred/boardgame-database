description: |
  Merchants & Marauders is a pirate sandbox game designed by Kasper Aagaard and Christian Marcussen and published by Z-Man Games in 2010. Players captain ships across the Caribbean during the Golden Age of Piracy, choosing their path between honest merchant trading and daring piracy to be the first to accumulate 10 glory points. The game features distinct player ship and captain types, a deep thematic combat system covering both broadside cannon fire and boarding actions, and rich event-driven narrative. Long considered the definitive pirate board game, it has been out of print for years but retains an avid following.

