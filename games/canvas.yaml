description: |
  Canvas is a card-drafting art game designed by Jeff Chin and Andrew Nerger and published by Road to Infamy Games in 2021. Players draft transparent art cards from a shared market, layering three of them over a background to create unique paintings, with the layered icons determining how each painting scores against the round's hidden scoring cards. The game's spectacular transparent card mechanic — where each layer reveals or hides elements of others — creates a visually stunning and deeply satisfying combination puzzle. Canvas is celebrated for its gorgeous production and its blend of creative expression with analytical scoring.

