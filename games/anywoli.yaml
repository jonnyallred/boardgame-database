description: |
  Anywoli is a traditional mancala game played by the Anuak people of Ethiopia's Gambela province
  and neighboring regions of Sudan. The name means "bringing to life" or "giving birth." First
  documented by Richard Pankhurst in 1971, the game is played on a board of two rows of twelve
  holes each, with four seeds placed in every hole at the start.

  Players take turns sowing all seeds from a chosen hole counterclockwise around the board. A
  capture occurs whenever a hole accumulates exactly four seeds — those seeds are removed by the
  hole's owner. The game shares structural similarities with Nigerian and Ghanaian mancalas such
  as Ba-awa and Obridjie, reflecting the broad family of African count-and-capture games. It is
  a traditional game with no commercial publisher.

