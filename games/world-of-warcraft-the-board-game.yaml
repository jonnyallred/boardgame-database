description: |
  World of Warcraft: The Board Game is a 2005 Fantasy Flight Games adaptation of Blizzard's MMORPG for 2-6 players split into Alliance and Horde factions who both adventure across the continent of Lordaeron. Players choose from 16 heroes across nine classes, gaining experience, collecting equipment, and battling 13 monster types, with a 30-turn clock after which factions clash in direct combat if no Overlord has been defeated. The game is noted for its impressive miniature-heavy production and its faction-vs-overlord structure, though its long play time and "multiple solitaire" feel during faction turns were cited as weaknesses.

