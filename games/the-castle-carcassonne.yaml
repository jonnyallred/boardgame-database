description: |
  The Castle (Die Burg / Carcassonne: The Castle) is a two-player tile-placement game designed by Reiner
  Knizia as a Carcassonne spin-off, published by Hans im Glück in 2003. Players take turns placing tiles
  to build sections of a medieval castle — towers, streets, and courtyards — and placing knights to claim
  completed features for points. Unlike base Carcassonne, the board is bounded by castle walls, making
  every placement feel consequential and interactions more direct. Bonus tokens are awarded for landing on
  key wall spaces, adding a tactical race element. The focused two-player design and tighter map make it
  arguably more strategic than the original.

