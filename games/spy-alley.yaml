description: |
  Spy Alley is a Mensa Award-winning deduction and bluffing game published in 1992 in which each player is secretly
  assigned a nationality and must collect their spy's codebook, disguise, key, and password to win. The challenge
  is acquiring needed items without revealing your identity — buying decoy items to mislead opponents — while using
  deductive reasoning to guess rivals' nationalities and eliminate them. Players can make accusations at any time
  but must spend money to do so; a wrong guess costs resources, while a correct one eliminates the target. Named
  Australian Game of the Year and a Chicago Tribune Top Ten Game.

