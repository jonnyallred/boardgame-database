description: |
  Ultra Marines is one of four "introductory" board games released by Games Workshop in 1991, set in the Warhammer 40,000 universe alongside Space Fleet, Kerrunch, and Mighty Warriors. The game is effectively a scaled-down version of Space Hulk and Tyranid Attack, using plastic Space Marine Scout miniatures from the Ultramarines, Space Wolves, Dark Angels, and Blood Angels chapters. It was designed as an accessible entry point into the Games Workshop hobby for younger players.

