description: |
  Canal Grande is a two-player card game adaptation of San Marco set in Venice, designed by Alan R. Moon and Aaron Weissblum. One player divides a set of drawn cards into two piles, and the other player chooses which pile to take — both players then use their cards to place gondoliers and exert influence across Venice's districts. The classic "I divide, you choose" mechanic creates a constant cat-and-mouse tension as the dividing player must make both halves palatable without giving away too much advantage, making Canal Grande a delightful compact duel of strategy and psychology.

