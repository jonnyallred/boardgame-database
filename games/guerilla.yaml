description: |
  Guerilla is a multi-player card game simulation of conflict between rebel and government forces in a fictional Latin American country. Players simultaneously command both government and rebel forces while secretly backing one side, earning victory by controlling installations like ports and airfields, manipulating world opinion, and eliminating opposing forces. The clever dual-role mechanic creates fog of war: each player must appear to aid both sides while covertly favoring their secret allegiance. UN intervention, propaganda battles, and secret police add political and strategic layers that distinguish it from conventional wargames.

