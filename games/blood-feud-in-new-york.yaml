description: |
  Blood Feud in New York is a gangster-themed area control board game designed by Kyle
  Weinandy and published by Eagle Games in 2004, set across a large map of New York City
  including Queens and Brooklyn. Players build criminal empires of thugs, goons, and
  hitmen, moving in limos, speedboats, and helicopters to attack rivals and seize control
  of boroughs for income. The game features over 300 detailed miniatures including
  spinning helicopter rotors, and rewards players who balance family safety with aggressive
  territorial expansion.

