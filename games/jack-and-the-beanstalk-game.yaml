description: |
  The Jack and the Beanstalk Game is a classic 1895 Parker Brothers children's board game based on the beloved fairy tale. Players move along a path connecting Jack's home and the Giant's castle, with the objective of either helping Jack escape with the Giant's Harp or allowing the Giant to catch him, depending on the player's role. Special marked spaces create encounters along the journey. One of the earlier thematic race games based on a storybook property, it set a template for fairy tale adaptations in board gaming.

