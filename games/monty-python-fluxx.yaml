description: |
  Monty Python Fluxx is a licensed variant of the ever-changing Fluxx card game by Looney Labs, published in 2008 under dual license from Toy Vault and Python (Monty) Pictures Limited. The game focuses on the movies and TV sketches of the Monty Python comedy troupe, particularly Monty Python and the Holy Grail, with players helping King Arthur and his Knights find the Holy Grail while dealing with the Knights Who Say Ni. Like all Fluxx games, play begins with Draw 1, Play 1, but as rule cards are played the game's mechanics shift constantly, creating a wildly unpredictable and comedic experience. It was the first Fluxx game based on a licensed property and Looney Labs' longest-running licensed product as of 2025.

