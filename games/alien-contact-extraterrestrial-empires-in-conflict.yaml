description: |
  A multi-player strategic wargame of conquest and expansion published by Phoenix Enterprises in 1983, in which up to six different alien races compete to colonize star systems in an uninhabited sector of the galaxy. Players build space stations, spaceships, and space marine units using a hex-and-counter, resource-point system, managing production and territory while engaging in technological research to develop advanced units. Area movement drives exploration and defense across the stellar map. A 3-to-6 hour experience suited for dedicated wargame enthusiasts who enjoy epic science fiction space conquest.

