description: |
  Chicago (1986) is a board game set in the Prohibition-era criminal underworld of Chicago. One player controls police while the others play gangsters who move through the city, entering buildings to collect money tiles, ride getaway vehicles, and plan bank robberies. The game features a cat-and-mouse dynamic with asymmetric roles between law enforcement and criminals. Specific designer and publisher details are limited in available sources for this edition.

