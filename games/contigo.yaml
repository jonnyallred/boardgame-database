description: |
  Contigo is a 1974 abstract strategy game from 3M's classic Bookshelf Game series, blending Mancala-style pebble mechanics with a grid-based alignment game. Players move their colored pawns across a 6×6 board by counting pebbles stored in Mancala-like pits around the edges, aiming to align four of their own pawns in a row of six spaces (horizontally, vertically, or diagonally) without opposing pawns in between. A four-player Capture variant adds the objective of landing on opponents' key corner pawns. Contigo occupies a fascinating niche between classical connection games and Mancala, and represents 3M's experimental period of publishing distinctive strategy games in their bookshelf format.

