description: |
  Dimension is a fast-paced 3D puzzle game published by KOSMOS and designed by Lauge Luchau in which all players compete simultaneously to stack 60 colorful spheres according to six task cards revealed each round. The cards dictate which colors must be adjacent to or on top of others, creating a spatial logic puzzle that must be solved under time pressure before an hourglass runs out. Points are scored for each task completed, with bonuses for using all five colored balls, and penalties for leftover spheres. The game won the Parents' Choice Silver Honor and Oppenheim Toy Portfolio Platinum Award.

