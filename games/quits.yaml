description: |
  Quits is a compact abstract game in which players aim to empty their hand of cards or pieces by making matching plays, with the last player holding pieces being penalized. The game's simple matching mechanics make it accessible to a wide age range, while the timing of when to play and when to hold creates light strategic tension. Limited commercial documentation is available for this title beyond its listing in board game databases.

