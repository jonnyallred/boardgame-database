description: |
  D-Day Dice is a cooperative dice game for 1-4 players designed by Emmanuel Aquin and published by Word Forge Games in 2012, set during the Allied landings of World War II. Players roll custom dice representing soldiers, specialists, and equipment, strategically locking and rerolling to gather resources needed to storm the beach and neutralize machine gun nests. Each player manages their own unit but shares resources with allies, requiring coordination and calculated risk-taking to advance. The game won multiple Golden Geek awards and earned a reputation as one of the best solo-capable cooperative dice games in the hobby.

