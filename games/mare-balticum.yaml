description: |
  Mare Balticum is a family fishing game set on the Baltic Sea, published by Nova Suecia Games. Players control fishing fleets collecting five types of fish, choosing on each turn to catch fish at their current location, move their ships to richer fishing grounds, or store their catch at port. When clock tokens are drawn, players must commit multipliers to the fish types they expect to dominate at game end, adding a forecasting element to the collection puzzle. The game is distinguished by its beautiful claymation-style artwork that brings the Baltic coast to life in a tactile, warmly textured visual style.

