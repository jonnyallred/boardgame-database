description: |
  Verquere is a historical tables game (in the family of backgammon-style race games) whose earliest documented rules appear in early 18th-century French, Swedish, and German publications, with the first English account recorded in 1721. It is played on a standard rectangular tables board with twelve triangular points along each long side. The game became so prevalent in Scandinavia that the word "verquere" became synonymous with the broader category of tables games in Swedish and Icelandic, and it evolved locally into the modern game known as Svenskt Brädspel. As a traditional folk game, it has no modern commercial publisher.

