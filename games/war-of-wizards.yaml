description: |
  War of Wizards is TSR's first publication set in M.A.R. Barker's world of Tékumel, predating Empire of the Petal Throne by a few months and released in 1975. The game simulates one-on-one or two-on-two magical duels between mighty sorcerers in the Hirilákte Arenas of Tékumel. Gameplay is characterized by high variability—critics noted that a single dexterity roll at the game's start can determine a player's saving throw ability for the entire session—creating chaotic, unpredictable magical battles.

