description: |
  Seikatsu (meaning "life" in Japanese) is a tile-placement game in which players compete to create the most breathtaking view of a shared garden from their own pagoda. Each tile shows both a colored bird and a colored flower; players score immediately for flocks of adjacent matching birds but score flowers only at the end of the game from their personal perspective — rows visible from their seat. This perspective-based dual scoring system is the game's central innovation, creating a shared board that simultaneously feels unique to each player's viewpoint.

