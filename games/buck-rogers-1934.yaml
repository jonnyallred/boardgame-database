description: |
  Buck Rogers is a 1934 triple board game set published by Lutz & Sheinkman under license from the popular Buck Rogers comic strip. The set contains three illustrated game boards depicting scenarios from the sci-fi universe — "Cosmic Rocket Wars," "Siege of Gigantica," and "Search for the Secrets of Atlantis" — each playable independently or combined. Illustrated by original strip artist Dick Calkins, the set is a vivid artifact of early 20th-century science fiction pop culture and one of the rarest Buck Rogers collectibles.

