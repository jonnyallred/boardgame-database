description: |
  Hammer of the Scots is a block wargame from Columbia Games simulating the First War of Scottish Independence (1296–1314), with players commanding English and Scottish forces across a map of medieval Scotland. The block system provides natural fog of war — units are wooden blocks that stand on their edges, showing strength to their owner but concealing information from the opponent — while also elegantly tracking step losses through rotation. Players recruit nobles, manage seasonal attrition, and fight battles for control of Scottish territories, with Robert the Bruce and William Wallace featured as special leaders. Designed by Jerry Taylor and Tom Dalgliesh, it is widely regarded as one of the finest block wargames ever made.

