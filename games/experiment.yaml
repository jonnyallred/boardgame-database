description: |
  Experiment is a 2006 dedicated deck card game that draws players into a light science-themed competitive experience. Players use a hand of themed cards to score combinations or advance their position, with each round creating a new configuration of challenges. The game was designed as an accessible entry point for families and casual gamers, featuring easy-to-learn rules that nonetheless create meaningful decisions each turn. Limited information is available about its designer and publisher, as the game is relatively obscure outside of German-language markets.

