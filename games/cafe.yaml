description: |
  Café is a small-box Euro game set in early 20th-century Portugal during the booming coffee trade with Brazil, where players simulate the flow of coffee beans through four stages: produce, dry, roast, and deliver to historical cafés across the region. Over eight rounds players draft cards and layer them into a growing tableau, with each card activating coffee production and processing actions based on its position. Winner of the 2020 Portuguese Game of the Year and Best Portuguese Strategy Game, Café packs a surprisingly deep spatial and economic puzzle into a compact, elegant package.

