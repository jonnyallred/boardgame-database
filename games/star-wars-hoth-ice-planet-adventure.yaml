description: |
  Star Wars: Hoth Ice Planet Adventure is a 1980 Kenner board game released to coincide with The Empire Strikes Back. Players pilot Millennium Falcon tokens around the icy planet of Hoth, collecting Force Cards by spinning against Imperial villains — Boba Fett, Stormtroopers, Probots, and AT-ATs. Once a player accumulates enough Force, they challenge Darth Vader in the center of the board, and the first to out-spin Vader wins. A simple, spinner-driven family game for 2-4 players.

