description: |
  Domineering is a two-player combinatorial abstract game played on a rectangular grid in which one player places dominoes vertically and the other places them horizontally on alternating turns. Dominoes may not overlap, and the first player unable to place a domino loses. Despite its extremely simple ruleset, Domineering has deep strategic complexity and is extensively studied in combinatorial game theory, where positions in Domineering are used as examples of hot partisan games. It can be played on any rectangular board (common sizes include 8×8 or 6×6) without any special equipment.

