description: |
  The Franco-Prussian War is a 1972 SPI wargame by Jim Dunnigan simulating the 1870 conflict
  between the Second French Empire and Bismarck's North German Confederation. Each counter
  represents an army corps (up to 18 German and 11 French), and the standard rules feature hidden
  movement — all units begin face-down and remain hidden until attacked, with dummy counters
  allowed to mislead opponents. Rail movement and leadership rules add operational complexity.
  The game rewards careful management of the inherently asymmetric forces and captures the rapid
  Prussian mobilization that devastated France in the actual campaign.

