description: |
  MindTrap is a lateral thinking puzzle game originally published by Pressman Toy Corporation in 1991, played by two individuals or teams. Players are read riddles and logic puzzles from a set of cards within a time limit, with correct answers advancing that player or team along a scoring track. The puzzles frequently feature recurring characters such as Detective Shadow and magician Dee Septor, and are designed to mislead with unnecessary information that plays on common assumptions. The game spawned numerous editions and expansions, becoming a long-running series focused on testing creative problem-solving skills.

