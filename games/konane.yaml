description: |
  Kōnane is a traditional two-player strategy board game invented by the ancient Hawaiian Polynesians, historically favored by the ali'i (royal chiefs) as both a mind-sharpening exercise and a gambling game. The board begins completely filled with alternating black and white stones; players take turns making mandatory orthogonal capture jumps — unlike draughts, all moves must be captures, and the player who cannot capture loses. The game's deceptively simple rules conceal significant strategic depth as positions become increasingly constrained, making it a genuinely distinct abstract game rather than a variant of Western checkers.

