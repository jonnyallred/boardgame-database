description: |
  Car Wars is a vehicle combat game designed by Chad Irby and Steve Jackson, first published by Steve Jackson Games in 1981. Set in a post-apocalyptic future where the right-of-way belongs to the biggest guns, players design armed and armored vehicles — from motorcycles to semi-trucks — then battle on roads, arenas, and parking structures. The game uses microphased movement for realistic vehicle dynamics and offers extensive customization of weapons and armor. Car Wars was a hugely popular tournament game throughout the 1980s and spawned numerous expansions and supplements.

