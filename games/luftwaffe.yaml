description: |
  Luftwaffe is a hex-and-counter air combat wargame designed by James F. Dunnigan and published by Avalon Hill in 1971, covering the strategic bombing campaign over Germany during World War II. Players command either Allied bomber formations and escort fighters attempting to destroy German industrial targets, or German interceptor forces trying to defend the Reich. Aircraft types are modeled in detail with specific speed, altitude, and firepower ratings, and scenarios cover key raids including the infamous Schweinfurt missions. One of Avalon Hill's earliest dedicated air warfare games, Luftwaffe helped establish the conventions of the air wargame genre.

