description: |
  Click Clack (also known as Click Clack Lumberjack or Toc Toc Woodman) is a dexterity game published by Mayday Games in 2008, in which players take turns tapping a plastic axe against a stacked plastic tree, trying to knock off outer bark pieces without dislodging the inner core sections. Players score points for each bark piece they dislodge, but losing core pieces counts against them. The game's tactile, slightly precarious nature creates tension and laughter as the tree wobbles with each strike, making it an instant party favorite for all ages.

