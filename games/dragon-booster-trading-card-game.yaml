description: |
  Dragon Booster is a collectible card game based on the animated television series of the same name, released by Score Entertainment in 2005. Set in Dragon City where racing and combat combine in 200-mile-per-hour competitions, two players build decks around dragon racers and use draconium gear and dragon energy cards to outmaneuver opponents. Victory is achieved either by being the first to cross the 30-point finish line or by exhausting all rival players' decks. Only one set, "Release the Dragon," was ever published before the game was discontinued; a second set was completed but never printed.

