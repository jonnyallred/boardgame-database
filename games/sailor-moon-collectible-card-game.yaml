description: |
  The Sailor Moon Collectible Card Game is a competitive CCG published by Dart Flipcards in July 2000 in which players pit teams of Sailor Scouts against opposing monsters and villains drawn from the iconic anime series. Each player has both scouts and a collection of enemies; scouts can be upgraded by playing higher-level cards in a mechanic similar to Pokémon's evolution system, and random resolution is sometimes handled via rock-paper-scissors. Victory is achieved by eliminating all of an opponent's scouts or defeating enough monsters to reach the victory point threshold. The game won the 2000 Origins Award for Best Trading Card Game.

