description: |
  Give Me the Brain! is a card game designed by James Ernest and published by Cheapass Games in 1996, winner of the Origins Award for Best Traditional Card Game in 1997. Players are zombies working at Friedey's, "the fast-food restaurant of the damned," each trying to complete their task cards for the day—but only one brain exists among the whole crew. Cards representing tasks require the brain to complete; players bid for the brain when it is dropped, and the goal is to be the first to discard your entire hand. Dark, fast, and absurd, it is the original entry in Cheapass's beloved Friedey's series.

