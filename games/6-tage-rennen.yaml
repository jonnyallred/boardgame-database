description: |
  6-Tage Rennen (German for "Six-Day Race") is a cycling-themed board game published in Germany in 1986 by Holtmann VIP as a promotional item. Players compete in a series of single-lap races, playing cards from their hand to move their cyclist token forward and jockeying for position on the track. A slipstreaming rule rewards cyclists who share a space with others, adding the card movement value for each shared-space cyclist — capturing the tactical drafting that defines professional cycling. The theme is inspired by the six-day track cycling events that were enormously popular in Europe, particularly in the post-war era.

