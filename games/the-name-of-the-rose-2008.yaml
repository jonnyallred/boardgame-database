description: |
  The Name of the Rose is a 2008 deduction and social deduction board game designed by Stefan Feld and published by Ravensburger, based on Umberto Eco's acclaimed medieval mystery novel. Players take on the roles of monks in a monastery, each with a secret identity they must protect while gathering clues to deduce the identities of their fellow players. The game blends hidden identity mechanics with deduction and bluffing, creating a layered experience of information management and misdirection. Now out of print and highly sought after, it is often cited as Stefan Feld's "lost masterpiece" and one of his most thematically evocative designs.

