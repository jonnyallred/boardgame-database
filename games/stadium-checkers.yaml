description: |
  Stadium Checkers is a dexterity marble game published by Milton Bradley in which players place colored marbles
  around spinning rings on a stadium-shaped gameboard. When the rings are released they drop marbles toward the
  center, and the player who lands all five of their marbles in the center scoring zone on their side of the
  board wins. The physical, tactile nature of the marble-dropping mechanism makes it an exciting and unpredictable
  game for young children, similar in spirit to other marble-based family games of its era.

