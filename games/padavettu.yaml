description: |
  Padavettu (also known as Nira, Pada, or Kallukali) is a traditional board game from Kerala, India, often described as a sophisticated variation of Tic-Tac-Toe. Two players take turns placing or moving pieces on a grid, attempting to form specific patterns or lines while blocking their opponent from doing the same. Like many traditional Indian games, Padavettu was passed down orally through communities and families rather than through formal publication. It belongs to the category of alignment games that have been played across South Asia for centuries, serving both as entertainment and as a tool for developing strategic thinking in children.

