description: |
  Master Fox is a frenetic tactile dexterity party game designed by Frédéric Vuagnat and published by IELLO in 2015. Players wear fox masks that block their vision and simultaneously reach into the game box with one hand to feel for and grab their target shape among the wooden tokens inside. The simultaneous blind scramble creates chaotic, hilarious moments as players grope for the right piece by touch alone. Quick, silly, and accessible from age 7 upward, Master Fox is a guaranteed crowd-pleaser for family game nights and party settings.

