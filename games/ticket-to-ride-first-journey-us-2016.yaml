description: |
  Ticket to Ride: First Journey (U.S.) is a 2016 children's standalone entry in the Ticket to Ride series by Alan R. Moon and Days of Wonder, designed as the perfect introduction to the franchise for players ages 6 and up. Set on a simplified map of the United States, players collect colored train cards to claim routes connecting cities on their tickets, with the first player to complete six tickets winning the game. Bigger pieces, shorter connections, simpler rules, and a 15-30 minute play time make it extremely accessible for young children and family game nights.

