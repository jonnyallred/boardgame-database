description: |
  Tainted Grail: The Fall of Avalon is a solo and cooperative adventure game
  published by Awaken Realms in which players explore a dark, crumbling vision
  of Arthurian Britain blended with Celtic mythology. Each session follows a
  non-linear narrative with branching choices where resource management is
  critical — menhirs with numbered dials create an artificial time limit,
  pushing players to act before the world deteriorates further. Combat and
  diplomatic encounters each have dedicated card mechanics, and characters grow
  through experience and deck improvements across a 30–50 hour campaign.
  The game is renowned for its immersive storytelling, stunning production
  quality, and dark thematic depth.

