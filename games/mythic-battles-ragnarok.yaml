description: |
  Mythic Battles: Ragnarök is a 2-4 player miniature skirmish game set in Norse mythology, published by Monolith in 2023. Players draft a mighty force — choosing a god or titan as their divinity, then adding monsters, heroes, and troops — and battle across dynamic scenarios. The card-driven drafting mechanic ensures every force is unique, while dice and hand management govern combat. The game can be played as a standalone skirmish or as part of an extended campaign of interconnected scenarios, rewarding deep tactical play with beautifully sculpted miniatures and thematic Norse encounters.
