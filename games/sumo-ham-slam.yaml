description: |
  Sumo Ham Slam is a 2010 Gamewright dexterity game in which players control magnetic plastic hamster sumo wrestlers, maneuvering them with magnetic sticks to knock opponents out of the ring. Players roll dice to feed their hamsters — mirroring the eating regimen of real sumo wrestlers — and a well-fed hamster is a stronger combatant. The hamster theming and magnetic control mechanism give the game a tactile, giggle-inducing quality that makes it a lively activity for families and younger children.

