description: |
  Supercharge: Battle of El Alamein, October 1942 is a hex-and-counter board
  wargame simulating Operation Supercharge during the Second Battle of El
  Alamein in World War II. Originally published as part of SPI's "Four Battles
  in North Africa" quadrigame collection, it was also released as a standalone
  folio game. Designed by Greg Costikyan, Frank Davis, and Redmond A. Simonsen,
  the game gives players control of Allied and Axis forces as they fight through
  one of the pivotal engagements of the North African campaign.

