description: |
  King of New York is Richard Garfield's 2014 standalone spin-off of King of Tokyo, pitting giant monsters against each other — and against the city itself — across the five boroughs of New York. Players roll dice to deal damage, heal, and earn energy for powerful card upgrades, while competing to dominate Manhattan and become a media superstar. New mechanics include military units defending against rampaging monsters, buildings to destroy for bonus rewards, and district-based positioning, adding strategic texture to the core dice-chucking excitement. The game supports 2-6 players and delivers the same fast, accessible monster-battle thrills as its predecessor with added depth.

