description: |
  Tales of the Crystals is an interactive fantasy cooperative board game
  published by Milton Bradley in 1993, aimed primarily at young girls. An
  included 60-minute audio cassette guides players through four different fantasy
  adventures, instructing them to perform tasks, recite lines, and act out
  scenarios — encouraging physical movement and imagination rather than passive
  seated play. The game's elaborate components include crystal pendants, a
  plastic heart box, a magic mirror, a Wheel of Choices, and fantasy cards.
  Notable for its immersive audioguide format, the game predated modern narrative-
  driven cooperative gaming by blending storytelling with imaginative roleplay.

