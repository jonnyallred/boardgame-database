description: |
  The Korean War (Korea: The Mobile War) is a 1969 SPI board wargame by Jim Dunnigan, one of the
  earliest board wargames dedicated to the Korean conflict. One player controls United Nations
  forces and the other commands North Korean and Chinese forces. Three scenarios cover distinct
  phases of the war and can be combined into a full 52-turn campaign game. The simple d6 combat
  resolution table with straight ratios — a hallmark of early SPI design before differential
  modifiers became standard — makes the game accessible by 1960s-era wargame standards while
  capturing the war's dramatic mobile phase and subsequent stalemate.

