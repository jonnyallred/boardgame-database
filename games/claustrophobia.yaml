description: |
  Claustrophobia is a two-player asymmetric dungeon survival game published by Asmodee in 2009, set within the Hell Dorado universe. One player commands a small squad of determined human warriors descending into demonic catacombs, while the other controls an almost endless horde of demonic creatures swarming from the darkness. The game uses large dungeon tiles, pre-painted miniatures, and custom dice to deliver cinematic dungeon-crawl gameplay in under an hour. Its tight, asymmetric design earned it the 2010 International Gamers Award for Two-Player Strategy and a devoted cult following.

