description: |
  Ludus latrunculorum ("the game of mercenaries" or "the game of little thieves") was one of the most popular strategy board games of ancient Rome, played from roughly the 1st century BC through the Roman Empire's height. Played on a rectangular grid, pieces move orthogonally and capture by custodian capture — surrounding an opponent's piece on two sides. A special "dux" (king) piece may have had enhanced movement. Despite being widely mentioned in Roman literature and appearing in mosaics and art, the exact rules were only partially recorded, and modern reconstructions vary. It is considered Rome's most sophisticated strategy game, comparable in status to chess in medieval Europe.

