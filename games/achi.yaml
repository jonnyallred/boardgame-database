description: |
  Achi is a traditional two-player abstract strategy game originating from Ghana, closely related to tic-tac-toe and Three Men's Morris. Each player has four pieces and the game proceeds in two phases: first placing pieces onto the 3x3 board, then taking turns sliding pieces to adjacent points to form a three-in-a-row. The combination of placement and movement phases adds a layer of strategic depth beyond simple tic-tac-toe, as players must think ahead to avoid trapping themselves while creating threats. Its minimal components and centuries-old design make it a timeless filler for any two players.

