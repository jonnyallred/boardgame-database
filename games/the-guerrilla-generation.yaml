description: |
  The Guerrilla Generation: Cold War Insurgencies in Latin America is COIN Series Multi-Pack II,
  designed by Stephen Rangazas and published by GMT Games. It contains four separate games covering
  1968-1992 insurgencies in Uruguay, Nicaragua, El Salvador, and Peru. Each game uses the COIN
  asymmetric action-selection system but features unique mechanisms tailored to its conflict: radio
  propaganda in El Salvador, managing US aid in Nicaragua, hunting Sendero Luminoso leader Guzmán
  in Peru, and kidnapping officials in Uruguay. The games draw on historical research from scholars,
  human rights reports, and local accounts to portray each insurgency with appropriate nuance and
  specificity.

