description: |
  Wadjet is a 1996 board game designed by Dee Pomerleau and published by Timbuk II, themed around the discovery of Tutankhamun's tomb by Howard Carter and Lord Carnarvon in 1923. Two to four players take the roles of archaeologists exploring Egyptian tombs in search of stolen treasures. The game's Egyptian archaeological adventure setting draws on the mystery and wonder of ancient Egypt to provide a thematic backdrop for its family-accessible mechanics. Named after the protective cobra goddess of ancient Egypt, the game is primarily of interest to collectors of 1990s family games.

