description: |
  The Thing is a 1982 board game tie-in to John Carpenter's cult horror film of the same name. Details about this original game are limited due to its obscurity, but it was published to capitalize on the film's release and likely involves the alien horror theme from the movie's Antarctic setting. Like many movie tie-in games of the era, it may feature simple roll-and-move mechanics with a horror atmosphere. This entry may refer to an early tie-in product; collectors seeking information are advised to consult vintage game archives for further details.

