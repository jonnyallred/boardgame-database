description: |
  Keyper is a 2-4 player worker placement and tile placement game by Richard Breese, published in 2017 as the most complex entry in his long-running Key series. Players build a personal village board while competing over seasonal country boards — special folding boards that offer four different layout options each season, creating fresh spatial puzzles every game. The namesake Keyper worker piece allows a player to claim a country board rather than taking an action on it, later collecting all workers placed there between rounds. A distinctive joining mechanic lets other players add workers to country boards already claimed, benefiting both parties, giving Keyper an unusual cooperative tension within its competitive framework.

