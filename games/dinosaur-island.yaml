description: |
  Dinosaur Island is a pop-art-styled worker placement game in which players compete to build the most thrilling — and most dangerous — dinosaur theme park, channeling the spirit of Jurassic Park with tongue firmly in cheek. Players draft DNA dice to sequence dinosaur genomes, construct paddocks to house their prehistoric attractions, hire specialists, and upgrade their park's facilities and security measures. Bigger, more dangerous dinosaurs attract more visitors but require better containment; fail to invest in security and your guests become lunch. A park board tracks visitor traffic, thrill level, and incident risk, creating constant tension between pushing for the most exciting exhibits and keeping the body count manageable. The game's bright retro aesthetic and humor make it approachable for families and hobbyists alike.

