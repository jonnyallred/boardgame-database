description: |
  Hey Pa! There's a Goat on the Roof is a children's board game published by Parker Brothers in 1966. Designed around a farm theme, players navigate a simple board while dealing with the mischief of goats. The game is a lighthearted race or action game aimed at young children, featuring the kind of silly farm animal humor that made it a novelty item of the 1960s.

