description: |
  Spinnengift und Krötenschleim (Spider Venom and Toad Slime) is a children's memory and collection game
  designed by Klaus Teuber and published by Kosmos in 2012, based on his earlier game Hallo Dachs! Players
  are young witches collecting hidden potion ingredients scattered around the board, using memory to find the
  right items for each potion recipe. Gathering the correct ingredients earns a medal and a magic chip added
  to a shared cauldron; when enough chips overflow the cauldron, an adorable monster is created. Nominated for
  the Kinderspiel des Jahres 2012, it won the Graf Ludo award for best children's game graphics.

