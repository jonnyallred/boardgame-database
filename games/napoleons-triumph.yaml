description: |
  Napoleon's Triumph is a two-player operational wargame by Bowen Simmons, published by Simmons Games in 2007, simulating the Battle of Austerlitz on a large double-sided 44"×34" map. The game uses no dice — movement and combat are resolved through a unique polygon-based map system and block-style hidden-strength mechanics where each player knows where enemy units are positioned but not their type or strength. This hidden-information system creates constant tension and demands careful inference. Building on the acclaimed Bonaparte at Marengo, Napoleon's Triumph is praised by wargamers as one of the most elegantly designed abstractions of Napoleonic battlefield command.

