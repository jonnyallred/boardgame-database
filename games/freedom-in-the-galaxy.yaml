description: |
  Freedom in the Galaxy: The Star Rebellions, 5764 AD is a space opera wargame published by SPI in 1979, designed by Howard Barasch and John H. Butterfield. Inspired by Star Wars (though without an official license), the game pits a Rebellion player against a Galactic Empire player, with rebels seeking to win the support of planetary populations, raise armies, and ultimately defeat Imperial forces across a star map. The game offers both a shorter and a full campaign version. Its original Star Wars-flavored premise drove it to SPI's Top Ten Bestseller List for six months after release, and it was later reprinted by Avalon Hill.

