description: |
  Bus is a seminal 1999 worker placement and route building game by Jeroen Doumen and Joris Wiersinga of Splotter Spellen, widely cited as one of the earliest games to use the worker placement mechanism. Players build competing bus lines in a growing town, routing passengers between homes, workplaces, and pubs to score points. A critical twist is the "time stop" action: a player may freeze time to lock in which areas score, but reveals that decision only after workers have been assigned — creating intense psychological pressure. Despite its complexity, games typically run under 90 minutes, making Bus a dense and influential design.

