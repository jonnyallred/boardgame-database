description: |
  My First Castle Panic is a cooperative tower-defense game designed by Justin De Witt and published by Fireside Games, based on the best-selling Castle Panic series. Designed for ages 4 and up, the game requires no reading — players simply match color and shape to send defenders to catch monsters before they smash the castle. Each monster follows a single winding path toward the castle, and players work together to intercept them. The game introduces young children to core cooperative play concepts, turn-taking, and color/shape matching in a friendly 20-minute format.

