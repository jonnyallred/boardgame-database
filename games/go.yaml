description: |
  Go is an ancient abstract strategy game for two players in which the aim is to fence
  off more territory than the opponent by placing black and white stones on intersections
  of a 19x19 grid. Originating in China over 2,500 years ago, it is considered the oldest
  board game still played continuously today. Despite its minimalist rules—stones are
  captured by surrounding them, and the player with more territory wins—Go has an effectively
  infinite strategic depth that has challenged human masters for millennia and only recently
  been matched by AI systems. With over 46 million players worldwide, it remains one of the
  most played games in human history.

