description: |
  Fruit Spy is a 2005 family bluffing game in which players take the roles of small animal rascals sneaking into Farmer Papa's orchard to collect fruit. Each player secretly places spy cards face-down on farmhouse boards to build their strength, with fruit tokens awarded to the strongest player at each location. The game's simple hidden placement and bluffing mechanics make it accessible for families while offering some tension around deducing where opponents have committed their forces.

