description: |
  Whirling Witchcraft is a competitive engine-building game for 2-5 players in which each player takes the role of a witch managing ingredients at their cauldron workbench. On each round, players simultaneously select recipe cards to craft magical ingredients, then pass overflow ingredients to their neighbor, with the goal of flooding an opponent's cauldron beyond its capacity. The clever "overflow" mechanic means that building a powerful engine can actually harm your neighbor more than yourself, creating satisfying direct interaction without direct conflict.

