description: |
  On Tour is a roll-and-write game for 1-8 players in which everyone tries to book the longest possible concert tour across the US or Europe. Each turn, two 10-sided dice are rolled and three region cards are flipped, telling all players which two numbers to write in which geographic areas. Players write numbers in their map, then at game end draw the longest ascending route they can through their numbers. The simultaneous play and simple scoring make it a breezy, clever puzzle that scales effortlessly to large groups.
