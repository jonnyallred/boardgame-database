# Description
description: |
  1914 is a two-player board wargame designed by James Dunnigan and published by
  Avalon Hill in 1968. It simulates the opening months of World War I on the
  Western Front, covering the period of fluid mobile warfare before the trenches
  were established. This was Dunnigan's second game for Avalon Hill and an early
  example of hex-and-counter wargaming.

  Players control the German and Allied forces as they maneuver across Belgium and
  France. The game captures the race to the sea and the initial German offensive,
  with historical scenarios providing context for the dramatic early campaigns of
  the war.

