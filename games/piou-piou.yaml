description: |
  Piou Piou is a light French card game published by Djeco for 2–5 players in which players race to hatch three chicks before opponents do. Players take turns playing hen, rooster, and nest cards in combinations that allow them to lay eggs, hatch chicks, or steal eggs from rivals, while also worrying about the fox stealing them. The game deals 4 cards to each player with the remainder available as a draw pile. Its cheerful illustrated components, barnyard theme, and simple mechanics make it an excellent introductory card game for children ages 6 and up, completing in well under 20 minutes.

