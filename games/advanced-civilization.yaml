# Description
description: |
  An expanded standalone version of the 1980 Civilization board game, incorporating
  the Western Expansion board and additional advancement cards. Players guide ancient
  civilizations from the Stone Age to the Iron Age, trading commodity cards to advance
  their cultures through a technology tree of civilization advances. Calamities — both
  natural disasters and human conflicts — can devastate populations and reduce cities.
  With up to seven players, the full game is an epic multi-hour trading and
  civilization-building experience. One of the most influential games in the genre,
  considered superior to the base game by most players.

