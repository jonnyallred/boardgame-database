description: |
  MLB Showdown is an out-of-print collectible card game published by Wizards of the Coast from 2000 to 2005, simulating authentic Major League Baseball play. Players build teams from cards representing real MLB players, using a 20-sided die alongside pitcher and batter cards to resolve at-bats, advancing runners around the bases toward scoring. Each starter deck included two 12-card teams, strategy cards, a 20-sided die, and an official baseball diamond playmat. Named Card Trade Magazine's 2000 CCG of the Year, MLB Showdown was the first major licensed sports collectible card game and found an audience among both baseball fans and card game enthusiasts before its cancellation in 2006.

