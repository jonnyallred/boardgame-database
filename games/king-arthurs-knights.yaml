description: |
  King Arthur's Knights is a 1978 Arthurian adventure board game published by Chaosium in which players take on the roles of knights of the Round Table performing chivalrous quests for artifacts and treasure across a map of legendary Britain. Players pursue glory and honor in service to Camelot, encountering monsters, rivals, and magical challenges as they race to complete quests. The game reflects Chaosium's early expertise in narrative-rich adventure gaming, predating their RPG work, and draws from the rich Arthurian mythological tradition.

