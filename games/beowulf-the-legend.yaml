description: |
  Beowulf: The Legend is a 2005 board game by Reiner Knizia, published by Fantasy Flight
  Games with artwork by John Howe, in which players take the roles of Beowulf's companions
  vying to support him in his epic adventures and succeed him after his death. Players
  move along a board tracing events from the Old English poem, bidding cards representing
  combat, cunning, and other skills in a series of auctions for rewards and glory.
  The game includes open and closed bidding formats plus a press-your-luck element
  where potential rewards must be weighed against risk of failure.

