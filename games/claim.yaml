description: |
  Claim is a two-player trick-taking card game played in two distinct phases across a 52-card deck featuring five fantasy factions: Goblins, Knights, Undead, Dwarves, and Doppelgangers. In Phase 1, players compete to recruit followers into their hand by winning tricks, with each faction's special power potentially active during play; in Phase 2, those recruited followers determine the winner of each faction's vote. The player who wins the vote of at least three factions wins the game, creating a deeply strategic tug-of-war that challenges the notion that two-player trick-taking games can't be exciting.

