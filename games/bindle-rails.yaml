description: |
  Bindle Rails is a print-and-play card game designed by Jack Neal in 2008 in which
  players serve as railroad executives of one of the legendary Big Four Northeastern
  U.S. railroad companies. Players expand their network, manipulate stock prices, and
  acquire technologies while racing to connect from the East Coast to Chicago or St.
  Louis. Drawing inspiration from the 18XX series for finance mechanics and Ticket to
  Ride for route-building goals, the game packs a surprisingly rich railroad experience
  into a compact format.

