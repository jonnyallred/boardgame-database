description: |
  Coppit (originally Fang den Hut or "Catch the Hat!" in German) is a classic children's running-fight board game first published in 1927 by Otto Maier Verlag, the predecessor to Ravensburger. Players roll a die and move their conical, hat-shaped pieces around a circular track, trying to land on and capture opponents' pieces by stacking them under their own hat. Captured pieces are carried along as prisoners until the captor returns them to their home base for permanent elimination. Safety squares on the track provide brief refuge. Published in the UK by Spear's Games from 1964, it remains a beloved European children's classic appreciated for its simple rules and exciting stacking mechanic.

