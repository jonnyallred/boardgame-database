description: |
  Frederick the Great: The Campaigns of The Soldier King 1756–1759 is a board wargame designed by Frank Davis and Edward Curran, originally published by SPI in 1975 (first as a Strategy & Tactics #49 pull-out game, then as a standalone flatpack). The game simulates Frederick the Great's campaigns during the Seven Years' War in Central Europe, covering multiple engagements against the coalition of Austria, France, and Russia. When SPI encountered financial difficulties in 1981, Avalon Hill acquired the title and released a second edition in 1982. The game is a classic hex-and-counter wargame with Redmond A. Simonsen's distinctive graphic design.

