description: |
  Ubongo 3D is the three-dimensional expansion of the Ubongo puzzle series by Grzegorz Rejchtman, published by KOSMOS. Players must place 3D block pieces into a two-layer structure that completely fills the designated white space on their puzzle board — no piece can extend outside the space and nothing can be higher than two levels. Rotating and fitting the blocks in three dimensions makes this considerably more challenging than the base game. Like the original, it is played as a real-time race with gem rewards for the fastest solvers.

