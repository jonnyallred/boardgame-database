description: |
  A two-player hex-and-counter wargame first published by Guidon Games in 1971, designed by Gary Gygax before he co-founded TSR, simulating the Battle of Arbela (Gaugamela) in 331 BCE. The game pits Alexander's Macedonian army against Darius III's Persian forces in one of antiquity's most decisive engagements. A 1972 supplement, Alexander's Other Battles, added scenarios for Granicus, Issus, and the Hydaspes. An influential early wargame that helped define the hex-and-counter genre, later republished by Avalon Hill in 1974.

