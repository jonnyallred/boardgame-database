description: |
  Star is a two-player abstract strategy connection game designed by Craige Schensted (also known as Ea Ea) and first published in the September 1983 issue of Games magazine. Players alternate placing stones on a hex-based board; a "star" is formed when a group of connected stones touches at least three partial-hex border cells, and its score equals the number of such border cells minus two. To prevent first-player advantage, a pie rule is used. The game rewards players who link their groups efficiently across multiple border regions, offering high strategic depth in a simple ruleset.

