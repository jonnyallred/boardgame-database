description: |
  Near and Far is a 2-4 player map-based storytelling and worker placement game designed and illustrated by Ryan Laukat, published by Red Raven Games in 2017 as a sequel to Above and Below. Players take on the roles of adventurers seeking fame, fortune, and the discovery of a legendary last ruin, traveling between towns and exploring wilderness maps where story encounters present moral and practical choices read aloud from a companion book. Between adventures, players manage an outpost, hire companions from a roster of 20 unique characters, and gather artifacts and supplies. The game can be played as a competitive campaign across multiple sessions or in a standalone format, and its gorgeous hand-painted artwork creates a rich, evocative world.

