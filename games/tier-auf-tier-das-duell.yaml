description: |
  Tier auf Tier: Das Duell (Animal Upon Animal: The Duel) is a two-player competitive variant of HABA's beloved wooden stacking game Animal Upon Animal. Each player has their own set of four wooden animal figures — octopus, tiger, goose, and squirrel — and rolls dice to determine which animal to place and where on the growing tower. The first player to place all their animals wins, but one wobble too many and the tower comes crashing down in laughter.

