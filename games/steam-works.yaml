description: |
  Steam Works is a steampunk worker-placement game designed by Alex Churchill and published by Tasty Minstrel Games in 2015. Players take on the role of engineers who must not only place workers but also physically construct the worker-placement spots themselves by assembling components and power sources into machines. The resulting devices then become action spaces available to all players, creating a dynamic board that evolves each game. This meta-puzzle of building the engine you will work in, while also competing for resources and completed inventions, makes Steam Works a uniquely layered euro game.

