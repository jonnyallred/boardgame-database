description: |
  On the Underground: London/Berlin is a route-building strategy game for 2–5 players in which each player constructs and extends their own underground rail line across a detailed city map. Players take turns playing cards to extend their lines, aiming to build the best connectivity to attract the game's single Traveller token as it moves from location to location. The 2019 LudiCreations edition is a reimplementation of Sebastian Bleasdale's 2006 original, featuring two double-sided maps — the iconic London Underground and the Berlin U-Bahn — each with distinct scoring rules. The elegant tension of building your own network while routing opponents away from key destinations makes each map feel like a fresh puzzle.

