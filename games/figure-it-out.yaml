description: |
  Figure It Out is a 1998 party game based on the Nickelodeon TV game show of the same name. One player acts as the contestant with a secret (a funny talent or hidden fact), while a panel of other players must guess the secret by asking yes-or-no questions in the style of Twenty Questions. The game incorporates timed rounds, charades elements, and the show's signature "Secret Slime Action" interactive feature. Designed for families and children, it emphasizes improvisational fun and group interaction over traditional board game mechanics like movement or resource management.

