description: |
  Monty Plays Scrabble is a 1982/1983 computer program by Ritam Corporation that allows up to four players to play the official Scrabble board game against a computer opponent named Monty. Officially licensed by Selchow and Righter (Scrabble's trademark holder), the program runs on TRS-80 and various home computers and requires a physical Scrabble board to be kept synchronized with the on-screen display. The game features four skill levels including Novice, Intermediate, Advanced, and Scholar, with Monty's thinking time increasing significantly at higher difficulties. It was later licensed to Leisure Genius for computer versions and is notable as one of the earliest commercially available computer Scrabble opponents.

