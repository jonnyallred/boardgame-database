description: |
  Quixo is a sliding abstract strategy game designed by Thierry Chapeau and published by Gigamic in 1995, winner of the 1995 Mensa Select award. Players draw a cube from the outer ring of a 5×5 grid and push it back into the grid from another side, revealing their symbol (X or O) on the front face. The goal is to create a line of five cubes bearing your symbol — horizontally, vertically, or diagonally — but every push shifts the entire row, making each move both a strategic placement and a potential disruption of existing patterns. Beautifully made from solid wood, Quixo is a classic of the Gigamic abstract games lineup.

