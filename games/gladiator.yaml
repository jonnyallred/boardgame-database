description: |
  Gladiator is a detailed wargame of man-to-man combat in the Roman arena, designed by Michael E. Matheny and first published by Battleline in 1979, then republished by Avalon Hill in 1981. Each player builds a gladiator by distributing points across training, strength, agility, constitution, and armor, then pits those fighters against opponents on a hex grid. The basic game features the secutor armed with gladius and shield; the advanced game introduces the retiarius with net and trident; a campaign mode allows players to manage stables of gladiators as wealthy Roman patrons. Not designed for beginners, the game rewards detailed tactical thinking and careful resource allocation.

