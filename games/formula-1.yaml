description: |
  Formula 1 is a motor racing board game designed by John Howarth and Trevor Jones and published by Waddingtons in 1962. Unlike typical racing games of the era, players choose their own speed each turn rather than rolling dice for movement — dice are reserved only for applying penalties. Each player's current speed is tracked on a personal cardboard dashboard with a speedometer, lap indicator, and wear gauge. The unusual mechanic of self-determined speed creates genuine tactical decisions about risk and wear management. An original copy of the game is held in the Victoria and Albert Museum in London, and the game was released in international editions throughout the following two decades.

