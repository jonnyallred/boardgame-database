description: |
  Renfield is a social gambling trick-taking game published by Cheapass Games in 1999, themed around the bug-eating servant of Dracula from Bram Stoker's novel. Players use a 54-card deck divided into three suits (Stones, Tools, and Parts) numbered 0-17 to compete in a hybrid of poker-style betting and trick-taking mechanics. Players start with poker-chip dollars, place bets into a central pot, and compete across hands of escalating stakes, blending the bluffing of poker with the tactical play of trick-taking games in a distinctly macabre wrapper.

