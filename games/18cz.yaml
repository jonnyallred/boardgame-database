# Description
description: |
  An 18XX railroad game set in the Czech Republic (Czechoslovakia), designed by
  Leonhard "Lonny" Orgler. Players build rail networks across the Czech map, invest
  in companies, and manage stock operations to maximize their personal wealth. The
  game features an innovative stock board system and a mix of minor and major
  companies. First self-published, then produced by Fox in the Box, 18CZ is praised
  for its well-crafted map and accessible entry point into the 18XX series relative
  to some heavier titles.

