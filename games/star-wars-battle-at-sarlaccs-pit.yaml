description: |
  Star Wars: Battle at Sarlacc's Pit is a 1983 Parker Brothers action game based on the Return of the Jedi rescue sequence aboard Jabba's Sail Barge. Players collect Jedi Points by defeating Gamorrean Guards, Nikto, and Boba Fett by pushing them overboard into the Sarlacc pit, then attempt to overpower Jabba the Hutt. The game features a 3D pop-up Sarlacc pit and 16 lightweight plastic miniature figures. The player with the most Jedi Points at game's end wins.

