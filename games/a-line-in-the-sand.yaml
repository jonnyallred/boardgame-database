# Description
description: |
  A Line in the Sand is a geopolitical wargame simulation of conflict in the
  Middle East, designed by Paul Lidberg and Douglas Niles and published by TSR
  in 1991. The game was released during the First Gulf War, giving it immediate
  topical relevance.

  Players take on the roles of major powers competing for influence and control
  in the Persian Gulf region. The area control mechanics simulate the political
  and military dynamics of the conflict, with players deploying forces, managing
  alliances, and competing for key strategic objectives. The game captures the
  Risk-style abstraction of geopolitical conflict in an accessible format.

