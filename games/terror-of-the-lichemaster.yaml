description: |
  Terror of the Lichemaster is a Warhammer Fantasy Battle supplement and
  mini-campaign designed by Rick Priestley and Dave Andrews, published by Games
  Workshop in 1986. The box contains three linked scenarios introducing the
  lich Heinrich Kemler as a villain, along with 16 cardstock buildings and
  cardboard character cutouts for the non-player forces (which can be replaced
  by metal Games Workshop miniatures). The campaign bridges the RPG and wargame
  aspects of early Warhammer, reflecting Games Workshop's original vision of
  Warhammer Fantasy as part wargame and part roleplaying game, scaled for just
  a handful of models per side.

