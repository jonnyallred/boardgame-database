description: |
  The Lords of Underearth is a 1981 microgame (MicroGame #18) published by Metagaming Concepts and designed by Keith Gross. Two players command forces of orcs, dwarves, humans, and monsters battling in a subterranean labyrinth in a fast-playing fantasy tactical combat game. The rules cover solitaire play, surprise attacks, pursuit, morale, locked doors, flight, treasure, and mercenaries—packing considerable depth into the microgame format. It also has a companion game called Dragons of Underearth, and the compact design made it accessible as an entry point to wargaming for fantasy fans.

