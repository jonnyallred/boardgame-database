description: |
  Kasserine Pass (also subtitled Baptism of Fire, February 1943) is an SPI wargame simulating the Battle of Kasserine Pass in Tunisia, one of the first major engagements between American and Axis forces in World War II. Part of the Four Battles in North Africa quadrigame series and also available as a standalone folio game, it depicts fast-moving mountain warfare where narrow tracks channel units through difficult terrain, artillery plays a pivotal role, and both sides have viable paths to victory. A compact and accessible hex-and-counter wargame that gives both the American defender and Axis attacker an equal chance.

