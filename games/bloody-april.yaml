description: |
  Bloody April: The Battle of Shiloh, 1862 is a two-player monster tactical wargame
  designed by Richard Berg and published by SPI in 1979, with cover art adapted from
  an 1862 engraving and graphic design by Redmond A. Simonsen. Using a revision of
  the Terrible Swift Sword game system, the game features over 1,000 counters simulating
  the Union forces under Grant versus the Confederates under Johnston. The game
  immediately reached #1 on SPI's Top Ten bestseller list upon release and remained
  there for eight months. A revised GMT Games edition appeared in 2022 as part of the
  Great Battles of the American Civil War series.

