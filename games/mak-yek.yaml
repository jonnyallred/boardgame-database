description: |
  Mak-yek is a traditional two-player abstract strategy game played in Thailand and Myanmar, first described in Western literature by Captain James Low in 1839. Played on an 8x8 board with 16 pieces per player, all pieces move like chess rooks — along rows and columns — and capture through unique dual mechanics: custodian capture (surrounding a piece on both sides) and intervention capture (moving between two adjacent enemy pieces to take both). The game's combination of rook movement and double-capture creates distinctive tactical puzzles quite unlike chess, and it influenced closely related regional variants in Malaysia and Cambodia.

