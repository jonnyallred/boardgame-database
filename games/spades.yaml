description: |
  Spades is a classic American trick-taking card game played with a standard 52-card deck, typically by four players in two partnerships. Players bid on the number of tricks they expect to win, with the spade suit always serving as trump. The partnership must collectively reach their combined bid to score points, with overtricks accumulating as bags that penalize at ten. First devised in the United States in the late 1930s, Spades blends careful bidding strategy with deduction and partnership communication, and has remained one of the most popular card games in the world.

