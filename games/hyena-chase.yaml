description: |
  Hyena chase is a traditional North African spiral race game originating in Sudan, where it is called l'ib el merafib (game of the hyena). Players race their "mother" pieces along a spiral track from the village to the well and back, rolling dice to determine movement and needing a six to enter from the starting village. Once a player's mother washes at the well they need another six to begin the return journey, and whoever returns first is awarded the role of the hyena for additional entertainment. The game was recorded by R. Davies in 1925 and has since been widely studied as an example of African traditional game design.

