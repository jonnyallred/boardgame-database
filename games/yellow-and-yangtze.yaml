description: |
  Yellow & Yangtze is Reiner Knizia's 2018 spiritual sibling to Tigris & Euphrates, set in Ancient China during the Warring States period. Players place leader and civilization tiles on a hex grid map, building kingdoms along two great rivers and competing for control of five civilization types — farmers, traders, artisans, soldiers, and priests. Like Tigris & Euphrates, conflicts erupt when kingdoms merge, and players score based on their weakest civilization — the constraining Bottleneck scoring system that punishes specialization. The addition of pagodas and revolts creates new tactical wrinkles while the core mechanisms deliver the same uncompromising strategic depth as its acclaimed predecessor.

