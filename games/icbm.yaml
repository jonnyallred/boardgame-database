description: |
  I.C.B.M. is a two-player wargame designed by Neil Zimmerer and published by Mayfair Games in 1981 as one of the publisher's early releases. Players engage in nuclear warfare using intercontinental ballistic missiles and anti-ballistic missile defenses in a tense Cold War simulation. The game reflects the nuclear anxiety of the era and challenges players to manage offensive strike capabilities against defensive countermeasures in a game of strategic deterrence and escalation.

