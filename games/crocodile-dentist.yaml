description: |
  Crocodile Dentist is a children's press-your-luck dexterity game in which players take turns pressing down the plastic teeth inside a large crocodile's open mouth. Most teeth press safely, but one triggers the croc's jaws to snap shut — eliminating the unfortunate player who hit the sore tooth. Created by toy inventor Robert B. Fuhrer and first published by Milton Bradley in 1990, it became one of the best-selling toys of the 1991 Christmas season and has remained a family staple for decades. The game requires no reading or strategic thinking, making it one of the purest tension-and-laughter experiences in tabletop gaming for young children.

