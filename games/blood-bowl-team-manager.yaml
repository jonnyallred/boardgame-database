description: |
  Blood Bowl: Team Manager — The Card Game is a competitive card game designed by Jay
  Little and published by Fantasy Flight Games in 2011, set in the Games Workshop Blood
  Bowl universe. Two to four players manage teams — Chaos, Dwarf, Wood Elf, Human, Orc,
  or Skaven — across five rounds of a brutal season, customizing rosters by drafting
  Star Players, hiring staff, upgrading facilities, and cheating to gain the upper hand.
  The season culminates in the Blood Bowl tournament, where the most resourceful team
  manager wins. Expansions include Sudden Death and Foul Play.

