description: |
  Onslaught is a 1987 strategic board wargame published by TSR, Inc. simulating the Allied campaign in Western Europe from the D-Day landings through the crossing of the Rhine River in World War II. Players control Allied and German forces respectively, with a dice-driven turn order determining who acts each round, creating uncertainty and tension in operational planning. Limited supply points constrain which unit stacks can be activated on a given turn, forcing hard prioritization decisions. The game is notable for its unpredictable activation system, which captures the fog of war and friction of large-scale operations in an approachable format.

