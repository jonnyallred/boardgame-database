description: |
  In the Footsteps of Darwin is a tile-placement game published by Sorry We Are French in 2023, based on Charles Darwin's voyages of natural discovery. Players place tiles representing species and environments, building a tableau of the natural world while collecting sets of creatures that Darwin documented on his expeditions. A winner of the Mensa Select award, the game is designed as an educational yet engaging family experience, celebrating the beauty and diversity of the natural world through approachable set collection mechanics.

