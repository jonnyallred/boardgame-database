description: |
  Euro Miljonairs is a card game in which players compete to earn the most euros over three rounds by collecting flags from twelve European countries. Each player receives fifteen cards depicting various coin and banknote values, and during each round they strategically play money cards to have the highest deposit for each featured country, winning that country's flag. The player with the most flags at the end wins. The game combines set collection with light bluffing and hand management in a compact, family-friendly format.

