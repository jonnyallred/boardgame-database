description: |
  Habitats is a tile-drafting game where each player constructs their own wildlife park
  without cages or fences. Animals need their natural habitats—grassland, bush, rocks, or
  lakes—and scoring requires correctly placing them in their preferred surroundings. Each
  turn a player takes the tile to their left, right, or front, then moves to the vacated
  space and draws a replacement tile. The spatial movement mechanic limits tile access in
  an elegant way, rewarding players who read the board and position themselves well for
  future turns.

