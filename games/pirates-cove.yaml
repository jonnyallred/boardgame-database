description: |
  Pirate's Cove is a swashbuckling adventure game published by Days of Wonder in which 2–5 players compete to become the most famous pirate over the course of 12 months (game rounds). Each turn, players secretly choose which of six islands to visit, then simultaneously reveal their destinations — pirates who land on the same island must fight for supremacy using dice rolled for cannons, with sails and crew affecting combat. Players upgrade their ships' sails, hull, crew, and cannons by visiting specialized islands, accumulate fame and treasure, and occasionally face powerful Legendary Pirates like Blackbeard. The game combines bluffing, ship-building progression, and dice-driven pirate battles into an accessible and entertaining package.

