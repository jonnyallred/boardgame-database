description: |
  Imperial 2030 is a near-future reimagining of Mac Gerdts's Imperial, published by Rio Grande Games in 2009. Six global powers (USA, Europe, Russia, China, India, and Brazil) compete to control neutral territories around the world, activated through the same investor-nation rondel system. Players act as international investors who fund and direct these six nations, earning dividends based on bond holdings rather than territorial allegiance. The modern setting updates the theme while retaining the elegant investment-and-rondel mechanics that made the original Imperial a Euro classic.

