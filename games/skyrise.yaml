description: |
  Skyrise is a 2024 spatial auction game by Adam Wyse, Gavan Brown, and Sébastien Pauchon, published by Roxley Games, set across a modular archipelago of islands where players compete to build the most impressive architectural skyline. Players use a spatial auction system to claim building sites on the islands, earning favor across factions, scoring secret and public objectives, courting mysterious Patrons, and constructing their own unique Wonder. The combination of area-majority scoring, auction mechanics, and variable end-game objectives creates a rich decision space that rewards both tactical bids and long-term strategic vision.

