description: |
  L.L.A.M.A. is a fast card-shedding game by Reiner Knizia nominated for the Spiel des
  Jahres in 2019. Players try to empty their hand of cards numbered 1 to 6 (plus special
  llama cards) by playing matching or next-higher values—but can only do so in ascending
  sequence. When stuck, a player may quit the round to limit their penalty points, or press
  their luck and stay in. The simple rules, push-your-luck tension, and charming llama
  theme make it an instant crowd-pleaser for all ages.

