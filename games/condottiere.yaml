description: |
  Condottiere is a clever card-and-area-control game set in Renaissance Italy, where players compete as mercenary commanders seeking to dominate the Italian city-states. Each round, players bid cards representing soldiers, special units, and events to win control of a contested province — but every player loses the cards they bid, not just the loser, making commitment costly. Special cards — scarecrows, courtesans, bishops, and drums — introduce dramatic reversals that can flip the battle at the last moment. The first player to control four connected provinces wins. Originally published in 1995, its elegant tension between aggression and resource conservation makes it a durable classic of area control card games.

