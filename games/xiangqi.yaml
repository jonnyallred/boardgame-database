description: |
  Xiangqi, or Chinese Chess, is a two-player strategy game that has been played in China for over a thousand years and remains the most popular board game in the country. Played on a 9x10 grid of intersections divided by a central river, each side commands 16 pieces including generals, advisors, elephants, horses, chariots, cannons, and soldiers — each with distinct movement rules. The cannon's unique jump-capture mechanic and the river barrier that restricts certain pieces give Xiangqi a strategic flavour distinct from Western chess. Victory is achieved by checkmating the opponent's general, with stalemate counting as a loss for the stalemated player.

