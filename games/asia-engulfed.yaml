description: |
  Asia Engulfed: The Second World War in Asia, 1941-1945 is a strategic block wargame
  designed by Rick Young and Jesse Evans, published by GMT Games in 2007. Using a block
  system where all land units are hidden from opponents until combat, the game simulates
  the Pacific Theater of World War II from Japan's attack on Pearl Harbor to the final
  Allied victory. The naval rules system adds significant depth alongside the land combat
  mechanics derived from Europe Engulfed, and the Japanese resource limitation system
  realistically portrays the difficulty of supplying overextended forces. Playable in
  6-9 hours once familiar with the rules, it rewards deep strategic planning.

