description: |
  Powerline is a network-building game in which players construct efficient grids of power lines to connect power plants and supply cities with energy. Each round, colored dice are rolled and placed on the central board, and players simultaneously plan worker placement on powerline segments that match the die colors and pip values. Points are scored for completed lines and fully connected cities, with penalties for incomplete networks, creating a tense race to finish before the game ends.

