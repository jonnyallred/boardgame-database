description: |
  Save Doctor Lucky is a prequel to the beloved Cheapass Games title Kill Doctor Lucky, designed by James Ernest, set aboard the RMS Titanic as it sinks into the icy Atlantic. Rather than trying to murder the eccentric Doctor Lucky, players must now save his life — but only when nobody else is watching. The ship has a built-in timer: as cards are drawn from each deck, that portion of the ship sinks and becomes inaccessible, creating urgency and shrinking the playing field. Players sabotage each other's rescue attempts while trying to be the hero who saves the Doctor, delivering the same sharp humor and clever card play as its predecessor in a compact semi-cooperative package.

