description: |
  Mesopotamia is a strategy game by Carcassonne designer Klaus-Jürgen Wrede, published by Phalanx Games and Mayfair Games in 2005. Set in the ancient cradle of civilization, players lead tribes competing to be the first to sacrifice their four offering markers at the central temple. To accomplish this, tribes must harvest resources such as mana from special forests, quarries, and volcanic regions, build villages to improve efficiency, and strategically place tribesmen on the expanding hexagonal tile map. Like Carcassonne, players gradually reveal the landscape by flipping tiles, creating a dynamic and ever-changing board.

