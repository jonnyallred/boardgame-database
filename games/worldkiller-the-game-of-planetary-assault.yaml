description: |
  WorldKiller: The Game of Planetary Assault is a science fiction microgame by SPI published in 1980, originally as a free pull-out in the first issue of Ares science-fiction magazine. The game simulates humans defending the planet Greendream against an alien invasion, with one player controlling the attacking aliens and the other the human defenders. The game's most innovative feature is its 3D combat grid: the board is divided into an 8×12 grid in which each square represents a three-dimensional stack of seven vertical levels, with counter placement on specific marks indicating altitude. The compact design packs unusual spatial tactics into a small package.

