description: |
  Ms. Monopoly is a 2019 Hasbro variant of the classic Monopoly franchise that celebrates women inventors and entrepreneurs. Instead of real estate, players buy inventions credited to women throughout history — such as WiFi, chocolate chip cookies, and Kevlar. Female players start with more money ($1,900 vs. $1,500) and collect a higher salary when passing Go ($240 vs. $200). Buildings are replaced with "headquarters," and gameplay otherwise follows familiar Monopoly mechanics with dice rolling, Chance and Community Chest cards. The game was released to media attention due to its uneven starting conditions intended as social commentary.

