description: |
  Historical Mystery: Bets are Made is part of a series of deduction games based on real historical events, published by Hobby World International. Players investigate a historical mystery by visiting locations, interrogating suspects, and examining crime scenes over a limited number of moves, then answering a series of questions about the case. The series structure, in which each box presents a single self-contained historical case, makes it well-suited for one-off game nights with players who enjoy detective and mystery themes.

