description: |
  NMBR 9 is a 1-4 player simultaneous tile-stacking puzzle game by Peter Wichmann, published by Z-Man Games in 2017. Each turn a card is drawn from a shared deck of numbers 0-9, and every player simultaneously takes that number tile and adds it to their individual display. Tiles may be placed on the ground level for free or stacked on top of other tiles — but a stacked tile must rest completely on two or more tiles below it with no overhang. Tiles score points equal to their face value multiplied by the level they occupy, so higher stacking with big numbers is the path to victory. NMBR 9's elegant scoring system and individual play style make it uniquely tension-free and yet deeply engaging as a spatial puzzle.

