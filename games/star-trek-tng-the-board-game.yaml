description: |
  Star Trek: The Next Generation – Game of the Galaxies is a 1993 Cardinal Industries board game for 2-6 players themed around the TNG cast establishing peace across the galaxy. Players move around the board collecting Peace Treaties from alien nations, with a basic "Lieutenant Level" spinner-driven game for younger players and an advanced "Captain Level" version that adds dice, Dilithium crystal cards, and photon torpedo cards. Characters available include Picard, Riker, Data, La Forge, Worf, Crusher, and others from the series.

