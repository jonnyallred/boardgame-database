description: |
  War in Europe is a grand strategic "monster" wargame from SPI that attempts to simulate the entirety of World War II's European theater from 1939 to 1945. Designed by James F. Dunnigan, Irad B. Hardy, Redmond A. Simonsen, and others, the game spans nine maps covering 38.5 square feet and includes over 4,000 counters representing divisions and corps. Nominally a three-player game (Allied, Axis, Soviet), the massive production system requires monthly allocation of production points, and SPI estimated a full game would require at least 180 hours to complete. A finalist for two Charles S. Roberts Awards in 1977, it remains one of the largest and most ambitious board wargames ever produced.

