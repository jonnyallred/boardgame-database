description: |
  Atlanta is an American Civil War campaign wargame designed by Don Lowry and published
  by Guidon Games in 1973. The game simulates the pivotal Atlanta Campaign of 1864,
  in which Union General Sherman maneuvered against Confederate General Johnston and
  later Hood in a series of engagements across northern Georgia. As one of the early
  operational-level Civil War games, Atlanta offered historical depth and strategic
  decision-making that distinguished it from simpler conflict simulations of the era.

