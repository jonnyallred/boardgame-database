description: |
  Warhammer 40,000: Kill Team is Games Workshop's 2018 skirmish game that distills the full-scale 40K experience into fast-paced small-unit battles played on a compact 22" by 30" board. Players command customized squads of three to fifteen models, activating individual fighters in alternating turns during the shooting and combat phases, creating a more dynamic flow than standard Warhammer 40,000. The Tactics mechanic introduces special abilities costing Command Points, adding another layer of strategic depth. Optional narrative campaign rules allow squads to develop across linked battles, with faction-specific Tactics, name generators, and character quirks deepening the experience.

