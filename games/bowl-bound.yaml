description: |
  Bowl Bound is a college football simulation board game originally marketed in 1973
  by Time Inc. under the Sports Illustrated brand. Players select from 32 historical
  NCAA Division I-A teams from 1960-1970, with statistical grids based on actual team
  strengths balancing nine offensive plays against six defensive formations. Weighted
  probability dice rolls (216 offensive outcomes against 36 defensive outcomes) produced
  statistically informed results. In 1978 Avalon Hill acquired the rights and published
  additional team sets, continuing the game until home computers made it obsolete.

