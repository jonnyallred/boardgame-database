description: |
  Vampyre is a 1980 microgame published by TSR in which up to six players each take on the role of a character from Bram Stoker's Dracula and race across the Transylvanian countryside to locate and destroy three of Count Dracula's hidden coffins. Designed by Philip A. Shreffler with iconic artwork by Erol Otus, the game was packaged in TSR's blister-pack mini-game format alongside other titles of that era. Players navigate the countryside, encounter supernatural creatures, and compete to be the one to end Dracula's curse, blending dice-driven movement with light horror adventure.

