description: |
  Sphinx is an ancient Egypt-themed board game published by Ravensburger. Players navigate a maze-like board by
  rolling three dice, moving their pawns to collect Sphinx color cards and peek at the hidden colors beneath the
  six Sphinx figures in the center. To win, a player must reach the center and present the correct colored Sphinx
  cards in the correct order to claim the treasure. The game combines dice movement with memory and deduction
  elements, offering an accessible introduction to strategy for children.

