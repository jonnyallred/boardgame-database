description: |
  Bermuda Triangle is a 1975 Milton Bradley board game in which players pilot ships
  across a board depicting the legendary Atlantic Ocean zone, trying to reach home
  with their cargo while a magnetic mystery cloud sweeps the seas, swallowing ships
  as it passes. The cloud — controlled by a three-ringed spinner — moves
  semi-randomly and can engulf players' vessels, sending them back to start. The race
  to navigate home safely while avoiding the supernatural cloud captures the popular
  mystery surrounding the real Bermuda Triangle.

