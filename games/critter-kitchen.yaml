description: |
  Critter Kitchen is a simultaneous-action selection game set in Bistro Bay, where 1-5 critter chefs compete to create the best meals during Restaurant Week. Each round, players simultaneously and secretly assign their three chefs to locations across the city to gather ingredients — fast chefs grab one item first, while slower chefs can carry three but arrive after the rush. Collecting the right combinations satisfies contracts and impresses a visiting celebrity food critic, whose rumored preferences drive the planning game within the game. The charming animal-chef artwork by Sandara Tang and clever push-and-pull mechanics of chef deployment make it a standout family game.

