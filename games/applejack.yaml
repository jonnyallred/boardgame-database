description: |
  Applejack is a hex tile-placement game from Uwe Rosenberg in which players draft hexagonal tree tiles from a central carousel market, placing them in their personal meadow to grow seven varieties of apples and attract bees. Matching apple blossom edges draws bee tiles that generate honey, while skillfully placing beehives adjacent to each other scores bonus tokens. Players must balance drafting desirable tiles against the clockwise movement of the market die, making each turn a satisfying spatial puzzle of edge-matching and set optimization.

