description: |
  The Witcher Adventure Game is a 2014 adventure board game designed by Ignacy Trzewiczek, developed by CD Projekt Red and published by Fantasy Flight Games, set in Andrzej Sapkowski's Witcher universe. Two to four players each take the role of an iconic character—Geralt of Rivia, Triss Merigold, Dandelion, or Yarpen Zigrin—competing to gather the most victory points through completing quests and defeating monsters. The game features rich atmospheric storytelling and strong thematic ties to the Witcher video games, though reviewers noted limited player interaction and some repetitiveness. A companion digital version was simultaneously released for PC, iOS, and Android.

