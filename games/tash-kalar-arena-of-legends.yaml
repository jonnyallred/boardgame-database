description: |
  Tash-Kalar: Arena of Legends is a pattern-recognition and area-control game designed by Vlaada Chvátil and published by Czech Games Edition in 2013. Two to four summoners compete in the legendary Tash-Kalar arena, placing common pieces on the board to form geometric patterns depicted on their faction cards, which then allows them to summon powerful beings. Summoned creatures destroy enemy forces, clear the arena, or set up patterns for ultimate legendary creatures. The game offers both a standard quest-based mode and a flare-based deathmatch mode, and all modes support two-player duels or team play, rewarding spatial thinking and forward planning.

