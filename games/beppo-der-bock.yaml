description: |
  Beppo der Bock is a magnetic dexterity children's game published by Huch! and Friends
  in 2007, winner of the Kinderspiel des Jahres (Children's Game of the Year) award.
  Players chase a wooden billy goat figure across the board using a magnetic launcher
  that sends a small steel ball rolling toward Beppo; when the ball hits the goat,
  Beppo kicks other players' pawns backward. Skill, magnet angle, and ball speed all
  affect where Beppo lands, making each kick delightfully unpredictable. The game
  blends dexterity mechanics with movement strategy in an engaging package for young players.

