# Description
description: |
  A Gleam of Bayonets: The Battle of Antietam is a large-scale hex-and-counter
  wargame designed by Richard H. Berg and published by TSR (formerly SPI) in 1983.
  Part of the Great Battles of the American Civil War (GBACW) series, it simulates
  the bloodiest single day in American military history — the Battle of Antietam
  on September 17, 1862.

  The game contains over 1,000 counters representing Union and Confederate
  brigades, artillery batteries, and cavalry units. Players recreate the intense
  fighting along Antietam Creek, including the cornfield, Burnside Bridge, and
  Bloody Lane. With its massive counter density and detailed rules, this is a
  "monster" wargame suited for dedicated grognards.

