description: |
  Commands & Colors: Ancients is a block wargame covering tactical battles from 3000 BC to 400 AD, with a particular focus on the Carthaginian-Roman rivalry. Players command armies using a hand of command cards that dictate which sections of the battlefield they can activate — left flank, center, right flank — then roll custom dice to resolve combat. Wooden blocks with stickers represent units whose strength degrades as they take losses. The system, adapted from Richard Borg's Commands & Colors framework (Battle Cry, Memoir '44), captures the historical feel of ancient warfare without overwhelming complexity, and won the 2006 Origins Award for Historical Board Game of the Year.

