description: |
  Platoon is a 1986 board game licensed from Oliver Stone's Academy Award-winning Vietnam War film of the same name. Published by Milton Bradley, it places two players in the jungles of Vietnam, recreating the brutal asymmetric conflict between American forces and the Viet Cong. The game uses simplified wargame mechanics with dice resolution to capture the chaos and danger of jungle warfare. As a tie-in product to the celebrated film, it represents a snapshot of the late 1980s licensed game market and offers a basic but thematic introduction to the conflict.

