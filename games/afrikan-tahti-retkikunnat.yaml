description: |
  Afrikan tähti: Retkikunnat is an expansion to Afrikan tähti, Finland's most beloved board game, that functions almost as a standalone new game using the original's components. Players now begin by forming expeditions — gathering resources and allies — before hunting for the legendary diamond, and it is now possible to steal the treasure from another player after they find it. Each player takes on a unique character with special powers, and expedition cards plus event cards add new strategic and narrative layers to the classic race across Africa. Published in 2014, Retkikunnat modernizes the formula while preserving the spirit of the original.

