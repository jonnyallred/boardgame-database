description: |
  Lensman is a science fiction wargame published by Avalon Hill based on E.E. "Doc" Smith's classic Lensman science fiction novel series, one of the founding works of space opera. Players command the Galactic Patrol (Civilizations) against the evil Boskone in a sweeping interstellar conflict across the galaxy, with fleets of ships, planet-based defenses, and the superweapons that characterize Smith's grand cosmic battles. The game adapts the epic scale of the novels into a strategic simulation, capturing the Lensman universe's sense of massive conflict between cosmic forces of good and evil. As one of the early licensed science fiction board games, it helped establish the template for space opera strategy games.

