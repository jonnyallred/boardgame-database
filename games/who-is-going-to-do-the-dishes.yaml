description: |
  Who Is Going to Do the Dishes? is a light family card and dice game in which players try to avoid being the one stuck doing household chores. Players take turns playing cards and rolling dice to pass tasks onto opponents, with the goal of having the fewest chore cards at the end of the round. The game's humorous theme and simple rules make it appealing for family game nights with younger children.

