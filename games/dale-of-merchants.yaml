description: |
  Dale of Merchants is a competitive deck-building game for 2–4 players from Finnish publisher Snowdale Design, in which animal folk merchants race to join the prestigious Guild of Extraordinary Traders by being the first to build eight market stalls. Players improve their starting decks by acquiring new animal species cards—each with unique abilities—but the key twist is that winning requires sacrificing cards out of your deck to construct stalls, creating a tension between building up and spending down. Every card serves multiple purposes (buying, activating abilities, or building stalls), demanding tough choices and quick adaptation throughout the brisk 20–30-minute play time.

