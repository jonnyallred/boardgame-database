description: |
  London Cabbie is a family board game published by Waddingtons in which players take on the role of London taxi drivers, picking up and dropping off passengers around a simplified map of London's landmarks and streets. Players race to complete fares by moving their taxi between pickup and dropoff locations, accumulating the most money in fares to win. The London street map setting and taxi driver theme were novel for its time, and the game offered a gentle introduction to route planning and resource management for families. A light, nostalgic British game from the golden era of Waddingtons family games.

