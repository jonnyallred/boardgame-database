description: |
  Wien Catan is a limited promotional edition of The Settlers of Catan created for the 20th Austrian Gamefest in 2004, with only 10,000 copies produced. The game replaces the standard Catan island with a hexagonal map of Vienna and its surroundings, featuring famous landmarks such as the Ferris Wheel (Riesenrad) and St. Stephen's Cathedral as notable locations. The core Catan rules remain unchanged — players gather resources, build roads and settlements, and trade — but the Vienna map provides a unique regional flavor that makes it a prized collector's item for Catan enthusiasts.

