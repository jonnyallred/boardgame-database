description: |
  Bendomino is a domino variant designed by Thierry Denoual and published by Blue Orange
  Games in 2007, featuring 28 curved double-6 dominoes bent at a 120-degree angle.
  Like standard dominoes, players match numbers at the ends of the chain, but the curved
  pieces add a spatial puzzle: each new tile must fit physically without overlapping others.
  This simple twist creates surprising strategic depth as the chain's shape constrains
  future placements. The game was first released as Rondomino under Gigamic before Blue
  Orange published the renamed Bendomino edition.

