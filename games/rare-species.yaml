description: |
  Rare Species is a conservation-themed memory and collecting game endorsed by UK botanist and conservationist David Bellamy. Players collect rare species cards representing endangered plants and animals, trying to complete conservation park boards with matching sets. The game blends simple educational content about biodiversity with accessible gameplay mechanics suitable for families, serving as an early example of games designed to raise awareness of environmental issues.

