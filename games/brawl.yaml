description: |
  Brawl is a real-time card game designed by James Ernest and published by Cheapass Games
  in 1999, nominated for two Origins Awards including Best Traditional Card Game. Each
  player uses a 35-card character deck — one of twelve available fighters — and plays
  in real time with no turns: players make moves or stay idle as they choose, typically
  finishing in under a minute. Players race to play Hit cards onto Base cards while
  Freeze cards lock contested bases. Despite game-lengths of seconds to minutes, Brawl
  has a surprisingly high strategic skill ceiling.

