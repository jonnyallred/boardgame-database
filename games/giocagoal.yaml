description: |
  GiocaGoal is an Italian tabletop football game manufactured by Atlantic, the Italian company well known in the early 1970s for its 1:72 and 1:32 scale plastic soldier sets. Simpler and cheaper than Subbuteo, GiocaGoal was sold in half-pitch boxes containing a team, coach, bench figures, referee, and goal, with team colors representing clubs of the Italian Serie A. Players flicked the figures to control the ball, in the style of subbuteo-type dexterity football games. Its affordability and tie-in to real Italian football teams made it a popular piece of Italian game culture.

