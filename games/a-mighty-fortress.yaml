# Description
description: |
  A grand strategic wargame published by SPI in 1977 covering the Reformation era
  conflicts in 16th century Europe. Players command one of several European powers
  including the Holy Roman Empire, France, the Protestant princes, and other states,
  competing for religious, political, and military dominance. The game covers the
  period roughly from 1517 (Luther's theses) through the major wars of religion.
  Uses SPI's characteristic hex-and-counter system with area movement and diplomatic
  mechanisms reflecting the era's complex web of alliances and religious allegiances.

