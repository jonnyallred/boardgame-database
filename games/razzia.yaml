description: |
  Razzia! is a competitive bidding and bluffing game designed by Stefan Dorra and published by Ravensburger in 1992, nominated for the Spiel des Jahres that year. Players bid on contraband goods in a gangster-themed setting, using cash and tactics to outbid rivals while managing their resources across multiple rounds. A later version of Razzia! was also released as a rethemed adaptation of Reiner Knizia's Ra, sharing similar auction mechanics in a faster-playing format.

