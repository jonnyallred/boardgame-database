description: |
  Nightfall is a competitive deck-building card game designed by David Gregg and published by Alderac Entertainment Group (AEG) in 2011. Players marshall vampires, werewolves, and ghouls in a dark urban setting, aiming to fill opponents' decks with wound cards — the player with the fewest wounds when the deck runs out wins. Nightfall introduces a unique chaining system where cards can be sequentially linked if their colors match, triggering powerful combos within a single turn. A pre-game draft determines which card types are available each session, ensuring variety and strategic depth across plays.

