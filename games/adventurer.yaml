description: |
  Adventurer is a 1980 Yaquinto Publications "Album Games" title — a compact sci-fi brawling game sharing its core mechanics with the company's acclaimed Swashbuckler. Set in a futuristic cantina and spaceship interior, players maneuver combatants armed with exotic weapons and engage in chaotic hand-to-hand and ranged combat, complete with rules for overturning tables, hurling chairs, and throwing liquid containers. The game is notable for its fast, visceral action and the absurdist atmosphere that results from applying over-the-top saloon-brawl mechanics to a far-future science fiction setting.

