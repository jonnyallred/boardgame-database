description: |
  Trap is a two-player abstract strategy game published by Ideal in 1972, derived from an ancient oriental game concept. Each player controls three pieces on a hexagonal board and a supply of wall segments; on each turn a player may move their pieces, place walls, or combine both. The objective is to immobilize all three of your opponent's pieces by surrounding them with walls, creating a tight positional puzzle with high interactivity.

