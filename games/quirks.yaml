description: |
  Quirks is a lighthearted evolution card game published by Eon Products in 1980 in which players assemble bizarre plants, herbivores, and carnivores from interchangeable card segments, each granting special traits (quirks) that affect survival. Players adapt their creations to meet changing climate challenges and survive encounters with rivals' strange organisms. Featured in Games Magazine's Top 100 Games of 1981, Quirks blends creative set collection with humorous creature design in a game that remains charming decades later.

