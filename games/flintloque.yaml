description: |
  Flintloque is a Napoleonic fantasy skirmish miniatures wargame set in the World of Valon, where fantasy races battle with muskets, pistols, and cannons in a satirical reimagining of the Napoleonic Wars. "British" Orcs face off against "French" Elves, with Dwarves, Ogres, Zombies, and other races representing the major European powers. First published in 1995 by Alternative Armies, the game is scenario-based and character-driven, emphasizing playability and humor over historical minutiae. The 3rd Edition expanded the rules significantly and added four dedicated supplement books, making it one of the most beloved quirky miniatures games in the hobby.

