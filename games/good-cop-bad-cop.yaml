description: |
  Good Cop Bad Cop is a hidden-identity deduction game set in a corrupted police district
  where players are either honest cops or crooked criminals. Each player's identity is
  hidden behind face-down equipment cards, which can be investigated or flipped by various
  actions. The honest team must identify and eliminate the Kingpin; the corrupt team must
  eliminate the Agent. Quick investigations, dramatic reveals, and the constant uncertainty
  about who to trust create a compact and replayable social deduction experience.

