description: |
  Devil Bunny Needs a Ham is a classic Cheapass Games title from 1998 (game #018 in their catalog) in which players control sous-chefs climbing up the side of a building while the villainous Devil Bunny tries to knock them off — in the mistaken belief that doing so will somehow get him a ham. Players roll two dice each turn to move their sous-chefs up the building grid horizontally or diagonally, while Devil Bunny terrorizes everyone. The game is beloved for its absurdist humor, minimal components, and quick play time, and was later brought back by Greater Than Games in a Kickstarter revival of both Devil Bunny titles.

