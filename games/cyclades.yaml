description: |
  Cyclades is a competitive area control and auction game set in ancient Greece, designed by Bruno Cathala and Ludovic Maublanc with stunning art by Miguel Coimbra. Players race to be the first to construct two metropolises across the Greek island archipelago by bidding for the favor of five Olympian gods — Ares, Poseidon, Zeus, Apollo, and Athena — each of whom grants a different set of actions. Only one player may invoke each god per round, creating fierce competition at the bidding table. The combination of volatile auctions, military conflict, and mythological abilities makes Cyclades a fast-playing but deeply interactive experience.

