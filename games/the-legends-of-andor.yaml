description: |
  The Legends of Andor is a cooperative adventure board game by Michael Menzel in which two to four
  heroes — dwarf, archer, wizard, or warrior — must defend the realm of Andor from invading monsters
  while completing linked narrative scenarios. The game is notable for its innovative rule-reveal
  system: players begin with minimal instructions and uncover new rules only as the story progresses,
  providing an immersive learning experience. As heroes take actions, a legend track advances and
  enemies march toward the castle; players must balance exploring and leveling up against the
  looming threat. Five scenarios tell an overarching story across interconnected Legends. Winner of
  the 2013 Kennerspiel des Jahres.

