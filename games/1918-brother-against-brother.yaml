description: |
  1918: Brother Against Brother is a two-player card-driven wargame simulating the Finnish Civil War of 1918. One player commands the White government forces while the other leads the Red socialist revolutionaries, each striving for control of strategic towns across a point-to-point map of Finland. Over 50 unique action cards — each featuring period photography — can be played for action points or as historical events including German intervention, Swedish occupation of the Åland Islands, and grain deliveries from Soviet Russia. The White player wins by capturing key Red-held towns; the Red player wins by holding territory or threatening the White capital of Vaasa.

