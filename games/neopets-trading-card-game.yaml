description: |
  The Neopets Trading Card Game is a collectible card game published by Wizards of the Coast in 2003, based on the popular online virtual pet website Neopets. Players compete across four arenas — Strength, Agility, Intelligence, and Magic — using Neopet creatures, Items, Equipment, and Location cards to bank 21 points worth of cards and win. Each player uses a deck of at least 40 cards and 10 Basic Neopets, with the game designed for a slightly younger audience than Wizards' flagship Magic: The Gathering. The game was discontinued in 2006, and original print run cards have since become collectibles.

