description: |
  Push a Monster is a children's dexterity game designed by Wolfgang Dirscherl and Manfred Reindl, published by Queen Games. Players take turns carefully pushing colorful monster figures onto a shared platform, trying not to knock off any of the monsters already balanced there. The game combines gentle physical skill with suspense as the platform becomes increasingly crowded, making for a lively and tactile experience for young children. Push a Monster was nominated for the 2015 Kinderspiel des Jahres award.

