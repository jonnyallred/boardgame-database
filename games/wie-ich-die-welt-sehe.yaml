description: |
  Wie ich die Welt sehe... ("The World As I See It") is a German party card game in which the active player reads the beginning of a sentence and all other players must complete it the way they think the reader would finish it. The reader also writes down the actual intended ending, and then all completions are shuffled and read aloud; players vote on which they believe is the genuine one. Points go to convincing bluffers and to those who correctly identify the real answer, rewarding both creativity and knowledge of your fellow players.

