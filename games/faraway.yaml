description: |
  Faraway is a card game for 2-6 players published by Pandasaurus Games in 2023, designed by Johannes Goupy and Corentin Lebrat. Players simultaneously select cards to build a row of eight region cards, with the game's signature twist being that scoring is calculated in reverse order from how cards were played — meaning early decisions only pay off based on conditions met later. A priority system governs card selection from a face-up river, creating meaningful tension around timing and hand management in a deceptively simple fantasy exploration framework.

