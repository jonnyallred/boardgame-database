description: |
  One False Step for Mankind is a resource-management game by James Ernest for 3-6 players set during the California Gold Rush of 1849, in which players are wealthy town mayors mining gold, farming, building cities, and — most importantly — constructing rockets to be the first to fly to the Moon. The title is a sardonic play on Neil Armstrong's famous quote ("one false step for mankind, one giant leap for you"), and the game's satirical blend of frontier economics with space-age ambition gives it a distinctive comedic tone. Players accumulate influence points through a variety of economic activities, with the first to 30 influence points becoming California's governor and winning the game. Published by Cheapass Games in 2003, it is one of their more complex and longer-playing designs.

