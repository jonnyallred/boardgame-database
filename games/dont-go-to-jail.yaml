description: |
  Don't Go to Jail is a 1991 Parker Brothers dice game inspired by Monopoly, designed as a faster alternative using ten custom dice instead of a board. Seven dice feature Monopoly property colors, utilities, and railroads, while two wild dice can substitute for any property. Players roll to score matching sets—monopolies and other combinations—and must decide when to stop rolling to bank their score before rolling the dreaded Jail die. The game was later republished as Monopoly Express and Monopoly Diced! with minor rule changes.

