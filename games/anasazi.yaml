description: |
  Anasazi is a 2006 tile-placement game by Klaus-Jürgen Wrede (designer of Carcassonne), published
  by Phalanx Games and Mayfair Games, themed around the ancient Pueblo peoples of the American
  Southwest. Players lay tiles to build connected settlements and claim resources in the spirit
  of the Anasazi culture.

  The game emphasizes spatial reasoning and set collection as players compete to build the most
  valuable pueblo configurations. Wrede's hallmark tile-fitting puzzle sensibility is present,
  adapted to a more competitive multi-player format than Carcassonne. It is a compact, accessible
  Euro that appeals to fans of tile-laying games with historical themes.

