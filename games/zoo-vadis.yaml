description: |
  Zoo Vadis is Reiner Knizia's evolution of his classic negotiation game Quo Vadis?, themed around
  zoo animals competing for placement in the prestigious Star Exhibit. Players negotiate constantly,
  trading favors and votes to advance their animals through a series of enclosures — but only
  animals that reach the Star Exhibit score. The 2022 redesign added asymmetric animal powers,
  neutral peacock figures to bribe for additional support, and a second board for six to seven
  players, deepening the wheeling-and-dealing experience.

