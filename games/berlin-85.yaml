description: |
  Berlin '85: The Enemy at the Gates is a battalion-level board wargame designed by
  Jim Dunnigan and published by SPI in 1980, originally as a pull-out game in Strategy
  and Tactics magazine #79. The game hypothesizes a Warsaw Pact assault on West Berlin
  during the Cold War era, featuring detailed urban combat rules, supply requirements,
  and an "honors of war" table simulating the defenders' foreknowledge that they will
  ultimately be overwhelmed. The game was a finalist for the 1981 Charles S. Roberts
  Award for Best Twentieth-Century Game.

