description: |
  Fujian Trader is a victory-point gateway game published by Thinking Past, themed around Ming-era merchant families trading along routes depicted in the rediscovered 17th-century Selden Map of the East China Sea. Players follow historical trading lanes, bartering iron, silk, and rice for silver and influence, with options to raid rivals' goods as well as trade peacefully. The game was designed by Robert Batchelor and Sari Gilbert to bring the history of Chinese maritime trade to life through its mechanics and artwork.

