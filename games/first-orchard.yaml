description: |
  First Orchard is HABA's iconic cooperative toddler game from their "My Very First Games" series, designed for children aged 2 and up. Players work together as a team to harvest all the fruit from the trees before the raven reaches the orchard: on each turn, a player rolls the color die and picks up the matching wooden fruit, unless the raven symbol is rolled — in which case the raven moves one step closer. If all fruit is picked before the raven arrives, everyone wins. Made in Germany with oversized wooden pieces sized for small hands, First Orchard has been introducing millions of children to cooperative play for decades.

