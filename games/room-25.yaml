description: |
  Room 25 is a cooperative (or hidden traitor) game for 1-6 players set in a deadly futuristic reality TV show, inspired by films like The Cube. Players are trapped in a 5×5 grid of rooms with unknown deadly effects, working together to find the escape room — Room 25 — while a timer counts down. Each turn, players secretly program their actions before revealing them simultaneously, requiring coordination and trust. The optional traitor mode adds paranoia: one or more players secretly work against the group, making every discussion and vote fraught with suspicion.
