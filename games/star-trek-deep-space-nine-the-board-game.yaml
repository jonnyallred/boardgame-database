description: |
  Star Trek: Deep Space Nine: The Board Game is a 1998 strategy game set in the world of the Deep Space Nine TV series. Players control one of four factions — the DS9 Federation, the Maquis, Cardassians, or the Dominion — competing for dominance through military, economic, or mission-based means. The modular, tile-based board changes with each game, and victory can be achieved through multiple paths. Published primarily in the UK, the game was released shortly before its publisher ceased operations.

