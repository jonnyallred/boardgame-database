description: |
  Full Metal Planète is a light sci-fi strategy game in which players control mining companies racing to extract ore from a dangerous planet before it becomes uninhabitable. Each player commands tanks, barges, crabs, and a freighter, spending action points to collect ore, capture enemy equipment, and evacuate resources before the planet collapses. The game is notable for its dice-free, timed action system that rewards tactical thinking under pressure. Now a rare collector's item following the bankruptcy of publisher Ludodélire, it is widely regarded as a hidden gem of 1980s board game design.

