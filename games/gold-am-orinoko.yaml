description: |
  Gold am Orinoko (Gold on the Orinoco) is a family adventure board game published by Ravensburger in 1992, set along the Orinoco River in South America as players search for hidden gold. The game involves dice rolling and movement across a jungle-themed board, with players collecting gold pieces while navigating obstacles and competing with rivals. Its accessible rules, treasure-hunting theme, and cheerful components make it a typical family game of its era—fun, quick, and suitable for younger players. Specific designer information for this title is not widely documented.

