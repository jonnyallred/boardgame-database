description: |
  Valkenburg Castle is a 1980 wargame designed by Stephen V. Cole and published by Task Force Games. The game simulates castle siege warfare using the fictional Valkenburg Castle as its setting, pitting an attacker against a defender in a small-scale tactical conflict. Cole was also the designer behind Star Fleet Battles, and Valkenburg Castle shares the micro-wargame format that Task Force Games popularised in that era. The game features cover art by Alvin Bellflower with interior art by R. Vance Buck and Allen Eldrige.

