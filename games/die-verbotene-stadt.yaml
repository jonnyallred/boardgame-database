description: |
  Die Verbotene Stadt (The Forbidden City) is a 1992 bluffing and deduction game designed by Alex Randolph and published by Ravensburger, set against the backdrop of imperial China's Forbidden City. Players navigate a grid board using hidden movement, trying to achieve objectives while deceiving their opponents about their intended paths and actions. Co-designed with Johann Rüttinger and illustrated by Ulrich Lichthardt, the game blends the spatial puzzle of grid movement with the psychological tension of bluffing, typical of Randolph's elegant, idea-focused designs.

