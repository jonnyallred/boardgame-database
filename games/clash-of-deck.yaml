description: |
  Clash of Deck is a free-to-play living card game published by French publisher Grammes Édition in 2020, designed by Léandre Proust. Players summon creatures on two bridge lanes to attack the opponent's watchtower and then castle, with hand size doubling as mana — a clever twist where managing which cards return to hand after defeat is as important as playing them. Originally released on DIY punch-card sheets with monthly standalone expansions, the game grew rapidly, with its rules translated into 34 languages and a digital version available on Board Game Arena.

