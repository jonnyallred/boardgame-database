description: |
  The Really Nasty Horse Racing Game is a 1987 British horse racing game for 2-6 players in which each player owns horses competing across six races, placing bets and sabotaging rivals with dirty trick cards. Each round players race their graded horses (1 through 6, best to worst) around a track using dice, with event cards enabling spectacular acts of horse-racing villainy: turning horses the wrong way, causing falls, forcing restarts, or triggering last-minute objections and photo finishes. Players earn money through finishing positions and successful bets, with the richest player after six races winning. Its unapologetically chaotic British humor has kept it in print for decades.

