description: |
  Kharbaga is a traditional two-player abstract strategy game from North Africa, particularly popular in Tunisia and Algeria, belonging to the Zamma family of draughts variants. The game is played on a 4×4 grid with diagonal lines, where each player controls 20 pieces that move forward until promoted to "Mullah" (equivalent to a King in checkers). Pieces capture by jumping, and the player who captures all of their opponent's pieces wins. Kharbaga can be improvised on any surface with pebbles or other tokens, contributing to its enduring popularity across generations.

