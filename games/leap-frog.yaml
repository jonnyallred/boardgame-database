description: |
  Leap Frog is a traditional abstract puzzle or game in which pieces (frogs or tokens) leapfrog over each other on a linear track, with the object typically being to reverse the starting positions of two groups of pieces in the fewest moves. In its puzzle form, it is a classic combinatorics puzzle used in mathematics education. As a two-player game, both players control frogs of their color on opposite ends of a shared track and must move their frogs past the opponent's frogs by stepping forward or jumping over adjacent pieces. The game is simple enough for children while containing interesting mathematical structure.

