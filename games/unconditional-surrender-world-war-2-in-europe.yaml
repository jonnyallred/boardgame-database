description: |
  Unconditional Surrender! World War 2 in Europe is a strategic-level wargame covering the entire European Theater of World War II, designed by Salvatore Vasta and published by GMT Games in 2014. Players control the Axis, Western Allies, and Soviet factions across 16 scenarios ranging from individual campaigns to the full war. The game features simplified mechanics — one combat table covers all combat types — with low counter density enabling clear strategic decision-making without excessive bookkeeping. Variable politics means most countries' allegiances aren't predetermined, and air and naval power integrate meaningfully into ground operations. Winner of the 2014 GrogHeads Game of the Year.

