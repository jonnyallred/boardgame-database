description: |
  RSVP (R.S.V.P.) is a vertical three-dimensional word game introduced by Selchow and Righter in 1958, marketed as "3-D Scrabble." Two players spell words using 73 four-sided wooden letter cubes inserted into an upright 11×11 grid board — crossword-style in three dimensions rather than flat on a surface. The cube pieces are identical on their opposing faces, showing a letter and its Scrabble-style point value, with no blank tiles included. The dark blue vertical frame held upright by detachable feet creates a distinctive physical presentation that differentiates RSVP from standard flat word games. Multiple editions were published through the 1960s and 1970s.

