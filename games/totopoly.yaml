description: |
  Totopoly is a classic British horse racing board game first published by Waddingtons in 1938, played on a distinctive double-sided board. In the first phase players move their horses around a training loop collecting advantage and disadvantage cards; the second phase is the race itself where players may bet on any horse. Named after winners of the Lincolnshire Handicap from 1926–1937 and originally featuring lead horse pieces, the game has been continuously reprinted for nearly a century and remains a nostalgic family favorite in the UK.

