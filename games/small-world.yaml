description: |
  Small World is a fantasy civilization game published by Days of Wonder in 2009, redesigned from Philippe Keyaerts'
  1999 game Vinci. Players select combinations of fantasy races (Elves, Orcs, Dwarves, etc.) paired with random
  special powers to conquer territories on a tight, crowded map. When a race becomes overextended, players can send
  it into "decline" and pick a fresh race, creating a unique push-pull of expansion and abandonment. The game rewards
  clever race-power synergies and timing, making each session feel distinct.

