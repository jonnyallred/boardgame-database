description: |
  Open Fire: Solitaire Tank Combat in WWII is a 1988 solitaire board wargame published by Victory Games, designed by Gerard Christopher Klug, in which the player commands a platoon of the US 4th Armored Division against a system-controlled German opponent. The game uses a detailed ruleset covering armor-piercing fire, small arms, artillery, turret rotation, gun depression, mines, smoke, and air support, providing a richly realistic tactical simulation of armored combat on the Western Front. As a pure solitaire design, the player both plans the mission and must respond to a card-driven enemy AI, creating genuine tension and unpredictability. Open Fire is considered one of the landmark single-player wargames of its era, praised for the depth it achieves with a solo format.

