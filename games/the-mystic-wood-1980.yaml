description: |
  The Mystic Wood is a 1980 fantasy board game designed by Terence Peter Donnelly and published by Philmar Ltd. (later republished by Avalon Hill in 1983). Players control knights from the age of chivalry who journey through both normal and enchanted woodland on personal quests, encountering various magical events and challenges along the way. The game features a modular board setup creating different forest layouts each session, with players navigating random encounters in a light adventure game style typical of British family games of the era.

