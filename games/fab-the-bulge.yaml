description: |
  FAB: The Bulge (Fast Action Battles #1) is a 2007 wargame designed by Rick Young and published by GMT Games, simulating the Battle of the Bulge from December 16 to 27, 1944. Players command Axis and Allied forces represented by a hybrid system of wooden blocks (for divisions and brigades, with step losses tracked by rotation) and traditional die-cut counters. Randomly drawn event cards provide dynamic decisions each turn — including divisional replacements, air strikes, interdiction teams, and parachute drops — ensuring no two games play identically. The campaign game covers all 12 days of the offensive and plays in 4-5 hours, making it one of the more accessible operational wargames on this pivotal battle.

