description: |
  Empires in Arms is an epic grand strategy wargame designed by Greg Pinder and Harry Rowland, published by the Australian Design Group in 1983 and later licensed to Avalon Hill. Set during the Napoleonic Wars of 1805-1815, the game accommodates up to seven players each controlling a major European power. Monthly turns encompass diplomacy, economic management, and military operations, with battles occurring through simultaneous movement impulses. Empires in Arms won inclusion in Games magazine's Top 100 of 1986 and is legendary in wargaming circles for its historical depth and the extraordinary time commitment it demands — full campaigns can take days or even weeks to complete.

