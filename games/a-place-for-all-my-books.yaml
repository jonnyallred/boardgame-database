# Description
description: |
  A set-collection and arrangement game in which players build and organize their
  personal bookshelves, collecting books of various genres and satisfying arrangement
  objectives. Players draft books and place them on their shelves while competing
  for bonus scoring cards that reward specific arrangements or genre combinations.
  Named Barnes & Noble's 2025 Game of the Year. The game appeals to book lovers
  and those who enjoy light-to-moderate strategy with a charming thematic wrapper.

