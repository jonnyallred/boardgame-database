description: |
  Anno 1503 is a 2003 colonization board game by Klaus Teuber, based on the popular German PC
  game of the same name, published by Mayfair Games and Kosmos. Players send ships from their
  home countries to explore and settle unknown islands scattered across a 5×12 grid ocean,
  racing to grow their colonies faster than opponents.

  Players balance exploration, resource gathering, and settlement development across multiple
  islands simultaneously. The tile-based island exploration creates a modular, ever-changing map
  while resource chains drive colonial growth. Designed by the creator of Catan, the game carries
  a similar spirit of exploration and economic development adapted to the Age of Sail setting.

