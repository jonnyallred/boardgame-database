description: |
  Star Trek Klingon Edition Monopoly is a licensed Monopoly variant published by USAopoly in November 2011,
  themed around the Klingon Empire of the Star Trek Prime Universe. Properties represent Klingon locations and
  factions, houses and hotels are replaced by outposts and capitals, currency is renamed "Forces," and Chance
  and Community Chest become Combat and Honor cards. Six pewter tokens represent Klingon icons including a
  bat'leth, Bird-of-Prey, d'k tahg, and the High Court gavel. A limited edition of 1,701 numbered copies
  featured a miniature replica of Chancellor Gorkon's bone cane.

