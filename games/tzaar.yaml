description: |
  TZAAR is a two-player abstract strategy game by Kris Burm, part of the celebrated GIPF Project series, published in 2007. Played on a hexagonal grid, each player begins with 30 pieces divided into three types — 6 Tzaars, 9 Tzarras, and 15 Totts — forming an interdependent trinity where losing all pieces of one type means defeat. Each turn, players must capture an opponent's piece, then optionally strengthen their position by stacking pieces. The design creates constant dilemmas between weakening the opponent and fortifying one's own forces. TZAAR replaced TAMSK in the official GIPF Project lineup, received a Spiel des Jahres recommendation in 2008, and won Games Magazine Game of the Year 2009.

