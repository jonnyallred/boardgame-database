description: |
  Inkognito is a deduction and hidden movement game designed by Alex Randolph and Leo Colovini, first published by Milton Bradley in 1988, winning a Spiel des Jahres special award for most beautiful game that year. Players navigate Venice as secret agents, each needing to identify their partner while keeping their own identity hidden from opponents. Movement is conducted via disguise tokens, and players interrogate each other using coded questions, gradually narrowing down identities through process of elimination. The beautiful Venice-themed board and mysterious atmosphere make it a memorable experience for fans of social deduction.

