description: |
  Test of Arms is a post-World War II tactical hex wargame published by Game
  Designers' Workshop in 1988. Using the rules system from GDW's Team Yankee
  at a scale of 200 meters per hex (each turn representing 5–8 minutes), the
  game includes six geomorphic map sections, 480 counters, and 29 scenarios
  drawn from real post-WWII conflicts including the Korean War, Arab-Israeli
  Wars, Falklands, and Soviet-Afghan War. Individual vehicles, infantry squads,
  weapons teams, and leaders provide granular tactical decision-making across
  worldwide historical engagements spanning the Cold War era.

