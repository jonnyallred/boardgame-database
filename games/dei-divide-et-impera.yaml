description: |
  D.E.I.: Divide et Impera is a competitive strategy game for 2–4 players set in a world devastated by a new Ice Age, where factions of Scrappers battle across a fully modular three-dimensional board of stacked district levels. Players control asymmetric faction leaders and starting decks, sending workers to gather scrap, buy equipment, and fulfill public missions by satisfying requests from the surviving Purebred elite. Each game plays out over four turns of action and cleanup phases, with the constantly shifting 3D board—assembled differently every session—ensuring no two games feel alike.

