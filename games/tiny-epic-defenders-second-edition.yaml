description: |
  Tiny Epic Defenders (Second Edition) is a cooperative fantasy defense game designed by Scott Almes and published by Gamelyn Games in 2018. Players work together to defend the capital city and surrounding regions of the Epic Realm from waves of ever-escalating enemies, including a powerful boss. Each player takes the role of a unique hero with special abilities, spending action points each round to travel between regions, fight monsters, and shore up defenses. The second edition refines the original's mechanics and adds new heroes, enemies, and cards, delivering a tense cooperative experience in a compact, travel-friendly box.

