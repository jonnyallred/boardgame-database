description: |
  Fossil is a set collection board game designed by Reiner Knizia and published by Goldsieber Spiele in 1997 (with an English edition from Rio Grande Games). Players act as competing paleontologists racing to assemble the most complete sets of fossil specimens. The game board is laid out with randomly placed fossil pieces, and players take turns moving a shared stone to collect fossils — but each move costs prestige points, forcing careful evaluation of whether each fossil piece is worth the trip. The game won Games Magazine's Game of the Year award in 1999, praised for its elegant tension between greed and efficiency.

