description: |
  Quantum Chess is a variant of chess designed by Chris Cantwell that incorporates principles of quantum mechanics into gameplay. Each piece exists in a superposition of multiple squares simultaneously, and observing (interacting with) a piece collapses its quantum state to a specific location. Moves can create entanglement between pieces, allowing for extraordinary positional possibilities that violate classical chess logic. Famous for being demonstrated in a match between Paul Rudd and Stephen Hawking, Quantum Chess is primarily available as a video game/app and as a concept game exploring physics through abstract strategy.

