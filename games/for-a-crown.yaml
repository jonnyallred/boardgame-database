description: |
  For a Crown is a single-deck deck-building game published by Repos Production in 2025. Players recruit mercenaries and other characters, placing cards into a personal sleeve of their own color, then all cards — player cards and shared event cards — are shuffled into a single combined deck and drawn one by one. When a player's card is revealed, they resolve its effect, triggering take-that moments, hidden point scoring, and resource manipulation. After four rounds the player with the most rubies wins. The innovative shared-deck format creates unpredictable, fast-playing sessions of royal deception and ambition.

