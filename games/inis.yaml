description: |
  Inis is a Celtic-themed area control and card drafting game designed by Christian Martinez and published by Matagot in 2016. Players compete to become King of the Island (Inis) through one of three victory conditions: controlling a majority of territories, having clans present in a certain number of territories containing sanctuaries, or having clans in territories ruled by a set number of enemy chieftains. Each round begins with a draft of action cards that determine available maneuvers, and the interaction between drafted cards creates rich decision-making. The game is renowned for its elegant tension between the three different winning paths, which shift with each card draft.

