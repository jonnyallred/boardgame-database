description: |
  Cuboro Tricky Ways is a marble run board game by Swiss toy company Cuboro, released in 2013 as a competitive game built around their famous wooden marble-channel cube system. Players take turns moving and rotating Cuboro wooden blocks — each carved with grooves and tunnels — to extend their marble track to empty exit points, scoring points based on the number of cubes their marble traverses. Made from untreated Swiss beech wood, the game offers two difficulty levels: a simpler surface-track version accessible from age 6, and a full version incorporating tunnel passages that challenges even experienced strategic thinkers.

