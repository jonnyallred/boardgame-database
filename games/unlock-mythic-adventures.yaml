description: |
  Unlock! Mythic Adventures is the eighth volume in the Unlock! cooperative escape-room card game series by Space Cowboys. The box contains three distinct one-hour scenarios: an excursion into the underworld of mythic Greece, a zany adventure with Professor Noside's animal-transformation machine, and a Jules Verne-inspired race around the world against the clock. Players use a deck of illustrated cards and the free companion app to search scenes, combine objects, and input solutions, competing against a countdown timer as a team.

