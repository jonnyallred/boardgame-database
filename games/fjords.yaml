description: |
  Fjords is a two-player abstract strategy game played in two distinct phases. In the first phase, players alternately draw and place hexagonal landscape tiles to build a shared map of Norwegian fjords, placing their villages on certain tiles as the terrain expands. In the second phase, players extend their territory outward from their villages by placing colored tokens, trying to claim as many tiles as possible while blocking their opponent. The player who covers the most land wins, making Fjords a tense and elegant game of planning and positional maneuvering.

