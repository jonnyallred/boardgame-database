description: |
  Fun House is a 1988 Pressman stunt board game in which players race to the finish line by completing physical challenges and dexterity tasks. The game captures the spirit of the popular TV show of the same era, combining trivia with physical stunts to create a chaotic family experience. Its simple race-to-the-end structure and physical challenge elements make it entertaining for younger players at family game nights.

