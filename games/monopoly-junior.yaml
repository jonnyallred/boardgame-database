description: |
  Monopoly Junior is a simplified children's version of Monopoly published by Parker Brothers (now Hasbro) since 1990, designed for players ages 5 to 8. The smaller fairground-themed board features 16 amusements — such as a zoo, pizza restaurant, and arcade — instead of the standard 28 properties, and players must immediately buy any unowned amusement they land on. There are no auctions, houses, or hotels, and play continues until a player goes bankrupt, with the player holding the most cash winning. The game successfully introduces young children to the basic trading and property ownership concepts of Monopoly.

