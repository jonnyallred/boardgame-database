description: |
  Storm Over Arnhem is a 1981 Avalon Hill wargame simulating part of Operation Market Garden — the Allied attempt to seize a Rhine River bridgehead at Arnhem in World War II. Designed by Courtney Allen, the game uses an innovative "Area Impulse" system that deliberately simplifies rules (only nine pages) to keep focus on tactical decision-making rather than rule-lookup. One player commands British forces, the other German. The streamlined system proved so popular that Avalon Hill published several follow-up games using it. The game received a Charles S. Roberts Award and a top-100 ranking from Games magazine in 1982.

