description: |
  Werewords is a social deduction word game designed by Ted Alspach and published by Bézier Games in 2017 in which villagers ask yes-or-no questions to a Mayor to guess a secret magic word before time runs out, while a hidden Werewolf tries to mislead them. A companion smartphone app provides over 10,000 words across adjustable difficulty levels and tracks the timer. The Seer role knows the word but must remain subtle enough not to be identified by the Werewolf, who can still win even after the word is guessed by correctly identifying the Seer. Werewords won the 2017 Golden Geek Best Party Game award and plays in under fifteen minutes.

