description: |
  The Adventurers: The Temple of Chac is a press-your-luck adventure game in which players race
  through a deadly Mayan temple, grabbing treasure while avoiding traps. A giant boulder rolls
  through one passage as the temple slowly floods and rope bridges collapse over a lava pit.
  Players must decide how much loot to carry — more treasure means slower movement and greater
  risk of being crushed or submerged before escaping. The lighthearted Indiana Jones-inspired
  theme and tactile components (actual rolling boulder miniature) make it a crowd-pleasing
  thrill-ride. Originally published by Dust Games in 2009; Fantasy Flight Games released a
  revised edition in 2012.

