description: |
  Targi is a two-player-only worker placement and set collection game designed
  by Andreas Steiger and published by KOSMOS in 2012. Players place markers on
  the border cards of a 5x5 grid — each row and column intersection with another
  player's marker blocks access to that border card — then collect the central
  cards where their row and column intersect. Border cards provide resources and
  actions, while center tribal cards grant ongoing abilities and victory points.
  The unique blocking mechanic creates intense spatial tension in a compact,
  portable package. It was nominated for the Kennerspiel des Jahres and is
  considered one of the finest two-player games ever designed.

