description: |
  Chicago Express is a streamlined economic train game for 2–6 players in which players invest in and develop competing railroad companies racing to connect the eastern seaboard to Chicago. Each turn a player chooses one of three actions: auction a share in a railroad company, expand one company's rail network, or develop a city hex to increase its value. Because players hold shares in multiple companies, the game creates fascinating conflicts of interest—you may be simultaneously eager to help a company expand and desperate to block a rival's track. Originally released as Wabash Cannonball by Winsome Games, Chicago Express is a pure stock-manipulation and network-building classic with no luck whatsoever.

