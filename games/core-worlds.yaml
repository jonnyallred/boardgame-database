description: |
  Core Worlds is a deck-building game of galactic conquest set in a crumbling sci-fi empire. Each player starts with a faction-specific deck and homeworld that generates energy — the game's currency — and uses it to deploy units, acquire powerful new cards from a shared market, and invade planets. The game plays over ten rounds as players push inward from the outer rim toward the prestigious Core Worlds, which yield the most Empire Points. The area-control element distinguishes it from pure deck-builders: your units matter not just for what they do, but where they fight. Victory goes to the player with the most Empire Points when the tenth era ends.

