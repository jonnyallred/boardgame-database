description: |
  The Metric Mile is a racing board game themed around track and field athletic competition. Players manage their runners around a mile-length track, balancing speed and stamina to outpace opponents across the finish line. The game's title references the 1500 meter race (the "metric mile"), a staple of Olympic and major track competitions. Specific publisher and designer details for this game are limited due to its rarity as a vintage sports-themed title.

