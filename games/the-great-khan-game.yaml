description: |
  The Great Khan Game is a 1989 TSR board and card game designed and illustrated by Tom Wham with
  Richard Hamblen, set in the Whamite Isles of the Forgotten Realms setting. Players gather melds
  of cards representing rulers and peoples to form nations and compete for control of territories on
  the map. Nations compete through warfare (battles between melds) and political coups (playing a
  stronger meld to take over a country). Event cards bring disasters (assassins, earthquakes, peasant
  revolts) and windfalls (trade caravans, fleets). The game humorously captures the sweep of
  fantasy empire-building politics, trade, and warfare in Tom Wham's signature whimsical style.

