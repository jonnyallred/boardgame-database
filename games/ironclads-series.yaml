description: |
  The Ironclads is a tactical-level American Civil War naval combat board game published by Yaquinto in 1979, simulating battles between ironclad warships like the Monitor and the Merrimack. Each gun on each ship is fired and resolved individually, creating a highly detailed damage-tracking simulation where armor locations, turret health, and flotation are all carefully modeled. An expansion kit with additional ships and scenarios was published the following year. Winner of the Charles Roberts Award for Best Initial Release of 1979, The Ironclads became a touchstone of naval wargame design and was republished by Excalibre Games in 1993.

