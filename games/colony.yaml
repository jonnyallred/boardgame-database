description: |
  Colony is a post-apocalyptic engine-building dice drafting game in which 1-4 players construct and upgrade buildings to grow their colony back to civilization. Each round, players roll a pool of dice — each face representing a different resource — and take turns drafting dice to fuel their construction. Buildings generate ongoing benefits, making each purchase feel like progress: resource production, storage, point generation, or special powers. Importantly, some resources are stable (can be saved between turns) while others are unstable (use them or lose them), creating meaningful resource management decisions. A reimplementation of the Japanese game Age of Craft, Colony strikes a satisfying balance between accessibility and tactical depth.

