description: |
  Disturbed Friends is an adult party card game designed to reveal how dark or twisted your friends' minds truly are. Each round a Judge draws a question card presenting a crude, absurd, or morally questionable scenario, and all other players secretly choose the answer—A, B, or C—they believe the Judge will find most disturbing. Players simultaneously reveal their votes, then the Judge reveals their own choice; those who match win a card. The first player to collect 10 winning cards is declared the most disturbed friend. The game includes 380 cards.

