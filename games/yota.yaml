description: |
  Yota (also known as Yoté) is a traditional abstract strategy game of West African origin, valued
  as a fast-paced gambling game due to its surprising turnarounds. Played on a 5x6 board that
  starts empty, each player holds twelve pieces and on their turn may place a piece, move one
  orthogonally, or capture by jumping over an opponent's piece — then remove an additional
  opponent piece of their choice. The game is won by capturing all of the opponent's pieces.

