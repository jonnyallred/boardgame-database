description: |
  Unsettled is a cooperative survival adventure game for 2–4 players set in the uncharted fringes of deep space. Players are explorers stranded on an alien planet, forced to survive its bizarre and lethal environment without combat — every element of the world itself is the threat. The game is built around a modular framework system: each planet plug-in delivers a unique environment, distinct rule twists, exclusive items, and strange new abilities, making every planet a wholly different experience. With no enemies to fight and no clear victory path, Unsettled focuses on atmospheric tension, discovery, and desperate problem-solving.

