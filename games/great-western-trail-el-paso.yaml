description: |
  Great Western Trail: El Paso is a standalone entry in the Great Western Trail family
  that serves as an accessible introduction to the series while offering fresh challenges
  for veterans. Set in the iconic border city, players drive cattle and manage their
  ranching operation in a more compact format than the flagship games. Co-designed by
  Alexander Pfister and Johannes Krenner, El Paso distills the core deck-building and
  route-building pleasures of the series into a faster, travel-friendly experience suitable
  for families and newcomers to the GWT universe.

