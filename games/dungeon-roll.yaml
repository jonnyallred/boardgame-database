description: |
  Dungeon Roll is a push-your-luck dice game where players form a party by rolling seven
  dice, then delve into a dungeon by rolling hazard dice to face monsters, traps, and
  treasure. One player acts as the Dungeon Lord, rolling increasing numbers of dungeon
  dice based on the depth reached. Players must decide when to press their luck deeper
  into the dungeon or retreat with their accumulated experience points. Variable hero
  classes give each player unique abilities and encourage repeated plays.

