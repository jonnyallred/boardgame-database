description: |
  Mu and Lots More is a collection of trick-taking card games designed by Doris Matthäus and Frank Nestel, published in English by Rio Grande Games (originally 1995 by Doris & Frank). The centerpiece game, Mü, features a distinctive bidding phase where players bid to become Chief or Vice by selecting their own hand cards and determining trump collaboratively, creating a shifting partnership dynamic each round. The collection also includes Njet by Stefan Dorra, Meinz by Günter Burkhardt, and Was sticht? by Karl-Heinz Schmiel, offering four variations on the trick-taking format. Mü received a Spiel des Jahres recommendation in 1996.

