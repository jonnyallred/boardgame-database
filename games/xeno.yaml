description: |
  Xeno is a Japanese card game similar in structure to Love Letter, in which each player holds a
  single card at a time, drawing and discarding each turn according to each card's power. Character
  cards include the Emperor, who seeks to execute the Hero, the Death card representing an
  infectious disease, the Spirit, and other archetypal roles, each with distinct effects on rivals.
  The game's psychological tension comes from deducing opponents' identities while concealing
  your own, creating quick but memorable confrontations.

