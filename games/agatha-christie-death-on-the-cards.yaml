description: |
  A fast-paced card game of mystery, bluffing, and deduction for 2-6 players, published by Modiphius Entertainment in 2018. Players must cooperate to unmask a murderer and prevent their escape, but each player harbors dark secrets and the murderer is secretly working against the group. Using hidden traitor mechanics, players balance revealing enough to catch the killer while concealing their own suspicious activities. Based on Agatha Christie's classic mystery setting, the game plays in under 30 minutes and is accessible for younger mystery fans.

