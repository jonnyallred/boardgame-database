description: |
  Pioneers is a route-building and network game from Queen Games in which players transport pioneers of various professions by coach across a map, settling them in cities that need their skills. Players also construct roads between cities, earning money from opponents who use their network. The game ends when a player has built all their roads or the last coach enters play, with bonus points awarded for the largest connected network of roads. The combination of worker placement (via specialized pioneers), network construction, and income generation creates an accessible but engaging economic game.

