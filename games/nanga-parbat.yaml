description: |
  Nanga Parbat is a 2-player abstract strategy game set on a mountain. Players alternate placing hikers on the mountain terrain to capture animals and establish base camps, using area movement and set collection to score points. The variable setup ensures each game presents a fresh puzzle, and the short playtime makes it an ideal two-player filler with meaningful decisions packed into every turn.
