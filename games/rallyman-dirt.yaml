description: |
  Rallyman: DIRT is a roll-and-move rally racing game for 1-6 players by Jean-Christophe Bouvier, featuring the terrain types and challenges of off-road rallying. Players choose which combination of Gear, Brake, and Coast dice to roll each turn, pushing their luck to gain precious time while risking losing control on the hazardous terrain. Classic rally maneuvers — drifting, jumping, and cutting corners — are all represented, and the modular track system allows for endlessly varied courses. It captures the thrill and tension of real rally racing in an accessible dice game format.
