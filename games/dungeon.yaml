description: |
  Dungeon! is a 1975 adventure board game by David R. Megarry and TSR, widely regarded as the first dungeon crawler board game and the progenitor of an entire genre. Players choose from character classes including the Elf, Hero, Superhero, and Wizard, and race through a six-level dungeon map to collect a target value of treasure before returning to the starting chamber. Deeper levels offer richer rewards but far deadlier monsters. The game was inspired by the same Blackmoor D&D campaign that gave rise to Dungeons & Dragons itself, and has been cited as the direct ancestor of Descent, Talisman, DungeonQuest, and many other dungeon exploration games.

