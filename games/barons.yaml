description: |
  Barons is a light tile-placement area-control game designed by Marc Lanctôt and published by Surprised Stare Games in 2009. Players place landscape tiles to build a medieval realm and then place their baron tokens on completed regions to claim them, scoring points based on the size and features of the territories controlled. The game rewards spatial awareness and timing of when to claim regions versus when to expand them. Its quick play time, simple rules, and attractive tile-building make it a suitable gateway game for families moving into more strategic territory.

