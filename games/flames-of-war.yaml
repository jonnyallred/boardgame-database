description: |
  Flames of War is a World War II tabletop miniatures wargame produced by New Zealand's Battlefront Miniatures, first published in 2002. Players command company-level forces using 15mm (1/100 scale) miniatures representing infantry, armor, artillery, and support units from any of the major combatant nations across Early War (1939-41), Mid War (1942-43), and Late War (1944-45) periods. The game uses an alternating I-Go-You-Go sequence of movement, shooting, and close assault, and is backed by extensive army lists and historically-inspired scenarios. It is one of the most popular WWII miniatures systems in the world, known for its depth of historical detail and wide range of supported forces.

