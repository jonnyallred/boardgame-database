description: |
  Prophecy is a Czech fantasy adventure game in which players take on the roles of heroes exploring a modular fantasy world, battling monsters, collecting artifacts, and growing in power. Each hero has unique abilities and must race to acquire sufficient power to challenge and defeat the mystical Prophecy before their rivals do. Originally published by Altar Games in 2002, the game received two subsequent editions from Z-Man Games in 2007 and 2014, broadening its international reach.

