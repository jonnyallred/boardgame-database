description: |
  Lock 'n Load: Band of Heroes is a squad-level tactical wargame covering the actions of the 82nd and 101st Airborne Divisions during the D-Day invasion of Normandy in World War II. Each hex represents 50 meters and counters represent squads, leaders, heroes, and support weapons from both American airborne and German opposition units, played across 16 scenarios. An innovative impulse system keeps both players engaged throughout the game, preventing the long passive periods common to other hex-and-counter wargames. Winner of the Charles S. Roberts Award and International Gamers Award, Band of Heroes is part of the acclaimed Lock 'n Load series known for its immersive, dramatic tactical combat.

