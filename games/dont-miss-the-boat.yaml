description: |
  Don't Miss the Boat! is a 1965 abstract family game first published by Parker Brothers, later by Waddingtons, played on a raised cross-shaped board surrounded by a circular canal with four colored boats. Players each control eight pieces and a matching colored boat at their dock. A player can move a piece into their boat, which triggers all boats to advance clockwise by a quarter-turn—thus helping you while potentially helping or hurting opponents. The first player to load five pieces into their boat wins. The game uses no dice or cards and requires pure strategic positioning.

