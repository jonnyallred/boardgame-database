description: |
  So Long Sucker is a four-player bargaining game invented in 1950 by game theorists Mel Hausner, John Nash,
  Lloyd Shapley, and Martin Shubik at Princeton University, and first published in academic form in 1964.
  Each player starts with colored chips and must form coalitions with others to gain control and advance, but
  all agreements are unenforceable — and ultimately, winning requires betraying your allies. Originally titled
  "Fuck Your Buddy," the game is a stark demonstration of how cooperation and treachery intertwine in zero-sum
  social dynamics, making it a fascinating artifact of game theory history.

