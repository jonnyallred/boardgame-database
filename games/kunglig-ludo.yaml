description: |
  Kunglig ludo (Royal Ludo) is a Swedish variant of the traditional Fia (Ludo) race game in which certain board spaces are marked with crowns and feathers. A special die replaces the 3 and 6 pips with matching royal crown and feather symbols, triggering special rules when these spaces are landed on or rolled. The Danish variant is called Glob-ludo and uses globes and stars instead of crowns. As a further development of the ubiquitous Ludo family, Kunglig ludo adds a distinctive Swedish royal flavor to the classic four-color race game format while maintaining its accessible, luck-driven appeal.

