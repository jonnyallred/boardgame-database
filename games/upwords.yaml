description: |
  Upwords is a three-dimensional word-building game invented by Elliot Rudell and first published by Milton Bradley in 1983. Similar to Scrabble in structure, the game adds a vertical twist: players may stack letter tiles up to five high on top of existing tiles to change words on the board, with higher stacks scoring more points. Words must be formed horizontally or vertically, but the stacking mechanic means the board constantly shifts as letters are overwritten. Published later by Hasbro, Upwords has been a perennial family favourite and won Games Magazine's Word Game of the Year.

