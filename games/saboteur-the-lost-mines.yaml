description: |
  Saboteur: The Lost Mines is a standalone board game spin-off of the classic Saboteur card game designed by Frederic Moyersoen, drawing on elements from the base game, its expansion, and the two-player version while offering a fresh board-game experience. Players take on the roles of dwarves from different clans exploring a network of mine tunnels, with hidden saboteurs among them working to foil the exploration. The clan-based mechanics add a new layer to the social deduction formula, as players must identify which of their allies are traitors while cooperating enough to reach the lost mines. Its elevated component quality and expanded mechanics make it a more robust alternative for groups who love the Saboteur brand.

