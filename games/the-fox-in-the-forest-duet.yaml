description: |
  The Fox in the Forest Duet is a cooperative two-player trick-taking game published by Foxtrot Games and Renegade Game Studios in 2020, reimagining the mechanics of The Fox in the Forest for cooperative play. Rather than competing, both players work together to move a shared token along a forest path to collect gems before running out of cards. Cards won in each trick correspond to specific forest spaces, and players must navigate without communicating about their hands. The tightrope between collecting the gems you need and avoiding treacherous forest spaces creates a uniquely tense cooperative puzzle within the elegant trick-taking framework.

