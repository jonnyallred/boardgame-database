description: |
  Maria is an award-winning three-player wargame designed by Richard Sivél and published in 2009, covering the War of the Austrian Succession from 1741 to 1744. One player controls Austria, a second controls France and Bavaria, while the third plays the unusual dual role of commanding both Prussia (Austria's enemy) and the Pragmatic Army (Austria's ally) across two separate theaters — Bohemia and Flanders — simultaneously. Cards drive strategic options, while hex-based movement and fortress sieges provide tactical depth. Derived from the acclaimed Friedrich, Maria is considered a masterpiece of asymmetric three-player wargame design.

