description: |
  Entropy is a two-player abstract strategy game designed by Eric Solomon in 1977, sold commercially as Hyle (on a 5×5 board) and Hyle7 (on a 7×7 board). The game embodies the concept of order versus chaos: one player acts as Order, trying to form patterns horizontally and vertically on the board, while the other plays as Chaos, randomly placing colored pieces to disrupt those patterns. The asymmetric roles create a deeply original tension — Order must plan ahead while Chaos embraces randomness strategically. Entropy has been featured at the Mind Sports Olympiad and is considered a "modern classic" of abstract game design.

