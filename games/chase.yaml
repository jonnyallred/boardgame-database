description: |
  Chase is a two-player abstract strategy game in which dice are used as pieces but never rolled — instead each die's face value determines its speed (number of hexes it can move per turn). Each player places nine dice on the board with values totaling 25, and must maintain that total at all times; when a piece is captured, its pip value is redistributed to another friendly die. A player wins by reducing their opponent to four dice, making it impossible to maintain the required total of 25. The game offers surprisingly deep strategy through movement in six directions, bumping, wraparound, and ricochet mechanics.

