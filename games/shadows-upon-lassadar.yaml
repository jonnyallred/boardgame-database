description: |
  Shadows Upon Lassadar is a solitaire print-and-play fantasy card game designed by Todd Sanders in which a young magic adept must find three lost keys to seal the gates between the Barrier Plains and prevent the Grayking from reaching the world of Lassadar. Players journey between cities using cards representing spells and encounters, but powerful magic corrupts the soul — use too much and lose the game. The game won awards including Best AI, Best Art, and Best Solitaire in the 2011 Print 'n Play Awards, praised for its adaptive enemy and atmospheric design.

