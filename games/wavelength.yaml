description: |
  Wavelength is a team-based party game designed by Alex Hague, Justin Vickers, and Wolfgang Warsch in 2019 in which a "Psychic" gives a single clue to help their team guess the location of a hidden target on a custom spectrum device. The device reveals a scale between two opposing concepts (e.g., Hot–Cold, Good–Evil), and the Psychic must choose a clue that positions somewhere on that spectrum while opposing teams attempt to read the dial differently. Teams score points for accuracy while debating where the clue falls, generating lively discussion about how concepts relate. Its elegant mechanics make it one of the most accessible and conversation-sparking party games of recent years.

