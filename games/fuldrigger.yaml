description: |
  Fuldrigger is a Danish trading game set during the Renaissance, in which players captain sailing ships across the Caribbean buying and selling commodities such as silk, tobacco, and rum to amass wealth. Players invest their profits in expanding their fleet and building fortresses to secure trade routes, competing economically to become the richest merchant. The game features straightforward rules and meaningful strategic decisions around investment, route planning, and competition with opponents. Primarily sold in Denmark, it is a rare regional title with devoted fans who appreciate its nautical economic theme.

