description: |
  Stellar Conquest is a 1974 science fiction 4X board game published by Metagaming Concepts, designed by Howard M. Thompson after Avalon Hill rejected his prototype. Players control interstellar empires on a hex grid map, colonizing planets and improving technology (movement speed, offensive power) to defeat opponents within 40 simulated years. Notably, player negotiation and diplomacy are expressly forbidden — all strategy must be expressed through actions alone. A direct ancestor of early computer 4X games like Master of Orion and Reach for the Stars, Stellar Conquest helped define the 4X genre.

