description: |
  Råttfällan (meaning "Rat Trap" in Swedish) is a Scandinavian children's board game published by Alga in which players take on the roles of rats scurrying around the board to collect various food items. The game uses simple dice-driven movement typical of roll-and-move children's games, with the rat theme and food-collecting objective providing thematic fun for young players. Published in multiple Nordic language editions including Swedish, Finnish, Norwegian, Danish, and English, Råttfällan has been a popular children's game across the Scandinavian market, delivering a quick and accessible gaming experience for families with young children.

