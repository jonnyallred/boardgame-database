description: |
  Rithmomachia, or "The Battle of the Numbers," is an early European mathematical board game dating to around 1030 CE when monk Asilo created it to illustrate the number theory of Boethius' De institutione arithmetica for monastery students. Played on an elongated 8x16 board with triangular, square, and round pieces inscribed with numbers, each side has asymmetric forces — the numbers differ between players, enabling different capture possibilities. Captures are based on numerical relationships: arithmetic, geometric, and harmonic progressions, rather than positional threats. At the height of its popularity in the 16th century, printed treatises appeared in Latin, French, Italian, and German, marking it as the medieval world's preeminent educational strategy game.

