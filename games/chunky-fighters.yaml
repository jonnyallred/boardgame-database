description: |
  Chunky Fighters is a combat dice game in which each player's fighter is physically built from four dice representing head, body, legs, and weapon. Players roll damage and hit location dice each turn, physically rotating the relevant body-part dice to show remaining hit points as fighters take damage. Players can attack normally, change weapons, administer first aid, disarm opponents, or make targeted called shots for extra damage. The last fighter standing wins. The game's unique dice-as-miniatures concept makes damage tracking viscerally tactile and visually amusing.

