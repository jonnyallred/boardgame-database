description: |
  Atlantic Wall is a monster board wargame published by Simulations Publications, Inc.
  (SPI) in 1978, simulating Operation Overlord — the D-Day landings and subsequent
  Allied breakout into France from June 1944. One of the largest wargames of its era,
  the game features more than 1,000 counters on a massive five-piece map, using a rules
  system based on SPI's Wacht am Rhein from the prior year. Mechanics include ranged
  artillery fire across multiple hexes and combined-arms combat column shifts, offering
  an exceptionally detailed and demanding simulation of the Normandy campaign for dedicated
  wargamers. Decision Games released an updated edition titled Atlantic Wall: D-Day to
  Falaise in 2014.

