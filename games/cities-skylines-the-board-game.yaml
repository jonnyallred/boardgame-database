description: |
  Cities: Skylines – The Board Game is a cooperative city-building game published by KOSMOS in 2019, based on the popular Paradox Interactive city-building video game. One to four players work together to build a city that satisfies the growing needs of its population while managing a municipal budget. The game is scenario-based, beginning with an introductory tutorial and escalating in complexity to serve both casual and veteran players. Resource management, tile placement, and cooperative urban planning are the core pillars of this licensed adaptation.

