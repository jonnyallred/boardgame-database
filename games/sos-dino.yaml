description: |
  SOS Dino is a cooperative tile-placement game designed by Ludovic Maublanc and Théo Rivière, published by LOKI
  (IELLO's children's imprint) in 2018. Players work together to rescue four adorable dinosaur figurines and six
  eggs from a volcanic eruption, drawing random lava tiles from a bag and racing to guide the dinos to safety in
  the mountains. Nominated for the 2018 Kinderspiel des Jahres, SOS Dino combines gentle tension with accessible
  rules, making it an ideal first cooperative game for young children.

