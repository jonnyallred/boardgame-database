description: |
  Set Cubed is a dice-based pattern-recognition game designed by Marsha J. Falco, creator of the award-winning card game SET, and published by Set Enterprises in 2008. Players combine dice in their hand with dice already on the board to create valid "sets" (groups of three dice where each attribute is either all the same or all different), placing them on a grid and scoring for chains. The game translates the visual logic of SET into a spatial board format, rewarding players who can quickly identify multi-directional scoring combinations.

