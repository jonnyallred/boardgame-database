description: |
  Rum & Pirates is Stefan Feld's first collaboration with publisher Alea, a light pirate-themed movement and collection game for 2-5 players. Players move a shared Red Corsair captain figure through a randomly arranged modular board of nine tiles, placing their pirate figurines on spaces the captain passes through and claiming the actions at various intersections — collecting gold, digging for treasure, fighting guards, gathering rum barrels, and carousing at pubs. Rated a 2 on Alea's complexity scale, the game blends tactics, strategy, and luck in an accessible package that stands as an early showcase of Feld's interest in multi-action point mechanisms, though far lighter than his later acclaimed works.

