description: |
  Katro is a traditional mancala board game played by the Betsileo people in the Fianarantsoa Province of Madagascar, first formally described by researcher Alex de Voogt in 1998. The game is played on a distinctive 6x6 board of 36 pits (six rows of six), with each player controlling three rows of the board. Players sow and capture seeds according to mancala rules, aiming to seize all of the opponent's pieces or leave them unable to move. Katro represents a unique variant in the global mancala family, distinguished by its larger square board format unusual among African mancala traditions.

