description: |
  Crescendo of Doom is a supplement for Avalon Hill's Squad Leader system, concentrating on the early war period of 1939-1941 in Western and Central Europe. It introduces new national forces, weapons, and scenarios covering the German campaigns in Poland, France, the Low Countries, and the Balkans, as well as early North African operations. As with other Squad Leader components, the game uses Avalon Hill's detailed hex-and-counter system with individual squads and weapon teams. The expansion won the Charles S. Roberts Award for Best 20th Century Boardgame of 1980, cementing the Squad Leader series' reputation as one of the most detailed and demanding WWII tactical wargames ever produced.

