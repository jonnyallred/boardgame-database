description: |
  Tournay is a card game designed by Sébastien Dujardin, Xavier Georges, and Alain Orban — the same team behind Troyes — published by Pearl Games and Z-Man Games in 2012. Players manage a district of a medieval city, recruiting citizens from three classes (nobility, clergy, and burghers) organized into nine level-tiered card decks. Citizens generate resources and effects that allow players to hire more powerful citizens or block opponents. The elegant card-drafting and citizen-chaining mechanics reward experienced players who can read multiple turns ahead, making Tournay a finely crafted euro card game from a celebrated design team.

