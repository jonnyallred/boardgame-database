description: |
  Circus Imperium is a tongue-in-cheek science fiction chariot racing board game published by FASA in 1988, set in the far-future universe of the Renegade Legion RPG. Players pilot anti-gravity chariots pulled by carnivorous alien beasts through three circuits, competing by knocking rivals out of the race or feeding them to their mounts. Loosely based on Avalon Hill's Circus Maximus, the game features highly unpredictable outcomes, a carnage-filled sense of humor, and lead miniatures from Ral Partha. Two track options include a lavish three-dimensional skybox infield track and a smaller, chaos-prone alternative.

