description: |
  Space Walk is a modern mancala-style abstract strategy game designed by Rüdiger Dorn and published by
  Ravensburger in 1999 with artwork by Franz Vohwinkel. Played on a board of 2×6 planets with black holes
  at each end, players distribute spaceships of three sizes — small, medium, and large — across the board
  in a mancala sowing pattern. The game ends when a player has no remaining spaceships on the board, with
  points calculated from remaining pieces. Its colorful high-quality plastic components and accessible rules
  made it one of the more popular modern mancala implementations.

