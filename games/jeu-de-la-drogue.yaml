description: |
  Jeu de la drogue (The Drug Game) is a French educational board game designed for drug prevention and awareness, intended for use in schools and youth organizations. Players encounter scenarios related to substance use and are challenged to discuss choices, consequences, and peer pressure. The game uses information and discussion prompts to engage participants with drug education topics in an interactive format. An example of the serious games movement applied to public health education in France. Limited detailed information is available due to its specialized educational distribution.

