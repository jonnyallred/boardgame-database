description: |
  I Vant to Bite Your Finger is a children's board game with a vampire theme designed by Charles Phillips and Charlie Leicht, published by Ideal Toys in 1979. Players must progress through the game while avoiding having their finger bitten by a Dracula-themed mechanism. The game mixes horror theming with child-friendly suspense, capitalizing on the 1970s popularity of vampire-themed entertainment, and its dramatic biting gimmick made it a memorable novelty of its era.

