description: |
  Kitty Bitty is a 2019 children's memory and dice-rolling game by Blue Orange Games in which players help little kittens play without being caught napping by the watchful Mommy Cats. On their turn, players roll a colored die and peek at the corresponding mommy cat token; if it shows nothing, they can move their kitten forward, but if a cat is watching, their turn ends. The game features beautifully crafted wooden pieces that double as memory tokens, developing color-matching and memory skills for children ages 4 and up.

