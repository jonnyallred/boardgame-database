description: |
  Pacts is an area majority game featuring an I-cut-you-choose mechanism that creates intriguing negotiation dynamics at its core. Players compete to control regions of the board using variable player powers and area movement, while the cutting mechanic constantly forces players to offer deals they may not want to make. The variable setup and asymmetric powers ensure no two games play alike, appealing to players who enjoy strategic maneuvering alongside interpersonal negotiation.
