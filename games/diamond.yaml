description: |
  Diamond is a two-player abstract strategy game invented by Larry Back, with rules conceived in 1985 and finalized in 1994. Played on a board of interlocking squares and triangles, each player controls 12 colored pieces and competes to achieve a winning configuration through tactical placement and movement. The game's distinctive diamond-shaped board geometry creates unusual movement patterns and tactical opportunities not found in square-grid abstracts. It is a pure strategy game with no random elements, rewarding deep positional thinking.

