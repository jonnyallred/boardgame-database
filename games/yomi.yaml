description: |
  Yomi is a head-to-head fighting card game designed by David Sirlin to capture the mind games
  of competitive fighting video games in card form. Each player has a fixed 52-card deck
  representing a unique character, and simultaneous play resolves via a rock-paper-scissors
  hierarchy: attacks beat throws but lose to blocks, throws beat blocks but lose to attacks.
  Jokers can rewind a combo, and face cards represent powerful special moves. The deep asymmetry
  between characters and the intense prediction element reward mastery across many plays.

