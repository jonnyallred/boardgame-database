description: |
  Veracruz: U.S. Invasion of Mexico 1847 is a two-player hex-and-counter wargame designed by Richard Berg and published by Simulations Publications Inc. (SPI) in 1977, originally appearing as a pull-out game in issue 63 of the Strategy & Tactics magazine. The game covers General Winfield Scott's 25-week campaign from March to November 1847, during which American forces invaded and captured Mexico. One player commands the American forces, the other the Mexican defenders, fighting over the complete invasion campaign in a single scenario. Graphic design was by Redmond A. Simonsen.

