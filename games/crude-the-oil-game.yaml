description: |
  Crude: The Oil Game is a classic economic board game designed by James St. Laurent and first published in 1974, simulating the international oil industry from exploration and drilling through refining and retail sale. Players invest in oil wells, refineries, and gas stations across a global market, managing supply chains while responding to fluctuating oil prices driven by dice rolls and player action. Later republished in Germany as McMulti with hundreds of beautiful plastic components representing oil rigs, pumps, barrels, and stations, the game gained cult status among economic game enthusiasts. An updated edition was published in 2012 by Stronghold Games after St. Laurent's death in 2011.

