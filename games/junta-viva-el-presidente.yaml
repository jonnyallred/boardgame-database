description: |
  Junta: Viva el Presidente! is a streamlined card game adaptation of the classic Junta board game, set in the same fictional banana republic. The President secretly distributes foreign aid money (and may lie about amounts), while other players scheme, vote, and plot coups to gain control of five power centers. Assassination attempts, betrayals, and surprise coup announcements make every round explosive. A lighter, faster take on the original game's political satire and cutthroat social dynamics, it distills the essence of Junta into a compact card game format accessible to a broader audience.

