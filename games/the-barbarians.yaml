description: |
  The Barbarians is a 1981 Yaquinto Publications game containing two historical simulations: "Sack
  Rome," in which two or three players race to capture Rome by playing barbarian factions in turn,
  and "Mongol," a two-player game where the Mongol player must occupy 23 European provinces within
  nine six-month turns. An evocative rule reflects the historical reality that European nations
  refused to unite against the Mongols — some armies can only fight on their own territory, while
  others require a die roll to mobilize at all. Published in the distinctive LP-record-sized folder
  format Yaquinto favored, with maps printed on the inside covers.

