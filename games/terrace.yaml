description: |
  Terrace is a multi-level abstract strategy game invented by Dutch-born Anton
  Dresden in 1950, with a practical ruleset developed by Buzz Siler and published
  in 1991. The 8x8 board rises in L-shaped terraces from two low corners to two
  high corners, and players control four differently-sized pieces plus a special
  "T" piece akin to a chess king. Larger pieces cannot be captured by smaller
  ones, creating complex dominance hierarchies. To win, move your "T" piece from
  its starting corner to the opposite corner, or capture your opponent's "T."
  The game won the 1992 Mensa Award for Best New Game and appeared as a
  permanent prop on Star Trek: The Next Generation.

