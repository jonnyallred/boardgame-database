description: |
  Twilight Imperium: Fourth Edition is the definitive edition of Christian T. Petersen's epic space opera board game of galactic conquest, published by Fantasy Flight Games in 2017. Three to six players each control one of seventeen alien factions with unique strengths, technologies, and agendas as they maneuver fleets, build economies, negotiate treaties, pass laws, and pursue secret objectives to accumulate ten victory points and claim the throne of Mecatol Rex. Every faction has its own playstyle and asymmetric powers, ensuring no two games play alike across a modular galaxy map. Widely praised as one of the greatest board games ever made, TI4 demands an entire day and rewards those who commit with an unmatched scope of political, military, and economic drama.

