description: |
  The Wreck of the B.S.M. Pandora is a 1980 cooperative science fiction board game published by SPI and designed by Jim Dunnigan, predating the cooperative game genre by decades. One to five players act as crew members aboard a wrecked spacecraft, flipping counters to explore the ship's corridors while searching for tools to repair failing systems before time runs out—and hunting for weapons to recapture or kill escaped alien specimens. A Cold Shutdown mechanic creates a ticking clock: when power or environmental systems are discovered to be failing, their condition degrades each turn until repaired or the ship shuts down entirely. This pioneering cooperative survival game anticipates themes explored decades later by games like Pandemic and Dead of Winter.

