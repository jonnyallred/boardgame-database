description: |
  The Great Wall Street Fortune Hunt is a 1981 stock-market simulation from Magnavox's Master Strategy
  Series for the Odyssey² console, combining video-game and physical board game components. Each player
  begins with $100,000 and can enter up to seven investments per round; all positions must be sold at
  year-end across a five-year game. Stock prices for 27 real companies including IBM and McDonald's scroll
  across the screen, while dynamic news flashes create investment swings that players must quickly react
  to. The physical gameboard tracks investment positions, T-bill markets, time frame, and prime rate.
  Named Electronic Games magazine's Most Innovative Game of 1982, it is one of the earliest hybrid
  video/board game market simulations.

