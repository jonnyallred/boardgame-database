description: |
  Easy Money is a real estate board game introduced by Milton Bradley Company in 1935, designed as a direct competitor to Monopoly following Parker Brothers' purchase of that game. Like Monopoly, Easy Money is derived from Elizabeth Magie's Landlord's Game, featuring property purchases, rent collection, card draws, and movement around a track via dice. The game underwent several rule changes after Parker Brothers sued Milton Bradley for patent infringement, resulting in distinct editions across the decades. Easy Money was produced continuously from 1935 through 1974, with a brief revival in 2005.

