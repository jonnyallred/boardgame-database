description: |
  Ritual is a cooperative game designed by Tomás Tarragón, originally published by T-Tower Games and later republished by Strohmann Games in 2022 in an improved edition that addressed colorblindness accessibility. In the game, shamans work together in complete silence to perform a mystical ritual by passing runes between each other according to hidden rules. Players cannot discuss their cards or strategies at any point — all coordination must occur through the physical act of giving and taking runes. The game creates a uniquely meditative and tense cooperative puzzle, as players learn to communicate through action alone.

