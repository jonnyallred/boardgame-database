description: |
  Laser Tank is an abstract two-player game in which players maneuver tank pieces on a grid and fire laser beams that bounce off mirror-equipped pieces to try to destroy the opponent's laser tank. Each player arranges mirror pieces that deflect beams, creating defensive angles while positioning their tank for an offensive shot. The puzzle of predicting beam paths through a field of mirrors creates a distinctive spatial challenge, and the setup phase where players position their mirrors adds strategic depth before a single shot is fired. A compact game that delivers meaningful geometric thinking in a simple format.

