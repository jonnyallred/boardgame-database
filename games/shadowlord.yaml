description: |
  Shadowlord! is a science-fantasy board game published by Parker Brothers in 1983 in which players control factions — the Fire Lord, Air Lord, Water Lord, and Earth Lord — competing to conquer galaxies on a large board while fighting against the central Shadowlord. Players use d8s for combat resolution and field five classes of characters including Star-Masters, Warriors, Merchants, Diplomats, and Shadow-Masters, each with distinct roles in exploration, combat, and diplomacy. The game's blend of sci-fi and fantasy themes and its faction system made it a distinctive product of its era despite modest commercial performance.

