description: |
  Talisman: Kingdom Hearts is a licensed edition of the classic Talisman board
  game featuring characters, worlds, and themes from Disney and Square Enix's
  Kingdom Hearts video game franchise. Published by The Op in 2019, players
  guide Sora, Kairi, Riku, King Mickey, Goofy, and other beloved characters
  through three regions of the board, battling Heartless and gathering strength
  and magic to seal the Door to Darkness. Custom marbleized dice, themed tokens,
  and artwork faithful to the games maintain Talisman's beloved exploratory
  spirit while offering a fresh coat of Disney nostalgia paint.

