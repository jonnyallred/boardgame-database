description: |
  Anachronism is a 2005 non-random collectible card game published by TriKing Games in partnership
  with The History Channel, pitting legendary warriors from across history against each other in
  one-on-one combat. Each player's "deck" consists of exactly five cards representing a chosen
  warrior (such as Achilles, Spartacus, or Genghis Khan) and their support cards — no shuffling,
  no random draws.

  Unlike traditional CCGs, Anachronism removes luck of the draw entirely; players openly lay out
  their five cards and make tactical decisions about which to use each turn. Warriors from different
  eras and cultures clash in stylized historical combat, rewarding knowledge of each warrior's
  strengths and clever card sequencing. The game won the 2005 Origins Award for Gamer's Choice
  Best Collectible Card Game of the Year.

