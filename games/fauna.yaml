description: |
  Fauna is a trivia and estimation game in which players guess biological facts about animals from around the globe. Each round, a single animal card is revealed showing only the animal's name and picture; players then place tokens on a world map to guess where the animal lives and on scale tracks to estimate its weight, length, height, and tail length. Tokens placed in the correct zone score points, and even adjacent zones earn partial credit, rewarding informed guessing. Nominated for the Spiel des Jahres in 2009, Fauna is praised for making natural history engaging and accessible for the whole family.

