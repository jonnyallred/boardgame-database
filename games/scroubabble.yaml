description: |
  Scroubabble is a creative comics-making game published by the French publisher L'Association in 2005, inspired by the structure of Scrabble. Instead of words, players draw comic strip tiles and lay them down on a shared board to form intersecting narrative sequences, similar to how Scrabble words cross each other on a grid. Each new strip must connect meaningfully with existing strips at the intersection point, creating a collaborative and spontaneous comics anthology. The game appeals to fans of sequential art and collaborative storytelling.

