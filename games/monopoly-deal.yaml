description: |
  Monopoly Deal is a fast-paced card game version of Monopoly published by Hasbro in 2008, playable in 15 minutes with 2 to 5 players. Using a 110-card deck of Property, Money, and Action cards, players race to be the first to collect three complete property sets of different colors. Action cards allow charging rent, stealing properties, demanding money, and blocking opponents' moves, creating an explosive and cutthroat atmosphere. Monopoly Deal captures the wheeling-and-dealing spirit of the original game in a portable, quick format.

