description: |
  Gounki is an abstract two-player strategy game played on an eight-by-eight grid in which pieces can combine into stacks or disperse to change their movement options. The objective is to move your pieces off the opposite edge of the board before your opponent does the same, with combinable stacks adding both range and strategic complexity. Opposing pieces may not capture each other—only block—so the game becomes a spatial puzzle of maneuvering around and through the enemy. Published by Nestorgames, it is admired for its elegant rules and surprisingly deep positional play.

