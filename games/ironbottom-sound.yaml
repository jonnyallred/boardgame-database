description: |
  Ironbottom Sound is an award-winning simultaneous-plotting hex-based naval wargame simulating the Guadalcanal naval campaign of World War II. Each ship has a detailed damage sheet tracking individual turrets, guns, torpedo mounts, and armor locations, with hits determined by range-modified dice against tables. Players plot moves and fire orders simultaneously, then resolve combat, creating realistic fog-of-war tension. Ten scenarios are provided — five historical, five balanced — at a scale of 600 yards per hex. Winner of the Charles Roberts Award at Origins 1982, it has been revised and republished multiple times, with designer Jack Greene inducted into the Origins Hall of Fame in 1990.

