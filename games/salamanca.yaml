description: |
  Salamanca is a Euro-style area control game set in 16th-century Spain, in the province of Salamanca, where ambitious noble families compete to reclaim and develop the dry hinterlands around their castles. Players use cards from their hand to obtain tiles — buildings, landscapes, and privileges — and place them on tactically important spaces on the game board, competing for regional dominance. The card-driven resource and placement system rewards clever hand management and timing, as players vie for the most valuable territories. The game delivers a compact area control experience with a distinctive historical Spanish setting.

