description: |
  Patton's 3rd Army: The Lorraine Campaign is a hex-and-counter wargame published by SPI in 1980 (first in Strategy & Tactics issue #78) simulating the U.S. Third Army's autumn 1944 offensive through the Lorraine region of France, including the siege of Metz. Players command American and German forces at the operational level, maneuvering through French terrain as Patton's forces attempt to break through stiffening Wehrmacht resistance. The game was the first entry in SPI's "Victory in the West" series, designed by Joseph Balkoski with the hallmark SPI graphic production of Redmond Simonsen.

