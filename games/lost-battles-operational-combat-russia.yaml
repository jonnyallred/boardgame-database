description: |
  Lost Battles: Operational Combat in Russia is an operational-level wargame covering the Eastern Front of World War II at the division and corps level. Players command German and Soviet forces in scenarios ranging from the initial 1941 Barbarossa drives to the war's turning point battles of 1942-43. The game focuses on the asymmetric capabilities of the two sides — Germany's initial doctrinal and equipment superiority against the Soviets' vast manpower and the eventual modernization of the Red Army. Operational tempo, logistics, and the interaction between armor, infantry, and air support are central to the system's modeling of this theater's unique character.

