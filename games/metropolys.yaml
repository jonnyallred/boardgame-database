description: |
  Metropolys is an urban planning strategy game designed by Sébastien Pauchon and published by Ystari Games in 2008. Players act as rival urban developers competing to build the most prestigious skyscrapers in the city of Metropolys, divided into housing, park, leisure, industrial, and administrative districts. On each turn, a player places a building with a visible value; to outbid, the next player must place a higher-valued building in an adjacent district, creating a geographical auction that spreads around the board. Players must manage their hand of building tokens carefully, balancing secret personal objectives against area control goals.

