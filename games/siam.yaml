description: |
  Siam is a compact 2-player abstract game by Didier Dhorbait in which elephants and rhinoceroses compete to push a heavy rock off the edge of the board. Each animal piece can push a line of rocks or opposing animals, but only if it outnumbers the opposing force pushing in the opposite direction, creating a pushing and counter-pushing struggle. The game is renowned for its elegant simplicity and surprising strategic depth in just 15 minutes, making it a beloved example of minimalist abstract design.

