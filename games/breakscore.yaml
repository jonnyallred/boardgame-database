description: |
  Breakscore is a New Zealand board game designed by Matt Taylor that packages three related
  games in one box: Break-Away, Breakscore, and Breakscore Champ-Play, each building on the
  prior in complexity. The game is primarily dice and card driven, with players scoring points
  through a series of rounds. Designed for 2-4 players aged 10 and up, Breakscore is a light
  family game notable mainly as a regional self-published title, and detailed information
  about its wider distribution is limited.

