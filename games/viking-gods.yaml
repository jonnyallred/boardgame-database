description: |
  Viking Gods is a 1982 two-player board game published by TSR, designed by Allen Hammack (an early contributor to Dungeons & Dragons). Set during the Norse apocalypse of Ragnarök, the game pits the Gods against the forces of Chaos in an asymmetric conflict. The Gods player must either kill Loki or defeat the army of Chaos to win, while the Chaos player must destroy Yggdrasil — the World Tree — to claim victory. The game captures the epic confrontation between divine order and cosmic destruction from Norse mythology within an accessible TSR mini-game format.

