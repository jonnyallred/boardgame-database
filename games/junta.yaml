description: |
  Junta is a satirical political game set in the fictional banana republic of Republica de los Bananas, where players represent corrupt elite families trying to funnel foreign aid money into their Swiss bank accounts before the republic runs dry. Play alternates between a political card phase of elections, assassinations, and intrigue, and explosive coup d'état board battles when someone declares a coup. The President distributes aid money (often inequitably) each turn, incentivizing betrayal and counter-coups. A cult classic for its blend of dark political satire, chaotic negotiation, and savage backstabbing that can last many hours.

