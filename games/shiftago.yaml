description: |
  Shiftago is an abstract strategy game designed by Frank Warneke and Robert Witter, published by WiWa Spiele in 2017 (Spiel des Jahres recommended), in which 2–4 players insert colored glass marbles into the edges of a square board, pushing existing marbles inward. The goal is to form lines of your own color in any direction while disrupting opponents' line-forming attempts. The shifting mechanic means every insertion changes the board for all players, creating a dynamic spatial puzzle that escalates in complexity across three difficulty variants: Basic, Expert, and Extreme.

