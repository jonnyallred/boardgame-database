description: |
  Cairn is a two-player abstract strategy game published by Matagot in which rival shamans battle to expand their mystical power by placing Megaliths across a sacred landscape. On their turn, a player chooses one of three face-up action tiles—movement (orthogonal or diagonal), a jump, or deploying another shaman—and executes it, then the tile is flipped and triggers a special effect. The first player to place three megaliths onto the board wins, making Cairn a sharp, thematic duel that rewards reading your opponent's actions and controlling the center.

