description: |
  The Next War is a 1978 monster wargame designed by James F. Dunnigan and published by SPI, simulating the first 60 days of a hypothetical ground war between the Warsaw Pact and NATO in Central Europe. Published during the height of the Cold War, the game was a bestseller for SPI, reaching #1 on the company's Top Ten list and remaining there for a year after its July 1978 release. It was a finalist for two Charles S. Roberts Awards at the 1979 Origins Awards—Best Twentieth Century Game and Best Graphics—reflecting its landmark status among wargame enthusiasts. The game's SPI-level operational detail and vast scope established it as a defining example of the cold-war hypothetical wargame genre.

