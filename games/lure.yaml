description: |
  Lure is a light card game with a fishing theme in which players compete to catch the most valuable or largest collection of fish from a shared pool of available cards. Players lure fish to their lines by playing cards from their hand, with bluffing and reading opponents' intentions creating light competitive tension. The nautical fishing theme is rendered accessibly for family audiences, and the short play time makes it suitable as a quick filler game. Published by Mayfair Games, it is one of several compact card game offerings from the publisher's lighter game catalog.

