<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master List — Board Game Database</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    .page-content { max-width: 960px; margin: 0 auto; padding: 20px; }

    .page-header {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 16px;
    }

    .page-header h1 { margin-bottom: 16px; }

    /* Progress */
    .progress-section { margin-bottom: 16px; }

    .progress-info {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .progress-info .big { font-size: 18px; font-weight: 600; color: var(--text); }
    .progress-info .pct { color: var(--success); font-weight: 600; }

    .progress-bar {
      height: 8px;
      background: var(--elevated);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--success), #059669);
      border-radius: 4px;
      transition: width 0.5s ease;
      width: 0%;
    }

    /* Controls */
    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 180px;
    }

    .filter-group { display: flex; }

    .filter-btn {
      padding: 8px 14px;
      border: 1px solid var(--border);
      background: var(--elevated);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-muted);
      transition: all 0.15s;
    }

    .filter-btn:first-child { border-radius: var(--radius-md) 0 0 var(--radius-md); }
    .filter-btn:last-child { border-radius: 0 var(--radius-md) var(--radius-md) 0; }
    .filter-btn:not(:first-child) { border-left: none; }

    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--bg);
      z-index: 1;
    }

    .filter-btn:hover:not(.active) { background: var(--border); color: var(--text); }

    .sort-select {
      padding: 8px 30px 8px 12px;
      font-size: 13px;
    }

    .result-count { font-size: 13px; color: var(--text-muted); margin-top: 10px; }

    /* Game List */
    .game-list { display: flex; flex-direction: column; gap: 6px; }

    .game-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      display: flex;
      align-items: flex-start;
      border-left: 4px solid var(--border);
      transition: background 0.15s, border-color 0.15s;
    }

    .game-item:hover { background: var(--elevated); border-left-color: var(--text-muted); }
    .game-item.researched { border-left-color: var(--success); }

    .game-content { flex: 1; min-width: 0; }

    .game-title-row {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 5px;
    }

    .game-name { font-weight: 600; font-size: 15px; color: var(--text); }
    .game-year { font-size: 13px; color: var(--text-muted); }

    .nom-badge {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      background: rgba(230,184,79,0.18);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .done-badge {
      background: rgba(79,196,122,0.15);
      color: var(--success);
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 12px;
    }

    .sources-row { display: flex; flex-wrap: wrap; gap: 4px; }

    .source-chip {
      font-size: 11px;
      padding: 2px 7px;
      background: var(--elevated);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 4px;
      white-space: nowrap;
    }

    /* States */
    .state-message {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
    }

    .state-message h2 { color: var(--text); margin-bottom: 8px; }

    @media (max-width: 640px) {
      .page-header { padding: 16px; }
      .page-header h1 { font-size: 22px; }
      .controls { gap: 6px; }
      .search-input { min-width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-title">Board Game Database</div>
      <nav class="site-nav">
        <a href="/">Games</a>
        <a href="/images">Images</a>
        <a href="/master-list" class="active">Master List</a>
      </nav>
    </div>
  </header>

  <div class="page-content">
    <div class="page-header">
      <h1>Master List</h1>

      <div class="progress-section">
        <div class="progress-info">
          <span>
            <span class="big" id="researched-count">0</span>
            <span> / </span>
            <span class="big" id="total-count">0</span>
            <span> games researched</span>
          </span>
          <span class="pct" id="pct-text">0%</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="controls">
        <input
          class="search-input"
          id="search"
          type="text"
          placeholder="Search by name..."
          autocomplete="off"
        >
        <div class="filter-group">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="pending">Pending</button>
          <button class="filter-btn" data-filter="done">Done</button>
        </div>
        <select class="sort-select" id="sort-select">
          <option value="nominations">Most nominated</option>
          <option value="alpha">A &rarr; Z</option>
          <option value="year-desc">Newest first</option>
          <option value="year-asc">Oldest first</option>
        </select>
      </div>

      <div class="result-count" id="result-count">Loading...</div>
    </div>

    <div id="game-list" class="game-list">
      <div class="state-message">
        <div class="spinner"></div>
        <p>Loading master list...</p>
      </div>
    </div>
  </div>

  <script>
    let allGames = [];
    let displayGames = [];
    let searchQuery = '';
    let statusFilter = 'all';
    let sortBy = 'nominations';

    const gameListEl = document.getElementById('game-list');
    const searchEl = document.getElementById('search');
    const sortEl = document.getElementById('sort-select');
    const resultCountEl = document.getElementById('result-count');
    const researchedEl = document.getElementById('researched-count');
    const totalEl = document.getElementById('total-count');
    const pctEl = document.getElementById('pct-text');
    const fillEl = document.getElementById('progress-fill');

    async function init() {
      try {
        const res = await fetch('/api/master-list');
        if (!res.ok) throw new Error('Failed to load');
        const data = await res.json();
        allGames = data.games;
        const pct = data.total > 0 ? Math.round((data.researched / data.total) * 100) : 0;
        researchedEl.textContent = data.researched;
        totalEl.textContent = data.total;
        pctEl.textContent = pct + '%';
        fillEl.style.width = pct + '%';
        applyAndRender();
      } catch (err) {
        gameListEl.innerHTML = `<div class="state-message"><h2>Failed to load</h2><p>${err.message}</p></div>`;
      }
    }

    function applyAndRender() {
      let games = allGames.slice();
      if (statusFilter === 'done') games = games.filter(g => g.researched);
      else if (statusFilter === 'pending') games = games.filter(g => !g.researched);
      if (searchQuery) { const q = searchQuery.toLowerCase(); games = games.filter(g => g.name.toLowerCase().includes(q)); }
      if (sortBy === 'nominations') games.sort((a, b) => b.source_count - a.source_count || a.name.localeCompare(b.name));
      else if (sortBy === 'alpha') games.sort((a, b) => a.name.localeCompare(b.name));
      else if (sortBy === 'year-desc') games.sort((a, b) => (b.year || 0) - (a.year || 0) || a.name.localeCompare(b.name));
      else if (sortBy === 'year-asc') games.sort((a, b) => (a.year || 0) - (b.year || 0) || a.name.localeCompare(b.name));
      displayGames = games;
      resultCountEl.textContent = `Showing ${games.length} game${games.length !== 1 ? 's' : ''}`;
      renderList(games);
    }

    function renderList(games) {
      if (games.length === 0) {
        gameListEl.innerHTML = '<div class="state-message"><h2>No games found</h2><p>Try adjusting your search or filter</p></div>';
        return;
      }
      const fragment = document.createDocumentFragment();
      for (const game of games) {
        const item = document.createElement('div');
        item.className = 'game-item' + (game.researched ? ' researched' : '');
        const content = document.createElement('div');
        content.className = 'game-content';
        const titleRow = document.createElement('div');
        titleRow.className = 'game-title-row';
        const name = document.createElement('span');
        name.className = 'game-name';
        name.textContent = game.name;
        titleRow.appendChild(name);
        if (game.year) {
          const year = document.createElement('span');
          year.className = 'game-year';
          year.textContent = game.year;
          titleRow.appendChild(year);
        }
        if (game.source_count > 1) {
          const badge = document.createElement('span');
          badge.className = 'nom-badge';
          badge.textContent = '\u2605 ' + game.source_count;
          titleRow.appendChild(badge);
        }
        if (game.researched) {
          const badge = document.createElement('span');
          badge.className = 'done-badge';
          badge.textContent = 'researched';
          titleRow.appendChild(badge);
        }
        content.appendChild(titleRow);
        if (game.sources.length > 0) {
          const sourcesRow = document.createElement('div');
          sourcesRow.className = 'sources-row';
          for (const src of game.sources) {
            const chip = document.createElement('span');
            chip.className = 'source-chip';
            chip.textContent = src;
            sourcesRow.appendChild(chip);
          }
          content.appendChild(sourcesRow);
        }
        item.appendChild(content);
        fragment.appendChild(item);
      }
      gameListEl.innerHTML = '';
      gameListEl.appendChild(fragment);
    }

    searchEl.addEventListener('input', e => { searchQuery = e.target.value.trim(); applyAndRender(); });
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        statusFilter = btn.dataset.filter;
        applyAndRender();
      });
    });
    sortEl.addEventListener('change', e => { sortBy = e.target.value; applyAndRender(); });

    init();
  </script>
</body>
</html>
