<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Board Game Database</title>
  <link rel="stylesheet" href="/css/common.css">
  <style>
    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .toolbar-right {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    .view-toggle {
      display: flex;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
    }

    .view-toggle button {
      padding: 7px 12px;
      background: var(--elevated);
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 14px;
      transition: all 0.15s;
    }
    .view-toggle button:not(:last-child) { border-right: 1px solid var(--border); }
    .view-toggle button.active { background: var(--accent); color: var(--bg); }
    .view-toggle button:hover:not(.active) { background: var(--border); color: var(--text); }

    /* Evokes section */
    .evokes-section {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 14px;
    }
    .evoke-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border: 1px solid var(--chip-evoke-border);
      border-radius: 14px;
      background: var(--chip-evoke-bg);
      color: var(--chip-evoke-text);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }
    .evoke-chip:hover { background: rgba(194,106,61,0.15); }
    .evoke-chip.active {
      background: var(--chip-evoke-border);
      color: var(--bg);
      border-color: var(--chip-evoke-border);
    }
    .evoke-chip .evoke-count {
      font-size: 11px;
      opacity: 0.7;
    }

    /* Results info */
    .results-info {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* Sort select */
    #sort-select { font-size: 13px; padding: 7px 30px 7px 10px; }

    /* Game view container */
    #game-view { min-height: 200px; }

    /* Detail modal */
    .detail-two-col {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 20px;
      align-items: start;
    }

    .detail-image {
      width: 200px;
      aspect-ratio: 1;
      background: var(--elevated);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .detail-image img { width: 100%; height: 100%; object-fit: cover; }
    .detail-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading);
      font-size: 36px;
      color: var(--border);
      font-weight: 700;
    }

    .detail-info { display: flex; flex-direction: column; gap: 10px; }
    .detail-row { display: flex; flex-direction: column; gap: 2px; }
    .detail-label {
      font-size: 11px; font-weight: 700; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .detail-value { font-size: 14px; color: var(--text); line-height: 1.5; }

    .detail-description {
      font-size: 14px; color: var(--text); line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }

    .detail-rating {
      display: flex; align-items: center; gap: 12px; margin-bottom: 8px;
    }
    .detail-rating-label { font-size: 14px; font-weight: 600; color: var(--text); min-width: 130px; }
    .detail-rating-val { font-size: 13px; color: var(--text-muted); }

    .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; }

    @media (max-width: 768px) {
      .detail-two-col { grid-template-columns: 1fr; }
      .detail-image { width: 100%; }
      .toolbar { flex-direction: column; }
      .toolbar-right { width: 100%; justify-content: flex-end; }
      .detail-rating { flex-direction: column; align-items: flex-start; gap: 4px; }
      .detail-rating-label { min-width: auto; }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <header class="site-header">
    <div class="site-header-inner">
      <div class="site-title">Board Game Database</div>
      <nav class="site-nav">
        <a href="/" class="active">Games</a>
        <a href="/images">Images</a>
        <a href="/master-list">Master List</a>
      </nav>
    </div>
  </header>

  <div class="container">
    <!-- Toolbar -->
    <div class="toolbar">
      <div id="filter-bar"></div>
      <div class="toolbar-right">
        <select id="sort-select">
          <option value="name:asc">Name A-Z</option>
          <option value="name:desc">Name Z-A</option>
          <option value="year:desc">Newest</option>
          <option value="year:asc">Oldest</option>
          <option value="rules_complexity:desc">Most Complex</option>
          <option value="strategic_depth:desc">Deepest</option>
          <option value="length:desc">Longest</option>
        </select>
        <div class="view-toggle">
          <button data-view="cards" class="active" title="Card view">&#9638;</button>
          <button data-view="table" title="Table view">&#9776;</button>
        </div>
      </div>
    </div>

    <!-- Evokes quick-filter -->
    <div class="evokes-section" id="evokes-section"></div>

    <!-- Results info -->
    <div class="results-info" id="results-info">Loading...</div>

    <!-- Game view (cards or table) -->
    <div id="game-view"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination" style="display:none">
      <button class="btn btn-ghost btn-sm" id="prev-btn">&laquo; Prev</button>
      <span class="page-info" id="page-info"></span>
      <button class="btn btn-ghost btn-sm" id="next-btn">Next &raquo;</button>
    </div>

    <!-- Loading state -->
    <div id="loading-state" class="state-box" style="display:none">
      <div class="spinner"></div>
      <p>Loading games...</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="state-box" style="display:none">
      <h2>No games match your filters</h2>
      <p style="margin-top:8px">Try removing some filters or broadening your search</p>
    </div>

    <!-- Error state -->
    <div id="error-state" class="state-box" style="display:none">
      <h2>Unable to load games</h2>
      <p style="margin-top:8px">Make sure games.db exists (run <code>python3 scripts/build_db.py</code>)</p>
    </div>
  </div>

  <!-- Detail Modal (rendered dynamically) -->
  <div id="modal-root"></div>

  <script src="/js/filter-bar.js"></script>
  <script src="/js/game-views.js"></script>
  <script>
    // ============ State ============
    let currentView = localStorage.getItem('gameView') || 'cards';
    let sortKey = 'name';
    let sortDir = 'asc';
    let currentPage = 1;
    let totalPages = 1;
    let totalGames = 0;
    let currentGames = [];
    const PER_PAGE = 50;

    // ============ DOM ============
    const gameView = document.getElementById('game-view');
    const resultsInfo = document.getElementById('results-info');
    const paginationEl = document.getElementById('pagination');
    const pageInfo = document.getElementById('page-info');
    const prevBtn = document.getElementById('prev-btn');
    const nextBtn = document.getElementById('next-btn');
    const loadingEl = document.getElementById('loading-state');
    const emptyEl = document.getElementById('empty-state');
    const errorEl = document.getElementById('error-state');
    const sortSelect = document.getElementById('sort-select');
    const modalRoot = document.getElementById('modal-root');

    // ============ Filter Bar ============
    const fb = new FilterBar(document.getElementById('filter-bar'));
    let currentAPIFilters = {};

    fb.on('change', (filters) => {
      currentAPIFilters = filters;
      currentPage = 1;
      fetchGames();
    });

    // ============ View Toggle ============
    document.querySelectorAll('.view-toggle button').forEach(btn => {
      if (btn.dataset.view === currentView) btn.classList.add('active');
      else btn.classList.remove('active');

      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-toggle button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentView = btn.dataset.view;
        localStorage.setItem('gameView', currentView);
        renderCurrentView();
      });
    });

    // ============ Sort ============
    // Restore from URL
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('sort') && urlParams.has('dir')) {
      sortKey = urlParams.get('sort');
      sortDir = urlParams.get('dir');
      sortSelect.value = `${sortKey}:${sortDir}`;
    }

    sortSelect.addEventListener('change', () => {
      const [key, dir] = sortSelect.value.split(':');
      sortKey = key;
      sortDir = dir;
      currentPage = 1;
      fetchGames();
    });

    function handleTableSort(key) {
      if (sortKey === key) sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      else { sortKey = key; sortDir = 'asc'; }
      sortSelect.value = `${sortKey}:${sortDir}`;
      currentPage = 1;
      fetchGames();
    }

    // ============ Pagination ============
    prevBtn.addEventListener('click', () => {
      if (currentPage > 1) { currentPage--; fetchGames(); }
    });
    nextBtn.addEventListener('click', () => {
      if (currentPage < totalPages) { currentPage++; fetchGames(); }
    });

    // ============ Fetch Games ============
    let fetchController = null;

    async function fetchGames() {
      // Cancel previous
      if (fetchController) fetchController.abort();
      fetchController = new AbortController();

      showState('loading');

      const params = new URLSearchParams();
      // Filters
      if (currentAPIFilters.q) params.set('q', currentAPIFilters.q);
      if (currentAPIFilters.categories) currentAPIFilters.categories.forEach(c => params.append('categories', c));
      if (currentAPIFilters.evokes) currentAPIFilters.evokes.forEach(e => params.append('evokes', e));
      if (currentAPIFilters.true_counts) currentAPIFilters.true_counts.forEach(c => params.append('true_counts', c));
      for (const key of ['year_min','year_max','playtime_min','playtime_max',
        'length_min','length_max','rules_complexity_min','rules_complexity_max',
        'strategic_depth_min','strategic_depth_max','feel_min','feel_max','value_min','value_max']) {
        if (currentAPIFilters[key] != null) params.set(key, currentAPIFilters[key]);
      }
      if (currentAPIFilters.designer) params.set('designer', currentAPIFilters.designer);
      if (currentAPIFilters.publisher) params.set('publisher', currentAPIFilters.publisher);
      params.set('sort', sortKey);
      params.set('dir', sortDir);
      params.set('page', currentPage);
      params.set('per_page', PER_PAGE);

      try {
        const res = await fetch(`/api/games/query?${params}`, { signal: fetchController.signal });
        if (!res.ok) throw new Error('Query failed');
        const data = await res.json();

        currentGames = data.games;
        totalGames = data.total;
        totalPages = data.total_pages;
        currentPage = data.page;

        if (currentGames.length === 0) {
          showState('empty');
        } else {
          showState('content');
          renderCurrentView();
        }

        updateResultsInfo();
        updatePagination();
      } catch (e) {
        if (e.name === 'AbortError') return;
        console.error('Fetch error:', e);
        showState('error');
      }
    }

    function showState(state) {
      gameView.style.display = state === 'content' ? '' : 'none';
      loadingEl.style.display = state === 'loading' ? '' : 'none';
      emptyEl.style.display = state === 'empty' ? '' : 'none';
      errorEl.style.display = state === 'error' ? '' : 'none';
    }

    function updateResultsInfo() {
      const start = (currentPage - 1) * PER_PAGE + 1;
      const end = Math.min(currentPage * PER_PAGE, totalGames);
      resultsInfo.textContent = totalGames > 0
        ? `Showing ${start}\u2013${end} of ${totalGames} games`
        : 'No games found';
    }

    function updatePagination() {
      paginationEl.style.display = totalPages > 1 ? '' : 'none';
      pageInfo.textContent = `Page ${currentPage} of ${totalPages}`;
      prevBtn.disabled = currentPage <= 1;
      nextBtn.disabled = currentPage >= totalPages;
    }

    // ============ Render ============
    function renderCurrentView() {
      if (currentView === 'table') {
        GameViews.renderTable(currentGames, gameView, openDetailModal, sortKey, sortDir, handleTableSort);
      } else {
        GameViews.renderCards(currentGames, gameView, openDetailModal);
      }
    }

    // ============ Detail Modal ============
    const RATING_LABELS = {
      length: { 0: 'Snack', 1: 'Appetizer', 2: 'Main Course', 3: 'Feast', 4: 'Marathon' },
      rules_complexity: { 0: 'Preschool', 1: 'Elementary', 2: 'Junior High/HS', 3: 'College', 4: 'PhD' },
      strategic_depth: { 0: 'Reflex', 1: 'Basic', 2: 'Tactics', 3: 'Strategy', 4: 'Master Plan' },
      feel: { 0: 'Solitary', 1: 'Cooperative', 2: 'Party', 3: 'Polite', 4: 'Fierce' },
      value: { 0: 'Impulse', 1: 'Bargain', 2: 'Fair Deal', 3: 'Splurge', 4: 'Heirloom' },
      affinity: { 0: 'Loathe', 1: 'Yawn', 2: 'Enjoyable', 3: 'Delight', 4: 'Mind-blowing' },
      hotness: { 0: 'Never', 1: 'If forced', 2: 'Sure', 3: 'Love to', 4: 'Yearning' }
    };

    const RATING_NAMES = {
      length: 'Length', rules_complexity: 'Rules Complexity', strategic_depth: 'Strategic Depth',
      feel: 'Feel', value: 'Value', affinity: 'Affinity', hotness: 'Hotness'
    };

    const MECHANICS_SET = new Set(['Worker Placement','Deck Building','Engine Building','Area Control','Tile Placement','Dice Rolling','Set Collection','Trick-taking','Auctions/Bidding','Cooperative','1 vs Many','Teams','Real-time','Traitor','Social Deduction','Drafting','Press Your Luck','Roll & Write','Hex Map','Campaign Mode','Legacy','Bag Building','Hand Management','Modular Board','Variable Setup','Take That','Narrative Heavy','Puzzle Solving','No Math','Word Play','Deduction','Racing','Economic','Action Points','Route Building','Network Building','Pattern Building','Resource Management','Trading','Negotiation','Bluffing','Hidden Movement','Programmed Movement','Simultaneous Action','Card Drafting','Tableau Building','Tech Tree','Rondel','Mancala','Dexterity','Asymmetric','Variable Player Powers','Events']);
    const STYLES_SET = new Set(['Euro','Ameritrash','Abstract','Party','Family','Wargame','Filler','Gateway','Cult Classic','Dungeon Crawler','4X','Dudes on a Map','Role Playing']);
    const THEMES_SET = new Set(['Fantasy','Sci-Fi','Horror','Historical','Western','Pirates','Zombies','Vampires','Cthulhu','Aliens','Post-Apocalyptic','Superheroes','Marvel','Disney','Lord of the Rings','Animals','Food Theme','Time Travel','Space','Medieval','Ancient','Mythology','Nature','City Building','Civilization','War','Survival','Mystery','Espionage','Steampunk','Cyberpunk','Aviation','Maritime','Trains','Agriculture']);

    function catChipClass(cat) {
      if (MECHANICS_SET.has(cat)) return 'chip chip-mechanic';
      if (STYLES_SET.has(cat)) return 'chip chip-style';
      if (THEMES_SET.has(cat)) return 'chip chip-theme';
      return 'chip chip-mechanic';
    }

    function buildDots(value, max) {
      let html = '<span class="rating-dots">';
      for (let i = 0; i < max; i++) {
        html += `<span class="rating-dot${i < value ? ' filled' : ''}"></span>`;
      }
      html += '</span>';
      return html;
    }

    let currentEscHandler = null;

    function openDetailModal(game) {
      closeDetailModal();

      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.setAttribute('role', 'dialog');

      const panel = document.createElement('div');
      panel.className = 'modal-panel';

      // Header
      const header = document.createElement('div');
      header.className = 'modal-header';
      const title = document.createElement('h2');
      title.className = 'modal-title';
      title.textContent = `${game.name}${game.year ? ' (' + game.year + ')' : ''}`;
      const closeBtn = document.createElement('button');
      closeBtn.className = 'modal-close';
      closeBtn.innerHTML = '&times;';
      closeBtn.addEventListener('click', closeDetailModal);
      header.appendChild(title);
      header.appendChild(closeBtn);

      const body = document.createElement('div');
      body.className = 'modal-body';

      // Image + Info
      const sec1 = document.createElement('div');
      sec1.className = 'modal-section';
      const twocol = document.createElement('div');
      twocol.className = 'detail-two-col';

      const imgDiv = document.createElement('div');
      imgDiv.className = 'detail-image';
      if (game.has_image) {
        const img = document.createElement('img');
        img.src = `/api/images/${encodeURIComponent(game.name)} (${game.year}).jpg`;
        img.alt = game.name;
        img.onerror = () => { img.src = `/api/images/${encodeURIComponent(game.name)} (${game.year}).png`; };
        imgDiv.appendChild(img);
      } else {
        const initials = game.name.split(/\s+/).slice(0, 2).map(w => w[0]).join('').toUpperCase();
        imgDiv.innerHTML = `<div class="detail-placeholder">${initials}</div>`;
      }

      const infoDiv = document.createElement('div');
      infoDiv.className = 'detail-info';

      function addRow(label, value) {
        if (!value) return;
        const r = document.createElement('div');
        r.className = 'detail-row';
        r.innerHTML = `<div class="detail-label">${label}</div><div class="detail-value">${value}</div>`;
        infoDiv.appendChild(r);
      }

      if (game.designers && game.designers.length) addRow('Designers', escHtml(game.designers.join(', ')));
      if (game.publishers && game.publishers.length) addRow('Publishers', escHtml(game.publishers.join(', ')));
      if (game.artists && game.artists.length) addRow('Artists', escHtml(game.artists.join(', ')));

      // Playtime
      let ptText = '';
      if (game.playtime_minutes) ptText = `${game.playtime_minutes} min`;
      if (game.min_playtime && game.max_playtime) {
        const r = `${game.min_playtime}\u2013${game.max_playtime} min`;
        ptText = ptText ? `${ptText} (${r})` : r;
      }
      if (ptText) addRow('Playtime', ptText);
      if (game.min_age) addRow('Min Age', `${game.min_age}+`);

      // Players
      const pc = game.possible_counts || [];
      const tc = game.true_counts || [];
      if (pc.length) {
        let ptext = pc.join(', ') + ' players';
        if (tc.length) ptext += ` (best: ${tc.join(', ')})`;
        addRow('Players', ptext);
      }

      if (game.game_family) addRow('Game Family', escHtml(game.game_family));
      if (game.edition) addRow('Edition', escHtml(game.edition));

      twocol.appendChild(imgDiv);
      twocol.appendChild(infoDiv);
      sec1.appendChild(twocol);
      body.appendChild(sec1);

      // Description
      if (game.description) {
        const ds = document.createElement('div');
        ds.className = 'modal-section';
        ds.innerHTML = '<div class="modal-section-label">Description</div>';
        const p = document.createElement('p');
        p.className = 'detail-description';
        p.textContent = game.description;
        ds.appendChild(p);
        body.appendChild(ds);
      }

      // Ratings
      const rs = document.createElement('div');
      rs.className = 'modal-section';
      rs.innerHTML = '<div class="modal-section-label">Ratings</div>';
      for (const field of ['length','rules_complexity','strategic_depth','feel','value','affinity','hotness']) {
        const rd = document.createElement('div');
        rd.className = 'detail-rating';
        const lbl = document.createElement('div');
        lbl.className = 'detail-rating-label';
        lbl.textContent = RATING_NAMES[field];
        rd.appendChild(lbl);

        const val = game[field];
        if (val === null || val === undefined) {
          const nr = document.createElement('div');
          nr.className = 'detail-rating-val';
          nr.textContent = 'Not rated';
          rd.appendChild(nr);
        } else {
          const v = Math.min(Math.max(0, parseInt(val)), 4);
          const dotsEl = document.createElement('span');
          dotsEl.innerHTML = buildDots(v, 4);
          rd.appendChild(dotsEl);
          const desc = document.createElement('span');
          desc.className = 'detail-rating-val';
          desc.textContent = `${v} \u2014 ${RATING_LABELS[field][v] || ''}`;
          rd.appendChild(desc);
        }
        rs.appendChild(rd);
      }
      body.appendChild(rs);

      // Categories
      const cats = game.categories || [];
      if (cats.length) {
        const cs = document.createElement('div');
        cs.className = 'modal-section';
        cs.innerHTML = '<div class="modal-section-label">Categories</div>';
        const cg = document.createElement('div');
        cg.className = 'chip-grid';
        cats.forEach(c => {
          const ch = document.createElement('span');
          ch.className = catChipClass(c);
          ch.textContent = c;
          cg.appendChild(ch);
        });
        cs.appendChild(cg);
        body.appendChild(cs);
      }

      // Evokes
      const evokes = game.evokes || [];
      if (evokes.length) {
        const es = document.createElement('div');
        es.className = 'modal-section';
        es.innerHTML = '<div class="modal-section-label">Evokes</div>';
        const eg = document.createElement('div');
        eg.className = 'chip-grid';
        evokes.forEach(e => {
          const ch = document.createElement('span');
          ch.className = 'chip chip-evoke';
          ch.textContent = e;
          eg.appendChild(ch);
        });
        es.appendChild(eg);
        body.appendChild(es);
      }

      // Related
      const expansions = game.expansions || [];
      const compat = game.compatible_with || [];
      const upgrades = game.upgrades || [];
      if (expansions.length || compat.length || upgrades.length) {
        const rel = document.createElement('div');
        rel.className = 'modal-section';
        rel.innerHTML = '<div class="modal-section-label">Related</div>';
        const ri = document.createElement('div');
        ri.className = 'detail-info';
        if (expansions.length) {
          const r = document.createElement('div');
          r.className = 'detail-row';
          r.innerHTML = `<div class="detail-label">Expansions</div><div class="detail-value">${escHtml(expansions.join(', '))}</div>`;
          ri.appendChild(r);
        }
        if (compat.length) {
          const r = document.createElement('div');
          r.className = 'detail-row';
          r.innerHTML = `<div class="detail-label">Compatible With</div><div class="detail-value">${escHtml(compat.join(', '))}</div>`;
          ri.appendChild(r);
        }
        if (upgrades.length) {
          const r = document.createElement('div');
          r.className = 'detail-row';
          r.innerHTML = `<div class="detail-label">Upgrades</div><div class="detail-value">${escHtml(upgrades.map(u => u.name || u).join(', '))}</div>`;
          ri.appendChild(r);
        }
        rel.appendChild(ri);
        body.appendChild(rel);
      }

      panel.appendChild(header);
      panel.appendChild(body);
      overlay.appendChild(panel);
      modalRoot.appendChild(overlay);
      document.body.style.overflow = 'hidden';

      overlay.addEventListener('click', (e) => { if (e.target === overlay) closeDetailModal(); });
      const esc = (e) => { if (e.key === 'Escape') closeDetailModal(); };
      document.addEventListener('keydown', esc);
      currentEscHandler = esc;
    }

    function closeDetailModal() {
      const overlay = modalRoot.querySelector('.modal-overlay');
      if (overlay) {
        if (currentEscHandler) { document.removeEventListener('keydown', currentEscHandler); currentEscHandler = null; }
        overlay.style.animation = 'fadeIn 0.15s ease-out reverse forwards';
        setTimeout(() => { overlay.remove(); document.body.style.overflow = ''; }, 150);
      }
    }

    function escHtml(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    // ============ Evokes Section ============
    const evokesSection = document.getElementById('evokes-section');
    let evokeChips = {};  // evoke name -> chip element

    async function loadEvokes() {
      try {
        const res = await fetch('/api/evokes/counts');
        if (!res.ok) return;
        const data = await res.json();
        evokesSection.innerHTML = '';
        evokeChips = {};
        for (const { evoke, count } of data) {
          const chip = document.createElement('span');
          chip.className = 'evoke-chip';
          chip.innerHTML = `${evoke} <span class="evoke-count">${count}</span>`;
          chip.addEventListener('click', () => toggleEvoke(evoke));
          evokesSection.appendChild(chip);
          evokeChips[evoke] = chip;
        }
        // Highlight any already-active evoke filters
        syncEvokeChips();
      } catch (e) {
        console.warn('Failed to load evoke counts:', e);
      }
    }

    function toggleEvoke(evoke) {
      const current = fb.getFilters().evokes || [];
      const set = new Set(current);
      if (set.has(evoke)) set.delete(evoke);
      else set.add(evoke);
      fb.filters.evokes = [...set];
      if (fb.filters.evokes.length === 0) delete fb.filters.evokes;
      fb._renderChips();
      fb._emit();
      syncEvokeChips();
    }

    function syncEvokeChips() {
      const active = new Set(fb.getFilters().evokes || []);
      for (const [name, chip] of Object.entries(evokeChips)) {
        chip.classList.toggle('active', active.has(name));
      }
    }

    // Keep evoke chips in sync when FilterBar changes (e.g. removing an evokes chip)
    fb.on('change', () => syncEvokeChips());

    loadEvokes();

    // ============ Initial Load ============
    // If no filters from URL, do an initial fetch
    if (Object.keys(fb.getFilters()).length === 0) {
      fetchGames();
    }
    // Otherwise, the filter bar's change event will trigger the fetch
  </script>
</body>
</html>
